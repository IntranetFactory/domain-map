    extra_b9d_added: "2026-06-13"

b3:
  - id: B3-PHASE0-MARKET-GAPS
    candidate: >-
      9 data_objects flagged MISSING in the 2026-05-29 semantic pass remain
      unloaded: buyer_representation_agreements, listing_agreements,
      compliance_checklists, escrow_accounts, escrow_deposits,
      referral_agreements, open_houses, mls_syndication_logs, mls_feeds,
      agent_pipelines.
    rationale: >-
      Five compliance-cluster entities (listing_agreements,
      buyer_representation_agreements, compliance_checklists,
      referral_agreements, escrow_accounts plus escrow_deposits) are carried
      by the back-office vendors and absent from the catalog. Without
      compliance_checklists, the RE-BROK-BROKERAGE-OPS module is structurally a
      commission calculator without the differentiator the transaction-management
      category exists for. buyer_representation_agreements is the highest-urgency
      candidate: legally mandatory in most US states post-NAR-settlement
      (August 2024). CRM-vendor cluster entities (open_houses, agent_pipelines,
      mls_syndication_logs, mls_feeds) back the RE-BROK-MLS-SYNDICATION
      capability that currently has no backing entity.
    proposed_module: >-
      compliance cluster -> RE-BROK-BROKERAGE-OPS (152) primarily, with
      embedded shells on RE-BROK-AGENT-OPS (151) where the agent originates
      the document; MLS cluster -> RE-BROK-AGENT-OPS (151); open_houses ->
      RE-BROK-AGENT-OPS (151) distinct from tour_appointments.
    extra_priority_order:
      - buyer_representation_agreements
      - listing_agreements
      - compliance_checklists
      - escrow_accounts
      - escrow_deposits
      - referral_agreements
      - open_houses
      - mls_syndication_logs
      - mls_feeds
      - agent_pipelines
