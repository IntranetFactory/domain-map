b2:
  - id: B2-H1-APPROVAL
    summary: 7 handoff_processes rows still sit at record_status='new'; approving them is a record_status flip the agent cannot perform.
    question: >-
      The 7 agent_curated APQC tags on the 6 cross-domain handoffs published by
      RE-BROKERAGE are still at record_status='new'. The user answered 'approve
      all 7' in a-RE-BROKERAGE.md (2026-06-16), but a record_status flip is out
      of band: Rule #1 / Rule #22 forbid the agent stamping 'approved' on the
      basis of an a-file answer, and the q-/a- mechanism never carries a
      record_status change. The user must approve these in the record / catalog
      UI directly. Re-surfaced so the approval is not lost.
    options:
      - approve_all_7_directly_in_ui
      - approve_subset_after_spot_check
      - defer_review
    why: >-
      The H1 coverage check passes (every cross-domain handoff has at least one
      tag, verified live; mappings match the recorded assignments) but the
      catalog-quality headline (approved count) is still 0 of 7 because Rule #1
      requires an explicit, direct, in-band user sign-off on each tag, separate
      from the a-file.
    extra_pcf_assignments:
      - {handoff_process_id: 187, handoff_id: 296, pcf_external_id: "10192", pcf_name: "Close the sale"}
      - {handoff_process_id: 188, handoff_id: 297, pcf_external_id: "10192", pcf_name: "Close the sale"}
      - {handoff_process_id: 457, handoff_id: 297, pcf_external_id: "11052", pcf_name: "Negotiate and document agreements/contracts"}
      - {handoff_process_id: 189, handoff_id: 308, pcf_external_id: "18115", pcf_name: "Validate and qualify leads/opportunities"}
      - {handoff_process_id: 190, handoff_id: 311, pcf_external_id: "20114", pcf_name: "Submit regulatory reports"}
      - {handoff_process_id: 191, handoff_id: 861, pcf_external_id: "10192", pcf_name: "Close the sale"}
      - {handoff_process_id: 192, handoff_id: 862, pcf_external_id: "10192", pcf_name: "Close the sale"}

b3:
  - id: B3-PHASE0-MARKET-GAPS
    candidate: >-
      9 data_objects flagged MISSING in the 2026-05-29 semantic pass remain
      unloaded: buyer_representation_agreements, listing_agreements,
      compliance_checklists, escrow_accounts, escrow_deposits,
      referral_agreements, open_houses, mls_syndication_logs, mls_feeds,
      agent_pipelines. User answered yes (research and add the ones that hold
      up, additive, can happen later, a-RE-BROKERAGE.md 2026-06-16): this
      confirms the direction but the actual load still requires a Phase-0-backed
      q-file approving the specific entities (research carve-out, Rule #21), so
      it stays a parked additive idea, not auto-loaded by the a-file.
    rationale: >-
      Five compliance-cluster entities (listing_agreements,
      buyer_representation_agreements, compliance_checklists,
      referral_agreements, escrow_accounts plus escrow_deposits) are carried
      by the back-office vendors and absent from the catalog. Without
      compliance_checklists, the RE-BROK-BROKERAGE-OPS module is structurally a
      commission calculator without the differentiator the transaction-management
      category exists for. buyer_representation_agreements is the highest-urgency
      candidate: legally mandatory in most US states post-NAR-settlement
      (August 2024). CRM-vendor cluster entities (open_houses, agent_pipelines,
      mls_syndication_logs, mls_feeds) back the RE-BROK-MLS-SYNDICATION
      capability that currently has no backing entity.
    proposed_module: >-
      compliance cluster -> RE-BROK-BROKERAGE-OPS (152) primarily, with
      embedded shells on RE-BROK-AGENT-OPS (151) where the agent originates
      the document; MLS cluster -> RE-BROK-AGENT-OPS (151); open_houses ->
      RE-BROK-AGENT-OPS (151) distinct from tour_appointments.
    extra_priority_order:
      - buyer_representation_agreements
      - listing_agreements
      - compliance_checklists
      - escrow_accounts
      - escrow_deposits
      - referral_agreements
      - open_houses
      - mls_syndication_logs
      - mls_feeds
      - agent_pipelines
