b2:
  - id: B1A-SELF-CONTAIN
    summary: "2 contributor/required-consumer rows break module self-containment (M9): embed or relax each. DESTRUCTIVE (rewrites role/necessity on existing rows) - surfaced, not applied."
    question: >-
      Each fix overwrites role/necessity on an existing DMDO row, which is a
      destructive edit the agent does not apply unapproved. Per row, should the
      agent convert role to embedded_master (carry a local shell of the
      CRM-mastered entity inside RE-BROK-AGENT-OPS) OR set necessity to optional
      (presence-conditional)? references/modules.md section 5 + SKILL.md M9.
    finding: >-
      Live 2026-06-07: 2 domain_module_data_objects rows on module 151
      (RE-BROK-AGENT-OPS) are role=contributor with necessity=required, pointing
      at entities mastered by CRM (domain 69) and not embedded_master here:
      DMDO 777 = crm_contacts (98), DMDO 776 = crm_leads (99). Each is an M9
      self-containment violation.
    options:
      - per_row_convert_to_embedded_master
      - per_row_set_necessity_optional
    extra_m9_shapes:
      - {dmdo_id: 777, entity: crm_contacts, module: RE-BROK-AGENT-OPS, role: contributor, necessity: required, master_domain: CRM}
      - {dmdo_id: 776, entity: crm_leads, module: RE-BROK-AGENT-OPS, role: contributor, necessity: required, master_domain: CRM}
  - id: B2-H1-APPROVAL
    summary: 7 handoff_processes rows still sit at record_status='new'.
    question: >-
      Should the user approve the 7 agent_curated APQC tags on the 6
      cross-domain handoffs published by RE-BROKERAGE? Rule #1 forbids the
      agent from auto-stamping record_status='approved'.
    options:
      - approve_all_7
      - approve_subset_after_spot_check
      - defer_review
    why: >-
      The H1 coverage check passes (every cross-domain handoff has at least
      one tag, verified live 2026-06-07) but the catalog-quality headline
      (approved count) is still 0 of 7 because Rule #1 requires explicit user
      sign-off on each tag.
    extra_pcf_assignments:
      - {handoff_process_id: 187, handoff_id: 296, pcf_external_id: "10192", pcf_name: "Close the sale"}
      - {handoff_process_id: 188, handoff_id: 297, pcf_external_id: "10192", pcf_name: "Close the sale"}
      - {handoff_process_id: 457, handoff_id: 297, pcf_external_id: "11052", pcf_name: "Negotiate and document agreements/contracts"}
      - {handoff_process_id: 189, handoff_id: 308, pcf_external_id: "18115", pcf_name: "Validate and qualify leads/opportunities"}
      - {handoff_process_id: 190, handoff_id: 311, pcf_external_id: "20114", pcf_name: "Submit regulatory reports"}
      - {handoff_process_id: 191, handoff_id: 861, pcf_external_id: "10192", pcf_name: "Close the sale"}
      - {handoff_process_id: 192, handoff_id: 862, pcf_external_id: "10192", pcf_name: "Close the sale"}
  - id: B2-B9D-OWN-207
    summary: "Real Estate Brokerage and Agent Operations: name an owner for \"Submit regulatory reports\" (no one is responsible for it today)"
    question: |
      Governance, Risk and Compliance forwards disclosure document to Real Estate Brokerage and Agent Operations to submit regulatory reports, but Real Estate Brokerage and Agent Operations does not yet have anyone assigned to submit regulatory reports, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Real Estate Brokerage and Agent Operations owns, and assign a named owner once Real Estate Brokerage and Agent Operations sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Real Estate Brokerage and Agent Operations decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-RE-BROKERAGE.md q4.
    extra_b9d_added: "2026-06-13"
