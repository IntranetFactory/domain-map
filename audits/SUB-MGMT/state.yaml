b2:
  - id: B2-S1
    summary: "usage_records lifecycle vs config-shape exemption (M3/B12)."
    question: "Author the 4 lifecycle states on usage_records (posted, rated, billed, reversed), or declare config-shape per Rule #12 exemption (immutable append-only event log; rating + billing lifecycle then lives on a new master like rated_usage_charges)?"
    options:
      - "(a) Author the 4 lifecycle states on usage_records. Agent default."
      - "(b) Declare config-shape exemption, queue rated_usage_charges as a new master under Bucket 3."
    why: "Architectural intent question with downstream blast radius. Modern usage-metering vendors (Metronome, Orb, Lago) model usage events as immutable; the lifecycle lives on aggregated rated_usage_charges or usage_summaries. The B1B-S4 fix shape depends on this decision."

  - id: B2-S2
    summary: "Pattern flag re-evaluation across 5 SUB-MGMT masters (B4)."
    question: "Per-flag yes/no on 5 candidate flag flips: (1) customer_invoices.has_submit_lock=true (issued invoices immutable, re-issue means void+new draft), (2) customer_invoices.has_personal_content=true (bill-to address, payment method last-4), (3) customer_subscriptions.has_personal_content=true (billing contact, possibly address), (4) revenue_recognition_records.has_submit_lock=true (immutable post-recognition per ASC 606 audit trail), (5) dunning_events.has_personal_content=true (collection notices carry payer contact)."
    options:
      - "Per-flag yes/no for each of the 5 candidates."
    why: "Pattern flags are workflow-shape judgments; agent re-evaluates and proposes, user decides per Rule #12. Rule #15 forbids auto-populating notes to explain flag reasoning."

  - id: B2-S3
    summary: "certification_required=false on a SOX / ASC 606 domain."
    question: "Keep certification_required=false (definition: product needs formal certification like Finanzamt/GoBD or FDA 510(k); SOX audit is buyer-side), flip to true (public-company sales reality), or add a new column at catalog level for 'auditor-attestable' separate from 'certified'?"
    options:
      - "(a) Keep false."
      - "(b) Flip to true."
      - "(c) Add a new auditor-attestable column at catalog level (separate change, multi-domain impact)."
    why: "Definitional boundary between 'implementation needs auditor sign-off' and 'product needs formal certification'. Vendors like Maxio SaaSOptics, Sage Intacct ARC, RightRev market on SOX-compliance grounds."

  - id: B2-S4
    summary: "Zero domain_regulations rows on a heavily-regulated domain."
    question: "Author domain_regulations joins for ASC 606, IFRS 15, SOX, PCI-DSS, GDPR (any subset), or skip pending formal Phase 0?"
    options:
      - "(a) Add 5 joins on existing regulations rows if present."
      - "(b) Skip pending Phase 0."
      - "(c) Specify a subset."
    why: "Flagship vendors universally call out ASC 606 (FASB), IFRS 15 (IASB), SOX (PCAOB), PCI-DSS (PCI SSC indirect via payment processors), GDPR (EU subscriber PII), and US state sales-tax nexus (Wayfair). Currently 0 domain_regulations rows on SUB-MGMT."

  - id: B2-S5
    summary: "Capability split intent (SUB-LIFECYCLE vs SUB-USAGE-METER vs SUB-REV-REC vs SUB-CHURN-ANALYTICS)."
    question: "Keep SUB-MGMT as 2 modules, split into 3-5 modules under SUB-MGMT, or spin out USAGE-METERING and REV-REC as separate domains per the queued candidates in _missing-domains.md?"
    options:
      - "(a) Keep 2 modules; metering + rev-rec live as capabilities only."
      - "(b) Split into 3-5 modules under SUB-MGMT; capability rebinding required."
      - "(c) Spin out USAGE-METERING and REV-REC as separate domains per Bucket 3 candidates."
    why: "SUB-MGMT-SUBSCRIPTIONS currently hosts 5 capabilities. SUB-USAGE-METER, SUB-REV-REC, SUB-CHURN-ANALYTICS each have independent point-solution markets (Metronome / Orb / Lago for metering; Maxio SaaSOptics / RightRev for rev-rec; ChartMogul / SaaSGrid for analytics). Compression hides the modularization. Gates B1B-S6 shape partially."

  - id: B2-S6
    summary: "HVAC-SVC-MGMT starter hosting on SUB-MGMT via host-junction."
    question: "Is the HVAC starter (id 171) hosting on SUB-MGMT intentional (HVAC ships with SUB-MGMT billing embedded), mis-attribution (remove the host_domain row), or a refactor candidate (starter should consume SUB-MGMT-BILLING via a domain dependency rather than embed customer_invoices directly)?"
    options:
      - "(a) Intentional, retain as-is."
      - "(b) Mis-attribution, remove the SUB-MGMT host_domain row."
      - "(c) Refactor: starter consumes SUB-MGMT-BILLING module rather than embedding customer_invoices."
    why: "Starter 171 embeds 10 data_objects of which only customer_invoices (107) is a SUB-MGMT master. The host-junction row was created during HVAC starter load; SUB-MGMT and FSM overlap only on this one master."

