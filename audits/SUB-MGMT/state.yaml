      - "(b) Mis-attribution, remove the SUB-MGMT host_domain row."
      - "(c) Refactor: starter consumes SUB-MGMT-BILLING module rather than embedding customer_invoices."
    why: "Starter 171 embeds 10 data_objects of which only customer_invoices (107) is a SUB-MGMT master. The host-junction row was created during HVAC starter load; SUB-MGMT and FSM overlap only on this one master."

