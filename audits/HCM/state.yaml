b2:
  - id: B2-S1r
    summary: "Choose event_category convention for trigger_event 391 org_unit.created (B1B-S1 gating)."
    question: "Should trigger_event 391 org_unit.created carry event_category='lifecycle' (treating org-unit instantiation as a lifecycle event, parallel to employee.created) or event_category='state_change' (treating draft to active as a state-machine transition, parallel to org_unit.merged / org_unit.disbanded which were just set to state_change)?"
    options: ["lifecycle", "state_change"]
    why: "The Rule #13 enum requires one of lifecycle / state_change / threshold / signal. Both candidates fit; the choice picks the convention used across HCM org-unit lifecycle events."

  - id: B2-S2r
    summary: "Ratify the 2026-05-31 Continuation revert of 9 polluted notes rows (8 DDO ids 58 97 291 309 317 333 371 1124; 1 DMDO id 678)."
    question: "Confirm the revert applied at the 2026-05-31 Continuation (PATCH notes='') is acceptable as the safe-by-default Rule #15 default, or specify per-row wording to restore?"
