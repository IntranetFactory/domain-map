    summary: "HCM-LIFECYCLE-WORKFLOWS (56) baseline-only permission shape (gates B1B-S2 for some inbound handoffs)."
    question: "Module 56 carries baseline-only permissions (read / manage / admin) with zero workflow-gate permissions, because all lifecycle states sit on HCM-CORE-WORKER / HCM-ORG-POSITIONS masters. Is this the intentional architecture, or should specific self-service workflow gates be added (for example submit_absence_request, complete_offboarding_task)?"
