b2:
  - id: B2-S1r
    summary: "Choose event_category convention for trigger_event 391 org_unit.created (B1B-S1 gating)."
    question: "Should trigger_event 391 org_unit.created carry event_category='lifecycle' (treating org-unit instantiation as a lifecycle event, parallel to employee.created) or event_category='state_change' (treating draft to active as a state-machine transition, parallel to org_unit.merged / org_unit.disbanded which were just set to state_change)?"
    options: ["lifecycle", "state_change"]
    why: "The Rule #13 enum requires one of lifecycle / state_change / threshold / signal. Both candidates fit; the choice picks the convention used across HCM org-unit lifecycle events."

  - id: B2-S2r
    summary: "Ratify the 2026-05-31 Continuation revert of 9 polluted notes rows (8 DDO ids 58 97 291 309 317 333 371 1124; 1 DMDO id 678)."
    question: "Confirm the revert applied at the 2026-05-31 Continuation (PATCH notes='') is acceptable as the safe-by-default Rule #15 default, or specify per-row wording to restore?"
    options: ["confirm_revert", "restore_specific_wording"]

  - id: B2-S3r
    summary: "Decide how to handle 25 populated HCM skill_tools.notes (Rule #15 default vs F7 justification overlap; gates B1B-N1)."
    question: "All 25 HCM skill_tools rows carry populated notes (restated-purpose prose, plus the two F7 candidates sign_document and notify_team). Per Rule #15 the catalog default is empty notes with per-row user approval required to populate. Options: (a) confirm user-approved at load time and leave all 25 in place; (b) PATCH notes='' on all 25 and log a Rule #15 incident in references/skill-changelog.md; (c) approve per-row wording for a subset (the discussion-shape) and revert the rest."
    options: ["confirm_user_approved_all", "revert_all_and_log_incident", "per_row_approval"]

  - id: B2-S4r
    summary: "Pattern-flag re-evaluation on employment_contracts.has_personal_content and employment_events.has_personal_content."
    question: "Current flags: employment_contracts.has_personal_content=false (contracts carry compensation, signatory names, jurisdiction); employment_events.has_personal_content=false (transfers / leaves may carry FMLA or health data). Should each flip to true?"
    options: ["both_true", "contracts_true_only", "events_true_only", "leave_both_false"]

  - id: B2-S5r
    summary: "HCM-LIFECYCLE-WORKFLOWS (56) baseline-only permission shape (gates B1B-S2 for some inbound handoffs)."
    question: "Module 56 carries baseline-only permissions (read / manage / admin) with zero workflow-gate permissions, because all lifecycle states sit on HCM-CORE-WORKER / HCM-ORG-POSITIONS masters. Is this the intentional architecture, or should specific self-service workflow gates be added (for example submit_absence_request, complete_offboarding_task)?"
    options: ["baseline_only_intentional", "add_workflow_gates_specify_which"]

  - id: B2-S6r
    summary: "Author missing internal-mobility handoff HCM-CORE-WORKER -> ATS on employee.transferred -> candidates?"
    question: "Workday HCM and SAP SuccessFactors auto-create a candidate record from an existing employee when the employee applies for an internal posting. No handoff today on employee.transferred to candidates; the existing query_candidates tool on skill 171 may already cover the cross-domain read. Author the handoff or skip?"
    options: ["skip", "author_handoff_requires_new_trigger_event"]

  - id: B2-S7r
    summary: "WFM absence_requests DMDO mirror on HCM-LIFECYCLE-WORKFLOWS (56)."
    question: "DDO 371 declares HCM consumer + optional on absence_requests at the domain-level rollup; handoff 135 (WFM -> HCM absence.approved) targets module 56. Confirm DMDO row 228 covers the module-level dependency, or add a mirror?"
    options: ["confirm_dmdo_228_covers", "add_mirror_dmdo_row"]

b3:
  - id: B3-EMP-DEPENDENTS
    candidate: "employee_dependents"
    rationale: "Every flagship HCM models dependents as first-class records (spouse, children, beneficiary contacts) distinct from employees, with their own privacy and eligibility implications for BEN-ADMIN. Currently absent from HCM."
    vendor_evidence: ["Workday HCM", "SAP SuccessFactors", "Oracle Cloud HCM", "UKG Pro", "ADP Workforce Now"]
    proposed_module: "HCM-CORE-WORKER"

  - id: B3-EMERGENCY-CONTACTS
    candidate: "emergency_contacts"
    rationale: "Modeled as first-class records in Workday Emergency Contact, SuccessFactors Emergency Contact, BambooHR Emergency Contact. Personal-content gap; currently absent."
    vendor_evidence: ["Workday HCM", "SAP SuccessFactors", "BambooHR"]
    proposed_module: "HCM-CORE-WORKER"

  - id: B3-WORK-ELIG-DOCS
    candidate: "work_eligibility_documents"
    rationale: "Workday Work Authorization, SuccessFactors Work Permit, ADP and Deel global EOR platforms model work-eligibility documents (visa, work permit, I-9, Right-to-Work). ONBOARDING owns onboarding_document_collections (the wrapper, not per-document records); the per-document record is absent."
    vendor_evidence: ["Workday HCM", "SAP SuccessFactors", "ADP Workforce Now", "Deel"]
    proposed_module: "HCM-CORE-WORKER"

  - id: B3-NATIONAL-IDS
    candidate: "national_ids"
    rationale: "SuccessFactors National ID, Workday National ID, Personio Personal ID model SSN / NINO / AHV separately from employees with stricter access controls. Currently absent."
    vendor_evidence: ["SAP SuccessFactors", "Workday HCM", "Personio"]
    proposed_module: "HCM-CORE-WORKER"

