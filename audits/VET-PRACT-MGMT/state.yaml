  - id: B1B-B11-ALIASES
    summary: Zero data_object_aliases on any of the 5 masters; "Client" alias on pet_owners triggers Rule #9 collision arbitration.
    finding: |
      Vendor-universal aliases are absent: pet_owners <-> "Client" (the universal PIMS term across IDEXX
