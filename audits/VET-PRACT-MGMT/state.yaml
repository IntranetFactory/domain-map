b2:
  - id: B2-MODULE-RESHAPE-ON-B3
    summary: "Whether to split the 3 modules into the richer 4-6 module shape once the B3 entities land."
    question: |
      The 2026-06-02 build used a 3-module shape (CLINICAL-CARE / FRONT-OFFICE / PHARMACY-RX) because
      only the 5 existing masters were available. The prior B2-MODULE-SHAPE 5/6-split presumed
      veterinary_appointments, vet_invoices, lab_test_orders, drug_inventory etc. Once those B3
      entities are loaded, split FRONT-OFFICE into APPOINTMENTS + INVOICING, and/or carve
      LAB-INTEGRATION out of CLINICAL-CARE, and/or add BOARDING?
    options:
      - keep-3-modules-and-grow-them-in-place
      - split-to-5-when-appointments+invoices+lab-orders+inventory-land
      - split-to-6-adding-BOARDING
    why: |
      pet_owners currently masters in FRONT-OFFICE; splitting INVOICING out would re-home invoicing
      data_objects but leave pet_owners mastered in the client/scheduling half. Reshape is cheap while
      the modules are still entity-light; deferring past the B3 load risks a bigger migration.

  - id: B2-CATALOG-COPY
    summary: Approve buyer-voice catalog UX copy for the domain (A4) and the 3 modules (M8).
    question: |
      Rule #20 requires user-approved buyer-voice copy for domains id 151 (catalog_tagline +
      catalog_description) and for each of modules 321/322/323 (catalog_tagline + catalog_description).
      All are currently empty. Agent will draft on request; confirm the trigger.
    options:
      - draft-and-surface (agent drafts all, user approves wording)
      - user-supplies-text (user provides exact wording)
      - modules-first-then-derive-domain-summary
    why: |
      Once a non-empty value lands, Rule #20 forbids overwrite without per-row approval; this is the
      execution gate for B1A-MODULE-CATALOG-UX.

  - id: B2-PET-OWNER-PERSONAL-CONTENT
    summary: PATCH data_objects.has_personal_content=true on pet_owners (id 396)?
    question: |
      pet_owners carries PII (name, address, payment instrument, ZIP, optional SSN-derived credit
      data); state consumer-privacy laws (CCPA, etc.) apply to veterinary clinics even though HIPAA
      does not. Should has_personal_content be set true?
    options:
      - "yes"
      - "no"
      - defer-to-Phase-0
    why: |
      Pattern flag drives downstream RBAC + retention scaffolding; positive re-eval is required per
      Rule #12 and should not be left at false-by-default without an explicit user decision.

  - id: B2-CONTROLLED-SUBSTANCE-SUBMIT-LOCK
    summary: PATCH data_objects.has_submit_lock=true on controlled_substance_ledger_entries (id 399)?
    question: |
      DEA 21 CFR 1304 makes the controlled-substance ledger append-only by federal law; corrections
      require a strikethrough + initialed entry, not edit-in-place. Should has_submit_lock be true?
    options:
      - "yes"
      - "no"
      - defer-to-Phase-0
    why: |
      Submit-lock flag drives the platform's post-submit edit guard; mis-set on a DEA ledger is a
      regulatory hazard.

  - id: B2-CONFIG-SHAPE-CHECK
    summary: Confirm none of the 5 current masters qualifies for the Rule #12 config-shape exemption.
    question: |
      Each of animal_patients, pet_owners, veterinary_vaccinations, veterinary_lab_results, and
      controlled_substance_ledger_entries carries an observable workflow. Confirm all 5 get lifecycle
      states loaded, none exempt?
    options:
      - confirm-all-5-get-states
      - exempt-one-or-more-and-name-which
    why: |
      Rule #12 exemption is config-shape (author-once / occasionally-edit, no workflow); none of these
      qualify. Explicit confirmation unblocks B1B-B12-LIFECYCLE-STATES.

  - id: B2-CAPABILITY-FUNCTION-OVERRIDES
    summary: Load 3 business_function_capabilities overrides where the capability owner diverges from the domain owner.
    question: |
      Plausible overrides: VET-INVOICING -> Accounts Receivable; VET-INVENTORY-RX -> Compliance
      Operations (DEA); VET-REMINDER-MGMT -> Customer Service. Domain owner is Business Operations.
      Add all three?
    options:
      - all-three
      - subset-name-which
      - none-keep-domain-RACI
    why: |
      Rule C2 only requires overrides where the capability diverges; over-loading clutters the catalog,
      under-loading hides per-capability ownership.

  - id: B2-VACCINATION-ADMIN-PATTERN
    summary: integration_pattern, friction_level, and GRC-inclusion for the 2 proposed handoffs on trigger_event 1088.
    question: |
      For trigger_event 1088 (veterinary_vaccination.administered), pattern + friction for the CSM
      next-dose reminder row and the GRC rabies-tag reporting row. Should GRC be included given state
      law variance?
    options:
      - CSM-api-call-low + GRC-batch_sync-medium
      - CSM-api-call-low-only-defer-GRC
      - CSM-api-call-low + GRC-event_stream-low
    why: |
      No deterministic default; pattern shape depends on whether GRC reporting is real-time or
      end-of-day. Unblocks B1B-B9-VACCINATION-ADMINISTERED-HANDOFF.

  - id: B2-CLIENT-ALIAS-POSTURE
    summary: Rule #9 arbitration on the "Client" alias for pet_owners.
    question: |
      "Client" is a high-collision bare word (CSM customer_contacts, CRM customers). For the
      pet_owners alias, pick: industry-synonym only (alias_name='Client', scoped to vet vendors),
      domain-prefixed (alias_name='vet client'), or canonical-claim (none, pet_owners stays prefixed
      and "Client" is the alias).
    options:
      - alias-only-Client
      - alias-only-vet-client
      - canonical-claim-defer
    why: |
      Universal PIMS UI label across IDEXX, ezyVet, AVImark; not flipping the alias means
      search/triggering misses the term. Unblocks B1B-B11-ALIASES.

  - id: B2-ERP-FIN-APQC
    summary: Classify or defer the only untagged outbound handoff (946 -> ERP-FIN).
    question: |
      Best-available cross-industry PCF candidate is 736 "Collect and maintain account information"
      (L4). The trigger (pet_owner.registered) is registration, not AR collection, so the match is
      partial. Tag with 736, or defer to Discover Pass 3 custom-process authoring?
    options:
      - tag-with-process-736
      - tag-with-process-303-AR-parent
      - defer-to-discover
    why: |
      H1 coverage on the domain is otherwise 5 of 6; clean closure or explicit deferral keeps the audit
      honest. Unblocks B1B-H1-ERP-FIN-APQC.

b3:
  - id: B3-VETERINARY-APPOINTMENTS
    candidate: veterinary_appointments
    rationale: |
      Vendor-universal master (IDEXX Cornerstone appointment book, ezyVet calendar, AVImark scheduler,
      Vetspire Calendar, Provet boarding). The VET-APPT-SCHED capability (429) currently sits in
      FRONT-OFFICE with NO dedicated appointment master (it leans on pet_owners + embedded
      animal_patients). This is the single most load-bearing missing master: scheduling has no
      first-class entity. Phase 0: confirm appointment as first-class vs. derived from exam_notes.
    vendor_evidence:
      - IDEXX Cornerstone
      - ezyVet
      - AVImark
      - Vetspire
    proposed_module: VET-PRACT-MGMT-FRONT-OFFICE

  - id: B3-INVOICES-PAYMENTS
    candidate: vet_invoices, vet_payment_transactions
    rationale: |
      VET-INVOICING capability (430) sits in FRONT-OFFICE but has NO domain-owned invoice/payment
      master; it currently borrows supplier_invoices (AP-side, id 75) as a contributor, which is the
      wrong direction (that is vendor-billing, not client-billing). In-clinic POS + client invoicing
      (IDEXX integrated POS via Worldpay, ezyVet Stripe/Square, Provet payments) is a real client-side
      master gap. Phase 0: invoice/payment may partly belong to ERP-FIN; veterinary POS is in-clinic
      and PCI-DSS-bounded so a domain-owned master makes sense.
    vendor_evidence:
      - IDEXX integrated POS
      - ezyVet
      - Provet Cloud
    proposed_module: VET-PRACT-MGMT-FRONT-OFFICE

  - id: B3-PRESCRIPTIONS-INVENTORY-DEA-REPORTS
    candidate: veterinary_prescriptions, vet_drug_inventory_items, dea_reports
    rationale: |
      PHARMACY-RX (323) currently masters only controlled_substance_ledger_entries; the VET-INVENTORY-RX
      capability also needs general drug inventory (AVImark inventory, ezyVet stock control, IDEXX
      Inventory Pro), e-Rx (IDEXX Rx pad, ezyVet e-Rx, Cubex Rx), and DEA Form 41 (wastage) / Form 222
      (Schedule II ordering) / state PMP reports. Without vet_drug_inventory_items the module cannot
      represent non-controlled stock or reorder thresholds. Phase 0: prescriptions as separate master
      from ledger-entry; dea_reports as derived vs. master-with-workflow.
    vendor_evidence:
      - IDEXX Inventory Pro
      - Cubex
      - ezyVet
      - DEA Form 41 / 222
    proposed_module: VET-PRACT-MGMT-PHARMACY-RX

  - id: B3-EXAM-NOTES-REMINDER-PROTOCOLS
    candidate: veterinary_exam_notes, vaccination_reminder_protocols
    rationale: |
      CLINICAL-CARE (321) hosts VET-PATIENT-CARE but has no SOAP-note master (IDEXX SOAP editor, ezyVet
      clinical-records, Vetspire SOAP) and no reminder-protocol config (AAHA / AVMA vaccine schedules
      keyed off species + breed + age) for VET-REMINDER-MGMT. Phase 0: SOAP structure varies vendor-by-
      vendor; reminder_protocols may qualify for the Rule #12 config-shape exemption.
    vendor_evidence:
      - IDEXX Cornerstone
      - ezyVet
      - Vetspire
      - AAHA/AVMA guidelines
    proposed_module: VET-PRACT-MGMT-CLINICAL-CARE

  - id: B3-LAB-TEST-ORDERS-SPECIES-BREEDS
    candidate: lab_test_orders, vet_species_breeds
    rationale: |
      CLINICAL-CARE masters veterinary_lab_results but not lab_test_orders (orders fire to IDEXX VetLab
      / VetConnect Plus or Antech, results return asynchronously) and not vet_species_breeds (config
      table driving weight-based dose calc + breed-specific reminder protocols). Phase 0: lab_orders
      pattern (master with workflow vs. derived from appointments).
    vendor_evidence:
      - IDEXX VetLab / VetConnect Plus
      - Antech Lab
      - AAHA species/breed reference
    proposed_module: VET-PRACT-MGMT-CLINICAL-CARE

  - id: B3-BOARDING-RESERVATIONS
    candidate: boarding_reservations
    rationale: |
      Optional capability NOT in the current 6-capability list. Many US clinics outsource boarding;
      flagship vendors that bundle it: AVImark boarding, IDEXX Cornerstone boarding, Provet boarding
      module. Phase 0 decision is whether to add the capability + module at all (would be a 4th/6th
      module).
    vendor_evidence:
      - AVImark boarding
      - IDEXX Cornerstone boarding
      - Provet Cloud
    proposed_module: VET-PRACT-MGMT-BOARDING
