      controlled_substance_ledger_entries <-> "DEA Log Entry", "Schedule Drug Log", "C2-5 Ledger". "Client" is
      the most load-bearing because IDEXX/ezyVet UIs use it pervasively. Rule #9 collision arbitration: "Client"
      is a high-collision bare word across the catalog (CSM customer_contacts, CRM customers, etc.) and warrants
      explicit canonical-bare-word stance or domain-prefixed alias.
    action: |
      Draft ~8 alias rows. Surface the "Client" canonical-bare-word posture (alias-only vs. canonical claim) for
