b2:
  - id: B2-MODULE-SHAPE
    summary: Pick the VET-PRACT-MGMT module set (4 / 5 / 6 modules; boarding scope).
    question: |
      How many modules should VET-PRACT-MGMT have and which masters anchor each? Options below.
    options:
      - a) 5-module split: PATIENT-CARE (animal_patients + veterinary_vaccinations + future exam_notes + reminder_protocols + species_breeds); APPOINTMENTS (future veterinary_appointments); INVENTORY-RX (controlled_substance_ledger_entries + future prescriptions + drug_inventory + dea_reports); LAB-INTEGRATION (veterinary_lab_results + future lab_test_orders); INVOICING (pet_owners + future invoices + payment_transactions).
      - b) 4-module split: collapses APPOINTMENTS into PATIENT-CARE (IDEXX / ezyVet bundle scheduling tightly with patient records).
      - c) 6-module split: adds BOARDING (future boarding_reservations).
    why: |
      pet_owners is dual-anchored (clinical + billing); module choice determines whether INVOICING is master or
      embedded_master of pet_owners. Rule #17 + Rule #14 require a system skill + capability mapping per module,
      so split granularity changes the Phase-S work substantially.

  - id: B2-CATALOG-COPY
    summary: Approve buyer-voice catalog_tagline + catalog_description for VET-PRACT-MGMT.
    question: |
      Rule #20 requires user-approved buyer-voice copy for the domain's catalog_tagline (one sentence) and
      catalog_description (1-3 paragraphs). Agent will draft on request; please confirm the trigger.
    options:
      - draft-and-surface (agent drafts, user approves wording)
      - user-supplies-text (user provides exact wording)
      - defer-until-modules (write per-module M8 copy first, then derive the domain-grain summary)
    why: |
      Once a non-empty value lands, Rule #20 forbids overwrite without per-row approval; marketing voice ages on
      a different cycle than the analyst catalog.

  - id: B2-PET-OWNER-PERSONAL-CONTENT
    summary: PATCH data_objects.has_personal_content=true on pet_owners (id 396)?
    question: |
      pet_owners carries PII (name, address, payment instrument, ZIP, optional SSN-derived credit data); state
      consumer-privacy laws (CCPA, etc.) apply to veterinary clinics even though HIPAA does not. Should
      has_personal_content be set true?
    options:
      - "yes"
      - "no"
      - defer-to-Phase-0
    why: |
      Pattern flag drives downstream RBAC + retention scaffolding; positive re-eval is required per Rule #12 and
      should not be left at false-by-default without an explicit user decision.

  - id: B2-CONTROLLED-SUBSTANCE-SUBMIT-LOCK
    summary: PATCH data_objects.has_submit_lock=true on controlled_substance_ledger_entries (id 399)?
    question: |
      DEA 21 CFR 1304 makes the controlled-substance ledger append-only by federal law; corrections require a
      strikethrough + initialed entry, not edit-in-place. Should has_submit_lock be set true?
    options:
      - "yes"
      - "no"
      - defer-to-Phase-0
    why: |
      Submit-lock flag drives the platform's post-submit edit guard; mis-set on a DEA ledger is a regulatory
      hazard.

  - id: B2-CONFIG-SHAPE-CHECK
    summary: Confirm none of the 5 current masters qualifies for the Rule #12 config-shape exemption.
    question: |
      Each of animal_patients, pet_owners, veterinary_vaccinations, veterinary_lab_results, and controlled_
      substance_ledger_entries carries an observable workflow (drafted in B12). Confirm all 5 get lifecycle
      states loaded, none exempt?
    options:
      - confirm-all-5-get-states
      - exempt-one-or-more-and-name-which
    why: |
      Rule #12 exemption is config-shape (author-once / occasionally-edit, no workflow); none of these qualify.
      Explicit confirmation closes the audit cleanly.

  - id: B2-CAPABILITY-FUNCTION-OVERRIDES
    summary: Load 3 business_function_capabilities overrides where the capability's owner diverges from the domain's owner.
    question: |
      Plausible overrides: VET-INVOICING -> Accounts Receivable; VET-INVENTORY-RX -> Compliance Operations
      (DEA); VET-REMINDER-MGMT -> Customer Service. Domain owner is Business Operations. Add all three?
    options:
      - all-three
      - subset-name-which
      - none-keep-domain-RACI
    why: |
      Rule C2 only requires overrides where the capability diverges; over-loading clutters the catalog, under-
      loading hides the per-capability ownership.

  - id: B2-VACCINATION-ADMIN-PATTERN
    summary: integration_pattern, friction_level, and GRC-inclusion for the 2 proposed handoffs on trigger_event 1088.
    question: |
      For trigger_event 1088 (veterinary_vaccination.administered), pattern + friction for the CSM next-dose
      reminder row and the GRC rabies-tag reporting row. Should GRC be included given state law variance?
    options:
      - CSM-api-call-low + GRC-batch_sync-medium
      - CSM-api-call-low-only-defer-GRC
      - CSM-api-call-low + GRC-event_stream-low
    why: |
      No deterministic default; pattern shape depends on whether GRC reporting is real-time or end-of-day.

  - id: B2-CLIENT-ALIAS-POSTURE
    summary: Rule #9 arbitration on the "Client" alias for pet_owners.
    question: |
      "Client" is a high-collision bare word (CSM customer_contacts, CRM customers, etc.). For pet_owners alias,
      pick: industry-synonym only (`alias_name='Client'`, scoped to vet vendors), domain-prefixed (`alias_name=
      'vet client'`), or canonical-claim (none — pet_owners stays prefixed, "Client" is the alias).
    options:
      - alias-only-Client
      - alias-only-vet-client
      - canonical-claim-defer
    why: |
      Universal PIMS UI label across IDEXX, ezyVet, AVImark; not flipping the alias means search/triggering will
      miss the term entirely.

  - id: B2-ERP-FIN-APQC
    summary: Classify or defer the only untagged outbound handoff (946 -> ERP-FIN).
    question: |
      Best-available cross-industry PCF candidate is 736 "Collect and maintain account information" (L4). The
      trigger (pet_owner.registered) is registration, not AR collection, so the match is partial. Tag with 736,
      or defer to Discover Pass 3 custom-process authoring?
    options:
      - tag-with-process-736
      - tag-with-process-303-AR-parent
      - defer-to-discover
    why: |
      H1 coverage on the domain is otherwise 5 of 6; clean closure or explicit deferral keeps the audit honest.

