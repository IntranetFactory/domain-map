schema_version: 2
domain: ACCT-PRACT-MGMT
status: feedback_needed
next_action_by: agent
last_audit: "2026-05-31"

# 2 b1a items are deterministic INSERTs the agent can apply on the next pass without
# user input. 12 b1b items are blocked on Bucket 2 user decisions, on M1 module
# authoring inside ACCT-PRACT-MGMT, or on neighbor-domain modularization
# (GRC, AP-AUTO). 7 b2 items need explicit user judgment. 6 b3 candidate groups
# remain Phase 0 / speculative.

b1a:
  - id: B1A-B6-INTRA-EDGE
    summary: "Insert the intra-domain edge client_engagements scopes tax_returns (cardinality 1:N, optional, source master client_engagements id=401)."
    finding: "Zero intra-domain data_object_relationships among ACCT-PRACT-MGMT masters. The two masters are tax_returns (id=400) and client_engagements (id=401). The workflow tie is that a single client engagement scopes one or more multi-year or extension tax returns; without the edge the relationship graph for the domain is incomplete."
    action: "POST /data_object_relationships with data_object_id=401, related_data_object_id=400, relationship_verb='scopes', inverse_verb='is scoped by', relationship_type='one_to_many', relationship_kind='reference', is_required=false. Omit record_status (default 'new') per Rule #1."
    affected_entities: ["tax_returns", "client_engagements"]
    affected_masters:
      - {data_object_id: 400, name: "tax_returns", target_module_id: null, workflow: "tax-return preparation and filing"}
      - {data_object_id: 401, name: "client_engagements", target_module_id: null, workflow: "engagement lifecycle"}

  - id: B1A-B9-MISSING-EVENTS
    summary: "Insert 5 missing trigger_events: tax_return.accepted_by_irs, tax_return.rejected_by_irs, tax_return.amended (on data_object 400) and client_engagement.completed, client_engagement.terminated (on data_object 401)."
    finding: "Only 2 trigger_events exist for ACCT-PRACT-MGMT masters (id=331 tax_return.filed, id=332 client_engagement.commenced). Audit identifies 5 likely-missing lifecycle events the practice workflow needs published before downstream consumers (GRC compliance reporting, client portal notification, AP-AUTO invoice cycle) can subscribe. Without these events the lifecycle states authored under B1-S8 will have no matching event rows."
    action: "POST /trigger_events with 5 rows: (data_object_id=400, event_name='tax_return.accepted_by_irs', event_category='lifecycle'), (data_object_id=400, event_name='tax_return.rejected_by_irs', event_category='lifecycle'), (data_object_id=400, event_name='tax_return.amended', event_category='state_change'), (data_object_id=401, event_name='client_engagement.completed', event_category='lifecycle'), (data_object_id=401, event_name='client_engagement.terminated', event_category='lifecycle'). Omit record_status."
    affected_events:
      - {id: null, event_name: "tax_return.accepted_by_irs", current_category: null, proposed_category: "lifecycle"}
      - {id: null, event_name: "tax_return.rejected_by_irs", current_category: null, proposed_category: "lifecycle"}
      - {id: null, event_name: "tax_return.amended", current_category: null, proposed_category: "state_change"}
      - {id: null, event_name: "client_engagement.completed", current_category: null, proposed_category: "lifecycle"}
      - {id: null, event_name: "client_engagement.terminated", current_category: null, proposed_category: "lifecycle"}
    affected_masters:
      - {data_object_id: 400, name: "tax_returns", target_module_id: null, workflow: "tax-return preparation and filing"}
      - {data_object_id: 401, name: "client_engagements", target_module_id: null, workflow: "engagement lifecycle"}

b1b:
  - id: B1B-M1-MODULES
    summary: "ACCT-PRACT-MGMT has zero domain_modules rows. Rule #14 floor with 6 capabilities = at least 2 full modules required. Blocks every downstream module-scoped fix."
    finding: "domain_id=152 has zero rows in domain_modules. Rule #14 requires every domain to have at least 1 module_kind='full' row, and domains with 3 or more capabilities (this domain has 6: ACCT-WORKFLOW, ACCT-CLIENT-PORTAL, ACCT-TIME-BILLING, ACCT-ENGAGEMENT-LTR, ACCT-DEADLINE-MGMT, ACCT-DOC-MGMT) require at least 2 full modules. This is the dominant structural gate."
    blocked_by:
      - {type: user_decision, ref: B2-MODULE-SHAPE, reason: "Bucket 2.1: 4-vs-5-vs-6-vs-7 module split is a user pick (separate TAX-RETURNS module yes/no, separate DEADLINE-MGMT module yes/no, ACCT-INTAKE-CONFLICT module yes/no)."}
    affected_entities: ["domain_modules"]

  - id: B1B-A4-CATALOG-UX
    summary: "catalog_tagline and catalog_description are empty on domains.id=152; Rule #20 requires explicit per-row user-approved wording."
    finding: "domains.catalog_tagline='' and domains.catalog_description='' on row id=152. Rule #20 forbids the agent from auto-drafting either column; user authors or approves a buyer-voice tagline plus 1-3 paragraph description."
    blocked_by:
      - {type: user_decision, ref: B2-CATALOG-WORDING, reason: "Rule #20 requires explicit per-row user approval of catalog UX wording."}
    affected_entities: ["domains"]

  - id: B1B-B4-PATTERN-FLAGS
    summary: "tax_returns (id=400) and client_engagements (id=401) pattern flags all false; review candidates has_personal_content, has_submit_lock, has_single_approver."
    finding: "data_objects.id=400 (tax_returns) carries no pattern flags despite holding human PII (taxpayer SSN, dependents' SSNs, income, account numbers, IRS audit-trail metadata; has_personal_content=true is a strong candidate), being effectively immutable once filed and accepted (has_submit_lock=true plausible on the filed state), and requiring partner sign-off before filing (has_single_approver=true near-universal). data_objects.id=401 (client_engagements) likely warrants has_single_approver=true for partner-led engagement acceptance. Rule #12 ties the flag review to the lifecycle pass."
    blocked_by:
      - {type: user_decision, ref: B2-PATTERN-FLAGS, reason: "Per Rule #12 the pattern-flag review needs user confirmation; auto-populating flags or the rationale via notes is forbidden under Rule #15."}
    affected_masters:
      - {data_object_id: 400, name: "tax_returns", target_module_id: null, workflow: "tax-return preparation and filing"}
      - {data_object_id: 401, name: "client_engagements", target_module_id: null, workflow: "engagement lifecycle"}

  - id: B1B-B9-EVENT332-FANOUT
    summary: "trigger_events.id=332 (client_engagement.commenced) has zero handoff fan-out. Likely intra-domain consumers (workflow instantiation, portal provisioning) need modules to exist first."
    finding: "trigger_events.id=332 (client_engagement.commenced on data_object 401) has zero matching handoffs rows. The commenced transition almost always has at least one workflow or portal subscriber (ACCT-WORKFLOW module instantiating tasks, ACCT-CLIENT-PORTAL module provisioning the client folder). Without modules, intra-domain handoff authoring has no source_domain_module_id target."
    blocked_by:
      - {type: depends_on, ref: B1B-M1-MODULES, reason: "intra-domain handoff source_domain_module_id requires authored modules."}
    affected_events:
      - {id: 332, event_name: "client_engagement.commenced", current_category: "lifecycle", proposed_category: "lifecycle"}

  - id: B1B-B11-ALIASES
    summary: "Zero data_object_aliases on tax_returns (id=400) and client_engagements (id=401). Candidate alias rows need per-row alias_type choice."
    finding: "Zero rows in data_object_aliases for data_object_id in (400, 401). Audit candidates: tax_returns alias 1040 / 1120 / 1065 / 1041 / 990 (form-code aliases used by CPA software), client_engagements alias 'Engagement' (Karbon / Canopy / TaxDome universal industry term), 'Job' (Jetpack Workflow), 'Matter' (legal-adjacent terminology, especially for tax-controversy work), 'Project' (some PM-flavored suites). Each row needs alias_type from the platform enum and may need solution_id scoping (vendor-shape rows)."
    blocked_by:
      - {type: user_decision, ref: B2-ALIAS-SHAPE, reason: "Bucket 2.7: per-row alias_type vocabulary plus vendor-shape solution_id scoping is a judgment call."}
    affected_masters:
      - {data_object_id: 400, name: "tax_returns", target_module_id: null, workflow: "tax-return preparation and filing"}
      - {data_object_id: 401, name: "client_engagements", target_module_id: null, workflow: "engagement lifecycle"}

  - id: B1B-B12-LIFECYCLE-STATES
    summary: "Zero data_object_lifecycle_states for tax_returns (id=400) and client_engagements (id=401); both have observable state machines."
    finding: "Per Rule #12 every master+required data_object must have data_object_lifecycle_states rows describing its state machine. tax_returns proposed states: draft, in_preparation, in_review, awaiting_client_signature, signed, filed, accepted_by_irs, rejected_by_irs, amended, archived. client_engagements proposed states: prospective, engagement_letter_pending, engagement_letter_signed, retainer_received, active, on_hold, completed, terminated, archived. data_object_lifecycle_states.domain_module_id is nullable for always-reachable states but realizing-module assignment depends on M1 being cured."
    blocked_by:
      - {type: depends_on, ref: B1B-M1-MODULES, reason: "Realizing-module assignment for workflow-gate states requires authored modules."}
      - {type: user_decision, ref: B2-PATTERN-FLAGS, reason: "Per Rule #12 the lifecycle pass and the pattern-flag review are one motion."}
    affected_masters:
      - {data_object_id: 400, name: "tax_returns", target_module_id: null, workflow: "tax-return preparation and filing"}
      - {data_object_id: 401, name: "client_engagements", target_module_id: null, workflow: "engagement lifecycle"}

  - id: B1B-F1-F3-F7-SKILL
    summary: "Legacy acct-pract-mgmt-system skill id=25 (domain_module_id=null) and its 4-tool surface (2 query, send_email, sign_document) need retire-and-split once modules exist."
    finding: "skills.id=25 (skill_name='acct-pract-mgmt-system', skill_type='system', domain_module_id=null) is a legacy transitional row. Per Rule #17 every domain_modules row needs exactly one system skill with domain_module_id set; the legacy row violates that contract once modules ship. skill_tools for skill_id=25 are 4 rows (id=287 query_tax_returns, id=288 query_client_engagements, id=37 send_email, id=42 sign_document). Missing mutate (no transition_tax_return_to_filed, no create_client_engagement), fetch (no IRS-acceptance polling, no QuickBooks / Xero / GL pull), and inbound (no IRS-acceptance webhook, no e-sign callback). F7 channel-vs-capability: send_email should become notify_person for generic notifications unless workflow specifically requires email."
    blocked_by:
      - {type: depends_on, ref: B1B-M1-MODULES, reason: "Per-module skills + skill_tools redistribution requires authored modules."}
    affected_entities: ["skills", "skill_tools", "tools"]

  - id: B1B-B10B-SOURCE-MODULES
    summary: "All 3 outbound handoffs (338, 339, 340) still carry source_domain_module_id=NULL; depends on M1."
    finding: "handoffs.id=338 (tax_return.filed -> GRC), id=339 (engagement_letter.signed -> CLM), id=340 (tax_return.filed -> AP-AUTO) all have source_domain_module_id=NULL. Backfill once modules exist: 338 and 340 from ACCT-TAX-RETURNS (or ACCT-WORKFLOW if option (b) of B2-MODULE-SHAPE is picked), 339 from ACCT-ENGAGEMENT-LTR-MGMT."
    blocked_by:
      - {type: depends_on, ref: B1B-M1-MODULES, reason: "Source-module FK requires authored modules."}
    affected_handoffs:
      - {handoff_id: 338, direction: outbound, source_domain: "ACCT-PRACT-MGMT", target_domain: "GRC", trigger_event: "tax_return.filed", payload: "tax_returns", null_field: "source_domain_module_id"}
      - {handoff_id: 339, direction: outbound, source_domain: "ACCT-PRACT-MGMT", target_domain: "CLM", trigger_event: "engagement_letter.signed", payload: "engagement_letters", null_field: "source_domain_module_id"}
      - {handoff_id: 340, direction: outbound, source_domain: "ACCT-PRACT-MGMT", target_domain: "AP-AUTO", trigger_event: "tax_return.filed", payload: "supplier_invoices", null_field: "source_domain_module_id"}

  - id: B1B-B10B-TARGET-GRC-APAUTO
    summary: "handoffs.id=338 (-> GRC) and id=340 (-> AP-AUTO) still carry target_domain_module_id=NULL; both targets are 0-module domains."
    finding: "Handoff 338 to GRC (domain_id=15) and handoff 340 to AP-AUTO (domain_id=29) have target_domain_module_id=NULL. Spot-checks show GRC and AP-AUTO both have zero domain_modules; target-side backfill waits on each neighbor being modularized. Handoff 339 to CLM is already target-side backfilled to 127 (CLM-REPOSITORY) per the 2026-05-31 continuation."
    blocked_by:
      - {type: domain_audit, blocking_domain: GRC, milestone: "M1 modules"}
      - {type: domain_audit, blocking_domain: AP-AUTO, milestone: "M1 modules"}
    affected_handoffs:
      - {handoff_id: 338, direction: outbound, source_domain: "ACCT-PRACT-MGMT", target_domain: "GRC", trigger_event: "tax_return.filed", payload: "tax_returns", null_field: "target_domain_module_id"}
      - {handoff_id: 340, direction: outbound, source_domain: "ACCT-PRACT-MGMT", target_domain: "AP-AUTO", trigger_event: "tax_return.filed", payload: "supplier_invoices", null_field: "target_domain_module_id"}

  - id: B1B-B8-CLM-MIRROR
    summary: "Missing intra-cluster mirrors engagement_letters scopes_into client_engagements and client_engagements references_letter engagement_letters."
    finding: "Handoff 339 (engagement_letter.signed -> CLM) lacks supporting data_object_relationships rows linking engagement_letters (id=394, LEGAL-PRACT-MGMT-mastered) to client_engagements (id=401, ACCT-PRACT-MGMT-mastered). The mirror edge is load-bearing for the workflow graph. Source master ownership depends on whether engagement_letters splits, stays consolidated, or is renamed (B2-LETTERS-OWNERSHIP)."
    blocked_by:
      - {type: user_decision, ref: B2-LETTERS-OWNERSHIP, reason: "Master ownership choice changes which domain authors the relationship edge."}
    affected_entities: ["data_object_relationships", "engagement_letters", "client_engagements"]
    affected_handoffs:
      - {handoff_id: 339, direction: outbound, source_domain: "ACCT-PRACT-MGMT", target_domain: "CLM", trigger_event: "engagement_letter.signed", payload: "engagement_letters", null_field: null}

  - id: B1B-B8-GRC-MIRROR
    summary: "Missing tax_returns reports_to <grc-tax-compliance-obligation> mirror; GRC has no obligation master yet."
    finding: "Handoff 338 (tax_return.filed -> GRC) lacks a target-side data_object_relationships mirror because GRC has no compliance_obligations or regulatory_filings master loaded. Authoring the mirror waits on GRC adding a compliance-reporting master under a future GRC module."
    blocked_by:
      - {type: domain_audit, blocking_domain: GRC, milestone: "M1 + master compliance_obligations (or equivalent)"}
    affected_entities: ["data_object_relationships", "tax_returns"]
    affected_handoffs:
      - {handoff_id: 338, direction: outbound, source_domain: "ACCT-PRACT-MGMT", target_domain: "GRC", trigger_event: "tax_return.filed", payload: "tax_returns", null_field: null}

  - id: B1B-APQC-WRONG-FIT
    summary: "handoff_processes.id=206 (handoff 339 -> process 300 'Evaluate and manage financial performance', agent_curated, record_status='new') is wrong-fit and duplicates the corrected id=466 (-> process 807 'Manage contracts')."
    finding: "Wrong-fit APQC row id=206 still present alongside corrected row id=466 inserted on 2026-05-31. The two rows duplicate coverage on handoff 339 with conflicting PCF clusters. Also: 0 of 6 handoff_processes rows on ACCT-PRACT-MGMT outbound handoffs are record_status='approved' (catalog-quality headline)."
    blocked_by:
      - {type: user_decision, ref: B2-WRONG-FIT-APQC, reason: "DELETE id=206, PATCH id=206 to process 807 plus DELETE id=466, or leave both with id=206 record_status='rejected' is a user call."}
    affected_handoffs:
      - {handoff_id: 339, direction: outbound, source_domain: "ACCT-PRACT-MGMT", target_domain: "CLM", trigger_event: "engagement_letter.signed", payload: "engagement_letters", null_field: null}

b2:
  - id: B2-MODULE-SHAPE
    summary: "Pick the ACCT-PRACT-MGMT module split. Gates M1, B-band module FKs, F-band, E-band."
    question: "Which module split for ACCT-PRACT-MGMT?"
    options:
      - "(a) 5-module split: ACCT-ENGAGEMENT-LTR-MGMT + ACCT-WORKFLOW + ACCT-TAX-RETURNS + ACCT-CLIENT-PORTAL + ACCT-TIME-BILLING"
      - "(b) 4-module split: merge TAX-RETURNS into WORKFLOW (tax-prep workflow + return state are tightly coupled in flagship suites)"
      - "(c) 6-module split: 5-module + dedicated ACCT-DEADLINE-MGMT for the tax-calendar engine"
      - "(d) 7-module split: 6-module + ACCT-INTAKE-CONFLICT for client-acceptance + AICPA-CODE independence checks + KYC"
    why: "M1 (B1B-M1-MODULES) blocks every downstream module-scoped fix; module-shape choice anchors B1B-B10B-SOURCE-MODULES, B1B-B12-LIFECYCLE-STATES realizing modules, B1B-F1-F3-F7-SKILL, and the E-band RBAC scaffold."

  - id: B2-CATALOG-WORDING
    summary: "Author or approve catalog_tagline and catalog_description for domains.id=152 (Rule #20)."
    question: "Provide buyer-voice catalog_tagline (one line) and catalog_description (1-3 paragraphs) for ACCT-PRACT-MGMT, or approve agent draft."
    options:
      - "User authors both"
      - "Agent proposes drafts, user approves or edits each"
      - "Defer (leave empty)"
    why: "Rule #20 forbids agent auto-write of either column."

  - id: B2-PATTERN-FLAGS
    summary: "tax_returns (id=400) and client_engagements (id=401) pattern flags (has_personal_content, has_submit_lock, has_single_approver)."
    question: "Which pattern flags to PATCH to true on tax_returns (id=400) and client_engagements (id=401)?"
    options:
      - "tax_returns: has_personal_content=true (SSN + dependents + income), has_submit_lock=true (post-filing immutability), has_single_approver=true (partner sign-off)"
      - "tax_returns: subset of above (specify which)"
      - "client_engagements: has_single_approver=true (partner-led acceptance)"
      - "Leave both untouched"
    why: "Per Rule #12 the flag review is part of the lifecycle pass; agent does not auto-populate, and Rule #15 forbids any flag-rationale note text."

  - id: B2-HANDOFF-340-PAYLOAD
    summary: "Handoff 340 fires on tax_return.filed (event on tax_returns id=400) but carries supplier_invoices (id=75) as payload. Mis-modeled."
    question: "Keep, rewire, retarget, or delete handoff 340?"
    options:
      - "(a) Keep + reframe semantics: AP-side payable creation for IRS tax-filing fee or e-file vendor"
      - "(b) Rewire to a different trigger event such as a future tax_invoice.issued on acct_invoices (Bucket 3 entity)"
      - "(c) Retarget from AP-AUTO to ERP-FIN if the intent is AR profile creation"
      - "(d) DELETE handoff 340 (mis-model, no legitimate consumer)"
    why: "Mis-modeled handoff payload; choice gates the right PCF cluster for B1A-APQC-WRONG-FIT row 340 (currently process 315 'Process accounts payable (AP)')."
    extra_dependent_findings: ["B1B-APQC-WRONG-FIT", "B1B-B10B-SOURCE-MODULES handoff 340 source-side", "B1B-B10B-TARGET-GRC-APAUTO handoff 340 target-side"]

  - id: B2-LETTERS-OWNERSHIP
    summary: "engagement_letters (id=394) currently mastered by LEGAL-PRACT-MGMT (id=150). CPA engagement letters and law-firm engagement letters have different statutory anchors."
    question: "Keep consolidated, split into ACCT-mastered + LEGAL-mastered, or rename to professional_engagement_letters with both domains contributing?"
    options:
      - "(a) Leave consolidated (current shape; one master, both domains contribute / consume)"
      - "(b) Split into acct_engagement_letters (ACCT-mastered) + legal_engagement_letters (LEGAL-mastered, kept on id=394 renamed)"
      - "(c) Rename current master to professional_engagement_letters with both domains contributing under sub-types"
    why: "AICPA SSARS (CPA-side) vs ABA Model Rules (law-side) have different retention rules and obligation structures; consolidated master may over-collapse the contract."
    extra_dependent_findings: ["B1B-B8-CLM-MIRROR"]

  - id: B2-WRONG-FIT-APQC
    summary: "handoff_processes.id=206 (handoff 339 -> process 300, agent_curated) is wrong-fit; corrected id=466 (-> process 807 'Manage contracts') was added 2026-05-31."
    question: "How to resolve the duplicate / wrong-fit row?"
    options:
      - "(a) DELETE id=206 (drop the wrong row entirely; id=466 becomes the canonical tag)"
      - "(b) PATCH id=206 process_id from 300 to 807, then DELETE id=466 (collapses the duplicate onto the original row)"
      - "(c) PATCH id=206 record_status to 'rejected' and leave both rows"
    why: "Catalog-quality headline depends on cleaning up the wrong-fit row; 0 of 6 handoff_processes are 'approved' but the duplicate-coverage on handoff 339 also distorts process-health reporting."

  - id: B2-SUPPLIER-INV-CONTRIBUTOR
    summary: "supplier_invoices (id=75, S2P-mastered) contributor row on ACCT-PRACT-MGMT scope unclear."
    question: "What is the contributor role's intended scope?"
    options:
      - "(a) Firm's own AP (firm pays its vendors; keep row, conditional inbound from S2P)"
      - "(b) Client-side supplier invoices the firm processes as bookkeeper (move to a future bookkeeping-services module)"
      - "(c) Erroneous - DELETE the contributor row"
    why: "Drives whether ACCT-PRACT-MGMT expects an inbound handoff from S2P at all, and where supplier_invoices lands when modules are authored."

b3:
  - id: B3-ENGAGEMENT-PROPOSALS
    candidate: "acct_engagement_proposals, acct_engagement_acceptance_checks, acct_e_signature_envelopes"
    rationale: "Karbon proposals, Ignition proposals + KYC, TaxDome built-in e-sign, Canopy e-sign. Distinguish proposal (pre-signing) from engagement letter (signed artifact). Independence checks (AICPA-CODE) and KYC (AML for tax-controversy work) plausibly warrant a standalone master. e-signature envelopes likely shared across ENGAGEMENT-LTR-MGMT + CLIENT-PORTAL."
    vendor_evidence: ["Karbon", "Ignition", "TaxDome", "Canopy"]
    proposed_module: "ACCT-ENGAGEMENT-LTR-MGMT (and ACCT-INTAKE-CONFLICT if B2-MODULE-SHAPE option (d) is picked)"

  - id: B3-WORKFLOW-TEMPLATES
    candidate: "acct_workflow_templates, acct_workflow_tasks, acct_capacity_forecasts, acct_tax_calendar_deadlines"
    rationale: "Karbon templates and tasks, Jetpack Workflow recurring rules, Canopy task templates, CCH Axcess Practice tax-calendar engine. Templates vs instantiated tasks as distinct masters; capacity forecasts derived from staff allocation plus deadline calendar."
    vendor_evidence: ["Karbon", "Jetpack Workflow", "Canopy", "CCH Axcess Practice"]
    proposed_module: "ACCT-WORKFLOW (and ACCT-DEADLINE-MGMT if B2-MODULE-SHAPE option (c) or (d) is picked)"

  - id: B3-CLIENT-PORTAL
    candidate: "acct_client_documents, acct_client_messages"
    rationale: "TaxDome client portal vault, Liscio secure messaging, Canopy file shares. Document retention per IRS Pub 4557 (3-7 years post-filing) plus GLBA confidentiality. Secure messaging as distinct master from generic chat (load-bearing for audit trail)."
    vendor_evidence: ["TaxDome", "Liscio", "Canopy"]
    proposed_module: "ACCT-CLIENT-PORTAL"

  - id: B3-BILLING
    candidate: "acct_invoices, acct_payment_transactions, acct_retainer_balances"
    rationale: "Aiwyn invoicing, TaxDome integrated POS (Stripe / ACH), Ignition payment automation, Canopy billing. Retainer balances are a CPA-specific construct similar to but distinct from law-firm IOLTA trust accounting; some states require segregation."
    vendor_evidence: ["Aiwyn", "TaxDome", "Ignition", "Canopy"]
    proposed_module: "ACCT-TIME-BILLING"

  - id: B3-INTAKE-CONFLICT-MODULE
    candidate: "acct_engagement_acceptance_checks as a standalone module"
    rationale: "Karbon client acceptance, Ignition KYC. Decision: standalone ACCT-INTAKE-CONFLICT module (mirroring LEGAL-INTAKE-CONFLICT) or feature inside ACCT-ENGAGEMENT-LTR-MGMT?"
    vendor_evidence: ["Karbon", "Ignition"]
    proposed_module: "ACCT-INTAKE-CONFLICT (option (d) of B2-MODULE-SHAPE)"

  - id: B3-TAX-RESEARCH
    candidate: "acct_tax_research_queries, acct_tax_authority_correspondence"
    rationale: "Thomson Reuters Checkpoint, Bloomberg Tax research integrations, IRS-correspondence tracking. Decision: load-bearing for the practice-management buyer or scoped to the tax-prep software (UltraTax, CCH Axcess Tax)?"
    vendor_evidence: ["Thomson Reuters Checkpoint", "Bloomberg Tax"]
    proposed_module: "deferred pending Phase 0 vendor evidence on whether these belong to practice mgmt vs tax-prep tooling"
