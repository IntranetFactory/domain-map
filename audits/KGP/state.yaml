b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."

b1b:
  - id: B1B-B12-LIFECYCLE
    summary: "Zero data_object_lifecycle_states on the 2 masters (Rule #12 / B12 fail); modules now exist to pin requires_permission states, gated on config-shape exemption decision."
    finding: >-
      No data_object_lifecycle_states rows reference 742 or 743. Both masters have real
      workflow: kgp_ontologies passes drafting (initial) -> validating -> published
      (requires_permission) -> superseded -> retired (terminal); kgp_knowledge_graph_entities
      passes asserted (initial) -> validated -> reasoned -> merged (requires_permission,
      override merge_kg_entity) -> retired (terminal). Modules now exist to anchor each
      requires_permission=true state (742 states pin to 270, 743 states pin to 271 per M5);
      remaining gate is the config-shape exemption decision. Expected ~10 lifecycle states
      + ~2 workflow-gate permissions.
    blocked_by:
      - {type: user_decision, ref: B2-S6}
    affected_masters:
      - {data_object_id: 742, name: kgp_ontologies, target_module_id: 270, workflow: "drafting->validating->published->superseded->retired"}
      - {data_object_id: 743, name: kgp_knowledge_graph_entities, target_module_id: 271, workflow: "asserted->validated->reasoned->merged->retired"}

  - id: B1B-B8-OUTBOUND-EDGES
    summary: "Mirror data_object_relationships edges from KGP payload masters to the receiving masters in DATA-AI-PLAT and DCG; target-side masters not yet stable."
    finding: >-
      Handoffs 697 (KGP->DATA-AI-PLAT, payload kgp_ontologies 742), 698 + 699 (KGP->DCG,
      payload kgp_knowledge_graph_entities 743) lack mirror data_object_relationships to the
      receiving masters. Proposed: 742 feeds DATA-AI-PLAT semantic_models; 743
      reconciles_with / lineage_to DCG data_assets (256). The DATA-AI-PLAT-side target master
      is a semantic_models candidate but DATA-AI-PLAT is itself pre-modular so the FK is not
      stable; DCG-side data_assets exists (256) but DCG is also pre-modular.
    blocked_by:
      - {type: domain_audit, blocking_domain: DATA-AI-PLAT, milestone: post-M1-master-resolution}
      - {type: domain_audit, blocking_domain: DCG, milestone: post-M1-master-resolution}
    affected_handoffs:
      - {handoff_id: 697, direction: outbound, source_domain: KGP, target_domain: DATA-AI-PLAT, trigger_event: kgp_ontology.imported, payload: kgp_ontologies, null_field: mirror_data_object_relationship}
      - {handoff_id: 698, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.merged, payload: kgp_knowledge_graph_entities, null_field: mirror_data_object_relationship}
      - {handoff_id: 699, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.created, payload: kgp_knowledge_graph_entities, null_field: mirror_data_object_relationship}

  - id: B1B-B10B-CROSS-SIDE
    summary: "Cross-side module FK on KGP handoffs owed by neighbor audits (DCG / DATA-AI-PLAT / MDM still pre-modular)."
    finding: >-
      The non-KGP side of every KGP-touching handoff carries NULL module FK because the
      neighbor domains are themselves pre-modular: target_domain_module_id on outbound
      697 (DATA-AI-PLAT) and 698/699 (DCG); source_domain_module_id on inbound
      222 (MDM), 265 (DCG). (221 already carried target_domain_module_id=224 from a prior
      pass; 223 KGP-side target_domain_module_id was backfilled to 270 under B1A-B10B-HANDOFF-FK.)
      The KGP side is handled under the (now resolved) B1A-B10B-HANDOFF-FK; this row tracks
      the cross-side owed by neighbors.
    blocked_by:
      - {type: domain_audit, blocking_domain: DATA-AI-PLAT, milestone: M1}
      - {type: domain_audit, blocking_domain: DCG, milestone: M1}
      - {type: domain_audit, blocking_domain: MDM, milestone: M1}
    affected_handoffs:
      - {handoff_id: 697, direction: outbound, source_domain: KGP, target_domain: DATA-AI-PLAT, trigger_event: kgp_ontology.imported, payload: kgp_ontologies, null_field: target_domain_module_id}
      - {handoff_id: 698, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.merged, payload: kgp_knowledge_graph_entities, null_field: target_domain_module_id}
      - {handoff_id: 699, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.created, payload: kgp_knowledge_graph_entities, null_field: target_domain_module_id}
      - {handoff_id: 222, direction: inbound, source_domain: MDM, target_domain: KGP, trigger_event: kg_entity.linked, payload: knowledge_graph_entities, null_field: source_domain_module_id}
      - {handoff_id: 265, direction: inbound, source_domain: DCG, target_domain: KGP, trigger_event: glossary_term.published, payload: glossary_terms, null_field: source_domain_module_id}

  - id: B1B-APQC-H222-H697-H698-H699
    summary: "Tag 4 remaining KGP-touching handoffs with APQC PCF processes once a confirmed PCF is identified."
    finding: >-
      Of 7 KGP handoffs, h.221 + h.223 + h.265 are tagged (all -> process 275, agent_curated/new;
      h.221 resolved under B1A-APQC-H221). The other 4 (222 MDM->KGP kg_entity.linked
      payload knowledge_graph_entities; 697 kgp_ontology.imported; 698 kgp_knowledge_graph_entity.merged;
      699 kgp_knowledge_graph_entity.created) lack tags. The 2026-05-30 audit cited PCF
      external_ids 10563 / 10564 / 10571 / 10568; the 2026-05-31 fix pass found no live
      processes rows with those ids. Needs a focused re-discovery against live processes
      (source_framework=apqc_pcf_cross_industry, process_name ilike master data / information
      architecture) before insert.
    blocked_by:
      - {type: depends_on, ref: pcf_lookup_pass, reason: "audit-cited PCF external_ids 10563/10564/10571/10568 not present in catalog; need re-discovery against live processes"}
    affected_handoffs:
      - {handoff_id: 222, direction: inbound, source_domain: MDM, target_domain: KGP, trigger_event: kg_entity.linked, payload: knowledge_graph_entities, null_field: handoff_processes}
      - {handoff_id: 697, direction: outbound, source_domain: KGP, target_domain: DATA-AI-PLAT, trigger_event: kgp_ontology.imported, payload: kgp_ontologies, null_field: handoff_processes}
      - {handoff_id: 698, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.merged, payload: kgp_knowledge_graph_entities, null_field: handoff_processes}
      - {handoff_id: 699, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.created, payload: kgp_knowledge_graph_entities, null_field: handoff_processes}

  - id: B1B-APQC-H265-NOTE
    summary: "h.265 already tagged but record_status remains new; flag for reviewer approval bundle."
    finding: >-
      Handoff 265 (DCG glossary_term.published into KGP, payload glossary_terms 302) already
      has a handoff_processes row pointing at process 275 (agent_curated, record_status=new).
      The 2026-05-30 audit proposed PCF 10563 which the 2026-05-31 fix pass rejected as
      absent; the substitute 275 (Define and maintain business information architecture) is
      reasonable but unreviewed. H1 headline quality remains 0 approved.
    blocked_by:
      - {type: user_decision, ref: B2-APQC-APPROVAL}
    affected_handoffs:
      - {handoff_id: 265, direction: inbound, source_domain: DCG, target_domain: KGP, trigger_event: glossary_term.published, payload: glossary_terms, null_field: record_status}

b2:
  - id: B2-S5
    summary: "Approve catalog tagline + description wording. Module M8 copy (270 + 271) is now WRITTEN (review in-place per revised Rule #20); only domain-level A4 (138) remains open."
    question: >-
      Module-grain M8 buyer copy on 270 KGP-ONTOLOGY-ENGINE and 271 KGP-GRAPH-QUERY-APPS was
      authored straight into the empty catalog_tagline + catalog_description fields on
      2026-06-06 (revised Rule #20: the row record_status='new' carries the review signal;
      review in the catalog UI). Remaining open item: catalog_tagline + catalog_description on
      domain 138 (A4). Author the domain-level (market-grain) buyer copy, or skip.
    options:
      - "(a) Approve 2026-05-30 domain draft tagline ('Build the unified semantic substrate that powers your AI agents, operational apps, and complex analytical queries on top of your enterprise data.') for domain 138"
      - "(b) Rewrite domain 138 copy (supply exact text)"
      - "(c) Skip (leave domain 138 UX fields empty)"
      - "(review) Review the written module 270/271 copy in the catalog UI; request changes if the wording needs editing (overwrite is per-row user-approval-only)"
    why: "Domain-grain A4 wording is editorial. Module M8 already written per revised Rule #20."

  - id: B2-S6
    summary: "Lifecycle-state config-shape exemption test for the 2 masters."
    question: >-
      Audit asserts both kgp_ontologies (742) and kgp_knowledge_graph_entities (743) carry
      real workflows (not config-shape). Confirm modeling full lifecycles, or exempt either?
    options:
      - "(a) Model both with full lifecycles (~10 state rows + ~2 workflow-gate permissions)"
      - "(b) Exempt one (specify) and model the other"
      - "(c) Other"
    why: "Editorial/workflow-intent decision; the audit can describe the lifecycles but cannot decide whether the workflow is structural or merely conventional."

  - id: B2-S1
    summary: "Canonical ontology owner across KGP / DCG / DATA-AI-PLAT (legacy domain_data_objects double-master on data_object 254)."
    question: >-
      Data_object 254 'ontologies' has role='master' rows on BOTH DCG (88) and
      DATA-AI-PLAT (129) at the legacy domain_data_objects rollup, plus MDM (87) carries a
      contributor row. KGP separately masters kgp_ontologies (742, now in module 270) which
      duplicates the concept. Pick the canonical owner; the loser-side domain DELETEs its
      master row and 254 vs 742 merge in the owner's direction. NOTE: this pass did NOT touch
      254 / the legacy rollup; 742 is a distinct KGP-prefixed master and its single-master
      status is clean.
    options:
      - "(a) KGP-canonical: DELETE DCG + DATA-AI-PLAT master on 254, merge 254 into 742, others demote to consumer/embedded_master (point-solution-market test favors this: Stardog/TopBraid/Anzo are flagship ontology-master vendors)"
      - "(b) DCG-canonical: keep 254 in DCG, DELETE DATA-AI-PLAT master + 742, repoint, KGP demotes"
      - "(c) DATA-AI-PLAT-canonical: keep 254 in DATA-AI-PLAT, DELETE DCG master + 742, repoint, KGP demotes"
    why: "Editorial (which domain canonically masters ontologies) and architectural (whether ontology-as-data-product belongs in the data platform, the data catalog, or the dedicated graph platform)."

  - id: B2-S2
    summary: "Canonical KG-entity owner (DATA-AI-PLAT data_object 255 vs KGP 743 duplication)."
    question: >-
      Data_object 255 'knowledge_graph_entities' is master-claimed by DATA-AI-PLAT (129) with
      MDM (87) as consumer; 743 'kgp_knowledge_graph_entities' (now master in KGP module 271)
      duplicates it. By parallel logic to B2-S1, if KGP wins ontology canonicality it should
      also own 255 -> 743 consolidation.
    options:
      - "(a) Collapse 255 into 743 under KGP (parallel with B2-S1 (a))"
      - "(b) Keep 255 in DATA-AI-PLAT as canonical, retire 743"
    why: "Architectural; coupled to B2-S1 in most outcomes."

  - id: B2-S3
    summary: "Prefix vs bare-word naming for the canonical KGP masters (only triggers if B2-S1 picks the merge path)."
    question: >-
      If B2-S1 picks 'KGP-canonical, merge 254 into 742', should 742 be renamed from
      kgp_ontologies to the bare-word ontologies? Same for 743 vs knowledge_graph_entities.
      Rule #9 default is prefix; promotion to bare-word requires is_canonical_bare_word=true
      with naming_authority_rationale.
    options:
      - "(a) Keep prefix, leave 254 as canonical bare-word elsewhere (valid only under B2-S1 (b) or (c))"
      - "(b) Promote 742 to 'ontologies' (rename + DELETE old 254; valid only under B2-S1 (a))"
      - "(c) Rename 254 to dcg_ontologies / dataaiplat_ontologies per the B2-S1 loser, keep 742 canonical"
    why: "Determines whether downstream references point at 742/743 or 254/255."

  - id: B2-APQC-APPROVAL
    summary: "Batch-approve the agent_curated APQC handoff_processes rows (record_status flip is Rule #1-governed)."
    question: >-
      h.221, h.223 and h.265 carry agent_curated handoff_processes rows -> process 275 at
      record_status='new' (h.221 resolved under B1A-APQC-H221 this pass). Approve the batch
      (flip to approved) or request a different PCF anchor?
    options:
      - "(a) Approve the batch at process 275 (Define and maintain business information architecture)"
      - "(b) Re-anchor (specify PCF)"
    why: "record_status flip to approved is Rule #1-governed; reviewer owns the approval."
  - id: B2-B9D-OWN-1209
    summary: "Knowledge Graph Platform: name an owner for \"Maintain and evolve enterprise data and information architecture\" (no one is responsible for it today)"
    question: |
      Data and AI Platform forwards kgp ontology to Knowledge Graph Platform to maintain and evolve enterprise data and information architecture, but Knowledge Graph Platform does not yet have anyone assigned to maintain and evolve enterprise data and information architecture, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Knowledge Graph Platform owns, and assign a named owner once Knowledge Graph Platform sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Knowledge Graph Platform decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-KGP.md q9.
    extra_b9d_added: "2026-06-13"

b3:
  - id: B3-S1
    candidate: kgp_inference_rules
    rationale: >-
      Capability KG-REASONING-INFERENCE (353, in module 270) has no backing master. Stardog,
      GraphDB, AllegroGraph all expose a 1st-class 'rules' surface (SWRL, custom rule
      languages) distinct from the ontology itself; the rule corpus is authored, versioned,
      and executed separately. Could live in KGP-ONTOLOGY-ENGINE (270) or warrant its own
      sub-module. NOT created this pass (new-master authoring out of scope).
    vendor_evidence:
      - {vendor: Stardog, evidence: 1st_class}
      - {vendor: GraphDB, evidence: 1st_class}
      - {vendor: AllegroGraph, evidence: 1st_class}
    proposed_module: KGP-ONTOLOGY-ENGINE

  - id: B3-S2
    candidate: kgp_named_graphs
    rationale: >-
      Capabilities KG-NATIVE-STORAGE (357) + KG-SPARQL-FEDERATION (354) have no
      partition/access-control master. Named graphs are the unit of access control and data
      partitioning in every RDF triple-store flagship; without a named-graph entity the
      natural Phase E permission grain (per-graph RBAC) cannot be materialized. May be
      embedded_master in KGP-ONTOLOGY-ENGINE (270) or split across 270/271. NOT created this
      pass.
    vendor_evidence:
      - {vendor: Stardog, evidence: 1st_class}
      - {vendor: GraphDB, evidence: 1st_class}
      - {vendor: AllegroGraph, evidence: 1st_class}
    proposed_module: KGP-ONTOLOGY-ENGINE

  - id: B3-S3
    candidate: kgp_virtual_graph_mappings
    rationale: >-
      Capability KG-VIRTUAL-GRAPHS (355, in module 271) has no backing master. R2RML / RML
      mapping definitions that expose relational / document / API sources as native RDF are
      authored and versioned as first-class artifacts (Stardog Virtual Graphs, Ontop, Anzo
      data-on-demand). Lower-confidence than B3-S1/S2 (mapping-config shaped, not yet
      vendor-vetted this pass). NOT created this pass.
    vendor_evidence:
      - {vendor: Stardog, evidence: 1st_class}
      - {vendor: Anzo, evidence: secondary}
    proposed_module: KGP-GRAPH-QUERY-APPS
