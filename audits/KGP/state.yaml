    affected_entities: [kgp-system skill (id 76), query_ontologies tool (id 111), query_knowledge_graph_entities tool (id 386), query_kgp_ontologies tool (id 820), query_kgp_knowledge_graph_entities tool (id 821)]

  - id: B1B-APQC-H222-H697-H698-H699
    summary: Tag 4 remaining KGP-touching handoffs with APQC PCF processes once a confirmed PCF is identified.
    finding: "H1 partial. Of 7 KGP handoffs, only h.223 (DCG -> KGP, ontology.published) and h.265 (DCG -> KGP, glossary_term.published) are tagged (both pointing at process 275 'Define and maintain business information architecture', external_id 20770, agent_curated/new). The other 5 handoffs (221 outbound to DATA-AI-PLAT same trigger as h.223, see B1A-APQC-H221 for the easy half), 222 (MDM -> KGP, kg_entity.linked, payload knowledge_graph_entities), 697 (kgp_ontology.imported), 698 (kgp_knowledge_graph_entity.merged), 699 (kgp_knowledge_graph_entity.created) lack tags. The 2026-05-30 audit proposed PCF candidates 10563 / 10564 / 10571 family / 10568 family; the 2026-05-31 fix pass found no rows with those external_ids in the catalog. Resolution, a focused PCF lookup pass on processes filtered by source_framework=apqc_pcf_cross_industry and process_name ilike master data or related searches to identify the right L3 anchors before insert."
    blocked_by:
      - {type: depends_on, ref: pcf_lookup_pass, reason: "audit-cited PCF external_ids 10563/10564/10571/10568 not present in catalog; need re-discovery against live processes"}
    affected_handoffs:
      - {handoff_id: 222, direction: inbound, source_domain: MDM, target_domain: KGP, trigger_event: kg_entity.linked, payload: knowledge_graph_entities, null_field: handoff_processes}
      - {handoff_id: 697, direction: outbound, source_domain: KGP, target_domain: DATA-AI-PLAT, trigger_event: kgp_ontology.imported, payload: kgp_ontologies, null_field: handoff_processes}
      - {handoff_id: 698, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.merged, payload: kgp_knowledge_graph_entities, null_field: handoff_processes}
      - {handoff_id: 699, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.created, payload: kgp_knowledge_graph_entities, null_field: handoff_processes}

  - id: B1B-A4-CATALOG-TAGLINE
    summary: Author `catalog_tagline` and `catalog_description` on the KGP domain row.
    finding: A4 FAIL. `domains.catalog_tagline=''` and `domains.catalog_description=''` on domain 138. Rule #20 forbids writing these without explicit user approval of the wording. Audit-proposed tagline (2026-05-30): "Build the unified semantic substrate that powers your AI agents, operational apps, and complex analytical queries on top of your enterprise data." The proposal itself needs user approval before any PATCH; this is not an agent-solvable write.
    blocked_by:
      - {type: user_decision, ref: B2-S5-tagline-approval}

b2:
  - id: B2-S1
    summary: Canonical ontology owner across KGP / DCG / DATA-AI-PLAT (M7 catalog-wide hard fail on data_object 254).
    question: Data_object 254 `ontologies` has `role='master'` rows on BOTH DCG (88) and DATA-AI-PLAT (129) at the legacy `domain_data_objects` rollup, plus MDM (87) carries a `contributor` row. KGP separately introduced `kgp_ontologies` (742) which duplicates the same concept. Pick the canonical owner; the loser-side domain DELETEs its master row and the duplicate (254 vs 742) merges in whichever direction the owner picks.
    options:
      - "(a) KGP-canonical: DELETE DCG master + DATA-AI-PLAT master on 254, merge 254 into 742 (DELETE 254, repoint), other domains demote to consumer/embedded_master. Point-solution-market test favors this."
      - "(b) DCG-canonical: keep 254 in DCG as canonical master, DELETE DATA-AI-PLAT master row, DELETE 742, repoint, KGP demotes to consumer/embedded_master."
      - "(c) DATA-AI-PLAT-canonical: keep 254 in DATA-AI-PLAT as canonical master, DELETE DCG master row, DELETE 742, repoint, KGP demotes to consumer/embedded_master."
    why: Decision is editorial (which domain canonically masters ontologies in your taxonomy) and architectural (whether ontology-as-data-product belongs in the data platform, the data catalog, or the dedicated graph platform).

  - id: B2-S2
    summary: Canonical KG-entity owner (DATA-AI-PLAT 255 vs KGP 743 duplication).
    question: Data_object 255 `knowledge_graph_entities` is master-claimed by DATA-AI-PLAT (129) with MDM (87) as consumer; id 743 `kgp_knowledge_graph_entities` was added later under KGP. By parallel logic to B2-S1, if KGP wins ontology canonicality it should also own 255 -> 743 consolidation.
    options:
      - "(a) Collapse 255 into 743 under KGP (parallel with B2-S1 (a))."
      - "(b) Keep 255 in DATA-AI-PLAT as canonical, retire 743."
    why: Architectural decision; coupled to B2-S1 in most outcomes.

  - id: B2-S3
    summary: Prefix vs bare-word naming for the canonical KGP masters (only triggers if B2-S1 picks the merge path).
    question: If B2-S1 picks "KGP-canonical, merge 254 into 742", should 742 be renamed from `kgp_ontologies` to the bare-word `ontologies`? Same for 743 vs `knowledge_graph_entities`. Rule #9 default is prefix; promotion to bare-word requires `is_canonical_bare_word=true` with `naming_authority_rationale`.
    options:
      - "(a) Keep prefix, leave 254 as the canonical bare-word elsewhere (only valid under B2-S1 (b) or (c))."
      - "(b) Promote 742 to `ontologies` (rename plus DELETE old 254; only valid under B2-S1 (a))."
      - "(c) Rename 254 to `dcg_ontologies` or `dataaiplat_ontologies` per the loser of B2-S1 and keep 742 as canonical (only valid under B2-S1 (a) with parallel rename)."
    why: Determines whether B1B-M1-MODULES master assignments reference 742/743 or 254/255.

  - id: B2-S4
    summary: Module split shape (2 / 3 / 4 modules).
    question: "B1B-M1-MODULES proposes 3 modules (ONTOLOGY-ENGINE, QUERY-FEDERATION, AGENT-INTEGRATION). Alternatives, 2 modules (ENGINE + QUERY/AGENT combined) cuts audit surface but loses agent-integration RBAC distinctness; 4 modules (split ENGINE into AUTHORING + REASONING) matches Stardog / Anzo product carve but doubles permission surface."
    options:
      - "(a) 3 modules as proposed (recommended)."
      - "(b) 2 modules."
      - "(c) 4 modules."
      - "(d) Different split entirely (specify)."
    why: Drives every downstream Phase B / S / E load shape.

  - id: B2-S5
    summary: Approve catalog tagline + description wording for KGP A4 PATCH.
    question: Author `catalog_tagline` and `catalog_description` on domain 138. Rule #20 forbids agent-authored writes; user supplies the exact text or rewrites the audit draft.
    options:
      - "(a) Approve 2026-05-30 audit draft tagline: 'Build the unified semantic substrate that powers your AI agents, operational apps, and complex analytical queries on top of your enterprise data.' plus a 3-paragraph description covering ontology authoring, federated reasoning, LLM grounding."
      - "(b) Rewrite (supply exact text)."
      - "(c) Skip A4 (leave both fields empty)."
    why: Rule #20 hard rule.

b3:
  - id: B3-S1
    candidate: kgp_inference_rules
    rationale: Stardog, GraphDB, AllegroGraph all expose a "rules" surface (SWRL, custom rule languages) distinct from the ontology itself. The rule corpus is authored, versioned, and executed separately from the ontology. Could plausibly live in KGP-ONTOLOGY-ENGINE or warrant its own KGP-INFERENCE-RULES sub-module.
    vendor_evidence:
      - {vendor: Stardog, evidence: 1st_class}
      - {vendor: GraphDB, evidence: 1st_class}
      - {vendor: AllegroGraph, evidence: 1st_class}
    proposed_module: KGP-ONTOLOGY-ENGINE

  - id: B3-S2
    candidate: kgp_named_graphs
    rationale: Named graphs are the unit of access control and data partitioning in every RDF triple-store flagship. Today the catalog has no named-graph entity, which means the natural Phase E permission grain (per-graph RBAC) cannot be materialized. May be embedded master in KGP-ONTOLOGY-ENGINE or a separate entity.
    vendor_evidence:
      - {vendor: Stardog, evidence: 1st_class}
      - {vendor: GraphDB, evidence: 1st_class}
      - {vendor: AllegroGraph, evidence: 1st_class}
    proposed_module: KGP-ONTOLOGY-ENGINE
