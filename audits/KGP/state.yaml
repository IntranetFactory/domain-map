b1b:
  - id: B1B-M1-MODULES
    summary: Author 3 (or 2 / 4 per B2-S4) `domain_modules` rows for KGP; blocks every B-band beyond B6/B7/B11 and all E-band checks.
    finding: KGP has zero `domain_modules` rows (`domain_modules?domain_id=eq.138` and `domain_module_host_domains?domain_id=eq.138` both empty). Phase A loaded domain + capabilities + solutions + a domain-level system skill but skipped the modular layer. Rule #14 (>=1 full module per domain; >=2 full modules for >=3-capability domains, KGP has 8) is violated. The proposed 3-module split is KGP-ONTOLOGY-ENGINE (KG-ONTOLOGY-AUTHORING + KG-REASONING-INFERENCE + KG-NATIVE-STORAGE, masters kgp_ontologies), KGP-QUERY-FEDERATION (KG-SPARQL-FEDERATION + KG-VIRTUAL-GRAPHS, embedded_master kgp_ontologies + kgp_knowledge_graph_entities), KGP-AGENT-INTEGRATION (KG-AI-AGENT-INTEGRATION + SEMANTIC-MODELING + OPERATIONAL-DATA-APPS, consumer-shaped). Alternative 2-module or 4-module splits are defensible (see B2-S4).
    blocked_by:
      - {type: user_decision, ref: B2-S1}
      - {type: user_decision, ref: B2-S2}
      - {type: user_decision, ref: B2-S4}
    affected_modules: []
    extra_proposed_split: ["KGP-ONTOLOGY-ENGINE", "KGP-QUERY-FEDERATION", "KGP-AGENT-INTEGRATION"]

  - id: B1B-B5-EMBEDDED-MASTERS
    summary: Once modules exist, author `domain_module_data_objects` rows including the embedded_master shells in the consumer-shaped modules.
    finding: KGP has zero `domain_module_data_objects` rows because zero modules. Each module from B1B-M1-MODULES needs its master + embedded_master + consumer mix authored. The QUERY-FEDERATION and AGENT-INTEGRATION modules embed kgp_ontologies and kgp_knowledge_graph_entities; the ENGINE module masters both (under the KGP-canonical resolution path of B2-S1 / B2-S2).
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}
    affected_masters:
      - {data_object_id: 742, name: kgp_ontologies, target_module_id: null, workflow: ontology_authoring}
      - {data_object_id: 743, name: kgp_knowledge_graph_entities, target_module_id: null, workflow: kg_entity_assertion}

  - id: B1B-B8-OUTBOUND-EDGES
    summary: Mirror `data_object_relationships` edges from KGP payload masters to the receiving masters in DATA-AI-PLAT and DCG.
    finding: "Handoff 697 (KGP to DATA-AI-PLAT, kgp_ontology.imported, payload kgp_ontologies), 698 (KGP to DCG, kgp_knowledge_graph_entity.merged, payload kgp_knowledge_graph_entities), 699 (KGP to DCG, kgp_knowledge_graph_entity.created, payload kgp_knowledge_graph_entities) all lack mirror data_object_relationships to receiving masters. Proposed verbs, 742 feeds DATA-AI-PLAT semantic_models; 743 reconciles_with DCG data_assets (256); 743 lineage_to DCG data_assets (256). The DATA-AI-PLAT-side target master is currently semantic_models candidate but DATA-AI-PLAT is itself pre-modular so the FK is not stable."
    blocked_by:
      - {type: domain_audit, blocking_domain: DATA-AI-PLAT, milestone: post-M1-master-resolution}
      - {type: domain_audit, blocking_domain: DCG, milestone: post-M1-master-resolution}
      - {type: user_decision, ref: B2-S1}
    affected_handoffs:
      - {handoff_id: 697, direction: outbound, source_domain: KGP, target_domain: DATA-AI-PLAT, trigger_event: kgp_ontology.imported, payload: kgp_ontologies, null_field: mirror_data_object_relationship}
      - {handoff_id: 698, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.merged, payload: kgp_knowledge_graph_entities, null_field: mirror_data_object_relationship}
      - {handoff_id: 699, direction: outbound, source_domain: KGP, target_domain: DCG, trigger_event: kgp_knowledge_graph_entity.created, payload: kgp_knowledge_graph_entities, null_field: mirror_data_object_relationship}

  - id: B1B-B12-LIFECYCLE
    summary: Author 10 `data_object_lifecycle_states` rows once modules exist to anchor `requires_permission=true` states.
    finding: "B12 is FAIL. Both masters have real workflow. kgp_ontologies passes through drafting (initial) -> validating -> published (requires_permission) -> superseded -> retired (terminal); kgp_knowledge_graph_entities passes through asserted (initial) -> validated -> reasoned -> merged (requires_permission, override merge_kg_entity) -> retired (terminal). Each requires_permission=true row needs domain_module_id per Rule #14 / M5."
    blocked_by:
