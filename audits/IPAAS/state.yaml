b3:
  - id: B3-S1
    candidate: integration_connections
    rationale: "Vendor evidence shows iPaaS vendors model a separate `connection` entity (configured credentials bound to a recipe) distinct from the reusable `connector` template. Workato 'Connection' vs 'Connector', Boomi 'Account' vs 'Connector', MuleSoft 'Connector configuration', Tray.io 'Authentication'. If confirmed, has_personal_content flag (B2-S3) moves here."
    vendor_evidence: [Workato, Boomi, MuleSoft, Tray.io]
    proposed_module: IPAAS-RECIPE-DESIGN

  - id: B3-S2
    candidate: integration_run_logs
    rationale: "Universal sub-resource of integration_runs that vendors expose as first-class queryable entity for audit + debugging. Workato per-step job log, Boomi process log, MuleSoft flow log, Zapier task history step."
    vendor_evidence: [Workato, Boomi, MuleSoft, Zapier]
    proposed_module: IPAAS-RUNTIME

  - id: B3-S3
    candidate: integration_environments
    rationale: "Promotion across dev / test / prod is a core iPaaS workflow. Workato workspace + environment, Boomi atom + molecule + environment, MuleSoft environment, SnapLogic project space. May overlap with cross-cutting <DOMAIN>-ENV-MGMT concept that APP-PAAS / LCAP also have."
    vendor_evidence: [Workato, Boomi, MuleSoft, SnapLogic]
    proposed_module: IPAAS-RECIPE-DESIGN

  - id: B3-S4
    candidate: integration_error_records
    rationale: "Distinct from a failed run row: a single run may produce multiple error records and errors persist after the run is archived. Workato error monitor, Boomi process errors, MuleSoft DLQ."
    vendor_evidence: [Workato, Boomi, MuleSoft]
    proposed_module: IPAAS-RUNTIME

  - id: B3-S5
    candidate: integration_schedule_policies
    rationale: "Scheduling surface (cron, throttling, queue priority) may be config-shape on `integration_triggers` (per B2-S4) or a separate master if rich enough. Workato scheduled triggers, Boomi process schedule, Zapier scheduled Zaps."
    vendor_evidence: [Workato, Boomi, Zapier]
    proposed_module: IPAAS-RECIPE-DESIGN

