b2:
  - id: B2-9
    summary: "`smp_vendor_risk_assessments` (996, SaaS Management Platform) vs TPRM. a5/a9 asked: with embedded_master, one table or two, and who owns it? -> OPEN."
    question: |
      The SaaS-management platform (SMP) carries its own per-app vendor-risk slice
      (smp_vendor_risk_assessments, mastered by SMP-RENEWAL-VENDOR mod 31). a5 asked plainly: "when
      both are installed would I have one table or two, and which domain owns it?" Now that TPRM masters
      third_parties (1318), the question is how SMP's app-scoped slice relates to TPRM's third-party
      identity.
    options:
      - {key: a, label: "Keep SMP fully separate (SMP is SaaS-app-specific; TPRM is generic third-party risk; no shared identity)"}
      - {key: b, label: "Deprecate smp_vendor_risk_assessments; SMP consumes TPRM's third_parties / assessment master"}
      - {key: c, label: "SMP carries a local embedded_master shell of TPRM's third_parties (installs without TPRM, defers to TPRM's master when TPRM is present) but keeps its own app-specific smp_vendor_risk_assessments slice"}
    answer_to_a5: |
      One table or two? With the embedded_master shape (option c), there is ONE logical third_parties
      table, MASTERED by TPRM. SMP carries a local embedded_master shell ONLY so it can deploy standalone
      without TPRM; when BOTH are installed, SMP's shell defers (demotes) to TPRM's master, so you have
      ONE table owned by TPRM. You get two tables only if SMP is installed WITHOUT TPRM, in which case
      SMP's shell is the local copy. The risk-assessment slices stay separate tables regardless: TPRM's
      third_party_assessments (1325) and SMP's smp_vendor_risk_assessments (996) are distinct records by
      design (same third-party identity, different app-scoped vs ecosystem-wide assessment).
    evidence: |
      Recommended c. They are related but not the same record. SaaS-management platforms (Zluri, Torii,
      BetterCloud) are app-scoped: they discover the SaaS estate (shadow IT via SSO / API / browser
      signals), govern usage and spend, and run a lightweight per-app security review. A dedicated TPRM
      (Prevalent, OneTrust, ServiceNow VRM, Venminder, ProcessUnity, Archer) runs deep, structured
      diligence across the WHOLE third-party ecosystem, not just SaaS apps. So the SMP slice is genuinely
      its own app-specific record and should not be deprecated (rules out b); but the third-party IDENTITY
      it points at is the same entity TPRM masters, so SMP embedded-masters TPRM's third_parties (a local
      shell so SMP installs without TPRM, deferring to the TPRM master when TPRM is present) while keeping
      its own assessment slice. Pick a only if you want them fully decoupled with no shared identity.
    why: |
      Independent of the (now-settled) TPRM boundary. The fix is an SMP-side embedded_master row, addable
      after this build with no change to TPRM's masters. Non-blocking for TPRM's "finished" state; it
      governs the SMP module, not TPRM.

