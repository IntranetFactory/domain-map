b2:
  - id: B2-1
    summary: TPRM modularization shape (load-bearing) - single `TPRM-VENDOR-RISK-MGMT` or split into `TPRM-VENDOR-DUE-DILIGENCE` + `TPRM-VENDOR-ONGOING-MONITORING`.
    question: |
      Flagship pure-plays expose an Onboarding-vs-Continuous-Monitoring product split, satisfying
      Rule #14's 2-module floor pre-emptively. Single-module is simpler and defers the split until
      capability count forces it. This decision gates the entire build and every b1b cure.
    options:
      - {key: a, label: "Single module TPRM-VENDOR-RISK-MGMT covering the full lifecycle"}
      - {key: b, label: "Split into TPRM-VENDOR-DUE-DILIGENCE + TPRM-VENDOR-ONGOING-MONITORING (mirrors pure-play product lines, satisfies Rule #14 2-module floor)"}
    why: |
      Load-bearing for B1B-S1, B1B-A2, both B1B-B10b cures, the build, and routing for every b3 candidate.

  - id: B2-2
    summary: GRC `risk_assessments` (291) vs TPRM vendor-risk boundary.
    question: |
      GRC currently masters `risk_assessments`. Vendor risk has distinct inputs (questionnaires +
      security ratings) and reviewers (procurement / infosec) vs internal control testing.
    options:
      - {key: a, label: "TPRM masters a new `vendor_risk_assessments` entity, distinct from GRC's `risk_assessments`"}
      - {key: b, label: "TPRM consumes GRC's `risk_assessments` with a `subject_type='vendor'` discriminator"}
      - {key: c, label: "TPRM consumes SUP-LIFE's `supplier_risk_assessments` (730) and the TPRM domain is folded into SUP-LIFE entirely"}
    why: |
      Routes the canonical home for vendor risk; all of b3 candidate mastery hinges off this in combination with B2-3..B2-5.

  - id: B2-3
    summary: "`suppliers` (206, alias `vendor`) vs separate `third_parties` or MDM-tier `counterparties` (Rule #9 naming collision)."
    question: |
      SUP-LIFE masters `suppliers` with alias "vendor". TPRM specialists operate on a "vendor"
      master that includes non-supplier counterparties. Any proposal of `vendors` or `third_parties`
      triggers Rule #9 naming arbitration.
    options:
      - {key: a, label: "TPRM consumes SUP-LIFE's `suppliers` (single master across the org)"}
      - {key: b, label: "TPRM masters a separate `third_parties` entity scoped to risk-managed counterparties only"}
      - {key: c, label: "Introduce a new MDM-tier `counterparties` master that both SUP-LIFE and TPRM consume"}

  - id: B2-4
    summary: "`supplier_risk_assessments` (730, aliases TPRM assessment / due diligence review) - TPRM canonical or SUP-LIFE canonical?"
    question: |
      The aliases on this entity are TPRM-coded yet the master is on SUP-LIFE.
    options:
      - {key: a, label: "Move mastery to TPRM (data_object stays, only the DMDO mastery row moves once TPRM has a module)"}
      - {key: b, label: "Keep SUP-LIFE mastery, TPRM consumes (matches procurement-anchored deployment)"}
      - {key: c, label: "Rename to `vendor_risk_assessments`, move mastery to TPRM, optionally leave SUP-LIFE with a vendor-risk-aware variant"}

  - id: B2-5
    summary: TPRM scope vs SUP-LIFE broadly - overlay or peer-master.
    question: |
      SUP-LIFE masters `supplier_onboardings`, `supplier_qualifications`, `supplier_certifications`,
      `supplier_scorecards`. TPRM specialists' "vendor onboarding", "questionnaires", "certification
      tracking" overlap each.
    options:
      - {key: a, label: "Preserve SUP-LIFE mastery, TPRM consumes everything (TPRM is a thin overlay / analytics layer)"}
      - {key: b, label: "TPRM masters its own assessment + remediation entities; consumes SUP-LIFE masters as kind=consumer only"}
      - {key: c, label: "TPRM is duplicative and gets folded into SUP-LIFE with a `SUP-LIFE-RISK` module (promote-as-domain decision reversed)"}

  - id: B2-6
    summary: "`compliance_risks` (282) vs vendor-risk overlap with GRC."
    question: |
      GRC's `compliance_risks` is general regulatory exposure; vendor risks are a distinct subtype
      with vendor-FK shape.
    options:
      - {key: a, label: "Vendor risk gets its own master (`vendor_risk_findings`)"}
      - {key: b, label: "TPRM consumes GRC's `compliance_risks` with a vendor discriminator"}

  - id: B2-7
    summary: "`audit_findings` (294) consumed by TPRM - confirm scope and routing (gates B1B-B10b-258)."
    question: |
      AUDIT publishes `finding.remediated` (handoff 258) to TPRM. There is no model today for what
      TPRM does on receipt.
    options:
      - {key: a, label: "TPRM consumes `audit_findings` (role=consumer, necessity=optional per Rule #16) and ties to its vendor-remediation entity"}
      - {key: b, label: "Handoff is mis-routed; should target GRC (15) or AUDIT (16) itself"}
      - {key: c, label: "Handoff is correct; TPRM masters a distinct `vendor_audit_findings` master"}

  - id: B2-8
    summary: DORA scope coverage - author DORA-specific entities, drop the regulation link, or defer to a dedicated DORA audit.
    question: |
      DORA introduces TPRM-side artifacts (ICT third-party register, ICT-risk concentration analyses,
      sub-contractor mapping per Art. 28). None have entity shape today.
    options:
      - {key: a, label: "Add `ict_third_party_registers`, `ict_concentration_assessments`, `subcontractor_chains` as MISSING in a follow-up audit's Bucket 1 once modules exist"}
      - {key: b, label: "Treat DORA as scope-creep and remove the `domain_regulations` link"}
      - {key: c, label: "Keep the regulation linked but defer entity authoring to a dedicated DORA-compliance audit"}

  - id: B2-9
    summary: "`smp_vendor_risk_assessments` (996) duplicate of TPRM scope."
    question: |
      SaaS Management Platform has its own vendor-risk slice with lifecycle and triggers.
    options:
      - {key: a, label: "Keep separate (SMP is SaaS-app-specific; TPRM is generic)"}
      - {key: b, label: "Deprecate `smp_vendor_risk_assessments` once TPRM masters vendor-risk; SMP consumes the TPRM master"}
      - {key: c, label: "Keep both with a documented `consumer` role on the TPRM side"}

  - id: B2-H1
    summary: "Handoff 278 carries an unexplained second `agent_curated` APQC tag (PCF 815, L4, hp id 705) on top of the documented L3 tag (PCF 167, hp id 254). DESTRUCTIVE resolution if (b)."
    question: |
      Provenance of the L4 row is unknown; no history.md continuation logs it. SKILL.md prefers the
      L2/L3 parent for clustering quality. Verified live 2026-06-07: both rows present, both
      record_status='new'.
    options:
      - {key: a, label: "Keep both rows (L3 parent and L4 child are mutually consistent)"}
      - {key: b, label: "DELETE the L4 row (handoff_processes id 705, process_id 815) to keep the cleaner L3 framing"}
      - {key: c, label: "Approve both rows and bump `record_status='approved'` on the L3 pair; decide L4 status separately (Rule #1 needs explicit per-row confirmation)"}
    why: |
      Independent of all other b2 items. (b) is the SKILL-preferred shape but is destructive and the
      row's surprise provenance is worth surfacing rather than silently deleting. This subsumes the
      former B1A-H3 (the DELETE action), which is destructive and therefore never executed unapproved.

