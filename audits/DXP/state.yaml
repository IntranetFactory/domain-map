    blocked_by:
      - {type: user_decision, ref: B2-1}
    affected_modules: []
    extra_capabilities: [DXP-WCM, DXP-PERSONALIZE, DXP-PORTAL, DXP-AB-TEST, DXP-MULTISITE, DXP-FORM-JOURNEY]
    extra_masters: [web_pages, content_components, digital_experiences, personalization_rules, ab_tests, segments_dxp, journey_steps]

  - id: B1B-S2
    summary: "Author data_object_lifecycle_states rows for all 7 DXP masters with domain_module_id set on workflow gates."
