b1a:
  - id: B1A-SYSTEM-SKILLS
    summary: "Author one skill_type='system' skill per DXP module (236 / 237 / 238) with 4-8 tools each, then DELETE legacy domain-level skill dxp-system (id 52)."
    finding: >
      F1 / F2 / F3 hard fail, now unblocked by the 2026-06-02 modularization. DXP has 3 full
      modules (DXP-AUTHORING 236, DXP-EXPERIENCE-PERSONALIZATION 237, DXP-PORTAL-JOURNEYS 238)
      but zero module-anchored system skills. Rule #17 requires exactly one skill_type='system'
      skill with domain_module_id set and >=1 skill_tools row per module. The legacy skill
      dxp-system (id 52, domain_id 77, domain_module_id null) carries 7 query-only skill_tools
      (query_web_pages, query_content_components, query_experiences, query_personalization_rules,
      query_ab_tests, query_segments_dxp, query_journey_steps): zero mutate, zero workflow-gate,
      zero side_effect. It is the migration target, not the target state.
    action: >
      Author one system skill per module with domain_module_id set: DXP-AUTHORING (236) tools
      over web_pages / content_components / digital_experiences (query + mutate create_web_page,
      publish_web_page, update_content_component + side_effect purge_cdn_cache / invalidate_render_cache);
      DXP-EXPERIENCE-PERSONALIZATION (237) over personalization_rules / ab_tests / segments_dxp
      (query + mutate activate_personalization_rule, start_ab_test, publish_segment_dxp);
      DXP-PORTAL-JOURNEYS (238) over journey_steps / digital_experiences (query + mutate +
      inbound receive_cdp_segment_update). 4-8 tools per skill mixing query / mutate / workflow-gate /
      side_effect / inbound. After all three ship with >=1 skill_tools, DELETE legacy dxp-system id 52 (F1).
    affected_modules: [236, 237, 238]
    extra_legacy_skill_to_delete: {skill_id: 52, skill_name: "dxp-system"}
    extra_required_tool_shapes: ["query (per master)", "mutate (publish / activate / start)", "side_effect (purge_cdn_cache, invalidate_render_cache)", "inbound (receive_cdp_segment_update)"]

