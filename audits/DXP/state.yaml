    affected_masters:
      - {data_object_id: 441, name: web_pages, target_module_id: null, workflow: "draft -> in_review -> approved -> published -> unpublished -> archived"}
      - {data_object_id: 442, name: content_components, target_module_id: null, workflow: "draft -> published -> deprecated"}
      - {data_object_id: 443, name: digital_experiences, target_module_id: null, workflow: "planned -> active -> ended"}
      - {data_object_id: 444, name: personalization_rules, target_module_id: null, workflow: "draft -> active -> paused -> retired"}
      - {data_object_id: 445, name: ab_tests, target_module_id: null, workflow: "configured -> running -> completed -> archived"}
      - {data_object_id: 446, name: segments_dxp, target_module_id: null, workflow: "draft -> published -> retired"}
