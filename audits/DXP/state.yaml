b3:
  - id: B3-1
    candidate: site_definitions
    rationale: >
      Multi-site / multi-brand master backing the DXP-MULTISITE capability (in DXP-AUTHORING 236),
      which currently has no dedicated master backing. Every flagship vendor distinguishes
      Site / Tenant / Property from Page (AEM Sites site, Sitecore tenant, Drupal site).
      Common-class entity in the union surface. Would land in DXP-AUTHORING (236) as a master.
    vendor_evidence:
      - {vendor: "Adobe Experience Manager Sites", evidence: 1st_class}
      - {vendor: "Sitecore XM Cloud", evidence: 1st_class}
      - {vendor: "Acquia DXP (Drupal Cloud)", evidence: 1st_class}
      - {vendor: "Optimizely DXP", evidence: 1st_class}
      - {vendor: "Liferay DXP", evidence: 1st_class}
      - {vendor: "Salesforce Experience Cloud", evidence: 1st_class}
      - {vendor: "Bloomreach Content", evidence: 1st_class}
    proposed_module: DXP-AUTHORING

  - id: B3-2
    candidate: "page_templates, layouts, content_blocks"
    rationale: >
      Authoring substrate beyond web_pages. Every flagship vendor distinguishes a page instance
      from a reusable template (AEM page template, Sitecore Page Type / Rendering, Drupal Layout
      Builder). Backs DXP-WCM (in DXP-AUTHORING 236) beyond the bare web_pages master. Pick which
      name is canonical and whether content_blocks merges with content_components.
    vendor_evidence:
      - {vendor: "Adobe Experience Manager Sites", evidence: 1st_class}
      - {vendor: "Sitecore XM Cloud", evidence: 1st_class}
      - {vendor: "Acquia DXP (Drupal Cloud)", evidence: 1st_class}
      - {vendor: "Optimizely DXP", evidence: 1st_class}
      - {vendor: "Liferay DXP", evidence: 1st_class}
      - {vendor: "Salesforce Experience Cloud", evidence: 1st_class}
      - {vendor: "Bloomreach Content", evidence: 1st_class}
    proposed_module: DXP-AUTHORING

  - id: B3-3
    candidate: "experiment_variants, experiment_results"
    rationale: >
      Current ab_tests master (445, in DXP-EXPERIENCE-PERSONALIZATION 237) collapses experiment,
      variant, and result. Optimizely Web Experimentation, Sitecore Personalize, and Adobe Target
      all model experiment (definition), variant (served version), and result (measured outcome)
      as separate masters. Matters for cross-domain relationships from PROD-MGMT that reference
      the result, not the definition (handoff 813). The 813 -> product_features relationship loaded
      2026-06-05 points at the definition; a future experiment_results master would re-home it.
    vendor_evidence:
      - {vendor: "Optimizely Web Experimentation", evidence: 1st_class}
      - {vendor: "Adobe Target", evidence: 1st_class}
      - {vendor: "Sitecore Personalize", evidence: 1st_class}
      - {vendor: "AB Tasty", evidence: 1st_class}
    proposed_module: DXP-EXPERIENCE-PERSONALIZATION

  - id: B3-4
    candidate: "forms, form_fields, form_submissions"
    rationale: >
      Form-authoring substrate backing DXP-FORM-JOURNEY (in DXP-PORTAL-JOURNEYS 238). AEM Forms,
      Sitecore Forms, Drupal Webform, Salesforce Experience Cloud Forms all carry these masters.
      journey_steps is the orchestration layer; forms is the data-capture layer. Without forms,
      the form half of DXP-PORTAL-JOURNEYS has no master backing. Open question: standalone FORMS
      market (Typeform, Formstack, JotForm) vs DXP-internal master.
    vendor_evidence:
      - {vendor: "AEM Forms", evidence: 1st_class}
      - {vendor: "Sitecore Forms", evidence: 1st_class}
      - {vendor: "Drupal Webform", evidence: 1st_class}
      - {vendor: "Salesforce Experience Cloud Forms", evidence: 1st_class}
    proposed_module: DXP-PORTAL-JOURNEYS

  - id: B3-5
    candidate: "portal_pages, portal_widgets, portal_user_profiles"
    rationale: >
      B2B portal substrate backing DXP-PORTAL (in DXP-PORTAL-JOURNEYS 238), which currently has no
      master backing: the module is anchored only by journey_steps plus the digital_experiences
      embedded_master. Liferay portlets, Salesforce Experience Cloud components, IBM HCL Digital
      Experience portal pages all carry this distinct surface from public web pages. PORTAL-FRAMEWORK
      is queued as a separate candidate market; if it promotes, DXP-PORTAL becomes a consumer of its
      masters and DXP-PORTAL-JOURNEYS may collapse to journeys/forms only.
    vendor_evidence:
      - {vendor: "Liferay DXP", evidence: 1st_class}
      - {vendor: "Salesforce Experience Cloud", evidence: 1st_class}
      - {vendor: "IBM HCL Digital Experience", evidence: 1st_class}
      - {vendor: "Backbase", evidence: 1st_class}
    proposed_module: DXP-PORTAL-JOURNEYS
    extra_alternative: "If PORTAL-FRAMEWORK promotes, the DXP-PORTAL capability moves out or becomes a consumer of PORTAL-FRAMEWORK masters."

  - id: B3-7
    candidate: "segments_dxp, personalization_rules ownership"
    rationale: >
      May belong to a future DIGITAL-PERSONALIZATION domain (queued in _missing-domains.md). Adobe
      Target, Sitecore Personalize, and Optimizely Personalization are positioned as point
      solutions. If DIGITAL-PERSONALIZATION promotes and absorbs these as canonical masters, DXP's
      personalization_rules (444) and segments_dxp (446) move out of DXP-EXPERIENCE-PERSONALIZATION
      (237); if it folds back, they remain.
    vendor_evidence:
      - {vendor: "Adobe Target", evidence: 1st_class}
      - {vendor: "Sitecore Personalize", evidence: 1st_class}
      - {vendor: "Optimizely Personalization", evidence: 1st_class}
    extra_dependency: "Informs whether DXP-EXPERIENCE-PERSONALIZATION (237) loses its personalization masters."
