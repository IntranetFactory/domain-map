b2:
  - id: B2-2
    summary: "Per-flag yes / no decision on 7 pattern-flag candidates across the 7 DXP masters."
    question: "Which of these pattern flags should flip to true on the corresponding master? Each affects derived permissions and the workflow-gate surface."
    options:
      - "web_pages.has_submit_lock: published pages immutable until re-drafted."
      - "ab_tests.has_submit_lock: running tests config-frozen."
      - "personalization_rules.has_single_approver: target-segment rule activation is a single sign-off."
      - "journey_steps.has_personal_content: timing data + visitor identifiers under ADA / privacy law."
      - "digital_experiences.has_submit_lock: campaign-tied surface frozen on activation."
      - "segments_dxp.has_submit_lock: published segment definitions immutable until re-drafted."
      - "content_components.has_submit_lock: published components immutable until re-drafted."
    why: "Pattern-flag judgments are workflow-shape decisions the user owns; false-by-default doesn't establish review."

  - id: B2-4
    summary: "Decide segments_dxp naming arbitration ahead of DIGITAL-PERSONALIZATION promotion (carried)."
    question: "When DIGITAL-PERSONALIZATION is promoted (queued in _missing-domains.md), the canonical segment master may move there. How should segments_dxp be handled now?"
    options:
      - "(a) leave as-is, accept that the suffix flags the disambiguation per Rule #9."
      - "(b) rename segments_dxp -> personalization_segments to disambiguate from CDP and a future DIGITAL-PERSONALIZATION market."
      - "(c) wait until DIGITAL-PERSONALIZATION promotes to decide whether segments_dxp becomes a consumer or embedded_master of that future domain's segments master."
    why: "Future-domain promotion timing is the user's call; cannot be decided unilaterally by the agent."
  - id: B2-B9D-OWN-100
    summary: "Digital Experience Platform: name an owner for \"Develop customer experience strategy\" (no one is responsible for it today)"
    question: |
      Customer Data Platform forwards dxp segment to Digital Experience Platform to develop customer experience strategy, but Digital Experience Platform does not yet have anyone assigned to develop customer experience strategy, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Digital Experience Platform owns, and assign a named owner once Digital Experience Platform sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Digital Experience Platform decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-DXP.md q10.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-665
    summary: "Digital Experience Platform: name an owner for \"Execute promotional activities\" (no one is responsible for it today)"
    question: |
      Marketing Automation forwards digital experience to Digital Experience Platform to execute promotional activities, but Digital Experience Platform does not yet have anyone assigned to execute promotional activities, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Digital Experience Platform owns, and assign a named owner once Digital Experience Platform sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Digital Experience Platform decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-DXP.md q11.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-1822
    summary: "Digital Experience Platform: name an owner for \"Carry out post launch analytics to test the acceptability in the market\" (no one is responsible for it today)"
    question: |
      Product Management forwards a/b test to Digital Experience Platform to carry out post launch analytics to test the acceptability in the market, but Digital Experience Platform does not yet have anyone assigned to carry out post launch analytics to test the acceptability in the market, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Digital Experience Platform owns, and assign a named owner once Digital Experience Platform sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Digital Experience Platform decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-DXP.md q12.
