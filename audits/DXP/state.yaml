    finding: "B6 hard fail. Zero intra-domain master-to-master data_object_relationships among the 7 DXP masters (ids 441-447). Expected edges: web_pages embeds content_components (one-to-many); digital_experiences spans web_pages (one-to-many); personalization_rules targets segments_dxp (many-to-many); ab_tests runs_on web_pages (one-to-many); ab_tests evaluates personalization_rules (one-to-many); journey_steps composes digital_experiences (many-to-one); journey_steps references web_pages (many-to-many)."
