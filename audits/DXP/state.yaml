    finding: "F1 / F2 / F3 hard fail. Legacy skill dxp-system (id 52, domain_id 77, domain_module_id null) carries 7 query-only skill_tools rows (query_web_pages, query_content_components, query_experiences, query_personalization_rules, query_ab_tests, query_segments_dxp, query_journey_steps). Zero mutate, zero workflow-gate, zero side_effect / compute. Rule #17 requires one skill_type='system' per domain_modules row with >=1 skill_tools; the legacy skill is the migration target, not the target state."
