      digital_experiences (443) planned / active / ended; personalization_rules (444) draft /
      active / paused / retired; ab_tests (445) configured / running / completed / archived;
      segments_dxp (446) draft / published / retired; journey_steps (447) defined / entered /
      exited / abandoned. domain_module_id is now resolvable: 441 / 442 / 443 -> 236;
      444 / 445 / 446 -> 237; 447 -> 238.
    action: >
      Author lifecycle states per the ladders above; mark requires_permission=true on workflow
      gates (publish, unpublish, activate, retire, start, complete); set domain_module_id to the
      mastering module (441 / 442 / 443 -> 236, 444 / 445 / 446 -> 237, 447 -> 238).
    affected_masters:
      - {data_object_id: 441, name: web_pages, target_module_id: 236, workflow: "draft -> in_review -> approved -> published -> unpublished -> archived"}
      - {data_object_id: 442, name: content_components, target_module_id: 236, workflow: "draft -> published -> deprecated"}
      - {data_object_id: 443, name: digital_experiences, target_module_id: 236, workflow: "planned -> active -> ended"}
      - {data_object_id: 444, name: personalization_rules, target_module_id: 237, workflow: "draft -> active -> paused -> retired"}
      - {data_object_id: 445, name: ab_tests, target_module_id: 237, workflow: "configured -> running -> completed -> archived"}
      - {data_object_id: 446, name: segments_dxp, target_module_id: 237, workflow: "draft -> published -> retired"}
      - {data_object_id: 447, name: journey_steps, target_module_id: 238, workflow: "defined -> entered -> exited -> abandoned"}

