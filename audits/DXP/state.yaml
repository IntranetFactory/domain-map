b2:
  - id: B2-1
    summary: "Pick the DXP module split shape: 2, 3, or 4 modules, or defer pending Phase 0."
    question: "Which module split should DXP adopt? This decision gates B1B-S1, B1B-S2, B1B-S5, B1B-S6, B1B-S10 and is informed by Bucket 3 outcomes B3-5 / B3-7 (whether portal and personalization spin out as separate domains)."
    options:
      - "(a) 4-module split: DXP-AUTHORING (web_pages + content_components, DXP-WCM + DXP-MULTISITE), DXP-PERSONALIZATION-EXPERIMENTATION (personalization_rules + ab_tests + segments_dxp, DXP-PERSONALIZE + DXP-AB-TEST), DXP-PORTAL (DXP-PORTAL capability + portal masters from B3-5), DXP-FORMS-JOURNEYS (journey_steps + forms from B3-4, DXP-FORM-JOURNEY)."
      - "(b) 2-module split: DXP-AUTHORING (pages + components + templates + sites + digital_experiences) + DXP-AUDIENCE-OPS (personalization + segments + ab_tests + journey_steps), matches the AEM Sites / Sitecore XM Cloud authoring vs experience line."
      - "(c) 3-module split aligned to major flagship product lines: DXP-WCM, DXP-PERSONALIZE-EXPERIMENT, DXP-PORTAL with forms / journeys folded into the relevant module."
      - "(d) defer until Phase 0 produces the formal vendor surface."
    why: "Module split is a design call the user owns; committing before Phase 0 ratifies the surface risks a redo. B3-5 and B3-7 may shrink (portal / personalization spin out) or grow (folded back in) the catalog before the split commits."

  - id: B2-2
    summary: "Per-flag yes / no decision on 7 pattern-flag candidates across the 7 DXP masters."
    question: "Which of these pattern flags should flip to true on the corresponding master? Each affects derived permissions and the workflow-gate surface."
    options:
      - "web_pages.has_submit_lock: published pages immutable until re-drafted."
      - "ab_tests.has_submit_lock: running tests config-frozen."
      - "personalization_rules.has_single_approver: target-segment rule activation is a single sign-off."
      - "journey_steps.has_personal_content: timing data + visitor identifiers under ADA / privacy law."
      - "digital_experiences.has_submit_lock: campaign-tied surface frozen on activation."
      - "segments_dxp.has_submit_lock: published segment definitions immutable until re-drafted."
      - "content_components.has_submit_lock: published components immutable until re-drafted."
    why: "Pattern-flag judgments are workflow-shape decisions the user owns; false-by-default doesn't establish review."

  - id: B2-3
    summary: "Supply catalog_tagline and catalog_description for DXP (Rule #20 forbids agent-authored wording)."
    question: "What buyer-voice catalog_tagline (single sentence) and catalog_description (1-3 paragraphs) should I PATCH onto domains.id=77? Both are currently empty, which fails A4."
    options:
      - "(a) supply exact wording for both fields."
      - "(b) ask agent for a buyer-voice draft to approve or rewrite."
      - "(c) defer until marketing-led copy is ready."
    why: "Rule #20 requires explicit user approval of catalog_tagline / catalog_description wording; the agent will not draft these without per-row approval."

  - id: B2-4
    summary: "Decide segments_dxp naming arbitration ahead of DIGITAL-PERSONALIZATION promotion (carried)."
    question: "When DIGITAL-PERSONALIZATION is promoted (queued in _missing-domains.md), the canonical segment master may move there. How should segments_dxp be handled now?"
    options:
      - "(a) leave as-is, accept that the suffix flags the disambiguation per Rule #9."
      - "(b) rename segments_dxp -> personalization_segments to disambiguate from CDP and a future DIGITAL-PERSONALIZATION market."
      - "(c) wait until DIGITAL-PERSONALIZATION promotes to decide whether segments_dxp becomes a consumer or embedded_master of that future domain's segments master."
    why: "Future-domain promotion timing is the user's call; cannot be decided unilaterally by the agent."

b3:
  - id: B3-1
    candidate: site_definitions
    rationale: "Multi-site / multi-brand master backing the DXP-MULTISITE capability, which currently has no master backing. Every flagship vendor distinguishes Site / Tenant / Property from Page (AEM Sites site, Sitecore tenant, Drupal site). Common-class entity in the union surface."
    vendor_evidence:
      - {vendor: "Adobe Experience Manager Sites", evidence: 1st_class}
      - {vendor: "Sitecore XM Cloud", evidence: 1st_class}
      - {vendor: "Acquia DXP (Drupal Cloud)", evidence: 1st_class}
      - {vendor: "Optimizely DXP", evidence: 1st_class}
      - {vendor: "Liferay DXP", evidence: 1st_class}
      - {vendor: "Salesforce Experience Cloud", evidence: 1st_class}
      - {vendor: "Bloomreach Content", evidence: 1st_class}
    proposed_module: DXP-AUTHORING
    extra_verification: "Phase 0: confirm field set (locale, brand, environment, base_url, cdn_config, theme); confirm relationship site_definitions has_many web_pages."

  - id: B3-2
    candidate: "page_templates, layouts, content_blocks"
    rationale: "Authoring substrate beyond web_pages. Every flagship vendor distinguishes a page instance from a reusable template (AEM page template, Sitecore Page Type / Rendering, Drupal Layout Builder). Backs DXP-WCM beyond the bare web_pages master. Pick which name is canonical and whether content_blocks merges with content_components."
    vendor_evidence:
      - {vendor: "Adobe Experience Manager Sites", evidence: 1st_class}
      - {vendor: "Sitecore XM Cloud", evidence: 1st_class}
      - {vendor: "Acquia DXP (Drupal Cloud)", evidence: 1st_class}
      - {vendor: "Optimizely DXP", evidence: 1st_class}
      - {vendor: "Liferay DXP", evidence: 1st_class}
      - {vendor: "Salesforce Experience Cloud", evidence: 1st_class}
      - {vendor: "Bloomreach Content", evidence: 1st_class}
    proposed_module: DXP-AUTHORING

  - id: B3-3
    candidate: "experiment_variants, experiment_results"
    rationale: "Current ab_tests master collapses experiment, variant, and result. Optimizely Web Experimentation, Sitecore Personalize, and Adobe Target all model experiment (definition), variant (served version), and result (measured outcome) as separate masters with their own lifecycles. Matters for cross-domain relationships from PROD-MGMT that reference the result, not the definition."
    vendor_evidence:
      - {vendor: "Optimizely Web Experimentation", evidence: 1st_class}
      - {vendor: "Adobe Target", evidence: 1st_class}
      - {vendor: "Sitecore Personalize", evidence: 1st_class}
      - {vendor: "AB Tasty", evidence: 1st_class}
    proposed_module: DXP-PERSONALIZATION-EXPERIMENTATION

  - id: B3-4
    candidate: "forms, form_fields, form_submissions"
    rationale: "Form-authoring substrate backing DXP-FORM-JOURNEY. AEM Forms, Sitecore Forms, Drupal Webform, Salesforce Experience Cloud Forms all carry these masters. journey_steps is the orchestration layer; forms is the data-capture layer. Without forms, DXP-FORM-JOURNEY has half its substrate missing. Open question: standalone FORMS market (Typeform, Formstack, JotForm) vs DXP-internal master."
    vendor_evidence:
      - {vendor: "AEM Forms", evidence: 1st_class}
      - {vendor: "Sitecore Forms", evidence: 1st_class}
      - {vendor: "Drupal Webform", evidence: 1st_class}
      - {vendor: "Salesforce Experience Cloud Forms", evidence: 1st_class}
    proposed_module: DXP-FORMS-JOURNEYS

  - id: B3-5
    candidate: "portal_pages, portal_widgets, portal_user_profiles"
    rationale: "B2B portal substrate backing DXP-PORTAL. Liferay portlets, Salesforce Experience Cloud components, IBM HCL Digital Experience portal pages all carry this distinct surface from public web pages. The portal authentication shape (logged-in users, role-scoped widgets, organization-scoped pages) is structurally different from public web_pages. PORTAL-FRAMEWORK has been queued as a separate candidate market."
    vendor_evidence:
      - {vendor: "Liferay DXP", evidence: 1st_class}
      - {vendor: "Salesforce Experience Cloud", evidence: 1st_class}
      - {vendor: "IBM HCL Digital Experience", evidence: 1st_class}
      - {vendor: "Backbase", evidence: 1st_class}
    proposed_module: DXP-PORTAL
    extra_alternative: "If PORTAL-FRAMEWORK promotes, DXP-PORTAL capability either disappears (portal moves out) or becomes a consumer of PORTAL-FRAMEWORK masters."

  - id: B3-6
    candidate: "Module split shape ratification"
    rationale: "The proposed 2 / 3 / 4 module split for DXP (B2-1) needs Phase 0 ratification. If portals move to PORTAL-FRAMEWORK, DXP-PORTAL disappears. If forms move to a standalone FORMS market, DXP-FORMS-JOURNEYS collapses to journeys only. Net plausible end states: 2, 3, or 4 modules."
    vendor_evidence:
      - {vendor: "Adobe Experience Manager Sites", evidence: secondary}
      - {vendor: "Sitecore XM Cloud", evidence: secondary}
      - {vendor: "Optimizely DXP", evidence: secondary}
      - {vendor: "Acquia DXP", evidence: secondary}
      - {vendor: "Liferay DXP", evidence: secondary}
      - {vendor: "Salesforce Experience Cloud", evidence: secondary}
      - {vendor: "Bloomreach Content", evidence: secondary}
    extra_recommendation: "Run formal Phase 0 subagent pass per the standard procedure; output goes to c:/tmp/DXP-phase0-<YYYY-MM-DD>.md listing each entity's vendor surface and proposed module."

  - id: B3-7
    candidate: "segments_dxp, personalization_rules ownership"
    rationale: "May belong to a future DIGITAL-PERSONALIZATION domain (queued in _missing-domains.md). Adobe Target, Sitecore Personalize, and Optimizely Personalization are positioned as point solutions. If DIGITAL-PERSONALIZATION promotes and absorbs these as canonical masters, DXP's personalization_rules and segments_dxp move out; if it folds back, they remain."
    vendor_evidence:
      - {vendor: "Adobe Target", evidence: 1st_class}
