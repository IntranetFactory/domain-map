b2:
  - id: B2-ENTITY-TYPE-AMBIGUOUS
    summary: "Confirm or override 4 judgment-call entity_type classifications"
    question: >-
      4 masters were classified with a default on an ambiguous call: work_automations(246)=catalog
      (vs operational_workflow), work_sections(975)=catalog, work_milestones(969)=operational_record
      (vs operational_workflow), okr_key_results(966)=operational_record. Each is a single-column
      PATCH to change. Confirm, or name overrides?
    # OPEN: a1 (2026-06-16) answered with a question ("how do other vendors handle that"), not a
    # decision. The vendor evidence below was researched in response and folded into the q-file;
    # the user still needs to confirm or override the 4 classifications.
    evidence: >-
      How flagship WM vendors treat each entity. work_automations: Asana Rules, monday.com
      Automations, ClickUp Automations, and Wrike are configured-once / fire-many rule definitions
      a buyer authors and toggles on or off - a configuration object, not a per-run case record.
      That reads as catalog (the rule template) even though each FIRING is an event; the gated
      enable/disable lifecycle is permission control over a config object, which catalog permits.
      work_sections: Asana sections, monday.com groups, ClickUp lists/statuses-as-columns are
      structural containers a buyer defines per project to organize tasks - a configuration object,
      not a workflow case. catalog fits. work_milestones: Smartsheet, Wrike, monday.com, and MS
      Project model a milestone as a zero-duration dated gate that is reached or missed - it has a
      reached/missed state pair but no permission-gated transitions a buyer steers, so
      operational_record (a dated record with light state) rather than operational_workflow.
      okr_key_results: Asana Goals, monday.com, ClickUp, and Workfront/Adobe treat a KR as a
      measurable record that is updated and scored on a cadence; it carries a committed/achieved/
      missed lifecycle realized on module 150, so the call sits between operational_record and
      operational_workflow. If the user weights the committed/achieved/missed gates as a steered
      workflow, okr_key_results (and arguably work_milestones) flip to operational_workflow.
    affected_entities: [data_objects:246, data_objects:975, data_objects:969, data_objects:966]

