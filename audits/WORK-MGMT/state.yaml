      H1 audit reports 28 of 39 cross-domain WORK-MGMT handoffs lack a
      handoff_processes row (11 already tagged with proposal_source=agent_curated,
      record_status=new, all on the SPM, PROD-MGMT, PSA, EMP-EXP, BPA, IPAAS,
      TEST-MGMT inbound side). Catalog-quality count (record_status=approved) is 0.
      Process target is 0.5N to 0.8N new agent_curated rows (so ~20 of the 28
      untagged handoffs should ship tags in this audit, ~8 deferred to Discover
      Pass 3).
    action: >-
      For each of the 28 untagged handoffs, look up a candidate APQC PCF activity
      via /processes?process_name=ilike.*<term>*&source_framework=eq.apqc_pcf_cross_industry,
      pick the strongest L2/L3 (or L4/L5 only when an obvious L2/L3 parent exists),
      author a handoff_processes row with proposal_source=agent_curated and
      record_status=new. Handoffs with no clean PCF match (e.g. work_automation.*
      family which has no cross-industry analog, the strategic_portfolio.rebalanced
      style portfolio activities, and a few pull_request / test_defect rows)
      defer-to-Discover-Pass-3 and get listed in the audit's APQC TAGGING deferral
      sub-section. Loader idiom is a chunked POST against /handoff_processes with
      the composed (handoff_id, process_id) preventing duplicates.
