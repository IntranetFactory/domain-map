b2:
  - id: B2-RULE20-WORDING-A4
    summary: "Approve wording for domain 135 catalog_tagline and catalog_description (Rule #20 voice rule)"
    question: >-
      Rule #20 requires buyer-voice catalog_tagline (1 sentence) and
      catalog_description (1-3 paragraphs) drafted, surfaced, then approved
      per-row before any PATCH. Want me to produce drafts now in a follow-up
      turn, or hold the A4 fix pending a separate copywriting pass?
    options:
      - "Draft now (agent produces drafts, user approves exact wording, agent PATCHes)"
      - "Defer to a marketing/copywriting pass outside this audit"
      - "Mark A4 as accepted-as-empty and stop nagging in subsequent audits (would need explicit confirmation since Rule #20 frames empty as a fail)"
    why: >-
      Rule #20 is the only column-write authority for these four fields. The
      audit can author drafts but Rule #20 forbids writes without explicit
      user approval of the wording.

  - id: B2-RULE20-WORDING-M8
    summary: "Approve wording for 3 module catalog_tagline + catalog_description rows (Rule #20 voice rule)"
    question: >-
      Same Rule #20 voice-and-approval gate as A4, applied per module: 149
      (Task and Project Execution), 150 (Team-Execution Goals and OKRs), 183
      (Request Intake). 6 strings total. Produce drafts now, defer, or
      accept-as-empty?
    options:
      - "Draft now for all 3 modules"
      - "Draft now for a subset (name which modules)"
      - "Defer entirely"
      - "Accept-as-empty across the WM modules"
    affected_modules: [149, 150, 183]
    why: >-
      Same as A4: Rule #20 wording approval is user-only.

  - id: B2-H1-APPROVAL-POSTURE
    summary: "Approve current 11 agent_curated handoff_processes rows now, or batch with the 28 new tags later?"
    question: >-
      Catalog quality headline (H1 approved count) is 0; 11 agent_curated rows
      already sit at record_status=new. Promoting the correct ones now raises
      the headline without new tagging work, but a unified review pass once
      B1A-H1-APQC-TAGGING lands is cheaper. Which posture?
    options:
      - "Review-and-approve the existing 11 now (separate small pass)"
      - "Batch with the 28-new pass (single unified review later)"
      - "Defer indefinitely; H1 quality not a current priority"
    why: >-
      Both options are valid. Per Rule #1, agent never promotes
      record_status from new to approved without explicit per-load user
      direction; the user chooses the cadence.

  - id: B2-HANDOFF-787-KEEP-OR-DELETE
    summary: "PSA audit hasn't scoped or deleted speculative handoff 787; do we want to drive PSA audit now or continue to defer?"
    question: >-
      Handoff 787 (work_automation.triggered → PSA) has been carried since
      2026-05-29 as a structurally-speculative row pending PSA's call. PSA
      hasn't run an audit yet. Do we queue PSA for its own b1 audit so this
      gets resolved, keep deferring, or let WORK-MGMT pre-emptively delete
      the row as out-of-scope speculation?
    options:
      - "Queue PSA audit (preferred under the audit workflow)"
      - "Continue deferring (no PSA audit yet)"
      - "Delete handoff 787 from WORK-MGMT side (treats the 2026-05-29 row as a clean-up rather than a partner-owed fix)"
    affected_handoffs:
      - {handoff_id: 787, direction: outbound, source_domain: WORK-MGMT, target_domain: PSA, trigger_event: work_automation.triggered, payload: work_automations, null_field: target_domain_module_id}
    why: >-
      Per the audit asymmetry rule, WORK-MGMT cannot fix a target-side NULL on
      a modularized partner without authoring rows on PSA's behalf. The right
      home for the fix is the PSA audit, but the deferral has now been open
      for the duration of two WORK-MGMT audits and the user may want to
      shorten the loop.

