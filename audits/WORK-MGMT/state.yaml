  - id: B1A-A4-CATALOG-UX-DOMAIN
    summary: "domains row 135 has empty catalog_tagline and catalog_description (Rule #20)"
    finding: >-
      Rule #20 A4 check fails on domain 135: both catalog_tagline and
      catalog_description are empty strings. Per Rule #20 these must be drafted
      in buyer voice (workflow + value, not analyst voice) and surfaced for
      per-row user approval before any PATCH. The draft itself is agent-solvable;
      the approval step routes through Bucket 2.
    action: >-
      Draft a single-sentence catalog_tagline and a 1-3 paragraph
      catalog_description in buyer voice (what the buyer can do with WORK-MGMT;
      do NOT enumerate handoffs, parent domains, or analyst-side market
      position). Surface to user for approval via Bucket 2 wording item, then
      PATCH /domains?id=eq.135 once approved.
    affected_entities: [domains:135]
    blocked_by:
      - {type: user_decision, ref: B2-RULE20-WORDING-A4}

  - id: B1A-M8-CATALOG-UX-MODULES
    summary: "3 domain_modules rows (149, 150, 183) have empty catalog_tagline and catalog_description (Rule #20)"
    finding: >-
      Rule #20 M8 check fails on every WORK-MGMT module: WORK-MGMT-TASK-EXEC
      (149), WORK-MGMT-GOALS-OKR (150), WORK-MGMT-INTAKE (183) all have empty
      catalog_tagline + catalog_description. Buyers select modules in
      deployments, so the module-grain copy is the surface the deploy chooser
      renders; missing copy means the modules cannot be merchandised. Same
      draft-and-surface discipline as A4.
    action: >-
      Draft 6 strings (3 module taglines + 3 module descriptions) in buyer
      voice per the Rule #20 voice rule. Surface to user via the Bucket 2
      wording item, then PATCH each /domain_modules?id=eq.<mid> row once
      approved.
    affected_modules: [149, 150, 183]
    blocked_by:
      - {type: user_decision, ref: B2-RULE20-WORDING-M8}

b1b:
  - id: B1B-PSA-787-TARGET-NULL
    summary: "outbound handoff 787 (work_automation.triggered → PSA) has NULL target_domain_module_id; PSA owes the fix"
    finding: >-
      Outbound handoff 787 (source WORK-MGMT-TASK-EXEC=149, trigger event
      work_automation.triggered, payload work_automations=246) has
      target_domain_module_id NULL. PSA IS modularized, so B10b derivation
      should resolve to whichever PSA module consumes work_automations. No PSA
      module currently declares any role on data_object 246, so the NULL is
      structural (B10b sub-case 2). Two paths: PSA loads a consumer DMDO row
      on work_automations (preferred), or PSA's audit deletes the speculative
      handoff (the 2026-05-29 reconciliation note flagged the row as too broad
      to route). Either way the fix lives on PSA's side.
    blocked_by:
      - {type: domain_audit, blocking_domain: PSA, milestone: "scope-or-delete-787-and-decide-work_automations-consumer"}
    affected_handoffs:
      - {handoff_id: 787, direction: outbound, source_domain: WORK-MGMT, target_domain: PSA, trigger_event: work_automation.triggered, payload: work_automations, null_field: target_domain_module_id}

