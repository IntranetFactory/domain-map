    rationale: "BigID, Securiti, Concentric AI model 'data perimeters' as the union of stores subject to a single policy / regulation. Distinct from data_classifications (which tags individual records). Missing-master candidate; would master under DSPM-DISCOVERY-CLASSIFICATION (233) or warrant its own module."
