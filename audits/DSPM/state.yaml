      - "(b) Bind id=51 to one of the 3 modules (specify which) and author its skill_tools; author 2 fresh skills for the others"
    why: "Rule #17 requires one system skill per module; the 3-module split makes a single cross-cutting skill incoherent. Recommendation: (a)."

