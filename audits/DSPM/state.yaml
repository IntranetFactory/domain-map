    candidate: data_access_paths
    rationale: "Cyera, Wiz, Sentra surface 'Who can access this data and how' as first-class queryable paths (identity -> role -> permission -> resource). Currently the audit walks the join graph at query time; no master record. Missing-master candidate; would master under DSPM-ACCESS-RISK (234)."
    vendor_evidence:
      - {vendor: Cyera, evidence: 1st_class}
      - {vendor: Wiz, evidence: 1st_class}
      - {vendor: Sentra, evidence: 1st_class}
    proposed_module: DSPM-ACCESS-RISK

  - id: B3-REMEDIATION-PLAYBOOKS
    candidate: remediation_playbooks
    rationale: "Cyera, Securiti, Wiz ship parameterized remediation playbooks as first-class records (bucket-public-access-revoke, IAM-overpermission-trim, KMS-key-rotate). Currently the catalog assumes ad-hoc remediation; no playbook master. Missing-master candidate; would master under DSPM-INCIDENT-REMEDIATION (235)."
    vendor_evidence:
      - {vendor: Cyera, evidence: 1st_class}
      - {vendor: Securiti, evidence: 1st_class}
