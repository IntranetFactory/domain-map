b2:
  - id: B2-MODULE-SPLIT-NOTE
    summary: "Modularization landed the 3-module variant (alt-c); confirm or request a re-split before deeper investment."
    question: "DSPM was modularized into 3 full modules (DSPM-DISCOVERY-CLASSIFICATION 233, DSPM-ACCESS-RISK 234, DSPM-INCIDENT-REMEDIATION 235), executing the audit's alt-c (classification-lineage collapsed into discovery). The original B2-S1 also offered the 4-module split (separate DSPM-CLASSIFICATION-LINEAGE) and a 5-module split (DSPM-INCIDENT + DSPM-REMEDIATION-PLAYBOOKS). Accept the 3-module shape or re-split?"
    options:
      - "(a) Accept the 3-module split as loaded"
      - "(b) Re-split DSPM-DISCOVERY-CLASSIFICATION (233) into discovery-inventory + classification-lineage (back to 4 modules)"
      - "(c) Split DSPM-INCIDENT-REMEDIATION (235) into DSPM-INCIDENT + DSPM-REMEDIATION-PLAYBOOKS (to 4 or 5 modules, with B3-REMEDIATION-PLAYBOOKS)"
    why: "Architectural intent. The loader chose a defensible 3-module shape; a re-split is cheap now (skills/lifecycle not yet authored) and expensive later."

  - id: B2-SKILL-ORPHAN
    summary: "Orphan dspm-system skill (id=51) disposition now that 3 modules exist."
    question: "How to handle the orphan system skill id=51 ('dspm-system', domain_module_id=NULL, 0 skill_tools) when authoring per-module system skills (B1A-SKILLS-PER-MODULE)?"
    options:
