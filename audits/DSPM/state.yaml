    rationale: "Wiz 'toxic combinations' feature treats multi-factor risk patterns (PII + public-exposure + over-permissive IAM) as first-class findings distinct from data_risk_scores. Missing-master candidate; would master under DSPM-ACCESS-RISK (234), sibling to data_risk_scores."
    vendor_evidence:
