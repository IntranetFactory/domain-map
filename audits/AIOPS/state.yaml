b1b: []

b2:
  - id: B2-MODULE-SPLIT
    summary: Confirm the AIOPS module split (the 2-module split is already built as the recommended option).
    question: "Keep the built 2-module split (Event Correlation: event_correlations, anomaly_detections, alert_suppression_rules; Predictive Intelligence: predictive_signals, incident_predictions, root_cause_analyses, ml_model_training_records), or restructure into 3 (add Service Health) or 4 (also split ML Model Ops)?"
    options: [a-2-module-built, b-3-module-add-service-health, c-4-module-add-ml-ops]
    why: "Grounded in vendor packaging: ServiceNow ships the 2-way Event Management vs Predictive AIOps split; BigPanda/Moogsoft/PagerDuty lead with event correlation as the standalone surface. (b) Service Health has real Datadog/Dynatrace (service_health) precedent; (c) model-ops is the separate MLOps market (Weights and Biases, MLflow), not how any AIOps suite packages it. Genuine open judgment: anomaly_detections placement (Event Correlation per Moogsoft vs Predictive per Datadog/Dynatrace/ServiceNow HLA). Changing the split restructures the built modules."

  - id: B2-TRIGGER-TOPOLOGY-PUBLISHED
    summary: Resolve mis-attributed trigger_event topology.published (id 143). DESTRUCTIVE - not executed.
    question: "topology.published is attached to event_correlations but its name/description describe service topology, a CMDB concept (service_maps), and no handoff uses it. Delete it, re-attribute it to CMDB service_maps, or keep it and rewrite the description?"
    options: [a-delete, b-reattribute-to-service_maps, c-keep-and-rewrite]
    why: "Re-attribution or delete is destructive (Rule #21); only you know whether AIOPS genuinely publishes its own topology view. Recommended: b (re-attribute to service_maps)."

  - id: B2-MLOPS-OWNERSHIP
    summary: Canonical owner of ml_model_training_records (AIOPS vs a future MLOPS domain).
    question: "Keep ml_model_training_records AIOPS-owned (MLOPS embeds it later when it lands), or move the canonical master to a future MLOPS domain and have AIOPS consume/embed it?"
    options: [a-keep-aiops-owned, b-move-to-mlops]
    why: "Vendor practice: AIOps suites (BigPanda feedback labels, Moogsoft, ServiceNow, Dynatrace baselines) keep detection-model retraining in-platform; dedicated MLOps (Weights and Biases, MLflow) governs the data-science model lifecycle, a different surface. Keep AIOps-owned; the queued MLOPS candidate can embed it later. Interacts with the (c) split in B2-MODULE-SPLIT."

  - id: B2-PATTERN-FLAG-FREEZES
    summary: Immutability freezes (has_submit_lock=true) on three masters. OVERWRITES - not executed.
    question: "Set has_submit_lock=true on ml_model_training_records (lock a training run once it commits), root_cause_analyses (lock once published), and alert_suppression_rules (lock once activated; changes require a new rule)?"
    options: [a-freeze-all-three, b-freeze-some, c-freeze-none]
    why: "Each flip overwrites a current false value (Rule #21 needs approval). Each entity is a stable artifact whose post-commit edits would corrupt an audit trail. Recommended: yes to all three."

  - id: B2-CHANNEL-SWAP
    summary: send_email / post_chat_message on the aiops-system toolset - channel-specific or generic.
    question: "The skill's notification tools are channel primitives (send_email, post_chat_message). Are they backing a specific named workflow, or generic notifications that should use the notify_person / notify_team abstraction?"
    options: [a-keep-channel-specific-name-workflow, b-swap-to-notify-abstraction]
    why: "Generic notifications should use the abstraction so the channel can change without rewiring; the built module_tools already use notify_person / notify_team. Recommended: b. (Rule #15 forbids notes-justification, so the decision surfaces here.)"

  - id: B2-H1B-PROMOTION
    summary: Promote provisional handoff_processes APQC tags to approved, and reconcile handoff 154's PCF mapping.
    question: "(a) Promote the agent_curated / discovery_substring handoff_processes tags on AIOPS cross-domain handoffs from record_status='new' to approved? (b) For handoff 154 (DATA-AI-PLAT pipeline_run.failed -> AIOPS), keep PCF process 272 (L3 IT resilience) or replace with 1302 (L4 batch monitor)?"
    options: [promote-all, promote-some, reject-pending-review, reconcile-154-as-272, reconcile-154-as-1302]
    why: "Promotion to approved (Rule #1) and PCF re-attribution (overwrite) are approval/destructive steps, never auto-applied."

b3:
  - id: B3-MARKET-SURFACE
    candidate: "correlation_rules, enrichment_pipelines, service_health_scores, alert_storms, feedback_labels, change_correlations, model_drift_alerts, escalation_policies, golden_signal_definitions"
    rationale: "Common across the flagship AIOps vendor surface (BigPanda, Moogsoft, ServiceNow ITOM, Splunk ITSI, IBM Cloud Pak for AIOps, Dynatrace Davis, PagerDuty AIOps) but absent from the AIOPS footprint. Additive; vet via a Phase 0 pass before loading."
    vendor_evidence: [BigPanda AIOps, Moogsoft, ServiceNow ITOM Event Management, Splunk IT Service Intelligence, IBM Cloud Pak for AIOps, Dynatrace Davis AI, PagerDuty AIOps]

  - id: B3-AIOPS-TO-OBS-FEEDBACK
    candidate: "Closed-loop AIOPS -> OBS feedback handoff (raise a noisy alert threshold / adjust an SLO band)"
    rationale: "The inbound OBS -> AIOPS handoffs model the forward direction heavily; the reverse closed-loop tuning signal is not modeled. Additive, non-blocking."
    vendor_evidence: [Dynatrace Davis auto-baseline tuning, BigPanda correlation feedback loop]

  - id: B3-AIOPS-TO-SOAR-OR-ITPA
    candidate: "AIOPS -> SOAR / IT-process-automation runbook execution on high-confidence root cause"
    rationale: "When an RCA is high-confidence and a runbook exists, AIOPS could trigger auto-remediation. Catalog SOAR (id 12) is security-focused; a general IT runbook target may warrant a separate ITPA candidate. Additive, needs a scoping check."
    vendor_evidence: [PagerDuty AIOps Rundeck, ServiceNow ITOM Health, Moogsoft closed-loop remediation]
