b2:
  - id: B2-MODULE-SPLIT
    summary: Pick the AIOPS module split.
    question: Which split, (a) 2-module (AIOPS-EVENT-CORRELATION + AIOPS-PREDICTIVE-INTELLIGENCE), (b) 3-module adding AIOPS-SERVICE-HEALTH once Bucket 3 service-health entities are confirmed, or (c) 4-module isolating AIOPS-ML-MODEL-OPS from AIOPS-PREDICTIVE-INTELLIGENCE?
    options: [a-2-module, b-3-module, c-4-module]
    why: M1 is the blocking failure and every per-module FK, lifecycle owner, system skill, role bundle waits on this. Choice (c) interacts with the MLOPS demarcation (B2-MLOPS) and Bucket 3 #1 candidates (model_drift_alerts, feedback_labels).

  - id: B2-TRIGGER-143
    summary: Re-attribute trigger 143 (topology.published).
    question: Currently anchored on event_correlations (93) with event_category=lifecycle. Description points at service topology, which CMDB masters via service_maps (id 79). Options, (i) DELETE (no handoff uses it); (ii) PATCH data_object_id=79 to move to CMDB ownership; (iii) keep on event_correlations and PATCH description if AIOPS exposes its own topology view.
    options: [delete, patch-to-service-maps, keep-and-rewrite-description]
    why: Naming and description mismatch the host master; only the user knows whether AIOPS genuinely publishes a topology view.

  - id: B2-MLOPS
    summary: MLOPS demarcation versus AIOPS for ml_model_training_records and related ML masters.
    question: Keep ml_model_training_records as AIOPS master with MLOPS embedded_master once MLOPS lands, or move canonical master to MLOPS and demote AIOPS to consumer or embedded_master?
    options: [keep-aiops-master, move-to-mlops]
    why: Queued MLOPS candidate is at mention_count 2 in audits/_missing-domains.md. Choice gates the AIOPS-ML-MODEL-OPS module under split option (c).

  - id: B2-PATTERN-FLAGS
    summary: Confirm pattern flag flips on AIOPS masters.
    question: Set has_submit_lock=true on ml_model_training_records (training run commits immutable), root_cause_analyses (published RCAs immutable), alert_suppression_rules (once activated, change requires a new rule)? Any other flags on event_correlations, anomaly_detections, predictive_signals, incident_predictions?
    options: [confirm-proposed, modify, decline]
    why: B4 audit defaults are all false; the proposed flips are inferred from vendor behavior but Rule #15 forbids notes-based justification, so user confirmation is the only authoritative signal.

  - id: B2-CHANNEL-SWAP
    summary: send_email and post_chat_message on aiops-system skill.
    question: Are these channel primitives backing a specific workflow (name it), or generic notifications that should swap to notify_person / notify_team?
    options: [keep-channel-specific-with-workflow, swap-to-notify-abstraction]
    why: F7 audit; channel-specific links need a workflow justification. Rule #15 forbids notes-justification, so the decision surfaces here.

  - id: B2-TAGLINE-APPROVAL
    summary: Approve catalog_tagline and catalog_description wording.
    question: Rule #20 requires user-approved buyer-voice text before any write. User to supply or approve the exact wording.
    options: [supply-text, draft-and-confirm, defer]

  - id: B2-H1B-PROMOTION-OR-RECONCILE
