b2:
  - id: B2-1
    summary: "Decide SECOPS classification: leadership-tier landing surface, master-bearing umbrella with sub-modules, or hybrid. GATES the whole build (B1A-BUILD, B1B-S1/S2/S3/S5/S6, B10b, all 14 b3 candidates)."
    question: "Is SECOPS a leadership-tier/overlay umbrella (single landing module, 0 masters, consumer DMDOs over ITSM/ITOM/DLP/DSPM masters), or should it be promoted to a master-bearing umbrella that masters the security-incident case shape?"
    options:
      - "(a) keep leadership-tier/overlay, author SECOPS-LANDING only (single module, no masters, declares consumer DMDOs on ITSM service_incidents, ITOM monitoring_events, DLP dlp_incidents, DSPM sensitive_data_incidents)."
      - "(b) promote SECOPS to a master-bearing umbrella, author SECOPS-CASE-MGMT, SECOPS-DETECTION-ENG, SECOPS-RESPONSE-OPS, SECOPS-IR-COMPLIANCE modules, master the 14 candidate masters in b3."
      - "(c) hybrid: author SECOPS-LANDING and SECOPS-CASE-MGMT now (masters security_incidents plus 2 to 3 related), defer detection-engineering and response-ops modules until the SIEM and EDR sibling domains land."
    why: "Flagship SECOPS products master first-class case, alert, detection, and rule schemas (Rule #2 point-solution-market test), and the domains.business_logic field already acknowledges algorithmic substance. But the catalog already wires SOAR/VULN-MGMT/THREAT-INTEL as parent_domain_id=11 children, which is overlay-shaped evidence. This fork shapes every b1b build item and all 14 b3 candidates."

  - id: B2-2
    summary: "Decide modeling for detection-vertical siblings (SIEM, EDR, XDR, MDR, NDR, UEBA, DFIR, BAS, SOC-AAS) under SECOPS."
    question: "Should the detection verticals load as flat top-level domains or as parent_domain_id=11 children under SECOPS?"
    options:
      - "(a) flat top-level domains, no parent-child link, SECOPS umbrella consumes from each."
      - "(b) load as parent_domain_id=11 children, mirroring the existing SOAR/VULN-MGMT/THREAT-INTEL wiring."
      - "(c) defer until the user picks 2 to 3 highest-priority detection verticals (SIEM, EDR, XDR is the minimum coherent set) and load them in a focused wave."
    why: "Catalog precedent (ITAM umbrella) and the existing SECOPS->child wiring (B2-5) both suggest parent-child. Cross-bucket dependency with B2-1 and B2-5."

  - id: B2-3
    summary: "Decide SOAR vs SECOPS-RESPONSE-OPS module scope overlap."
    question: "Where do playbook_executions and containment_actions canonically master?"
    options:
      - "(a) SOAR masters playbook_executions and containment_actions, SECOPS embedded_master or consumer."
      - "(b) SECOPS masters case-correlated execution, SOAR masters the orchestration engine itself (rule library, connector catalog, workflow templates)."
      - "(c) consolidate SOAR into SECOPS as a module (DESTRUCTIVE: would deprecate the SOAR domain row id 12; never done unapproved)."
    why: "SOAR is already a separate child domain (id 12, parent_domain_id=11). The proposed SECOPS-RESPONSE-OPS module under B2-1 option (b) overlaps materially. The answer reshapes the scope of SECOPS-RESPONSE-OPS."

  - id: B2-5
    summary: "Reconcile existing domains.parent_domain_id wiring on SOAR, VULN-MGMT, THREAT-INTEL with the B2-1 and B2-2 framing."
    question: "Does the existing parent_domain_id wiring (SOAR id 12, VULN-MGMT id 13, THREAT-INTEL id 14 all parent_domain_id=11) change the answer to B2-1 or B2-2?"
    options:
      - "(a) the existing umbrella-to-children evidence pushes toward overlay/leadership-tier (option a of B2-1), since the catalog already says SECOPS is a parent rather than a peer."
      - "(b) argue for promoting more detection verticals (SIEM, EDR, XDR, UEBA, MDR, NDR, DFIR, BAS, SOC-AAS) as parent_domain_id=11 children before answering B2-1."
      - "(c) the wiring informs B2-3 specifically, since SOAR is already declared a SECOPS child and SECOPS-RESPONSE-OPS would duplicate that scope."
    why: "The umbrella-to-children link is already partially in the catalog (3 of an eventual ~12 detection verticals). Cross-bucket dependency with B2-1, B2-2, B2-3. Independent of B1A-D1."

