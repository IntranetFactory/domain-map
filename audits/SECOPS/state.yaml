b2:
  - id: B2-1
    summary: "Decide SECOPS classification: leadership-tier landing surface, master-bearing umbrella with sub-modules, or hybrid."
    question: "Is SECOPS correctly classified as leadership-tier (per the SKILL.md B1 exception list, alongside SOAR, THREAT-INTEL, VULN-MGMT), or should it be promoted to an umbrella with sub-modules that masters the security-incident case shape?"
    options:
      - "(a) keep leadership-tier label, author SECOPS-LANDING only (single module, no masters, declares consumer DMDOs on ITSM service_incidents, ITOM monitoring_events, DLP dlp_incidents, DSPM sensitive_data_incidents)."
      - "(b) promote SECOPS to a master-bearing umbrella, author SECOPS-CASE-MGMT, SECOPS-DETECTION-ENG, SECOPS-RESPONSE-OPS, SECOPS-IR-COMPLIANCE modules, master the 14 candidate masters in Bucket 3."
      - "(c) hybrid: author SECOPS-LANDING and SECOPS-CASE-MGMT now (masters security_incidents plus 2 to 3 related), defer detection-engineering and response-ops modules until the SIEM and EDR sibling domains land and the boundary is clearer."
    why: "The B1 exception list classifies SECOPS as leadership-tier and the literal catalog state matches (0 masters, 0 modules), but flagship SECOPS vendors all master first-class case, alert, detection, and rule schemas, which is the Rule #2 point-solution-market test. The domains.business_logic field already acknowledges algorithmic substance (detection rules, correlation, ML-based anomaly detection). Cross-bucket dependency: gates all 14 B3 candidates and B1B-S1, B1B-S2, B1B-S3, B1B-S5, B1B-S6."

  - id: B2-2
    summary: "Decide modeling for detection-vertical siblings (SIEM, EDR, XDR, MDR, NDR, UEBA, DFIR, BAS, SOC-AAS) under SECOPS."
    question: "Should the detection verticals load as flat top-level domains or as parent_domain_id=11 children under SECOPS?"
    options:
      - "(a) flat top-level domains, no parent-child link, let SECOPS umbrella keep its leadership-tier label and consume from each."
      - "(b) load as parent_domain_id=11 children, expose the umbrella relationship at query time."
      - "(c) defer until the user picks 2 to 3 highest-priority detection verticals (SIEM, EDR, XDR feels like the minimum coherent set) and load them in a focused wave."
    why: "Catalog precedent (ITAM umbrella with HAM, SAM, SMP, FINOPS siblings) suggests parent-child. SOAR, VULN-MGMT, and THREAT-INTEL are already parent_domain_id=11 children of SECOPS, see B2-5. Cross-bucket dependency with B2-1 and B2-5."

  - id: B2-3
    summary: "Decide SOAR vs SECOPS-RESPONSE-OPS module scope overlap."
    question: "Where do playbook_executions and containment_actions canonically master?"
    options:
      - "(a) SOAR masters playbook_executions and containment_actions, SECOPS embedded_master or consumer."
      - "(b) SECOPS masters case-correlated execution, SOAR masters the orchestration engine itself (rule library, connector catalog, workflow templates)."
      - "(c) consolidate SOAR into SECOPS as a module (would require deprecating the SOAR domain row, destructive)."
    why: "SOAR is already a separate domain (id 12, parent_domain_id=11). The proposed SECOPS-RESPONSE-OPS module under option (b) of B2-1 would overlap materially with what SOAR masters. Independent of B2-1 mechanically, but the answer reshapes the scope of SECOPS-RESPONSE-OPS."

  - id: B2-4
    summary: "Approve buyer-voice drafting and review flow for SECOPS catalog_tagline and catalog_description."
    question: "Confirm that the buyer-voice drafting and per-row review is the preferred flow vs the user supplying the wording directly per Rule #20."
    options:
      - "(a) Agent drafts buyer-voice tagline and description in workflow-plus-value voice (detect, investigate, contain, recover, notify), user reviews exact wording before PATCH."
      - "(b) User supplies the exact wording for both columns."
      - "(c) Defer until B2-1 resolves, since the wording differs between leadership-tier landing and master-bearing umbrella."
    why: "Rule #20 requires user approval on the exact text before any write. The agent must not auto-populate these fields. Gates B1B-S4."

  - id: B2-5
    summary: "Reconcile existing domains.parent_domain_id wiring on SOAR, VULN-MGMT, THREAT-INTEL with the B2-1 and B2-2 framing."
    question: "Does the existing parent_domain_id wiring (SOAR id 12, VULN-MGMT id 13, THREAT-INTEL id 14 all parent_domain_id=11) change the answer to B2-1 or B2-2?"
    options:
      - "(a) the existing umbrella-to-children evidence pushes toward leadership-tier (option a of B2-1), since the catalog already says SECOPS is a parent rather than a peer."
      - "(b) argue for promoting more detection verticals (SIEM, EDR, XDR, UEBA, MDR, NDR, DFIR, BAS, SOC-AAS) as parent_domain_id=11 children before answering B2-1."
      - "(c) the wiring informs B2-3 specifically, since SOAR is already declared a SECOPS child and SECOPS-RESPONSE-OPS would duplicate that scope."
    why: "The 2026-05-30 audit framed the umbrella vs sibling question (B2-2) as if no parent-child wiring existed, but the umbrella to children link is already partially in the catalog (3 of an eventual ~12 detection verticals). Cross-bucket dependency with B2-1, B2-2, B2-3. Independent of B1A-D1."

