b2:
  - id: B2-S1
    summary: "Timing for DELETE of legacy oms-system skill (id 89) once OMS is built. PARTIALLY SUPERSEDED."
    question: "Original question framed the DELETE against per-module system skills landing; the per-module grain is RETIRED (2026-06-06 supersession). Reframed: once B1A-S1 builds OMS and Phase-S authors the ONE domain-grain system skill, is the legacy domain-level oms-system skill (id 89) kept as that single domain-grain skill (rename/repoint) or deleted and re-authored? DELETE is destructive (Rule #1); the agent never applies it unapproved."
    options:
      - "(a) Re-use skill 89 as the single domain-grain system skill (rename, repoint domain_id, derive toolset from domain_module_tools)"
      - "(b) DELETE skill 89 and author a fresh domain-grain system skill at build time"
      - "(c) Keep legacy as-is until build, decide at Phase-S"
    why: "Deploy-window discipline plus the supersession reframing; the agent cannot pick the user's tolerance for intermediate state, and the DELETE is destructive."

  - id: B2-S2
    summary: "Per-flag yes/no on B4 pattern-flag positive re-evaluation across the OMS workflow masters (DESTRUCTIVE: overwrites existing flag values)."
    question: "Per Rule #12 every operational_workflow master's pattern flags (has_personal_content, has_submit_lock, has_single_approver) require positive consideration. Currently only return_authorizations.has_single_approver=true. Per-flag re-evaluation candidates: return_authorizations.has_submit_lock=true once received; order_allocations.has_submit_lock=true once released; sourcing_decisions.has_submit_lock=true once fulfilled; order_allocations.has_personal_content=true IF shipping address stored on allocation row; return_authorizations.has_personal_content=true IF customer-return-reason text captured. Flipping a flag overwrites an existing (false) value, so it is destructive and needs sign-off."
    options:
      - "Per-flag yes/no on each of the 5 candidates"
    why: "Workflow-shape and storage-shape judgments; the agent does not own them. Per Rule #15, the rationale is NOT auto-written to data_objects.notes."

  - id: B2-S3
    summary: "Naming nit on return_authorizations.plural_label='Return Authorization (RMA)s' (DESTRUCTIVE: overwrites a non-empty label)."
    question: "The current plural_label pluralizes an inline acronym awkwardly. Common alternatives in retail vendor docs. The RMA / RA / Return Order synonyms now exist as data_object_aliases (loaded 2026-06-07), so the long-form can drop the inline acronym. Overwriting a non-empty label is destructive."
    options:
      - "(a) 'Return Authorizations' + rely on the RMA alias already loaded"
      - "(b) 'RMAs' as the plural_label"
      - "(c) Leave as-is"

  - id: B2-S4
    summary: "Capability-count threshold call drives the OMS module-count target. GATES THE BUILD."
    question: "B1A-S1 module count depends on B1A-S2 capability count. If A2 lands 5-8 capabilities, M2 requires >=2 modules; if <3, M2 vacuously passes with 1 module. The OMS market reads as multi-capability and multi-module (order capture, sourcing, ATP, returns, BOPIS at minimum) but the user owns the marketing-vs-engineering granularity. This is the single decision gating the entire build cascade."
    options:
      - "(a) 5-8 capabilities + 4-module split (default; OMS-ORDER-ORCHESTRATION, OMS-RETURNS, OMS-STORE-PICKUP, OMS-LOCATIONS)"
      - "(b) 3 capabilities + 2-module split (OMS-CORE-ORCHESTRATION, OMS-RETURNS-AND-PICKUP)"
      - "(c) 8+ capabilities + 4-5 modules including ATP + post-purchase"

  - id: B2-S5
    summary: "B12 config-shape confirmation for inventory_locations (425). Now CLASSIFIED entity_type='catalog'."
    question: "inventory_locations has zero lifecycle states. It was classified entity_type='catalog' on 2026-06-07 (the typed-column exemption that replaces the rescinded notes-based exemption per Rule #12), which makes the no-lifecycle shape a structural PASS. Confirm this matches intent: locations are authored once and edited inline by ops admins; the opened / capacity_threshold_breached events are signals on the location, not transitions of the location itself. Authoring states (option b) would be a re-classification."
    options:
      - "(a) Confirm catalog config-shape, no states (current state, recommended)"
      - "(b) Re-classify to a workflow shape and author 2-3 states (active, decommissioned) for the open/close cycle"
    why: "Workflow-shape judgment. Rule #12: the exemption is the typed entity_type, not a notes string."

  - id: B2-S6
    summary: "Long-term canonical mastery for inventory_locations (425)."
    question: "Default is OMS canonically masters inventory_locations inside an OMS-LOCATIONS module once B1A-S1 lands. Alternative is to defer mastery to WMS once WMS lands as a domain (Bucket 3 candidate). Or treat as IWMS-canonical with OMS holding embedded_master (unlikely; IWMS owns office/site abstract, not inventory-node)."
    options:
      - "(a) OMS canonically masters (recommended; OMS sources from inventory_locations and has the full workflow)"
      - "(b) Defer mastery to WMS once WMS lands as a domain (long lead time)"
      - "(c) IWMS-canonical with OMS holding embedded_master (unlikely)"

  - id: B2-LANG
    summary: "British spellings in non-empty OMS domain prose (DESTRUCTIVE: overwrites existing description/business_logic)."
    question: "domains.id=32 description ('fulfilment across channels') and business_logic ('fulfilment rules', 'split-shipment optimisation') use British spellings, against the American-English project rule. Both are non-empty existing values, so correcting them is a destructive overwrite and needs sign-off. Recommended fix: description -> 'Order capture, orchestration, and fulfillment across channels and inventory pools.'; business_logic -> 'Inventory allocation, sourcing/fulfillment rules, and split-shipment optimization, operations-research heavy.'"
    options:
      - "(a) Apply the American-English corrections to description + business_logic"
      - "(b) Leave as-is"
    why: "Overwriting a non-empty value is destructive (Rule #21); the agent never applies it unapproved."

b3:
  - id: B3-S1
    candidate: order_holds
    rationale: "Distinct order_hold master for payment-fraud holds, manual review holds, regulatory holds (export control), inventory holds. Currently the implicit-hold pattern is folded into order_allocations.pending state, which loses the hold-reason taxonomy and the SLA timers vendors run on holds."
    vendor_evidence: [Manhattan Active Omni, Salesforce Order Management, IBM Sterling Order Management]
    proposed_module: OMS-ORDER-ORCHESTRATION

  - id: B3-S2
    candidate: order_promises
    rationale: "The promise (delivery date / window committed to the customer) modeled separate from the sourcing decision (the operational plan to honor it). Today OMS folds both into sourcing_decisions, losing the customer-facing commitment record. Alternative name: delivery_promises."
    vendor_evidence: [Fluent Commerce, Salesforce Order Management]
    proposed_module: OMS-ORDER-ORCHESTRATION

  - id: B3-S3
    candidate: fulfillments
    rationale: "Currently mastered by B2C-COMM (data_object 388); vendor consensus in the OMS market is that fulfillment-instruction records belong to OMS (created by OMS sourcing, executed by WMS / store ops); commerce_shipments belong further downstream. The current B2C-COMM ownership is likely a pre-OMS-modular fallback. If confirmed, MIGRATE 388 to OMS-ORDER-ORCHESTRATION mastery; B2C-COMM becomes consumer."
    vendor_evidence: [NewStore Omnichannel Platform, Manhattan Active Omni, IBM Sterling Order Management]
    proposed_module: OMS-ORDER-ORCHESTRATION

