b1b: []

b2:
  - id: B2-S1
    summary: "Timing for DELETE of legacy oms-system skill (id 89) once per-module skills land."
    question: "Per F1, the legacy domain-level oms-system skill passes IF no module-level system skill exists. Once B1A-S1 lands modules and Phase-S authors per-module system skills, the legacy row becomes a DELETE candidate. Schedule the DELETE in the same load as per-module skills land, or hold it until per-module skills verify green end-to-end?"
    options:
      - "(a) DELETE legacy in the same load as per-module skills land"
      - "(b) DELETE in a follow-up load after F2 / F3 / F5 verify green on per-module skills"
      - "(c) Keep legacy as a domain-wide composite agent (rare; F1 usually means delete)"
    why: "Deploy-window discipline; the agent cannot pick the user's tolerance for intermediate coexistence state."

  - id: B2-S2
    summary: "Per-flag yes/no on B4 pattern-flag positive re-evaluation across the 5 OMS masters."
    question: "Per Rule #12 every master + required data_object's pattern flags (has_personal_content, has_submit_lock, has_single_approver) require positive consideration. Currently only return_authorizations.has_single_approver=true. Per-flag re-evaluation candidates: return_authorizations.has_submit_lock=true once received; order_allocations.has_submit_lock=true once released; sourcing_decisions.has_submit_lock=true once fulfilled; order_allocations.has_personal_content=true IF shipping address stored on allocation row; return_authorizations.has_personal_content=true IF customer-return-reason text captured."
    options:
      - "Per-flag yes/no on each of the 5 candidates"
    why: "Workflow-shape and storage-shape judgments; the agent does not own them. Per Rule #15, the rationale is NOT auto-written to data_objects.notes."

  - id: B2-S3
    summary: "Naming nit on return_authorizations.plural_label='Return Authorization (RMA)s'."
    question: "The current plural_label pluralizes an inline acronym awkwardly. Common alternatives in retail vendor docs."
    options:
      - "(a) 'Return Authorizations' + alias RMA (already on B1A-S6 list)"
      - "(b) 'RMAs' as the plural_label"
      - "(c) Leave as-is"

  - id: B2-S4
    summary: "Capability-count threshold call drives the OMS module-count target."
    question: "B1A-S1 module count depends on B1A-S2 capability count. If A2 lands 5-8 capabilities, M2 requires >=2 modules; if <3, M2 vacuously passes with 1 module. The OMS market reads as multi-capability and multi-module (order capture, sourcing, ATP, returns, BOPIS at minimum) but the user owns the marketing-vs-engineering granularity."
    options:
      - "(a) 5-8 capabilities + 4-module split (default; OMS-ORDER-ORCHESTRATION, OMS-RETURNS, OMS-STORE-PICKUP, OMS-LOCATIONS)"
      - "(b) 3 capabilities + 2-module split (OMS-CORE-ORCHESTRATION, OMS-RETURNS-AND-PICKUP)"
      - "(c) 8+ capabilities + 4-5 modules including ATP + post-purchase"

  - id: B2-S5
    summary: "B12 config-shape exemption call for inventory_locations (425); zero lifecycle states."
    question: "inventory_locations has zero lifecycle states. The master plausibly fits the no-workflow exemption (locations are authored once and edited inline by ops admins; the opened / capacity_threshold_breached events are signals on the location, not transitions of the location itself). Per Rule #15 (RESCINDED prior license), the exemption is NOT auto-populated into data_objects.notes."
    options:
      - "(a) Confirm config-shape, no states, no notes change"
      - "(b) Author 2-3 states (active, decommissioned) for the open/close cycle"
      - "(c) Supply exact data_objects.notes string and the audit fix-loop PATCHes it"

  - id: B2-S6
    summary: "Long-term canonical mastery for inventory_locations (425)."
    question: "Default is OMS canonically masters inventory_locations inside an OMS-LOCATIONS module once B1A-S1 lands. Alternative is to defer mastery to WMS once WMS lands as a domain (Bucket 3 candidate). Or treat as IWMS-canonical with OMS holding embedded_master (unlikely; IWMS owns office/site abstract, not inventory-node)."
    options:
      - "(a) OMS canonically masters (recommended; OMS sources from inventory_locations and has the full workflow)"
      - "(b) Defer mastery to WMS once WMS lands as a domain (long lead time)"
      - "(c) IWMS-canonical with OMS holding embedded_master (unlikely)"

b3:
  - id: B3-S1
    candidate: order_holds
    rationale: "Manhattan Active Omni, Salesforce Order Management, IBM Sterling all ship a distinct order_hold master for payment-fraud holds, manual review holds, regulatory holds (export control), inventory holds. Currently the implicit-hold pattern is folded into order_allocations.pending state, which loses the hold-reason taxonomy and the SLA timers vendors run on holds."
    vendor_evidence: [Manhattan Active Omni, Salesforce Order Management, IBM Sterling Order Management]
    proposed_module: OMS-ORDER-ORCHESTRATION

  - id: B3-S2
    candidate: order_promises
    rationale: "Fluent Commerce and Salesforce Order Management explicitly model the promise as separate from the sourcing decision: the promise commits a delivery date / window to the customer; the sourcing decision is the operational plan to honor it. Today OMS folds both into sourcing_decisions, losing the customer-facing commitment record. Alternative name: delivery_promises."
    vendor_evidence: [Fluent Commerce, Salesforce Order Management]
    proposed_module: OMS-ORDER-ORCHESTRATION

  - id: B3-S3
    candidate: fulfillments
    rationale: "Currently mastered by B2C-COMM (data_object 388); vendor consensus in the OMS market is that fulfillment-instruction records belong to OMS (they're created by OMS sourcing, executed by WMS / store ops); commerce_shipments belong further downstream. The current B2C-COMM ownership is likely a pre-OMS-modular fallback. If confirmed, MIGRATE 388 to OMS-ORDER-ORCHESTRATION mastery; B2C-COMM becomes consumer."
    vendor_evidence: [NewStore Omnichannel Platform, Manhattan Active Omni, IBM Sterling Order Management]
    proposed_module: OMS-ORDER-ORCHESTRATION

  - id: B3-S4
    candidate: order_audit_events
    rationale: "Oracle NetSuite, Salesforce Order Management, IBM Sterling all carry an order_history / order_audit log distinct from generic system audit; it captures every state transition with operator, reason, and supporting documents. PCI-DSS and customer-dispute workflows require this."
    vendor_evidence: [Oracle NetSuite, Salesforce Order Management, IBM Sterling Order Management]
    proposed_module: OMS-ORDER-ORCHESTRATION

  - id: B3-R1
    candidate: GDPR_domain_regulations_row_for_OMS
    rationale: "GDPR already loaded catalog-wide; OMS lacks a domain_regulations row. Customer PII on orders (shipping address, contact, payment surrogate) puts OMS squarely in GDPR scope."
    vendor_evidence: [all major OMS vendors carry GDPR documentation]

  - id: B3-R2
    candidate: CCPA_CPRA_regulation_link
    rationale: "California Consumer Privacy Act / CPRA applies to order data for California consumers. US-focused OMS vendors call it out explicitly."
    vendor_evidence: [Salesforce Order Management, Oracle NetSuite]

  - id: B3-R3
    candidate: Section_321_Type_86_de_minimis_filings
    rationale: "DTC cross-border orders below USD 800 threshold and the customs filings around them. International-shipping-aware OMS vendors document the workflow."
    vendor_evidence: [Fluent Commerce, ShipBob OMS]

  - id: B3-R4
    candidate: EU_Omnibus_Directive
    rationale: "Refund timelines and consumer-rights surface on returns. Returns-focused OMS vendors document the obligation."
    vendor_evidence: [Salesforce Order Management]

  - id: B3-R5
    candidate: DAC7_marketplace_seller_reporting
    rationale: "Marketplace seller reporting in EU; relevant for OMS instances backing marketplace operations."
    vendor_evidence: [marketplace-aware OMS vendors only]

  - id: B3-M1
    candidate: OMS-SOURCING-ENGINE module split
    rationale: "If order_promises lands as a separate master from sourcing_decisions (B3-S2), a sub-module dedicated to the engine (rate-shop, carrier comparison, multi-node split optimization) becomes plausible. Pushes the B1A-S1 4-module proposal to 5."
    vendor_evidence: [Fluent Commerce, Manhattan Active Omni]

  - id: B3-M2
    candidate: OMS-RETURNS depth re-shape once RETURNS-MGMT lands as a domain
    rationale: "Once RETURNS-MGMT lands (candidate-domain queue entry from this audit), OMS-RETURNS may become a thinner OMS-side surface focused on the RMA / restock workflow, with the full returns experience (self-serve portal, exchange-first incentives, in-store drop-off network) hosting in RETURNS-MGMT."
    vendor_evidence: [Loop Returns, Happy Returns, Narvar Return and Exchange]

  - id: B3-D1
    candidate: RETURNS-MGMT candidate domain
    rationale: "Returns Management and Reverse Logistics Orchestration. Adjacent to OMS (RMA workflow is the OMS-RETURNS contact surface), B2C-COMM (self-serve return portal), CSM (case-driven returns), ERP-FIN (refund accounting). Goes through audits/_missing-domains.md triage."
    vendor_evidence: [Loop Returns, Happy Returns, Narvar Return and Exchange, AfterShip Returns, ReturnGO, Returnly]

  - id: B3-D2
    candidate: CARRIER-MGMT candidate domain
    rationale: "Multi-Carrier Shipping and Rate-Shop API. Adjacent to OMS (sourcing-decision rate-shop calls out to a carrier API), B2C-COMM (checkout-time delivery options), INV-MGMT (fulfillment-time label printing)."
    vendor_evidence: [ShipStation, ShipEngine, EasyPost, Shippo, Sendcloud, Stamps.com, ProShip, Logistyx, ShipperHQ]

  - id: B3-D3
    candidate: POST-PURCHASE candidate domain
    rationale: "Post-Purchase Experience and Branded Order Tracking. Adjacent to OMS (post-allocation status surface), B2C-COMM (branded tracking pages), CSM (delivery exception triage), CRM and MA (post-purchase upsell)."
    vendor_evidence: [AfterShip, Narvar Track, Route, parcelLab, Wonderment, Malomo, Shop App tracking]

  - id: B3-D4
    candidate: WMS candidate domain
    rationale: "Warehouse Management System. Adjacent to OMS (picking and packing layer that consumes OMS sourcing decisions), INV-MGMT, SCP. Re-surfaced from prior audits; mention_count now 2."
    vendor_evidence: [Manhattan WMS, Blue Yonder WMS, Korber One Warehouse, Softeon WMS, HighJump, Logiwa]
