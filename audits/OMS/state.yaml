b1a:
  - id: B1A-S1
    summary: "Author OMS module set; zero domain_modules rows exist on domain_id=32 (M1 hard fail)."
    finding: "OMS has zero domain_modules rows. The 5 OMS masters (order_allocations 424, inventory_locations 425, sourcing_decisions 426, return_authorizations 427, store_pickup_orders 428) live entirely in the legacy domain_data_objects rollup. Without modules, the deployer cannot find canonical owners; every B-band DMDO check returns vacuous; M2 / M4 / M5 / M6 / M7 / M8 cannot run; E1 / E2 / E3 cannot run; F2 / F5 cannot run; the per-master indirect coverage sweep S2 is empty."
    action: "Author the OMS module set. Default proposal pending B2-S4 capability-count call: 4-module split aligned to the workflow-bearing masters: OMS-ORDER-ORCHESTRATION mastering order_allocations + sourcing_decisions; OMS-RETURNS mastering return_authorizations; OMS-STORE-PICKUP mastering store_pickup_orders; OMS-LOCATIONS as a configuration module mastering inventory_locations. Alternative 2-module compromise: OMS-CORE-ORCHESTRATION + OMS-RETURNS-AND-PICKUP. User picks granularity at B2-S4 before the loader runs. Once modules exist, the B-band re-runs to populate domain_module_data_objects master rows on each module, demoting the legacy domain_data_objects rollup."
    affected_masters:
      - {data_object_id: 424, name: order_allocations, target_module_id: null, workflow: order-orchestration}
      - {data_object_id: 425, name: inventory_locations, target_module_id: null, workflow: location-config}
      - {data_object_id: 426, name: sourcing_decisions, target_module_id: null, workflow: order-orchestration}
      - {data_object_id: 427, name: return_authorizations, target_module_id: null, workflow: returns}
      - {data_object_id: 428, name: store_pickup_orders, target_module_id: null, workflow: store-pickup}
    blocked_by:
      - {type: user_decision, ref: B2-S4}
    extra_proposed_module_codes: [OMS-ORDER-ORCHESTRATION, OMS-RETURNS, OMS-STORE-PICKUP, OMS-LOCATIONS]

  - id: B1A-S2
    summary: "Link 5-8 capabilities to OMS via capability_domains; A2 hard fail (zero rows)."
    finding: "Zero capability_domains rows for OMS (domain_id=32). The market has 5-8 standard capability shapes: order capture, distributed order orchestration, sourcing and rate-shop, available-to-promise (ATP) computation, returns and reverse logistics, omnichannel fulfillment (BOPIS / ship-from-store / curbside), post-purchase order status."
    action: "Author 6-8 capabilities rows plus capability_domains linking each to OMS. Apply Cross-cutting capability convention for capabilities that span >=3 domains: order-capture shared with B2C-COMM; available-to-promise shared with INV-MGMT; returns adjacent to CSM. Bundle into Phase A loader alongside B1A-S1 once B2-S4 lands the capability-count target."
    blocked_by:
      - {type: user_decision, ref: B2-S4}
      - {type: prerequisite_entity, ref: B1A-S1}
    extra_candidate_capability_codes: [order-capture, distributed-order-orchestration, sourcing-and-rate-shop, available-to-promise, returns-and-reverse-logistics, omnichannel-fulfillment, post-purchase-order-status]

  - id: B1A-S3
    summary: "Draft buyer-voice catalog_tagline + catalog_description for the OMS domain row; A4 fail."
    finding: "domains.id=32 carries catalog_tagline='' and catalog_description=''. Per Rule #20 these are buyer-voice (workflow + value) fields, not analyst-voice market positioning."
    action: "Draft a single-sentence buyer-facing tagline and a 1-3 paragraph buyer-facing description. Surface both drafts to the user for review BEFORE the PATCH. Once a non-empty value exists in either column, no overwrite without explicit per-row approval. Recommended tagline shape: 'Capture orders from any channel, route them to the right inventory node, and orchestrate everything from sourcing to returns in one place.'"
    extra_voice: buyer

  - id: B1A-S4
    summary: "Author 5 intra-OMS + 3-4 cross-domain data_object_relationships rows; B6 hard fail + B8 partial."
    finding: "Zero intra-OMS data_object_relationships rows among the 5 masters. Only 3 catalog rows touch OMS masters: 454 return_authorizations opens customer_cases, 455 order_allocations opens customer_cases, 971 inv_stock_balances informs_atp_of order_allocations. Workflow-shape implies 5 intra-domain edges (sourcing_decisions relates_to order_allocations, order_allocations stages_pickup_for store_pickup_orders, inventory_locations sources_for order_allocations, return_authorizations originates_from order_allocations, store_pickup_orders staged_at inventory_locations) and 3-4 cross-domain edges (order_allocations triggers_credit_memo_for credit_memos in ERP-FIN, sourcing_decisions informs_promise_for commerce_orders in B2C-COMM, store_pickup_orders fulfills commerce_orders in B2C-COMM, return_authorizations refunds commerce_orders in B2C-COMM)."
    action: "Pre-specify the full per-row tuple (data_object_id, related_data_object_id, relationship_verb, inverse_verb, relationship_type, relationship_kind, is_required, owner_side) for each of the 5 intra + 3-4 cross-domain edges. Surface to user as a Phase-B preview, then load via a small loader. Cross-domain edges into B2C-COMM point at masters (commerce_orders 381, order_lines 382) that B2C-COMM has not yet canonically DMDO-mastered; flag the dependency in B2C-COMM's audit."
    blocked_by:
      - {type: depends_on, ref: B1A-S1, reason: "cross-domain edges to B2C-COMM masters are stronger once OMS modules exist"}
      - {type: domain_audit, blocking_domain: B2C-COMM, milestone: "DMDO master rows for commerce_orders and order_lines"}

  - id: B1A-S5
    summary: "Load 4-6 Rule #10 users edges against OMS masters; B7 hard fail."
    finding: "Zero data_object_relationships rows linking any OMS master to the platform_builtin users row. Expected minimum: order_allocations (allocator / operator), return_authorizations (approver per the approve_return permission_verb_override and intake clerk on received), sourcing_decisions (operator override per the sourcing_decision.overridden event already loaded), store_pickup_orders (picker, customer-service contact on expiration)."
    action: "Pre-specify verb / inverse_verb tuples per master per role (allocator/allocated_by, approver/approved_by, intake_clerk/received_by, picker/picked_by, etc.), then INSERT 4-6 rows pointing to the kind='platform_builtin' users row. Bundled into the same loader as B1A-S4."
    affected_masters:
      - {data_object_id: 424, name: order_allocations, target_module_id: null, workflow: allocator-or-operator}
      - {data_object_id: 426, name: sourcing_decisions, target_module_id: null, workflow: operator-override}
      - {data_object_id: 427, name: return_authorizations, target_module_id: null, workflow: approver-and-intake-clerk}
      - {data_object_id: 428, name: store_pickup_orders, target_module_id: null, workflow: picker-and-customer-service}

  - id: B1A-S6
    summary: "Author 12-20 data_object_aliases rows across the 5 OMS masters; B11 hard fail."
    finding: "Zero data_object_aliases rows on any of the 5 OMS masters. Each has 3-5 vendor synonyms in flagship docs."
    action: "Author per-master alias rows with alias_type pre-specified per row. Strings: order_allocations (Order Reservation, Inventory Reservation, Commitment, Allocation Line); inventory_locations (Node, Network Node, Facility, Store, Fulfillment Node, Dark Store); sourcing_decisions (Routing Decision, Allocation Plan, Fulfillment Plan, Sourcing Trail); return_authorizations (RMA, RA, Return, Return Order); store_pickup_orders (BOPIS Order, Click and Collect, Curbside Order, In-Store Pickup). Per-row alias_type needs the audit to pre-specify before the technical allow-list can carry the bulk insert."
    affected_entities: [order_allocations, inventory_locations, sourcing_decisions, return_authorizations, store_pickup_orders]
    extra_alias_count_target: "12-20 rows"

  - id: B1A-S8
    summary: "PATCH data_object_lifecycle_states.id=347 domain_module_id once OMS-RETURNS module exists; B12 partial."
    finding: "Single requires_permission=true lifecycle state (return_authorizations.approved, id 347, permission_verb_override='approve_return') carries domain_module_id=null. Once B1A-S1 lands an OMS-RETURNS module mastering return_authorizations (data_object_id 427), this row needs domain_module_id patched so the materialized permission prefix is oms-returns:approve_return rather than domain-level."
    action: "Single-row PATCH after B1A-S1. Bundled into the post-module fix-loop. If B2-S2 promotes additional states to requires_permission=true, the same PATCH applies to each promoted row."
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-S1}

  - id: B1A-S9
    summary: "PATCH skill_tools.id=718 from send_email to notify_person on legacy oms-system skill; F7 fail."
    finding: "Legacy skill 89 (oms-system) links tool 37 send_email (side_effect, coverage_tier=platform) directly via skill_tools.id=718 with no notes justification. Per the Channel vs capability authoring rule, default for generic notifications is notify_person. The notifications OMS sends (allocation-failed customer alerts, RMA-issued confirmations, BOPIS-ready notifications, BOPIS-expired notifications) are not channel-specific by workflow contract; they substitute fine over SMS, push, or chat depending on deployment. Tool 913 notify_person already exists at coverage_tier=platform."
    action: "PATCH skill_tools.id=718 tool_id from 37 to 913. Once B1A-S1 lands per-module skills and B2-S1 picks (a), the legacy skill itself gets deleted per F1 and this PATCH becomes moot; sequence per B2-S1 outcome."
    blocked_by:
      - {type: user_decision, ref: B2-S1}

  - id: B1A-S10
    summary: "Schedule b1 audits on B2C-COMM, ERP-FIN, CSM to resolve FK gaps on OMS handoffs; B10 + B10b + B5 report-only."
    finding: "13 of 15 outbound rows carry NULL target_domain_module_id (other domains' B10b audit work: B2C-COMM 6, ERP-FIN 5, CSM 3, plus 1 already populated to CRM-ACCT-MGT 46). 2 inbound from B2C-COMM (322 + 502) carry NULL source_domain_module_id (B2C-COMM B9 / B10b). 2 inbound from INV-MGMT (1051 + 1052) carry NULL target_domain_module_id (own work, gated by B1A-S1). Plus 2 broken-pointer DMDO rows on INV (id 248 inventory_locations embedded_master + required at INV-CORE-STOCK 61; id 256 order_allocations consumer + required at INV-REPLENISHMENT 62) need OMS's own master DMDO rows to land."
    action: "Schedule b1 audits on B2C-COMM, ERP-FIN, CSM. Report-only from OMS's perspective; nothing derivable from existing OMS modules. INV-MGMT B5 resolves automatically once OMS B1A-S1 lands the master rows."
    affected_handoffs:
      - {handoff_id: 981, direction: outbound, source_domain: OMS, target_domain: ERP-FIN, trigger_event: inventory_location.opened, payload: inventory_locations, null_field: target_domain_module_id}
      - {handoff_id: 982, direction: outbound, source_domain: OMS, target_domain: B2C-COMM, trigger_event: inventory_location.capacity_threshold_breached, payload: inventory_locations, null_field: target_domain_module_id}
      - {handoff_id: 983, direction: outbound, source_domain: OMS, target_domain: ERP-FIN, trigger_event: order_allocation.created, payload: order_allocations, null_field: target_domain_module_id}
      - {handoff_id: 984, direction: outbound, source_domain: OMS, target_domain: B2C-COMM, trigger_event: order_allocation.created, payload: order_allocations, null_field: target_domain_module_id}
      - {handoff_id: 985, direction: outbound, source_domain: OMS, target_domain: CSM, trigger_event: order_allocation.failed, payload: order_allocations, null_field: target_domain_module_id}
      - {handoff_id: 986, direction: outbound, source_domain: OMS, target_domain: B2C-COMM, trigger_event: order_allocation.reassigned, payload: order_allocations, null_field: target_domain_module_id}
      - {handoff_id: 987, direction: outbound, source_domain: OMS, target_domain: CSM, trigger_event: return_authorization.issued, payload: return_authorizations, null_field: target_domain_module_id}
      - {handoff_id: 988, direction: outbound, source_domain: OMS, target_domain: ERP-FIN, trigger_event: return_authorization.received, payload: return_authorizations, null_field: target_domain_module_id}
      - {handoff_id: 990, direction: outbound, source_domain: OMS, target_domain: B2C-COMM, trigger_event: sourcing_decision.computed, payload: sourcing_decisions, null_field: target_domain_module_id}
      - {handoff_id: 991, direction: outbound, source_domain: OMS, target_domain: ERP-FIN, trigger_event: sourcing_decision.computed, payload: sourcing_decisions, null_field: target_domain_module_id}
      - {handoff_id: 992, direction: outbound, source_domain: OMS, target_domain: CSM, trigger_event: sourcing_decision.overridden, payload: sourcing_decisions, null_field: target_domain_module_id}
      - {handoff_id: 993, direction: outbound, source_domain: OMS, target_domain: B2C-COMM, trigger_event: store_pickup_order.ready, payload: store_pickup_orders, null_field: target_domain_module_id}
      - {handoff_id: 995, direction: outbound, source_domain: OMS, target_domain: ERP-FIN, trigger_event: store_pickup_order.expired, payload: store_pickup_orders, null_field: target_domain_module_id}
      - {handoff_id: 322, direction: inbound, source_domain: B2C-COMM, target_domain: OMS, trigger_event: commerce_order.placed, payload: commerce_orders, null_field: source_domain_module_id}
      - {handoff_id: 502, direction: inbound, source_domain: B2C-COMM, target_domain: OMS, trigger_event: order_line.added, payload: order_lines, null_field: source_domain_module_id}
