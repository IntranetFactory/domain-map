  - id: B1B-A5-RETIRE-OR-UPGRADE
    summary: Retire or upgrade the existing `discovery_substring` tag on handoff 312 once B2-HANDOFF-312-FATE resolves.
    finding: |
      Handoff 312 carries a `discovery_substring` `handoff_processes` row pointing at PCF 823 (`Plan for preventive maintenance`). The tag's validity depends on whether handoff 312 itself stays (its trigger_event 304 / payload 380 sit on a FLEET-MAINT-mastered data_object that TELEMATICS does not model). If 312 is retired or re-pointed, the tag becomes moot.
    blocked_by:
