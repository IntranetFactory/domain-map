    finding: |
      Zero `data_object_lifecycle_states` rows. B12 fails Rule #12. Four masters have real workflow: `dashcam_events` (flagged -> reviewed -> coached -> archived), `driver_behavior_events` (similar), `eld_logs` (active -> certified -> auditor_locked), `driver_safety_scorecards` (recompute cadence) - all on module 307. The other four (`gps_waypoints` 731, `idle_events` 732, `geofence_events` 733, `vehicle_trips` 375; module 306) are append-only telemetry and qualify for the config-shape exemption (surface to user; do NOT auto-populate `data_objects.notes` per Rule #15).
