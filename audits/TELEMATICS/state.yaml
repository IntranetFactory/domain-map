      Zero alias rows for any TELEMATICS master. B11 fails. The vendor lexicon supplies clear synonyms: `eld_logs` -> "HOS Logs" / "Driver Logs"; `dashcam_events` -> "Video Events" / "Risk Triggers"; `driver_behavior_events` -> "Safety Events" / "DriveCam Events"; `vehicle_trips` -> "Drives" / "Routes"; `driver_safety_scorecards` -> "CSA Scores" / "Driver Scores".
