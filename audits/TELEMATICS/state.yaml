      Live `/domain_modules?domain_id=eq.148` returns zero rows. Rule #14 requires >=1 module on every domain and >=2 full modules on domains with >=3 capabilities (TELEMATICS has 6). M1, M2, M6 all hard-fail. Every downstream B-band (B1-S6, S8, S10, S11, M1-M5, R1-R10, X1-X3, B1-B5), every E-band role wiring, and the F2 module-scoped system skill load all depend on the module set existing first.
    blocked_by:
      - {type: user_decision, ref: B2-MODULE-SPLIT}
    affected_modules: []
    extra_proposed_split: "TELEMATICS-FLEET-TRACKING (vehicle_trips, gps_waypoints, idle_events, geofence_events; capabilities TEL-GPS-TRACKING/TEL-GEOFENCING/TEL-VEHICLE-DIAG; embedded-masters fleet_vehicles + fleet_drivers) and TELEMATICS-COMPLIANCE-SAFETY (eld_logs, dashcam_events, driver_behavior_events, driver_safety_scorecards; capabilities TEL-ELD-HOS/TEL-DRIVER-BEHAVIOR/TEL-DASHCAM-VIDEO; embedded-master fleet_drivers; hosts FMCSA Part 395/396 + Lytx-style video review)"

