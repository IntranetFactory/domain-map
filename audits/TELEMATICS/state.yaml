    candidate: AG-TELEMATICS (new candidate domain)
    rationale: |
      FMIS inbound handoffs 966 + 968 on agricultural payloads (`variable_rate_prescriptions`, `machinery_telemetry_records`) land on TELEMATICS with no declared role. The FMIS subscriber was probably a hypothetical AG-TELEMATICS sibling, not vehicle telematics. Phase 0 research would enumerate flagship vendors (John Deere Operations Center, Trimble Ag, AGCO Fuse, Topcon Ag, CNH Industrial AFS Connect) and confirm whether the candidate warrants a `domains` row. Coordinated with B2-FMIS-INBOUND-ROUTING.
    vendor_evidence:
      - John Deere Operations Center
      - Trimble Ag
      - AGCO Fuse
      - Topcon Ag
      - CNH Industrial AFS Connect
    proposed_module: null

