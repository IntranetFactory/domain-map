    blocked_by:
      - {type: catalog_addition, scope: modules, trigger: "relationship-authoring pass (out of modularization scope; module FKs now exist)"}
    extra_proposed_edges:
      - {verb: "composes/composed_of", source: gps_waypoints, target: vehicle_trips, cardinality: many_to_one, required: true}
      - {verb: "surfaces/surfaced_by", source: vehicle_trips, target: driver_behavior_events, cardinality: one_to_many, required: false}
      - {verb: "surfaces/surfaced_by", source: vehicle_trips, target: idle_events, cardinality: one_to_many, required: false}
      - {verb: "surfaces/surfaced_by", source: vehicle_trips, target: geofence_events, cardinality: one_to_many, required: false}
      - {verb: "composes/composed_of", source: vehicle_trips, target: eld_logs, cardinality: many_to_one, required: true}
      - {verb: "feeds/fed_by", source: driver_behavior_events, target: driver_safety_scorecards, cardinality: many_to_one, required: true}
