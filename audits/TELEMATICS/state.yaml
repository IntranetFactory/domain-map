b2:
  - id: B2-PERSONAL-CONTENT-SCOPE
    summary: Decide pattern-flag `has_personal_content` scope on the position-telemetry masters.
    question: Should `has_personal_content` be true on all 8 masters (strict privacy reading), only on the 4 driver-attributed masters (376/377/378/734), or only on the dashcam + behavior pair (operational reading)?
    options:
      - all-8-personal
      - 4-driver-attributed-only
      - dashcam-and-behavior-only
    why: |
      Position telemetry is personal data under GDPR / CCPA when tied to an identified driver. Vendor practice varies; the catalog needs an explicit answer per Rule #12's positive re-evaluation requirement. Gates B1B-S3.

  - id: B2-LIFECYCLE-EXEMPTIONS
    summary: Confirm the 4 config-shape lifecycle exemptions on the position-telemetry masters.
    question: Are `vehicle_trips` (375), `gps_waypoints` (731), `idle_events` (732), `geofence_events` (733) all append-only telemetry that may skip lifecycle states (config-shape exemption), leaving only the 4 module-307 masters to get state machines?
    options:
      - confirm-4-exemptions
      - require-states-on-some
    why: |
      Rule #12 wants every master either to carry lifecycle states or to be a justified config-shape exemption. Gates B1B-S8.

  - id: B2-DVIR-OWNERSHIP
    summary: Decide canonical ownership of DVIR (driver vehicle inspection reports).
    question: New `dvir_inspections` under TELEMATICS-COMPLIANCE-SAFETY (307) keeping FLEET-MGMT `vehicle_inspections` for periodic PMI, OR extend FLEET-MGMT `vehicle_inspections` with a `kind` discriminator, OR move ownership of `vehicle_inspections` to TELEMATICS?
    options:
      - new-dvir-inspections-under-telematics
      - extend-fleet-mgmt-vehicle-inspections-with-kind
      - move-vehicle-inspections-to-telematics
    why: |
      Vendor practice treats DVIR (driver pre/post-trip) and PMI (mechanic-completed) as distinct workflows; recommended option is the first. Gates B1B-M1 (dvir_inspections).

  - id: B2-NOTIFY-TEAM-COVERAGE-TIER
    summary: Cross-catalog resolution of `notify_team.coverage_tier` blocks Phase-S authoring for TELEMATICS modules.
    question: What is the current `notify_team.coverage_tier` and `notify_person.coverage_tier`, and when does the platform-vs-external classification land?
    options:
      - confirm-current-state
      - escalate-to-platform-team
    why: |
      TELEMATICS skills will plausibly link both abstractions (safety-manager alert, dispatch broadcast). The coverage_tier flip drives whether the skill rolls up as platform-covered or external. Same blocker as ATS audit; resolution is catalog-wide, not per-domain.

  - id: B2-EVENT-CATEGORY-CONFIRMATION
    summary: Confirm the 5 event_category values the 2026-05-31 continuation wrote.
    question: Are `gps_waypoint.recorded=lifecycle`, `idle_event.detected=threshold`, `geofence.crossed=threshold`, `safety_scorecard.updated=state_change`, `fleet_vehicle.mileage_milestone_reached=threshold` the right values? If not, reverse-PATCH applies.
    options:
      - confirm-as-written
      - amend-named-rows
    why: |
      The 2026-05-30 audit framed the mapping as a recommendation; the 2026-05-31 continuation applied it. User confirmation closes the loop.

  - id: B2-FMIS-INBOUND-ROUTING
    summary: Decide the routing fate of FMIS inbound handoffs 966 + 968 on agricultural payloads.
    question: Drop both as mis-routed (FMIS subscriber should target a hypothetical AG-TELEMATICS), add `consumer` DMDOs on TELEMATICS modules so the dependency is captured cross-vertically, or queue AG-TELEMATICS as a candidate domain?
    options:
      - drop-as-mis-routed
      - add-consumer-dmdos-cross-vertical
      - queue-ag-telematics-candidate
    why: |
      Agricultural-machinery telemetry sits between agronomy / FMIS and a hypothetical AG-TELEMATICS sibling. Coordinated with B3-AG-TELEMATICS.

  - id: B2-HANDOFF-312-FATE
    summary: Decide the fate of handoff 312 + trigger_event 304 (`preventive_maintenance.due` on `preventive_maintenance_schedules`).
    question: DELETE handoff 312 + trigger_event 304 (likely intent is `fleet_vehicle.mileage_milestone_reached` already covered by handoff 881), re-point trigger_event 304's `data_object_id` to a TELEMATICS-mastered entity, or leave with a debt-flag?
    options:
      - delete-handoff-and-event
      - re-point-trigger-event
      - leave-with-debt-flag
    why: |
      Payload 380 (`preventive_maintenance_schedules`) is FLEET-MAINT-mastered; TELEMATICS does not model the entity. Likely modeling debt from a pre-modular load. Gates B1B-A5.

b3:
  - id: B3-IFTA-JURISDICTION-SUMMARIES
    candidate: ifta_jurisdiction_summaries
    rationale: |
      IFTA (International Fuel Tax Agreement) requires quarterly per-jurisdiction mile / fuel summaries derived from GPS traces plus fuel transactions. A missing-master candidate for TELEMATICS-FLEET-TRACKING (306): TELEMATICS owns the jurisdiction-segmented mileage source (`vehicle_trips` already records jurisdictions for IFTA) but no aggregate master exists. Bridges to FLEET-MGMT `fuel_transactions`.
    vendor_evidence:
      - {vendor: Geotab, evidence: 1st_class}
      - {vendor: Samsara, evidence: 1st_class}
      - {vendor: Verizon Connect, evidence: 1st_class}
      - {vendor: Motive, evidence: 1st_class}
    proposed_module: TELEMATICS-FLEET-TRACKING
  - id: B3-FAULT-CODES
    candidate: fault_codes
    rationale: |
      Engine / DTC fault data via OBD-II / J1939 is exposed by 5/5 flagship vendors and underpins the TEL-VEHICLE-DIAG capability (415) already placed on TELEMATICS-FLEET-TRACKING (306). The capability is mastered but its anchor entity (per-vehicle fault-code record) is missing - a clean missing-master candidate.
    vendor_evidence:
      - {vendor: Samsara, evidence: 1st_class}
      - {vendor: Geotab, evidence: 1st_class}
      - {vendor: Motive, evidence: 1st_class}
      - {vendor: Verizon Connect, evidence: 1st_class}
      - {vendor: Lytx, evidence: 1st_class}
    proposed_module: TELEMATICS-FLEET-TRACKING
  - id: B3-DRIVER-COACHING-SESSIONS
    candidate: driver_coaching_sessions
    rationale: |
      Lytx, Samsara, Motive all formalize the coaching workflow that follows a `driver_behavior_event.triggered`. A missing-master candidate for TELEMATICS-COMPLIANCE-SAFETY (307): joins `driver_behavior_events` -> `users` (coach) with date, outcome, video evidence. Underwriter-required for ISO 39001 / fleet-insurance discount programs.
    vendor_evidence:
      - {vendor: Lytx, evidence: 1st_class}
      - {vendor: Samsara, evidence: 1st_class}
      - {vendor: Motive, evidence: 1st_class}
    proposed_module: TELEMATICS-COMPLIANCE-SAFETY
  - id: B3-HOS-CERTIFICATIONS
    candidate: hos_certifications
    rationale: |
      FMCSA Part 395.20 requires the driver to certify each day's HOS log - a distinct workflow / master from `eld_logs` (the raw log). Missing-master candidate for TELEMATICS-COMPLIANCE-SAFETY (307).
    vendor_evidence:
      - {vendor: Motive, evidence: 1st_class}
      - {vendor: Samsara, evidence: 1st_class}
      - {vendor: Geotab, evidence: 1st_class}
    proposed_module: TELEMATICS-COMPLIANCE-SAFETY
  - id: B3-AG-TELEMATICS
    candidate: AG-TELEMATICS (new candidate domain)
    rationale: |
      FMIS inbound handoffs 966 + 968 on agricultural payloads (`variable_rate_prescriptions`, `machinery_telemetry_records`) land on TELEMATICS with no declared role. The FMIS subscriber was probably a hypothetical AG-TELEMATICS sibling, not vehicle telematics. Phase 0 research would enumerate flagship vendors and confirm whether the candidate warrants a `domains` row. Coordinated with B2-FMIS-INBOUND-ROUTING.
    vendor_evidence:
      - John Deere Operations Center
      - Trimble Ag
      - AGCO Fuse
      - Topcon Ag
      - CNH Industrial AFS Connect
    proposed_module: null
  - id: B3-DRIVER-MESSAGES
    candidate: driver_messages (dispatch messaging)
    rationale: |
      Samsara, Motive, Verizon Connect all surface driver-dispatch chat as a feature. Possible scope-creep into a FLEET-DISPATCH candidate (TMS-shaped) rather than TELEMATICS. Phase 0 research would confirm.
    vendor_evidence:
      - Samsara
      - Motive
      - Verizon Connect
    proposed_module: null
  - id: B3-VEHICLE-ENV-SENSORS
    candidate: vehicle_environmental_sensors (cargo temperature, door open, asset trailer)
    rationale: |
      Samsara and Geotab promote IoT / cold-chain telemetry as a tier; often a separate module rather than a sibling of `gps_waypoints`. Phase 0 research determines whether this becomes a TELEMATICS module or a sibling domain.
    vendor_evidence:
      - Samsara
      - Geotab
    proposed_module: null
  - id: B3-ROUTE-EXECUTIONS
    candidate: route_executions (planned-vs-actual route reconciliation)
    rationale: |
      Verizon Connect Reveal and Samsara surface route planning + execution comparisons. Canonical owner ambiguous between TELEMATICS and a TMS / FLEET-DISPATCH candidate.
    vendor_evidence:
      - Verizon Connect
      - Samsara
    proposed_module: null
