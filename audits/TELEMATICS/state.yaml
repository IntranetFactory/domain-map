b1a:
  - id: B1A-A4-CATALOG-UX
    summary: Draft buyer-voice catalog_tagline + catalog_description on the TELEMATICS domain row and surface to user before write (Rule #20).
    finding: |
      Live `/domains?id=eq.148` returns empty `catalog_tagline` and `catalog_description`. A4 fails per Rule #20: every domain row needs a one-sentence buyer-voice tagline (workflow + value) plus a 1-3 paragraph buyer-voice description for the catalog landing page. The drift query is independent of the M-band modularization decision (module-level UX copy lives on `domain_modules.catalog_*` and is owed once the modules land, per M8).
    action: |
      Draft both fields in buyer voice ("Live vehicle tracking, HOS compliance, and driver-safety telemetry from one connected fleet platform" shape per the 2026-05-30 audit's recommendation), surface to user for review, write only after user-approved text. Do NOT overwrite without per-row approval; the column is buyer-shaped.
    extra_fix_surface: surgical PATCH on /domains?id=eq.148 after user-approved wording

