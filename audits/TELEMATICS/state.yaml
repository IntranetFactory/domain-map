    blocked_by:
      - {type: user_decision, ref: B2-PERSONAL-CONTENT-SCOPE}
    affected_masters:
      - {data_object_id: 376, name: driver_behavior_events, target_module_id: null, workflow: personal-content-flip}
      - {data_object_id: 377, name: eld_logs, target_module_id: null, workflow: personal-content-flip}
      - {data_object_id: 378, name: dashcam_events, target_module_id: null, workflow: personal-content-flip}
      - {data_object_id: 734, name: driver_safety_scorecards, target_module_id: null, workflow: personal-content-flip}
