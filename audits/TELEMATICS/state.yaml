b2:
  - id: B2-MODULE-SPLIT
    summary: Pick the module split shape for TELEMATICS. Gates every downstream B/E/F item that needs a module FK.
    question: Two full modules (TELEMATICS-FLEET-TRACKING + TELEMATICS-COMPLIANCE-SAFETY) per the 2026-05-30 proposal? Or 3-module split spinning TELEMATICS-VIDEO-COACHING out? Or a different cut?
    options:
      - 2-module-fleet-tracking-plus-compliance-safety
      - 3-module-add-video-coaching
      - other-user-specified
    why: |
      Rule #14 requires >=2 full modules on this 6-capability domain. The default 2-module split was justified in the 2026-05-30 audit; the 3-module variant matches Lytx as a pure-play but is probably too granular at this catalog scale.

  - id: B2-PERSONAL-CONTENT-SCOPE
    summary: Decide pattern-flag `has_personal_content` scope on the position-telemetry masters.
    question: Should `has_personal_content` be true on all 8 masters (strict privacy reading), only on the 4 driver-attributed masters, or only on dashcam + behavior pair (operational reading)?
    options:
      - all-8-personal
      - 4-driver-attributed-only
      - dashcam-and-behavior-only
    why: |
      Position telemetry is personal data under GDPR / CCPA when tied to an identified driver. Vendor practice varies; the catalog needs an explicit answer per Rule #12's positive re-evaluation requirement.

  - id: B2-DVIR-OWNERSHIP
    summary: Decide canonical ownership of DVIR (driver vehicle inspection reports).
    question: New `dvir_inspections` under TELEMATICS-COMPLIANCE-SAFETY (keeping FLEET-MGMT `vehicle_inspections` for periodic PMI), OR extend FLEET-MGMT `vehicle_inspections` with a `kind` discriminator, OR move ownership of `vehicle_inspections` to TELEMATICS?
    options:
      - new-dvir-inspections-under-telematics
      - extend-fleet-mgmt-vehicle-inspections-with-kind
      - move-vehicle-inspections-to-telematics
    why: |
      Vendor practice treats DVIR (driver pre/post-trip) and PMI (mechanic-completed) as distinct workflows; recommended option is the first.

  - id: B2-NOTIFY-TEAM-COVERAGE-TIER
    summary: Cross-catalog resolution of `notify_team.coverage_tier` blocks Phase-S authoring for TELEMATICS modules.
    question: What is the current `notify_team.coverage_tier` and `notify_person.coverage_tier`, and when does the platform-vs-external classification land?
    options:
      - confirm-current-state
      - escalate-to-platform-team
    why: |
      TELEMATICS skills will plausibly link both abstractions (safety-manager alert, dispatch broadcast). The coverage_tier flip drives whether the skill rolls up as platform-covered or external. Same blocker as ATS audit; resolution is catalog-wide, not per-domain.

  - id: B2-EVENT-CATEGORY-CONFIRMATION
    summary: Confirm the 5 event_category values the 2026-05-31 continuation wrote.
    question: Are `gps_waypoint.recorded=lifecycle`, `idle_event.detected=threshold`, `geofence.crossed=threshold`, `safety_scorecard.updated=state_change`, `fleet_vehicle.mileage_milestone_reached=threshold` the right values? If not, reverse-PATCH applies.
    options:
      - confirm-as-written
      - amend-named-rows
    why: |
      The 2026-05-30 audit framed the mapping as a recommendation; the 2026-05-31 continuation applied it. User confirmation closes the loop.

  - id: B2-FMIS-INBOUND-ROUTING
    summary: Decide the routing fate of FMIS inbound handoffs 966 + 968 on agricultural payloads.
    question: Drop both as mis-routed (FMIS subscriber should target a hypothetical AG-TELEMATICS), add `consumer` DMDOs on TELEMATICS modules so the dependency is captured cross-vertically, or queue AG-TELEMATICS as a candidate domain?
    options:
      - drop-as-mis-routed
      - add-consumer-dmdos-cross-vertical
      - queue-ag-telematics-candidate
    why: |
      Agricultural-machinery telemetry sits between agronomy / FMIS and a hypothetical AG-TELEMATICS sibling. Coordinated with Bucket 3 #1 (AG-TELEMATICS Phase 0 research).

  - id: B2-HANDOFF-312-FATE
    summary: Decide the fate of handoff 312 + trigger_event 304 (`preventive_maintenance.due` on `preventive_maintenance_schedules`).
    question: DELETE handoff 312 + trigger_event 304 (likely intent is `fleet_vehicle.mileage_milestone_reached` already covered by handoff 881), re-point trigger_event 304's `data_object_id` to a TELEMATICS-mastered entity, or leave with a debt-flag?
    options:
      - delete-handoff-and-event
      - re-point-trigger-event
      - leave-with-debt-flag
    why: |
      Payload 380 (`preventive_maintenance_schedules`) is FLEET-MAINT-mastered; TELEMATICS does not model the entity. Likely modeling debt from a pre-modular load.

b3:
