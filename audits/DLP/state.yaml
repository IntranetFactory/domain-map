b2:
  - id: B2-S2
    summary: "DLP pattern-flag positive re-evaluation across 4 candidate flags."
    question: "For each of the 4 flag candidates, is the positive value correct?"
    options:
      - "dlp_incidents.has_personal_content = true | false"
      - "dlp_user_activity_logs.has_personal_content = true | false"
      - "dlp_policies.has_submit_lock = true | false"
      - "dlp_exceptions.has_single_approver = true | false"
    why: "Pattern flags are workflow-shape judgments the user owns; false-by-default is not a positive answer. Per Rule #15 the consideration cannot be recorded in notes."

  - id: B2-S3
    summary: "Lifecycle-state exemptions for data_exfiltration_attempts and dlp_user_activity_logs."
    question: "Which of the two transient/append-only masters qualify for the Rule #12 config-shape exemption?"
    options:
      - "a) Exempt both as config-shape (skip lifecycle states for these two)"
      - "b) Author lifecycle states for dlp_user_activity_logs only (open -> reviewed -> archived)"
      - "c) Author lifecycle states for both"
    why: "Cyberhaven treats activity logs as a first-class investigable surface with its own state machine; Microsoft Purview treats them as append-only audit. The user owns this product-shape call."

  - id: B2-S4
    summary: "DLP business-function ownership for C1 fix; also gates E-band role authoring."
    question: "Single owner or split with Privacy Office?"
    options:
      - "a) Single owner Information Security"
      - "b) Owner split: Information Security owns ENFORCEMENT-RUNTIME (232), Privacy Office owns POLICY-CONTROL (231)"
      - "c) Information Security owner + Privacy Office contributor + Legal/RM contributor"
    why: "DLP straddles security + privacy + records management; org-design choice with implications for permission-bundle drift (E6) and cross-functional role authoring."

  - id: B2-S5
    summary: "APQC bulk approval for the 7 remaining handoff_processes proposals (B1A-S16)."
    question: "Approve the 7 agent_curated rows as proposed, drop to L4 children where they exist, or pre-vet via Discover Pass 3?"
    options:
      - "a) Approve as proposed"
      - "b) Drop to L4 children where they exist"
      - "c) Pre-vet via Discover Pass 3"
    why: "Reviewer preference + L3 parent vs. L4 child anchor choice varies across audits. The repeated 20735 L3 anchor on inbound rows is defensible because every inbound row triggers DLP policy authoring/refinement, the substantive job."

  - id: B2-S6
    summary: "User-edge verb choice for 3 remaining DLP masters (B1B-S5B)."
    question: "Which canonical actor + verb maps to each of the 3 masters?"
    options:
      - "dlp_quarantine_items: reviewer (e.g. reviews) and/or release_approver (e.g. releases / approves_release)"
      - "dlp_user_activity_logs: user-under-monitor (e.g. is_monitored_by or generates) - direction is inverse from typical user-edge"
      - "data_exfiltration_attempts: actor (e.g. initiates or attempts)"
    why: "Multiple plausible verbs per actor; the dominant project convention is the verb-on-source-side pattern (e.g. users reviews dlp_incidents), but dlp_user_activity_logs reverses the typical direction since the activity log RECORDS user behavior."

