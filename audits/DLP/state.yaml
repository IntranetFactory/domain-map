# next_action_by rationale: the 2026-06-05 b1a execution resolved every
# agent-solvable item that was not gated on a user decision (per-module skills,
# outbound handoff module-FK backfill, catalog UX copy, intra-domain B6 edges,
# outbound B8 cross-domain edges). The b1a items that remain are ALL blocked on
# a b2 user_decision (B2-S3 / B2-S4 / B2-S5) or on an upstream DMDO load (the
# inbound half of B1A-S11). None can move without user input, so the ball is
# with the user (answer B2-S3/S4/S5), not the agent.

b1a:
  - id: B1A-S6-B12-LIFECYCLE-STATES
    summary: "B12 hard fail; 0 data_object_lifecycle_states for any DLP master. Module-id realization column now resolvable (231/232 exist)."
    finding: "Per Rule #12 every workflow-bearing master needs a state machine; workflow-gate permissions materialize from gated states. Expected machines: dlp_incidents (detected -> triaged -> investigated -> remediated -> closed) realized on 232; dlp_policies (draft -> in_review -> approved -> active -> retired) realized on 231; dlp_quarantine_items (held -> reviewed -> released | destroyed) realized on 232; dlp_exceptions (requested -> approved | denied -> active -> expired) realized on 231. data_exfiltration_attempts and dlp_user_activity_logs may qualify for the config-shape exemption (B2-S3). NOTE: all 6 DLP masters are still entity_type=unclassified (B13) - classify entity_type before/with the lifecycle pass."
    action: "Draft state machines per master; set domain_module_id to 231 (policy masters) or 232 (runtime masters) on each gated state. Workflow-gate permissions then materialize per the per-module derivation rule. Gated on B2-S3 for the 2 transient masters."
    blocked_by:
      - {type: user_decision, ref: B2-S3}
    affected_masters:
      - {data_object_id: 330, name: dlp_incidents, target_module_id: 232, workflow: "detected -> triaged -> investigated -> remediated -> closed"}
      - {data_object_id: 331, name: dlp_policies, target_module_id: 231, workflow: "draft -> in_review -> approved -> active -> retired"}
      - {data_object_id: 333, name: dlp_quarantine_items, target_module_id: 232, workflow: "held -> reviewed -> released | destroyed"}
      - {data_object_id: 334, name: dlp_exceptions, target_module_id: 231, workflow: "requested -> approved | denied -> active -> expired"}
      - {data_object_id: 332, name: data_exfiltration_attempts, target_module_id: 232, workflow: "transient event, possible config-shape exemption"}
      - {data_object_id: 335, name: dlp_user_activity_logs, target_module_id: 232, workflow: "append-only audit, possible config-shape exemption"}

  - id: B1A-S11-HANDOFF-MODULE-FKS
    summary: "B10b INBOUND remainder only. Outbound 8 backfilled 2026-06-05 (source_domain_module_id=232). 10 inbound still NULL target_domain_module_id - no DLP-held payload (B10b no-candidate sub-case 2)."
    finding: "Outbound side fully resolved 2026-06-05: all 8 outbound handoffs (280, 281, 282, 283, 284, 843, 844, 845) now carry source_domain_module_id=232 (every outbound event fires on a 232-mastered object). The 10 inbound handoffs (260, 264, 690, 702, 709, 730, 821, 822, 832, 847) cannot be deterministically backfilled: DLP has ZERO domain_module_data_objects rows on any of their payloads (data_assets, data_access_policies, bi_dashboards, nocode_views, data_domains, sink_connectors, content_documents, document_classifications, chat_messages, data_warehouses), so the strongest-role rule yields no candidate. The b1a 'map to 231/232 per payload semantics' is judgment beyond a deterministic derivation."
    action: "Upstream fix (not a blind module-FK guess): decide which DLP module ingests each external payload and load a consumer DMDO row on that module (231 for classification/policy-authoring triggers; 232 for runtime egress/scan triggers), THEN re-run the deterministic B10b backfill so target_domain_module_id resolves. Needs a per-payload routing decision (user-shape product call), so deferred."

  - id: B1A-S14-E-BAND-ROLES
    summary: "E1/E2/E4; 0 roles touching DLP modules, 0 role_modules, 0 role_permissions. Authorable since 2 modules exist."
    finding: "E1 mandates >=3 distinct roles touching both modules. Likely DLP-ADMIN (policy authoring + approval, spans 231 + 232), DLP-INCIDENT-RESPONDER (incident triage + remediation, 232 primary, 231 secondary), SECURITY-ANALYST (cross-cutting investigator, secondary on both). Per Plan 3 the persona bundle is DERIVED (domain_roles reach + process_raci), not a stored role_permissions list."
    action: "Author domain_roles (function-scoped naming) + role_modules (231, 232) + process_raci; explicit interaction_level per E3. Business-function ownership still gated on B2-S4."
    affected_modules: [231, 232]
    blocked_by:
      - {type: user_decision, ref: B2-S4}

  - id: B1A-S16-APQC-MISSING-7
    summary: "7 of 18 cross-domain handoffs touching DLP still carry no handoff_processes tag."
    finding: "11 of 18 handoffs are tagged (10 agent_curated + 1 discovery_substring). 7 untagged: 281, 843, 844, 845 (outbound), 690, 702, 847 (inbound). Proposed PCFs per the 2026-05-30 audit sub-table (mostly 20762 L4 response-side for outbound incidents, 20735 L3 IT-security for inbound)."
    action: "Author 7 INSERTs into handoff_processes (record_status omitted -> new, proposal_source='agent_curated'). Natural composed key (handoff_id, process_id) prevents duplicates. Independent of the build."
    affected_handoffs:
      - {handoff_id: 281, direction: out, source_domain: DLP, target_domain: IGA, trigger_event: dlp_incident.escalated, payload: dlp_incidents}
      - {handoff_id: 843, direction: out, source_domain: DLP, target_domain: ITSM, trigger_event: dlp_incident.blocked, payload: service_incidents}
      - {handoff_id: 844, direction: out, source_domain: DLP, target_domain: GRC, trigger_event: dlp_incident.blocked, payload: dlp_incidents}
      - {handoff_id: 845, direction: out, source_domain: DLP, target_domain: IGA, trigger_event: dlp_user_activity.flagged, payload: dlp_user_activity_logs}
      - {handoff_id: 690, direction: in, source_domain: BI, target_domain: DLP, trigger_event: bi_dashboard.shared_externally, payload: bi_dashboards}
      - {handoff_id: 702, direction: in, source_domain: NCDB, target_domain: DLP, trigger_event: nocode_view.shared_externally, payload: nocode_views}
      - {handoff_id: 847, direction: in, source_domain: DSPM, target_domain: DLP, trigger_event: data_warehouse.classified, payload: data_warehouses}
    blocked_by:
      - {type: user_decision, ref: B2-S5}

