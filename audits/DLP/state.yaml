  - id: B1B-S8-B4-PATTERN-FLAGS
    summary: "B4 soft fail; pattern flags on all 6 masters are false by default."
    finding: "Live read confirms has_personal_content / has_submit_lock / has_single_approver all false on every DLP master. Candidates per audit: dlp_incidents.has_personal_content=true, dlp_user_activity_logs.has_personal_content=true, dlp_policies.has_submit_lock=true, dlp_exceptions.has_single_approver=true. Per Rule #15 the consideration cannot be recorded in notes."
    action: "PATCH per-flag after B2-S2 yes/no decisions."
    blocked_by:
