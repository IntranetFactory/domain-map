  - id: B1B-S7-B11-ALIASES
    summary: "B11 soft fail; 0 data_object_aliases for any DLP master."
    finding: "Vendor terminology highly fragmented (Purview Activity Explorer, Sensitivity Labels; Forcepoint DLP Policies, Incident Risk Ranking; Code42 File Events; Netskope Real-time Protection Policies). Cross-industry equivalents dlp_incidents <-> data_loss_event, dlp_policies <-> sensitive_data_policy. Module grain now exists (231/232) so aliases can anchor at the module grain too."
