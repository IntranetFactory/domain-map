    finding: "trigger_events 261 dlp_incident.quarantined, 262 dlp_incident.remediated, 265 dlp_exception.requested, 266 dlp_exception.approved, 927 dlp_policy.updated, 928 dlp_quarantine_item.released have no handoffs row. Likely fan-outs: 261 -> PRIV-MGMT/SECOPS/ITSM, 262 -> SECOPS/ITSM, 265 -> GRC, 266 -> IGA/SECOPS, 927 -> DCG + consumers, 928 -> ECM/WSC."
