schema_version: 2
domain: ERP-FIN
status: feedback_needed
next_action_by: agent
last_audit: "2026-06-02"

b1a:
  - id: B1A-SYSTEM-SKILLS
    summary: "F2 gap: 4 new modules have 0 system skills; legacy domain-level skill 56 still present (F1)."
    finding: >
      The 2026-06-02 modularization created 4 full modules (245 ERP-FIN-GL-CLOSE, 246
      ERP-FIN-FIXED-ASSETS, 247 ERP-FIN-CASH-BANKING, 248 ERP-FIN-REVENUE-RECOGNITION),
      none of which yet carries a skill_type='system' skill (F2 fails: each module needs
      exactly one). Legacy skill 56 (erp-fin-system) still carries domain_module_id=NULL,
      which now violates Rule #17 / F1 because module-level homes exist to re-anchor it.
      The 12 skill_tools rows on skill 56 (11 query_* + 1 send_email, all
      coverage_tier='platform') need migrating to the per-module skills, and ~10
      workflow-bearing tools remain unauthored (post_journal_entry, close_accounting_period,
      reverse_journal_entry, reopen_accounting_period, run_depreciation, capitalize_fixed_asset,
      dispose_fixed_asset, reconcile_bank_statement, recognize_revenue, match_intercompany_transactions).
    action: >
      Phase S: author 1 system skill per module (4 skills, skill_name '<module_code_lower>_agent':
      erp_fin_gl_close_agent, erp_fin_fixed_assets_agent, erp_fin_cash_banking_agent,
      erp_fin_revenue_recognition_agent), each with >=1 skill_tools row (F3). Migrate the 12
      skill_tools rows from skill 56 to the matching module skill by entity mastership, add the
      ~10 workflow-bearing tools (coverage_tier likely external/integration once an ERP MCP exists),
      then DELETE legacy skill 56. Honor F4 (operation_kind <-> data_object_id invariant).
    affected_modules: [245, 246, 247, 248]

  - id: B1A-CATALOG-UX
    summary: "A4 + M8 fail: domain catalog_tagline/catalog_description empty; all 4 new modules empty too."
    finding: >
      domains.catalog_tagline and domains.catalog_description for id=65 are both empty (A4 fail).
      All 4 new module rows (245, 246, 247, 248) carry empty catalog_tagline and catalog_description
      (M8 fail). Per Rule #20 these are buyer-voice fields (workflow + value), not analyst voice.
    action: >
      Draft buyer-voice catalog_tagline (one sentence) + catalog_description (1-3 paragraphs) for the
      domain and for each of the 4 modules, surface the drafts to the user for review BEFORE writing
      (Rule #20 / Rule #1 draft-review-write loop), then PATCH on approval.
    affected_modules: [245, 246, 247, 248]

  - id: B1A-S7
    summary: "H1 partial: 47 of 113 cross-domain handoffs untagged; agent_curated below the H1 floor."
    finding: >
      Of 113 ERP-FIN cross-domain handoffs (16 outbound + 97 inbound), 66 carry handoff_processes
      tags (48 agent_curated, 15 discovery_substring, 3 discovery_override); 47 untagged. The 48
      agent_curated rows sit below the H1 band 0.5N-0.8N (57-90 for N=113).
    action: >
      Pass (a): INSERT additional agent_curated handoff_processes rows on the 47 untagged handoffs via
      PCF lookup (process_name=ilike.*<term>*&source_framework=eq.apqc_pcf_cross_industry); likely defer
      ~10 to Discover Pass 3 (no clean cross-industry PCF match, esp. ESG financial-impact, CBAM).
      Pass (b): user-only record_status flip to approved on reviewed tagged rows (Rule #1).
    extra_target_band: "57-90 agent_curated; currently 48 (-9 to -42 below floor)"

  - id: B1A-HANDOFF-MODULE-FK
    summary: "B10b now unblocked: 113 handoffs can be pointed at the 4 new ERP-FIN modules."
    finding: >
      Before this pass all 16 outbound + 97 inbound ERP-FIN handoffs carried NULL
      target_domain_module_id because no modules existed. The 4 modules (245-248) now exist, so each
      handoff can be PATCHed to the module that masters its payload data_object. 65 of 97 inbound also
      carry NULL source_domain_module_id, owed by the source-domain audits (report-only, tracked there).
    action: >
      PATCH target_domain_module_id on each of the 113 handoffs to the correct ERP-FIN module by mapping
      the handoff's payload data_object_id -> module mastership (GL masters -> 245, fixed-asset -> 246,
      cash/bank -> 247, revrec -> 248). 16 outbound + 97 inbound = up to 113 PATCHes.
    affected_modules: [245, 246, 247, 248]
    affected_handoffs:
      - {count: 16, scope_note: "ERP-FIN outbound handoffs, target_domain_module_id was NULL", enumeration_status: source_count_only}
      - {count: 97, scope_note: "ERP-FIN inbound handoffs, target_domain_module_id was NULL", enumeration_status: source_count_only}

  - id: B1A-MASTER-MASTER-EDGES
    summary: "B6/B8 master-to-master data_object_relationships still missing (~9-10 edges)."
    finding: >
      ~9-10 intra/cross-domain master-to-master edges are unauthored: journal_entries posted_against
      accounting_periods / general_ledger_accounts / cost_centers, journal_entries scoped_by legal_entities,
      cash_transactions reconciled_against bank_accounts, fixed_assets owned_by legal_entities, fixed_assets
      governed_by asset_depreciation_schedules, intercompany_transactions between legal_entities,
      revenue_recognition_records produces journal_entries, accounting_periods scoped_by legal_entities.
      The modules now exist, so the edges can land; the 2026-05-31 Continuation licensed only user-edges.
    action: >
      INSERT 9-10 data_object_relationships rows after per-edge verb/cardinality/owner_side authoring.
      one_to_many for most postings (parent on the targeted master); intercompany_transactions between
      legal_entities = many_to_many self-join-via-legal_entities.
    blocked_by:
      - {type: user_decision, ref: B1A-MASTER-MASTER-EDGES, reason: "verb and owner_side authoring per edge"}

  - id: B1A-S3
    summary: "C1 sparse: only Accounting (owner) loaded; missing Finance / FP&A / Tax / Treasury business_function_domains rows."
    finding: >
      business_function_domains for domain 65 has 1 row (Accounting, owner). Per the 2026-05-30 audit,
      ERP-FIN warrants additional rows: Finance (contributor for treasury / banking / fixed-assets),
      FP&A (consumer for EPM bridge), Tax (consumer for legal-entity / multi-jurisdiction), Treasury
      (contributor for bank_accounts / cash_transactions). The 2026-05-31 Continuation deferred per the
      orchestrator's no-new-business_function_domains-contributors/consumers rule.
    action: >
      After the user names the 4 business_functions rows to point at, INSERT 4 business_function_domains
      rows: Finance (contributor), FP&A (consumer), Tax (consumer), Treasury (contributor). If the function
      spine lacks Tax / Treasury as first-class functions, fall back to Finance (contributor) and surface the gap.
    blocked_by:
      - {type: user_decision, ref: B1A-S3, reason: "business_function name targets to resolve"}

  - id: B1A-S4
    summary: "B11 fail: 0 data_object_aliases on any of the 11 ERP-FIN masters."
    finding: >
      0 rows in data_object_aliases for data_object_id in (109, 194, 195, 196, 197, 198, 199, 200, 201, 202, 203).
      2026-05-30 audit proposed ~25 aliases (Chart of Accounts, G/L Account, Journal Voucher, JE, Fiscal Period,
      Company Code, Entity, Cost Object, Cost Pool, Capital Assets, Asset Master Record, IC Postings,
      Cross-Entity Postings, RevRec Records, Performance Obligation Records, Cash Account, Bank Transaction,
      Cash Line, Depreciation Run, Depreciation Method).
    action: >
      INSERT ~25 alias rows. Vendor-specific terms (Company Code, Journal Voucher, Performance Obligation
      Records) require alias_type='solution_term' with resolved solution_id (Rule #18); generic ones (Chart of
      Accounts, JE, Fiscal Period, Cost Pool) use alias_type='industry_term' or similar non-vendor type.
    affected_masters:
      - {data_object_id: 109, name: revenue_recognition_records}
      - {data_object_id: 194, name: journal_entries}
      - {data_object_id: 195, name: general_ledger_accounts}
      - {data_object_id: 196, name: cost_centers}
      - {data_object_id: 197, name: legal_entities}
      - {data_object_id: 198, name: accounting_periods}
      - {data_object_id: 199, name: bank_accounts}
      - {data_object_id: 200, name: cash_transactions}
      - {data_object_id: 201, name: fixed_assets}
      - {data_object_id: 202, name: asset_depreciation_schedules}
      - {data_object_id: 203, name: intercompany_transactions}
    blocked_by:
      - {type: user_decision, ref: B1A-S4, reason: "alias_type and solution_id arbitration for vendor-specific terms (Rule #18)"}

b1b:
  - id: B1B-PERSONA-RACI
    summary: "Phase P (personas, role_modules, process_raci, lifecycle.process_id) now applies: multi-module domain built."
    finding: >
      ERP-FIN is now a 4-module domain. Per the 2026-06-02 phase-P triage, a multi-module result triggers
      Phase P after the module/skill/master work. No personas, role_modules, or process_raci rows exist for
      the 4 new modules yet.
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-SYSTEM-SKILLS, reason: "system skills + tools should land before persona/RACI authoring"}

b2:
  - id: B2-MODULE-SPLIT-CONFIRM
    summary: "4-module split shipped (B2-S4 option b); confirm vs the 6-module default."
    question: >
      The modularization implemented option (b): 4 modules (ERP-FIN-GL-CLOSE, ERP-FIN-FIXED-ASSETS,
      ERP-FIN-CASH-BANKING, ERP-FIN-REVENUE-RECOGNITION), dropping the standalone AR-BILLING and AP-DISBURSE
      modules from the 6-module default because neither has any ERP-FIN-mastered data_object (customer-invoice
      processing is mastered by CRM/OMS/SUB-MGMT, supplier-invoice by AP-AUTO). The AR (60) and AP (61)
      capabilities were anchored to ERP-FIN-CASH-BANKING instead. Keep at 4 modules or add the two
      borrowed-master modules?
    options:
      - "keep 4 modules (agent recommends; no orphan capability, no empty module, no borrowed master promoted)"
      - "add ERP-FIN-AR-BILLING + ERP-FIN-AP-DISBURSE as borrowed-master/consumer modules and move caps 60/61 there"
    why: "Reversible module-design decision; affects downstream skill/persona/handoff-FK fan-out."

  - id: B2-S1
    summary: "Rule #15 notes-pollution on 6 domain_data_objects rows."
    question: >
      Were the notes on DDOs 250 (payroll_journal_entries consumer), 261 (benefit_enrollments consumer),
      324 (cost_centers master), 329 (fixed_assets master), 351 (expense_reports consumer), 358
      (service_projects consumer) user-approved at load time, or auto-populated by a loader?
    options:
      - "approved: leave in place"
      - "auto-populated: PATCH all 6 notes to empty string and log Rule #15 incident in references/skill-changelog.md"
    why: "Audit cannot tell from live state alone; commit history would say if a loader added them without user approval."

  - id: B2-S2
    summary: "B4 pattern-flag positive re-evaluation on 5 masters."
    question: "Which pattern flags should flip from false to true?"
    options:
      - "194 journal_entries: has_submit_lock=true (posting is one-way)?"
      - "194 journal_entries: has_single_approver=true (controllership approval)?"
      - "198 accounting_periods: has_submit_lock=true (close is one-way)?"
      - "198 accounting_periods: has_single_approver=true (controllership)?"
      - "203 intercompany_transactions: has_single_approver=true?"
      - "201 fixed_assets: has_single_approver=true (capitalization / disposal)?"
      - "109 revenue_recognition_records: has_submit_lock=true (recognition is one-way)?"
      - "109 revenue_recognition_records: has_single_approver=true?"
    why: "Pattern flags are workflow-shape judgments the user owns. Rule #12 requires consideration but flags must not be inferred without sign-off."

  - id: B2-S3
    summary: "B12 config-shape vs state-machine for 195 general_ledger_accounts and 196 cost_centers."
    question: "Are these two masters config-shape (skip B12) or do they warrant a 4-state machine?"
    options:
      - "config-shape exempt: skip lifecycle states authoring; track exemption outside notes (Rule #15)"
      - "author 4-state machines (proposed / active / deactivated / archived) on both"
    why: "Both masters are reference-data shape with no obvious workflow gate; Rule #12's config-shape exemption applies but requires explicit user sign-off."

  - id: B2-S6
    summary: "domains.business_logic em-dash fix."
    question: "Approve the proposed em-dash replacement?"
    options:
      - "Use proposed wording: 'Consolidation, allocation, multi-GAAP translation, and period-close orchestration: the regulated calc kernel inside an otherwise transactional ledger.' (em-dash -> colon)"
      - "Supply different wording"
    why: "CLAUDE.md forbids em-dash; Rule #15 / Rule #20 require user-approved wording for catalog prose changes. domains.description is already clean."

b3:
  - id: B3-CHART-OF-ACCOUNTS-SEGMENTS
    candidate: chart_of_accounts_segments
    rationale: >
      Flagship ERPs (S/4HANA, Oracle Fusion, NetSuite, Workday, D365 Finance) model the chart-of-accounts as
      a multi-segment structure (Company-Account-Department-Project-IntercompanyPartner) where each segment is
      a first-class master. ERP-FIN currently has monolithic general_ledger_accounts; the segment layer is missing.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite", "Workday Financial Management", "Microsoft Dynamics 365 Finance"]
    proposed_module: "ERP-FIN-GL-CLOSE (master) or separate ERP-FIN-COA-SEGMENTS"

  - id: B3-JOURNAL-ENTRY-LINES
    candidate: journal_entry_lines
    rationale: >
      Flagship ERPs model journal-entry-headers and journal-entry-lines as separate entities. ERP-FIN
      journal_entries is single-row; line resolution is valuable for IFRS 16 / ASC 842 lease accounting and
      intercompany line matching.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite", "Workday Financial Management"]
    proposed_module: "ERP-FIN-GL-CLOSE (master, child of journal_entries id 194)"

  - id: B3-CURRENCIES
    candidate: currencies / exchange_rates
    rationale: >
      Multi-currency consolidation depends on these masters. Workday Currency Conversion Rate, SAP Exchange
      Rate Type. Currencies plausibly cross-domain (catalog-wide master layer).
    vendor_evidence: ["SAP S/4HANA", "Workday Financial Management", "Oracle Fusion Cloud ERP"]
    proposed_module: "catalog-wide master module, or ERP-FIN-GL-CLOSE / ERP-FIN-CASH-BANKING (master role)"

  - id: B3-ALLOCATIONS
    candidate: allocations / allocation_rules
    rationale: >
      SAP Cost Allocation Cycle, Oracle Allocation Rules, NetSuite Allocation Schedule. Allocate corporate
      cost across cost centers / departments / projects. Absent from ERP-FIN.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite"]
    proposed_module: "ERP-FIN-GL-CLOSE (master) or separate ERP-FIN-COST-ALLOCATION"

  - id: B3-REVALUATION-RUNS
    candidate: revaluation_runs
    rationale: >
      FX revaluation runs are first-class in S/4HANA and Oracle Fusion. ERP-FIN has cash_transactions but no
      FX-revaluation orchestration.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP"]
    proposed_module: "ERP-FIN-CASH-BANKING (master)"

  - id: B3-CONSOLIDATION-UNITS
    candidate: consolidation_units / elimination_entries
    rationale: >
      Multi-entity consolidation is first-class in S/4HANA, Oracle Fusion, OneStream. intercompany_transactions
      covers part but the consolidation-orchestration layer is missing.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "OneStream Platform"]
    proposed_module: "ERP-FIN-GL-CLOSE (master, consolidation side)"

  - id: B3-REVENUE-CONTRACTS
    candidate: revenue_contracts / performance_obligations
    rationale: >
      ASC 606 / IFRS 15 require revenue contracts and performance obligations as first-class entities.
      revenue_recognition_records is currently flat-shaped without contract / PO decomposition. Note that
      revenue_recognition_records (109) is mastered catalog-wide by SUB-MGMT-SUBSCRIPTIONS; child entities
      may belong there or in ERP-FIN-REVENUE-RECOGNITION as embedded.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Workday Financial Management"]
    proposed_module: "ERP-FIN-REVENUE-RECOGNITION (embedded) or SUB-MGMT-SUBSCRIPTIONS (master)"

  - id: B3-TAX-CODES
    candidate: tax_codes / tax_jurisdictions
    rationale: >
      SAP Tax Code, Oracle Tax Code / Jurisdiction, D365 Finance Tax Group. Absent from ERP-FIN. May overlap
      with a future TAX-MGMT domain promotion.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Microsoft Dynamics 365 Finance"]
    proposed_module: "ERP-FIN-GL-CLOSE (master, with embedded_master if TAX-MGMT emerges later)"

  - id: B3-MISSING-MASTER-AR-AP
    candidate: customer_invoices / supplier_invoices / payments (ERP-FIN angle)
    rationale: >
      ERP-FIN exposes AR (60) and AP (61) capabilities but masters no receivable/payable entity: customer
      invoicing is mastered by CRM/OMS/SUB-MGMT and supplier-invoice processing by AP-AUTO. If ERP-FIN should
      hold its own AR/AP ledger sub-ledger detail (open-item management, dunning, payment runs) rather than only
      consuming downstream masters, candidate masters customer_invoices / supplier_invoices / payments would
      anchor dedicated ERP-FIN-AR-BILLING / ERP-FIN-AP-DISBURSE modules. Flagged, not filled (scope).
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite", "Microsoft Dynamics 365 Finance"]
    proposed_module: "ERP-FIN-AR-BILLING / ERP-FIN-AP-DISBURSE (new, gated on B2-MODULE-SPLIT-CONFIRM)"

  - id: B3-CSRD
    candidate: "Corporate Sustainability Reporting Directive (regulation)"
    rationale: >
      EU mandatory disclosure for large companies, 2026 / 2027 phase-in. Currently only the ESG domain holds
      CSRD; ERP-FIN should also surface it as it shapes financial-impact disclosures.
    vendor_evidence: []
    proposed_module: "(regulations row; n/a module)"

  - id: B3-PILLAR-TWO
    candidate: "OECD Pillar Two / Global Minimum Tax (regulation)"
    rationale: >
      OECD 15% minimum effective tax rate for multinationals, 2024+. Touches ERP-FIN multi-entity
      consolidation and tax reporting.
    vendor_evidence: []
    proposed_module: "(regulations row; n/a module)"

  - id: B3-LEASE-ACCOUNTING
    candidate: "ASC 842 / IFRS 16 explicit regulation rows"
    rationale: >
      Currently covered statutorily via US GAAP / IFRS at the framework level; explicit rows would clarify the
      lease-accounting touchpoint.
    vendor_evidence: []
    proposed_module: "(regulations row; n/a module)"
