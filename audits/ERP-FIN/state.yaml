  - id: B1B-S5b
    summary: "B6 / B8 master-to-master edges deferred from 2026-05-31 continuation (verb / cardinality discretion)."
    finding: "Approx 9-10 intra and cross-domain master-to-master data_object_relationships rows missing: journal_entries posted_against accounting_periods, journal_entries posted_against general_ledger_accounts, journal_entries posted_against cost_centers, journal_entries scoped_by legal_entities, cash_transactions reconciled_against bank_accounts, fixed_assets owned_by legal_entities, fixed_assets governed_by asset_depreciation_schedules, intercompany_transactions between legal_entities, revenue_recognition_records produces journal_entries, accounting_periods scoped_by legal_entities. The 2026-05-31 Continuation explicitly licensed only user-edges (Rule #10), not master-to-master."
    action: "INSERT 9-10 data_object_relationships rows after per-edge verb / cardinality / owner_side authoring. Use one_to_many for most postings (parent on the targeted master). intercompany_transactions between legal_entities = many_to_many self-join-via-legal_entities."
    blocked_by:
      - {type: user_decision, ref: B1B-S5b, reason: "verb and owner_side authoring per edge"}

  - id: B1B-S6
    summary: "F1 / F4 skill re-anchor + workflow-bearing primitives, gated on B1-S1."
    finding: "Skill 56 (erp-fin-system, skill_type='system') carries domain_module_id=NULL, violating Rule #17. 12 skill_tools rows (11 query_* + 1 send_email) all coverage_tier='platform'. No workflow-bearing tools exist: no post_journal_entry, close_accounting_period, capitalize_fixed_asset, recognize_revenue, match_intercompany_transactions, reconcile_bank_statement, run_depreciation, reverse_journal_entry, reopen_accounting_period, dispose_fixed_asset."
    action: "After B1B-S1 (modules) lands: author 1 system skill per module (6 new skills), migrate the 12 skill_tools rows to the new skills per the per-module mapping in 2026-05-30 B1-S6, add approx 10 workflow-bearing tools (likely coverage_tier='external' or 'integration' once an ERP MCP exists), DELETE skill 56."
