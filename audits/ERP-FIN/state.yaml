b2:
  - id: B2-S1
    summary: "Rule #15 notes-pollution on 6 domain_data_objects rows."
    question: "Were the notes on DDOs 250 (payroll_journal_entries consumer), 261 (benefit_enrollments consumer), 324 (cost_centers master), 329 (fixed_assets master), 351 (expense_reports consumer), 358 (service_projects consumer) user-approved at load time, or auto-populated by a loader?"
    options:
      - "approved: leave in place"
      - "auto-populated: PATCH all 6 notes to empty string and log Rule #15 incident in references/skill-changelog.md"
    why: "Audit cannot tell from live state alone; commit history would say if loader added them without user approval."

  - id: B2-S2
    summary: "B4 pattern-flag positive re-evaluation on 5 masters."
    question: "Which pattern flags should flip from false to true?"
    options:
      - "194 journal_entries: has_submit_lock=true (posting is one-way)?"
      - "194 journal_entries: has_single_approver=true (controllership approval)?"
      - "198 accounting_periods: has_submit_lock=true (close is one-way)?"
      - "198 accounting_periods: has_single_approver=true (controllership)?"
      - "203 intercompany_transactions: has_single_approver=true?"
      - "201 fixed_assets: has_single_approver=true (capitalization / disposal)?"
      - "109 revenue_recognition_records: has_submit_lock=true (recognition is one-way)?"
      - "109 revenue_recognition_records: has_single_approver=true?"
    why: "Pattern flags are workflow-shape judgments the user owns. Rule #12 requires consideration but flags must not be inferred without sign-off."

  - id: B2-S3
    summary: "B12 config-shape vs state-machine for 195 general_ledger_accounts and 196 cost_centers."
    question: "Are these two masters config-shape (skip B12) or do they warrant a 4-state machine?"
    options:
      - "config-shape exempt: skip lifecycle states authoring; track exemption outside notes (Rule #15)"
      - "author 4-state machines (proposed / active / deactivated / archived) on both"
    why: "Both masters are reference-data shape with no obvious workflow gate; Rule #12's config-shape exemption applies but requires explicit user sign-off."

  - id: B2-S4
    summary: "Module-set authoring choice for B1B-S1."
    question: "Which module split should the loader implement?"
    options:
      - "(a) 6 modules: ERP-FIN-GL-CLOSE, ERP-FIN-AR-BILLING, ERP-FIN-AP-DISBURSE, ERP-FIN-FIXED-ASSETS, ERP-FIN-CASH-BANKING, ERP-FIN-REVREC-CONSOL"
      - "(b) 4 modules: drop AR-BILLING (OMS / SUB-MGMT own customer billing) and AP-DISBURSE (AP-AUTO owns supplier-invoice processing)"
      - "(c) 2-module minimum (Rule #14 floor): ERP-FIN-GL-CLOSE + ERP-FIN-REVREC-CONSOL"
      - "(d) user-supplied split"
    why: "Module design conversation; the choice determines master-to-module mapping and downstream permission / skill / handoff PATCH plans."

  - id: B2-S6
    summary: "domains.business_logic em-dash fix."
    question: "Approve the proposed em-dash replacement?"
    options:
      - "Use proposed wording: 'Consolidation, allocation, multi-GAAP translation, and period-close orchestration: the regulated calc kernel inside an otherwise transactional ledger.' (em-dash -> colon)"
      - "Supply different wording"
    why: "CLAUDE.md forbids em-dash; Rule #15 / Rule #20 require user-approved wording for catalog prose changes. domains.description is already clean."

b3:
  - id: B3-CHART-OF-ACCOUNTS-SEGMENTS
    candidate: chart_of_accounts_segments
    rationale: "Flagship ERPs (S/4HANA, Oracle Fusion, NetSuite, Workday, D365 Finance) model the chart-of-accounts as a multi-segment structure (Company-Account-Department-Project-IntercompanyPartner) where each segment is a first-class master. ERP-FIN currently has monolithic general_ledger_accounts; segment layer is missing."
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite", "Workday Financial Management", "Microsoft Dynamics 365 Finance"]
    proposed_module: "ERP-FIN-GL-CLOSE or separate ERP-FIN-COA-SEGMENTS"

  - id: B3-TAX-CODES
    candidate: tax_codes / tax_jurisdictions
    rationale: "SAP Tax Code, Oracle Tax Code / Jurisdiction, D365 Finance Tax Group. Absent from ERP-FIN. May overlap with a future TAX-MGMT domain promotion."
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Microsoft Dynamics 365 Finance"]
    proposed_module: "ERP-FIN-GL-CLOSE (master, with embedded_master if TAX-MGMT emerges later)"

  - id: B3-CURRENCIES
    candidate: currencies / exchange_rates
    rationale: "Multi-currency consolidation depends on these masters. Workday Currency Conversion Rate, SAP Exchange Rate Type. Currencies plausibly cross-domain (catalog-wide master layer)."
    vendor_evidence: ["SAP S/4HANA", "Workday Financial Management", "Oracle Fusion Cloud ERP"]
    proposed_module: "catalog-wide master module, or ERP-FIN-REVREC-CONSOL (master role)"

  - id: B3-JOURNAL-ENTRY-LINES
    candidate: journal_entry_lines
    rationale: "Flagship ERPs model journal-entry-headers and journal-entry-lines as separate entities. ERP-FIN journal_entries is single-row; line resolution valuable for IFRS 16 / ASC 842 lease accounting and intercompany line matching."
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite", "Workday Financial Management"]
    proposed_module: "ERP-FIN-GL-CLOSE (master, child of journal_entries)"

  - id: B3-ALLOCATIONS
    candidate: allocations / allocation_rules
    rationale: "SAP Cost Allocation Cycle, Oracle Allocation Rules, NetSuite Allocation Schedule. Allocate corporate cost across cost centers / departments / projects. Absent from ERP-FIN."
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite"]
    proposed_module: "ERP-FIN-GL-CLOSE or separate ERP-FIN-COST-ALLOCATION"

  - id: B3-REVALUATION-RUNS
    candidate: revaluation_runs
    rationale: "FX revaluation runs are first-class in S/4HANA and Oracle Fusion. ERP-FIN has cash_transactions but no FX-revaluation orchestration."
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP"]
    proposed_module: "ERP-FIN-CASH-BANKING (master)"

  - id: B3-CONSOLIDATION-UNITS
    candidate: consolidation_units / elimination_entries
    rationale: "Multi-entity consolidation is first-class in S/4HANA, Oracle Fusion, OneStream. intercompany_transactions covers part but the consolidation orchestration layer is missing."
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "OneStream Platform"]
    proposed_module: "ERP-FIN-REVREC-CONSOL (master)"

  - id: B3-REVENUE-CONTRACTS
    candidate: revenue_contracts / performance_obligations
    rationale: "ASC 606 / IFRS 15 require revenue contracts and performance obligations as first-class entities. revenue_recognition_records is currently flat-shaped without contract / PO decomposition."
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Workday Financial Management"]
    proposed_module: "ERP-FIN-REVREC-CONSOL (master, child of revenue_recognition_records)"

  - id: B3-CSRD
    candidate: "Corporate Sustainability Reporting Directive (regulation)"
    rationale: "EU mandatory disclosure for large companies, 2026 / 2027 phase-in. Currently only ESG domain holds CSRD; ERP-FIN should also surface it as it shapes financial-impact disclosures."
    vendor_evidence: []
    proposed_module: "(regulations row; n / a module)"

  - id: B3-PILLAR-TWO
    candidate: "OECD Pillar Two / Global Minimum Tax (regulation)"
    rationale: "OECD 15% minimum effective tax rate for multinationals, 2024+. Touches ERP-FIN multi-entity consolidation and tax reporting."
    vendor_evidence: []
    proposed_module: "(regulations row; n / a module)"

  - id: B3-LEASE-ACCOUNTING
    candidate: "ASC 842 / IFRS 16 explicit regulation rows"
    rationale: "Currently covered statutorily via US GAAP / IFRS at the framework level; explicit rows would clarify lease-accounting touchpoint."
    vendor_evidence: []
    proposed_module: "(regulations row; n / a module)"
