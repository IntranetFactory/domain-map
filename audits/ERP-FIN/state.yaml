      - {data_object_id: 109, name: revenue_recognition_records}
      - {data_object_id: 194, name: journal_entries}
      - {data_object_id: 195, name: general_ledger_accounts}
      - {data_object_id: 196, name: cost_centers}
      - {data_object_id: 197, name: legal_entities}
      - {data_object_id: 198, name: accounting_periods}
      - {data_object_id: 199, name: bank_accounts}
      - {data_object_id: 200, name: cash_transactions}
      - {data_object_id: 201, name: fixed_assets}
      - {data_object_id: 202, name: asset_depreciation_schedules}
      - {data_object_id: 203, name: intercompany_transactions}
    blocked_by:
      - {type: user_decision, ref: B1A-S4, reason: "alias_type and solution_id arbitration for vendor-specific terms (Rule #18)"}

  - id: B1A-S7
    summary: "H1 partial: 47 of 113 cross-domain handoffs untagged; 0 of 66 tagged rows record_status='approved'."
    finding: "Of 113 ERP-FIN cross-domain handoffs (16 outbound + 97 inbound), 66 carry handoff_processes tags (48 agent_curated, 15 discovery_substring, 3 discovery_override). 47 untagged. Catalog quality headline = 0 approved. Process health side-bar = 48 agent_curated against the H1 band 0.5N to 0.8N (57 to 90 for N=113); below the target floor."
    action: "Pass (a): INSERT additional agent_curated handoff_processes rows on the 47 untagged handoffs via PCF lookup (process_name=ilike.*<term>*&source_framework=eq.apqc_pcf_cross_industry). Likely defer approx 10 to Discover Pass 3 (no clean cross-industry PCF match, esp. ESG financial-impact, CBAM). Pass (b): user-only record_status flip to approved on reviewed tagged rows (Rule #1)."
    extra_target_band: "57-90 agent_curated; currently 48 (-9 to -42 below floor)"

