      - {data_object_id: 198, name: accounting_periods, target_module_id: null, workflow: "GL-CLOSE"}
      - {data_object_id: 199, name: bank_accounts, target_module_id: null, workflow: "CASH-BANKING"}
      - {data_object_id: 200, name: cash_transactions, target_module_id: null, workflow: "CASH-BANKING"}
