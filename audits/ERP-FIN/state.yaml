    action: "Author the module set after B2-S4 resolves. Default 6-module proposal: ERP-FIN-GL-CLOSE (masters 194, 195, 198, 197), ERP-FIN-AR-BILLING, ERP-FIN-AP-DISBURSE, ERP-FIN-FIXED-ASSETS (201, 202), ERP-FIN-CASH-BANKING (199, 200), ERP-FIN-REVREC-CONSOL (109, 203). Each module also needs >=1 domain_module_capabilities row, 3 baseline permissions, 1 system skill per Rule #17."
