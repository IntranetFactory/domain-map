  - id: B1B-S10b
    summary: "B10b: 16 outbound + 97 inbound cross-domain handoffs all carry NULL target_domain_module_id (gated on B1-S1)."
    finding: "Every ERP-FIN-targeted handoff has target_domain_module_id=NULL because there are no ERP-FIN modules to point at. 65 of 97 inbound also carry NULL source_domain_module_id (owed by source domains; report-only and tracked in those domains' state.yaml files)."
