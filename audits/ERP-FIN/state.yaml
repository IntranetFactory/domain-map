b1a:
  - id: B1A-S3
    summary: "C1 sparse: only Accounting (owner) loaded; missing Finance / FP&A / Tax / Treasury business_function_domains rows."
    finding: "business_function_domains for domain 65 has 1 row (Accounting, owner). Per 2026-05-30 audit narrative, ERP-FIN warrants additional rows: Finance (contributor for treasury / banking / fixed-assets), FP&A (consumer for EPM bridge), Tax (consumer for legal-entity / multi-jurisdiction), Treasury (contributor for bank_accounts / cash_transactions). 2026-05-31 Continuation deferred per orchestrator's no-new-business_function_domains-contributors / consumers rule."
    action: "After user names the 4 business_functions rows to point at, INSERT 4 business_function_domains rows: Finance (contributor), FP&A (consumer), Tax (consumer), Treasury (contributor). If the function spine lacks Tax / Treasury as first-class functions, fall back to Finance (contributor) and surface the gap."
