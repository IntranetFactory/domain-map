    action: "INSERT approx 25 alias rows. Vendor-specific terms (Company Code, Journal Voucher, Performance Obligation Records) require alias_type='solution_term' with resolved solution_id (Rule #18); generic ones (Chart of Accounts, JE, Fiscal Period, Cost Pool) use alias_type='industry_term' or similar non-vendor type."
