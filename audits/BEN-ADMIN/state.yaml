b2:
  - id: B2-S1
    summary: "hr_cases dependency strength on BEN-ENROLLMENT: downgrade to optional, DELETE, or keep required."
    question: "DMDO 598 (hr_cases consumer on BEN-ENROLLMENT 72) carries no spine relationship into any BEN-ADMIN master. The HRSD escalation handoff 1119 plus the existing 'carrier_feeds spawns hr_cases' cross-relationship 135 already capture the dependency. Should the DMDO row be downgraded to consumer + optional, DELETED outright, or kept as consumer + required?"
    options:
      - "(a) PATCH necessity=optional. Reflects in-flow read of HR cases during enrollment troubleshooting without forcing HRSD deployment for the BEN-ENROLLMENT module to function."
      - "(b) DELETE the DMDO row. Defers to the inbound handoff + cross-relationship to express the dependency; minimum-deploy-surface principle."
      - "(c) Keep consumer + required. Document the in-flow read use case (HRSD-escalated benefits questions land in the enrollment specialist's queue and must be readable)."
    why: "Architectural intent + deployability strategy."

  - id: B2-S2
    summary: "Pattern flag re-evaluation on benefit_enrollments.has_single_approver and benefit_dependents.has_submit_lock."
    question: "(a) benefit_enrollments.has_single_approver currently false. Flagship QLE-triggered enrollment changes route to a single benefits-admin approver. Set to true? (b) benefit_dependents.has_submit_lock currently false. Vendor behavior locks the dependent record once verified. Set to true?"
    options:
      - "(a) benefit_enrollments.has_single_approver = true"
      - "(a) benefit_enrollments.has_single_approver = false (keep)"
      - "(b) benefit_dependents.has_submit_lock = true"
      - "(b) benefit_dependents.has_submit_lock = false (keep)"
    why: "Workflow-shape judgment per master; not derivable from schema alone."

  - id: B2-S3
    summary: "Regulation coverage scope (Section 125, Form 5500, FMLA, USERRA, state paid-leave)."
    question: "Current regulations: ACA, ERISA, HIPAA, COBRA, GINA. Add Section 125 (cafeteria plans), Form 5500 (annual ERISA filing), ADA, FMLA, USERRA, and state paid-leave laws (CA PFL, NY PFL, NJ TDB, WA PFML, CO FAMLI) now, or defer to Bucket 3 for vendor verification, or federal core only?"
    options:
      - "(a) Add Section 125 + Form 5500 + ADA + FMLA + USERRA + state paid-leave now as Bucket 1 fixes."
      - "(b) Defer all candidates to Bucket 3 Phase 0 verification."
      - "(c) Federal core only (Section 125, Form 5500, FMLA, USERRA); defer state and international to later geo-expansion."
    why: "Catalog policy on regulatory breadth and geographic scope."

  - id: B2-S4
    summary: "BEN-ACA-COMPLIANCE master surface: author aca_filings + affordability_snapshots, treat as derived-signals only, or defer to Phase 0."
    question: "Module 74 masters zero entities. Flagship ACA specialists model aca_filings (1094-C / 1095-C with draft / validated / submitted / accepted / rejected / corrected lifecycle) and affordability_snapshots (monthly per-employee with draft / finalized / superseded lifecycle) as first-class records. Author both, or treat 74 as derived-signals only, or defer to Phase 0?"
    options:
      - "(a) Author aca_filings + affordability_snapshots masters with lifecycle states, trigger_events, workflow-gate permissions, role bundles."
      - "(b) No, redesignate BEN-ACA-COMPLIANCE as derived-signals only; document divergence from flagship-vendor practice in module description."
      - "(c) Defer to Bucket 3 / formal Phase 0 vendor research."
    why: "Modularization judgment; drives whether new entities, lifecycle states, and permissions are authored."

  - id: B2-S5
    summary: "Workflow-gate permission bundling on enrollment specialist + plan manager."
    question: "7 BEN-ENROLLMENT workflow gates (10326-10334 excluding 10329 / 10332) and 5 BEN-PLAN-DESIGN workflow gates (10318-10322) are unbundled. Specialists rely on admin escalation today. Add the gates to specialist bundles, partial subset, or keep the admin-escalation pattern?"
    options:
      - "(a) Add all 7 enrollment gates to 10067 + all 5 plan-design gates to 10066."
      - "(b) Targeted subset (user names which permission_ids to bundle)."
      - "(c) Keep current bundles; rely on BENEFITS-BENEFITS-ADMIN 10065 admin tier expansion."
    why: "Persona design judgment. Flagship benefits-administration vendors typically grant the enrollment specialist all enrollment-lifecycle gates and the plan manager all plan-design and carrier-relationship gates."

  - id: B2-S6
    summary: "domains.notes pointer for BEN-ADMIN."
    question: "BEN-ADMIN domains.notes currently empty. Update with a one-line audit pointer per audits/README.md? Rule #15 requires user-approved wording before any write."
    options:
      - "(a) Supply user-approved wording for the pointer."
      - "(b) Skip the pointer for now."
    why: "Optional persistence step; wording must come from the user."
  - id: B2-B9D-OWN-1052
    summary: "Benefits Administration: name an owner for \"Administer benefit enrollment\" (no one is responsible for it today)"
    question: |
      Applicant Tracking and Recruiting forwards benefit enrollment to Benefits Administration to administer benefit enrollment, but Benefits Administration does not yet have anyone assigned to administer benefit enrollment, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Benefits Administration owns, and assign a named owner once Benefits Administration sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Benefits Administration decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-BEN-ADMIN.md q16.
    extra_b9d_added: "2026-06-10"

b3:
  - id: B3-COBRA-EVENTS
    candidate: cobra_events
    rationale: "WEX Health, BCC, P&A Group, Businessolver Benefitsolver, Empyrean all master COBRA qualifying-event records as first-class catalog rows with their own lifecycle (notice generated, election period open, elected / waived / expired) distinct from life_events. The BEN-ADMIN catalog has no entity capturing the COBRA notice / continuation-coverage workflow."
    vendor_evidence: [WEX Health, BCC, P&A Group, Businessolver Benefitsolver, Empyrean]
    proposed_module: "BEN-ENROLLMENT or new BEN-COBRA module"

  - id: B3-ACA-FILINGS
    candidate: aca_filings
    rationale: "Flagship ACA specialists uniformly master the 1094-C / 1095-C transmittal record as a catalog entity with lifecycle draft / validated / submitted / accepted / rejected / corrected. Currently absent. Doubles as the B2-S4 / B1B-S10 in-scope candidate if user picks defer-to-Phase-0."
    vendor_evidence: [Health-e(fx), Trusaic, ADP Health Compliance, Workday ACA, bswift ACA]
    proposed_module: BEN-ACA-COMPLIANCE

  - id: B3-AFFORDABILITY-SNAPSHOTS
    candidate: affordability_snapshots
    rationale: "Monthly per-employee affordability calculation record, mastered by flagship ACA specialists as a first-class row with lifecycle draft / finalized / superseded. Currently absent. Doubles as the B2-S4 / B1B-S10 in-scope candidate."
    vendor_evidence: [Health-e(fx), Trusaic, ADP Health Compliance, Workday ACA, bswift ACA]
    proposed_module: BEN-ACA-COMPLIANCE

  - id: B3-DEP-ELIG-VERIF
    candidate: dependent_eligibility_verifications
    rationale: "Empyrean, Benefitfocus, Businessolver, bswift, Forma run dependent-eligibility audits as a distinct workflow (employee submits documentation, vendor reviews, dependent verified or de-enrolled) tracked as its own audit-record entity with lifecycle. Currently flattened into benefit_dependents.state=verified."
    vendor_evidence: [Empyrean, Benefitfocus, Businessolver, bswift, Forma]
    proposed_module: BEN-ENROLLMENT

  - id: B3-EOI-REQUESTS
    candidate: eoi_requests
    rationale: "Workday Benefits, Empyrean, bswift, Lincoln Financial, Unum, Sun Life Maxwell Health model evidence-of-insurability requests for life / disability / voluntary benefits as a distinct entity (carrier responds approved / declined / pending) that gates benefit_enrollments finalization. Currently absent."
    vendor_evidence: [Workday Benefits, Empyrean, bswift, Lincoln Financial, Unum, Sun Life Maxwell Health]
    proposed_module: "BEN-ENROLLMENT or BEN-CARRIER-INTEG"

  - id: B3-SPENDING-CLAIMS
    candidate: fsa_hsa_commuter_claims
    rationale: "Alegeus, WEX Health, HealthEquity, Discovery Benefits, P&A Group master claims against FSA / HSA / commuter benefit accounts as a distinct ledger entity (claim submitted, adjudicated, paid or rejected). The PAYROLL deduction_codes connection captures the contribution side; the claim / disbursement side has no entity."
    vendor_evidence: [Alegeus, WEX Health, HealthEquity, Discovery Benefits, P&A Group]
    proposed_module: "new BEN-SPENDING-ACCOUNTS module or BEN-ENROLLMENT"

  - id: B3-VOLUNTARY-ELECTIONS
    candidate: voluntary_benefit_elections
    rationale: "Aflac, Unum, Colonial Life broker-portal style voluntary / supplemental benefit elections (accident, critical-illness, hospital indemnity, legal, identity-protection) are typically modeled as a distinct election entity with its own carrier-by-carrier enrollment path. Could fold into benefit_enrollments via a type discriminator or be promoted to its own master."
    vendor_evidence: [Aflac, Unum, Colonial Life]
    proposed_module: "extension of benefit_enrollments or new master"

  - id: B3-QDIA-DESIGNATIONS
    candidate: qdia_designations
    rationale: "401(k) record-keepers (Fidelity, Empower, Vanguard, T. Rowe Price, Principal) model Qualified Default Investment Alternative designations as a first-class catalog entity tied to the 401(k) plan; PEP / MEP arrangements add complexity. Currently absent."
    vendor_evidence: [Fidelity, Empower, Vanguard, T. Rowe Price, Principal]
    proposed_module: "extension of benefit_plans or new entity"

  - id: B3-MODULE-COBRA
    candidate: "BEN-COBRA module"
    rationale: "If cobra_events is loaded, it warrants its own module: distinct lifecycle, distinct statutory windows (60-day election, 18 / 29 / 36-month continuation), distinct disbursement, distinct vendor (typically a third-party administrator). Would push BEN-ADMIN from 4 to 5 modules."
    vendor_evidence: [WEX Health, BCC, P&A Group]

  - id: B3-MODULE-SPENDING-ACCT
    candidate: "BEN-SPENDING-ACCOUNTS module"
    rationale: "If FSA / HSA / commuter claims are loaded, the spending-account surface could be a separate module owning the claims ledger and embedding benefit_enrollments. The Alegeus / WEX Health / HealthEquity vendor cluster operates as a distinct point-solution market."
    vendor_evidence: [Alegeus, WEX Health, HealthEquity]

  - id: B3-MODULE-RENAME-COMPLIANCE
    candidate: "Rename BEN-ACA-COMPLIANCE to BEN-COMPLIANCE"
    rationale: "If Section 125 / Form 5500 / ADA accommodation tracking lands (B2-S3 option a or c), the module could widen from ACA-only to a broader compliance scope, mastering aca_filings, form_5500_filings, cafeteria_plan_documents, summary_plan_descriptions."

  - id: B3-REG-SECTION-125
    candidate: "Regulation: Section 125 (Cafeteria Plans, IRC)"
    rationale: "Mandatory for pretax benefits elections. Currently absent from BEN-ADMIN regulations."
    vendor_evidence: [Workday Benefits, ADP Benefits, Empyrean, Benefitfocus]

  - id: B3-REG-FORM-5500
    candidate: "Regulation: Form 5500 (Annual ERISA filing)"
    rationale: "Mandatory for plans subject to ERISA. Currently absent."
    vendor_evidence: [Workday Benefits, ADP Benefits, Empyrean]

  - id: B3-REG-FMLA
    candidate: "Regulation: FMLA"
    rationale: "Family and Medical Leave Act; mandatory leave-of-absence anchor. Currently absent."

  - id: B3-REG-USERRA
    candidate: "Regulation: USERRA"
    rationale: "Uniformed Services Employment and Reemployment Rights Act; mandatory. Currently absent."

  - id: B3-REG-STATE-PFL
    candidate: "Regulations: state paid-leave laws (CA PFL, NY PFL, NJ TDB, WA PFML, CO FAMLI, MA PFML)"
    rationale: "Mandatory by jurisdiction; if loaded, joins jurisdictions x regulations. Geo-expansion candidate."
