b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."
  - id: B1A-RULE15-598
    summary: "Revert Rule #15 notes pollution on DMDO 598 (hr_cases consumer on BEN-ENROLLMENT)."
    finding: "domain_module_data_objects.id=598 (hr_cases 192, consumer + required on BEN-ENROLLMENT 72) carries an unapproved notes value ('BEN-ENROLLMENT consumes hr_cases when HRSD escalates a benefits question (escalated_to_benefits). Receiving side of handoff 1119.'). DESTRUCTIVE: reverting overwrites a non-empty notes value AND writes the 'notes' column (Rule #15 forbids any write to a column named exactly notes). Surfaced for user approval; not executed. Independent of the row-level B1B-S4 question on dependency strength."
    action: "User-approved only: PATCH /domain_module_data_objects?id=eq.598 with body {\"notes\": \"\"}. No other changes."
    affected_entities:
      - domain_module_data_objects
    extra_rule: "rule_15"
    surfaced: destructive

  - id: B1A-PHASE-P
    summary: "Multi-module (4 modules) with 0 personas post-Plan-3 (E1 fail): author the persona / RACI layer."
    finding: "Live triage 2026-06-02: 4 domain_modules and 0 domain_roles reaching this domain via role_modules. Plan 3 deleted the old _core personas, so E1 fires on this multi-module domain. DEFERRED per Phase-P discipline: personas/RACI are not auto-authored during a state-driven execute pass."
    action: "Author domain_roles (operational personas) function-anchored per references/roles.md section 7, wire role_modules reach across the 4 modules, add process_raci responsibility rows, and wire data_object_lifecycle_states.process_id. ATS is the worked reference (scripts/loaders/load_ats_personas_pilot.ts). Candidate personas: Benefits Administrator, Enrollment Specialist, Plan Manager, Compliance Analyst (mirrors the retired _core role set; the four legacy roles 10065-10068 still exist as the permission-bundle layer and anchor the persona shape)."
    extra_phase_p_triage: "2026-06-02"
    surfaced: personas_deferred

  - id: B1A-SELF-CONTAIN
    summary: "3 contributor/required-consumer rows break module self-containment (M9): embed or relax each."
    finding: "Live triage 2026-06-02: 3 domain_module_data_objects rows on this domain's modules are role=contributor or role=consumer with necessity=required, pointing at an entity mastered by another domain and not embedded_master here (enumerated in extra_m9_shapes). Each is an M9 self-containment violation. DESTRUCTIVE: the fix rewrites role/necessity on an existing DMDO row (convert to embedded_master with a local shell, or relax necessity to optional). Surfaced for user approval; not executed."
    action: "User-approved only, per row: convert to embedded_master (carry a local shell) or set necessity=optional (presence-conditional), per references/modules.md section 5 and SKILL.md M9. Do not document the dependency. NOTE: the deduction_codes and hr_cases rows interact with B1B-S4 / B2-S1 (hr_cases) and the PAYROLL boundary; resolve B2-S1 first for the hr_cases row."
    extra_m9_shapes:
      - {entity: deduction_codes, module: BEN-PLAN-DESIGN, role: contributor, master_domain: PAYROLL}
      - {entity: employment_events, module: BEN-ENROLLMENT, role: consumer, master_domain: HCM}
      - {entity: hr_cases, module: BEN-ENROLLMENT, role: consumer, master_domain: HRSD}
    extra_phase_p_triage: "2026-06-02"
    surfaced: destructive

