    summary: "B10b - 3 inbound handoffs (202, 203, 208) have target_domain_module_id NULL because SALES-PERF has zero modules; cannot resolve until the build lands."
    finding: |
      Live 2026-06-07: handoffs.target_domain_module_id is NULL on all three inbound rows:
      202 (CRM crm_opportunity.created, source_domain_module_id 48), 203 (CRM
      account.tier_changed, source_domain_module_id 46), 208 (REV-INTEL
      pipeline_health.degraded, source_domain_module_id 187). The target-side NULL is a
      B10b defect SALES-PERF owes but cannot fix until it has modules. (Handoff 208's
      source side is now populated, 187: REV-INTEL has modularized since the 2026-05-30
      snapshot, so that report-only owed-by-REV-INTEL item is resolved.)
    action: |
      After B1A-BUILD lands, re-run the B10b deterministic derivation against the new module
      set. Placeholder mapping (subject to revision under the chosen shape): 202 ->
      SALES-PERF-QUOTA (quota credit on opportunity creation), 203 -> SALES-PERF-TERRITORY
      (territory realignment on account tier change), 208 -> SALES-PERF-CAPACITY (capacity
      rebalance on pipeline degradation). PATCH the three rows. If any owning module is
      ambiguous under a 5/3-module collapse, surface that row before patching.
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-BUILD, reason: cannot patch target_domain_module_id until SALES-PERF modules exist}
    affected_handoffs:
      - {handoff_id: 202, direction: inbound, source_domain: CRM, target_domain: SALES-PERF, trigger_event: crm_opportunity.created, null_field: target_domain_module_id}
      - {handoff_id: 203, direction: inbound, source_domain: CRM, target_domain: SALES-PERF, trigger_event: account.tier_changed, null_field: target_domain_module_id}
      - {handoff_id: 208, direction: inbound, source_domain: REV-INTEL, target_domain: SALES-PERF, trigger_event: pipeline_health.degraded, null_field: target_domain_module_id}

  - id: B1B-V1
    summary: "Vendor-surface master placeholder, compensation_plans - 9 of 9 ICM vendors master this entity; data_object id 153 ALREADY exists (mastered by domain 60). Build must arbitrate co-mastership vs consumer, not mint a new one. Gated on the build."
    finding: |
      compensation_plans (data_objects id 153, entity_type operational_workflow) already
      exists, mastered by domain 60 (domain_module_data_objects module 78, role master) and
      consumed by domains 63/others. SALES-PERF has no link to it today. The ICM vendor
      surface (9 of 9) makes this a Core SALES-PERF master, so the build must add a
      SALES-PERF domain_module_data_objects row (co-master or consumer per arbitration) on
      the realizing module from B1A-BUILD, NOT a new data_object.
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-BUILD, reason: master link must anchor to a real domain_modules row}
      - {type: user_decision, ref: B2-M1, reason: target module identity depends on chosen module shape}
    vendor_evidence: [Varicent, Xactly Incent, Salesforce Spiff, CaptivateIQ, Performio, SAP Commissions, beqom Pay, QuotaPath, Anaplan Sales Planning]
    extra_existing_data_object_id: 153
    extra_proposed_module_8shape: SALES-PERF-PLAN-DESIGN

