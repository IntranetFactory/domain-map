schema_version: 2
domain: SALES-PERF
status: feedback_needed
next_action_by: user
last_audit: "2026-06-13"

# Audit 2026-06-13 (state-driven Validate, Rule #21) executed the one open agent item:
# B1A-B9D-VERIFY (B9d had never run on this domain). The B9d resolver classified all 3
# inbound handoff payloads in BOTH directions; result: 1 RESOLVED (pid 712), 1 RE-TAG
# (pid 54 -> 713, destructive source edit on CRM #203, NOT applied -- needs sign-off; same
# row as B2-H1), 1 ORPHAN (pid 713 "Determine sales resource allocation", owner CRM which
# is unbuilt). The ORPHAN routed additively to the OWNER (CRM): B2-B9D-OWN-713 added to
# audits/CRM/state.yaml + q-CRM.md (q19), record_status untouched, no catalog writes. B9d
# is now verified for SALES-PERF; B1A-B9D-VERIFY is resolved (see history.md).
#
# Everything else remains blocked on the user. SALES-PERF is UNBUILT: 0 domain_modules,
# 0 masters, 8 capabilities. Per the build-vs-scaffold rule the agent does NOT scaffold the
# module set; the build is SURFACED (B1A-BUILD) and gated on the user's B2-M1 module-shape
# decision (8 / 5 / 3). All master loads (B1B-V1..V7), the B10b target-side backfill
# (B1B-S1), and pairwise reconciliation (B2-P1) cascade off that build and cannot proceed
# until modules exist. next_action_by is "user": the load-bearing open item is B2-M1, a
# module-shape judgment call.
#
# Overlap note for the build: data_object compensation_plans (id 153) ALREADY exists in
# the catalog, mastered by domain 60 (module 78). The SALES-PERF build must decide
# co-mastership vs reuse for that entity rather than minting a fresh one; this is the
# same SALES-PERF / COMP-MGMT overlap that B2-C1 raises.

b1a:
  - id: B1A-BUILD
    summary: "UNBUILT domain: 0 domain_modules (M1 fail), 8 capabilities awaiting a build. Master-bearing under the overlay test (compensation_plans, quotas, commission_calculations, commission_statements). Agent does NOT scaffold; the build is surfaced and gated on the B2-M1 module-shape decision."
    finding: |
      Live 2026-06-07: domain id 102 has 0 domain_modules (M1 fail), 0 masters
      (domain_data_objects = 0, domain_module_data_objects = 0), and 8 capability_domains
      rows (capability_ids 89-96). Under the overlay test SALES-PERF is master-bearing
      (quotas, commissions, attainment are real records), so the prior leadership-tier
      zero-master exemption does not apply (rescinded 2026-06-02 skill-changelog). The
      domain is not deployable today. Per the build-vs-scaffold rule the agent does not
      author the module/master cascade unprompted; the build is surfaced for the user and
      is gated on the B2-M1 module-shape decision below.
    action: |
      User picks the B2-M1 module shape (8 / 5 / 3). On that decision, run Phase A then M
      then B then S to author domain_modules, domain_module_capabilities (every capability
      gets >=1 realizing module), masters via domain_module_data_objects (NOT the deprecated
      domain_data_objects rollup), lifecycle_states, aliases, and the single domain-grain
      system skill. If multi-module, run Phase P (personas / role_modules / process_raci)
      afterward. Reuse the existing compensation_plans data_object (id 153) rather than
      minting a new one; arbitrate co-mastership vs consumer with domain 60.
    blocked_by:
      - {type: user_decision, ref: B2-M1, reason: module shape (8 / 5 / 3) determines the entire build payload}

b1b:
