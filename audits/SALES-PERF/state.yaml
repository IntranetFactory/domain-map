b2:
  - id: B2-M1
    summary: Modularization hypothesis - choose between 8-module (one per capability + shared Commissions), 5-module (PLANNING + COMMISSIONS + DISPUTES + SPIF + COMP-EXPENSE), or 3-module (PLANNING / EXECUTION / FINANCE-BRIDGE) shape.
    question: Which module shape do you want for SALES-PERF, 8 / 5 / 3?
    options:
      - {label: "8-module", shape: [SALES-PERF-PLAN-DESIGN, SALES-PERF-TERRITORY, SALES-PERF-QUOTA, SALES-PERF-CAPACITY, SALES-PERF-COMMISSIONS, SALES-PERF-DISPUTES, SALES-PERF-SPIF, SALES-PERF-COMP-EXPENSE], rationale: one module per capability with shared Commissions, granular shape Varicent / Xactly / Spiff / CaptivateIQ / Performio / SAP cluster}
      - {label: "5-module", shape: [SALES-PERF-PLANNING, SALES-PERF-COMMISSIONS, SALES-PERF-DISPUTES, SALES-PERF-SPIF, SALES-PERF-COMP-EXPENSE], rationale: collapse planning surface (PLAN-DESIGN + TERRITORY + QUOTA + CAPACITY) into one module mirroring Anaplan / Pigment}
      - {label: "3-module", shape: [SALES-PERF-PLANNING, SALES-PERF-EXECUTION, SALES-PERF-FINANCE-BRIDGE], rationale: planning / execution / finance split for slim deploy targets}
    why: Decision rewrites B1B-V1 through B1B-V7 module targets and the B1B-S1 backfill mapping; must resolve before B1B-M1 loader is authored.

  - id: B2-C1
    summary: Capability-level RACI override on INCENTIVE-COMP-MGMT - the 8 capabilities all inherit Sales Operations ownership at the domain level, but INCENTIVE-COMP-MGMT overlaps the broader employee-comp surface mastered in COMP-MGMT (HR / Total-Rewards owned).
    question: Add a business_function_capabilities override for INCENTIVE-COMP-MGMT?
    options:
      - {label: "a", action: add Compensation Management as contributor}
      - {label: "b", action: leave domain-level RACI as-is (Sales Ops owns sales comp end-to-end)}
      - {label: "c", action: add Finance as co-owner reflecting the ASC 606 close cycle}
    why: Cross-functional ownership of INCENTIVE-COMP-MGMT affects buyer-persona filtering and the RACI overlay; not a structural blocker.

  - id: B2-R1
    summary: Regulation coverage for SALES-PERF (currently zero domain_regulations rows); ASC 606-21 / IFRS 15 cover commission capitalization, SOX covers internal controls, GDPR covers payee PII, Reg BI / FINRA cover commissioned sellers in regulated financial products.
    question: Which regulations should the SALES-PERF domain link to?
    options:
      - {label: "a", regulations: [ASC 606-21]}
      - {label: "b", regulations: [ASC 606-21, SOX]}
      - {label: "c", regulations: [ASC 606-21, SOX, GDPR]}
      - {label: "d", regulations: [ASC 606-21, SOX, GDPR, Reg BI, FINRA], note: full set including regulated-finance carve-out}
      - {label: "e", action: defer until Phase 0 confirms beqom Pay's regulated-finance specialization}
    why: Option (d) is informed by B3-RegFin (vendor research on beqom and regulated finance); options (a) through (c) are independent.

  - id: B2-H1
    summary: Existing discovery_substring handoff_processes row 106 (handoff 203 -> process 54 "Perform planning and management accounting") is incorrect; the substring matcher picked an accounting process for "account.tier_changed". The agent_curated row pointing at process 713 already exists and supersedes in spirit.
    question: What disposition for the discovery_substring row 106?
    options:
      - {label: "a", action: PATCH record_status='rejected' on row 106 and let the agent_curated row supersede}
      - {label: "b", action: DELETE row 106 entirely (cleaner audit trail)}
      - {label: "c", action: keep row 106 as-is (user disagrees with the audit verdict)}
    why: The discovery_substring row remains at record_status='new' and skews the H-band provenance report; user picks the disposition.

  - id: B2-P1
    summary: Pairwise reconciliation timing post-B1B-M1 - both CRM (edge weight 2) and REV-INTEL (edge weight 1) are below the default deep-dive threshold (>=3) today; SALES-PERF cannot reconcile until it has modules.
    question: When B1B-M1 lands, which pairwise passes do you want scheduled?
    options:
      - {label: "a", action: schedule both CRM and REV-INTEL pairwise passes immediately after B1B-M1 lands}
      - {label: "b", action: defer until edge weight independently crosses 3}
      - {label: "c", action: only run CRM pairwise since REV-INTEL is itself unmodularized (pairwise diff blocked symmetrically)}
    why: Cross-domain reconciliation is read-only by construction and not a structural blocker; timing is your call.

b3:
  - id: B3-CompExpense
    candidate: commission_expense_accruals + commission_expense_reversals + clawback_provisions as a dedicated SALES-PERF-COMP-EXPENSE module
    rationale: |
      Most ICM vendors (Varicent, Xactly, Performio) ship ASC 606 capitalization modules separately from the commission calculation engine. CaptivateIQ ships it inline. Salesforce Spiff is silent. The cardinality decision (separate module vs. enrich existing entity) affects M-band shape: 8-module shape ships SALES-PERF-COMP-EXPENSE as a distinct module, 5-module shape can fold it into SALES-PERF-COMMISSIONS or keep it separate, 3-module shape collapses into SALES-PERF-FINANCE-BRIDGE.
    vendor_evidence:
      - Varicent
      - Xactly Incent
      - Performio
      - CaptivateIQ
      - Salesforce Spiff
    proposed_module: SALES-PERF-COMP-EXPENSE
    extra_verification_path: Phase 0 against Varicent ASC 606 docs + Xactly Subscribe (RevRec) + CaptivateIQ inline; confirm vendor consensus before splitting the module.

  - id: B3-CreditingRules
    candidate: crediting_rules + eligibility_rules as a distinct rule-designer module vs. configuration tables under SALES-PERF-COMMISSIONS
    rationale: |
      Varicent and SAP Commissions have a separate "rule designer" surface with its own UI and its own audit trail; Spiff and CaptivateIQ ship rules inline as configuration; QuotaPath and Performio simplify or skip the surface. The decision affects whether the rule designer ships as a standalone module (and a standalone system skill) or as configuration entities inside SALES-PERF-COMMISSIONS.
    vendor_evidence:
      - {vendor: Varicent, evidence: 1st_class}
      - {vendor: SAP Commissions, evidence: 1st_class}
      - {vendor: Salesforce Spiff, evidence: secondary}
      - {vendor: CaptivateIQ, evidence: secondary}
      - {vendor: QuotaPath, evidence: absent}
      - {vendor: Performio, evidence: absent}
    proposed_module: SALES-PERF-COMMISSIONS (or a new SALES-PERF-RULES if vendor consensus says yes)
    extra_verification_path: Phase 0 on Varicent rule designer + SAP CallidusCloud schema + Spiff inline configuration.

  - id: B3-Overlay
    candidate: overlay_assignments as a distinct entity vs. plan-component flags
    rationale: |
      Beqom, Varicent, Xactly all model overlay seller compensation (regional VP, SE, CS) as a distinct entity with its own crediting rules; Performio and Spiff fold it into base plan components. The decision affects whether overlay is a master / junction or a flag column.
    vendor_evidence:
      - {vendor: beqom Pay, evidence: 1st_class}
      - {vendor: Varicent, evidence: 1st_class}
      - {vendor: Xactly Incent, evidence: 1st_class}
      - {vendor: Performio, evidence: absent}
      - {vendor: Salesforce Spiff, evidence: absent}
    proposed_module: SALES-PERF-COMMISSIONS
    extra_verification_path: Phase 0 on beqom whitepapers + Varicent overlay docs.

  - id: B3-CapacityCarveout
    candidate: capacity planning as a SALES-PERF module vs. as a separate SALES-PLANNING-PLATFORM domain owned by a different buyer
    rationale: |
      Anaplan and Pigment market capacity planning as a distinct workflow with its own buyer (RevOps Strategy vs. Sales Ops Comp); Fullcast positions it as part of "territory ops". The question is whether SALES-PERF-CAPACITY exists as a module here, or is re-routed to a new SALES-PLANNING-PLATFORM domain. Decision feeds B2-M1 and vice versa; if a separate platform market exists, queue SALES-PLANNING-PLATFORM to audits/_missing-domains.md.
    vendor_evidence:
      - Anaplan Sales Planning
      - Pigment
      - Fullcast
      - Board
    proposed_module: SALES-PERF-CAPACITY (or queue SALES-PLANNING-PLATFORM as candidate domain)
    extra_verification_path: Phase 0 on Anaplan Sales Planning + Pigment RevOps + Fullcast docs to test buyer separation.
