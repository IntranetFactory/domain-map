b2:
  - id: B2-1
    summary: Catalog UX copy direction for EM-FUND-PLATFORM (A4)
    question: What tone (operator-led vs brand-led) and emphasis (call out upgrade path to full FUND-ADMIN or stay self-contained) should the catalog_tagline + catalog_description carry? Supply exact text per Rule #20.
    options: [operator-led-mention-upgrade, operator-led-self-contained, brand-led-mention-upgrade, brand-led-self-contained, custom-text]
    why: Rule #20 forbids agent-authored buyer-voice copy without explicit user wording. Carried verbatim from 2026-05-30 audit.

  - id: B2-2
    summary: Collapse EM-FUND-CAPTABLE-LITE into EM-FUND-FORMATION?
    question: cap_tables is the only embedded master in module 29 (single capability EMFUND-CAPTABLE-LITE); flagship vendors ship cap-table as a tab inside fund-formation, not as a deployable. Keep current 4-module shape or merge module 29 into module 26 (drops module count to 3, still satisfies Rule #14 floor for 3-capability+ domains)?
    options: [keep-4-modules, collapse-29-into-26]
    why: Architectural intent question; agent cannot resolve. Carried verbatim from 2026-05-30 audit. Decision affects B1A-W5 destination module.

  - id: B2-3
    summary: Promote 3 of 4 modules to module_kind='starter' (Rule #19)?
    question: Domain's own description calls it bundle-only and architecturally not separately-purchasable. Convert 3 modules to starter (FUND-FORMATION stays as full anchor) or keep all 4 as full with documented bundle-atomicity? Starter materialization shifts the F-band + E-band design.
    options: [convert-3-to-starter, keep-all-4-full]
    why: Rule #19 starter contract changes permission materialization (3 baseline per starter vs lifecycle-gated per full); skill scope shifts. Blocks B1B-L1/L2/L3, B1B-S6, B1B-S7. Carried verbatim from 2026-05-30 audit.

  - id: B2-4
    summary: spv_subscriptions pattern flag confirmations
    question: Confirm has_submit_lock=true on spv_subscriptions (sub docs lock on signature, universal in private placement law)? Also possibly has_single_approver=true (GP signs SPV subscription accept)? Plus fund_formations.has_single_approver=true and spvs.has_single_approver=true?
    options: [submit_lock-only, submit_lock-and-single_approver-on-spv_subs, submit_lock-and-single_approver-on-all-3, no-flips]
    why: Pattern flags need per-row business confirmation; agent cannot infer. Blocks B1B-S2. Carried verbatim from 2026-05-30 audit.

  - id: B2-5
    summary: Pairwise reconciliation scope for FUND-ADMIN + CAP-TABLE neighbors
    question: "Cross-domain neighbors FUND-ADMIN (weight 1, 1 outbound handoff, embedded shells of 4 FUND-ADMIN-mastered entities) and CAP-TABLE (weight 1, 0 handoffs, embedded shell of cap_tables) both below the weight-3 deep-dive threshold. Accept one-line summary or request deep-dive?"
    options: [summary-only, deep-dive-FUND-ADMIN, deep-dive-CAP-TABLE, deep-dive-both]
    why: Pairwise reconciliation depth is a user editorial call. Carried verbatim from 2026-05-30 audit.

