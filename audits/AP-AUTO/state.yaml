    finding: >-
      domains.id=29 catalog_tagline and catalog_description both empty string.
      A4 hard fail; Rule #20 requires buyer-voice draft surfaced to user BEFORE
      any write and forbids overwrite once non-empty. Prior proposed tagline:
      "Capture invoices, match them to POs and receipts, and pay suppliers on
      time without the spreadsheet shuffle." User supplies exact wording for
      both fields.
    blocked_by:
      - {type: user_decision, ref: B2-CATALOG-COPY}

