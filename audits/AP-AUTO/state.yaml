b2:
  - id: B2-MOD-SHAPE
    summary: Decide AP-AUTO module split shape (2 vs 3 vs 4 modules) before M1 load.
    question: >-
      Which AP-AUTO module split should the M1 fix load: (a) 2 modules
      AP-AUTO-PROCESSING + AP-AUTO-PAYMENT-RUNS, (b) 3 modules
      AP-AUTO-INVOICE-CAPTURE + AP-AUTO-MATCHING + AP-AUTO-PAYMENT-RUNS (audit
      baseline, matches Tipalti / AvidXchange / Stampli), or (c) 4 modules
      adding AP-AUTO-SUPPLIER-PORTAL if portal scope sits inside AP-AUTO rather
      than SUP-LIFE?
    options: [a_two_module, b_three_module_recommended, c_four_module_with_portal]
    why: >-
      M1 load shape determines: capability-to-module routing for B1B-S2, which
      module masters each lifecycle state for B1B-S3, which modules retire skill
      28 and which inherit which skill_tools for B1B-S9, source/target module
      backfill for B1B-S10's 30 handoffs, intra-domain handoff endpoints for
      B1B-S11, and placement of the Bucket 3 candidate payment_methods.

  - id: B2-PATTERN-FLAGS
    summary: Re-evaluate B4 pattern flags on both AP-AUTO masters.
    question: >-
      For invoice_matches and payment_runs, set has_submit_lock and
      has_single_approver to true or false?
    options:
      - invoice_matches.has_submit_lock
      - invoice_matches.has_single_approver
      - payment_runs.has_submit_lock
      - payment_runs.has_single_approver
    why: >-
      Defaults are all false. Audit hypothesis: invoice_matches.has_submit_lock=true
      at released_for_payment; payment_runs.has_submit_lock=true at executed;
      payment_runs.has_single_approver org-policy-dependent (SOX dual-control
      typical). has_personal_content stays false on both (no PII payloads).

  - id: B2-SEND-EMAIL
    summary: Replace send_email skill_tool on legacy skill 28 with notify_person, or keep.
    question: >-
      Should the send_email skill_tools row (id 339, tool_id 37) on legacy skill
      ap-auto-system (id 28) PATCH to notify_person (tool_id TBD), or stay as
      send_email?
    options: [patch_to_notify_person, keep_send_email_with_workflow_justification]
    why: >-
      Rule #17 / F7 default for generic notifications is notify_person.
      send_email is a channel primitive. If SOX evidence trail requires written
      email per regulator, keep with workflow-specific justification.

  - id: B2-EVENT-12
    summary: Trigger event 12 bill_payment.completed disposition.
    question: >-
      trigger_event id 12 bill_payment.completed (data_object_id=205
      payment_runs, zero handoff references) DELETE, RENAME to
      payment_run.completed, or investigate bill_payments as candidate master?
    options: [delete_recommended, rename_to_payment_run_completed, investigate_bill_payments_as_master_routes_to_bucket3]

  - id: B2-CATALOG-COPY
    summary: User-supplied wording for domains.id=29 catalog_tagline + catalog_description (Rule #20).
    question: >-
      Exact buyer-voice wording for AP-AUTO catalog_tagline and
      catalog_description. Both currently empty. Rule #20 forbids overwrite once
      non-empty, so this is a first-write.
    options:
      - tagline_proposed: "Capture invoices, match them to POs and receipts, and pay suppliers on time without the spreadsheet shuffle."
      - description_user_supplies
    why: >-
      A4 hard fail until populated; Rule #20 voice rule requires user-approved
      wording.

  - id: B2-ALIAS-TUPLES
    summary: Approve exact data_object_aliases (alias_name, alias_type) tuples for AP-AUTO masters before bulk INSERT.
    question: >-
      Approve alias tuples for invoice_matches and payment_runs. Candidates
      surfaced previously: invoice_matches -> {Match, Three-Way Match, PPM,
      Reconciliation Outcome}; payment_runs -> {Payment Batch, Bill Run, Pay
      Cycle, Payment Schedule, BACS Run}. User specifies exact alias_type per
      tuple.
    options: [approve_all_as_listed, edit_per_tuple, defer_to_phase0_alias_research]

b3:
  - id: B3-INVOICE-CAPTURE-JOBS
    candidate: invoice_capture_jobs
    rationale: >-
      OCR/IDP capture job record (one row per ingestion attempt) carrying OCR
      confidence, mailbox-source, IDP-extraction-source. AP-AUTO currently
      carries only supplier_invoices (S2P-mastered) and invoice_matches; the
      capture job itself is missing. Proposed module: AP-AUTO-INVOICE-CAPTURE.
    vendor_evidence:
      - {vendor: Tipalti, evidence: 1st_class}
      - {vendor: Stampli, evidence: 1st_class}
      - {vendor: Esker, evidence: 1st_class}
      - {vendor: Basware, evidence: 1st_class}
    proposed_module: AP-AUTO-INVOICE-CAPTURE

  - id: B3-PAYMENT-METHODS
    candidate: payment_methods
    rationale: >-
      Per-supplier payment-method preference (ACH / wire / check / SEPA /
      virtual card / cross-border FX). Tipalti's core differentiator. Placement
      depends on Bucket 2 item 1 (B2-MOD-SHAPE): if 4-module split adds
      AP-AUTO-SUPPLIER-PORTAL, payment_methods likely lives there; otherwise
      AP-AUTO-PAYMENT-RUNS. May alternatively sit on suppliers (SUP-LIFE-mastered).
    vendor_evidence:
      - {vendor: Tipalti, evidence: 1st_class}
      - {vendor: AvidXchange, evidence: 1st_class}
      - {vendor: BILL AP, evidence: 1st_class}
    proposed_module: AP-AUTO-PAYMENT-RUNS

  - id: B3-PAYMENT-RUN-LINES
    candidate: payment_run_lines
    rationale: >-
      Per-invoice line on a payment run with line-level status (queued,
      executed, failed, returned, voided). Required for payment.exception event
      semantics to make sense at line level rather than whole-run level. All
      flagship vendors model this.
    vendor_evidence:
      - {vendor: Tipalti, evidence: 1st_class}
      - {vendor: AvidXchange, evidence: 1st_class}
    proposed_module: AP-AUTO-PAYMENT-RUNS

  - id: B3-UNNAMED-POOL
    candidate: unnamed_pool
    rationale: >-
      Speculative candidates flagged by the vendor matrix but not promoted to
      named Bucket 3 entries pending formal Phase 0 vetting:
      early_payment_discount_offers, dynamic_discounting_terms, fraud_flags,
      kyc_vendor_checks (overlaps SUP-LIFE), tax_withholding_records (overlaps
      tax provision domain, see TRM queue), virtual_card_authorizations.
    vendor_evidence:
      - {vendor: Tipalti, evidence: secondary}
      - {vendor: AvidXchange, evidence: secondary}
      - {vendor: BILL AP, evidence: secondary}
    proposed_module: null
