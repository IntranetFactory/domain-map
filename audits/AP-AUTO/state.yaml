schema_version: 2
domain: AP-AUTO
status: feedback_needed
next_action_by: agent
last_audit: "2026-05-31"

b1a:
  - id: B1A-S14
    summary: PATCH em-dash in domains.id=29 business_logic with user-approved replacement wording (CLAUDE.md hygiene).
    finding: >-
      domains.id=29 business_logic contains one U+2014 em-dash in the substring
      "and fraud rules <EMDASH> algorithm-heavy at the front of the workflow."
      CLAUDE.md forbids em-dashes everywhere in this project including catalog
      prose. The field itself is structured business_logic prose (not a notes
      column), so a targeted PATCH is mechanical, but the replacement wording
      requires user approval before any PATCH lands.
    action: >-
      Surface proposed replacement text "OCR/IDP for invoice capture, three-way
      match against PO and receipt, duplicate detection, and fraud rules.
      Algorithm-heavy at the front of the workflow." Wait for user approval or
      rewrite, then PATCH /domains?id=eq.29 with the approved business_logic
      value. Re-read after PATCH and confirm no U+2014 remaining.
    extra_field: business_logic
    extra_target_id: 29

b1b:
  - id: B1B-S1
    summary: Author AP-AUTO domain_modules (M1 hard fail, dominant blocker).
    finding: >-
      Zero domain_modules.domain_id=29 rows and zero domain_module_host_domains.domain_id=29
      rows. Rule #14 requires every domains row to have at least one module_kind=full
      module. This blocks F2/F3/F5, M4/M6, E1, B9b, B10b on AP-AUTO's side, and B12's
      permission materialization. Recommended baseline shape: 3 modules
      AP-AUTO-INVOICE-CAPTURE (contributor on supplier_invoices, future master on
      invoice_capture_jobs once Phase 0 vetted), AP-AUTO-MATCHING (masters
      invoice_matches), AP-AUTO-PAYMENT-RUNS (masters payment_runs).
    blocked_by:
      - {type: user_decision, ref: B2-MOD-SHAPE}
    affected_modules: []
    affected_entities: [invoice_matches, payment_runs, supplier_invoices, suppliers, org_units]

  - id: B1B-S2
    summary: Load 5-7 AP-AUTO capabilities (A2 hard fail).
    finding: >-
      Only 1 capability (APPROVAL-WORKFLOW, id 311, cross-cutting) attached to
      domain_id=29. A2 typical floor is 5-8 capabilities for an active SaaS market.
      Vendor surface implies INVOICE-CAPTURE-OCR, THREE-WAY-MATCH,
      INVOICE-APPROVAL-ROUTING, PAYMENT-EXECUTION, SUPPLIER-PAYMENT-PORTAL,
      AP-FRAUD-DETECTION, EARLY-PAYMENT-DISCOUNT, INVOICE-EXCEPTION-RESOLUTION.
    blocked_by:
      - {type: user_decision, ref: B2-MOD-SHAPE}
      - {type: prerequisite_entity, ref: B1B-S1}
    vendor_evidence: [Tipalti, AvidXchange, Stampli, BILL AP, Esker AP, Basware AP Automation]

  - id: B1B-S3
    summary: Author lifecycle states for invoice_matches and payment_runs (B12 hard fail).
    finding: >-
      Zero rows in data_object_lifecycle_states for either AP-AUTO master.
      invoice_matches state machine: queued, matched, quantity_variance, price_variance,
      no_po, exception_pending, manually_overridden, released_for_payment, closed.
      payment_runs state machine: draft, approved, executing, executed,
      partially_failed, failed, reconciled, closed. Each state with
      requires_permission=true becomes a permission once the realizing module exists.
      No config-shape exemption applies.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S1}
    affected_masters:
      - {data_object_id: 204, name: invoice_matches, target_module_id: null, workflow: three_way_match}
      - {data_object_id: 205, name: payment_runs, target_module_id: null, workflow: payment_execution}

  - id: B1B-S4
    summary: Author data_object_aliases for invoice_matches and payment_runs (B11 hard fail).
    finding: >-
      Zero data_object_aliases rows for either AP-AUTO master. Vendor terminology
      diverges. invoice_matches surfaces as Match / Three-Way Match / PPM /
      Reconciliation Outcome across Coupa and Tipalti. payment_runs surfaces as
      Payment Batch / Bill Run / Pay Cycle / Payment Schedule / BACS Run across
