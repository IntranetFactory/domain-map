b2:
  - id: B2-MOD-SHAPE
    summary: Decide AP-AUTO module split shape (2 vs 3 vs 4 modules) before M1 load.
    question: >-
      Which AP-AUTO module split should the M1 fix load: (a) 2 modules
      AP-AUTO-PROCESSING + AP-AUTO-PAYMENT-RUNS, (b) 3 modules
      AP-AUTO-INVOICE-CAPTURE + AP-AUTO-MATCHING + AP-AUTO-PAYMENT-RUNS (audit
      baseline, matches Tipalti / AvidXchange / Stampli), or (c) 4 modules
      adding AP-AUTO-SUPPLIER-PORTAL if portal scope sits inside AP-AUTO rather
      than SUP-LIFE?
    options: [a_two_module, b_three_module_recommended, c_four_module_with_portal]
    why: >-
      M1 load shape determines capability-to-module routing (B1B-S2), which module
      masters each lifecycle state (B1B-S3), source/target module backfill (B1B-S10),
      intra-domain handoff endpoints (B1B-S11), and placement of the B3 candidate payment_methods.

  - id: B2-PATTERN-FLAGS
    summary: Re-evaluate B4 pattern flags on both AP-AUTO masters (overwrites existing flag values).
    question: >-
      For invoice_matches and payment_runs, set has_submit_lock and has_single_approver
      to true or false? (These overwrite the current false defaults, so they are surfaced,
      not auto-flipped.)
    options:
      - invoice_matches.has_submit_lock
      - invoice_matches.has_single_approver
      - payment_runs.has_submit_lock
      - payment_runs.has_single_approver
    why: >-
      Defaults are all false (confirmed live 2026-06-07). Audit hypothesis:
      invoice_matches.has_submit_lock=true at released_for_payment;
      payment_runs.has_submit_lock=true at executed; payment_runs.has_single_approver
      org-policy-dependent (SOX dual-control typical). has_personal_content stays false on both.

