    summary: PATCH em-dash in domains.id=29 business_logic (overwrite of a non-empty value; needs user approval).
    finding: >-
      domains.id=29 business_logic still contains one U+2014 em-dash in the substring
      "and fraud rules <EMDASH> algorithm-heavy at the front of the workflow."
      CLAUDE.md forbids em-dashes everywhere including catalog prose. This is an
      OVERWRITE of a non-empty value, so it is destructive and is surfaced, not
      applied, per the additive/destructive boundary.
    action: >-
      On user approval, PATCH /domains?id=eq.29 business_logic to the approved
      replacement (proposed: "OCR/IDP for invoice capture, three-way match against
      PO and receipt, duplicate detection, and fraud rules. Algorithm-heavy at the
      front of the workflow."). Re-read after PATCH; confirm no U+2014 remaining.
    extra_field: business_logic
    extra_target_id: 29
