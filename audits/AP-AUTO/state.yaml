  - id: B1B-S11
    summary: Author intra-domain handoffs across new AP-AUTO modules (B9b, gated on M1).
    finding: >-
      Three intra-domain handoffs become required once B1B-S1's modules ship.
      AP-AUTO-INVOICE-CAPTURE to AP-AUTO-MATCHING on supplier_invoice.captured
      (contributor module hands captured invoice to matching module for three-way
      match). AP-AUTO-MATCHING to AP-AUTO-PAYMENT-RUNS on
      invoice_match.three_way_passed (matched invoice queued into next payment
      run). AP-AUTO-MATCHING to AP-AUTO-PAYMENT-RUNS on invoice_match.manual_override
      (overridden invoice flows into payment-run inclusion). All
      integration_pattern=lifecycle_progression, friction_level=low.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S1}

  - id: B1B-S12
