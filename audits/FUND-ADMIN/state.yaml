b1a:
  - id: B1A-M1
    summary: Insert 4 missing regulations rows (SEC Marketing Rule, ILPA Reporting Standards, CRS, Cayman Mutual Funds Law) and link via domain_regulations to FUND-ADMIN (id 160).
    finding: |
      domain_regulations on FUND-ADMIN currently links 2 of the 6 regulations the 2026-05-30 audit flagged: AIFMD (regulation_id 41) and FATCA (50). The remaining 4 (SEC Marketing Rule Rule 206(4)-1, ILPA Reporting Standards, CRS, Cayman Mutual Funds Law) do not yet exist in the regulations table and so could not be linked during the 2026-05-31 continuation.
    action: |
      Idempotent loader extension: read existing regulations by regulation_name; insert the 4 missing rows with appropriate descriptions; then insert 4 domain_regulations rows linking each to domain_id 160 with applicability (AIFMD-class: mandatory; SEC Marketing Rule: mandatory for US-marketed funds; ILPA Reporting Standards: voluntary-but-de-facto-mandatory; CRS: mandatory for funds accepting CRS-reportable LP capital; Cayman Mutual Funds Law: mandatory for Cayman-domiciled funds).
    affected_entities:
      - sec_marketing_rule
      - ilpa_reporting_standards
      - common_reporting_standard
      - cayman_mutual_funds_law

  - id: B1A-W1
    summary: Insert subscription_documents master under FUND-ADMIN-LP-COMMITMENTS (module 13).
    finding: |
      Subscription documents are the legal artifact of an lp_subscription; PDF blobs + version history. Universal in Juniper Square, Allvue, Carta. Cannot be folded into lp_subscriptions because docs persist across amended subscriptions.
    action: |
      Insert data_objects row subscription_documents (kind=domain_owned); DMDO master+required on module 13; data_object_relationships subscription_documents -> lp_subscriptions (many_to_one reference); user-edge per Rule #10; lifecycle states drafted -> signed -> countersigned -> archived (with countersigned state requires_permission=true on module 13).
    affected_modules: [13]
    affected_masters:
      - data_object_id: null
        name: subscription_documents
        target_module_id: 13
        workflow: "drafted->signed->countersigned->archived"
    vendor_evidence: [Juniper Square, Allvue, Carta Fund Admin]

  - id: B1A-W2
    summary: Insert lp_kyc_records master under FUND-ADMIN-LP-COMMITMENTS (module 13).
    finding: |
      KYC/AML output + sanction-screening trail; required at subscription time and re-screened periodically. Distinct from lp_subscriptions which is the legal commitment.
    action: |
      Insert data_objects row lp_kyc_records (kind=domain_owned); DMDO master+required on module 13; relationships lp_kyc_records -> lp_subscriptions (many_to_one) and lp_kyc_records -> lp_commitments (many_to_one); lifecycle states pending -> screened -> cleared -> requires_review with the cleared state requires_permission=true.
    affected_modules: [13]
    affected_masters:
      - data_object_id: null
        name: lp_kyc_records
        target_module_id: 13
        workflow: "pending->screened->cleared->requires_review"
    vendor_evidence: [Juniper Square, Allvue, Carta Fund Admin]

  - id: B1A-W3
    summary: Insert distribution_notices master under FUND-ADMIN-DISTRIBUTIONS (module 15).
    finding: |
      The LP-facing notice for a fund_distribution is a separately-stored artifact with publication timestamps; ILPA template format. Universal across flagship vendors.
    action: |
      Insert data_objects row distribution_notices (kind=domain_owned, has_submit_lock=true); DMDO master+required on module 15; relationship distribution_notices -> fund_distributions (many_to_one); lifecycle states drafted -> reviewed -> approved -> published with approved state requires_permission=true.
    affected_modules: [15]
    affected_masters:
      - data_object_id: null
        name: distribution_notices
        target_module_id: 15
        workflow: "drafted->reviewed->approved->published"
    vendor_evidence: [Juniper Square, Allvue, Carta Fund Admin, eFront]

