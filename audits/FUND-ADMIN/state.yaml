b1b:
  - id: B1B-L7
    summary: fund_ledger_entries (756) config-shape exemption decision before authoring lifecycle states.
    finding: |
      Rule 12 allows a config-shape exemption from lifecycle authoring for author-once / occasionally-edit masters where record_status alone is the workflow. fund_ledger_entries fits the shape but the exemption requires user surfacing per Rule 15 (no auto-write to notes).
    blocked_by:
      - type: user_decision
        ref: B2-LEDGER-LIFECYCLE
        reason: "Surface to user, then either author lifecycle states or accept the exemption with the audit narrative as the record."

  - id: B1B-H1a
    summary: Handoff 1040 APQC tagging, supersede legacy discovery_substring tag with agent-curated PCF 10751?
    finding: |
      Handoff 1040 (FUND-LEDGER -> INV-CRM on fund.final_close -> lp_prospects) currently has only a discovery_substring tag (id 177, PCF 10737 Manage international funds/consolidation). The 2026-05-30 proposal recommended PCF 10751 (Perform capital planning and project approval) with medium confidence and explicitly deferred superseding to user.
    blocked_by:
      - type: user_decision
        ref: B2-H1A-OVERRIDE
        reason: "Whether to keep, supersede, or add a second tag is a user call."

  - id: B1B-H1e
    summary: Handoff 1044 APQC tagging, replace current strategy-development tags with a payments-side PCF?
    finding: |
      Handoff 1044 (CAP-TABLE -> DISTRIBUTIONS on exit_scenario.executed -> fund_distributions) has 2 agent_curated tags (PCF 10952 Develop exit strategy id 712 + PCF 16805 Develop merger/demerger/acquisition/exit strategy id 713). The 2026-05-30 proposal recommended a payments-side PCF (10911 family) which is a closer post-exit-distribution match than strategy-development.
    blocked_by:
      - type: user_decision
        ref: B2-H1E-OVERRIDE
        reason: "Whether to keep strategy tags, replace, or attach both is a user call."

  - id: B1B-H1g
    summary: Handoff 1046 APQC tagging, attach PCF 10737 (low confidence) or run Phase 0 search for a closer fund-launch PCF?
    finding: |
      Handoff 1046 (EM-FUND-PLATFORM -> FUND-LEDGER on fund_formation.operational -> funds) has zero handoff_processes rows. The 2026-05-30 proposal suggested PCF 10737 with low confidence and recommended a Phase 0 search for a fund-launch row.
    blocked_by:
      - type: depends_on
        ref: B3-PCF-FUND-LAUNCH
        reason: "Phase 0 PCF search ranks as Bucket 3 surface area, eyeball-mode could resolve immediately."

  - id: B1B-CATALOG-UX
    summary: A4 catalog_tagline and catalog_description on domain row 160 remain empty strings.
    finding: |
      Rule 20 forbids writing catalog_tagline / catalog_description without user approval of the exact wording. The 2026-05-30 audit surfaced a draft tagline but no description direction was supplied.
    blocked_by:
      - type: user_decision
        ref: B2-CATALOG-UX
        reason: "User-authored copy required by Rule 20."

  - id: B1B-PATTERN-FLAGS
    summary: Pattern flags on 4 masters (capital_calls, fund_distributions, fund_close_periods, waterfall_calculations) plausibly need flips, principally has_single_approver=true on waterfall_calculations.
    finding: |
      All 4 masters default-false on every pattern flag. Strongest case: waterfall_calculations.has_single_approver=true (CFO/COO sign-off universal). Weaker cases follow once the workflow shape is settled.
    blocked_by:
      - type: user_decision
        ref: B2-PATTERN-FLAGS
        reason: "B4 re-evaluation is a user-judgment flip per the 2026-05-30 audit, depends partly on B1A-W3 / W4 for the new notice entities."

  - id: B1B-E-BAND
    summary: Phase E (roles, role_modules, role_permissions, permissions) entirely empty for FUND-ADMIN.
    finding: |
      0 roles, 0 role_modules, 0 role_permissions, 0 module-scoped permissions across modules 12, 13, 14, 15. E1 through E5 fail. Workflow-gate permissions for the 6 requires_permission=true states (existing fund.final_close, fund_distribution.declared, plus the 6 added by B1A-L1..L6) cannot materialize without the role bundling layer.
    blocked_by:
      - type: prerequisite_entity
        ref: B1A-L1
      - type: prerequisite_entity
        ref: B1A-L2
      - type: prerequisite_entity
        ref: B1A-L3
      - type: prerequisite_entity
        ref: B1A-L4
      - type: prerequisite_entity
        ref: B1A-L5
      - type: prerequisite_entity
        ref: B1A-L6
      - type: user_decision
        ref: B2-APPROVAL-WORKFLOW
        reason: "APPROVAL-WORKFLOW realization shape gates which module owns the cross-cutting gate."
    affected_modules: [12, 13, 14, 15]

  - id: B1B-F-BAND
    summary: Phase F (system skills + tools + skill_tools) entirely empty for FUND-ADMIN.
    finding: |
      0 system skills across modules 12, 13, 14, 15. F2 / F3 / F5 fail, Semantius score uncomputable.
    blocked_by:
      - type: prerequisite_entity
        ref: B1B-E-BAND
        reason: "System skills are typically authored after the role layer per the per-domain checklist."
    affected_modules: [12, 13, 14, 15]

  - id: B1B-RE-INVEST-M7
    summary: Legacy domain_data_objects master rows on RE-INVEST for capital_calls (id 597) and fund_distributions (id 598).
    finding: |
      Both rows are pre-modular drift, module-level mastership is clean (FUND-ADMIN modules 14 + 15 only). RE-INVEST has zero domain_modules rows so the legacy domain row registers as a second master at domain-level.
    blocked_by:
      - type: domain_audit
        blocking_domain: RE-INVEST
        milestone: M7-delete-legacy-rows-or-load-modules
    affected_entities: [capital_calls, fund_distributions]

b2:
  - id: B2-CATALOG-UX
    summary: A4 catalog_tagline + catalog_description wording for FUND-ADMIN.
    question: Please provide the exact wording for catalog_tagline (single-sentence buyer-voice line) and catalog_description (1-3 buyer-voice paragraphs).
    options:
      - "Accept draft tagline carried from 2026-05-30 and author a description from scratch."
      - "Author both from scratch in your own voice (operations-led or CFO-led tone)."
      - "Defer until other A / M-band fixes land."
    why: "Rule 20 forbids the agent drafting and writing this without explicit per-row approval."

  - id: B2-CLOSE-MODULE
    summary: Split FUND-ADMIN-CLOSE-AND-AUDIT off FUND-LEDGER as a 5th module?
    question: "Carta and Allvue both expose Close as a distinct surface. Promote fund_close_periods + audit-support capability to its own module, or keep current 4-module shape?"
    options: [Split, "Keep 4-module shape", Defer]
    why: "Module shape decision, gates B1A-L4 module attribution and the audit-support capability's home."

  - id: B2-LP-PORTAL
    summary: Promote LP-PORTAL from a capability to a 5th deployable module?
    question: "Juniper Square markets the LP portal as a standalone product. Promote capability 498 to its own module under domain 160, or keep as capability of LP-COMMITMENTS?"
    options: [Promote, "Keep as capability", Defer]
    why: "Affects pcap_statements lifecycle state module attribution within B1A-L2."

  - id: B2-PATTERN-FLAGS
    summary: Pattern flag flips on waterfall_calculations and 3 adjacent masters.
    question: "Confirm waterfall_calculations.has_single_approver=true (CFO/COO sign-off universal). Also confirm or decline has_submit_lock=true on waterfall_calculations, has_single_approver on capital_calls and fund_distributions, submit_lock on fund_close_periods."
    options: ["Approve all suggested flips", "Approve waterfall.has_single_approver only", "Decline all", Other]
    why: "B4 re-evaluation is a structural change, default-false on highest-stakes approval is almost certainly wrong but the precise flag set is a user call."

  - id: B2-APPROVAL-WORKFLOW
    summary: APPROVAL-WORKFLOW cross-cutting capability realization shape.
    question: "Should each FUND-ADMIN module materialize its own workflow-gate permissions (capital call approval, distribution waterfall approval, fund close approval), or should APPROVAL-WORKFLOW be a shared abstraction module?"
    options: ["Per-module gates", "Shared abstraction", Hybrid]
    why: "Cascades into Phase E role design and gates B1B-E-BAND."

  - id: B2-PAIRWISE-RECONCILIATION
    summary: Inline pairwise reconciliation with PORT-MONIT and INV-CRM, or defer per-neighbor passes?
    question: "Cross-domain weights PORT-MONIT (~5), INV-CRM (3). Procedure says deep dive at weight >=3. Run inline now, or defer to per-neighbor Validate runs?"
    options: ["Inline now", Defer]
    why: "Throughput vs depth tradeoff, the gap-list itself does not change either way."

  - id: B2-LEDGER-LIFECYCLE
    summary: fund_ledger_entries (756) lifecycle authoring or config-shape exemption?
    question: "fund_ledger_entries fits the Rule 12 config-shape exemption (append-only journal where record_status is the workflow). Accept the exemption (record in audit narrative, no notes write), or author a lifecycle (drafted -> posted -> reversed)?"
    options: ["Accept exemption", "Author lifecycle"]
    why: "Rule 15 forbids auto-writing the exemption to data_objects.notes, the call needs the user."

  - id: B2-H1A-OVERRIDE
    summary: Handoff 1040 APQC tag, supersede the legacy discovery_substring PCF 10737?
    question: "Replace the existing discovery_substring tag with PCF 10751 (Perform capital planning and project approval), add PCF 10751 as a second agent_curated tag alongside the legacy, or keep current."
    options: [Replace, "Add second", "Keep current", Defer]

  - id: B2-H1E-OVERRIDE
    summary: Handoff 1044 APQC tag, replace strategy-development tags with payments-side PCF?
    question: "Replace the 2 strategy-development tags (PCF 10952 + 16805) with a payments-side PCF (10911 family), keep current, or attach both."
    options: ["Replace with 10911-family", "Keep current", "Attach both", Defer]

b3:
  - id: B3-GP-CARRY-ALLOCATIONS
    candidate: gp_carry_allocations
    rationale: "Separates LP distribution from GP carry calculation. Belongs either in a new FUND-ADMIN-CARRY module or in FUND-ADMIN-DISTRIBUTIONS. Cross-pollinates with candidate MGMT-CO-ACCT domain queued in _missing-domains.md."
    vendor_evidence: ["Carta GP Books", "Allvue GP Admin"]
    proposed_module: "FUND-ADMIN-CARRY (new) or FUND-ADMIN-DISTRIBUTIONS"

  - id: B3-LP-SIDE-LETTERS
    candidate: lp_side_letters
    rationale: "Bilateral amendments that override standard subscription terms (fee discounts, co-investment rights, MFN clauses). Universal across the flagship vendors."
    vendor_evidence: ["Juniper Square", "Carta Fund Admin", Allvue, eFront]
    proposed_module: FUND-ADMIN-LP-COMMITMENTS

  - id: B3-NAV-REVALUATIONS
    candidate: nav_revaluations
    rationale: "FX revaluation of fund NAV at period-end across multi-currency LP commitments."
    vendor_evidence: [eFront, Allvue]
    proposed_module: FUND-ADMIN-FUND-LEDGER

  - id: B3-RECALLABLE-DISTRIBUTIONS
    candidate: recallable_distributions
    rationale: "LPA-driven distributions that count back against unfunded commitments and can be re-called within a window. Affects DPI / RVPI calculations."
    vendor_evidence: [Allvue, eFront, "Juniper Square"]
    proposed_module: FUND-ADMIN-DISTRIBUTIONS

  - id: B3-FUND-EXPENSES
    candidate: fund_expenses
    rationale: "Fund operating expenses (audit, legal, admin) charged against fund NAV, tracked separately from fund_ledger_entries because of LP-allocation rules."
    vendor_evidence: [Allvue, eFront, "Carta Fund Admin", "Juniper Square"]
    proposed_module: FUND-ADMIN-FUND-LEDGER

  - id: B3-LP-COMMITMENT-TRANSFERS
    candidate: lp_commitment_transfers
    rationale: "Secondaries market, tracks transfer of an LP commitment from seller LP to buyer LP. Significant lifecycle distinct from lp_subscriptions."
    vendor_evidence: ["Juniper Square", "Carta Fund Admin"]
    proposed_module: FUND-ADMIN-LP-COMMITMENTS

  - id: B3-PCF-FUND-LAUNCH
    candidate: pcf_row_for_fund_launch
    rationale: "APQC PCF Cross-Industry framework appears to lack a dedicated fund-launch process, handoff 1046 (EM-FUND-PLATFORM -> FUND-LEDGER on fund_formation.operational) currently has no clean PCF match. Phase 0 search across PCF Financial Services and PCF Insurance vertical frameworks may surface a better row."
    vendor_evidence: ["APQC PCF Financial Services framework"]
    proposed_module: "n/a (cross-cutting tag)"
