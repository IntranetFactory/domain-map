b1b:
  - id: B1B-S1-CLUSTER
    summary: "Module + capability + UX + relationship + lifecycle + skill cluster (10 sub-items from 2026-05-30 audit), all gated on B2-1 re-homing decision."
    finding: >-
      Of the 13 Bucket 1 items from the 2026-05-30 audit, 2 resolved (B1-S6 CPRA link,
      B1-S13 row 1 handoff 283 APQC) and 11 remain pending: B1-S1 (modules; 0 domain_modules
