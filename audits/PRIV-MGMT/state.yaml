      B1-S3 (Rule #20 catalog_tagline + catalog_description on the domains row, both empty),
      B1-S4 (two flagship privacy specialists missing from solutions),
      B1-S7 (B10b PATCH on handoffs 283 + 288 target_domain_module_id),
      B1-S8 (B7 users edges on prospective PRIV-MGMT masters),
      B1-S9 (B6 intra-domain relationships among prospective masters),
      B1-S10 (B11 aliases on prospective masters),
      B1-S11 (B12 lifecycle states on prospective masters),
      B1-S12 (F2 / F3 / F4 / F7 system skills + tools per Rule #17).
      Every sub-item depends on the B2-1 re-homing decision (which masters land in PRIV-MGMT)
      and on B2-2 (module-split shape). B1-S3 additionally needs B2-3 (Rule #20 wording).
      B1-S4 additionally needs Bucket 3 vetting on flagship privacy specialist additions.
      Collapsed into one b1b row because every sub-item shares the same gating decision
      and the same fix shape (Phase A / B / C / E / F load chained off B2-1's answer).
    blocked_by:
