b2:
  - id: B2-S1
    summary: "Pick RE-CRE module split shape."
    question: "How many modules should RE-CRE be split into and what masters does each own?"
    options:
      - "(a) 2 modules: RE-CRE-LEASING (commercial_leases + sublease_transactions + tenant_credit_records) + RE-CRE-OPERATIONS (cam_charges + stacking_plans + building_certifications)"
      - "(b) 3 modules: RE-CRE-LEASING + RE-CRE-CAM-OPS + RE-CRE-SPACE-INVENTORY (folding market intel in)"
      - "(c) 4 modules (proposed): RE-CRE-LEASING + RE-CRE-CAM-OPS + RE-CRE-SPACE-INVENTORY + RE-CRE-MARKET-INTEL"
      - "(d) 5 modules: split RE-CRE-SUBLEASE out of leasing"
    why: "Architectural decision driving module FKs on handoffs, lifecycle-state realizing modules, permission prefixes, and role bundles. Cannot be auto-derived from market shape alone."

  - id: B2-S2
    summary: "Confirm target master ids on RE-INVEST and AP-AUTO for B1B-B8 cross-domain relationships."
    question: "What are the target master ids for the 5 missing cross-domain edges, and are those masters present in the catalog?"
    options:
      - "Supply ids for: investment_property_holdings (RE-INVEST), investment_underwriting (RE-INVEST), payable_invoices (AP-AUTO), real_estate_properties (REAL-EST id 344 exists), real_estate_transactions (RE-BROKERAGE id 353 exists)"
      - "Defer RE-INVEST edges pending RE-INVEST audit"
    why: "RE-INVEST has not been audited under schema_version 2; target masters may not yet exist or may carry different names."

  - id: B2-S3
    summary: "Handoff 304 disposition (RE-CRE to FSM on tenant_maintenance_requests payload owned by RE-PROP-MGMT)."
    question: "How should the B5 boundary violation on handoff 304 be resolved?"
    options:
      - "(a) DELETE handoff 304 (also delete handoff_processes id=369); RE-PROP-MGMT owns the residential FSM handoff"
      - "(b) Author CRE-scoped cre_tenant_maintenance_requests data_object on RE-CRE; re-target handoff 304 payload"
      - "(c) Accept tenant_maintenance_requests as a contributor DMDO on RE-CRE; keep handoff"
      - "(d) Re-source handoff from RE-PROP-MGMT (change source_domain_id 145 to 144)"
    why: "Whether RE-CRE scope includes CRE-side facility maintenance vs. delegates entirely to FSM via RE-PROP-MGMT is a scope-boundary call."

  - id: B2-S4
    summary: "investment_properties (id 366) attribution on RE-CRE."
    question: "Should investment_properties remain a contributor + required DMDO on RE-CRE, or change?"
    options:
      - "(a) Keep as contributor + required"
      - "(b) Demote to embedded_master + optional per Rule #16 (infrastructure master pattern)"
      - "(c) Rename data_object to cre_investment_holdings to disambiguate from RE-INVEST naming"
    why: "Cross-domain master attribution requires confirming where canonical master lives; RE-INVEST audit context required."

  - id: B2-S5
    summary: "B4 pattern-flag positive review on 6 RE-CRE masters."
    question: "Confirm per flag per master (yes/no): commercial_leases.has_submit_lock; commercial_leases.has_single_approver; tenant_credit_records.has_personal_content; tenant_credit_records.has_single_approver; sublease_transactions.has_submit_lock; sublease_transactions.has_single_approver; building_certifications.has_submit_lock; cam_charges.has_submit_lock."
    options:
      - "Per-flag yes/no across 8 candidates"
    why: "Workflow-shape judgments owned by user; Rule #15 forbids notes commentary on the decisions."

  - id: B2-S6
    summary: "Catalog UX wording on RE-CRE (Rule #20)."
    question: "Approve / rewrite / replace the draft catalog_tagline and 3-paragraph catalog_description for RE-CRE."
    options:
      - "Approve drafts as-is"
      - "Request rewrites (specify direction)"
      - "Supply replacement text"
    why: "Marketing-voice copy is user owned; once set, Rule #20 forbids unapproved overwrites."

  - id: B2-S7
    summary: "D1: confirm in-scope domain_regulations for RE-CRE."
    question: "Which of ASC 842, IFRS 16, ADA, Fair Housing Act, OSHA to load as domain_regulations on RE-CRE?"
    options:
      - "All five"
      - "Universal three only (ASC 842, IFRS 16, ADA)"
      - "User-selected subset"
    why: "Regulation applicability is jurisdiction and buyer-side judgment, not purely structural."

