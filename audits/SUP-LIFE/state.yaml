    candidate: supplier_contacts
    rationale: "Flagship supplier-experience platforms model per-supplier contact rosters (procurement contact, AP contact, legal contact, certification contact) as a structured collection separate from the supplier record; currently no supplier_contacts master and contact info lives implicitly in suppliers"
    proposed_module: SUP-LIFE-MASTER

  - id: B3-2
    candidate: supplier_questionnaires
    rationale: "Flagship platforms model the questionnaire-instance as a first-class object separate from the qualification; a qualification may carry N questionnaires across categories (insurance, security, ESG, financial); currently supplier_qualifications conflates the workflow with its survey content"
    proposed_module: SUP-LIFE-ONBOARDING-QUAL

  - id: B3-3
    candidate: supplier_sanctions_screenings
    rationale: "KYC/AML vendors model per-supplier sanctions screening events as time-stamped records (PEP screen, OFAC, EU consolidated, UK HM Treasury); 6AMLD (regulation id 11) and Bank Secrecy Act (regulation id 49), both already in domain_regulations for SUP-LIFE, mandate periodic re-screening with audit trails"
    proposed_module: SUP-LIFE-ONBOARDING-QUAL

  - id: B3-4
    candidate: supplier_diversity_classifications
    rationale: "Diversity vendors model supplier diversity (MBE, WBE, VBE, 8(a), HUBZone, LGBTBE) as structured classifications with cert expiry; Tier-1/Tier-2 spend reporting in US public-procurement contexts depends on this; currently no entity, the concept lives implicitly in supplier_certifications"
