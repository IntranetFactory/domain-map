      - "supplier_qualifications.has_submit_lock = true (post-approval immutability)"
      - "supplier_qualifications.has_single_approver = true (one Procurement/Compliance approver)"
      - "supplier_certifications.has_submit_lock = true (uploaded cert document immutable)"
      - "supplier_risk_assessments.has_single_approver = true (designated GRC reviewer approves the score)"
    why: "Pattern flags are workflow-shape judgments owned by the user; Rule #15 forbids the agent auto-populating accompanying notes"

