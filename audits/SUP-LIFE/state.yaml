b2:
  - id: B2-S1
    summary: "Module split granularity for SUP-LIFE: 3, 4, or 5 modules (gates the entire build)"
    question: "How many SUP-LIFE modules and where do the boundaries fall? Rule #14 floor is at least 2 modules at 3 or more capabilities; SUP-LIFE has 6 masters with distinct workflows."
    options:
      - "a: 4-module split (SUP-LIFE-MASTER mastering suppliers; SUP-LIFE-ONBOARDING-QUAL mastering supplier_onboardings + supplier_qualifications + supplier_certifications; SUP-LIFE-PERFORMANCE mastering supplier_scorecards; SUP-LIFE-RISK mastering supplier_risk_assessments)"
      - "b: 3-module fold (RISK into PERFORMANCE; same first two modules)"
      - "c: 5-module split (promote SUP-LIFE-CERTIFICATION-TRACKING out of ONBOARDING-QUAL)"
      - "d: custom boundary specified by user"
    why: "Module boundary is editorial/deployability judgment; agent has no opinion stronger than the structural floor. Resolving this unblocks B1A-BUILD and the entire b1b cascade."
    evidence: "HICX, SAP Ariba SLP, Coupa SIM, Ivalua, and Jaggaer all package this market four ways: a supplier master/portal, a combined onboarding+qualification+certification workflow, a performance/scorecard surface, and a separate risk overlay (Ariba sells Supplier Risk as a distinct add-on on top of SLP). This supports option (a)'s 4-module split over folding risk into performance (b) or promoting certification tracking out of qualification (c)."

  - id: B2-S2
    summary: "Per-flag confirmation on the 5 proposed B4 pattern-flag flips"
    question: "For each proposed flip, yes or no? Per Rule #12 every master MUST be positively re-evaluated."
    options:
