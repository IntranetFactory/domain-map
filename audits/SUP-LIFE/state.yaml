    proposed_module: SUP-LIFE-MASTER

  - id: B3-2
    candidate: supplier_questionnaires
    rationale: "HICX Surveys, Ariba SLP Qualifications Questionnaires, Coupa SIM RFI Forms, Ivalua Questionnaire library all model the questionnaire-instance as a first-class object separate from the qualification; a qualification may carry N questionnaires across categories (insurance, security, ESG, financial); currently supplier_qualifications conflates the workflow with its survey content"
    vendor_evidence: [HICX Surveys, SAP Ariba SLP, Coupa Supplier Information Management, Ivalua Platform]
    proposed_module: SUP-LIFE-ONBOARDING-QUAL

  - id: B3-3
    candidate: supplier_sanctions_screenings
    rationale: "LSEG World-Check, Refinitiv, Dow Jones Risk Center, Exiger as KYC/AML vendors model per-supplier sanctions screening events as time-stamped records (PEP screen, OFAC, EU consolidated, UK HM Treasury); 6AMLD (regulation id 11) and Bank Secrecy Act (regulation id 49), both already in domain_regulations for SUP-LIFE, mandate periodic re-screening with audit trails"
    vendor_evidence: [LSEG World-Check, Refinitiv, Dow Jones Risk Center, Exiger]
    proposed_module: SUP-LIFE-ONBOARDING-QUAL

  - id: B3-4
    candidate: supplier_diversity_classifications
    rationale: "SupplierGATEWAY, Tealbook, Coupa Diversity, ConnXus model supplier diversity (MBE, WBE, VBE, 8(a), HUBZone, LGBTBE) as structured classifications with cert expiry; Tier-1/Tier-2 spend reporting in US public-procurement contexts depends on this; currently no entity, the concept lives implicitly in supplier_certifications"
    vendor_evidence: [SupplierGATEWAY, Tealbook, Coupa Diversity, ConnXus]
    proposed_module: SUP-LIFE-MASTER

