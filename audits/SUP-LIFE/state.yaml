    candidate: supplier_audits
    rationale: "HICX, Ariba SLP, Coupa SIM model supplier-side audits (a procurement audit performed against the supplier, distinct from the AUDIT domain's internal audit engagements); findings drive corrective-action plans (CAPAs); currently no entity; the AUDIT domain's audit_engagements and audit_findings are the wrong-shape semantic neighbor"
