      - {type: user_decision, ref: B2-MODULE-SPLIT, reason: module count determines role-to-module wiring}
  - id: B1B-T7
    summary: Author DCIM lifecycle states; surface config-shape exemption for sensor masters.
    finding: Zero data_object_lifecycle_states rows for any DCIM master. B12 fails. Workflow-bearing masters (dc_capacity_plans, dc_power_circuits, dc_racks) need full state machines; sensor-shape masters (dc_environmental_readings, dc_port_connections, dc_cable_connections) are config-shape exemption candidates per Rule #12.
    blocked_by:
