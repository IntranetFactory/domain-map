b2:
  - id: B2-MODULE-SPLIT
    summary: Confirm the DCIM module split (the 3-module split is already built as the recommended option).
    question: "Keep the built 3-module split (Asset and Space Management: dc_racks, dc_cabinets, dc_change_requests; Power and Environmental Monitoring: PDUs, power_circuits, UPSes, cooling_units, environmental_readings; Capacity and Connectivity Planning: capacity_plans, port_connections, cable_connections), or restructure into 2 (fold connectivity into asset) or 4 (split connectivity into its own module)?"
    options: [a-3-module-built, b-2-module-fold-connectivity, c-4-module-split-connectivity]
    why: "Grounded in vendor packaging. The DCIM pure-plays converge on three product surfaces: an asset/space register, a power-and-cooling (critical-infrastructure) surface, and a capacity/connectivity planning surface. Sunbird sells dcTrack (asset, change, connectivity) alongside Power IQ (power and environmental monitoring); Schneider EcoStruxure IT splits IT Asset management from the Power/Cooling DCIM and a separate capacity/what-if modeling tier; Vertiv Environet separates asset/floor management from power-and-thermal monitoring from capacity planning; Nlyte separates its asset/DCIM register from energy/power monitoring and from capacity/what-if modeling. (b) collapses to two but no flagship merges connectivity into the asset register as the headline split. (c) over-fragments connectivity, which is small (2 masters); only FNT Command, a cabling/OSP specialist, treats connectivity as a standalone first-class surface, and it is the outlier in this set. The genuine open judgment is where the connectivity map sits: I put ports/cables with capacity planning (Sunbird and Nlyte keep connectivity inside the same dcTrack/asset suite as planning), but a connectivity-led shop following FNT could justify (c). Changing the split restructures the three built modules."

  - id: B2-EAM-CMDB-OVERLAP
    summary: Confirm DCIM owns all physical masters vs ceding connectivity/asset to CMDB or a future EAM.
    question: "Keep all DCIM masters in DCIM (the dc_* scope keeps them distinct from CMDB configuration_items and any future EAM equipment register), or move dc_port_connections / dc_cable_connections to a CMDB-owned or cabling domain, or promote dc_racks / dc_cabinets to an EAM-owned physical-asset master DCIM consumes?"
    options: [a-keep-all-in-dcim, b-move-connectivity-to-cmdb, c-promote-racks-cabinets-to-eam]
    why: "Vendor practice: the DCIM flagships are the system of record for physical placement, power, and cooling and PUBLISH topology to the CMDB rather than ceding it. Device42 is the telling case: it ships both a CMDB/discovery product and a DCIM product, and its DCIM module owns racks, power units, and physical cabling while feeding the logical CI graph; the built dc_port_connection.changed / dc_cable_connection.added handoffs to CMDB (handoff 679) already model exactly this publish-not-own pattern. Sunbird, Schneider, Vertiv, and Nlyte all keep racks/cabinets and physical connectivity inside the DCIM register, not in a separate EAM. (b)/(c) would only fit an estate where an incumbent CMDB or EAM already double-registers physical hardware. Moving a master between domains is destructive restructuring, so it needs your call. Recommended: a."

  - id: B2-CHANGE-REQUEST-FLAGS
    summary: Pattern flags on the new dc_change_requests master (overwrite of default booleans).
    question: "Set has_submit_lock=true and has_single_approver=true on dc_change_requests (a physical move/add/change locks on submit and routes to one critical-facilities approver), or allow a multi-approver CAB flow (has_single_approver=false), or keep it lighter and always-editable (has_submit_lock=false)?"
    options: [a-submit-lock-single-approver, b-multi-approver-cab, c-no-submit-lock]
    why: "Vendor practice: the moves-adds-changes workflow in Sunbird dcTrack, Nlyte (work items / projects), and Vertiv (moves/adds/changes) gates a physical install/decommission/relocation behind a facilities sign-off before equipment is energized or de-energized, and freezes the request once work is scheduled so the as-built record stays trustworthy. A single critical-facilities approver matches how these tools route a floor change (the heavyweight multi-approver change-advisory board belongs to ITSM, which already receives DCIM's major-incident handoffs 674-678). Each flag flip overwrites the master's current boolean, so it needs approval. Recommended: a."

  - id: B2-DEVICE42-COVERAGE
    summary: Coverage level for the Device42 DCIM solution given its existing CMDB-scoped solution row.
    question: "Keep the Device42 DCIM solution at coverage_level='partial' (it models racks, power, and connectivity but leads with discovery/CMDB), raise it to 'secondary' (on par with the pure-plays), or drop the DCIM solution and keep only its CMDB row?"
    options: [a-partial, b-secondary, c-drop-dcim-solution]
    why: "Vendor positioning: Device42 markets primarily as agentless discovery and CMDB, with DCIM (racks, power units, cabling, impact charts) as an attached surface, whereas Sunbird, Schneider EcoStruxure IT, Vertiv, and Nlyte lead with DCIM as the flagship. 'partial' records that asymmetry honestly without overstating Device42's DCIM depth or erasing its real rack/power/connectivity modeling. Changing a published coverage_level overwrites a value, so it needs your call. Recommended: a."

  - id: B2-ENV-READING-FAN-OUT
    summary: Should dc_environmental_reading.threshold_breached also publish to ITSM, not only ITOM?
    question: "Event 694 (dc_environmental_reading.threshold_breached) currently publishes only to ITOM (handoff 673). Add a second outbound to ITSM-INCIDENT-MGMT (module 38, payload service_incidents 47) so a sustained environmental breach can trigger a major incident directly, or leave it to ITOM to correlate and re-publish?"
    options: [a-fan-out-add-itsm-handoff, b-leave-to-itom-correlation, c-defer]
    why: "Vendor practice: Schneider EcoStruxure IT and Vertiv route sustained environmental-threshold alarms straight to an incident/ticketing workflow (EcoStruxure IT Expert opens service tickets on critical environmental alarms; Vertiv Environet Alert escalates thermal/leak alarms to on-call), not solely through a correlation layer, because a water-leak or over-temperature alarm is itself a candidate major incident. The cabinet-level environmental alert already fans out to ITSM (handoff 674); the sensor-reading event arguably should too. Leaving it to ITOM preserves single-source-of-event semantics but depends on an ITOM correlator existing. Adding the handoff is additive, but it creates a new cross-domain publish, so surface it rather than auto-author. Recommended: a."
  - id: B2-B9D-OWN-1309
    summary: "Data Center Infrastructure Management: name an owner for \"Manage infrastructure configuration\" (no one is responsible for it today)"
    question: |
      Configuration Management Database hands work to Data Center Infrastructure Management, but Data Center Infrastructure Management has no one assigned to manage infrastructure configuration, so that step currently has nobody responsible for it. Who should own it?
    options:
      - "The a named owner runs it and approves it."
      - "Someone else you name runs and approves it."
      - "Leave it unassigned for now."
    why: |
      Data Center Infrastructure Management already assigns the a named owner to work of this kind, so (a) fills this gap the same way and gives the work a named owner. Surfaced as q-DCIM.md q8.
    extra_b9d_added: "2026-06-13"

