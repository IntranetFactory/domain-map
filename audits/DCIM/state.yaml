b1a:
  - id: B1A-T2
    summary: Author missing handoff for dc_power_circuit.overload (event 691) into ITSM-INCIDENT-MGMT and PCF-tag in the same load.
    finding: trigger_event 691 (dc_power_circuit.overload) currently has zero handoff rows. It is the only DCIM event with no downstream subscriber. ITSM-INCIDENT-MGMT (domain_module_id 38) is the natural consumer with payload service_incidents (data_object_id 47), matching the pattern of handoffs 674, 675, 677, 678 (all DCIM to ITSM, payload 47, integration_pattern event_stream).
    action: INSERT handoff(source_domain_id=84, source_domain_module_id=<DCIM-POWER-COOLING id>, target_domain_id=1, target_domain_module_id=38, trigger_event_id=691, data_object_id=47, integration_pattern='event_stream', friction_level='high'). Then INSERT handoff_processes(handoff_id=<new>, process_id=1299, proposal_source='agent_curated', role='implements'). Single small loader.
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-S1}
      - {type: user_decision, ref: B2-MODULE-SPLIT}
  - id: B1A-T5b
    summary: Author 9 intra-domain data_object_relationships edges plus cross-domain edges to CMDB and SPM.
    finding: Only 4 user-edges exist on data_object_relationships against DCIM masters (rows 1782 to 1785, user owns dc_racks / authors dc_capacity_plans / approves dc_capacity_plans / inspects dc_environmental_readings). The 9 intra-domain edges named in the 2026-05-30 pass are still missing, plus the two cross-domain edges.
    action: INSERT 9 intra-domain rows (dc_racks contains dc_cabinets, dc_cabinets contains dc_power_distribution_units, dc_power_distribution_units feeds dc_power_circuits, dc_power_circuits powers dc_cabinets, dc_uninterruptible_power_supplies backs dc_power_distribution_units, dc_cooling_units serves dc_cabinets, dc_environmental_readings sampled_at dc_cabinets, dc_capacity_plans plans dc_racks, dc_port_connections connects dc_cable_connections). Plus 2 cross-domain rows (dc_port_connections updates configuration_items, dc_capacity_plans informs financial_plans or equivalent). Bundle into the modules load to minimize round trips.
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-S1}
      - {type: user_decision, ref: B2-MODULE-SPLIT}
    affected_entities:
      - dc_racks
      - dc_cabinets
      - dc_power_distribution_units
      - dc_power_circuits
      - dc_uninterruptible_power_supplies
      - dc_cooling_units
      - dc_environmental_readings
      - dc_capacity_plans
      - dc_port_connections
      - dc_cable_connections
      - configuration_items
      - financial_plans
  - id: B1A-B1
