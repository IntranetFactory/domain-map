  - id: B1B-S4
    summary: Populate domain catalog_tagline and catalog_description (Rule #20 user approval first).
    finding: catalog_tagline and catalog_description are both empty strings on domains.id=84. A4 fails.
    blocked_by:
      - {type: user_decision, ref: B2-CATALOG-COPY}
  - id: B1B-S5
    summary: Author 1 system skill per DCIM domain_modules row and retire legacy dcim-system (skill_id 46, 10 skill_tools rows).
    finding: Legacy domain-level system skill dcim-system (id 46, domain_module_id NULL) exists with 10 skill_tools rows. F1 is transitional-pass while no module-level skill exists, but Rule #17 requires exactly 1 system skill per domain_modules row. Once B1B-S1 lands, F1 hard-fails until id 46 is retired.
    blocked_by:
