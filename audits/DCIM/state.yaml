    finding: Every DCIM outbound handoff (ids 673, 674, 675, 676, 677, 678, 679, 680, 681) has NULL source_domain_module_id. B10b is the only outstanding boundary failure on DCIM's side once modules land.
    action: For each of the 9 handoffs, PATCH source_domain_module_id to the strongest-role module holding the source data_object (per Rule #14 derivation). Deterministic mapping the moment B1A-S1 lands.
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-S1}
      - {type: user_decision, ref: B2-MODULE-SPLIT}
    affected_handoffs:
      - {handoff_id: 673, direction: outbound, source_domain: DCIM, target_domain: ITOM, trigger_event: dc_environmental_reading.threshold_breached, payload: dc_environmental_readings, null_field: source_domain_module_id}
      - {handoff_id: 674, direction: outbound, source_domain: DCIM, target_domain: ITSM, trigger_event: dc_cabinet.environmental_alert, payload: service_incidents, null_field: source_domain_module_id}
      - {handoff_id: 675, direction: outbound, source_domain: DCIM, target_domain: ITSM, trigger_event: dc_power_distribution_unit.failure, payload: service_incidents, null_field: source_domain_module_id}
      - {handoff_id: 676, direction: outbound, source_domain: DCIM, target_domain: AIOPS, trigger_event: dc_power_distribution_unit.failure, payload: dc_power_distribution_units, null_field: source_domain_module_id}
      - {handoff_id: 677, direction: outbound, source_domain: DCIM, target_domain: ITSM, trigger_event: dc_uninterruptible_power_supply.failover, payload: service_incidents, null_field: source_domain_module_id}
      - {handoff_id: 678, direction: outbound, source_domain: DCIM, target_domain: ITSM, trigger_event: dc_cooling_unit.failure, payload: service_incidents, null_field: source_domain_module_id}
      - {handoff_id: 679, direction: outbound, source_domain: DCIM, target_domain: CMDB, trigger_event: dc_port_connection.changed, payload: dc_port_connections, null_field: source_domain_module_id}
      - {handoff_id: 680, direction: outbound, source_domain: DCIM, target_domain: SPM, trigger_event: dc_capacity_plan.refreshed, payload: dc_capacity_plans, null_field: source_domain_module_id}
      - {handoff_id: 681, direction: outbound, source_domain: DCIM, target_domain: ITOM, trigger_event: dc_rack.capacity_threshold_breached, payload: dc_racks, null_field: source_domain_module_id}
  - id: B1A-BUILD
    summary: "Unbuilt domain: 0 domain_modules (M1 fail), 0 capabilities awaiting a build."
    finding: "Live triage 2026-06-02: this domain has 0 domain_modules rows (M1 fail) and 0 capability_domains rows, so it is not deployable today. It must be built before any persona / RACI work applies."
    action: "Run Phase A then M then B then S to author the module set, capabilities, masters, and the system skill. If the result is multi-module, run Phase P (personas, role_modules, process_raci, lifecycle.process_id) afterward."
