      - {data_object_id: 546, name: dc_racks, target_module_id: null, workflow: planned -> installed -> active -> retired}

b2:
  - id: B2-MODULE-SPLIT
    summary: Pick DCIM module split (gates every remaining b1 item).
    question: "Which DCIM module split should we apply? Options below."
    options:
      - "(a) 3-module split: DCIM-ASSET-CAPACITY + DCIM-POWER-COOLING + optional DCIM-FLOORPLAN-SITE starter"
      - "(b) 2-module split: DCIM-PHYSICAL + DCIM-POWER-COOLING"
      - "(c) 1 full + 1 starter: DCIM-CORE + DCIM-LITE"
      - "(d) different split, please specify"
    why: "Bucket 1 cannot fix any structural item without knowing how many modules to create and which masters land where. The 3-module split aligns with the Bucket 3 dc_floor_plans / dc_sites vetting outcome; the 2-module split is the safe fallback if Bucket 3 stays speculative."
  - id: B2-CAPABILITY-SET
    summary: Approve DCIM capability codes and decide on cross-cutting fold-ins.
    question: "Which of the 7 proposed capability codes should land, and does DCIM-CAPACITY-PLAN fold into the existing cross-cutting ITOM-CAPACITY (id 227) via a capability_domains link rather than a new code?"
    options:
      - "all 7 new"
      - "6 new + capacity folds to ITOM-CAPACITY 227"
      - "fewer (specify which)"
    why: "Phase A M4 floor is 3 capabilities; >=3 capabilities triggers Rule #14 >=2 modules floor. Cross-cutting fold-ins reduce churn but require explicit confirmation per skill convention."
  - id: B2-ENV-READING-FAN-OUT
    summary: Should dc_environmental_reading.threshold_breached publish to ITSM as well as ITOM?
    question: "Currently event 694 publishes only to ITOM (handoff 673). Add a second outbound to ITSM-INCIDENT-MGMT (module 38, payload service_incidents 47) for major-incident triggering, or leave it to ITOM to correlate and re-publish?"
    options:
      - "(a) fan out from DCIM, add new ITSM handoff"
      - "(b) leave to ITOM correlation"
      - "(c) defer"
    why: "An environmental threshold breach is a plausible major-incident trigger. Adding the handoff at DCIM is cheaper than waiting on an ITOM correlator that may not exist; leaving it to ITOM preserves single-source-of-event semantics."
  - id: B2-LIFECYCLE-EXEMPTION
    summary: Sensor-shape masters config-shape exemption recording.
    question: "For dc_environmental_readings, dc_port_connections, dc_cable_connections (sensor-shape masters), record the lifecycle exemption silently in this audit only, or supply exact notes wording for data_objects.notes per master?"
    options:
      - "(a) silent exemption tracked only in history"
      - "(b) supply exact per-master notes wording (Rule #15 explicit approval)"
    why: "Rule #15 forbids auto-populating data_objects.notes. The 2026-05-30 pass licensed the agent to surface this decision instead of writing prose."

b3:
  - id: B3-FLOOR-PLANS
    candidate: dc_floor_plans
    rationale: Universal across flagship vendors; visual rack/cabinet layout is core DCIM UX. If vetted in, redrawing the module split to include DCIM-FLOORPLAN-SITE becomes the natural fit.
    vendor_evidence: [Nlyte, Sunbird, Schneider, NetBox]
    proposed_module: DCIM-FLOORPLAN-SITE
  - id: B3-SITES
    candidate: dc_sites
    rationale: Site / data-hall master sits above racks in every flagship vendor schema. Currently DCIM has no rack-parent entity in the catalog; sites is the canonical fix.
    vendor_evidence: [Nlyte, Sunbird, Schneider, Device42]
    proposed_module: DCIM-ASSET-CAPACITY
  - id: B3-CHANGE-REQUESTS
    candidate: dc_change_requests
    rationale: Rack-move and power-change workflows in Nlyte and Sunbird dcTrack carry a domain-specific change-request entity. May instead demote to a consumer link on ITSM change_requests if the Phase 0 pass shows the workflow is ITSM-shaped.
    vendor_evidence: [Nlyte, Sunbird]
    proposed_module: DCIM-POWER-COOLING
  - id: B3-POWER-RESERVATIONS
    candidate: dc_power_reservations
    rationale: Reserved power-budget allocations sit between dc_capacity_plans and dc_power_circuits in Sunbird, Schneider, and Nlyte; missing from the current schema.
    vendor_evidence: [Sunbird, Schneider, Nlyte]
    proposed_module: DCIM-POWER-COOLING
  - id: B3-AUDIT-TRAILS
    candidate: dc_audit_trails
    rationale: Regulatory-shaped (SOC 2 evidence). May resolve to a cross-cutting platform audit log rather than a DCIM-local master; Phase 0 pass needs to decide.
    vendor_evidence: [Nlyte, Sunbird]
    proposed_module: cross-cutting
  - id: B3-DISCOVERY-SCANS
    candidate: dc_discovery_scans
    rationale: Device42-skewed but appears in Nlyte and Sunbird too. Vet whether non-Device42 buyers carry the entity natively or rely on integrations.
    vendor_evidence: [Device42, Nlyte, Sunbird]
    proposed_module: DCIM-ASSET-CAPACITY
