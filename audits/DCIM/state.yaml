b1b:
  - id: B1B-S1
    summary: Author DCIM domain_modules rows (Phase A obligation per Rule #14).
    finding: DCIM has 10 masters and zero domain_modules rows. M1 / M2 / M4 / M5 / M6 fail outright. The deployable unit is the module; without modules, B10b cannot resolve, lifecycle states (B12) cannot be authored (need module FK), system skills (F2 to F5) cannot exist, roles (E1 to E5) have nothing to scope. Audit blocker.
    blocked_by:
      - {type: user_decision, ref: B2-MODULE-SPLIT}
    affected_entities:
      - dc_racks
      - dc_cabinets
      - dc_power_distribution_units
      - dc_power_circuits
      - dc_uninterruptible_power_supplies
      - dc_cooling_units
      - dc_environmental_readings
      - dc_capacity_plans
      - dc_port_connections
      - dc_cable_connections
    extra_options:
      - "(a) 3-module split: DCIM-ASSET-CAPACITY (racks, cabinets, port_connections, cable_connections, capacity_plans), DCIM-POWER-COOLING (PDUs, power_circuits, UPSes, cooling_units, environmental_readings), optional DCIM-FLOORPLAN-SITE"
      - "(b) 2-module split: DCIM-PHYSICAL + DCIM-POWER-COOLING"
      - "(c) 1 full + 1 starter: DCIM-CORE + DCIM-LITE"
  - id: B1B-S2
    summary: Author DCIM capabilities and capability_domains (>=3 floor, target 5-8).
    finding: Zero capability_domains rows for DCIM. M4 fails; >=2 module floor (Rule #14) requires >=3 capabilities to apply.
    blocked_by:
      - {type: user_decision, ref: B2-CAPABILITY-SET}
      - {type: depends_on, ref: B1B-S1, reason: capabilities wire to modules via domain_module_capabilities}
    extra_proposed_codes:
      - DCIM-ASSET-REGISTER
      - DCIM-CAPACITY-PLAN
      - DCIM-POWER-MGMT
      - DCIM-COOLING-MGMT
      - DCIM-CONNECTIVITY-MAP
      - DCIM-ENV-MONITORING
      - DCIM-FLOOR-PLAN
  - id: B1B-S3
