  - id: B1B-S6
    summary: Author DCIM roles, role_modules, role_permissions (E1 to E5).
    finding: "Zero DCIM-prefixed roles. Proposed: IT-INFRA-DC-OPERATOR (primary on power, cooling, asset modules), IT-INFRA-CAPACITY-PLANNER (primary on capacity, secondary on asset), FACILITIES-DC-FACILITIES-LEAD (primary on cooling and floor-plan, secondary on others)."
    blocked_by:
