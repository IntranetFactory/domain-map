    question: "CAFM cost_band='$$' (25k to 100k) vs IWMS cost_band='$$$' (100k to 500k). Confirm the buyer-tier asymmetry is real?"
    options:
      - "Keep current values (asymmetry reinforces keep-distinct in B2-FOLD-VS-DISTINCT)."
      - "Adjust if user has different intent."
    why: "Inspection task; informs B2-FOLD-VS-DISTINCT."
  - id: B2-LEASE-UTIL-OWNERSHIP
    summary: "Lease accounting and utility tracking ownership when CAFM stays distinct."
    question: "If CAFM stays distinct, where do lease accounting and utility tracking live? Queued LEASE-ACCT candidate, new ENERGY-MGMT candidate, or embedded_master + optional in CAFM from UTIL-OPS?"
    options:
