  - id: B2-FOLD-VS-DISTINCT
    summary: "Fold CAFM into IWMS, or keep distinct?"
    question: "Should CAFM be folded into IWMS as a deployment tier, kept distinct with its own modules, or kept distinct with shared capabilities promoted to domain-neutral?"
    options:
      - "(a) Keep CAFM, modularize it (1 or 2 modules per B1B-S1)."
      - "(b) Fold CAFM into IWMS as an SMB deployment tier; queue CAFM domain row for retirement (record_status='rejected' only with explicit user approval per Rule #1)."
      - "(c) Keep both but split capabilities (rename shared capabilities to domain-neutral, then load each domain's tier-specific masters)."
    why: "Evidence for fold: shared capabilities 374/376/377, vendor overlap, overlapping market scope per the two description columns, zero distinct masters loaded for CAFM. Evidence for keep-distinct: CAFM min_org_size='20 s <500' vs IWMS '30 m <2500' (confirmed live 2026-06-07); CAFM cost_band='$$' vs IWMS '$$$' (confirmed live); CAFM market 400 USDM vs IWMS 1500 USDM (confirmed live); pure-play SMB-tier vendors target the smaller buyer. Question is independent of b3 (vendor research would not change the answer). This is the GATE for the entire build cascade."
    extra_independent_of: [b3]
  - id: B2-CAPABILITY-RENAME
    summary: "Promote shared capabilities to domain-neutral?"
    question: "Should capabilities REAL-SPACE-OPTIM (374), REAL-MAINTENANCE (376), REAL-OCCUPANCY-ANALYTICS (377) be renamed to domain-neutral codes (SPACE-OPTIMIZATION, FACILITY-MAINTENANCE, OCCUPANCY-ANALYTICS) since they span >=3 domains (REAL-EST + IWMS + CAFM)?"
    options:
      - "Rename to domain-neutral codes (only meaningful if B2-FOLD-VS-DISTINCT resolves to (a) or (c))."
      - "Leave as-is (only consistent if B2-FOLD-VS-DISTINCT resolves to (b), since then capabilities span only REAL-EST + IWMS = 2 domains)."
    why: "Per the SKILL.md cross-cutting capability convention, capabilities spanning >=3 domains warrant a domain-neutral code (no REAL- prefix). Renaming an existing capability_code is a destructive overwrite, so it is surfaced regardless of the B2-FOLD-VS-DISTINCT outcome."
    extra_depends_on_decision: B2-FOLD-VS-DISTINCT
