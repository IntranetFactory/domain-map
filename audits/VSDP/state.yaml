b2:
  - id: B2-1
    summary: "Module shape decision for VSDP. THE BUILD-GATING DECISION."
    question: "One consolidated VSDP-PLATFORM module, a 2-split (VSDP-DEV-PIPELINE + VSDP-DELIVERY-AND-VSM), a 4-split (SOURCE-CONTROL + CICD + DEPLOYMENT-MGMT + VALUE-STREAM-ANALYTICS), or a monolith plus VSDP-STARTER kit for SMB buyers?"
    options:
      - one consolidated VSDP-PLATFORM full module
      - 2-split VSDP-DEV-PIPELINE + VSDP-DELIVERY-AND-VSM
      - 4-split source-control + CICD + deployment-mgmt + value-stream-analytics
      - VSDP-PLATFORM monolith plus VSDP-STARTER (module_kind=starter)
    why: "Rule #14 requires >=2 modules once capabilities reach >=3. Bucket 3 candidate-queue domains (GITOPS-DELIVERY, ARTIFACT-REGISTRY, APPSEC-ORCH, SUPPLY-CHAIN-SEC) may carve out scope from the 4-split option if promoted. This decision gates B1A-S2, B1A-BUILD, and every b1b item."

  - id: B2-2
    summary: "Solutions inventory for VSDP."
    question: "Which flagship vendors to author as solutions, at what coverage_level (primary vs secondary), and whether to roll up add-ons or treat as separate solutions? Also gates the solution_term alias subset (B1B-B3 remainder)."
    options:
      - GitLab Ultimate (primary)
      - GitHub Enterprise rolled up with Actions + Advanced Security (primary or separate rows)
      - Azure DevOps Services (primary)
      - Atlassian Bitbucket + Bitbucket Pipelines + Bamboo (primary or secondary)
      - Jenkins (CloudBees), CircleCI, Buildkite (secondary)
      - Harness CD, Argo CD, Octopus Deploy (secondary, may move to GITOPS-DELIVERY if promoted)
      - Plandek, LinearB (secondary pure-play VSM)

  - id: B2-3
    summary: "TEST-MGMT boundary: test_runs canonical mastery."
    question: "Should test_runs remain canonically mastered by TEST-MGMT (current) or become embedded_master in a future VSDP-CICD module? Also, data_object_relationships row 409 (test_defects surfaces_from ci_pipeline_runs, owner_side=target) for TEST-MGMT's next pairwise pass: should owner_side flip to source?"
