schema_version: 2
domain: LOYALTY
status: feedback_needed
next_action_by: agent
last_audit: "2026-06-02"

b1a:
  - id: B1A-S12
    summary: PATCH event_category='lifecycle' on three trigger_events whose category is empty string.
    finding: >-
      Trigger events 497 (loyalty_transaction.posted, data_object_id=264),
      498 (redemption_reward.published, data_object_id=717), 499
      (redemption_transaction.completed, data_object_id=718) all carry
      event_category=''. Rule #13 enum check (allowed values: lifecycle,
      state_change, threshold, signal). All three describe lifecycle
      transitions and should be lifecycle.
    action: >-
      PATCH trigger_events set event_category='lifecycle' where id in
      (497, 498, 499). Surgical CLI is sufficient (three rows). Independent
      of the module split; can ship now.
    affected_events:
      - {id: 497, event_name: "loyalty_transaction.posted", current_category: "", proposed_category: "lifecycle"}
      - {id: 498, event_name: "redemption_reward.published", current_category: "", proposed_category: "lifecycle"}
      - {id: 499, event_name: "redemption_transaction.completed", current_category: "", proposed_category: "lifecycle"}

  - id: B1A-SYSTEM-SKILLS
    summary: Author one system skill per LOYALTY module (Rule #17 -> F2/F3), then retire legacy skill 81 (F1).
    finding: >-
      Modules now exist (272 LOYALTY-PROGRAM-CORE, 273 LOYALTY-POINTS-REWARDS,
      274 LOYALTY-ENGAGEMENT) but none has a module-level skill_type='system'
      skill, so F2 (exactly one system skill per module) and F3 (>=1
      skill_tools row per system skill) now fail. The only system skill today
      is legacy skill 81 (loyalty-system, domain_id=78, domain_module_id=NULL)
      with 6 skill_tools rows (571,572,573,37,826,827). Once module skills
      land, skill 81 is obsolete (F1) and must be DELETEd along with its 6
      skill_tools rows, strictly after the module skills exist.
    action: >-
      Phase-S loader: author one <module_code_lower>_agent skill per module,
      each with >=1 skill_tools row. Suggested tool migration from skill 81:
      query_loyalty_members -> 272 skill; query_loyalty_tiers -> 272 skill;
      query_loyalty_transactions + query_redemption_rewards +
      query_redemption_transactions -> 273 skill; module 274 (engagement) has
      no in-domain master, so wire a read tool over loyalty_members
      (consumer). Then DELETE skill_tools where skill_id=81 (6 rows) and
      DELETE skills where id=81. Resolve the send_email (tool 37) F7 question
      (B2-SEND-EMAIL) as part of this: it likely dissolves with skill 81.
    affected_modules: [272, 273, 274]
    extra_legacy_skill_id: 81
    extra_legacy_tool_ids: [571, 572, 573, 37, 826, 827]

  - id: B1A-M8-MODULE-UX
    summary: Populate module-level catalog UX fields on the 3 new LOYALTY modules (M8) and domain catalog UX (A4).
    finding: >-
      The 3 new modules (272, 273, 274) were inserted without catalog_tagline /
      catalog_description (omitted per the insert contract), so M8 module-level
      catalog UX is unpopulated. Separately, domains.catalog_tagline and
      catalog_description for LOYALTY (A4 / Rule #20) remain empty strings;
      candidate wording drafted in the 2026-05-30 audit (tagline "Reward repeat
      customers with points, tiers, and personalized perks that grow customer
      lifetime value." + 3-paragraph description) is still awaiting approval
      under B2-CATALOG-UX.
    action: >-
      Draft buyer-voice tagline + description for each module (272 program +
      tier + member enrollment; 273 points ledger + rewards catalog +
      redemption; 274 promotions + partner coalitions + member portal) and the
      domain. Rule #20 requires per-row user approval before writing the
      buyer-facing text, so surface drafts via B2-CATALOG-UX rather than
      auto-writing.
    affected_modules: [272, 273, 274]
    blocked_by:
      - {type: user_decision, ref: B2-CATALOG-UX}

  - id: B1A-S9
    summary: Backfill source_domain_module_id on the 4 outbound LOYALTY handoffs (B10b), now resolvable.
    finding: >-
      Handoffs 231, 232, 497, 498 all have source_domain_module_id=NULL.
      With modules now in place the derivation resolves: source module = the
      LOYALTY module mastering each event's payload data_object.
      231 (tier.upgraded, loyalty_tiers 265) -> 272; 232 (member.lapsed,
      loyalty_members 263) -> 272; 497 (loyalty_transaction.posted,
      loyalty_transactions 264) -> 273; 498 (redemption_transaction.completed,
      redemption_transactions 718) -> 273.
    action: >-
      Run the backfill_handoff_modules loader (or surgical PATCH) to set
      source_domain_module_id per the mapping above.
    affected_handoffs:
      - {handoff_id: 231, direction: outbound, source_domain: LOYALTY, target_domain: CRM, trigger_event: "tier.upgraded", payload: loyalty_tiers, null_field: source_domain_module_id}
      - {handoff_id: 232, direction: outbound, source_domain: LOYALTY, target_domain: MA, trigger_event: "member.lapsed", payload: loyalty_members, null_field: source_domain_module_id}
      - {handoff_id: 497, direction: outbound, source_domain: LOYALTY, target_domain: ERP-FIN, trigger_event: "loyalty_transaction.posted", payload: loyalty_transactions, null_field: source_domain_module_id}
      - {handoff_id: 498, direction: outbound, source_domain: LOYALTY, target_domain: B2C-COMM, trigger_event: "redemption_transaction.completed", payload: redemption_transactions, null_field: source_domain_module_id}

b1b:
  - id: B1B-S4
    summary: Author data_object_lifecycle_states across LOYALTY masters (B12, Rule #12), now module-anchorable.
    finding: >-
      Zero data_object_lifecycle_states rows on any of the 5 masters. With
      modules in place the realizing-module FK (M5) now resolves:
      loyalty_members (active, lapsed, opted_out, closed) -> module 272;
      loyalty_transactions (pending, posted, reversed, expired) -> module 273;
      redemption_rewards (draft, published, paused, discontinued) -> 273;
      redemption_transactions (initiated, fulfilled, delivered, cancelled,
      refunded) -> 273. loyalty_tiers -> 272 is the config-shape exemption
      candidate (B2-LIFECYCLE-EXEMPT).
    action: >-
      Phase-B loader authoring states + requires_permission flags on workflow
      gates + domain_module_id per realizing module. Still gated on the
      loyalty_tiers exemption decision.
    blocked_by:
      - {type: user_decision, ref: B2-LIFECYCLE-EXEMPT}
    affected_masters:
      - {data_object_id: 263, name: loyalty_members, target_module_id: 272, workflow: lifecycle}
      - {data_object_id: 264, name: loyalty_transactions, target_module_id: 273, workflow: lifecycle}
      - {data_object_id: 265, name: loyalty_tiers, target_module_id: 272, workflow: config_shape}
      - {data_object_id: 717, name: redemption_rewards, target_module_id: 273, workflow: lifecycle}
      - {data_object_id: 718, name: redemption_transactions, target_module_id: 273, workflow: lifecycle}

  - id: B1B-S5
    summary: Author 2-3 data_object_aliases per LOYALTY master (B11).
    finding: >-
      Zero data_object_aliases rows on any master. Candidate synonym
      clusters: loyalty_members <-> program_members / loyalty_program_subscribers;
      loyalty_transactions <-> point_transactions / accrual_events;
      loyalty_tiers <-> member_tiers / program_levels;
      redemption_rewards <-> reward_catalog_items / redeemables;
      redemption_transactions <-> reward_redemptions / burns.
    action: >-
      Phase-B cluster-drafts pattern: 2-3 alias rows per master with
      alias_type (vendor / industry / abbreviation). Exact tuples pending
      user-side cluster draft.
    blocked_by:
      - {type: user_decision, ref: B2-CLUSTER-DRAFTS}
    affected_masters:
      - {data_object_id: 263, name: loyalty_members, target_module_id: 272, workflow: alias_cluster}
      - {data_object_id: 264, name: loyalty_transactions, target_module_id: 273, workflow: alias_cluster}
      - {data_object_id: 265, name: loyalty_tiers, target_module_id: 272, workflow: alias_cluster}
      - {data_object_id: 717, name: redemption_rewards, target_module_id: 273, workflow: alias_cluster}
      - {data_object_id: 718, name: redemption_transactions, target_module_id: 273, workflow: alias_cluster}

  - id: B1B-S6
    summary: Author intra-domain data_object_relationships (B6).
    finding: >-
      Zero relationship rows touching LOYALTY masters. Expected edges:
      loyalty_members has loyalty_transactions, loyalty_members belongs_to
      loyalty_tiers, redemption_transactions consumes loyalty_transactions,
      redemption_transactions redeems redemption_rewards,
      redemption_transactions issued_to loyalty_members.
    action: >-
      Phase-B loader, cluster-drafts pattern. Verb + inverse_verb +
      relationship_type / relationship_kind + owner_side + is_required per
      Rule #10. Exact tuples pending user cluster draft.
    blocked_by:
      - {type: user_decision, ref: B2-CLUSTER-DRAFTS}
    extra_expected_edges:
      - {verb: has, source: loyalty_members, target: loyalty_transactions}
      - {verb: belongs_to, source: loyalty_members, target: loyalty_tiers}
      - {verb: consumes, source: redemption_transactions, target: loyalty_transactions}
      - {verb: redeems, source: redemption_transactions, target: redemption_rewards}
      - {verb: issued_to, source: redemption_transactions, target: loyalty_members}

  - id: B1B-S7
    summary: Author users edges on LOYALTY masters (B7, Rule #10).
    finding: >-
      Zero data_object_relationships rows linking LOYALTY masters to the
      platform-built-in users data_object. Expected actor labels:
      loyalty_members (account_manager when B2B2C), loyalty_tiers
      (config_author), redemption_rewards (catalog_owner),
      loyalty_transactions (adjustment_author), redemption_transactions
      (fulfillment_owner).
    action: >-
      Phase-B loader: author 5 relationship rows against users
      (kind=platform_builtin). Tuples pending user cluster draft.
    blocked_by:
      - {type: user_decision, ref: B2-CLUSTER-DRAFTS}
    extra_expected_actors:
      - {master: loyalty_members, actor: account_manager}
      - {master: loyalty_tiers, actor: config_author}
      - {master: redemption_rewards, actor: catalog_owner}
      - {master: loyalty_transactions, actor: adjustment_author}
      - {master: redemption_transactions, actor: fulfillment_owner}

  - id: B1B-S8
    summary: Author cross-domain outbound data_object_relationships (B8).
    finding: >-
      Zero outbound relationship rows mirroring the 4 outbound handoffs.
      Edges to author: loyalty_tiers <verb> CRM payload (handoff 231);
      loyalty_members <verb> MA payload (handoff 232); loyalty_transactions
      <verb> ERP-FIN payload (handoff 497); redemption_transactions <verb>
      B2C-COMM payload (handoff 498). Final verbs reviewed by user.
    action: Phase-B loader, 4 edges, same shape as B1B-S6.
    blocked_by:
      - {type: user_decision, ref: B2-CLUSTER-DRAFTS}
    affected_handoffs:
      - {handoff_id: 231, direction: outbound, source_domain: LOYALTY, target_domain: CRM, trigger_event: "tier.upgraded", payload: loyalty_tiers, null_field: null}
      - {handoff_id: 232, direction: outbound, source_domain: LOYALTY, target_domain: MA, trigger_event: "member.lapsed", payload: loyalty_members, null_field: null}
      - {handoff_id: 497, direction: outbound, source_domain: LOYALTY, target_domain: ERP-FIN, trigger_event: "loyalty_transaction.posted", payload: loyalty_transactions, null_field: null}
      - {handoff_id: 498, direction: outbound, source_domain: LOYALTY, target_domain: B2C-COMM, trigger_event: "redemption_transaction.completed", payload: redemption_transactions, null_field: null}

  - id: B1B-S11
    summary: Author 2 business_function_capabilities overrides (C2).
    finding: >-
      Zero business_function_capabilities rows. Two capabilities likely
      diverge from domain RACI (Marketing owner): LOY-MEMBER-PORTAL (293,
      now in module 274) leans Customer Success; LOY-POINTS-LEDGER (288, now
      in module 273) leans Finance (accrual liability accounting).
    action: Add 2 business_function_capabilities rows once user confirms ownership.
    blocked_by:
      - {type: user_decision, ref: B2-CAP-OWNERSHIP}
    extra_capabilities:
      - {capability_id: 288, capability_code: LOY-POINTS-LEDGER, proposed_function: Finance}
      - {capability_id: 293, capability_code: LOY-MEMBER-PORTAL, proposed_function: Customer Success}

  - id: B1B-M1
    summary: Add gdpr_consent_records master to LOYALTY-PROGRAM-CORE (272), compliance gap.
    finding: >-
      GDPR Art. 7 + CPRA require structured consent capture on member
      profiles. No entity exists in the LOYALTY footprint. Vendor coverage:
      Antavo, LoyaltyLion, Salesforce Loyalty Management. With the 3-module
      shape, member identity and profile live in LOYALTY-PROGRAM-CORE (272).
    action: Phase-B insert (data_objects + DMDO on 272 + lifecycle states + relationships).
    blocked_by:
      - {type: catalog_addition, scope: modules, trigger: "out of scope for reuse-only modularization; needs an entity-creation pass"}
    vendor_evidence: [Antavo, LoyaltyLion, Salesforce Loyalty Management]

  - id: B1B-M2
    summary: Add data_subject_requests master to LOYALTY-PROGRAM-CORE (272), compliance gap.
    finding: >-
      GDPR Art. 15-22 + CPRA require erasure / access / rectification
      request tracking. Universal across all flagship vendors. Member-profile
      surface lives in LOYALTY-PROGRAM-CORE (272).
    action: Phase-B insert (target module 272).
    blocked_by:
      - {type: catalog_addition, scope: modules, trigger: "out of scope for reuse-only modularization; needs an entity-creation pass"}
    vendor_evidence: [Antavo, LoyaltyLion, Yotpo, Salesforce Loyalty Management, SAP Emarsys Loyalty]

  - id: B1B-M3
    summary: Add unclaimed_property_records master to LOYALTY-POINTS-REWARDS (273).
    finding: >-
      US state escheatment may apply to unredeemed balances if the program
      qualifies as stored value. Material for sizeable programs. Surfaces in
      Antavo and SAP Emarsys documentation. Ledger surface lives in
      LOYALTY-POINTS-REWARDS (273).
    action: Phase-B insert (target module 273).
    blocked_by:
      - {type: catalog_addition, scope: modules, trigger: "out of scope for reuse-only modularization; needs an entity-creation pass"}
    vendor_evidence: [Antavo, SAP Emarsys Loyalty]

  - id: B1B-M5
    summary: Add member_communications_preferences master to LOYALTY-PROGRAM-CORE (272), compliance gap.
    finding: >-
      CAN-SPAM + GDPR + CPRA require channel-level opt-in / opt-out at the
      program level. Consent withdrawal must propagate. Salesforce Marketing
      Cloud Engagement (the partial-coverage solution already in the catalog)
      signals this gap. Member-profile surface lives in LOYALTY-PROGRAM-CORE
      (272).
    action: Phase-B insert (target module 272).
    blocked_by:
      - {type: catalog_addition, scope: modules, trigger: "out of scope for reuse-only modularization; needs an entity-creation pass"}
    vendor_evidence: [Antavo, LoyaltyLion, Salesforce Loyalty Management, Salesforce Marketing Cloud Engagement]

b2:
  - id: B2-CATALOG-UX
    summary: Approve catalog_tagline / catalog_description for the LOYALTY domain and the 3 modules (Rule #20, M8).
    question: >-
      Drafted domain wording for review. Tagline (single sentence, buyer
      voice): "Reward repeat customers with points, tiers, and personalized
      perks that grow customer lifetime value." Description (3 short
      paragraphs): enrollment + tier progression + member profiles; accrual
      rules + rewards catalog + redemption workflows + partner coalitions;
      program analytics + member portal + integration with commerce / CRM /
      marketing automation. Module-level UX (M8) for modules 272/273/274 also
      needs buyer-voice taglines + descriptions. Approve domain wording
      as-drafted, rewrite, or delegate, and confirm whether the agent should
      draft the 3 module blurbs for the same review cycle.
    options:
      - approve domain wording as-drafted and draft 3 module blurbs for review
      - rewrite (user supplies exact text)
      - delegate to marketing

  - id: B2-LIFECYCLE-EXEMPT
    summary: loyalty_tiers config-shape lifecycle exemption (B12 / Rule #12).
    question: >-
      loyalty_tiers (master in module 272) is a config table (program designer
      authors tiers once, occasionally edits thresholds; no per-row workflow).
      Per Rule #12, config-shape masters can be exempt; per Rule #15 the prior
      data_objects.notes annotation license is rescinded. Decide.
    options:
      - accept exemption (no lifecycle states authored, no notes written)
      - load minimal states (draft, active, retired) for audit traceability
      - defer

  - id: B2-CAP-OWNERSHIP
    summary: Confirm business_function_capabilities overrides for two LOYALTY capabilities (C2).
    question: >-
      LOYALTY business function ownership is Marketing (owner) + Customer
      Success (contributor). Two capabilities likely diverge:
      LOY-MEMBER-PORTAL (293, module 274) toward Customer Success,
      LOY-POINTS-LEDGER (288, module 273) toward Finance. Confirm both,
      confirm one, or propose an alternative split.
    options:
      - confirm both (LOY-MEMBER-PORTAL -> Customer Success, LOY-POINTS-LEDGER -> Finance)
      - confirm LOY-MEMBER-PORTAL only
      - confirm LOY-POINTS-LEDGER only
      - propose alternative

  - id: B2-SEND-EMAIL
    summary: Disposition of send_email (tool 37) on legacy skill 81 (F7).
    question: >-
      skill_tools links tool 37 (send_email, side_effect) to skill 81 with
      empty skill_tools.notes. F7 default is notify_person unless workflow
      requires the channel. Skill 81 is slated for DELETE via B1A-SYSTEM-SKILLS
      once module-level skills land; this violation likely dissolves naturally.
    options:
      - wait (skill 81 will be deleted; no separate fix needed)
      - PATCH now to notify_person
      - keep send_email and supply workflow-specific skill_tools.notes wording (Rule #15)

  - id: B2-CLUSTER-DRAFTS
    summary: Provide cluster-drafts authoring for aliases (B1B-S5), intra-domain relationships (B1B-S6), users edges (B1B-S7), cross-domain edges (B1B-S8).
    question: >-
      Four cluster-drafts items require user-side authoring of exact tuples
      (alias_name + alias_type per master; verb + inverse_verb +
      relationship_type / relationship_kind + owner_side + is_required per
      relationship). Will user author the cluster-drafts markdown, or delegate
      to a Phase-B draft pass?
    options:
      - user authors cluster-drafts markdown
      - delegate to agent Phase-B draft (returns for review before load)

b3:
  - id: B3-PROMOTION-CAMPAIGNS
    candidate: promotion_campaigns
    rationale: >-
      Top missing-master for this domain after modularization. LOYALTY-ENGAGEMENT
      (module 274) holds LOY-PROMOTION-ENG (291) and LOY-PARTNER-ECO (292) but
      has no in-domain master (it currently carries only loyalty_members as a
      consumer). Vendors universally ship a promotions / campaigns master for
      bonus-point campaigns, tier-acceleration windows, and reward-boost
      periods. This was B1B-M4 in prior audits; it is the natural master for
      module 274.
    vendor_evidence: [Annex Cloud, Marigold, Salesforce Loyalty Management, SAP Emarsys Loyalty]
    proposed_module: LOYALTY-ENGAGEMENT

  - id: B3-PARTNER-PROGRAMS
    candidate: partner_programs
    rationale: >-
      LOY-PARTNER-ECO (292, module 274) capability points at this gap.
      Partner / coalition modules ship in multiple flagship vendors. Second
      candidate master for the engagement module.
    vendor_evidence: [Annex Cloud, Marigold, Salesforce Loyalty Management]
    proposed_module: LOYALTY-ENGAGEMENT

  - id: B3-MEMBER-REFERRALS
    candidate: member_referrals
    rationale: >-
      Referral tracking on member profiles. May fold into LOYALTY
      (LOYALTY-PROGRAM-CORE / engagement) or promote to a REFERRAL-MKT domain
      (already queued in _missing-domains.md).
    vendor_evidence: [LoyaltyLion, Yotpo, Antavo]
    proposed_module: LOYALTY-ENGAGEMENT

  - id: B3-TIER-QUAL-PERIODS
    candidate: tier_qualification_periods
    rationale: >-
      Tier earn / maintain windows (12-month rolling, calendar year, lifetime).
      Salesforce Loyalty + Antavo ship this as a separate config master;
      shape varies. Natural home is LOYALTY-PROGRAM-CORE (272).
    vendor_evidence: [Salesforce Loyalty Management, Antavo]
    proposed_module: LOYALTY-PROGRAM-CORE

  - id: B3-GAMIFICATION-BADGES
    candidate: gamification_badges
    rationale: >-
      Badges, missions, achievements. Specialist surface (Antavo); not
      universal across the loyalty market. Natural home is LOYALTY-ENGAGEMENT
      (274).
    vendor_evidence: [Antavo]
    proposed_module: LOYALTY-ENGAGEMENT

  - id: B3-POINT-EXPIRATION-POLICIES
    candidate: point_expiration_policies
    rationale: >-
      Universal across vendors but unclear whether shipped as a separate
      config master or fields on loyalty_tiers. Phase 0 vendor research
      should resolve the shape decision. Natural home is LOYALTY-POINTS-REWARDS
      (273).
    vendor_evidence: [Annex Cloud, LoyaltyLion, Antavo, SAP Emarsys Loyalty]
    proposed_module: LOYALTY-POINTS-REWARDS
