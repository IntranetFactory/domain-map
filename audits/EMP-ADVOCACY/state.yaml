b2:
  - id: B2-GATE
    summary: "Confirm EMP-ADVOCACY is a distinct domain and not a fold into SMM."
    question: "Keep Employee Advocacy as its own domain (built), or fold it into SMM as a capability of the SMM-INFLUENCER module?"
    options:
      - "(a) Keep as distinct domain EMP-ADVOCACY (recommended; built this way)"
      - "(b) Fold into SMM-INFLUENCER and delete the EMP-ADVOCACY domain"
    why: "The promote/fold gate. Built as distinct per Phase 0 evidence; surfaced for sign-off because it is a market-shape decision."
    evidence: >-
      Independent flagship pure-plays: DSMN8 (UK, independent, flagship IS employee advocacy),
      GaggleAMP (founder-owned, exclusively advocacy), EveryoneSocial (standalone advocacy flagship,
      now Seismic), Oktopost (independent B2B social; advocacy a first-class pillar), Sociabble
      (now Poppulo). Gartner Peer Insights runs a dedicated "Employee Advocacy Tools" market category.
      SMM's "influencer/advocacy programs" clause is influencer-flavored (SMM already has the
      SMM-INFLUENCER module 302 for external creators) and SMM models none of the advocacy entity
      surface (advocate_profiles, advocacy_leaderboards, advocacy_shares, advocacy_attribution_records).
      Distinct buyer split: Marketing/MarComms own it, with an HR/employer-brand contributor seam.
  - id: B2-PATTERN-FLAGS
    summary: "Confirm the three positive pattern-flag flips authored on advocacy masters."
    question: "Approve the pattern flags set during the build? (1) advocacy_content.has_submit_lock=true + has_single_approver=true (published content freezes; one curator/owner approves); (2) advocate_profiles.has_personal_content=true; (3) advocacy_social_accounts.has_personal_content=true (personal social account tokens/handles are personal data, GDPR)."
    options:
      - "Approve all"
      - "Approve subset (specify)"
      - "Reject all"
    why: "Pattern flags are workflow-shape judgments (Rule #12); recorded here, never in notes (Rule #15). They were authored at build time and land at record_status='new'."
    evidence: >-
      Advocacy platforms freeze published content so a share pins to an approved revision and
      route content through one approver (EveryoneSocial, DSMN8, GaggleAMP content approval flows).
      Advocate identity and the linked LinkedIn/X/Facebook account tokens are personal data subject
      to GDPR across every flagship.
  - id: B2-REGULATIONS
    summary: "Pick the regulation set for EMP-ADVOCACY (currently none attached)."
    question: "Which regulations should attach? (a) GDPR only; (b) GDPR + FINRA (supervised-social for financial services); (c) leave empty."
    options:
      - "(a) GDPR only (recommended)"
      - "(b) GDPR + FINRA (conditional, financial services)"
      - "(c) leave empty"
    why: "domain_regulations is empty. Advocacy is not a regulation-mandated market, but advocate PII + linked social accounts make GDPR load-bearing; FINRA/social-supervision applies only to regulated financial-services advocacy estates."
    evidence: >-
      Every flagship developer/advocate record stores personal contact and social-account data
      (GDPR retention/erasure). The advocacy_content_approvals/brand-review surface is the
      FINRA supervised-social hook, conditional on financial-services deployment only.

