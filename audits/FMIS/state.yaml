b2:
  - id: B2-S1
    summary: "Rule #15 notes-pollution audit on 8 domain_data_objects rows."
    question: "Were the populated notes on all 8 FMIS domain_data_objects rows user-approved at load time, or auto-populated by the loader?"
    why: >-
      Rule #15 mandates notes columns are empty by default; populated text needs explicit per-row user-approved wording.
      The audit cannot tell from live state whether the existing strings (e.g. 'Geographic field boundary records owned by the FMIS.',
      'Per-season crop plan per field; rotation history.', 'Cluster flagship - consumed by FOOD-TRACE for origin-lot creation and by FDS for available-share planning.')
      were drafted with user approval or auto-written. Per-row decision needed.
    options:
      - "(a) confirm user-approved; leave all 8 in place"
      - "(b) confirm auto-population; PATCH all 8 notes to empty string and log a Rule-#15 incident in skill-changelog"
      - "(c) mixed; user reviews each of the 8 rows individually"

  - id: B2-S2
    summary: "Rule #15 notes on handoffs 349 and 350 (cross-vendor stack commentary)."
    question: "Were the populated notes on handoffs 349 and 350 user-approved at load time, or auto-populated?"
    why: >-
      Both texts read as substantive editorial commentary about cross-vendor integration friction,
      not mechanical schema restatement, so they may legitimately survive a Rule-#15 audit if the
      user approved the wording. Confirmation needed.
    options:
      - "(a) approved at load time; leave in place"
      - "(b) auto-written; PATCH to empty string"

  - id: B2-S3
    summary: "Rule #18 forbidden-zone prose: domains.description and domains.business_logic both reference 'John Deere Operations Center'."
    question: "How should the FMIS domains.description and business_logic be rewritten to remove the 'John Deere Operations Center API' vendor reference per Rule #18?"
    why: >-
      Rule #18 forbids vendor / product names in domains.description and domains.business_logic.
      Current description ends '... ISOBUS, CAN-bus, John Deere Operations Center API.' and business_logic includes
      'machinery telemetry normalization (CAN-bus, ISOBUS, JD Operations Center API)'. ISOBUS and CAN-bus are
      open standards (allowed); the John Deere reference is the violation. Rule #18 grants no automatic exception today.
    options:
      - "(a) strip the JD reference and re-anchor on ISOBUS / CAN-bus + generic 'vendor-API integrations'"
      - "(b) same as (a) and add a skill-changelog Incidents entry naming the original load that introduced the violation"
      - "(c) user proposes exact replacement wording for both fields"

  - id: B2-S4
    summary: "Rule #12 pattern-flag re-evaluation on FMIS masters; current state is all-false across 8 rows."
    question: "Per-flag yes/no on the 4 candidates that may warrant true."
    why: >-
      All 8 FMIS masters carry has_personal_content=false, has_submit_lock=false, has_single_approver=false.
      Default-false is not a positively re-evaluated state per Rule #12 / B4. Candidates worth a positive call:
      field_applications.has_submit_lock=true (statutory chemical application records freeze on record);
      harvest_records.has_submit_lock=true (yield records feed traceability lots, evidence-bearing);
      crop_plans.has_single_approver=true (organic-certified operations need an approving agronomist);
      farm_fields.has_personal_content=false confirmed as correct (land records, not personal data even for sole traders).
      Per-flag decisions inform B1B-S5 (which lifecycle states are workflow-gated).
    options:
      - "(a) flip all 3 proposed (field_applications submit-lock, harvest_records submit-lock, crop_plans single-approver)"
      - "(b) flip a subset, user picks which"
      - "(c) leave all flags false; record the consideration outside notes (gap report)"

b3:
  - id: B3-S1
    candidate: "Module split shape: 2 modules vs 3 modules for FMIS Phase A."
    rationale: >-
      The 3-module split proposed in the prior audit (FMIS-FIELD-OPS / FMIS-HARVEST-YIELD / FMIS-MACHINERY-TELEMETRY)
      corresponds to John Deere Operations Center's split. A 2-module split (FMIS-FIELD-OPS folding harvest in,
      FMIS-MACHINERY-TELEMETRY) lumping harvest into FIELD-OPS is also defensible, matches Conservis / AgriWebb's
      single-module surface for smallholders. Climate FieldView splits into 'decision' (plan + Rx) and 'record'
      (as-planted / as-applied / as-harvested); Trimble splits along precision-ag vs general-FMIS lines.
      Highest-leverage Bucket 3 item because it gates B1B-S1.
    vendor_evidence:
      - {vendor: Conservis, evidence: 1st_class}
      - {vendor: AgriWebb, evidence: 1st_class}
      - {vendor: Climate FieldView, evidence: 1st_class}
      - {vendor: John Deere Operations Center, evidence: 1st_class}
      - {vendor: Trimble Ag Software, evidence: 1st_class}
    proposed_module: null

  - id: B3-S2
    candidate: "Agronomic recommendations / agronomy as a possibly-separate module."
    rationale: >-
      Climate FieldView and Granular both ship agronomic-advisor surfaces (planting-window recommendations,
      spray-window recommendations, soil-zone recommendations) as distinct from the record-keeping master.
      Current FMIS footprint has no agronomic_recommendations / soil_test_results / soil_zones / weather_observations
      masters; the recommendation surface is implicit in variable_rate_prescriptions (the result) but not in the
      upstream data. Candidate MISSING entity cluster, possibly a 4th module.
    vendor_evidence:
      - {vendor: Climate FieldView, evidence: 1st_class}
      - {vendor: Granular, evidence: 1st_class}
      - {vendor: AgWorld, evidence: secondary}
    proposed_module: FMIS-AGRONOMY

  - id: B3-S3
    candidate: "Livestock / cattle-grazing scope: in-scope or separate LIVESTOCK-MGMT domain."
    rationale: >-
      AgriWebb is primarily a livestock-FMIS (paddocks, mob movements, individual-animal records). Current FMIS
      footprint reads as crop-only. Either (a) FMIS is implicitly crop-FMIS and a separate domain (LIVESTOCK-MGMT)
      should be queued, (b) FMIS covers both and needs livestock_records / pasture_assignments / animal_movements
      masters added, (c) the AgriWebb solution_domain row should drop to secondary or partial coverage_level.
    vendor_evidence:
      - {vendor: AgriWebb, evidence: 1st_class}
      - {vendor: Cattle Manager, evidence: secondary}
      - {vendor: Herdwatch, evidence: secondary}
    proposed_module: null
