b3:
  - id: B3-MASTER-SOIL-ZONES
    candidate: "soil_zones (+ soil_test_results)"
    rationale: >-
      Missing-master candidate feeding FMIS-PRECISION-AG. variable_rate_prescriptions is mastered
      (492) but its upstream inputs (soil-type / productivity zones, soil-test sample results) have
      no master; they are implicit in farm_fields.productivity-zones prose and in the prescription
      result. Every precision-ag flagship treats soil sampling + zone delineation as a first-class
      data layer that prescriptions are authored from. If loaded, masters in FMIS-PRECISION-AG (254).
    vendor_evidence:
      - {vendor: Climate FieldView, evidence: 1st_class}
      - {vendor: Trimble Ag Software, evidence: 1st_class}
      - {vendor: Granular, evidence: secondary}
    proposed_module: FMIS-PRECISION-AG

  - id: B3-MASTER-WEATHER-OBS
    candidate: weather_observations
    rationale: >-
      Missing-master candidate. field_applications already records weather-at-application as inline
      fields, and crop planning / spray-window decisions depend on a weather feed, but there is no
      weather_observations master. Flagship FMIS authors ingest field-level weather (station + modeled)
      as a queryable layer. If loaded, masters in FMIS-FIELD-OPS-RECORDS (253) or a future agronomy module.
    vendor_evidence:
      - {vendor: Climate FieldView, evidence: 1st_class}
      - {vendor: AgWorld, evidence: secondary}
    proposed_module: FMIS-FIELD-OPS-RECORDS

  - id: B3-S2
    candidate: "agronomic_recommendations (agronomy as a possibly-separate module)"
    rationale: >-
      Climate FieldView and Granular both ship agronomic-advisor surfaces (planting-window recommendations,
      spray-window recommendations, soil-zone recommendations) as distinct from the record-keeping master.
      Current FMIS footprint has no agronomic_recommendations master; the recommendation surface is implicit
      in variable_rate_prescriptions (the result) but not in the upstream decision layer. Candidate MISSING
      entity cluster, possibly a 5th module (FMIS-AGRONOMY) or an addition to FMIS-PRECISION-AG.
    vendor_evidence:
      - {vendor: Climate FieldView, evidence: 1st_class}
      - {vendor: Granular, evidence: 1st_class}
      - {vendor: AgWorld, evidence: secondary}
    proposed_module: FMIS-AGRONOMY

  - id: B3-S3
    candidate: "Livestock / cattle-grazing scope: in-scope or separate LIVESTOCK-MGMT domain."
    rationale: >-
      AgriWebb is primarily a livestock-FMIS (paddocks, mob movements, individual-animal records). Current FMIS
      footprint reads as crop-only, and the 2026-06-02 modularization tagged all 4 modules industry_id=22
      (Crop Production), reinforcing the crop-only read. Either (a) FMIS is implicitly crop-FMIS and a separate
      domain (LIVESTOCK-MGMT) should be queued, (b) FMIS covers both and needs livestock_records /
      pasture_assignments / animal_movements masters added (would need a livestock module), (c) the AgriWebb
      solution_domain row should drop to secondary or partial coverage_level.
    vendor_evidence:
      - {vendor: AgriWebb, evidence: 1st_class}
      - {vendor: Cattle Manager, evidence: secondary}
      - {vendor: Herdwatch, evidence: secondary}
    proposed_module: null
