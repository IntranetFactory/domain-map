  - id: B1B-S11
    summary: "Author data_object_aliases for 4 non-self-explanatory CONV-AI masters."
    finding: "Zero alias rows for any of the 5 CONV-AI masters. Vendor-specific synonyms are universal in this market: bot_definitions aka assistants (Lex, Dialogflow CX) / agents (Cognigy) / virtual agents (ServiceNow); intent_definitions aka topics (Microsoft Copilot Studio) / flows (Yellow.ai); conversation_flows aka dialog scripts (Kore.ai); conversation_transcripts aka conversation logs (most vendors)."
    action: "Surface exact per-row alias tuples to user, get explicit approval per row, then INSERT. Aliases are commerce-shaped per Rule #18 so vendor names are allowed in alias_name."
    blocked_by:
      - {type: user_decision, ref: B2-ALIAS-WORDING}
    affected_masters:
      - {data_object_id: 699, name: bot_definitions, target_module_id: null, workflow: aliases}
      - {data_object_id: 700, name: intent_definitions, target_module_id: null, workflow: aliases}
      - {data_object_id: 701, name: conversation_flows, target_module_id: null, workflow: aliases}
      - {data_object_id: 259, name: conversation_transcripts, target_module_id: null, workflow: aliases}

  - id: B1B-S12
    summary: "Author lifecycle states for the 5 CONV-AI masters."
    finding: "Zero data_object_lifecycle_states rows for any master. Bot authoring masters carry a draft -> reviewing -> published -> disabled -> archived lifecycle (every flagship vendor exposes publish + disable as separate states). conversation_transcripts is recording -> completed -> redacted -> archived. intent_detections is event-shaped, candidate for the Rule #12 config-shape exemption."
    action: "After B1B-S1 modules land (state.domain_module_id requires the module FK), author per-master state machines with requires_permission=true on published and disabled gates. For intent_detections, await Bucket 2 #4 to decide between config-shape exemption (Rule #12) or authoring detected -> routed -> consumed states."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S1}
      - {type: user_decision, ref: B2-DETECT-LIFECYCLE}

  - id: B1B-S13
    summary: "Add business_function_capabilities override rows where CONV-AI capability ownership diverges from domain-level RACI."
    finding: "Zero business_function_capabilities rows because A2 returns zero capabilities. C2 fails by construction."
    action: "After B1B-S2 capabilities exist, evaluate each capability against domain RACI (owner Contact Center Operations, contributor Software Engineering). Author divergence rows only where the capability's owning function differs from the domain owner (e.g. bot_authoring may be Software Engineering rather than Contact Center Operations)."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S2}

