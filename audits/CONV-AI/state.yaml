b2:
  - id: B2-MOD
    summary: "Confirm CONV-AI modularization plan."
    question: "Which module split for CONV-AI? Recommended 2-module shape CONV-AI-BOT-DESIGN (design-time: bot_definitions, intent_definitions, conversation_flows) + CONV-AI-RUNTIME (runtime: conversation_transcripts, intent_detections, channel_integrations)."
    options:
      - "Confirm 2 modules CONV-AI-BOT-DESIGN + CONV-AI-RUNTIME"
      - "3 modules CONV-AI-AUTHORING + CONV-AI-RUNTIME + CONV-AI-ANALYTICS"
      - "3 modules including CONV-AI-LLM-AGENTS (depends on Bucket 3 #1, #3)"
      - "Other shape, please specify codes"
    why: "Drives B1B-S1, F-band rebuild, every handoff per-module FK, all 7 MISSING entity placements, and the E-band role authoring."

  - id: B2-CAP
    summary: "Confirm CONV-AI capability set."
    question: "Recommended 6 capabilities: bot_authoring, nlu_training, dialog_management, channel_orchestration, conversation_analytics, human_handoff_orchestration. Confirm, revise, or add."
    options:
      - "Confirm the 6 recommended"
      - "Add or remove specific capabilities (please list)"
    why: "Drives B1B-S2 and downstream B1B-S13 / B1B-S14."

  - id: B2-CAT-COPY
    summary: "Approve Rule #20 buyer-voice copy for CONV-AI domain catalog_tagline and catalog_description."
    question: "Authorize the agent to draft a buyer-voice tagline (one sentence) and catalog_description (1 to 3 paragraphs) for review. Once drafted, please approve exact wording before write."
    options:
      - "Authorize draft, then approve wording per row"
      - "Defer until modules land (then both grains can be drafted in one pass)"
      - "Skip backfill for now"
    why: "Rule #20 forbids overwriting non-empty catalog UX fields without explicit per-row approval; the column is empty so first write is allowed but the wording itself needs approval."

  - id: B2-FLAGS
    summary: "Confirm publish-lock pattern flag on 3 authoring masters."
    question: "Set has_submit_lock=true on bot_definitions (id 699), intent_definitions (id 700), conversation_flows (id 701)? All 5 flagship vendors (Kore.ai, Cognigy, Ada, Yellow.ai, Boost.ai) implement publish-then-version-lock semantics on these three entities."
    options:
      - "Flip all 3"
      - "Flip a subset (please name)"
      - "Skip (false stays as the audit-of-record default)"
    why: "Pattern flag changes downstream behavior: publish becomes a workflow-gate permission rather than a free mutate, which affects Phase-S tool authoring."

  - id: B2-DETECT-LIFECYCLE
    summary: "intent_detections lifecycle scope."
    question: "intent_detections is event-shaped (one row per detected intent at runtime). Apply the Rule #12 config-shape exemption, or author detected -> routed -> consumed states?"
    options:
      - "Config-shape exemption, surfaced here per Rule #15 (no notes write)"
      - "Author detected -> routed -> consumed states"
    why: "Per Rule #15 the exemption is not written to data_objects.notes; it lives only here in the audit state."

  - id: B2-AI-AGENTS-MODULE
    summary: "Which CONV-AI module consumes ai_agents (DATA-AI-PLAT master)?"
    question: "Currently consumer + required on the domain. After modularization, which module holds the consumer DMDO row?"
    options:
      - "CONV-AI-RUNTIME (recommended)"
      - "CONV-AI-BOT-DESIGN"
      - "Both"
    why: "Decision can only be made after B2-MOD lands."

  - id: B2-PCF-228
    summary: "APQC handoff 228 PCF choice."
    question: "Handoff 228 (CONV-AI -> CCAAS conversation.escalated_to_human) carries PCF 928 (Respond to customer problems...). 2026-05-30 audit recommended PCF 1318 (IT-flavored escalate) or L2 196. Pick one."
    options:
      - "Keep PCF 928 (current)"
      - "Change to PCF 1318 (Escalate IT requests; IT-domain label on a CCAAS row)"
      - "Change to L2 PCF 196 (parent class, vendor-neutral)"
      - "Defer to Discover Pass 3 custom process"
    why: "L2 196 keeps the catalog quality honest without forcing an IT-domain label. Direct fix when chosen."

  - id: B2-E911-SCOPE
    summary: "E911 regulation applicability on CONV-AI."
    question: "E911 currently mandatory. It applies only when CONV-AI routes voice traffic that may trigger emergency-services dispatch. Chat-only deployments (Ada chat, Intercom Fin) do not trigger E911. Keep mandatory or scope down?"
    options:
      - "Keep mandatory (presumes voice-bot inclusion)"
      - "Scope down to applicable_when_voice"
    why: "If scoped, applicability column needs a PATCH on the domain_regulations row."

  - id: B2-ALIAS-WORDING
    summary: "Approve per-row alias tuples for B1B-S11."
    question: "Approve the exact (alias_name, alias_type) tuples per master before insert. Candidate aliases identified in 2026-05-30 audit: bot_definitions aka assistants / agents / virtual agents; intent_definitions aka topics / flows; conversation_flows aka dialog scripts."
    options:
      - "Authorize agent to draft full alias tuples, then approve per row"
      - "Specify alias_name and alias_type directly"
      - "Skip aliases"
    why: "Aliases are commerce-shaped entities where vendor names are allowed (Rule #18), but the wording is non-obvious and worth user approval per Rule #15 spirit."

b3:
  - id: B3-PROMPT-TEMPLATES
    candidate: prompt_templates
    rationale: "LLM-era authoring entity surfaced by Cognigy, Kore.ai, and Yellow.ai after their LLM-backed-agent shift. Distinct from intent_definitions (NLU) and bot_definitions (top-level config)."
    vendor_evidence:
      - Cognigy
      - Kore.ai
      - Yellow.ai
    proposed_module: CONV-AI-BOT-DESIGN
    extra_phase0_path: "Cognigy LLM integration docs plus Kore.ai XO 11 release notes."

  - id: B3-AGENT-PERSONAS
    candidate: agent_personas
    rationale: "Persona / tone profiles distinct from bot_definitions; Boost.ai and Yellow.ai expose this as a separate masterable concept."
    vendor_evidence:
      - Boost.ai
      - Yellow.ai
    proposed_module: CONV-AI-BOT-DESIGN
    extra_phase0_path: "Boost.ai admin guide, Yellow.ai docs."

  - id: B3-FUNCTION-TOOLS
    candidate: function_tools
    rationale: "LLM agents bind backend tools the bot can invoke. Cognigy, Salesforce Agentforce, ServiceNow Now Assist all master this separately from intents."
    vendor_evidence:
      - Cognigy
      - Salesforce Agentforce
      - ServiceNow Now Assist
    proposed_module: CONV-AI-BOT-DESIGN
    extra_phase0_path: "Agentforce schema, Cognigy.AI tool registry."

  - id: B3-EVALUATION-RUNS
    candidate: evaluation_runs
    rationale: "Bot-evaluation harness; Cresta, Cognigy, and Voiceflow ship this. Ties to AI Act conformance assessments (B1B-MISSING B1-M2 ai_act_risk_classifications)."
    vendor_evidence:
      - Cresta
      - Cognigy
      - Voiceflow
    proposed_module: CONV-AI-BOT-DESIGN
    extra_phase0_path: "Cresta product docs."

  - id: B3-REDACTION-POLICIES
    candidate: redaction_policies
    rationale: "PII redaction rules on transcripts; universal under GDPR / TCPA but modeled as a distinct master only on Cresta, Cognigy Insights, Boost.ai."
    vendor_evidence:
      - Cresta
      - Cognigy Insights
      - Boost.ai
    proposed_module: CONV-AI-RUNTIME
    extra_phase0_path: "Vendor security whitepapers."

  - id: B3-CONVERSATION-TOPICS
    candidate: conversation_topics
    rationale: "Topic clusters over completed transcripts (analytics layer); Cognigy Insights, Kore.ai SmartAssist, Salesforce Service Cloud Voice."
    vendor_evidence:
      - Cognigy Insights
      - Kore.ai SmartAssist
      - Salesforce Service Cloud Voice
    proposed_module: CONV-AI-RUNTIME
    extra_phase0_path: "Cognigy Insights schema."

  - id: B3-VOICE-BIOMETRIC-PROFILES
    candidate: voice_biometric_profiles
    rationale: "Voiceprint enrollment + match. Pindrop, Nuance Gatekeeper, LumenVox are pure-plays; plausibly a separate candidate domain rather than a CONV-AI entity."
    vendor_evidence:
      - Pindrop
      - Nuance Gatekeeper
      - LumenVox
    proposed_module: null
    extra_phase0_path: "Pindrop product docs. Decision: promote to candidate domain or model as CONV-AI master."
