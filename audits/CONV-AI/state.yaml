b2:
  - id: B2-MOD
    summary: "Confirm CONV-AI modularization plan."
    question: "Which module split for CONV-AI? Recommended 2-module shape CONV-AI-BOT-DESIGN (design-time: bot_definitions, intent_definitions, conversation_flows) + CONV-AI-RUNTIME (runtime: conversation_transcripts, intent_detections, channel_integrations)."
    options:
      - "Confirm 2 modules CONV-AI-BOT-DESIGN + CONV-AI-RUNTIME"
      - "3 modules CONV-AI-AUTHORING + CONV-AI-RUNTIME + CONV-AI-ANALYTICS"
      - "3 modules including CONV-AI-LLM-AGENTS (depends on Bucket 3 #1, #3)"
      - "Other shape, please specify codes"
    why: "Drives B1A-BUILD, B1B-S1, F-band rebuild, every handoff per-module FK, all 7 MISSING entity placements, and the E-band role authoring. This is the gating decision for the whole build."

  - id: B2-CAP
    summary: "Confirm CONV-AI capability set."
    question: "Recommended 6 capabilities: bot_authoring, nlu_training, dialog_management, channel_orchestration, conversation_analytics, human_handoff_orchestration. Confirm, revise, or add."
    options:
      - "Confirm the 6 recommended"
      - "Add or remove specific capabilities (please list)"
    why: "Drives B1B-S2 and downstream B1B-S13 / B1B-S14."

  - id: B2-FLAGS
    summary: "Confirm publish-lock pattern flag on 3 authoring masters."
    question: "Set has_submit_lock=true on bot_definitions (id 699), intent_definitions (id 700), conversation_flows (id 701)? All flagship vendors implement publish-then-version-lock semantics on these three entities. (All three are now entity_type=operational_workflow.)"
    options:
      - "Flip all 3"
      - "Flip a subset (please name)"
      - "Skip (false stays as the audit-of-record default)"
    why: "Pattern flag changes downstream behavior: publish becomes a workflow-gate permission rather than a free mutate, which affects the workflow-gate derivation."

  - id: B2-DETECT-LIFECYCLE
    summary: "intent_detections lifecycle scope."
    question: "intent_detections is now classified entity_type=operational_record (no lifecycle required). It is event-shaped (one row per detected intent at runtime). Keep it as operational_record, or re-type to operational_workflow and author detected -> routed -> consumed states?"
    options:
      - "Keep operational_record (no lifecycle; classification already set 2026-06-07)"
      - "Re-type to operational_workflow and author detected -> routed -> consumed states"
    why: "The entity_type is already set to operational_record (the default config/record-shape outcome). Upgrading to an authored workflow is the only remaining choice and would re-type the row plus require lifecycle states."

  - id: B2-AI-AGENTS-MODULE
    summary: "Which CONV-AI module consumes ai_agents (DATA-AI-PLAT master)?"
    question: "Currently consumer + required on the domain. After modularization, which module holds the consumer DMDO row?"
    options:
      - "CONV-AI-RUNTIME (recommended)"
      - "CONV-AI-BOT-DESIGN"
      - "Both"
    why: "Decision can only be made after B2-MOD lands."

  - id: B2-PCF-228
    summary: "APQC handoff 228 PCF choice (DESTRUCTIVE override)."
    question: "Handoff 228 (CONV-AI -> CCAAS conversation.escalated_to_human) carries handoff_processes id 752 -> PCF 928 (Respond to customer problems...). 2026-05-30 audit recommended PCF 1318 (IT-flavored escalate) or L2 196. Pick one."
    options:
      - "Keep PCF 928 (current)"
      - "Change to PCF 1318 (Escalate IT requests; IT-domain label on a CCAAS row)"
      - "Change to L2 PCF 196 (parent class, vendor-neutral)"
      - "Defer to Discover Pass 3 custom process"
    why: "L2 196 keeps the catalog quality honest without forcing an IT-domain label. Any change overwrites a non-empty process_id, so it is surfaced, not auto-applied."

  - id: B2-E911-SCOPE
    summary: "E911 regulation applicability on CONV-AI."
    question: "E911 currently mandatory. It applies only when CONV-AI routes voice traffic that may trigger emergency-services dispatch. Chat-only deployments do not trigger E911. Keep mandatory or scope down?"
    options:
      - "Keep mandatory (presumes voice-bot inclusion)"
      - "Scope down to applicable_when_voice"
    why: "If scoped, the applicability column needs a PATCH on the domain_regulations row (overwrites a non-empty value, so surfaced)."

  - id: B2-ALIAS-WORDING
    summary: "Approve per-row alias tuples for B1B-S11."
    question: "Approve the exact (alias_name, alias_type) tuples per master before insert. Candidate aliases: bot_definitions aka assistants / agents / virtual agents; intent_definitions aka topics / flows; conversation_flows aka dialog scripts; conversation_transcripts aka conversation logs."
    options:
      - "Authorize agent to draft full alias tuples, then approve per row"
      - "Specify alias_name and alias_type directly"
      - "Skip aliases"
    why: "Aliases are commerce-shaped entities where vendor names are allowed (Rule #18), but the wording is non-obvious and worth user approval."

