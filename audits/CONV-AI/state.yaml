      - {handoff_id: 745, direction: outbound, source_domain: CONV-AI, target_domain: KMS, trigger_event: conversation_flow.fallback_triggered, payload: conversation_flows, null_field: source_domain_module_id}
      - {handoff_id: 746, direction: outbound, source_domain: CONV-AI, target_domain: CCAAS, trigger_event: bot_definition.published, payload: bot_definitions, null_field: source_domain_module_id}
