    action: "After B1B-S1 + B1B-S2 land, author at minimum CONV-AI-BOT-DESIGNER, CONV-AI-ANALYTICS-VIEWER, CONV-AI-AGENT-OPS, each with role_modules spanning >=2 CONV-AI modules and a role_permissions bundle."
