      - {vendor: Boost.ai, evidence: 1st_class}
      - {vendor: Kore.ai, evidence: 1st_class}
      - {vendor: Cresta, evidence: 1st_class}

  - id: B1B-H2
    summary: "Reclassify APQC tag on handoff 228 (CONV-AI -> CCAAS escalation)."
    finding: "Handoff 228 (conversation.escalated_to_human -> CCAAS, payload conversation_transcripts) currently carries handoff_processes row pointing at PCF 928 (Respond to customer problems, requests, and inquiries, external_id 10396, L4). 2026-05-30 audit flagged PCF 1318 as candidate (IT-flavored escalate) but borderline. Options on table: keep 928, change to 1318, change to L2 196 parent, or defer to Discover custom process."
    action: "On user choice, PATCH handoff_processes for handoff_id=228 to the chosen process_id, or DELETE to defer."
    blocked_by:
      - {type: user_decision, ref: B2-PCF-228}
    affected_handoffs:
