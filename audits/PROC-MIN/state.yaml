b2:
  - id: B2-MODULARIZATION
    summary: Phase-A modularization shape unresolved; 4 to 5 module split is the leveraged decision unblocking the entire backlog
    question: Pick PROC-MIN's module shape. Proposed 4 to 5 modules (PROC-MIN-INGESTION, PROC-MIN-DISCOVERY, PROC-MIN-CONFORMANCE, PROC-MIN-INSIGHTS, optional PROC-MIN-ACTION). Alternative is collapsing INGESTION + DISCOVERY into PROC-MIN-MINING or deferring until Bucket 3 vendor research lands.
    options:
      - Adopt the 4-module split (INGESTION / DISCOVERY / CONFORMANCE / INSIGHTS)
      - Adopt the 5-module split (above + ACTION)
      - Collapse INGESTION + DISCOVERY into PROC-MIN-MINING core module (3 modules)
      - Defer until Bucket 3 vendor research lands
    why: This is the single highest-leverage decision in the audit. The S-band, M-band, B10b backfill, B12 module attribution, E-band, and F-band per-module work are all blocked on it. Rule #14 mandates >=2 full modules once >=3 capabilities exist; the capability set in B2-CAPABILITIES proposes 7 capabilities, so >=2 modules is non-negotiable.

  - id: B2-CAPABILITIES
    summary: Phase-A capability authoring; 7 proposed capabilities awaiting user sign-off
    question: Adopt the proposed capability set (event-log-ingestion, process-discovery, process-conformance-checking, process-variant-analysis, process-bottleneck-identification, process-improvement-opportunity-identification, business-rule-mining) plus optional task-mining?
    options:
      - Adopt all 7
      - Adopt all 7 plus task-mining
      - Drop task-mining (route to TASK-MINING candidate domain or PROC-MIN-TASK-MINING sub-module)
      - Rename to align with APQC PCF Process Improvement (10047 / 10048 / 10049)
    why: Capability vocabulary is editorial. Rule #14 ties module count to capability count, so the capability list informs B2-MODULARIZATION; the two should resolve together. Carry from 2026-05-30 B2-2.

  - id: B2-NAMING-RULES
    summary: business_rules_extracted naming arbitration; only adjective-trailing master in the catalog
    question: Rename business_rules_extracted to extracted_business_rules (PCF-aligned, noun-phrase-plural), leave as is, or pick another form?
    options:
      - Rename to extracted_business_rules
      - Leave business_rules_extracted as is
      - Other (mined_business_rules / inferred_business_rules / etc.)
    why: The form is anomalous in the catalog (every other master is noun-phrase-plural). No Rule #9 collision exists today, but the rename cascades through aliases (B11), trigger event 801 event_name, the legacy skill's tool 628, and any future Phase-B references. Decide here so downstream loads stay consistent. Carry from 2026-05-30 B2-3.
    affected_masters:
      - {data_object_id: 584, name: business_rules_extracted, target_module_id: null, workflow: rule-mining}
    affected_events:
      - {id: 801, event_name: business_rule_extracted.identified, current_category: signal, proposed_category: signal}

  - id: B2-PATTERN-FLAGS
    summary: B4 positive re-evaluation of pattern flags on 3 candidate flips
    question: Should event_logs.has_personal_content=true (PII in user IDs / emails)? Should discovered_process_models.has_submit_lock=true (immutability for downstream conformance)? Should process_conformance_results.has_submit_lock=true (audit-style snapshots)?
    options:
      - Approve all three flips
      - Approve a subset (specify which)
      - Decline all (flags stay false; record the consideration in the audit only, no notes write per Rule #15)
    why: Pattern flags are workflow-shape judgments the user owns; defaults to false do not establish review per Rule #12. Recording the consideration in notes is forbidden by Rule #15, so the answer lives only in the audit decisions. Carry from 2026-05-30 B2-4.
    affected_masters:
      - {data_object_id: 579, name: event_logs, target_module_id: null, workflow: ingestion}
      - {data_object_id: 580, name: discovered_process_models, target_module_id: null, workflow: discovery}
      - {data_object_id: 581, name: process_conformance_results, target_module_id: null, workflow: conformance}

  - id: B2-VARIANT-CONFIG
    summary: process_variants config-shape exemption vs 4-state machine
    question: Apply the Rule #12 config-shape exemption to process_variants (append-only finding-shaped, no lifecycle), or author a 4-state machine (surfaced -> acknowledged -> accepted_as_new_normal / marked_as_deviation)?
    options:
      - Confirm config-shape exemption (no lifecycle states; track decision in audit per Rule #15)
      - Author the 4-state machine
    why: B12 partial-fails on this master either way. SLAs-style append-only finding records ship without lifecycle in some vendors (Celonis variant explorer), while others (Signavio Process Intelligence) treat variants as catalog rows with curation status. Either choice is defensible. Carry from 2026-05-30 B2-5.
    affected_masters:
      - {data_object_id: 582, name: process_variants, target_module_id: null, workflow: variant-analysis-or-config}

  - id: B2-EM-DASHES
    summary: 4 description / business_logic cells contain U+2014 em-dashes (project CLAUDE.md rule)
    question: Rewrite the 4 affected cells this audit cycle, defer to a cross-domain em-dash audit pass, or leave (relying on the fact_sheet emitter's render-time sanitizer)?
    options:
      - Rewrite all 4 cells this cycle (user supplies wording or approves agent drafts row-by-row)
      - Defer to a cross-domain em-dash audit pass
      - Leave (fact_sheet emitter sanitizes at render time as a safety net)
    why: CLAUDE.md forbids em-dashes everywhere, but Rule #20 / Rule #15 forbid agent-authored description / business_logic rewrites unilaterally. The decision is whether to surface drafts for this domain or wait for a batch sweep. Carry from 2026-05-30 B2-6.
    affected_entities:
      - {table: domains, id: 40, field: business_logic}
      - {table: trigger_events, id: 358, field: description}
      - {table: trigger_events, id: 798, field: description}
      - {table: skills, id: 91, field: description}

  - id: B2-CATALOG-UX
    summary: Rule #20 catalog_tagline + catalog_description empty on the PROC-MIN domain row (M8 also fails once modules exist)
    question: Author catalog_tagline (single buyer-facing sentence) and catalog_description (1 to 3 buyer-facing paragraphs) for the PROC-MIN domain row? Rule #20 requires explicit user approval of the wording before any write.
    options:
      - Draft a full set agent-side and surface for line-by-line approval
      - User supplies the wording row-by-row
      - Defer (rows remain empty; A4 stays failing, M8 stays vacuous until modules exist)
    why: A4 fails when these fields are empty. Once modules ship per B2-MODULARIZATION, M8 will fail per module unless catalog_tagline / catalog_description are populated on each. Rule #20 forbids agent-authored writes without explicit per-row user approval.
    affected_entities:
      - {table: domains, id: 40, fields: [catalog_tagline, catalog_description]}

b3:
  - id: B3-DATA-SOURCE-CONNECTIONS
    candidate: data_source_connections
    rationale: Connection metadata to ERP / CRM / case systems is the operational entry point for every process-mining workflow but is currently invisible to the PROC-MIN catalog. Pre-requisite for event-log ingestion. Naming arbitration likely against existing data_source_connections elsewhere; consider event_log_connectors as an alternative.
    vendor_evidence: [Celonis EMS Connectors, SAP Signavio Process Intelligence Data Pipelines, UiPath Process Mining adapters]
    proposed_module: PROC-MIN-INGESTION

  - id: B3-EVENT-LOG-EXTRACTIONS
    candidate: event_log_extractions
    rationale: Run records of the ETL pipeline that produces an event-log. Distinct from event_logs (the artifact). Vendor evidence -Celonis Extractors, Signavio Data Pipelines, UiPath Extract activities. Alternative name data_extraction_jobs.
    vendor_evidence: [Celonis Extractors, SAP Signavio Data Pipelines, UiPath Extract activities]
    proposed_module: PROC-MIN-INGESTION

