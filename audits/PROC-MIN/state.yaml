b2:
  - id: B2-MODULARIZATION
    summary: Phase-A modularization shape unresolved; 4 to 5 module split is the leveraged decision unblocking the entire backlog
    question: Pick PROC-MIN's module shape. Proposed 4 to 5 modules (PROC-MIN-INGESTION, PROC-MIN-DISCOVERY, PROC-MIN-CONFORMANCE, PROC-MIN-INSIGHTS, optional PROC-MIN-ACTION). Alternative is collapsing INGESTION + DISCOVERY into PROC-MIN-MINING or deferring until Bucket 3 vendor research lands.
    options:
      - Adopt the 4-module split (INGESTION / DISCOVERY / CONFORMANCE / INSIGHTS)
      - Adopt the 5-module split (above + ACTION)
      - Collapse INGESTION + DISCOVERY into PROC-MIN-MINING core module (3 modules)
      - Defer until Bucket 3 vendor research lands
    why: This is the single highest-leverage decision in the audit. The S-band, M-band, B10b backfill, B12 module attribution, E-band, and F-band per-module tool work are all blocked on it. Rule #14 mandates >=2 full modules once >=3 capabilities exist; the capability set in B2-CAPABILITIES proposes 7 capabilities, so >=2 modules is non-negotiable.

  - id: B2-CAPABILITIES
    summary: Phase-A capability authoring; 7 proposed capabilities awaiting user sign-off
    question: Adopt the proposed capability set (event-log-ingestion, process-discovery, process-conformance-checking, process-variant-analysis, process-bottleneck-identification, process-improvement-opportunity-identification, business-rule-mining) plus optional task-mining?
    options:
      - Adopt all 7
      - Adopt all 7 plus task-mining
      - Drop task-mining (route to TASK-MINING candidate domain or PROC-MIN-TASK-MINING sub-module)
      - Rename to align with APQC PCF Process Improvement (10047 / 10048 / 10049)
    why: Capability vocabulary is editorial. Rule #14 ties module count to capability count, so the capability list informs B2-MODULARIZATION; the two should resolve together.

  - id: B2-NAMING-RULES
    summary: business_rules_extracted naming arbitration; only adjective-trailing master in the catalog
    question: Rename business_rules_extracted to extracted_business_rules (PCF-aligned, noun-phrase-plural), leave as is, or pick another form?
    options:
      - Rename to extracted_business_rules
      - Leave business_rules_extracted as is
      - Other (mined_business_rules / inferred_business_rules / etc.)
    why: The data_object_name reads adjective-trailing while every other master is noun-phrase-plural. (Note the display labels are already "Extracted Business Rule" / "Extracted Business Rules".) No Rule #9 collision exists today, but a rename of data_object_name would cascade through the 2026-06-07 aliases (Mined Business Rule, Inferred Business Rule), trigger event 801 event_name, and any future Phase-B references. Decide here so downstream loads stay consistent.
    affected_masters:
      - {data_object_id: 584, name: business_rules_extracted, entity_type: operational_workflow, workflow: rule-mining}
    affected_events:
      - {id: 801, event_name: business_rule_extracted.identified, current_category: signal}

  - id: B2-PATTERN-FLAGS
    summary: B4 positive re-evaluation of pattern flags on 3 candidate flips (destructive overwrites of existing flag values)
    question: Should event_logs.has_personal_content=true (PII in user IDs / emails)? Should discovered_process_models.has_submit_lock=true (immutability for downstream conformance)? Should process_conformance_results.has_submit_lock=true (audit-style snapshots)?
    options:
      - Approve all three flips
      - Approve a subset (specify which)
      - Decline all (flags stay false; record the consideration in the audit only, no notes write per Rule #15)
    why: Pattern flags are workflow-shape judgments the user owns; defaults to false do not establish review per Rule #12. Each flip overwrites an existing non-empty boolean, so it is user-gated (destructive). Recording the consideration in notes is forbidden by Rule #15, so the answer lives only in the audit decisions.
    affected_masters:
      - {data_object_id: 579, name: event_logs, entity_type: operational_workflow, workflow: ingestion}
      - {data_object_id: 580, name: discovered_process_models, entity_type: computed, workflow: discovery}
      - {data_object_id: 581, name: process_conformance_results, entity_type: computed, workflow: conformance}

  - id: B2-EM-DASHES
    summary: 4 description / business_logic cells contain U+2014 em-dashes (project CLAUDE.md rule); rewriting them is a destructive overwrite of non-empty copy
    question: Rewrite the 4 affected cells this cycle, defer to a cross-domain em-dash audit pass, or leave (relying on the fact_sheet emitter's render-time sanitizer)?
    options:
      - Rewrite all 4 cells this cycle (user supplies wording or approves agent drafts row-by-row)
      - Defer to a cross-domain em-dash audit pass
      - Leave (fact_sheet emitter sanitizes at render time as a safety net)
    why: "CLAUDE.md forbids em-dashes everywhere, but each rewrite overwrites a non-empty description / business_logic value, which is destructive and user-gated. Confirmed live 2026-06-07 that domains.id=40 business_logic still contains the trailing clause academic algorithms made commercial preceded by an em-dash."
    affected_entities:
      - {table: domains, id: 40, field: business_logic}
      - {table: trigger_events, id: 358, field: description}
      - {table: trigger_events, id: 798, field: description}
      - {table: skills, id: 91, field: description}

  - id: B2-B9D-MISTAG-183
    summary: "B9d MIS-TAG: handoff 183 (PROC-MIN -> BPA, payload business_process_models) is tagged 13.3.3 'Manage non-conformance' (pid 414), but BPA's business_process_models work is realized under 13.1.3.5 'Publish processes'. Destructive re-point or delete; PROC-MIN authored the tag so PROC-MIN owns the fix."
    question: "Handoff 183 carries a handoff_processes tag pointing at the wrong APQC process. The conformance-deviation event ships business_process_models to BPA, but that entity's realized work sits under 13.1.3.5 'Publish processes', not 13.3.3 'Manage non-conformance'. Re-point the tag, or delete it?"
    options:
      - "Re-point handoff_processes(183) from process 414 (13.3.3) to the realized code 13.1.3.5 'Publish processes' (record_status='new')"
      - "Delete the handoff_processes row for 183 and leave it untagged (route to Discover for a fresh tag)"
      - "Leave the 13.3.3 tag in place (accept the mis-categorization)"
    why: "B9d resolver run 2026-06-13 classified this as MIS-TAG (the 13.3.3 code's category fits neither endpoint's realized family; BPA realizes business_process_models under 13.1.x 'Publish processes'). Re-pointing overwrites a non-empty process_id and deleting removes a row, so both are destructive (Rule #21) and user-gated. The tag is a discovery_substring row (low-confidence provenance), which strengthens the re-point case."
    affected_handoffs:
      - {handoff_id: 183, direction: outbound, source_domain: PROC-MIN, target_domain: BPA, payload: business_process_models, current_tag: "process 414 / 13.3.3 Manage non-conformance"}

