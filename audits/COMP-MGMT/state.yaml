b3:
  - id: B3-PAY-EQUITY-ASSESSMENTS
    candidate: pay_equity_assessments
    rationale: "EU Pay Transparency Directive (2026 enforcement) and US state laws (CA SB 1162, CO Equal Pay for Equal Work Act, NY Pay Transparency Act, WA HB 1696) require structured pay-equity assessments with gap calculations per protected class. The current model has 0 entities for pay equity; the only signal is the inbound pay_equity.gap_detected handoff 1105 from PA (which also has no clean PCF tag, B1A-S9-RESIDUAL)."
    vendor_evidence: [Trusaic, Syndio, Workday, "SAP SuccessFactors"]
    proposed_module: "COMP-BENCHMARKING (master) or new HCM-PAY-EQUITY module"

  - id: B3-INCENTIVE-PLANS
    candidate: incentive_plans
    rationale: "Distinct from compensation_plans: incentive plans (commissions, sales incentive plans, SPIFFs, MBOs) carry quota structures, accelerators, threshold conditions. Currently absent."
    vendor_evidence: [Xactly, CaptivateIQ, Performio, "SAP SuccessFactors Incentive Management"]
    proposed_module: "COMP-INCENTIVES (master)"

  - id: B3-BONUS-POOLS
    candidate: bonus_pools
    rationale: "Budget pools as separate first-class records with allocation and consumption tracking. Currently rolled into compensation_plans."
    vendor_evidence: [Workday, "SAP SuccessFactors", beqom]
    proposed_module: "COMP-PLANNING (master)"

  - id: B3-COMMISSION-STATEMENTS
    candidate: commission_statements
    rationale: "A specific kind of compensation statement for sales reps: commission accrual, draws, claw-backs, dispute states. Distinct lifecycle from total-rewards compensation_statements. Possibly belongs in SALES-PERF or a new ICM domain."
    vendor_evidence: [Xactly, CaptivateIQ, Spiff, Performio]
    proposed_module: "new ICM domain or COMP-INCENTIVES (master)"

