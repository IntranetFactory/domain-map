      Row /domains?id=eq.98 carries em-dashes in two text columns. `description` ends "Distinct from CSM (case-management business app)." preceded by an em-dash; `business_logic` reads "ACD/routing engine, IVR runtime, real-time analytics, and workforce engagement (recording, QM, WFM) [em-dash] the platform IS the engine." Per CLAUDE.md the em-dash character is forbidden everywhere including catalog data written via semantius.
    action: |
      Surface the proposed rewrites and PATCH /domains?id=eq.98 in a single call. Proposed text: description -> "Cloud telephony, omnichannel routing, IVR, workforce engagement management, and AI agent assist for contact centers. Distinct from CSM, which is the case-management business app." business_logic -> "ACD/routing engine, IVR runtime, real-time analytics, and workforce engagement (recording, QM, WFM): the platform IS the engine."

