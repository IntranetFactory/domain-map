b1a: []

b1b:
  - id: B1B-S4-REGULATIONS
    summary: Load 5 regulations rows (TCPA, PCI-DSS, HIPAA, GDPR, CCPA) and the matching domain_regulations junctions; both halves are missing.
    finding: |
      domain_regulations returns zero rows for CCAAS. The underlying regulations parents (TCPA, PCI-DSS, HIPAA, GDPR, CCPA) need verification; some exist from other domain loads. CCAAS is regulated by all five; one-party vs two-party recording consent is non-trivially scoped per US state and feeds B1B-COMPLIANCE-MASTERS.
    blocked_by:
      - {type: catalog_addition, scope: domains, trigger: "verify/insert regulations parents before domain_regulations junctions"}

  - id: B1B-COMPLIANCE-MASTERS
    summary: Load 4 compliance-mandated masters (recording_consent_records, dnc_lists, tcpa_consent_records, pci_redaction_events) and their DMDO rows + lifecycle states.
    finding: |
      Each is vendor-universal AND legally required by TCPA / PCI-DSS / GDPR / CCPA, not speculative. recording_consent_records and pci_redaction_events sit in CCAAS-QUALITY (recording surface); dnc_lists and tcpa_consent_records sit in CCAAS-ROUTING (outbound/dialer eligibility). Parked until the regulation scope (B1B-S4) and the dialer/outbound decision (B3-OUTBOUND-CAMPAIGNS) are settled so they land in the right module with the right applicability.
    affected_entities:
      - recording_consent_records
      - dnc_lists
      - tcpa_consent_records
      - pci_redaction_events
    blocked_by:
      - {type: depends_on, ref: B1B-S4-REGULATIONS, reason: "applicability + lifecycle depend on which regulations are in scope"}

b2:
  - id: B2-MODULE-SPLIT
    summary: Confirm the built 3-module split (CCAAS-ROUTING + CCAAS-DESKTOP + CCAAS-QUALITY) or restructure.
    question: "Keep the built 3-module split (CCAAS-ROUTING: queue_statistics, disposition_codes; CCAAS-DESKTOP: support_sessions, contact_records, agent_states; CCAAS-QUALITY: ccaas_call_recordings, interaction_evaluations, evaluation_forms), or restructure into 4 (split IVR/Self-Service out of Routing, or add a Dialer/Outbound module) or 2 (fold Routing into Desktop)?"
    options: [a-3-module-built, b-4-module-split-ivr-or-dialer, c-2-module-fold-routing]
    why: "Grounded in vendor packaging. Genesys Cloud CX, NICE CXone, Five9, Amazon Connect, Talkdesk all package CCaaS as a routing/ACD-and-flow engine, a live agent workspace, and a post-interaction quality/analytics tier, which is the built 3-way split. (b) is real where dialer is a separate product line: Five9 leads with outbound/dialer as a distinct surface, and Genesys/NICE sell outbound campaign management as a named add-on, so a 4th Dialer module is defensible if outbound is in scope (see B3-OUTBOUND-CAMPAIGNS). Genesys and NICE also expose IVR/flow design (Architect, Studio) as its own admin surface, so splitting IVR out is the other 4-module option. (c) under-splits: every flagship keeps routing/ACD separate from the agent desktop. Genuine open call: whether outbound/dialer warrants its own module now or stays a b3 idea."

  - id: B2-WEM-SCOPE
    summary: Keep workforce-engagement (recording, QM, adherence) inside CCAAS, or promote WEM to its own domain.
    question: "Should workforce engagement (the CCAAS-QUALITY recording/QM/coaching surface plus agent-state adherence) stay a CCAAS module, or be promoted to a standalone WEM domain (CCAAS-WEM is queued in _missing-domains.md)?"
    options: [keep-in-ccaas, promote-wem-standalone]
    why: "Vendor evidence cuts both ways. Genesys Cloud CX and NICE CXone bundle WEM (recording, QM, WFM, coaching) inside the suite as a licensed tier, supporting keep-in-ccaas. But Verint and Calabrio sell WEM as a standalone platform that overlays any ACD, and NICE markets its WEM as a separable product line, so WEM is a genuine point-solution market in its own right. Promoting it would move ccaas_call_recordings, interaction_evaluations, and evaluation_forms out of CCAAS and free the Verint/Calabrio vendor surface to that domain. Trade-off: a standalone WEM domain models the market more faithfully but fragments the contact-center build and duplicates the agent_states adherence link across two domains."

  - id: B2-NAMING-ARBITRATION
    summary: Per Rule #9, resolve the 5 bare-word CCAAS masters (prefix to ccaas_* or claim canonical bare-word). DESTRUCTIVE rename.
    question: "support_sessions (256), contact_records (257), queue_statistics (258), agent_states (736), disposition_codes (737) use bare-word names without is_canonical_bare_word=true. Prefix each to ccaas_* (default), claim canonical bare-word per row, or a mix? (ccaas_call_recordings is already correctly prefixed.)"
    options: [prefix-all, claim-canonical-per-row, mixed]
    why: "Bare-word names collide with potential CSM / CRM / WFM / CONV-AI / ATS entities. Vendor framing: Genesys, NICE, Five9, Amazon Connect, and Talkdesk all treat 'contact'/'interaction', 'queue', and 'agent state' as contact-center-scoped concepts, which argues for the ccaas_ prefix to avoid catalog-wide ambiguity; 'disposition code' and 'wrap-up' are likewise CCaaS-native terms across all five. Renaming after Phase B is invasive (cascades through DMDO, relationships, trigger_events, handoffs), so this is a destructive change needing sign-off."

  - id: B2-DESC-EMDASH-BRITISH
    summary: Fix domains.business_logic (em-dash, banned) and domains.description (British 'centres'). DESTRUCTIVE overwrite of non-empty values.
    question: "business_logic contains a U+2014 em-dash (banned project-wide) and description uses British 'centres' (American-English-only rule). Apply the minimal rewrites (em-dash -> colon; centres -> centers)? (yes/no)"
    options: [a-apply-both, b-apply-some, c-leave]
    why: "CLAUDE.md forbids em-dashes everywhere and mandates American English. Proposed: business_logic -> 'ACD/routing engine, IVR runtime, real-time analytics, and workforce engagement (recording, QM, WFM): the platform IS the engine.' and description -> '...AI agent assist for contact centers. Distinct from CSM (case-management business app).' Both columns are non-empty, so the overwrite needs sign-off (Rule #21)."

  - id: B2-INTENT-IDENTIFIED-OWNERSHIP
    summary: Resolve handoff 530 payload mis-attribution (trigger_event 200 intent.identified). DESTRUCTIVE.
    question: "Handoff 530 (CCAAS->CRM) carries payload contact_records (257) but its trigger_event 200 'intent.identified' references intent_detections (260, CONV-AI-owned). Either DELETE handoff 530 and let CONV-AI author the equivalent outbound, or PATCH trigger_event 200 to contact_records (257) if CCAAS genuinely publishes this event?"
    options: [a-delete-530-reassign-to-conv-ai, b-patch-trigger-event-to-contact-records]
    why: "Intent detection is a CONV-AI concept across the conversational-AI vendor surface; the CCaaS flagships (Genesys, NICE, Five9, Amazon Connect, Talkdesk) consume detected intent from a bot/NLU layer rather than publishing it themselves. That argues for (a): let CONV-AI own the outbound. (b) is only right if CCAAS routing genuinely classifies and publishes intent. Either path is destructive (delete a handoff or overwrite a trigger_event payload), so it needs your call. The source_domain_module_id on 530 was backfilled to CCAAS-DESKTOP based on the contact_records payload regardless of which way this resolves."

  - id: B2-CONTACT-RECORDS-CRM-CONSUMER
    summary: Boundary check on handoffs 501/530 - does CRM consume contact_records or crm_contacts.
    question: "Handoffs 501 (contact_record.captured) and 530 (intent.identified) hand contact_records (257) to CRM-ACCT-MGT (module 46). Should CRM consume contact_records (257), or crm_contacts (98) which CRM masters?"
    options: [keep-contact-records, switch-to-crm-contacts]
    why: "Across the vendor set, the CTI/CRM connector (Genesys for Salesforce, NICE CXone Agent for Salesforce, Amazon Connect CTI adapter, Talkdesk for Salesforce) pops and updates the CRM Contact/Account record, not a raw interaction log, on screen-pop and after-call. That argues for switch-to-crm-contacts as the cleaner consumer. Keep-contact-records is right only if CRM genuinely ingests the interaction record itself. Changing the handoff payload is a corrective overwrite, so surfaced for your call."

  - id: B2-CALL-RECORDINGS-SPLIT
    summary: Keep the two call-recording masters separate or merge under a canonical claim.
    question: "Keep both call_recordings (122, SALES-ENG, sales-rep call recordings) and ccaas_call_recordings (735, CCAAS, contact-center recordings), or merge under a single canonical master?"
    options: [keep-both, merge-canonical]
    why: "The retention, consent, redaction, and QM-scoring profiles differ: CCaaS recordings (Genesys, NICE, Five9, Amazon Connect Contact Lens, Talkdesk) are governed by TCPA/PCI two-party-consent and contact-center retention policy and feed interaction_evaluations; sales-call recordings (the SALES-ENG / conversation-intelligence surface, e.g. Gong, Chorus) are governed by sales-coaching retention and feed deal intelligence. Keep-both with a documented split is recommended; merging would force one lifecycle/regulation profile onto two genuinely different recording markets. Interacts with B2-CONV-INTEL-RELATIONSHIP."

  - id: B2-CONV-INTEL-RELATIONSHIP
    summary: Position Conversation Intelligence (Gong, Chorus) relative to CCAAS recordings/QM.
    question: "Is Conversation Intelligence (a) a downstream consumer of CCAAS recordings, (b) a separate vendor surface that overlaps CCAAS quality management, or (c) a feature of SALES-ENG where call_recordings (122) lives?"
    options: [a-downstream-consumer, b-separate-domain, c-feature-of-sales-eng]
    why: "Gong and Chorus are pure-play revenue-intelligence vendors that ingest recordings and produce deal/coaching insight, distinct from the CCaaS QM market (Genesys/NICE/Verint/Calabrio score contact-center interactions against evaluation forms). That argues Conv-Intel is its own surface (b), consuming recordings from both CCAAS and SALES-ENG rather than being a CCAAS feature. Conv-Intel is already at mention_count=2 in _missing-domains.md. Resolution affects whether call_recordings (122) stays in SALES-ENG and whether ccaas_call_recordings absorbs it (B2-CALL-RECORDINGS-SPLIT)."

  - id: B2-H722-DEDUPE-DELETE
    summary: Approve the destructive dedupe DELETE of handoff 722's stale APQC tag.
    question: "Handoff 722 (KMS->CCAAS knowledge_base_article.updated) carries two agent_curated handoff_processes rows. DELETE id 238 (PCF 21679 'Deliver approved content') and keep id 753 (PCF 20898 'Maintain service support knowledge repository')? (yes/no)"
    options: [a-delete-238, b-keep-both]
    why: "A KMS knowledge-update event is a knowledge-repository maintenance activity, not a content-delivery activity; the 2026-05-30 audit confirmed PCF 20898 as correct and 21679 as the duplicate. DELETE is destructive, needs sign-off (Rule #1)."

  - id: B2-H743-746-RETAG
    summary: Confirm or revoke the two retag rows on the originally-deferred CONV-AI->CCAAS handoffs.
    question: "Handoffs 743 (conversation_flow.fallback_triggered, tagged PCF 10395 'Resolve customer problems') and 746 (bot_definition.published, tagged PCF 20824 'Deploy services/solutions') were originally deferred-to-Discover as having no clean PCF match. Keep both tags, delete both and let Discover author custom processes, or mixed?"
    options: [a-keep-both, b-delete-both, c-mixed]
    why: "Both auto-tags are generic and conflict with the original judgment that bot-fallback engineering and bot-runtime publication have no clean PCF cross-industry match. DELETE is destructive, needs sign-off (Rule #1)."
  - id: B2-B9D-OWN-195
    summary: "Contact Center as a Service: name an owner for \"Plan and manage customer service workforce\" (no one is responsible for it today)"
    question: |
      Contact-center queue statistics feed workforce planning, but no one in the contact center is assigned to plan and manage the customer-service workforce. Who should own it?
    options:
      - "The Contact Center Operations Manager runs it and approves it."
      - "The Quality Analyst (or a workforce/real-time analyst you name) runs it and the Operations Manager approves."
      - "Leave it unassigned for now."
    why: |
      Capacity planning off queue volumes is the operations-manager job at every flagship contact center (Genesys, NICE, Five9): the person accountable for service levels owns the staffing plan. No process_raci is authored yet, so this names the first owner rather than mirroring an existing one. Surfaced as q-CCAAS.md q12.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-922
    summary: "Contact Center as a Service: name an owner for \"Schedule customer service workforce\" (no one is responsible for it today)"
    question: |
      Agent-state signals feed workforce scheduling, but no one in the contact center is assigned to schedule the customer-service workforce. Who should own it?
    options:
      - "The Contact Center Operations Manager runs it and approves it."
      - "The Contact Center Supervisor runs the day-to-day schedule and the Operations Manager approves."
      - "Leave it unassigned for now."
    why: |
      Shift scheduling and adherence sit with the operations manager (or a dedicated WFM/RTA analyst under them) across Genesys, NICE, and Five9; the supervisor consumes the schedule but does not own it. No process_raci is authored yet, so this names the first owner. Surfaced as q-CCAAS.md q13.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-928
    summary: "Contact Center as a Service: name an owner for \"Respond to customer problems, requests, and inquiries\" (no one is responsible for it today)"
    question: |
      Contact and support-session records flow out to the case and CRM systems, but no one in the contact center is assigned to respond to customer problems, requests, and inquiries. Who should own it?
    options:
      - "The Contact Center Agent runs it and the Contact Center Supervisor approves."
      - "The Contact Center Agent both runs and approves it."
      - "Leave it unassigned for now."
    why: |
      Handling inbound contacts is the front-line agent's core work everywhere (Genesys, NICE, Five9, Amazon Connect, Talkdesk), with the supervisor accountable for the queue and escalations. No process_raci is authored yet, so this names the first owner. Surfaced as q-CCAAS.md q14.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-934
    summary: "Contact Center as a Service: name an owner for \"Respond to customer complaints\" (no one is responsible for it today)"
    question: |
      Negative-sentiment and escalated support sessions flow out to the case system as complaints, but no one in the contact center is assigned to respond to customer complaints. Who should own it?
    options:
      - "The Contact Center Agent runs it and the Contact Center Supervisor approves."
      - "The Contact Center Supervisor both runs and approves it."
      - "Leave it unassigned for now."
    why: |
      Complaints are worked by the agent first and escalated to the supervisor, who is accountable for resolution and service recovery, mirroring how the flagship suites route negative-sentiment and escalation events. No process_raci is authored yet, so this names the first owner. Surfaced as q-CCAAS.md q15.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-RETAG-530
    summary: "Re-point handoff 530's coarse APQC tag (3.3.6 'Analyze and respond to customer insight') to the specific 6.2.2.4 'Respond to customer problems, requests, and inquiries'. DESTRUCTIVE re-point. Moot if B2-INTENT-IDENTIFIED-OWNERSHIP deletes handoff 530."
    question: |
      Handoff 530 (CCAAS->CRM, contact_records) is tagged with the broad process 3.3.6 "Analyze and respond to customer insight", but the same record already has a more specific match, 6.2.2.4 "Respond to customer problems, requests, and inquiries", on its sibling handoffs. Re-point handoff 530's tag from 3.3.6 to 6.2.2.4? (yes/no)
    options: [a-repoint, b-keep-3.3.6]
    why: |
      Contact-record capture/screen-pop on a CCAAS->CRM handoff is the same "respond to customer problems/requests/inquiries" activity already tagged on handoffs 225/501, not a customer-insight-analytics activity, so 6.2.2.4 is the tighter fit. Re-pointing edits the tag CCAAS authored (destructive), so it needs sign-off (Rule #1 / B9d RE-TAG). This is moot if you take option (a) of B2-INTENT-IDENTIFIED-OWNERSHIP (delete handoff 530); answer it only if 530 survives.
    extra_b9d_added: "2026-06-13"

