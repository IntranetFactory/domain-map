b2:
  - id: B2-MODULE-SHAPE
    summary: Pick the CCAAS module split shape; gates almost every b1b item.
    question: Which of the 2026-05-30 audit's four proposed shapes do you want? (a) 4 modules CCAAS-ROUTING-ENGINE / CCAAS-INTERACTION-CAPTURE / CCAAS-WORKFORCE-ENGAGEMENT / CCAAS-DIALER (audit recommendation), (b) 2 modules CCAAS-CORE + CCAAS-WEM, (c) 3 modules collapsing Dialer into Routing, (d) 5 modules splitting Speech Analytics out of WEM.
    options: [a, b, c, d]
    why: Capability authoring (B1B-A2), masters routing (B1B-COMPLIANCE-MASTERS, B1B-UNIVERSAL-MASTERS), skill re-derivation (B1B-F1-F2-LEGACY-SKILL), and lifecycle module FKs (B1B-B12-LIFECYCLE) all depend on the module codes.

  - id: B2-WEM-SCOPE
    summary: Decide whether WEM stays a CCAAS module or is promoted to its own domain.
    question: Should CCAAS-WORKFORCE-ENGAGEMENT be a CCAAS sub-module, or should WEM be promoted to a standalone domain (CCAAS-WEM is already queued in _missing-domains.md)?
    options: [sub-module, standalone-domain]
    why: Verint, Calabrio, NICE WEM, Genesys WEM are arguably point-solution vendors in their own right. Promoting WEM drops the CCAAS module count by one and frees the cleaner vendor surface to Calabrio + Verint.

  - id: B2-CONV-INTEL-RELATIONSHIP
    summary: Position Conversation Intelligence (Gong, Chorus, Refract) relative to CCAAS recordings.
    question: Is Conv-Intel (a) downstream consumer of CCAAS recordings, (b) a separate vendor surface that overlaps CCAAS QM, or (c) a feature of SALES-ENG where call_recordings id 122 currently lives?
    options: [downstream-consumer, separate-domain, feature-of-sales-eng]
    why: Affects whether call_recordings (id 122) moves out of SALES-ENG and whether ccaas_call_recordings (id 735) absorbs it. Conv-Intel was already promoted to mention_count=2 in _missing-domains.md by the PA audit.

  - id: B2-CALL-RECORDINGS-SPLIT
    summary: Confirm or merge the two call-recording masters in the catalog.
    question: Keep both call_recordings (id 122, SALES-ENG-owned, rep recordings) and ccaas_call_recordings (id 735, CCAAS-owned, contact-center recordings), or merge under a canonical-bare-word claim?
    options: [keep-both, merge-canonical]
    why: Lifecycle, regulation, retention, redaction profiles differ between the two. Audit recommendation is keep-both with documented split.

  - id: B2-CONTACT-RECORDS-CRM-CONSUMER
    summary: Verify whether CRM-ACCT-MGT (module 46) genuinely consumes contact_records (id 257) or this is a leftover from the pre-modular era.
    question: Should CRM-ACCT-MGT consume contact_records (id 257) or crm_contacts (id 98) on handoffs 501 / 530?
    options: [keep-contact-records, switch-to-crm-contacts]
    why: B5 boundary check. The CRM team would more naturally read "Contact" as crm_contacts; the current consumer may be incorrect.

  - id: B2-NAMING-ARBITRATION
    summary: Per Rule #9, decide per master whether to prefix to ccaas_<name> or claim canonical bare-word with rationale.
    question: For each of support_sessions, contact_records, queue_statistics, agent_states, disposition_codes - prefix (default), claim canonical, or rename / abort?
    options: [prefix-all, claim-canonical-per-row, mixed]
    why: Bare-word names collide with potential CSM / CRM / WFM / CONV-AI / ATS entities. Renaming after Phase B is more invasive.

  - id: B2-INTENT-IDENTIFIED-OWNERSHIP
    summary: Decide who publishes the intent.identified event (handoff 530).
    question: (a) DELETE handoff 530 and let CONV-AI author the equivalent outbound, or (b) PATCH trigger_event 200 to data_object_id 257 if CCAAS genuinely publishes this?
    options: [reassign-to-conv-ai, patch-trigger-event]
    why: Mis-attribution per B5 / B10b. Audit recommends (a). Resolving this unblocks B1B-B1-INTENT-IDENTIFIED-SOURCING.

  - id: B2-H722-DEDUPE-DELETE
    summary: Approve the destructive dedupe DELETE on handoff 722's stale APQC tag (was B1A-H722-DEDUPE).
    question: DELETE handoff_processes id 238 (PCF 21679 Deliver approved content) on handoff 722, keeping id 753 (PCF 20898 Maintain service support knowledge repository)?
    options: [delete-238, keep-both]
    why: Two agent_curated tags on one handoff; the 2026-05-30 audit confirmed PCF 20898 as the correct mapping and 21679 as the duplicate. DELETE is destructive, needs sign-off.

  - id: B2-H743-746-RETAG
    summary: Confirm or revoke the two retag rows on the originally-deferred CONV-AI->CCAAS handoffs (was B1A-H743 / B1A-H746).
    question: Keep handoff_processes id 810 (743 -> PCF 10395) and id 812 (746 -> PCF 20824), or DELETE them and let Discover Pass 3 author custom processes?
    options: [keep-both, delete-both, mixed]
    why: Both were deferred-to-Discover in the original audit as having no clean PCF cross-industry match; the later auto-tags are generic and conflict with that judgment. DELETE is destructive, needs sign-off.

