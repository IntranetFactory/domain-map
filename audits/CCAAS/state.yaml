b3:
  - id: B3-AGENT-SKILL-ASSIGNMENTS
    candidate: agent_skill_assignments
    rationale: "Junction of users x agent skills (skill + proficiency), the input routing strategies use to pick the best-fit agent. First-class across the flagship vendor set; absent from the CCAAS footprint. Additive; vet via Phase 0 before loading."
    vendor_evidence:
      - {vendor: Genesys Cloud CX, evidence: 1st_class}
      - {vendor: NICE CXone, evidence: 1st_class}
      - {vendor: Five9, evidence: 1st_class}
      - {vendor: Talkdesk, evidence: 1st_class}
      - {vendor: Amazon Connect, evidence: 1st_class}
    proposed_module: CCAAS-ROUTING

  - id: B3-CALLBACK-REQUESTS
    candidate: callback_requests
    rationale: "Customer-initiated 'call me back' with a queued slot; distinct from contact_records (a callback is a queued intent, not yet a captured interaction). Universal across the flagship vendors. Additive."
    vendor_evidence:
      - {vendor: Genesys Cloud CX, evidence: 1st_class}
      - {vendor: NICE CXone, evidence: 1st_class}
      - {vendor: Five9, evidence: 1st_class}
      - {vendor: Talkdesk, evidence: 1st_class}
      - {vendor: Amazon Connect, evidence: 1st_class}
    proposed_module: CCAAS-ROUTING

  - id: B3-WRAP-UP-REASONS
    candidate: wrap_up_reasons
    rationale: "After-call-work classification (agent's reason for time off-queue) distinct from disposition_codes (the call outcome). Present across the flagship set as wrap-up codes / ACW reasons. Additive."
    vendor_evidence:
      - {vendor: Genesys Cloud CX, evidence: 1st_class}
      - {vendor: NICE CXone, evidence: 1st_class}
      - {vendor: Five9, evidence: 1st_class}
      - {vendor: Talkdesk, evidence: 1st_class}
      - {vendor: Amazon Connect, evidence: secondary}
    proposed_module: CCAAS-DESKTOP

  - id: B3-OUTBOUND-CAMPAIGNS
    candidate: outbound_campaigns
    rationale: "Predictive/preview/progressive dialer campaign definitions with contact lists and pacing. Central if a Dialer/Outbound module is adopted (B2-MODULE-SPLIT option b). Five9 leads with outbound; Genesys/NICE sell it as a named add-on. Additive; structurally interacts with the module-split decision."
    vendor_evidence:
      - {vendor: Five9, evidence: 1st_class}
      - {vendor: NICE CXone, evidence: 1st_class}
      - {vendor: Genesys Cloud CX, evidence: 1st_class}
    proposed_module: CCAAS-ROUTING

  - id: B3-AGENT-SCORECARDS
    candidate: agent_scorecards
    rationale: "Rolled-up QM aggregate per agent per period, distinct from per-interaction interaction_evaluations. First-class in the WEM vendor surface; relevant only if WEM stays in CCAAS (B2-WEM-SCOPE)."
    vendor_evidence:
      - {vendor: Verint Open Platform, evidence: 1st_class}
      - {vendor: Calabrio ONE, evidence: 1st_class}
      - {vendor: NICE CXone, evidence: 1st_class}
    proposed_module: CCAAS-QUALITY

  - id: B3-SPEECH-ANALYTICS-CATEGORIES
    candidate: speech_analytics_categories
    rationale: "Configurable keyword/phrase categorization driving interaction analytics and auto-scoring; distinct from interaction_evaluations. WEM-surface vendor evidence; relevant if WEM stays in CCAAS."
    vendor_evidence:
      - {vendor: Verint Open Platform, evidence: 1st_class}
      - {vendor: NICE CXone, evidence: 1st_class}
      - {vendor: Calabrio ONE, evidence: secondary}
    proposed_module: CCAAS-QUALITY

  - id: B3-IVR-LANGUAGES
    candidate: ivr_languages
    rationale: "Localized prompt sets per supported language as a first-class, versioned prompt-pack. Borderline config vs entity; the multi-locale lifecycle is what makes it master-shaped. Genesys and NICE expose it first-class."
    vendor_evidence:
      - {vendor: Genesys Cloud CX, evidence: 1st_class}
      - {vendor: NICE CXone, evidence: 1st_class}
    proposed_module: CCAAS-ROUTING
