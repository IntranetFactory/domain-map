b2:
  - id: B2-S1
    summary: SPM vs. SEM domain duplication decision; gates the SPM module shape and every Bucket 3 candidate.
    question: SPM (id 9) and SEM (id 166) overlap heavily. SPM has 0 modules; SEM has 3 (SEM-STRATEGY-DEFINITION, SEM-EXECUTION-TRACKING, SEM-OPERATING-RHYTHM). Single shared capability SEM-PORTFOLIO-ALIGN dual-linked. strategic_initiatives (274) lifecycle states all owned by SEM module 106. Flagship vendors and Gartner Magic Quadrant cover both surfaces as one product / one market. Which catalog shape captures SPM?
    options:
      - "(a) merge SPM into SEM, retire SPM domain row, land the 9 legacy-rollup SPM masters in new SEM modules"
      - "(b) merge SEM into SPM, SPM is canonical, SEM's 3 modules re-host on SPM"
      - "(c) keep split with clear boundary: SPM owns planning / investment / scenario / capacity surface (8 unique masters), SEM owns execution / OKR / operating-rhythm surface, strategic_initiatives stays mastered by SEM and SPM consumes; finish SPM module shape per B1B-S1 recommended-default (SPM-PORTFOLIO-PLANNING + SPM-RESOURCE-CAPACITY)"
    why: Editorial / architectural; depends on platform-vs-silos thinking. Catalog evidence supports (c) most cleanly because SPM has 8 unique masters SEM does not, but vendor evidence is mixed (single Gartner MQ, single flagship product per vendor covering both).

  - id: B2-S2
    summary: B4 pattern flag positive re-evaluation per Rule #12; per-flag yes / no answers from user.
    question: Which of the following pattern-flag candidates should flip from false to true?
    options:
      - "business_value_assessments.has_submit_lock (freeze on publish so dependents can rely on it)"
      - "business_value_assessments.has_single_approver (PMO / sponsor approval gate)"
      - "scenario_plans.has_submit_lock (freeze on evaluation for downstream what-if comparisons)"
      - "demand_intake_requests.has_single_approver (intake-board approval)"
      - "resource_allocations.has_single_approver (resource committee approval)"
      - "strategic_initiatives.has_single_approver (executive sponsor; pending B2-S1 because SEM may own this master)"
    why: Pattern flags are workflow-shape judgments the user owns. Per Rule #15 the consideration record stays in the audit conversation, never in data_objects.notes.

  - id: B2-S3
    summary: dependency_chains (280) config-shape exemption per Rule #12.
    question: Should dependency_chains (280) take the config-shape exemption (no lifecycle state machine) or carry a workflow state machine?
    options:
      - "(a) confirm config-shape, skip lifecycle authoring; track via record_status alone"
      - "(b) author small state machine (e.g. identified / acknowledged / resolved)"
      - "(c) defer pending more flagship-vendor evidence"
    why: dependency_chains describes a network of inter-initiative dependencies typically refreshed on snapshot, not state-machined. Rule #15 forbids writing the config-shape note to data_objects.notes without explicit user-approved wording.

b3:
  - id: B3-PROGRAM-INCREMENTS
    candidate: program_increments
    rationale: SAFe / scaled-agile cadence rows grouping initiatives into 8-12 week delivery quanta. Often mastered separately from initiatives in scaled-agile-focused tools. B2-S1 changes module landing.
    vendor_evidence: [Jira Align, ServiceNow Strategic Portfolio Management]
    proposed_module: SPM-PORTFOLIO-PLANNING (pending B2-S1)

  - id: B3-OKR-OBJECTIVES-MASTERY
    candidate: okr_objectives
    rationale: Currently consumed at the legacy rollup layer (relationship row 1054 advanced_by). In flagship SPM tools OKRs are often a separate master with their own lifecycle. B2-S1 may move mastery between SPM and SEM.
    vendor_evidence: [Jira Align, ServiceNow Strategic Portfolio Management, Planview Portfolios]
    proposed_module: SPM-PORTFOLIO-PLANNING or SEM-OPERATING-RHYTHM (pending B2-S1)

  - id: B3-INVESTMENT-CATEGORIES
    candidate: investment_categories
    rationale: Buckets that aggregate initiatives by funding source, business unit, or strategic theme. Clarity investment hierarchy is its key conceptual model.
    vendor_evidence: [Clarity PPM, Apptio IT Planning Foundation]
    proposed_module: SPM-PORTFOLIO-PLANNING (pending B2-S1)

  - id: B3-CAPACITY-POOLS
    candidate: capacity_pools or resource_pools
    rationale: ServiceNow + Planview model resource pools as a separate master from individual allocations. Currently resource_allocations is the only resource master, missing the pool-level rollup.
    vendor_evidence: [ServiceNow Strategic Portfolio Management, Planview Portfolios]
    proposed_module: SPM-RESOURCE-CAPACITY (pending B2-S1)

  - id: B3-PORTFOLIO-FUNDING-DECISIONS
    candidate: portfolio_funding_decisions
    rationale: Decision logs separate from initiative lifecycle. Apptio + Clarity model decision events for audit-traceability (who approved what, when, with what business case). business_value_assessments carries the value side but not the decision side.
    vendor_evidence: [Apptio IT Planning Foundation, Clarity PPM]
    proposed_module: SPM-PORTFOLIO-PLANNING (pending B2-S1)

  - id: B3-APPROVAL-WORKFLOWS-CONSUMER
    candidate: approval_workflows
    rationale: Cross-cutting capability APPROVAL-WORKFLOW already in catalog. SPM should declare consumer linkage. ServiceNow's whole portfolio governance is approval-workflow-driven.
    vendor_evidence: [ServiceNow Strategic Portfolio Management]
    proposed_module: SPM-PORTFOLIO-PLANNING (pending B2-S1)

  - id: B3-PORTFOLIO-MILESTONES
    candidate: milestone_definitions or portfolio_milestones
    rationale: Cross-initiative milestones tied to portfolio rollups (releases, financial close, exec reviews).
    vendor_evidence: [Microsoft Project for the Web, Smartsheet]
    proposed_module: SPM-PORTFOLIO-PLANNING (pending B2-S1)

  - id: B3-RISK-REGISTERS
    candidate: risk_registers
    rationale: Initiative-level risk tracking. ServiceNow IRM integration with SPM, Clarity risk module. Currently absent from SPM's footprint; may belong in GRC and be consumed here.
    vendor_evidence: [ServiceNow Strategic Portfolio Management, Clarity PPM]
    proposed_module: SPM-PORTFOLIO-PLANNING as consumer of GRC master (pending B2-S1)

  - id: B3-VALUE-STREAMS-CONSUMER
    candidate: value_streams
    rationale: Master separate from dependency_chains. Jira Align + ServiceNow VSDP both model value streams as first-class entities for SAFe portfolio mapping. SPM consumes from VSDP via handoffs but doesn't declare. VSDP is sibling domain (id 80) so the right shape is likely consumer not master.
