      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Strategic Portfolio Management decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-SPM.md q4.
    extra_b9d_added: "2026-06-13"

