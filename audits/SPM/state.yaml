b2:
  - id: B2-S1
    summary: SPM vs. SEM domain duplication decision; gates the SPM module shape and every Bucket 3 candidate.
    question: SPM (id 9) and SEM (id 166) overlap heavily. SPM has 0 modules; SEM has 3 (SEM-STRATEGY-DEFINITION, SEM-EXECUTION-TRACKING, SEM-OPERATING-RHYTHM). Single shared capability SEM-PORTFOLIO-ALIGN dual-linked. strategic_initiatives (274) lifecycle states all owned by SEM module 106. Flagship vendors and the Gartner Magic Quadrant cover both surfaces as one product / one market. Which catalog shape captures SPM?
    options:
      - "(a) merge SPM into SEM, retire SPM domain row, land the 9 legacy-rollup SPM masters in new SEM modules"
      - "(b) merge SEM into SPM, SPM is canonical, SEM's 3 modules re-host on SPM"
      - "(c) keep split with clear boundary: SPM owns planning / investment / scenario / capacity surface (8 unique masters), SEM owns execution / OKR / operating-rhythm surface, strategic_initiatives stays mastered by SEM and SPM consumes; finish SPM module shape per B1B-S1 recommended-default (SPM-PORTFOLIO-PLANNING + SPM-RESOURCE-CAPACITY)"
    why: Editorial / architectural; depends on platform-vs-silos thinking. Catalog evidence supports (c) most cleanly because SPM has 8 unique masters SEM does not, but vendor evidence is mixed (single Gartner MQ, single flagship product per vendor covering both).

  - id: B2-S2
    summary: B4 pattern flag positive re-evaluation per Rule #12; per-flag yes / no answers from user.
    question: Which of the following pattern-flag candidates should flip from false to true?
    options:
      - "business_value_assessments.has_submit_lock (freeze on publish so dependents can rely on it)"
      - "business_value_assessments.has_single_approver (PMO / sponsor approval gate)"
      - "scenario_plans.has_submit_lock (freeze on evaluation for downstream what-if comparisons)"
      - "demand_intake_requests.has_single_approver (intake-board approval)"
      - "resource_allocations.has_single_approver (resource committee approval)"
      - "strategic_initiatives.has_single_approver (executive sponsor; pending B2-S1 because SEM may own this master)"
    why: Pattern flags are workflow-shape judgments the user owns. Per Rule #15 the consideration record stays in the audit conversation, never in data_objects.notes.

  - id: B2-S3
    summary: dependency_chains (280) config-shape exemption per Rule #12. Gates the master's entity_type classification.
    question: Should dependency_chains (280) take the config-shape exemption (no lifecycle state machine) or carry a workflow state machine? The master's entity_type is intentionally LEFT 'unclassified' until this resolves, since the answer picks the entity_type value.
    options:
      - "(a) config-shape: PATCH entity_type=operational_record, skip lifecycle authoring; track via record_status alone"
      - "(b) workflow: PATCH entity_type=operational_workflow and author a small state machine (e.g. identified / acknowledged / resolved)"
      - "(c) defer pending more flagship-vendor evidence"
    why: dependency_chains describes a network of inter-initiative dependencies typically refreshed on snapshot, not state-machined. The entity_type value encodes the answer (operational_record vs operational_workflow), so classifying it now would pre-empt the decision. Rule #15 forbids writing the config-shape note to data_objects.notes.

  - id: B2-APQC-DELETE
    summary: 3 outbound substring-only handoff_processes rows are now superseded by precise agent_curated children; DELETE of the stale parents needs user sign-off (destructive).
    question: Three outbound handoffs carried discovery_substring handoff_processes rows that are now superseded by more precise agent_curated children inserted 2026-06-07. The substring parents are weak / wrong-fit. Should the stale parent rows be DELETED?
    options:
      - "DELETE handoff_processes id=130 (handoff 241 -> process 16, L2 substring) now superseded by 241 -> process 106 (Execute strategic initiatives, L3)"
      - "DELETE handoff_processes id=131 (handoff 245 -> process 16, L2 substring) now superseded by 245 -> process 107 (Review execution of strategic initiatives, L3)"
      - "DELETE handoff_processes id=132 (handoff 242 -> process 713 'Determine sales resource allocation', wrong-fit sales-bound) now superseded by 242 -> process 905 (Identify, select, and assign resources, L4)"
    why: DELETE is destructive; the agent never deletes unapproved. The additive precise children are already loaded (record_status=new), so the catalog is correct even before the deletes; the parents are just redundant clutter.

