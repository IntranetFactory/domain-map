schema_version: 2
domain: ITOM
status: feedback_needed
next_action_by: agent
last_audit: "2026-06-06"

b1a:
  - id: B1A-ROLE-MODULES
    summary: "Zero role_modules for ITOM; SKIPPED 2026-06-06 (action's persona-to-module mapping violates the 2-module floor; full Phase E needs reach + lifecycle wiring)."
    finding: >
      No role_modules rows bundle a persona against any ITOM module. With ITOM-INFRA-MON (267),
      ITOM-CAPACITY-PLAN (268), ITOM-OPS-AUTOMATION (269) live, routine ITOM personas can be
      bundled. SKIPPED on the 2026-06-06 b1a pass: the action's literal mapping pins each persona
      to a SINGLE module (NOC Engineer -> 267, SRE -> 267, Capacity Planner -> 268, Automation/Ops
      -> 269), which violates the hard 2-module floor (E2: every domain_roles persona needs >=2
      role_modules entries; a single-module persona is a permission tier, not a persona). Authoring
      valid personas requires deciding each persona's full multi-module reach (primary/secondary)
      plus process_raci responsibility and data_object_lifecycle_states.process_id wiring. ITOM has
      ZERO lifecycle states (B1B-S11, user_decision-blocked), so no gated process exists for R/A
      assignments to resolve against. This is a full Phase E authoring pass that needs judgment on
      reach topology and depends on lifecycle authoring that is user-decision-gated. Per the b1a
      contract (skip items needing judgment beyond their action text), deferred.
    action: >
      Author personas (domain_roles, function-scoped naming) with >=2-module role_modules reach
      each, then their process_raci assignments, once the persona reach topology is settled and the
      lifecycle state machines (B1B-S11) land to provide gated processes. Needs a Phase E judgment
      pass; not executable from the current action text without violating the 2-module floor.

b1b:
  - id: B1B-S3
    summary: "A4 catalog_tagline and catalog_description empty on ITOM domain row (M8 / A4 catalog UX)."
    finding: >
      domains.catalog_tagline and domains.catalog_description are both empty strings on ITOM
      (id 2). Per Rule #20, populating either field without explicit user-approved buyer-voice
      wording is forbidden. This is the domain-level catalog UX surface; with 3 modules now live
      the catalog listing is otherwise renderable.
    blocked_by:
      - {type: user_decision, ref: rule_20_user_approved_wording}

  - id: B1B-S2-RMM-ROLLUP
    summary: "Legacy domain_data_objects rollup still lists RMM (id 130) as master on monitoring_alerts (85) and monitoring_policies (86); RMM owes demotion (depends on B2-S1)."
    finding: >
      At the domain_module_data_objects (module-junction) layer the master pre-check is clean:
      ITOM masters 85 and 86 exactly once catalog-wide. But the legacy domain_data_objects rollup
      still carries RMM (id 130) role='master' rows on 85 and 86 alongside ITOM. RMM has zero
      domain_modules, so the conflict is rollup-only and does not affect the ITOM module set, but
      RMM owes a demotion (embedded_master or consumer) once B2-S1 sets ITOM canonical.
    blocked_by:
      - {type: user_decision, ref: B2-S1}
      - {type: domain_audit, blocking_domain: RMM, milestone: rollup_master_demotion}

  - id: B1B-S5
    summary: "B6 zero intra-domain master-master data_object_relationships; 5 edges still unauthored (verb/cardinality tuples not pre-specified)."
    finding: >
      No data_object_relationships rows exist where both ends are ITOM masters (84/85/86/87). Five
      implied edges per the 2026-05-30 B6 finding: monitoring_events spawns monitoring_alerts;
      monitoring_policies governs monitoring_events; monitoring_policies governs monitoring_alerts;
      capacity_records produces monitoring_events; monitoring_policies governs capacity_records.
      Out of modularization scope (creates relationships). The full (relationship_verb, inverse_verb,
      relationship_type, relationship_kind, is_required, owner_side) tuples need ratification before
      insert.
    blocked_by:
      - {type: user_decision, ref: relationship_tuple_ratification}

  - id: B1B-S7
    summary: "B8 zero outbound cross-domain mirror data_object_relationships for handoffs 28, 53, 620."
    finding: >
      The outbound handoffs each imply a cross-domain data_object_relationships mirror row; none
      exist. monitoring_events triggers service_incidents (handoff 28); monitoring_events feeds
      event_correlations (handoff 53, AIOPS-owned target); capacity_records informs an SPM master
      (handoff 620, target TBD). Out of modularization scope; verb / cardinality / owner_side not
      pre-specified.
    blocked_by:
      - {type: user_decision, ref: relationship_tuple_ratification}

  - id: B1B-S11
    summary: "B12 zero data_object_lifecycle_states across all 4 ITOM masters; state machines unauthored."
    finding: >
      monitoring_events, monitoring_alerts, monitoring_policies, capacity_records all carry 0 rows
      in data_object_lifecycle_states. Per Rule #12 every master+required data_object needs lifecycle
      states (none fit the config-shape exemption cleanly; monitoring_policies has a real
      activation/deprecation workflow). With modules now live, requires_permission=true states can
      anchor on the realizing module (policies -> 267, capacity -> 268). Out of modularization scope.
    blocked_by:
      - {type: user_decision, ref: lifecycle_state_machine_ratification}
    affected_masters:
      - {data_object_id: 84, name: monitoring_events, target_module_id: 267, workflow: ingest_correlate_resolve}
      - {data_object_id: 85, name: monitoring_alerts, target_module_id: 267, workflow: open_ack_suppress_resolve_close}
      - {data_object_id: 86, name: monitoring_policies, target_module_id: 267, workflow: draft_review_activate_deprecate}
      - {data_object_id: 87, name: capacity_records, target_module_id: 268, workflow: collect_baseline_forecast_archive}

  - id: B1B-S15
    summary: "B9 missing state-change trigger_events for policy/alert/capacity lifecycle; subsumed under B1B-S11."
    finding: >
      Missing trigger_events for monitoring_policy.activated, monitoring_policy.deprecated,
      monitoring_alert.acknowledged, monitoring_alert.resolved, capacity_record.forecast_published.
      Each pairs with a lifecycle state and event_category derivation.
    blocked_by:
      - {type: depends_on, ref: B1B-S11, reason: events_subsume_under_lifecycle_authoring}

b2:
  - id: B2-S1
    summary: "M7 catalog rollup conflict: ITOM and RMM both master monitoring_alerts (85) and monitoring_policies (86) in legacy domain_data_objects; pick canonical owner."
    question: >
      Both ITOM (id 2) and RMM (id 130) have role='master' rows in legacy domain_data_objects for
      data_object 85 (monitoring_alerts) and 86 (monitoring_policies). At the module-junction layer
      ITOM now masters both cleanly (single master each catalog-wide); the rollup-level duplication
      remains. RMM has zero domain_modules. Who is canonical?
    options:
      - "(a) ITOM canonical, RMM demotes both rollup rows to embedded_master"
      - "(b) ITOM canonical, RMM demotes both rollup rows to consumer"
      - "(c) Split into ITOM-mastered general monitoring + RMM-mastered rmm_monitoring_alerts / rmm_monitoring_policies distinct shapes"
    why: >
      ITOM is the broader market, but RMM as a distinct point-solution market may want its own
      monitoring shapes long-term; the decision affects every future RMM audit and the rollup M7
      cleanup. The ITOM module set does not depend on this.

  - id: B2-S2
    summary: "B4 pattern-flag re-evaluation per master."
    question: >
      All three pattern flags (has_personal_content, has_submit_lock, has_single_approver) are false
      by default on all 4 ITOM masters. Plausible: monitoring_policies has_submit_lock=true (version
      commits immutable after activation); monitoring_alerts has_single_approver=false
      (machine-generated); capacity_records has_personal_content=false. Per-master decision?
    options:
      - "Per master, set each flag true/false per the audit analysis"
      - "Defer until lifecycle states (B1B-S11) land and re-evaluate"
    why: "Pattern flags interact with lifecycle authoring (Rule #12) but are independent of modules."

  - id: B2-S3
    summary: "OBS handoff 54 trigger 6 data_object_id re-anchor question."
    question: >
      Handoff 54 (OBS -> ITOM, monitoring_alert.threshold_breached) carries ITOM-mastered payload
      monitoring_alerts (id 85). Structurally odd: OBS is observability-platform; the threshold breach
      happens in OBS but the payload entity is ITOM's. Should trigger 6 re-anchor on an OBS-mastered
      entity instead?
    options:
      - "(a) Leave as-is (OBS publishes into ITOM's alert master)"
      - "(b) Add obs_alerts / observability_alerts to OBS and re-anchor trigger 6"
      - "(c) Define OBS-published triggers as inbound-events on ITOM masters by exception"
    why: "Boundary question between OBS and ITOM data ownership; routes to OBS audit."

  - id: B2-S3a
    summary: "Trigger 78 data_object_id re-anchor to an AIOPS master (Continuation defer)."
    question: >
      Trigger 78 (monitoring_event.suppression_applied) was renamed during the 2026-05-31
      Continuation but still has data_object_id=84 (ITOM monitoring_events). Per Pass 4 AIOPS,
      AIOPS owns the suppression logic; ITOM consumes the decision. Which AIOPS master should anchor
      this trigger?
    options:
      - "(a) Re-anchor to alert_suppression_rules (data_object_id 722)"
      - "(b) Leave on monitoring_events with a kind note that the event is AIOPS-published"
      - "(c) Defer until AIOPS audit produces its suppression entity decision"
    why: "Cross-domain ownership question; resolution affects handoff 59 payload mapping."

  - id: B2-S4
    summary: "event_correlation_rules vs AIOPS correlation_rules; distinct or single?"
    question: >
      ITOM event-management vendors ship author-time correlation rules; AIOPS's Bucket 3 candidate
      is correlation_rules (ML-driven). Are these distinct entities or two names for one concept?
    options:
      - "(a) Distinct: ITOM-mastered event_correlation_rules (deterministic) + AIOPS-mastered correlation_rules (ML)"
      - "(b) Single AIOPS-mastered correlation_rules consumed by ITOM as embedded_master"
      - "(c) Single ITOM-mastered event_correlation_rules consumed by AIOPS"
    why: "Concept overlap with AIOPS; routes via AIOPS Bucket 3."

  - id: B2-S5
    summary: "Promote ITPA + WORKLOAD-AUTO from candidate domains, or keep as ITOM-OPS-AUTOMATION (269)?"
    question: >
      ITOM-RUNBOOK (capability 228) and ITOM-JOB-SCHED (capability 226) are point-solution markets in
      their own right (Rundeck, Resolve, Stonebranch for runbook; Control-M, AutoSys, Stonebranch UAC
      for workload-auto). The 2026-06-02 modularization grouped both into ITOM-OPS-AUTOMATION (269)
      pending this decision. Rule #2 favors splitting them out. Promote both, one, or neither?
    options:
      - "(a) Promote both ITPA + WORKLOAD-AUTO; migrate capabilities 228 + 226 out and retire module 269"
      - "(b) Keep both as ITOM capabilities in ITOM-OPS-AUTOMATION (269) (optionally split 269 into two modules)"
      - "(c) Promote one (ITPA from 228), keep the other (226 stays as an ITOM-JOB-SCHED module)"
    why: >
      Decision changes the ITOM module count and whether module 269 survives. Module 269 currently has
      no domain-owned master (its data_object is an embedded_master reference to monitoring_alerts);
      the runbook_definitions / job_definitions masters are unverified Bucket 3 candidates (B3-S1, B3-S2).

  - id: B2-S6
    summary: "Ratify the 6 handoff PCF mappings the Continuation applied that diverge from the audit table."
    question: >
      The 2026-05-31 Continuation tagged 605, 619, 673, 681, 755, 761 with PCF 20909 (Manage
      infrastructure performance and capacity) rather than the audit-table-proposed 20906 (Operate and
      monitor online systems) or 20881 (Plan operational activities). Approve as-is, swap, or split?
    options:
      - "(a) Approve all 6 on PCF 20909 as-applied"
      - "(b) Swap subset back to 20906 / 20881 per the original audit-table proposal"
      - "(c) Split per-handoff with a custom mapping table"
    why: "Affects the Bucket-1 H1 approval path (handoff_processes record_status)."

  - id: B2-S7-APQC-APPROVAL
    summary: "H1: 13/13 ITOM handoffs tagged but 0 handoff_processes rows at record_status='approved'; user review."
    question: >
      All 13 cross-domain handoffs touching ITOM carry handoff_processes rows, but all sit at
      record_status='new' (catalog-quality approved count = 0). Approve the PCF assignments?
    options:
      - "(a) Approve all 13 as-tagged"
      - "(b) Approve a named subset; leave the rest at new pending B2-S6 PCF ratification"
      - "(c) Defer entirely until B2-S6 resolves the divergent mappings"
    why: "Rule #1 requires explicit user confirmation before PATCH record_status='approved'."

b3:
  - id: B3-S1
    summary: "Verify runbook_definitions as a distinct ITOM-mastered entity for ITOM-OPS-AUTOMATION (269) if ITOM-RUNBOOK stays in ITOM."
    candidate: runbook_definitions
    rationale: >
      If B2-S5 keeps ITOM-RUNBOOK in ITOM, runbook_definitions becomes the natural domain-owned
      master for module 269 (which currently holds only an embedded_master reference to
      monitoring_alerts). Verify the shape against Rundeck OSS, BMC TrueSight Orchestration,
      ServiceNow Runbook.
    vendor_evidence:
      - Rundeck
      - BMC TrueSight Orchestration
      - ServiceNow Runbook
    proposed_module: ITOM-OPS-AUTOMATION

  - id: B3-S2
    summary: "Verify job_definitions as a distinct ITOM-mastered entity for ITOM-OPS-AUTOMATION (269) if ITOM-JOB-SCHED stays in ITOM."
    candidate: job_definitions
    rationale: >
      If B2-S5 keeps ITOM-JOB-SCHED in ITOM, job_definitions becomes a candidate master for module
      269. Verify against BMC Control-M Definition Language docs, AutoSys JIL schema, Stonebranch UAC.
    vendor_evidence:
      - BMC Control-M
      - AutoSys
      - Tidal
      - Stonebranch UAC
    proposed_module: ITOM-OPS-AUTOMATION

  - id: B3-S3
    summary: "ml_baselines as a distinct master, distinct from AIOPS anomaly_detections."
    candidate: ml_baselines
    rationale: >
      ServiceNow Cloud Insights baselines, Datadog Forecasts baselines, BMC TrueSight Capacity
      Optimization treat statistical baselines as first-class. May collapse into ITOM-CAPACITY-PLAN
      or AIOPS depending on vendor verification.
    vendor_evidence:
      - ServiceNow Cloud Insights
      - Datadog Forecasts
      - BMC TrueSight Capacity Optimization
    proposed_module: ITOM-CAPACITY-PLAN

  - id: B3-S4
    summary: "Reverse-direction ITSM -> ITOM handoff (incident.resolved -> auto-resolve monitoring_alerts)."
    candidate: incident_resolved_auto_close_handoff
    rationale: >
      ServiceNow ITSM and BMC Helix support policy-based auto-close of monitoring alerts on incident
      resolution. Verify whether vendors model this as publish-subscribe handoff or as an internal
      rule on the alert.
    vendor_evidence:
      - ServiceNow ITSM
      - BMC Helix Policy
    proposed_module: ITOM-INFRA-MON

  - id: B3-S5
    summary: "infra_health_scores as a first-class master vs derived view."
    candidate: infra_health_scores
    rationale: >
      ServiceNow Cloud Insights surfaces health rollups, BMC Helix scoreCard, Dynatrace severity.
      Verify whether the market consistently surfaces this as a master (vendors compute it
      differently); may stay as a derived view rather than a master.
    vendor_evidence:
      - ServiceNow Cloud Insights
      - BMC Helix scoreCard
      - Dynatrace severity
    proposed_module: ITOM-INFRA-MON

  - id: B3-MISSING-ENTITIES
    summary: "Vendor-surface MISSING entities not yet created: metric_collectors, alert_routing_rules, capacity_forecasts (was B1A-S17)."
    candidate: "metric_collectors, alert_routing_rules, capacity_forecasts"
    rationale: >
      2026-05-30 Pass 2 market-surface diff identified these as load-now vendor-standard entities:
      metric_collectors (telegraf / SNMP / WMI pull-side collectors), alert_routing_rules (alert ->
      recipient -> channel routing logic distinct from monitoring_policies), capacity_forecasts
      (first-class forecast records distinct from individual capacity_records datapoints). Not created
      on the modularization pass (reuse-only scope). Once created, attach metric_collectors +
      alert_routing_rules to ITOM-INFRA-MON (267), capacity_forecasts to ITOM-CAPACITY-PLAN (268).
    vendor_evidence:
      - Datadog Infrastructure Monitoring
      - ServiceNow Cloud Insights
      - BMC TrueSight Capacity Optimization
    proposed_module: "ITOM-INFRA-MON / ITOM-CAPACITY-PLAN"
