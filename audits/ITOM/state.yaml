b1a:
  - id: B1A-S2
    summary: A3 vendor solutions thin (1 of >=3); load 4 additional vendor solution_domains rows.
    finding: |
      `solution_domains` for ITOM (id 2) holds only 1 row (ServiceNow IT Operations Management, primary).
      The Phase-A floor is >=3 solutions with >=1 primary. Vendor surface easily supports 4 more
      flagship solutions per the 2026-05-30 audit's Pass 2 matrix.
    action: |
      Author `solutions` rows (if missing) and `solution_domains` rows for: BMC Helix Operations
      Management, OpenText Operations Bridge, IBM Instana Infrastructure, Datadog Infrastructure
      Monitoring. Coverage_level per vendor (primary/secondary), via an idempotent TypeScript+Bun
      loader in `.tmp_deploy/`.
    vendor_evidence:
      - BMC Helix Operations Management
      - OpenText Operations Bridge
      - IBM Instana Infrastructure
      - Datadog Infrastructure Monitoring

  - id: B1A-S5
    summary: B6 zero intra-domain master-master `data_object_relationships`; author 5 edges.
    finding: |
      No `data_object_relationships` rows exist where both ends are ITOM masters (84/85/86/87).
      Five implied edges are missing per the 2026-05-30 audit B6 finding.
    action: |
      Author 5 rows in `data_object_relationships`: monitoring_events spawns monitoring_alerts;
      monitoring_policies governs monitoring_events; monitoring_policies governs monitoring_alerts;
      capacity_records produces monitoring_events; monitoring_policies governs capacity_records.
      Each row needs the full (relationship_verb, inverse_verb, relationship_type, relationship_kind,
      is_required, owner_side) tuple. Surface proposed tuples to the user for ratification before
      insert (Rule #1, AI-derived research stays `record_status='new'`).
    affected_masters:
      - {data_object_id: 84, name: monitoring_events, target_module_id: null, workflow: events}
      - {data_object_id: 85, name: monitoring_alerts, target_module_id: null, workflow: alerts}
      - {data_object_id: 86, name: monitoring_policies, target_module_id: null, workflow: policies}
      - {data_object_id: 87, name: capacity_records, target_module_id: null, workflow: capacity}

  - id: B1A-S7
    summary: B8 zero outbound cross-domain mirror `data_object_relationships`; author 3 edges.
    finding: |
      The 4 outbound handoffs each imply a cross-domain `data_object_relationships` mirror row;
      none exist. Handoff 619 (capacity_record self-payload) folds into B1A-S5; the remaining
      three need outbound mirror rows.
    action: |
      Author 3 cross-domain `data_object_relationships` rows: monitoring_events triggers
      service_incidents (mirror of handoff 28); monitoring_events feeds event_correlations
      (handoff 53, AIOPS-owned target); capacity_records informs <SPM master> (handoff 620,
      SPM-owned target, exact related_data_object_id TBD). Surface proposed tuples and the SPM
      target to the user.
    affected_handoffs:
      - {handoff_id: 28, direction: outbound, source_domain: ITOM, target_domain: ITSM, trigger_event: monitoring_event.alert_triggered, payload: service_incidents, null_field: data_object_relationships_mirror}
      - {handoff_id: 53, direction: outbound, source_domain: ITOM, target_domain: AIOPS, trigger_event: events.burst_detected, payload: event_correlations, null_field: data_object_relationships_mirror}
      - {handoff_id: 620, direction: outbound, source_domain: ITOM, target_domain: SPM, trigger_event: capacity_record.forecast_exhaustion, payload: capacity_records, null_field: data_object_relationships_mirror}

  - id: B1A-S11
    summary: B12 zero `data_object_lifecycle_states` across all 4 ITOM masters; author state machines.
    finding: |
      monitoring_events, monitoring_alerts, monitoring_policies, capacity_records all carry 0 rows
      in `data_object_lifecycle_states`. Per Rule #12, every master+required data_object needs
      either lifecycle states or the config-shape exemption (surfaced to user). None of the four
      cleanly fit the config-shape exemption; monitoring_policies has a true workflow with
      activation/deprecation gates.
    action: |
      Surface the proposed state machines to the user for ratification, then author. Initial
      shapes: monitoring_events: ingested -> correlated -> resolved (terminal); monitoring_alerts:
      open -> acknowledged -> suppressed|resolved (terminal) -> closed (terminal);
      monitoring_policies: draft (initial) -> reviewed -> activated (requires_permission=true) ->
      deprecated (terminal); capacity_records: collected (initial) -> baseline_established ->
      forecast_published -> archived (terminal). `requires_permission=true` rows derive
      `<module>:<verb>_<entity>` permissions per Rule #14, so the realizing module must be set per
      M5 (blocked-by extension: where the realizing module is NULL we fall back to "always
      reachable when master is installed", but for ITOM all such permissions ultimately gate on
      B1A-S4 module bring-up).
    affected_masters:
      - {data_object_id: 84, name: monitoring_events, target_module_id: null, workflow: ingest_correlate_resolve}
      - {data_object_id: 85, name: monitoring_alerts, target_module_id: null, workflow: open_ack_suppress_resolve_close}
      - {data_object_id: 86, name: monitoring_policies, target_module_id: null, workflow: draft_review_activate_deprecate}
      - {data_object_id: 87, name: capacity_records, target_module_id: null, workflow: collect_baseline_forecast_archive}

