b2:
  - id: B2-S1
    summary: M7 catalog conflict, ITOM and RMM both `master` on monitoring_alerts (85) and monitoring_policies (86); pick canonical owner.
    question: |
      Both ITOM (id 2) and RMM (id 130) have `role='master'` rows in `domain_data_objects` for
      data_object 85 (monitoring_alerts) and 86 (monitoring_policies). Two masters per
      data_object catalog-wide breaks the deployer / blueprint emitter. RMM has zero
      `domain_modules` rows of its own, so the conflict is at the legacy rollup layer. Who is
      canonical?
    options:
      - "(a) ITOM canonical, RMM demotes both rows to `embedded_master`"
      - "(b) ITOM canonical, RMM demotes both rows to `consumer`"
      - "(c) Split into ITOM-mastered general monitoring + RMM-mastered `rmm_monitoring_alerts` / `rmm_monitoring_policies` distinct shapes"
    why: |
      ITOM is the broader market, but RMM as a distinct point-solution market may want its own
      monitoring shapes long-term; the decision affects every future RMM audit and the M7 hard
      fail propagation.

  - id: B2-S2
    summary: B4 pattern-flag re-evaluation per master.
    question: |
      All three pattern flags (has_personal_content, has_submit_lock, has_single_approver) are
      `false` by default on all 4 ITOM masters. Per Rule #12 the flags need positive evaluation.
      Plausible: monitoring_policies has_submit_lock=true (version commits immutable after
      activation); monitoring_alerts has_single_approver=false (machine-generated); capacity_records
      has_personal_content=false. Per-master decision?
    options:
      - "Per master, set each flag true/false per the audit's analysis"
      - "Defer until lifecycle states (B1A-S11) land and re-evaluate"
    why: |
      Pattern flags interact with lifecycle authoring (Rule #12); but they are independent of
      module bring-up.

  - id: B2-S3
    summary: OBS handoff 54 trigger 6 `data_object_id` re-anchor question.
    question: |
      Handoff 54 (OBS -> ITOM, `monitoring_alert.threshold_breached`) carries ITOM-mastered
      payload `monitoring_alerts` (id 85). Structurally odd: OBS is observability-platform; the
      threshold breach happens in OBS but the payload entity is ITOM's. Should trigger 6
      re-anchor on an OBS-mastered entity instead?
    options:
      - "(a) Leave as-is (OBS publishes into ITOM's alert master)"
      - "(b) Add `obs_alerts` / `observability_alerts` to OBS and re-anchor trigger 6"
      - "(c) Define OBS-published triggers as inbound-events on ITOM masters by exception"
    why: |
      Boundary question between OBS and ITOM data ownership; routes to OBS audit.

  - id: B2-S3a
    summary: Trigger 78 `data_object_id` re-anchor to an AIOPS master (Continuation defer).
    question: |
      Trigger 78 (`monitoring_event.suppression_applied`) was renamed during the 2026-05-31
      Continuation but still has `data_object_id=84` (ITOM monitoring_events). Per Pass 4 AIOPS
      Section 3, AIOPS owns the suppression logic; ITOM consumes the decision. Which AIOPS
      master should anchor this trigger?
    options:
      - "(a) Re-anchor to `alert_suppression_rules` (data_object_id 722)"
      - "(b) Leave on monitoring_events with a `kind` note that the event is AIOPS-published"
      - "(c) Defer until AIOPS audit produces its suppression entity decision"
    why: |
      Cross-domain ownership question; resolution affects handoff 59 payload mapping.

  - id: B2-S4
    summary: event_correlation_rules vs AIOPS correlation_rules; distinct or single?
    question: |
      ITOM event-management vendors ship author-time correlation rules; AIOPS's Bucket 3
      candidate is `correlation_rules` (ML-driven). Are these distinct entities or two names
      for the same concept?
    options:
      - "(a) Distinct: ITOM-mastered `event_correlation_rules` (deterministic) + AIOPS-mastered `correlation_rules` (ML)"
      - "(b) Single AIOPS-mastered `correlation_rules` consumed by ITOM as `embedded_master`"
      - "(c) Single ITOM-mastered `event_correlation_rules` consumed by AIOPS"
    why: |
      Concept overlap with AIOPS; routes via AIOPS Bucket 3.

  - id: B2-S5
    summary: Promote ITPA + WORKLOAD-AUTO from candidate domains, or keep as ITOM capabilities?
    question: |
      ITOM-RUNBOOK (capability 228) and ITOM-JOB-SCHED (capability 226) are point-solution
      markets in their own right (Rundeck, Resolve, Stonebranch for runbook; Control-M, AutoSys,
      Stonebranch UAC for workload-auto). Rule #2 favors splitting them out. Promote both, one,
      or neither?
    options:
      - "(a) Promote both ITPA + WORKLOAD-AUTO; migrate the 2 capabilities out"
      - "(b) Keep both as ITOM capabilities + modules (ITOM-RUNBOOK-AUTO + ITOM-JOB-SCHED)"
      - "(c) Promote one (ITPA), keep the other (workload-auto stays as ITOM-JOB-SCHED module)"
    why: |
      Decision changes B1B-S4 module count (3 if both promoted, 5 if both stay).

  - id: B2-S6
    summary: Ratify the 6 handoff PCF mappings the Continuation applied that diverge from the audit table.
    question: |
      The 2026-05-31 Continuation tagged 605, 619, 673, 681, 755, 761 with PCF 20909 (Manage
      infrastructure performance and capacity) rather than the audit-table-proposed 20906
      (Operate and monitor online systems) or 20881 (Plan operational activities). Approve as-is,
      swap to alternative, or split?
    options:
      - "(a) Approve all 6 on PCF 20909 as-applied"
      - "(b) Swap subset back to 20906 / 20881 per the original audit-table proposal"
      - "(c) Split per-handoff with a custom mapping table"
    why: |
      Affects the Bucket-1 H1 approval path (B1A-S16-APPROVAL).

