b2:
  - id: B2-S1
    summary: "Rule #15 notes-pollution on 7 data_objects (785, 786, 787, 788, 790, 793, 794): config-shape exemption commentary and pattern-flag context."
    question: "Were the existing notes on these 7 rows user-approved at load time, or auto-populated by an earlier loader?"
    options:
      - "User-approved at load time, leave in place."
      - "Auto-populated, PATCH all 7 rows' notes to empty string and log a Rule #15 incident in references/skill-changelog.md."
    why: "Rule #15 RESCINDED the prior license for config-shape and pattern-flag annotations in data_objects.notes. The audit cannot tell from live state whether the load-time approval happened."
    affected_entities:
      - inv_stock_items
      - inv_stock_locations
      - inv_stock_balances
      - inv_stock_movements
      - inv_cycle_counts
      - inv_reorder_rules
      - inv_kit_definitions
  - id: B2-S2
    summary: "B4 pattern-flag re-evaluation: candidate flips on stock_transfers, inventory_lots, serialized_units, serialized_units personal-content."
    question: "Should has_submit_lock be set true on inv_stock_transfers (lines immutable post-receipt), inv_inventory_lots (append-only after recall), and inv_serialized_units (immutable post-scrap)? Should has_personal_content be true on inv_serialized_units when warranty-customer registration captures PII?"
    options:
      - "Per-flag yes/no from user; agent loads only approved flips."
    why: "Pattern flags are workflow-shape judgments the user owns. Current state: 788 has_submit_lock=true, 790 has_submit_lock=true + has_single_approver=true, all other 8 masters all-false."
    affected_entities:
      - inv_stock_transfers
      - inv_inventory_lots
      - inv_serialized_units
  - id: B2-S3
    summary: "M5 advisory: all 7 requires_permission=true lifecycle states leave domain_module_id NULL."
    question: "Keep NULL (rely on permission materialization to prefix by master module), or pin per-state to the realizing module?"
    options:
      - "Leave NULL, trust materialization."
      - "PATCH domain_module_id per-state."
    why: "Permission-scope intent the user owns. INV masters live in INV-CORE-STOCK and INV-REPLENISHMENT; NULL means workflow-gate permissions auto-prefix with the master's owning module."
    affected_masters:
      - {data_object_id: 788, name: inv_stock_movements, target_module_id: 61, workflow: "posted/reversed gates"}
      - {data_object_id: 789, name: inv_stock_transfers, target_module_id: 61, workflow: "approved/reconciled gates"}
      - {data_object_id: 790, name: inv_cycle_counts, target_module_id: 61, workflow: "variance_review gate"}
      - {data_object_id: 791, name: inv_inventory_lots, target_module_id: 61, workflow: "recalled gate"}
      - {data_object_id: 792, name: inv_serialized_units, target_module_id: 61, workflow: "scrapped gate"}
  - id: B2-S4
    summary: "E4 permission-bundle drift: 7 workflow-gate permissions implied by lifecycle states are not enumerated on any role."
    question: "Is the implicit-grant pattern (rely on permission_hierarchy to expand :manage and :admin tiers to gate permissions) intentional, or should specific gates be enumerated on specific roles?"
    options:
      - "Confirm hierarchy expands gates, leave 3 role bundles as-is (7 role_permissions total)."
      - "Add explicit gate grants (e.g., approve_cycle_count_variance on FINANCE-INVENTORY-ACCOUNTANT, reorder gates on SUPPLY-CHAIN-INVENTORY-PLANNER)."
      - "Drift accepted, full hierarchy materialization expected by the deployer."
    why: "Permission hierarchy seeding state isn't introspected by the structural audit; the user owns the bundling intent."
  - id: B2-S5
    summary: "B11 advisory: inv_stock_locations (786) has zero alias rows; the 9 other INV masters carry 2-4 aliases each."
    question: "Should the location master carry vendor synonyms (Warehouse, Branch, Site, DC, Hub, Bin, Zone) or stay self-explanatory?"
    options:
      - "Load 4-6 alias rows."
      - "Accept as self-explanatory; record exemption in this audit."
  - id: B2-S6
    summary: "M7 architectural choice for B1B-S1-M7: DELETE 4 sibling consumer rows vs PROMOTE to embedded_master for standalone deployability."
    question: "DELETE all 4, PROMOTE all 4 to embedded_master, or mixed (specify per row)?"
    options:
      - "DELETE all 4 sibling consumer rows (rows 251, 252, 258, 259); REPLENISHMENT and KITTING read items/balances by reference."
      - "PROMOTE all 4 to embedded_master so REPLENISHMENT and KITTING are standalone-deployable."
      - "Mixed: specify per row."
    why: "Default per audit procedure is DELETE; market shape (reorder_rules and kit_definitions plausibly need a local item/balance shell) suggests PROMOTE may be more market-aligned for INV than the CLM precedent."

b3:
  - id: B3-MISSING-DEMAND-FORECASTS
    candidate: inv_demand_forecasts
    rationale: "Cin7 Core, Brightpearl, Fulfil, NetSuite, MS Dynamics 365 BC ship lightweight forecast records distinct from full SCP demand forecasts (rolling 30/60/90-day item-level demand based on sales history, not a full MRP model). Currently the catalog folds forecasting into SCP (not yet a domain). For INV-MGMT's SMB-band scope the embedded forecast is the right surface."
    vendor_evidence:
      - {vendor: "Cin7 Core", evidence: 1st_class}
      - {vendor: "Brightpearl by Sage", evidence: 1st_class}
      - {vendor: "Fulfil", evidence: 1st_class}
      - {vendor: "Oracle NetSuite", evidence: 1st_class}
      - {vendor: "Microsoft Dynamics 365 Business Central", evidence: 1st_class}
    proposed_module: "INV-REPLENISHMENT or new INV-FORECASTING"
  - id: B3-MISSING-LANDED-COSTS
    candidate: inv_landed_costs
    rationale: "Cin7, Fishbowl, Unleashed, Finale, SOS Inventory model landed-cost records (freight + duty + insurance + handling) separately from the stock_movement cost layer. Landed cost flows into ASC 330 / IAS 2 inventory valuation."
    vendor_evidence:
      - {vendor: "Cin7 Core", evidence: 1st_class}
      - {vendor: "Fishbowl Inventory", evidence: 1st_class}
      - {vendor: "Unleashed Software", evidence: 1st_class}
      - {vendor: "Finale Inventory", evidence: 1st_class}
      - {vendor: "SOS Inventory", evidence: 1st_class}
    proposed_module: "INV-CORE-STOCK or new INV-COSTING"
  - id: B3-MISSING-CONSIGNMENT-STOCK
    candidate: inv_consignment_stock
    rationale: "NetSuite, Fishbowl, Brightpearl, Linnworks support consignment-in (supplier-owned stock on premise) and consignment-out (customer-held stock owned by us). No consignment ownership distinction on stock_items today."
    vendor_evidence:
      - {vendor: "Oracle NetSuite", evidence: 1st_class}
      - {vendor: "Fishbowl Inventory", evidence: 1st_class}
      - {vendor: "Brightpearl by Sage", evidence: 1st_class}
      - {vendor: "Linnworks", evidence: 1st_class}
    proposed_module: "INV-CORE-STOCK or extension column on stock_items"
  - id: B3-COMPLIANCE-CANDIDATES
    candidate: "domain_regulations: FDA 21 CFR Part 211, FSMA-204, DEA Schedule II-V, ASC 330 / IFRS IAS 2, Hazmat DOT Title 49"
    rationale: "Zero domain_regulations rows currently. INV-MGMT serves pharma SMBs (Part 211 lot tracking, segregation, expiry, recall); food vendors needing FSMA-204 lot-to-shipment traceability; controlled substances inventories needing DEA recordkeeping; every accounting-integrated solution declares ASC 330 / IAS 2 compliance; hazmat-bearing inventories needing DOT segregation and recordkeeping."
    vendor_evidence:
      - {vendor: "SOS Inventory", evidence: secondary}
      - {vendor: "Fishbowl Inventory", evidence: secondary}
      - {vendor: "Cin7 Core", evidence: secondary}
      - {vendor: "Oracle NetSuite", evidence: 1st_class}
      - {vendor: "Microsoft Dynamics 365 Business Central", evidence: 1st_class}
      - {vendor: "SAP Business One", evidence: 1st_class}
  - id: B3-MODULARIZATION-CANDIDATES
    candidate: "INV-FORECASTING split (4th full module) and INV-POS-STARTER (starter kit)"
    rationale: "If inv_demand_forecasts lands as master, a 4th module makes sense given forecast generation, accuracy tracking, and override approval are distinct from REPLENISHMENT's reorder-rule firing (pushes capability-to-module from 8-to-3 toward 8-to-4). INV-POS-STARTER is a module_kind='starter' for small retail with one location, no kitting, simple reorder, embedded shells from CORE-STOCK + REPLENISHMENT minus lot/serial/cycle-count complexity. Marketing-aligned with Sortly and inFlow entry-tier positioning."
    vendor_evidence:
      - {vendor: "Sortly", evidence: 1st_class}
      - {vendor: "inFlow Inventory", evidence: 1st_class}
  - id: B3-CANDIDATE-DOMAINS
    candidate: "WMS (Warehouse Management) and SCP (Supply Chain Planning) as new domain rows"
    rationale: "WMS pure-play warehouse execution layer (picking, packing, slotting, wave planning, RF/scanner workflows) is adjacent to INV-MGMT but not present in the catalog. SCP demand-forecasting / S&OP / MRP-light layer is also missing. Several INV handoffs would naturally route into WMS (pick.confirmed to inv_stock_movement post; receiving to goods_receipt) and SCP (forecast to reorder)."
    vendor_evidence:
      - {vendor: "Manhattan WMS", evidence: 1st_class}
      - {vendor: "Blue Yonder WMS", evidence: 1st_class}
      - {vendor: "Korber One Warehouse", evidence: 1st_class}
      - {vendor: "o9", evidence: 1st_class}
      - {vendor: "Kinaxis", evidence: 1st_class}
      - {vendor: "Anaplan SCP", evidence: 1st_class}
    extra_followup_target: "audits/_missing-domains.md"
