    finding: "Zero domain_modules rows for MFG-OPS (id 47). Rule #14 requires ≥1 full domain_modules row per domains row. Cure is the architectural decision in B2-MODULE-SPLIT (proposed 5-module set: MFG-OPS-SHOPFLOOR-EXECUTION, MFG-OPS-OEE-DOWNTIME, MFG-OPS-IN-LINE-QUALITY, MFG-OPS-FLOOR-CASE-MGMT, MFG-OPS-LOT-TRACEABILITY)."
