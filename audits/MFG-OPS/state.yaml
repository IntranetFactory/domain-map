  - id: B3-PRODUCTION-SCRAP-RECORDS
    candidate: production_scrap_records
    rationale: "Common (4 of 5 vendors). Materials lost or reworked, distinct from production_quality_inspections (the inspection) and produced_units (the unit)."
    vendor_evidence: [Plex, Siemens Opcenter, Dassault Apriso, GE Proficy]
    proposed_module: MFG-OPS-IN-LINE-QUALITY

  - id: B3-PRODUCTION-HOLDS
    candidate: production_holds
    rationale: "Common; lot / order quarantine state on quality finding. May be a lifecycle state on produced_units or production_orders rather than its own master — Phase 0 to decide."
