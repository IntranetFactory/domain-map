    action: "Author 5 intra-domain data_object_relationships rows with relationship_verb + inverse_verb + relationship_type (cardinality) + relationship_kind + is_required + owner_side. Use the cluster-drafts loader pattern."
    affected_masters:
      - {data_object_id: 595, name: production_orders, target_module_id: null, workflow: "Outbound verbs to work_instructions, produced_units, production_schedules"}
      - {data_object_id: 596, name: work_instructions, target_module_id: null, workflow: "Inbound from production_orders"}
      - {data_object_id: 597, name: production_schedules, target_module_id: null, workflow: "Inbound from production_orders"}
