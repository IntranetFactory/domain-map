  - id: B1A-S13
    summary: "Surface pattern-flag PATCH proposals to user: production_orders.has_single_approver=true and work_instructions.has_submit_lock=true (B4)."
    finding: "All 7 MFG-OPS masters carry the three pattern flags (has_personal_content / has_submit_lock / has_single_approver) at false. Rule #12 requires positive re-evaluation, not silent acceptance of defaults. Vendor evidence (Plex, Opcenter, Apriso) supports has_single_approver=true on production_orders (supervisor-gated release in regulated industries) and has_submit_lock=true on work_instructions (locked once released; revisions require re-approval). The other 5 masters stay false on review. Per Rule #15 the audit consideration is recorded here, not in data_objects.notes."
    action: "Surface to user: confirm PATCH on production_orders.has_single_approver=true (id 595) and work_instructions.has_submit_lock=true (id 596). On approval, two surgical PATCHes. Independent of module split."
    affected_masters:
      - {data_object_id: 595, name: production_orders, target_module_id: null, workflow: "has_single_approver=true proposed"}
      - {data_object_id: 596, name: work_instructions, target_module_id: null, workflow: "has_submit_lock=true proposed"}
    extra_band: B4
    extra_independent_of_module_split: true

