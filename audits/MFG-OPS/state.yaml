    proposed_module: MFG-OPS-IN-LINE-QUALITY

  - id: B3-PRODUCTION-ANDON-SIGNALS
    candidate: production_andon_signals
    rationale: "Common (Tulip, Plex). Andon-pull events that may or may not produce a shop_floor_case. May fold into shop_floor_cases as a state rather than its own master."
    vendor_evidence: [Tulip Frontline Operations, Plex]
    proposed_module: MFG-OPS-FLOOR-CASE-MGMT
