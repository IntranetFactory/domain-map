    extra_independent_of_module_split: true

  - id: B1A-S12
    summary: "Author ≥4 outbound cross-domain data_object_relationships mirroring MFG-OPS outbound handoffs (B8)."
    finding: "6 outbound cross-domain handoffs from MFG-OPS, but only the EAM-axis rows (599↔476 and 597↔477 on production_downtime_events / production_schedules) have corresponding cross-domain data_object_relationships. Missing on the MFG-OPS source side: production_orders → ERP-FIN payload (handoff 950 on production_order.completed), production_quality_inspections → GRC nonconformance payload (951), shop_floor_cases → ITSM service_incidents (952, payload 47), produced_units → FOOD-TRACE payload (954). Add now (source-side rows reference MFG-OPS master ids; independent of module split). Skip the handoff-952 mirror if Bucket 2 #7 lands 'reroute' or 'drop'."
    action: "Author 4 cross-domain data_object_relationships edges per the standard B8 outbound pattern (verb + inverse + cardinality + relationship_kind + is_required + owner_side=source on MFG-OPS master). Defer the shop_floor_cases→service_incidents row pending the Bucket 2 #7 decision."
