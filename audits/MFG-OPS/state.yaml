b2:
  - id: B2-MODULE-SPLIT
    summary: "Module split, load-bearing architectural decision (gates 6 b1b items)."
    question: "What domain_modules row(s) should MFG-OPS ship with? Proposed 5-module split (MFG-OPS-SHOPFLOOR-EXECUTION mastering production_orders + work_instructions + production_schedules; MFG-OPS-OEE-DOWNTIME mastering produced_units + production_downtime_events; MFG-OPS-IN-LINE-QUALITY mastering production_quality_inspections; MFG-OPS-FLOOR-CASE-MGMT mastering shop_floor_cases; MFG-OPS-LOT-TRACEABILITY embedding produced_units) vs alternatives."
    options:
      - "(a) Accept the 5-module split (lots-traceability embeds produced_units from OEE module)"
      - "(b) Collapse to a 3-module split (execution + OEE-and-quality + floor-case)"
      - "(c) Start with a single MFG-OPS-CORE full module and split later"
      - "(d) Propose an alternative shape"
    why: "Choice cascades into B1B-S5 (lifecycle states reference modules), B1B-S7 (role bundles), B1B-S8 (system-skill split). Coupled with Bucket 3 vetting because module assignments for Bucket 3 candidates depend on the split shape."

  - id: B2-WORKFORCE-SCHEDULING
    summary: "WORKFORCE-SCHEDULING capability on MFG-OPS, scope-correct?"
    question: "The only existing capability_domains row links WORKFORCE-SCHEDULING (id 312) to MFG-OPS. WORKFORCE-SCHEDULING is realized in FSM-DISPATCH-OPS (module 161 in FSM domain 31), not in any MFG-OPS module. MFG-OPS owns production_schedules (line / cell sequencing), which is a different concept. Keep the link or replace?"
    options:
      - "(a) Keep, capability spans MFG-OPS and FSM/WFM by intent (cross-cutting under Rule cross-cutting-capability convention)"
      - "(b) Remove and author PRODUCTION-SCHEDULING (new capability) on MFG-OPS"
    why: "Live state shows zero MFG-OPS modules realize 312; once any MFG-OPS module ships under B1B-S1, keeping the row fails M4 unless the capability is also realized inside a MFG-OPS module."

  - id: B2-SALESFORCE-MFG-CLOUD
    summary: "Salesforce Manufacturing Cloud (id 307), MFG-OPS or CRM scope?"
    question: "Currently linked at coverage_level=secondary on MFG-OPS. Salesforce Manufacturing Cloud is account-based demand forecasting / sales-agreement management, not shop-floor execution. Where does the row belong?"
    options:
      - "(a) Keep secondary on MFG-OPS (some run-rate-vs-commit context overlaps MFG-OPS reporting)"
      - "(b) Move to CRM only (primary semantic home)"
      - "(c) Move to a new MFG-DEMAND-COLLAB candidate domain"
    why: "Independent of module split; can be answered now."

  - id: B2-HONEYWELL-FORGE-VARIANT
    summary: "Honeywell Forge Industrial / Connected Plant variant missing from solutions."
    question: "Catalog has Honeywell Forge Building Operations (id 687) but not the Industrial / Connected Plant variant, which is the MES product. Add or defer?"
    options:
      - "(a) Add Honeywell Forge Industrial / Connected Plant as a new solutions row and link primary on MFG-OPS"
      - "(b) Leave as a noted gap"
    why: "Independent of module split."

  - id: B2-ADJACENT-MES-VENDORS
    summary: "Adjacent MES vendors entirely missing from solutions (Siemens Opcenter, GE Proficy, Aveva MES, Rockwell FactoryTalk Production Centre, Dassault Apriso, iBase-t Solumina)."
    question: "Six pure-play MES leaders are not in solutions at all. Load all, some, or defer?"
    options:
      - "(a) Load all 6"
      - "(b) Load Siemens Opcenter and GE Proficy (top-2 by revenue)"
      - "(c) Defer to a dedicated vendor-refresh pass"
    why: "Independent of module split."

  - id: B2-PRODUCED-UNITS-MASTER
    summary: "Module-shape question, embedded vs master on produced_units."
    question: "Under the 5-module split, produced_units could master in MFG-OPS-OEE-DOWNTIME and embedded_master in MFG-OPS-LOT-TRACEABILITY, or master in lot-traceability and embedded in OEE. Vendor evidence is split: Plex masters in produce/release; Apriso masters in genealogy. Where does it master?"
    options:
      - "(a) Master in MFG-OPS-OEE-DOWNTIME, embedded_master in MFG-OPS-LOT-TRACEABILITY"
      - "(b) Master in MFG-OPS-LOT-TRACEABILITY, embedded_master in MFG-OPS-OEE-DOWNTIME"
      - "(c) Keep produced_units in a single module (collapses one of the proposed module rows)"
    why: "Sub-decision of B2-MODULE-SPLIT; resolution may collapse the 5-module shape to 4 modules."

  - id: B2-SHOP-FLOOR-CASES-ITSM
    summary: "shop_floor_cases -> ITSM handoff target (handoff 952), is the ITSM target correct?"
    question: "Current target ITSM module 38 (service_incidents master). Shop-floor cases are operational, not IT incidents. ServiceNow models shop-floor cases inside service_incidents because everything in ServiceNow is a Case or Incident table, but other MES vendors treat them as distinct. Keep or change?"
    options:
      - "(a) Keep the ITSM target (consistent with ServiceNow product taxonomy)"
      - "(b) Reroute the handoff to an intra-domain MFG-OPS module after the module split lands"
      - "(c) Drop the handoff entirely (shop-floor cases stay in MFG-OPS, do not fan out)"
    why: "Outcome affects whether B1A-S12 includes the shop_floor_cases → service_incidents relationship row; independent of the rest of Bucket 2."

  - id: B2-REGULATIONS-RESCOPE
    summary: "MFG-OPS regulations set is product-marketing-shaped, not shop-floor-shaped."
    question: "Current 4 regulations (EU Cyber Resilience Act, EU Data Act, Eco-design for Sustainable Products Regulation, EU Battery Regulation) describe the regulated-product layer, which is PLM-shaped. Missing for MFG-OPS audit-trail: ISO 9001, ISO 14001, IATF 16949, AS9100, ISO 13485, FDA 21 CFR Part 11, OSHA process safety. Load, move, or keep?"
    options:
      - "(a) Load 3-5 of the missing standards as new regulations rows + domain_regulations links"
      - "(b) Move the 4 existing rows to PLM (they describe the regulated-product layer)"
      - "(c) Keep as-is — MFG-OPS audit-trail uses these regulations because the shop floor produces the regulated artifact"
    why: "Independent of Bucket 3 (regulation list is vendor-knowledge-based, not Phase-0-derived)."

  - id: B2-CATALOG-UX-WORDING
    summary: "Catalog UX wording — A4 (domain) + M8 (per-module after split lands)."
    question: "domains row 47 has catalog_tagline and catalog_description empty. Rule #20 buyer-voice backfill: draft, surface, then write only on per-row approval. Will the user supply or approve drafted wording, or defer?"
    options:
      - "(a) Approve agent-drafted wording (one round of draft, then approve)"
      - "(b) Supply exact wording"
      - "(c) Defer until after module split lands so domain + module UX wording can ship together"
    why: "Once a non-empty value exists in either column, Rule #20 forbids overwrite without explicit per-row approval — confirm timing before any draft is surfaced."

  - id: B2-ALIAS-TUPLES
    summary: "data_object_aliases tuples for the 7 MFG-OPS masters."
    question: "Audit suggested industry synonyms per master (production_orders -> [work_order, manufacturing_order, MO, WO], etc.). Bulk insert requires user approval of the exact (data_object_id, alias_name, alias_type) tuples."
    options:
      - "(a) Approve all suggested aliases as drafted"
      - "(b) Approve a subset (user names which)"
      - "(c) Defer and revisit after module split"
    why: "Rule #1 requires per-tuple approval before write; 7 masters x ~3 synonyms each is ~20 tuples to confirm."

b3:
  - id: B3-WORK-CENTERS
    candidate: work_centers
    rationale: "Universal across Plex, Opcenter, Apriso, Tulip station model, Proficy. Plant floor topology spine. Likely master in MFG-OPS-SHOPFLOOR-EXECUTION."
    vendor_evidence: [Plex, Siemens Opcenter, Dassault Apriso, Tulip Frontline Operations, GE Proficy]
    proposed_module: MFG-OPS-SHOPFLOOR-EXECUTION

  - id: B3-PRODUCTION-MATERIAL-CONSUMPTION
    candidate: production_material_consumption
    rationale: "Universal; backflushed against production_orders against BOM. Records material draw per produced_unit or per production_order."
    vendor_evidence: [Plex, Siemens Opcenter, Dassault Apriso, Tulip Frontline Operations]
    proposed_module: MFG-OPS-SHOPFLOOR-EXECUTION

  - id: B3-PRODUCTION-OEE-RECORDS
    candidate: production_oee_records
    rationale: "Universal (Plex, Proficy, Aveva). Rolled-up shift / line / workcenter OEE summary. May fold into existing production_downtime_events rollup or remain as a distinct denormalized analytics master."
    vendor_evidence: [Plex, GE Proficy, Aveva MES]
    proposed_module: MFG-OPS-OEE-DOWNTIME

  - id: B3-PRODUCTION-GENEALOGY
    candidate: production_genealogy
    rationale: "Universal in regulated manufacturing (life sciences, automotive, aerospace). Parent-child unit relationships. Distinct from produced_units (the unit) vs the chain."
    vendor_evidence: [Sparta TrackWise, Dassault Apriso, iBase-t Solumina, Veeva Vault QMS]
