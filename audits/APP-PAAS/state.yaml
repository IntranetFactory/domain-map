b2:
  - id: B2-S1
    summary: "Module split + capability shape decision"
    question: >
      (a) Approve the proposed 2-module split APP-PAAS-RUNTIME (masters 463/465/466/467)
      + APP-PAAS-DELIVERY (masters 464/468), or propose alternative? (b) Link to
      existing cross-cutting LCAP-MANAGED-RUNTIME (id 333) or author parallel
      APP-PAAS-MANAGED-RUNTIME? Rule #18 cross-cutting-capability convention says
      >=3-domain shared capability earns the neutral name; today only LCAP links to
      333 and APP-PAAS would make it 2, holding at 2 vs renaming to MANAGED-RUNTIME
      is a Rule #18 call. (c) Is APP-PAAS-ADDON-MARKETPLACE worth a top-level
      capability, or fold into APP-PAAS-ENV-MGMT since addons attach to environments?
    options: ["approve 2-module split + link 333", "approve 2-module split + author APP-PAAS-MANAGED-RUNTIME", "rename 333 to MANAGED-RUNTIME (link both)", "alternative split", "fold ADDON-MARKETPLACE into ENV-MGMT"]
    why: >
      Cross-cutting decision is a Rule #18 call; module split shapes downstream Phase
      B / E / F authoring on every subsequent state.yaml item.

  - id: B2-S2
    summary: "Catalog UX field wording (Rule #20)"
    question: >
      User must supply exact text for both domains.catalog_tagline and
      domains.catalog_description in buyer voice (workflow + value, not analyst voice).
    options: ["supply exact text", "approve agent draft after review", "skip until later marketing pass"]
    why: >
      Rule #20 forbids overwriting non-empty values without explicit per-row user
      approval; once written, the value sticks.

  - id: B2-S3
    summary: "Pattern flag flips (Rule #12)"
    question: >
      Confirm or rewrite each proposed flip: paas_deployments.has_submit_lock=true,
      paas_build_records.has_submit_lock=true, paas_addons.has_personal_content=true.
    options: ["confirm all 3", "confirm subset", "rewrite", "decline"]

  - id: B2-S4
    summary: "paas_runtime_instances lifecycle shape (workflow vs config-shape)"
    question: >
      Treat as (a) a 5-state workflow machine (starting -> running -> scaling ->
      draining -> stopped) all requires_permission=false since transitions fire from
      the autoscaler not the user, or (b) config-shape on a state column per Rule
      #12 exemption; surface decision in chat, do NOT write to data_objects.notes
      per Rule #15.
    options: ["a (5-state workflow)", "b (config-shape exemption)"]
    why: >
      Other 5 masters have obvious workflow state machines; runtime instances are
      autoscaler-reconciled. Config-shape exemption avoids polluting the workflow
      surface with reconciliation states.

  - id: B2-S5
    summary: "Consumer DMDO declarations for 3 inbound payload entities"
    question: >
      For each of LCAP lcap_apps (220, handoff 704), KUBE-PLAT container_workloads
      (450, handoff 759), VSDP software_deployments (682, handoff 770): declare as
      consumer + optional on the receiving APP-PAAS module (preferred, captures the
      dependency in the catalog), or accept as domain-level only (no DMDO row)?
    options: ["all 3 consumer + optional", "subset", "all domain-level only"]
    why: >
      Depends on B2-S1 module shape; the receiving module is APP-PAAS-RUNTIME for
      lcap_apps + container_workloads and APP-PAAS-DELIVERY for software_deployments.

  - id: B2-H1
    summary: "APQC tag duplication on handoff 753"
    question: >
      Handoff 753 (paas_deployment.succeeded -> KUBE-PLAT) currently carries 1311
      (Install/configure/upgrade infrastructure components L4) loaded as
      agent_curated. The 2026-05-30 audit also proposed 52 (Deploy services/solutions
      L2). Keep 1311 only, replace with 52, or co-tag both?
    options: ["keep 1311", "replace with 52", "co-tag both"]

b3:
  - id: B3-RELEASE-VERSIONS
    candidate: paas_release_versions
    rationale: >
      Distinct from a deployment in that a release names the immutable version;
      some vendors collapse this into paas_deployments, others split. If split,
      the master belongs on APP-PAAS-DELIVERY and would back the rollback workflow
      more cleanly than paas_deployments alone.
    vendor_evidence: ["Heroku release", "Vercel deployment version", "Render deploy version", "Azure App Service deployment slot version"]
    proposed_module: APP-PAAS-DELIVERY

  - id: B3-SECRETS
    candidate: paas_secrets / paas_config_vars
    rationale: >
      Universal across modern PaaS. Likely an embedded_master if a separate
      secrets-mgmt domain is later authored; today no such canonical owner exists
      so APP-PAAS would master it directly.
    vendor_evidence: ["Heroku config vars", "Vercel environment variables", "Render environment groups", "Fly.io secrets"]
    proposed_module: APP-PAAS-RUNTIME

  - id: B3-LOG-STREAMS
    candidate: paas_log_streams
    rationale: >
      Either an APP-PAAS-mastered entity or consumer-only against OBS masters
      depending on the boundary call. Vercel and Render expose log surfaces
      directly through the PaaS API; Heroku's "log drains" is a canonical
      APP-PAAS concept.
    vendor_evidence: ["Heroku log drains", "Vercel logs", "Render logs"]
    proposed_module: APP-PAAS-RUNTIME

  - id: B3-CUSTOM-DOMAINS
    candidate: paas_custom_domains
    rationale: >
      Universal: domain attachment + TLS cert lifecycle. Distinct workflow surface
      from paas_environments since a single environment can attach multiple custom
      domains.
    vendor_evidence: ["Heroku custom domains", "Vercel domains", "Render custom domains", "Netlify domains", "Fly.io certificates"]
    proposed_module: APP-PAAS-RUNTIME
