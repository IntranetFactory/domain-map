b1a:
  - id: B1A-A4
    summary: A4 hard fail, draft buyer-voice catalog_tagline and catalog_description for the EXPENSE domain row (id 67), surface to user, then PATCH.
    finding: |
      `domains.catalog_tagline` and `domains.catalog_description` are both empty strings on the EXPENSE domain row (id 67). Rule #20 requires both populated in buyer voice (workflow + value), not analyst voice. Module-grain M8 (per-module catalog_tagline / catalog_description) is gated on B1-S1 because there are no modules yet, so the same backfill on `domain_modules` rows happens only after the module split lands.
    action: |
      1. Draft `catalog_tagline` (one buyer-facing sentence) and `catalog_description` (1-3 buyer-facing paragraphs) for the EXPENSE domain row.
      2. Surface both drafts in chat for user approval BEFORE writing per Rule #20.
      3. PATCH `/domains?id=eq.67` with the approved values.
    affected_entities:
      - "domains.id=67 (EXPENSE)"

b1b:
