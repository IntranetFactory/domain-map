      `record_status` columns.
    vendor_evidence: [SAP Concur, Workday Expenses]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING or new EXPENSE-POLICY-AND-AUDIT

  - id: B3-MOD-TRAVEL-MGMT
