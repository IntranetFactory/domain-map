b2:
  - id: B2-S1
    summary: EXPENSE module split shape (3 / 2 / 4 / custom). Architectural backbone every other fix depends on.
    question: Which module split should EXPENSE adopt? The 2026-05-30 audit recommends 3 modules (EXPENSE-CAPTURE-AND-REPORTING, CORP-CARD-RECON, TRAVEL-AND-PER-DIEM) because it cleanly survives the CORP-CARD-PROGRAM and TRAVEL-MGMT candidate-domain promotions.
    options:
      - "a, 3 modules per recommendation"
      - "b, 2 modules (collapse card recon into main expense module)"
      - "c, 4 modules (split policy enforcement)"
      - "d, custom (specify per-module masters)"
    why: |
      Module split is the architectural backbone every other fix depends on. B1B-S1, B1B-S3, B1B-S4 all gate on this call.

  - id: B2-S2
    summary: Does EXPENSE own corporate_cards (212) and card_transactions (213), or should they migrate to a future CORP-CARD-PROGRAM domain?
    question: Vendor surface splits cleanly between issuance / program-management (Brex, Ramp, Marqeta, Stripe Issuing) and expense-reporting consumption (Concur, Expensify, Workday). CORP-CARD-PROGRAM is a candidate domain queued at mention_count 2.
    options:
      - "a, keep both masters in EXPENSE (simple)"
      - "b, migrate both to CORP-CARD-PROGRAM after promotion (deferred until that domain lands)"
      - "c, split (keep corporate_cards in EXPENSE, migrate card_transactions to CORP-CARD-PROGRAM)"
    why: |
      Architectural call gated on candidate-domain triage. Has Bucket 3 dependency on CORP-CARD-PROGRAM promotion (see _missing-domains.md).

  - id: B2-S3
    summary: Does EXPENSE own travel_bookings (215), or should it migrate to TRAVEL-MGMT?
    question: Same shape as B2-S2. Vendor surface (Navan, Egencia, Concur Travel, Spotnana) models travel-booking as a distinct market. TRAVEL-MGMT candidate at mention_count 2.
    options:
      - "a, keep travel_bookings in EXPENSE"
      - "b, migrate to TRAVEL-MGMT after promotion"
      - "c, keep but author thin (travel_bookings as integration record only)"
    why: |
      Same dependency shape as B2-S2. Bucket 3 dependency on TRAVEL-MGMT promotion.

  - id: B2-S4
    summary: B4 pattern-flag specific calls per master, 8 proposed flips.
    question: Per-flag confirmation for B1B-S5. Proposed flips, expense_reports.has_personal_content=true, expense_reports.has_submit_lock=true, expense_lines.has_submit_lock=true, travel_bookings.has_personal_content=true, card_transactions.has_personal_content=true, corporate_cards.has_single_approver=true, expense_reports.has_single_approver=false (confirm), expense_policies.has_submit_lock=false (confirm).
    options:
      - "per-flag yes / no on the 8 proposed flips, captured in Decisions"
    why: |
      Workflow-shape judgments the user owns. Rule #15 forbids auto-populating `data_objects.notes` with rationale.

  - id: B2-S5
    summary: expense_policies (214) vs spend_policies (747) overlap, parallel masters via sync or collapse to single primitive.
    question: SPEND-MGMT is the heaviest neighbor (weight 10). `syncs_to` cross-rel 733 declares them parallel, but vendor surface (Brex, Ramp, Pleo, Navan, Volopay) increasingly ships a single policy primitive that drives both card limits and expense-report acceptance.
    options:
      - "a, keep parallel-master shape (mirror via sync)"
      - "b, collapse to single expense_policies master in EXPENSE with SPEND-MGMT consuming it"
      - "c, collapse to spend_policies in SPEND-MGMT with EXPENSE consuming it"
    why: |
      Cross-domain architectural decision touching two domains' module shapes. Creates work for the SPEND-MGMT b1 audit when it runs.

  - id: B2-S6
    summary: Reimbursement disbursement path, PAYROLL-side, AP-AUTO-side, or both.
    question: EXPENSE consumes `supplier_invoices` (75) and the `expense_reports becomes supplier_invoices` cross-rel (725) declares the post-approval handoff to AP-AUTO. But the `expense.reimbursable` inbound from PAYROLL (101) and `pay_run.disbursed` inbound from PAYROLL (1157) both target `expense_reports`. Two reimbursement paths exist.
    options:
      - "a, model both paths (current implicit state)"
      - "b, pick PAYROLL-side, deprecate the AP-AUTO consumer"
      - "c, pick AP-AUTO-side, deprecate the PAYROLL handoffs"
    why: |
      Workflow scope decision.

  - id: B2-EM
    summary: domains.business_logic on EXPENSE row contains a forbidden em-dash; needs user-approved replacement wording.
    question: The string `Policy engine (per-diem caps, currency, category limits) and OCR for receipt extraction <EM-DASH> both increasingly declarative or ML-based.` violates the project "No em-dashes" rule. The agent will not unilaterally rewrite non-empty descriptive prose.
    options:
      - "a, replace em-dash with a comma"
      - "b, split sentence (replace with period)"
      - "c, rewrite (user supplies wording)"
      - "d, defer"
    why: |
      Rewriting prose is editorial. Rule #15 covers `notes` columns only, but the project-wide em-dash rule applies catalog-wide.

b3:
  - id: B3-RECEIPTS
    candidate: receipts
    rationale: |
      Concur, Expensify, Rydoo, Fyle, Pleo model the receipt image / extracted text as a first-class master distinct from `expense_lines` (one receipt can split into N lines; receipts have their own lifecycle: captured to OCR'd to matched to archived). Current shape folds receipts into expense_lines.
    vendor_evidence: [SAP Concur, Expensify, Rydoo, Fyle, Pleo]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING

  - id: B3-MILEAGE-LOGS
    candidate: mileage_logs
    rationale: |
      Concur Drive, Expensify, MileIQ, Cardata model mileage as a distinct master with GPS tracks, start / end points, business-purpose categorization. Currently absent.
    vendor_evidence: [SAP Concur Drive, Expensify, MileIQ, Cardata]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING or TRAVEL-AND-PER-DIEM

  - id: B3-PER-DIEM-RATES
    candidate: per_diem_rates
    rationale: |
      Concur, Workday Expenses, GSA per-diem feed, FOREIGNGOV / OCONUS rate tables. Reference data master. Currently absent.
    vendor_evidence: [SAP Concur, Workday Expenses]
    proposed_module: TRAVEL-AND-PER-DIEM

  - id: B3-CASH-ADVANCES
    candidate: cash_advances
    rationale: |
      Concur, Workday Expenses, Emburse Chrome River model cash advances as a distinct master with issue / reconciliation / settlement lifecycle. Currently absent.
    vendor_evidence: [SAP Concur, Workday Expenses, Emburse Chrome River]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING

  - id: B3-EXPENSE-CATEGORIES
    candidate: expense_categories
    rationale: |
      Every vendor has a category taxonomy distinct from the policy entity (meals, lodging, ground transport, supplies, etc.) often mapped to GL accounts. Currently inlined onto `expense_lines`.
    vendor_evidence: [SAP Concur, Expensify, Brex, Ramp, Workday Expenses, all vendors in the surface]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING

  - id: B3-TRAVELER-PROFILES
    candidate: traveler_profiles
    rationale: |
      Navan, Egencia, Concur Travel, Spotnana model traveler profiles as a distinct master with passport / loyalty / dietary preferences / TSA-precheck. Currently absent.
    vendor_evidence: [Navan, Egencia, SAP Concur Travel, Spotnana]
    proposed_module: TRAVEL-AND-PER-DIEM

  - id: B3-POLICY-VIOLATIONS
    candidate: policy_violations
    rationale: |
      Concur, Expensify, Brex, Ramp model violations as a distinct master separate from `expense_lines` (one line can carry multiple violations; violations have their own resolution lifecycle: flagged to reviewed to exception_granted / line_corrected). Currently violations are implicit on `expense_line.policy_violation` events.
    vendor_evidence: [SAP Concur, Expensify, Brex, Ramp]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING or EXPENSE-POLICY-AND-AUDIT

  - id: B3-DELEGATE-AUTHORIZATIONS
    candidate: delegate_authorizations
    rationale: |
      Concur, Workday, Expensify all model proxy / delegate permissions (employee A submits on behalf of employee B; manager A approves on behalf of manager B during PTO). Currently absent.
    vendor_evidence: [SAP Concur, Workday Expenses, Expensify]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING

  - id: B3-VAT-TAX-RECORDS
    candidate: vat_tax_records
    rationale: |
      Concur Tax Assurance, VATBox, Vatglobal handle VAT extraction and recovery as a distinct record-type with reclaim lifecycle. EU VAT directive (already loaded) is the anchor. Currently absent.
    vendor_evidence: [SAP Concur Tax Assurance, VATBox, Vatglobal]
    proposed_module: EXPENSE-POLICY-AND-AUDIT or new EXPENSE-VAT module

  - id: B3-AUDIT-TRAIL-RECORDS
    candidate: audit_trail_records
    rationale: |
      SOX / IRS substantiation needs immutable audit-trail records distinct from the expense-line state machine (who edited, who viewed, who approved, with timestamps). Currently absent as a queryable entity, though implicit in `record_status` columns.
    vendor_evidence: [SAP Concur, Workday Expenses, all SOX-anchored vendors]
    proposed_module: EXPENSE-POLICY-AND-AUDIT

  - id: B3-MOD-TRAVEL-MGMT
    candidate: TRAVEL-AND-PER-DIEM module migration to TRAVEL-MGMT domain
    rationale: |
      If B2-S3 returns "migrate to TRAVEL-MGMT", the TRAVEL-AND-PER-DIEM module empties out and either retires or becomes a thin integration module. TRAVEL-MGMT candidate queued at mention_count 2 in _missing-domains.md.
    vendor_evidence: [Navan, Egencia, SAP Concur Travel, Spotnana, AmTrav]
    proposed_module: TRAVEL-MGMT (new domain)

  - id: B3-MOD-CORP-CARD-PROGRAM
    candidate: CORP-CARD-RECON module migration to CORP-CARD-PROGRAM domain
    rationale: |
      If B2-S2 returns "migrate cards", the CORP-CARD-RECON module either retires (cards fully owned by CORP-CARD-PROGRAM) or shrinks to a thin consumer. CORP-CARD-PROGRAM candidate queued at mention_count 2 in _missing-domains.md.
    vendor_evidence: [Marqeta, Stripe Issuing, Highnote, Lithic, Brex Card, Ramp Card]
    proposed_module: CORP-CARD-PROGRAM (new domain)

  - id: B3-REG-IRS-463
    candidate: IRS Publication 463 regulation
    rationale: |
      Mandatory for US employer per-diem and substantiation rules; underpins `per_diem_rates` and `cash_advances` masters.
    vendor_evidence: [SAP Concur, Workday Expenses, IRS Publication 463 statutory anchor]

  - id: B3-REG-HMRC-P11D
    candidate: HMRC P11D regulation
    rationale: |
      Mandatory for UK employer benefits-in-kind reporting; affects which expense categories require reporting.
    vendor_evidence: [SAP Concur UK, Rydoo, HMRC P11D statutory anchor]

  - id: B3-REG-FCPA
    candidate: FCPA (Foreign Corrupt Practices Act) regulation
    rationale: |
      Mandatory for US-listed entities and foreign subsidiaries; gift / hospitality / travel-with-foreign-officials tracking.
    vendor_evidence: [SAP Concur, Workday Expenses, FCPA statutory anchor]

  - id: B3-REG-GDPR
    candidate: GDPR regulation applicability
    rationale: |
      Mandatory for EEA traveler PII handling in `traveler_profiles` and `travel_bookings`.
    vendor_evidence: [Navan, SAP Concur, GDPR statutory anchor]

  - id: B3-REG-PCI-DSS
    candidate: PCI-DSS regulation applicability
    rationale: |
      Mandatory if EXPENSE ever stores PAN or full card numbers; usually scoped out by tokenization at the CORP-CARD-PROGRAM tier but flagged for completeness.
    vendor_evidence: [Brex, Ramp, PCI-DSS standard]
