b2:
  - id: B2-S2
    summary: "Does EXPENSE own corporate_cards (212) and card_transactions (213), or should they migrate to a future CORP-CARD-PROGRAM domain?"
    question: >
      Vendor surface splits cleanly between issuance / program-management (Brex, Ramp, Marqeta, Stripe Issuing)
      and expense-reporting consumption (Concur, Expensify, Workday). CORP-CARD-PROGRAM is a candidate domain
      queued at mention_count 2. The 2026-06-02 modularization isolated both masters into module 192
      (EXPENSE-CORP-CARD-RECON), so a future migration is non-destructive (the whole module moves or shrinks to a thin consumer).
    options:
      - "a, keep both masters in EXPENSE (simple, current state on module 192)"
      - "b, migrate both to CORP-CARD-PROGRAM after promotion (module 192 retires or becomes thin consumer)"
      - "c, split (keep corporate_cards in EXPENSE, migrate card_transactions to CORP-CARD-PROGRAM)"
    why: "Architectural call gated on candidate-domain triage. Bucket 3 dependency on CORP-CARD-PROGRAM promotion (_missing-domains.md)."

  - id: B2-S3
    summary: "Does EXPENSE own travel_bookings (215), or should it migrate to TRAVEL-MGMT?"
    question: >
      Same shape as B2-S2. Vendor surface (Navan, Egencia, Concur Travel, Spotnana) models travel-booking as a
      distinct market. TRAVEL-MGMT candidate at mention_count 2. The 2026-06-02 modularization isolated travel_bookings
      into module 193 (EXPENSE-TRAVEL-AND-PER-DIEM), so a future migration is non-destructive.
    options:
      - "a, keep travel_bookings in EXPENSE (module 193)"
      - "b, migrate to TRAVEL-MGMT after promotion (module 193 retires or becomes thin integration module)"
      - "c, keep but author thin (travel_bookings as integration record only)"
    why: "Same dependency shape as B2-S2. Bucket 3 dependency on TRAVEL-MGMT promotion."

  - id: B2-S4
    summary: "B4 pattern-flag specific calls per master, 8 proposed flips."
    question: >
      Per-flag confirmation for B1B-S5. Proposed flips: expense_reports.has_personal_content=true,
      expense_reports.has_submit_lock=true, expense_lines.has_submit_lock=true, travel_bookings.has_personal_content=true,
      card_transactions.has_personal_content=true, corporate_cards.has_single_approver=true,
      expense_reports.has_single_approver=false (confirm), expense_policies.has_submit_lock=false (confirm).
    options:
      - "per-flag yes / no on the 8 proposed flips, captured in Decisions"
    why: "Workflow-shape judgments the user owns. Rule #15 forbids auto-populating data_objects.notes with rationale."

  - id: B2-S5
    summary: "expense_policies (214) vs spend_policies (747) overlap: parallel masters via sync, or collapse to single primitive."
    question: >
      SPEND-MGMT is the heaviest neighbor (weight 10). `syncs_to` cross-rel 733 declares them parallel, but vendor
      surface (Brex, Ramp, Pleo, Navan, Volopay) increasingly ships a single policy primitive that drives both card
      limits and expense-report acceptance. expense_policies is now mastered in module 191.
    options:
      - "a, keep parallel-master shape (mirror via sync)"
      - "b, collapse to single expense_policies master in EXPENSE (module 191) with SPEND-MGMT consuming it"
      - "c, collapse to spend_policies in SPEND-MGMT with EXPENSE consuming it"
    why: "Cross-domain architectural decision touching two domains' module shapes. Creates work for the SPEND-MGMT b1 audit."

  - id: B2-S6
    summary: "Reimbursement disbursement path: PAYROLL-side, AP-AUTO-side, or both."
    question: >
      EXPENSE consumes `supplier_invoices` (75, now consumer on module 191) and the `expense_reports becomes
      supplier_invoices` cross-rel (725) declares the post-approval handoff to AP-AUTO. But `expense.reimbursable`
      inbound from PAYROLL (101) and `pay_run.disbursed` inbound from PAYROLL (1157) both target `expense_reports`.
      Two reimbursement paths exist.
    options:
      - "a, model both paths (current implicit state)"
      - "b, pick PAYROLL-side, deprecate the AP-AUTO consumer"
      - "c, pick AP-AUTO-side, deprecate the PAYROLL handoffs"
    why: "Workflow scope decision."

  - id: B2-EM
    summary: "Forbidden em-dash in domains.business_logic (EXPENSE row 67) and in skill 57 description; needs user-approved replacement wording."
    question: >
      `domains.business_logic` on the EXPENSE row (id 67) contains an em-dash (project rule "No em-dashes" forbids it
      catalog-wide). Skill 57 `expense-system` description also carries one. Both are non-`notes` descriptive prose;
      a unilateral rewrite is out of scope.
    options:
      - "a, replace em-dash with a comma"
      - "b, split sentence (replace with period)"
      - "c, rewrite (user supplies wording)"
      - "d, defer"
    why: "Rewriting prose is editorial. Rule #15 covers notes columns only; the project-wide em-dash rule applies catalog-wide."

b3:
  - id: B3-RECEIPTS
    candidate: receipts
    rationale: >
      Concur, Expensify, Rydoo, Fyle, Pleo model the receipt image / extracted text as a first-class master distinct
      from `expense_lines` (one receipt can split into N lines; receipts have their own lifecycle: captured to OCR'd to
      matched to archived). Current shape folds receipts into expense_lines.
    vendor_evidence: [SAP Concur, Expensify, Rydoo, Fyle, Pleo]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING

  - id: B3-MILEAGE-LOGS
    candidate: mileage_logs
    rationale: >
      Concur Drive, Expensify, MileIQ, Cardata model mileage as a distinct master with GPS tracks, start / end points,
      business-purpose categorization. Currently absent.
    vendor_evidence: [SAP Concur Drive, Expensify, MileIQ, Cardata]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING or EXPENSE-TRAVEL-AND-PER-DIEM

  - id: B3-PER-DIEM-RATES
    candidate: per_diem_rates
    rationale: >
      Concur, Workday Expenses, GSA per-diem feed, FOREIGNGOV / OCONUS rate tables. Reference data master. Currently absent.
    vendor_evidence: [SAP Concur, Workday Expenses]
    proposed_module: EXPENSE-TRAVEL-AND-PER-DIEM

  - id: B3-CASH-ADVANCES
    candidate: cash_advances
    rationale: >
      Concur, Workday Expenses, Emburse Chrome River model cash advances as a distinct master with issue /
      reconciliation / settlement lifecycle. Currently absent.
    vendor_evidence: [SAP Concur, Workday Expenses, Emburse Chrome River]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING

