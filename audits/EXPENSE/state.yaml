    rationale: >
      Mandatory for UK employer benefits-in-kind reporting; affects which expense categories require reporting.
    vendor_evidence: [SAP Concur UK, Rydoo, HMRC P11D statutory anchor]

  - id: B3-REG-FCPA
    candidate: FCPA (Foreign Corrupt Practices Act) regulation
    rationale: >
      Mandatory for US-listed entities and foreign subsidiaries; gift / hospitality / travel-with-foreign-officials tracking.
    vendor_evidence: [SAP Concur, Workday Expenses, FCPA statutory anchor]

