    summary: Phase M load, author `domain_modules` rows for EXPENSE, migrate legacy `domain_data_objects` to `domain_module_data_objects`, blocked on B2-S1 module split decision.
    finding: |
      0 `domain_modules` rows for domain 67 despite 6 capabilities and 6 masters. Rule #14 requires at least 2 full modules for a 6-capability market. Recommended 3-module split (EXPENSE-CAPTURE-AND-REPORTING, CORP-CARD-RECON, TRAVEL-AND-PER-DIEM) but the architectural call is the user's per B2-S1. After the split, migrate the 9 legacy `domain_data_objects` rows into module-scoped `domain_module_data_objects` rows.
    action: |
      After B2-S1 returns the module split, author 2 to 4 `domain_modules` rows (`module_kind='full'`), populate per-module `catalog_tagline` / `catalog_description` (Rule #20), then migrate the 9 legacy DDO rows to DMDO on the right module per master ownership.
    blocked_by:
      - {type: user_decision, ref: B2-S1}
    affected_modules: []
    affected_masters:
      - {data_object_id: 210, name: expense_reports, target_module_id: null, workflow: capture_and_reporting}
      - {data_object_id: 211, name: expense_lines, target_module_id: null, workflow: capture_and_reporting}
      - {data_object_id: 214, name: expense_policies, target_module_id: null, workflow: policy_enforcement}
      - {data_object_id: 212, name: corporate_cards, target_module_id: null, workflow: card_recon}
      - {data_object_id: 213, name: card_transactions, target_module_id: null, workflow: card_recon}
      - {data_object_id: 215, name: travel_bookings, target_module_id: null, workflow: travel_and_per_diem}

  - id: B1B-S3
    summary: Author 6 master state machines (data_object_lifecycle_states), blocked on B1-S1 because state rows carry `domain_module_id`.
    finding: |
      0 `data_object_lifecycle_states` rows across the 6 `master + required` data_objects (210, 211, 212, 213, 214, 215). Rule #12 is unconditional for workflow-bearing masters. Proposed state machines per 2026-05-30 audit: expense_reports (draft to submitted to in_review to approved to posted_to_gl to reimbursed to closed, with rejected branch), expense_lines (entered to matched_to_receipt to policy_check to submitted to approved to posted, with violation branch), corporate_cards (issued to active to suspended to cancelled), card_transactions (posted to matched to expense_line_created to reconciled, with disputed branch), expense_policies (draft to active to deprecated), travel_bookings (shopped to reserved to confirmed to ticketed to completed to cancelled).
    action: |
      After B1B-S1 lands modules, author ~28 to 34 lifecycle-state rows (one batch per master) so each row can carry `domain_module_id` per Rule #12 permission materialization. Workflow-gate states with `requires_permission=true` materialize into `<domain_module_code>:<verb>_<entity>` permissions.
    blocked_by:
      - {type: depends_on, ref: B1B-S1, reason: state rows carry domain_module_id}
    affected_masters:
      - {data_object_id: 210, name: expense_reports, target_module_id: null, workflow: full_state_machine}
      - {data_object_id: 211, name: expense_lines, target_module_id: null, workflow: full_state_machine}
      - {data_object_id: 212, name: corporate_cards, target_module_id: null, workflow: full_state_machine}
      - {data_object_id: 213, name: card_transactions, target_module_id: null, workflow: full_state_machine}
      - {data_object_id: 214, name: expense_policies, target_module_id: null, workflow: config_versioned}
      - {data_object_id: 215, name: travel_bookings, target_module_id: null, workflow: full_state_machine}

  - id: B1B-S4
    summary: Rebind or split `expense-system` skill (57) per module, blocked on B1-S1 because Rule #17 invariant is one system skill per `domain_modules` row.
    finding: |
      Skill 57 `expense-system` has `domain_module_id IS NULL`, violating Rule #17 (exactly one `system` skill per `domain_modules` row, skill carries the module FK). With 0 modules the skill is structurally orphaned. The 7 existing `skill_tools` rows split cleanly along the recommended 3-module shape: 3 query tools for CAPTURE-AND-REPORTING (210, 211, 214), 2 for CORP-CARD-RECON (212, 213), 1 for TRAVEL-AND-PER-DIEM (215), and `send_email` channel primitive shipped on all.
    action: |
      After B1B-S1 lands modules, either rebind skill 57 to a single module if a 1-module shape is chosen, or split into N system skills (one per module) and redistribute the 7 `skill_tools` rows accordingly.
    blocked_by:
      - {type: depends_on, ref: B1B-S1, reason: skill.domain_module_id requires modules to exist}
    extra_existing_skill_id: 57
    extra_existing_tool_count: 7

  - id: B1B-S5
    summary: PATCH 8 pattern flag flips on 6 `data_objects` rows, blocked on B2-S4 per-flag user confirmation.
    finding: |
      All 6 masters carry blanket false flags. Per 2026-05-30 audit, vendor surface implies 8 positive re-evaluations: expense_reports.has_personal_content=true, expense_reports.has_submit_lock=true, expense_lines.has_submit_lock=true, travel_bookings.has_personal_content=true, card_transactions.has_personal_content=true, corporate_cards.has_single_approver=true, expense_reports.has_single_approver=false (confirm current), expense_policies.has_submit_lock=false (confirm current).
    action: |
      After B2-S4 per-flag confirmation, PATCH `/data_objects?id=eq.<id>` for each approved flag flip. Rule #15 forbids auto-populating `data_objects.notes` to explain the flag rationale; surface in chat instead.
    blocked_by:
      - {type: user_decision, ref: B2-S4}
    affected_masters:
      - {data_object_id: 210, name: expense_reports, target_module_id: null, workflow: pattern_flags}
      - {data_object_id: 211, name: expense_lines, target_module_id: null, workflow: pattern_flags}
      - {data_object_id: 212, name: corporate_cards, target_module_id: null, workflow: pattern_flags}
      - {data_object_id: 213, name: card_transactions, target_module_id: null, workflow: pattern_flags}
      - {data_object_id: 214, name: expense_policies, target_module_id: null, workflow: pattern_flags}
      - {data_object_id: 215, name: travel_bookings, target_module_id: null, workflow: pattern_flags}

