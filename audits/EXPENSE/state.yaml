    candidate: traveler_profiles
    rationale: >
      Navan, Egencia, Concur Travel, Spotnana model traveler profiles as a distinct master with passport / loyalty /
      dietary preferences / TSA-precheck. Currently absent.
    vendor_evidence: [Navan, Egencia, SAP Concur Travel, Spotnana]
    proposed_module: EXPENSE-TRAVEL-AND-PER-DIEM

  - id: B3-POLICY-VIOLATIONS
    candidate: policy_violations
    rationale: >
      Concur, Expensify, Brex, Ramp model violations as a distinct master separate from `expense_lines` (one line can
      carry multiple violations; violations have their own resolution lifecycle: flagged to reviewed to
      exception_granted / line_corrected). Currently violations are implicit on `expense_line.policy_violation` events.
      A dedicated master here is the anchor that would justify the option (c) 4-module shape (a policy-and-audit module).
    vendor_evidence: [SAP Concur, Expensify, Brex, Ramp]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING

  - id: B3-DELEGATE-AUTHORIZATIONS
    candidate: delegate_authorizations
    rationale: >
      Concur, Workday, Expensify all model proxy / delegate permissions (employee A submits on behalf of employee B;
      manager A approves on behalf of manager B during PTO). Currently absent.
    vendor_evidence: [SAP Concur, Workday Expenses, Expensify]
    proposed_module: EXPENSE-CAPTURE-AND-REPORTING

  - id: B3-VAT-TAX-RECORDS
    candidate: vat_tax_records
    rationale: >
      Concur Tax Assurance, VATBox, Vatglobal handle VAT extraction and recovery as a distinct record-type with reclaim
