b2:
  - id: B2-S1
    summary: Confirm 4-module vs 6-module shape for SAM Phase A re-author.
    question: |
      Phase-1 hypothesis proposed 4 modules (SAM-CATALOG, SAM-ENTITLEMENT-MGMT, SAM-DISCOVERY-INVENTORY, SAM-AUDIT-DEFENSE). Pass 2 vendor surface argues for 6 modules (SAM-CATALOG, SAM-DISCOVERY, SAM-ENTITLEMENT, SAM-METERING, SAM-AUDIT, SAM-RENEWAL). Which target?
    options:
      - confirm_6_module_pass2_shape
      - confirm_4_module_phase1_shape
      - hybrid_5_module
      - push_back_per_module_boundary
    why: |
      Vendor surface (Flexera, Snow, USU, ServiceNow SAM Pro, Anglepoint, Certero, Eracent) treats catalog substrate, metering substrate, and renewal as distinct workflows. The 4-module shape collapses metering into entitlement-mgmt and renewal under entitlement. Splitting is grounded; collapsing is the simpler load. User judgment.
  - id: B2-S2
    summary: license_audits pattern flags has_submit_lock and has_single_approver -> true?
    question: |
      `license_audits` (id 60) currently has all 3 pattern flags `false`. Domain knowledge says: once a publisher audit response is submitted, the snapshot is locked (`has_submit_lock=true`); the response is approved by an IT Asset Management lead / CIO before submission (`has_single_approver=true`). Flip both to true?
    options:
      - flip_both_to_true
      - flip_submit_lock_only
      - flip_single_approver_only
      - keep_false
    why: |
      Pattern flags inform the platform-side validation rules and the lifecycle-state-to-permission derivation. Wrong flag values silently mis-shape the deployer's permission set.
  - id: B2-S3
    summary: software_titles and software_installations lifecycle - config-shape exemption or full state machine?
    question: |
      `software_titles` could be config-shape (catalog entry edited occasionally) or have lifecycle (`active`, `eol`, `retired`). `software_installations` could be ephemeral discovery rows or have (`detected`, `verified`, `licensed`, `unlicensed`, `removed`). Per Rule #12 + Rule #15, exemption must be surfaced.
    options:
      - both_config_shape_exempt
      - both_full_lifecycle
      - titles_full_installations_config
      - titles_config_installations_full
    why: |
      Each path shapes a different downstream module: a config-shape `software_titles` simplifies SAM-CATALOG to a maintained reference table; a full-lifecycle one makes EOL state a first-class workflow event with publishers + audit handoffs.
  - id: B2-S4
    summary: Vendor record refresh - Snow Software acquisition by Insight Enterprises.
    question: |
      Snow Software was acquired by Insight Enterprises in 2024. The `vendors` row reads `vendor_name=Snow Software`; predecessor mention on `solutions.notes` requires explicit user-approved wording per Rule #15 (the carve-out is rescinded).
    options:
      - leave_as_is
      - update_vendor_record
      - approve_predecessor_note_wording_on_solution
    why: |
      Out of scope for routine audit. A5 is opt-in. Surfaced for awareness only.
  - id: B2-S5
    summary: Missing handoff candidate - SAM -> APM on software_title.eol_reached.
    question: |
      SAM publishes `software_title.eol_reached` to GRC (handoff 638) but not to APM. APM's `enterprise_applications` consume `software_titles` via existing relationships (ids 222, 233). An EOL title should propagate to APM so dependent applications get flagged for replacement.
    options:
      - add_apm_subscriber
      - keep_grc_only
      - defer_to_grc_publishes_downstream
    why: |
      The handoff is straightforward to load; the call is whether GRC is the only legitimate subscriber or whether APM is also a subscriber. Recommendation: add APM.
  - id: B2-S6
    summary: PaaS addon licensing scope - in or out of SAM.
    question: |
      Handoff 798 brings `paas_addon.provisioned` from APP-PAAS into SAM. Some PaaS addons (DB, queue, cache) are billable separately and have entitlement structures; others are bundled. Whether SAM models these as `software_installations` or a new `paas_addon_installations` master is a scope decision.
    options:
      - stay_narrow_informational_only
      - extend_sam_to_master_paas_licensing
      - align_with_finops_consumption_master
    why: |
      Choice determines whether B1-S12's `paas_addons` DMDO row is `optional` (recommended) or `required` plus a new master entity.
  - id: B2-S7
    summary: Missing handoff candidate - S2P -> SAM on purchase_order.approved.
    question: |
      When S2P approves a software-license PO, the new `software_licenses` row should auto-create in SAM. Today's shape requires manual entry or a batch sync. Add this handoff to close the purchase-to-entitlement loop?
    options:
      - add_handoff_after_s2p_audit
      - defer_until_s2p_audited
      - skip
    why: |
      Plausible to add. Source side may need authoring of `purchase_order.approved` in S2P. Schedule S2P audit independently.
  - id: B2-S8
    summary: Missing handoff candidate - GRC -> SAM on vulnerability.published.
    question: |
      When GRC publishes a vulnerability finding tied to a software title, SAM could trigger a deployment scope check. Volume-low; most CVE-to-title mapping happens in VULN-MGMT not GRC. May be redundant with SAM -> VULN-MGMT handoff 36.
    options:
      - defer_redundant
      - add_handoff
      - escalate_to_vuln_mgmt_only
    why: |
      Recommendation: defer; not a true boundary gap.

b3:
  - id: B3-S1
    candidate: 38 new SAM masters across 6 modules from market-surface JSON.
    rationale: |
      Vendor-surface subagent (2026-05-30) enumerated 42 entities across 7 flagships, 38 of which are missing from the current footprint, 4 are wrong-ownership (the existing rollup masters need re-homing into the proposed 6-module shape). Grouped by destination module: SAM-CATALOG +7 (software_editions, software_versions, software_categories, publishers, publisher_product_catalogs, software_normalization_rules, eol_eosl_calendars); SAM-DISCOVERY +3 (discovery_runs, discovery_sources, swid_tags); SAM-ENTITLEMENT +11 (license_contracts, license_terms, license_metrics, license_keys, entitlement_pools, purchase_orders embedded, license_allocations, named_user_assignments, publisher_use_rights, downgrade_rights, second_use_rights); SAM-METERING +8 (usage_meterings, reclamation_requests, license_harvest_jobs, effective_license_positions, compliance_postures, oracle_options_packs, sap_indirect_access_documents, ibm_subcapacity_declarations); SAM-AUDIT +7 (publisher_audits, audit_evidence_packages, audit_findings, audit_responses, audit_response_letters, true_up_events, gdpr_processing_records); SAM-RENEWAL +3 (renewals, renewal_quotes, product_lifecycle_states). 4 modularization-issues callouts noted: true_up_events vs entitlement_pools boundary; license_contracts vs CLM legal_contracts; publisher-specific exotica placement (Oracle/SAP/IBM); no 7th audit-defense module.
    vendor_evidence:
      - {vendor: Flexera, evidence: 1st_class}
      - {vendor: Snow, evidence: 1st_class}
      - {vendor: USU, evidence: 1st_class}
      - {vendor: ServiceNow SAM Pro, evidence: 1st_class}
      - {vendor: Anglepoint, evidence: 1st_class}
      - {vendor: Certero, evidence: 1st_class}
