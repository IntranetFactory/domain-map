    summary: Author 8-12 `data_object_aliases` rows across the 4 SAM masters (B11).
    finding: |
      Zero aliases on any of the 4 SAM masters. Industry-standard synonyms exist and qualify as Rule #18 commerce-layer allowed: `software_titles` ("Software Product Catalog Entry", "Publisher Catalog Item", "Normalized Software Product"); `software_licenses` ("Software Entitlement", "License Certificate", "ELP Record"); `software_installations` ("Software Deployment", "Install Record", "DCR Record"); `license_audits` ("Publisher Audit Case", "Software Audit Engagement", "DCR Submission"). The bulk-insert blocker is that exact `(data_object_id, alias_name)` tuples need user-approved choices since some synonyms ("Software Entitlement") collide with proposed Phase-3 masters.
    blocked_by:
