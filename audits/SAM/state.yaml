b2:
  - id: B2-S1
    summary: Confirm whether the landed 3-module shape stays, or re-splits toward the 6-module vendor-surface target.
    question: |
      The 2026-06-02 modularization landed a focused 3-module shape (201 SAM-CATALOG-DISCOVERY, 202 SAM-ENTITLEMENT-MGMT, 203 SAM-AUDIT-DEFENSE) using only the 6 existing data_objects. The Pass-2 vendor surface argues for 6 modules (SAM-CATALOG, SAM-DISCOVERY, SAM-ENTITLEMENT, SAM-METERING, SAM-AUDIT, SAM-RENEWAL), which is predicated on loading the 38 net-new masters in B3-S1. Keep the 3-module shape, or re-split toward 6 when B3-S1 lands?
    options:
      - keep_3_module_shape
      - resplit_to_6_module_on_b3_load
      - hybrid_4_or_5_module
      - push_back_per_module_boundary
    why: |
      The 3-module shape is correct for today's 6 data_objects (no empty modules, M7 holds, all 5 capabilities placed). The 6-module shape only becomes non-empty once the 38 masters load. The re-split is a build decision tied to B3-S1, not a structural defect today. The natural seams: SAM-CATALOG-DISCOVERY (201) splits into SAM-CATALOG + SAM-DISCOVERY; SAM-ENTITLEMENT-MGMT (202) splits into SAM-ENTITLEMENT + SAM-METERING + SAM-RENEWAL.
  - id: B2-S2
    summary: license_audits pattern flags has_submit_lock and has_single_approver -> true?
    question: |
      `license_audits` (id 60) currently has all 3 pattern flags `false`. Domain knowledge says: once a publisher audit response is submitted, the snapshot is locked (`has_submit_lock=true`); the response is approved by an IT Asset Management lead / CIO before submission (`has_single_approver=true`). Flip both to true?
    options:
      - flip_both_to_true
      - flip_submit_lock_only
      - flip_single_approver_only
      - keep_false
    why: |
      Pattern flags inform the platform-side validation rules and the lifecycle-state-to-permission derivation. Wrong flag values silently mis-shape the deployer's permission set.
  - id: B2-S3
    summary: software_titles and software_installations lifecycle - config-shape exemption or full state machine?
    question: |
      `software_titles` could be config-shape (catalog entry edited occasionally) or have lifecycle (`active`, `eol`, `retired`). `software_installations` could be ephemeral discovery rows or have (`detected`, `verified`, `licensed`, `unlicensed`, `removed`). Per Rule #12 + Rule #15, exemption must be surfaced. Both now live in module 201 (SAM-CATALOG-DISCOVERY).
    options:
      - both_config_shape_exempt
      - both_full_lifecycle
      - titles_full_installations_config
      - titles_config_installations_full
    why: |
      Each path shapes module 201 differently: a config-shape `software_titles` simplifies the catalog slice to a maintained reference table; a full-lifecycle one makes EOL state a first-class workflow event with publishers + audit handoffs.
  - id: B2-S4
    summary: Vendor record refresh - Snow Software acquisition by Insight Enterprises.
    question: |
      Snow Software was acquired by Insight Enterprises in 2024. The `vendors` row reads `vendor_name=Snow Software`; predecessor mention on `solutions.notes` requires explicit user-approved wording per Rule #15.
    options:
      - leave_as_is
      - update_vendor_record
      - approve_predecessor_note_wording_on_solution
    why: |
      Out of scope for routine audit. A5 is opt-in. Surfaced for awareness only.
  - id: B2-S5
    summary: Missing handoff candidate - SAM -> APM on software_title.eol_reached.
    question: |
      SAM publishes `software_title.eol_reached` to GRC (handoff 638) but not to APM. APM's `enterprise_applications` consume `software_titles` via existing relationships (ids 222, 233). An EOL title should propagate to APM so dependent applications get flagged for replacement. Source module would be 201 (SAM-CATALOG-DISCOVERY).
    options:
      - add_apm_subscriber
      - keep_grc_only
      - defer_to_grc_publishes_downstream
    why: |
      The handoff is straightforward to load; the call is whether GRC is the only legitimate subscriber or whether APM is also a subscriber. Recommendation: add APM.
  - id: B2-S6
    summary: PaaS addon licensing scope - in or out of SAM.
    question: |
      Handoff 798 brings `paas_addon.provisioned` from APP-PAAS into SAM. Some PaaS addons (DB, queue, cache) are billable separately and have entitlement structures; others are bundled. Whether SAM models these as `software_installations` or a new `paas_addon_installations` master is a scope decision.
    options:
      - stay_narrow_informational_only
      - extend_sam_to_master_paas_licensing
      - align_with_finops_consumption_master
    why: |
      Choice determines whether B1B-S12's `paas_addons` DMDO row on module 201 is `optional` (recommended) or `required` plus a new master entity.
  - id: B2-S7
    summary: Missing handoff candidate - S2P -> SAM on purchase_order.approved.
    question: |
      When S2P approves a software-license PO, the new `software_licenses` row should auto-create in SAM (target module 202 SAM-ENTITLEMENT-MGMT). Today's shape requires manual entry or a batch sync. Add this handoff to close the purchase-to-entitlement loop?
    options:
      - add_handoff_after_s2p_audit
      - defer_until_s2p_audited
      - skip
    why: |
      Plausible to add. Source side may need authoring of `purchase_order.approved` in S2P. Schedule S2P audit independently.
  - id: B2-S8
    summary: Missing handoff candidate - GRC -> SAM on vulnerability.published.
    question: |
      When GRC publishes a vulnerability finding tied to a software title, SAM could trigger a deployment scope check. Volume-low; most CVE-to-title mapping happens in VULN-MGMT not GRC. May be redundant with SAM -> VULN-MGMT handoff 36.
    options:
      - defer_redundant
      - add_handoff
      - escalate_to_vuln_mgmt_only
    why: |
      Recommendation: defer; not a true boundary gap.
  - id: B2-B9D-OWN-1258
    summary: "Software Asset Management: name an owner for \"Confirm hardware/software operational status\" (no one is responsible for it today)"
    question: |
      Discovery and Service Mapping forwards software installation to Software Asset Management to confirm hardware or software operational status, but Software Asset Management does not yet have anyone assigned to confirm hardware or software operational status, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Software Asset Management owns, and assign a named owner once Software Asset Management sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Software Asset Management decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-SAM.md q11.
    extra_b9d_added: "2026-06-13"
