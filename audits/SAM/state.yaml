    finding: |
      SAM has 5 inbound handoffs whose payloads are not declared as `consumer` in `domain_data_objects`: `enterprise_applications` (267), `discovery_scans` (81), `device_app_assignments` (560), `paas_addons` (467), `legal_contracts` (66). Per Rule #11 and B5/B8 spirit every consumed payload needs an explicit DMDO row. Necessity defaults: `enterprise_applications`, `discovery_scans`, `device_app_assignments` -> required; `paas_addons` -> gated on B2-S6 scope decision; `legal_contracts` -> optional.
