b1a:
  - id: B1A-S14
    summary: PATCH domains.id=52.description to American English (replace `normalisation`, `defence`, `licences`).
    finding: |
      `domains.description` on SAM (id 52) reads `Discovery, normalisation, entitlement reconciliation, and audit defence for software licences.` CLAUDE.md mandates American English in every artifact, including catalog text fields. Three British spellings present: `normalisation`, `defence`, `licences`.
    action: |
      1 PATCH via `semantius call crud postgrestRequest` setting `description` on `/domains?id=eq.52` to `Discovery, normalization, entitlement reconciliation, and audit defense for software licenses.` Verify the column after PATCH; surface the UI link `https://tests.semantius.app/domain_map/domains` for spot check.
    affected_entities:
      - domains.id=52
    extra_pattern: mechanical_patch
    extra_blocking: none

b1b:
  - id: B1B-S1
    summary: Phase A re-author of SAM module shape (4 vs 6 modules) and Bucket-3 38-master load.
    finding: |
      M1 hard-fail persists: 0 `domain_modules` rows for SAM. Per Rule #14 every `domains` row MUST have >=1 `module_kind='full'` row, and with 5 capabilities SAM needs >=2 modules. Two competing shapes are on the table: the Phase-1 4-module shape (SAM-CATALOG, SAM-ENTITLEMENT-MGMT, SAM-DISCOVERY-INVENTORY, SAM-AUDIT-DEFENSE) and the Pass 2 6-module shape (SAM-CATALOG, SAM-DISCOVERY, SAM-ENTITLEMENT, SAM-METERING, SAM-AUDIT, SAM-RENEWAL) backed by the vendor surface. 38 new masters are queued behind whichever shape lands. Blocks B1-S5 (lifecycle states need `domain_module_id`), B1-S9 (B10b backfill needs module FKs), B1-S11 (intra-domain handoffs need module endpoints), F2-F5 (one system skill per module), E1-E6 (role bundles per module).
    blocked_by:
      - {type: user_decision, ref: B2-S1, reason: "4 vs 6 module shape pending user choice"}
      - {type: depends_on, ref: B3-S1, reason: "38 new masters from market-surface JSON queued"}
    affected_modules: []
    affected_masters:
      - {data_object_id: 57, name: software_titles, target_module_id: null, workflow: catalog_substrate}
      - {data_object_id: 58, name: software_licenses, target_module_id: null, workflow: entitlement_lifecycle}
      - {data_object_id: 59, name: software_installations, target_module_id: null, workflow: discovery_inventory}
      - {data_object_id: 60, name: license_audits, target_module_id: null, workflow: audit_defense}
    extra_shape_candidates: ["4_module_phase1", "6_module_pass2"]
  - id: B1B-S3
    summary: Re-point + dedup 3 `software_installations` trigger_events to source-domain masters.
    finding: |
      trigger_events 121 (`software_endpoint.discovered`), 122 (`software_install.detected`), 123 (`software.discovered`) all carry `data_object_id=59` (SAM `software_installations`) but the publishers are different domains: 121 sources from RMM (handoff 145), 122 is SAM's outbound to VULN-MGMT (handoff 36), 123 sources from DISCOVERY (handoff 33). The publisher-attribution rule says the trigger event's `data_object_id` should point at the publisher's master, not SAM's. Re-point 121 to an RMM-mastered data_object (`discovered_devices` or `rmm_agents`); re-point 123 to DISCOVERY-mastered `discovery_scans` (81); keep 122 on SAM 59 (SAM publishes). PATCH handoffs 33 and 145 to reference the new trigger_event_ids.
    blocked_by:
      - {type: user_decision, ref: B2-S3-source, reason: "source-domain master targets and event renames require judgment"}
    affected_events:
      - {id: 121, event_name: software_endpoint.discovered, current_category: signal, proposed_category: signal}
      - {id: 122, event_name: software_install.detected, current_category: signal, proposed_category: signal}
      - {id: 123, event_name: software.discovered, current_category: signal, proposed_category: signal}
    affected_handoffs:
      - {handoff_id: 33, direction: inbound, source_domain: DISCOVERY, target_domain: SAM, trigger_event: software.discovered, payload: software_installations, null_field: target_domain_module_id}
      - {handoff_id: 145, direction: inbound, source_domain: RMM, target_domain: SAM, trigger_event: software_endpoint.discovered, payload: software_installations, null_field: target_domain_module_id}
    extra_dedup_target: software_installations.discovered
  - id: B1B-S4
    summary: Author 10 missing lifecycle trigger_events on license_audits + software_licenses.
    finding: |
      Once lifecycle states land per B1-S5, 10 trigger_events are missing: `license_audit.opened`, `license_audit.evidence_gathered`, `license_audit.submitted`, `license_audit.negotiating`, `license_audit.resolved`, `license_audit.closed` (6 on data_object_id 60); `software_license.activated`, `software_license.renewal_due`, `software_license.renewed`, `software_license.retired` (4 on data_object_id 58). Each carries `event_category` of `lifecycle` or `state_change`. Several become candidate publishers for cross-domain handoffs (e.g. `license_audit.submitted -> S2P` or Legal; `software_license.renewal_due -> S2P`).
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S5, reason: "lifecycle states land first; the events describe transitions on those states"}
    affected_events: []
    extra_count: 10
  - id: B1B-S5
    summary: Author lifecycle states on 2-4 SAM masters (B12 / Rule #12).
    finding: |
      All 4 SAM masters have 0 rows in `data_object_lifecycle_states`. Per Rule #12 every `master + required` data_object needs lifecycle rows OR a config-shape exemption surfaced (Rule #15 forbids the prior auto-write-to-notes carve-out). Two confirmed state machines: `license_audits` (`requested -> evidence_gathering -> submitted [requires_permission, verb=submit_audit] -> negotiating -> resolved`) and `software_licenses` (`pending_purchase -> active -> expiring -> renewing -> renewed | expired | retired`). Two pending: `software_titles` and `software_installations` are candidates for config-shape exemption, gated on B2-S3.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S1, reason: "each lifecycle row carries domain_module_id; depends on B1-S1 modules"}
      - {type: user_decision, ref: B2-S2, reason: "license_audits pattern flags (submit_lock, single_approver) inform state semantics"}
      - {type: user_decision, ref: B2-S3, reason: "software_titles / software_installations exemption decision"}
    affected_masters:
