      in BI-DISTRIBUTION; would shift the 3-module cut to 4.
    vendor_evidence: [Tableau, Power BI, Looker, Sisense, Qlik]
    proposed_module: "BI-EMBEDDED-ANALYTICS (new) or BI-DISTRIBUTION existing"

  - id: B3-6
    candidate: bi_search_artifacts
    rationale: >-
      Search-first analytics: ThoughtSpot Answers, Sigma Ask, Power BI Q&A,
      Tableau Ask Data. Natural-language-to-query persisted artifacts that are
      neither dashboards nor reports. May be a sub-feature of bi_queries (NLQ
