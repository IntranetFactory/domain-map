b2:
  - id: B2-S1
    summary: "Module cut for B1-S1: 2-module vs 3-module vs other."
    question: >-
      Pick the module cut for BI's M1 + A2 fix. (a) 2-module:
      BI-CONTENT-AUTHORING (semantic_metrics + bi_queries + bi_dashboards +
      bi_reports) + BI-CONSUMPTION-DELIVERY (bi_subscriptions + shared/published
      lifecycle). (b) 3-module: BI-SEMANTIC-MODELING (semantic_metrics +
      bi_queries) + BI-VISUALIZATION (bi_dashboards + bi_reports) +
      BI-DISTRIBUTION (bi_subscriptions + alerts + delivery). (c) Other:
      user names the split.
    options: ["2-module", "3-module", "other"]
    why: >-
      Module shape is editorial; both cuts clear the Rule #14 floor. The
      3-module cut maps better to ThoughtSpot / Looker LookML separation;
      2-module maps better to Tableau / Power BI Creator-vs-Viewer personas.
      Decision shapes B1B-S1.
    extra_blocks: [B1B-S1]
    extra_cross_bucket_dependency: "B3-5 (embedded analytics) might shift the cut from 3 to 4 modules; revisit if Phase 0 confirms."

  - id: B2-S3
    summary: "B4 pattern-flag positive re-evaluation per Rule #12 on 5 masters."
    question: >-
      All 5 BI masters carry default-false on has_personal_content /
      has_submit_lock / has_single_approver. Specifically: should
      bi_subscriptions.has_personal_content=true (recipient lists / delivery
      addresses)? bi_reports.has_submit_lock=true (published report freezes
      query reference)? bi_dashboards.has_submit_lock=true (same)?
      semantic_metrics.has_single_approver=true (metric certification typically
      single-data-steward)?
    options: ["per-flag yes", "per-flag no"]
    why: "Pattern flags are workflow-shape judgments the user owns. Default-false is valid but Rule #12 requires positive re-evaluation."

  - id: B2-S4
    summary: "F1 legacy domain-level system skill id 33 (bi-system): keep / plan-delete / delete-now."
    question: >-
      skill_type='system' row id 33 (bi-system) with domain_id=74,
      domain_module_id=NULL, 5 platform-tier query_* skill_tools. Acceptable
      transitional state per F1 pass criterion only while no module-level
      system skill exists. Once B1-S1 lands and BI's modules each ship a
      module-level system skill, id 33 becomes obsolete and the 5 query tools
      re-link to the module-level skills.
    options:
      - "keep as domain landing"
      - "plan delete after module skills"
      - "delete now and rebuild"
    why: "SKILL canonical answer is plan-delete-after-module-skills. Editorial migration debt."
    extra_blocks: [legacy-skill-retirement]

  - id: B2-S5
    summary: "A4 catalog UX backfill: draft catalog_tagline and catalog_description for the BI domain row (Rule #20)."
    question: >-
      domains.catalog_tagline and catalog_description are both empty on the BI
      row. Rule #20 permits backfill on audit when both empty, but requires
      explicit per-row user approval BEFORE write. How would you like to
      proceed? (a) agent drafts buyer-voice wording for user review then write
      on approval, (b) user supplies wording directly, (c) defer.
    options: ["agent drafts", "user supplies", "defer"]
    why: "Buyer voice and exact wording are user-owned; marketing routinely fine-tunes; Rule #20 overwrite-without-approval is forbidden."

b3:
  - id: B3-1
    candidate: bi_workspaces
    rationale: >-
      Universal container that owns RBAC scope, content versioning, and
      content lifecycle. Tableau "Project", Power BI "Workspace", Looker
      "Folder", Qlik "Space", ThoughtSpot "Worksheet group". Phase 0 confirms
      whether this is a first-class master or a derived container (in some
      vendors a permission scope only; in others a billing / capacity unit).
      Likely master.
    vendor_evidence: [Tableau, Power BI, Looker, Qlik, ThoughtSpot]
    proposed_module: "BI-CONTENT-AUTHORING (2-module) or BI-SEMANTIC-MODELING (3-module)"

  - id: B3-2
    candidate: bi_data_sources
    rationale: >-
      Universal: Tableau "Data Source / Connection", Power BI "Dataset
      connection", Looker "Connection", Qlik "Data connection", QuickSight
      "Data source". The published, governed link to a warehouse / database /
      SaaS source, distinct from semantic_metrics. Phase 0 verifies whether
      this collapses into METRICS-LAYER's dimensional_models or is BI-owned at
      the connection-pool layer. Probably BI-owned.
    vendor_evidence: [Tableau, Power BI, Looker, Qlik, QuickSight]
    proposed_module: "BI-CONTENT-AUTHORING (2-module) or BI-SEMANTIC-MODELING (3-module)"

  - id: B3-3
    candidate: bi_alerts
    rationale: >-
      Universal threshold-based push notification distinct from
      bi_subscriptions (event-driven vs. recurring cadence). Tableau
      Data-Driven Alerts, Power BI Alerts, Looker Alerts, Qlik Alerting,
      ThoughtSpot Monitor, Sigma Alerts. Likely master with lifecycle (active,
      paused, triggered, acknowledged).
    vendor_evidence: [Tableau, Power BI, Looker, Qlik, ThoughtSpot, Sigma]
    proposed_module: "BI-CONSUMPTION-DELIVERY (2-module) or BI-DISTRIBUTION (3-module)"

  - id: B3-4
    candidate: bi_calculated_fields
    rationale: >-
      Tableau Calculated Field, Power BI Measure (in-report), Sigma Formula,
      QuickSight Calculated Field. Local-to-report computation distinct from
      semantic_metrics (centrally certified). Phase 0 confirms tighter scope
      means BI-owned.
    vendor_evidence: [Tableau, Power BI, Sigma, QuickSight]
    proposed_module: "BI-CONTENT-AUTHORING (2-module) or BI-VISUALIZATION (3-module)"

  - id: B3-5
    candidate: bi_embed_artifacts
    rationale: >-
      Universal embedded-analytics surface: Tableau Embedded Analytics, Power
      BI Embedded, Looker Embed SDK, Sisense Embed, Qlik Embedded Analytics.
      Distinct from a published dashboard (carries embed-token policy,
