b2:
  - id: B2-S1
    summary: "Module cut for B1B-S1: 2-module vs 3-module vs other."
    question: >-
      Pick the module cut for BI's M1 + A2 fix. (a) 2-module:
      BI-CONTENT-AUTHORING (semantic_metrics + bi_queries + bi_dashboards +
      bi_reports) + BI-CONSUMPTION-DELIVERY (bi_subscriptions + shared/published
      lifecycle). (b) 3-module: BI-SEMANTIC-MODELING (semantic_metrics +
      bi_queries) + BI-VISUALIZATION (bi_dashboards + bi_reports) +
      BI-DISTRIBUTION (bi_subscriptions + alerts + delivery). (c) Other:
      user names the split.
    options: ["2-module", "3-module", "other"]
    why: >-
      Module shape is editorial; both cuts clear the Rule #14 floor. Phase 0
      (2026-06-08) grounds both in named-vendor packaging: the 3-module cut
      (Semantic-Modeling + Visualization + Distribution) maps to the Looker
      LookML model-vs-Look/Dashboard split and the ThoughtSpot Model-vs-Liveboard
      split; the 2-module cut maps to the Tableau Creator-Explorer-Viewer and
      Power BI Pro/PPU/Fabric author-vs-consume license split. Recommended: b
      (3-module), the layer cut is the better default because the modeling work
      is governed by a distinct role across Looker and ThoughtSpot. Decision
      shapes B1B-S1 and unblocks B1A-BUILD.
    extra_blocks: [B1A-BUILD, B1B-S1]
    extra_cross_bucket_dependency: "B3-5 (embedded analytics) shifts the cut from 3 to 4: Phase 0 CONFIRMS embedded analytics is a distinct developer-led buying motion (Power BI Embedded / Sisense / Tableau Next External Embedding SDK), so a 4th Embedded-Analytics module is a vendor-grounded live option (q1 option c)."

  - id: B2-S3
    summary: "B4 pattern-flag positive re-evaluation per Rule #12 on 5 masters."
    question: >-
      All 5 BI masters carry default-false on has_personal_content /
      has_submit_lock / has_single_approver. Specifically: should
      bi_subscriptions.has_personal_content=true (recipient lists / delivery
      addresses)? bi_reports.has_submit_lock=true (published report freezes
      query reference)? bi_dashboards.has_submit_lock=true (same)?
      semantic_metrics.has_single_approver=true (metric certification typically
      single-data-steward)?
    options: ["per-flag yes", "per-flag no"]
    why: "Pattern flags are workflow-shape judgments the user owns. Default-false is valid but Rule #12 requires positive re-evaluation. 3 masters are typed operational_workflow (2026-06-07), so the flags apply per Rule #12. Phase 0 (2026-06-08) backs all four yeses with vendor behavior: subscriptions/scheduled deliveries are recipient-and-address-defined across Power BI/Tableau/Looker/Qlik/ThoughtSpot (PII); published reports and dashboards are reproducible snapshots in all five (submit-lock on the publish gate); metric certification is a single-data-steward sign-off in the governed-metric model (single-approver)."

  - id: B2-S4
    summary: "F1 legacy domain-level system skill id 33 (bi-system): now the canonical domain-grain skill under the supersession; resolve the stale em-dash in its description."
    question: >-
      skill_type='system' row id 33 (bi-system) has domain_id=74,
      domain_module_id=NULL. Under the 2026-06-06 per-domain-skill supersession
      this domain-grain shape is now CANONICAL (one system skill per domain that
      DERIVES its toolset from domain_module_tools), NOT migration debt. The old
      "plan-delete-after-module-skills" framing is RETIRED (per-module system
      skills are canceled). Residual: the description on id 33 contains a
      forbidden em-dash (U+2014). Rewriting a non-empty value is destructive and
      needs your sign-off. Proposed clean description ASCII-only is below.
    options:
      - "approve em-dash fix on id 33 description"
      - "leave as-is"
    proposed_description: >-
      System skill for Business Intelligence and Analytics: runtime workflows
      over the domain's master data, derived from masters and cross-domain
      handoffs.
    why: "Supersession reclassifies id 33 as canonical. The only open action is a destructive overwrite of a non-empty (em-dash-bearing) description, which requires approval per Rule #21."

