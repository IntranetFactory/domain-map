b3:
  - id: B3-CORRECTIVE-ACTION-RECORDS
    candidate: corrective_action_records
    rationale: >
      All flagship vendors carry CAR (Corrective Action Record) as first-class. FSQM models
      food_safety_incidents but not the CAR documents that close out a CCP deviation, allergen
      control failure, or EMP positive. Now placeable: target module FSQM-HACCP-CCP (259).
    vendor_evidence:
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
      - {vendor: Icicle, evidence: 1st_class}
      - {vendor: Intelex Food Safety, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-HACCP-CCP (259)

  - id: B3-VERIFICATION-RECORDS
    candidate: verification_records
    rationale: >
      SQF / BRC GS clauses require a verification log distinct from monitoring (reviewing
      monitoring records, calibration checks, supplier-COA-review verifications). Now placeable:
      target module FSQM-HACCP-CCP (259).
    vendor_evidence:
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
    proposed_module: FSQM-HACCP-CCP (259)

  - id: B3-MOCK-RECALLS
    candidate: mock_recalls
    rationale: >
      TraceGains, SafetyChain, FoodReady all carry mock-recall scheduling and traceback-exercise
      records as distinct entities from recall_events. Now placeable: target module
      FSQM-AUDIT-SUPPLIER (264), which co-locates recall_events (contributor).
    vendor_evidence:
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-AUDIT-SUPPLIER (264)

  - id: B3-EMP-PROGRAMS
    candidate: environmental_monitoring_programs
    rationale: >
      SafetyChain, Safefood 360 carry an EMP program shell separately from individual samples
      (organizes EMP zones, sites, frequencies, pathogens of concern). Now placeable: target
      module FSQM-HYGIENE-CONTROL (263), parent of environmental_monitoring_samples.
    vendor_evidence:
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
    proposed_module: FSQM-HYGIENE-CONTROL (263)

  - id: B3-FOOD-SAFETY-PLANS
    candidate: food_safety_plans
    rationale: >
      FSMA Preventive Controls Rule (21 CFR 117) mandates a Food Safety Plan that supersedes the
      legacy HACCP-only contract. Open question: new master above haccp_plans, or rename
      haccp_plans, depending on whether the catalog wants to model the FSMA terminology shift.
    vendor_evidence:
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-HACCP-CCP (259)

  - id: B3-COA-RECORDS
    candidate: coa_records
    rationale: >
      Per-shipment certificates of analysis are a distinct workflow from supplier_certifications.
      Heavy in food-supplier programs. May belong in FOOD-TRACE or PROC-PARTNER rather than FSQM,
      but several flagship FSQM products carry COA workflows. Phase 0 needed to confirm canonical
      owner.
    vendor_evidence:
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: Trustwell Connect, evidence: 1st_class}
      - {vendor: SafetyChain, evidence: secondary}
    proposed_module: null

  - id: B3-VACCP-TACCP
    candidate: food_fraud_assessments and food_defense_plans
    rationale: >
      VACCP (food fraud vulnerability) and TACCP (food defense, intentional adulteration) are
      statutorily distinct from HACCP (21 CFR 121 for IA, 21 CFR 117 for PC). Routes here for
      vendor confirmation that flagship FSQM products consistently separate the two from HACCP
      rather than folding them in. Gates B2-VACCP-TACCP fold-or-separate decision.
    vendor_evidence:
      - {vendor: Safefood 360, evidence: 1st_class}
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-AUDIT-SUPPLIER (264) or FSQM-HACCP-CCP (259)

