b1a:
  - id: B1A-MODULE-SYSTEM-SKILLS
    summary: "Rule #17 per-module system skills missing on all 3 new FSQM modules; legacy domain-level skill 64 must then be retired (F1/F7)"
    finding: >
      FSQM now has 3 module_kind=full modules (FSQM-HACCP-CCP 259, FSQM-HYGIENE-CONTROL 263,
      FSQM-AUDIT-SUPPLIER 264) but zero module-anchored system skills. Rule #17 requires one
      system skill per domain_module (F2/F3). Legacy skills.id=64 (fsqm-system) remains at
      domain_id=157, domain_module_id=null with 8 skill_tools (7 query_* + 1 send_email); per
      F1 it is obsolete once module-level system skills exist. F7 sub-finding: the send_email
      tool link is unjustified channel-pinning for generic notification flows (incident
      escalation, deviation alert, sample-positive page-out should use notify_person /
      notify_team unless a workflow-specific email-only justification applies).
    action: >
      Sequenced: (1) author one module-level system skill per module 259/263/264 (Rule #17),
      (2) link channel abstractions (notify_person / notify_team) instead of send_email where
      generic, (3) DELETE legacy skill 64 and its 8 skill_tools. M1 is now cured so all three
      steps are unblocked.
    affected_modules: [259, 263, 264]
    affected_entities: [skills(64), skill_tools(skill_id=64; 8 rows)]

  - id: B1A-MODULE-CATALOG-UX
    summary: "M8/A4 catalog UX empty on the 3 new modules and on the FSQM domain row (catalog_tagline + catalog_description)"
    finding: >
      The 3 new domain_modules (259/263/264) were inserted with catalog_tagline and
      catalog_description omitted (empty), and domains.id=157 still carries empty
      catalog_tagline + catalog_description (A4 carried from prior audits). Rule #20 requires
      non-empty buyer-voice tagline (one-liner) and 1-3 paragraph buyer-facing
      catalog_description on the domain; M8 wants the same buyer UX on each catalog-surfaced
      module.
    action: >
      Draft buyer-voice catalog_tagline + catalog_description for the FSQM domain row and for
      each of modules 259/263/264, surface drafts to user before writing (Rule #20 explicit
      user-approval gate).
    affected_modules: [259, 263, 264]

