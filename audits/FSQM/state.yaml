b2:
  - id: B2-GFSI-AUDITS-MASTERSHIP
    summary: "gfsi_audits / certification_audits mastership ownership"
    question: >
      Does FSQM master certification-audit-specific entities (placing them in
      FSQM-AUDIT-SUPPLIER, which currently masters none), or does AUDIT continue to master with
      FSQM as contributor?
    options:
      - "FSQM masters gfsi_audits in FSQM-AUDIT-SUPPLIER (module 264)"
      - "AUDIT continues to master, FSQM stays contributor"
      - "Both - FSQM masters food-safety-specific certification_audits, AUDIT masters generic internal_audits"
    why: >
      Vendors (SafetyChain, Safefood 360) lean FSQM-mastering; generic IT audit-management leans
      AUDIT. FSQM-AUDIT-SUPPLIER (264) currently carries no master; a FSQM-mastered
      certification-audit entity would anchor it on its own master rather than borrowed rows.

  - id: B2-VACCP-TACCP
    summary: "VACCP / TACCP fold-or-separate"
    question: "How do we model food fraud (VACCP) and food defense (TACCP) entities?"
    options:
      - "Single vulnerability_assessments master with a type enum (VACCP / TACCP)"
      - "Two separate masters - food_fraud_assessments and food_defense_plans"
      - "Defer entirely (most SMB food makers do not run formal VACCP/TACCP)"
    why: >
      FSMA Intentional Adulteration Rule (21 CFR 121) mandates a Food Defense Plan; FSMA
      Preventive Controls (21 CFR 117) mandates a Food Fraud Vulnerability Assessment for
      enterprise food brands. Vendor support uneven. Would land in FSQM-AUDIT-SUPPLIER (264) or
      FSQM-HACCP-CCP (259).

  - id: B2-AUDIT-PREP-OVERRIDE
    summary: "business_function_capabilities override for FSQM-AUDIT-PREP capability (469)"
    question: "Add a business_function_capabilities override row for capability 469 that diverges from FSQM's owning GRC function?"
    options:
      - "Yes, override to GRC-Audit sub-function"
      - "Yes, override to QUALITY sub-function under Business Operations"
      - "No, leave on GRC default"
    why: "Audit prep arguably maps better to a GRC-Audit or Operations-Quality sub-function than to the broad GRC compliance owner of FSQM."

  - id: B2-PATTERN-FLAGS
    summary: "Per-master pattern-flag (has_personal_content / has_submit_lock / has_single_approver) values for the 7 FSQM masters (gates B1A-S3)"
