b2:
  - id: B2-GFSI-AUDITS-MASTERSHIP
    summary: "gfsi_audits / certification_audits mastership ownership"
    question: >
      Does FSQM master certification-audit-specific entities (placing them in
      FSQM-AUDIT-SUPPLIER, which currently masters none), or does AUDIT continue to master with
      FSQM as contributor?
    options:
      - "FSQM masters gfsi_audits in FSQM-AUDIT-SUPPLIER (module 264)"
      - "AUDIT continues to master, FSQM stays contributor"
      - "Both - FSQM masters food-safety-specific certification_audits, AUDIT masters generic internal_audits"
    why: >
      Vendors (SafetyChain, Safefood 360) lean FSQM-mastering; generic IT audit-management leans
      AUDIT. FSQM-AUDIT-SUPPLIER (264) currently carries no master; a FSQM-mastered
      certification-audit entity would anchor it on its own master rather than borrowed rows.

  - id: B2-VACCP-TACCP
    summary: "VACCP / TACCP fold-or-separate"
    question: "How do we model food fraud (VACCP) and food defense (TACCP) entities?"
    options:
      - "Single vulnerability_assessments master with a type enum (VACCP / TACCP)"
      - "Two separate masters - food_fraud_assessments and food_defense_plans"
      - "Defer entirely (most SMB food makers do not run formal VACCP/TACCP)"
    why: >
      FSMA Intentional Adulteration Rule (21 CFR 121) mandates a Food Defense Plan; FSMA
      Preventive Controls (21 CFR 117) mandates a Food Fraud Vulnerability Assessment for
      enterprise food brands. Vendor support uneven. Would land in FSQM-AUDIT-SUPPLIER (264) or
      FSQM-HACCP-CCP (259).

  - id: B2-AUDIT-PREP-OVERRIDE
    summary: "business_function_capabilities override for FSQM-AUDIT-PREP capability (469)"
    question: "Add a business_function_capabilities override row for capability 469 that diverges from FSQM's owning GRC function?"
    options:
      - "Yes, override to GRC-Audit sub-function"
      - "Yes, override to QUALITY sub-function under Business Operations"
      - "No, leave on GRC default"
    why: "Audit prep arguably maps better to a GRC-Audit or Operations-Quality sub-function than to the broad GRC compliance owner of FSQM."

  - id: B2-ALIAS-ARBITRATION
    summary: "Per-alias alias_type and solution_id arbitration for B11 cluster"
    question: "Per-master, which alias rows do we load (alias_name + alias_type + solution_id)?"
    options:
      - "Author full cluster from SafetyChain / TraceGains / Safefood 360 / FSMA / GFSI scheme terminology (agent drafts the table for user review)"
      - "Author only statutory anchors (Food Safety Plan, EMP / PEM) and defer vendor synonyms"
      - "Defer entirely"
    why: "alias_type discriminator and the linking solution_id (for vendor-specific synonyms) need per-row resolution before load."

  - id: B2-APQC-APPROVAL
    summary: "Per-row record_status flip on 15 agent_curated handoff_processes rows"
    question: "Which of the 15 rows (ids 359, 573, 574, 606, 607, 608, 609, 610, 611, 612, 613, 614, 615, 683, 684) does the reviewer mark approved? Two duplicated handoffs (975 has 608 + 683; 979 has 612 + 684) need de-duplication or accept-both decision."
    options:
      - "Approve all 15 (treat both layers on 975/979 as additive)"
      - "Approve curated layer only (606-615 + 359/573/574), reject duplicates 683/684"
      - "Approve duplicate layer (683/684) and DELETE original on 975/979"
      - "Mark all rejected, re-curate later"
    why: "Rule #1 record_status default is new; flipping to approved requires explicit per-load user sign-off."

b3:
  - id: B3-CORRECTIVE-ACTION-RECORDS
    candidate: corrective_action_records
    rationale: >
      All flagship vendors carry CAR (Corrective Action Record) as first-class. FSQM models
      food_safety_incidents but not the CAR documents that close out a CCP deviation, allergen
      control failure, or EMP positive. Now placeable: target module FSQM-HACCP-CCP (259).
    vendor_evidence:
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
      - {vendor: Icicle, evidence: 1st_class}
      - {vendor: Intelex Food Safety, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-HACCP-CCP (259)

  - id: B3-VERIFICATION-RECORDS
    candidate: verification_records
    rationale: >
      SQF / BRC GS clauses require a verification log distinct from monitoring (reviewing
      monitoring records, calibration checks, supplier-COA-review verifications). Now placeable:
      target module FSQM-HACCP-CCP (259).
    vendor_evidence:
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
    proposed_module: FSQM-HACCP-CCP (259)

  - id: B3-MOCK-RECALLS
    candidate: mock_recalls
    rationale: >
      TraceGains, SafetyChain, FoodReady all carry mock-recall scheduling and traceback-exercise
      records as distinct entities from recall_events. Now placeable: target module
      FSQM-AUDIT-SUPPLIER (264), which co-locates recall_events (contributor).
    vendor_evidence:
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-AUDIT-SUPPLIER (264)

  - id: B3-EMP-PROGRAMS
    candidate: environmental_monitoring_programs
    rationale: >
      SafetyChain, Safefood 360 carry an EMP program shell separately from individual samples
      (organizes EMP zones, sites, frequencies, pathogens of concern). Now placeable: target
      module FSQM-HYGIENE-CONTROL (263), parent of environmental_monitoring_samples.
    vendor_evidence:
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
    proposed_module: FSQM-HYGIENE-CONTROL (263)

  - id: B3-FOOD-SAFETY-PLANS
    candidate: food_safety_plans
    rationale: >
      FSMA Preventive Controls Rule (21 CFR 117) mandates a Food Safety Plan that supersedes the
      legacy HACCP-only contract. Open question: new master above haccp_plans, or rename
      haccp_plans, depending on whether the catalog wants to model the FSMA terminology shift.
    vendor_evidence:
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-HACCP-CCP (259)

  - id: B3-COA-RECORDS
    candidate: coa_records
    rationale: >
      Per-shipment certificates of analysis are a distinct workflow from supplier_certifications.
      Heavy in food-supplier programs. May belong in FOOD-TRACE or PROC-PARTNER rather than FSQM,
      but several flagship FSQM products carry COA workflows. Phase 0 needed to confirm canonical
      owner.
    vendor_evidence:
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: Trustwell Connect, evidence: 1st_class}
      - {vendor: SafetyChain, evidence: secondary}
    proposed_module: null

  - id: B3-VACCP-TACCP
    candidate: food_fraud_assessments and food_defense_plans
    rationale: >
      VACCP (food fraud vulnerability) and TACCP (food defense, intentional adulteration) are
      statutorily distinct from HACCP (21 CFR 121 for IA, 21 CFR 117 for PC). Routes here for
      vendor confirmation that flagship FSQM products consistently separate the two from HACCP
      rather than folding them in. Gates B2-VACCP-TACCP fold-or-separate decision.
    vendor_evidence:
      - {vendor: Safefood 360, evidence: 1st_class}
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-AUDIT-SUPPLIER (264) or FSQM-HACCP-CCP (259)

