      - {handoff_id: 976, direction: outbound, source_domain: FSQM, target_domain: FOOD-TRACE, trigger_event: critical_control_point.deviation, payload: critical_control_points, null_field: source_domain_module_id}
      - {handoff_id: 977, direction: outbound, source_domain: FSQM, target_domain: GRC, trigger_event: allergen_program.violation_detected, payload: allergen_programs, null_field: source_domain_module_id}
      - {handoff_id: 978, direction: outbound, source_domain: FSQM, target_domain: FOOD-TRACE, trigger_event: environmental_monitoring_sample.positive, payload: environmental_monitoring_samples, null_field: source_domain_module_id}
      - {handoff_id: 979, direction: outbound, source_domain: FSQM, target_domain: MFG-OPS, trigger_event: sanitation_record.completed, payload: sanitation_records, null_field: source_domain_module_id}
      - {handoff_id: 980, direction: outbound, source_domain: FSQM, target_domain: AUDIT, trigger_event: haccp_plan.approved, payload: haccp_plans, null_field: source_domain_module_id}
