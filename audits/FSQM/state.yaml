b2:
  - id: B2-MODULE-SHAPE
    summary: Module split shape decision unlocks every M-band cascade
    question: Which module split do we author for FSQM (6 capabilities, $800M USA market, certification_required)?
    options:
      - 4 modules (recommended) - FSQM-HACCP, FSQM-CCP-MONITORING, FSQM-INCIDENT-RECALL, FSQM-CORE
      - 6 modules - FSQM-HACCP, FSQM-CCP-MONITORING, FSQM-INCIDENT-RECALL, FSQM-ALLERGEN-CONTROL, FSQM-EMP, FSQM-SANITATION (plus optional FSQM-AUDIT-PREP)
      - 3-module starter - FSQM-HACCP-MONITORING (covers HACCP + CCP), FSQM-INCIDENT-RECALL, FSQM-CORE
      - 1 starter + 2 full - FSQM-LITE starter plus 2 full modules
    why: Rule #14 requires >=2 module_kind=full for 6-capability domain. M-band cascade (M2/M4/M5/M6/M7/M8/B9b/B10b/E1-E6/F2-F5) cannot proceed until shape chosen.

  - id: B2-GFSI-AUDITS-MASTERSHIP
    summary: gfsi_audits / certification_audits mastership ownership
    question: Does FSQM master certification-audit-specific entities, or does AUDIT continue to master with FSQM as contributor?
    options:
      - FSQM masters gfsi_audits (part of FSQM-AUDIT-PREP module if separate, otherwise FSQM-CORE)
      - AUDIT continues to master, FSQM stays contributor
      - Both - FSQM masters food-safety-specific certification_audits, AUDIT masters generic internal_audits
    why: Vendors (SafetyChain, Safefood 360) lean FSQM-mastering; generic IT audit-management leans AUDIT. Decision gates Bucket 1 cross-domain relationship rows for FSQM-AUDIT-PREP slice.

  - id: B2-VACCP-TACCP
    summary: VACCP / TACCP fold-or-separate
    question: How do we model food fraud (VACCP) and food defense (TACCP) entities?
    options:
      - Single vulnerability_assessments master with a type enum (VACCP / TACCP)
      - Two separate masters - food_fraud_assessments and food_defense_plans
      - Defer entirely (most SMB food makers do not run formal VACCP/TACCP)
    why: FSMA Intentional Adulteration Rule (21 CFR 121) mandates Food Defense Plan; FSMA Preventive Controls (21 CFR 117) mandates Food Fraud Vulnerability Assessment for enterprise food brands. Vendor support uneven.

  - id: B2-AUDIT-PREP-OVERRIDE
    summary: business_function_capabilities override for FSQM-AUDIT-PREP capability (469)
    question: Add a business_function_capabilities override row for FSQM-AUDIT-PREP that diverges from FSQM's owning GRC function?
    options:
      - Yes, override to GRC-Audit sub-function
      - Yes, override to QUALITY sub-function under Business Operations
      - No, leave on GRC default
    why: Audit prep arguably maps better to a GRC-Audit or Operations-Quality sub-function than to the broad GRC compliance owner of FSQM.

  - id: B2-CATALOG-PROSE
    summary: Author exact catalog_tagline and catalog_description strings for FSQM domain row
    question: Approve agent-drafted buyer-voice catalog_tagline (single sentence) and catalog_description (1-3 paragraphs) for the domain row?
    options:
      - Approve agent draft
      - Approve with edits (user supplies wording)
      - Decline (defer)
    why: Rule #20 explicit user-approval gate prevents agent from writing prose unilaterally; A4 cure depends on it.

  - id: B2-ALIAS-ARBITRATION
    summary: Per-alias alias_type and solution_id arbitration for B11 cluster
    question: Per-master, which alias rows do we load (alias_name + alias_type + solution_id)?
    options:
      - Author full cluster from SafetyChain / TraceGains / Safefood 360 / FSMA / GFSI scheme terminology (agent drafts the table for user review)
      - Author only statutory anchors (Food Safety Plan, EMP / PEM) and defer vendor synonyms
      - Defer entirely
    why: alias_type discriminator and the linking solution_id (for vendor-specific synonyms) need per-row resolution before load.

  - id: B2-APQC-APPROVAL
    summary: Per-row record_status flip on 15 agent_curated handoff_processes rows
    question: Which of the 15 rows (ids 359, 573, 574, 606, 607, 608, 609, 610, 611, 612, 613, 614, 615, 683, 684) does the reviewer mark approved? Two duplicated handoffs (975 has 608 + 683; 979 has 612 + 684) need de-duplication or accept-both decision.
    options:
      - Approve all 15 (treat both layers on 975/979 as additive)
      - Approve curated layer only (606-615 + 359/573/574), reject duplicates 683/684
      - Approve duplicate layer (683/684) and DELETE original on 975/979
      - Mark all rejected, re-curate later
    why: Rule #1 record_status default is new; flipping to approved requires explicit per-load user sign-off.

b3:
  - id: B3-FOOD-SAFETY-PLANS
    candidate: food_safety_plans
    rationale: FSMA Preventive Controls Rule (21 CFR 117) mandates a Food Safety Plan that supersedes the legacy HACCP-only contract. Open question - new master above haccp_plans, or rename haccp_plans to food_safety_plans, depending on whether the catalog wants to model the FSMA terminology shift.
    vendor_evidence:
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-HACCP (or FSQM-CORE under 4-module shape)

  - id: B3-COA-RECORDS
    candidate: coa_records
    rationale: Per-shipment certificates of analysis are a distinct workflow from supplier_certifications. Heavy in food-supplier programs. May belong in FOOD-TRACE or PROC-PARTNER rather than FSQM, but several flagship FSQM products carry COA workflows. Phase 0 needed to confirm canonical owner.
    vendor_evidence:
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: Trustwell Connect, evidence: 1st_class}
      - {vendor: SafetyChain, evidence: secondary}
    proposed_module: null

  - id: B3-VACCP-TACCP
    candidate: food_fraud_assessments and food_defense_plans
    rationale: VACCP (food fraud vulnerability) and TACCP (food defense, intentional adulteration) are statutorily distinct from HACCP (21 CFR 121 for IA, 21 CFR 117 for PC). Routes here for vendor confirmation that flagship FSQM products consistently separate the two from HACCP rather than folding them in. Bucket 2 #3 fold-or-separate decision depends on this evidence.
    vendor_evidence:
      - {vendor: Safefood 360, evidence: 1st_class}
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: FoodReady, evidence: 1st_class}
    proposed_module: FSQM-CORE (under 4-module shape) or FSQM-AUDIT-PREP

