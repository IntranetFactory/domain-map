      critical_control_points defined->active->deactivated; ccp_measurements
      recorded->reviewed->in_deviation->corrected; food_safety_incidents
      opened->under_investigation->contained->corrected->closed (escalated branch);
      allergen_programs draft->approved->active->suspended; environmental_monitoring_samples
      collected->in_lab->result_received->adverse->re_sampled->closed; sanitation_records
      scheduled->in_progress->completed->verified->failed. Mark workflow-gate states
      requires_permission=true.
    affected_masters:
      - {data_object_id: 507, name: haccp_plans, target_module_id: 259, workflow: "draft->reviewed->approved->in_effect->superseded->archived"}
      - {data_object_id: 508, name: critical_control_points, target_module_id: 259, workflow: "defined->active->deactivated"}
      - {data_object_id: 509, name: ccp_measurements, target_module_id: 259, workflow: "recorded->reviewed->in_deviation->corrected"}
      - {data_object_id: 510, name: food_safety_incidents, target_module_id: 259, workflow: "opened->under_investigation->contained->corrected->closed; escalated branch to recall"}
      - {data_object_id: 511, name: allergen_programs, target_module_id: 263, workflow: "draft->approved->active->suspended"}
      - {data_object_id: 512, name: environmental_monitoring_samples, target_module_id: 263, workflow: "collected->in_lab->result_received->adverse->re_sampled->closed"}
      - {data_object_id: 513, name: sanitation_records, target_module_id: 263, workflow: "scheduled->in_progress->completed->verified->failed"}

  - id: B1A-S3
    summary: "B4 pattern-flag review on 7 FSQM masters (has_personal_content / has_submit_lock / has_single_approver all default false)"
    finding: >
      All 7 FSQM masters (507, 508, 509, 510, 511, 512, 513) carry all three pattern flags as
