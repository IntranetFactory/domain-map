    vendor_evidence:
      - Salsify PXM
      - Syndigo CXH
      - Akeneo PIM
    proposed_module: PIM-PRODUCT-CONTENT

  - id: B3-PIM-TRANSLATION-MEMORY
    candidate: pim_translation_memory
    rationale: |
      Most enterprise PIMs (inRiver, Stibo, Contentserv, Akeneo Enterprise) maintain a translation-memory store distinct from the per-row translation overrides; machine-translation suggestions and post-edit corrections flow through it.
    vendor_evidence:
      - inRiver PIM
      - Stibo Systems STEP
      - Contentserv PIM
      - Akeneo PIM
    proposed_module: PIM-PRODUCT-CONTENT

