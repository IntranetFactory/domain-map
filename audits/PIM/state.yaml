b2:
  - id: B2-S1
    summary: M7 architectural choice for PIM module deployability (DESTRUCTIVE on resolve)
    question: |
      Resolve M7 within-domain incoherence on 4 sibling consumer DMDO rows (709, 712, 713, 714). Default is DELETE all 4 (sibling modules read pim_products / pim_translations / pim_digital_assets via canonical master). Alternative is PROMOTE each to embedded_master (each sibling module ships a standalone-deployable shell so the module is installable without its master sibling). Standalone PIM-SYNDICATION without PIM-PRODUCT-CONTENT has no products to syndicate; standalone PIM-DIGITAL-ASSETS without PIM-PRODUCT-CONTENT has no products to depict.
    options:
      - "DELETE all 4 sibling consumer DMDOs"
      - "PROMOTE all 4 to embedded_master"
      - "Mixed (specify per-row)"
    why: |
      M7 hard-fails this within-domain pattern. The deployability strategy (standalone-deployable per module vs canonical-only) is an architectural call the user owns. Resolving it is DESTRUCTIVE (DELETE or role-overwrite), so it stays a user decision.

  - id: B2-S2
    summary: DAM domain overlap with PIM-DIGITAL-ASSETS module
    question: |
      DAM (id 92) is a loaded domain with zero domain_modules. PIM-DIGITAL-ASSETS module 142 hosts pim_digital_assets as master and overlaps the dedicated DAM market.
    options:
      - "(a) Keep PIM-DIGITAL-ASSETS; DAM stays placeholder"
      - "(b) Move pim_digital_assets to DAM; retire PIM-DIGITAL-ASSETS"
      - "(c) Both coexist; clarify split in domains.description"

  - id: B2-S4
    summary: B3 pattern flag positive re-evaluation for pim_digital_assets
    question: |
      pim_digital_assets currently has has_personal_content=false and has_single_approver=false. (a) Should has_personal_content flip to true if assets include people / model releases (rights metadata)? (b) Should has_single_approver flip to true for rights-cleared assets where a single brand-rights owner closes the approval? Both are overwrites of an existing non-empty boolean, so they stay a user decision.
    options:
      - "Per-flag yes/no decision"

  - id: B2-S6
    summary: Regulation ownership for PIM vs PLM-COMPLIANCE
    question: |
      Which domain holds the domain_regulations linkage for REACH, RoHS, Prop 65, GS1 GDSN, EU GPSR, FDA Cosmetic Labeling, EU DPP? PLM-COMPLIANCE (69) already owns product_compliance_declarations (805) and feeds PIM via inbound 1243.
    options:
      - "(a) PLM owns; PIM consumes via handoff 1243"
      - "(b) PIM links the same regulation rows via domain_regulations (overlap acceptable)"
      - "(c) Split: REACH / RoHS / Prop 65 to PLM (engineering); GS1 GDSN / EU GPSR / EU DPP to PIM (merchandising channel)"

  - id: B2-S7
    summary: PIM to PLM handoff on pim_product.discontinued
    question: |
      Should PIM-PRODUCT-CONTENT publish pim_product.discontinued back to PLM so engineering can clear active-merchandising flags on its parts?
    options:
      - "(a) Add the handoff"
      - "(b) Skip (PLM does not need the signal in practice)"

  - id: B2-S9
    summary: C2 capability ownership override for PIM-PRODUCT-COMPLIANCE
    question: |
      No business_function_capabilities overrides exist for PIM. The PIM-PRODUCT-COMPLIANCE capability (601) is the plausible diverger from Marketing ownership; in many orgs the compliance capability rolls up to Quality / Compliance rather than Marketing.
    options:
      - "(a) Add override row mapping PIM-PRODUCT-COMPLIANCE to Quality / Compliance business function"
      - "(b) Leave under Marketing"
      - "(c) Add override to Product Management (already a domain contributor)"

  - id: B2-B9D-OWN-1845
    summary: "Product Information Management: name an owner for \"Design and manage product data, design, and bill of materials\" (no one is responsible for it today)"
    question: |
      Product Lifecycle Management forwards pim product to Product Information Management to design and manage product data, design, and bill of materials, but Product Information Management does not yet have anyone assigned to design and manage product data, design, and bill of materials, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Product Information Management owns, and assign a named owner once Product Information Management sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Product Information Management decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-PIM.md q10.
    extra_b9d_added: "2026-06-13"

