b2:
  - id: B2-S1
    summary: "C1 functional ownership: add a contributor / consumer row beyond the sole Security Operations Center owner?"
    question: |
      The single business_function_domains row on SOAR (function id 64, Security
      Operations Center, responsibility_type='owner') still exists (verified live
      2026-06-07) and omits Risk and Compliance contributorship (SEC 8-K 4-day
      clock and state breach-notification statutes) and IT Operations consumption
      (SOAR playbooks call ITSM major-incident routines for cross-tower
      escalations). Whether to add either or both is a buyer-persona judgment.
    options:
      - "(a) Add Risk and Compliance (or equivalent) as contributor"
      - "(b) Add IT Operations as consumer"
      - "(c) Add both"
      - "(d) Leave as-is (SOC ownership sufficient)"
    why: "Buyer-side practice differs (mature SOCs run SOAR autonomously; regulated industries enforce GRC sign-off)."

  - id: B2-S2
    summary: "domain_regulations: record SEC 8-K cyber-incident disclosure and state breach-notification statutes against SOAR?"
    question: |
      Zero domain_regulations rows for SOAR (verified live 2026-06-07). SOAR is
      not the regulator's product target (the regulations apply to the company),
      but the SOAR product structurally enforces the 4-day SEC 8-K clock and
      produces the audit trail the disclosure depends on. Recording these as
      buyer-side applicability is a Phase-C editorial decision.
    options:
      - "(a) Add SEC 8-K (Cyber Disclosure) and state breach-notification statutes with applicability='consumer-system-inherited' (or equivalent)"
      - "(b) Add only SEC 8-K"
      - "(c) Add none (regulations belong on producing domains DLP / SECOPS, not SOAR)"
      - "(d) Surface to user as analytics only, no catalog rows"
    why: "No SOAR-specific regulator; the question is whether to inherit substrate obligations onto the SOAR row for downstream filtering."

  - id: B2-S3
    summary: "Keystone build gate: approve the researched 3-module shape (Phase 0 DONE 2026-06-13), or change it?"
    question: |
      Phase 0 vendor-surface research has been RUN this pass (report:
      .tmp_deploy/SOAR-phase0-2026-06-13.md). The remaining decision is the
      build go/no-go on the researched shape, not whether to research. The
      market is genuinely three-shaped (Splunk SOAR alert/Container-centric;
      Cortex XSOAR + ServiceNow SIR incident-centric; Tines Stories / Torq
      Workflows workflow-DAG-centric), so the authoring master is named
      generically (security_playbooks with a workflow/story alias). Two
      eyeball-shape corrections the evidence forces:
        1. integration_connectors lives INSIDE SOAR-PLAYBOOK-AUTHORING (a
           first-class versioned authored surface: XSOAR Marketplace Content
           Packs, Splunk Apps, Torq/Swimlane integration catalogs all version
           connectors), NOT its own top-level module and NOT loose playbook
           config. Tines is the lone thin-connector exception.
        2. security_cases FOLDS INTO security_incidents (one master). XSOAR
           Incident, ServiceNow SIR Security Incident, and Splunk Container each
           serve as both case and incident in one record; the literal-Cases
           vendors (Tines, Torq HyperSOC, ThreatConnect) use Cases as the primary
           investigation container, not a tier below an incident. Drop the
           separate security_cases entity.
      SEC 8-K / breach-notification trails are Compliance-class field sets +
      tasks on the incident plus an audit-log entity, not new masters.
    options:
      - "(a) Build the researched 3-module shape now (Authoring with connectors folded in; Runtime; Case-Mgmt with one security_incidents master)"
      - "(b) Keep researching / defer the build"
      - "(c) Build a different shape (user specifies)"
    why: "Vendor schema divergence shaped the modularization; the research (named-vendor evidence inline in q-SOAR.md q1) settles connectors-placement and case-vs-incident. Now a go/no-go on the shape."
    extra_phase0_report: ".tmp_deploy/SOAR-phase0-2026-06-13.md"
    extra_corrected_modules: [SOAR-PLAYBOOK-AUTHORING, SOAR-AUTOMATION-RUNTIME, SOAR-CASE-MGMT]
    extra_corrected_masters: [security_playbooks, playbook_steps, playbook_versions, integration_connectors, automation_runs, automation_run_steps, automation_artifacts, automation_run_logs, security_incidents, case_tasks, case_evidence, case_timelines, case_notes, indicator_of_compromise_records]

