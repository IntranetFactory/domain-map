b2:
  - id: B2-S1
    summary: "C1 functional ownership: add a contributor / consumer row beyond the sole Security Operations Center owner?"
    question: |
      The single business_function_domains row on SOAR (function id 64, Security Operations Center, responsibility_type='owner')
      omits Risk and Compliance contributorship (SEC 8-K 4-day clock and state breach-notification statutes)
      and IT Operations consumption (SOAR playbooks call ITSM major-incident routines for cross-tower escalations).
      Whether to add either or both is a buyer-persona judgment.
    options:
      - "(a) Add Risk and Compliance (or equivalent) as contributor"
      - "(b) Add IT Operations as consumer"
      - "(c) Add both"
      - "(d) Leave as-is (SOC ownership sufficient)"
    why: "Buyer-side practice differs (mature SOCs run SOAR autonomously; regulated industries enforce GRC sign-off)."

  - id: B2-S2
    summary: "domain_regulations: record SEC 8-K cyber-incident disclosure and state breach-notification statutes against SOAR?"
    question: |
      Zero domain_regulations rows for SOAR. SOAR is not the regulator's product target (the regulations apply to the company),
      but the SOAR product structurally enforces the 4-day SEC 8-K clock and produces the audit trail the disclosure depends on.
      Recording these as buyer-side applicability is a Phase-C editorial decision.
    options:
      - "(a) Add SEC 8-K (Cyber Disclosure) and state breach-notification statutes with applicability='consumer-system-inherited' (or equivalent)"
      - "(b) Add only SEC 8-K"
      - "(c) Add none (regulations belong on producing domains DLP / SECOPS, not SOAR)"
      - "(d) Surface to user as analytics only, no catalog rows"
    why: "No SOAR-specific regulator; the question is whether to inherit substrate obligations onto the SOAR row for downstream filtering."

  - id: B2-S3
    summary: "Phase 0 vendor research vs eyeball-mode before B1-S1 Phase-A authoring?"
    question: |
      Splunk SOAR (alert-centric), Cortex XSOAR (playbook-centric), and Tines / Torq (workflow-DAG-centric) diverge enough in
      canonical schema that the agent's eyeball-mode entity list will mis-shape the modularization (specifically:
      should security_cases master in a third module or fold into security_incidents? does integration_connectors warrant
      its own module per the marketplace-shape of Splunk Apps / XSOAR Marketplace / Tines Stories?).
      A formal Phase 0 subagent pass against public schemas + API references is the recommended gate.
    options:
      - "(a) Vetted route: spawn a formal Phase 0 subagent against Splunk SOAR / Cortex XSOAR / Tines / Torq / Swimlane public docs, save the surface JSON, then run Phase A"
      - "(b) Eyeball route: accept the agent's proposed 3-module split (SOAR-PLAYBOOK-AUTHORING / SOAR-AUTOMATION-RUNTIME / SOAR-CASE-MGMT) and load"
      - "(c) Defer Phase A authoring entirely until Phase 0 lands"
    why: "Vendor schema divergence is large enough to shape modularization differently per chosen reference."

  - id: B2-S4
    summary: "B1-S2 catalog UX copy: supply tagline and description text per Rule #20 and Rule #15."
    question: |
      catalog_tagline and catalog_description on domains id 12 are empty.
      Rule #20 requires buyer-voice copy (workflow + value, no vendor names per Rule #18, no analyst voice).
      Rule #15 forbids the agent from auto-populating any prose without explicit user-approved wording.
      Please supply the exact text, or ask the agent to propose a draft for your review.
    options:
      - "(a) Provide tagline + description text directly"
      - "(b) Ask the agent to propose a draft for review"
      - "(c) Defer until after Phase A modules land (description benefits from concrete module names)"
    why: "Rule #15 / Rule #20 forbid the agent from writing prose without per-row approval."

