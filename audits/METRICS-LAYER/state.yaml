b2:
  - id: B2-MODULE-SPLIT
    summary: module split shape for METRICS-LAYER (carry from 2026-05-30 B2-1); gates the structural cascade
    question: Adopt the recommended 3-module split (METRICS-LAYER-DEFINITIONS + METRICS-LAYER-COMPUTE + METRICS-LAYER-DELIVERY), or a 2-module split (CORE + DELIVERY), or a 4-module split (split GOVERNANCE off as its own module)?
    options:
      - 3-module split (recommended) balances vendor-shape vs. enterprise-buyer-shape; each module's capability set non-trivial
      - 2-module split (CORE + DELIVERY) mirrors Cube and dbt packaging the semantic layer as one unit and delivery as a sidecar
      - 4-module split (DEFINITIONS + COMPUTE + GOVERNANCE + DELIVERY) cleanest match to enterprise-buyer org charts (separate data-governance team)
    why: Gates B1B-M1 (modules), B1B-B10b (handoff module FK backfill), B1B-B12 (lifecycle states module attribution), B1B-F1 (legacy skill retire), B1B-F2 (module-anchored skills).
    affected_modules: []
    affected_masters:
      - {data_object_id: 252, name: metric_definitions, target_module_id: null, workflow: definition}
      - {data_object_id: 253, name: dimensional_models, target_module_id: null, workflow: model-publication}
      - {data_object_id: 709, name: metric_materializations, target_module_id: null, workflow: materialization-refresh}
      - {data_object_id: 710, name: query_lineage_records, target_module_id: null, workflow: lineage-capture}
      - {data_object_id: 711, name: metric_access_policies, target_module_id: null, workflow: policy-lifecycle}

  - id: B2-PATTERN-FLAGS
    summary: pattern flag positive re-evaluation per Rule #12 / B4 across 4 candidate flips on 3 masters
    question: Apply the following pattern flag flips? metric_definitions.has_submit_lock=true (certified metric immutable until re-drafted in Cube and dbt). metric_definitions.has_single_approver=true (certification typically gated on a single data-product owner). metric_access_policies.has_single_approver=true (policy activation typically single approval). dimensional_models.has_submit_lock=true (published model immutable while live consumers point at it).
    options:
      - Approve all four flips
      - Approve a subset (specify per flag)
      - Decline all (flags stay false)
    why: Pattern flags are workflow-shape judgments the user owns; defaults-to-false do not establish review. No notes write either way (Rule #15).
    affected_masters:
      - {data_object_id: 252, name: metric_definitions, target_module_id: null, workflow: definition}
      - {data_object_id: 253, name: dimensional_models, target_module_id: null, workflow: model-publication}
      - {data_object_id: 711, name: metric_access_policies, target_module_id: null, workflow: policy-lifecycle}

  - id: B2-CATALOG-UX
    summary: A4 catalog_tagline and catalog_description wording for the METRICS-LAYER domain row (Rule #20)
    question: Approve wording for the two A4 fields on domains.id=137? Recommended tagline (carry from 2026-05-30 B2-3) is "Define your business metrics once and serve them to every dashboard, agent, and app." Recommended description is 3 paragraphs (problem of metric drift, the metrics-layer surface, buyer value).
    options:
      - Approve the recommended draft as is
      - Approve with edits (user supplies revised wording)
      - Defer indefinitely (A4 stays failing)
    why: Rule #20 forbids the agent writing catalog_tagline or catalog_description without explicit per-row user approval; once a value exists, never overwrite without per-row approval.
    affected_entities: [domains:METRICS-LAYER]

  - id: B2-NAMING-ARBITRATION
    summary: naming arbitration on the 5 prefixed masters under Rule #9
    question: Keep the 5 masters as is (metric_definitions, dimensional_models, metric_materializations, query_lineage_records, metric_access_policies) with is_canonical_bare_word=false, OR rename metric_definitions to bare metrics with the canonical claim, OR rename to semantic_metric_definitions?
    options:
      - Keep as is (recommended; preserves bare metrics for any future BI-owned aggregated-table master)
      - Rename metric_definitions to metrics with is_canonical_bare_word=true and naming_authority_rationale
      - Rename to semantic_metric_definitions (lengthens for no gain)
    why: All five names are prefixed-style with no live collision today. The bare word metrics may matter to BI / DATA-AI-PLAT for a future aggregated-tables master.
    affected_masters:
      - {data_object_id: 252, name: metric_definitions, target_module_id: null, workflow: definition}

  - id: B2-LOOKER-RECLASSIFICATION
    summary: Looker coverage_level on METRICS-LAYER (currently secondary)
    question: Keep Looker (solution id 352) at coverage_level=secondary on METRICS-LAYER, OR promote to primary because LookML is the metrics-layer surface and Looker bundles the BI surface on top?
    options:
      - Keep secondary (recommended; Looker is sold and bought primarily as a BI tool)
      - Promote to primary (LookML IS the metrics-layer surface)
    why: Decision affects how the catalog ranks Looker against the dedicated headless-BI vendors (Cube, dbt, AtScale, etc.) in BI / METRICS-LAYER cross-references.
    affected_entities: [solutions:Looker]
    vendor_evidence: [Looker]

  - id: B2-DCG-INBOUND-TAG
    summary: handoff 220 (DCG to METRICS-LAYER on metric.deprecated) carries false-positive discovery_substring tag on process 505
    question: How to handle the false-positive discovery_substring row on handoff 220 pointing at process 505 Establish baseline metrics? Rule #1 forbids the agent flipping record_status to rejected without explicit user instruction.
    options:
      - Leave at record_status=new for the reviewer to mark rejected later (default per Rule #1)
      - Explicitly approve PATCH to record_status=rejected and authorize agent to insert a new agent_curated tag in its place
      - Authorize agent to insert a new agent_curated tag alongside (both rows coexist; reviewer picks)
    why: Rule #1 requires explicit instruction for any record_status flip other than new; the agent cannot self-resolve.
    affected_handoffs:
      - {handoff_id: 220, direction: inbound, source_domain: DCG, target_domain: METRICS-LAYER, trigger_event: metric.deprecated, payload: metric_definitions, null_field: agent_curated_tag}

b3:
  - id: B3-METRIC-VIEWS
    candidate: metric_views
    rationale: Cube and dbt MetricFlow both ship a "metric view" or "saved query" concept (named pre-bundled metric plus dimension plus filter combo a consumer asks for by name). Distinct from metric_definitions (formula) and metric_materializations (precomputed grain).
    vendor_evidence: [Cube Cloud, dbt Semantic Layer]
    proposed_module: METRICS-LAYER-DELIVERY

  - id: B3-METRIC-CONSUMERS
    candidate: metric_consumers
    rationale: AtScale and Cube both track registered downstream consumers (BI dashboards, agents, embed clients) so the metrics layer can fan out cache invalidations and emit consumer-specific access logs. Vendor verification needed to confirm distinction from an OAuth-client list.
    vendor_evidence: [AtScale, Cube Cloud]
    proposed_module: METRICS-LAYER-DELIVERY

  - id: B3-METRIC-ASSERTION-RULES
    candidate: metric_assertion_rules
    rationale: dbt MetricFlow and Cube both support assertion rules (accepted_values, freshness, relative_change) attached to metrics. Scope distinction needed against a future DATA-OBSERVABILITY domain.
    vendor_evidence: [dbt Semantic Layer, Cube Cloud]
    proposed_module: METRICS-LAYER-DEFINITIONS

  - id: B3-METRIC-CHANGE-PROPOSALS
    candidate: metric_change_proposals
    rationale: dbt Semantic Layer and Cube Cloud both surface a metric-change-as-PR workflow (a metric edit goes through code review before merging to certified state). May already be implicit in B1B-B12's metric_definitions in_review state; vendor verification needed.
    vendor_evidence: [dbt Semantic Layer, Cube Cloud]
    proposed_module: METRICS-LAYER-DEFINITIONS

  - id: B3-DELIVERY-SPLIT
    candidate: METRICS-LAYER-DELIVERY split into BI-DELIVERY and AI-DELIVERY
    rationale: The delivery module bundles three protocol families (BI-native SQL / JDBC / MDX, web-native REST / GraphQL, AI-native MCP / tool-use). Future audit may grow the surface enough to warrant a split.
    vendor_evidence: [Cube Cloud, dbt Semantic Layer, AtScale, Honeydew]
    proposed_module: null

  - id: B3-REGULATION-TAGGING
    candidate: domain_regulations rows for SOX, GDPR, CCPA, HIPAA against METRICS-LAYER
    rationale: Zero domain_regulations rows today. Candidate regulations are SOX (metric definitions backing financial reporting are SOX-controlled), GDPR / CCPA (access policies must enforce data-subject restrictions on metric outputs), HIPAA (when metrics aggregate over PHI). Verification needed whether to tag at metrics-layer or BI layer.
    vendor_evidence: [AtScale]
    proposed_module: null
