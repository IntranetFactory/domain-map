b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."
  - id: B1A-EMBED-SHELLS
    summary: cross-module embedded_master / consumer shell rows from the B1-S1 spec were not authored (modules-only pass)
    finding: >
      The 2026-05-30 B1-S1 spec called for cross-module shells so each module renders the entities it materializes
      or delivers and can deploy standalone: metric_definitions (252) as embedded_master on COMPUTE (276) and
      DELIVERY (277); metric_access_policies (711) as consumer on DEFINITIONS (275) and COMPUTE (276). This
      modularization pass assigned only the canonical master rows (job scope was reuse-existing-roles, and no
      embedded_master/consumer rows existed to preserve). Shell rows are a design addition, not a reuse.
      The 2026-06-06 b1a pass SKIPPED this item: the action conditions execution on confirming the exact shell
      set against current emitter behavior, which is a design judgment on load-bearing master data beyond the
      deterministic action text. Structural note from that pass: the newly authored B6 edge
      metric_materializations precomputes metric_definitions (is_required=true) crosses module boundaries
      (709 on 276 -> 252 on 275), so the spec'd 252-embedded_master-on-276 shell would resolve a real M9
      self-containment finding; the 252-on-277 and 711-consumer-on-275/276 shells remain design choices.
    action: >
      Author the embedded_master / consumer shell DMDO rows per the B1-S1 spec (252 embedded_master on 276 + 277;
      711 consumer on 275 + 276). Confirm the exact shell set against the current emitter behavior before writing.
    affected_modules: [275, 276, 277]
    affected_masters:
      - {data_object_id: 252, name: metric_definitions, target_module_id: 275, workflow: definition}
      - {data_object_id: 711, name: metric_access_policies, target_module_id: 277, workflow: policy-lifecycle}
    blocked_by:
      - {type: user_decision, scope: domain_module_data_objects, trigger: "exact embedded_master/consumer shell set must be confirmed against current emitter behavior before writing; design addition, not a deterministic derivation"}

b1b:
  - id: B1B-B8
    summary: zero outbound cross-domain data_object_relationships mirroring the 7 outbound handoffs; target masters may not be loaded
    finding: >
      Query /data_object_relationships?and=(data_object_id.in.(252,253,709,710,711),related_data_object_id.not.in.(252,253,709,710,711),related_data_object_id.neq.748)
      returns empty. Each outbound handoff with a clean payload-to-target mapping implies a corresponding
      relationship row. Target candidates per the 2026-05-30 audit: BI bi_dashboards (consumer of metric_definitions),
      DATA-AI-PLAT feature_store_features (consumer of metric_definitions), DCG lineage_assets (consumer of
      query_lineage_records). Target master IDs need verification against the live catalog before authoring;
      some may not yet exist.
    blocked_by:
      - {type: catalog_addition, scope: domains, trigger: "target masters in BI / DATA-AI-PLAT / DCG must be loaded before relationship rows can reference them"}
    affected_handoffs:
      - {handoff_id: 218, direction: outbound, source_domain: METRICS-LAYER, target_domain: BI, trigger_event: metric.certified, payload: metric_definitions, null_field: cross_domain_relationship}
      - {handoff_id: 219, direction: outbound, source_domain: METRICS-LAYER, target_domain: DATA-AI-PLAT, trigger_event: metric.certified, payload: metric_definitions, null_field: cross_domain_relationship}
      - {handoff_id: 692, direction: outbound, source_domain: METRICS-LAYER, target_domain: BI, trigger_event: dimensional_model.published, payload: dimensional_models, null_field: cross_domain_relationship}
      - {handoff_id: 693, direction: outbound, source_domain: METRICS-LAYER, target_domain: DATA-AI-PLAT, trigger_event: metric_materialization.refreshed, payload: metric_materializations, null_field: cross_domain_relationship}
      - {handoff_id: 694, direction: outbound, source_domain: METRICS-LAYER, target_domain: DCG, trigger_event: query_lineage.captured, payload: query_lineage_records, null_field: cross_domain_relationship}
      - {handoff_id: 695, direction: outbound, source_domain: METRICS-LAYER, target_domain: BI, trigger_event: metric_access_policy.changed, payload: metric_access_policies, null_field: cross_domain_relationship}
      - {handoff_id: 696, direction: outbound, source_domain: METRICS-LAYER, target_domain: BI, trigger_event: metric_materialization.refresh_failed, payload: metric_materializations, null_field: cross_domain_relationship}

b2:
  - id: B2-PATTERN-FLAGS
    summary: pattern flag positive re-evaluation per Rule #12 / B4 across 4 candidate flips on 3 masters
    question: >
      Apply the following pattern flag flips? metric_definitions.has_submit_lock=true (certified metric immutable
      until re-drafted in Cube and dbt). metric_definitions.has_single_approver=true (certification typically gated
      on a single data-product owner). metric_access_policies.has_single_approver=true (policy activation typically
      single approval). dimensional_models.has_submit_lock=true (published model immutable while live consumers
      point at it).
    options:
      - Approve all four flips
      - Approve a subset (specify per flag)
      - Decline all (flags stay false)
    why: Pattern flags are workflow-shape judgments the user owns; defaults-to-false do not establish review. No notes write either way (Rule #15).
    affected_masters:
      - {data_object_id: 252, name: metric_definitions, target_module_id: 275, workflow: definition}
      - {data_object_id: 253, name: dimensional_models, target_module_id: 275, workflow: model-publication}
      - {data_object_id: 711, name: metric_access_policies, target_module_id: 277, workflow: policy-lifecycle}

  - id: B2-CATALOG-UX
    summary: A4 catalog_tagline and catalog_description were WRITTEN on the domain row and 3 modules per revised Rule #20; user reviews in-record
    question: >
      The buyer-voice catalog_tagline + catalog_description were written straight into the empty fields on
      domains.id=137 and modules 275 / 276 / 277 (revised Rule #20; record_status=new carries the review signal).
      Review the written copy in the catalog UI. Domain tagline: "Define your business metrics once and serve them
      to every dashboard, agent, and app." Edit any wording in-record, or approve as is. Overwrite by the agent is
      now forbidden without explicit per-row instruction.
    options:
      - Approve the written copy as is (mark records reviewed)
      - Edit specific rows in the catalog UI
      - Instruct the agent to rewrite a specific row with supplied wording
    why: Under revised Rule #20 the agent writes empty catalog UX fields directly and the user reviews in-record; once a value is non-empty it is overwrite-protected.
    affected_entities: [domains:METRICS-LAYER]
    affected_modules: [275, 276, 277]

  - id: B2-NAMING-ARBITRATION
    summary: naming arbitration on the 5 prefixed masters under Rule #9
    question: >
      Keep the 5 masters as is (metric_definitions, dimensional_models, metric_materializations,
      query_lineage_records, metric_access_policies) with is_canonical_bare_word=false, OR rename metric_definitions
      to bare metrics with the canonical claim, OR rename to semantic_metric_definitions?
    options:
      - Keep as is (recommended; preserves bare metrics for any future BI-owned aggregated-table master)
      - Rename metric_definitions to metrics with is_canonical_bare_word=true and naming_authority_rationale
      - Rename to semantic_metric_definitions (lengthens for no gain)
    why: All five names are prefixed-style with no live collision today. The bare word metrics may matter to BI / DATA-AI-PLAT for a future aggregated-tables master.
    affected_masters:
      - {data_object_id: 252, name: metric_definitions, target_module_id: 275, workflow: definition}

  - id: B2-LOOKER-RECLASSIFICATION
    summary: Looker coverage_level on METRICS-LAYER (currently secondary)
    question: >
      Keep Looker (solution id 352) at coverage_level=secondary on METRICS-LAYER, OR promote to primary because
      LookML is the metrics-layer surface and Looker bundles the BI surface on top?
    options:
      - Keep secondary (recommended; Looker is sold and bought primarily as a BI tool)
      - Promote to primary (LookML IS the metrics-layer surface)
    why: Decision affects how the catalog ranks Looker against the dedicated headless-BI vendors (Cube, dbt, AtScale, etc.) in BI / METRICS-LAYER cross-references.
    affected_entities: [solutions:Looker]
    vendor_evidence: [Looker]

  - id: B2-DCG-INBOUND-TAG
    summary: handoff 220 (DCG to METRICS-LAYER on metric.deprecated) carries false-positive discovery_substring tag on process 505
    question: >
      How to handle the false-positive discovery_substring row on handoff 220 pointing at process 505 Establish
      baseline metrics? Rule #1 forbids the agent flipping record_status to rejected without explicit user
      instruction.
    options:
      - Leave at record_status=new for the reviewer to mark rejected later (default per Rule #1)
      - Explicitly approve PATCH to record_status=rejected and authorize agent to insert a new agent_curated tag in its place
      - Authorize agent to insert a new agent_curated tag alongside (both rows coexist; reviewer picks)
    why: Rule #1 requires explicit instruction for any record_status flip other than new; the agent cannot self-resolve.
    affected_handoffs:
      - {handoff_id: 220, direction: inbound, source_domain: DCG, target_domain: METRICS-LAYER, trigger_event: metric.deprecated, payload: metric_definitions, null_field: agent_curated_tag}

b3:
  - id: B3-METRIC-VIEWS
    candidate: metric_views
    rationale: >
      Cube and dbt MetricFlow both ship a "metric view" or "saved query" concept (named pre-bundled metric plus
      dimension plus filter combo a consumer asks for by name). Distinct from metric_definitions (formula) and
      metric_materializations (precomputed grain).
    vendor_evidence: [Cube Cloud, dbt Semantic Layer]
    proposed_module: METRICS-LAYER-DELIVERY

  - id: B3-METRIC-CONSUMERS
    candidate: metric_consumers
    rationale: >
      AtScale and Cube both track registered downstream consumers (BI dashboards, agents, embed clients) so the
      metrics layer can fan out cache invalidations and emit consumer-specific access logs. Vendor verification
      needed to confirm distinction from an OAuth-client list.
    vendor_evidence: [AtScale, Cube Cloud]
    proposed_module: METRICS-LAYER-DELIVERY

  - id: B3-METRIC-ASSERTION-RULES
    candidate: metric_assertion_rules
    rationale: >
      dbt MetricFlow and Cube both support assertion rules (accepted_values, freshness, relative_change) attached
      to metrics. Scope distinction needed against a future DATA-OBSERVABILITY domain.
    vendor_evidence: [dbt Semantic Layer, Cube Cloud]
    proposed_module: METRICS-LAYER-DEFINITIONS

  - id: B3-METRIC-CHANGE-PROPOSALS
    candidate: metric_change_proposals
    rationale: >
      dbt Semantic Layer and Cube Cloud both surface a metric-change-as-PR workflow (a metric edit goes through
      code review before merging to certified state). May already be implicit in B1A-B12's metric_definitions
      in_review state; vendor verification needed.
    vendor_evidence: [dbt Semantic Layer, Cube Cloud]
    proposed_module: METRICS-LAYER-DEFINITIONS

  - id: B3-DELIVERY-SPLIT
    candidate: METRICS-LAYER-DELIVERY split into BI-DELIVERY and AI-DELIVERY
    rationale: >
      The delivery module bundles three protocol families (BI-native SQL / JDBC / MDX, web-native REST / GraphQL,
      AI-native MCP / tool-use). Future audit may grow the surface enough to warrant a split.
    vendor_evidence: [Cube Cloud, dbt Semantic Layer, AtScale, Honeydew]
    proposed_module: null

  - id: B3-REGULATION-TAGGING
    candidate: domain_regulations rows for SOX, GDPR, CCPA, HIPAA against METRICS-LAYER
    rationale: >
      Zero domain_regulations rows today. Candidate regulations are SOX (metric definitions backing financial
      reporting are SOX-controlled), GDPR / CCPA (access policies must enforce data-subject restrictions on metric
      outputs), HIPAA (when metrics aggregate over PHI). Verification needed whether to tag at metrics-layer or BI
      layer.
    vendor_evidence: [AtScale]
    proposed_module: null
