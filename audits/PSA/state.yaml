b2:
  - id: B2-S1
    summary: "Rule #15 notes-pollution sweep approval (carry from 2026-05-30)."
    question: "Were the ~20 PSA-touching rows' notes columns user-approved at load time, or auto-populated?"
    options: ["(a) Confirm auto-populated; revert all to empty string and log Rule #15 incident", "(b) Confirm user-approved; leave intact", "(c) Per-row review"]
    why: "Rule #15 default is revert; the notes contain dated tags ('Pattern flags considered (2026-05-26 audit)') suggesting auto-population, but the audit cannot confirm load-time approval status. Reverting non-empty values is destructive."

  - id: B2-S2
    summary: "B4 pattern-flag positive re-evaluation per Rule #12 (carry from 2026-05-30)."
    question: "Which pattern flags should be set to true on the PSA operational_workflow masters?"
    options: ["per-flag yes/no on (a) project_assignments.has_personal_content, (b) project_billing_milestones.has_submit_lock, (c) service_projects.has_single_approver, and remaining flag/master combinations"]
    why: "Pattern flags are workflow-shape judgments the user owns; the agent re-evaluates and proposes, the user decides. (resource_skill_inventories is now entity_type='catalog' so pattern flags no longer apply to it.)"

  - id: B2-S3
    summary: "M5/M7 boundary architectural choice on revenue_recognition_records (carry from 2026-05-30)."
    question: "How should PSA's relationship to SUB-MGMT-mastered revenue_recognition_records be modeled?"
    options: ["(a) PSA stays contributor; PATCH state 403 domain_module_id to a SUB-MGMT module (or NULL); PATCH tool 1035 to compute with NULL data_object", "(b) PSA co-masters the project-revenue slice; INSERT second master DMDO row on module 89 + slice decomposition recorded here", "(c) Leave as-is and accept wrong-prefix permission materialization"]
    why: "Architectural intent question. The audit cannot decide whether PSA materializing the workflow on a foreign master was intent or mistake at original load time."

  - id: B2-S4
    summary: "Handling for inbound handoffs 787 + 515 with NULL target_module + no PSA DMDO (carry from 2026-05-30)."
    question: "Per row: does PSA legitimately consume work_automations (787) and creative_briefs (515)?"
    options: ["(a) INSERT consumer + optional DMDO rows on PSA-PROJECT-DELIVERY (86) for both payloads + PATCH handoffs", "(b) DELETE handoffs as mis-modeled", "(c) Per-row read"]

  - id: B2-S5
    summary: "CRM -> PSA renewal inbound (carry from 2026-05-30)."
    question: "Are renewal opportunities distinct from closed_won in CRM, requiring their own PSA-facing handoff?"
    options: ["(a) Same shape as existing 137; no new handoff", "(b) Author distinct crm_renewal_opportunity.created handoff to PSA-PROJECT-DELIVERY (86)"]

  # B2-NEW1 (config-shape exemption home for master 725) is RESOLVED-BY-RULE: 725's
  # config shape is now recorded structurally via entity_type='catalog' (set 2026-06-06,
  # Rule #12), not in a notes annotation. No separate exemption surface needed. The
  # B2-S1 sweep can revert 725.notes to '' with no loss. Kept here as a closed note.

  # B2-NEW2 (A4 + M8 catalog copy drafting + approval) is RESOLVED-BY-RULE: current Rule #20
  # authorizes writing buyer-voice copy straight into EMPTY fields (the row's record_status
  # carries the in-record review signal). The copy was written 2026-06-06; the user reviews
  # it in-record / in the catalog UI. No chat-gate approval required. Closed.

b3:
  - id: B3-engagement_quotes
    candidate: "engagement_quotes (or services_estimates)"
    rationale: "Most PSA flagships model the estimate as a distinct record from the project with its own lifecycle (drafted, sent, approved, won, lost). The ENGAGE-CPQ capability (245) is realized on PSA-PROJECT-DELIVERY but no master entity exists."
    proposed_module: "PSA-PROJECT-DELIVERY or new PSA-ENGAGEMENT-QUOTING module"

  - id: B3-project_change_requests
    candidate: "project_change_requests"
    rationale: "All flagship PSAs model change orders as first-class records modifying scope, schedule, budget. Distinct from project_tasks and from contract amendments."
    proposed_module: "PSA-PROJECT-DELIVERY"

  - id: B3-project_risks
    candidate: "project_risks (or risk_register_items)"
    rationale: "First-class risk records with mitigation plans, distinct from project tasks."
    proposed_module: "PSA-PROJECT-DELIVERY"

  - id: B3-project_status_reports
    candidate: "project_status_reports"
    rationale: "Recurring report records, distinct from ad-hoc notifications."
    proposed_module: "PSA-PROJECT-DELIVERY"

  - id: B3-project_deliverables
    candidate: "project_deliverables"
    rationale: "Distinct from project_tasks (the work) and from project_billing_milestones (the billing trigger). A deliverable is the artifact; a milestone may or may not be tied to one."
    proposed_module: "PSA-PROJECT-DELIVERY"

  - id: B3-billing_rate_cards
    candidate: "billing_rate_cards (or rate_cards)"
    rationale: "Every PSA flagship has rate-card management as a first-class entity (effective dates, currency, role-level, customer-level overrides)."
    proposed_module: "PSA-PROJECT-FINANCIALS"

  - id: B3-project_budgets
    candidate: "project_budgets"
    rationale: "Distinct from project_billing_milestones (budget is plan; milestones are billing schedule). Often versioned."
    proposed_module: "PSA-PROJECT-FINANCIALS"

  - id: B3-project_invoices
    candidate: "project_invoices (staged)"
    rationale: "Staged PSA-side invoice record before push to ERP-FIN's AR module. ERP-FIN masters invoices canonically; PSA may need an embedded_master or boundary project_invoices."
    proposed_module: "PSA-PROJECT-FINANCIALS"

  - id: B3-staffing_requests
    candidate: "staffing_requests"
    rationale: "Distinct from project_assignments (request is demand; assignment is fulfillment). Currently the request->assignment flow is implicit via service_project.staffing_required event with no request entity."
    proposed_module: "PSA-RESOURCE-MGMT"

  - id: B3-capacity_plans
    candidate: "capacity_plans"
    rationale: "Aggregated forward-looking capacity by skill / role / region. Distinct from project_resource_allocations (per-project) vs capacity (aggregate)."
    proposed_module: "PSA-RESOURCE-MGMT (boundary with SWP possible)"

  - id: B3-utilization_reports
    candidate: "utilization_reports (or utilization_records)"
    rationale: "UTILIZATION capability is loaded (81 on PSA-RESOURCE-MGMT) but no master entity captures the utilization record itself (period, resource, billable hours, target, actual, variance)."
    proposed_module: "PSA-RESOURCE-MGMT"

  - id: B3-project_profitability_records
    candidate: "project_profitability_records"
    rationale: "Distinct from rev-rec; the running-profit calculation per project (revenue minus cost minus admin)."
    proposed_module: "PSA-PROJECT-FINANCIALS"

  - id: B3-mod-engagement-quoting
    candidate: "PSA-ENGAGEMENT-QUOTING module split"
    rationale: "If engagement_quotes, services_estimates, rate-card management, and pursuit-tracking are loaded, a 5th module makes more sense than overloading PSA-PROJECT-DELIVERY. ENGAGE-CPQ (245) would move to this new module."
    proposed_module: "(new) PSA-ENGAGEMENT-QUOTING"

  - id: B3-mod-profitability-analytics
    candidate: "PSA-PROFITABILITY-ANALYTICS module split"
    rationale: "Project profitability + utilization analytics could split from PSA-PROJECT-FINANCIALS (which keeps the billing + rev-rec workflow)."
    proposed_module: "(new) PSA-PROFITABILITY-ANALYTICS"

  - id: B3-reg-dcaa
    candidate: "DCAA applicability"
    rationale: "Mandatory for US government contractor T&M billing rules. Current domain_regulations for PSA covers only ASC 606."
    proposed_module: "PSA domain-level regulation"

  - id: B3-reg-sox
    candidate: "SOX significant-engagement attestation"
    rationale: "Mandatory for US publicly-listed companies with material services contracts. ASC 606 sibling concern."
    proposed_module: "PSA domain-level regulation"

  - id: B3-reg-gdpr
    candidate: "GDPR consultant PII"
    rationale: "Mandatory for EU consultant PII in skill profiles and project-level personal data."
    proposed_module: "PSA domain-level regulation"
