# Open items after the 2026-06-06 state-driven Audit (execute pass). Resolved + executed
# items live in history.md (2026-06-06 entry). next_action_by=user: every remaining b1a
# item is destructive-awaiting-approval (overwrite / DELETE) or gated on a b2 decision;
# the agent has executed everything additive/corrective it can.

# Items the agent could not execute without approval: destructive work (DELETE,
# overwrite a non-empty value, replace/restructure) is never done unapproved (Rule #21).
b1a_destructive_awaiting_approval:
  - id: B1A-H1-REPLACE-DELETIONS
    summary: "Delete the 2 weak discovery_substring handoff_processes rows (process 569) on handoffs 132 + 1129."
    finding: "Both handoffs now carry a better agent_curated tag (132 -> process 808 already present; 1129 -> process 148 inserted 2026-06-06). The weak discovery_substring rows (process 569 'Assign resources to product/service project') remain alongside and should be removed. 569 is a weak match: 132's target is procurement of contingent staff (S2P), 1129's target is the CRM renewal trigger, neither is internal resource assignment."
    action: "DELETE handoff_processes WHERE process_id=569 AND handoff_id IN (132, 1129). Destructive -> needs user sign-off."
    affected_handoffs: [132, 1129]

  - id: B1A-B9D-MISTAG-1020
    summary: "B9d MIS-TAG: re-tag handoff 1020 from process 1324 to 807 (or delete the wrong tag). Surfaced as q12."
    finding: "Handoff 1020 (PSA-PROJECT-FINANCIALS -> CLM on project_billing_milestone.reached, payload 219, updates contract obligations) carries an agent_curated handoff_processes tag to process 1324 ('Prepare periodic financial forecasts', 9.1.2.4). That process does not match the work. The correct APQC home is CLM contract management, process 807 ('Manage contracts', 4.2.3.4), which CLM already realizes (gated + RACI in modules 127/129); re-pointing makes 1020 RESOLVED under B9d."
    action: "Re-point handoff_processes.process_id 1324 -> 807 on handoff 1020 (overwrites an existing non-empty agent_curated tag = destructive), OR DELETE the 1324 row and INSERT an 807 row at record_status='new'. Either path needs user sign-off. Recommended: re-tag to 807."
    affected_handoffs: [1020]

  - id: B1A-S7
    summary: "Rule #15 notes-pollution sweep (carry from 2026-05-30 B1-S7)."
    finding: "~20 rows across PSA-touching tables carry auto-generated prose matching Rule #15 forbidden patterns. handoffs.notes on 16 rows (131, 132, 515, 787, 1016, 1019, 1020, 1021, 1022, 1024, 1025, 1026, 1127, 1128, 1130, 179). data_objects.notes on the PSA masters (216, 217, 218, 219, 725, 726) carries 'Pattern flags considered (2026-05-26 audit)...' prose plus the config-shape exemption on 725 (now superseded structurally by entity_type='catalog', set 2026-06-06). domain_data_objects.notes on 8 rows (162, 109, 31, 33, 100, 66, 210, 244). domain_module_data_objects.notes on 3 rows (633, 634, 635)."
    action: "Reverting non-empty notes to '' is a destructive overwrite. Confirm the notes were auto-populated at load (not user-approved), then PATCH ~20 rows' notes to '' and log a Rule #15 incident in references/skill-changelog.md."
    blocked_by:
      - {type: user_decision, ref: B2-S1}
    extra_affected_tables: [handoffs, data_objects, domain_data_objects, domain_module_data_objects]

  - id: B1A-SELF-CONTAIN
    summary: "7 contributor/required-consumer DMDO rows break module self-containment (M9): embed or relax each."
    finding: "7 domain_module_data_objects rows on PSA modules are role=contributor or role=consumer with necessity=required, pointing at a foreign-mastered entity and not embedded_master here. Each is an M9 self-containment violation. Converting role consumer->embedded_master or necessity required->optional rewrites an existing row = destructive."
    action: "Per row: convert to embedded_master (carry a local shell) OR set necessity=optional, per references/modules.md section 5. Each is a destructive overwrite -> surface the recommended per-row fix; user signs off."
    extra_m9_shapes:
      - {entity: crm_opportunities, module: PSA-PROJECT-DELIVERY, role: consumer, master_domain: CRM, recommended: "necessity optional (presence-conditional inbound seed)"}
      - {entity: employees, module: PSA-PROJECT-DELIVERY, role: consumer, master_domain: HCM, recommended: "necessity optional"}
      - {entity: employees, module: PSA-RESOURCE-MGMT, role: consumer, master_domain: HCM, recommended: "embedded_master (resource pool needs a local worker shell)"}
      - {entity: job_profiles, module: PSA-PROJECT-DELIVERY, role: consumer, master_domain: HCM, recommended: "necessity optional"}
      - {entity: job_profiles, module: PSA-RESOURCE-MGMT, role: consumer, master_domain: HCM, recommended: "embedded_master (skill/role taxonomy needed locally)"}
      - {entity: legal_contracts, module: PSA-PROJECT-DELIVERY, role: consumer, master_domain: CLM, recommended: "necessity optional (engagement can start from opportunity without a signed contract)"}
      - {entity: revenue_recognition_records, module: PSA-PROJECT-FINANCIALS, role: contributor, master_domain: SUB-MGMT, recommended: "tied to B2-S3; resolve the boundary first"}

  - id: B1A-B10B-IN
    summary: "Resolve 2 inbound handoffs (787 WORK-MGMT, 515 AGENCY-MGMT) with NULL target_domain_module_id and no PSA DMDO for payload."
    finding: "Handoff 787 (WORK-MGMT->PSA on work_automation.triggered, payload data_object 246 work_automations) and handoff 515 (AGENCY-MGMT->PSA on creative_brief.approved, payload data_object 483 creative_briefs) carry NULL target_domain_module_id. No PSA module declares any role on either payload."
    action: "Per B2-S4: (a) INSERT 2 consumer+optional DMDO rows on PSA-PROJECT-DELIVERY (86) for data_objects 246 + 483 + PATCH the 2 handoffs to target_domain_module_id=86 (additive, but the option is a fork the agent cannot pick); OR (b) DELETE handoffs 787 + 515 as mis-modeled (destructive). Needs the user's call."
    blocked_by:
      - {type: user_decision, ref: B2-S4}
    affected_handoffs:
      - {handoff_id: 787, direction: inbound, source_domain: WORK-MGMT, target_domain: PSA, trigger_event: "work_automation.triggered", payload: work_automations, null_field: target_domain_module_id}
      - {handoff_id: 515, direction: inbound, source_domain: AGENCY-MGMT, target_domain: PSA, trigger_event: "creative_brief.approved", payload: creative_briefs, null_field: target_domain_module_id}

  - id: B1A-S1
    summary: "M5/M7 boundary fix on revenue_recognition_records lifecycle state 403 (carry from 2026-05-30 B1-S1)."
    finding: "Lifecycle state 403 'recognized' on data_object 109 revenue_recognition_records carries requires_permission=true AND domain_module_id=89 (PSA-PROJECT-FINANCIALS). Data_object 109 is mastered by SUB-MGMT-SUBSCRIPTIONS (module 167, domain 97). Workflow-gate permission would materialize as psa-project-financials:recognize_revenue_recognition_record on a foreign master."
    action: "Per B2-S3: (a) PATCH state 403 domain_module_id to a SUB-MGMT module / NULL; (b) INSERT second master DMDO on PSA module 89 (co-master slice); (c) leave-as-is. Architectural fork; all options touch existing rows -> surface."
    blocked_by:
      - {type: user_decision, ref: B2-S3}
    affected_masters:
      - {data_object_id: 109, name: revenue_recognition_records, target_module_id: 89, workflow: "ASC 606 percentage-of-completion / milestone billing"}

  - id: B1A-S8
    summary: "Tool 1035 recognize_project_revenue boundary fix (carry from 2026-05-30 B1-S8)."
    finding: "Tool 1035 has operation_kind=mutate with data_object_id=109 (SUB-MGMT-mastered). F4 invariant satisfied formally, but PSA's agent directly mutates a SUB-MGMT-mastered record. Architectural symmetry with B1A-S1."
    action: "Per B2-S3: (a) PATCH tool 1035 to operation_kind=compute with data_object_id=NULL; (b) leave as-is if PSA co-masters the slice. Tied to B2-S3."
    blocked_by:
      - {type: user_decision, ref: B2-S3}

  - id: B1A-AMENG-OVERWRITE
    summary: "American-English corrections on non-empty values (destructive overwrite, low priority)."
    finding: "Existing non-empty content uses British spellings: capability 'Utilisation Tracking' should be 'Utilization Tracking'; domain 68 description + several master descriptions use 'utilisation'; trigger_event 'revenue.recognised' (handoff 131) uses 'recognised'. Newly authored 2026-06-06 copy is already American-English; these are pre-existing rows."
    action: "Overwriting non-empty values is destructive (Rule #21). Surface as low-priority recommendations; user signs off before any PATCH."

