b2:
  - id: B2-S1
    summary: "Rule #15 notes-pollution sweep approval (carry from 2026-05-30)."
    question: "Were the ~20 PSA-touching rows' `notes` columns user-approved at load time, or auto-populated?"
    options: ["(a) Confirm auto-populated; revert all to empty string and log Rule #15 incident", "(b) Confirm user-approved; leave intact", "(c) Per-row review"]
    why: "Rule #15 default is revert; the notes contain dated tags (`Pattern flags considered (2026-05-26 audit)`) suggesting auto-population, but the audit cannot confirm load-time approval status."

  - id: B2-S2
    summary: "B4 pattern-flag positive re-evaluation per Rule #12 (carry from 2026-05-30)."
    question: "Which pattern flags should be set to `true` on the 6 PSA masters?"
    options: ["per-flag yes/no on (a) project_assignments.has_personal_content, (b) resource_skill_inventories.has_personal_content, (c) project_billing_milestones.has_submit_lock, (d) service_projects.has_single_approver, and the remaining flag/master combinations"]
    why: "Pattern flags are workflow-shape judgments the user owns; the audit re-evaluates and proposes, the user decides."

  - id: B2-S3
    summary: "M5/M7 boundary architectural choice on `revenue_recognition_records` (carry from 2026-05-30)."
    question: "How should PSA's relationship to SUB-MGMT-mastered `revenue_recognition_records` be modeled?"
    options: ["(a) PSA stays contributor; PATCH state 403 `domain_module_id` to a SUB-MGMT module (or NULL); PATCH tool 1035 to `compute` with NULL data_object", "(b) PSA co-masters the project-revenue slice; INSERT second `master` DMDO row on module 89 + slice decomposition recorded here", "(c) Leave as-is and accept wrong-prefix permission materialization"]
    why: "Architectural intent question. The audit cannot decide whether PSA materializing the workflow on a foreign master was intent or mistake at original load time."

  - id: B2-S4
    summary: "Handling for inbound handoffs 787 + 515 with NULL target_module + no PSA DMDO (carry from 2026-05-30)."
    question: "Per row: does PSA legitimately consume `work_automations` (787) and `creative_briefs` (515)?"
    options: ["(a) INSERT consumer + optional DMDO rows on PSA-PROJECT-DELIVERY (86) for both payloads + PATCH handoffs", "(b) DELETE handoffs as mis-modeled", "(c) Per-row read"]

  - id: B2-S5
    summary: "CRM -> PSA renewal inbound (carry from 2026-05-30)."
    question: "Are renewal opportunities distinct from `closed_won` in CRM, requiring their own PSA-facing handoff?"
    options: ["(a) Same shape as existing 137; no new handoff", "(b) Author distinct `crm_renewal_opportunity.created` handoff to PSA-PROJECT-DELIVERY (86)"]

  - id: B2-NEW1
    summary: "`resource_skill_inventories` config-shape exemption recording mechanism."
    question: "Where should the Rule #12 config-shape exemption claim for master 725 live once the notes-pollution sweep (B2-S1) reverts the existing `data_objects.notes` annotation?"
    options: ["(a) Confirm exemption; let this audit's history.md narrative be the authoritative record. On B2-S1 cleanup, the notes revert to empty without a replacement annotation.", "(b) Reject exemption; load a state machine for 725."]
    why: "Rule #12 + Rule #15 interaction: the config-shape exemption pattern is legitimate, but the historical mechanism (writing the exemption to `data_objects.notes`) is RESCINDED. The exemption claim needs an authoritative home outside the notes column."

  - id: B2-NEW2
    summary: "A4 + M8 catalog UX copy drafting + approval (Rule #20)."
    question: "How should the buyer-voice copy for `domains.catalog_tagline` + `domains.catalog_description` + 4 modules' `catalog_tagline` + `catalog_description` be authored?"
    options: ["(a) Agent drafts 5 tagline + description pairs in a follow-up Bucket-2 turn; user approves / rewrites / declines per row before PATCH", "(b) User supplies copy directly", "(c) Defer to a marketing pass; leave fields empty for now"]
