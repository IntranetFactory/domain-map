b2:
  - id: B2-CATALOG-UX
    summary: "Supply or approve exact `catalog_tagline` + `catalog_description` for ECM."
    question: >-
      A4 requires both fields populated in buyer voice. Rule #20 forbids any write
      without explicit user-approved exact text. Either supply the text or approve a
      fresh draft. Sample tagline draft: "Store, classify, and retain every document
      with built-in workflow and audit-ready compliance." Sample description outline:
      capture, repository plus versioning, classification plus retention policy,
      workflow plus approvals, eDiscovery plus legal-hold posture.
    options:
      - "Supply exact text"
      - "Approve agent's draft verbatim"
      - "Approve revised wording"
      - "Defer to a later audit"
    why: "Rule #20 + Rule #15 forbid agent-side writes on these columns without per-row approval."

  - id: B2-MODULE-SPLIT
    summary: "Pick module split shape (3 / 4 / 5) for ECM."
    question: >-
      ECM has 0 modules and 7 capabilities (M1 + M2 fail). Three candidate shapes:
      3-module (REPO + RECORDS + WORKFLOW; CLASSIFY folds into REPO),
      4-module (REPO + RECORDS + CLASSIFY + WORKFLOW; default),
      5-module (REPO + RECORDS + CLASSIFY + WORKFLOW + CAPTURE, with AUDIT folded
      into RECORDS or split out as a 6th module if Bucket 3's `document_audit_trail_entries`
      lands).
    options:
      - "3-module (REPO / RECORDS / WORKFLOW)"
      - "4-module (REPO / RECORDS / CLASSIFY / WORKFLOW) - agent default"
      - "5-module (add CAPTURE)"
      - "6-module (add CAPTURE + AUDIT)"
    why: "Gates B1B-S1 / S2 / B1, B3, B5, L1, L2, L5, F1; no STRUCTURAL fix can land until shape is fixed."

  - id: B2-CONTENT-DOCUMENTS-RENAME
    summary: "Decide `content_documents` naming."
    question: >-
      The 4 other ECM masters use a 2-prefix pattern (`document_*` or `records_*`).
      `content_documents` (id 429) is the odd one. Bare `documents` is uncontested
      catalog-wide. Cross-domain blast radius: 27 `data_object_relationships` + 5
      handoffs reference id 429; all PATCHable by id.
    options:
      - "Keep `content_documents` as-is"
      - "Rename to bare `documents` with `is_canonical_bare_word=true` and rationale"
      - "Rename to `ecm_documents` for prefix consistency"
    why: "Naming arbitration belongs at insert/rename time, not later."

  - id: B2-DEDUPE-WSC-RELATIONSHIPS
    summary: "Confirm DELETE of `data_object_relationships` rows 300 and 301."
    question: >-
      Rows 300 (`chat_message_attachments captured_in content_documents`,
      owner_side=target) and 301 (`chat_channels archives_to content_documents`,
      owner_side=target) duplicate rows 587 and 588 from ECM's source-side authoring.
      Recommend DELETE 300 + 301; keep 587 + 588.
    options:
      - "DELETE 300 + 301 (recommended)"
      - "DELETE 587 + 588 instead"
      - "Keep all four (treat as separate edges)"
      - "Defer"
    why: "Both pairs describe the same two edges with verbs flipped; the WSC pair (300/301) labels the source as target which is structurally wrong."

  - id: B2-LSD-RETAG
    summary: "Decide LSD->ECM H1 retag (5 handoffs)."
    question: >-
      Handoffs 911, 912, 915, 1028, 1031 (LSD -> ECM) currently carry `agent_curated`
      rows pointing at PCFs 373 (Investigate legal aspects), 396 (Resolve disputes),
      373, 373, 397 (Provide legal advice). From ECM's receive-side perspective the
      activity is in cluster 8.4: 430 (Control delivered content), 429 (Deliver
      approved content), or 1440 (Retain records).
    options:
      - "DELETE + replace with content-cluster PCFs (911->430, 912->430, 915->430, 1028->430, 1031->429)"
      - "Keep the LSD-side classification (treat as the implementing process for the inbound)"
      - "Record both via separate (handoff_id, process_id) rows"
      - "Defer to LSD's next audit"
    why: "Per Rule #1 prior `agent_curated` rows are not overwritten silently. The composed key permits coexistence if the user wants both."

  - id: B2-PATTERN-FLAGS
    summary: "Re-evaluate B4 pattern flags on the 5 masters."
    question: >-
      All three pattern flags default `false` on every ECM master. Per Rule #12 + B4
      this requires a positive re-evaluation. Candidates: `content_documents.has_personal_content=true`
      (HR / health / contract content), `records_retention_policies.has_single_approver=true`
      (records officer sign-off), `document_classifications.has_submit_lock=true`
      (label assignment locks the row). Confirm or decline each.
    options:
      - "Flip all three candidates true"
      - "Flip only the personal_content + single_approver pair"
      - "Flip only personal_content"
      - "Confirm all five masters at false (record decision in audit narrative)"
      - "Custom selection"
    why: "Affects B1B-L4 (`document_classifications` lifecycle) and the workflow-gate permission derivation later."

  - id: B2-VENDOR-NAMING
    summary: "Confirm Rule #18 review on the 7 new ECM solutions before they load."
    question: >-
      B1B-S4 proposes INSERTing OpenText Documentum, Hyland OnBase, M-Files, Box
      Content Cloud, Microsoft SharePoint Online, Laserfiche, IBM FileNet. Per Rule
      #18 vendor and product names are only allowed in `vendors`, `solutions`,
      `data_object_aliases`, `tool_solutions`. Descriptions on solutions must
      characterise the product, not narrate the vendor landscape.
    options:
      - "Approve loader to draft descriptions and surface each one for per-row approval"
      - "User supplies all 7 descriptions"
      - "Drop one or more vendors from the load"
      - "Defer"
    why: "Rule #18 is non-trivial in practice; the agent does not bulk-write vendor descriptions without surfacing each."

  - id: B2-FOLDER-EXEMPTION
    summary: "Acknowledge config-shape exemption for `document_folders`."
    question: >-
      `document_folders` reads as a config-shape master (folders are created, renamed,
      occasionally archived; no per-row workflow). Per Rule #12 this is exempt from
      mandatory lifecycle states. Per Rule #15 the exemption cannot be annotated in
      `data_objects.notes`; it lives in the audit narrative only.
    options:
      - "Confirm config-shape exemption (no lifecycle states)"
      - "Author a 2-state lifecycle (active -> archived)"
      - "Defer to a later audit"
    why: "B4 + Rule #12: exemption must be positively confirmed each audit."

b3:
