b2:
  - id: B2-CATALOG-UX
    summary: "Supply or approve exact `catalog_tagline` + `catalog_description` for ECM domain and the 3 new modules."
    question: >-
      A4 requires both domain-level fields populated in buyer voice; M8 requires the same on
      each of the 3 new modules (ECM-REPOSITORY 242, ECM-RECORDS-GOV 243, ECM-WORKFLOW 244).
      Rule #20 forbids any write without explicit user-approved exact text. Either supply the
      text or approve a fresh draft. Sample domain tagline draft: "Store, classify, and retain
      every document with built-in workflow and audit-ready compliance."
    options:
      - "Supply exact text for domain + 3 modules"
      - "Approve agent's draft verbatim"
      - "Approve revised wording"
      - "Defer to a later audit"
    why: "Rule #20 + Rule #15 forbid agent-side writes on these columns without per-row approval. Pairs with B1A-M8-MODULE-UX."

  - id: B2-CONTENT-DOCUMENTS-RENAME
    summary: "Decide `content_documents` naming."
    question: >-
      The 4 other ECM masters use a 2-prefix pattern (`document_*` or `records_*`).
      `content_documents` (id 429) is the odd one. Bare `documents` is uncontested
      catalog-wide. Cross-domain blast radius: 27 `data_object_relationships` + 5
      handoffs reference id 429; all PATCHable by id.
    options:
      - "Keep `content_documents` as-is"
      - "Rename to bare `documents` with `is_canonical_bare_word=true` and rationale"
      - "Rename to `ecm_documents` for prefix consistency"
    why: "Naming arbitration belongs at insert/rename time, not later."

  - id: B2-DEDUPE-WSC-RELATIONSHIPS
    summary: "Confirm DELETE of `data_object_relationships` rows 300 and 301."
    question: >-
      Rows 300 and 301 (WSC-authored, owner_side=target) duplicate rows 587 and 588 from
      ECM's source-side authoring. Recommend DELETE 300 + 301; keep 587 + 588.
    options:
      - "DELETE 300 + 301 (recommended)"
      - "DELETE 587 + 588 instead"
      - "Keep all four (treat as separate edges)"
      - "Defer"
    why: "Both pairs describe the same two edges with verbs flipped; the WSC pair (300/301) labels the source as target which is structurally wrong."

  - id: B2-LSD-RETAG
    summary: "Decide LSD->ECM H1 retag (5 handoffs)."
    question: >-
      Handoffs 911, 912, 915, 1028, 1031 (LSD -> ECM) carry `agent_curated` rows pointing at
      LSD-side legal PCFs. From ECM's receive-side perspective the activity is in cluster 8.4
      (430 Control delivered content, 429 Deliver approved content, 1440 Retain records).
    options:
      - "DELETE + replace with content-cluster PCFs (911->430, 912->430, 915->430, 1028->430, 1031->429)"
      - "Keep the LSD-side classification (treat as the implementing process for the inbound)"
      - "Record both via separate (handoff_id, process_id) rows"
      - "Defer to LSD's next audit"
    why: "Per Rule #1 prior `agent_curated` rows are not overwritten silently. The composed key permits coexistence if the user wants both."

  - id: B2-PATTERN-FLAGS
    summary: "Re-evaluate B4 pattern flags on the 5 masters."
    question: >-
      All three pattern flags default `false` on every ECM master. Candidates:
      `content_documents.has_personal_content=true` (HR / health / contract content),
      `records_retention_policies.has_single_approver=true` (records officer sign-off),
      `document_classifications.has_submit_lock=true` (label assignment locks the row).
      Confirm or decline each. A `has_submit_lock` flip on `document_classifications` implies a
      2-state lifecycle (`draft` -> `locked`).
    options:
      - "Flip all three candidates true"
      - "Flip only the personal_content + single_approver pair"
      - "Flip only personal_content"
      - "Confirm all five masters at false (record decision in audit narrative)"
      - "Custom selection"
    why: "Affects `document_classifications` lifecycle and the workflow-gate permission derivation later."

  - id: B2-VENDOR-NAMING
    summary: "Confirm Rule #18 review on the 7 new ECM solutions before they load."
    question: >-
      B1B-S4 proposes INSERTing OpenText Documentum, Hyland OnBase, M-Files, Box
      Content Cloud, Microsoft SharePoint Online, Laserfiche, IBM FileNet. Per Rule
      #18 vendor and product names are only allowed in `vendors`, `solutions`,
      `data_object_aliases`, `tool_solutions`. Descriptions on solutions must
      characterise the product, not narrate the vendor landscape.
    options:
      - "Approve loader to draft descriptions and surface each one for per-row approval"
      - "User supplies all 7 descriptions"
      - "Drop one or more vendors from the load"
      - "Defer"
    why: "Rule #18 is non-trivial in practice; the agent does not bulk-write vendor descriptions without surfacing each."

  - id: B2-FOLDER-EXEMPTION
    summary: "Acknowledge config-shape exemption for `document_folders`."
    question: >-
      `document_folders` (id 431, mastered by ECM-REPOSITORY) reads as a config-shape master
      (folders are created, renamed, occasionally archived; no per-row workflow). Per Rule #12
      this is exempt from mandatory lifecycle states. Per Rule #15 the exemption cannot be
      annotated in `data_objects.notes`; it lives in the audit narrative only.
    options:
      - "Confirm config-shape exemption (no lifecycle states)"
      - "Author a 2-state lifecycle (active -> archived)"
      - "Defer to a later audit"
    why: "B4 + Rule #12: exemption must be positively confirmed each audit."

  - id: B2-CLASSIFICATION-EXEMPTION
    summary: "Acknowledge config-shape exemption (or 2-state) for `document_classifications`."
    question: >-
      `document_classifications` (id 432, mastered by ECM-REPOSITORY) reads as a
      classification-taxonomy master with no per-row workflow (labels exist, get applied,
      occasionally retired). Per Rule #12 the config-shape exemption may apply, but a
      `has_submit_lock=true` flip in B2-PATTERN-FLAGS would imply a 2-state lifecycle
      (`draft` -> `locked`).
    options:
      - "Confirm config-shape exemption (no lifecycle states)"
      - "Author a 2-state lifecycle (draft -> locked) if has_submit_lock flips true"
      - "Defer alongside B2-PATTERN-FLAGS"
    why: "Coupled to B2-PATTERN-FLAGS; the lifecycle shape depends on the flag decision."

b3:
  - id: B3-DOC-WORKFLOW
    candidate: "document_workflow_definitions + document_workflow_instances"
    rationale: >-
      Universal entity pair across OpenText, Hyland, M-Files, Laserfiche, Box, FileNet. ECM-WORKFLOW
      (id 244) currently has NO master of its own (it consumes content_documents + document_versions);
      loading this pair gives it a real master and converts the consume-only module into a
      master-bearing one. Strongest missing-master candidate for the new module set.
    vendor_evidence: [OpenText Documentum, Hyland OnBase, M-Files, Laserfiche, Box Content Cloud, IBM FileNet]
    proposed_module: ECM-WORKFLOW

  - id: B3-DOC-APPROVALS
    candidate: document_approvals
    rationale: >-
      5 of 7 flagship vendors model approvals as a distinct entity. Pairs naturally with
      `document_workflow_instances` (the approval is a step in the workflow). Would also master in
      ECM-WORKFLOW.
    vendor_evidence: [OpenText Documentum, Hyland OnBase, M-Files, Box Content Cloud, IBM FileNet]
    proposed_module: ECM-WORKFLOW

  - id: B3-DOC-AUDIT-TRAIL
    candidate: document_audit_trail_entries
    rationale: >-
      Universal compliance-driven entity; supports the regulatory load already linked
      (SOX, GDPR, HIPAA, GLBA, FDA 21 CFR Part 11, eIDAS). Would master in ECM-RECORDS-GOV
      (which hosts the ECM-AUDIT capability) and back its audit-trail capability with a real entity.
    vendor_evidence: [OpenText Documentum, Hyland OnBase, M-Files, Box Content Cloud, IBM FileNet, Microsoft SharePoint Online]
    proposed_module: ECM-RECORDS-GOV

  - id: B3-METADATA-PROPS
    candidate: metadata_property_definitions
    rationale: >-
      Anchors the metadata-driven ECM model (M-Files's whole architecture). Universal at
      OpenText, Hyland, SharePoint as "managed properties" or "term store". Would master in
      ECM-REPOSITORY alongside content_documents and document_classifications.
    vendor_evidence: [M-Files, OpenText Documentum, Hyland OnBase, Microsoft SharePoint Online]
    proposed_module: ECM-REPOSITORY

  - id: B3-DOC-RENDITIONS
    candidate: document_renditions
    rationale: >-
      Universal across vendors (PDF, preview, thumbnail rendering). Vendor shape varies
      between separate entity and computed attribute. Would master in ECM-REPOSITORY.
    vendor_evidence: [OpenText Documentum, Hyland OnBase, M-Files, Box Content Cloud, IBM FileNet, Microsoft SharePoint Online]
    proposed_module: ECM-REPOSITORY
