b1a:
  - id: B1A-S9
    summary: "Backfill `trigger_events.event_category` enum on 6 ECM events (currently empty string)."
    finding: >-
      `trigger_events.event_category` is empty string on 6 of 7 ECM-attributed events:
      895 (`content_document.uploaded`), 896 (`document.version_published`),
      897 (`document.classified`), 898 (`content_document.checked_out`),
      899 (`document.retention_expired`), 901 (`document_folder.permissions_changed`).
      Per Rule #13 the allowed values are `lifecycle`, `state_change`, `threshold`, `signal`.
      Event 900 (`content_document.legal_hold_applied`) was set to `state_change` in the
      2026-05-31 continuation; the other 6 were missed.
    action: >-
      PATCH each of the 6 trigger_events rows to set `event_category='state_change'`. Each
      models a master row transitioning state on `content_documents` /
      `document_versions` / `document_folders` / `document_classifications` /
      `records_retention_policies`. Use `/trigger_events?id=eq.<id>` with the
      PATCH body `{"event_category":"state_change"}`.
    affected_events:
      - {id: 895, event_name: "content_document.uploaded", current_category: "", proposed_category: "state_change"}
      - {id: 896, event_name: "document.version_published", current_category: "", proposed_category: "state_change"}
      - {id: 897, event_name: "document.classified", current_category: "", proposed_category: "state_change"}
      - {id: 898, event_name: "content_document.checked_out", current_category: "", proposed_category: "state_change"}
      - {id: 899, event_name: "document.retention_expired", current_category: "", proposed_category: "state_change"}
      - {id: 901, event_name: "document_folder.permissions_changed", current_category: "", proposed_category: "state_change"}

b1b:
  - id: B1B-S1
    summary: "Author the ECM module set (3 / 4 / 5 candidate splits surfaced); blocked on user decision."
    finding: >-
      `/domain_modules?domain_id=eq.91` returns 0 rows. Per Rule #14 every `domains` row
      requires >=1 `module_kind='full'` row, and a 7-capability domain requires >=2 full
      modules. This is the headline structural blocker. M1 / M2 / M4 / M6 / M7 / M8 /
      B9b / B10b (8 outbound + 10 inbound module-FK NULLs) / E1-E5 / F2-F5 all cure once
      a module set lands.
    action: >-
      Once the user picks a split shape in B2-MODULE-SPLIT, INSERT the 3 / 4 / 5
      `domain_modules` rows with `domain_id=91`, `module_kind='full'`, draft module codes
      `ECM-REPO` / `ECM-RECORDS` / `ECM-CLASSIFY` / `ECM-WORKFLOW` (4-shape default).
      Then INSERT `domain_module_capabilities`, `domain_module_data_objects`,
      `data_object_lifecycle_states` with `domain_module_id` populated, the 4 intra-domain
      `handoffs`, and PATCH the 18 cross-domain `handoffs` module FKs per the
      master-resolution rule.
    blocked_by:
      - {type: user_decision, ref: B2-MODULE-SPLIT}
    affected_modules: []
    affected_entities: [content_documents, document_versions, document_folders, document_classifications, records_retention_policies]

  - id: B1B-S2
    summary: "Link 7 ECM capabilities to realising module(s) once split lands."
    finding: >-
      `/domain_module_capabilities` is empty for ECM because no modules exist. Per M4
      every capability must have >=1 realising module. The 7 capabilities are ECM-REPO,
      ECM-RECORDS, ECM-WORKFLOW, ECM-INFOGOV, ECM-CAPTURE, ECM-AUDIT, ECM-CLASSIFY.
    action: >-
      After B1B-S1 lands, INSERT `domain_module_capabilities` rows mapping each capability
      to its realising module per the chosen split shape (default 4-split:
      ECM-REPO and ECM-CAPTURE -> ECM-REPO module; ECM-RECORDS and ECM-INFOGOV ->
      ECM-RECORDS; ECM-CLASSIFY -> ECM-CLASSIFY; ECM-WORKFLOW -> ECM-WORKFLOW;
      ECM-AUDIT -> ECM-RECORDS).
    blocked_by:
      - {type: depends_on, ref: B1B-S1, reason: "needs domain_modules rows to FK against"}
    affected_entities: [ECM-REPO, ECM-RECORDS, ECM-WORKFLOW, ECM-INFOGOV, ECM-CAPTURE, ECM-AUDIT, ECM-CLASSIFY]

