b2:
  - id: B2-1
    summary: Canonical ownership of knowledge_articles, KMS vs ITSM-KNOWLEDGE vs hybrid two-tier
    question: >-
      Should KMS canonically master a single knowledge-article entity that
      ITSM-KNOWLEDGE / HRSD-KNOWLEDGE / CSM-KNOWLEDGE embed (option a), should
      KMS retreat to a derived analytics layer that consumes the per-domain
      service-management knowledge masters (option b), or should a hybrid
      two-tier shape distinguish enterprise_knowledge_articles (KMS-mastered)
      from domain-specific articles like itsm_knowledge_articles (option c)?
    options: [a_kms_canonical, b_per_domain_canonical, c_hybrid_two_tier]
    why: >-
      Gates the B1B-S1 module-shape decision (which modules KMS gets, what each
      one masters/consumes), the B1B-M7-DUAL resolution, the B2-3 capability
      subset, and B3-1 through B3-3. Flagship vendors (ServiceNow, Glean,
      Confluence, Notion) treat the knowledge corpus as a single substrate that
      service-management embeds (favoring a), but the current catalog has been
      built the other way (favoring b for migration cost).
  - id: B2-2
    summary: Catalog UX text now WRITTEN; only a re-pivot needs approval
    question: >-
      The empty catalog_tagline and catalog_description on domains row 33 were
      backfilled with neutral buyer-voice copy on 2026-06-07 (Rule #20 backfill,
      record_status carries the review signal). The copy is corpus-neutral and
      does not lock into a "system of record" vs "analytics layer" framing. If
      B2-1 routes to option (b) "derived analytics layer", do you want the copy
      re-pivoted to an analytics-on-top-of-existing-wikis voice? A re-pivot is an
      overwrite of a now-non-empty value and needs explicit approval.
    options: [keep_as_written, repivot_to_analytics_voice]
    why: Rule #20 forbids overwriting a non-empty catalog UX value without explicit per-row user approval.
  - id: B2-3
    summary: Capability expansion, pick 5-8 of 8 codes
    question: >-
      Which of KM-AUTHORING, KM-TAXONOMY, KM-PUBLICATION-WORKFLOW,
      KM-VERIFICATION-CYCLES, KM-FEEDBACK-LOOP, KM-ANALYTICS, KM-GOVERNANCE,
      KM-AI-ASSIST to add as capability_domains rows?
    options: [authoring, taxonomy, publication_workflow, verification_cycles, feedback_loop, analytics, governance, ai_assist]
    why: A2 fails on 1 capability. Subset depends on B2-1 routing.
  - id: B2-4
    summary: Regulations scope expansion
    question: >-
      Beyond ISO/IEC 27001, attach ISO 30401 Knowledge Management Systems
      (recommended), GDPR, HIPAA, SEC 17a-4, FERPA, or any combination?
    options: [iso_30401, gdpr, hipaa, sec_17a_4, ferpa]
    why: Independent of B2-1.
  - id: B2-5
    summary: APQC tag override on handoff 826
    question: >-
      Handoff 826 (ECM document.version_published -> KMS) carries a legacy
      discovery_substring tag pointing at PCF 14095 "Document trade" (likely
      false positive on the noun "trade"). The 2026-05-31 continuation block
      already added an agent_curated row pointing at PCF 21679 "Deliver
      approved content". Retire the substring row (mark rejected) or leave both
      and let the reviewer pick at approval time?
    options: [retire_substring_row, leave_both_pending_review]
    why: Independent of B2-1. Retiring the substring row is destructive (flip to rejected); surfaced, not executed.
  - id: B2-6
    summary: Pattern flag knowledge_search_queries.has_personal_content
    question: >-
      Search query strings can carry PII typed by the user (e.g., "how do I
      update Jane Doe's home address"). Flagship vendors treat this as personal
      data subject to retention controls. Flip
      knowledge_search_queries.has_personal_content from false to true?
    options: [true_flip, false_keep]
    why: Rule #15 forbids auto-flipping pattern flags; surface for user decision.
  - id: B2-7
    summary: Optional lifecycle states on 4 masters (entity_type already classified)
    question: >-
      entity_type was classified on 2026-06-07: article_revisions and
      knowledge_search_queries are operational_record, knowledge_categories and
      knowledge_collections are catalog, so NONE of the four require lifecycle
      states (B12 passes without them). Optionally you may still author states:
      article_revisions, draft -> in_review -> approved (requires_permission,
      verb approve_revision) -> published -> superseded;
      knowledge_collections, draft -> published -> archived. Approve, edit, or
      reject the optional state machines per master.
    options: [approve_optional_states, edit_per_master, reject_leave_stateless]
    why: With entity_type classified the states are now optional, not required; the user owns whether to add them.

b3:
  - id: B3-1
    candidate: knowledge_owners
    rationale: >-
      Per-article steward / SME assignment. Universal pattern across flagship
      KM vendors. Drives verification cycles and feedback escalation. On
      B2-1 option (a) or (c), candidate KMS master; on option (b), candidate on
      the per-domain modules.
    vendor_evidence:
      - {vendor: ServiceNow Knowledge Management, evidence: 1st_class}
      - {vendor: Document360, evidence: 1st_class}
      - {vendor: Bloomfire, evidence: 1st_class}
      - {vendor: Guru, evidence: 1st_class}
      - {vendor: Notion, evidence: 1st_class}
    proposed_module: KMS-AUTHORING-or-KMS-GOVERNANCE
  - id: B3-2
    candidate: knowledge_subscriptions
    rationale: >-
      Per-user follows on articles or categories. Universal across modern
      wikis. May belong on a future INTRANET / NOTIFICATION layer rather than
      KMS itself.
    vendor_evidence:
      - {vendor: Notion, evidence: 1st_class}
      - {vendor: Confluence, evidence: 1st_class}
      - {vendor: Guru, evidence: 1st_class}
    proposed_module: KMS-DELIVERY
  - id: B3-3
    candidate: article_verification_cycles
    rationale: >-
      Mandatory cadence-based accuracy review on knowledge articles. Specialist
      pattern; borderline single-vendor (Guru) feature. Verify universality
      across 3+ vendors before loading.
    vendor_evidence:
      - {vendor: Guru, evidence: 1st_class}
      - {vendor: Document360, evidence: 1st_class}
      - {vendor: Bloomfire, evidence: 1st_class}
      - {vendor: ServiceNow Knowledge Management, evidence: secondary}
    proposed_module: KMS-GOVERNANCE
  - id: B3-4
    candidate: search_synonyms / search_dictionaries
    rationale: >-
      Controlled vocabulary on the search layer. Likely belongs on a candidate
      ENTERPRISE-SEARCH domain (queued to audits/_missing-domains.md), not
      KMS, on the modern enterprise-search architecture. If ENTERPRISE-SEARCH
      gets promoted, this set moves there; if KMS absorbs enterprise search,
      lives here.
    vendor_evidence:
      - {vendor: Glean, evidence: 1st_class}
      - {vendor: Coveo, evidence: 1st_class}
      - {vendor: Algolia, evidence: 1st_class}
      - {vendor: Lucidworks Fusion, evidence: 1st_class}
    proposed_module: ENTERPRISE-SEARCH-or-KMS-SEARCH-ANALYTICS
