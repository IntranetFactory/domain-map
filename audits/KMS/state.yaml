b1a:
  - id: B1A-S6
    summary: domains.description and business_logic on row 33 contain U+2014 em-dashes, violating project no-em-dash rule
    finding: >-
      The KMS domains row (id 33) carries an em-dash in the trailing clause of
      description ("internal and external audiences") and in business_logic
      ("Search and RAG retrieval over the knowledge corpus  vector embeddings,
      ranking, and relevance models"). Project rule forbids U+2014 anywhere in
      catalog text.
    action: >-
      PATCH /domains?id=eq.33 to replace the em-dash with a comma in both
      description and business_logic. Surgical PATCH, no Rule #20 user wording
      approval needed (typography fix, not new buyer copy).
    affected_entities:
      - domains.id=33
  - id: B1A-S7
    summary: 8 KMS-master-source trigger_events rows have empty event_category
    finding: >-
      Trigger events 754, 755, 756, 757, 758, 759, 760, 761 (sourced from
      data_objects 410-415) all have event_category=''. Enum requires one of
      lifecycle | state_change | threshold | signal.
    action: >-
      PATCH events 754, 755, 756, 757, 758, 761 to event_category='lifecycle'
      (lifecycle transitions on the master). PATCH events 759
      (article_feedback.negative) and 760 (knowledge_search_query.no_result) to
      event_category='signal' (quality/gap signals from the master). Surgical
      PATCH per row.
    affected_events:
      - {id: 754, event_name: knowledge_base_article.published, current_category: "", proposed_category: lifecycle}
      - {id: 755, event_name: knowledge_base_article.deprecated, current_category: "", proposed_category: lifecycle}
      - {id: 756, event_name: knowledge_base_article.updated, current_category: "", proposed_category: lifecycle}
      - {id: 757, event_name: knowledge_category.restructured, current_category: "", proposed_category: lifecycle}
      - {id: 758, event_name: article_revision.approved, current_category: "", proposed_category: lifecycle}
      - {id: 759, event_name: article_feedback.negative, current_category: "", proposed_category: signal}
      - {id: 760, event_name: knowledge_search_query.no_result, current_category: "", proposed_category: signal}
      - {id: 761, event_name: knowledge_collection.published, current_category: "", proposed_category: lifecycle}

