b3:
  - id: B3-BLOCK-HOURS
    candidate: block_hour_pools
    rationale: >-
      Flagship MSP-PSA vendors model the per-client per-contract block-hour pool as a
      first-class master with a consumption ledger. Currently the block-hour decrement
      is implicit in msp_contracts.business_logic; no explicit master records remaining
      balance.
    vendor_evidence: ["ConnectWise PSA", "Halo PSA", "Autotask PSA"]
    proposed_module: CONTRACTS_or_TIME_BILLING

  - id: B3-SLA-DEFS
    candidate: sla_definitions
    rationale: >-
      Flagship MSP-PSA vendors carry per-tier SLA-template entities distinct from
      per-contract SLA terms. Currently SLA shape lives implicitly inside msp_contracts;
      the pause/resume mechanic on msp_tickets.on_hold reads from no master.
    vendor_evidence: ["ConnectWise PSA", "Halo PSA", "Autotask PSA", "SuperOps"]
    proposed_module: CONTRACTS

  - id: B3-RECURRING-BILLING
    candidate: recurring_billing_schedules
    rationale: >-
      Flagship MSP-PSA vendors model the recurring invoice schedule as a first-class
      entity distinct from msp_invoices (the rendered invoice). Currently implicit
      in msp_contracts.
    vendor_evidence: ["Autotask PSA", "ConnectWise PSA", "Halo PSA"]
    proposed_module: TIME_BILLING

  - id: B3-ESTATE-INVENTORY
    candidate: customer_estate_inventory
    rationale: >-
      Central canonical of every managed endpoint per client. Broader than RMM's
      rmm_agents (printers, network gear, lapsed agents). HAM's hardware_assets is
      enterprise-IT-owned, not MSP-multi-tenant.
    vendor_evidence: ["ConnectWise PSA", "Autotask PSA", "Halo PSA", "SuperOps"]
    proposed_module: new_module_MSP_PSA_ESTATE_or_extend_CONTRACTS

  - id: B3-QUOTES
    candidate: quote_for_new_work
    rationale: >-
      Flagship MSP-PSA vendors model project-quote records distinct from contract
      amendments (project-shaped work for an existing client). Adjacency to CPQ;
      specifically MSP-flavored CPQ (low-touch, project-sized).
    vendor_evidence: ["Halo PSA", "SuperOps", "ConnectWise PSA"]
    proposed_module: new_module_or_fold_into_sister_MSP_CPQ_domain

  - id: B3-CHANGE-REQUESTS
    candidate: change_requests_msp_scoped
    rationale: >-
      Flagship MSP-PSA vendors carry MSP-scoped change-management records distinct from
      ITIL change-management. ITSM's change_requests is enterprise-scoped, not
      multi-tenant.
    vendor_evidence: ["ConnectWise PSA", "Halo PSA"]
    proposed_module: new_module_or_extend_SVC_DESK

  - id: B3-MODULARIZATION-CONTRACTS-SPLIT
    candidate: split_CONTRACTS_into_CLIENTS_and_CONTRACTS
    rationale: >-
      CONTRACTS module is overloaded (carries both msp_clients and msp_contracts
      masters). Natural split is MSP-PSA-CLIENTS (client roster + onboarding lifecycle
      on msp_clients) vs MSP-PSA-CONTRACTS (contracts + SLAs + billing pool +
      amendments). Phase 0 vendor-evidence question: do flagship vendors split them?
    vendor_evidence: ["ConnectWise PSA", "Autotask PSA", "Halo PSA"]
    proposed_module: refactor_138_into_two_modules

  - id: B3-PCI-DSS
    candidate: regulation_PCI_DSS_per_client
    rationale: >-
      PCI DSS applies per-client when MSP techs handle PAN data for client estates.
      Adjacency rather than core; needs Phase 0 confirmation of how vendors model
      cardholder-scoped per-client compliance posture.
    vendor_evidence: ["ConnectWise PSA"]
    proposed_module: regulations_table

  - id: B3-SOC2-MSP
    candidate: regulation_SOC2_msp_side
    rationale: >-
      SOC 2 compliance posture for the MSP organization. Less a regulation row binding
      to MSP-PSA and more a MSP-org-level posture.
    vendor_evidence: ["ConnectWise PSA", "Halo PSA"]
    proposed_module: regulations_table

  - id: B3-HIPAA-BAA
    candidate: regulation_HIPAA_BAA_per_healthcare_client
    rationale: >-
      HIPAA BAA scope applies per-healthcare-client; needs Phase 0 confirmation of how
      vendors model per-client compliance overlays.
    vendor_evidence: ["ConnectWise PSA", "Halo PSA"]
    proposed_module: regulations_table

  - id: B3-DATA-BREACH-STATUTES
    candidate: regulation_us_state_data_breach_notification
    rationale: >-
      US state data-breach notification statutes engage when a tech accesses customer
      PHI/PII during a session. Adjacency to REMOTE-ACCESS as much as MSP-PSA.
    vendor_evidence: ["ConnectWise PSA"]
    proposed_module: regulations_table
