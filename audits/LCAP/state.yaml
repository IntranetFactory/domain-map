b1a:
  - id: B1A-S5
    summary: "Author 8 intra-domain data_object_relationships across the 5 LCAP masters (lcap_apps, lcap_business_objects, lcap_workflows, lcap_pages, lcap_data_sources)."
    finding: "B6 hard-fail. Zero intra-domain data_object_relationships exist between LCAP masters even though the cluster is internally coupled. Minimum coherent edge set: lcap_apps contains_pages lcap_pages (1:N), lcap_apps contains_workflows lcap_workflows (1:N), lcap_apps defines lcap_business_objects (1:N), lcap_apps binds_to lcap_data_sources (M:N), lcap_pages displays lcap_business_objects (M:N), lcap_workflows operates_on lcap_business_objects (M:N), lcap_workflows triggers_from lcap_pages (M:N), lcap_business_objects sources_from lcap_data_sources (M:N)."
    action: "Draft 8 rows in cluster-drafts format (verb + cardinality + necessity + owner_side, notes='' per Rule #15, record_status default 'new' per Rule #1). Load via scripts/loaders/load_cluster_drafts.ts. Independent of B2-S1 module split decision; can run any time."
    affected_masters:
      - {data_object_id: 220, name: lcap_apps, target_module_id: null, workflow: composition}
      - {data_object_id: 221, name: lcap_business_objects, target_module_id: null, workflow: composition}
      - {data_object_id: 222, name: lcap_workflows, target_module_id: null, workflow: runtime}
      - {data_object_id: 715, name: lcap_pages, target_module_id: null, workflow: composition}
      - {data_object_id: 716, name: lcap_data_sources, target_module_id: null, workflow: integration}
  - id: B1A-S8
    summary: "Author ~20 data_object_aliases across the 5 LCAP masters covering OutSystems, Mendix, Power Apps, Appian, Pega vendor terminology."
    finding: "B11 hard-fail. Zero data_object_aliases on any LCAP master even though every flagship vendor uses its own naming (OutSystems module/entity, Mendix domain entity/microflow, Power Apps canvas app/table/flow, Appian record type/process model, Pega case type). Without aliases the architect agent can't bridge vendor terminology back into the canonical names."
    action: "Draft alias tuples (5 masters x ~4 aliases) and load via cluster-drafts loader. Tuples need authoring before bulk insert; loader pre-flight per Rule #15 keeps notes empty. Independent of B2-S1."
    affected_masters:
      - {data_object_id: 220, name: lcap_apps, target_module_id: null, workflow: composition}
      - {data_object_id: 221, name: lcap_business_objects, target_module_id: null, workflow: composition}
      - {data_object_id: 222, name: lcap_workflows, target_module_id: null, workflow: runtime}
      - {data_object_id: 715, name: lcap_pages, target_module_id: null, workflow: composition}
      - {data_object_id: 716, name: lcap_data_sources, target_module_id: null, workflow: integration}
