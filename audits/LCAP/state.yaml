b2:
  - id: B2-MODULE-CATALOG-UX
    summary: "M8 / A4 (Rule #20) catalog_tagline + catalog_description empty on the 2 new module rows (265, 266) and the domain row."
    question: >
      domain_modules 265 (LCAP-VISUAL-COMPOSITION) and 266 (LCAP-RUNTIME-LIFECYCLE) were
      inserted with catalog_tagline and catalog_description omitted per Rule #20, which
      forbids the agent drafting and inserting that copy without explicit user approval.
      domains.catalog_tagline / catalog_description are likewise empty. How should the
      catalog-facing copy be authored for the 2 modules and the domain row?
    options:
      - "(a) user supplies wording for all three rows (2 modules + domain)."
      - "(b) agent drafts for review (one round only; no auto-insert)."
      - "(c) defer to a catalog-wide UX-copy pass."
    why: "Rule #20 forbids drafting and inserting catalog-tagline / catalog-description without user approval."
  - id: B2-S2
    summary: "B4 pattern flag re-evaluation (Rule #12). Per-master proposed flips on lcap_apps, lcap_business_objects, lcap_data_sources, lcap_workflows."
    question: >
      For each master, yes/no on the proposed pattern flag flips: (i) lcap_apps.has_submit_lock=true
      once a published version exists; (ii) lcap_business_objects.has_submit_lock=true once schema
      is deployed with dependent pages; (iii) lcap_data_sources.has_personal_content=true because
      connection credentials are personal-content-shaped; (iv) lcap_workflows.has_submit_lock=true
      once active.
    options:
      - "(a) all four yes."
      - "(b) selective yes (specify which)."
      - "(c) all four no (record defaults as the considered answer)."
    why: "Pattern flags are workflow-shape judgments the user owns. Per Rule #15 the rationale cannot be auto-recorded in notes."
  - id: B2-S3
    summary: "C1 business function spine alignment for LCAP."
    question: >
      Live owner is IT Infrastructure, contributors Software Engineering + Business Operations.
      The canonical 20-function spine names IT Operations (not IT Infrastructure) and has no
      Business Operations row. Re-anchor or leave?
    options:
      - "(a) re-anchor to spine: owner IT Operations, contributor Software Engineering, drop Business Operations."
      - "(b) leave as-is: spine is documentation, live data is authoritative."
      - "(c) mixed: re-anchor + add Software Engineering as second owner since low-code platforms straddle IT / engineering."
    why: "Agent can't tell whether the live business_functions table has been extended beyond the canonical spine deliberately or by drift. Re-anchoring without confirmation could break existing analysis."
  - id: B2-S4
    summary: "Cross-cutting capability OPERATIONAL-DATA-APPS scope decision."
    question: >
      Should OPERATIONAL-DATA-APPS stay single-domain on LCAP (now placed in module 265
      LCAP-VISUAL-COMPOSITION), or expand to NCDB / APP-PAAS so the cross-domain shape is
      captured? Vendors marketing operational data apps: LCAP (Power Platform, Mendix,
      OutSystems), NCDB (Airtable, Smartsheet, Notion DBs), borderline APP-PAAS.
    options:
      - "(a) keep LCAP-only."
      - "(b) +NCDB."
      - "(c) +NCDB + APP-PAAS."
    why: "Cross-cutting capability scope is a market-test decision the user owns; the vendor surface across LCAP / NCDB / APP-PAAS is borderline."
  - id: B2-S5
    summary: "domains.business_logic carries U+2014 em-dash (CLAUDE.md violation)."
    question: >
      Current text: 'Runtime, compiler, and visual modeller [U+2014] the entire platform is
      code. The end-user app surface is whatever the customer builds; the LCAP itself is
      platform.' Suggested rewrite: 'Runtime, compiler, and visual modeller. The entire
      platform is code, the end-user app surface is whatever the customer builds, and the
      LCAP itself is platform.'
    options:
      - "(a) apply suggested rewrite."
      - "(b) provide alternative wording."
      - "(c) defer to catalog-wide em-dash cleanup pass."
    why: "Editorial wording on existing catalog rows is the user's call; CLAUDE.md no-em-dash rule forbids U+2014."
  - id: B2-B9D-OWN-278
    summary: "Low-Code Application Platform: name an owner for \"Develop service/solution and integration strategy\" (no one is responsible for it today)"
    question: |
      Integration Platform as a Service forwards low-code workflow to Low-Code Application Platform to develop service or solution and integration strategy, but Low-Code Application Platform does not yet have anyone assigned to develop service or solution and integration strategy, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Low-Code Application Platform owns, and assign a named owner once Low-Code Application Platform sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Low-Code Application Platform decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-LCAP.md q10.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-115
    summary: "Low-Code Application Platform: name an owner for \"Manage product and service master data\" (no one is responsible for it today)"
    question: |
      Data Catalog and Governance forwards low-code business object to Low-Code Application Platform to manage product and service master data, but Low-Code Application Platform does not yet have anyone assigned to manage product and service master data, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Low-Code Application Platform owns, and assign a named owner once Low-Code Application Platform sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Low-Code Application Platform decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-LCAP.md q11.
    extra_b9d_added: "2026-06-13"

