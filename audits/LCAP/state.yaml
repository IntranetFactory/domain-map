b1a:
  - id: B1A-SYSTEM-SKILLS
    summary: "Author 2 module-anchored system skills (one per LCAP module) and retire legacy domain-level skill lcap-system (id 79); rename 5 legacy extend_* tools to lcap_* shape."
    finding: >
      F2 hard-fail now actionable. With modules live (265 LCAP-VISUAL-COMPOSITION,
      266 LCAP-RUNTIME-LIFECYCLE), Rule #17 requires one domain_module_id-anchored
      system skill per module, but zero exist. The legacy domain_id-anchored system
      skill lcap-system (id 79) remains with 5 query-only skill_tools (564
      query_extend_apps, 565 query_extend_business_objects, 566 query_extend_workflows,
      822 query_extend_pages, 823 query_extend_data_sources) still carrying the legacy
      extend_* tool_name even though the underlying data_objects were renamed lcap_*.
      Rule #17 floor of 5-20 tools per system skill (query + mutate + workflow-gate mix)
      is below the current 5 query-only set.
    action: >
      Author 2 new domain_module_id-anchored system skills (265, 266), rename the 5 tools
      (extend_* -> lcap_*), reassign skill_tools to the new skills per module shape, add
      mutate + workflow-gate tools to clear the Rule #17 floor, then DELETE skill 79.
    affected_modules: [265, 266]
    affected_entities:
      - lcap-system
      - query_extend_apps
      - query_extend_business_objects
      - query_extend_workflows
      - query_extend_pages
      - query_extend_data_sources
  - id: B1A-LIFECYCLE-STATES
    summary: "Author ~25 data_object_lifecycle_states across the 5 LCAP masters, each carrying its owning domain_module_id per M5."
    finding: >
      B12 hard-fail, now actionable with modules live. Zero lifecycle states across the
      5 LCAP masters. Each has an obvious state machine: draft -> validated -> published
      -> deprecated -> retired for apps/pages/workflows/business_objects (masters in 265
      for apps/pages/business_objects, 266 for workflows); configured -> tested -> active
      -> degraded -> retired for lcap_data_sources (265). requires_permission=true on
      publish, deprecate, retire gates. No config-shape exemption applies (Rule #12).
    action: >
      Draft state machines and load via a focused loader. Each row sets domain_module_id
      to the master's owning module (220/221/715/716 -> 265; 222 -> 266) per M5. notes=''
      per Rule #15.
    affected_masters:
      - {data_object_id: 220, name: lcap_apps, target_module_id: 265, workflow: lifecycle}
      - {data_object_id: 221, name: lcap_business_objects, target_module_id: 265, workflow: lifecycle}
      - {data_object_id: 222, name: lcap_workflows, target_module_id: 266, workflow: lifecycle}
      - {data_object_id: 715, name: lcap_pages, target_module_id: 265, workflow: lifecycle}
      - {data_object_id: 716, name: lcap_data_sources, target_module_id: 265, workflow: connection}
  - id: B1A-S5
    summary: "Author 8 intra-domain data_object_relationships across the 5 LCAP masters (lcap_apps, lcap_business_objects, lcap_workflows, lcap_pages, lcap_data_sources)."
    finding: >
      B6 hard-fail. Zero intra-domain data_object_relationships exist between LCAP masters
      even though the cluster is internally coupled. Minimum coherent edge set: lcap_apps
      contains_pages lcap_pages (1:N), lcap_apps contains_workflows lcap_workflows (1:N),
      lcap_apps defines lcap_business_objects (1:N), lcap_apps binds_to lcap_data_sources
      (M:N), lcap_pages displays lcap_business_objects (M:N), lcap_workflows operates_on
      lcap_business_objects (M:N), lcap_workflows triggers_from lcap_pages (M:N),
      lcap_business_objects sources_from lcap_data_sources (M:N).
    action: >
      Draft 8 rows in cluster-drafts format (verb + cardinality + necessity + owner_side,
      notes='' per Rule #15). Load via scripts/loaders/load_cluster_drafts.ts. Independent
      of the module build; can run any time.
    affected_masters:
      - {data_object_id: 220, name: lcap_apps, target_module_id: 265, workflow: composition}
      - {data_object_id: 221, name: lcap_business_objects, target_module_id: 265, workflow: composition}
      - {data_object_id: 222, name: lcap_workflows, target_module_id: 266, workflow: runtime}
      - {data_object_id: 715, name: lcap_pages, target_module_id: 265, workflow: composition}
      - {data_object_id: 716, name: lcap_data_sources, target_module_id: 265, workflow: integration}
  - id: B1A-S8
    summary: "Author ~20 data_object_aliases across the 5 LCAP masters covering OutSystems, Mendix, Power Apps, Appian, Pega vendor terminology."
    finding: >
      B11 hard-fail. Zero data_object_aliases on any LCAP master even though every flagship
      vendor uses its own naming (OutSystems module/entity, Mendix domain entity/microflow,
      Power Apps canvas app/table/flow, Appian record type/process model, Pega case type).
      Without aliases the architect agent can't bridge vendor terminology back into the
      canonical names.
    action: >
      Draft alias tuples (5 masters x ~4 aliases) and load via cluster-drafts loader. Loader
      pre-flight per Rule #15 keeps notes empty. Independent of the module build.
    affected_masters:
      - {data_object_id: 220, name: lcap_apps, target_module_id: 265, workflow: composition}
      - {data_object_id: 221, name: lcap_business_objects, target_module_id: 265, workflow: composition}
      - {data_object_id: 222, name: lcap_workflows, target_module_id: 266, workflow: runtime}
      - {data_object_id: 715, name: lcap_pages, target_module_id: 265, workflow: composition}
      - {data_object_id: 716, name: lcap_data_sources, target_module_id: 265, workflow: integration}
    vendor_evidence:
      - OutSystems
      - Mendix
      - Microsoft Power Platform
      - Appian Platform
      - Pega Platform
  - id: B1A-S14-ITSM
    summary: "Author 1 cross-domain data_object_relationship from lcap_apps to ITSM service_incidents covering handoff 706."
    finding: >
      B8 hard-fail (partial). 4 LCAP outbound handoffs have zero cross-domain
      data_object_relationships. Of the 4, handoff 706 (lcap_app.deployment_failed -> ITSM,
      payload service_incidents) is directly resolvable today because service_incidents is
      a known ITSM master. The other 3 outbound rows (704 APP-PAAS, 705 IPAAS, 707 DCG)
      need target-domain master verification first (see B1B-S14-OTHERS).
    action: >
      Insert 1 data_object_relationships row (lcap_apps opens service_incidents) via the
      cluster-drafts pattern. Bundle with B1A-S5 if running together. notes='' per Rule #15.
    affected_handoffs:
      - {handoff_id: 706, direction: outbound, source_domain: LCAP, target_domain: ITSM, trigger_event: lcap_app.deployment_failed, payload: service_incidents, null_field: cross_domain_relationship_missing}
  - id: B1A-HANDOFF-SOURCE-MODULES
    summary: "PATCH source_domain_module_id on 4 outbound LCAP handoffs (704, 705, 706, 707) now that modules exist."
    finding: >
      B10b hard-fail, now resolvable. All 4 outbound handoffs have source_domain_module_id=NULL.
      With modules live the source resolves deterministically by master ownership: 704
      (lcap_app.published), 706 (lcap_app.deployment_failed), 707 (lcap_business_object.schema_changed)
      -> 265 LCAP-VISUAL-COMPOSITION; 705 (lcap_workflow.published) -> 266 LCAP-RUNTIME-LIFECYCLE.
      Target-side: 706 already has target_domain_module_id=38 (ITSM); 704/705/707 target NULL
      pending counterparty audits (see B1B-S14-OTHERS).
    action: >
      Single PATCH pass on 4 rows. Reference loader pattern:
      scripts/loaders/backfill_ats_handoff_modules_2026_05_23.ts.
    affected_handoffs:
      - {handoff_id: 704, direction: outbound, source_domain: LCAP, target_domain: APP-PAAS, trigger_event: lcap_app.published, payload: lcap_apps, null_field: source_domain_module_id}
      - {handoff_id: 705, direction: outbound, source_domain: LCAP, target_domain: IPAAS, trigger_event: lcap_workflow.published, payload: lcap_workflows, null_field: source_domain_module_id}
      - {handoff_id: 706, direction: outbound, source_domain: LCAP, target_domain: ITSM, trigger_event: lcap_app.deployment_failed, payload: service_incidents, null_field: source_domain_module_id}
      - {handoff_id: 707, direction: outbound, source_domain: LCAP, target_domain: DCG, trigger_event: lcap_business_object.schema_changed, payload: lcap_business_objects, null_field: source_domain_module_id}

b1b:
  - id: B1B-S13
    summary: "Author 3 intra-domain handoffs (cross-module lifecycle progressions) between the 2 LCAP modules."
    finding: >
      B9b hard-fail. With 2 modules live (265, 266), cross-module transitions need explicit
      handoff rows: workflow definitions edited in 265 execute in 266 (lcap_workflow.published);
      business-object schema authored in 265 drives the runtime data layer in 266
      (lcap_business_object.schema_changed); runtime errors fire back from 266 to 265
      (lcap_workflow.failed).
    action: >
      Author 3 intra-domain handoff rows with source_domain_id = target_domain_id = 37,
      integration_pattern=lifecycle_progression, friction_level=low, notes='' per Rule #15.
    blocked_by:
      - {type: depends_on, ref: B1A-S5, reason: needs cross-module data_object_relationships to derive the expected pair set}
  - id: B1B-S14-OTHERS
    summary: "Author 3 cross-domain data_object_relationships rows for outbound handoffs 704 (APP-PAAS), 705 (IPAAS), 707 (DCG) once each target domain's masters are confirmed."
    finding: >
      B8 hard-fail (partial). 3 of 4 outbound handoffs need cross-domain relationship rows
