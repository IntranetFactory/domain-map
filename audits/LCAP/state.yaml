      - {type: domain_audit, blocking_domain: DCG, milestone: target_master_identified_for_lcap_business_objects_consumer}
    affected_handoffs:
      - {handoff_id: 704, direction: outbound, source_domain: LCAP, target_domain: APP-PAAS, trigger_event: lcap_app.published, payload: lcap_apps, null_field: cross_domain_relationship_missing}
      - {handoff_id: 705, direction: outbound, source_domain: LCAP, target_domain: IPAAS, trigger_event: lcap_workflow.published, payload: lcap_workflows, null_field: cross_domain_relationship_missing}
