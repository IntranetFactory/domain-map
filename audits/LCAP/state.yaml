    summary: "Author the LCAP domain_modules (M1/M2/M4/M6 cure) once user picks the module split shape."
    finding: "M1, M2, M4, M6 hard-fail. Zero domain_modules rows for LCAP with 7 capabilities. Rule #14 requires >=2 modules for domains with >=3 capabilities. Every M5, M7, M8, B9b, B10b, B12, F1, F2, F3, F4, F5, E1-E5 check inherits the gap."
    blocked_by:
      - {type: user_decision, ref: B2-S1}
    affected_modules: []
    affected_entities:
      - lcap_apps
      - lcap_business_objects
      - lcap_workflows
      - lcap_pages
      - lcap_data_sources
  - id: B1B-S9
    summary: "Author ~25 data_object_lifecycle_states rows across the 5 LCAP masters."
    finding: "B12 hard-fail. Zero lifecycle states across 5 LCAP masters; every master has an obvious state machine (draft -> validated -> published -> deprecated -> retired for apps/pages/workflows/business_objects; configured -> tested -> active -> degraded -> retired for data_sources). Rule #12 requires lifecycle states on master+required data_objects; no config-shape exemption applies. requires_permission=true on publish, deprecate, retire gates."
    action: "Draft state machines, load via focused loader. Each row needs domain_module_id per M5 once modules exist."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S1}
    affected_masters:
      - {data_object_id: 220, name: lcap_apps, target_module_id: null, workflow: lifecycle}
      - {data_object_id: 221, name: lcap_business_objects, target_module_id: null, workflow: lifecycle}
      - {data_object_id: 222, name: lcap_workflows, target_module_id: null, workflow: lifecycle}
      - {data_object_id: 715, name: lcap_pages, target_module_id: null, workflow: lifecycle}
      - {data_object_id: 716, name: lcap_data_sources, target_module_id: null, workflow: connection}
  - id: B1B-S10
    summary: "Retire legacy domain-level system skill lcap-system (id 79) and author 2 module-anchored system skills. Also rename 5 legacy extend_* tool rows to lcap_* shape."
    finding: "F1 transitional pass (legacy skill exists, no module-level skill exists yet). F2 hard-fail (zero domain_module_id-anchored system skills). Tools 564 query_extend_apps, 565 query_extend_business_objects, 566 query_extend_workflows, 822 query_extend_pages, 823 query_extend_data_sources still carry the legacy extend_* tool_name even though the underlying data_objects were renamed in the 2026-05-31 continuation. Rule #17 floor of 5-20 tools per system skill (mix of query + mutate + workflow-gate) is below the current 5 query-only set."
    action: "After B1B-S1 lands: author 2 new domain_module_id-anchored system skills, rename the 5 tools (extend_* -> lcap_*), reassign skill_tools to the new skills per module shape, then DELETE skill 79. Add mutate + workflow-gate tools per Rule #17 floor."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S1}
    affected_entities:
      - lcap-system
      - query_extend_apps
      - query_extend_business_objects
      - query_extend_workflows
      - query_extend_pages
      - query_extend_data_sources
  - id: B1B-S12
    summary: "PATCH source_domain_module_id on 4 outbound LCAP handoffs once modules exist."
    finding: "B10b hard-fail. All 4 outbound handoffs (704, 705, 706, 707) have source_domain_module_id=NULL. After B1B-S1 the source module resolves deterministically per the role-strength rule: 704 (lcap_app.published) and 706 (lcap_app.deployment_failed) -> LCAP-VISUAL-COMPOSITION (masters lcap_apps); 705 (lcap_workflow.published) -> LCAP-RUNTIME-LIFECYCLE; 707 (lcap_business_object.schema_changed) -> LCAP-VISUAL-COMPOSITION. Target-side module also pending: 706 already has target_domain_module_id=38 (ITSM module); 704/705/707 target NULL pending counterparty audits."
    action: "Single PATCH pass on 4 rows after B1B-S1. Reference loader pattern: scripts/loaders/backfill_ats_handoff_modules_2026_05_23.ts."
    blocked_by:
