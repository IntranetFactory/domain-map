    finding: "B9b hard-fail. With 2 modules expected, cross-module transitions need explicit handoff rows: workflow definitions edited in LCAP-VISUAL-COMPOSITION execute in LCAP-RUNTIME-LIFECYCLE (lcap_workflow.published); business-object schema authored in LCAP-VISUAL-COMPOSITION drives runtime data layer in LCAP-RUNTIME-LIFECYCLE (lcap_business_object.schema_changed); runtime errors fire back from LCAP-RUNTIME-LIFECYCLE to LCAP-VISUAL-COMPOSITION (lcap_workflow.failed)."
