    finding: >
      H1 partial. 4 of 5 cross-domain handoffs carry handoff_processes (agent_curated,
      record_status=new). The 5th (handoff 701, inbound from NCDB on
      nocode_record_definition.changed) cannot be classified until NCDB cures its B5
