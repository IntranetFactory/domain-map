      Proposed verbs: lcap_apps deploys_to <app_paas_master>, lcap_workflows registers_with
      <ipaas_master>, lcap_business_objects publishes_to <dcg_catalog_master>.
    action: >
      After APP-PAAS / IPAAS / DCG modularize, confirm the target master, then INSERT the 3
