b2:
  - id: B2-S1
    summary: "Pick LCAP module split shape (gates B1B-S1 and all downstream M / B12 / F / E work)."
    question: "What is the LCAP module split? Proposed 2-module: LCAP-VISUAL-COMPOSITION (lcap_apps, lcap_pages, lcap_business_objects, lcap_data_sources; realizes LCAP-VISUAL-MODELING, LCAP-INTEGRATION-CONNECTORS, LCAP-AI-ASSIST, OPERATIONAL-DATA-APPS) + LCAP-RUNTIME-LIFECYCLE (lcap_workflows; realizes LCAP-MANAGED-RUNTIME, LCAP-WORKFLOW-AUTO, LCAP-LIFECYCLE-MGMT)."
    options:
      - "(a) 2-module split as proposed."
      - "(b) 3-module split adding LCAP-INTEGRATION (masters lcap_data_sources; realizes LCAP-INTEGRATION-CONNECTORS)."
      - "(c) 4-module split (split visual modeling, runtime, ALM, AI-assist into separate modules)."
      - "(d) user-proposed split."
    why: "Modularization is a deploy-shape decision. Vendor matrix supports several splits; catalog convention favors 2-3 functional modules over many narrow ones."
  - id: B2-S2
    summary: "B4 pattern flag re-evaluation (Rule #12). Per-master proposed flips on lcap_apps, lcap_business_objects, lcap_data_sources, lcap_workflows."
    question: "For each master, yes/no on the proposed pattern flag flips: (i) lcap_apps.has_submit_lock=true once a published version exists; (ii) lcap_business_objects.has_submit_lock=true once schema is deployed with dependent pages; (iii) lcap_data_sources.has_personal_content=true because connection credentials are personal-content-shaped; (iv) lcap_workflows.has_submit_lock=true once active."
    options:
      - "(a) all four yes."
      - "(b) selective yes (specify which)."
      - "(c) all four no (record defaults as the considered answer)."
    why: "Pattern flags are workflow-shape judgments the user owns. Per Rule #15 the rationale cannot be auto-recorded in notes."
  - id: B2-S3
    summary: "C1 business function spine alignment for LCAP."
    question: "Live owner is IT Infrastructure, contributors Software Engineering + Business Operations. The canonical 20-function spine names IT Operations (not IT Infrastructure) and has no Business Operations row. Re-anchor or leave?"
    options:
      - "(a) re-anchor to spine: owner IT Operations, contributor Software Engineering, drop Business Operations."
      - "(b) leave as-is: spine is documentation, live data is authoritative."
      - "(c) mixed: re-anchor + add Software Engineering as second owner since low-code platforms straddle IT / engineering."
    why: "Agent can't tell whether the live business_functions table has been extended beyond the canonical spine deliberately or by drift. Re-anchoring without confirmation could break existing analysis."
  - id: B2-S4
    summary: "Cross-cutting capability OPERATIONAL-DATA-APPS scope decision."
    question: "Should OPERATIONAL-DATA-APPS stay single-domain on LCAP, or expand to NCDB / APP-PAAS so the cross-domain shape is captured? Vendors marketing operational data apps: LCAP (Power Platform, Mendix, OutSystems), NCDB (Airtable, Smartsheet, Notion DBs), borderline APP-PAAS."
    options:
      - "(a) keep LCAP-only."
      - "(b) +NCDB."
      - "(c) +NCDB + APP-PAAS."
    why: "Cross-cutting capability scope is a market-test decision the user owns; the vendor surface across LCAP / NCDB / APP-PAAS is borderline."
  - id: B2-S5
    summary: "domains.business_logic carries U+2014 em-dash (CLAUDE.md violation)."
    question: "Current text: 'Runtime, compiler, and visual modeller [U+2014] the entire platform is code. The end-user app surface is whatever the customer builds; the LCAP itself is platform.' Suggested rewrite: 'Runtime, compiler, and visual modeller. The entire platform is code, the end-user app surface is whatever the customer builds, and the LCAP itself is platform.'"
    options:
      - "(a) apply suggested rewrite."
      - "(b) provide alternative wording."
      - "(c) defer to catalog-wide em-dash cleanup pass."
    why: "Editorial wording on existing catalog rows is the user's call; CLAUDE.md no-em-dash rule forbids U+2014."
  - id: B2-S6
    summary: "A4 / M8 Rule #20 catalog_tagline + catalog_description authoring on domain row and (future) module rows."
    question: "domains.catalog_tagline and domains.catalog_description are empty. Per Rule #20, agent cannot draft and insert without explicit per-row user approval. Same applies on every module after B1B-S1."
    options:
      - "(a) user supplies wording for both fields."
      - "(b) agent drafts for review (one round only; no auto-insert)."
      - "(c) defer until after B2-S1 / B1B-S1 land so module copy can be drafted in the same pass."
    why: "Rule #20 forbids drafting and inserting catalog-tagline / catalog-description without user approval."

