      - Mendix
      - Microsoft Power Platform
      - Appian Platform
      - Pega Platform
  - id: B1A-S14-ITSM
    summary: "Author 1 cross-domain data_object_relationship from lcap_apps to ITSM service_incidents covering handoff 706."
    finding: "B8 hard-fail (partial). 4 LCAP outbound handoffs have zero cross-domain data_object_relationships. Of the 4, handoff 706 (lcap_app.deployment_failed -> ITSM, payload service_incidents) is directly resolvable today because service_incidents is a known ITSM master. The other 3 outbound rows (704 APP-PAAS, 705 IPAAS, 707 DCG) need target-domain master verification first."
