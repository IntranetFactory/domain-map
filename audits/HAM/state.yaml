      peripheral). Today hardware_models carries implicit type but no category
      master. Flagship vendors all model this as a separate dimension.
    vendor_evidence: [ServiceNow Hardware Asset Management, Lansweeper, Flexera One IT Asset Management, NinjaOne Endpoint Management, Snipe-IT]
    proposed_module: HAM-ASSET-REGISTRY

  - id: B3-S2
