b2:
  - id: B2-S1
    summary: Pattern flags positive re-evaluation across all 5 HAM masters
    question: |
      All 5 HAM masters today carry every pattern flag (has_personal_content,
      has_submit_lock, has_single_approver) at false. Default-false is not the
      same as false-after-review. Per Rule #12 a positive review is required.
      Candidate flips:
      hardware_disposal_records.has_submit_lock=true (chain of custody freezes
        on certificate issuance);
      hardware_disposal_records.has_single_approver=true (asset disposition
        officer signs off);
      hardware_assets.has_personal_content=true (assignment carries employee
        identity / location of last custodian);
      hardware_warranties.has_submit_lock=true (signed warranty contract).
      Other masters likely stay false.
    options: [per_flag_per_master_yes_or_no, accept_all_recommendations, reject_all_keep_false]
    why: Workflow-shape judgment the user owns; Rule #15 forbids documenting the rationale in notes column.

  - id: B2-S2
    summary: Handoff 622 (DISCOVERY -> HAM, payload discovery_scans) mis-routing
    question: |
      HAM does not model discovery_scans as a DMDO consumer. Either (a) add a
      consumer + necessity=optional DMDO row on 169 for discovery_scans so the
      consumption is structurally captured; (b) accept the handoff is
      mis-routed (the per-asset device.discovered event is the downstream
      consumer, not the scan record itself) and DELETE handoff 622; or
      (c) keep as-is and defer to a Phase 0 follow-up.
    options: [a_add_consumer_dmdo, b_delete_handoff, c_defer]
    why: Modeling decision (is the scan record itself a HAM concept) the user owns.

  - id: B2-S3
    summary: Handoff 657 (UEM -> HAM, payload enrolled_devices) routing direction
    question: |
      UEM masters enrolled_devices; HAM masters hardware_assets. The handoff
      implies UEM retirement triggers HAM asset retirement, but the canonical
      direction in the IT-ops cluster is the opposite (HAM owns asset
      lifecycle, UEM follows). Either (a) accept the bidirectional pattern
      (UEM retirement is the trigger when the asset was UEM-only-managed),
      (b) DELETE the handoff as mis-routed, or (c) FLIP the direction (HAM ->
      UEM on hardware_asset.retired).
    options: [a_keep, b_delete, c_flip_direction_and_author_HAM_to_UEM_handoff]
    why: IT-ops cluster modeling decision touching the larger HAM/UEM/MDM-EMM reconciliation conversation.

  - id: B2-S4
    summary: Users-edges 256 (assigned hardware) + 257 (custodian of assets) collapse vs keep both
    question: |
      Same pair (users -> hardware_assets) with two slightly different
      semantics: assigned-to (current end-user holder) vs custodian (IT staff
      member managing on behalf of an owner). Either (a) keep both, rewrite
      both to verb-shape; (b) collapse to one owns_hardware_asset; or
      (c) keep both AND add a third for is_approver_for_hardware_asset_disposal
      (matches the disposal-officer role on disposal records).
    options: [a_keep_both_verb_shape, b_collapse, c_keep_both_plus_disposal_approver]
    why: Naming and cardinality decision; resolves B1B-S11 verb rewrite shape.

  - id: B2-S5
    summary: asset_lifecycle_events consumer DMDO on HAM-WARRANTY-PARTS (170)
    question: |
      Handoff 633 (ITAM -> HAM) implies HAM consumes asset_lifecycle_events to
      trigger disposal flow. HAM has no DMDO on asset_lifecycle_events today.
      Either (a) add consumer + necessity=optional on 170 (captures the
      dependency cleanly, mirrors B10b discovery procedure), or (b) accept
      HAM's disposal trigger is internal (asset.retired self-triggers in 169
      -> 170) and the ITAM handoff is a side-channel that doesn't warrant
      DMDO modeling.
    options: [a_add_consumer_dmdo, b_side_channel_only]
    why: DMDO modeling decision affecting pairwise reconciliation cleanliness; resolves B1B-S10 row for handoff 633.

  - id: B2-S6
    summary: domain_regulations linkage scope for HAM (disposal compliance frameworks)
    question: |
      domain_regulations is empty for HAM. Hardware disposal involves RoHS (EU
      2011/65/EU), WEEE (EU 2012/19/EU), NIST SP 800-88 r1 sanitization
      guidelines, GDPR Art 17 for retired devices that held PII, HIPAA where
      retired devices held PHI, R2v3 and e-Stewards recycler certifications.
      Either (a) conservative link to RoHS + WEEE + NIST 800-88 only as the
      universally-applicable subset; (b) comprehensive link to all 6; or
      (c) defer pending ITAD market candidate triage (if ITAD becomes its own
      domain, these may equally land on ITAD).
    options: [a_conservative, b_comprehensive, c_defer_pending_ITAD]
    why: Compliance scoping is the user's call; cross-informed by B3 ITAD candidate.

  - id: B2-S7
    summary: APQC routing on handoffs 668 / 669 (current agent_curated rows point at process 808)
    question: |
      The agent_curated rows that landed both point at process 808
      (Process/Review requisitions, L4). This audit's prior recommendation was
      process 826 (Manage raw material inventory) for handoff 668 and process
      201 (Process warranty claims) for handoff 669. Both prior picks foreground
      the distinct payload signal (low-stock vs warranty-expiring); the current
      808 pick foregrounds the S2P requisition outcome they both feed. Either
      (a) keep both at 808; (b) switch 668 -> 826 and 669 -> 201 to restore the
      distinct-payload classification; or (c) keep 808 and stack additional
      rows alongside (multi-process tags per handoff are allowed).
    options: [a_keep_808, b_switch_to_826_and_201, c_keep_808_plus_stack_distinct_tags]
    why: APQC mapping judgment; affects review-triage quality of the H-band coverage.

b3:
