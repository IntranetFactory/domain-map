b1a:
  - id: B1A-M6-R18
    summary: SMP-AUTOMATION (185) domain_modules.description trails with vendor names; Rule #18 violation on a non-commerce text field.
    finding: |
      `domain_modules.description` on SMP-AUTOMATION (id=185) ends with a parenthetical naming two vendors and a product surface. Rule #18 lists `domain_modules` as a forbidden-zone table for vendor and product names; the entity description column must characterise the module by its capability shape, not by who sells into it.
    action: |
      PATCH `/domain_modules?id=eq.185` with a `description` rewrite that drops the trailing vendor parenthetical and keeps the capability framing (declarative automation workflows, workflow run history, employee-facing self-service app-access requests, as the automation surface of an SMP deployment).
    affected_modules:
      - 185
  - id: B1A-B9B
    summary: 4 SMP-side trigger_events carry event_category="" (out-of-vocabulary per Rule #13).
    finding: |
      Trigger_events 621 (`saas_application.discovered`), 622 (`saas_application.sanctioned`), 623 (`saas_application.deprovisioned`), and 625 (`saas_usage_metric.idle_threshold`) all carry `event_category=""`. Rule #13 lists the allowed vocabulary as `lifecycle` / `state_change` / `threshold` / `signal`. All four are state-mutation events on a master entity, mapping cleanly to `lifecycle`.
    action: |
      PATCH `/trigger_events?id=in.(621,622,623,625)` setting `event_category="lifecycle"`. Verify post-PATCH that no further empty `event_category` rows exist via `/trigger_events?domain_module_id=in.(30,31,184,185)&event_category=eq.`.
    affected_events:
      - {id: 621, event_name: saas_application.discovered, current_category: "", proposed_category: lifecycle}
      - {id: 622, event_name: saas_application.sanctioned, current_category: "", proposed_category: lifecycle}
      - {id: 623, event_name: saas_application.deprovisioned, current_category: "", proposed_category: lifecycle}
      - {id: 625, event_name: saas_usage_metric.idle_threshold, current_category: "", proposed_category: lifecycle}
  - id: B1A-DESC-R18-988
    summary: data_objects.description on smp_app_lifecycle_stages (988) names a vendor product as the flagship taxonomy; Rule #18 violation.
    finding: |
      `data_objects.description` on id=988 (`smp_app_lifecycle_stages`) closes with a sentence naming a specific vendor product as the flagship taxonomy. `data_objects.description` is on the Rule #18 forbidden list.
    action: |
      PATCH `/data_objects?id=eq.988` setting `description` to the existing text with the flagship-vendor sentence removed; keep the TIME-taxonomy framing as generic without attribution.
    affected_entities:
      - smp_app_lifecycle_stages
  - id: B1A-DESC-R18-998
