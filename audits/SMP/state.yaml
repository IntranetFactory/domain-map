b1b:
  - id: B1B-PARTNER-MODFK
    summary: Partner-side handoff module FKs are NULL because the counterparty domains are not modularized; report-only on those domains.
    finding: |
      SMP's own side of all 13 cross-domain handoffs is module-attributed (B10b passes for SMP). The opposite side carries NULL module FKs because the counterparty domains have not modularized: S2P (handoffs 39/45 target, 42 source), FINOPS (641/643 target), EXPENSE (38 source), DISCOVERY (47 source), SPEND-MGMT (174 source), ITSM (642 target). Each resolves when the named domain runs its own Validate/modularization pass.
    blocked_by:
      - {type: domain_audit, blocking_domain: S2P, milestone: modularize-and-backfill-module-fks}
      - {type: domain_audit, blocking_domain: FINOPS, milestone: modularize}
      - {type: domain_audit, blocking_domain: ITSM, milestone: resolve-642-target-module}
      - {type: domain_audit, blocking_domain: EXPENSE, milestone: modularize}
      - {type: domain_audit, blocking_domain: DISCOVERY, milestone: modularize}
      - {type: domain_audit, blocking_domain: SPEND-MGMT, milestone: modularize}
    affected_handoffs:
      - {handoff_id: 39, direction: outbound, source_domain: SMP, target_domain: S2P, trigger_event: shadow_app.requires_sanctioning, payload: purchase_requisitions, null_field: target_domain_module_id}
      - {handoff_id: 45, direction: outbound, source_domain: SMP, target_domain: S2P, trigger_event: seat_demand.exceeded, payload: purchase_requisitions, null_field: target_domain_module_id}
      - {handoff_id: 42, direction: inbound, source_domain: S2P, target_domain: SMP, trigger_event: po.saas_subscription_created, payload: saas_subscriptions, null_field: source_domain_module_id}
      - {handoff_id: 641, direction: outbound, source_domain: SMP, target_domain: FINOPS, trigger_event: saas_application.sanctioned, payload: saas_applications, null_field: target_domain_module_id}
      - {handoff_id: 643, direction: outbound, source_domain: SMP, target_domain: FINOPS, trigger_event: saas_usage_metric.idle_threshold, payload: saas_usage_metrics, null_field: target_domain_module_id}
      - {handoff_id: 38, direction: inbound, source_domain: EXPENSE, target_domain: SMP, trigger_event: card.saas_charge_detected, payload: shadow_it_apps, null_field: source_domain_module_id}
      - {handoff_id: 47, direction: inbound, source_domain: DISCOVERY, target_domain: SMP, trigger_event: sso_login.unsanctioned_app, payload: shadow_it_apps, null_field: source_domain_module_id}
      - {handoff_id: 174, direction: inbound, source_domain: SPEND-MGMT, target_domain: SMP, trigger_event: card_transaction.posted, payload: shadow_it_apps, null_field: source_domain_module_id}
      - {handoff_id: 642, direction: outbound, source_domain: SMP, target_domain: ITSM, trigger_event: saas_application.deprovisioned, payload: incidents, null_field: target_domain_module_id}
  - id: B1B-TE127-SSO
    summary: trigger_event 127 (sso_login.unsanctioned_app) publisher data_object re-point blocked on DISCOVERY modeling sso_logins.
    finding: |
      TE 127 (`sso_login.unsanctioned_app`) is published from DISCOVERY but its `data_object_id` cannot be set to the true publisher (`sso_logins` / login events) until DISCOVERY authors that master in its Phase B. Currently points at shadow_it_apps (the SMP-side payload). Cross-domain re-point deferred.
    blocked_by:
      - {type: domain_audit, blocking_domain: DISCOVERY, milestone: author-sso_logins-master}
  - id: B1B-IGA-HANDOFFS
    summary: SMP-IGA assignment-grain handoff candidates blocked on IGA validate.
    finding: |
      Three SMP-to-IGA handoff candidates remain open from the 2026-05-28 saas_app_assignments split and the 4-module restructure: smp_license_seat_assignment.provisioned -> iga_user_entitlement.requested (assignment grain vs the existing application-grain handoff 640); smp_app_request.it_approved -> IGA; smp_reclamation_action.reclaimed -> IGA. Direction and necessity depend on IGA's own audit.
    blocked_by:
      - {type: domain_audit, blocking_domain: IGA, milestone: validate-entitlement-boundary}

b2:
  - id: B2-E4-RACI
    summary: SMP personas + reach are authored; the process_raci responsibility overlay and lifecycle process_id wiring (E4/E6) are not yet done.
    question: |
      The 3 SMP personas (IT-SAAS-ADMIN id16, PROCUREMENT-SAAS-RENEWAL-OWNER id17, ITAM-SAAS-PORTFOLIO-MANAGER id18) have reach (role_modules); the derived bundle is functional from reach + entity-type tier. Author the responsibility overlay now (process_raci R/A/C/I per process + wire data_object_lifecycle_states.process_id on the gated SMP transitions), or defer? RACI needs a process-to-gate mapping (which APQC PCF or custom process realizes each gated transition).
    options:
      - "(a) Author process_raci + wire lifecycle process_id for the gated SMP processes (full E4/E6)."
      - "(b) Defer the RACI overlay; reach-only bundle is sufficient for now."
    why: |
      E4 only fires for processes whose lifecycle gates carry process_id; with none wired today it is vacuous and the reach-only bundle passes E1/E2/E3/E6. The overlay adds responsibility/accountability semantics (e.g. PROCUREMENT-SAAS-RENEWAL-OWNER Accountable for the renewal-decision gate) and is an enhancement, not a blocker.
    affected_modules: [30, 31, 184, 185]
  - id: B2-M9-SELFCONTAIN
    summary: Module 31 (SMP-RENEWAL-VENDOR) holds saas_applications (consumer+required, sibling-module master) and legal_contracts (contributor+required, CLM master) as hard cross-scope prerequisites.
    question: |
      SMP-RENEWAL-VENDOR cannot deploy standalone while it requires a sibling/foreign master. Convert each to embedded_master (carry a local shell) or relax to necessity=optional?
    options:
      - "(a) saas_applications (61) -> embedded_master + required; legal_contracts (66) -> embedded_master + optional."
      - "(b) Set both to necessity=optional, leave roles as-is (presence-conditional)."
      - "(c) Leave as-is (accept the cross-module/cross-domain prerequisite)."
    affected_modules: [31]
    affected_entities: [saas_applications, legal_contracts]
  - id: B2-B4-SUBMITLOCK
    summary: smp_app_requests (999) — set has_submit_lock?
    question: |
      smp_app_requests has a gated initial `submitted` state (requires_permission) and two-stage manager+IT approval. Should has_submit_lock=true be set on the master? has_single_approver correctly stays false (two distinct approvers).
    options:
      - "(a) Set has_submit_lock=true (submit then locked pending approval)."
      - "(b) Leave false."
    affected_entities: [smp_app_requests]
  - id: B2-B6B-OWNERSIDE
    summary: ~13 one_to_many/composition relationship rows carry owner_side=target with a parent-first verb; soft B6b warning, needs review.
    question: |
      Several SMP relationship rows set owner_side=target while the forward verb reads parent-to-child from the source (e.g. saas_applications integrates_with smp_app_integrations; smp_renewal_engagements negotiated_under smp_vendor_negotiations). Review owner_side and verb direction? Soft (never blocks); affects delete-mode semantics and the blueprint mermaid renderer.
    options:
      - "(a) Run a B6b owner_side/verb-direction correction pass (surfaced per-row first)."
      - "(b) Leave as authored."
  - id: B2-B8-XREL
    summary: Missing cross-domain mirror data_object_relationships for outbound handoffs to S2P (payload purchase_requisitions) and ITSM (payload incidents).
    question: |
      Outbound handoffs 39/45 (-> S2P) and 642 (-> ITSM) have no corresponding cross-domain data_object_relationships rows (payload->target). Author them, or treat as event-only handoffs?
    options:
      - "(a) Author the mirror relationships (verb + inverse + cardinality + owner_side)."
      - "(b) Event-only; no relationship row."
    affected_handoffs:
      - {handoff_id: 39, direction: outbound, source_domain: SMP, target_domain: S2P, trigger_event: shadow_app.requires_sanctioning, payload: purchase_requisitions, null_field: data_object_relationship}
      - {handoff_id: 45, direction: outbound, source_domain: SMP, target_domain: S2P, trigger_event: seat_demand.exceeded, payload: purchase_requisitions, null_field: data_object_relationship}
      - {handoff_id: 642, direction: outbound, source_domain: SMP, target_domain: ITSM, trigger_event: saas_application.deprovisioned, payload: incidents, null_field: data_object_relationship}
  - id: B2-CAP-AUTOMATION
    summary: Is a distinct automation / self-service-provisioning capability warranted for SMP-AUTOMATION (185), or does SMP-APP-LIFECYCLE (524, now realized there) suffice?
    question: |
      M6 was cured by moving SMP-APP-LIFECYCLE (524) onto module 185. Module 185 also masters self-service app requests + workflow runs. Author a dedicated capability (e.g. SMP-WORKFLOW-AUTOMATION) for the declarative-automation surface, or keep APP-LIFECYCLE as the single realized capability?
    options:
      - "(a) Add SMP-WORKFLOW-AUTOMATION capability realized on 185; keep APP-LIFECYCLE too."
      - "(b) Keep APP-LIFECYCLE as the sole 185 capability."
  - id: B2-B9D-OWN-156
    summary: "SaaS Management Platforms: name an owner for \"Manage demand for products\" (no one is responsible for it today)"
    question: |
      Contract Lifecycle Management hands work to SaaS Management Platforms, but SaaS Management Platforms has no one assigned to manage demand for products, so that step currently has nobody responsible for it. Who should own it?
    options:
      - "The a named owner runs it and approves it."
      - "The a named owner runs it and the HR Business Partner approves."
      - "Leave it unassigned for now."
    why: |
      SaaS Management Platforms already assigns the a named owner to work of this kind, so (a) fills this gap the same way and gives the work a named owner. Surfaced as q-SMP.md q9.
