b1a:
  - id: B1A-S1-CAPABILITIES
    summary: Author 5 to 7 TEST-MGMT capabilities and capability_domains rows; zero exist today.
    finding: A2 fails with zero capability_domains rows on TEST-MGMT (id 8). Market surface reads as 5 to 7 capabilities (test case authoring, test execution orchestration, defect lifecycle, automation script management, test environment management, traceability and coverage analytics, release-readiness gating). Cross-cutting convention check needed on TRACEABILITY and RELEASE-READINESS (>=3 domains ⇒ domain-neutral code).
    action: Draft 5 to 7 capability rows + capability_domains rows in a single Phase A extension load; pair with B1A-M1 module split (Bucket 2 item B2-1) so realization links land together via domain_module_capabilities.
    affected_entities:
      - capabilities
      - capability_domains
      - domain_module_capabilities

  - id: B1A-S3-PATTERN-FLAGS
    summary: Re-evaluate has_personal_content / has_submit_lock / has_single_approver on each of the 8 masters.
    finding: B4 fails. All 8 masters (test_cases 572, test_suites 573, test_plans 574, test_runs 575, test_defects 576, test_environments 577, requirements_to_test_traceability 578, automation_scripts 225) sit at default false across the three pattern flags with no positive consideration record. B2-4 specifically asks about has_personal_content on test_defects.
    action: Positively re-evaluate each flag on each master in the next fix load; PATCH where applicable. Record the consideration in the audit; do NOT write to notes (Rule 15). B2-4 user judgment determines the test_defects.has_personal_content decision.
