  - id: B3-5
    candidate: release_test_gates
    rationale: "Sometimes its own master (gate-record-per-release), sometimes derived from test_plans x software_deployments. Cross-domain placement question: lives in TEST-MGMT (the gate authority) or VSDP (the gate consumer)?"
    vendor_evidence: []
    proposed_module: TEST-MGMT-EXECUTION

  - id: B3-6
    candidate: TEST-AUTOMATION-PLATFORM domain
    rationale: Pure-play test execution + AI / visual / cross-browser automation platforms appear to constitute a distinct flagship surface from test management. Queued via append_missing_domain.ts. Phase 0 would confirm whether this is a separate domain or a TEST-MGMT capability.
    vendor_evidence: []

  - id: B3-7
    candidate: API-TESTING domain
    rationale: "Pure-play API contract and functional testing vendors appear to constitute a distinct surface. Phase 0 decision needed: standalone domain, capability of APIM, or capability of TEST-MGMT? Queued via append_missing_domain.ts."
    vendor_evidence: []

