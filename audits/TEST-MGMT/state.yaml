b2:
  - id: B2-1
    summary: Choose TEST-MGMT module split shape.
    question: "Which split shape: (a) single TEST-MGMT-PLATFORM module covering all 8 masters; (b) two-module split TEST-MGMT-AUTHORING (cases / suites / plans / traceability) + TEST-MGMT-EXECUTION (runs / defects / environments / automation_scripts); (c) four-module split (case-mgt / plan-mgt / execution / defects)?"
    options: ["a-single-module", "b-two-module-recommended", "c-four-module"]
    why: M1 cannot proceed without the shape decision; the answer cascades into B1B-M1 / B1B-M2 / B1B-M3 / B1B-S4 / B1B-S5 module anchoring. Recommended (b) per 2026-05-30 audit (matches the authoring vs execution vendor surface).

  - id: B2-2
    summary: Resolve catalog-wide automation_scripts (id 225) M7 collision.
    question: Which side renames or demotes for automation_scripts? (a) rename TEST-MGMT side to qa_automation_scripts and let RMM keep canonical bare term; (b) rename RMM side to rmm_automation_scripts; (c) keep dual mastery via embedded_master demotion on one side.
    options: ["a-rename-test-mgmt-side-recommended", "b-rename-rmm-side", "c-embedded-master-demotion"]
    why: Architecturally distinct concepts (CI / QA automation vs RMM endpoint scripts) collided on the data_object name. Required to unblock B1B-M3 and B1B-M4. Recommended (a) per 2026-05-30 audit (RMM's lower id 225 suggests it was loaded first; alphabetical and temporal precedent favors RMM keeping the bare term).
    vendor_evidence: []

  - id: B2-3
    summary: Should VSDP be modularized alongside TEST-MGMT's fix load?
    question: Schedule VSDP's b1 audit + M1 alongside TEST-MGMT's M-band fix load (so the 3 VSDP-touching handoffs 782 / 778 / 771 can resolve target_domain_module_id in the same pass), or accept the B10b backlog item and defer VSDP?
    options: ["pair-with-vsdp", "defer-vsdp-accept-backlog"]
    why: Pass 4 pairwise reconciliation cannot resolve target FK on the 3 VSDP-touching handoffs until VSDP itself modularizes. Independent of all other buckets.

  - id: B2-4
    summary: Set has_personal_content on test_defects?
    question: Flip has_personal_content to true on test_defects (id 576), or keep false?
    options: ["flip-to-true", "keep-false"]
    why: Defects routinely include screenshots, error logs, repro steps with customer data, console output. In regulated industries (healthcare, banking) defects can carry PII / PHI; in pure dev-tooling deployments customer data in defects is incidental rather than architectural. The pattern flag deserves a positive review either way.

