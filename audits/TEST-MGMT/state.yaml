  - id: B3-3
    candidate: visual_test_baselines
    rationale: Visual regression pattern observed in automation-platform vendors. Likely belongs in the queued TEST-AUTOMATION-PLATFORM domain candidate (B3-6), not TEST-MGMT. Verify by reading 3 of those vendors' core schemas during Phase 0.
    vendor_evidence: []
    proposed_module: TEST-AUTOMATION-PLATFORM

  - id: B3-4
