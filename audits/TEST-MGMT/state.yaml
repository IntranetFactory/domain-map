    finding: Legacy domain_data_objects shows automation_scripts mastered by BOTH RMM (130) and TEST-MGMT (8). Architecturally distinct concepts (RMM endpoint scripts vs CI / QA automation). Once both sides modularize, catalog-wide single-master rule applies; one side must rename or demote.
