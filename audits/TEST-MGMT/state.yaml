    finding: F1 transitional pass today. skill 113 (test-mgmt-system) is the only system skill on TEST-MGMT, with 8 platform-covered query skill_tools rows (query_test_cases, query_test_suites, query_test_plans, query_test_runs, query_test_defects, query_test_environments, query_requirements_to_test_traceability, query_automation_scripts). Once Phase A modules ship, Rule 14 requires one skill_type='system' skill per module.
