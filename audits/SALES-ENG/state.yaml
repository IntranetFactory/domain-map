      - {handoff_id: 200, direction: inbound, source_domain: CRM, target_domain: SALES-ENG, trigger_event: "crm_lead.scored_above_threshold", payload: crm_leads, null_field: handoff_processes_row}
      - {handoff_id: 205, direction: outbound, source_domain: SALES-ENG, target_domain: CRM, trigger_event: "sales_cadence.completed", payload: sales_cadences, null_field: handoff_processes_row}
