b2:
  - id: B2-PATTERN-FLAGS
    summary: "Per-flag yes/no on 5 pattern-flag candidates on SE masters."
    question: "Confirm per-flag flips: call_recordings.has_personal_content, sales_emails.has_personal_content, sales_cadences.has_submit_lock, conversation_intelligence_records.has_personal_content, call_recordings.has_single_approver."
    options: [per_flag_yes_no]
    why: "Per Rule #12 every master MUST be positively re-evaluated even when defaults are false. Per Rule #15 rationale lives in audit conversation, not in `notes`."

  - id: B2-CATALOG-COPY
    summary: "Review the now-written buyer-voice catalog copy for the SALES-ENG domain and 3 modules (in-record, record_status='new')."
    question: "The buyer-voice `catalog_tagline`/`catalog_description` on domain 95 and modules 296, 297, 298 were EMPTY and are now written (revised Rule #20: empty catalog UX fields are written directly; record_status carries the review signal). Review the copy in-record / in the catalog UI. Any rewrite of a now-non-empty value needs explicit per-row approval (specific text + specific row)."
    options: [accept_as_written, supply_exact_replacement_text_per_row]
    why: "Revised Rule #20: empty fields are written directly and reviewed in-record (state 'new'); only NON-empty values are overwrite-protected and require explicit per-row approval to change."
    status_note: "Resolved as a pre-write gate (the fields are written; see history.md 2026-06-06 follow-up). Retained only as the overwrite/approval gate for any future rewrite."

  - id: B2-RETARGET-OR-MOVE
    summary: "Resolve B9 attribution defect on 3 SE-outbound handoffs."
    question: "Handoffs 82, 83, 206 source from SE but their trigger_events publish on CRM-mastered data_objects. Author SE-keyed events and retarget (preferred per 2026-05-30, the workflow IS rep-initiated from the cadence step), or move the handoffs to CRM as their true publisher?"
    options: [author_se_keyed_events_and_retarget, move_handoffs_to_crm]
    why: "B9 requires events to publish on the master they describe. The structural fix changes which domain owns these handoffs."

  - id: B2-CHANNEL-NOTES
    summary: "`skill_tools.notes` wording for `send_email` channel-link justification."
    question: "Supply the exact text for `skill_tools.notes` on the `send_email` row (Rule #15: agent cannot draft `notes` wording)."
    options: [supply_exact_text, skip_the_notes]
    why: "F7 asks for workflow-specific justification when a channel primitive is linked instead of `notify_person`. The cadence-step send IS the workflow, so the link stays; the audit-trail surface is the only outstanding piece. Rule #15 requires user-supplied wording."

  - id: B2-APQC-L3-PROMOTION
    summary: "Promote handoff 206 PCF tag from L4 to L3 parent."
    question: "Keep existing L4 PCF 12878 `Plan and manage meetings` on handoff 206, or DELETE + INSERT the L3 parent for clustering quality?"
    options: [keep_L4, replace_with_L3_parent]
    why: "SKILL recommends L3 parents for clustering when an obvious parent exists. Editorial PCF-tagging decision."

  - id: B2-APQC-WRONG-SUBSTRING
    summary: "Replace wrong substring tag on handoff 82."
    question: "Handoff 82 has `discovery_substring` row pointing at PCF 20110 `Manage product recalls and regulatory audits` (L2 wrong-domain leaf). DELETE the wrong row at fix time, or leave it for the reviewer to mark `rejected`?"
    options: [delete_at_fix_time, leave_for_reviewer_rejected]
    why: "Per Discover Pass 1.5 procedure, `agent_curated` rows OVERRIDE `discovery_substring`. Audit-workflow question, not a data question."

  - id: B2-APQC-INBOUND-DEFER
    summary: "Accept APQC deferrals on 3 inbound handoffs, or force weak L4 tags."
    question: "Handoffs 81 (crm_opportunity.assigned), 210 (whitespace.identified, already tagged via agent_curated), and 510 (lead_score.recomputed) have no clean PCF cross-industry analog. Accept Discover Pass 3 deferral (preferred), or force a weak L4 tag and accept the catalog-quality hit?"
    options: [accept_deferrals, force_weak_L4]
    why: "Editorial. SKILL allows deferrals when no clean PCF match exists; forcing a weak tag pollutes the catalog."

b3:
  - id: B3-CADENCE-STEPS
    candidate: cadence_steps
    rationale: "Every cadence-shaped vendor models the cadence as a graph of typed steps (email, call, LinkedIn, manual task). The current `sales_cadences` master collapses this into the parent row, missing the most-edited entity in the vendor surface."
    vendor_evidence: [Outreach, Salesloft, "Apollo.io", "Reply.io"]
    proposed_module: SALES-ENG-CADENCE-OUTREACH

  - id: B3-PROSPECTS
    candidate: prospects
    rationale: "Sales-engagement vendors maintain their own prospect record that may exist before CRM sync (cold outbound from import). Currently SE relies on `crm_contacts` (contributor) and `crm_leads` (consumer via handoff 200)."
    vendor_evidence: [Outreach, Salesloft, "Apollo.io", "ZoomInfo Engage"]
    proposed_module: SALES-ENG-CADENCE-OUTREACH

  - id: B3-EMAIL-TEMPLATES
    candidate: email_templates
    rationale: "Cadence-driven email needs reusable templates with variable substitution. None loaded today. Lands in the email/scheduling module (297) since that module masters sales_emails."
    vendor_evidence: [Outreach, Salesloft, "Apollo.io", Mixmax, Yesware]
    proposed_module: SALES-ENG-EMAIL-SCHEDULING

  - id: B3-DIALER-INFRA
    candidate: dialer_phone_numbers and dialer_sessions
    rationale: "Voice dialler features need per-rep phone number pools (often per-region) and per-session state (live, paused, recording). None loaded. Dialling lives in the cadence/outreach module (296, capability SE-AUTO-DIALER)."
    vendor_evidence: ["Outreach Voice", "Apollo Dialer", "Salesloft Dialer"]
    proposed_module: SALES-ENG-CADENCE-OUTREACH

  - id: B3-CI-TOPICS-TRACKERS
    candidate: conversation_intelligence_topics and conversation_intelligence_trackers
    rationale: "Gong and Chorus model trackers (competitor mentions, pricing keywords, objection types) as first-class entities; insights aggregate against trackers. The catalog has `conversation_intelligence_records` but no tracker concept."
    vendor_evidence: ["Gong", "Chorus"]
    proposed_module: SALES-ENG-CONVERSATION-COACHING

  - id: B3-INTENT-SIGNALS
    candidate: intent_signals and intent_topics
    rationale: "Intent data is the substrate behind capability SE-INTENT-DATA (placed in module 296), but no master is loaded. Bombora, 6sense, G2 are intent specialists; SE consumes the signal but the catalog has no entity. Candidate new domain INTENT-DATA per Rule #2."
    vendor_evidence: [Bombora, 6sense, G2]
    proposed_module: candidate_new_domain_INTENT-DATA

  - id: B3-MEETING-SCHEDULER
    candidate: meeting_scheduler_slots and meeting_links
    rationale: "Chili Piper, Calendly Scheduling, Outreach Meetings model schedulable time slots, availability windows, and booking links. Capability SE-MEETING-SCHED is placed in module 297 with no backing master entity. Likely promotes to a separate MEETING-SCHEDULER candidate domain."
    vendor_evidence: ["Chili Piper", "Calendly", "Outreach Meetings"]
    proposed_module: candidate_new_domain_MEETING-SCHEDULER

  - id: B3-TCPA-CONSENT
    candidate: TCPA / CAN-SPAM / GDPR consent compliance entities
    rationale: "Sales engagement that includes dialler must comply with TCPA (US), GDPR (EU), CASL (Canada). Currently zero `domain_regulations` rows on SALES-ENG; none of TCPA, CAN-SPAM, CASL are linked even though the workflow has clear regulatory exposure."
    vendor_evidence: []
    proposed_module: cross_module_compliance_layer
