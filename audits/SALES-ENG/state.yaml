      author SE-keyed events on SE masters and retarget the handoffs, OR move the handoffs to
      CRM as their true publisher. With the 3-module shape: a `cadence_call.completed` event
      keys on `call_recordings` (122) -> source module 298; a `cadence_meeting.no_show` event
      keys on `sales_cadences` (121) -> source module 296; a mirrored `deal_insight.captured`
      on `conversation_intelligence_records` (124) -> source module 298.
    action: >-
      Per user choice in B2-RETARGET-OR-MOVE: (a) author 2-3 new `trigger_events` rows on SE
      masters and PATCH handoffs 82, 83, 206 to point at the new ids and the correct
      `source_domain_module_id` (296 or 298 per master above); OR (b) PATCH `source_domain_id`
      to 69 (CRM) on the 3 handoffs and route them out of SE's audit scope.
    blocked_by:
      - {type: user_decision, ref: B2-RETARGET-OR-MOVE}
    affected_handoffs:
      - {handoff_id: 82, direction: outbound, source_domain: SALES-ENG, target_domain: CRM, trigger_event: "call.completed", payload: sales_activities, null_field: source_domain_module_id}
      - {handoff_id: 83, direction: outbound, source_domain: SALES-ENG, target_domain: CRM, trigger_event: "deal_insight.captured", payload: crm_opportunities, null_field: source_domain_module_id}
