  - id: B1B-H-APQC-TAGGING
    summary: "INSERT `agent_curated` `handoff_processes` rows after live PCF lookups confirm `external_id` values."
    finding: >-
      5 of 13 cross-domain handoffs carry an APQC tag (2 `discovery_substring`, 3 `agent_curated`).
      8 untagged: 79, 81, 83, 200, 205, 474, 475, 510. Volume target 0.5N-0.8N = 7-10 means
