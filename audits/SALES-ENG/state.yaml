      8 untagged (minus user-accepted deferrals in B2-APQC-INBOUND-DEFER). The 2026-05-30 proposed
      PCF external_id values (10009, 10010, 12878, 20110) did not resolve in the live `processes`
      table; re-derive via live `/processes?process_name=ilike.*<term>*&source_framework=eq.apqc_pcf_cross_industry`
      lookups for each handoff before insert. Independent of modules (handoff_processes does not key
      on module), so unblocked by this pass.
    action: For each untagged handoff, run live PCF substring lookup, pick a confident L2/L3 match (prefer L3 parent over L4), INSERT `(handoff_id, process_id, proposal_source='agent_curated', record_status='new', role='implements')`. B2-APQC-INBOUND-DEFER may exclude 81, 210, 510 (210 already has an agent_curated row).
    blocked_by:
      - {type: user_decision, ref: B2-APQC-INBOUND-DEFER}
      - {type: user_decision, ref: B2-APQC-WRONG-SUBSTRING}
      - {type: user_decision, ref: B2-APQC-L3-PROMOTION}
