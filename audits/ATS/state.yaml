b2:
  - id: B2-ROLLUP-POLICY
    summary: "legacy domain_data_objects rollup carries 15 of 60 ATS masters (stale post-modularization)"
    question: >
      domain_data_objects is a derived rollup of domain_module_data_objects but was never
      regenerated after ATS modularized; it lists only the 15 pre-modular masters. A naive
      auditor deriving <masters> from it under-counts by 45. Deprecate, regenerate, or leave?
    options:
      - "deprecate: migrate the checklist <masters> definition + any readers to domain_module_data_objects (agent recommends; catalog-wide)"
      - "regenerate: idempotent derived-rollup script run catalog-wide (other modularized domains likely drifted too)"
      - "leave: accept drift; the blueprint emitter reads the module junction directly so renders are unaffected"
    why: "Catalog-wide policy decision, not ATS-scoped. Affects audit integrity for every modularized domain."

b3:
