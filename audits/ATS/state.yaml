schema_version: 2
domain: ATS
status: feedback_needed
next_action_by: user
last_audit: "2026-06-02"

b1a: []

b1b:
  - id: B1B-REG-CODES-EMPTY
    summary: "regulations rows 84 (FCRA) and 85 (OFCCP) carry empty regulation_code"
    finding: >
      regulations id=84 (Fair Credit Reporting Act) and id=85 (Federal Contract
      Compliance Programs Regulations) were inserted 2026-05-28 with regulation_code="".
      Other regulations carry short codes (GDPR, CCPA, ADA, TITLE-VII, ADEA, EEO-1,
      EU-PAY-TRANS, EU-AI-ACT). Natural codes: FCRA, OFCCP. regulations is a catalog-wide
      shared master; a PATCH affects every consuming domain.
    action: >
      PATCH /regulations?id=eq.84 {regulation_code:"FCRA"} and
      /regulations?id=eq.85 {regulation_code:"OFCCP"} once the regulations master /
      cross-domain governance Validate confirms the code namespace.
    blocked_by:
      - {type: catalog_addition, scope: domains, trigger: "regulations master Validate to confirm code namespace ownership"}

  - id: B1B-APQC-PREDICTIVE-MODEL-DEFERRED
    summary: "handoff #453 predictive_model.scored has no cross-industry PCF analog"
    finding: >
      Inbound handoff #453 (PA -> ATS, predictive_model.scored, payload predictive_models)
      has no clean APQC cross-industry PCF activity (ML/AI scoring is a modern digital
      concept absent from the framework). It is the only ATS cross-domain handoff left
      untagged after the 2026-06-02 H-band pass (coverage 49/50).
    action: >
      Route to Discover Pass 3 custom-process authoring (source_framework='custom',
      CUSTOM-<CLUSTER>-<SHORT-NAME>). Not an ATS-local fix.
    blocked_by:
      - {type: depends_on, ref: "Discover Pass 3", reason: "custom-process authoring for ML-scoring handoffs"}

b2:
  - id: B2-ROLLUP-POLICY
    summary: "legacy domain_data_objects rollup carries 15 of 60 ATS masters (stale post-modularization)"
    question: >
      domain_data_objects is a derived rollup of domain_module_data_objects but was never
      regenerated after ATS modularized; it lists only the 15 pre-modular masters. A naive
      auditor deriving <masters> from it under-counts by 45. Deprecate, regenerate, or leave?
    options:
      - "deprecate: migrate the checklist <masters> definition + any readers to domain_module_data_objects (agent recommends; catalog-wide)"
      - "regenerate: idempotent derived-rollup script run catalog-wide (other modularized domains likely drifted too)"
      - "leave: accept drift; the blueprint emitter reads the module junction directly so renders are unaffected"
    why: "Catalog-wide policy decision, not ATS-scoped. Affects audit integrity for every modularized domain."

  - id: B2-C1-FUNCTION-ROWS
    summary: "business_function_domains has only 2 rows (Recruiting owner, Legal contributor)"
    question: >
      C1 passes (an owner exists) but ATS plausibly has more functional stakeholders.
      Add rows or leave at Recruiting + Legal?
    options:
      - "add Human Resources (contributor) + Finance (consumer)"
      - "leave at Recruiting + Legal"
    why: "Sharpens buyer-persona / RACI (Signal 3). Optional, not a gap."

b3:
  - id: B3-RIGHT-TO-WORK
    candidate: right_to_work_verifications
    rationale: >
      Hard US legal requirement (Form I-9 / E-Verify) at the pre-hire stage, entirely
      absent. Compliance, distinct from FCRA screening.
    vendor_evidence: [Workday Recruiting, HireRight]
    proposed_module: ATS-PRE-EMPLOYEE-RECORD
  - id: B3-AGENCY-SUBMISSIONS
    candidate: agency_submissions
    rationale: >
      recruitment_agencies is a dangling master with no junction recording who submitted
      whom (the billable / ownership / dedup event). Every agency-fed pipeline needs it.
    vendor_evidence: [Greenhouse, SmartRecruiters]
    proposed_module: ATS-CANDIDATE-CRM
  - id: B3-OUTREACH-SEQUENCES
    candidate: "outreach_sequences (+ outreach_sequence_steps)"
    rationale: >
      Automated multi-step sourcing cadence; the modern sourcing primitive that
      candidate_nurture_campaigns + recruiter_interactions do not cover.
    vendor_evidence: [Ashby, Lever]
    proposed_module: ATS-CANDIDATE-CRM
  - id: B3-CANDIDATE-EMAILS
    candidate: candidate_emails
    rationale: >
      Persisted candidate communication thread as a first-class object, distinct from
      free-text notes and engagement summaries.
    vendor_evidence: [Greenhouse, Lever, Ashby]
    proposed_module: ATS-CANDIDATE-CRM
  - id: B3-MARKET-JUDGMENT-LOWER-CONFIDENCE
    candidate: "onboarding_handoffs, pre_employee_documents, candidate_data_retention_policies, drug_health_screenings, continuous_monitoring_subscriptions, interview_feedback_reminders, offer_approval_chains"
    rationale: >
      Vendor-real but lower-impact / specialist / boundary-debatable. onboarding_handoffs
      overlaps the existing ATS -> ONBOARDING handoffs; candidate_data_retention_policies is
      a GDPR purge entity; drug_health_screenings + continuous_monitoring_subscriptions are
      HireRight-specialist; interview_feedback_reminders + offer_approval_chains are config
      refinements. Decide load vs skip per entity.
    vendor_evidence: [Workday Recruiting, HireRight, SmartRecruiters, Ashby]
    proposed_module: various
