  - id: B1A-B12-PERM-RESIDUE
    summary: "2 workflow-gate permissions derived from state_name not permission_verb_override"
    finding: >
      The 2026-05-28 audit updated permission_verb_override on lifecycle states 210
      (interview_scorecards.submitted, verb=submit_scorecard) and 191
      (background_checks.completed_consider, verb=adjudicate_background_check) but
      the materialized workflow-gate permissions were not regenerated. Two permission
      rows still carry the state-name-derived form: id 10030 named
      ats-interviews:submitted_interview_scorecard (workflow-gate) and id 10045 named
      ats-background-checks:completed_consider_background_check (workflow-gate). The
      intended-verb permission names (ats-interviews:submit_scorecard,
      ats-background-checks:adjudicate_background_check) do not exist in the
      permissions table.
    action: >
      PATCH /permissions PATCH permission_name on row 10030 to
      ats-interviews:submit_scorecard. PATCH permission_name on row 10045 to
      ats-background-checks:adjudicate_background_check. role_permissions FKs and
      role_modules unaffected (FK is via permission_id). Override-tier rows 10033
      (ats-interviews:submit_interview_scorecard) and 10048
      (ats-background-checks:submit_background_check) are unrelated bypass-overrides;
      leave as-is.

  - id: B1A-B7-USER-EDGES-NEWER
    summary: "39 later-added ATS masters lack user edges; only hiring_team_assignments has one"
    finding: >
      The 2026-05-28 audit authored 7 Rule #10 edges to data_object_id=748 (users
      built-in) for the original ATS entity set (candidates, job_postings,
      talent_pools, candidate_assessments, background_checks, recruitment_agencies,
      recruitment_events). The 39 masters added since (ids 866-905, 1000-1004) only
      carry one such edge (hiring_team_assignments, row 1339). Many carry user-typed
      columns that should produce Rule #10 edges: recruiter_interactions.recruiter,
      candidate_consents.granted_by, recruiter_saved_searches.owner,
      requisition_approvals.approver, offer_approvals.approver,
      background_check_adjudications.adjudicator, data_subject_requests
      requested_by/handled_by, applicant_flow_records.disposition_actor,
      ofccp_audit_trails.actor, candidate_notes.author, candidate_documents
      uploaded_by, candidate_engagements.author, recruiter_interactions.actor.
    action: >
      Subagent-driven enumeration pass per entity to identify user-typed columns,
      then batch INSERT into data_object_relationships with related_data_object_id=748,
      owner_side='source', relationship_verb='has &lt;role&gt;', is_required by column
      nullability, record_status='new'. Estimated 25-35 new edges.
    affected_entities:
      - candidate_engagements
      - candidate_nurture_campaigns
      - recruiting_event_attendances
      - recruiter_interactions
      - candidate_consents
      - recruiter_saved_searches
      - referral_rewards
      - referral_payouts
      - referral_campaigns
      - background_check_packages
      - background_check_components
