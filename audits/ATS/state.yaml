      - job_posting_distributions
      - application_screening_questions
      - application_screening_answers
      - eeo_responses
      - interview_kits
      - interview_panels
      - candidate_assessment_templates
      - interview_questions
      - interviewer_availability_slots
      - offer_versions
      - offer_approvals
      - offer_letter_documents
