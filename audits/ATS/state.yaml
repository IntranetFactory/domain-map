b1a:
  - id: B1A-B7-USER-EDGES-NEWER
    summary: "~30 later-added ATS masters lack user edges; subagent enumeration pass pending"
    finding: >
      Of the 45 newer ATS masters (ids 866-905, 1000-1004), only hiring_team_assignments
      (905) currently has a Rule #10 edge to users (data_object_id=748). Many of the
      others carry user-typed actor columns that should produce edges:
      recruiter_interactions.recruiter, candidate_consents.granted_by,
      recruiter_saved_searches.owner, requisition_approvals.approver,
      offer_approvals.approver, background_check_adjudications.adjudicator,
      data_subject_requests requested_by / handled_by,
      applicant_flow_records.disposition_actor, ofccp_audit_trails.actor,
      candidate_notes.author, candidate_documents.uploaded_by, etc.
    action: >
      Spawn a general-purpose subagent (NOT Explore — needs Write tool) to enumerate
      user-typed columns per entity, produce a JSON proposal at
      c:/tmp/ats-b7-user-edges-<date>.json, then batch INSERT into
      data_object_relationships with related_data_object_id=748, owner_side='source',
      relationship_verb='has <role>', is_required by column nullability,
      record_status='new'. Estimated 25-35 new edges. Idempotent by
      (data_object_id, related_data_object_id, relationship_verb).
    deferred_pending: "plans/extract-role-permission-catalog.md"

  - id: B1A-H-APQC-COVERAGE
    summary: "~36 ATS cross-domain handoffs lack handoff_processes APQC tags"
    finding: >
      ATS has ~48 cross-domain handoffs; 12 are already tagged in handoff_processes;
      ~36 remain untagged. None are record_status='approved'. Per H-band procedure
      each cross-domain handoff should be classified to an APQC PCF cross-industry
      activity at audit time. Most untagged subjects: job_offer.rescinded fan-out (4),
      job_offer.accepted fan-out (3), job_offer.signed → COMP, requisition.filled
      fan-out (PA + SWP), candidate.hired → BEN-ADMIN,
      background_check.cleared → ONBOARDING, background_check.flagged → COMPLIANCE,
      candidate_assessment.passed/failed → HCM + TALENT-MGMT,
      interview_scorecard.submitted → PA, recruitment_source.attributed → PA,
      candidate_referral.bonus_earned → PAYROLL, pre_employee.activated → HCM,
      and 15 HCM-mod-55 → ATS-RECRUITMENT-PIPELINE feeds covering hcm_position
      lifecycle, job_profile lifecycle, org_unit lifecycle.
    action: >
      Per-handoff PCF classification pass against
      /processes?source_framework=eq.apqc_pcf_cross_industry. Author ~24 rows
      (~0.5N coverage) with proposal_source='agent_curated', record_status='new'.
      Surface drafts to user before INSERT per Rule #1.
    deferred_pending: "plans/extract-role-permission-catalog.md"

b1b:
  - id: B1B-REG-CODES-EMPTY
    summary: "regulations rows 84 (FCRA) and 85 (OFCCP) carry empty regulation_code"
    finding: >
      The 2026-05-28 audit INSERTED regulations rows id=84 (Fair Credit Reporting Act)
      and id=85 (Federal Contract Compliance Programs Regulations) with
      regulation_code="" while other regulations in the catalog use short codes
      (GDPR, CCPA, ADA, TITLE-VII, ADEA, EEO-1, EU-PAY-TRANS, EU-AI-ACT). The natural
      codes would be FCRA and OFCCP. The regulations table is a catalog-wide shared
      master; PATCH affects every consuming domain.
    action: >
      Defer to the regulations master / cross-domain governance Validate.
      Once cleared, PATCH /regulations?id=eq.84 {regulation_code: "FCRA"} and
      /regulations?id=eq.85 {regulation_code: "OFCCP"}.
    blocked_by:
      - {type: catalog_addition, scope: domains, trigger: "regulations master Validate to confirm code namespace ownership"}

