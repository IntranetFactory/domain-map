b1b:
  - id: B1B-B9D-RETAG-BENADMIN
    summary: "Re-tag 2 ATS->BEN-ADMIN handoffs (#120, #395) from wrong code 7.3 -> 7.5.2.2 (destructive, needs sign-off)"
    finding: >
      B9d re-verified 2026-06-09. handoffs #120 (job_offer.accepted -> BEN-ADMIN, payload
      benefit_enrollments) and #395 (candidate.hired -> BEN-ADMIN, payload candidates) are both
      tagged 7.3 "Manage employee onboarding, training, and development" -- the wrong APQC branch.
      The work handed to BEN-ADMIN is benefit enrollment = 7.5.2.2 "Administer benefit enrollment".
      WARNING: the mechanical resolver now reports these as ROLL-UP -> 7.3.3.2 "Develop employee
      career plans and career paths" (a descendant of 7.3 realized today by HCM). That match is
      SPURIOUS (career planning != benefits enrollment); do NOT apply it. The correct fix is the
      re-tag to 7.5.2.2. This is ATS-owned (ATS authored the tag) and is a destructive process_id
      overwrite, so it needs explicit user sign-off. It is NOT blocked on BEN-ADMIN.
    action: "Surfaced as q-file q2. On sign-off: PATCH handoff_processes #731 (#120) + #66 (#395) process_id 41 -> 1052 (7.3 -> 7.5.2.2), record_status stays new."
    blocked_by:
      - {type: user_decision, ref: "q-ATS.md q2", reason: "destructive overwrite of an existing handoff_processes.process_id"}

  - id: B1B-B9D-MISTAG-402
    summary: "ATS source mis-tag: handoff #402 (background_checks) tagged 7.4 should re-point to 7.2.5.1 or be deleted (destructive, needs sign-off)"
    finding: >
      Re-home of the former B1B-B9D-OWED-HRSD (2026-06-10, b9d_resolver). background_checks is
      ATS-mastered and is ALREADY realized under 7.2.5.1 "Obtain candidate background information"
      (process 1020, gated + process_raci). Handoff #402 (background_check.flagged -> HRSD) tags it
      7.4 "Manage employee relations", which contradicts the carried entity. This is an ATS sender
      mis-tag, NOT work owed to HRSD. The resolver classifies #402 MIS-TAG on every ATS run.
    action: "On sign-off: PATCH handoff_processes for #402 process_id 42 -> 1020 (7.4 -> 7.2.5.1), or DELETE the 7.4 tag. Destructive catalog edit; record_status stays new."
    blocked_by:
      - {type: user_decision, ref: "ATS B9d mis-tag #402", reason: "destructive re-point/delete of a handoff_processes tag"}

