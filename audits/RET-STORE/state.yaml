b2:
  - id: B2-1
    summary: "Module split shape: 3 modules vs 2; placement of store_associate_checklists"
    question: >-
      Should the RET-STORE module split be (a) 3 modules per the proposal (RET-STORE-TASK-EXEC, RET-STORE-LABOR-SCHED,
      RET-STORE-AUDIT-EXEC), (b) 2 modules collapsing audit-exec into one (RET-STORE-EXEC + RET-STORE-LABOR-SCHED),
      or (c) some alternate shape? Sub-question: does store_associate_checklists belong with store_tasks
      (RET-STORE-TASK-EXEC, workflow-overlap) or with retail_labour_schedules (RET-STORE-LABOR-SCHED, per-shift attestation)?
    options:
      - "(a) 3 modules per the proposal"
      - "(b) 2 modules collapsing audit-exec"
      - "(c) alternate shape the user names"
      - "store_associate_checklists -> RET-STORE-TASK-EXEC"
      - "store_associate_checklists -> RET-STORE-LABOR-SCHED"
    why: >-
      Editorial decision trading semantic clarity against operational coherence. 3 modules is the default once B1B-CAPS
      capabilities land (>=3-capability threshold strictly enforces the 2-module floor). The vendor split is mixed:
      ServiceNow / Reflexis / NewStore taxonomies vote 3 modules; YOOBIC / Foko collapse the audit + mystery + planogram
      surface; Reflexis collapses task + labor.

  - id: B2-2
    summary: "Pattern flag re-evaluation (4 candidates) + per-state requires_permission decisions"
    question: >-
      Which of the 4 pattern-flag candidates should flip to true (mystery_shopper_records.has_personal_content;
      store_audits.has_single_approver; store_audits.has_submit_lock;
      planogram_compliance_records.has_personal_content)? Also for B1B-LIFECYCLE: which state transitions are
      workflow-gates (requires_permission=true)? Obvious candidates: store_tasks.completed, retail_labour_schedules.published,
      store_audits.passed, planogram_compliance_records.scored.
    options:
      - "Per-flag yes/no on the 4 candidates"
      - "Per-state requires_permission yes/no on the proposed state machines"
    why: >-
      Pattern flags and workflow-gate decisions are workflow-shape judgments the user owns. The false-by-default does
      not confirm review. Per Rule #15 the rationale must NOT land in notes.

  - id: B2-4
    summary: "Legacy ret-store-system skill (id 101): rehome to the single domain-grain skill vs DELETE (DESTRUCTIVE)"
    question: >-
      Under the post-2026-06-06 model RET-STORE gets exactly ONE domain-grain system skill (authored as part of B1B-M1).
      For the legacy domain-level skill id 101 (domain_module_id NULL, 6 legacy skill_tools rows), should the agent
      (a) rehome it (rename / keep as the single domain-grain skill, drop the dropped skill_tools surface in favor of
      domain_module_tools), or (b) DELETE id 101 outright and author a fresh domain-grain skill? Both touch a non-new
      existing row, so this is a destructive sign-off.
    options:
      - "(a) Rehome legacy 101 as the single domain-grain system skill"
      - "(b) DELETE legacy 101 and author fresh"
    why: >-
      Editorial + destructive. The per-module-skill route from the original audit is canceled; the remaining choice is
      rehome-vs-delete of one legacy row, which the agent never does unapproved.

  - id: B2-5
    summary: "Embedded master inventory: locations / employees in addition to users + WFM/CSM/HCM masters"
    question: >-
      For B1B-EMBED, beyond the default proposal (users on all 3 modules; work_shifts + time_entries on
      RET-STORE-TASK-EXEC + RET-STORE-LABOR-SCHED; customer_cases on RET-STORE-AUDIT-EXEC; employment_events on
      RET-STORE-AUDIT-EXEC), should locations and employees also be embedded shells (Rule #16 necessity=optional) or
      deferred until a deployer asks?
    options:
      - "(a) Embed users + WFM masters + employees + locations on all 3 modules"
      - "(b) Embed only users + WFM masters; defer employees / locations"
      - "(c) Per-module itemized list the user supplies"
    why: >-
      Rule #16 says infrastructure masters are always necessity=optional on non-master rows; the deployability story
      varies per module. Several plausible shapes.

  - id: B2-VERB
    summary: "Verb form for 5 publisher-side user-edge relationships (696-700)"
    question: >-
      For B1B-VERB-RENAME, what snake_case verb form should rows 696-700 take? 696 assigned checklists,
      697 publishes schedules, 698 conducted audits, 699 verified planogram, 700 submitted mystery shop. The 2 trivial
      task edges (694 -> assigned_to_user, 695 -> created_by_user) can default; these 5 need the exact verb.
    options:
      - "User supplies the 5 verb forms"
      - "User accepts agent suggestions (e.g. assigned_checklist_to_user / published_by_user / conducted_by_user / verified_by_user / submitted_by_user)"
    why: >-
      Verb shape is editorial and the rename overwrites a non-empty value (destructive); the user owns the exact form.

