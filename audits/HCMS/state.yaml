    candidate: "webhook_subscriptions + webhook_deliveries (missing master for HCMS-DELIVERY)"
    rationale: >
      Capability HCMS-WEBHOOKS 138 is placed in HCMS-DELIVERY 262 but the module masters only
      content_releases; there is no entity backing the webhook capability. Every flagship exposes
      webhook subscriptions plus per-event delivery logs as administrable records. Clearest
      missing-master for HCMS-DELIVERY: a capability with no data_object to back it.
    vendor_evidence: [Contentful, Sanity, Storyblok, Contentstack, Hygraph]
    proposed_module: HCMS-DELIVERY
  - id: B3-MASTER-VISUAL
    candidate: "preview_environments (missing master for HCMS-AUTHORING visual/preview capability)"
    rationale: >
