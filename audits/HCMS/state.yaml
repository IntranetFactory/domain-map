b2:
  - id: B2-S1
    summary: "Lifecycle states authoring on HCMS masters: which to author, which to invoke config-shape exemption."
    question: >
      Per Rule #12 every master + required data_object needs data_object_lifecycle_states rows unless the
      config-shape exemption applies. HCMS masters split: content_entries 132 (HCMS-AUTHORING 261; clearly
      workflow draft->in_review->approved->scheduled->published->unpublished->archived) and content_releases 133
      (HCMS-DELIVERY 262; release lifecycle) are workflow-bearing; content_types 131 + content_environments 136
      (HCMS-MODELING 260), content_locales 135 (HCMS-AUTHORING 261) are config-shape (author-once);
      editorial_workflows 134 (HCMS-AUTHORING 261) is itself a workflow-definition record (config-shape).
      Now that modules exist, state.domain_module_id can be set. Decide which to author.
    options:
      - "(a) Author lifecycle states for content_entries (261) and content_releases (262) only; invoke config-shape exemption for the other 4."
      - "(b) Author lifecycle states for all 6 masters."
    why: "Lifecycle states are the source of workflow-gate permissions per Rule #12; the choice determines how many <module>:<verb>_<entity> permissions materialize at deploy. Rule #15 forbids notes population to explain the choice."

  - id: B2-S2
    summary: "Pattern flag positive re-evaluation per Rule #12 on HCMS masters."
    question: >
      All 6 HCMS masters carry every pattern flag false. Re-evaluation proposes:
      content_entries.has_submit_lock=true (entries immutable once published; editing requires unpublish or version),
      content_releases.has_submit_lock=true (published release is a snapshot),
      content_entries.has_personal_content=true (author bylines, form data, comments; personalization brings
      audience attributes into entry payload), editorial_workflows.has_single_approver=false (per-entry review
      can be single or multi). Decide each.
    options:
      - "Per-flag yes/no on content_entries.has_submit_lock, content_releases.has_submit_lock, content_entries.has_personal_content, editorial_workflows.has_single_approver."
    why: "Pattern flags drive UI / deploy invariants. Rule #15 forbids notes population to justify flag values. Rule #12 requires considered evaluation, not defaults."

  - id: B2-LOCALIZATION-SPLIT
    summary: "Future 4th module HCMS-LOCALIZATION: split content_locales + translation_jobs out of HCMS-AUTHORING?"
    question: >
      The 2026-06-02 modularization chose the 3-module split (option a). Option (c) carved a dedicated
      HCMS-LOCALIZATION module around content_locales plus a future translation_jobs master (B3-E6) with
      TMS integration anchors. content_locales currently lives in HCMS-AUTHORING 261. If translation_jobs
      lands, promote to a 4th module?
    options:
      - "(a) Keep content_locales in HCMS-AUTHORING; do not split (current state)."
      - "(b) When translation_jobs (B3-E6) lands, create HCMS-LOCALIZATION and move content_locales 135 plus translation_jobs into it."
    why: "Architectural call; only justified once a translation-workflow master exists. content_locales alone is config-shape and does not warrant a standalone module."

b3:
