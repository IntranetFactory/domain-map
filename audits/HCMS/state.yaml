      editing. content_environments covers production-style environments, not signed preview URLs / preview
      tokens. A preview_environments master would back the visual-editing capability.
    vendor_evidence: [Contentful, Storyblok, Contentstack, Sanity, Builder.io]
    proposed_module: HCMS-AUTHORING
