b2:
  - id: B2-S1
    summary: "Lifecycle states authoring on HCMS masters: which to author, which to invoke config-shape exemption."
    question: "Per Rule #12 every master + required data_object needs data_object_lifecycle_states rows unless the config-shape exemption applies. HCMS masters split: content_entries 132 (clearly workflow: draft->in_review->approved->scheduled->published->unpublished->archived) and content_releases 133 (release lifecycle) are workflow-bearing; content_types 131, content_environments 136, content_locales 135 are config-shape (author-once); editorial_workflows 134 is itself a workflow-definition record (config-shape). Decide which to author lifecycle states for."
    options:
      - "(a) Author lifecycle states for content_entries and content_releases only; invoke config-shape exemption for the other 4 (surface only, no data_objects.notes annotation per Rule #15)."
      - "(b) Author lifecycle states for all 6 masters."
      - "(c) Defer until B1B-S1 closes (realizing module needs to exist for state.domain_module_id)."
    why: "Lifecycle states are the source of workflow-gate permissions per Rule #12; the choice determines how many <module>:<verb>_<entity> permissions get materialized at deploy. Rule #15 forbids silent notes population to explain the choice."

  - id: B2-S2
    summary: "Pattern flag positive re-evaluation per Rule #12 on HCMS masters."
    question: "All 6 HCMS masters carry every pattern flag as false. Audit re-evaluation proposes: content_entries.has_submit_lock=true (entries immutable once published; editing requires unpublish or version), content_releases.has_submit_lock=true (published release is a snapshot), content_entries.has_personal_content=true (worth considering if entries can carry author bylines, form data, comments; vendor surface: Contentful + Storyblok personalization brings audience attributes into entry payload), editorial_workflows.has_single_approver=false (workflows are config; per-entry review can be single or multi). Decide each."
    options:
      - "Per-flag yes/no on content_entries.has_submit_lock, content_releases.has_submit_lock, content_entries.has_personal_content, editorial_workflows.has_single_approver."
    why: "Pattern flags drive UI / deploy invariants. Rule #15 forbids silent notes population to justify flag values. Rule #12 requires considered evaluation, not defaults."

  - id: B2-S3
    summary: "Single system skill vs per-module split (Rule #17)."
    question: "Rule #17 requires exactly one system skill per domain_modules row. The orphan hcms-system skill 67 has 6 query primitives (one per master). If HCMS deploys as 1 module: attach 67 as-is with mutates added. If N modules: split 67 into N system skills, repartition the 6 query tools per module's mastered entities."
    options:
      - "(a) Single-module HCMS, attach skill 67 to it."
      - "(b) Multi-module split, one system skill per module (count follows B2-S4)."
      - "(c) Other count, specify."
    why: "Gated on B2-S4 module-split decision. Order matters: B2-S4 then B2-S3."

  - id: B2-S4
    summary: "Module split granularity for B1-S1 module authoring."
    question: "With 8 capabilities and 6 masters, Rule #14 requires >=2 full modules. Audit-proposed splits: (a) 3-module MODELING (content_types, content_environments) + AUTHORING (content_entries, editorial_workflows, content_locales) + DELIVERY (content_releases); (b) 2-module HCMS-PLATFORM (MODELING+AUTHORING combined) + HCMS-DELIVERY; (c) 4-module split AUTHORING into HCMS-AUTHORING + HCMS-LOCALIZATION (Smartling/Lokalise integration anchor); (d) 1-module Rule #14 waiver (not recommended)."
    options:
      - "(a) 3-module split MODELING / AUTHORING / DELIVERY."
      - "(b) 2-module split PLATFORM / DELIVERY."
      - "(c) 4-module split MODELING / AUTHORING / LOCALIZATION / DELIVERY."
      - "(d) Other, specify."
    why: "Architectural / deployability call only the user can make. Unblocks B1B-S1 (modules), B1B-S3 (skill split), B1B-S4 (tool partition), B1B-S7 (handoff source FK), and the lifecycle-states / pattern-flag downstream decisions."

