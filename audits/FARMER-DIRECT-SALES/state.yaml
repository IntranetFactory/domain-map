    evidence: "User asked whether embedded_master is better - it is, for any module meant to deploy standalone. Delivery Ops is the clearest case: it is the destination of 4 cross-module handoffs and consumes 4 sibling masters, so an embedded shell lets it ship without CSA-MGMT / WHOLESALE / BUTCHER and demote to consumer when they are co-installed. The domain already has 9 intra-domain handoffs wiring these flows, so the rows are accurate reads, not redundancy - keeping them is also valid if you do NOT need per-module standalone deploy. Promoting / deleting rewrites existing rows (destructive), so it needs sign-off. This sets the deployability shape for every module."
    why: "Architectural deployability decision; the a-file question keeps it open until you confirm which rows become embedded_master."

