b3:
  - id: B3-share_swaps
    candidate: share_swaps
    rationale: >-
      Harvie, Barn2Door, Local Line all model per-week member swap / pause / dietary substitution as a structured record distinct from the share pack itself. csa_share_packs 515 likely conflates share composition with per-member customization. A share_swaps master would track member-specific deviation from the canonical week's pack (substitution requests, pause windows, dietary flags).
    vendor_evidence: [Harvie, Barn2Door, Local Line]
    proposed_module: FDS-CSA-MGMT

  - id: B3-farmers_market_events
    candidate: farmers_market_events
    rationale: >-
      Open Food Network, Local Line, FoodKonnekt model individual farmers-market days/events as structured records (which market, which date, which booth, which vendors). farmers_market_sales 516 records sales but no parent event entity exists; cross-market reporting and recurring market-day scheduling lose context.
    vendor_evidence: [Open Food Network, Local Line, FoodKonnekt]
    proposed_module: FDS-MARKET-POS

  - id: B3-producer_payouts
    candidate: producer_payouts
    rationale: >-
      Open Food Network, Local Food Marketplace, GrownBy model the food-hub multi-farm split as structured payout records per producer per fulfillment cycle. FDS-WHOLESALE 122 has no payout-split entity; multi-farm aggregation is described in capability text (FDS-FOODHUB-AGGREGATION 480) but not materialized.
    vendor_evidence: [Open Food Network, Local Food Marketplace, GrownBy]
    proposed_module: FDS-WHOLESALE

  - id: B3-producers
    candidate: producers
    rationale: >-
      Food-hub aggregators (Open Food Network, Local Food Marketplace) model partner producers as a first-class entity distinct from customers 97 or vendors. No producer master exists; multi-farm aggregation has no participant registry.
    vendor_evidence: [Open Food Network, Local Food Marketplace]
    proposed_module: FDS-WHOLESALE

  - id: B3-cottage_food_disclosures
    candidate: cottage_food_disclosures
    rationale: >-
      US state cottage-food regulations and farmers-market sales-tax remittance regimes require disclosure records (label-required statements, gross-receipts thresholds, exemption notices). No disclosure entity; regulatory exposure is implicit.
    vendor_evidence: []
    proposed_module: FDS-MARKET-POS or new FDS-COMPLIANCE module

  - id: B3-fds_compliance_module
    candidate: FDS-COMPLIANCE module
    rationale: >-
      If FSMA Produce Safety records, cottage food disclosures, USDA NOP certifications, and sales-tax remittance entities get loaded, an eighth module makes more sense than overloading existing modules. Pending B3 entity decisions.
    vendor_evidence: []
    proposed_module: new FDS-COMPLIANCE 8th full module

  - id: B3-regulations
    candidate: domain_regulations seed for FDS
    rationale: >-
      Zero domain_regulations rows currently loaded for FARMER-DIRECT-SALES. Compliance anchors: FDA FSMA Produce Safety Rule (mandatory for farms with US$25k+ produce sales), USDA National Organic Program (NOP, certified-organic operations), US state cottage food regulations (varies by state), US state retail sales tax remittance, GAP/GHP certification (voluntary but increasingly required by wholesale buyers), PCI-DSS (any operator capturing card payment).
    vendor_evidence: []
    proposed_module: domain-level (no module bind)
