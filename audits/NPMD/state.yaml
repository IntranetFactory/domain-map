b2:
  - id: B2-MOD-SPLIT
    summary: 4-module split vs 2-module merge for the NPMD build. GATES the whole module cascade (A2 capabilities, A3 vendors/solutions, B10b backfill, roles, domain_module_tools, module-anchored alert lifecycle).
    question: Pick the modularization split for NPMD before B1B-M1 can load.
    options:
      - "4-module split (default): NPMD-FLOW-ANALYSIS (538, 542), NPMD-PATH-TRACING (539, 544), NPMD-METRICS-ALERTS (540, 541, 545), NPMD-SAAS-INTERNET-PERF (543). Better reflects vendor surface; more module overhead."
      - "2-module merge: NPMD-CORE (538, 539, 540, 541, 542, 544, 545) + NPMD-SAAS-INTERNET-PERF (543). Simpler scaffold."
    why: Affects which capabilities realize on which module and the whole build cascade.
  - id: B2-SAAS-VS-DEM
    summary: saas_application_performance scope (NPMD vs DEM vs split).
    question: Where does saas_application_performance master? Keep in NPMD (network-path view), move to DEM (endpoint-experience view), or split into two entities?
    options:
      - "(a) keep in NPMD; DEM authors parallel digital_experience_sessions"
      - "(b) move to DEM; NPMD becomes contributor"
      - "(c) split into network_path_to_saas_performance (NPMD) and saas_user_experience_sessions (DEM)"
    why: Affects the B1B-B8 SaaS-degradation edge target master and the A3 vendor research.
  - id: B2-NETWORK-DEVICES
    summary: Master for network_devices (NPMD master / NPMD embedded_master / consume CMDB configuration_items).
    question: How does NPMD model network devices (router, switch, firewall, SD-WAN edge, packet broker)?
    options:
