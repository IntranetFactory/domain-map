b2:
  - id: B2-MOD-SPLIT
    summary: 4-module split (NPMD-FLOW-ANALYSIS / NPMD-PATH-TRACING / NPMD-METRICS-ALERTS / NPMD-SAAS-INTERNET-PERF) vs 2-module merge (NPMD-CORE + NPMD-SAAS-INTERNET-PERF).
    question: Pick the modularization split for NPMD before B1B-M1 can load.
    options:
      - "4-module split (default): NPMD-FLOW-ANALYSIS (538, 542), NPMD-PATH-TRACING (539, 544), NPMD-METRICS-ALERTS (540, 541, 545), NPMD-SAAS-INTERNET-PERF (543). Better reflects vendor surface but adds 4 system skills, 4 capability junctions."
      - "2-module merge: NPMD-CORE (538, 539, 540, 541, 542, 544, 545) + NPMD-SAAS-INTERNET-PERF (543). Simpler scaffold; collapses flow / path / metrics into one module."
    why: Independent of Bucket 3. Affects which capabilities realize on which module and how many per-module system skills are needed.
  - id: B2-SAAS-VS-DEM
    summary: saas_application_performance scope (NPMD vs DEM vs split).
    question: Where does saas_application_performance master? Keep in NPMD (network-path view), move to DEM (endpoint-experience view), or split into two entities?
    options:
      - "(a) keep in NPMD; DEM authors parallel digital_experience_sessions"
      - "(b) move to DEM; NPMD becomes contributor"
      - "(c) split into network_path_to_saas_performance (NPMD) and saas_user_experience_sessions (DEM)"
    why: Affects B1A-B6 / B1B-B8 (which target master the SaaS-degradation edge points at) and depends on Bucket 3 vendor research.
  - id: B2-NETWORK-DEVICES
    summary: Master for network_devices (NPMD master / NPMD embedded_master / consume CMDB configuration_items).
    question: How does NPMD model network devices (router, switch, firewall, SD-WAN edge, packet broker)?
    options:
      - "(a) NPMD masters network_devices outright"
      - "(b) NPMD embedded_master, with CMDB potentially mastering later"
      - "(c) NPMD consumes CMDB configuration_items via filter"
    why: Decision affects future synthetic-test and path-tracing references; tied to Bucket 3 candidate entities.
  - id: B2-LIFECYCLE-EXEMPT
    summary: Confirm config-shape exemption decision for 7 of 8 NPMD masters.
    question: Confirm that network_flow_records, network_paths, network_performance_metrics, network_interfaces, saas_application_performance, network_topology_snapshots, network_baseline_thresholds are signal-stream / config-shape with no workflow, exempt from lifecycle-state authoring.
    options:
      - "(a) confirm exemption for all 7; only network_performance_alerts gets lifecycle states"
      - "(b) author lifecycle states for a subset (specify which)"
    why: Audit surfaces the decision per Rule #12 / Rule #15; agent does not auto-annotate notes.
  - id: B2-ALIASES
    summary: Approve exact alias_name strings for 12+ proposed data_object_aliases rows.
    question: Approve the proposed alias strings (e.g. network_flow_records aliases flow records / NetFlow records / IPFIX records / sFlow samples). User may refine.
    options: []
    why: alias_name is freeform; Rule #15-adjacent (user supplies exact text before write).
  - id: B2-CATALOG-VOICE
    summary: Approve catalog_tagline and catalog_description verbatim text for NPMD (Rule #20).
    question: Approve tagline + 3-paragraph description in buyer voice. Draft proposal exists in audit history (workflow + SaaS leg + handoffs paragraphs).
    options: []
    why: Rule #20 forbids overwrite without explicit per-row user approval; agent drafts, user approves verbatim.
  - id: B2-REGULATIONS
    summary: Intentional zero domain_regulations or add PCI-DSS scope-of-monitoring.
    question: Should NPMD record PCI-DSS (or FedRAMP) scope-of-monitoring as an applicable regulation? Currently 0 rows.
    options:
