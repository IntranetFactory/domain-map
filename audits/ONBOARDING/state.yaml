b2:
  - id: B2-NOTES-POLLUTION
    summary: "Rule #15 notes pollution on 31 rows across domain_data_objects, skill_tools, handoffs; pre-existing carry-over"
    question: >
      Were these 31 populated notes user-approved at load time, or
      auto-populated by prior loaders before Rule #15 was tightened? The 6
      domain_data_objects rows (DDO 51, 92, 98, 879, 880, 881) describe
      provenance and cross-domain context; the 16 skill_tools rows carry F7
      channel-justification / context strings; the 9 handoffs rows include
      "B10b resolved 2026-05-26..." on row 9, "cross | ATS->ONBOARDING | ..."
      cluster-draft prefix on row 1074, and sentence-shaped commentary on
      intra-domain rows 1227, 1228, 1229, 1230, 1231, 1232, 1233.
    options:
      - "(a) Confirm user-approved at load time; leave in place."
      - "(b) Confirm auto-populated; PATCH all 31 rows notes to empty string and log a Rule #15 incident entry in references/skill-changelog.md."
      - "(c) Per-row decision; agent surfaces each row's text for individual approval."
    why: >
      Rule #15 forbids populating any notes column without explicit per-row
      user approval. Carry-over from 2026-05-30 audit B2-S1 and B2-S2; the
      2026-05-31 Continuation deferred resolution back to the user. The
      handoffs subset is newly enumerated in this audit.
    affected_entities:
      - "domain_data_objects: 51, 92, 98, 879, 880, 881"
      - "skill_tools: 1876, 1877, 1878, 1879, 1884, 1885, 1887, 1890, 1891, 1892, 1895, 1896, 1899, 1900, 1901, plus one more from skill 204 channel justification"
      - "handoffs: 9, 1074, 1227, 1228, 1229, 1230, 1231, 1232, 1233"

  - id: B2-PATTERN-FLAGS
    summary: "B4 positive re-evaluation: 3 pattern-flag flips proposed on onboarding_journeys and onboarding_tasks"
    question: >
      Approve each pattern-flag flip individually: (1)
      onboarding_journeys.has_submit_lock=true (state machine append-only once
      in_progress; cannot rewind to scheduled / pre_boarding), (2)
      onboarding_journeys.has_single_approver=true (final completion gate
      signed off by Onboarding HR Partner or Coordinator), (3)
      onboarding_tasks.has_submit_lock=true (completed terminal, append-only).
    options:
      - "(a) Approve all 3 flips."
      - "(b) Approve a subset; name which."
      - "(c) Skip all 3 flips."
    why: >
      Pattern flags are workflow-shape judgments the user owns per Rule #12.
      Auto-flipping without per-row review reproduces the silent-pollution
      class of bug.
    affected_entities:
      - "data_objects: 16 onboarding_journeys (has_submit_lock, has_single_approver)"
      - "data_objects: 18 onboarding_tasks (has_submit_lock)"

  - id: B2-WORKFLOW-GATE-VERBS
    summary: "Per-state verb authoring for 22 lifecycle states; unblocks B1B-WORKFLOW-GATE-PERMISSIONS"
    question: >
      For each of 22 lifecycle states carrying requires_permission=true,
      author the permission_verb_override OR collapse the gating
      (requires_permission=false). Candidate verb set by module: ONB-JOURNEY-MGMT
      (12) approve_onboarding_plan, activate_onboarding_plan,
      retire_onboarding_plan, complete_onboarding_journey,
      cancel_onboarding_journey, complete_onboarding_stage,
      skip_onboarding_stage, complete_onboarding_task, skip_onboarding_task,
      cancel_onboarding_task, activate_onboarding_cohort,
      complete_onboarding_cohort, cancel_onboarding_cohort; ONB-WELCOME-EXPERIENCE
      (7) activate_buddy_assignment, complete_buddy_assignment,
      cancel_buddy_assignment, mark_welcome_sent, mark_welcome_delivered,
      mark_welcome_failed, cancel_welcome_communication; ONB-DOCUMENT-INTAKE
      (4) submit_onboarding_document_collection,
      approve_onboarding_document_collection,
      reject_onboarding_document_collection,
      archive_onboarding_document_collection. Re-counts to 23-24 once
      mark_welcome_sent split is decided.
    options:
      - "(a) Materialize all 22-24 explicit verbs."
      - "(b) Collapse subset to baseline-manage / baseline-admin; only approval gates (plan.approved, document_collection.approved / rejected, journey.completed) get explicit verbs (~6 verbs)."
      - "(c) Per-state decision."
    why: >
      Authoring verbs from state_name alone reproduces the ATS B12
      stale-permission-name bug (state_name="approved" -> permission
      "submitted_interview_scorecard" diverging from the intended verb). The
      audit must NOT invent verbs.
    affected_modules: [35, 36, 37]

  - id: B2-CATALOG-UX-FIELDS
    summary: "M8 / Rule #20: catalog_tagline + catalog_description empty on all 3 ONBOARDING modules"
    question: >
      Modules 35 (ONB-JOURNEY-MGMT), 36 (ONB-DOCUMENT-INTAKE), 37
      (ONB-WELCOME-EXPERIENCE) all carry empty catalog_tagline and empty
      catalog_description. Per Rule #20 these must NOT be authored without
      explicit user-approved wording. Should the user supply wording now, or
      defer to a marketing copy pass?
    options:
      - "(a) User supplies one-line tagline + 1-3 paragraph description per module; agent loads after approval."
      - "(b) Defer to marketing pass; M8 stays open across the catalog."
    why: >
      Rule #20 expressly forbids agent-authored marketing copy. The fields are
      buyer-facing and outside the agent's voice.
    affected_modules: [35, 36, 37]

