b1a:
  - id: B1A-APQC-COVERAGE
    summary: "10 ONBOARDING cross-domain handoffs need APQC tagging (6 INSERT + 4 REPLACE)"
    finding: >
      H1 hard-fail. Of 17 cross-domain handoffs only 11 carry handoff_processes
      rows; 0 are record_status='approved'; 2 are agent_curated (handoffs 5 and
      409, both -> PCF 224 "Manage employee onboarding" 10469). 6 handoffs are
      untagged: 2 (ATS->ONB job_offer.accepted), 410 (ONB->HCM
      doc_collection.completed), 411 (ONB->PAYROLL doc_collection.completed),
      1074 (ATS->ONB job_offer.rescinded), 1231 (ONB->EMP-EXP stage.completed),
      1233 (ONB->LMS cohort.activated). 4 handoffs carry wrong / coarse tags:
      handoff 7 (ONB->PAYROLL journey.day_one_reached) mapped to PCF 1814
      "Create customer journey maps" L5 19965 (CRM mapping, substring matcher
      caught "journey"); handoff 3 (HCM->ONB employee.created) mapped to PCF 41
      L2 20599 instead of L3/L4 receiving-side onboarding; handoff 394
      (ATS->ONB candidate.hired) mapped to "Recruit/Source candidates" PCF 220
      10440 (upstream sourcing, wrong side); handoff 8 (ONB->LMS
      task.compliance_training_required) currently mapped to PCF 224 via
      discovery_override but the proper L3/L4 is in the LMS training-delivery
      branch (PCF 1039 "Develop, conduct, and manage employee training
      programs"). Target PCFs to investigate at fix time: 224 / 10469 Manage
      employee onboarding, 345 Provide workspace and facilities, 273 Manage IT
      user identity and authorization, 1039 Develop conduct and manage
      employee training programs, 236 Administer Payroll, 250 Conduct employee
      engagement surveys, 242 / 10523 Manage employee inquiry process. Per H1
      volume target (0.5N-0.8N for N=17), reaching ~12 agent_curated tags is
      the goal.
    action: >
      Per-handoff PCF classification pass. INSERT 6 new agent_curated rows for
      untagged handoffs; REPLACE 4 rows (h3, h7, h8 wrong/coarse, h394
      wrong-side). Use composed (handoff_id, process_id) natural key for
      idempotency. Lookup process_id at fix time via
      /processes?source_framework=eq.apqc_pcf_cross_industry&process_name=ilike.*<term>*.
      Each new row: proposal_source='agent_curated', record_status='new',
      role='implements'.
    affected_handoffs:
      - {handoff_id: 2, direction: inbound, source_domain: ATS, target_domain: ONBOARDING, trigger_event: "job_offer.accepted", payload: "onboarding_journeys", null_field: handoff_processes}
