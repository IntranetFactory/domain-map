b1b:
  - id: B1B-WORKFLOW-GATE-PERMISSIONS
    summary: "22 ONBOARDING lifecycle states need workflow-gate permissions; blocked by B2-S3 verb authoring"
    finding: >
      B12 + E6 hard-fail. 22 of 36 lifecycle states across all 8 ONBOARDING
      masters carry requires_permission=true with empty permission_verb_override.
      Zero workflow-gate permissions exist on modules 35 / 36 / 37; only the 9
      baseline-read/manage/admin rows are loaded. Per Rule #12 each
      requires_permission=true state warrants a <module_code>:<verb>_<entity>
      permission realized on the state's domain_module_id. State distribution:
      ONB-JOURNEY-MGMT (mod 35) realizes 12 states across onboarding_plans
      (approved 87, active 88, retired 89), onboarding_journeys (completed 84,
      cancelled 85), onboarding_stages (completed 92, skipped 93),
      onboarding_tasks (completed 96, skipped 97, cancelled 98),
      onboarding_cohorts (active 71, completed 72, cancelled 73);
      ONB-DOCUMENT-INTAKE (mod 36) realizes 4 states on
      onboarding_document_collections (submitted 76, approved 77, rejected 78,
      archived 79); ONB-WELCOME-EXPERIENCE (mod 37) realizes 7 states across
      buddy_assignments (active 67, completed 68, cancelled 69) and
      welcome_communications (sent 101, delivered 102, failed 103, cancelled
      104). Total 23 states across modules. Plus role_permission mappings:
      Onboarding HR Partner (10012) -> approve / reject document_collection,
      activate / retire plan, complete / cancel journey; Onboarding Coordinator
      (10011) -> complete stage, complete task; Onboarding Program Manager
      (10013) -> admin tier across all three modules; Hiring Manager (10007)
      -> read on multiple modules. Authoring per-state verbs without B2-S3
      guidance reproduces the ATS B12 stale-permission-name bug.
    action: >
      Once B2-S3 verb authoring lands, INSERT 22-23 workflow-gate permissions
      with tier=workflow-gate, prefixed by domain_module_code:lower.
      INSERT role_permissions rows mapping each gate to the appropriate role
      bundle. Use a focused loader following the canonical Rule #12 pattern;
      pre-flight check that permission_verb_override is non-empty on every
      lifecycle state before deriving the permission_name.
    affected_masters:
      - {data_object_id: 15, name: "onboarding_plans", target_module_id: 35, workflow: "draft -> approved -> active -> retired"}
      - {data_object_id: 16, name: "onboarding_journeys", target_module_id: 35, workflow: "scheduled -> pre_boarding -> day_one -> in_progress -> completed | cancelled"}
      - {data_object_id: 17, name: "onboarding_stages", target_module_id: 35, workflow: "pending -> active -> completed | skipped"}
      - {data_object_id: 18, name: "onboarding_tasks", target_module_id: 35, workflow: "pending -> in_progress -> completed | skipped | cancelled"}
      - {data_object_id: 19, name: "buddy_assignments", target_module_id: 37, workflow: "assigned -> active -> completed | cancelled"}
      - {data_object_id: 20, name: "onboarding_cohorts", target_module_id: 35, workflow: "planned -> active -> completed | cancelled"}
      - {data_object_id: 21, name: "welcome_communications", target_module_id: 37, workflow: "draft -> scheduled -> sent -> delivered | failed | cancelled"}
      - {data_object_id: 22, name: "onboarding_document_collections", target_module_id: 36, workflow: "pending -> in_progress -> submitted -> approved | rejected -> archived"}
    affected_modules: [35, 36, 37]
    blocked_by:
      - {type: user_decision, ref: B2-S3}

