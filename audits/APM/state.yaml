b2:
  - id: B2-M7-OPTION
    summary: M7 within-domain incoherence on 267 + 269 , pick DELETE the consumer-required DMDOs in module 104, or promote them to embedded_master.
    question: |
      Module 104 (APM-RATIONALIZATION) carries role='consumer', necessity='required' on data_object_id 267 (enterprise_applications) and 269 (technology_platforms). These same data_objects are already mastered in sibling module 103 (APM-PORTFOLIO-REGISTRY). M7 within-domain coherence rejects this combination. Two valid resolutions exist with different deployability semantics. Which?
    options:
      - DELETE-consumer-rows , Rationalization always co-installs with Portfolio Registry. The master row in 103 is authoritative for the whole domain; the consumer rows in 104 are redundant. (2026-05-29 audit recommendation.)
      - Promote-to-embedded_master , Rationalization is meant to be standalone-deployable. 104 ships its own shells of enterprise_applications + technology_platforms; runtime demotion (embedded_master → consumer of 103's master) kicks in when 103 is co-deployed.
    why: |
      Cannot be resolved by the agent: the deployability intent for module 104 is a design call, not a structural fact derivable from the catalog. Once chosen, B1B-B9b (intra-domain handoffs) can be authored against the chosen shape.

  - id: B2-NOTES-POLLUTION
    summary: All 20 skill_tools rows on skills 155 + 156 carry populated notes prose, and data_objects 268 + 272 carry Rule #12 config-shape exemption text in notes; Rule #15 requires per-row user approval of any notes content. Were these strings explicitly approved at load time, or auto-populated?
    question: |
      Per Rule #15, every notes column must be empty by default and only ever populated with explicit per-row user-approved wording. The 2026-05-29 audit (B2-S1 and B2-S2) surfaced this and the question was never answered. State today: 20 skill_tools rows carry workflow narration like "Maintain interface records; drive deprecated/retired transitions." and "Architect-of-record approval workflow gate."; data_objects 268 + 272 carry text like "Config-shape master: time-series cost snapshots, no per-state permissions needed... Lifecycle states intentionally omitted per Rule #12 exemption." Rule #15 specifically RESCINDED the prior Rule #12 license to write the config-shape exemption to notes. Audit obligation when Rule #15 has been violated is to revert + append Incident entry to references/skill-changelog.md.
    options:
      - "(a) Confirm strings were user-approved at the original load , leave in place."
      - "(b) Confirm auto-populated , PATCH all 22 rows (20 skill_tools + 2 data_objects) to empty string and append Incident entry to references/skill-changelog.md."
    why: |
      The audit cannot determine load-time approval status from catalog state. Only the user knows whether they approved the wording.

  - id: B2-PATTERN-FLAGS
    summary: Rule #12 positive re-evaluation of pattern flags on APM masters , should business_capability_maps.has_submit_lock, application_value_scores.has_submit_lock, and enterprise_applications.has_personal_content be flipped true?
    question: |
      Currently every APM master has all three pattern flags false except technology_fit_assessments which has has_single_approver=true. The Rule #12 default-false does not establish review; positive consideration is required per audit. Candidate flips: business_capability_maps.has_submit_lock=true (maps freeze at published so dependents have a stable surface), application_value_scores.has_submit_lock=true (quarterly score snapshot immutable once recorded), enterprise_applications.has_personal_content=true (application records often carry technical-owner contact info). Per Rule #15, recording the reasoning in notes is forbidden.
    options:
      - "Per-flag yes/no answer from user; agent PATCHes the data_objects row(s) accordingly."
    why: |
      Pattern-flag judgments are workflow-shape decisions only the user can make for this domain. The audit cannot determine intent.

b3:
  - id: B3-APM-MARKET-SURFACE
    summary: 16 candidate MISSING entities + 2 WRONG-OWNERSHIP + 3 MODULARIZATION findings from the 2026-05-29 market-audit subagent pass against LeanIX, ServiceNow APM, MEGA HOPEX, Ardoq, and Apptio; technology-layer collapse + missing APM-TECH-RISK module is the highest-leverage cluster.
    candidate: |
      MISSING (16): application_modules, technology_products, technology_services, data_stores, technology_lifecycles, technology_standards, technical_vulnerabilities, application_risks, application_assessments, application_lifecycles, application_user_groups, providers, application_contracts, reference_architecture_models, application_capabilities_realization, application_to_process_support, compliance_obligations, application_controls. WRONG-OWNERSHIP (2): technology_platforms is the hosting layer and needs companion technology_products + technology_services masters; consider cloud_subscriptions vs application_costs split. MODULARIZATION (3): introduce APM-TECH-RISK as a third module owning technology_lifecycles/standards/vulnerabilities/risks/compliance_obligations/controls; place application_assessments as shared plumbing consumed by APM-TECH-RISK; add reference_architecture_models to back the orphan REFERENCE-FRAME-LIBRARY capability or retire the capability.
    rationale: |
      All four flagships (LeanIX, ServiceNow APM, MEGA HOPEX, Ardoq, and Apptio per the 2026-05-29 surface matrix) split the technology layer three ways (products / services / platforms) and ship a dedicated risk/compliance surface (vulnerabilities, application risks, lifecycles, standards, controls, obligations). Current APM footprint collapses technology onto one master and has no home for the risk/compliance surface. ServiceNow specifically splits TPM/GRC into a separate module set.
    vendor_evidence:
      - {vendor: "LeanIX Enterprise Architecture", evidence: 1st_class}
      - {vendor: "ServiceNow Application Portfolio Management", evidence: 1st_class}
      - {vendor: "MEGA HOPEX", evidence: 1st_class}
      - {vendor: "Ardoq", evidence: 1st_class}
      - {vendor: "Apptio IT Planning Foundation", evidence: 1st_class}
    proposed_module: APM-PORTFOLIO-REGISTRY, APM-RATIONALIZATION, or new APM-TECH-RISK (per-entity decision at Phase 0 vetting time)
    extra_market_surface_artifact: c:/tmp/APM-market-surface-2026-05-29.md
