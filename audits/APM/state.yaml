b2:
  - id: B2-M7-OPTION
    summary: M7 within-domain incoherence on 267 + 269. Pick DELETE the consumer-required DMDOs in module 104, or promote them to embedded_master.
    question: |
      Module 104 (APM-RATIONALIZATION) carries role='consumer', necessity='required' on data_object_id 267 (enterprise_applications) and 269 (technology_platforms). These same data_objects are already mastered in sibling module 103 (APM-PORTFOLIO-REGISTRY). M7 within-domain coherence rejects this combination. Two valid resolutions exist with different deployability semantics. Which?
    options:
      - DELETE-consumer-rows. Rationalization always co-installs with Portfolio Registry. The master row in 103 is authoritative for the whole domain; the consumer rows in 104 are redundant. (2026-05-29 audit recommendation.)
      - Promote-to-embedded_master. Rationalization is meant to be standalone-deployable. 104 ships its own shells of enterprise_applications + technology_platforms; runtime demotion (embedded_master -> consumer of 103's master) kicks in when 103 is co-deployed.
    why: |
      Cannot be resolved by the agent: the deployability intent for module 104 is a design call, not a structural fact derivable from the catalog. Once chosen, B1B-B9b (intra-domain handoffs) can be authored against the chosen shape. Both options are DESTRUCTIVE (DELETE or restructure existing non-empty DMDO rows); never executed unapproved.

  - id: B2-NOTES-POLLUTION
    summary: All 20 skill_tools rows on skills 155 + 156 carry populated notes prose, and data_objects 268 + 272 carry Rule #12 config-shape exemption text in notes; Rule #15 requires per-row user approval of any notes content. Were these strings explicitly approved at load time, or auto-populated?
    question: |
      Per Rule #15, every notes column must be empty by default and only ever populated with explicit per-row user-approved wording. The 2026-05-29 audit surfaced this and the question was never answered. State today: 20 skill_tools rows carry workflow narration; data_objects 268 + 272 carry the config-shape exemption text. Rule #15 RESCINDED the prior Rule #12 license to write the config-shape exemption to notes. NOTE: entity_type on 268 + 272 was set to operational_record on 2026-06-07, so the structural exemption is now carried by the typed column and the prose in notes is fully redundant. Audit obligation when Rule #15 has been violated is to revert + append Incident entry to references/skill-changelog.md. The skill_tools table itself is RETIRED per the per-domain-skill supersession (header), so those 20 rows are slated for removal regardless; only the user can confirm whether their notes were approved before any revert.
    options:
      - "(a) Confirm strings were user-approved at the original load: leave in place."
      - "(b) Confirm auto-populated: PATCH the affected rows (skill_tools rows still extant + data_objects 268 + 272) to empty string and append Incident entry to references/skill-changelog.md."
    why: |
      The audit cannot determine load-time approval status from catalog state. Only the user knows whether they approved the wording. Reverting non-empty notes is DESTRUCTIVE; never executed unapproved.

  - id: B2-PATTERN-FLAGS
    summary: Rule #12 positive re-evaluation of pattern flags on APM masters. Should business_capability_maps.has_submit_lock, application_value_scores.has_submit_lock, and enterprise_applications.has_personal_content be flipped true?
    question: |
      Currently every APM master has all three pattern flags false except technology_fit_assessments which has has_single_approver=true (confirmed live 2026-06-07). Candidate flips: business_capability_maps.has_submit_lock=true (maps freeze at published so dependents have a stable surface), application_value_scores.has_submit_lock=true (quarterly score snapshot immutable once recorded), enterprise_applications.has_personal_content=true (application records often carry technical-owner contact info). Per Rule #15, recording the reasoning in notes is forbidden.
    options:
      - "Per-flag yes/no answer from user; agent PATCHes the data_objects row(s) accordingly."
    why: |
      Pattern-flag judgments are workflow-shape decisions only the user can make for this domain. The audit cannot determine intent.

  - id: B2-B9-RETARGET
    summary: Re-target handoffs 237 + 238 from the generic application.lifecycle_state_changed (209) to the new focused enterprise_application.sunsetting (1530). DESTRUCTIVE trigger_event re-attribution; not executed.
    question: |
      The focused event enterprise_application.sunsetting (trigger_events id=1530) was authored on 2026-06-07 (B1A-B9 additive half). Handoffs 237 (APM-PORTFOLIO-REGISTRY -> CMDB) and 238 (APM-PORTFOLIO-REGISTRY -> SAM) currently consume the generic event 209 (application.lifecycle_state_changed). Re-pointing them to 1530 sharpens the semantics, but it re-attributes an existing handoff's trigger_event, which is a destructive overwrite of a non-empty FK.
    options:
      - "Approve: PATCH handoffs 237 + 238 trigger_event_id 209 -> 1530."
      - "Leave: 237/238 keep the generic application.lifecycle_state_changed event."
    why: |
      Re-attributing an existing handoff's trigger_event is DESTRUCTIVE (overwrites a non-empty FK); never executed unapproved.

  - id: B2-H1-DELETE-STALE
    summary: DELETE 4 stale discovery_substring handoff_processes rows (handoff_processes ids 7/8/9/10 on handoffs 236/235/237/238 -> process 1180 "Review and monitor application security controls") that are a wrong-PCF fit for portfolio-onboarding/lifecycle events; replace with focused agent_curated rows. DESTRUCTIVE; not executed.
    question: |
      Handoffs 235, 236, 237, 238 each carry a discovery_substring handoff_processes row pointing at process 1180 (PCF 20740 "Review and monitor application security controls"), a security-controls leaf that is a poor fit for application onboarding / lifecycle-state-change events on enterprise_applications. Per the Discover Pass 1.5 procedure, human/agent-curated rows override discovery_substring and the stale rows should be DELETED after a focused replacement is inserted. Candidate focused PCFs: onboarding (235/236, application.onboarded) -> "Manage IT change" family or "Maintain IT asset records" (1312, already used for 853/854); lifecycle_state_changed (237/238) -> the new enterprise_application.sunsetting event plus an IT-change PCF. Exact replacement PCF should be confirmed at apply time.
    options:
      - "Approve: INSERT focused agent_curated handoff_processes rows for 235/236/237/238, then DELETE handoff_processes ids 7, 8, 9, 10."
      - "Leave: keep the 4 discovery_substring rows as-is."
    why: |
      DELETE of existing rows is DESTRUCTIVE; never executed unapproved. The additive replacement is paired with the delete and is surfaced together so the swap is reviewed as one decision.

b3:
  - id: B3-APM-MARKET-SURFACE
    summary: 16 candidate MISSING entities + 2 WRONG-OWNERSHIP + 3 MODULARIZATION findings from the 2026-05-29 market-audit subagent pass against LeanIX, ServiceNow APM, MEGA HOPEX, Ardoq, and Apptio; technology-layer collapse + missing APM-TECH-RISK module is the highest-leverage cluster.
    candidate: |
      MISSING (16): application_modules, technology_products, technology_services, data_stores, technology_lifecycles, technology_standards, technical_vulnerabilities, application_risks, application_assessments, application_lifecycles, application_user_groups, providers, application_contracts, reference_architecture_models, application_capabilities_realization, application_to_process_support, compliance_obligations, application_controls. WRONG-OWNERSHIP (2): technology_platforms is the hosting layer and needs companion technology_products + technology_services masters; consider cloud_subscriptions vs application_costs split. MODULARIZATION (3): introduce APM-TECH-RISK as a third module owning technology_lifecycles/standards/vulnerabilities/risks/compliance_obligations/controls; place application_assessments as shared plumbing consumed by APM-TECH-RISK; add reference_architecture_models to back the orphan REFERENCE-FRAME-LIBRARY capability or retire the capability.
    rationale: |
      All four flagships (LeanIX, ServiceNow APM, MEGA HOPEX, Ardoq, and Apptio per the 2026-05-29 surface matrix) split the technology layer three ways (products / services / platforms) and ship a dedicated risk/compliance surface (vulnerabilities, application risks, lifecycles, standards, controls, obligations). Current APM footprint collapses technology onto one master and has no home for the risk/compliance surface. ServiceNow specifically splits TPM/GRC into a separate module set.
