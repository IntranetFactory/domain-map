    action: |
      Re-resolve PCF candidate activities against live /processes?source_framework=eq.apqc_pcf_cross_industry before any INSERT. Group lookups by family: workforce-metrics, employee-engagement, talent-intelligence, DEI-ethics. Once verified IDs land, draft handoff_processes inserts: (handoff_id, process_id, proposal_source='agent_curated', record_status='new'). Includes REPLACE for handoffs 451, 13, 115 where existing tags are in the wrong PCF family.
