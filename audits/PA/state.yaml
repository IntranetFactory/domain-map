b1a:
  - id: B1A-LIFECYCLE-STATES
    summary: Zero data_object_lifecycle_states on any of the 5 PA masters (attrition_forecasts 42, people_kpis 43, workforce_segments 44, engagement_surveys 45, predictive_models 46); B12 hard fail.
    finding: |
      All 5 PA masters have a real workflow but zero rows in data_object_lifecycle_states. Existing trigger_events imply the state machines:
      engagement_surveys 45 (events 398 launched lifecycle, 399 closed state_change): draft -> launched -> closing -> closed -> results_published -> archived;
      attrition_forecasts 42 (event 397 published state_change, 1221 attrition_risk.elevated threshold): draft -> published -> superseded;
      predictive_models 46 (events 400 deployed state_change, 401 scored signal): training -> validated -> deployed -> retired;
      people_kpis 43 (event 1219 snapshot_published lifecycle): draft -> snapshot_published -> archived;
      workforce_segments 44 (events 64 high_potential.identified signal, 1220 composition_changed state_change, 1223 pay_equity.gap_detected threshold, 1224 skill_gap.identified signal): draft -> composition_baseline -> composition_changed -> archived.
    action: |
      Draft state rows per the implied state machines above. Mark requires_permission=true on gated transitions (engagement_survey.launched, predictive_model.deployed, attrition_forecast.published). Set domain_module_id to the master's home module (engagement_surveys -> 82, predictive_models -> 83, attrition_forecasts -> 83, people_kpis -> 81, workforce_segments -> 81). New entity inserts: per-row authoring needs user approval before load.
    affected_masters:
      - {data_object_id: 42, name: attrition_forecasts, target_module_id: 83, workflow: "draft -> published -> superseded"}
      - {data_object_id: 43, name: people_kpis, target_module_id: 81, workflow: "draft -> snapshot_published -> archived"}
      - {data_object_id: 44, name: workforce_segments, target_module_id: 81, workflow: "draft -> composition_baseline -> composition_changed -> archived"}
      - {data_object_id: 45, name: engagement_surveys, target_module_id: 82, workflow: "draft -> launched -> closing -> closed -> results_published -> archived"}
      - {data_object_id: 46, name: predictive_models, target_module_id: 83, workflow: "training -> validated -> deployed -> retired"}

  - id: B1A-SYSTEM-SKILLS
    summary: Zero module-level skill_type=system skills on any of the 4 PA modules; legacy pa-system (id 5, domain_module_id NULL) still present. F2 / F3 / F5 hard fail, F1 transitional.
    finding: |
      Rule #17 requires exactly one system skill per domain_modules row with >=1 skill_tools row each. PA has 4 full modules (81 PA-WORKFORCE-METRICS, 82 PA-ENGAGEMENT-SURVEYS, 83 PA-PREDICTIVE-MODELS, 84 PA-DEI-ANALYTICS), expected 4 module-level system skills, observed 0. Legacy skill id=5 'pa-system' carries domain_module_id=NULL and 0 skill_tools rows. Semantius score F5 is uncomputable until module-level skills land.
    action: |
      Author 4 module-level system skills (one per module): pa_workforce_metrics_agent (81), pa_engagement_surveys_agent (82), pa_predictive_models_agent (83), pa_dei_analytics_agent (84). Each gets >=5 skill_tools rows per Phase-S authoring procedure (query_<master>, mutate_<master> per gated transition, notify_person, compute_* primitives). After F2 lands, DELETE legacy skill id=5 per F1 transitional cleanup.
    affected_modules: [81, 82, 83, 84]
    blocked_by:
      - {type: depends_on, ref: B1A-LIFECYCLE-STATES, reason: "workflow-gate mutate tools per skill_tools derive from lifecycle states' requires_permission=true transitions"}

  - id: B1A-ROLES
    summary: Zero PA-scoped roles, zero role_modules rows touching PA modules. E1 hard fail (4-module domain needs >=3 roles).
    finding: |
      /role_modules?domain_module_id=in.(81,82,83,84) returns empty. No PA-scoped role_codes present. PA has 4 full modules requiring at least 3 roles per E1 with the 2-module floor per E2.
    action: |
      Author 3-5 PA-scoped roles bundled under People Analytics business function: proposed PA-ANALYST (multi-module read + dashboard authoring), PA-LEAD (model deployment approver, DEI sign-off), PA-DATA-SCIENTIST (predictive model author, DEI cohort analysis). Each role gets >=2 role_modules rows with interaction_level populated and a role_permissions bundle. New entity inserts: per-role bundle authoring needs user approval.
    affected_modules: [81, 82, 83, 84]
    blocked_by:
      - {type: depends_on, ref: B1A-PERMISSIONS, reason: "role_permissions cannot be authored before permission rows exist"}

  - id: B1A-PERMISSIONS
    summary: Zero permissions rows with domain_module_id in (81,82,83,84). Rule #14 baseline derivation hard fail.
    finding: |
      /permissions?domain_module_id=in.(81,82,83,84) returns empty. Rule #14 implies >=12 baseline rows expected (3 per module: <module_code>:read, <module_code>:manage, <module_code>:admin) plus workflow-gate rows from lifecycle states with requires_permission=true.
    action: |
      Author 12 baseline permissions across the 4 modules (3 each, tiers baseline-read / baseline-manage / baseline-admin). Workflow-gate permissions are derived from B1A-LIFECYCLE-STATES (1 per gated state). Baseline slice is unblocked; workflow-gate slice depends on B1A-LIFECYCLE-STATES.
    affected_modules: [81, 82, 83, 84]
    extra_baseline_slice_unblocked: true
    blocked_by:
      - {type: depends_on, ref: B1A-LIFECYCLE-STATES, reason: "workflow-gate permissions per Rule #12 derive from lifecycle states (baseline 12 rows are unblocked)"}

  - id: B1A-INTRA-PA-RELATIONSHIPS
    summary: Intra-PA master-to-master data_object_relationships missing. B6 partial fail.
    finding: |
      Among the 5 PA masters (42, 43, 44, 45, 46), no direct master-to-master relationships exist. Observed rows: 5 user-edges (1595-1599, Rule #10) plus derivation feeds (rows 13 org_units measures people_kpis, 46 employment_events feeds people_kpis, 113 learning_records feeds people_kpis, 161 engagement_drivers feeds people_kpis, 162 survey_responses feeds people_kpis, 832 customers feeds people_kpis). Missing master-to-master edges: predictive_models scores attrition_forecasts (46 -> 42), predictive_models scores workforce_segments (46 -> 44), attrition_forecasts segments workforce_segments (42 -> 44).
    action: |
      Draft 3-4 intra-PA data_object_relationships rows. Each row needs relationship_verb + inverse_verb + relationship_type + relationship_kind + is_required + owner_side. Verb proposals not pre-specified by audit; user authoring required.
    affected_masters:
      - {data_object_id: 42, name: attrition_forecasts, target_module_id: 83, workflow: pair_with_46_44}
      - {data_object_id: 44, name: workforce_segments, target_module_id: 81, workflow: pair_with_46_42}
      - {data_object_id: 46, name: predictive_models, target_module_id: 83, workflow: pair_with_42_44}

  - id: B1A-ALIASES
    summary: Zero data_object_aliases on any of the 5 PA masters. B11 hard fail.
    finding: |
      /data_object_aliases?data_object_id=in.(42,43,44,45,46) returns empty. PA is a strong-vendor-terminology market (industry terms like Headcount, FTE, Span of Control, Pulse Survey, Flight Risk Score; vendor terms differ per platform).
    action: |
      Draft 2-4 aliases per master with alias_type populated (industry / vendor / regulatory). Exact alias names and types not pre-specified by audit; user authoring required.
    affected_masters:
      - {data_object_id: 42, name: attrition_forecasts, target_module_id: 83, workflow: alias_proposals_needed}
      - {data_object_id: 43, name: people_kpis, target_module_id: 81, workflow: alias_proposals_needed}
      - {data_object_id: 44, name: workforce_segments, target_module_id: 81, workflow: alias_proposals_needed}
      - {data_object_id: 45, name: engagement_surveys, target_module_id: 82, workflow: alias_proposals_needed}
      - {data_object_id: 46, name: predictive_models, target_module_id: 83, workflow: alias_proposals_needed}

