b2:
  - id: B2-MODULE-84-MASTER
    summary: Module 84 (PA-DEI-ANALYTICS) masters zero data_objects; intentional derived-only design or missing master?
    question: |
      PA-DEI-ANALYTICS module 84 carries only consumer + derived DMDO rows (hcm_positions, org_units, compensation_plans, merit_recommendations as consumers; employees as derived) and 1 capability (DEI-ANALYTICS). Vendor analogs master pay-equity analyses or DEI cohorts as first-class entities with their own lifecycle. Was this intentional?
    options:
      - "(a) ADD pay_equity_analyses master to module 84"
      - "(b) ADD dei_cohorts master to module 84"
      - "(c) confirm derived-only intentional design"
    why: |
      Vendor-research findings (B3-PAY-EQUITY-ANALYSES / B3-DEI-COHORTS) could inform which entity to master. If user picks (c), Bucket 3 work on B3-PAY-EQUITY-ANALYSES / B3-DEI-COHORTS may be moot. Note: module 84 now masters zero entities and is entity_type-agnostic; the overlay/derive test would permit (c).

  - id: B2-EVENT-ATTRIBUTION-DEFECT
    summary: Trigger_events 10 (attrition_risk.high, data_object_id=31 employees) and 11 (attrition.forecast_updated, data_object_id=23 workforce_plans) are non-PA-mastered but used by PA-published handoffs 449/450/13/451.
    question: |
      Both events publish on data_objects PA does not master (employees -> HCM, workforce_plans -> SWP). PA-mastered surrogates exist: 1221 attrition_risk.elevated (data_object_id=42 attrition_forecasts) for event 10's role, and 397 attrition_forecast.published (data_object_id=42) for event 11's role. How to resolve?
    options:
      - "(a) REPLACE handoff rows 449/450 to use event 1221 and 13/451 to use event 397, retire events 10 + 11 if they have no other publisher"
      - "(b) PATCH events 10 + 11 data_object_id to PA-mastered rows (42)"
      - "(c) accept the cross-domain attribution as legitimate (events fire on the affected data_object, not the publisher's master)"
    why: |
      Choice affects rows beyond PA (HCM-owned event 10 has its own publishers; SWP-owned event 11 likewise). Cross-domain coordination needed. Option (a) is the cleanest semantic fix; option (b) breaks the publisher-master link.
    affected_events:
      - {id: 10, event_name: "attrition_risk.high", current_category: "state_change", proposed_category: "threshold_or_retire"}
      - {id: 11, event_name: "attrition.forecast_updated", current_category: "state_change", proposed_category: "retire_or_repoint"}

  - id: B2-PATTERN-FLAGS
    summary: "2026-05-30 audit proposed pattern-flag flips on 3 PA masters; B4 re-evaluation pending user confirm. (Note: only operational_workflow masters carry pattern-flag meaning; engagement_surveys + predictive_models are now operational_workflow, attrition_forecasts is now computed.)"
    question: |
      Proposed flips: engagement_surveys.has_personal_content=true (GDPR Art. 9 special categories likely), engagement_surveys.has_submit_lock=true (closed cycle locks response window); predictive_models.has_single_approver=true (EU AI Act Art. 14 single accountable human), predictive_models.has_personal_content=true (per-employee scoring is personal data); attrition_forecasts.has_personal_content=true (individual-level scores are personal data; note attrition_forecasts is now classified computed so the flag has weaker materializer effect). Confirm or modify per row?
    options:
      - "(a) apply all 5 flips as proposed"
      - "(b) apply some (specify which)"
      - "(c) decline all"
    why: |
      Flags drive downstream materializer behavior (RBAC, audit-trail emission). Independent decision. Overwrites existing non-empty boolean values -> needs sign-off.
    affected_masters:
      - {data_object_id: 42, name: attrition_forecasts, target_module_id: 83, workflow: "has_personal_content -> true (computed)"}
      - {data_object_id: 45, name: engagement_surveys, target_module_id: 82, workflow: "has_personal_content -> true; has_submit_lock -> true"}
      - {data_object_id: 46, name: predictive_models, target_module_id: 83, workflow: "has_personal_content -> true; has_single_approver -> true"}

  - id: B2-ENGAGEMENT-SCOPE-SPLIT
    summary: PA-ENGAGEMENT-SURVEYS (module 82) vs EMP-EXP scope ambiguity; duplicate or distinct?
    question: |
      EMP-EXP masters survey_responses (182) and engagement_drivers (183) and publishes survey.cycle_closed / survey_response.received / action_plan.completed INTO PA. PA-ENGAGEMENT-SURVEYS module 82 also masters engagement_surveys (45) and publishes engagement_survey.closed / launched / engagement.declining. Pure-play vendors typically classify under EMP-EXP. Resolve?
    options:
      - "(a) keep both, clarify boundary (EMP-EXP runs surveys, PA scores/aggregates)"
      - "(b) MOVE engagement_surveys to EMP-EXP, demote module 82 to derived/consumer only"
      - "(c) MERGE modules 82 and EMP-EXP equivalent"
    why: |
      Couples with B2-PA-NAMING and B3-EMP-LISTENING-DOMAIN. If B3-EMP-LISTENING-DOMAIN vetted, may promote People Listening as a distinct domain.

  - id: B2-CROSS-DOMAIN-CONSUMERS
    summary: PA modules 81 / 84 consume cross-domain data_objects without inbound handoffs (re-verify scope).
    question: |
      Module 81 carries customers fed into people_kpis via data_object_relationships row 832 (CRM-mastered). No incoming handoff. Module 84 consumes hcm_positions / compensation_plans / merit_recommendations from HCM and COMP-MGMT. Justifiable as compute-time joins for KPI calculation? Or scope creep from a prior multi-source ingest design?
    options:
      - "(a) keep as analytics compute-time joins (no handoff needed)"
      - "(b) require inbound handoffs for each consumer DMDO"
      - "(c) drop specific consumer DMDO rows as scope creep"
    why: |
      Without inbound handoffs, the analytics surface looks data-rich but cycle-untraceable. User judgment on whether compute-time joins are first-class catalog inputs.

  - id: B2-CUSTOMERS-FEEDS-KPI
    summary: data_object_relationships row 832 (customers feeds people_kpis, owner_side=target). Intentional?
    question: |
      CRM customers as input to people_kpis is defensible for revenue-per-employee or customer-per-headcount KPIs but unusual in classic HR analytics. Confirm intent or remove?
    options:
      - "(a) keep, intentional revenue-per-employee KPI feed"
      - "(b) drop the row"
    why: |
      Standalone decision. No cross-domain coordination needed. Dropping is destructive -> needs sign-off.

  - id: B2-PA-NAMING
    summary: PA domain naming / market split. People Analytics unified vs split into Workforce Analytics + People Listening.
    question: |
      Broad people-analytics platforms position differently from employee-listening platforms. Two distinct buyer profiles (HRBP / People Ops vs People Analytics teams). Resolve?
    options:
      - "(a) keep PA unified (current state)"
      - "(b) PROMOTE People Listening to separate domain (queued as B3-EMP-LISTENING-DOMAIN in _missing-domains.md)"
    why: |
      Couples with B2-ENGAGEMENT-SCOPE-SPLIT and B3-EMP-LISTENING-DOMAIN.
  - id: B2-B9D-OWN-984
    summary: "People Analytics: name an owner for \"Develop diversity, equity, and inclusion plan\" (no one is responsible for it today)"
    question: |
      Compensation Management sends People Analytics an automatically calculated workforce segment that feeds develop diversity, equity, and inclusion plan, but People Analytics does not yet have anyone assigned to that work, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work People Analytics owns, and assign a named owner once People Analytics sets up who does this work."
      - "Treat it as an automatically calculated figure with no one to own, and leave it off the list."
    why: |
      Recording it now means that the moment People Analytics decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-PA.md q14.
    extra_b9d_added: "2026-06-13"

