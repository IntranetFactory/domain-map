    candidate: skill_taxonomy_versions
    rationale: |
      Vendor surface indicates pure-plays expose version-pinned APIs. Verify whether each is a first-class business entity or an audit-log artifact. If first-class on >= 3 of 5 pure-plays, promote.
    vendor_evidence:
      - Lightcast Open Skills (versioned API)
      - TechWolf Skills Engine (taxonomy snapshots)
      - 365Talents Skills Platform (release-pinned profiles)
    proposed_module: SKILLS-MGMT-TAXONOMY

  - id: B3-2
    candidate: skill_demand_signals
    rationale: |
      Sits at boundary with queued LABOR-MARKET-INTEL candidate. If LABOR-MARKET-INTEL is approved as a domain, demand signals master there and SKILLS-MGMT consumes; otherwise master here. Defer until LABOR-MARKET-INTEL triage.
