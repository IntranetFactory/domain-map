    rationale: |
      Config / governance entity for ML models used by inference runs. Important for EU AI Act / explainability story for 2026+ deployments.
    vendor_evidence:
      - TechWolf Skills Engine (model versioning)
      - Reejig Workforce Intelligence (model audit trail)
      - SkyHive Quantum Labor Market (model governance)
    proposed_module: SKILLS-MGMT-PROFILE

  - id: B3-8
    candidate: skill_governance_policies
    rationale: |
      Captures who can add / merge / deprecate skills and competency models, as governance config. Today implicit via permissions. Promote if vendors ship as a first-class entity.
    vendor_evidence:
      - Reejig Workforce Intelligence (ethical-AI policies)
      - 365Talents Skills Platform (taxonomy curation policies)
      - Lightcast Open Skills (open-data governance)
