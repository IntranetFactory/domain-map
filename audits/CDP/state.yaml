      - {type: catalog_addition, scope: domains, trigger: "create regulations master rows for LGPD, IAB TCF v2, Quebec Law 25, POPIA"}
  - id: B1B-S7
    summary: "customers lifecycle state_order collisions (engagement vs billing collapsed onto one master)"
    finding: "6 customers lifecycle states show duplicate state_order: state_order=3 on both inactive and past_due; state_order=4 on both churned and cancelled. Two parallel state machines collapsed onto the customers master without disambiguation. Engagement axis: prospect (1) -> active (2) -> inactive (3) -> churned (4). Billing axis: prospect (1) -> active (2) -> past_due (3) -> cancelled (4)."
    blocked_by:
      - {type: user_decision, ref: B2-S8}
    affected_masters:
      - {data_object_id: 97, name: customers, target_module_id: 217, workflow: dual-state-machine}
  - id: B1B-S8
    summary: "Rule #10 users edges missing on all 6 CDP masters; module homes now exist (216-219)"
    finding: "Zero data_object_relationships rows linking any CDP master (97, 111, 112, 113, 114, 115) to the users platform-builtin row. Per Rule #10, every master with a user-typed actor (segment author, journey definer, audience owner, attribute owner, event recorder) needs at least one edge to users. Out of the 2026-06-02 modularization pass scope (no relationship writes); deferred to a future Phase B relationship-authoring pass alongside lifecycle states."
    blocked_by:
