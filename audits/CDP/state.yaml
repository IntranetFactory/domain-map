schema_version: 2
domain: CDP
status: feedback_needed
next_action_by: user
last_audit: "2026-06-13"
b1b:
  - id: B1B-S3
    summary: "B10b CDP-side residual: 6 handoffs still carry a NULL CDP-side domain_module_id because CDP models no role on the payload/event data_object (the no-candidate sub-case); blocked on whether CDP should add consumer DMDOs"
    finding: "The bulk of CDP-side handoff FK attribution is now backfilled in live state. What remains NULL on the CDP side falls entirely into B10b's no-candidate sub-case (no CDP module holds the relevant data_object): outbound 79 source NULL (event high_intent_signal.detected fires on sales_cadences 121, a SALES-ENG entity CDP does not master; also a trigger-event data-quality smell because CDP, not SALES-ENG, generates the intent signal); inbound target NULL on 997 (beta_programs 409), 717 (source_records 320), 809 (segments_dxp 446), 810 (journey_steps 447), 1004 (product_features 403). Per B10b the fix is to add a consumer DMDO on the receiving CDP module so the FK resolves, but adding consumer rows on data CDP does not currently model is net-new footprint (Rule #21 expansive), not corrective gap-fill. Surfaced for a scope decision rather than auto-added."
    blocked_by:
      - {type: user_decision, ref: B2-S10}
    affected_handoffs:
      - {handoff_id: 79, direction: outbound, target_domain: SALES-ENG, trigger_event: high_intent_signal.detected, payload: sales_cadences, null_field: source_domain_module_id, note: "event fires on a non-CDP data_object; also trigger-event quality smell"}
      - {handoff_id: 997, direction: inbound, source_domain: PROD-MGMT, trigger_event: beta_program.launched, payload: beta_programs, null_field: target_domain_module_id}
      - {handoff_id: 717, direction: inbound, source_domain: MDM, trigger_event: source_record.merged_to_golden, payload: source_records, null_field: target_domain_module_id}
      - {handoff_id: 809, direction: inbound, source_domain: DXP, trigger_event: segment_dxp.published, payload: segments_dxp, null_field: target_domain_module_id}
      - {handoff_id: 810, direction: inbound, source_domain: DXP, trigger_event: journey_step.entered, payload: journey_steps, null_field: target_domain_module_id}
      - {handoff_id: 1004, direction: inbound, source_domain: PROD-MGMT, trigger_event: product_feature.adoption_threshold_reached, payload: product_features, null_field: target_domain_module_id}
  - id: B1B-S4
    summary: "B10b owed by partner domains: partner-side module FKs still NULL on several CDP boundary handoffs"
    finding: "Inbound NULL source_domain_module_id (owed by the source domain's B10b): 89 (SMM), 717 + 272 (MDM), 809 + 810 (DXP). Outbound NULL target_domain_module_id (owed by the target domain's B10b): 79 (SALES-ENG), 478 (LOYALTY), 479 (CSM, domain 30), 480 + 529 (B2C-COMM), 481 (MDM). These resolve when each partner domain runs its own B10b pass; not fixable from CDP's side (would mean inventing rows on another domain's behalf, B10b asymmetry rule)."
    blocked_by:
      - {type: domain_audit, blocking_domain: SMM, milestone: B10b-source-backfill}
      - {type: domain_audit, blocking_domain: MDM, milestone: B10b-source-and-target-backfill}
      - {type: domain_audit, blocking_domain: DXP, milestone: B10b-source-backfill}
      - {type: domain_audit, blocking_domain: SALES-ENG, milestone: B10b-target-backfill}
      - {type: domain_audit, blocking_domain: LOYALTY, milestone: B10b-target-backfill}
      - {type: domain_audit, blocking_domain: CSM, milestone: B10b-target-backfill}
      - {type: domain_audit, blocking_domain: B2C-COMM, milestone: B10b-target-backfill}
  - id: B1B-S5
    summary: "Lifecycle states gap on the two operational_workflow masters (audience_segments, customer_journeys); blocked on the author-vs-exempt split decision (B2-S3)"
    finding: "audience_segments (113) and customer_journeys (115) are now classified entity_type=operational_workflow (this pass) but carry zero data_object_lifecycle_states, so B12 is owed on them once the split is confirmed. customer_events (111, operational_record), identity_graphs (112, computed) and customer_attributes (114, computed) are correctly typed config-shape and need no lifecycle states. Proposed lifecycles once approved: audience_segments draft/active/paused/archived (module 218); customer_journeys active/completed/abandoned (module 219). The state list itself is the workflow-shape judgment the user owns."
    blocked_by:
      - {type: user_decision, ref: B2-S3}
    affected_masters:
      - {data_object_id: 113, name: audience_segments, target_module_id: 218, workflow: draft-active-paused-archived}
      - {data_object_id: 115, name: customer_journeys, target_module_id: 219, workflow: active-completed-abandoned}
  - id: B1B-S6
    summary: "domain_regulations partial: 4 linked (GDPR, CCPA, EU-AI-ACT, COPPA); 4 candidate regulations need both a link decision and a master-row creation"
    finding: "Currently linked: regulation_id 1 (GDPR), 3 (CCPA/CPRA), 33 (EU-AI-ACT), 55 (COPPA). Missing per vendor surface: LGPD (Brazil), IAB TCF v2 (ad-tech consent framework), Quebec Law 25, POPIA (South Africa). None of the 4 exist in the regulations master table yet, so each is both a link decision (B2-S4) and a master-row creation (net-new structure, Rule #21 expansive)."
    blocked_by:
      - {type: user_decision, ref: B2-S4}
      - {type: catalog_addition, scope: domains, trigger: "create regulations master rows for any of LGPD, IAB TCF v2, Quebec Law 25, POPIA the user elects to link"}
  - id: B1B-S7
    summary: "customers lifecycle state_order collisions (engagement vs billing collapsed onto one master); blocked on the untangle decision (B2-S8)"
    finding: "6 customers lifecycle states show duplicate state_order: state_order=3 on both inactive and past_due; state_order=4 on both churned and cancelled. Two parallel state machines (engagement: prospect/active/inactive/churned; billing: prospect/active/past_due/cancelled) collapsed onto one master. customers is embedded_master in CDP-UNIFIED-PROFILE (217); the canonical master and the fix grain depend on the B2-S5 ownership decision and the B2-S8 untangle decision. Re-ordering or deleting existing state rows is a destructive overwrite (Rule #21) and needs sign-off."
    blocked_by:
      - {type: user_decision, ref: B2-S8}
    affected_masters:
      - {data_object_id: 97, name: customers, target_module_id: 217, workflow: dual-state-machine}
b2:
  - id: B2-S2
    summary: "Pattern flag re-evaluation per Rule #12 on the 5 non-customers masters"
    question: "Should has_personal_content flip to true on customer_events, identity_graphs, customer_journeys, customer_attributes, audience_segments?"
    options:
      - "Per-flag yes/no across 5 masters"
    why: "Pattern flags are workflow-shape judgments the user owns. Recommendation: true on customer_events (IPs, device fingerprints, email opens), identity_graphs (email-to-device-to-cookie map), customer_journeys (per-customer traces). Borderline on customer_attributes (LTV/churn at per-customer grain) and audience_segments (segment membership rosters are personal). Setting a flag true is a destructive overwrite of a non-empty (false) value, so it needs sign-off (Rule #21)."
  - id: B2-S3
    summary: "Lifecycle state split decision (author vs Rule #12 config-shape exemption)"
    question: "Confirm the split: author lifecycle states for audience_segments + customer_journeys; exempt customer_events, customer_attributes, identity_graphs?"
    options:
      - "Accept 2 author + 3 exempt as proposed"
      - "Different split (specify which masters get lifecycles)"
      - "All 5 get lifecycles (specify state lists)"
    why: "Workflow-shape decision. entity_type is now classified (audience_segments + customer_journeys = operational_workflow; the other 3 = operational_record/computed), so the proposed split is consistent with the live classification; the user still owns the state lists and the exemption acknowledgement (Rule #12 / Rule #15)."
  - id: B2-S4
    summary: "domain_regulations scope: which of LGPD, IAB TCF v2, Quebec Law 25, POPIA to link"
    question: "For each of LGPD, IAB TCF v2, Quebec Law 25, POPIA: link to CDP or skip?"
    options:
      - "Per-regulation yes/no"
    why: "Regulatory scope is jurisdictional + product-strategy specific. Creating the 4 missing regulations master rows is itself a judgment call (none currently exist in the regulations table)."
  - id: B2-S5
    summary: "customers master ownership (single-master vs multi-master decomposition)"
    question: "Should customers stay where it is, get promoted to a shared master in CDP-UNIFIED-PROFILE, or follow explicit multi-master decomposition?"
    options:
      - "Keep customers single-master where it is now; CRM/CSM/SUB-MGMT add consumer views at their next audits"
      - "Promote customers to a shared master in CDP-UNIFIED-PROFILE 217 and let CRM/CSM/SUB-MGMT embed via embedded_master"
      - "Adopt explicit multi-master decomposition the description hints at"
    why: "Architectural choice the audit cannot make alone. Live state currently carries customers as embedded_master in CDP-UNIFIED-PROFILE (217); B9d resolves the carried-entity owner of customers to CRM. The cross-domain ownership question still stands."
  - id: B2-S6
    summary: "Composable CDP / Reverse-ETL classification (capability vs module vs separate domain)"
    question: "Should CDP-COMPOSABLE-WH stay a CDP capability, become a separate CDP module, or split into a new REVERSE-ETL domain?"
    options:
      - "Keep as CDP capability (currently linked into CDP-SEGMENTATION-ACTIVATION 218)"
      - "Split into a REVERSE-ETL domain (Hightouch, Census, RudderStack, Polytomic, Grouparoo pass the 3-vendor test)"
      - "Treat as a CDP module (CDP-COMPOSABLE) but not a separate domain"
    why: "Rule #2 (point-solution-market test) judgment. The 3-vendor test passes for Reverse-ETL specifically. 2026-06-02 modularization folded CDP-COMPOSABLE-WH into CDP-SEGMENTATION-ACTIVATION as a capability link; promotion to its own module/domain remains open."
  - id: B2-S7
    summary: "trigger_event 473 customer_journey.exited event_category semantics"
    question: "Keep customer_journey.exited as lifecycle (current) or flip to state_change?"
    options:
      - "Keep lifecycle (journey ends, irreversible)"
      - "Flip to state_change (just another step transition)"
    why: "Vendor-semantic judgment. Adobe and Tealium model journey end as state termination; Segment models as lifecycle off-ramp tied to goal-attainment."
  - id: B2-S8
    summary: "customers lifecycle state_order collisions resolution (B1B-S7 dependency)"
    question: "How should the dual state machine on customers (engagement vs billing) be untangled?"
    options:
      - "Re-order to a single linear sequence on customers"
      - "Split into two state machines on the same master (engagement axis vs billing axis)"
      - "Move billing states (past_due, cancelled) to SUB-MGMT-mastered entity (subscriptions or customer_billing_status); leave engagement states on customers"
    why: "Domain decomposition choice. Engagement and billing lifecycles are conceptually independent; collapsing them lost the disambiguation. Any re-order/move overwrites existing non-empty state rows (destructive, Rule #21) and needs sign-off."
  - id: B2-S10
    summary: "B10b residual: should CDP add consumer DMDOs for the payloads it currently receives but does not model (B1B-S3 dependency)?"
    question: "For the inbound payloads CDP receives but models no role on (beta_programs, source_records, segments_dxp, journey_steps, product_features) and the outbound high_intent_signal on sales_cadences, should CDP add consumer DMDOs so the handoff module FKs resolve, or accept these as domain-level signals with no module owner?"
    options:
      - "Add consumer DMDOs on the receiving CDP modules (CDP-INGEST-IDENTITY 216 for source_records/segments_dxp/journey_steps; CDP-JOURNEYS-360 219 or CDP-UNIFIED-PROFILE 217 for product_features/beta_programs), then backfill the FKs"
      - "Accept them as domain-level signals; leave the CDP-side module FK NULL"
      - "Re-model handoff 79 first (high_intent_signal should arguably fire on a CDP master, not on sales_cadences)"
    why: "Adding consumer rows on data CDP does not currently model is net-new footprint (Rule #21 expansive), so it is a scope decision, not corrective gap-fill. Handoff 79 additionally carries a trigger-event quality smell (the intent signal is generated by CDP, but the event points at a SALES-ENG entity)."
  - id: B2-B9D-OWN-100
    summary: "Customer Data Platform: name an owner for \"Develop customer experience strategy\" (no one is responsible for it today)"
    question: |
      Digital Commerce forwards customer event to Customer Data Platform to develop customer experience strategy, but Customer Data Platform does not yet have anyone assigned to develop customer experience strategy, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Customer Data Platform owns, and assign a named owner once Customer Data Platform sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Customer Data Platform decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-CDP.md q18.
