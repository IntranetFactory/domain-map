b2:
  - id: B2-S2
    summary: "Pattern flag re-evaluation per Rule #12 on the 5 non-customers masters"
    question: "Should has_personal_content flip to true on customer_events, identity_graphs, customer_journeys, customer_attributes, audience_segments?"
    options:
      - "Per-flag yes/no across 5 masters"
    why: "Pattern flags are workflow-shape judgments the user owns. Recommendation: true on customer_events (IPs, device fingerprints, email opens), identity_graphs (email-to-device-to-cookie map), customer_journeys (per-customer traces). Borderline on customer_attributes (LTV/churn at per-customer grain) and audience_segments (segment membership rosters are personal)."
  - id: B2-S3
    summary: "Lifecycle state split decision (author vs Rule #12 config-shape exemption)"
    question: "Confirm the split: author lifecycle states for audience_segments + customer_journeys; exempt customer_events, customer_attributes, identity_graphs?"
    options:
      - "Accept 2 author + 3 exempt as proposed"
      - "Different split (specify which masters get lifecycles)"
      - "All 5 get lifecycles (specify state lists)"
    why: "Workflow-shape decision. Rule #12 exemption requires user acknowledgement per Rule #15 (no auto-populate notes). Module homes now resolved (B1B-S5)."
  - id: B2-S4
    summary: "domain_regulations scope: which of LGPD, IAB TCF v2, Quebec Law 25, POPIA to link"
    question: "For each of LGPD, IAB TCF v2, Quebec Law 25, POPIA: link to CDP or skip?"
    options:
      - "Per-regulation yes/no"
    why: "Regulatory scope is jurisdictional + product-strategy specific. Creating the 4 missing regulations master rows is itself a judgment call (none currently exist in the regulations table)."
  - id: B2-S5
    summary: "customers multi-master architecture decision (not pre-empted by 2026-06-02 modularization; customers kept single-master in CDP-UNIFIED-PROFILE 217)"
    question: "Should customers stay single-master in CDP, get promoted to a platform-builtin-like master, or follow explicit multi-master decomposition?"
    options:
      - "CDP keeps single-master; CRM/CSM/SUB-MGMT add consumer DMDOs at their next audits"
      - "Promote customers to a master in a CDP-UNIFIED-PROFILE module and let CRM/CSM/SUB-MGMT embed via embedded_master"
      - "Adopt explicit multi-master decomposition the description hints at"
    why: "Architectural choice the audit cannot make alone. The 2026-06-02 modularization placed customers as master in CDP-UNIFIED-PROFILE 217 per the existing live single-master state; this did not resolve the multi-master question, which still stands."
  - id: B2-S6
    summary: "Composable CDP / Reverse-ETL classification (capability vs module vs separate domain)"
    question: "Should CDP-COMPOSABLE-WH stay a CDP capability, become a separate CDP module, or split into a new REVERSE-ETL domain?"
    options:
      - "Keep as CDP capability (currently linked into CDP-SEGMENTATION-ACTIVATION 218)"
      - "Split into a REVERSE-ETL domain (Hightouch, Census, RudderStack, Polytomic, Grouparoo pass the 3-vendor test)"
      - "Treat as a CDP module (CDP-COMPOSABLE) but not a separate domain"
    why: "Rule #2 (point-solution-market test) judgment. The 3-vendor test passes for Reverse-ETL specifically. 2026-06-02 modularization folded CDP-COMPOSABLE-WH into CDP-SEGMENTATION-ACTIVATION as a capability link; promotion to its own module/domain remains open."
  - id: B2-S7
    summary: "trigger_event 473 customer_journey.exited event_category semantics"
    question: "Keep customer_journey.exited as lifecycle (current) or flip to state_change?"
    options:
      - "Keep lifecycle (journey ends, irreversible)"
      - "Flip to state_change (just another step transition)"
    why: "Vendor-semantic judgment. Adobe and Tealium model journey end as state termination; Segment models as lifecycle off-ramp tied to goal-attainment."
  - id: B2-S8
    summary: "customers lifecycle state_order collisions resolution (B1B-S7 dependency)"
    question: "How should the dual state machine on customers (engagement vs billing) be untangled?"
    options:
      - "Re-order to a single linear sequence on customers"
      - "Split into two state machines on the same master (engagement axis vs billing axis)"
      - "Move billing states (past_due, cancelled) to SUB-MGMT-mastered entity (subscriptions or customer_billing_status); leave engagement states on customers"
    why: "Domain decomposition choice. Engagement and billing lifecycles are conceptually independent; collapsing them lost the disambiguation."
b3:
  - id: B3-DATA-SOURCES
    candidate: data_sources
    rationale: "First-class sources catalog (a web SDK, a mobile SDK, a Kafka topic, a Snowflake table, a Stripe webhook). Currently no entity. Would become a master in CDP-INGEST-IDENTITY 216 and justify splitting INGEST back out from IDENTITY."
    vendor_evidence: [Twilio Segment Sources, mParticle Inputs, Tealium Tag Configurations, Treasure Data Connectors]
    proposed_module: CDP-INGEST-IDENTITY
  - id: B3-EVENT-SINKS
    candidate: event_sinks
    rationale: "Downstream activation targets (Mailchimp, Facebook Ads, Salesforce campaigns, Slack webhooks). Naming alternate: destinations. CDP-SEGMENTATION-ACTIVATION 218 currently owns activation as a capability but has no activation-specific master; this entity (plus activation_runs) would justify splitting ACTIVATION back out."
    vendor_evidence: [Twilio Segment Destinations, mParticle Outputs, Hightouch Destinations, Twilio Engage activations]
    proposed_module: CDP-SEGMENTATION-ACTIVATION
  - id: B3-ACTIVATION-RUNS
    candidate: activation_runs
    rationale: "Per-run status / throughput / error log of a destination sync. Operational backbone of activation. Master candidate for CDP-SEGMENTATION-ACTIVATION 218."
    vendor_evidence: [Hightouch Syncs, Census Sync runs]
    proposed_module: CDP-SEGMENTATION-ACTIVATION
  - id: B3-IDENTITY-RULES
    candidate: identity_rules
    rationale: "Configuration that drives identity_graph stitching (which IDs are deterministic, which probabilistic, which blocked). Master candidate for CDP-INGEST-IDENTITY 216."
    vendor_evidence: [Tealium ID merge rules, Twilio Segment Identity Resolution Settings, mParticle Identity Strategy]
    proposed_module: CDP-INGEST-IDENTITY
  - id: B3-MERGE-DECISIONS
    candidate: merge_decisions
    rationale: "Audit trail of identity stitches (which two records merged, when, by which rule, with what confidence). Compliance-relevant for GDPR Article 17. Master candidate for CDP-INGEST-IDENTITY 216."
    vendor_evidence: [Tealium Merge Audit Log, mParticle Identity History]
    proposed_module: CDP-INGEST-IDENTITY
  - id: B3-CONSENT-RECORDS
    candidate: consent_records
    rationale: "Per-data-subject consent state with grant/revoke timestamps and per-purpose scoping (IAB TCF v2 purposes 1-10). Currently the CDP-CONSENT-PRIV capability is folded into CDP-UNIFIED-PROFILE 217 with no master of its own; this entity would justify promoting a CDP-CONSENT-PRIV module (B3-MOD-CONSENT-PRIV)."
    vendor_evidence: [OneTrust, Adobe Real-Time CDP Consent and Preferences, Tealium Consent Management]
    proposed_module: CDP-UNIFIED-PROFILE
  - id: B3-DATA-SUBJECT-REQUESTS
    candidate: data_subject_requests
    rationale: "GDPR Article 15/17/20 request records. Compliance-mandatory. Master candidate that would anchor a promoted CDP-CONSENT-PRIV module."
    vendor_evidence: [Salesforce Data Cloud Consumer Data Requests, Adobe Real-Time CDP Privacy Service Requests, mParticle DSR Workbench]
    proposed_module: CDP-UNIFIED-PROFILE
  - id: B3-SEGMENT-DEFINITIONS
    candidate: segment_definitions
    rationale: "Distinct from audience_segments (materialized roster) vs the query / rule that defines the segment. May collapse with audience_segments per vendor model. Master candidate for CDP-SEGMENTATION-ACTIVATION 218."
    vendor_evidence: [Twilio Segment Audience SQL, BlueConic Segments, Treasure Data Audience definitions]
    proposed_module: CDP-SEGMENTATION-ACTIVATION
  - id: B3-PREDICTIVE-MODELS
    candidate: predictive_models
    rationale: "Per-model definitions (LTV, churn-risk, propensity-to-buy). The CDP-PREDICTIVE capability is currently folded into CDP-UNIFIED-PROFILE 217 with no master; this entity would justify a CDP-PREDICTIVE module split (B3-MOD-PREDICTIVE)."
    vendor_evidence: [Adobe Real-Time CDP AI Service models, Salesforce Data Cloud Einstein Models, BlueConic AI Workbench, Lytics ML scoring]
