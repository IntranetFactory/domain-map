  - id: B1B-S5
    summary: "Lifecycle states gap on 5 of 6 CDP masters; module attribution now available (216-219), still gated on user split decision (B2-S3)"
    finding: "customer_events, identity_graphs, audience_segments, customer_attributes, customer_journeys carry zero data_object_lifecycle_states. Module homes now exist: customer_events + identity_graphs -> CDP-INGEST-IDENTITY 216; customer_attributes -> CDP-UNIFIED-PROFILE 217; audience_segments -> CDP-SEGMENTATION-ACTIVATION 218; customer_journeys -> CDP-JOURNEYS-360 219. Proposal: author for audience_segments (draft/active/paused/archived) + customer_journeys (active/completed/abandoned); exempt customer_events (append-only stream), customer_attributes (derived materialization), identity_graphs (resolution overlay) under Rule #12 config-shape carve-out. Rule #15 forbids auto-annotating the exemption in notes; surface decision in chat per audit. Out of the 2026-06-02 modularization pass scope (no lifecycle writes)."
    blocked_by:
      - {type: user_decision, ref: B2-S3}
    affected_masters:
      - {data_object_id: 113, name: audience_segments, target_module_id: 218, workflow: draft-active-paused-archived}
      - {data_object_id: 115, name: customer_journeys, target_module_id: 219, workflow: active-completed-abandoned}
      - {data_object_id: 111, name: customer_events, target_module_id: 216, workflow: config-shape-exempt-candidate}
      - {data_object_id: 114, name: customer_attributes, target_module_id: 217, workflow: config-shape-exempt-candidate}
      - {data_object_id: 112, name: identity_graphs, target_module_id: 216, workflow: config-shape-exempt-candidate}
  - id: B1B-S6
    summary: "domain_regulations partial: 4 linked (GDPR, CCPA, EU-AI-ACT, COPPA), 4 candidates pending user scope decision and 4 missing rows in regulations table"
    finding: "Currently linked: regulation_id 1 (GDPR), 3 (CCPA/CPRA), 33 (EU-AI-ACT), 55 (COPPA). Missing per vendor surface: LGPD (Brazil), IAB TCF v2 (ad-tech consent framework), Quebec Law 25, POPIA (South Africa). The 4 missing rows are not present in the regulations master table yet; creating master regulation rows is itself a judgment call deferred to B2-S4."
    blocked_by:
