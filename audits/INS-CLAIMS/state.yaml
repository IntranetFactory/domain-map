b1a:
  - id: B1A-A3-MISSING-SOLUTIONS
    summary: "4 flagship solutions missing from solution_domains (Insurity, Snapsheet, Shift Technology, Origami Risk)"
    finding: >
      INS-CLAIMS (domain_id=44) has 5 solution_domains rows today: Guidewire ClaimCenter (primary, sol 154),
      Duck Creek Claims (primary, sol 155), Sapiens IDIT (primary, sol 156), Salesforce FSC (secondary, sol 306),
      ServiceNow FSO (secondary, sol 33). Flagship enumeration adds Insurity Claims, Snapsheet (digital-FNOL specialist),
      Shift Technology (fraud-detection specialist, anchors AMLD6 and NAIC Model #880 leg), and Origami Risk
      (claims and risk management for self-insureds / TPA market). All four are independent point-solution vendors
      whose flagship product is claims-shaped. No conflict with the no-vendor-names-in-domain-text rule, these
      writes land on commerce-shaped entities.
    action: >
      Per Rule #4 idempotency, look up or insert 4 vendors then 4 solutions (solution_kind=standard_solution),
      then insert 4 solution_domains rows. Coverage: Insurity primary, Snapsheet primary,
      Shift Technology partial (fraud-detection scope, not full FNOL-to-recovery), Origami Risk secondary.
      Use a chunked POST loader; record_status omitted per Rule #1.
    affected_entities:
      - Insurity Claims
      - Snapsheet
      - Shift Technology
      - Origami Risk

  - id: B1A-A4-CATALOG-COPY
    summary: "catalog_tagline and catalog_description are empty strings"
    finding: >
      domains row 44 has catalog_tagline="" and catalog_description="". Per Rule #20 the agent must surface proposed
      copy for explicit user approval BEFORE writing. The 2026-05-30 audit drafted candidate text but never produced
      a user-approved final string.
    action: >
      Re-surface the draft copy from 2026-05-30 (tagline: "Take a claim from first notice of loss through settlement,
      payment, and recovery in one place, with built-in fraud screening and audit trails"; description: 2-paragraph
      buyer voice covering FNOL intake, adjuster work-list, coverage and reserve management, settlement adjudication,
      payment disbursement, recovery and subrogation) for user approval, then PATCH /domains?id=eq.44.
    blocked_by:
      - {type: user_decision, ref: B2-A4-COPY}

b1b:
  - id: B1B-A2-CAPABILITIES
    summary: "Zero capability_domains rows; needs the module split decided first"
    finding: >
      INS-CLAIMS has 0 capability_domains rows. The 2026-05-30 audit proposed 8 capabilities (INS-CLAIMS-FNOL,
      INS-CLAIMS-COVERAGE-VERIFICATION, INS-CLAIMS-ADJUSTER-WORKLIST, INS-CLAIMS-RESERVING, INS-CLAIMS-ADJUDICATION,
      INS-CLAIMS-DISBURSEMENT, INS-CLAIMS-RECOVERY-SUBROGATION, INS-CLAIMS-FRAUD-DETECTION). Each capability
      must map to a realizing module per Rule #14, so the capability set cannot be loaded until the module split
      (Bucket 2 #1) is decided.
    action: >
      Once B2-MOD-SPLIT resolves, insert 8 capabilities rows + 8 capability_domains rows + the appropriate
      domain_module_capabilities junctions to the selected modules.
    blocked_by:
      - {type: user_decision, ref: B2-MOD-SPLIT}
    affected_entities:
      - INS-CLAIMS-FNOL
      - INS-CLAIMS-COVERAGE-VERIFICATION
      - INS-CLAIMS-ADJUSTER-WORKLIST
      - INS-CLAIMS-RESERVING
      - INS-CLAIMS-ADJUDICATION
      - INS-CLAIMS-DISBURSEMENT
      - INS-CLAIMS-RECOVERY-SUBROGATION
      - INS-CLAIMS-FRAUD-DETECTION

  - id: B1B-M1-MODULES
    summary: "Zero domain_modules rows; hard fail cascades to most other gaps"
    finding: >
      INS-CLAIMS has 0 domain_modules rows. Rule #14 requires every domain to carry at least 1 module_kind=full row;
      a domain with >=3 capabilities requires >=2. The 2026-05-30 audit proposed a 5-module split
      (INS-CLAIMS-INTAKE, INS-CLAIMS-ADJUDICATION, INS-CLAIMS-PAYMENTS, INS-CLAIMS-RECOVERY, INS-CLAIMS-FRAUD-SIU)
      with a variant lifting Compliance/Reporting into its own module. The decision is owed by Bucket 2 #1
      and cascades into A2, B4, B10, B10b, B12, F1, F7 and every B3 candidate.
    action: >
      Once B2-MOD-SPLIT resolves, author the chosen module set in a Phase A/M loader. Each module needs a
      domain_module_code, domain_module_name, module_kind=full, description, and an associated system skill
      authored in the same load per Rule #17.
    blocked_by:
      - {type: user_decision, ref: B2-MOD-SPLIT}

