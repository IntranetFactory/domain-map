b2:
  - id: B2-MOD-SPLIT
    summary: "INS-CLAIMS module split: 4 vs 5 vs 5-with-compliance"
    question: >
      Pick the module shape for INS-CLAIMS. The decision gates B1B-A2, B1B-M1, B1B-B10, B1B-B10b (source side),
      B1B-B12, B1B-F1-F7 and every B3 candidate.
    options:
      - "(a) 4-module: INS-CLAIMS-INTAKE, INS-CLAIMS-ADJUDICATION (folds reserves, exposures, work-list, coverage decisions), INS-CLAIMS-PAYMENTS, INS-CLAIMS-COMPLIANCE-AND-FRAUD."
      - "(b) 5-module: INS-CLAIMS-INTAKE, INS-CLAIMS-ADJUDICATION, INS-CLAIMS-PAYMENTS, INS-CLAIMS-RECOVERY (subrogation, salvage, recovery disbursements), INS-CLAIMS-FRAUD-SIU."
      - "(c) 5-module variant: as (b) but lift Compliance/Reporting into a separate INS-CLAIMS-COMPLIANCE module (regulatory_claim_reports, denial_letters audit trail, NAIC and state-DOI artifacts)."
    why: >
      Flagship vendors (Guidewire, Duck Creek, Sapiens) all carry a 4-to-5 module split internally. Option (c) is
      most defensible under DORA / IFRS 17 / NAIC Model #900 scrutiny but adds one more deployable unit.

  - id: B2-POLICY-ADMIN-SCOPE
    summary: "insurance_policies and policy_coverages currently on INS-CLAIMS, but flagship vendors split them out"
    question: >
      insurance_policies (624) and policy_coverages (625) are mastered on INS-CLAIMS today. Flagship vendors
      (Guidewire PolicyCenter, Duck Creek Policy, Sapiens IDIT Policy) carry these on a separate Policy Administration
      domain. INS-POLICY-ADMIN is queued. What is the interim ownership?
    options:
      - "(a) Keep on INS-CLAIMS until INS-POLICY-ADMIN ships, then move masters at promotion time."
      - "(b) Move now to a stub INS-POLICY-ADMIN that carries only those 2 masters until the rest is loaded."
      - "(c) Embed in claims as embedded_master (canonical owner is INS-POLICY-ADMIN, ship a local shell)."

  - id: B2-FUNC-RACI
    summary: "Functional ownership review for claims"
    question: >
      Current owner = Business Operations (id 34), contributor = Finance (id 4). Industry RACI for claims typically
      reads owner = Claims Operations (not yet a function spine row), contributor = Finance + Risk and Compliance,
      consumer = Customer Service. Decompose the function spine, or extend the existing rows?
    options:
      - "(a) Keep current (Business Operations + Finance)."
      - "(b) Add Risk and Compliance as contributor, Customer Service as consumer."
      - "(c) Decompose Business Operations to add Claims Operations sub-function, then re-model."

  - id: B2-REG-SCOPE
    summary: "Regulation set: 11 rows today, NAIC Model #900 missing, possible firm-level rows to prune"
    question: >
      Current 11 regulations include GDPR, AMLD6, Solvency II, IFRS 17, DORA, SFDR, eIDAS, IDD, GLBA, BSA, FATCA.
      NAIC Unfair Claims Settlement Practices Model #900 (the U.S. state-by-state model regulation for claims handling)
      is the single most important claims-specific U.S. regulation and is missing. SFDR, eIDAS, FATCA are firm-level,
      not claims-handling-specific.
    options:
      - "(a) Add NAIC Model #900 and keep the 11 existing rows."
      - "(b) Add NAIC Model #900 and prune SFDR, eIDAS, FATCA."

  - id: B2-APQC-STRATEGY
    summary: "PCF cross-industry has weak insurance-claims coverage"
    question: >
      PCF cross-industry only has direct hits for `Investigate fraudulent claims` (969) and weak proxies for
      FNOL and GL postings. How should INS-CLAIMS handoffs be tagged?
    options:
      - "(a) Tag with closest cross-industry PCF (the 6 agent_curated rows the 2026-05-30 audit specified); accept low-confidence tags on the 4 GL-posting handoffs."
      - "(b) Defer all tagging until APQC PCF Insurance is loaded into the processes table."
      - "(c) Author custom-process rows in processes (insurance.process_fnol, insurance.adjudicate_coverage, insurance.set_reserve) and tag against those."

  - id: B2-LFC-EXEMPT
    summary: "Which masters are config-shape exempt from Rule #12 lifecycle authoring"
    question: >
      Per Rule #12 the agent must positively decide config-shape exemption for each master. The 2026-05-30 audit
      proposed exemptions for policy_coverages, loss_incidents, claim_adjuster_assignments, salvage_recovery_records.
      Confirm or revise; Rule #15 forbids auto-populating data_objects.notes.
    options:
      - "(a) Confirm all four as config-shape exempt."
      - "(b) Workflow on loss_incidents (reported, investigated, closed) and claim_adjuster_assignments (assigned, accepted, reassigned, completed); keep the other two exempt."
      - "(c) Other; user names the per-master shape."

  - id: B2-B12-VERBS
    summary: "B12 permission_verb_override decisions for the workflow-bearing masters"
    question: >
      Pre-author verb overrides so the workflow-gate permission names are clean. Per Rule #14 each lifecycle
      state with requires_permission=true materializes one <module_code>:<verb>_<entity> permission.
    options:
      - "insurance_claims.closed: (a) close_insurance_claim or (b) close_claim. Vote (b) tentative."
      - "claim_settlements.approved: (a) approve_claim_settlement or (b) approve_settlement. Vote (b) tentative."
      - "claim_payments.issued: (a) issue_claim_payment or (b) issue_payment. Vote (b) tentative."
      - "siu_cases.substantiated: (a) substantiate_siu_case or (b) substantiate_fraud_case. Surface both."

  - id: B2-A4-COPY
    summary: "catalog_tagline and catalog_description for INS-CLAIMS"
    question: >
      Per Rule #20, agent must surface proposed catalog UX copy and get explicit user approval before writing.
      Draft from 2026-05-30 audit: tagline "Take a claim from first notice of loss through settlement, payment,
      and recovery in one place, with built-in fraud screening and audit trails."; description = 2-paragraph
      buyer voice covering FNOL intake, adjuster work-list, coverage and reserve management, settlement adjudication,
      payment disbursement, recovery and subrogation. Approve, rewrite, or skip?
    options:
      - "(a) Approve the draft verbatim."
      - "(b) Rewrite (user supplies final wording)."
      - "(c) Skip; leave both columns empty until later."

  - id: B2-B11-TUPLES
    summary: "Explicit data_object_aliases tuples per master, audit needs review before bulk INSERT"
    question: >
      The 2026-05-30 audit named alias categories per master in prose (e.g. Claim, Loss, Notice of Loss for
      insurance_claims). About 30 explicit (data_object_id, alias_name) tuples need user review before idempotent
      INSERT. Approve agent to author the full tuple list and surface for one-pass approval, or batch per-master?
    options:
      - "(a) Agent authors the full ~30-tuple list, user approves in one pass."
      - "(b) Per-master review: agent surfaces 3 to 5 tuples per master, user approves master-by-master."

