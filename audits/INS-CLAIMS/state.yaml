b2:
  - id: B2-MOD-SPLIT
    summary: "INS-CLAIMS module split: 4 vs 5 vs 5-with-compliance (gates the whole build)"
    question: >
      Pick the module shape for INS-CLAIMS. The decision gates B1A-BUILD, B1B-A2, B1B-M1, B1B-B10,
      B1B-B10b (source side), B1B-B12, and every b3 candidate.
    options:
      - "(a) 4-module: INS-CLAIMS-INTAKE, INS-CLAIMS-ADJUDICATION (folds reserves, exposures, work-list, coverage decisions), INS-CLAIMS-PAYMENTS, INS-CLAIMS-COMPLIANCE-AND-FRAUD."
      - "(b) 5-module: INS-CLAIMS-INTAKE, INS-CLAIMS-ADJUDICATION, INS-CLAIMS-PAYMENTS, INS-CLAIMS-RECOVERY (subrogation, salvage, recovery disbursements), INS-CLAIMS-FRAUD-SIU."
      - "(c) 5-module variant: as (b) but lift Compliance/Reporting into a separate INS-CLAIMS-COMPLIANCE module (regulatory_claim_reports, denial_letters audit trail, NAIC and state-DOI artifacts)."
    why: >
      Flagship vendors all carry a 4-to-5 module split internally. Option (c) is most defensible under
      DORA / IFRS 17 / NAIC Model #900 scrutiny but adds one more deployable unit.

  - id: B2-POLICY-ADMIN-SCOPE
    summary: "insurance_policies and policy_coverages currently on INS-CLAIMS, but flagship vendors split them out"
    question: >
      insurance_policies (624) and policy_coverages (625) are mastered on INS-CLAIMS today. Flagship
      vendors carry these on a separate Policy Administration domain. INS-POLICY-ADMIN is queued.
      What is the interim ownership?
    options:
      - "(a) Keep on INS-CLAIMS until INS-POLICY-ADMIN ships, then move masters at promotion time."
      - "(b) Move now to a stub INS-POLICY-ADMIN that carries only those 2 masters until the rest is loaded."
      - "(c) Embed in claims as embedded_master (canonical owner is INS-POLICY-ADMIN, ship a local shell)."

  - id: B2-FUNC-RACI
    summary: "Functional ownership review for claims"
    question: >
      Current owner = Business Operations (id 34), contributor = Finance (id 4). Industry RACI for claims
      typically reads owner = Claims Operations (not yet a function spine row), contributor = Finance +
      Risk and Compliance, consumer = Customer Service. Decompose the function spine, or extend the rows?
    options:
      - "(a) Keep current (Business Operations + Finance)."
      - "(b) Add Risk and Compliance as contributor, Customer Service as consumer."
      - "(c) Decompose Business Operations to add Claims Operations sub-function, then re-model."

  - id: B2-REG-SCOPE
    summary: "Regulation set: 11 rows today, NAIC Model #900 missing, possible firm-level rows to prune"
    question: >
      Current 11 regulations include GDPR, AMLD6, Solvency II, IFRS 17, DORA, SFDR, eIDAS, IDD, GLBA,
      BSA, FATCA. NAIC Unfair Claims Settlement Practices Model #900 (the U.S. state-by-state model
      regulation for claims handling) is the single most important claims-specific U.S. regulation and is
      missing. SFDR, eIDAS, FATCA are firm-level, not claims-handling-specific.
    options:
      - "(a) Add NAIC Model #900 and keep the 11 existing rows."
      - "(b) Add NAIC Model #900 and prune SFDR, eIDAS, FATCA."

  - id: B2-APQC-STRATEGY
    summary: "PCF cross-industry has weak insurance-claims coverage"
    question: >
      PCF cross-industry only has a direct hit for `Investigate fraudulent claims` (handoff 907) and
      weak proxies for FNOL and GL postings. How should INS-CLAIMS handoffs be tagged?
    options:
      - "(a) Tag with closest cross-industry PCF (the 6 agent_curated rows the 2026-05-30 audit specified); accept low-confidence tags on the 4 GL-posting handoffs."
      - "(b) Defer all tagging until APQC PCF Insurance is loaded into the processes table."
      - "(c) Author custom-process rows in processes (insurance.process_fnol, insurance.adjudicate_coverage, insurance.set_reserve) and tag against those."

  - id: B2-LFC-EXEMPT
    summary: "Confirm config-shape classification for loss_incidents, claim_adjuster_assignments (entity_type already set to default)"
    question: >
      entity_type was classified 2026-06-07 on the DEFAULT assumption (option a): policy_coverages=catalog,
      loss_incidents=operational_record, claim_adjuster_assignments=operational_record,
      salvage_recovery_records=operational_record (all non-workflow, pass B12 without lifecycle states).
      Confirm, or revise loss_incidents and claim_adjuster_assignments to workflow-bearing. Revising is a
      PATCH of an already-set entity_type (an overwrite), so it stays a user decision.
    options:
      - "(a) Confirm all four as non-workflow (current state, no change)."
      - "(b) Re-classify loss_incidents (reported, investigated, closed) and claim_adjuster_assignments (assigned, accepted, reassigned, completed) to operational_workflow; keep the other two."
      - "(c) Other; user names the per-master shape."

  - id: B2-B12-VERBS
    summary: "B12 permission_verb_override decisions for the workflow-bearing masters"
    question: >
      Pre-author verb overrides so the workflow-gate permission names are clean. Per Rule #14 each lifecycle
      state with requires_permission=true materializes one <module_code>:<verb>_<entity> permission.
    options:
      - "insurance_claims.closed: (a) close_insurance_claim or (b) close_claim. Vote (b) tentative."
      - "claim_settlements.approved: (a) approve_claim_settlement or (b) approve_settlement. Vote (b) tentative."
      - "claim_payments.issued: (a) issue_claim_payment or (b) issue_payment. Vote (b) tentative."
      - "siu_cases.substantiated: (a) substantiate_siu_case or (b) substantiate_fraud_case. Surface both."

  - id: B2-B11-TUPLES
    summary: "Explicit data_object_aliases tuples per master; review style before bulk INSERT"
    question: >
      The audit named alias categories per master in prose. About 30 explicit (data_object_id, alias_name)
      tuples need a review style before idempotent INSERT (unblocks B1B-B11-ALIASES).
    options:
      - "(a) Agent authors the full ~30-tuple list, user approves in one pass."
      - "(b) Per-master review: agent surfaces 3 to 5 tuples per master, user approves master-by-master."

