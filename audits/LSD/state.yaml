    summary: "Route or delete 2 suspicious inbound handoffs (300, 807) (DESTRUCTIVE: reroute/repaint/delete)"
    question: "Handoff 300 (RE-PROP-MGMT to LSD on property_tenant.evicted payload property_tenants) and 807 (HCMS to LSD on editorial_workflow.review_required payload editorial_workflows) both carry source-mastered payload, wrong shape for intake-creation. Per row, pick: (i) reroute target to RE-PROP-MGMT or HCMS internal-legal module if those will be authored; (ii) repaint payload as legal_intake_requests once LSD-INTAKE-PORTAL exists; (iii) delete as misrouted. Each option mutates or deletes a live handoff, so it needs sign-off."
