b2:
  - id: B2-MODULE-SHAPE
    summary: "Pick LSD module shape (gating decision for entire audit)"
    question: "Which module shape to author for LSD: (a) 5 modules (LSD-INTAKE-PORTAL, LSD-MATTER-MGMT, LSD-LEGAL-HOLD, LSD-OUTSIDE-COUNSEL, LSD-REGULATORY-RESPONSE), (b) 4 modules (collapse INTAKE into MATTER), (c) 6 modules (add LSD-KNOWLEDGE), or (d) LSD-FULL single module (only viable if legal-specific capabilities also stay below 3)?"
    options: ["a_5_modules_default", "b_4_modules", "c_6_modules_with_knowledge", "d_single_module"]
    why: "Every downstream Bucket 1 STRUCTURAL fix (B1B-M1, B1B-M2, B1B-S1 lifecycle states, B1B-B1 handoff module FK backfill, B1B-S5 skill migration) depends on this choice. The default recommendation is (a) 5 modules based on flagship vendor surface mapping."

  - id: B2-LEGAL-CONTRACTS-NECESSITY
    summary: "Keep legal_contracts as required consumer on LSD or demote to optional?"
    question: "domain_data_objects row for legal_contracts (data_object_id=66) on LSD has role=consumer, necessity=required, pointing at CLM-REPOSITORY canonical master. Per Rule #16: are contracts infrastructure (demote to optional) or workflow-bearing (keep required)? Reading: contracts carry workflow so required likely stands, but a matter can plausibly reference an unsigned-contract concept without CLM master being deployed."
    options: ["keep_required", "demote_to_optional"]
    why: "Rule #16 calls for explicit consideration on every non-master row consuming an external master."

  - id: B2-KNOWLEDGE-SURFACE
    summary: "How to realize KNOWLEDGE-MGMT capability on LSD"
    question: "KNOWLEDGE-MGMT capability is linked to LSD but no realizing module exists. Options: (a) author legal-specific legal_knowledge_articles master in a new LSD-KNOWLEDGE module; (b) consume cross-cutting knowledge_articles master (ITSM-KNOWLEDGE-anchored) as a consumer row in LSD-MATTER-MGMT; (c) drop the capability link as not load-bearing."
    options: ["a_legal_specific_master", "b_consumer_of_cross_cutting", "c_drop_capability"]
    why: "Vendor evidence: LawVu carries Knowledge distinctly; ServiceNow LSD reuses Now Knowledge with legal-scoped article types. Both (a) and (b) have vendor backing. Choice affects whether B2-MODULE-SHAPE (c) 6-module path is viable."

  - id: B2-PATTERN-FLAGS
    summary: "Approve 2 remaining pattern-flag patches on LSD masters"
    question: "Proposed flips remain on: legal_advice_records.has_personal_content=true (privilege content); outside_counsel_engagements.has_single_approver=true (GC sign-off). Approve, edit, or decline each? legal_holds.has_submit_lock=true is already set."
    options: ["approve_both", "approve_advice_only", "approve_engagement_only", "decline_both"]
    why: "B4 requires positive consideration. False-by-default is not the same as false-after-review."

  - id: B2-SUSPICIOUS-INBOUNDS
    summary: "Route or delete 2 suspicious inbound handoffs (300, 807)"
    question: "Handoff 300 (RE-PROP-MGMT to LSD on property_tenant.evicted payload property_tenants) and 807 (HCMS to LSD on editorial_workflow.review_required payload editorial_workflows) both carry source-mastered payload, wrong shape for intake-creation. Per row, pick: (i) reroute target to RE-PROP-MGMT or HCMS internal-legal module if those will be authored; (ii) repaint payload as legal_intake_requests once LSD-INTAKE-PORTAL exists; (iii) delete as misrouted."
    options: ["i_reroute_target", "ii_repaint_payload", "iii_delete"]
    why: "Both inbounds have correct intent (route into legal intake) but wrong shape. (ii) is the cleanest fix once LSD-INTAKE-PORTAL exists. B1B-H1-807 closes when this resolves."
    affected_handoffs:
      - {handoff_id: 300, direction: inbound, source_domain: RE-PROP-MGMT, target_domain: LSD, trigger_event: "property_tenant.evicted", payload: "property_tenants", null_field: null}
      - {handoff_id: 807, direction: inbound, source_domain: HCMS, target_domain: LSD, trigger_event: "editorial_workflow.review_required", payload: "editorial_workflows", null_field: null}

  - id: B2-PAIRWISE-DEPTH
    summary: "Re-run pairwise reconciliation after B1B-M1 lands, or accept abbreviated form now?"
    question: "Pass 4 pairwise reconciliation for the 4 neighbors at edge weight >=3 (ECM, AUDIT, HCM, GRC) ran abbreviated this audit because every LSD-side module FK is NULL. Should the agent rerun pairwise after B1B-M1 lands, or accept the abbreviated form?"
    options: ["rerun_after_m1", "accept_abbreviated"]
    why: "Rerun is recommended because every row gets concrete fix targets once LSD modules exist."

b3:
