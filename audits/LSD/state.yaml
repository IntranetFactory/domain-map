    options: ["a_5_modules_default", "b_4_modules", "c_6_modules_with_knowledge", "d_single_module"]
    why: "Every downstream STRUCTURAL fix (B1B-M1, B1B-M2, B1B-S1 lifecycle states, B1B-B1 handoff module FK backfill) depends on this choice. The default recommendation is (a) 5 modules based on flagship vendor surface mapping. The agent does NOT scaffold until this resolves."

  - id: B2-LEGAL-CONTRACTS-NECESSITY
    summary: "Keep legal_contracts as required consumer on LSD or demote to optional?"
    question: "domain_data_objects row for legal_contracts (data_object_id=66) on LSD has role=consumer, necessity=required, pointing at CLM-REPOSITORY canonical master. Per Rule #16: are contracts infrastructure (demote to optional) or workflow-bearing (keep required)? Reading: contracts carry workflow so required likely stands, but a matter can plausibly reference an unsigned-contract concept without CLM master being deployed. Demotion would OVERWRITE a non-empty necessity value, so it is a destructive change requiring sign-off."
    options: ["keep_required", "demote_to_optional"]
    why: "Rule #16 calls for explicit consideration on every non-master row consuming an external master."

  - id: B2-KNOWLEDGE-SURFACE
    summary: "How to realize KNOWLEDGE-MGMT capability on LSD"
    question: "KNOWLEDGE-MGMT capability is linked to LSD but no realizing module exists. Options: (a) author legal-specific legal_knowledge_articles master in a new LSD-KNOWLEDGE module; (b) consume cross-cutting knowledge_articles master (ITSM-KNOWLEDGE-anchored) as a consumer row in LSD-MATTER-MGMT; (c) drop the capability link as not load-bearing."
    options: ["a_legal_specific_master", "b_consumer_of_cross_cutting", "c_drop_capability"]
    why: "Vendor evidence: in-house legal platforms carry Knowledge distinctly; service-delivery suites reuse a shared knowledge base with legal-scoped article types. Both (a) and (b) have vendor backing. Choice affects whether B2-MODULE-SHAPE (c) 6-module path is viable."

