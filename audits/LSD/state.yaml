    summary: "Approve 2 remaining pattern-flag patches on LSD masters (DESTRUCTIVE: flips existing rows)"
    question: "Proposed flips remain on: legal_advice_records.has_personal_content=true (privilege content); outside_counsel_engagements.has_single_approver=true (GC sign-off). Approve, edit, or decline each? legal_holds.has_submit_lock=true is already set. These overwrite existing flag values on live master rows, so they need sign-off."
