    candidate: "B9 fan-out for trigger_event 1045 outside_counsel.engaged"
    rationale: "Trigger event exists but has zero subscribers. Likely fan-out to SPEND-MGMT (accruals), CLM (engagement letter as contract), GRC (conflict-check obligations)."
    vendor_evidence: ["Onit", "Litera", "LawVu"]

