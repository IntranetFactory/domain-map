b2:
  - id: B2-LEGAL-CONTRACTS-NECESSITY
    summary: "Keep legal_contracts as a required consumer on LSD, or demote to optional? (user asked what a required consumer is; explained, re-asked.)"
    question: "domain_data_objects row 110 (legal_contracts, data_object_id 66) on LSD is role=consumer, necessity=required, pointing at the CLM-mastered contract record. A 'required consumer' means LSD READS the contract master (it does not own it) and the workflow assumes that read is available. Demotion to optional says a matter can reference a contract concept without the CLM master being deployed. Keep required or demote?"
    options: ["keep_required", "demote_to_optional"]
    evidence: "ServiceNow LSD, LawVu, and Onit all surface contract data against matters as a first-class read (matter-linked contracts), so the read is workflow-bearing rather than convenience infrastructure; that supports keeping it required. Demotion is the narrower Rule #16 reading for deployments with no CLM master present. Demotion OVERWRITES a non-empty necessity (destructive), so it needs sign-off."
    why: "Rule #16 explicit-necessity consideration on a consumer of an external master; user asked for the definition before deciding."

  - id: B2-KNOWLEDGE-SURFACE
    summary: "How to realize KNOWLEDGE-MGMT on LSD now that the 5-module shape is fixed (recommendation was 'a or b'; needs a pick)."
    question: "KNOWLEDGE-MGMT (187) is provisionally linked to LSD-MATTER-MGMT. With the 5-module shape (no separate Knowledge module), realize it as: (a) a legal-specific legal_knowledge_articles MASTER inside LSD-MATTER-MGMT (new entity), or (b) consume the cross-cutting knowledge_articles master with legal-scoped article types (no new master), or (c) drop the capability link?"
    options: ["a_legal_specific_master", "b_consumer_of_cross_cutting", "c_drop_capability"]
    evidence: "In-house legal platforms (LawVu, Onit) often carry a distinct legal Knowledge surface (supports a); ServiceNow LSD reuses the shared ServiceNow Knowledge base with legal scoping (supports b). Since a1 chose 5 modules (the 6-module Knowledge-module path was declined), (b) consume cross-cutting is the consistent default; (a) authoring legal_knowledge_articles is an expansive addition that would ship only after this q is answered."
    why: "a3 recommendation was ambiguous ('a or b'); the 5-module decision narrows it but the master-vs-consume call is still the user's."

