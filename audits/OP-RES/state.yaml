b2:
  - id: B2-1
    summary: "Is OP-RES correctly classified as leadership-tier, or should it be promoted to master-bearing?"
    question: "SKILL.md lists OP-RES on the leadership-tier exception list. Catalog state matches the label (zero masters, zero modules, zero capabilities, all three linked solutions at coverage_level='secondary', no pure-play vendor at primary coverage). However, regulator-driven substrate (DORA Articles 11, 25, 28; NIS2 significant-incident reporting) imposes mandatory data shapes that look like masters (important_business_services, impact_tolerances, resilience_scenarios). Pure-play resilience vendors (Fusion Framework System, Castellan) ship the substrate as first-class entities; broader IRM suites (Riskonnect, ServiceNow IRM, Archer) carry it as named modules. Should OP-RES stay leadership-tier or promote?"
    options:
      - "(a) Keep leadership-tier; author OP-RES-LANDING only; declare consumer DMDOs on GRC, BCM, ITSM, SECOPS masters; treat regulator artifacts as derived-signal views."
      - "(b) Promote to master-bearing; author OP-RES-MAPPING (important_business_services, impact_tolerances, service_dependency_maps) and OP-RES-TESTING-AND-INCIDENT (resilience_scenarios, resilience_tests, resilience_incidents, resilience_remediation_actions) modules; survivors of Phase 0 vendor research become Bucket 1 in a follow-up."
      - "(c) Hybrid: author OP-RES-LANDING now as a thin landing surface, defer master-bearing modules to a follow-up Phase 0 load aligned with the parallel BCM B2-1 decision."
    why: "Gates all 11 b3 items, gates B1B-S4 skill placement, gates B1B-S6 consumer DMDO scope. Coupled with the BCM B2-1; resolving them jointly avoids resilience-versus-continuity overlap on continuity_exercises versus resilience_tests."
    vendor_evidence:
      - {vendor: "Fusion Framework System", evidence: "1st_class"}
      - {vendor: "Castellan", evidence: "1st_class"}
      - {vendor: "Riskonnect Platform", evidence: "secondary"}
      - {vendor: "ServiceNow Integrated Risk Management", evidence: "secondary"}
      - {vendor: "Archer Suite", evidence: "secondary"}
    extra_coupled_with: "BCM audit's B2-1"

  - id: B2-2
    summary: "Important Business Service register: OP-RES master, CMDB consumer overlay, or shared cross-cutting host?"
    question: "The important-business-service register under DORA / UK PRA rules is the regulator-facing view of the same underlying `business_services` substrate that lives in CMDB / SVC-CAT for operational use. Pure-play resilience vendors (Fusion, Castellan) master it themselves; ServiceNow IRM embeds from the platform CMDB. Which ownership shape is right?"
    options:
      - "(a) OP-RES masters `important_business_services` as a separate data_object distinct from CMDB `business_services`, with regulator-facing fields (tolerance, criticality, regulator-mapping)."
      - "(b) OP-RES consumes CMDB `business_services` and adds a per-service regulator overlay as a junction."
      - "(c) Shared cross-cutting module (`IMPORTANT-BUSINESS-SERVICES`) hosted on OP-RES + CMDB + SVC-CAT via `domain_module_host_domains`."
    why: "Affects the data_object boundary between OP-RES and CMDB / SVC-CAT and which domain owes a master row. Option (a) only applies if B2-1 resolves to promote."
    vendor_evidence:
      - {vendor: "Fusion Framework System", evidence: "1st_class"}
      - {vendor: "Castellan", evidence: "1st_class"}
      - {vendor: "ServiceNow Integrated Risk Management", evidence: "secondary"}
    extra_depends_on: B2-1

  - id: B2-3
    summary: "DORA and NIS2 substrate ownership across OP-RES, BCM, TPRM, SECOPS."
    question: "DORA mandates an ICT third-party register (Article 28; TPRM claim), TLPT artifacts (Article 25; OP-RES scenario testing plus SECOPS red-team execution), major-incident reporting (Article 19; OP-RES versus ITSM / SECOPS). NIS2 Article 23 adds significant-incident reporting. Where does the substrate live?"
    options:
      - "(a) Split the DORA substrate by artifact across OP-RES, BCM, TPRM, SECOPS, each domain mastering its slice."
      - "(b) Author a single `DORA-COMPLIANCE` cross-cutting module hosted on OP-RES + BCM + TPRM + SECOPS via `domain_module_host_domains`."
      - "(c) Defer until BCM B2-3 and TPRM B-band audits land so the DORA split is decided once."
    why: "Affects which domain masters `ict_third_party_register_entries`, `dora_major_incident_reports`, `dora_threat_led_pen_tests`, `nis2_significant_incident_reports`. Independent of B2-1. Coupled with BCM B2-3."
    vendor_evidence:
      - {vendor: "Fusion Framework System", evidence: "1st_class"}
      - {vendor: "Castellan", evidence: "1st_class"}
      - {vendor: "Archer Suite", evidence: "secondary"}
    extra_coupled_with: "BCM B2-3 and TPRM B-band audit"

  - id: B2-4
    summary: "Catalog UX wording flow for B1B-S3 (Rule #20)."
    question: "Rule #20 requires user approval on the exact `catalog_tagline` and `catalog_description` wording before write. Does the user want the agent to draft both fields in buyer voice (workflow + value) for review, or supply the wording directly?"
    options:
      - "(a) Agent drafts both fields in buyer voice; user reviews and approves before write."
      - "(b) User supplies the wording directly."
    why: "Independent of other items. Gates B1B-S3."

