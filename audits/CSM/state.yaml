  - id: B2-B9D-OWN-1422
    summary: "B9d: handoff 72 (SUB-MGMT->CSM payment.failed) tagged process 9.5.2.5 'Process and distribute payments'; CSM does not distribute payments. Re-key event + re-label as case-opening."
    question: |
      B9d (2026-06-13) classified handoff 72 as ORPHAN owned by CSM because the carried entity
      (customer_cases) is CSM-mastered, but the tagged process (9.5.2.5 payment distribution) is a
      finance-family process CSM does not perform. SAME defect as B1B-B1 (trigger_event 94
      'payment.failed' mis-attributed to customer_cases / DO 103). Resolution is a re-key, not an
      owner assignment.
    options:
      - "(a) Re-key trigger_event 94 to its publisher (customer_invoices id 107 on SUB-MGMT) and re-label the CSM side as a case-opening process (customer_case.payment_dispute_opened), not payment distribution."
      - "(b) Record 'Process and distribute payments' as CSM-owned work and assign an owner (over-models; no support desk distributes payments)."
      - "(c) Leave as-is and fold into B2-CUSTOMERS-AMBIGUITY (q2)."
    recommended: "(a)"
    why: |
      CSM never moves money; the failed-payment signal belongs to the invoice/payment owner
      (SUB-MGMT), and CSM's real action is opening/working a case. Re-keying is the same fix B1B-B1
      proposes. PATCHing trigger_events.data_object_id is a corrective overwrite (destructive) and a
      handoff_processes re-point/delete needs sign-off; both await the user. Surfaced as q-CSM.md q12;
      cross-linked to B1B-B1 / B2-CUSTOMERS-AMBIGUITY.
    blocked_by:
      - {type: user_decision, ref: B1B-B1, reason: "Same mis-attributed payment.failed event; resolve together."}
    extra_b9d_added: "2026-06-13"

