# SURFACED-FOR-USER 2026-06-06 (no write; carried as b1a-deferred / destructive-awaiting-approval):
b1a:
  - id: B1A-PHASE-P
    summary: "Multi-module (3 modules) with 0 personas post-Plan-3 (E1 fail): author the persona / RACI layer."
    status: deferred
    finding: "3 domain_modules and 0 domain_roles reaching this domain via role_modules. E1 fires on this multi-module domain."
    defer_reason: >-
      Persona authoring is entangled with the OPEN B2-CSM-KNOWLEDGE-MASTER decision
      (CSM-KNOWLEDGE may demote to starter, which reshapes persona reach) and
      B2-CAPABILITY-SHAPE. Author after those resolve.
    candidate_personas: [SUPPORT-AGENT, SUPPORT-TEAM-LEAD, ENTITLEMENT-MANAGER]

  - id: B1A-SELF-CONTAIN
    summary: "6 contributor/required-consumer rows break module self-containment (M9): embed or relax each."
    status: surfaced_destructive
    finding: >-
      6 domain_module_data_objects rows on CSM modules are role=contributor or
      role=consumer+necessity=required, pointing at an entity mastered by another
      domain and not embedded_master here. Converting role->embedded_master or
      necessity->optional rewrites existing rows (destructive); awaiting approval.
    extra_m9_shapes:
      - {entity: customer_subscriptions, module: CSM-ENTITLEMENTS, role: consumer, master_domain: SUB-MGMT, recommended_fix: "necessity->optional (presence-conditional)"}
      - {entity: customers, module: CSM-CASE-MGMT, role: consumer, master_domain: CRM, recommended_fix: "embedded_master (carry local shell)"}
      - {entity: customers, module: CSM-ENTITLEMENTS, role: consumer, master_domain: CRM, recommended_fix: "embedded_master (carry local shell)"}
      - {entity: knowledge_articles, module: CSM-CASE-MGMT, role: contributor, master_domain: ITSM, recommended_fix: "necessity->optional"}
      - {entity: knowledge_articles, module: CSM-KNOWLEDGE, role: contributor, master_domain: ITSM, recommended_fix: "embedded_master (audience-filtered local view) or necessity->optional"}
      - {entity: legal_contracts, module: CSM-ENTITLEMENTS, role: contributor, master_domain: CLM, recommended_fix: "necessity->optional"}

b1b:
  - id: B1B-S2
    summary: Pattern-flag re-evaluation owed on customer_entitlements (104), csat_responses (105), customer_events (111).
    status: blocked
    finding: >-
      B4 open. 104 has all three flags false; 105 has only has_personal_content=true;
      111 has all three false. Proposed flips ride B2-PATTERN-FLAGS.
    blocked_by:
      - {type: user_decision, ref: B2-PATTERN-FLAGS, reason: "Bucket 2 #6 owns the per-flag decision; flag flips on a non-empty value are an overwrite."}
    affected_masters:
      - {data_object_id: 104, name: customer_entitlements, target_module_id: 113, workflow: "activation/suspension/expiry", note: "entity_type now 'catalog'; has_single_approver=true still proposed for activation signoff"}
      - {data_object_id: 105, name: csat_responses, target_module_id: 112, workflow: "captured-once / immutable", note: "has_submit_lock=true proposed"}
      - {data_object_id: 111, name: customer_events, target_module_id: 112, workflow: "append-only event log", note: "all three flags stay false proposed"}

  - id: B1B-B1
    summary: Resolve mis-attributed trigger_event 94 (payment.failed bound to customer_cases).
    status: blocked
    finding: >-
      B9 open. trigger_event 94 has data_object_id=103 (customer_cases) but
      event_name 'payment.failed' is keyed against a payment/invoice publisher on
      SUB-MGMT. Symptomatic handoff: row 72 (SUB-MGMT to CSM, payload customer_cases).
      PATCHing data_object_id is a corrective overwrite.
    blocked_by:
      - {type: user_decision, ref: B2-CUSTOMERS-AMBIGUITY, reason: "option (c) (introduce customer_health_signals) may also reshape this event."}
    extra_options:
      - "(a) PATCH trigger_events.data_object_id to point at the publisher master (customer_invoices id 107 on SUB-MGMT) and rename for clarity"
      - "(b) split into publisher event (customer_invoice.payment_failed) plus optionally a CSM-side customer_case.payment_dispute_opened"

  - id: B1B-B10B-CLASS-A
    summary: Resolve 10 NULL module-FK ties on customers / customer_subscriptions payloads.
    status: blocked
    finding: >-
      10 NULL ties: 6 outbound (70, 224, 233, 234, 486, 488) + 2 inbound (209, 270)
      on customers (DO 97), CSM consumes in two modules; 2 inbound (195, 494) on
      customer_subscriptions (DO 106). Strongest-role tie breaks NULL.
    blocked_by:
      - {type: user_decision, ref: B2-CUSTOMERS-AMBIGUITY, reason: "Bucket 2 #1 owns (a) leave NULL / (b) CSM-CASE-MGMT canonical / (c) introduce customer_health_signals."}
    affected_handoffs: [70, 224, 233, 234, 486, 488, 209, 270, 195, 494]

  - id: B1B-B10B-CLASS-B
    summary: Resolve B5 boundary integrity for 49 handoffs whose payload is held in no CSM DMDO.
    status: blocked
    finding: >-
      48 inbound rows whose payload is the source domain's own master with no CSM
      consumer DMDO (vertical-industry 'opens case' rows + 470 crm_opportunities +
      226 support_sessions + PROD-MGMT rows), plus outbound 73 (dunning_events 110).
    blocked_by:
      - {type: user_decision, ref: B2-CROSS-DOMAIN-INTEGRITY, reason: "Bucket 2 #2 owns author-DMDO vs move-target vs drop."}
      - {type: catalog_addition, scope: domains, trigger: "B3-OMNICHANNEL-SESSIONS closes handoff 226 if it lands."}
    affected_handoffs:
      - {count: 49, scope_note: "48 inbound (86, 87, 193, 194, 225, 226, 229, 230, 270 partial, 330, 337, 470, 479, 493, 496, 511, 520, 523, 525, 720, 744, 865, 883, 890, 891, 899, 902, 904, 908, 910, 923, 924, 930, 931, 942, 947, 985, 987, 992, 996, 998, 1003, 1007, 1010, 1055, 1056, 1058) plus outbound 73 (dunning_events).", enumeration_status: source_count_only}

b2:
  - id: B2-CUSTOMERS-AMBIGUITY
    summary: Decide source/target_module_id rule for CSM handoffs keyed on customers (consumed in two modules, not mastered).
    question: >-
      Outbound 70, 224, 233, 234, 486, 488 and inbound 209, 270 tie on customers (DO 97).
      What should source/target_module_id be?
    options:
      - "(a) leave NULL, accept no clean source attribution for customer-keyed CSM outbound"
      - "(b) pick CSM-CASE-MGMT as canonical source by convention (case-driven health signals)"
      - "(c) introduce customer_health_signals as a new CSM-CASE-MGMT-mastered data_object and re-key the trigger events; reshapes B3-OMNICHANNEL-SESSIONS and B1B-B1"
    why: >-
      Deterministic B10b derivation breaks on tie; CSM does not master customers (CRM does).
      Option (c) is the most catalog-coherent fix but carries broader modeling implications.

  - id: B2-CROSS-DOMAIN-INTEGRITY
    summary: Decide per-cluster B5 fix for handoffs whose payload CSM declares no DMDO on.
    question: >-
      49 handoff rows reference payloads CSM has no consumer DMDO for. Author the missing
      consumer DMDOs on the relevant CSM module, move targets to other domains, or drop?
    options:
      - "(a) author consumer DMDOs on CSM-CASE-MGMT for crm_opportunities, support_sessions, product_features/releases/beta_programs/feedback/metrics, vertical-industry master payloads"
      - "(b) move targets to CRM-internal or ACCT-PLAN where applicable"
      - "(c) drop the handoffs with no real CSM-side workflow effect"
    why: >-
      Each cluster differs. crm_opportunities and support_sessions are common CSM workflow
      subjects; PROD-MGMT payloads are mostly product-feedback signals; vertical rows are
      industry-specific 'opens case' handoffs that often deserve a CSM-CASE-MGMT consumer DMDO.

  - id: B2-CAPABILITY-SHAPE
    summary: Decide whether to add CSM-specific or new cross-cutting capabilities.
    question: >-
      CSM has 3 cross-cutting capabilities (AI-TRIAGE, SLA-MGMT, KNOWLEDGE-MGMT) and zero
      domain-specific. Add domain-prefixed, accept cross-cutting, or add new cross-cutting?
    options:
      - "(a) add CSM-CASE-MGMT-ROUTING, CSM-OMNICHANNEL-ENGAGEMENT, CSM-AGENT-ASSIST"
      - "(b) accept cross-cutting capabilities as the full surface"
      - "(c) introduce cross-cutting OMNICHANNEL-ENGAGEMENT and CSAT-NPS"
    why: >-
      Choice drives the contributor/consumer business_function_domains set and the M6
      coverage profile across CSM modules; also gates B1A-PHASE-P persona reach.

  - id: B2-APQC-SCOPE
    summary: Decide disposition of the 4 residual untagged CSM cross-domain handoffs.
    question: >-
      17 clean PCF matches were tagged 2026-06-06 (coverage 59/63 = 94%). 4 rows have no
      clean PCF match. Tag them with a forced anchor, or defer to Discover?
    residual_no_match:
      - {handoff_id: 270, shape: "MDM customer_golden_record.created (master-data sync, not customer service)"}
      - {handoff_id: 996, shape: "PROD-MGMT beta_program.launched (product notification)"}
      - {handoff_id: 1007, shape: "PROD-MGMT product_metric.threshold_breached (ops signal)"}
      - {handoff_id: 1055, shape: "INV-MGMT inv_inventory_lot.expiry_warning (not a recall)"}
    options:
      - "(a) defer the 4 residual to Discover (recommended; no clean PCF L3/L4 fit)"
      - "(b) force a generic anchor (process 6 Manage Customer Service) on all 4"

  - id: B2-CSM-KNOWLEDGE-MASTER
    summary: Decide whether CSM-KNOWLEDGE (114) needs a domain-owned master, demotion to starter, or accept as-is.
    question: >-
      CSM-KNOWLEDGE holds knowledge_articles as contributor+required and customer_cases as
      consumer+optional. No DMDO with role=master. Rule #14 allows module-without-master only
      for leadership-tier domains; CSM is not leadership-tier.
    options:
      - "(a) accept as-is and document the rationale (editorial/audience-filtered view onto ITSM-mastered knowledge_articles)"
      - "(b) demote CSM-KNOWLEDGE to module_kind=starter (lossy: KNOWLEDGE-MGMT capability loses sole realizing module)"
      - "(c) introduce customer_knowledge_articles as a CSM-specific master"
    note: "Blocks B1A-PHASE-P persona authoring (demotion reshapes persona reach)."

  - id: B2-PATTERN-FLAGS
    summary: Confirm pattern-flag re-evaluation outcomes on 104, 105, 111 (drives B1B-S2 PATCH).
    question: Confirm proposed flips before B1B-S2 PATCH lands (each is an overwrite on a non-empty boolean).
    options:
      - "104 has_single_approver = true (activation/upgrade signoff)"
      - "105 has_submit_lock = true (responses immutable once captured)"
      - "111 all three flags remain false (append-only event log)"
    why: >-
      Reasoning is plausible but not certain; Rule #12 prohibits auto-populating notes to
      explain flips, so the user confirms directly.

  - id: B2-PAIRWISE-SCHEDULING
    summary: Decide whether to schedule full pairwise reconciliation passes against SUB-MGMT and CRM.
    question: >-
      SUB-MGMT (edge weight 12) and CRM (edge weight 6) got full 5-section diffs inline in
      the 2026-05-30 audit. Schedule them as separate Validate runs on those domains?
    options:
      - "(a) accept inline summaries, no further passes"
      - "(b) schedule full Validate runs on SUB-MGMT and CRM with audit appends on those files"

  - id: B2-CATALOG-UX
    summary: Catalog UX backfill (domain + modules).
    status: resolved_by_rule
    resolution: >-
      RESOLVED 2026-06-06 by Rule #20 (in-record review). Current Rule #20 + A4/M8 fix text
      direct authoring buyer-voice copy straight into empty fields; record_status carries the
      review signal. The old surface-then-write gate is retired. catalog_tagline +
      catalog_description written on domain 30 and modules 112/113/114 at record_status='new'.
      User reviews in-record / in the catalog UI.

