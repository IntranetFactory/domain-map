b2:
  - id: B2-CUSTOMERS-AMBIGUITY
    summary: Decide source/target_module_id rule for CSM handoffs keyed on customers (consumed in two modules, not mastered).
    question: >-
      Outbound 70, 224, 233, 234, 486, 488 and inbound 209, 270 tie on customers (DO 97).
      What should source/target_module_id be?
    options:
      - "(a) leave NULL, accept no clean source attribution for customer-keyed CSM outbound"
      - "(b) pick CSM-CASE-MGMT as canonical source by convention (case-driven health signals)"
      - "(c) introduce customer_health_signals as a new CSM-CASE-MGMT-mastered data_object and re-key the trigger events; reshapes B3-OMNICHANNEL-SESSIONS and B1B-B1"
    recommended: "(b)"
    phase0: >-
      REVERSED from (c) by Phase 0 (2026-06-08, D2). No flagship support desk (Zendesk,
      Salesforce Service Cloud, ServiceNow, Freshdesk, Intercom) masters a customer
      health-score / churn-risk record; that is Customer-Success-platform territory
      (Gainsight, Totango, ChurnZero). A CSM-mastered customer_health_signals is over-modeling.
      Attribute the customer-keyed outbound to CSM-CASE-MGMT (case-derived signals); the
      CSAT response CSM already masters is the real signal it contributes.
    why: >-
      Deterministic B10b derivation breaks on tie; CSM does not master customers (CRM does).
      Option (c) was prior pick on catalog-coherence grounds, but vendor reality rules it out.

  - id: B2-CROSS-DOMAIN-INTEGRITY
    summary: Decide per-cluster B5 fix for handoffs whose payload CSM declares no DMDO on.
    question: >-
      49 handoff rows reference payloads CSM has no consumer DMDO for. Author the missing
      consumer DMDOs on the relevant CSM module, move targets to other domains, or drop?
    options:
      - "(a) author consumer DMDOs on CSM-CASE-MGMT for crm_opportunities, support_sessions, product_features/releases/beta_programs/feedback/metrics, vertical-industry master payloads"
      - "(b) move targets to CRM-internal or ACCT-PLAN where applicable"
      - "(c) drop the handoffs with no real CSM-side workflow effect"
    recommended: "(a) per cluster"
    phase0: >-
      RE-GROUNDED (not reversed) by Phase 0 (2026-06-08, D4). crm_opportunities (Salesforce
      converts closed-won into onboarding cases) and support_sessions (Salesforce Agentforce
      Contact Center / Zendesk voice escalate a session into a case with transcript) are
      genuine consume-subjects -> author consumer DMDOs on CSM-CASE-MGMT. Product-feedback
      payloads (features/releases/beta_programs/feedback/metrics) are NOT a CSM master in any
      flagship; they land as a case comment/tag at most -> consume thinly or drop, do not
      author heavyweight DMDOs. Vertical 'opens case' rows are all genuine case-creation
      sources -> CSM-CASE-MGMT consumer.
    why: >-
      Each cluster differs. crm_opportunities and support_sessions are common CSM workflow
      subjects; PROD-MGMT payloads are mostly product-feedback signals; vertical rows are
      industry-specific 'opens case' handoffs that often deserve a CSM-CASE-MGMT consumer DMDO.

  - id: B2-CAPABILITY-SHAPE
    summary: Decide whether to add CSM-specific or new cross-cutting capabilities.
    question: >-
      CSM has 4 cross-cutting capabilities (AI-TRIAGE, SLA-MGMT, KNOWLEDGE-MGMT, CUSTOMER-360)
      and zero domain-specific. Add domain-prefixed, accept cross-cutting, or add new cross-cutting?
    options:
      - "(a) add CSM-CASE-MGMT-ROUTING, CSM-OMNICHANNEL-ENGAGEMENT, CSM-AGENT-ASSIST"
      - "(b) accept cross-cutting capabilities as the full surface"
      - "(c) introduce cross-cutting OMNICHANNEL-ENGAGEMENT and CSAT-NPS"
    recommended: "(a)"
    phase0: >-
      RE-GROUNDED by Phase 0 (2026-06-08, D3). All 5 flagships market case routing/assignment,
      omnichannel engagement, agent assist (Zendesk Copilot, Salesforce Agentforce, ServiceNow
      Now Assist, Freddy, Fin), CSAT/NPS, and self-service knowledge as headline capabilities
      (SLA management in 4 of 5). Routing/omnichannel/agent-assist are unrepresented at the
      capability layer today -> add them. Nuance: OMNICHANNEL-ENGAGEMENT and CSAT-NPS plausibly
      span CCAAS/CRM/Marketing, so they are good cross-cutting candidates (spirit of c) while
      case-routing and agent-assist stay CSM-specific. Live drift: CUSTOMER-360 is now a 4th
      cross-cutting capability on this domain (was 3 at prior audit).
    why: >-
      Choice drives the contributor/consumer business_function_domains set and the M6
      coverage profile across CSM modules; also gates B1A-PHASE-P persona reach.

  - id: B2-APQC-SCOPE
    summary: Decide disposition of the 4 residual untagged CSM cross-domain handoffs.
    question: >-
      17 clean PCF matches were tagged 2026-06-06 (coverage 59/63 = 94%). 4 rows have no
      clean PCF match. Tag them with a forced anchor, or defer to Discover?
    residual_no_match:
      - {handoff_id: 270, shape: "MDM customer_golden_record.created (master-data sync, not customer service)"}
      - {handoff_id: 996, shape: "PROD-MGMT beta_program.launched (product notification)"}
      - {handoff_id: 1007, shape: "PROD-MGMT product_metric.threshold_breached (ops signal)"}
      - {handoff_id: 1055, shape: "INV-MGMT inv_inventory_lot.expiry_warning (not a recall)"}
    options:
      - "(a) defer the 4 residual to Discover (recommended; no clean PCF L3/L4 fit)"
      - "(b) force a generic anchor (process 6 Manage Customer Service) on all 4"

  - id: B2-CSM-KNOWLEDGE-MASTER
    summary: Decide whether CSM-KNOWLEDGE (114) needs a domain-owned master, demotion to starter, or accept as-is.
    question: >-
      CSM-KNOWLEDGE holds knowledge_articles as contributor+required and customer_cases as
      consumer+optional. No DMDO with role=master. Rule #14 allows module-without-master only
      for leadership-tier domains; CSM is not leadership-tier.
    options:
      - "(a) accept as-is and document the rationale (editorial/audience-filtered view onto ITSM-mastered knowledge_articles)"
      - "(b) demote CSM-KNOWLEDGE to module_kind=starter (lossy: KNOWLEDGE-MGMT capability loses sole realizing module)"
      - "(c) give CSM-KNOWLEDGE its own customer-facing knowledge master"
    recommended: "(c)"
    phase0: >-
      REVERSED from (a) by Phase 0 (2026-06-08, D1). 4 of 5 flagships master their own
      customer-facing KB: Zendesk Guide, Salesforce Knowledge (own KnowledgeArticleVersion
      object, not a borrowed IT table), Freshdesk Solutions, Intercom Articles; only ServiceNow
      CSM reuses the platform-wide knowledge table shared with ITSM. 'Editorial view onto the
      IT KB' is a ServiceNow-only artifact, not the market shape. Implementation nuance: prefer
      an audience-filtered embedded_master of the existing knowledge_articles (id 51) over a
      brand-new duplicate entity - it gives 114 a deployable master anchor, honors the catalog
      audience-filtering rule (Salesforce/ServiceNow validate a single audience-filtered Knowledge
      object), and resolves the two knowledge_articles M9 rows in B1A-SELF-CONTAIN.
    note: "Blocks B1A-PHASE-P persona authoring (demotion reshapes persona reach). Resolving (c) also disposes of the knowledge_articles rows in B1A-SELF-CONTAIN (q9)."

