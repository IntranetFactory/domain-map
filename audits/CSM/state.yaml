#   B1B-S3           : 4 generic-synonym aliases (106 service contract / support entitlement
#                      contract; 111 case timeline event / interaction event)
#   B1B-S5           : business_function_domains contributor (IT Operations 27) + consumer
#                      (Customer Success 23)

