b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."
  - id: B1A-PHASE-P
    summary: "Multi-module (3 modules) with 0 personas post-Plan-3 (E1 fail): author the persona / RACI layer."
    status: deferred
    finding: "3 domain_modules and 0 domain_roles reaching this domain via role_modules. E1 fires on this multi-module domain."
    defer_reason: >-
      Persona authoring is entangled with the OPEN B2-CSM-KNOWLEDGE-MASTER decision
      (CSM-KNOWLEDGE may demote to starter, which reshapes persona reach) and
      B2-CAPABILITY-SHAPE. Author after those resolve.
    candidate_personas: [SUPPORT-AGENT, SUPPORT-TEAM-LEAD, ENTITLEMENT-MANAGER]

  - id: B1A-SELF-CONTAIN
    summary: "6 contributor/required-consumer rows break module self-containment (M9): embed or relax each."
    status: surfaced_destructive
    finding: >-
      6 domain_module_data_objects rows on CSM modules are role=contributor or
      role=consumer+necessity=required, pointing at an entity mastered by another
      domain and not embedded_master here. Converting role->embedded_master or
      necessity->optional rewrites existing rows (destructive); awaiting approval.
    extra_m9_shapes:
      - {entity: customer_subscriptions, module: CSM-ENTITLEMENTS, role: consumer, master_domain: SUB-MGMT, recommended_fix: "necessity->optional (presence-conditional)"}
      - {entity: customers, module: CSM-CASE-MGMT, role: consumer, master_domain: CRM, recommended_fix: "embedded_master (carry local shell)"}
      - {entity: customers, module: CSM-ENTITLEMENTS, role: consumer, master_domain: CRM, recommended_fix: "embedded_master (carry local shell)"}
      - {entity: knowledge_articles, module: CSM-CASE-MGMT, role: contributor, master_domain: ITSM, recommended_fix: "necessity->optional"}
      - {entity: knowledge_articles, module: CSM-KNOWLEDGE, role: contributor, master_domain: ITSM, recommended_fix: "embedded_master (audience-filtered local view) or necessity->optional"}
      - {entity: legal_contracts, module: CSM-ENTITLEMENTS, role: contributor, master_domain: CLM, recommended_fix: "necessity->optional"}

