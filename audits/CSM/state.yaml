#                               shares ITSM's). CSM-KNOWLEDGE should master its own KB.
#     B2-CUSTOMERS-AMBIGUITY  : c -> b (no support desk masters a health-score; that is CS-platform
#                               territory). customer_health_signals is over-modeling; attribute to
#                               CSM-CASE-MGMT by convention.
#   B2-CAPABILITY-SHAPE (a) and B2-CROSS-DOMAIN-INTEGRITY (a per-cluster) re-grounded, not reversed.

# EXECUTED 2026-06-06 (state-driven), dropped from worklist:
#   B1A-ENTITY-TYPE  : 103 operational_workflow, 104 catalog, 105 + 111 operational_record
#   B1A-H1           : 17 net-new handoff_processes rows; APQC coverage 59/63 (94%);
#                      4 residual deferred-to-Discover (270, 996, 1007, 1055) -> B2-APQC-SCOPE
