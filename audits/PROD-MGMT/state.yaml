    summary: "5 untagged cross-domain handoffs have no clean L4 PCF match: defer to a Discover/PCF-research pass"
    finding: "2026-06-07 live recheck: of the 16 handoffs the prior snapshot listed as untagged, 10 are already tagged with agent_curated handoff_processes rows (813, 997, 1001, 1003, 1004, 1006, 1008, 1012, 1323, 1324). 1 more (1002) was tagged this pass with a clean L4 match (PCF 1350, Maintain customer/product master files, external_id 10794). The remaining 5 have no clean L4 PCF match on live and cannot be machine-tagged confidently."
    action: "Run a Discover/PCF-research pass (or eyeball-confirm a PCF id) for the 5 residual handoffs, then INSERT agent_curated handoff_processes rows. Do NOT force a loose L3 / medium match."
    affected_handoffs:
      - {handoff_id: 996, direction: outbound, source_domain: PROD-MGMT, target_domain: CSM, trigger_event: "beta_program.launched", payload: "beta_programs", note: "proposed 'pilot production' returns no PCF on live"}
      - {handoff_id: 1005, direction: outbound, source_domain: PROD-MGMT, target_domain: CRM, trigger_event: "product_line.launched", payload: "product_lines", note: "proposed 'sales account relationships' returns no PCF on live"}
