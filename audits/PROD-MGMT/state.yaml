    action: "PATCH 6 trigger_events rows. Proposed categories: 1139 signal (feedback collection is observational with no state transition on the program itself), 1140 lifecycle (program closes = terminal), 1141 lifecycle (item created), 1143 lifecycle (request created), 1150 lifecycle (line retires = terminal), 1152 signal (metric refresh is data observation)."
    affected_events:
      - {id: 1139, event_name: "beta_program.feedback_collected", current_category: "", proposed_category: "signal"}
      - {id: 1140, event_name: "beta_program.closed", current_category: "", proposed_category: "lifecycle"}
      - {id: 1141, event_name: "customer_feedback_item.received", current_category: "", proposed_category: "lifecycle"}
      - {id: 1143, event_name: "feature_request.submitted", current_category: "", proposed_category: "lifecycle"}
      - {id: 1150, event_name: "product_line.retired", current_category: "", proposed_category: "lifecycle"}
      - {id: 1152, event_name: "product_metric.refreshed", current_category: "", proposed_category: "signal"}

  - id: B1A-INTRA-DOMAIN-HANDOFFS
    summary: "Author 1 trigger_event (feature_request.accepted) + 3 intra-domain DISCOVERY <-> ROADMAP-DELIVERY handoffs"
    finding: "B9b hard-fail carry-over. The DISCOVERY (130) -> ROADMAP-DELIVERY (131) pipeline is the single most important workflow in PROD-MGMT (feedback / requests triaged in DISCOVERY, accepted ones flow into the roadmap and become product_features in ROADMAP-DELIVERY) and the catalog has zero intra-domain handoff rows wiring it. State 4 of feature_requests (406) is 'accepted' with requires_permission=true but no event row currently exists for that transition."
    action: "INSERT 1 trigger_events row (feature_request.accepted, data_object_id=406, event_category='state_change'). INSERT 3 handoffs rows with source_domain_id=target_domain_id=101, integration_pattern='lifecycle_progression', friction_level='low': (a) 130 -> 131 on feature_request.accepted (new event), payload product_features (403); (b) 130 -> 131 on customer_feedback_item.linked (1142), payload product_features (403) or product_roadmaps (405); (c) 131 -> 130 on product_feature.released (1146), payload feature_requests (406)."
    affected_modules: [130, 131]
    affected_masters:
      - {data_object_id: 406, name: "feature_requests", target_module_id: 130, workflow: "accepted state has requires_permission but no trigger_event"}
      - {data_object_id: 403, name: "product_features", target_module_id: 131, workflow: "draft created from accepted feature_request"}
      - {data_object_id: 407, name: "customer_feedback_items", target_module_id: 130, workflow: "linked feedback triggers roadmap update downstream"}

  - id: B1A-PHASE-E-BOOTSTRAP
    summary: "Phase-E RBAC bootstrap: 4 roles + 6 role_modules + 6 baseline permissions + 14 workflow-gate permissions + permission_hierarchy edges"
    finding: "E1-E5 hard-fail carry-over. Zero roles, zero role_modules, zero permissions on modules 130 / 131, zero permission_hierarchy edges. 14 lifecycle states across the 8 masters carry requires_permission=true (product_lines active/sunset/retired, product_features released/deprecated, product_releases shipped/rolled_back/cancelled, product_roadmaps published, feature_requests accepted/rejected, beta_programs active/closed/cancelled). Under Rule #14 each requires_permission state materializes one workflow-gate permission scoped to the realizing module."
    action: "Author Phase-E loader (ts on bun, per Rule #4b). 4 roles: PRODUCT-MANAGER, HEAD-OF-PRODUCT, PRODUCT-OPS-ANALYST, ENGINEERING-LEAD. 6 role_modules (3 pairs, one per role on each of 130 / 131; HEAD-OF-PRODUCT admin on both, PRODUCT-MANAGER admin/manage, PRODUCT-OPS-ANALYST manage/read, ENGINEERING-LEAD read/manage). 6 baseline permissions (3 per module: PM-DISCOVERY:read, PM-DISCOVERY:manage, PM-DISCOVERY:admin and same for PM-ROADMAP-DELIVERY). 14 workflow-gate permissions per the lifecycle states + permission_hierarchy edges (admin > manage > workflow-gate > read per the standard derivation)."
    affected_modules: [130, 131]
    affected_masters:
      - {data_object_id: 402, name: "product_lines", target_module_id: 131, workflow: "active/sunset/retired"}
      - {data_object_id: 403, name: "product_features", target_module_id: 131, workflow: "released/deprecated"}
      - {data_object_id: 404, name: "product_releases", target_module_id: 131, workflow: "shipped/rolled_back/cancelled"}
      - {data_object_id: 405, name: "product_roadmaps", target_module_id: 131, workflow: "published"}
      - {data_object_id: 406, name: "feature_requests", target_module_id: 130, workflow: "accepted/rejected"}
      - {data_object_id: 409, name: "beta_programs", target_module_id: 131, workflow: "active/closed/cancelled"}

