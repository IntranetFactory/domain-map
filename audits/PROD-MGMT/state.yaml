b2:
  - id: B2-31-1
    summary: "Should the 6 PMM-flavored capabilities split off into a new PMM domain?"
    question: "Capabilities LAUNCH-PLANNING (119), GTM-LAUNCH-COORDINATION (120), MESSAGING-AND-POSITIONING (121), SALES-ENABLEMENT-CONTENT (122), COMPETITIVE-INTELLIGENCE (123), WIN-LOSS-INTERVIEWS (124) are attached to PROD-MGMT but no PROD-MGMT module hosts entities/skills/solutions covering them. Per Rule #2 Product Marketing Management passes the point-solution market test (Klue, Crayon, Highspot, Showpad, Seismic, Aha! Create, Pendo Adopt). Promote PMM as a new domain, or keep these under PROD-MGMT?"
    options:
      - "(a) Promote PMM as new domain candidate, queue to _missing-domains.md, move 6 capability_domains rows on promotion."
      - "(b) Leave 6 capabilities on PROD-MGMT, build a new PM-MARKETING module."
      - "(c) Split per-capability between PMM and GTM-PLAN (104)."
    why: "Editorial market-boundary judgment, gates Bucket 3 item competitor_intelligence_records."

  - id: B2-31-2
    summary: "Rule #15 violation on data_objects.notes for product_metrics (408) - approve or revert?"
    question: "product_metrics (408) data_objects.notes is populated with 'Config-shaped; no workflow. Time-series measurement records (adoption, usage, quality, business KPIs) linked to features and releases. Status is derivable from threshold breaches via computed_fields; no per-state permissions needed.' Rule #12's config-shape exemption license for data_objects.notes is RESCINDED per Rule #15 (the classification is now the entity_type column, set to 'computed' on 2026-06-07). Was this wording user-approved at original load?"
    options:
      - "(a) Confirm user-approved at load, leave wording in place."
      - "(b) Confirm auto-populated, PATCH notes to '' and append Rule #15 incident entry to skill-changelog.md."
    note: "DESTRUCTIVE (overwrite of a non-empty notes value) - surfaced, not executed. entity_type='computed' was set this pass, so the config-shape signal now lives in the typed column regardless of the notes decision."

  - id: B2-31-3
    summary: "B4 pattern-flag re-evaluation across 4 PROD-MGMT masters"
    question: "Which of the following pattern flags should be set true? (a) feature_requests.has_personal_content (submitter contact + verbatim quotes carry PII), (b) product_releases.has_submit_lock (state 3 'shipped' is terminal with requires_permission, no silent post-ship mutation), (c) product_roadmaps.has_submit_lock (state 2 'published' is an external-facing commitment), (d) product_lines.has_submit_lock (likely false, long-lived strategic asset)."
    options:
      - "Per-flag yes/no decision."
    why: "Workflow-shape judgment; Rule #12 + Rule #15 mean auto-flipping flags without surfacing them violates the notes-pollution backstop. All four masters are entity_type='operational_workflow' as of 2026-06-07, so the flags are in scope."

  - id: B2-31-4
    summary: "roadmap_items (275) orphan: SPM should master, or DELETE + recast handoff payload?"
    question: "roadmap_items (275) is a consumer DMDO on PM-ROADMAP-DELIVERY (131) but has zero master rows catalog-wide. SPM trigger_event 218 (roadmap_item.released) emits handoff 243 with this payload. Two competing models: (a) SPM owns a portfolio-level roadmap_items master in its portfolio-roadmap module, PROD-MGMT consumes; (b) roadmap_items is a redundant alias for product_roadmaps (405), DELETE the orphan consumer + recast handoff 243 payload."
    options:
      - "(a) Schedule SPM b1 audit, let SPM master roadmap_items."
      - "(b) DELETE the (131, 275) consumer DMDO + PATCH handoff 243 data_object_id from 275 to 405."
    note: "Option (b) is DESTRUCTIVE (DELETE + payload re-attribution) - surfaced, not executed."

  - id: B2-31-5
    summary: "F5 Semantius score gap: notify_team (914) external on skill 202 vs notify_person (913) platform on skill 201"
    question: "notify_team (914) has coverage_tier='external' but notify_person (913) has coverage_tier='platform'. Both are side-effect notification primitives; the divergence looks like a load-time inconsistency. Promote notify_team to platform, replace with notify_person, or leave at 95% Semantius score?"
    options:
      - "(a) Replace notify_team with notify_person on skill 202 (drop the divergent tool, reach 100% platform)."
      - "(b) Promote notify_team to coverage_tier='platform' (keep the naming distinction)."
      - "(c) Leave as-is and accept the 95% Semantius score."
    note: "Options (a) and (b) are DESTRUCTIVE (overwrite/replace existing rows) - surfaced, not executed. Note: skill_tools is being retired per Plan 3 / per-domain-skill restoration; confirm whether this even survives the skill-grain migration before acting."

  - id: B2-31-6
    summary: "Rule #10 users edges: approve 8 default platform-builtin verbs?"
    question: "All 8 PROD-MGMT masters reference the users built-in (748) for ownership / submission / assignment but zero data_object_relationships rows wire the edges. Rule #10 mandates the edges; per-row verb is editorial. Default proposal: product_lines.owned_by, product_features.assigned_to, product_releases.owned_by, product_roadmaps.owned_by, feature_requests.submitted_by, customer_feedback_items.submitted_by, product_metrics.recorded_by, beta_programs.owned_by."
    options:
      - "(a) Approve 8 default edges with the proposed verbs."
      - "(b) Specify per-row verb overrides (list which)."
    note: "Additive once the verb is chosen, but the per-row verb is an editorial pick the agent cannot make alone - surfaced for the verb decision."

  - id: B2-31-7
    summary: "Rule #15 pollution on domain_data_objects.notes across 9 PROD-MGMT rows - revert + log incident?"
    question: "9 PROD-MGMT domain_data_objects.notes rows carry legacy load prose: data_object_id 402-409 carry 'Phase-B Lite batch 1 [em-dash] agent-derived; trigger_events + handoffs deferred to follow-up audit pass' (system-mutation history), data_object_id 249 (value_streams) carries 'Product orgs build delivery value streams (DevOps / Agile lens) [em-dash] same artifact, different vantage point.' (descriptive prose restating role + necessity). All contain em-dashes (project rule forbidden). Rule #15 audit obligation: revert polluting writes and append Rule #15 incident entry to skill-changelog.md."
    options:
      - "(a) PATCH 9 domain_data_objects.notes to '' and append Rule #15 incident entry to skill-changelog.md."
      - "(b) Approve current wording (would require explicit Rule #15 carve-out justification per row)."
    why: "Same-class violation triggered Rule #15's audit obligation in the prior skill incident log; this audit found it on legacy rows the 2026-05-30 audit did not flag."
    note: "DESTRUCTIVE (overwrite of non-empty notes values) - surfaced, not executed. Also: domain_data_objects is a deprecated rollup being retired (2026-06-02 changelog); for a modularized domain these rows are slated for deletion anyway, which may moot the notes question."
  - id: B2-B9D-OWN-956
    summary: "Product Management: name an owner for \"Provide customer feedback to product management on customer service experience\" (no one is responsible for it today)"
    question: |
      Customer Service Management hands work to Product Management, but Product Management has no one assigned to provide customer feedback to product management on customer service experience, so that step currently has nobody responsible for it. Who should own it?
    options:
      - "The a named owner runs it and approves it."
      - "The a named owner runs it and the Head of Product approves."
      - "Leave it unassigned for now."
    why: |
      Product Management already assigns the a named owner to work of this kind, so (a) fills this gap the same way and gives the work a named owner. Surfaced as q-PROD-MGMT.md q13.
    extra_b9d_added: "2026-06-13"

  - id: B2-B9D-MISTAG-REPOINT
    summary: "DESTRUCTIVE (surfaced): B9d found 6 PROD-MGMT-authored mis-tagged handoff_processes rows that should be re-pointed or deleted"
    question: "B9d bidirectional resolution (2026-06-13) found 6 cross-domain handoffs where PROD-MGMT (the sender) tagged the payload with a PCF process whose category does not fit the work; the carried entity is already realized under a product-development (category 2) process. Re-point each handoff_processes row to the realized code, or delete the tag? Findings: (1) #997, #1004 (beta_programs, product_features -> CDP) tagged 2.3 'Develop products and services', realized under 2.1.2.1; (2) #1003 (product_features -> CSM) tagged 6.2.2 'Manage customer service problems', realized under 2.1.2.2; (3) #1006 (product_lines -> FIN) tagged 9.1.3 'Perform cost accounting', realized under 2.1.2.2; (4) #999 (feature_requests -> WORK-MGMT) tagged 1.4.2.3 'Prioritize and manage incoming feedback', realized under 2.1.1.3; (5) #1000 (feature_requests -> CRM) tagged 6.5.3.5 'Provide feedback and insights to appropriate teams', realized under 2.1.1.3; (6) #1002 (product_features -> CRM) tagged 9.2.2.1 'Maintain customer/product master files', realized under 2.1.2.2."
    options:
      - "(a) Re-point each handoff_processes row to the realized PCF code listed above (record_status='new')."
      - "(b) Delete the mis-tagged handoff_processes rows and re-tag in a Discover pass."
      - "(c) Per-row decision (specify which to re-point vs delete)."
    note: "DESTRUCTIVE (overwrite of process_id or DELETE) - surfaced, not executed. Both re-point and delete edit/remove existing rows. Separately, ROLL-UP #1324 (okr_objectives, WORK-MGMT->PROD-MGMT) is tagged 1.2.6.3 but realized at parent 1.2.6: that re-point is owned by WORK-MGMT (the source), not PROD-MGMT, so it is surfaced on WORK-MGMT's side."
    extra_b9d_added: "2026-06-13"

  - id: B2-B9D-UNOWNED-DEPS
    summary: "Report-only: 2 inbound payloads carry data_objects with no master row anywhere in the catalog"
    question: "B9d found 2 inbound handoffs whose carried entity has no master row catalog-wide: #775 (pull_requests, VSDP->PROD-MGMT, tagged 8.5.4) and #781 (requirements_to_test_traceability, TEST-MGMT->PROD-MGMT, tagged 13.3.2). The carried entities are unowned dependencies on the SENDER side (VSDP, TEST-MGMT), not PROD-MGMT's fix. Surface for those domains' audits; do not drop."
    options:
      - "(a) Schedule VSDP b1 audit to master/declare pull_requests."
      - "(b) Schedule TEST-MGMT b1 audit to master/declare requirements_to_test_traceability."
    note: "Report-only; the missing master belongs to the sender domain, not PROD-MGMT."
    extra_b9d_added: "2026-06-13"

b3:
