    candidate: "product_opportunities"
    rationale: "Opportunity-solution-tree pattern (Teresa Torres) is a first-class object distinct from feature_requests. An opportunity is a customer problem framing; a feature request is a proposed solution. Current catalog conflates them inside feature_requests."
    vendor_evidence:
      - {vendor: "Productboard", evidence: "1st_class"}
      - {vendor: "Aha! Roadmaps", evidence: "1st_class"}
      - {vendor: "Jira Product Discovery", evidence: "1st_class"}
    proposed_module: "PM-DISCOVERY"

