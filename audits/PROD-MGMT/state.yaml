  - id: B1A-APQC-APPROVAL-PASS
    summary: "DESTRUCTIVE (surfaced): 11 agent_curated handoff_processes rows still at record_status='new' need a reviewer approval pass"
    finding: "H1 catalog-quality headline (record_status='approved' count). After this pass, 12 of the cross-domain handoffs carry agent_curated tags; 5 are already 'approved' (1008, 1012, 1323, 1324, plus pre-existing approvals) and the rest sit at 'new'. Flipping record_status to 'approved' is a Rule #1 / destructive action the agent never performs."
