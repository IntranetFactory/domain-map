b2:
  - id: B2-M7-DEMOTION
    summary: "Who owns canonical mastery of capital_calls (367) and fund_distributions (368)?"
    question: "FUND-ADMIN modules 14 and 15 already master both data_objects; RE-INVEST also masters them at the legacy domain_data_objects level. Catalog-wide single-master invariant requires one canonical owner."
    options:
      - "(a) FUND-ADMIN owns; RE-INVEST demotes to embedded_master once RE-INVEST modules exist. Recommended on coherence grounds."
      - "(b) Industry split: rename to re_capital_calls and pe_capital_calls; both keep master. Heavy lift."
      - "(c) Consolidate RE-INVEST into FUND-ADMIN as a vertical. Deepest change."
    why: "Decision gates the entire M-band (M1, M4, M7a, M7b), B6, B12 attachments, F1/F7, and all BOUNDARY backfills. Module shape depends on which entities RE-INVEST canonically masters."

  - id: B2-FUNDS-RENAME
    summary: "investment_funds (727) vs funds (755) consolidation direction."
    question: "Both are domain_owned, model the same concept; investment_funds has zero DMDO rows."
    options:
      - "(a) Merge into funds: DELETE 727, retarget RE-INVEST rows to 755."
      - "(b) Keep investment_funds prefixed re_investment_funds for the RE subclass."
      - "(c) Keep both as-is (anti-pattern)."
    why: "Resolution flows from B2-M7-DEMOTION (option (a) on M7 implies merge into funds; option (b) implies rename)."

  - id: B2-LIMITED-PARTNERS-OWNER
    summary: "limited_partners (728) ownership: RE-INVEST or FUND-ADMIN-LP-COMMITMENTS (module 13)?"
    question: "FUND-ADMIN has a dedicated LP-COMMITMENTS module. RE-INVEST currently masters limited_partners at the DDO level. Does the RE-specific LP onboarding flow (accreditation, ERISA, RE syndicate quirks) warrant separate mastery?"
    options:
      - "(a) Move to FUND-ADMIN-LP-COMMITMENTS as master; RE-INVEST consumes."
      - "(b) Keep on RE-INVEST as RE-specific master."
      - "(c) Industry split similar to capital_calls."
    why: "Flows from B2-M7-DEMOTION root."

  - id: B2-FEES-OWNER
    summary: "asset_management_fees (729) ownership: RE-specific or generic GP-LP mechanic?"
    question: "Asset-management-fee accounting is a generic GP-LP mechanic, not RE-specific. Strong fit on FUND-ADMIN."
    options:
      - "(a) Move mastery to FUND-ADMIN."
      - "(b) Keep on RE-INVEST as RE-specific fee schedule (acquisition fees, AUM-based fees with RE quirks)."
      - "(c) Rename to fee_schedules and surface the cross-industry meaning."
    why: "Flows from B2-M7-DEMOTION root."

  - id: B2-PATTERN-FLAGS
    summary: "Per-master pattern-flag flips per Rule #12 + Rule #15."
    question: "Audit proposes 5 flag flips across 4 masters. Each TRUE flag requires explicit per-row user approval. No notes auto-populated."
    options:
      - "Per master, approve / reject / rewrite: capital_calls.has_single_approver=true (GP signs)."
      - "fund_distributions.has_submit_lock=true (declared waterfall immutable)."
      - "fund_distributions.has_single_approver=true (CFO approves)."
      - "limited_partners.has_personal_content=true (LP PII, accreditation)."
      - "investment_funds.has_single_approver=true (fund formation)."
    why: "Defaults stand on the other masters. Independent of M7 gate; can be answered standalone but PATCHes only land after B1-M1 cures so module-level system skills can derive permissions correctly."

  - id: B2-CATALOG-UX
    summary: "Approve catalog_tagline and catalog_description for RE-INVEST per Rule #20."
    question: "Both fields are empty. The 2026-05-30 audit drafted candidate wording in Bucket 2 #6; user must approve the exact text before any PATCH."
    options:
      - "(a) Approve the 2026-05-30 drafts verbatim."
      - "(b) Rewrite the wording (provide exact text)."
      - "(c) Hold; leave both empty."
    why: "Rule #20 forbids auto-write; the agent cannot proceed without exact user-approved wording."

  - id: B2-LIFECYCLE-EXEMPT
    summary: "Lifecycle exemption decision for property_valuations and asset_management_fees."
    question: "Both are config-shape candidates per Rule #12 exemption. Approve exemption from full lifecycle authoring, or author minimal state machines?"
    options:
      - "(a) Exempt both; no lifecycle states authored."
      - "(b) Author minimal 3-state machine on property_valuations (refresh_scheduled to calculated to published), exempt asset_management_fees."
      - "(c) Author minimal machines on both."
    why: "Rule #12 exemption is user-decided. Rule #15 forbids auto-populating notes for the justification."

  - id: B2-H1-301-DOUBLE
    summary: "Handoff 301 (rent_payment.received) carries two competing agent_curated PCF tags."
    question: "handoff_processes rows 759 (PCF 1356 Receive/Deposit customer payments, 10800) and 768 (PCF 1351 Generate customer billing data, 10795) both tag handoff 301 as agent_curated, record_status=new. Which survives at approved?"
    options:
      - "(a) Approve 759, reject 768. Closer L4 match to rent_payment.received."
      - "(b) Approve 768, reject 759. Reads as upstream billing activity."
      - "(c) Approve both; legitimate dual classification."
    why: "Independent of all other items. Cannot ship until user picks."

  - id: B2-H1-857-DOUBLE
    summary: "Handoff 857 (property.updated) carries a strategic discovery_substring tag and an operational agent_curated tag."
    question: "handoff_processes rows 169 (discovery_substring, PCF 343 Develop property strategy and long term vision, L3 strategic) and 760 (agent_curated, PCF 1511 Confirm alignment of property requirements with business strategy, L4 operational) both tag handoff 857. Which survives at approved?"
    options:
      - "(a) Approve 760, reject 169. L4 operational is the better match for property.updated."
      - "(b) Approve 169, reject 760. Strategic framing intended."
      - "(c) Approve both; legitimate dual classification."
    why: "Independent of all other items. Recommend (a)."

b3:
  - id: B3-RE-ACQ-PIPELINE
    candidate: re_acquisition_pipeline_deals
    rationale: "ARGUS Enterprise, Yardi Investment Manager, and Juniper Square all model the acquisition pipeline as a first-class entity with stages (sourced, underwriting, LOI, due_diligence, closed). RE-INVEST has investment_properties only with no upstream pipeline."
    vendor_evidence:
      - {vendor: "ARGUS Enterprise", evidence: 1st_class}
      - {vendor: "Yardi Investment Management", evidence: 1st_class}
      - {vendor: "Juniper Square", evidence: 1st_class}
    proposed_module: RE-INVEST-PORTFOLIO-VAL

  - id: B3-RENT-ROLLS
    candidate: rent_rolls
    rationale: "Every flagship platform models the rent roll as the bridge between leases and NOI rollup. Lives at the property level."
    vendor_evidence:
      - {vendor: "Yardi Investment Management", evidence: 1st_class}
      - {vendor: "MRI Investment Management", evidence: 1st_class}
      - {vendor: "AppFolio Investment Manager", evidence: 1st_class}
    proposed_module: RE-INVEST-PORTFOLIO-VAL

  - id: B3-NOI-CALCULATIONS
    candidate: noi_calculations
    rationale: "NOI is the load-bearing metric for both valuation and distribution forecasting. Flagship platforms model it as a queryable entity, not a computed report."
    vendor_evidence:
      - {vendor: "ARGUS Enterprise", evidence: 1st_class}
