b1a:
  - id: B1A-B9-a
    summary: "PATCH trigger_event 953 fund.created event_category from empty to lifecycle."
    finding: "Trigger event id 953 event_name fund.created has event_category empty string. Per Rule #13 allowed values are lifecycle, state_change, threshold, signal. fund.created is a creation transition on data_object 727 investment_funds."
    action: "semantius call crud postgrestRequest method PATCH path /trigger_events?id=eq.953 body {event_category: lifecycle}."
    affected_events:
      - {id: 953, event_name: "fund.created", current_category: "", proposed_category: "lifecycle"}

  - id: B1A-B9-b
    summary: "PATCH trigger_event 954 fund.closed event_category from empty to lifecycle."
    finding: "Trigger event id 954 event_name fund.closed has event_category empty string. Closure is a terminal-state lifecycle transition on data_object 727 investment_funds."
    action: "semantius call crud postgrestRequest method PATCH path /trigger_events?id=eq.954 body {event_category: lifecycle}."
    affected_events:
      - {id: 954, event_name: "fund.closed", current_category: "", proposed_category: "lifecycle"}

  - id: B1A-B9-c
    summary: "PATCH trigger_event 955 lp_subscription.executed event_category from empty to state_change."
    finding: "Trigger event id 955 event_name lp_subscription.executed has event_category empty string. The LP subscription moves from pending to active, a state_change on data_object 728 limited_partners."
    action: "semantius call crud postgrestRequest method PATCH path /trigger_events?id=eq.955 body {event_category: state_change}."
    affected_events:
      - {id: 955, event_name: "lp_subscription.executed", current_category: "", proposed_category: "state_change"}

  - id: B1A-B9-d
    summary: "PATCH trigger_event 956 asset_fee.charged event_category from empty to signal."
    finding: "Trigger event id 956 event_name asset_fee.charged has event_category empty string. This is an accrual signal on data_object 729 asset_management_fees, not a lifecycle transition on the fee itself."
    action: "semantius call crud postgrestRequest method PATCH path /trigger_events?id=eq.956 body {event_category: signal}."
    affected_events:
      - {id: 956, event_name: "asset_fee.charged", current_category: "", proposed_category: "signal"}

