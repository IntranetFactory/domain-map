      - {data_object_id: 143, name: tax_filings, target_module_id: 91, workflow: alias_vendor_terminology}
      - {data_object_id: 144, name: garnishment_orders, target_module_id: 92, workflow: alias_vendor_terminology}
      - {data_object_id: 145, name: payroll_journal_entries, target_module_id: 90, workflow: alias_vendor_terminology}

  - id: B1A-S12
    summary: Add Human Resources (contributor) and Information Technology (consumer) on business_function_domains for PAYROLL
    finding: >-
      business_function_domains for domain 55 has 3 rows (Payroll owner id=38,
      Accounting contributor id=42, Finance contributor id=4). Flagship vendor surface
      models Human Resources as contributor (HR maintains employee and comp data
      driving pay) and Information Technology as consumer (integration ownership). The
      current spine is too narrow.
    action: >-
      INSERT 2 business_function_domains rows for domain 55: (business_function=Human
      Resources, responsibility_type=contributor) and (business_function=Information
      Technology, responsibility_type=consumer).

  - id: B1A-S13
    summary: INSERT 4 users (748) DMDO rows on PAYROLL modules to pair with the existing user-edge relationships
    finding: >-
      The 7 user-edge data_object_relationships (ids 1879..1885) exist (Rule #10), but
      users (748, kind=platform_builtin) has no domain_module_data_objects row on any
      of PAYROLL-RUN (90), PAYROLL-TAX-COMPLIANCE (91), PAYROLL-EARNINGS-DEDUCTIONS
      (92), PAYROLL-EMPLOYEE-PAY-STATEMENTS (93). Rule #10 expects both the edge and
      the consumer DMDO so the platform-builtin master is reachable from each module's
      deploy surface and visible to per-module agent tools.
    action: >-
      INSERT 4 domain_module_data_objects rows: (90, 748, consumer, required), (91,
      748, consumer, required), (92, 748, consumer, required), (93, 748, consumer,
      required). record_status omitted (DB default new).
