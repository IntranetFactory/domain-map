      cycles); pay_slips (paystubs, pay statements, paychecks, wage statements, UK
      payslips); earning_codes (pay codes, earnings types); deduction_codes (benefit
      deduction codes, pre-tax deductions, post-tax deductions); tax_authorities
      (taxing authorities, tax jurisdictions, revenue agencies); tax_filings
      (statutory filings, 941, W2, 1099, T4, RTI submissions); garnishment_orders
      (wage garnishments, wage attachments, court orders, UK attachment of earnings
      orders); payroll_journal_entries (payroll journals, payroll GL entries, payroll
      postings).
    affected_masters:
      - {data_object_id: 138, name: pay_runs, target_module_id: 90, workflow: alias_vendor_terminology}
      - {data_object_id: 139, name: pay_slips, target_module_id: 93, workflow: alias_vendor_terminology}
