      Volume target per H1 (0.5N to 0.8N for N=41) = 21 to 33 agent_curated rows.
      Currently 11 agent_curated, gap of 10 to 22 rows.
    action: >-
      Run a focused PCF lookup pass against /processes (search by process_name=ilike.*
      <term>* and source_framework=eq.apqc_pcf_cross_industry) for each of the 22
      untagged handoffs plus the 3 weakly-tagged review flips (7 L5 mis-match REPLACE;
      18, 366, 374 at L2 discovery_override consider FLIP to agent_curated or narrow
