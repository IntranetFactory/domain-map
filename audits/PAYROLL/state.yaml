b1b:
  - id: B1B-S2
    summary: M7 hard-fail DELETE-or-PROMOTE 8 sibling master+consumer DMDO rows
    finding: >-
      8 sibling master+consumer DMDO rows violate Rule M7 within-domain coherence:
      ids 461 (90,140 earning_codes), 462 (90,141 deduction_codes), 463 (90,144
      garnishment_orders), 464 (90,142 tax_authorities), 465 (90,139 pay_slips) on
      PAYROLL-RUN; 470 (91,138 pay_runs), 471 (91,145 payroll_journal_entries) on
      PAYROLL-TAX-COMPLIANCE; 482 (93,138 pay_runs) on PAYROLL-EMPLOYEE-PAY-STATEMENTS.
      5 PAYROLL-RUN-side rows route to clean DELETE. 3 borderline rows (470, 471, 482)
      raise the standalone-deployability question.
    blocked_by:
      - {type: user_decision, ref: B2-S1}
    affected_entities:
      - {dmdo_id: 461, domain_module_id: 90, data_object: earning_codes, action: DELETE}
      - {dmdo_id: 462, domain_module_id: 90, data_object: deduction_codes, action: DELETE}
      - {dmdo_id: 463, domain_module_id: 90, data_object: garnishment_orders, action: DELETE}
      - {dmdo_id: 464, domain_module_id: 90, data_object: tax_authorities, action: DELETE}
      - {dmdo_id: 465, domain_module_id: 90, data_object: pay_slips, action: DELETE}
      - {dmdo_id: 470, domain_module_id: 91, data_object: pay_runs, action: DELETE_or_PROMOTE}
      - {dmdo_id: 471, domain_module_id: 91, data_object: payroll_journal_entries, action: DELETE_or_PROMOTE}
      - {dmdo_id: 482, domain_module_id: 93, data_object: pay_runs, action: DELETE_or_PROMOTE}

  - id: B1B-S9
    summary: E-band Phase E load (5 roles, 12 baseline permissions, ~17 workflow-gate permissions, role_modules, role_permissions)
    finding: >-
      0 PAYROLL-prefixed roles, 0 role_modules on 90..93, 0 permissions on 90..93. 21
      lifecycle states carry requires_permission=true so workflow-gate permissions
      will materialize per Rule #14's module-permission derivation. The non-trivial
      load was explicitly deferred from prior audit's technical fix pass.
    blocked_by:
      - {type: user_decision, ref: B2-S8}
      - {type: prerequisite_entity, ref: B1A-S10}
    affected_modules: [90, 91, 92, 93]
    extra_workflow_gate_count: 17

  - id: B1B-S10
    summary: F-band Phase S load - 4 per-module system skills + ~30-40 skill_tools, sunset legacy skill 21
    finding: >-
      1 legacy payroll-system skill (id 21, skill_type=system, domain_module_id=null)
      with 14 skill_tools survives from pre-modular era. Rule #17 requires exactly one
      skill_type=system skill per domain_modules row, so PAYROLL needs 4 per-module
      skills. F4 invariants (operation_kind <-> data_object_id) check on the existing
      14 rows; redistribution to per-module skills is straightforward. F5 score
      uncomputable until F2 and F3 land.
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-S4}
      - {type: prerequisite_entity, ref: B1A-S13}
    affected_modules: [90, 91, 92, 93]
    extra_legacy_skill_id: 21
    extra_legacy_skill_tools_count: 14

  - id: B1B-S14
    summary: B12 lifecycle states for earning_codes / deduction_codes / tax_authorities, or accept Rule #12 config-shape exemption
    finding: >-
      3 PAYROLL-owned masters have no lifecycle states (140 earning_codes, 141
      deduction_codes, 142 tax_authorities). Rule #12 config-shape exemption applies
      to author-once / occasionally-edit reference tables, but trigger events 1247
      earning_code.deactivated and 1248 deduction_code.deactivated imply at minimum
      an active -> deactivated arc. Rule #15 forbids notes auto-population for the
      exemption rationale, so the decision must be surfaced.
    blocked_by:
      - {type: user_decision, ref: B2-S7}
    affected_masters:
      - {data_object_id: 140, name: earning_codes, target_module_id: 92, workflow: deactivation_arc}
      - {data_object_id: 141, name: deduction_codes, target_module_id: 92, workflow: deactivation_arc}
      - {data_object_id: 142, name: tax_authorities, target_module_id: 91, workflow: config_static}

b2:
  - id: B2-S1
    summary: M7 architectural choice for 3 deployability-borderline sibling consumer DMDO rows
    question: >-
      Are PAYROLL-TAX-COMPLIANCE and PAYROLL-EMPLOYEE-PAY-STATEMENTS deployable
      standalone? If yes, the 3 sibling consumer rows (470 pay_runs on 91, 471
      payroll_journal_entries on 91, 482 pay_runs on 93) should be PROMOTED to
      embedded_master; if no (flagship vendor pattern), they should be DELETED with
      sibling reads via FK only. Recommendation DELETE all 8.
    options:
      - DELETE all 8 sibling consumer rows
      - PROMOTE 3 borderline rows to embedded_master, DELETE 5 PAYROLL-RUN-side rows
      - Mixed per-row decision
    why: Architectural intent and deployability strategy

  - id: B2-S2
    summary: Pattern flag re-evaluation on pay_runs / payroll_journal_entries
    question: >-
      (a) pay_runs.has_single_approver flip from true to false (multi-approver
      chains)? (b) payroll_journal_entries.has_single_approver flip from false to true
      (financial controls)? (c) pay_runs.has_personal_content flip from false to true
      (employee-pay tax detail)?
    options:
      - Per-flag yes / no

  - id: B2-S3
    summary: Regulation coverage breadth (US-centric vs global)
    question: >-
      Add FICA / SECA / FUTA / SUTA / IRC Subtitle C / state wage payment / HMRC RTI
      / CRA T4 / DSGVO / GoBD / KSA WPS / Singapore CPF / EU PWD to PAYROLL now, defer
      to Bucket 3 Phase 0 vendor verification, or add US federal anchors only?
    options:
      - Add all listed regulations now as Bucket 1 fixes
      - Defer to Bucket 3 / Phase 0 vendor verification
      - Add only US federal anchors (FICA/SECA/FUTA/SUTA/IRC); defer non-US

  - id: B2-S4
    summary: year_end_statements as a distinct master vs pay_slips subtype
    question: >-
      Add year_end_statements as a distinct master in PAYROLL-EMPLOYEE-PAY-STATEMENTS
      (W2 / W2c / 1099 / 1099-NEC / T4 / P60 / Lohnsteuerbescheinigung / Form 16),
      treat as a pay_slips subtype, or defer to Bucket 3?
    options:
      - Add year_end_statements as a new master
      - Keep as pay_slips subtype
      - Defer to Bucket 3

  - id: B2-S5
    summary: jurisdiction_tax_configs as first-class master vs deferral
    question: >-
      Add jurisdiction_tax_configs (or country_payroll_engines) as a first-class
      master under PAYROLL-TAX-COMPLIANCE, defer to Bucket 3, or reject as out of
      scope (US-centric by intent)?
    options:
      - Add jurisdiction_tax_configs master under PAYROLL-TAX-COMPLIANCE
      - Defer to Bucket 3 / Phase 0
      - Reject as out of scope

  - id: B2-S6
    summary: domains.notes pointer policy
    question: >-
      Update domains 55 notes with a one-line audit pointer (Rule #15 requires
      explicit text approval), or skip?
    options:
      - Supply user-approved wording
      - Skip the pointer

  - id: B2-S7
    summary: Config-shape lifecycle decision for earning_codes / deduction_codes / tax_authorities
    question: >-
      Author 3-state lifecycle (draft -> active -> deactivated) on each of
      earning_codes, deduction_codes, tax_authorities, or accept Rule #12 config-shape
      exemption and rely on record_status?
    options:
      - Author 3-state lifecycle on all 3
      - Accept config-shape exemption (no lifecycle states authored)
      - Mixed (lifecycle on earning_codes / deduction_codes given deactivation triggers, exemption on tax_authorities)

  - id: B2-S8
    summary: E-band role-list scope
    question: >-
      Is the proposed 5-role set the right scope, or should the role decomposition be
      tighter (3 roles: admin / manager / specialist) or wider (add PAYROLL-AUDITOR /
      PAYROLL-DATA-STEWARD)?
    options:
      - Use proposed 5 roles (PAYROLL-ADMINISTRATOR / PAYROLL-MANAGER / TAX-COMPLIANCE-OFFICER / GARNISHMENT-SPECIALIST / HR-PARTNER)
      - Tighter 3-role set
      - Wider 6+ role set (specify)

b3:
  - id: B3-YEAR-END-STATEMENTS
    candidate: year_end_statements
    rationale: >-
      Flagship vendors (ADP, Paychex, Workday, Gusto, Paylocity) model W2 / W2c / 1099
      / 1099-NEC / T4 / P60 / Lohnsteuerbescheinigung / Form 16 as a distinct entity
      from pay_slips. Different lifecycle (generated -> furnished -> corrected ->
      filed), different statutory rules, separate distribution channel.
    vendor_evidence: [ADP Workforce Now, Paychex Flex, Workday Payroll, Gusto, Paylocity]
    proposed_module: PAYROLL-EMPLOYEE-PAY-STATEMENTS or new PAYROLL-YEAR-END

  - id: B3-RETRO-PAY-ADJUSTMENTS
    candidate: retro_pay_adjustments
    rationale: >-
      Every flagship US vendor models retroactive pay corrections as a structured
      record (effective-date-back-dated change that produces a delta on the next
      pay_run). Catalog has no entity today.
    vendor_evidence: [ADP Workforce Now, Paychex Flex, Workday Payroll, Gusto, Paylocity, UKG Pro, Dayforce]
    proposed_module: PAYROLL-RUN or PAYROLL-EARNINGS-DEDUCTIONS

  - id: B3-JURISDICTION-TAX-CONFIGS
    candidate: jurisdiction_tax_configs
    rationale: >-
      CloudPay, Papaya Global, ADP GlobalView, Deel, Remote model per-country
      statutory kernels as first-class records (rate tables, calendar rules,
      statutory-filing schemas). PAYROLL-GLOBAL capability has no entity-level
      representation.
    vendor_evidence: [CloudPay, Papaya Global, ADP GlobalView Payroll, Deel, Remote]
    proposed_module: PAYROLL-TAX-COMPLIANCE or new PAYROLL-GLOBAL

  - id: B3-BANK-PAYMENT-FILES
    candidate: bank_payment_files
    rationale: >-
      NACHA / ACH file generation (US), BACS / Faster Payments (UK), SEPA (EU) is a
      first-class artifact in every flagship vendor. Currently pay_run.disbursed event
      implies the file exists but no entity captures it.
    vendor_evidence: [ADP Workforce Now, Paychex Flex, Workday Payroll, Gusto, CloudPay]
    proposed_module: PAYROLL-RUN

  - id: B3-PAYROLL-YEAR-END-MODULE
    candidate: PAYROLL-YEAR-END module
    rationale: >-
      If year_end_statements is loaded as a master, it warrants its own module
      (distinct lifecycle, distinct compliance windows, distinct employee-facing UX).
      Would push PAYROLL from 4 to 5 modules.
    vendor_evidence: [ADP Workforce Now, Workday Payroll, Gusto]
    proposed_module: new PAYROLL-YEAR-END

  - id: B3-PAYROLL-GLOBAL-MODULE
    candidate: PAYROLL-GLOBAL module
    rationale: >-
      If jurisdiction_tax_configs is loaded, the multi-country capability could be a
      separate module mastering the country-engine catalog and embedding pay_runs /
      tax_filings. Would push PAYROLL to 5-6 modules.
    vendor_evidence: [CloudPay, Papaya Global, ADP GlobalView Payroll, Deel, Remote]
    proposed_module: new PAYROLL-GLOBAL

  - id: B3-REG-FICA-SECA
    candidate: Federal Insurance Contributions Act / Self-Employment Contributions Act
    rationale: US federal social-insurance payroll tax; mandatory for US payroll.
    vendor_evidence: [ADP Workforce Now, Paychex Flex, Gusto]

  - id: B3-REG-FUTA-SUTA
    candidate: Federal Unemployment Tax Act / State Unemployment Tax Act
    rationale: US federal and state unemployment tax; mandatory for US payroll.
    vendor_evidence: [ADP Workforce Now, Paychex Flex, Gusto, Paylocity]

  - id: B3-REG-IRC-SUBC
    candidate: Internal Revenue Code Subtitle C
    rationale: US federal payroll tax statutory framework; mandatory for US payroll.
    vendor_evidence: [ADP Workforce Now, Workday Payroll]

  - id: B3-REG-HMRC-RTI
    candidate: HMRC Real-Time Information
    rationale: UK payroll filing framework; mandatory for UK payroll.
    vendor_evidence: [CloudPay, Iris Cascade, Sage Payroll, Zellis]

  - id: B3-REG-CRA-T4
    candidate: CRA T4 reporting
    rationale: Canadian year-end payroll reporting; mandatory for Canadian payroll.
    vendor_evidence: [CloudPay, ADP GlobalView Payroll]

  - id: B3-REG-DSGVO-GOBD
    candidate: DSGVO / GoBD
    rationale: German payroll storage and audit framework; mandatory for German payroll.
    vendor_evidence: [DATEV Lohn, ADP GlobalView Payroll, SAP SuccessFactors Employee Central Payroll]
