b1a:
  - id: B1A-S4
    summary: Author 8 intra-PAYROLL data_object_relationships edges to model the PAYROLL master-to-master spine
    finding: >-
      Only 2 data_object_relationships rows tie PAYROLL masters together (121
      garnishment_orders deducts_via deduction_codes, 140 benefit_enrollments posts_to
      payroll_journal_entries; the second is BEN-ADMIN owned). The intra-PAYROLL spine
      is essentially un-modeled.
    action: >-
      Author 8 rows: pay_runs (138) produces pay_slips (139) one_to_many required;
      pay_runs books payroll_journal_entries (145) one_to_many required; pay_runs feeds
      tax_filings (143) one_to_many required; tax_authorities (142) scopes tax_filings
      (143) one_to_many required; earning_codes (140) contributes_to pay_slips (139)
      many_to_many required; deduction_codes (141) contributes_to pay_slips (139)
      many_to_many required; garnishment_orders (144) deducts_via pay_runs (138)
      one_to_many required; pay_slips evidences payroll_journal_entries one_to_one
      optional.
    affected_masters:
      - {data_object_id: 138, name: pay_runs, target_module_id: 90, workflow: gross_to_net}
      - {data_object_id: 139, name: pay_slips, target_module_id: 93, workflow: pay_statement_publish}
