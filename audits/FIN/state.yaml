b2:
  - id: B2-MODULE-SPLIT-CONFIRM
    summary: "4-module split shipped (B2-S4 option b); confirm vs the 6-module default."
    question: >
      The modularization implemented option (b): 4 modules (FIN-GL-CLOSE, FIN-FIXED-ASSETS,
      FIN-CASH-BANKING, FIN-REVENUE-RECOGNITION), dropping the standalone AR-BILLING and AP-DISBURSE
      modules from the 6-module default because neither has any FIN-mastered data_object (customer-invoice
      processing is mastered by CRM/OMS/SUB-MGMT, supplier-invoice by AP-AUTO). The AR (60) and AP (61)
      capabilities were anchored to FIN-CASH-BANKING instead. Keep at 4 modules or add the two
      borrowed-master modules?
    options:
      - "keep 4 modules (agent recommends; no orphan capability, no empty module, no borrowed master promoted)"
      - "add FIN-AR-BILLING + FIN-AP-DISBURSE as borrowed-master/consumer modules and move caps 60/61 there"
    why: "Reversible module-design decision; affects downstream skill/persona/handoff-FK fan-out."

  - id: B2-S1
    summary: "Rule #15 notes-pollution on 6 domain_data_objects rows."
    question: >
      Were the notes on DDOs 250 (payroll_journal_entries consumer), 261 (benefit_enrollments consumer),
      324 (cost_centers master), 329 (fixed_assets master), 351 (expense_reports consumer), 358
      (service_projects consumer) user-approved at load time, or auto-populated by a loader?
    options:
      - "approved: leave in place"
      - "auto-populated: PATCH all 6 notes to empty string and log Rule #15 incident in references/skill-changelog.md"
    why: "Audit cannot tell from live state alone; commit history would say if a loader added them without user approval."

  - id: B2-S2
    summary: "B4 pattern-flag positive re-evaluation on 5 masters."
    question: "Which pattern flags should flip from false to true?"
    options:
      - "194 journal_entries: has_submit_lock=true (posting is one-way)?"
      - "194 journal_entries: has_single_approver=true (controllership approval)?"
      - "198 accounting_periods: has_submit_lock=true (close is one-way)?"
      - "198 accounting_periods: has_single_approver=true (controllership)?"
      - "203 intercompany_transactions: has_single_approver=true?"
      - "201 fixed_assets: has_single_approver=true (capitalization / disposal)?"
      - "109 revenue_recognition_records: has_submit_lock=true (recognition is one-way)?"
      - "109 revenue_recognition_records: has_single_approver=true?"
    why: "Pattern flags are workflow-shape judgments the user owns. Rule #12 requires consideration but flags must not be inferred without sign-off."

  - id: B2-S3
    summary: "B12 config-shape vs state-machine for 195 general_ledger_accounts and 196 cost_centers."
    question: "Are these two masters config-shape (skip B12) or do they warrant a 4-state machine?"
    options:
      - "config-shape exempt: skip lifecycle states authoring; track exemption outside notes (Rule #15)"
      - "author 4-state machines (proposed / active / deactivated / archived) on both"
    why: "Both masters are reference-data shape with no obvious workflow gate; Rule #12's config-shape exemption applies but requires explicit user sign-off."

  - id: B2-S6
    summary: "domains.business_logic em-dash fix."
    question: "Approve the proposed em-dash replacement?"
    options:
      - "Use proposed wording: 'Consolidation, allocation, multi-GAAP translation, and period-close orchestration: the regulated calc kernel inside an otherwise transactional ledger.' (em-dash -> colon)"
      - "Supply different wording"
    why: "CLAUDE.md forbids em-dash; Rule #15 / Rule #20 require user-approved wording for catalog prose changes. domains.description is already clean."

  - id: B2-S7
    summary: "B1A-S7 pass (b): approve reviewed handoff_processes tags."
    question: >
      The 2026-06-06 b1a pass left 110 of 113 FIN cross-domain handoffs tagged with handoff_processes
      rows (97 agent_curated, 11 discovery_substring, 2 discovery_override), all at record_status='new'.
      Which should flip to approved?
    options:
      - "review in the UI and bulk-approve the agent_curated tags you trust"
      - "leave at new pending a closer review pass"
    why: "Rule #1: record_status flips to approved are user-only; the agent authored the tags but cannot approve them."

b3:
  - id: B3-CHART-OF-ACCOUNTS-SEGMENTS
    candidate: chart_of_accounts_segments
    rationale: >
      Flagship ERPs (S/4HANA, Oracle Fusion, NetSuite, Workday, D365 Finance) model the chart-of-accounts as
      a multi-segment structure (Company-Account-Department-Project-IntercompanyPartner) where each segment is
      a first-class master. FIN currently has monolithic general_ledger_accounts; the segment layer is missing.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite", "Workday Financial Management", "Microsoft Dynamics 365 Finance"]
    proposed_module: "FIN-GL-CLOSE (master) or separate FIN-COA-SEGMENTS"

  - id: B3-JOURNAL-ENTRY-LINES
    candidate: journal_entry_lines
    rationale: >
      Flagship ERPs model journal-entry-headers and journal-entry-lines as separate entities. FIN
      journal_entries is single-row; line resolution is valuable for IFRS 16 / ASC 842 lease accounting and
      intercompany line matching.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite", "Workday Financial Management"]
    proposed_module: "FIN-GL-CLOSE (master, child of journal_entries id 194)"

  - id: B3-CURRENCIES
    candidate: currencies / exchange_rates
    rationale: >
      Multi-currency consolidation depends on these masters. Workday Currency Conversion Rate, SAP Exchange
      Rate Type. Currencies plausibly cross-domain (catalog-wide master layer).
    vendor_evidence: ["SAP S/4HANA", "Workday Financial Management", "Oracle Fusion Cloud ERP"]
    proposed_module: "catalog-wide master module, or FIN-GL-CLOSE / FIN-CASH-BANKING (master role)"

  - id: B3-ALLOCATIONS
    candidate: allocations / allocation_rules
    rationale: >
      SAP Cost Allocation Cycle, Oracle Allocation Rules, NetSuite Allocation Schedule. Allocate corporate
      cost across cost centers / departments / projects. Absent from FIN.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite"]
    proposed_module: "FIN-GL-CLOSE (master) or separate FIN-COST-ALLOCATION"

  - id: B3-REVALUATION-RUNS
    candidate: revaluation_runs
    rationale: >
      FX revaluation runs are first-class in S/4HANA and Oracle Fusion. FIN has cash_transactions but no
      FX-revaluation orchestration.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP"]
    proposed_module: "FIN-CASH-BANKING (master)"

  - id: B3-CONSOLIDATION-UNITS
    candidate: consolidation_units / elimination_entries
    rationale: >
      Multi-entity consolidation is first-class in S/4HANA, Oracle Fusion, OneStream. intercompany_transactions
      covers part but the consolidation-orchestration layer is missing.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "OneStream Platform"]
    proposed_module: "FIN-GL-CLOSE (master, consolidation side)"

  - id: B3-REVENUE-CONTRACTS
    candidate: revenue_contracts / performance_obligations
    rationale: >
      ASC 606 / IFRS 15 require revenue contracts and performance obligations as first-class entities.
      revenue_recognition_records is currently flat-shaped without contract / PO decomposition. Note that
      revenue_recognition_records (109) is mastered catalog-wide by SUB-MGMT-SUBSCRIPTIONS; child entities
      may belong there or in FIN-REVENUE-RECOGNITION as embedded.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Workday Financial Management"]
    proposed_module: "FIN-REVENUE-RECOGNITION (embedded) or SUB-MGMT-SUBSCRIPTIONS (master)"

  - id: B3-TAX-CODES
    candidate: tax_codes / tax_jurisdictions
    rationale: >
      SAP Tax Code, Oracle Tax Code / Jurisdiction, D365 Finance Tax Group. Absent from FIN. May overlap
      with a future TAX-MGMT domain promotion.
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Microsoft Dynamics 365 Finance"]
    proposed_module: "FIN-GL-CLOSE (master, with embedded_master if TAX-MGMT emerges later)"

  - id: B3-MISSING-MASTER-AR-AP
    candidate: customer_invoices / supplier_invoices / payments (FIN angle)
    rationale: >
      FIN exposes AR (60) and AP (61) capabilities but masters no receivable/payable entity: customer
      invoicing is mastered by CRM/OMS/SUB-MGMT and supplier-invoice processing by AP-AUTO. If FIN should
      hold its own AR/AP ledger sub-ledger detail (open-item management, dunning, payment runs) rather than only
      consuming downstream masters, candidate masters customer_invoices / supplier_invoices / payments would
      anchor dedicated FIN-AR-BILLING / FIN-AP-DISBURSE modules. Flagged, not filled (scope).
    vendor_evidence: ["SAP S/4HANA", "Oracle Fusion Cloud ERP", "Oracle NetSuite", "Microsoft Dynamics 365 Finance"]
    proposed_module: "FIN-AR-BILLING / FIN-AP-DISBURSE (new, gated on B2-MODULE-SPLIT-CONFIRM)"

  - id: B3-CSRD
    candidate: "Corporate Sustainability Reporting Directive (regulation)"
    rationale: >
      EU mandatory disclosure for large companies, 2026 / 2027 phase-in. Currently only the ESG domain holds
      CSRD; FIN should also surface it as it shapes financial-impact disclosures.
    vendor_evidence: []
    proposed_module: "(regulations row; n/a module)"

  - id: B3-PILLAR-TWO
    candidate: "OECD Pillar Two / Global Minimum Tax (regulation)"
    rationale: >
      OECD 15% minimum effective tax rate for multinationals, 2024+. Touches FIN multi-entity
      consolidation and tax reporting.
    vendor_evidence: []
    proposed_module: "(regulations row; n/a module)"

  - id: B3-LEASE-ACCOUNTING
    candidate: "ASC 842 / IFRS 16 explicit regulation rows"
    rationale: >
      Currently covered statutorily via US GAAP / IFRS at the framework level; explicit rows would clarify the
      lease-accounting touchpoint.
    vendor_evidence: []
    proposed_module: "(regulations row; n/a module)"
