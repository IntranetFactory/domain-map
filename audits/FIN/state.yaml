b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."
  - id: B1A-MASTER-MASTER-EDGES
    summary: "B6/B8 master-to-master data_object_relationships still missing (~9-10 edges)."
    finding: >
      ~9-10 intra/cross-domain master-to-master edges are unauthored: journal_entries posted_against
      accounting_periods / general_ledger_accounts / cost_centers, journal_entries scoped_by legal_entities,
      cash_transactions reconciled_against bank_accounts, fixed_assets owned_by legal_entities, fixed_assets
      governed_by asset_depreciation_schedules, intercompany_transactions between legal_entities,
      revenue_recognition_records produces journal_entries, accounting_periods scoped_by legal_entities.
      The modules now exist, so the edges can land; the 2026-05-31 Continuation licensed only user-edges.
    action: >
      INSERT 9-10 data_object_relationships rows after per-edge verb/cardinality/owner_side authoring.
      one_to_many for most postings (parent on the targeted master); intercompany_transactions between
      legal_entities = many_to_many self-join-via-legal_entities.
    blocked_by:
      - {type: user_decision, ref: B1A-MASTER-MASTER-EDGES, reason: "verb and owner_side authoring per edge"}

  - id: B1A-S3
    summary: "C1 sparse: only Accounting (owner) loaded; missing Finance / FP&A / Tax / Treasury business_function_domains rows."
    finding: >
      business_function_domains for domain 65 has 1 row (Accounting, owner). Per the 2026-05-30 audit,
      FIN warrants additional rows: Finance (contributor for treasury / banking / fixed-assets),
      FP&A (consumer for EPM bridge), Tax (consumer for legal-entity / multi-jurisdiction), Treasury
      (contributor for bank_accounts / cash_transactions). The 2026-05-31 Continuation deferred per the
      orchestrator's no-new-business_function_domains-contributors/consumers rule.
    action: >
      After the user names the 4 business_functions rows to point at, INSERT 4 business_function_domains
      rows: Finance (contributor), FP&A (consumer), Tax (consumer), Treasury (contributor). If the function
      spine lacks Tax / Treasury as first-class functions, fall back to Finance (contributor) and surface the gap.
    blocked_by:
      - {type: user_decision, ref: B1A-S3, reason: "business_function name targets to resolve"}

  - id: B1A-S4
    summary: "B11 fail: 0 data_object_aliases on any of the 11 FIN masters."
    finding: >
      0 rows in data_object_aliases for data_object_id in (109, 194, 195, 196, 197, 198, 199, 200, 201, 202, 203).
      2026-05-30 audit proposed ~25 aliases (Chart of Accounts, G/L Account, Journal Voucher, JE, Fiscal Period,
      Company Code, Entity, Cost Object, Cost Pool, Capital Assets, Asset Master Record, IC Postings,
      Cross-Entity Postings, RevRec Records, Performance Obligation Records, Cash Account, Bank Transaction,
      Cash Line, Depreciation Run, Depreciation Method).
    action: >
      INSERT ~25 alias rows. Vendor-specific terms (Company Code, Journal Voucher, Performance Obligation
      Records) require alias_type='solution_term' with resolved solution_id (Rule #18); generic ones (Chart of
      Accounts, JE, Fiscal Period, Cost Pool) use alias_type='industry_term' or similar non-vendor type.
    affected_masters:
      - {data_object_id: 109, name: revenue_recognition_records}
      - {data_object_id: 194, name: journal_entries}
      - {data_object_id: 195, name: general_ledger_accounts}
      - {data_object_id: 196, name: cost_centers}
      - {data_object_id: 197, name: legal_entities}
      - {data_object_id: 198, name: accounting_periods}
      - {data_object_id: 199, name: bank_accounts}
      - {data_object_id: 200, name: cash_transactions}
      - {data_object_id: 201, name: fixed_assets}
      - {data_object_id: 202, name: asset_depreciation_schedules}
      - {data_object_id: 203, name: intercompany_transactions}
    blocked_by:
      - {type: user_decision, ref: B1A-S4, reason: "alias_type and solution_id arbitration for vendor-specific terms (Rule #18)"}

  - id: B1A-HANDOFF-MODULE-FK-REMAINDER
    summary: "B10b no-candidate: 89 inbound handoffs carry NULL target_domain_module_id because FIN models no DMDO row for their payload."
    finding: >
      The 2026-06-06 b1a pass set source_domain_module_id on all 16 outbound handoffs and
      target_domain_module_id on the 8 inbound handoffs whose payload IS modeled by an FIN module
      (145 payroll_journal_entries -> 245, 210 expense_reports -> 245, 109 revenue_recognition_records -> 248).
      The other 89 inbound handoffs name payloads no FIN module declares any role on (crm_opportunities,
      claim_payments, customer_invoices, msp_invoices, time_entries, clinical_encounters, meter_reads, etc.),
      so the deterministic B10b rule yields no candidate FIN module.
    action: >
      Per B10b "no-candidate" sub-case 2: for each of the 89, decide whether to load a consumer
      domain_module_data_objects row on the receiving FIN module (preferred - captures the dependency,
      then re-run the B10b backfill to set target_domain_module_id) OR accept the handoff as a domain-level
      signal with no module owner. Most posting-flavored inbound (sub-ledger.posted) belong as consumer rows
      on FIN-GL-CLOSE (245); revenue/billing-flavored on FIN-REVENUE-RECOGNITION (248).
    blocked_by:
      - {type: user_decision, ref: B1A-HANDOFF-MODULE-FK-REMAINDER, reason: "per-handoff consumer-DMDO vs domain-level-signal decision; master-data judgment beyond deterministic B10b"}

b1b:
  - id: B1B-PERSONA-RACI
    summary: "Phase P (personas, role_modules, process_raci, lifecycle.process_id) now applies: multi-module domain built."
    finding: >
      FIN is now a 4-module domain. Per the 2026-06-02 phase-P triage, a multi-module result triggers
