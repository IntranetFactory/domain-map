b2:
  - id: B2-M1
    summary: Pick the modularization shape for GTM-PLAN, 8 modules per capability vs 5-module consolidation vs 3-module collapse.
    question: >-
      Which module shape should B1B-M1 author? (a) 8 modules, one per capability (granular,
      mirrors Anaplan and Pigment plan-modeling UI tabs); (b) 5 modules, PLAN-CORE
      (ICP+ACCOUNT+TERRITORY+CHANNEL-MIX) plus CAPACITY plus LAUNCH-ORCH plus SCENARIO plus
      EXEC-HANDOFF; (c) 3 modules, PLAN-DESIGN plus SCENARIO-MODELING plus PLAN-LOCK-AND-PUSH.
    options:
      - 8-module split as proposed in Pass 2 of the 2026-05-30 audit
      - 5-module consolidation (PLAN-CORE plus CAPACITY plus LAUNCH-ORCH plus SCENARIO plus EXEC-HANDOFF)
      - 3-module collapse (PLAN-DESIGN plus SCENARIO-MODELING plus PLAN-LOCK-AND-PUSH)
    why: >-
      Anaplan and Pigment tilt toward granular per-capability shape; Fullcast and Salesforce Sales
      Planning tilt toward 3-to-5-module CRM-centric view. Decision rewrites the module set authored
      under B1B-M1 and the proposed_module column on B1B-V1 through B1B-V4. Resolve together with
      B2-S1, B2-S2, B3-PMM, B3-ABM-PLATFORM, B3-SALES-PLANNING-PLATFORM.

  - id: B2-C1
    summary: Add capability-level RACI overrides for LAUNCH-ORCHESTRATION (PMM) and CHANNEL-MIX-PLANNING (Marketing).
    question: >-
      Should LAUNCH-ORCHESTRATION and CHANNEL-MIX-PLANNING carry `business_function_capabilities`
      overrides? LAUNCH-ORCH is more naturally PMM-owned; CHANNEL-MIX is more naturally
      Marketing-Ops-owned. Inherited owner today is Sales Operations.
    options:
      - Add overrides for both (LAUNCH-ORCH to Product Management, CHANNEL-MIX to Marketing)
      - Leave both inherited (Sales Ops owns the whole cross-functional shell)
      - LAUNCH-ORCH override only, leave CHANNEL-MIX inherited
      - Wait until PMM is promoted as a domain (B2-S1) and relocate LAUNCH-ORCH there entirely
    why: >-
      Domain owner is Sales Operations; contributors are Marketing and Product Management. The two
      capabilities sit on the boundary of the cross-functional shell. Has soft Bucket 3 dependency
      on B3-PMM, if PMM is promoted the LAUNCH-ORCH override becomes moot.

  - id: B2-R1
    summary: Decide regulation coverage for GTM-PLAN, none vs GDPR-only vs GDPR plus CCPA vs full conservative set.
    question: >-
      Should GTM-PLAN carry any `domain_regulations` rows? Currently zero. GDPR may apply if
      account_scores includes EU-resident contact-level intent data; CCPA / CPRA for the US
      consumer-facing case; SOX rarely applies unless gtm_plans feeds revenue disclosures.
    options:
      - None (GTM-PLAN is a planning shell, regulations apply downstream at CRM / MA)
      - GDPR only (intent-data exposure)
      - GDPR plus CCPA (US plus EU intent-data coverage)
      - GDPR plus CCPA plus SOX (full conservative set)
    why: >-
      Independent of every other Bucket 2 / Bucket 3 item. The planning shell has no statutory
      anchor of its own; regulation exposure exists only if account-scoring includes
      contact-level data.

  - id: B2-S1
    summary: Promote PMM as its own domain and relocate GTM-PLAN's LAUNCH-ORCHESTRATION capability.
    question: >-
      Should PMM (Product Marketing Management) be promoted as a separate domain, taking
      GTM-PLAN's LAUNCH-ORCHESTRATION capability and the proposed GTM-PLAN-LAUNCH-ORCH module
      with it? PMM is queued in `_missing-domains.md` at mention count 2 (PROD-MGMT plus
      GTM-PLAN).
    options:
      - Promote PMM and relocate LAUNCH-ORCH (cleanest market shape, matches Klue / Crayon / Aha! Roadmaps Create vendor boundary)
      - Keep LAUNCH-ORCH in GTM-PLAN and let PMM be the launch-readiness consumer downstream
      - Wait until PMM mention count grows past 3 (cross-domain blast radius)
    why: >-
      Strong cross-dependency with B2-M1 and B3-PMM. Resolves the LAUNCH-ORCH ownership question
      and may shrink the module set authored under B1B-M1.

  - id: B2-S2
    summary: Promote ABM-PLATFORM as its own domain and split ICP / ACCOUNT-TARGETING out.
    question: >-
      Should ABM-PLATFORM (Demandbase, 6sense, RollWorks, Madison Logic, Terminus, Mutiny) be
      promoted as a separate domain, absorbing GTM-PLAN's MARKET-SEGMENTATION and ACCOUNT-SCORING
      capabilities and the proposed GTM-PLAN-ICP-SEGMENT plus GTM-PLAN-ACCOUNT-TARGETING
      modules? ABM-PLATFORM is queued newly by the 2026-05-30 audit at mention count 1.
    options:
      - Promote ABM-PLATFORM and relocate both modules (Gartner has consistently treated ABM as its own platform market with marketing-ops buyer)
      - Keep ICP and account-targeting in GTM-PLAN as the sales-ops-owned planning side, let ABM-PLATFORM be the marketing-ops-owned engagement platform downstream (the planning vs engagement cut)
      - Defer until ABM-PLATFORM mention count grows
    why: >-
      Strong Bucket 3 dependency on B3-ABM-PLATFORM. The defensible cut is planning-side (ICP /
      target lists) stays in GTM-PLAN, engagement-side (intent scoring, ad targeting, web
      personalization) goes to ABM-PLATFORM.

  - id: B2-D1
    summary: Rewrite domains.description after B2-S1 and B2-S2 settle, scope narrows if PMM and ABM-PLATFORM promote.
    question: >-
      If B2-S1 (PMM) and B2-S2 (ABM-PLATFORM) both resolve to "promote and relocate", the
      GTM-PLAN description needs a rewrite to narrow scope to the territory plus quota plus
      capacity plus scenario planning core. What is the new description?
    options:
      - Rewrite once B2-S1 and B2-S2 settle (deferred)
      - Keep current broad description (defensible only if both PMM and ABM-PLATFORM stay embedded)
    why: >-
      Deferred until B2-S1 and B2-S2 are answered. Per Rule #20 / Rule #18 the new description
      goes through user review with structured columns carrying buyer-side signal. Has hard
      dependency on B2-S1 and B2-S2.

  - id: B2-P1
    summary: When to schedule pairwise reconciliation against CRM, MA, EPM, PROD-MGMT and the peer leadership-tier neighbors.
    question: >-
      When should Pass 4 pairwise reconciliation run against each neighbor? Currently blocked on
      B1B-M1 plus the peer leadership-tier neighbors (SALES-PERF, REV-INTEL, ACCT-PLAN, PRM)
      also modularizing.
    options:
      - Schedule pairwise passes against each non-leadership-tier neighbor (CRM, MA, EPM, PROD-MGMT) immediately after B1B-M1 lands
      - Wait for the full leadership-tier wave (GTM-PLAN, SALES-PERF, REV-INTEL, ACCT-PLAN, PRM) to settle then run all bilateral diffs in one campaign
      - Only run the highest-priority pair (GTM-PLAN to SALES-PERF, territory drafts hand off cleanly)
    why: >-
      Independent of Bucket 3 except in the LAUNCH-ORCH relocation case. Resolves the
      sequencing question for cross-domain handoff authoring.

b3:
  - id: B3-PMM
    candidate: PMM (Product Marketing Management) as its own domain, absorbing GTM-PLAN's LAUNCH-ORCHESTRATION capability
    rationale: >-
      Klue, Crayon (competitive intelligence pure-plays), Aha! Roadmaps Create (PMM-flavored
      launch planning), Highspot, Showpad, Seismic (sales enablement that PMM owns the content
      for), Pendo Adopt, Reprise. The buyer (PMM lead) is distinct from Sales Ops / RevOps.
      Already queued at mention count 2 after the 2026-05-30 audit.
