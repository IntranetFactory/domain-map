    candidate: ABM-PLATFORM as its own domain, absorbing GTM-PLAN's MARKET-SEGMENTATION and ACCOUNT-SCORING capabilities
    rationale: >-
      Demandbase, 6sense, RollWorks, Madison Logic, Terminus, Mutiny. Buyer is Marketing Ops; the
      engagement-side (ads, web personalization, intent-data orchestration) is distinct from the
      planning-side (ICP modeling, target account list authoring) that GTM-PLAN owns. Newly
      queued by the 2026-05-30 audit at mention count 1.
    vendor_evidence:
      - {vendor: Demandbase, evidence: 1st_class}
      - {vendor: 6sense, evidence: 1st_class}
      - {vendor: RollWorks, evidence: 1st_class}
      - {vendor: Madison Logic, evidence: 1st_class}
      - {vendor: Terminus, evidence: secondary}
      - {vendor: Mutiny, evidence: secondary}
    proposed_module: relocate GTM-PLAN-ICP-SEGMENT and GTM-PLAN-ACCOUNT-TARGETING to ABM-PLATFORM
    extra_verification_path: >-
      Phase 0 against Demandbase platform docs, 6sense Revenue AI schema, RollWorks ABM entity
      model; test whether ICP and account-list authoring sit on the GTM-PLAN side or the
      ABM-PLATFORM side. The defensible cut is GTM-PLAN authors ICPs and named account lists
      once per planning cycle; ABM-PLATFORM ingests those lists and runs engagement.
