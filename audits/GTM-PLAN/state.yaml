  - id: B3-SALES-PLANNING-PLATFORM
    candidate: SALES-PLANNING-PLATFORM as its own domain, absorbing GTM-PLAN's TERRITORY-CARVING-PLAN, GTM-CAPACITY-PLANNING, and GTM-SCENARIO-MODELING capabilities
    rationale: >-
      Anaplan Sales Planning, Pigment, Board, Fullcast, Salesforce Sales Planning, Varicent.
      Already queued at mention count 2 (SALES-PERF plus GTM-PLAN). The platform-market test is
      whether these vendors compete on a buyer (RevOps Strategy lead) distinct from both
      SALES-PERF's commissions buyer and GTM-PLAN's cross-functional Sales-Ops buyer. Gartner
      has begun calling out "Sales Planning Platforms" as a category in 2024 to 2025. The most
      consequential candidate; if promoted, GTM-PLAN may shrink to a thin Sales-Ops shell or
      merge into the new platform.
    vendor_evidence:
      - {vendor: Anaplan Sales Planning, evidence: 1st_class}
      - {vendor: Pigment, evidence: 1st_class}
      - {vendor: Board, evidence: 1st_class}
      - {vendor: Fullcast, evidence: 1st_class}
      - {vendor: Salesforce Sales Planning, evidence: 1st_class}
      - {vendor: Varicent, evidence: secondary}
    proposed_module: relocate GTM-PLAN-TERRITORY, GTM-PLAN-CAPACITY, GTM-PLAN-SCENARIO to SALES-PLANNING-PLATFORM
    extra_verification_path: >-
      Phase 0 against Anaplan Sales Planning vs Pigment vs Fullcast docs, plus the Salesforce
