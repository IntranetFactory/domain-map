b2:
  - id: B2-S1
    summary: SPEND-REIMBURSEMENT vs EXPENSE scope boundary
    question: >-
      The proposed SPEND-REIMBURSEMENT module in B1B-S1 covers out-of-pocket
      reimbursement, which is exactly EXPENSE's flagship surface. Either (a)
      SPEND-MGMT does not own a reimbursement module and the SPEND-REIMBURSEMENT
      capability (315) is realized by EXPENSE, or (b) SPEND-MGMT owns a thin
      reimbursement workflow distinct from EXPENSE's (e.g. corporate-card
      cardholder reimbursement of personal-charge spillover), or (c) the
      SPEND-MGMT domain row's description is wrong and SPEND-MGMT absorbs EXPENSE
      entirely (Brex / Ramp / Airbase / BILL bundle both).
    options:
      - "(a) drop SPEND-REIMBURSEMENT module from the split; EXPENSE realizes the reimbursement capability"
      - "(b) keep a thin SPEND-MGMT-owned reimbursement module distinct from EXPENSE (user specifies scope)"
      - "(c) merge EXPENSE into SPEND-MGMT entirely (large refactor)"
    why: >-
      Architectural / market-definition question. The flagship vendors (Brex /
      Ramp / BILL Spend & Expense / Pleo / Mesh / Airwallex) bundle expense
      management, but the catalog deliberately separates EXPENSE from SPEND-MGMT.
      Decision shifts the module count in B1B-S1.

  - id: B2-S2
    summary: spend_policies (747) lifecycle exemption per Rule #12
    question: >-
      spend_policies plausibly fits the config-shape exemption (policies are
      versioned config, not a workflow record). The other 4 masters
      (spend_requests, corporate_card_accounts, card_authorizations,
      vendor_payment_authorizations) are workflow-bearing. Per Rule #15 the
      agent cannot auto-populate data_objects.notes to record the exemption.
    options:
      - "(a) Confirm config-shape; record exemption in audit; do NOT populate data_objects.notes"
      - "(b) Treat as workflow-bearing (draft -> active -> superseded -> retired); load lifecycle states alongside other 4 masters"
    why: Editorial decision on policy lifecycle plus the Rule #15 question of how to record the exemption.

  - id: B2-S3
    summary: B4 pattern-flag positive re-evaluation on 5 SPEND-MGMT masters
    question: >-
      All 5 masters carry default pattern flags. Re-evaluation candidates:
      (a) card_authorizations.has_personal_content likely true (cardholder name,
      merchant location, IP/device); (b) spend_requests.has_submit_lock likely
      true (no edit after submit until reject/return); (c)
      vendor_payment_authorizations.has_submit_lock likely true (queued for run
      after approve); (d) corporate_card_accounts.has_personal_content possibly
      true (PII, possibly personal SSN for primary card); (e)
      vendor_payment_authorizations.has_single_approver may be true for
      sub-threshold authorizations.
    options:
      - "Per-flag yes/no on the 5 candidate flips"
    why: Pattern flags are workflow-shape judgments the user owns.

  - id: B2-S4
    summary: PCI-DSS / AML-KYC / SOX regulation rows missing
    question: >-
      SPEND-MGMT touches cardholder data (PAN, expiry, CVV at issuance) and
      merchant data at authorization. PCI-DSS applies. AML/KYC applies on the
      card-program side. SOX applies for segregation of duties on payment
      authorization. Catalog has 0 domain_regulations rows for SPEND-MGMT.
    options:
      - "(a) Load 3 domain_regulations rows (PCI-DSS, AML/KYC, SOX) on SPEND-MGMT"
      - "(b) Anchor on CORP-CARD-PROGRAM candidate domain if promoted"
      - "(c) Defer until B1B-S1 lands and assign to the realizing module(s)"
    why: Compliance scoping decision; depends on whether CORP-CARD-PROGRAM gets promoted (Bucket 3 dependency).

  - id: B2-S5
    summary: Missing intra-domain data_object_relationships among 5 SPEND-MGMT masters
    question: >-
      Per the workflow model: spend_requests -> vendor_payment_authorizations
      (approved request generates a payment authorization); card_authorizations
      -> corporate_card_accounts (every auth belongs to an account); spend_requests
      -> spend_policies (request is evaluated against policy at submission).
      Catalog has 0 intra-domain relationships among the 5 masters.
    options:
      - "(a) Author 3-5 intra-domain relationships with proposed verbs (generates_payment_for, belongs_to_account, evaluated_against) alongside B1B-S1"
      - "(b) Defer to separate authoring pass"
    why: Relationships are obvious but verbs and relationship_kind (reference vs parent) are workflow-shape calls.

  - id: B2-S6
    summary: vendor_payment_authorizations vs AP-AUTO payment-run authorization overlap
    question: >-
      AP-AUTO's payment_runs (205) has its own approval step. SPEND-MGMT's
      vendor_payment_authorizations (746) is per-vendor pre-authorization
      flowing into AP-AUTO via handoff 556. Are these one workflow split across
      two domains, or two distinct approval gates? Brex/Ramp/Airwallex unify
      them; SAP Concur/Workday split them.
    options:
      - "(a) Unified flow: treat payment_runs as consumer in SPEND-BILL-PAY downstream of vendor_payment_authorizations"
      - "(b) Split flow: vendor_payment_authorizations is SPEND-MGMT-side approval; AP-AUTO has its own payment_runs approval separately"
    why: Architectural decision; depends on whether catalog models the unified flow or the split flow.

  - id: B2-S7
    summary: Re-classify PCF picks on handoffs 558 and 560
    question: >-
      The 6 agent_curated APQC tags loaded 2026-05-31 are mostly correct. Two
      weak picks: handoff 558 (card_authorization.high_value -> AUDIT) tagged at
      Audit invoices and key data in AP system (L4 id 1433); handoff 560
      (spend_policy.updated -> S2P) tagged at Develop procurement plan (L4 id
      793). Both might cluster better at L3 parents (Manage Internal Controls
      and Establish Policies respectively, if those parents exist in
      cross-industry framework).
