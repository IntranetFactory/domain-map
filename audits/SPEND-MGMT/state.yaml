      (SMB-SPEND-STARTER) + 5 master DMDOs + 4 cross-module contributor/consumer DMDOs
      + 1 starter shell. Per Rule #14 a domain with 11 capabilities needs >=2 full
      modules; current count is 0.
    finding: >-
      SPEND-MGMT (id 133) has 11 capabilities (SPEND-CARD-ISSUANCE,
      SPEND-CARD-AUTH, SPEND-REIMBURSEMENT, SPEND-BILL-PAY, SPEND-PRE-APPROVAL,
      SPEND-FX-TREASURY, SPEND-ANALYTICS, CORP-CARD, EXPENSE-CAPTURE,
      EXPENSE-POLICY, APPROVAL-WORKFLOW) and 0 domain_modules rows. Five masters
      (spend_requests 240, corporate_card_accounts 744, card_authorizations 745,
      vendor_payment_authorizations 746, spend_policies 747) exist in
      domain_data_objects but have no realizing module. Proposed module set carried
      from 2026-05-30 audit: SPEND-CARDS (masters 744, 745), SPEND-REIMBURSEMENT
      (consumer on EXPENSE masters; scope gated on B2-S1), SPEND-BILL-PAY (master
      746), SPEND-POLICY-AND-APPROVAL (masters 240, 747), SMB-SPEND-STARTER
      (embedded_master on 744, 745, 240, 747, 746; consumer on users).
    blocked_by:
      - {type: user_decision, ref: B2-S1, reason: SPEND-REIMBURSEMENT vs EXPENSE boundary decision determines module count}
    action: Phase A loader after B2-S1 resolution. Use .tmp_deploy/ scratch.
    affected_modules: []
    affected_masters:
      - {data_object_id: 240, name: spend_requests, target_module_id: null, workflow: SPEND-POLICY-AND-APPROVAL}
      - {data_object_id: 744, name: corporate_card_accounts, target_module_id: null, workflow: SPEND-CARDS}
      - {data_object_id: 745, name: card_authorizations, target_module_id: null, workflow: SPEND-CARDS}
      - {data_object_id: 746, name: vendor_payment_authorizations, target_module_id: null, workflow: SPEND-BILL-PAY}
      - {data_object_id: 747, name: spend_policies, target_module_id: null, workflow: SPEND-POLICY-AND-APPROVAL}
    extra_proposed_modules:
