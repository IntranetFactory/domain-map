b3:
  - id: B3-MERCHANT-CATEGORY-RULES
    candidate: merchant_category_rules
    rationale: >-
      Brex / Ramp / Mesh / Pleo all model MCC-level policy as a first-class
      versioned record (this MCC, this card, this user, this geography, this
      time window -> allow / decline). Currently the policy logic is implicit
      in spend_policies (747); flagship platforms maintain a separate MCC-rules
      table the auth engine consults.
    vendor_evidence:
      - Brex
      - Ramp
      - Mesh Payments
      - Pleo
    proposed_module: SPEND-CARDS or SPEND-POLICY-AND-APPROVAL

  - id: B3-CARD-DISPUTES
    candidate: card_disputes
    rationale: >-
      Brex / Ramp / Airwallex / Mesh expose card-dispute workflows (fraudulent /
      duplicate / not received; vendor returns chargeback packet; case carries
      to resolution). Currently no dispute entity.
    vendor_evidence:
      - Brex
      - Ramp
      - Airwallex Spend
      - Mesh Payments
    proposed_module: SPEND-CARDS

  - id: B3-RECEIPT-RECORDS
    candidate: receipt_records
    rationale: >-
      Brex / Ramp / Pleo / BILL each treat receipts as first-class records
      distinct from card transactions (one transaction can have many receipts,
      OCR-extracted fields, matched-or-unmatched state). Currently folded into
      card_transactions (213, EXPENSE) or expense_lines (211, EXPENSE).
    vendor_evidence:
      - Brex
      - Ramp
      - Pleo
      - BILL Spend & Expense
    proposed_module: candidate master split or stays in EXPENSE

  - id: B3-VENDOR-PAYMENT-METHODS
    candidate: vendor_payment_methods
    rationale: >-
      Brex / Ramp / BILL each model vendor payment method (ACH / wire /
      virtual-card / check) as a first-class master tied to the vendor with
      bank-account details and KYC state. Currently no entity; routing is
      implicit on vendor_payment_authorizations.
    vendor_evidence:
      - Brex
      - Ramp
      - BILL Spend & Expense
    proposed_module: SPEND-BILL-PAY

  - id: B3-VIRTUAL-CARDS
    candidate: virtual_cards
    rationale: >-
      Brex / Ramp / Mesh / Marqeta-backed platforms expose virtual cards as a
      first-class master distinct from the underlying corporate card account
