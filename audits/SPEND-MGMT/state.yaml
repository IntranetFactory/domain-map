b2:
  - id: B2-S1
    summary: "SPEND-REIMBURSEMENT vs EXPENSE scope boundary (does SPEND-MGMT own a distinct reimbursement module?)."
    question: >-
      The reimbursement capability (SPEND-REIMBURSEMENT 315) and EXPENSE-CAPTURE
      (72) are currently co-located in SPEND-MGMT-POLICY-APPROVAL (305) as
      master-less links backed by EXPENSE masters, deliberately avoiding a
      separate master-less module. Should SPEND-MGMT instead own a distinct
      reimbursement module, leave it folded into 305, or have EXPENSE realize
      these capabilities entirely?
    options:
      - "(a) leave folded in SPEND-MGMT-POLICY-APPROVAL (current state); EXPENSE remains the master"
      - "(b) carve a thin SPEND-MGMT-owned reimbursement module distinct from EXPENSE (user specifies scope and any new master)"
      - "(c) drop the links from SPEND-MGMT; EXPENSE realizes the reimbursement + capture capabilities"
    why: >-
      Architectural / market-definition question. Modularization chose (a) as the
      reuse-only default; (b) and (c) require either a new master or a capability
      re-link the user must authorize.

  - id: B2-S2
    summary: "spend_policies (747) lifecycle exemption per Rule #12."
    question: >-
      spend_policies plausibly fits the config-shape exemption (versioned config,
      not a workflow record). The other 4 masters are workflow-bearing. Per Rule
      #15 the agent cannot auto-populate data_objects.notes to record the
      exemption.
    options:
      - "(a) Confirm config-shape; record exemption in audit; do NOT populate data_objects.notes"
      - "(b) Treat as workflow-bearing (draft -> active -> superseded -> retired); load lifecycle states alongside the other 4 masters"
    why: "Editorial decision on policy lifecycle plus the Rule #15 question of how to record the exemption. Gates B1A-LIFECYCLE-STATES for 747."

  - id: B2-S3
    summary: "B4 pattern-flag positive re-evaluation on 5 SPEND-MGMT masters."
    question: >-
      All 5 masters carry default pattern flags. Candidates:
      (a) card_authorizations.has_personal_content likely true (cardholder name,
      merchant location, IP/device); (b) spend_requests.has_submit_lock likely
      true; (c) vendor_payment_authorizations.has_submit_lock likely true;
      (d) corporate_card_accounts.has_personal_content possibly true;
      (e) vendor_payment_authorizations.has_single_approver may be true for
      sub-threshold authorizations.
    options:
      - "Per-flag yes/no on the 5 candidate flips"
    why: "Pattern flags are workflow-shape judgments the user owns."

  - id: B2-S4
    summary: "PCI-DSS / AML-KYC / SOX regulation rows missing."
    question: >-
      SPEND-MGMT touches cardholder data (PAN, expiry, CVV at issuance) and
      merchant data at authorization. PCI-DSS, AML/KYC, and SOX apply. Catalog has
      0 domain_regulations rows for SPEND-MGMT.
    options:
      - "(a) Load 3 domain_regulations rows (PCI-DSS, AML/KYC, SOX) on SPEND-MGMT (or per realizing module 303)"
      - "(b) Anchor on CORP-CARD-PROGRAM candidate domain if promoted"
      - "(c) Defer"
    why: "Compliance scoping decision; depends on whether CORP-CARD-PROGRAM gets promoted (Bucket 3 dependency)."

  - id: B2-S5
    summary: "Missing intra-domain data_object_relationships among the 5 SPEND-MGMT masters."
    question: >-
      Per the workflow model: spend_requests -> vendor_payment_authorizations
      (approved request generates a payment authorization); card_authorizations ->
      corporate_card_accounts (every auth belongs to an account); spend_requests
      -> spend_policies (request evaluated against policy). Catalog has 0
      intra-domain relationships among the 5 masters.
    options:
      - "(a) Author 3-5 intra-domain relationships with proposed verbs (generates_payment_for, belongs_to_account, evaluated_against)"
      - "(b) Defer to a separate authoring pass"
    why: "Relationships are obvious but verbs and relationship_kind (reference vs parent) are workflow-shape calls. (Relationship authoring is out of the modularization pass scope.)"

  - id: B2-S6
    summary: "vendor_payment_authorizations vs AP-AUTO payment-run authorization overlap."
    question: >-
      AP-AUTO's payment_runs (205) has its own approval step. SPEND-MGMT's
      vendor_payment_authorizations (746) is per-vendor pre-authorization flowing
      into AP-AUTO. payment_runs is now a contributor on SPEND-MGMT-BILL-PAY (304).
      Is this one workflow split across two domains, or two distinct approval gates?
    options:
      - "(a) Unified flow: payment_runs as downstream consumer/contributor of vendor_payment_authorizations in SPEND-MGMT-BILL-PAY (current shape)"
      - "(b) Split flow: vendor_payment_authorizations is SPEND-MGMT-side approval; AP-AUTO owns its payment_runs approval separately"
    why: "Architectural decision; the current contributor placement assumes the unified read."

  - id: B2-APQC
    summary: "Approve per-handoff PCF candidates for the untagged cross-domain handoffs (incl. wrong-PCF handoff 170)."
    question: >-
      Agent proposes candidate PCF ids per untagged handoff and a replacement for
      the wrong-PCF row on handoff 170; user approves per-row, INSERT on approval.
      Prior pass found cited external_ids disagree with the audit prose labels, so
      every pick needs user confirmation.
    options:
      - "Agent surfaces per-handoff PCF candidates; user approves or names an alternative"
    why: "PCF taxonomy selection per cross-domain handoff is editorial."

b3:
  - id: B3-MASTERLESS-FX-TREASURY
    candidate: "SPEND-FX-TREASURY capability (318) has no backing in-domain master"
    rationale: >-
      Placed in SPEND-MGMT-CARDS (303) but no FX/treasury master entity exists in
      the domain. Brex / Airwallex / Mesh / Pleo model multi-currency wallets, FX
      rate locks, and treasury netting as first-class records (e.g. fx_rate_locks,
      currency_wallets, treasury_netting_runs). Candidate master to fill the gap.
    vendor_evidence: [Brex, Airwallex Spend, Mesh Payments, Pleo]
    proposed_module: SPEND-MGMT-CARDS
  - id: B3-MASTERLESS-ANALYTICS
    candidate: "SPEND-ANALYTICS capability (319) has no backing in-domain master"
    rationale: >-
      Placed in SPEND-MGMT-POLICY-APPROVAL (305) but analytics is realized off
      other masters with no analytics-specific entity. Flagship platforms surface
      spend_anomalies / spend_insights as persisted records (an anomaly is a
      reviewable, dismissible object, not just a query). Candidate master.
    vendor_evidence: [Ramp, Brex, Spendesk]
    proposed_module: SPEND-MGMT-POLICY-APPROVAL
  - id: B3-MASTERLESS-REIMBURSEMENT
    candidate: "SPEND-REIMBURSEMENT (315) + EXPENSE-CAPTURE (72) have no in-domain master"
    rationale: >-
      Both capabilities are co-located in SPEND-MGMT-POLICY-APPROVAL (305) backed
      only by EXPENSE-mastered objects (expense_reports 210, expense_policies 214).
      Whether SPEND-MGMT should own a reimbursement-request master (e.g.
      reimbursement_requests distinct from EXPENSE's expense_reports) is the open
      B2-S1 architectural question. Master-less until B2-S1 resolves.
    vendor_evidence: [Brex, Ramp, Pleo, Spendesk]
    proposed_module: SPEND-MGMT-POLICY-APPROVAL
  - id: B3-MASTERLESS-CORP-CARD-EXPENSE-POLICY
    candidate: "CORP-CARD (74) + EXPENSE-POLICY (73) realized off EXPENSE masters, no in-domain master"
    rationale: >-
      CORP-CARD (reconciliation) sits in SPEND-MGMT-CARDS (303) and EXPENSE-POLICY
      (enforcement) sits in SPEND-MGMT-POLICY-APPROVAL (305); both are realized off
      EXPENSE-domain masters (corporate_cards 212, card_transactions 213,
      expense_policies 214). These may be intentional cross-domain capability links
      rather than gaps to fill; flagged for review, not for filling.
    vendor_evidence: [Brex, Ramp, BILL Spend & Expense]
    proposed_module: "various (303 / 305)"
  - id: B3-MERCHANT-CATEGORY-RULES
    candidate: merchant_category_rules
    rationale: >-
      Brex / Ramp / Mesh / Pleo all model MCC-level policy as a first-class
      versioned record (this MCC, this card, this user, this geography, this time
      window -> allow/decline). Currently the policy logic is implicit in
      spend_policies (747).
    vendor_evidence: [Brex, Ramp, Mesh Payments, Pleo]
    proposed_module: "SPEND-MGMT-CARDS or SPEND-MGMT-POLICY-APPROVAL"
  - id: B3-CARD-DISPUTES
    candidate: card_disputes
    rationale: >-
      Brex / Ramp / Airwallex / Mesh expose card-dispute workflows (fraudulent /
      duplicate / not received; chargeback packet; case to resolution). No dispute
      entity currently.
    vendor_evidence: [Brex, Ramp, Airwallex Spend, Mesh Payments]
    proposed_module: SPEND-MGMT-CARDS
  - id: B3-RECEIPT-RECORDS
    candidate: receipt_records
    rationale: >-
      Brex / Ramp / Pleo / BILL treat receipts as first-class records distinct
      from card transactions (one transaction, many receipts; OCR fields;
      matched/unmatched state). Currently folded into EXPENSE objects.
    vendor_evidence: [Brex, Ramp, Pleo, BILL Spend & Expense]
    proposed_module: "candidate master split or stays in EXPENSE"
  - id: B3-VENDOR-PAYMENT-METHODS
    candidate: vendor_payment_methods
    rationale: >-
      Brex / Ramp / BILL model vendor payment method (ACH / wire / virtual-card /
      check) as a first-class master tied to the vendor with bank-account details
      and KYC state. Routing is currently implicit on vendor_payment_authorizations.
    vendor_evidence: [Brex, Ramp, BILL Spend & Expense]
    proposed_module: SPEND-MGMT-BILL-PAY
  - id: B3-VIRTUAL-CARDS
    candidate: virtual_cards
    rationale: >-
      Brex / Ramp / Mesh / Marqeta-backed platforms expose virtual cards as a
      first-class master distinct from the underlying corporate card account (one
      virtual card per vendor or per project, with spend caps and validity
      windows). No entity currently.
    vendor_evidence: [Brex, Ramp, Mesh Payments, "Marqeta (issuer-layer)"]
    proposed_module: SPEND-MGMT-CARDS
  - id: B3-REG-PCI-DSS
    candidate: PCI-DSS regulation row
    rationale: "Mandatory for any system touching cardholder data. SPEND-MGMT processes PAN at issuance and at authorization."
    vendor_evidence: ["PCI Security Standards Council (statutory anchor, not vendor)"]
    proposed_module: "cross-cutting (applies to SPEND-MGMT-CARDS)"
  - id: B3-REG-AML-KYC
    candidate: AML / KYC / Bank Secrecy Act regulation row
    rationale: "Mandatory for the card-program side, even if SPEND-MGMT consumes the BIN-sponsor's compliance not its own."
    vendor_evidence: ["FinCEN, OCC (statutory anchors, not vendor)"]
    proposed_module: "cross-cutting (applies to SPEND-MGMT-CARDS)"
  - id: B3-DOMAIN-TRAVEL-MGMT
    candidate: TRAVEL-MGMT (domain-tier candidate)
    rationale: >-
      Navan / Egencia / SAP Concur Travel / TripActions / Spotnana / AmTrav / BCD
      Travel / CWT all sell pure-play corporate travel management independent of
      expense and spend. The existing travel_bookings (215) data_object suggests
      partial modeling, but no domain owns the booking flow.
    vendor_evidence: [Navan, Egencia, "SAP Concur Travel", TripActions, Spotnana, AmTrav, "BCD Travel", CWT]
    proposed_module: "n/a (domain candidate)"
  - id: B3-DOMAIN-CORP-CARD-PROGRAM
    candidate: CORP-CARD-PROGRAM (domain-tier candidate)
    rationale: >-
      Marqeta / Stripe Issuing / Highnote / Lithic / Adyen Issuing all sell
      pure-play card-issuing platforms independent of spend management. Brex / Ramp
      / Airwallex run on Marqeta / Stripe Issuing; the BIN-sponsor layer is
      structurally distinct from the spend-management UX layer. Promotion would
      re-route PCI-DSS / AML-KYC anchoring (B2-S4).
    vendor_evidence: [Marqeta, "Stripe Issuing", Highnote, Lithic, "Adyen Issuing"]
    proposed_module: "n/a (domain candidate)"
