b1a:
  - id: B1A-SYSTEM-SKILLS
    summary: "Author 3 per-module system skills (Rule #17 F2/F3); migrate the 8 skill_tools off legacy domain skill 107 and DELETE it (F1)."
    finding: >-
      Modularization landed 2026-06-02: SPEND-MGMT now has 3 full modules
      (SPEND-MGMT-CARDS 303, SPEND-MGMT-BILL-PAY 304, SPEND-MGMT-POLICY-APPROVAL
      305). Zero skill_type='system' skills carry domain_module_id (F2 hard fail).
      Legacy domain-level skill 107 'spend-mgmt-system' (domain_id=133,
      domain_module_id=null) still holds 8 skill_tools rows pointing at the right
      master ids: query_corporate_card_accounts -> 744, query_card_authorizations
      -> 745 (both now in module 303); query_vendor_payment_authorizations -> 746
      (now in module 304); query_spend_requests -> 240, query_spend_policies -> 747
      (both now in module 305); plus query_corporate_cards -> 212 (EXPENSE),
      query_card_transactions -> 213 (EXPENSE), and a send_email side_effect.
      Rule #17 requires exactly one system skill per full module; F1 requires the
      legacy domain-level skill to be retired once any module-level skill exists.
    action: >-
      Author 3 module-level system skills (one per full module), redistribute the
      8 existing skill_tools to the correct per-module skill by realizing module
      (744/745 -> 303 skill, 746 -> 304 skill, 240/747 -> 305 skill; the 2 EXPENSE
      tools + send_email attach to the module whose workflow consumes them), then
      DELETE skill 107.
    affected_modules: [303, 304, 305]
    extra_legacy_skill_id: 107
    extra_existing_skill_tool_count: 8

  - id: B1A-CATALOG-UX
    summary: "Backfill catalog_tagline + catalog_description on the 3 new modules (M8) and on domain 133 (A4 / Rule #20)."
    finding: >-
      All 3 new modules (303 SPEND-MGMT-CARDS, 304 SPEND-MGMT-BILL-PAY, 305
      SPEND-MGMT-POLICY-APPROVAL) carry empty catalog_tagline and
      catalog_description; domain 133 also still carries both fields empty (the
      pre-existing A4 fail). Per Rule #20 these are buyer-voice fields (workflow +
      value, not analyst voice) and the first non-empty value cannot be
      overwritten without explicit per-row user approval, so the agent drafts and
      surfaces, the user approves the exact wording, then the agent PATCHes.
    action: >-
      Agent drafts buyer-voice tagline + 1-3 paragraph description for each of the
      3 modules and for domain 133, surfaces the drafts, user approves wording,
      agent PATCHes.
    affected_modules: [303, 304, 305]

  - id: B1A-LIFECYCLE-STATES
    summary: "Load lifecycle states on the 4 workflow-bearing masters with domain_module_id pointing at the realizing module."
    finding: >-
      Zero data_object_lifecycle_states rows on any SPEND-MGMT master. Per Rule
      #12 every master + required object needs lifecycle states unless config-shape.
      Four are workflow-bearing: spend_requests (240, module 305) draft ->
      submitted -> approved/rejected -> spent/cancelled; corporate_card_accounts
      (744, module 303) application -> active -> frozen/closed; card_authorizations
      (745, module 303) requested -> approved/declined -> posted ->
      reconciled/disputed; vendor_payment_authorizations (746, module 304)
      requested -> approved/rejected -> released/held. spend_policies (747, module
      305) is plausibly config-shape, gated on B2-S2. Modules now exist so
      data_object_lifecycle_states.domain_module_id can be set.
    action: >-
      Lifecycle-states loader: author each state machine, set requires_permission
      on gate states, set permission_verb_override for non-obvious verbs, set
      domain_module_id per realizing module (744/745 -> 303, 746 -> 304, 240 -> 305).
      spend_policies (747) gated on B2-S2.
    affected_masters:
      - {data_object_id: 240, name: spend_requests, target_module_id: 305, workflow: "draft->submitted->approved/rejected->spent/cancelled"}
      - {data_object_id: 744, name: corporate_card_accounts, target_module_id: 303, workflow: "application->active->frozen/closed"}
      - {data_object_id: 745, name: card_authorizations, target_module_id: 303, workflow: "requested->approved/declined->posted->reconciled/disputed"}
      - {data_object_id: 746, name: vendor_payment_authorizations, target_module_id: 304, workflow: "requested->approved/rejected->released/held"}
    blocked_by:
      - {type: user_decision, ref: B2-S2, reason: "whether spend_policies (747) needs lifecycle states or qualifies for config-shape exemption"}

  - id: B1A-OUTBOUND-SOURCE-FK
