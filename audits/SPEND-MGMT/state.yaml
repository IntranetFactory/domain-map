schema_version: 2
domain: SPEND-MGMT
status: feedback_needed
next_action_by: user
last_audit: "2026-06-06"

b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."
  - id: B1A-LIFECYCLE-STATES-747
    summary: "spend_policies (747) lifecycle states, BLOCKED on user_decision B2-S2 (config-shape vs workflow)."
    finding: >-
      The 4 workflow-bearing masters now carry lifecycle states (240->305,
      744->303, 745->303, 746->304; 21 states total, loaded 2026-06-06). Only
      spend_policies (747) remains: it is plausibly config-shape (versioned config,
      no workflow) and is gated on B2-S2. Do NOT load lifecycle states on 747 until
      the user rules config-shape vs workflow-bearing.
    action: >-
      Blocked. On B2-S2 = (b) workflow-bearing: load draft -> active -> superseded
      -> retired states on 747 with domain_module_id=305 and set
      entity_type='operational_workflow'. On B2-S2 = (a) config-shape: PATCH 747
      entity_type='catalog' and load nothing.
    affected_masters:
      - {data_object_id: 747, name: spend_policies, target_module_id: 305, workflow: "draft->active->superseded->retired (if workflow-bearing)"}
    blocked_by:
      - {type: user_decision, ref: B2-S2, reason: "whether spend_policies (747) needs lifecycle states or qualifies for config-shape exemption"}

b1b:
  - id: B1B-APQC-MISSING
    summary: "Author/REPLACE APQC handoff_processes tags on the currently untagged cross-domain handoffs."
    finding: >-
      Coverage still below the H1 floor. Untagged outbound/inbound handoffs need
      agent_curated PCF tags; handoff 170 carries a wrong-PCF discovery_substring
      row (process 1010 'Manage recruitment vendors', semantically wrong for S2P
      supplier onboarding) needing REPLACE. The prior technical pass found every
