      - {handoff_id: 169, direction: outbound, source_domain: SPEND-MGMT, target_domain: ERP-FIN, trigger_event: spend_request.approved, payload: spend_requests, null_field: source_domain_module_id}
      - {handoff_id: 172, direction: outbound, source_domain: SPEND-MGMT, target_domain: EPM, trigger_event: spend_commitment.created, payload: spend_requests, null_field: source_domain_module_id}
      - {handoff_id: 173, direction: outbound, source_domain: SPEND-MGMT, target_domain: FINOPS, trigger_event: card_transaction.posted, payload: card_transactions, null_field: source_domain_module_id}
      - {handoff_id: 174, direction: outbound, source_domain: SPEND-MGMT, target_domain: SMP, trigger_event: card_transaction.posted, payload: shadow_it_apps, null_field: source_domain_module_id}
      - {handoff_id: 556, direction: outbound, source_domain: SPEND-MGMT, target_domain: AP-AUTO, trigger_event: vendor_payment_authorization.approved, payload: vendor_payment_authorizations, null_field: source_domain_module_id}
      - {handoff_id: 557, direction: outbound, source_domain: SPEND-MGMT, target_domain: ERP-FIN, trigger_event: card_authorization.high_value, payload: card_authorizations, null_field: source_domain_module_id}
