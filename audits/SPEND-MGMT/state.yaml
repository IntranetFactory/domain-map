      Zero data_object_lifecycle_states rows on any of the 5 SPEND-MGMT masters.
      Per Rule #12 every master + required object needs lifecycle states unless
      config-shape. Four workflow-bearing: spend_requests (240) draft -> submitted
      -> approved/rejected -> spent/cancelled; corporate_card_accounts (744)
      application -> active -> frozen/closed; card_authorizations (745) requested
      -> approved/declined -> posted -> reconciled/disputed;
      vendor_payment_authorizations (746) requested -> approved/rejected ->
      released/held. spend_policies (747) is plausibly config-shape, gated on B2-S2.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S1-MODULES, reason: data_object_lifecycle_states.domain_module_id must reference a realizing module}
      - {type: user_decision, ref: B2-S2, reason: whether spend_policies needs lifecycle states or qualifies for config-shape exemption}
    action: Lifecycle-states loader after B1B-S1-MODULES lands. Author state machine per master, set requires_permission on gate states, set permission_verb_override for non-obvious verbs, set domain_module_id per realizing module.
    affected_masters:
      - {data_object_id: 240, name: spend_requests, target_module_id: null, workflow: draft->submitted->approved/rejected->spent/cancelled}
      - {data_object_id: 744, name: corporate_card_accounts, target_module_id: null, workflow: application->active->frozen/closed}
