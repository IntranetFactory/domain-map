b2:
  - id: B2-1
    summary: "Rule #15 notes pollution on the 11 GRC domain_data_objects rows. Auto-populated or user-approved?"
    question: "All 11 domain_data_objects rows for GRC carry populated notes restating role / necessity / co-mastering intent (e.g. 'Enterprise risk register (single-master v1; multi-master with OP-RES/TPRM/SECOPS/PRIV-MGMT deferred to follow-up)'). Were these user-approved at load time or auto-populated?"
    options:
      - "(a) Confirm user-approved, leave in place."
      - "(b) Confirm auto-populated, PATCH all 11 rows to empty string and log the Rule-#15 incident in references/skill-changelog.md."
    why: "Per Rule #15 these are the kind of mechanical / restated-schema annotations the rule rescinds. The agent cannot tell from audit alone whether the user approved exact wording at load time."

  - id: B2-2
    summary: "Rule #15 notes pollution on 4 legacy skill_tools rows (ids 89, 90, 91, 92)."
    question: "Were the populated notes on legacy skill_tools rows 89-92 (Consumer from CLM / For policy-attestation targeting / Fires on control.failed handoff / Policy-update re-attestation notifications) user-approved at load time?"
    options:
      - "(a) Auto-population confirmed, PATCH to empty string and log the incident, then proceed with B1B-S7 retirement."
      - "(b) Leave them; B1B-S7 retirement DELETEs the rows anyway."

  - id: B2-3
    summary: "Rule #15 notes pollution on inbound handoffs (target NULL trailers + workflow-shape context)."
    question: "Strictly report-only and deferred to source-domain audits, or surgical PATCH now of the 2 'target NULL until GRC is modularized' trailers (handoffs 634 from ITAM, 1195 from APM)?"
    options:
      - "(a) Report-only; defer to source domain audits (default)."
      - "(b) Surgical PATCH the 2 explicit trailers now; defer the rest."
    why: "Source domain (ITAM, APM, etc.) owns the row's authoring; cross-domain notes revert is owed by source-domain audits per Rule #15 scope, but the 2 explicit 'target NULL until modularized' trailers will become factually wrong once B1B-S1 lands."

  - id: B2-4
    summary: "B4 pattern flag re-evaluation per master."
    question: "Per-flag yes/no answers for the 12 candidate flag positions: compliance_policies.has_submit_lock; policy_attestations.has_single_approver; policy_attestations.has_submit_lock; compliance_evidence.has_submit_lock; compliance_evidence.has_personal_content; risk_assessments.has_submit_lock; control_assessments.has_submit_lock; audit_issues.has_single_approver; remediation_plans.has_single_approver; compliance_risks.has_personal_content; compliance_controls.has_personal_content; compliance_obligations.has_personal_content."
    options:
      - "Per-flag yes/no (or 'all yes' / 'all no')."

  - id: B2-5
    summary: "COMPLIANCE-TRAIN capability ownership on GRC."
    question: "Should GRC retain the capability_domains link to COMPLIANCE-TRAIN (21), or should it be removed in favor of LMS as exclusive owner?"
    options:
      - "(a) Keep, link to GRC-POLICY-ATTESTATION as the realizing module."
      - "(b) DELETE the capability_domains row (15, 21); GRC ends up with the capabilities it actually masters (RISK-MGMT, POLICY-MGMT, CONTROL-MGMT, etc., authored in Bucket 3). Default recommendation."

  - id: B2-6
    summary: "Multi-master deferral on compliance_risks."
    question: "Architectural intent for compliance_risks: stay single-master (a), split into per-domain risk slices (b), or promote to a master cluster with adjacent-domain slice masters (c)? Affects OP-RES, TPRM, SECOPS, PRIV-MGMT pairings."
    options:
      - "(a) Keep single-master; GRC stays canonical (default until 4 neighbor audits land)."
      - "(b) Per-adjacent-domain risk slices via separate data_objects (cyber_risks, supplier_risks, operational_risks, privacy_risks)."
      - "(c) Master cluster: GRC compliance_risks masters the package; OP-RES, TPRM, SECOPS, PRIV-MGMT hold master rows of slice data_objects."

  - id: B2-7
    summary: "GRC-domain role authoring + tagging of cross-functional roles."
    question: "Should the 2 business_function_id=31 roles (10035 GRC-REGULATORY-AFFAIRS, 10038 GRC-COMPLIANCE-TRAINING-MANAGER) stay tagged with GRC business function despite targeting PLM-Compliance / LMS-Compliance-Training modules, and should the proposed 5 new GRC-module roles in B1B-S13 land?"
    options:
      - "(a) Leave the 2 roles tagged GRC + author 5 new GRC-module roles (default)."
      - "(b) Re-tag the 2 roles to LMS / PLM business functions; GRC role inventory restarts from zero per B1B-S13."

b3:
  - id: B3-1
    candidate: "Vendor-substrate missing masters across the 10 flagship GRC vendors"
    rationale: "Flagship vendors (ServiceNow IRM, Archer, MetricStream, OneTrust GRC, LogicGate, AuditBoard, Workiva, Riskonnect, MEGA HOPEX, Diligent) carry several masters not in GRC's current footprint. Candidates: risk_treatments (separate from compliance_risks), control_libraries / risk_libraries (template reference data), kri_metrics (key risk indicators), control_tests (exercise-time, distinct from continuous control_assessments), gap_assessments (framework-coverage gap analysis), audit_findings vs audit_issues distinction, disclosure_filings (Workiva's flagship surface), risk_appetite_statements, regulatory_change_events (overlaps with queued REG-CHANGE-MGMT domain candidate), policy_exceptions (NAVEX / OneTrust / MetricStream)."
    vendor_evidence:
      - {vendor: "ServiceNow Integrated Risk Management", evidence: 1st_class}
      - {vendor: "Archer Suite", evidence: 1st_class}
      - {vendor: "MetricStream Connected GRC", evidence: 1st_class}
      - {vendor: "OneTrust GRC", evidence: 1st_class}
      - {vendor: "LogicGate Risk Cloud", evidence: 1st_class}
      - {vendor: "AuditBoard", evidence: 1st_class}
      - {vendor: "Workiva Platform", evidence: 1st_class}
      - {vendor: "Riskonnect Platform", evidence: 1st_class}
      - {vendor: "MEGA HOPEX", evidence: secondary}
      - {vendor: "Diligent One Platform", evidence: secondary}
    proposed_module: "Distributed across the 3 proposed modules (GRC-RISK-MGMT for risk_treatments / kri_metrics / risk_appetite_statements / risk_libraries; GRC-COMPLIANCE-MGMT for control_libraries / control_tests / gap_assessments / audit_findings / disclosure_filings / regulatory_change_events; GRC-POLICY-ATTESTATION for policy_exceptions)."

  - id: B3-2
    candidate: "GRC modularization split shape (feeds B1B-S1)"
    rationale: "Three candidate splits: (a) 3-module GRC-RISK-MGMT / GRC-COMPLIANCE-MGMT / GRC-POLICY-ATTESTATION (mirrors ServiceNow IRM / MetricStream / OneTrust GRC); (b) 2-module RISK / COMPLIANCE-AND-POLICY; (c) 4-module RISK / COMPLIANCE / POLICY / EVIDENCE-AND-AUDIT. Each alternative drives entity-to-module assignment for the 10 masters and downstream Phase E permission scope."
    vendor_evidence:
      - {vendor: "ServiceNow Integrated Risk Management", evidence: 1st_class}
      - {vendor: "MetricStream Connected GRC", evidence: 1st_class}
      - {vendor: "OneTrust GRC", evidence: 1st_class}
      - {vendor: "Riskonnect Platform", evidence: 1st_class}
    proposed_module: "Default candidate 3-module (a). Vet via Phase 0 vendor research."

  - id: B3-3
    candidate: "audit_issues mastery: GRC vs AUDIT"
    rationale: "Some flagship stacks (ServiceNow) merge findings + issues; others (Workiva, AuditBoard) split AUDIT.findings from GRC.issues. The current single-master shape under GRC may or may not be correct; resolution may yield a slice-split where AUDIT masters audit_findings and GRC masters audit_issues (the corrective-action register) with an edge between them."
    vendor_evidence:
      - {vendor: "AuditBoard", evidence: 1st_class}
      - {vendor: "Workiva Platform", evidence: 1st_class}
      - {vendor: "Diligent One Platform", evidence: 1st_class}
      - {vendor: "MEGA HOPEX", evidence: secondary}
      - {vendor: "ServiceNow Integrated Risk Management", evidence: secondary}
    proposed_module: "If split: AUDIT masters audit_findings; GRC-COMPLIANCE-MGMT masters audit_issues. Cross-domain edge via data_object_relationships."

  - id: B3-4
    candidate: "4 domain candidates queued in _missing-domains.md: CRQ, ETHICS-HOTLINE, POLICY-MGMT, REG-CHANGE-MGMT."
    rationale: "Each passes the point-solution-market test on enumeration: CRQ (Bitsight / SecurityScorecard / RiskLens / Kovrr / Safe Security / X-Analytics); ETHICS-HOTLINE (NAVEX EthicsPoint / OneTrust Ethics / Convercent / Whispli / Speakfully / EQS Integrity Line); POLICY-MGMT (NAVEX PolicyTech / OneTrust Policy / ConvergePoint / MetricStream Policy / PowerDMS / Mitratech PolicyHub); REG-CHANGE-MGMT (Thomson Reuters Reg Intelligence / Wolters Kluwer OneSumX / RegEd / Compliance.ai / Ascent RegTech). Final triage is human via _missing-domains.md."
    vendor_evidence:
      - {vendor: "NAVEX", evidence: 1st_class}
      - {vendor: "OneTrust", evidence: 1st_class}
      - {vendor: "Bitsight", evidence: 1st_class}
      - {vendor: "SecurityScorecard", evidence: 1st_class}
      - {vendor: "Thomson Reuters Reg Intelligence", evidence: 1st_class}
      - {vendor: "Wolters Kluwer OneSumX", evidence: 1st_class}
    proposed_module: "Each is a candidate domain, not a GRC sub-module."
