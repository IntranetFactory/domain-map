b2:
  - id: B2-MODULE-SPLIT
    summary: "Approve proposed 5-module S2P split, propose alternative, or defer."
    question: >-
      The audit recommends splitting S2P into 5 modules: S2P-SOURCING (masters sourcing_events),
      S2P-REQ-TO-PO (masters purchase_requisitions + purchase_orders), S2P-RECEIVING (masters
      goods_receipts), S2P-INVOICE-MATCHING (masters supplier_invoices; boundary question with
      AP-AUTO on invoice-matching ownership), S2P-CATALOG-MGMT (would master procurement_catalogs
      + catalog_items, Bucket 3 pending). Approve the 5-module split, propose an alternative shape
      (e.g. 4 modules collapsing receiving into invoice-matching; 3 modules collapsing sourcing into
      req-to-po), or defer the Phase A re-load entirely.
    options:
      - "approve 5-module split as proposed"
      - "approve with AP-AUTO boundary resolved (S2P stops at GR, AP-AUTO absorbs matching)"
      - "approve with AP-AUTO boundary resolved (S2P owns matching, hands off invoice.approved)"
      - "propose alternative 3-module or 4-module shape"
      - "defer module decision; keep S2P pre-modular for now"
    why: >-
      Most of the structural Bucket 1 fixes (M1 / M2 / M4 / M5 / M6 / B9b / B10b / E1 to E5 / F2 / F3 / F5)
      and B1-A2 capability authoring are gated on this decision. The catalog cannot proceed until
      the module shape is settled.
  - id: B2-JAGGAER
    summary: "Pick survivor for duplicate Jaggaer solutions rows (id 129 vs id 518)."
    question: >-
      Two solutions rows differ only in casing: id 129 'Jaggaer ONE' and id 518 'JAGGAER ONE'.
      The vendor's current marketing form is ALL-CAPS 'JAGGAER ONE'. Keep id 129 (older row,
      preserves history), keep id 518 (matches vendor brand), or merge under a hand-picked form
      and DELETE the loser, re-pointing its solution_domains row.
    options:
      - "keep id 129 'Jaggaer ONE'; DELETE id 518"
      - "keep id 518 'JAGGAER ONE'; DELETE id 129"
      - "merge under a different form (specify)"
  - id: B2-CATALOG-UX
    summary: "Approve catalog_tagline + catalog_description drafts for domain S2P (Rule #20 backfill)."
    question: >-
      Both fields are empty. Rule #20 forbids any write without explicit per-row user approval.
      The 2026-05-30 audit proposed: tagline 'Run procurement end to end: source suppliers, raise
      requisitions, issue POs, receive goods, and match invoices in one workflow.' Plus a 2-paragraph
      catalog_description (see 2026-05-30 history.md Bucket 2 #3 for the full text). Approve as-is,
      request edits, or defer.
    options:
      - "approve tagline + both paragraphs as proposed"
      - "approve with edits (provide exact text)"
      - "defer; leave both fields empty until next audit"
  - id: B2-SEND-EMAIL
    summary: "Channel-vs-capability decision for S2P's re-authored per-module skills (F7)."
    question: >-
      The legacy skill 22 links send_email (tool 37, side_effect, coverage_tier=platform) without a
      workflow-specific justification. When per-module skills are authored after the module split,
      the default replacement is notify_person. But S2P-REQ-TO-PO has a candidate workflow-specific
      justification (supplier-facing PO dispatch email IS the contract in many B2B flows); similar
      candidate on S2P-INVOICE-MATCHING (invoice-received confirmations). Keep send_email with
      per-module workflow justification, or move every skill to notify_person and let the
      deployment pick the channel.
    options:
      - "keep send_email on S2P-REQ-TO-PO (PO dispatch); keep on S2P-INVOICE-MATCHING (receipt confirmation); notify_person everywhere else"
      - "keep send_email on S2P-REQ-TO-PO only; notify_person on all other modules"
      - "notify_person across all S2P modules; no channel-specific links"
    why: >-
      Gated on B2-MODULE-SPLIT because per-module skill targets must exist before the decision binds.
  - id: B2-EINVOICE-PII
    summary: "Treat supplier tax-personal data the same as employee-personal data for has_personal_content?"
    question: >-
      supplier_invoices.has_personal_content=false is correct for B2B invoices in most jurisdictions.
      But in jurisdictions with mandatory e-invoicing (Italy SdI, France Chorus, Mexico CFDI), the
      invoice carries the supplier's tax id + legal address, which is regulated personal data.
      Does the catalog's has_personal_content flag cover tax-personal data, or only employee-personal data?
    options:
      - "yes, has_personal_content covers tax-personal data; PATCH supplier_invoices.has_personal_content=true"
      - "no, has_personal_content covers only employee-personal data; leave as false"
      - "introduce a separate flag (out of scope for this audit)"
  - id: B2-PAIRWISE-TIMING
    summary: "Schedule pairwise reconciliation against SUP-LIFE / AP-AUTO / CLM / SMP inline after M1 or as separate runs?"
    question: >-
      The four neighbors with edge weight >= 3 (SUP-LIFE 5, AP-AUTO 4, CLM 4, SMP 3) all have
      structural reconciliation work blocked on M1. After the module-split fix lands, run pairwise
      reconciliation inline as the next audit step, or schedule four separate Validate runs against
      each neighbor in turn.
    options:
      - "inline pairwise after M1 fix lands"
      - "four separate Validate runs (SUP-LIFE first, then AP-AUTO, CLM, SMP)"
      - "defer pairwise until all four neighbors are themselves audited"
  - id: B2-H1-APPROVAL
    summary: "Sweep-approve the 17 agent_curated handoff_processes rows, leave for normal review, or surgically approve."
    question: >-
      29 of 29 S2P cross-domain handoffs have at least one handoff_processes row (H1 coverage gate
      satisfied). Headline catalog-quality measure is the approved count: 0 / 29. 23 rows are
      agent_curated (17 from the 2026-05-31 technical-fix load + 6 pre-existing); 6 are discovery_*.
      Sweep-approve the 17 fresh agent_curated rows, leave them for normal review per Rule #1, or
      surgically approve a subset.
    options:
      - "sweep-approve all 17 agent_curated rows from the 2026-05-31 load"
      - "sweep-approve all 23 agent_curated rows (including pre-existing)"
      - "leave at record_status='new' for normal reviewer flow"
      - "name specific rows to approve"

