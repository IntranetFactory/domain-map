    options:
      - "sweep-approve the 17 agent_curated rows from the 2026-05-31 load"
      - "sweep-approve all 23 agent_curated rows (including pre-existing)"
      - "leave at record_status='new' for normal reviewer flow"
      - "name specific rows to approve"

