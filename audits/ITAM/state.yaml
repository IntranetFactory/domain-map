schema_version: 2
domain: ITAM
status: feedback_needed
next_action_by: user
last_audit: "2026-06-07"

# Umbrella domain over HAM/SAM/SMP/FINOPS/EAM. ITAM masters only the cross-asset
# substrate (asset_contracts id 54, asset_lifecycle_events id 55); the sub-domains
# master their asset-type-specific entities. 4 modules (57 NORMALIZATION-CATALOG,
# 58 CONTRACTS, 59 LIFECYCLE, 60 PORTFOLIO-REPORTING). Domain id 3.
#
# 2026-06-07 state-driven execute pass cleared the agent-doable additive/corrective
# items (entity_type classification, event_category backfill, Rule #20 catalog UX
# on the domain row + all 4 modules). What remains below is user-gated: b2 forks,
# destructive overwrites (notes wipes, DMDO role/necessity rewrite, business_logic
# em-dash fix), the deferred persona/RACI layer, b1b blocked on other domains, and
# the b3 backlog.

b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."
  - id: B1A-PHASE-P
    summary: "Multi-module (4 modules) with 0 personas: author the persona / RACI layer. DEFERRED this pass (not authored)."
    finding: "Live triage: 4 domain_modules and 0 domain_roles reaching this domain via role_modules. Plan 3 deleted the old _core personas, so the persona layer is empty on this multi-module domain."
    action: "DEFER. Persona / RACI authoring (B1A-PHASE-P) is a dedicated worked pass, not part of the bulk state-driven execute. Author domain_roles (operational personas) function-anchored per references/roles.md section 7, wire role_modules reach across the 4 modules, add process_raci responsibility rows, and wire data_object_lifecycle_states.process_id. ATS is the worked reference (scripts/loaders/load_ats_personas_pilot.ts)."
    status: deferred
    candidate_personas:
      - "Asset Manager (owns the lifecycle + portfolio surface)"
      - "Contract / Renewal Administrator (owns ITAM-CONTRACTS)"
      - "Asset Data Steward (owns ITAM-NORMALIZATION-CATALOG reconciliation)"
    extra_phase_p_triage: "2026-06-02"

  - id: B1A-SELF-CONTAIN
    summary: "M9 self-containment violation on module 60: saas_applications consumer/required points at an SMP-mastered entity. DESTRUCTIVE fix (rewrite role/necessity on an existing DMDO row), so surfaced, not executed."
    finding: |
      DMDO id=224 on ITAM-PORTFOLIO-REPORTING (module 60): data_object 61 (saas_applications, mastered by SMP module 30), role=consumer, necessity=required, not embedded_master here. A required consumer on another domain's master breaks module self-containment (M9).
    recommended_fix: |
      Either (a) set DMDO id=224 necessity='optional' (portfolio reporting can render without SaaS rows present, presence-conditional), or (b) convert to embedded_master and carry a local saas_applications shell on module 60. Recommended: (a) necessity='optional' is the lighter fix; portfolio TCO rollup degrades gracefully when SaaS feeds are absent. Either is a rewrite of an existing non-empty DMDO row and needs your sign-off before write.
    extra_m9_shapes:
      - {dmdo_id: 224, entity: saas_applications, data_object_id: 61, module: ITAM-PORTFOLIO-REPORTING, module_id: 60, role: consumer, necessity: required, master_domain: SMP, master_module: 30}
    extra_phase_p_triage: "2026-06-02"

b1b:
  - id: B1B-H8
    summary: APQC tag for cross-domain handoff 31 (ITSM -> ITAM-LIFECYCLE, service_incident.asset_failure) deferred to Discover Pass 3 pending ITSM-side PCF attribution.
    finding: |
      Handoff 31 sits between ITSM incident management (PCF 20903 family) and ITAM asset-record maintenance (PCF 1552 / 19249). The current substring tagger may already attach an ITSM-side PCF; let Discover Pass 3 reconcile cross-domain attribution before this audit force-tags it.
    blocked_by:
      - {type: depends_on, ref: discover_pass_3_itsm_attribution, reason: ITSM-side PCF lookup must reconcile incident vs asset-record framing first}
    affected_handoffs:
      - {handoff_id: 31, direction: inbound, source_domain: ITSM, target_domain: ITAM, trigger_event: service_incident.asset_failure, payload: asset_lifecycle_events, null_field: none}

  - id: B1B-H9
    summary: APQC tag for cross-domain handoff 799 (KUBE-PLAT -> ITAM-NORMALIZATION-CATALOG, kubernetes_cluster.provisioned) deferred pending KUBE-PLAT scoping.
    finding: |
      Kubernetes container registration is closer to platform-discovery than fixed-asset accounting; APQC has no clean cloud-platform-registration entry. Defer pending KUBE-PLAT audit decisions about whether kube clusters belong in the asset register at all. Also linked to B2-MOD57 (does module 57 master anything).
    blocked_by:
      - {type: domain_audit, blocking_domain: KUBE-PLAT, milestone: scope_decision_for_kube_clusters_in_asset_register}
      - {type: user_decision, ref: B2-MOD57}
    affected_handoffs:
      - {handoff_id: 799, direction: inbound, source_domain: KUBE-PLAT, target_domain: ITAM, trigger_event: kubernetes_cluster.provisioned, payload: kubernetes_clusters, null_field: source_domain_module_id}

  - id: B1B-S4
    summary: "Rewrite domains.business_logic on ITAM (row 3) to remove em-dash and switch British 'Normalisation' to American 'Normalization'. DESTRUCTIVE (overwrite of a non-empty value), awaits user OK on exact wording."
    finding: |
      domains.business_logic for ITAM (id 3) currently reads (em-dash marked <U+2014>): "Normalisation tables (the same hardware/software model expressed inconsistently across feeds) are the small irreducible kernel <U+2014> they require maintained reference data, not a runtime engine." Both the em-dash (forbidden project-wide) and the British spelling violate project rules. The em-dash is still live in the database as of 2026-06-07.
    recommended_fix: |
      PATCH to: "Normalization tables (the same hardware/software model expressed inconsistently across feeds) are the small irreducible kernel, they require maintained reference data, not a runtime engine." Overwrite of a non-empty value, so needs your OK on the exact wording before write.
    blocked_by:
      - {type: user_decision, ref: B1B-S4_wording_confirmation}

b2:
  - id: B2-CONFIRM-N-FIXES
    summary: "DESTRUCTIVE: wipe forbidden Rule #15 notes strings on 12 handoff rows (8 cross-domain + 4 intra-domain). Surfaced, not executed (overwrite of non-empty values)."
    question: |
      Approve wiping handoffs.notes='' on the 12 rows below? All 12 still carry forbidden Rule #15 content (8 cross-domain "source/target NULL until X is modularized" annotations; 4 intra-domain schema-restatements). The prior audit named these exact ids and Rule #15 rescinds the write-time license that authored them, but PATCH notes='' overwrites a non-empty value, which is destructive (Rule #21), so it needs your sign-off. The unmodularized counter-parties (GRC, FIN, HAM, IGA, RMM, KUBE-PLAT, APM) live in this audit's history report-only follow-ups, not in the notes column.
    options:
      - "(a) Single loader, all 12 rows; surgical idempotent PATCH notes='' (recommended)."
      - "(b) Split: 8 cross-domain wipes first, 4 intra-domain second."
      - "(c) Preserve as-is (retroactively accept the current notes strings)."
    affected_cross_domain: [462, 632, 633, 634, 635, 645, 799, 853]
    affected_intra_domain: [1083, 1084, 1085, 1086]

  - id: B2-MOD57
    summary: ITAM-NORMALIZATION-CATALOG (module 57) has zero own data_objects but receives 2 inbound cross-domain handoffs.
    question: |
      Module 57 is a computed reconciliation layer with no own data_objects, yet handoffs 799 (KUBE-PLAT) and 853 (APM) target it with payloads kubernetes_clusters (448) and technology_platforms (269). Should we (a) re-route the inbounds to ITAM-LIFECYCLE which masters asset_lifecycle_events and can record the registration as a lifecycle event, (b) add a real master to module 57 such as asset_taxonomies / normalization_rules / vendor_normalizations, or (c) re-classify module 57 as module_kind='starter' since it has no master surface?
    options:
      - "(a) Re-route inbounds to ITAM-LIFECYCLE; module 57 stays a derived analytical layer."
      - "(b) Add asset_taxonomies / normalization_rules master to module 57."
      - "(c) Re-classify module 57 as starter."
    why: |
      The two inbound handoffs arrive at a module that masters nothing, which leaves the deployer / fact-sheet emitter with no consumer DMDO row to attribute the inbound to. The decision also gates b3 B3-NORM-RULES (normalization_rules candidate) and B3-COST-ALLOC.

  - id: B2-MOD60
    summary: ITAM-PORTFOLIO-REPORTING (module 60) has 1 consumer DMDO and zero masters.
    question: |
      Should module 60 master a portfolio_snapshots entity that captures point-in-time TCO and portfolio-position rows, or remain a derived analytical layer over upstream masters?
    options:
      - "(a) Add portfolio_snapshots (master + required) to module 60."
      - "(b) Accept module 60 as a derived analytical layer; no master."
    why: |
      Same architectural shape as B2-MOD57. The b3 candidate B3-PORTFOLIO-SNAP depends on this decision.

  - id: B2-S2P-PO
    summary: purchase_orders (73) has no domain_module_data_objects master row anywhere in the catalog; canonical owner is S2P per legacy domain_data_objects only.
    question: |
      Schedule an S2P b1 audit to close the master gap, or accept it as a long-standing legacy gap that ITAM-LIFECYCLE consumes through?
    options:
      - "(a) Schedule S2P b1 audit; ITAM-LIFECYCLE consumer DMDO (id 223) stays valid once S2P models the master at the module grain."
      - "(b) Accept legacy gap; ITAM-LIFECYCLE consumer points at a data_object with no module-level canonical owner."
    why: |
      The local fix is a no-op (the consumer DMDO is correct on ITAM-LIFECYCLE side); only S2P can author the master.

  - id: B2-GDPR
    summary: GDPR applicability on ITAM is marked conditional.
    question: |
      Is "conditional" still right, or should it be tightened to "mandatory" given that EU deployments will trigger GDPR coverage on the embedded users edges and the org_units / hcm reference shape?
    options:
      - "(a) Upgrade GDPR applicability to mandatory."
      - "(b) Keep conditional; deployments outside EU jurisdictions may legitimately not trigger."
    why: |
      Tightening propagates compliance signals through the catalog; loosening keeps room for non-EU-only deployments. The audit cannot resolve it without product / legal input.

  - id: B2-CROSS-CUT-CAPS
    summary: Cross-cutting capability rename for ITAM-NORMALIZATION (533) and ITAM-RECONCILIATION (537).
    question: |
      Should we rename these two capabilities to domain-neutral ASSET-NORMALIZATION / ASSET-RECONCILIATION and add capability_domains rows linking each to HAM, SAM, SMP, FINOPS, EAM (5 sub-domains each)?
    options:
      - "(a) Rename + link as cross-cutting; matches the cross-cutting capability convention (>=3 domains)."
      - "(b) Keep ITAM-prefixed; the substrate behavior is genuinely scoped to the umbrella domain."
    why: |
      Both capabilities describe substrate behaviors the sub-domains share. The convention says >=3 domains qualifies; 5 sub-domains is a clear pass. (A rename is a destructive overwrite, hence a b2.)

  - id: B2-LIFECYCLE-EXEMPT
    summary: "Config-shape lifecycle exemption for asset_lifecycle_events (55) is now structural via entity_type='operational_record' (set 2026-06-07). Confirm the framing."
    question: |
      asset_lifecycle_events (55) was classified entity_type='operational_record' on 2026-06-07, which per Rule #12 makes "no lifecycle states" a pass (every state is captured by the event row itself). Confirm this resolves the prior B12 config-shape question, or do you want a small lifecycle state machine (recorded -> superseded?) instead?
    options:
      - "(a) Confirm: operational_record classification makes the exemption structural; no notes, no state machine. (Recommended, already in place.)"
      - "(b) Re-evaluate; add a small lifecycle state machine."
    why: |
      The classification is already written (record_status='new'); this item only asks you to confirm the framing or override it.
  - id: B2-B9D-OWN-1390
    summary: "IT Asset Management: name an owner for \"Process and record fixed-asset adjustments, enhancements, revaluations, and transfers\" (no one is responsible for it today)"
    question: |
      Core Financial Management forwards asset lifecycle event to IT Asset Management to process and record fixed-asset adjustments, enhancements, revaluations, and transfers, but IT Asset Management does not yet have anyone assigned to process and record fixed-asset adjustments, enhancements, revaluations, and transfers, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work IT Asset Management owns, and assign a named owner once IT Asset Management sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment IT Asset Management decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-ITAM.md q11.
    extra_b9d_added: "2026-06-13"

b3:
  - id: B3-ASSET-ASSIGN
    candidate: asset_assignments
    rationale: |
      Flagship platforms model current-holder (assigned employee, current location, cost center) as an entity distinct from asset lifecycle events. Today ITAM-LIFECYCLE captures every state change as an event but has no first-class "who currently holds this asset" master, which forces downstream consumers to derive the holder from the most recent assignment event. A first-class assignments master would also be the natural target for HCM employee.terminated handoffs (currently the payload is asset_lifecycle_events).
    vendor_evidence: [ServiceNow ITAM, Snow Atlas, Flexera One]
    proposed_module: ITAM-LIFECYCLE

  - id: B3-ASSET-AUDITS
    candidate: asset_audits
    rationale: |
      Flagship platforms model periodic physical-asset audit cycles as a scoped reconciliation entity, distinct from point-in-time asset_lifecycle_events. The audit row captures the scope (location, asset_category), the schedule, the participants, and the reconciliation outcome.
    vendor_evidence: [Snow Atlas, Flexera One]
    proposed_module: ITAM-LIFECYCLE

  - id: B3-NORM-RULES
    candidate: normalization_rules / asset_taxonomies
    rationale: |
      Vendor + product taxonomies plus customer-side overrides. Today ITAM-NORMALIZATION-CATALOG (module 57) masters nothing. Adding a normalization_rules or asset_taxonomies master would give module 57 a real master surface; depends on B2-MOD57 resolution.
    vendor_evidence: [Flexera Technopedia, Snow SLM]
    proposed_module: ITAM-NORMALIZATION-CATALOG

  - id: B3-PORTFOLIO-SNAP
    candidate: portfolio_snapshots
    rationale: |
      Point-in-time portfolio snapshots for historical rollup reporting. Without it, ITAM-PORTFOLIO-REPORTING (module 60) cannot store its derivations and depends on recomputation on every read. Resolution depends on B2-MOD60.
    vendor_evidence: [ServiceNow ITAM, Flexera One]
    proposed_module: ITAM-PORTFOLIO-REPORTING

  - id: B3-COST-ALLOC
    candidate: cost_allocations
    rationale: |
      Cost-center / cost-allocation rules over asset spend, resolved at reporting time. Boundary with FINOPS, which also models cost allocations against cloud spend specifically. Decision on which domain owns the master is a Phase 0 finding pending vetting.
    vendor_evidence: [Snow Atlas, ServiceNow ITAM]
    proposed_module: ITAM-PORTFOLIO-REPORTING

  - id: B3-CONTRACT-RENEWALS
    candidate: contract_renewal_events
    rationale: |
      Renewal as a first-class event distinct from contract state changes (separate workflow with its own approvals, separate accounting impact). Could either become its own master or fold into asset_lifecycle_events with a typed event_subtype.
    vendor_evidence: [Flexera One, ServiceNow ITAM]
    proposed_module: ITAM-CONTRACTS

  - id: B3-USAGE-METRICS
    candidate: usage_metrics
    rationale: |
      SAM-adjacent: usage metering for software and SaaS. May belong in SAM or SMP rather than the ITAM umbrella. Phase 0 vetting would arbitrate ownership; current placement in ITAM-PORTFOLIO-REPORTING is speculative.
    vendor_evidence: [Flexera One, Snow License Manager]
    proposed_module: ITAM-PORTFOLIO-REPORTING

  - id: B3-CONTRACT-OBLIGATIONS
    candidate: contract_obligations / asset_cost_records
    rationale: |
      Surfaced by the 2026-06-16 market re-audit (Flexera One, Ivanti Neurons for ITAM, ServiceNow ITAM, USU,
      Lansweeper). contract_obligations: the audit-defense obligation register (true-ups, notice periods, minimum
      commitments) hanging off ITAM-CONTRACTS, beyond the B3-CONTRACT-RENEWALS event. asset_cost_records: per-asset
      cost lines feeding the TCO rollup in ITAM-PORTFOLIO-REPORTING (the data behind B2-MOD60's portfolio_snapshots,
      related to B3-COST-ALLOC). Both additive; non-blocking. The re-audit confirms the umbrella's contract and TCO
      surfaces are thin (B2-MOD57 empty, B2-MOD60 masters nothing). Full surface: .tmp_deploy/ITAM-market-surface-2026-06-16.json.
    vendor_evidence: [Flexera One, Ivanti Neurons for ITAM, ServiceNow ITAM, USU, Lansweeper]
    proposed_module: "contract_obligations->ITAM-CONTRACTS (58); asset_cost_records->ITAM-PORTFOLIO-REPORTING (60)"
