b2:
  - id: B2-1
    summary: "Module split for BANK-OPS, gates the build and ~9 b1b items."
    question: "Which module shape for BANK-OPS? (a) 7-module: BANK-OPS-ORIGINATION + BANK-OPS-ACCOUNT-MGMT + BANK-OPS-KYC-AML + BANK-OPS-PAYMENTS + BANK-OPS-CASES + BANK-OPS-LOAN-SERVICING + BANK-OPS-REGULATORY; (b) 5-module collapse KYC-AML + REGULATORY into BANK-OPS-COMPLIANCE; (c) 6-module collapse ORIGINATION + ACCOUNT-MGMT into BANK-OPS-ONBOARDING; (d) defer KYC-AML out to queued KYC-AML-PLATFORM domain (rehomes B1B-M1 / B1B-M4 / partly B1B-M2); (e) some other shape."
    options: ["a-7module", "b-5module-compliance", "c-6module-onboarding", "d-defer-kyc-aml-platform", "e-other"]
    why: "Drives the entire build (B1A-BUILD, B1B-S1, B1B-S2), the M-band, E-band, F2-F5, the lifecycle realizing module FKs (B1B-B6), and re-homes several Bucket 1 / Bucket 3 candidates. Phase 0 (2026-06-08) recommends (a) the 7-module shape on named-vendor evidence: origination vs servicing are separate marketed markets (ICE Encompass ~50% origination share vs Black Knight MSP servicing), and KYC-AML is a standalone specialist market (Oracle FCCM / NICE Actimize sell it freestanding). (b) collapse matches Temenos / Fiserv / FIS bundling FCM into the core; (c) collapse matches nCino / Backbase one-journey onboarding; (d) defer is supported by the freestanding-specialist evidence but loses in-platform integration. See .tmp_deploy/BANK-OPS-phase0-2026-06-08.md."

  - id: B2-2
    summary: "banking_cases vs CSM customer_cases reconciliation."
    question: "Resolve overlap between BANK-OPS banking_cases (id 606) and CSM customer_cases (id 103). Rows 462/463 already use verb 'opens' which reads chained. (a) keep banking_cases as own master, rewrite verb to triggers/spawns; (b) demote banking_cases to embedded_master of customer_cases (CSM-owned); (c) keep both with disambiguated verbs. NOTE (a) and (b) involve overwriting/restructuring existing rows (destructive) -> needs sign-off."
    options: ["a-rewrite-verb", "b-demote-to-embedded", "c-disambiguate"]
    why: "Option (b) collapses ~one module worth of work (no BANK-OPS-CASES module needed) and changes B1B-M1-M4 module placement for any banking-case-shaped masters. Phase 0 (2026-06-08) backs (a): banking-ops vendors model investigation / dispute cases as a first-class object distinct from generic customer-service cases (Backbase disputes/case-mgmt plane; NICE Actimize financial-crime alert-and-case management), and card-network disputes/chargebacks carry their own time-bounded lifecycle (reason codes, Reg E windows) a CSM case shell cannot represent."

  - id: B2-3
    summary: "banking_transactions lifecycle shape."
    question: "banking_transactions (id 609) is now classified operational_record (no lifecycle states required; B12 passes regardless). Do you still want a state machine on it? (a) full workflow with dispute/reverse gates (pending / posted / reconciled / disputed / reversed); (b) slim 3-state pending/posted/reconciled with no permission gates; (c) leave it stateless as a pure ledger record."
    options: ["a-full", "b-slim-no-gates", "c-leave-stateless"]
    why: "Phase 0 (2026-06-08) backs (c) leave-stateless: the core vendors run an immutable, append-only, double-entry ledger (Thought Machine Vault Core 'real-time, immutable, append-only ledger'; Mambu and Temenos same double-entry sub-ledger), so a posted entry is never mutated, a reversal/dispute is a new correcting entry and the dispute itself lives on banking_cases (B2-2). Adding a workflow machine would overlay state the vendors do not."

  - id: B2-5
    summary: "Verb override wording for 4 ambiguous workflow-gate verbs."
    question: "Pick verb wording for permission codes: (a) loan_applications.approved -> approve_loan_application; (b) wire_transfers.approved -> approve_wire_transfer (verify OFAC vs dual-approval); (c) banking_kyc_reviews.cleared -> clear_kyc_review or disposition_kyc_review; (d) banking_cases.resolved -> resolve_banking_case or close_case."
    options: ["per-item user wording"]
    why: "Drives the permission_verb_override on B1B-B6 lifecycle states."

  - id: B2-7
    summary: "GRC pairwise reconciliation timing."
    question: "GRC clears weight-3 threshold for pairwise. (a) defer until M1 cured (most legs blocked on module attribution); (b) run lightweight GRC pairwise now to surface candidate missing handoffs from GRC side; (c) run CSM and ERP-FIN pairwise too despite weight 2."
    options: ["a-defer-until-m1", "b-lightweight-grc-now", "c-all-three"]

  - id: B2-8
    summary: "H1 catalog-quality approvals on 7 agent_curated handoff_processes rows."
    question: "Per Rule #1, agent cannot self-approve. Stamp record_status='approved' on (handoff_id, process_id) pairs: 886/70, 887/70, 888/323, 889/1438, 890/196, 891/323, 892/1438? Pair 890/196 was originally flagged 'medium L3 confidence'. All 7 verified present at record_status='new' on 2026-06-07; coverage is complete, only the approval stamp is owed."
    options: ["a-approve-all", "b-approve-except-890", "c-per-row-review", "d-keep-new"]
    why: "Headline H1 quality measure is approved-count, not agent_curated-count. This is a destructive (record_status flip to approved) step the agent never does."

