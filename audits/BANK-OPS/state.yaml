b2:
  - id: B2-1
    summary: "Module split for BANK-OPS, gates ~10 b1b items."
    question: "Which module shape for BANK-OPS? (a) 7-module: BANK-OPS-ORIGINATION + BANK-OPS-ACCOUNT-MGMT + BANK-OPS-KYC-AML + BANK-OPS-PAYMENTS + BANK-OPS-CASES + BANK-OPS-LOAN-SERVICING + BANK-OPS-REGULATORY; (b) 5-module collapse KYC-AML + REGULATORY into BANK-OPS-COMPLIANCE; (c) 6-module collapse ORIGINATION + ACCOUNT-MGMT into BANK-OPS-ONBOARDING; (d) defer KYC-AML out to queued KYC-AML-PLATFORM domain (rehomes B1B-M1 / B1B-M4 / partly B1B-M2); (e) some other shape."
    options: ["a-7module", "b-5module-compliance", "c-6module-onboarding", "d-defer-kyc-aml-platform", "e-other"]
    why: "Drives the entire M-band, E-band, F2-F5, lifecycle realizing module FKs, and re-homes several Bucket 1 / Bucket 3 candidates."

  - id: B2-2
    summary: "banking_cases vs CSM customer_cases reconciliation."
    question: "Resolve overlap between BANK-OPS banking_cases (id 606) and CSM customer_cases (id 103). Rows 462/463 already use verb 'opens' which reads chained. (a) keep banking_cases as own master, rewrite verb to triggers/spawns; (b) demote banking_cases to embedded_master of customer_cases (CSM-owned); (c) keep both with disambiguated verbs."
    options: ["a-rewrite-verb", "b-demote-to-embedded", "c-disambiguate"]
    why: "Option (b) collapses ~one module worth of work (no BANK-OPS-CASES module needed) and changes B1B-M1-M4 module placement for any banking-case-shaped masters."

  - id: B2-3
    summary: "banking_transactions lifecycle shape."
    question: "B12 for banking_transactions (id 609): (a) full workflow with dispute/reverse gates (pending / posted / reconciled / disputed / reversed); (b) slim 3-state pending/posted/reconciled with no permission gates; (c) skip the master entirely from B12 (config-shape exemption, surface to user per Rule #12)."
    options: ["a-full", "b-slim-no-gates", "c-skip-config-shape"]

  - id: B2-4
    summary: "Channel pattern for compliance fan-out events."
    question: "For wire_transfer.sanctions_hit and banking_transaction.suspicious (compliance team + originator + manager): use (a) one notify_team tool (broadcast), (b) multiple notify_person rows, or (c) keep send_email despite F7?"
    options: ["a-notify-team", "b-multi-notify-person", "c-keep-send-email"]
    why: "Drives B1B-S4 fix shape."

  - id: B2-5
    summary: "Verb override wording for 4 ambiguous workflow-gate verbs."
    question: "Pick verb wording for permission codes: (a) loan_applications.approved -> approve_loan_application; (b) wire_transfers.approved -> approve_wire_transfer (verify OFAC vs dual-approval); (c) banking_kyc_reviews.cleared -> clear_kyc_review or disposition_kyc_review; (d) banking_cases.resolved -> resolve_banking_case or close_case."
    options: ["per-item user wording"]
    why: "Drives the permission_verb_override on B1B-B6 lifecycle states."

  - id: B2-6
    summary: "Add Risk / Compliance C-band contributor on BANK-OPS."
    question: "Add a third business_function_domains row mapping the risk/compliance function (GRC owner) as a contributor on BANK-OPS? Depends on the function spine naming."
    options: ["a-add-risk-compliance", "b-leave-current-two"]

  - id: B2-7
    summary: "GRC pairwise reconciliation timing."
    question: "GRC clears weight-3 threshold for pairwise. (a) defer until M1 cured (most legs blocked on module attribution); (b) run lightweight GRC pairwise now to surface candidate missing handoffs from GRC side; (c) run CSM and ERP-FIN pairwise too despite weight 2."
    options: ["a-defer-until-m1", "b-lightweight-grc-now", "c-all-three"]

  - id: B2-8
    summary: "H1 catalog-quality approvals on 7 agent_curated handoff_processes rows."
    question: "Per Rule #1, agent cannot self-approve. Stamp record_status='approved' on (handoff_id, process_id) pairs: 886/70, 887/70, 888/323, 889/1438, 890/196, 891/323, 892/1438? Pair 890/196 was originally flagged 'medium L3 confidence'."
    options: ["a-approve-all", "b-approve-except-890", "c-per-row-review", "d-keep-new"]
    why: "Headline H1 quality measure is approved-count, not agent_curated-count."

  - id: B2-tagline-text
    summary: "Supply tagline + description text for A4."
    question: "Rule #20 requires user-supplied wording for catalog_tagline and catalog_description on domains.id=43. Provide buyer-shaped copy."
    options: ["user-text"]

  - id: B2-aliases-text
    summary: "Confirm 6 domain_aliases for BANK-OPS."
    question: "Confirm or rewrite list: banking operations, retail banking ops, commercial banking ops, deposit operations, core banking ops, bank back-office."
    options: ["confirm", "rewrite", "skip"]

