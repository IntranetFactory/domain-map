b2:
  - id: B2-S1
    summary: OBS module split shape
    question: |
      What is the right module split for OBS, given 5 to 7 capabilities are
      expected and the flagship vendors market three distinct product pillars
      (APM, log analytics, SLO + reliability)?
    options:
      - "(a) 3 modules: OBS-APM (metrics + traces + dashboards), OBS-LOG-ANALYTICS (log_entries + saved searches + retention), OBS-SLO-RELIABILITY (SLOs + error tracking + on-call hooks), mirrors Datadog / Dynatrace / New Relic"
      - "(b) 2 modules: OBS-TELEMETRY-PIPELINE (collection + indexing across metrics + logs + traces) + OBS-RELIABILITY-INSIGHTS (SLOs + error tracking + dashboards)"
      - "(c) 1 module: OBS-PLATFORM bundles everything, likely M2 violation if capability_count >= 3"
    why: |
      Editorial / product-shape decision. Mode b1's structural pass cannot
      decide between the three shapes; the answer cascades into B1-S2 (each
      capability attaches to a realizing module), B1-S7 / B1-S10 / B1-S12 /
      B1-S14, and B3-S2 (LOG-MGMT / IRM / RUM promotion may make (b) or (c)
      more defensible if log analytics migrates out).

  - id: B2-S2
    summary: B9 attribution defects on events 6, 7, 115 and the handoffs they ride
    question: |
      How should the agent resolve the three trigger_events whose
      `data_object_id` points at non-OBS masters but which sit on OBS-published
      handoffs?
    options:
      - "(a) DELETE handoffs 54 (event 6, monitoring_alerts ITOM-owned) and 56 (event 7, anomaly_detections AIOPS-owned); for event 115 (slo.breached) PATCH data_object_id 47 to 91 and keep handoff 55 (payload is the resulting incident on ITSM). Recommended."
      - "(b) OBS legitimately publishes derived alerts / anomalies; master monitoring_alerts and anomaly_detections locally on OBS and demote the canonical masters elsewhere to embedded_master. Less likely; AIOPS canonically owns anomaly detection."
      - "(c) Leave events as-is; tolerate the attribution defect. NOT recommended (fails substrate sanity in mode b2)."
    why: |
      Cannot resolve unilaterally, option (b) reshapes ITOM and AIOPS,
      option (a) deletes structural rows. User authority required.

  - id: B2-S3
    summary: Pattern flag positive re-evaluation per Rule #12
    question: |
      Confirm or deny per-flag PATCH on the 5 OBS masters.
    options:
      - "service_level_objectives.has_submit_lock = true / false / defer"
      - "service_level_objectives.has_single_approver = true / false / defer"
      - "error_groups.has_single_approver = true / false / defer"
      - "log_entries.has_personal_content = true / false / defer (open: depends on whether logs may carry user PII)"
      - "metric_series + distributed_traces, confirm all three flags stay false (write-once telemetry)"
    why: |
      Pattern flags are workflow-shape decisions the user owns. Per Rule #15
      the consideration cannot be recorded in `notes`; this audit IS the
      approved persistence surface.

  - id: B2-S4
    summary: Rule #15 baseline confirmation on skill_tools.notes
    question: |
      Confirm the 7 existing skill_tools rows for skill 88 carry `notes=''`
      (Rule #15 default) and no annotation is wanted, or surface specific
