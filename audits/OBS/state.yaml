b3:
  - id: B3-S1
    candidate: |
      Missing observability entities (vendor-surface candidates): `dashboards`,
      `monitors` (the configured rule, distinct from a fired alert),
      `synthetic_tests`, `notification_policies`, `service_inventory` (the
      registered service-side metadata, distinct from CMDB service_maps),
      `runbooks`, `obs_incidents`, `postmortems`, `correlation_groups`. The 5
      currently-loaded masters are the telemetry + reliability headline-noun set;
      the workflow substrate (configured rules, runbooks, incidents, postmortems,
      notifications, dashboards) is largely absent.
    rationale: |
      Flagship observability vendors model these as first-class. The catalog ships
      the headline nouns and skips the substrate. Some candidates route to
      LOG-MGMT / IRM / RUM if those promote (B3-S2). Non-blocking; surfaced once.
    proposed_module: null
    extra_route_dependencies:
      - {entity: "obs_incidents", routes_to_on_promotion: "IRM"}
      - {entity: "postmortems", routes_to_on_promotion: "IRM"}
      - {entity: "runbooks", routes_to_on_promotion: "IRM"}
      - {entity: "notification_policies", routes_to_on_promotion: "IRM"}

  - id: B3-S2
    candidate: |
      Modularization hypothesis: split log analytics into LOG-MGMT, on-call /
      incident response into IRM, real-user monitoring into RUM.
    rationale: |
      Standalone markets exist for log management, on-call / IRM, and real-user
      monitoring distinct from server-side APM. OBS currently risks bundling 3 to 4
      markets. NOTE: any structural split is a B2 decision, not a b3; kept here only
      as the candidate rationale that informs B2-S1's shape. Surfaced once.
    proposed_module: null
    extra_promotion_targets: [LOG-MGMT, IRM, RUM]
    extra_repartition_plan: |
      After promotion: log_entries master stays in OBS for tracing-attached logs but
      log retention / SIEM-style indexing moves to LOG-MGMT; incidents / postmortems
      / on-call_schedules / runbooks route to IRM; session_replays / page_loads route
      to RUM. Aliases on log_entries (89) and error_groups (92) were DEFERRED on
      2026-06-07 for this reason (they may migrate to LOG-MGMT / IRM).

