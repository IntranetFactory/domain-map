# UNBUILT domain: 0 domain_modules (M1 hard fail), 0 capability_domains. Per the
# Validate-mode unbuilt rule the agent does NOT scaffold the module set; the BUILD
# is surfaced as a single user decision (B2-S1 IS the build's shape decision) and the
# whole module-dependent cascade is LEFT until the build lands. Agent-doable
# additive/corrective work that is NOT module-dependent was executed 2026-06-07
# (entity_type on all 5 masters, catalog UX on the domains row, generic aliases on
# the 3 OBS-stable masters). Everything still open is either a user decision (B2),
# a destructive step needing sign-off, the unbuilt cascade, or backlog (b3).
# Therefore next_action_by = user.

b2:
  - id: B2-S1
    summary: BUILD OBS (module split shape) - unbuilt domain, this decision gates the entire build
    question: |
      OBS is unbuilt: 0 domain_modules, 0 capability_domains. The agent will not
      scaffold a module set without the shape decision. What is the right module
      split, given 5 to 7 capabilities are expected and the flagship vendors market
      three distinct product pillars (APM, log analytics, SLO + reliability)?
    options:
      - "(a) 3 modules: OBS-APM (metrics + traces + dashboards), OBS-LOG-ANALYTICS (log_entries + saved searches + retention), OBS-SLO-RELIABILITY (SLOs + error tracking + on-call hooks). Mirrors the flagship APM / logs / reliability split."
      - "(b) 2 modules: OBS-TELEMETRY-PIPELINE (collection + indexing across metrics + logs + traces) + OBS-RELIABILITY-INSIGHTS (SLOs + error tracking + dashboards)."
      - "(c) 1 module: OBS-PLATFORM bundles everything. Likely M2 violation if capability_count >= 3."
    why: |
      Editorial / product-shape decision and the gate for the entire build. The
      answer cascades into the module set, capabilities, lifecycle states (need
      domain_module_id), the B10b handoff-module backfill (22 cross-domain
      handoffs carry NULL module FKs), intra/cross-domain relationships, the
      domain-grain system skill toolset, and Phase P (personas + RACI) if the
      result is multi-module. Cross-cuts B3-S2 (LOG-MGMT / IRM / RUM promotions
      may make (b) or (c) more defensible if log analytics / IRM / RUM migrate out).
    cascade_left_until_build:
      - "capability_domains (5 to 7 capabilities) + domain_module_capabilities"
      - "domain_module_data_objects master rows for the 5 masters (migrate off the legacy domain_data_objects rollup)"
      - "data_object_lifecycle_states for service_level_objectives (draft/active/archived) and error_groups (new/triaging/resolved/regressed); the 3 telemetry masters are operational_record and exempt"
      - "B10b backfill: source_domain_module_id on 14 outbound + target_domain_module_id on 8 inbound OBS cross-domain handoffs"
      - "intra-domain + users + outbound cross-domain data_object_relationships"
      - "domain-grain system skill toolset via domain_module_tools (NOT per-module skills; see supersession header)"
      - "Phase P personas + role_modules + process_raci if multi-module (DEFERRED; do not author until build)"
    extra_phase_p_triage: "2026-06-02"

  - id: B2-S2
    summary: B9 attribution defects on events 6, 7, 115 (DESTRUCTIVE - DELETE handoffs / re-attribute trigger_event)
    question: |
      Three trigger_events whose data_object_id points at non-OBS masters sit on
      OBS-published handoffs. All three resolutions are destructive (DELETE or
      overwrite a non-empty value) and need sign-off.
    live_state_2026_06_07:
      - "event 6 (monitoring_alert.threshold_breached) data_object_id=85 monitoring_alerts (ITOM-mastered), rides OBS outbound handoff 54 -> ITOM"
      - "event 7 (anomaly_candidate.detected) data_object_id=94 anomaly_detections (AIOPS-mastered), rides OBS outbound handoff 56 -> AIOPS"
      - "event 115 (slo.breached) data_object_id=47 service_incidents (ITSM-mastered), rides OBS outbound handoff 55 -> ITSM"
    options:
      - "(a) DELETE handoffs 54 (event 6) and 56 (event 7); for event 115 PATCH trigger_events.id=115 data_object_id 47 -> 91 (service_level_objectives) and keep handoff 55 (payload is the resulting incident on ITSM). Recommended."
      - "(b) OBS legitimately publishes derived alerts / anomalies: master monitoring_alerts and anomaly_detections locally on OBS and demote the canonical masters elsewhere to embedded_master. Less likely; AIOPS canonically owns anomaly detection."
      - "(c) Leave as-is; tolerate the attribution defect. NOT recommended."
    why: |
      Option (a) DELETEs structural rows and re-attributes a trigger_event (both
      destructive, never done unapproved). Option (b) reshapes ITOM and AIOPS.
      User authority required.
    affected_handoffs:
      - {handoff_id: 54, event_id: 6, target_domain: ITOM, recommended: DELETE}
      - {handoff_id: 56, event_id: 7, target_domain: AIOPS, recommended: DELETE}
      - {handoff_id: 55, event_id: 115, target_domain: ITSM, recommended: "keep; PATCH event 115 data_object_id 47 -> 91"}

  - id: B2-S3
    summary: Pattern flag positive re-evaluation per Rule #12 (DESTRUCTIVE - overwrite existing false values on workflow masters)
    question: |
      Confirm or deny per-flag PATCH on the OBS workflow masters. All 5 masters are
      currently has_personal_content=false / has_submit_lock=false /
      has_single_approver=false (live-confirmed 2026-06-07). entity_type is now set
      (91, 92 = operational_workflow; 88, 89, 90 = operational_record), so the flag
      consideration applies only to the two workflow masters.
    options:
      - "service_level_objectives (91).has_submit_lock = true / false / defer"
      - "service_level_objectives (91).has_single_approver = true / false / defer"
      - "error_groups (92).has_single_approver = true / false / defer"
      - "log_entries (89).has_personal_content = true / false / defer (open: depends on whether logs may carry user PII)"
      - "metric_series (88) + distributed_traces (90): confirm all flags stay false (write-once telemetry)"
    why: |
      Pattern flags are workflow-shape decisions the user owns, and flipping a
      flag overwrites an existing non-empty boolean. Per Rule #15 the reasoning
      cannot be recorded in notes; this audit is the persistence surface.

  - id: B2-APQC-616-617
    summary: APQC tag for the 2 still-untagged OBS cross-domain handoffs (616, 617 -> VSDP) - medium confidence, needs PCF confirmation
    question: |
      Handoffs 616 (error_group.new_signature) and 617 (error_group.regression_detected),
      both OBS -> VSDP, are the only 2 of 22 OBS cross-domain handoffs still without a
      handoff_processes tag (614 and 615 were tagged since the last snapshot). The
      candidate PCF is medium-confidence; the agent will not insert without your pick.
    options:
      - "(a) Both -> PCF 1262 'Implement software change/release' (external_id 20853, L4): a new error signature / regression triggers a hotfix change-release on VSDP. Recommended."
      - "(b) Defer both to Discover for a cleaner PCF match (no confident L4 child resolved)."
    why: |
      Medium confidence; the prompt's clean-match bar is not met (the state carried
      this as B2-APQC). Insert is held for your PCF confirmation.
    extra_pcf_candidate: {pcf_id: 1262, external_id: "20853", process_name: "Implement software change/release", hierarchy_level: 4}

