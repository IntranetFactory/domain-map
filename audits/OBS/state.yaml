      - "(b) Author specific wording per row (surface text for approval first)."
    why: |
      Positive finding; mode b1 surfaces for explicit confirmation since
      Rule #15 violations have repeated historically.

b3:
  - id: B3-S1
    candidate: |
      Missing observability entities (vendor-surface candidates): `dashboards`,
      `monitors` (the configured rule, distinct from a fired alert),
      `synthetic_tests`, `notification_policies`, `service_inventory` (Datadog
      Service Catalog, distinct from CMDB service_maps), `runbooks`,
      `obs_incidents`, `postmortems`, `correlation_groups`. The 5
      currently-loaded masters are the telemetry + reliability headline-noun
      set; the workflow substrate (configured rules, runbooks, incidents,
      postmortems, notifications, dashboards) is largely absent.
    rationale: |
      Flagship observability vendors model these as first-class. The catalog
      ships the headline nouns and skips the substrate, typical Phase-0-skipped
      gap. Some candidates may route to LOG-MGMT / IRM / RUM if those promote
      (B3-S2).
    vendor_evidence: [Datadog Platform, Dynatrace Platform, New Relic One, Splunk Observability Cloud, Grafana Cloud, Honeycomb]
    proposed_module: null
    extra_route_dependencies:
      - {entity: "obs_incidents", routes_to_on_promotion: "IRM"}
      - {entity: "postmortems", routes_to_on_promotion: "IRM"}
      - {entity: "runbooks", routes_to_on_promotion: "IRM"}
      - {entity: "notification_policies", routes_to_on_promotion: "IRM"}

  - id: B3-S2
    candidate: |
      Modularization hypothesis: split log analytics into LOG-MGMT, on-call /
      incident response into IRM, real-user monitoring into RUM.
    rationale: |
      Splunk Cloud Platform, Sumo Logic, Elastic, Graylog sell standalone log
      management. PagerDuty, Opsgenie, incident.io sell on-call + IRM.
      Datadog RUM, New Relic Browser, Akamai mPulse sell real-user
      monitoring distinct from server-side APM. OBS currently risks bundling
      3 to 4 markets.
    vendor_evidence: [Splunk Cloud Platform, Sumo Logic, Elastic, Graylog, PagerDuty, Opsgenie, "incident.io", Datadog RUM, New Relic Browser, Akamai mPulse]
    proposed_module: null
    extra_promotion_targets: [LOG-MGMT, IRM, RUM]
    extra_repartition_plan: |
      After promotion: log_entries master stays in OBS for tracing-attached
      logs but log retention / SIEM-style indexing moves to LOG-MGMT;
      incidents / postmortems / on-call_schedules / runbooks route to IRM;
      session_replays / page_loads route to RUM.
