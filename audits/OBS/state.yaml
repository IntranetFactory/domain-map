b1a:
  - id: B1A-S6
    summary: PATCH trigger_events.id=115 data_object_id 47 to 91 (slo.breached attributes to service_level_objectives, not service_incidents)
    finding: |
      Trigger event 115 `slo.breached` publishes via OBS handoff 55 with
      `data_object_id=47` (service_incidents, ITSM-mastered on module 38
      ITSM-INCIDENT-MGMT). The SLO breach is OBS-published; the event must
      attribute to OBS master 91 (`service_level_objectives`). Handoff 55's
      own payload (`data_object_id=47`) is correct for the target side, the
      incident is what gets created on ITSM. Only the trigger_event needs the
      PATCH.
    action: |
      semantius call crud postgrestRequest '{"method":"PATCH","path":"/trigger_events?id=eq.115","body":{"data_object_id":91}}'
    affected_events:
      - {id: 115, event_name: "slo.breached", current_category: "state_change", proposed_category: "state_change"}
    extra_current_data_object_id: 47
    extra_proposed_data_object_id: 91

  - id: B1A-H1-S615
    summary: INSERT handoff_processes row for handoff 615 (SLO budget exhausted) pointing at PCF 20903 (Triage IT service delivery incidents)
    finding: |
      Handoff 615 (OBS to ITSM, `service_level_objective.budget_exhausted`,
      payload `service_level_objectives`) is one of 4 cross-domain handoffs
      without an APQC tag (614, 615, 616, 617). Handoff 55 (also OBS to ITSM,
      payload service_incidents) is already tagged process_id=1299 (PCF
      20903 "Triage IT service delivery incidents"); 615 mirrors that
      pattern (budget-exhausted alert spawns the same triage flow on ITSM).
      Confident L4 by mirror.
    action: |
      semantius call crud postgrestRequest '{"method":"POST","path":"/handoff_processes","body":{"handoff_id":615,"process_id":1299,"proposal_source":"agent_curated","role":"implements"}}'
    affected_handoffs:
      - handoff_id: 615
        direction: outbound
        source_domain: OBS
        target_domain: ITSM
        trigger_event: "service_level_objective.budget_exhausted"
        payload: "service_level_objectives"
    extra_pcf_external_id: "20903"
    extra_pcf_process_id: 1299
    extra_pcf_hierarchy_level: 4

