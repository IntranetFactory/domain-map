      `notify_person`/`notify_team` per channel-vs-capability rule.
    action: >-
      Author 4 module-level `skill_type='system'` skills (one per module
      288-291), split/rebind the 10 legacy skill_tools across them (rebinding
      send_email -> notify_person), then DELETE legacy skill 99. Out of the
      modules+entities scope of the 2026-06-02 run; next pass.
