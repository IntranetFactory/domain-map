      290; capital_projects -> 291; property_spaces -> 289; real_estate_properties/
      floor_plans -> 288. Inbound 292 (facility_work_orders) -> target 290.
    action: >-
      PATCH source_domain_module_id on 291->290, 293->290, 294->291, 295->289,
      856->288, 857->288, 858->288; PATCH target_domain_module_id on 292->290.
      Handoff 870 (space_utilization_reports, IWMS-mastered) still needs a
      consumer DMDO decision on a REAL-EST module (B2-S5/design); surface separately.
    affected_handoffs:
      - {handoff_id: 291, direction: outbound, source_domain: REAL-EST, target_domain: FSM, trigger_event: facility_work_order.created, payload: facility_work_orders, null_field: source_domain_module_id}
      - {handoff_id: 292, direction: inbound, source_domain: FSM, target_domain: REAL-EST, trigger_event: facility_work_order.completed, payload: facility_work_orders, null_field: target_domain_module_id}
