      0 intra-domain `data_object_relationships` between REAL-EST's 8 masters
      (real_estate_properties 344, property_leases 345, floor_plans 346,
      property_spaces 347, occupancy_records 348, facility_work_orders 349,
      utility_meter_readings 350, capital_projects 351). Only 1 cross-domain
      relationship exists (351 commissions industrial_assets 475). Modules now
      exist (288-291) so module context is available, but these edges are not
      module-gated.
    action: >-
      Author 8 rows: (a) real_estate_properties has_many floor_plans; (b)
      floor_plans has_many property_spaces; (c) property_spaces has_many
      occupancy_records; (d) real_estate_properties has_many property_leases;
      (e) real_estate_properties has_many utility_meter_readings;
      (f) real_estate_properties has_many facility_work_orders;
      (g) real_estate_properties has_many capital_projects;
      (h) property_spaces has_many facility_work_orders.
      Each row carries verb / inverse_verb / relationship_type=one_to_many /
      relationship_kind=reference / is_required / owner_side='source'.
    affected_masters:
      - {data_object_id: 344, name: real_estate_properties}
      - {data_object_id: 345, name: property_leases}
      - {data_object_id: 346, name: floor_plans}
      - {data_object_id: 347, name: property_spaces}
      - {data_object_id: 348, name: occupancy_records}
      - {data_object_id: 349, name: facility_work_orders}
      - {data_object_id: 350, name: utility_meter_readings}
      - {data_object_id: 351, name: capital_projects}

  - id: B1A-SYS-SKILLS
    summary: >-
      Author 4 per-module `skill_type='system'` skills (Rule #17 -> F2/F3),
      rebind 10 legacy skill_tools, then retire legacy domain-level skill 99 (F1).
    finding: >-
      Modularization landed 4 full modules (288 REAL-EST-PORTFOLIO, 289
      REAL-EST-SPACE-OPS, 290 REAL-EST-FACILITY-OPS, 291 REAL-EST-CAPITAL-PROJECTS).
      The legacy `real-est-system` skill (id 99, domain_id=141,
