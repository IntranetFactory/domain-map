    summary: "Draft `catalog_tagline` + `catalog_description` for REAL-EST (A4 / M8 fail, Rule #20)."
    finding: >-
      `domains.catalog_tagline` and `domains.catalog_description` are empty on
      REAL-EST (id 141). Per Rule #20 these are buyer-voice copy (workflow +
      value), not analyst voice; once non-empty the value is never overwritten
      without explicit per-row approval. M8/A4 catalog UX surface for the now-built
      4-module domain.
    blocked_by:
