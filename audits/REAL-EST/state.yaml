b2:
  - id: B2-S1
    summary: "Module split shape for REAL-EST (open since 2026-05-30)."
    question: >-
      Which module split should REAL-EST adopt? Prior proposal: 4 modules
      (REAL-EST-PORTFOLIO, REAL-EST-SPACE-OPS, REAL-EST-FACILITY-OPS,
      REAL-EST-CAPITAL-PROJECTS). Alternatives: 2-module collapse
      (Portfolio + Operations), 3-module collapse (Space-Ops folded into
      Portfolio), 5-module split (adding REAL-EST-LEASE-MGMT for ASC 842
      compliance scope).
    options: ["a: 2 modules", "b: 3 modules", "c: 4 modules (proposed)", "d: 5 modules"]
    why: >-
      Architectural decision; drives lifecycle states, permissions, roles,
      handoff attribution, and Rule #14 capability realization.

  - id: B2-S2
    summary: "REAL-EST vs IWMS relationship (open since 2026-05-30)."
    question: >-
      How should REAL-EST and sub-domain IWMS reconcile? IWMS today realizes all
      7 REAL-EST capabilities via `domain_module_capabilities` despite REAL-EST
      having the 8 masters and IWMS having 6 of its own. Either REAL-EST is
      leadership-tier (a), peer market with separate modules (b), or the two
      merge (c).
    options:
      - "a: leadership-tier collapse, reassign 8 REAL-EST masters into IWMS modules; REAL-EST keeps 1 derived-signals module"
      - "b: peer-market split, REAL-EST masters 8 entities in 4 new modules + IWMS keeps its 6"
      - "c: merge REAL-EST and IWMS into a single domain (rejects parent_domain_id hierarchy)"

  - id: B2-S3
    summary: "B4 pattern-flag positive review on 6 likely-true flags."
    question: >-
      Confirm or reject each likely-true flag per master:
      property_leases.has_single_approver,
      property_leases.has_submit_lock,
      capital_projects.has_single_approver,
      capital_projects.has_submit_lock,
      facility_work_orders.has_personal_content,
      occupancy_records.has_personal_content.
    options: ["per-flag yes/no"]
    why: >-
      Pattern flags are workflow-shape judgments the user owns. Rule #15
      forbids notes commentary on the decision; the audit conversation captures
      the considered-false outcomes.

  - id: B2-S4
    summary: "CAFM disposition (sub-domain 142, confirmed empty: 0 modules)."
    question: >-
      What is CAFM's intent? (a) starter-kit / lite variant of REAL-EST per
      Rule #19; (b) leave dormant (domain row for SEO, no modules); (c) merge
      into REAL-EST and DELETE the sub-domain entry.
    options: ["a: starter-kit", "b: dormant", "c: merge into REAL-EST"]

  - id: B2-S5
    summary: "real_estate_properties (344) vs locations (795) collision."
    question: >-
      Are REAL-EST `real_estate_properties` and IWMS `locations` the same
      concept at two granularities, or distinct masters? Per Rule #16
      infrastructure-masters are typically the canonical layer that consumer
      entities `embedded_master`.
    options:
      - "a: distinct masters"
      - "b: IWMS `locations` canonical, REAL-EST `real_estate_properties` becomes embedded_master"
      - "c: reverse (REAL-EST canonical, IWMS embedded_master)"

  - id: B2-S6
    summary: "Cross-domain target masters for 5 handoff payloads."
    question: >-
      What target masters exist on the partner domains for handoffs 291 (FSM
      `facility_work_orders`), 293 (ESG `utility_meter_readings`), 295 (HCM
      `property_spaces`), 856 (RE-CRE `real_estate_properties`), 857 (RE-INVEST
      `real_estate_properties`)? Only EAM is wired today (351 commissions 475).
    options: ["surface target master IDs per neighbor; audit then authors the cross-domain relationship rows"]
    why: >-
      Each target master must exist on the partner domain before the
      relationship row writes. RE-CRE (145) and RE-INVEST (146) have no
      masters today.

  - id: B2-S7
    summary: "H1 cleanup intent confirmation (substring rows 136, 168, 169)."
    question: >-
      Approve DELETE row 136 + DELETE row 168 + PATCH row 169
      (proposal_source -> agent_curated)? Substring rows coexist alongside the
      curated rows the prior continuation inserted; cleanup unblocks B1A.
    options: ["all", "selective", "skip"]

b3:
  - id: B3-S1
    candidate: building_systems
    rationale: >-
      IWMS leaders (TRIRIGA, Planon, Honeywell Forge) ship building-system
      inventory (HVAC, lighting, fire panels per building) distinct from
      `industrial_assets` (EAM). Phase 0 vendor research required; collision
      check vs `industrial_assets` mandatory.
    vendor_evidence: [IBM TRIRIGA, Planon Workplace, Honeywell Forge Building Operations]
    proposed_module: REAL-EST-FACILITY-OPS

  - id: B3-S2
    candidate: preventive_maintenance_schedules
    rationale: >-
      Every CMMS (Nuvolo, Accruent, TRIRIGA) ships scheduled PM as a
      first-class master, distinct from `facility_work_orders` (instance).
      Phase 0 vendor docs on PM scheduling required.
    vendor_evidence: [Nuvolo CMMS, Accruent Resolute, IBM TRIRIGA]
    proposed_module: REAL-EST-FACILITY-OPS

  - id: B3-S3
    candidate: space_classifications
    rationale: >-
      Archibus Space Catalog, Eptura Workspace, Planon ship a space-type /
      category taxonomy (office, meeting, support, retail). Vendor schema docs
      on room categories required.
    vendor_evidence: [Archibus, Eptura Workplace, Planon Workplace]
    proposed_module: REAL-EST-SPACE-OPS

  - id: B3-S4
    candidate: move_requests
    rationale: >-
      TRIRIGA Move Manager, Archibus Move Mgmt ship a formal employee/team
      relocation workflow distinct from `property_space.allocated`. Phase 0
      vendor docs required; collision check vs IWMS `desk_bookings` mandatory.
    vendor_evidence: [IBM TRIRIGA, Archibus]
    proposed_module: REAL-EST-SPACE-OPS

  - id: B3-S5
    candidate: chargebacks
    rationale: >-
      TRIRIGA Charge Back, Planon Cost Management ship internal cost allocation
      of leased / owned space to business units. Phase 0 vendor docs required.
    vendor_evidence: [IBM TRIRIGA, Planon Workplace]
    proposed_module: REAL-EST-PORTFOLIO

  - id: B3-S6
    candidate: emission_factors_or_emission_records
    rationale: >-
      ESG-domain target-side master for handoff 293. REAL-EST
      `utility_meter_readings` feeds an ESG emissions record that likely does
      not exist yet. Surface for ESG audit; queue as ESG candidate.
    vendor_evidence: [ESG-domain TBD]
    proposed_module: cross-domain, ESG owns

  - id: B3-S7
    candidate: visitor_passes_overlap_with_VIS_MGMT
    rationale: >-
      Decide whether visitor management is in scope for REAL-EST modules at all
      or strictly delegated to VIS-MGMT via consumer DMDO. Phase 0 review of
      TRIRIGA / Eptura visitor capabilities required.
    vendor_evidence: [IBM TRIRIGA, Eptura Workplace]
    proposed_module: cross-domain, VIS-MGMT owns
