      - {handoff_id: 295, direction: outbound, source_domain: REAL-EST, target_domain: HCM, trigger_event: property_space.allocated, payload: property_spaces, null_field: source_domain_module_id}
      - {handoff_id: 856, direction: outbound, source_domain: REAL-EST, target_domain: RE-CRE, trigger_event: property.listed, payload: real_estate_properties, null_field: source_domain_module_id}
      - {handoff_id: 857, direction: outbound, source_domain: REAL-EST, target_domain: RE-INVEST, trigger_event: property.updated, payload: real_estate_properties, null_field: source_domain_module_id}
