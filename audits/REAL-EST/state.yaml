  - id: B1A-LIFECYCLE
    summary: "Author `data_object_lifecycle_states` for 7 of 8 masters (B12 hard fail), now module-anchored."
    finding: >-
      0 `data_object_lifecycle_states` on any of the 8 masters. With modules
      288-291 in place, each state machine can now carry a `domain_module_id` for
      the workflow-gate prefix. occupancy_records (348) is a config-shape
      exemption candidate (surface to user).
    action: >-
      Author state machines: real_estate_properties 344 (in_portfolio -> active
      -> divested) module 288; property_leases 345 (draft -> active ->
      renewal_pending -> renewed/expired/terminated) module 288; floor_plans 346
      (draft -> published -> superseded) module 288; property_spaces 347
      (available -> allocated -> released) module 289; facility_work_orders 349
      (created -> assigned -> dispatched -> in_progress -> completed -> closed)
      module 290; utility_meter_readings 350 (recorded -> validated -> published)
      module 290; capital_projects 351 (planning -> approved -> in_progress ->
      completed/cancelled) module 291. Set is_initial/is_terminal/
      requires_permission/permission_verb_override per state.
    affected_masters:
      - {data_object_id: 344, name: real_estate_properties, target_module_id: 288, workflow: in_portfolio -> active -> divested}
      - {data_object_id: 345, name: property_leases, target_module_id: 288, workflow: draft -> active -> renewal_pending -> renewed/expired/terminated}
