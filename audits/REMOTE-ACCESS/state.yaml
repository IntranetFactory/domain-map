      has_single_approver=false. Per Rule #12 an audit MUST positively re-evaluate;
      false-by-default is not false-after-review. Candidates:
      session_recordings.has_personal_content=true (recording IS the personal content),
      session_recordings.has_submit_lock=true (finalized recording immutable for retention),
