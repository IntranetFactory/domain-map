b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."
  - id: B1A-B6
    summary: "Author intra-domain relationship remote_sessions produces session_recordings."
    finding: >
      Zero intra-domain data_object_relationships between the two REMOTE-ACCESS masters.
      The natural edge remote_sessions (238) -> session_recordings (239) with verb
      produces / produced_during is absent. Cardinality (1:0..1 single recording per
      session = one_to_one, or 1:N segmented recordings per session = one_to_many) is a
      user pick. Both masters live in separate modules (238 in 294, 239 in 295), so this
      is a cross-module intra-domain edge. 2026-06-07: re-confirmed still absent; the only
      edges on 238/239 are the users (748) actor edges 1613-1616.
    action: >
      Surface the cardinality question. On user pick, INSERT one data_object_relationships
      row: data_object_id=238, related_data_object_id=239, relationship_verb='produces',
      inverse_verb='produced_during', relationship_type=<one_to_one|one_to_many>,
      relationship_kind='reference', is_required=false, owner_side='source'.
    blocked_by:
      - {type: user_decision, reason: "cardinality pick (one_to_one vs one_to_many) needed before write; surfaced 2026-06-07"}
    affected_entities: [remote_sessions, session_recordings]
    affected_modules: [294, 295]
    extra_proposed_verb: produces
    extra_proposed_inverse_verb: produced_during
    extra_open_question: "one_to_one (1:0..1) vs one_to_many (1:N) cardinality"

b1b:
  - id: B1B-B4
    summary: "Positive re-eval of B4 pattern flags on 238 + 239, PATCH per B2-S3 answers."
    finding: >
      Both masters carry has_personal_content=false, has_submit_lock=false,
      has_single_approver=false. Per Rule #12 an audit MUST positively re-evaluate;
      false-by-default is not false-after-review. Now that both masters are
      entity_type='operational_workflow' (set 2026-06-07), the pattern-flag re-eval is
      a live obligation, not optional. Candidates:
      session_recordings.has_personal_content=true (recording IS the personal content),
      session_recordings.has_submit_lock=true (finalized recording immutable for retention),
      remote_sessions.has_personal_content=true (screen content carries PII / PHI),
      remote_sessions.has_single_approver=true (privilege elevation single-approver gate).
    blocked_by:
      - {type: user_decision, ref: B2-S3, reason: "per-flag yes/no user pick"}
    affected_masters:
      - {data_object_id: 238, name: remote_sessions, target_module_id: 294, workflow: "pattern flag re-eval"}
      - {data_object_id: 239, name: session_recordings, target_module_id: 295, workflow: "pattern flag re-eval"}
  - id: B1B-B12
    summary: "Author lifecycle states on 238 (module 294) + 239 (module 295) after B2-S2."
    finding: >
      Zero data_object_lifecycle_states on either REMOTE-ACCESS master. Both are now
      entity_type='operational_workflow' (set 2026-06-07), so per Rule #12 lifecycle
      states are REQUIRED (B12 hard obligation, not optional). Per Rule #14 workflow-gate
      permissions use the realizing module's domain_module_code as prefix: remote_sessions
      -> REMOTE-ACCESS-SESSION (294), session_recordings -> REMOTE-ACCESS-RECORDING-AUDIT
      (295). Module prefix exists; only the per-state user pick remains.
    blocked_by:
