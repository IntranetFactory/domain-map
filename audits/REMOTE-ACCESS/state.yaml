b2:
  - id: B2-S1
    summary: "Master split: one master + session_mode discriminator, or split into attended_sessions + unattended_sessions?"
    question: "Should remote_sessions stay one master with a session_mode discriminator (TeamViewer / AnyDesk pattern), or split into two separate masters attended_sessions + unattended_sessions (BeyondTrust pattern)?"
    options: ["(a) one master + session_mode discriminator; ATTENDED + UNATTENDED both role=embedded_master if needed for autonomous deploy", "(b) split into two masters; rename 238 to attended_sessions and add unattended_sessions; update handoffs + events accordingly", "(c) defer; ship 3-module shape with ATTENDED owning remote_sessions master, UNATTENDED embedded_master-ing it, revisit once first real deploys exist"]
    why: "Architectural / market-shape decision; deployment model varies by vendor. Drives B1B-M1, B1B-B8, B1B-B10b, B1B-B12."
  - id: B2-S2
    summary: "Lifecycle-state per-state + per-gate yes/no for remote_sessions + session_recordings."
    question: "Confirm the proposed state machines: remote_sessions = requested -> consent_pending -> connected -> privileged -> ended with workflow gates on privileged (elevate_remote_session) and ended (end_remote_session); session_recordings = recording -> archived -> retention_lock -> expired with gates on retention_lock (lock_session_recording) and expired (purge_session_recording)?"
    options: ["accept proposed shape", "alter per-state list (specify)", "alter per-gate requires_permission (specify)", "defer"]
    why: "Workflow shape decisions; per-vendor practice varies. Drives B1B-B12."
  - id: B2-S3
    summary: "Pattern flag positive re-eval (Rule #12) on remote_sessions + session_recordings."
    question: "Which pattern flags should be TRUE on each master? remote_sessions: has_personal_content (screen content carries PII / PHI), has_single_approver (privilege elevation gate)? session_recordings: has_personal_content (recording IS personal content), has_submit_lock (finalized recording immutable for retention)?"
    options: ["accept all proposed TRUE flips", "accept some (specify)", "decline all (false-after-review is documented stance)"]
    why: "Pattern flags are workflow-shape judgments; defaults are false-by-default which is not the same as false-after-review. Drives B1B-B4."
  - id: B2-S4
    summary: "Regulation scoping HIPAA / PCI-DSS / SOX."
    question: "Which regulations apply to REMOTE-ACCESS and with what applicability (mandatory / optional / vertical)? BeyondTrust positions HIPAA + PCI + SOX + GDPR + ISO 27001 as a vendor-access governance bundle; not equally applicable in every deployment."
    options: ["(a) all three required", "(b) HIPAA + PCI required, SOX optional", "(c) all optional", "(d) other (specify regulations + applicability)"]
    why: "Scope decisions require knowing which buyer slice the catalog is modeling (MSP-shaped vs enterprise-vendor-access vs consumer IT support). Drives B1B-REG."
  - id: B2-S5
    summary: "Module-naming pick: ATTENDED/UNATTENDED/GOVERNANCE vs SUPPORT/PLATFORM/COMPLIANCE."
    question: "Which module-naming triple should B1B-M1 author?"
    options: ["(a) REMOTE-ACCESS-ATTENDED / REMOTE-ACCESS-UNATTENDED / REMOTE-ACCESS-GOVERNANCE (matches capability codes RA-ATTENDED / RA-UNATTENDED / RA-RECORD)", "(b) REMOTE-ACCESS-SUPPORT / REMOTE-ACCESS-PLATFORM / REMOTE-ACCESS-COMPLIANCE (matches BeyondTrust / TeamViewer Tensor vendor positioning)", "(c) other (specify)"]
    why: "Naming convention is editorial; both shapes load identically. Drives B1B-M1, downstream affects B1B-M4 capability-link map."
  - id: B2-H1
    summary: "Approve 7 existing handoff_processes rows (record_status='new') to flip catalog-quality headline off zero."
    question: "Approve the 7 existing agent_curated handoff_processes rows on handoffs 162 / 163 / 164 / 646 / 647 / 648 / 160? Approval moves the H1 catalog-quality headline from '0 approved' to '7 approved'."
    options: ["approve all 7", "approve subset (specify by handoff_id)", "decline / re-tag"]
    why: "Approving handoff_processes shifts record_status from 'new' to 'approved'; this requires explicit per-load user confirmation per Rule #1. Volume is small enough for bulk approval; alternative is per-row review."

