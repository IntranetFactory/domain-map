b2:
  - id: B2-1
    summary: "Modularization shape for PS-LIC; pick before any M-band cure or downstream b1b unblock."
    question: "How should PS-LIC modularize? Recommended baseline is a 4-module split aligned to lifecycle phases."
    options:
      - "(a) 4-module split: PS-LIC-APPLICATION-INTAKE (permit_applications), PS-LIC-ISSUANCE-AND-RENEWAL (license_records + license_renewals), PS-LIC-INSPECTION-AND-ENFORCEMENT (permit_inspections + code_violations), PS-LIC-FEES (regulatory_fees)"
      - "(b) 2-module collapse: PS-LIC-APPLICATIONS-AND-LICENSING (applications + licenses + renewals), PS-LIC-FIELD-OPS (inspections + violations + fees)"
      - "(c) 3-module split: PS-LIC-INTAKE, PS-LIC-COMPLIANCE, PS-LIC-BILLING"
      - "(d) single full module PS-LIC-CORE plus a module_kind='starter' lite variant for SMB / county-tier deployments"
    why: "Rule #14 requires >=1 full module; once A2 lands >=3 capabilities, >=2 modules required. The pick determines every downstream b1b cure (B12 lifecycle anchoring, B10b source FK derivation, B9 missing-handoff drafts, F2 module-level system skills)."

  - id: B2-2
    summary: "Capability set for PS-LIC; pick alongside B2-1 to satisfy A2 and M4 / M6 bipartite coverage."
    question: "Which capability set should PS-LIC ship?"
    options:
      - "(a) 8-capability recommended: application intake, license issuance, inspection scheduling and dispatch, code-enforcement workflow, license renewal lifecycle, regulatory fee assessment, constituent-facing portal access, accessibility-and-OFCCP compliance reporting"
      - "(b) 5-capability narrow: intake, issuance, inspection, renewal, fees"
      - "(c) 10-capability broad: add hearings / appeals, public-records access, GIS-parcel integration"
    why: "A2 fails with zero capabilities; M2 needs >=3 capabilities to require >=2 modules; M4 / M6 close the bipartite loop only with at least one realization per capability per module."

  - id: B2-3
    summary: "Pattern flag judgment per master (B4) on the 6 PS-LIC masters."
    question: "Which pattern flag PATCHes should land on the 6 masters?"
    options:
      - "Recommended PATCHes: permit_applications.has_personal_content=true + has_submit_lock=true; license_records.has_personal_content=true; license_renewals.has_personal_content=true; code_violations.has_personal_content=true; code_violations.has_single_approver = jurisdiction-dependent (single hearing officer vs panel); all other flags stay false."
      - "(alt) keep all flags false; record consideration outside notes (Rule #15)"
      - "(alt) other per-flag judgment supplied by user"
    why: "B4 needs positive re-evaluation, not false-by-default. Several masters carry constituent PII (applicant, licensee, cited-party) that argues for `has_personal_content=true`. Independent of B2-1 and B3."

  - id: B2-4
    summary: "Regulation scoping on the 4 currently-mandatory regulations (FedRAMP, CMMC, StateRAMP, Section 508)."
    question: "Is the mandatory-for-all-PS-LIC scoping intentional, or should some demote to optional? Are additional regulations missing?"
    options:
      - "(a) keep all four mandatory (cloud-hosted public-sector tenants are the realistic deployment shape)"
      - "(b) demote FedRAMP and CMMC to optional (federal contractor jurisdictions only)"
      - "(c) add ADA Title II as missing mandatory"
      - "(d) consider NIST SP 800-53, IRS Pub 1075 (revenue-touching license types), HIPAA (regulated occupations)"
    why: "Currently every PS-LIC tenant inherits 4 federal-cloud regulations; if a small county deploys PS-LIC for occupational licensing they may not carry FedRAMP / CMMC obligations. The scoping pick may also surface additional Bucket 3 entities (NIST control assessments, IRS Pub 1075 attestations)."

  - id: B2-5
    summary: "Catalog UX wording for A4 (Rule #20)."
    question: "Both `domains.catalog_tagline` and `domains.catalog_description` are empty. Rule #20 requires user-approved buyer-voice copy before any write."
    options:
      - "(a) supply tagline + description text now"
      - "(b) approve an agent-drafted tagline and description, surfaced in chat before write"
      - "(c) defer A4 until module-level taglines (M8) are also being drafted"
    why: "Buyer-facing catalog has no copy for the PS-LIC card or detail page. Rule #20 is non-negotiable; the agent cannot self-author. Independent of B2-1, B2-2, B3."

  - id: B2-6
    summary: "Cost band and market-size refresh."
    question: "`cost_band='$$$'` (annual TCO $100k to $500k for 500-user org) and `usa_market_size_usd_m=1000` ($1B TAM) anchored to 2025. Confirm scope and refresh source."
    options:
      - "(a) confirm current values (pure-play permitting platforms scoping)"
      - "(b) widen scope to all civic permitting + licensing software; refresh TAM upward"
      - "(c) cite a specific Gartner / IDC / Forrester source year"
    why: "Public-sector permitting TAM is volatile post-ARPA. $1B reads low if the comparator is the broad civic-tech market; reasonable if scoped to pure-play permitting. Independent of every other bucket."

b3:
  - id: B3-1
    candidate: permit_types
    rationale: "Universal config catalog of allowable permit types with per-type fees, required documents, routing rules. Permit applications are typed; the typed-config is the master that drives intake-form generation, fee calculation, and inspection requirements."
    vendor_evidence:
      - Accela Civic Platform
      - OpenGov Permitting and Licensing
      - Tyler Enterprise ERP
      - ServiceNow Public Sector Digital Services
    proposed_module: PS-LIC-APPLICATION-INTAKE

  - id: B3-2
    candidate: license_types
    rationale: "Universal licensing taxonomy (occupational, business, professional, vehicle, environmental) with per-type renewal cadence and CE requirements. Issued license records are typed; license type drives renewal schedule and reciprocity rules."
    vendor_evidence:
      - Accela Civic Platform
      - OpenGov Permitting and Licensing
      - Tyler Enterprise ERP
      - ServiceNow Public Sector Digital Services
    proposed_module: PS-LIC-ISSUANCE-AND-RENEWAL

  - id: B3-3
    candidate: inspection_checklists
    rationale: "Universal checklist templates per permit type or code section. Inspections execute against a typed checklist; pass / fail is per checklist item, not a single inspection-level boolean."
    vendor_evidence:
      - Accela Civic Platform
      - Tyler Enterprise ERP
      - OpenGov Permitting and Licensing
    proposed_module: PS-LIC-INSPECTION-AND-ENFORCEMENT

  - id: B3-4
    candidate: regulatory_codes
    rationale: "Common codified municipal / state code references that violations cite. Code violations cite a specific code section; the codified rules are the master that the violation references."
    vendor_evidence:
      - Accela Civic Platform
      - Tyler Enterprise ERP
    proposed_module: PS-LIC-INSPECTION-AND-ENFORCEMENT

  - id: B3-5
    candidate: payment_records
    rationale: "Payment transactions against assessed fees. Currently `regulatory_fees` captures only the assessed liability, not the payment event; without `payment_records` the AR loop is incomplete (no first-class partial-payment, refund, write-off events)."
    vendor_evidence:
      - Accela Civic Platform
      - OpenGov Permitting and Licensing
      - Tyler Enterprise ERP
    proposed_module: PS-LIC-FEES

  - id: B3-6
    candidate: appeals
    rationale: "Common formal appeal workflow against denied permits, contested violations, license revocations. Due-process requirement for any regulatory enforcement action; ADA Title II often gates on appeal access."
    vendor_evidence:
      - Accela Civic Platform
      - Tyler Enterprise ERP
    proposed_module: PS-LIC-INSPECTION-AND-ENFORCEMENT

  - id: B3-7
    candidate: permit_extensions
    rationale: "Common time extensions on permits (construction delays, weather) with audit trail. Permits have effective windows; extension is a typed amendment to the original permit, not a renewal."
    vendor_evidence:
      - Accela Civic Platform
      - OpenGov Permitting and Licensing
      - Tyler Enterprise ERP
    proposed_module: PS-LIC-ISSUANCE-AND-RENEWAL

  - id: B3-8
    candidate: attached_documents
    rationale: "Universal: plans, surveys, insurance certificates, business filings, identification copies attached to applications. Document attachment is the workflow gate for most permit types."
    vendor_evidence:
      - Accela Civic Platform
      - OpenGov Permitting and Licensing
      - Tyler Enterprise ERP
      - ServiceNow Public Sector Digital Services
    proposed_module: PS-LIC-APPLICATION-INTAKE

  - id: B3-9
    candidate: business_addresses_or_parcels
    rationale: "Universal: every permit and license is anchored to a property parcel or business address. Cross-domain dependency on a parcel / address master that does not yet exist in the catalog (no PS-GIS domain present). Could resolve via the broader `locations` master if extended, or surface a new domain."
    vendor_evidence:
      - Accela Civic Platform
      - OpenGov Permitting and Licensing
      - Tyler Enterprise ERP
    proposed_module: PS-LIC-APPLICATION-INTAKE
    extra_cross_domain_dependency: locations_master_or_new_PS-GIS_domain

  - id: B3-10
    candidate: vendor_surface_modularization_candidates
    rationale: "Phase 0 vendor surface pass deferred until B1B-M1 cures. The B3-1 through B3-9 entity list is preliminary; flagship-vendor schemas would refine the surface. Run Phase 0 against this domain (no formal Phase 0 has been done) once the user picks the modularization shape from Bucket 2 #1."
    vendor_evidence:
      - Accela Civic Platform
      - OpenGov Permitting and Licensing
      - Tyler Enterprise ERP
      - ServiceNow Public Sector Digital Services
    proposed_module: null
