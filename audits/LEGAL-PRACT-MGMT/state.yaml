b2:
  - id: B2-A4
    summary: "A4 fail: domains.catalog_tagline and catalog_description both empty on LEGAL-PRACT-MGMT; Rule #20 requires user-approved wording before any write."
    question: "Provide exact catalog_tagline (single sentence, buyer voice) and catalog_description (1-3 paragraphs, buyer voice) for LEGAL-PRACT-MGMT, or instruct the agent to draft and review before write?"
    options: ["supply_wording", "draft_and_review", "defer_pending_marketing"]
    why: "The existing description column is analyst voice (substrate definition); A4 wants buyer voice (workflow + value). Rule #20 forbids autonomous writes on catalog_tagline / catalog_description."

  - id: B2-M8
    summary: "M8 fail: catalog_tagline and catalog_description empty on all 5 LEGAL modules (132 through 136)."
    question: "Provide exact catalog_tagline and catalog_description per module (132 LEGAL-MATTER-MGMT, 133 LEGAL-INTAKE-CONFLICT, 134 LEGAL-TIME-BILLING, 135 LEGAL-TRUST-ACCT, 136 LEGAL-COURT-DOCKETING), or instruct the agent to draft and review before write?"
    options: ["supply_wording_per_module", "draft_and_review", "defer_pending_marketing"]
    why: "Same Rule #20 constraint as B2-A4, applied per module."
    affected_modules: [132, 133, 134, 135, 136]

  - id: B2-S1
    summary: "B4 positive re-eval: should conflict_checks.has_personal_content=true and external_court_filings.has_single_approver=true?"
    question: "Per-flag yes/no: (a) conflict_checks.has_personal_content (stores adversary names, parties' personal identifiers, ethics-wall annotations); (b) external_court_filings.has_single_approver (court filings typically signed by a single attorney of record)."
    options: ["yes_both", "yes_a_only", "yes_b_only", "no_both"]
    why: "False-by-default is not the same as false-after-review. Rule #12 mandates positive re-evaluation; Rule #15 forbids notes annotation, so the consideration must be captured in the audit conversation."

  - id: B2-S2
    summary: "Rule #15 notes-pollution on 14 of 47 skill_tools rows."
    question: "Were the populated notes strings on 14 skill_tools rows for LEGAL's 5 system skills user-approved at Phase-S load time, or auto-populated by the loader?"
    options: ["user_approved_leave_in_place", "auto_populated_revert_and_log_incident"]
    why: "Cannot tell from audit alone. If auto, Rule #15 mandates revert + Incidents log entry in references/skill-changelog.md."
    extra_affected_skill_tools_count: 14

  - id: B2-S3
    summary: "M7 architectural intent: are sibling LEGAL modules standalone-deployable or co-installed with LEGAL-MATTER-MGMT and LEGAL-TIME-BILLING?"
    question: "Pick architectural product shape: (a) standalone-deployable (promote 4 consumer DMDOs on legal_matters / client_invoices to embedded_master); (b) co-installed (DELETE the 4 consumer DMDOs since the master in 132 / 134 is authoritative)."
    options: ["promote_to_embedded_master", "delete_consumer_rows"]
    why: "Market read favors (b): every flagship vendor (Clio, MyCase, Filevine, Aderant) bundles matters + billing + trust + docketing as a single SKU. The choice cascades into B1B-M7-LEGAL-MATTERS, B1B-M7-CLIENT-INVOICES, and B1B-B9B-INTRA-DOMAIN-HANDOFFS shapes."

  - id: B2-S4
    summary: "B11 alias disambiguation: legal_matters to Engagement alias collides semantically with engagement_letters (Letter of Engagement)."
    question: "Keep both aliases, drop the matter-side, or rename?"
    options: ["keep_both", "drop_matter_engagement_alias", "rename_matter_alias"]
    why: "Editorial / disambiguation call. The catalog supports multiple aliases per master with no priority axis, so both can coexist if intentional."

b3:
  - id: B3-1
    candidate: matter_documents
    rationale: "Every flagship vendor ships matter-scoped document management as a first-class master. Currently the catalog routes legal documents through content_documents (id 429) consumer in ECM, the generic content layer. Matter-scoped document storage is market-distinguishing per capability LEGAL-DOC-MGMT (426), currently realized only by module 132 without an owned data_object."
    vendor_evidence: ["Clio Manage Documents", "MyCase Document Storage", "Filevine Documents", "Smokeball Auto-Forms"]
    proposed_module: LEGAL-MATTER-MGMT

  - id: B3-2
    candidate: matter_deadlines
    rationale: "Statute-of-limitations and key-date alerting is a core LEGAL-MATTER-MGMT capability and a separately published capability LEGAL-COURT-DOCKETING (594). Flagships model deadlines as a first-class entity. Currently external_court_filings events drive deadline notifications, but the deadlines themselves are not modeled. Missed deadlines are the malpractice tail in law-firm software; this entity is load-bearing."
    vendor_evidence: ["Clio Calendar Rules", "Smokeball Court Rules", "CalendarRules", "CompuLaw"]
    proposed_module: LEGAL-COURT-DOCKETING

  - id: B3-3
    candidate: matter_parties
    rationale: "Every flagship models parties (client, opposing counsel, co-counsel, court, judge, witness, expert) as a first-class M:N junction or master against legal_matters. Currently the catalog routes parties through crm_contacts (98) contributor, which loses role context (same person can be opposing counsel on one matter and client on another). Conflict-of-interest checking cannot function correctly without explicit matter_parties role-typed edges."
    vendor_evidence: ["Clio Manage Contacts", "MyCase Contacts", "Filevine Contacts", "Smokeball Contacts"]
    proposed_module: LEGAL-MATTER-MGMT

  - id: B3-4
    candidate: legal_tasks
    rationale: "Flagships ship matter-scoped task management as a separate entity from generic project work because the legal-task vocabulary (UTBMS task codes, billable vs. non-billable, write-down rules) does not fit the WORK-MGMT generic shape. Currently no legal_tasks master exists; matter work is implicit in time_entries."
    vendor_evidence: ["Clio Tasks", "MyCase Tasks", "Filevine Tasks", "Smokeball Tasks"]
    proposed_module: LEGAL-MATTER-MGMT
