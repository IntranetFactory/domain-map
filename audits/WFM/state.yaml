b1a:
  - id: B1A-S8-A
    summary: "Insert missing users -> work_shifts edge in data_object_relationships (B7 residual from 2026-05-31 Continuation)."
    finding: >-
      The 7 WFM masters are work_schedules (160), work_shifts (161), time_entries (162),
      absence_requests (163), absence_balances (164), time_off_policies (165),
      meal_break_records (166). Six of the seven now carry a users (data_object 748) edge
      in data_object_relationships (rows 1672 work_schedules, 1673 absence_balances,
      1674 time_off_policies, 1675 meal_break_records, 20 absence_requests, 1183
      time_entries via logs_as_timekeeper). Only work_shifts (161) is still missing a
      users edge. The 2026-05-31 Continuation's B1-S8a inserted four user edges but
      omitted work_shifts.
    action: >-
      INSERT one data_object_relationships row: data_object_id=748 (users),
      related_data_object_id=161 (work_shifts), owner_side='source',
      relationship_type='one_to_many', relationship_kind='reference',
      relationship_verb='assigned_to_shift', inverse_verb='shift_assignee',
      is_required=true. Omit record_status (Rule #1 default 'new') and notes (Rule #15).
    affected_masters:
      - {data_object_id: 161, name: work_shifts, target_module_id: null, workflow: shift_assignment_users_edge}

b1b:
  - id: B1B-S1
    summary: "Phase-A fix-load: insert 2 or 3 WFM domain_modules rows and remap the 7 legacy domain_data_objects to domain_module_data_objects (M1 hard-fail, structural gate)."
    finding: >-
      WFM domain (id 59) has ZERO domain_modules rows. With 6 capabilities (TIME-TRACKING,
      SCHEDULING, ABSENCE-MGMT, LABOR-FORECAST, LABOR-COMPLIANCE, WORKFORCE-SCHEDULING),
      Rule #14 demands at least 2 module_kind='full' rows. Proposed 3-module split:
      WFM-TIME-ATTENDANCE (time_entries, meal_break_records), WFM-SCHEDULING
      (work_schedules, work_shifts), WFM-ABSENCE (absence_requests, absence_balances,
      time_off_policies). Proposed 2-module split: WFM-LABOR-OPS (scheduling + time +
      breaks) + WFM-ABSENCE. Choice of shape is B2-S1.
    action: >-
      After B2-S1 decision, run a tightly scoped fix-loader in .tmp_deploy/ that inserts
      the chosen domain_modules rows, inserts domain_module_capabilities rows, and remaps
      the 7 legacy domain_data_objects entries (and the 5 embedded_master entries) to
      domain_module_data_objects with the right roles and necessities.
    blocked_by:
      - {type: user_decision, ref: B2-S1}
    affected_masters:
      - {data_object_id: 160, name: work_schedules, target_module_id: null, workflow: shift_scheduling}
      - {data_object_id: 161, name: work_shifts, target_module_id: null, workflow: shift_scheduling}
      - {data_object_id: 162, name: time_entries, target_module_id: null, workflow: time_and_attendance}
      - {data_object_id: 163, name: absence_requests, target_module_id: null, workflow: absence_request_lifecycle}
      - {data_object_id: 164, name: absence_balances, target_module_id: null, workflow: balance_accrual_ledger}
      - {data_object_id: 165, name: time_off_policies, target_module_id: null, workflow: policy_config}
      - {data_object_id: 166, name: meal_break_records, target_module_id: null, workflow: break_compliance}
    extra_capability_ids: [30, 31, 32, 33, 34, 312]
    extra_proposed_3_modules: ["WFM-TIME-ATTENDANCE", "WFM-SCHEDULING", "WFM-ABSENCE"]
    extra_proposed_2_modules: ["WFM-LABOR-OPS", "WFM-ABSENCE"]

  - id: B1B-S2
    summary: "Insert 20-30 data_object_aliases rows for the 7 WFM masters once user prunes the inventory (B11 hard-fail)."
    finding: >-
      Zero data_object_aliases rows for any of the 7 WFM masters. meal_break_records,
      absence_balances, absence_requests, time_off_policies are exactly the
      synonym-heavy masters B11 targets. Common aliases vendors use: absence_requests
      -> Leave Request / Vacation Request / PTO Request / Time Off Request;
      absence_balances -> Leave Balance / PTO Balance / Vacation Balance / Time Off
      Balance; time_off_policies -> Leave Policy / PTO Plan / Accrual Plan / Holiday
      Policy; meal_break_records -> Meal Break / Rest Break / Compliance Break / Break
      Attestation; work_schedules -> Roster / Shift Schedule / Workforce Schedule /
      Roster Plan; work_shifts -> Shift / Rostered Shift / Scheduled Shift / Workblock;
      time_entries -> Time Punch / Clock Event / Time Card Line / Punch Record.
    action: >-
      After B2-S4 (alias inventory pruning), insert the approved aliases. Loader
      pattern: idempotent INSERT keyed on (data_object_id, alias_name); omit
      record_status and notes per Rule #1 / Rule #15.
    blocked_by:
      - {type: user_decision, ref: B2-S4}
    affected_masters:
      - {data_object_id: 160, name: work_schedules, target_module_id: null, workflow: alias_inventory}
      - {data_object_id: 161, name: work_shifts, target_module_id: null, workflow: alias_inventory}
      - {data_object_id: 162, name: time_entries, target_module_id: null, workflow: alias_inventory}
      - {data_object_id: 163, name: absence_requests, target_module_id: null, workflow: alias_inventory}
      - {data_object_id: 164, name: absence_balances, target_module_id: null, workflow: alias_inventory}
      - {data_object_id: 165, name: time_off_policies, target_module_id: null, workflow: alias_inventory}
      - {data_object_id: 166, name: meal_break_records, target_module_id: null, workflow: alias_inventory}

  - id: B1B-S3
    summary: "Insert data_object_lifecycle_states across the 7 WFM masters (B12 hard-fail). Each state scoped to its realizing module."
    finding: >-
      Zero data_object_lifecycle_states rows. Obvious state machines from descriptions
      and trigger_events: absence_requests (draft / submitted / approved / rejected /
      taken / canceled / closed); time_entries (open / submitted / approved / exported /
      locked); work_schedules (draft / published / in_progress / closed); work_shifts
      (assigned / accepted / swapped / dropped / no_show / completed / paid);
      meal_break_records (recorded / waived / violated); time_off_policies (draft /
      active / superseded); absence_balances (config-shape exemption candidate per
      B2-S2). Each requires_permission=true state materializes one workflow-gate
      permission scoped to the realizing module per Rule #14's module-permission
      derivation.
    action: >-
      After B1B-S1 (modules) + B2-S1 (module shape) + B2-S2 (absence_balances
      exemption) + B2-S3 (pattern flags), insert lifecycle states with domain_module_id
      pointing at the realizing module. Surface each requires_permission flag for
      review before insert. Do NOT auto-populate state-level notes (Rule #15).
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S1}
      - {type: user_decision, ref: B2-S2}
      - {type: user_decision, ref: B2-S3}
    affected_masters:
      - {data_object_id: 163, name: absence_requests, target_module_id: null, workflow: request_lifecycle}
      - {data_object_id: 162, name: time_entries, target_module_id: null, workflow: timecard_lifecycle}
      - {data_object_id: 160, name: work_schedules, target_module_id: null, workflow: schedule_publication}
      - {data_object_id: 161, name: work_shifts, target_module_id: null, workflow: shift_assignment}
      - {data_object_id: 166, name: meal_break_records, target_module_id: null, workflow: break_compliance}
      - {data_object_id: 165, name: time_off_policies, target_module_id: null, workflow: policy_revision}
      - {data_object_id: 164, name: absence_balances, target_module_id: null, workflow: ledger_recalc}

