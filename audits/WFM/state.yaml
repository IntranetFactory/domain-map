b2:
  - id: B2-S1
    summary: "Module-split shape: 2 modules vs 3 modules vs alternate."
    question: >-
      Should WFM be split into 3 modules (WFM-TIME-ATTENDANCE + WFM-SCHEDULING +
      WFM-ABSENCE), 2 modules (WFM-LABOR-OPS + WFM-ABSENCE), or an alternate shape?
    options:
      - "3 modules: WFM-TIME-ATTENDANCE, WFM-SCHEDULING, WFM-ABSENCE (mirrors UKG, Workday, Replicon taxonomies)"
      - "2 modules: WFM-LABOR-OPS (scheduling + time + breaks) + WFM-ABSENCE (mirrors Quinyx, Deputy product shape)"
      - "Alternate shape the user names"
    why: >-
      6 capabilities and 7 masters easily justify a 3-module split per Rule #14, but
      operational coherence (Quinyx, Deputy collapse scheduling + time-attendance) is
      defensible at 2.

  - id: B2-S2
    summary: "absence_balances lifecycle config-shape exemption per Rule #12?"
    question: >-
      Should absence_balances be treated as the config-shape exemption (continuously
      recalculated single-state master, no lifecycle states authored)?
    options:
      - "Confirm exempt: absence_balances skipped from B1B-S3 lifecycle authoring"
      - "Author full lifecycle states (e.g., current / frozen / closed_period)"
    why: >-
      Rule #12 names the exemption explicitly. Persistence is the audit conversation
      per Rule #15 (no notes write).

  - id: B2-S3
    summary: "Pattern-flag review per Rule #12 across 7 WFM masters."
    question: >-
      Should these pattern flags flip from false to true? absence_requests
      has_personal_content (FMLA medical reasons / parental leave reasons),
      absence_requests has_single_approver (manager-approval canonical workflow),
      time_entries has_submit_lock (immutable after pay-period close),
      meal_break_records has_personal_content (waiver attestation with worker signature)?
    options:
      - "Per-flag yes/no; agent applies PATCHes after each answer"
    why: >-
      The all-false default does not confirm review. Per Rule #15 the rationale stays
      out of notes columns; decision is captured in the audit Decisions section.

  - id: B2-S4
    summary: "Alias inventory pruning for B11 backfill."
    question: >-
      Should B1B-S2 load the full vendor-terminology candidate list (~20-30 aliases
      across 7 masters), a tight pruned set (3-5 per master), or skip B11 entirely?
    options:
      - "Full list"
      - "Pruned 3-5 per master (user names which)"
      - "Skip B11 (data_object_aliases deliberately empty)"
    why: >-
      Rule #18 permits vendor terms on data_object_aliases.alias_name, but
      unconstrained insertion risks marketing-tier sprawl.

  - id: B2-S5
    summary: "Legacy wfm-system skill (id 121): retire or rehome?"
    question: >-
      After module-level system skills exist (B1B-S9 + B1B-S1), should the legacy
      wfm-system skill be retired (DELETE after re-anchoring its 9 skill_tools) or
      rehomed as one of the 3 module-level skills (minimises catalog churn)?
    options:
      - "Retire: DELETE skill 121 after tools re-anchored; insert 3 new module-level skills"
      - "Rehome: rename skill 121 + set its domain_module_id; insert 2 new module-level skills"
    why: >-
      Editorial; agent cannot prefer (a) over (b) without architectural intent input.

  - id: B2-S6
    summary: "A1 hygiene on the WFM domains row: em-dash + British spellings + dated notes."
    question: >-
      The WFM domains row (id 59) carries (i) an em-dash in business_logic
      (CLAUDE.md ban), (ii) British spellings 'Labour' / 'optimisation' in description
      and business_logic (CLAUDE.md American-English rule), (iii) dated 2026-05-20
      reanalysis prose in notes (Rule #15 territory). Approve cleanup PATCH?
    options:
      - "Approve clearing notes and rewriting description + business_logic in American English with no em-dash; agent supplies replacement text for approval per Rule #15"
      - "Skip; keep as-is"
      - "User supplies exact replacement wording"
    why: >-
      The em-dash and American-English rules are deterministic, but Rule #15 forbids
      notes writes (including blanking) without user-approved text.

  - id: B2-S7
    summary: "APQC delete-and-replace on handoffs 134, 429, 934."
    question: >-
      Each of the three handoffs has an existing handoff_processes row that the
      2026-05-30 audit proposed replacing with a different PCF target. Approve any of
      the replacements?
    options:
      - "134 employee.created (HCM -> WFM): replace existing row 29 (process 41 L2 Manage employee onboarding, training, and development) with process 246 (L3 Develop and manage time and attendance systems)"
      - "429 work_shift.no_show (WFM -> HRSD): replace existing row 228 (process 42 L2 Manage employee relations) with process 246 (L3 Develop and manage time and attendance systems)"
      - "934 retail_labour_schedule.published (RET-STORE -> WFM): replace existing row 390 (process 1886) with process 246 (L3 Develop and manage time and attendance systems)"
      - "Subset / decline / all"
    why: >-
      Each replacement is a delete-and-replace; the existing row may already be the
      right call per a future reviewer.

b3:
  - id: B3-S1
    candidate: time_clocks
    rationale: >-
      Physical or virtual device records (badge readers, mobile geofence punches)
      mastered separately from time_entries by every flagship time vendor. Underpins
      device-bound integrity checks (no-buddy-punching, geofence enforcement) that
      time_entries cannot represent on its own.
    vendor_evidence:
      - UKG Dimensions InTouch DX
      - Workday Clock-In
      - Deputy mobile
      - Quinyx Punch
    proposed_module: WFM-TIME-ATTENDANCE

  - id: B3-S2
    candidate: clock_punch_corrections
    rationale: >-
      Manager-edited or worker-edited punch corrections with audit trail required by
      FLSA recordkeeping. Distinct entity from time_entries because the audit chain on
      a correction is its own object lifecycle (proposed -> approved -> applied).
    vendor_evidence:
      - UKG
      - Workday
      - Replicon
      - Dayforce
    proposed_module: WFM-TIME-ATTENDANCE

  - id: B3-S3
    candidate: labor_demand_forecasts
    rationale: >-
      Forecasted required labour hours per day-part / department; the input to
      scheduling optimisation solvers. Mastered separately from work_schedules in
      every demand-driven WFM platform.
    vendor_evidence:
      - Legion
      - UKG
      - Quinyx
      - WorkJam
      - Verint
    proposed_module: WFM-SCHEDULING

  - id: B3-S4
    candidate: shift_swap_offers_or_requests
    rationale: >-
      Worker-initiated swap marketplace; distinct from work_shifts because the swap
      itself is a transient object with its own approval workflow (manager / peer /
      open-marketplace).
    vendor_evidence:
      - Deputy
      - When I Work
      - WorkJam
      - Quinyx
    proposed_module: WFM-SCHEDULING

  - id: B3-S5
    candidate: availability_preferences
    rationale: >-
      Worker-declared availability windows per day-of-week. Required input to
      Fair-Workweek-compliant scheduling and worker-experience scheduling features.
    vendor_evidence:
      - UKG
      - Workday
      - Deputy
      - When I Work
      - Quinyx
    proposed_module: WFM-SCHEDULING

  - id: B3-S6
    candidate: predictive_schedule_advance_notices_and_change_notices
    rationale: >-
      Statutory written-notice records under Fair Workweek / Predictive Scheduling
      laws (NYC, Seattle, SF, Chicago, Oregon). Each notice is its own audit-bearing
      object with effective dates and acknowledgment trail.
    vendor_evidence:
      - UKG Dimensions
      - Legion
      - Dayforce
    proposed_module: WFM-SCHEDULING

  - id: B3-S7
    candidate: accrual_grant_events_and_carryover_events
