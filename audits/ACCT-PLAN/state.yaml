b2:
  - id: B2-L1
    summary: "Leadership-tier classification: reclassify ACCT-PLAN as normal Phase-B, keep as pure-overlay leadership-tier, or hybrid?"
    question: "ACCT-PLAN is in SKILL.md B1's leadership-tier exception (with REV-INTEL, SALES-PERF, GTM-PLAN, PRM, OP-RES, BCM, SECOPS, SOAR, THREAT-INTEL, TPRM, VULN-MGMT, PRIV-MGMT, FINOPS, INTRANET, COLLAB-GOV) which implies zero masters. The flagship vendor surface shows it masters real entities (account_plans, mutual_action_plans, relationship_maps, white_space_maps, qbr_decks, key_account_metrics). Should we reclassify?"
    options:
      - "(a) reclassify as normal Phase-B and load the full master surface in B1B-V1 through B1B-V7"
      - "(b) keep leadership-tier and treat as pure-overlay (proposed masters move to a queued ABM-Planning or KAM domain; existing solutions become coverage of the overlay)"
      - "(c) hybrid: keep account_health_scores / account_growth_metrics as derived-signals consistent with leadership-tier; load account_plans, mutual_action_plans, relationship_maps, white_space_maps, qbr_decks as normal masters"
    why: "Gates B1B-M1, B1B-V*, and the SKILL.md leadership-tier list edit."

  - id: B2-M1
    summary: "Module shape: 6 modules (granular), 4 modules (clustered), or 3 modules (lean)?"
    question: "If B2-L1 lands on (a) or (c), how should the ACCT-PLAN module surface split?"
    options:
      - "(a) 6 modules: ACCT-PLAN-CORE, ACCT-PLAN-MUTUAL-ACTION, ACCT-PLAN-RELATIONSHIP, ACCT-PLAN-WHITESPACE, ACCT-PLAN-QBR, ACCT-PLAN-METRICS (granular per cluster, mirrors capability set)"
      - "(b) 4 modules: ACCT-PLAN-CORE (plans + objectives + strategies + key_accounts + segments) / ACCT-PLAN-RELATIONSHIP-WHITESPACE / ACCT-PLAN-EXECUTION (mutual_action_plans + qbr_meetings + qbr_action_items) / ACCT-PLAN-METRICS"
      - "(c) 3 modules: ACCT-PLAN-CORE / ACCT-PLAN-EXECUTION / ACCT-PLAN-METRICS (lean, collapses relationship + whitespace into core)"
    why: "Rewrites the proposed_module column on every B1B-V* row."

  - id: B2-T1
    summary: "Trigger-event publisher attribution: move events 169 and 170 to ACCT-PLAN masters, keep on customers (CRM), or introduce derived-signal events?"
    question: "Event 169 (account_health.declined) is dual-published from ACCT-PLAN (handoff 209) and CRM (handoff 1216), violating one-event-one-publisher. Event 170 (whitespace.identified) is on customers but only fired from ACCT-PLAN. How should we attribute?"
    options:
      - "(a) move event 169 anchor to a new account_health_scores ACCT-PLAN master (after B1B-V7); same for event 170 to white_space_maps (after B1B-V4); re-attribute CRM handoff 1216 to subscribe to ACCT-PLAN's publication"
      - "(b) keep events on customers (CRM-mastered); re-attribute ACCT-PLAN handoffs 209, 210 to have CRM as source instead; B1B-H1-209 drops here and moves to CRM"
      - "(c) introduce derived-signal trigger_events carrying own publisher independent of underlying master (catalog-wide shape change)"
    why: "Gates B1B-H1-209 and the eventual disposition of handoffs 209, 210. Interacts with B2-D1."
    affected_handoffs:
      - {handoff_id: 209, direction: outbound, source_domain: ACCT-PLAN, target_domain: CSM, trigger_event: account_health.declined, payload: customers}
      - {handoff_id: 210, direction: outbound, source_domain: ACCT-PLAN, target_domain: SALES-ENG, trigger_event: whitespace.identified, payload: customers}
      - {handoff_id: 1216, direction: cross-reference, source_domain: CRM, target_domain: FARMER-DIRECT-SALES, trigger_event: account_health.declined, payload: customers}
    affected_events:
      - {id: 169, event_name: account_health.declined, current_category: threshold}
      - {id: 170, event_name: whitespace.identified, current_category: signal}

  - id: B2-D1
    summary: "Duplicate event resolution: consolidate health_score.declined (197) and account_health.declined (169), keep both with distinct semantics, or accept redundancy."
    question: "Event 197 (health_score.declined) and event 169 (account_health.declined) both fire on customers and describe the same general signal. Event 197 has 3 handoff users (224 CRM to FINOPS, 486 CRM to CRM-internal, 1217 CRM to FARMER-DIRECT-SALES). Event 169 has 2 (209 ACCT-PLAN to CSM, 1216 CRM to FARMER-DIRECT-SALES). What's the call?"
    options:
      - "(a) consolidate on event 169, DELETE event 197, re-point handoffs 224, 486, 1217 to event 169"
      - "(b) keep both: event 197 is the analytics-side score-drop signal (CRM-scored), event 169 is the planning-side detection (ACCT-PLAN-flagged); distinct semantics"
      - "(c) keep both as known catalog redundancy"
    why: "Interacts with B2-T1; resolving (a) here constrains B2-T1's CRM-side re-attribution."
    affected_events:
      - {id: 197, event_name: health_score.declined, current_category: threshold}
      - {id: 169, event_name: account_health.declined, current_category: threshold}
    affected_handoffs:
      - {handoff_id: 209, direction: outbound, source_domain: ACCT-PLAN, target_domain: CSM, trigger_event: account_health.declined, payload: customers}
      - {handoff_id: 224, direction: cross-reference, source_domain: CRM, target_domain: FINOPS, trigger_event: health_score.declined, payload: customers}
      - {handoff_id: 486, direction: cross-reference, source_domain: CRM, target_domain: CRM, trigger_event: health_score.declined, payload: customers}
      - {handoff_id: 1216, direction: cross-reference, source_domain: CRM, target_domain: FARMER-DIRECT-SALES, trigger_event: account_health.declined, payload: customers}
      - {handoff_id: 1217, direction: cross-reference, source_domain: CRM, target_domain: FARMER-DIRECT-SALES, trigger_event: health_score.declined, payload: customers}

  - id: B2-K1
    summary: "key_accounts shape: separate master, enum attribute on customers, or junction?"
    question: "How should strategic key-account designation be modeled?"
    options:
      - "(a) key_accounts as a separate master in ACCT-PLAN-CORE referencing customers (Altify, Revegy shape)"
      - "(b) customers gains key_account_tier (enum) and assigned_account_team (json) fields (DemandFarm, Demandbase shape; CRM-extending)"
      - "(c) junction key_account_designations on (customers, key_account_segments) (compromise)"
    why: "Affects B1B-V5 directly. (b) requires cross-domain CRM coordination."

  - id: B2-C1
    summary: "Function-spine contributors: add Customer Success and Sales Operations, only Customer Success, or leave Sales-only?"
    question: "Only Sales is loaded as owner of ACCT-PLAN. The flagship vendor base argues Customer Success and Sales Operations are routine contributors. Should we load them?"
    options:
      - "(a) add Customer Success (id 23) and Sales Operations (id 52) as responsibility_type='contributor' rows"
      - "(b) add only Customer Success"
      - "(c) leave as-is; revisit during E-band authoring"
    why: "Independent; can apply any time. Affects RACI rollups."

  - id: B2-E1
    summary: "KAM-shaped role authoring: 4 roles, 2 roles, or defer."
    question: "Once B1B-M1 lands, which roles should we author for ACCT-PLAN?"
    options:
      - "(a) author 4 roles: Strategic Account Manager (cross-functional, business_function_id NULL), Key Account Director (Sales), Customer Success Account Manager (CSM, cross-module), Sales Operations Analyst (touches METRICS plus SALES-PERF)"
      - "(b) author only Strategic Account Manager plus Customer Success Account Manager (highest-traffic pair)"
      - "(c) defer until a dedicated E-band authoring pass"
    why: "Gated on B1B-M1 and B2-M1."

  - id: B2-A1
    summary: "Domain aliases: author 4, 2, or defer."
    question: "Zero domain_aliases rows on ACCT-PLAN. The market has well-known synonyms; how many should we load?"
    options:
      - "(a) author 4 aliases: KAM, key account management, strategic account management, account planning"
      - "(b) author 2 aliases: KAM, key account management"
      - "(c) defer until a separate aliases pass"
    why: "Independent. Feeds catalog search and per-domain skill trigger phrases per Rule #20."

  - id: B2-V1
    summary: "Salesforce Industries Cloud Strategic Account Plans positioning: add secondary, keep pure-play list, or industry-conditional."
    question: "Industries Cloud (Manufacturing / Consumer Goods / Financial Services) ships an industry-flavored Strategic Account Plans surface that overlaps both CRM (Sales Cloud) and pure-play ACCT-PLAN. Should we represent it?"
    options:
      - "(a) add Salesforce Sales Cloud or Industries Cloud as coverage_level='secondary' on ACCT-PLAN"
      - "(b) keep the 5-flagship pure-play list; treat CRM-suite competition as per-industry concern in industry-domain audits"
      - "(c) industry-conditional: add only if a pure-play coverage gap shows up on industry-flavored deployments"
    why: "Independent; commerce-shape decision."

b3:
  - id: B3-ABM-PLAN-SURFACE
    candidate: "ABM-Planning surface as own domain, sub-surface of ACCT-PLAN, or sub-surface of MA."
    rationale: "Demandbase Account Planning, 6sense, Madison Logic, Terminus all ship ABM platforms with planning surfaces, some explicitly called account planning. The boundary between ACCT-PLAN (named-existing-accounts deepening) and ABM-PLAN (targeted-net-new-accounts marketing) is real but the products blur it."
    vendor_evidence:
      - {vendor: Demandbase, evidence: 1st_class}
      - {vendor: 6sense, evidence: 1st_class}
      - {vendor: Madison Logic, evidence: secondary}
      - {vendor: Terminus, evidence: 1st_class}
    proposed_module: ABM-PLAN candidate domain (queued to audits/_missing-domains.md if the surface diverges enough)

  - id: B3-SALES-METHODOLOGY-OVERLAYS
    candidate: "sales_methodologies as a catalog-primitive master overlaying TAS / Miller Heiman / Strategic Selling / GAP."
    rationale: "Altify TAS, Revegy Miller Heiman, Prolifiq Strategic Selling, Salesforce Sales Methodology, and Korn Ferry GAP all overlay the same underlying record types. Either it is a config master (a row per methodology, referenced by account_plan_strategies) or vendor-internal."
    vendor_evidence:
      - {vendor: Upland Altify, evidence: 1st_class}
      - {vendor: Revegy, evidence: 1st_class}
      - {vendor: Prolifiq CRUSH, evidence: 1st_class}
      - {vendor: Korn Ferry, evidence: secondary}
    proposed_module: ACCT-PLAN-CORE (if loaded as catalog primitive)

