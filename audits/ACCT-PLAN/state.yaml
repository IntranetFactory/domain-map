    rationale: "Gainsight EBR / QBR Composer, Totango QBR module, ChurnZero QBR templates live in CSM platforms. Altify, Revegy, DemandFarm ship QBR surfaces in account planning. May reshape proposed ACCT-PLAN-QBR module into a shared master with CSM as embedded_master."
