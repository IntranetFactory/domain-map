schema_version: 2
domain: ACCT-PLAN
status: feedback_needed
next_action_by: agent
last_audit: "2026-06-07"

# ACCT-PLAN is master-bearing (overlay test: it persists real account_plans,
# mutual_action_plans, relationship_maps, white_space_maps) but UNBUILT:
# 0 domain_modules (M1 hard fail), 7 capability_domains, 0 masters.
# Per the UNBUILT clause the build cascade is SURFACED, not scaffolded.
# The 2026-06-07 state-driven pass executed only the two build-independent items
# (catalog UX copy, domain aliases); everything else gates on the build decisions below.

b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."
  - id: B1A-RECLASS
    summary: "Settled: ACCT-PLAN is master-bearing, not leadership-tier overlay. Leadership-tier zero-master exemption rescinded 2026-06-02; overlay test confirms masters (account_plans, mutual_action_plans, relationship_maps, white_space_maps). Needs a build, not an exemption."
    finding: >
      Under the overlay test ACCT-PLAN persists independently-authored records and is master-bearing.
      Live 2026-06-07: 0 domain_modules (M1 fail), 7 capability_domains, 0 masters; not deployable today.
      The prior "keep leadership-tier / ship an empty landing module" option is no longer valid.
    action: >
      Classification is settled (master-bearing). The structural build decisions (B2-L1, B2-M1, B2-K1,
      B2-T1) plus the module/master loads (B1B-M1, B1B-V1..V7) remain to be made and then executed by you.
    extra_reclassified: "2026-06-02 skill-changelog"

  - id: B1A-BUILD
    summary: "Unbuilt domain: 0 domain_modules (M1 fail), 7 capabilities and 0 masters awaiting a build."
    finding: "Live triage 2026-06-07: 0 domain_modules rows (M1 fail), 7 capability_domains rows, 0 masters. Not deployable today. Must be built before any persona / RACI / role / system-skill work applies."
    action: "Run Phase A (solutions are loaded) then M then B then S to author the module set, masters, and the system skills. If the result is multi-module, run Phase P (personas, role_modules, process_raci, lifecycle.process_id) afterward. Gated on B2-L1 + B2-M1 + B2-K1 + B2-T1."
    extra_phase_p_triage: "2026-06-02"

b1b:
  - id: B1B-M1-MODULES
    summary: "Author the chosen domain_modules set (6 / 4 / 3 module shape) plus domain_module_capabilities so every capability has a realizer."
    finding: "M1 / M2 / M4 FAIL. Zero domain_modules rows on a domain with 7 capabilities (RELATIONSHIP-MAPPING, WHITESPACE-MAPPING, ACCOUNT-PLAN-AUTHORING, MUTUAL-ACTION-PLANS, QBR-AUTOMATION, KEY-ACCOUNT-METRICS, POLITICAL-MAP-VISUALIZATION). Blocks the entire B / E / F surface and the per-module FK attribution on handoffs 209 and 210."
    action: "Once B2-M1 picks a module shape, author the modules as module_kind='full' rows plus domain_module_capabilities so all 7 capabilities are realized. Proposed 6-module shape: ACCT-PLAN-CORE, ACCT-PLAN-MUTUAL-ACTION, ACCT-PLAN-RELATIONSHIP, ACCT-PLAN-WHITESPACE, ACCT-PLAN-QBR, ACCT-PLAN-METRICS. Alternatives: 4-module (CORE / RELATIONSHIP-WHITESPACE / EXECUTION / METRICS), 3-module (CORE / EXECUTION / METRICS)."
    blocked_by:
      - {type: user_decision, ref: B2-M1}
    affected_entities:
      - domain_modules
      - domain_module_capabilities

  - id: B1B-S1-B10B-BACKFILL
    summary: "Re-run the B10b source_domain_module_id backfill on handoffs 209 and 210 once modules exist."
    finding: "Handoffs 209 (target CSM, event 169 account_health.declined) and 210 (target SALES-ENG, event 170 whitespace.identified) carry source_domain_module_id=NULL because ACCT-PLAN has zero modules. Handoff 209's attribution depends on the B2-T1 publisher decision."
    action: "After B1B-M1-MODULES lands and B2-T1 resolves, PATCH source_domain_module_id on handoff 210 to the new ACCT-PLAN-WHITESPACE module. Handoff 209 is conditional on B2-T1: if (a) it points at ACCT-PLAN-METRICS; if (b) the row instead moves to CRM as source."
    blocked_by:
      - {type: depends_on, ref: B1B-M1-MODULES, reason: "modules must exist to point the FK at"}
      - {type: user_decision, ref: B2-T1}
    affected_handoffs:
      - {handoff_id: 209, direction: outbound, source_domain: ACCT-PLAN, target_domain: CSM, trigger_event: account_health.declined, payload: customers, null_field: source_domain_module_id}
      - {handoff_id: 210, direction: outbound, source_domain: ACCT-PLAN, target_domain: SALES-ENG, trigger_event: whitespace.identified, payload: customers, null_field: source_domain_module_id}

  - id: B1B-H1-209-REFINE
    summary: "DESTRUCTIVE (surfaced): handoff 209 already carries an agent_curated APQC tag (process 148 'Manage customers and accounts', L3). The proposed sharper tag (process 717 'Manage sales/key account plan', L4) would REPLACE the existing weak tag."
    finding: "Live 2026-06-07: handoff_processes id 1073 (handoff 209, process 148, role implements, proposal_source agent_curated, record_status new) already covers the H1 gap. Coverage of cross-domain handoffs is 2 of 2 (handoff 210 = id 377/process 929). The 2026-05-31 audit proposed process 717 (a more precise L4 key-account-plan match) but adding it would duplicate the tag and refining means deleting/replacing 1073."
    action: "User decision: keep the existing L3 tag (1073), or REPLACE it with the L4 process 717. Replacing a non-empty tag is destructive (Rule #21) and is also gated on B2-T1 (if the publisher re-attributes to CRM, the tag belongs on CRM's outbound handoff instead)."
    blocked_by:
      - {type: user_decision, ref: B2-T1}
      - {type: destructive, ref: replace-weak-tag, reason: "swapping handoff_processes id 1073 (process 148 -> 717) overwrites an existing non-empty tag"}
    affected_handoffs:
      - {handoff_id: 209, direction: outbound, source_domain: ACCT-PLAN, target_domain: CSM, trigger_event: account_health.declined, payload: customers}
    extra_existing_tag: {handoff_processes_id: 1073, process_id: 148, process_name: "Manage customers and accounts", hierarchy_level: 3}
    extra_proposed_process_id: 717
    extra_proposed_process_name: "Manage sales/key account plan"

  - id: B1B-V1-ACCOUNT-PLANS
    summary: "Load account_plans master in ACCT-PLAN-CORE (or wherever B2-M1's module shape lands it)."
    finding: "MISSING entity. The account_plans master is the headline record-type across all 5 flagships; parent record for objectives, strategies, white-space cells, and stakeholder rollups."
    action: "Author data_objects row plus domain_module_data_objects (role=master, necessity=required) on the chosen target module, plus baseline lifecycle states (draft, approved, executed, archived) and pattern flags per Rule #12 entity_type=operational_workflow."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}
      - {type: user_decision, ref: B2-M1}
    affected_entities:
      - account_plans
    vendor_evidence: [Upland Altify, Revegy, DemandFarm, Prolifiq CRUSH, Demandbase Account Planning]
    extra_proposed_module: ACCT-PLAN-CORE

  - id: B1B-V2-MUTUAL-ACTION-PLANS
    summary: "Load mutual_action_plans master (prefixed per Rule #9 due to EMP-EXP action_plans collision)."
    finding: "MISSING entity. Collides on bare-word 'action_plans' with EMP-EXP's existing master (data_objects id 184); Rule #9 requires prefix arbitration. Mutual action plans (joint success plans, mutual close plans) ship in all 5 flagships."
    action: "Author data_objects row data_object_name='mutual_action_plans' (prefix form), plus DMDO and lifecycle states (draft, shared_with_buyer, acknowledged, in_progress, completed)."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}
      - {type: user_decision, ref: B2-M1}
    affected_entities:
      - mutual_action_plans
    vendor_evidence: [Upland Altify, Revegy, DemandFarm, Prolifiq CRUSH, Demandbase Account Planning]
    extra_proposed_module: ACCT-PLAN-MUTUAL-ACTION
    extra_collision_with: {data_object_id: 184, owner_domain: EMP-EXP, bare_word: action_plans}

  - id: B1B-V3-RELATIONSHIP-MAPS
    summary: "Load relationship_maps master in ACCT-PLAN-RELATIONSHIP."
    finding: "MISSING entity. Per-account org chart with influence and sentiment overlay; Revegy and DemandFarm headline this surface, Altify and Prolifiq carry it as a core sub-surface."
    action: "Author data_objects row plus DMDO. Likely sibling masters: stakeholder_records, stakeholder_relationships, political_maps."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}
      - {type: user_decision, ref: B2-M1}
    affected_entities:
      - relationship_maps
    vendor_evidence: [Upland Altify, Revegy, DemandFarm, Prolifiq CRUSH, Demandbase Account Planning]
    extra_proposed_module: ACCT-PLAN-RELATIONSHIP

  - id: B1B-V4-WHITE-SPACE-MAPS
    summary: "Load white_space_maps master in ACCT-PLAN-WHITESPACE."
    finding: "MISSING entity. The product-by-business-unit grid per account; DemandFarm headlines the grid surface, all other flagships ship it. The outbound whitespace.identified event (handoff 210) should fire from this master once it exists."
    action: "Author data_objects row plus DMDO; likely sibling masters: white_space_opportunities, product_coverage_records."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}
      - {type: user_decision, ref: B2-M1}
    affected_entities:
      - white_space_maps
    vendor_evidence: [Upland Altify, Revegy, DemandFarm, Prolifiq CRUSH, Demandbase Account Planning]
    extra_proposed_module: ACCT-PLAN-WHITESPACE

  - id: B1B-V5-KEY-ACCOUNTS
    summary: "Load key_accounts master (or alternative shape per B2-K1) in ACCT-PLAN-CORE."
    finding: "MISSING entity (depending on shape decision). Strategic key-account designation surface; flagship vendors split on whether it is a separate master (Altify, Revegy) or an enriched attribute on customers (DemandFarm, Demandbase)."
    action: "If B2-K1 = (a), author key_accounts as a master with FK to customers. If (b), PATCH /fields to add key_account_tier / assigned_account_team on customers (cross-domain coordination with CRM). If (c), author a junction key_account_designations on (customers, key_account_segments)."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}
      - {type: user_decision, ref: B2-M1}
      - {type: user_decision, ref: B2-K1}
    affected_entities:
      - key_accounts
      - customers
    vendor_evidence: [Upland Altify, Revegy, DemandFarm, Prolifiq CRUSH, Demandbase Account Planning]
    extra_proposed_module: ACCT-PLAN-CORE

  - id: B1B-V6-QBR-MEETINGS
    summary: "Load qbr_meetings master in ACCT-PLAN-QBR."
    finding: "MISSING entity. The scheduled / held QBR session with attendees and outcomes; all 5 flagships ship this surface. CSM-side variants (Gainsight EBR, Totango QBR, ChurnZero) are the b3 QBR-ownership-boundary candidate."
    action: "Author data_objects row plus DMDO; likely sibling masters: qbr_action_items, qbr_decks (templates), qbr_audit_trails."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}
      - {type: user_decision, ref: B2-M1}
    affected_entities:
      - qbr_meetings
    vendor_evidence: [Upland Altify, Revegy, DemandFarm, Prolifiq CRUSH, Demandbase Account Planning]
    extra_proposed_module: ACCT-PLAN-QBR

  - id: B1B-V7-ACCOUNT-HEALTH-SCORES
    summary: "Load account_health_scores master in ACCT-PLAN-METRICS (the master from which event 169 should fire under B2-T1 option a)."
    finding: "MISSING entity. Composite health rollup per account with feature contributions; the planning-side analytic master from which the outbound account_health.declined event (handoff 209) should fire under B2-T1 option (a)."
    action: "Author data_objects row plus DMDO; likely sibling masters: account_growth_metrics, account_engagement_metrics, account_scoring_models. If B2-T1 = (a), event 169 anchor moves from customers to this master."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}
      - {type: user_decision, ref: B2-M1}
      - {type: user_decision, ref: B2-T1}
    affected_entities:
      - account_health_scores
    vendor_evidence: [Upland Altify, Revegy, DemandFarm, Prolifiq CRUSH, Demandbase Account Planning]
    extra_proposed_module: ACCT-PLAN-METRICS

b2:
  - id: B2-L1
    summary: "Leadership-tier classification: reclassify ACCT-PLAN as normal Phase-B, keep as pure-overlay leadership-tier, or hybrid?"
    question: "The flagship vendor surface shows ACCT-PLAN masters real entities (account_plans, mutual_action_plans, relationship_maps, white_space_maps, qbr_decks, key_account_metrics). Should we treat it as master-bearing and load the full surface?"
    options:
      - "(a) reclassify as normal Phase-B and load the full master surface in B1B-V1 through B1B-V7"
      - "(b) keep leadership-tier and treat as pure-overlay (proposed masters move to a queued ABM-Planning or KAM domain; existing solutions become coverage of the overlay)"
      - "(c) hybrid: keep account_health_scores / account_growth_metrics as derived-signals; load account_plans, mutual_action_plans, relationship_maps, white_space_maps, qbr_decks as normal masters"
    why: "Gates B1B-M1, B1B-V*. Note: B1A-RECLASS already records the classification as settled toward master-bearing (a or c); this item remains so the user can pick (a) vs (c) and confirm before the build."

  - id: B2-M1
    summary: "Module shape: 6 modules (granular), 4 modules (clustered), or 3 modules (lean)?"
    question: "If B2-L1 lands on (a) or (c), how should the ACCT-PLAN module surface split?"
    options:
      - "(a) 6 modules: ACCT-PLAN-CORE, ACCT-PLAN-MUTUAL-ACTION, ACCT-PLAN-RELATIONSHIP, ACCT-PLAN-WHITESPACE, ACCT-PLAN-QBR, ACCT-PLAN-METRICS"
      - "(b) 4 modules: ACCT-PLAN-CORE / ACCT-PLAN-RELATIONSHIP-WHITESPACE / ACCT-PLAN-EXECUTION / ACCT-PLAN-METRICS"
      - "(c) 3 modules: ACCT-PLAN-CORE / ACCT-PLAN-EXECUTION / ACCT-PLAN-METRICS (collapses relationship + whitespace into core)"
    why: "Rewrites the proposed_module column on every B1B-V* row."

  - id: B2-T1
    summary: "Trigger-event publisher attribution: move events 169 and 170 to ACCT-PLAN masters, keep on customers (CRM), or introduce derived-signal events?"
    question: "Event 169 (account_health.declined) is dual-published from ACCT-PLAN (handoff 209) and CRM (handoff 1216), violating one-event-one-publisher. Event 170 (whitespace.identified) is on customers but only fired from ACCT-PLAN. How should we attribute?"
    options:
      - "(a) move event 169 anchor to a new account_health_scores ACCT-PLAN master (after B1B-V7); same for event 170 to white_space_maps (after B1B-V4); re-attribute CRM handoff 1216 to subscribe"
      - "(b) keep events on customers (CRM-mastered); re-attribute ACCT-PLAN handoffs 209, 210 to have CRM as source; B1B-H1-209-REFINE then belongs to CRM"
      - "(c) introduce derived-signal trigger_events carrying own publisher independent of underlying master (catalog-wide shape change)"
    why: "Gates B1B-H1-209-REFINE, B1B-S1, and the eventual disposition of handoffs 209, 210. Interacts with B2-D1."
    affected_handoffs:
      - {handoff_id: 209, direction: outbound, source_domain: ACCT-PLAN, target_domain: CSM, trigger_event: account_health.declined, payload: customers}
      - {handoff_id: 210, direction: outbound, source_domain: ACCT-PLAN, target_domain: SALES-ENG, trigger_event: whitespace.identified, payload: customers}
      - {handoff_id: 1216, direction: cross-reference, source_domain: CRM, target_domain: FARMER-DIRECT-SALES, trigger_event: account_health.declined, payload: customers}
    affected_events:
      - {id: 169, event_name: account_health.declined, current_category: threshold}
      - {id: 170, event_name: whitespace.identified, current_category: signal}

  - id: B2-D1
    summary: "Duplicate event resolution: consolidate health_score.declined (197) and account_health.declined (169), keep both with distinct semantics, or accept redundancy."
    question: "Event 197 (health_score.declined) and event 169 (account_health.declined) both fire on customers and describe the same general signal. Event 197 has 3 handoff users (224, 486, 1217). Event 169 has 2 (209, 1216). What's the call?"
    options:
      - "(a) consolidate on event 169, DELETE event 197, re-point handoffs 224, 486, 1217 to event 169 (DESTRUCTIVE)"
      - "(b) keep both: event 197 is the analytics-side score-drop signal (CRM-scored), event 169 is the planning-side detection (ACCT-PLAN-flagged); distinct semantics"
      - "(c) keep both as known catalog redundancy"
    why: "Interacts with B2-T1. Option (a) is destructive (DELETE event + re-point handoffs) and CRM-owned; never executed unapproved."
    affected_events:
      - {id: 197, event_name: health_score.declined, current_category: threshold}
      - {id: 169, event_name: account_health.declined, current_category: threshold}

  - id: B2-K1
    summary: "key_accounts shape: separate master, enum attribute on customers, or junction?"
    question: "How should strategic key-account designation be modeled?"
    options:
      - "(a) key_accounts as a separate master in ACCT-PLAN-CORE referencing customers (Altify, Revegy shape)"
      - "(b) customers gains key_account_tier (enum) and assigned_account_team (json) fields (DemandFarm, Demandbase shape; CRM-extending, cross-domain coordination)"
      - "(c) junction key_account_designations on (customers, key_account_segments) (compromise)"
    why: "Affects B1B-V5 directly. (b) requires cross-domain CRM coordination."

  - id: B2-C1
    summary: "Function-spine contributors: add Customer Success and Sales Operations, only Customer Success, or leave Sales-only?"
    question: "Only Sales (business_function_id 21) is loaded as owner of ACCT-PLAN. The flagship vendor base argues Customer Success (id 23) and Sales Operations (id 52) are routine contributors. Should we load them?"
    options:
      - "(a) add Customer Success (id 23) and Sales Operations (id 52) as responsibility_type='contributor' rows"
      - "(b) add only Customer Success"
      - "(c) leave as-is; revisit during E-band authoring"
    why: "Independent; can apply any time. Affects RACI rollups. Surfaced (not executed) as a b2 judgment call."

  - id: B2-E1
    summary: "KAM-shaped role authoring: 4 roles, 2 roles, or defer."
    question: "Once B1B-M1 lands, which roles should we author for ACCT-PLAN?"
    options:
      - "(a) author 4 roles: Strategic Account Manager (cross-functional, business_function_id NULL), Key Account Director (Sales), Customer Success Account Manager (CSM, cross-module), Sales Operations Analyst (METRICS plus SALES-PERF)"
      - "(b) author only Strategic Account Manager plus Customer Success Account Manager (highest-traffic pair)"
      - "(c) defer until a dedicated E-band authoring pass"
    why: "Gated on B1B-M1 and B2-M1."

  - id: B2-V1
    summary: "Salesforce Industries Cloud Strategic Account Plans positioning: add secondary, keep pure-play list, or industry-conditional."
    question: "Industries Cloud (Manufacturing / Consumer Goods / Financial Services) ships an industry-flavored Strategic Account Plans surface that overlaps both CRM and pure-play ACCT-PLAN. Should we represent it?"
    options:
      - "(a) add Salesforce Sales Cloud or Industries Cloud as coverage_level='secondary' on ACCT-PLAN"
      - "(b) keep the 5-flagship pure-play list; treat CRM-suite competition as a per-industry concern"
      - "(c) industry-conditional: add only if a pure-play coverage gap shows up on industry-flavored deployments"
    why: "Independent; commerce-shape decision. (Scope-discipline: adding a solution is a market-shape write; left to user.)"

b3:
  - id: B3-ABM-PLAN-SURFACE
    candidate: "ABM-Planning surface as own domain, sub-surface of ACCT-PLAN, or sub-surface of MA."
    rationale: "Demandbase Account Planning, 6sense, Madison Logic, Terminus all ship ABM platforms with planning surfaces, some explicitly called account planning. The boundary between ACCT-PLAN (named-existing-accounts deepening) and ABM-PLAN (targeted-net-new-accounts marketing) is real but the products blur it."
    vendor_evidence:
      - {vendor: Demandbase, evidence: 1st_class}
      - {vendor: 6sense, evidence: 1st_class}
      - {vendor: Madison Logic, evidence: secondary}
      - {vendor: Terminus, evidence: 1st_class}
    proposed_module: ABM-PLAN candidate domain (queued to audits/_missing-domains.md if the surface diverges enough)

  - id: B3-SALES-METHODOLOGY-OVERLAYS
    candidate: "sales_methodologies as a catalog-primitive master overlaying TAS / Miller Heiman / Strategic Selling / GAP."
    rationale: "Altify TAS, Revegy Miller Heiman, Prolifiq Strategic Selling, Salesforce Sales Methodology, and Korn Ferry GAP all overlay the same underlying record types. Either a config master (a row per methodology, referenced by account_plan_strategies) or vendor-internal."
    vendor_evidence:
      - {vendor: Upland Altify, evidence: 1st_class}
      - {vendor: Revegy, evidence: 1st_class}
      - {vendor: Prolifiq CRUSH, evidence: 1st_class}
      - {vendor: Korn Ferry, evidence: secondary}
    proposed_module: ACCT-PLAN-CORE (if loaded as catalog primitive)

  - id: B3-DIGITAL-SALES-ROOMS
    candidate: "Digital sales room (DSR) overlap with mutual_action_plans: DSR as enrichment, MAP sub-shape, or own domain (DIGITAL-SALES-ROOM)."
    rationale: "GetAccept, Recapped, Aligned, and Trumpet are pure-play DSR vendors. The shape: shared workspace plus chat plus e-sign plus content sharing plus mutual-close milestone tracking. Boundary with mutual_action_plans is fuzzy."
    vendor_evidence:
      - {vendor: GetAccept, evidence: 1st_class}
      - {vendor: Recapped, evidence: 1st_class}
      - {vendor: Aligned, evidence: 1st_class}
      - {vendor: Trumpet, evidence: 1st_class}
    proposed_module: DIGITAL-SALES-ROOM candidate (queue to audits/_missing-domains.md)

  - id: B3-TIER-PROMOTION-LIFECYCLE
    candidate: "Account-tier promotion / demotion as workflow gate (lifecycle states on key_accounts) vs. configuration (no workflow)."
    rationale: "Altify and Revegy ship explicit promotion workflows (revenue, comp, CSM implications); DemandFarm treats tier as manual setting. Affects whether key_accounts has requires_permission=true lifecycle states."
    vendor_evidence:
      - {vendor: Upland Altify, evidence: 1st_class}
      - {vendor: Revegy, evidence: 1st_class}
      - {vendor: DemandFarm, evidence: absent}
    proposed_module: ACCT-PLAN-CORE (for the lifecycle states on key_accounts)

  - id: B3-TEAM-ASSIGNMENTS-SHAPE
    candidate: "key_account_team_assignments as separate junction master vs. per-role columns on key_accounts."
    rationale: "Altify and Revegy carry the junction (account director, CSM, sales engineer, executive sponsor); Prolifiq embeds as columns. RBAC over the planning surface favors the junction shape."
    vendor_evidence:
      - {vendor: Upland Altify, evidence: 1st_class}
      - {vendor: Revegy, evidence: 1st_class}
      - {vendor: Prolifiq CRUSH, evidence: secondary}
    proposed_module: ACCT-PLAN-CORE

  - id: B3-QBR-OWNERSHIP-BOUNDARY
    candidate: "QBR ownership: ACCT-PLAN-mastered, CSM-mastered, or shared master with embedded_master in the non-owning side."
    rationale: "Gainsight EBR / QBR Composer, Totango QBR module, ChurnZero QBR templates live in CSM platforms. Altify, Revegy, DemandFarm ship QBR surfaces in account planning. May reshape proposed ACCT-PLAN-QBR module into a shared master with CSM as embedded_master."
    vendor_evidence:
      - {vendor: Gainsight, evidence: 1st_class}
      - {vendor: Totango, evidence: 1st_class}
      - {vendor: ChurnZero, evidence: 1st_class}
      - {vendor: Upland Altify, evidence: 1st_class}
      - {vendor: Revegy, evidence: 1st_class}
      - {vendor: DemandFarm, evidence: 1st_class}
    proposed_module: ACCT-PLAN-QBR vs. CSM module

  - id: B3-PREDICTIVE-WHITESPACE
    candidate: "Predictive whitespace scoring as ML-driven (account_scoring_models covers it) vs. configuration-driven (manual grid; no separate model master)."
    rationale: "DemandFarm AI and Demandbase Intent ship predictive whitespace; Altify and Revegy treat as static grid. The 5-vendor surface splits 2:3 on predictive vs. manual."
    vendor_evidence:
      - {vendor: DemandFarm, evidence: 1st_class}
      - {vendor: Demandbase, evidence: 1st_class}
      - {vendor: Upland Altify, evidence: absent}
      - {vendor: Revegy, evidence: absent}
    proposed_module: ACCT-PLAN-METRICS (if a separate whitespace_scoring_models is warranted)
