    summary: "Decide the DAM module split (2 / 3 / 4 modules) and name the modules. LOAD-BEARING: gates the entire b1b build cascade."
    question: |
      Which module split for DAM? Options:
        (a) 2-module: DAM-ASSET-LIB + DAM-DISTRIBUTION
        (b) 3-module: DAM-ASSET-LIB + DAM-DISTRIBUTION + DAM-CREATIVE-REVIEW
        (c) 4-module: DAM-ASSET-LIB + DAM-DISTRIBUTION + DAM-CREATIVE-REVIEW + DAM-RIGHTS-MGMT
    options:
      - 2-module: DAM-ASSET-LIB, DAM-DISTRIBUTION
      - 3-module: DAM-ASSET-LIB, DAM-DISTRIBUTION, DAM-CREATIVE-REVIEW
      - 4-module: DAM-ASSET-LIB, DAM-DISTRIBUTION, DAM-CREATIVE-REVIEW, DAM-RIGHTS-MGMT
    why: |
      The chosen split is the prerequisite for B1B-S1 (modules), B1B-S3 (capability binding), B1B-S8 (lifecycle state domain_module_id), B1B-B1/B2/B3 (handoff per-module FKs), and B1B-M1..M8 routing. Until this is decided DAM stays unbuilt.

  - id: B2-2
    summary: "Decide the pim_digital_assets (816) vs digital_assets (137) seam. CROSS-DOMAIN: PIM overlap, surface only."
    question: |
      PIM masters pim_digital_assets in PIM-DIGITAL-ASSETS (module 142, domain 167); DAM masters digital_assets (137). The two are parallel masters for the same digital-asset-mastery concept.
      Options: (a) keep parallel masters (deliberate v1 seam); (b) demote pim_digital_assets to embedded_master consuming the DAM master; (c) merge the two data_objects (heavy refactor).
    options:
      - keep-parallel
      - demote-pim-to-embedded-master
      - merge-data-objects
    why: |
      Master-ownership question spanning DAM and PIM. Affects PIM-side (demote requires PIM-side DMDO and relationship migration). Tracked as a report-only owed item against PIM; surfaced here per the DAM/PIM digital-asset-mastery overlap.

  - id: B2-3
    summary: "Decide creative_briefs (483) and creative_deliverables (484) placement in DAM modules."
    question: |
      Once DAM modules exist, are creative_briefs (483) and creative_deliverables (484) recorded as `consumer` (referenced read-only, master in AGENCY-MGMT) or `embedded_master` (DAM ships a local shell so it deploys standalone without AGENCY-MGMT)?
    options:
      - consumer
      - embedded_master
    why: |
      AGENCY-MGMT is the canonical master. Most brand-led DAMs ship without an agency tier (argues for embedded_master), but AGENCY-MGMT users would expect DAM to read through to their master (argues for consumer + DMDO consumer row).
    blocked_by:
      - {type: user_decision, ref: B2-1}

  - id: B2-4
    summary: "Decide which regulations to attach to DAM now versus defer."
    question: |
      DAM has zero domain_regulations rows. Which to load now?
    options:
      - GDPR (personal content in assets, model releases)
      - CCPA (CA equivalent)
      - Copyright / DMCA (third-party-licensed assets)
      - HIPAA (healthcare-vertical-only)
      - Trademark / FTC advertising guidelines (situational)
      - defer all to a later compliance audit
    why: |
      Compliance entities (`asset_rights`, `model_releases`) tie back to these regulations; loading the regulation rows now lets the embedding entities reference them.

  - id: B2-5
    summary: "Decide cross-cutting capability scope for the candidate DAM capabilities (also raises capability count to clear A2)."
    question: |
      Of the candidate capabilities (asset-library, asset-taxonomy, rights-mgmt, brand-portal, asset-distribution, dynamic-delivery-transformation, and the cross-cutting BRAND-MGMT / DIGITAL-RIGHTS-MGMT), which to author as cross-cutting and which to keep domain-prefixed?
    options:
      - cross-cutting: BRAND-MGMT, DIGITAL-RIGHTS-MGMT
      - domain-prefixed: DAM-ASSET-LIB, DAM-ASSET-TAXONOMY, DAM-BRAND-PORTAL, DAM-ASSET-DISTRIBUTION, DAM-DYNAMIC-DELIVERY
      - other (user names)
    why: |
      DAM has only 1 capability today (floor 3). Cross-cutting capabilities link to multiple domains; domain-prefixed are DAM-only. The decision affects which capabilities can be reused by HCMS, PIM, MRM, AGENCY-MGMT, and raises DAM's count to clear A2.

  - id: B2-6
    summary: "Personas/RACI for the Brand and Creative function: DEFER (Phase P, owner already set). Author now versus defer until modules ship."
    question: |
      Author the Brand and Creative function (id 55) roles (BRAND-CREATIVE-BRAND-MANAGER, BRAND-CREATIVE-CREATIVE-OPS, BRAND-CREATIVE-PHOTOGRAPHER / CONTENT-CREATOR) now, or defer until after modules ship?
    options:
      - author-now
      - defer-until-modules
    why: |
      Roles/personas depend on modules (E-band role_modules junction). Authoring now without modules creates orphans; deferring is the cleaner sequence. Personas are a Phase-P deferral regardless. The owner/contributor business_function_domains rows already exist (function 55 owner, function 25 contributor).
    blocked_by:
      - {type: user_decision, ref: B2-1}

  - id: B2-7
    summary: "Pre-specify exact tuples for the 3 outbound digital_assets -> users relationship rows (gates B1B-S7)."
    question: |
      Rule #10 wants symmetric edges. For each of the 3 inbound user-edges (641 uploaded, 642 owns, 643 approves), supply the exact tuple for the outbound row: (relationship_verb, inverse_verb, owner_side, data_object_relationship_label, cardinality if applicable).
    options:
      - "Mirror the inbound: e.g. (was_uploaded_by, uploaded, target, was_uploaded_by)"
      - "Provide explicit alternatives"
      - "Skip and let the inbound rows alone satisfy Rule #10"
    why: |
      The audit asked for the rows but never pre-specified the tuples; without them the agent cannot load.

  - id: B2-S9
    summary: "DESTRUCTIVE judgment: positively re-evaluate the 3 pattern flags on digital_assets (137). Agent will not flip without approval."
    question: |
      All three pattern flags are false on digital_assets. Audit recommends positive re-evaluation:
        - has_personal_content: plausible (model releases, employee photography, GDPR).
        - has_submit_lock: plausible on approved -> published transition.
        - has_single_approver: plausible on certain workflows.
      Which flips to apply?
    options:
      - has_personal_content=true
      - has_submit_lock=true
      - has_single_approver=true
      - any combination
      - none (keep defaults)
    why: |
      Pattern flags drive downstream behavior (UI hints, validation gates). The agent will not flip pattern flags without explicit user approval.

  - id: B2-H1
    summary: "DESTRUCTIVE / Rule #1: review the 4 handoff_processes rows on DAM handoffs and decide which to promote to record_status=approved."
    question: |
      Four handoff_processes rows currently sit at record_status=new for DAM-touching handoffs:
        - 709: handoff 98 -> process 1763 (Publish approved content, L4 21681), agent_curated.
        - 255: handoff 344 -> process 141 (Manage product marketing material, L3 16629), agent_curated.
        - 710: handoff 344 -> process 1762 (Assess and approve content, L4 21680), agent_curated.
        - 711: handoff 806 -> process 428 (Develop and manage content, L3 21670), agent_curated.
      Per Rule #1 the agent will not flip record_status without user-explicit per-row approval. Which to mark approved / pending / rejected?
    options:
      - Approve all 4
      - Approve a subset (name which)
      - Reject some (name which)
      - Leave all at new
    why: |
      Headline catalog-quality metric for the H-band is approved-row count. Currently zero approved. All 4 tag rows already exist at record_status=new (no insert owed); only the approval flip is pending.

