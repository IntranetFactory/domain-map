b2:
  - id: B2-MOD-SHAPE
    summary: "DISCOVERY modularization shape: 1, 2, 3, or 4 modules; choice gates the largest cluster of Bucket 1 items."
    question: "Which module set should DISCOVERY take?"
    options:
      - "(a) Single-module DISCOVERY-ENGINE (viable only if capability count stays ≤2 per Rule #14 M2)"
      - "(b) Two modules: DISCOVERY-NETWORK-SCAN + DISCOVERY-CLOUD-INVENTORY"
      - "(c) Three modules: DISCOVERY-NETWORK-SCAN + DISCOVERY-CLOUD-INVENTORY + DISCOVERY-SERVICE-MAPPING (recommended default; triangulates against CMDB-SERVICE-MAPPING)"
      - "(d) Four modules: above + DISCOVERY-RECONCILIATION"
    why: "Rule #14 M1 + M2 hard fail; cascades to every per-module band (M4, M6, M8, B12 prefix, E1-E5, F2-F5, B10b backfill, DMDO migration). Recommendation: (c) but the design decision is the user's."

  - id: B2-MON-POLICIES
    summary: "monitoring_policies (86) canonical master: ITOM or RMM (DISCOVERY contributes only)."
    question: "Which domain canonically masters monitoring_policies once DMDO replaces legacy domain_data_objects?"
    options: ["ITOM (operations-platform centric)", "RMM (remote-management centric)"]
    why: "Legacy domain_data_objects has both ITOM and RMM mastering id 86. DMDO is empty for id 86 today. M7 catalog-wide single-master will hard-fail once both modularize. DISCOVERY contributes via legacy rollup only; the call belongs to ITOM's and RMM's next audits, not DISCOVERY's, but the decision affects how DISCOVERY's contributor row in B1B-DMDO-MIGRATE is shaped."

  - id: B2-SVC-MAPS
    summary: "service_maps (79) canonical ownership: DISCOVERY vs CMDB."
    question: "Does DISCOVERY canonically master service_maps (option a), or does CMDB-SERVICE-MAPPING continue to canonically master with DISCOVERY publishing scan-completed events (option b, default)?"
    options:
      - "(a) Move master to a DISCOVERY-SERVICE-MAPPING module (requires B2-MOD-SHAPE option c or d); CMDB demotes to embedded_master or consumer"
      - "(b) Keep CMDB-SERVICE-MAPPING as canonical master (recommended); DISCOVERY publishes discovery_scan.completed already. No further action."
    why: "Legacy domain_data_objects rollup had DISCOVERY listed as contributor on service_maps; that legacy row was deleted in the prior continuation. The audit recommendation is (b) but confirm before authoring B1B-INTRA-RELATIONSHIPS edges around discovered_devices → service_maps."

  - id: B2-SHADOW-IT
    summary: "shadow_it_apps handoff 47: re-source from SMP or keep on DISCOVERY?"
    question: "Handoff 47 publishes sso_login.unsanctioned_app → SMP with payload shadow_it_apps. The trigger event is IdP-fed, which is SMP's native channel, not a discovery scan."
    options:
      - "(a) Keep handoff 47 outbound from DISCOVERY (current shape; DISCOVERY detects shadow IT via network/DNS scanning)"
      - "(b) Re-source the handoff to SMP; SMP authors its own outbound (DISCOVERY's outbound set drops handoff 47)"
      - "(c) Re-trigger DISCOVERY side with a discovery-scan-native event (e.g. shadow_app.discovered_via_network_scan); keep handoff 47 but rebind to a new trigger_event"
    why: "Affects B1B-HANDOFF-ATTRIB handoff 47 row, the APQC tag on handoff 47 (currently PCF 294), and whether SMP's next audit owes an outbound on this event."

b3:
  - id: B3-DISCOVERY-PATTERNS
    candidate: discovery_patterns
    rationale: "Configuration-shaped entity defining how a scan classifies a device. Universal in agentless discovery products. Phase 0 vetting recommended due to vendor variation in pattern modeling."
    vendor_evidence:
      - ServiceNow Discovery (Patterns)
      - BMC Helix Discovery (ADDM Patterns)
      - Device42 (Auto-Discovery Rules)
    proposed_module: DISCOVERY-NETWORK-SCAN

  - id: B3-DISCOVERY-CREDENTIALS
    candidate: discovery_credentials
    rationale: "Credential profiles (SNMP, SSH, WinRM, AWS access keys, K8s tokens) drive scans. Distinct from discovery_sources; one source uses one or more credentials. Sensitive entity (Vault / KMS-backed in every flagship)."
    vendor_evidence:
      - ServiceNow Discovery
      - BMC Helix Discovery
      - Device42
      - Lansweeper
      - Tanium
    proposed_module: DISCOVERY-NETWORK-SCAN

  - id: B3-DISCOVERY-SCHEDULES
    candidate: discovery_schedules
    rationale: "Cron-shaped recurrence per scan. Universal scheduling abstraction across flagship products."
    vendor_evidence:
      - ServiceNow Discovery Schedules
      - BMC Helix Discovery Schedules
      - Lansweeper Scanning Schedules
    proposed_module: per realizing module

  - id: B3-RECONCILIATION-RULES
    candidate: reconciliation_rules
    rationale: "Logic that maps a discovered_device into a configuration_item. Heavy in CMDB-anchored vendors. Phase 0 vetting recommended due to vendor variation in rule modeling and overlap with CMDB-side normalization."
    vendor_evidence:
