b2:
  - id: B2-MOD-SHAPE
    summary: "DISCOVERY modularization shape: 1, 2, 3, or 4 modules; choice gates the entire build and every per-module b1b item."
    question: "Which module set should DISCOVERY take?"
    options:
      - "(a) Single-module DISCOVERY-ENGINE (viable only if capability count stays <=2 per Rule #14 M2)"
      - "(b) Two modules: DISCOVERY-NETWORK-SCAN + DISCOVERY-CLOUD-INVENTORY"
      - "(c) Three modules: DISCOVERY-NETWORK-SCAN + DISCOVERY-CLOUD-INVENTORY + DISCOVERY-SERVICE-MAPPING (recommended default; triangulates against CMDB-SERVICE-MAPPING)"
      - "(d) Four modules: above + DISCOVERY-RECONCILIATION"
    why: "Rule #14 M1 + M2 hard fail; cascades to every per-module band (M4, M6, M8, B12 prefix, E1-E5, B10b backfill, DMDO migration, capability authoring). Recommendation: (c) but the design decision is the user's."

  - id: B2-MON-POLICIES
    summary: "monitoring_policies (86) canonical master: ITOM or RMM (DISCOVERY contributes only)."
    question: "Which domain canonically masters monitoring_policies once DMDO replaces legacy domain_data_objects?"
    options: ["ITOM (operations-platform centric)", "RMM (remote-management centric)"]
    why: "Legacy domain_data_objects has both ITOM and RMM mastering id 86. DMDO is empty for id 86 today. M7 catalog-wide single-master will hard-fail once both modularize. The call belongs to ITOM's and RMM's next audits, not DISCOVERY's, but it affects how DISCOVERY's contributor row in B1B-DMDO-MIGRATE is shaped."

  - id: B2-SVC-MAPS
    summary: "service_maps (79) canonical ownership: DISCOVERY vs CMDB."
    question: "Does DISCOVERY canonically master service_maps (option a), or does CMDB-SERVICE-MAPPING continue to master with DISCOVERY publishing scan-completed events (option b, default)?"
    options:
      - "(a) Move master to a DISCOVERY-SERVICE-MAPPING module (requires B2-MOD-SHAPE option c or d); CMDB demotes to embedded_master or consumer"
      - "(b) Keep CMDB-SERVICE-MAPPING as canonical master (recommended); DISCOVERY publishes discovery_scan.completed already. No further action."
    why: "Confirm before authoring B1B-INTRA-RELATIONSHIPS edges around discovered_devices -> service_maps."

  - id: B2-SHADOW-IT
    summary: "shadow_it_apps handoff 47: re-source from SMP, keep as-is, or rebind to a scan-native trigger?"
    question: "Handoff 47 publishes sso_login.unsanctioned_app -> SMP with payload shadow_it_apps. The trigger event is IdP-fed, which is SMP's native channel, not a discovery scan."
    options:
      - "(a) Keep handoff 47 outbound from DISCOVERY on the current sso_login event (no change)"
      - "(b) Re-source the handoff to SMP; SMP authors its own outbound (DISCOVERY's outbound set drops handoff 47)"
      - "(c) Keep handoff 47 outbound from DISCOVERY but rebind to a discovery-scan-native event (e.g. shadow_app.discovered_via_network_scan)"
    why: "Recommendation REVERSED a->c by Phase 0 (2026-06-08). Vendor evidence: discovery products DO surface shadow / unmanaged IT, but via network/DNS scanning (runZero unmanaged-device discovery, Lansweeper passive + credential-free fingerprinting of unknown/unmanaged assets, Axonius unmanaged-device visibility), NOT via an IdP sign-on stream, which is SMP's native channel. So DISCOVERY should keep emitting the signal (option a is right that discovery detects it) but on a scan-native trigger (option c), not the sso_login event (which belongs to SMP). Affects B1B-HANDOFF-ATTRIB handoff 47 row, the APQC tag on handoff 47 (currently PCF 294), and whether SMP's next audit owes an outbound. (b) and (c) are destructive re-attributions: surface, do not apply."

b3:
  - id: B3-DISCOVERY-PATTERNS
    candidate: discovery_patterns
    rationale: "Configuration-shaped entity defining how a scan classifies a device. Universal in agentless discovery products. Phase 0 vetting recommended due to vendor variation in pattern modeling."
    proposed_module: DISCOVERY-NETWORK-SCAN

  - id: B3-DISCOVERY-CREDENTIALS
    candidate: discovery_credentials
    rationale: "Credential profiles (SNMP, SSH, WinRM, cloud access keys, K8s tokens) drive scans. Distinct from discovery_sources; one source uses one or more credentials. Sensitive entity (Vault / KMS-backed in every flagship)."
    proposed_module: DISCOVERY-NETWORK-SCAN

  - id: B3-DISCOVERY-SCHEDULES
    candidate: discovery_schedules
    rationale: "Cron-shaped recurrence per scan. Universal scheduling abstraction across flagship products."
    proposed_module: per realizing module

  - id: B3-RECONCILIATION-RULES
    candidate: reconciliation_rules
    rationale: "Logic that maps a discovered_device into a configuration_item. Heavy in CMDB-anchored vendors. Phase 0 vetting recommended due to vendor variation and overlap with CMDB-side normalization."
    proposed_module: DISCOVERY-RECONCILIATION

  - id: B3-DISCOVERY-EXCLUSIONS
    candidate: discovery_exclusions
    rationale: "Scope exclusions (subnet ranges, IP exclusions, OU exclusions). Operational hygiene entity present in every flagship."
    proposed_module: per realizing module

  - id: B3-NETWORK-SEGMENTS
    candidate: network_segments
    rationale: "Subnets and CIDR ranges plus IPAM-adjacent classification. May belong in a future IPAM domain rather than DISCOVERY; flag during Phase 0 vetting."
    proposed_module: DISCOVERY-NETWORK-SCAN

  - id: B3-CLOUD-ACCOUNTS
    candidate: cloud_accounts
    rationale: "Cloud subscription / account boundary entity. Almost certainly belongs in a cross-cutting cloud_resources master in CSPM / CNAPP territory; DISCOVERY would be consumer or embedded_master rather than master."
    proposed_module: DISCOVERY-CLOUD-INVENTORY

  - id: B3-ASSET-TAGS
    candidate: asset_tags
    rationale: "Universal labeling axis (environment=prod, owner=team-x). Could be a cross-cutting concern shared with ITAM rather than a DISCOVERY-owned master."
    proposed_module: DISCOVERY-RECONCILIATION
