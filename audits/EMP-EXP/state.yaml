b2:
  - id: B2-S1
    summary: Pattern-flag positive re-evaluation per Rule #12 (5 candidates across 4 masters).
    question: Should engagement_drivers.has_submit_lock=true (driver definitions freeze once published), pulse_questions.has_submit_lock=true (published questions immutable), survey_responses.has_submit_lock=true (submitted response immutable for audit trail), action_plans.has_personal_content=true (manager-employee conversation context), action_plans.has_single_approver=true (manager approval gating)?
    options: [per-flag yes, per-flag no, defer-to-next-pass]
    why: Pattern flags are workflow-shape judgments the user owns; default false does not establish review. Rule #15 forbids capturing the consideration in notes.

  - id: B2-S2
    summary: Rule #15 notes pollution on data_objects 183 and 185.
    question: |
      engagement_drivers (id 183) carries "Config-shaped framework definitions; no workflow. Edited by program admin; record_status is the only state worth tracking." and pulse_questions (id 185) carries "Config-shaped library entries; published vs draft is the only state worth tracking and is captured by record_status." Were these notes user-approved at load time or were they auto-populated by the loader? Rule #15 rescinded the prior Rule #12 license to write this exemption to data_objects.notes.
    options: [user-approved-leave-in-place, auto-written-PATCH-to-empty-and-log-incident]
    why: Audit alone cannot distinguish; the notes wording is exactly the templated pattern the rule flags as forbidden but the user may have approved the wording at load time.

  - id: B2-S3
    summary: Rule #15 notes pollution on handoffs 116 and 1231.
    question: |
      Handoff 116 carries "B10b tie resolution: trigger_events.data_object_id=employees is embedded_master on both EMP-EXP modules. attrition_risk.high is derived from survey_responses + engagement_drivers analysis, so CONTINUOUS-LISTEN is the signal publisher." Handoff 1231 carries "Stage completion (pre-board, day-one, week-one, 30-day) fires onboarding milestone surveys via EMP-EXP continuous-listen." Were these user-approved? Handoff 1077's notes were cleared in the 2026-05-31 Continuation.
    options: [user-approved-leave-in-place, auto-written-PATCH-to-empty-and-record-context-in-audit-or-chat-instead]
    why: Both wording shapes match the auto-written pattern; load-time approval status unknown.

  - id: B2-S4
    summary: Reclassify handoff 116 (attrition_risk.high publisher) so the event is keyed against an EMP-EXP-mastered entity rather than HCM-mastered employees.
    question: Handoff 116 publishes on trigger_event 10 (attrition_risk.high) which is keyed at employees (id 31, embedded_master here, canonical master in HCM). EMP-EXP cannot publish a state-change on an entity it does not master. Three options to make it well-formed.
    options: [a-new-derived-EMP-EXP-entity-engagement_signals-and-rekey-event, b-keep-employees-payload-add-derived-relationship-and-treat-as-downstream-flag-signal, c-reclassify-as-compute-workflow-output-not-a-handoff]
    why: Architectural intent question. Disposition gates B1A-S13-RES tagging of handoff 116 and may inform B3-S5 / B3-S9 vendor research.

  - id: B2-S5
    summary: Duplicate user-edges (data_object_relationships rows 151 and 152) on (users, survey_campaigns).
    question: Row 151 (users owns survey_campaigns) and row 152 (users creates survey_campaigns) both target the same pair. Is owner/creator semantically distinct enough to keep as two rows or is one redundant?
    options: [a-DELETE-152-owner-subsumes-creator, b-rename-152-verb-to-authors-distinct-lifecycle-role, c-leave-both-duplication-intentional]
    why: Editorial decision; catalog convention elsewhere preferred a single actor-role row.

  - id: B2-S6
    summary: Skill 55 rename and per-module split (gates B1B-S2 / B1B-S3 / B1B-S4 and indirectly B1B-S1 role_permissions wiring).
    question: Skill 55 is named emp-exp-system (hyphenated, domain-spanning) but anchored only to module 64. Rule #17 prefers per-module naming. Renaming has UI side-effects on any user-side references to the old skill code.
    options: [a-rename-skill-55-to-emp_exp_continuous_listen_agent-create-new-emp_exp_action_planning_agent-for-module-65, b-leave-skill-55-as-is-create-only-new-module-65-skill-accept-naming-drift, c-delete-and-recreate-both]
    why: UI / RBAC discovery surface depends on how skill codes are referenced today.

