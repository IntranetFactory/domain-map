    summary: Reclassify handoff 116 (attrition_risk.high publisher) so the event is keyed against an EMP-EXP-mastered entity rather than HCM-mastered employees.
    question: Handoff 116 publishes on trigger_event 10 (attrition_risk.high) which is keyed at employees (id 31, embedded_master here, canonical master in HCM). EMP-EXP cannot publish a state-change on an entity it does not master. Three options to make it well-formed.
