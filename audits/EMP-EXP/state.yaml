b2:
  - id: B2-S1
    summary: Pattern-flag positive re-evaluation per Rule #12 (5 candidates across 4 masters).
    question: Should engagement_drivers.has_submit_lock=true (driver definitions freeze once published), pulse_questions.has_submit_lock=true (published questions immutable), survey_responses.has_submit_lock=true (submitted response immutable for audit trail), action_plans.has_personal_content=true (manager-employee conversation context), action_plans.has_single_approver=true (manager approval gating)?
    options: [per-flag yes, per-flag no, defer-to-next-pass]
    why: Pattern flags are workflow-shape judgments the user owns; default false does not establish review. Rule #15 forbids capturing the consideration in notes. Note - engagement_drivers (183) is now entity_type='computed' and pulse_questions (185) is 'catalog'; pattern flags primarily matter for operational_workflow masters (survey_campaigns 181, action_plans 184).

  - id: B2-S2
    summary: Rule #15 notes pollution on data_objects 183 and 185.
    question: |
      engagement_drivers (id 183) carries "Config-shaped framework definitions; no workflow. Edited by program admin; record_status is the only state worth tracking." and pulse_questions (id 185) carries "Config-shaped library entries; published vs draft is the only state worth tracking and is captured by record_status." Were these notes user-approved at load time or were they auto-populated by the loader? Rule #15 rescinded the prior Rule #12 license to write this exemption to data_objects.notes. (The config-shape intent is now captured structurally via entity_type: 183='computed', 185='catalog', as of 2026-06-07.)
    options: [user-approved-leave-in-place, auto-written-PATCH-to-empty-and-log-incident]
    why: Audit alone cannot distinguish; the notes wording is exactly the templated pattern the rule flags as forbidden but the user may have approved the wording at load time. PATCH-to-empty is a destructive overwrite of a non-empty value, so it stays surfaced.

  - id: B2-S3
    summary: Rule #15 notes pollution on handoffs 116 and 1231.
    question: |
      Handoff 116 carries "B10b tie resolution: trigger_events.data_object_id=employees is embedded_master on both EMP-EXP modules. attrition_risk.high is derived from survey_responses + engagement_drivers analysis, so CONTINUOUS-LISTEN is the signal publisher." Handoff 1231 carries "Stage completion (pre-board, day-one, week-one, 30-day) fires onboarding milestone surveys via EMP-EXP continuous-listen." Were these user-approved? Handoff 1077's notes were cleared in the 2026-05-31 Continuation.
    options: [user-approved-leave-in-place, auto-written-PATCH-to-empty-and-record-context-in-audit-or-chat-instead]
    why: Both wording shapes match the auto-written pattern; load-time approval status unknown. PATCH-to-empty is a destructive overwrite, so it stays surfaced.

