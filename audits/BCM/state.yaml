b2:
  - id: B2-1
    summary: Is BCM correctly classified as leadership-tier, or should it promote to a master-bearing domain? KEYSTONE; gates the entire build.
    question: |
      The SKILL.md B1 exception list flagged BCM as leadership-tier (zero masters expected) and the
      catalog state matches. But solution_domains carries two pure-play BCM specialists (primary,
      primary), which is the Rule #2 point-solution-market test for a non-leadership domain. The
      vendor surface lists 11 plus 1 candidate masters including business_continuity_plans,
      business_impact_analyses, continuity_exercises, crisis_events.
    options:
      - "a, keep leadership-tier; author BCM-LANDING only; declare consumer DMDOs on GRC and ITSM masters"
      - "b, promote to master-bearing; author BCM-PLANNING plus BCM-EXERCISE-AND-CRISIS with masters per the b3 list"
      - "c, hybrid; author BCM-LANDING now as thin starter; defer master-bearing modules to a follow-up Phase 0 vendor-research load"
    why: |
      Keystone decision: shapes B1B-S1 module count and naming, B1B-S2 capability scope, B1B-S4
      skill placement, B1B-S6 consumer DMDO breadth, and the entirety of b3 vetting.
      Phase 0 (2026-06-08) grounds the recommendation (promote, option b): the 5-vendor surface
      matrix shows 2 pure-plays (Fusion Framework System, Castellan) + 3 suites (ServiceNow BCM,
      Archer, MetricStream) each mastering first-class BCM records (BIA, BCP, recovery strategies,
      dependency maps, exercises, crisis events), which is the Rule #2 point-solution-market test.
      Not reversed; confirmed with named-vendor evidence. See .tmp_deploy/BCM-phase0-2026-06-08.md.

  - id: B2-2
    summary: DRP, separate domain or BCM sub-module?
    question: |
      Vendor split. Two suite vendors carry distinct DRP modules alongside BCM; the two pure-play
      vendors fold DR into BCM as a recovery-strategy slice. The catalog has no DRP domain row today.
    options:
      - "a, keep DR inside BCM as data_objects (disaster_recovery_plans, recovery_strategies) on BCM-PLANNING"
      - "b, queue DRP as a separate candidate domain via append_missing_domain.ts"
      - "c, defer until DORA and NIS2 substrate is loaded (which forces an ICT third-party register more naturally in DRP)"
    why: |
      Depends on B2-1; option (a) is only available if BCM promotes under B2-1.
      Phase 0 (2026-06-08) grounds the recommendation (DR inside BCM, option a): Fusion, Riskonnect
      (Castellan's owner), and ServiceNow all fold IT disaster recovery into the resilience platform
      as an integrated component; Archer keeps distinct BC-plan and DR-plan types but under one
      "Business Continuity & IT Disaster Recovery Planning" use case. No flagship sells DRP as a
      domain independent of BCM. Not reversed; confirmed. See .tmp_deploy/BCM-phase0-2026-06-08.md.

  - id: B2-3
    summary: DORA and NIS2 ICT third-party register ownership.
    question: |
      DORA and NIS2 mandate an ICT third-party register, regulatory continuity reporting, and TLPT
      artifacts. The ICT third-party register has stronger ownership claims in TPRM (a separate
      domain in the catalog).
    options:
      - "a, BCM hosts the ICT register as embedded_master from TPRM"
      - "b, BCM consumes from TPRM; the register lives in TPRM"
      - "c, author a separate OP-RES-DORA or BCM-DORA-RESILIENCE module hosted on both BCM and OP-RES via domain_module_host_domains"
    why: |
      Independent of B2-1 (applies in both leadership-tier and promote scenarios). Sets cross-domain
      ownership for the DORA-mandated entities and shapes b3 vetting of dora_third_party_register_entries.
      Phase 0 (2026-06-08) grounds the recommendation (register in TPRM, BCM consumes, option b):
      Fusion routes the DORA Register of Information through its TPRM offering, not its BCM module;
      the register is a record of contractual arrangements with ICT third-party providers (a
      third-party-risk artifact by construction). No flagship BCM product masters it as a BCM record.
      Not reversed; confirmed with named-vendor evidence. See .tmp_deploy/BCM-phase0-2026-06-08.md.

