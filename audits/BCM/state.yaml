      BCM-PLANNING plus BCM-EXERCISE-AND-CRISIS each with master DMDOs; hybrid yields BCM-LANDING now
      plus deferred master-bearing modules.
    action: |
      After B2-1 lands, author the agreed module set with domain_id=17, module_kind='full',
      user-approved description prose. Cascade is B1B-S4 (domain-grain system skill per the
      superseded-header model) and B1B-S6 (consumer DMDOs on the landing module so handoff 253 has
      a resolvable target_domain_module_id).
    blocked_by:
