  - id: B1B-S5
    summary: Repoint handoff 253 trigger_event_id (DESTRUCTIVE re-attribution, surfaced) and backfill both module FK columns (foreign-blocked + build-gated).
    finding: |
      Handoff 253 (GRC source domain 15 to BCM target domain 17) carries trigger_event_id=227
      ('assessment.completed'), flagged defective because the trigger keys on risk_assessments while
      the handoff payload data_object_id=282 is compliance_risks. Both source_domain_module_id and
      target_domain_module_id are NULL. Target-side NULL is BCM's own (B1B-S1 + B1B-S6 owed);
      source-side NULL is GRC B10b owed (GRC has zero modules per its own M-band).
    action: |
      (a) DESTRUCTIVE, surface-only: re-attribute the trigger. Wait for GRC B9 to author a
