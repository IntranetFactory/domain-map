b2:
  - id: B2-CATALOG-WORDING
    summary: "Approve / edit / rewrite the catalog UX wording (A4 domain row + M8 module rows) per Rule #20."
    question: >
      Draft domain catalog_tagline: "Collect rent, screen tenants, dispatch maintenance, and account for each
      property, all in one residential-management platform." Draft catalog_description: "Run a residential
      portfolio (single-family rentals, multifamily buildings, condo associations) end to end. Market vacant
      units to listing sites, screen applicants against credit, criminal, and eviction history, draft and sign
      leases, collect rent (with prorations, late fees, and security-deposit accounting), and handle maintenance
      requests with vendor or in-house teams. Per-property general ledger feeds owner distributions and investor
      reporting, with built-in compliance for the Fair Housing Act, FCRA-regulated screening, and state-by-state
      landlord-tenant statutes." Approve, edit, or rewrite? Then approve per-module taglines for 285/286/287.
    options:
      - "(a) approve domain wording as drafted; agent drafts the 3 module taglines for a follow-up approval"
      - "(b) edit (supply revised wording)"
      - "(c) rewrite entirely (supply alternative)"
    why: "Rule #20 requires per-row user approval before writing catalog_tagline / catalog_description. Gates B1A-CATALOG-UX."

  - id: B2-FHA-APPLICABILITY
    summary: "Fair Housing Act domain_regulations.applicability value (mandatory vs mandatory_with_exemptions)."
    question: >
      Title VIII applies to nearly every residential landlord, with rare exemptions (owner-occupied small
      properties, religious housing). Apply applicability=mandatory catalog-wide, or mandatory_with_exemptions?
    options:
      - "(a) mandatory"
      - "(b) mandatory_with_exemptions"
    why: "Gates loading the Fair Housing Act regulation row + junction (B3-FAIR-HOUSING-INQUIRIES) once entity creation is in scope."

  - id: B2-STATE-LANDLORD-TENANT
    summary: "State landlord-tenant regulation modeling strategy."
    question: >
      Each state has its own landlord-tenant act (CA Civil Code 1940 series, NY RPL Article 7, TX Property Code
      Chapter 92, FL Statutes Chapter 83) with distinct security-deposit holding periods, eviction notice timing,
      and required disclosures. Pick a modeling strategy.
    options:
      - "(a) single umbrella regulation state_landlord_tenant_statutes linked to RE-PROP-MGMT"
      - "(b) defer to per-jurisdiction modeling once a jurisdictions rollup is loaded"
    why: "Shapes how the security_deposits / eviction_cases candidates connect to regulation rows once entity creation is in scope."

  - id: B2-PATTERN-FLAGS
    summary: "Pattern-flag re-evaluation per Rule #12 on RE-PROP-MGMT masters."
    question: >
      None of the 6 masters carries has_personal_content / has_submit_lock / has_single_approver set;
      positive confirmation is needed before flipping (Rule #12, B4).
    options:
      - "Flip rental_applications.has_personal_content=true (SSN + credit data)? y/n"
      - "Flip rental_leases.has_submit_lock=true (post-signing lock)? y/n"
    why: "Each true flag triggers schema-level behavior (PII-aware UI, immutable post-submit) at deploy time."

  - id: B2-SUPPLIER-INVOICES-ROLE
    summary: "supplier_invoices (75) role on RE-PROP-MGMT: keep contributor+required, or demote to consumer+optional / remove?"
    question: >
      supplier_invoices is canonically mastered by S2P and is currently contributor+required on RE-PROP-MGMT
      (assigned to RE-PROP-MGMT-FINANCIALS 287 this pass, role preserved). RE-PROP-MGMT reads AP-paid status
      rather than writing supplier invoices, so the right shape may be consumer+optional, or removal once a
      vendor_work_orders ledger lands.
    options:
      - "(a) keep contributor + required"
      - "(b) demote to consumer + optional"
      - "(c) remove from RE-PROP-MGMT (rely on the AP-AUTO handoff only)"
    why: "Role-change touches an existing assignment; out of modularization scope (roles preserved). Carry-forward of B1-WO1."

  - id: B2-PAIRWISE-RERUN
    summary: "Re-run pairwise reconciliation (Pass 4) against RE-INVEST and RE-BROKERAGE now that RE-PROP-MGMT has modules."
    question: >
      With the M-band resolved, re-run the per-neighbor 5-section diff against RE-INVEST (edge weight 2) and
      RE-BROKERAGE (only inbound source)?
    options:
      - "(a) yes, schedule for the next Validate pass"
      - "(b) defer until partner-domain audits also run"
    why: "The deep dive is now meaningful (modules exist on this side). Independent of the entity backlog."

