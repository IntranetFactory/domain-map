b1a:
  - id: B1A-S11B
    summary: Two RE-PROP-MGMT masters (`rent_payments` 360, `tenant_maintenance_requests` 361) still carry zero `data_object_aliases` rows; the other four masters were covered by the 2026-05-31 Continuation load.
    finding: |
      B11 audit shows 4 of 6 masters with aliases (10 rows total on `rental_units`, `property_tenants`, `rental_applications`, `rental_leases`). `rent_payments` and `tenant_maintenance_requests` have zero alias rows; both have non-self-explanatory vendor terminology.
    action: |
      INSERT `data_object_aliases` rows for `rent_payments` (Rent Charge, Payment, Receipt) and `tenant_maintenance_requests` (Work Order, Maintenance Ticket, Service Request). `record_status='new'`, `notes` empty (Rule #15).
    affected_masters:
      - {data_object_id: 360, name: rent_payments, target_module_id: null, workflow: collection}
      - {data_object_id: 361, name: tenant_maintenance_requests, target_module_id: null, workflow: maintenance}

  - id: B1A-S14
    summary: Existing `data_object_relationships` row 473 (`rental_units` opens `customer_cases` 103) appears mis-pointed; payload target should be `real_estate_transactions` (353).
    finding: |
      Row 473: data_object_id=357 (`rental_units`), relationship_verb="opens", related_data_object_id=103 (`customer_cases`), inverse_verb="opened_from". The semantic intent looks like "rental_units spawns from real_estate_transactions" (closed sale starts a property under management), so the target should be `real_estate_transactions` (id 353), not `customer_cases` (id 103). Carry-forward from the 2026-05-30 "report-only follow-ups" subsection; promoted because the source row sits on a RE-PROP-MGMT master.
    action: |
      User confirms intent: either PATCH `related_data_object_id` to 353 (preferred if the closed-sale -> property-under-management edge is the intent), or DELETE the row. After user decision, single PostgREST PATCH or DELETE.
    affected_entities: [rental_units, real_estate_transactions, customer_cases]

