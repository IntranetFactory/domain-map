b2:
  - id: B2-1
    summary: Pick the RE-PROP-MGMT module split for the M1 fix.
    question: |
      How do you want to split RE-PROP-MGMT into modules?
    options:
      - "(a) 6-module shape: RE-PM-TENANT-SCREENING, RE-PM-LEASING-PIPELINE, RE-PM-RENT-COLLECTION, RE-PM-MAINTENANCE, RE-PM-PROP-ACCOUNTING, RE-PM-VACANCY-MARKETING"
      - "(b) 5-module shape collapsing RE-PM-VACANCY-MARKETING into RE-PM-LEASING-PIPELINE"
      - "(c) different split (specify)"
    why: |
      Gates almost the entire Bucket 1 fix tree (B1B-S1/S2/S3/S6/S9/S10/S12/S13 plus every MISSING entity's proposed_module). Independent of Bucket 3 (vendor research won't shift this boundary materially).

  - id: B2-2
    summary: Approve / edit / rewrite the A4 catalog UX wording per Rule #20.
    question: |
      Draft catalog_tagline: "Collect rent, screen tenants, dispatch maintenance, and account for each property, all in one residential-management platform." Draft catalog_description: "Run a residential portfolio (single-family rentals, multifamily buildings, condo associations) end to end. Market vacant units to listing sites, screen applicants against credit, criminal, and eviction history, draft and sign leases, collect rent (with prorations, late fees, and security-deposit accounting), and handle maintenance requests with vendor or in-house teams. Per-property general ledger feeds owner distributions and investor reporting, with built-in compliance for the Fair Housing Act, FCRA-regulated screening, and state-by-state landlord-tenant statutes." Approve, edit, or rewrite?
    options:
      - "(a) approve as drafted"
      - "(b) edit (supply revised wording)"
      - "(c) rewrite entirely (supply alternative)"
    why: |
      Rule #20 requires per-row user approval before writing catalog_tagline / catalog_description on `domains`. A4 currently fails; B1B-S4 cannot land until the user authorizes wording.

  - id: B2-3
    summary: Fair Housing Act `domain_regulations.applicability` value.
    question: |
      Title VIII applies to nearly every residential landlord, with rare exemptions (owner-occupied small properties, religious housing). Apply `applicability=mandatory` catalog-wide, or `mandatory_with_exemptions`?
    options:
      - "(a) mandatory"
      - "(b) mandatory_with_exemptions"
    why: |
      Gates B1B-M6 (regulation + junction load) and B1B-M3 (`fair_housing_inquiries`). Independent of Bucket 3.

  - id: B2-4
    summary: State landlord-tenant regulation modeling strategy.
    question: |
      Each state has its own landlord-tenant act (CA Civil Code 1940 series, NY RPL Article 7, TX Property Code Chapter 92, FL Statutes Chapter 83) with distinct security-deposit holding periods, eviction notice timing, and required disclosures. Pick a modeling strategy.
    options:
      - "(a) single umbrella regulation state_landlord_tenant_statutes linked to RE-PROP-MGMT"
      - "(b) defer to per-jurisdiction modeling once jurisdictions rollup is loaded"
    why: |
      Gates how B1B-M4 (`security_deposits`) and B1B-M5 (`eviction_cases`) connect to regulation rows. Independent of Bucket 3.

  - id: B2-5
    summary: Pattern-flag re-evaluation per Rule #12 on RE-PROP-MGMT masters.
    question: |
      Confirm or reject the proposed flag flips. None of the 6 current masters carries any of `has_personal_content` / `has_submit_lock` / `has_single_approver` set; positive confirmation needed before flipping (Rule #12, B4).
    options:
      - "Flip rental_applications.has_personal_content=true (SSN + credit data)? y/n"
      - "Flip rental_leases.has_submit_lock=true (post-signing lock)? y/n"
      - "Once B1B-M1 (tenant_screening_reports) lands, flip its has_personal_content=true? y/n"
    why: |
      B4 audit pass requires positive re-evaluation, not default-false. Each true flag triggers schema-level behavior (PII-aware UI, immutable post-submit) at deploy time.

  - id: B2-6
    summary: vendor_work_orders placement decision.
    question: |
      Where should `vendor_work_orders` live?
    options:
      - "(a) Master in a new RE-PM-MAINTENANCE module (FSM handoff 299 stays for dispatch but the work-order record stays in RE-PROP-MGMT)"
      - "(b) Keep FSM as canonical master; add vendor_work_orders as embedded_master + optional on RE-PM-MAINTENANCE (single-platform residential operators install both)"
    why: |
      Shapes the RE-PM-MAINTENANCE module's master set (Bucket 2 #1) and indirectly the B1B-WO1 reclassification (whether RE-PROP-MGMT needs supplier_invoices linkage at all if it carries its own work-order ledger).

  - id: B2-7
    summary: Re-run pairwise reconciliation (Pass 4) against RE-INVEST and RE-BROKERAGE after M-band lands.
    question: |
      After Bucket 2 #1 lands and RE-PROP-MGMT has modules, re-run the per-neighbor 5-section diff against RE-INVEST (edge weight 2) and RE-BROKERAGE (only inbound source)?
    options:
      - "(a) yes, schedule for the next pass after M-band lands"
      - "(b) defer until partner-domain audits also run"
    why: |
      With M-band still failing, the per-neighbor deep dive is meaningless. Independent of Buckets 1 and 3.

