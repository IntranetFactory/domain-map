      FCRA (regulations id=84) is linked to RE-PROP-MGMT via domain_regulations id=272 (applicability=mandatory,
      loaded 2026-05-31) but the regulation row itself has regulation_code="". Other regulations carry short
      codes (GDPR, CCPA, ADA). regulations is a catalog-wide shared master; a PATCH affects every consuming domain.
    action: >
