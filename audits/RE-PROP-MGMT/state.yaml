      B12 fail. Expected workflows per 2026-05-30 narrative: `rental_units` (vacant -> listed -> applied -> approved -> occupied -> vacating -> vacant); `rental_applications` (draft -> submitted -> screening -> approved/declined -> withdrawn); `rental_leases` (drafted -> sent -> signed -> active -> ending -> terminated -> renewed); `rent_payments` (due -> received -> late -> delinquent -> in_collections); `property_tenants` (prospective -> current -> notice_given -> moved_out -> evicted); `tenant_maintenance_requests` (submitted -> triaged -> assigned -> in_progress -> resolved -> closed). Each row needs `state_order`, `is_initial` / `is_terminal`, `requires_permission`, `domain_module_id`.
    blocked_by:
      - {type: depends_on, ref: B1B-S1, reason: "per-state domain_module_id required by Rule #14 / M5"}
    affected_masters:
      - {data_object_id: 357, name: rental_units, target_module_id: null, workflow: vacant_to_occupied_cycle}
