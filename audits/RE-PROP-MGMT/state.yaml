# next_action_by=user: both remaining b1a items are user-gated (B1A-REL-473 blocked_by
# user_decision; B1A-HANDOFF-296-TARGET needs a consume-vs-react modeling call), and b2
# carries open user questions. No autonomously agent-solvable b1a work remains.

b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."
  - id: B1A-HANDOFF-296-TARGET
    summary: "Inbound handoff 296 still carries target_domain_module_id=null; the prescribed value (285) is not catalog-derivable because no RE-PROP-MGMT module declares any role on the payload real_estate_transactions (353)."
    finding: >
      The 2026-06-06 b1a pass set source_domain_module_id on all 7 outbound handoffs (298->287,
      299->286, 300->285, 301->287, 310->285, 864->287, 865->286) per the B10b event-data_object
      rule. The inbound 296 target was NOT set: B10b derives target_domain_module_id from the module
      in the target domain that holds the handoff payload (353 real_estate_transactions); no
      RE-PROP-MGMT module holds 353 in any role, so the item's prescribed 285 would point the FK at a
      module that does not consume the payload. Per B10b "no candidate", the fix is upstream: first
      load a consumer domain_module_data_objects row for 353 on the leasing module (285), then attribute.
    action: >
      Decide whether RE-PROP-MGMT-LEASING (285) should consume real_estate_transactions (353): if yes,
      INSERT a consumer DMDO row on 285 for 353, then PATCH handoffs.296 target_domain_module_id=285.
      Needs a modeling decision (does the leasing pipeline read the closed-sale record, or only react to
      the event without persisting the upstream object?), so SKIPPED on the 2026-06-06 pass.
    affected_handoffs:
      - {handoff_id: 296, direction: inbound, source_domain: RE-BROKERAGE, target_domain: RE-PROP-MGMT, trigger_event: real_estate_transaction.closed, payload: real_estate_transactions, null_field: target_domain_module_id}

  - id: B1A-REL-473
    summary: "Existing data_object_relationships row 473 (rental_units 357 opens customer_cases 103) looks mis-pointed; target should likely be real_estate_transactions (353). PATCH-vs-DELETE is a user decision."
    finding: >
      Row 473 reads rental_units(357) opens customer_cases(103) / inverse opened_from. The 2026-05-31
      audit (B1-S14) flagged the target as wrong: a unit comes under management from a closed sale, so the
      intended target is real_estate_transactions(353), not customer_cases(103). Whether to PATCH
      related_data_object_id to 353 or DELETE the row is a judgment call (depends on whether RE-PROP-MGMT
      intends to keep a property-handover edge at all). The 7 net-new intra-domain edges among the 6 masters
      were loaded 2026-06-06; row 473 was left untouched pending this decision.
    action: >
      User decides: PATCH data_object_relationships.473 related_data_object_id=353 (keep as property
      handover from a closed sale) OR DELETE row 473. Snapshot the prior values before either write.
    blocked_by:
      - {type: user_decision, ref: B1A-REL-473, reason: "PATCH-to-353 vs DELETE on a master-data relationship row needs human sign-off"}

b1b:
  - id: B1B-REG-CODES-EMPTY
    summary: "regulations id=84 (FCRA) carries an empty regulation_code; PATCH gated on the regulations-master code-namespace Validate."
    finding: >
      FCRA (regulations id=84) is linked to RE-PROP-MGMT via domain_regulations id=272 (applicability=mandatory,
      loaded 2026-05-31) but the regulation row itself has regulation_code="". Other regulations carry short
      codes (GDPR, CCPA, ADA). regulations is a catalog-wide shared master; a PATCH affects every consuming domain.
    action: >
      PATCH /regulations?id=eq.84 {regulation_code:"FCRA"} once the regulations-master / cross-domain
      governance Validate confirms the code namespace.
    blocked_by:
      - {type: catalog_addition, scope: domains, trigger: "regulations master Validate to confirm code namespace ownership"}

  - id: B1B-S9-MISSING-HANDOFFS
    summary: "5 trigger events (289 rent_payment.delinquent, 957 rental_unit.listed, 958 rental_unit.occupied, 960 rental_lease.executed, 961 rental_lease.renewed) have zero subscriber handoffs."
    finding: >
      B9 sub-gap. New handoff candidates: delinquent -> CSM/collections, listed -> CSM/CDP/vacancy syndication,
      executed -> RE-INVEST, renewed -> RE-INVEST. Source side is now attributable (per-module source FKs set
      on existing handoffs 2026-06-06) but each NEW row also needs a viable target_domain_module_id, which is
      blocked by partner-domain modularization.
    blocked_by:
      - {type: domain_audit, blocking_domain: CSM, milestone: modules-lifecycle-cluster}
      - {type: domain_audit, blocking_domain: RE-INVEST, milestone: rent-roll-or-owner-distribution-module}
    affected_events:
      - {id: 289, event_name: rent_payment.delinquent, current_category: threshold, proposed_category: threshold}
      - {id: 957, event_name: rental_unit.listed, current_category: lifecycle, proposed_category: lifecycle}
      - {id: 958, event_name: rental_unit.occupied, current_category: state_change, proposed_category: state_change}
      - {id: 960, event_name: rental_lease.executed, current_category: lifecycle, proposed_category: lifecycle}
      - {id: 961, event_name: rental_lease.renewed, current_category: lifecycle, proposed_category: lifecycle}

  - id: B1B-PARTNER-MODULES
    summary: "Outbound handoff target_domain_module_id values blocked on partner-domain modularization."
    finding: >
      Source side is now filled (2026-06-06). target_domain_module_id stays null on rows whose partner domain
      has no consuming module: AP-AUTO (29), LSD (25), GRC (15), ERP-FIN (65) each have zero domain_modules;
      CSM (modules 112-114) exists but does not yet hold the rental_units payload via domain_module_data_objects.
      Handoff 299 (FSM, target_domain_module_id=161) and 301 (RE-INVEST, target_domain_module_id=280) were set
      pre-audit and remain.
    blocked_by:
      - {type: domain_audit, blocking_domain: AP-AUTO, milestone: any-modules}
      - {type: domain_audit, blocking_domain: LSD, milestone: any-modules}
      - {type: domain_audit, blocking_domain: GRC, milestone: any-modules}
      - {type: domain_audit, blocking_domain: ERP-FIN, milestone: any-modules}
      - {type: domain_audit, blocking_domain: CSM, milestone: payload-consumer-dmdo}
    affected_handoffs:
      - {handoff_id: 298, direction: outbound, source_domain: RE-PROP-MGMT, target_domain: AP-AUTO, trigger_event: rent_payment.received, payload: rent_payments, null_field: target_domain_module_id}
      - {handoff_id: 300, direction: outbound, source_domain: RE-PROP-MGMT, target_domain: LSD, trigger_event: property_tenant.evicted, payload: property_tenants, null_field: target_domain_module_id}
      - {handoff_id: 310, direction: outbound, source_domain: RE-PROP-MGMT, target_domain: GRC, trigger_event: rental_application.approved, payload: property_tenants, null_field: target_domain_module_id}
      - {handoff_id: 864, direction: outbound, source_domain: RE-PROP-MGMT, target_domain: ERP-FIN, trigger_event: rent_payment.received, payload: rental_leases, null_field: target_domain_module_id}
      - {handoff_id: 865, direction: outbound, source_domain: RE-PROP-MGMT, target_domain: CSM, trigger_event: rental_unit.vacant, payload: rental_units, null_field: target_domain_module_id}

  - id: B1B-APQC-310
    summary: "Cross-domain handoff 310 (RE-PROP-MGMT to GRC on rental_application.approved) has no handoff_processes tag; deferred to Discover Pass 3 (no clean PCF cross-industry match)."
    finding: "Fair-housing fair-treatment audit is not in the PCF cross-industry framework; needs custom-process authoring in Discover Pass 3."
    blocked_by:
      - {type: catalog_addition, scope: custom_processes, trigger: "Discover Pass 3 fair-housing custom-process author pass"}
    affected_handoffs:
      - {handoff_id: 310, direction: outbound, source_domain: RE-PROP-MGMT, target_domain: GRC, trigger_event: rental_application.approved, payload: property_tenants, null_field: handoff_processes}

  - id: B1B-APQC-865
    summary: "Cross-domain handoff 865 (RE-PROP-MGMT to CSM on rental_unit.vacant) has no handoff_processes tag; deferred to Discover Pass 3 (no clean PCF cross-industry match)."
    finding: "Resident-side service ticket from a vacancy event is industry-specific (multifamily resident services); no clean L2/L3 PCF parent."
    blocked_by:
      - {type: catalog_addition, scope: custom_processes, trigger: "Discover Pass 3 resident-services custom-process author pass"}
    affected_handoffs:
      - {handoff_id: 865, direction: outbound, source_domain: RE-PROP-MGMT, target_domain: CSM, trigger_event: rental_unit.vacant, payload: rental_units, null_field: handoff_processes}

  - id: B1B-ENTITY-TYPE-UNCLASSIFIED
    summary: "All 6 masters carry entity_type='unclassified' (B13). Lifecycle states were loaded 2026-06-06 but B12 will not read them and B13 fails until entity_type is classified."
    finding: >
      rental_units (357), property_tenants (358), rental_applications (359), rent_payments (360),
      tenant_maintenance_requests (361), rental_leases (362) all have entity_type='unclassified'. Each
      now carries a full operational workflow lifecycle (loaded 2026-06-06), so all 6 are clearly
      operational_workflow. The 2026-06-06 b1a list did not include an entity_type classification action,
      so the masters were left unclassified (master-data classification needs explicit authorization).
    action: >
      PATCH data_objects entity_type='operational_workflow' on 357/358/359/360/361/362 so B12 reads the
      loaded lifecycle states and B13 passes. Surface for user confirmation before the write (master data).
    blocked_by:
      - {type: user_decision, ref: B1B-ENTITY-TYPE-UNCLASSIFIED, reason: "entity_type is load-bearing master-data classification; confirm operational_workflow for all 6 before PATCH"}

b2:
  - id: B2-FHA-APPLICABILITY
    summary: "Fair Housing Act domain_regulations.applicability value (mandatory vs mandatory_with_exemptions)."
    question: >
      Title VIII applies to nearly every residential landlord, with rare exemptions (owner-occupied small
      properties, religious housing). Apply applicability=mandatory catalog-wide, or mandatory_with_exemptions?
    options:
      - "(a) mandatory"
      - "(b) mandatory_with_exemptions"
    why: "Gates loading the Fair Housing Act regulation row + junction (B3-FAIR-HOUSING-INQUIRIES) once entity creation is in scope."

  - id: B2-STATE-LANDLORD-TENANT
    summary: "State landlord-tenant regulation modeling strategy."
    question: >
      Each state has its own landlord-tenant act (CA Civil Code 1940 series, NY RPL Article 7, TX Property Code
      Chapter 92, FL Statutes Chapter 83) with distinct security-deposit holding periods, eviction notice timing,
      and required disclosures. Pick a modeling strategy.
    options:
      - "(a) single umbrella regulation state_landlord_tenant_statutes linked to RE-PROP-MGMT"
      - "(b) defer to per-jurisdiction modeling once a jurisdictions rollup is loaded"
    why: "Shapes how the security_deposits / eviction_cases candidates connect to regulation rows once entity creation is in scope."

  - id: B2-PATTERN-FLAGS
    summary: "Pattern-flag re-evaluation per Rule #12 on RE-PROP-MGMT masters."
    question: >
      None of the 6 masters carries has_personal_content / has_submit_lock / has_single_approver set;
      positive confirmation is needed before flipping (Rule #12, B4).
    options:
      - "Flip rental_applications.has_personal_content=true (SSN + credit data)? y/n"
      - "Flip rental_leases.has_submit_lock=true (post-signing lock)? y/n"
    why: "Each true flag triggers schema-level behavior (PII-aware UI, immutable post-submit) at deploy time."

  - id: B2-SUPPLIER-INVOICES-ROLE
    summary: "supplier_invoices (75) role on RE-PROP-MGMT: keep contributor+required, or demote to consumer+optional / remove?"
    question: >
      supplier_invoices is canonically mastered by S2P and is currently contributor+required on RE-PROP-MGMT
      (assigned to RE-PROP-MGMT-FINANCIALS 287 this pass, role preserved). RE-PROP-MGMT reads AP-paid status
      rather than writing supplier invoices, so the right shape may be consumer+optional, or removal once a
      vendor_work_orders ledger lands.
    options:
      - "(a) keep contributor + required"
      - "(b) demote to consumer + optional"
      - "(c) remove from RE-PROP-MGMT (rely on the AP-AUTO handoff only)"
    why: "Role-change touches an existing assignment; out of modularization scope (roles preserved). Carry-forward of B1-WO1."

  - id: B2-PAIRWISE-RERUN
    summary: "Re-run pairwise reconciliation (Pass 4) against RE-INVEST and RE-BROKERAGE now that RE-PROP-MGMT has modules."
    question: >
      With the M-band resolved, re-run the per-neighbor 5-section diff against RE-INVEST (edge weight 2) and
      RE-BROKERAGE (only inbound source)?
    options:
      - "(a) yes, schedule for the next Validate pass"
      - "(b) defer until partner-domain audits also run"
    why: "The deep dive is now meaningful (modules exist on this side). Independent of the entity backlog."

