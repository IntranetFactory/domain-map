      Modularization landed 2026-06-02 (0 -> 3 full domain_modules). Each module now needs a
      per-module system skill (skill_type=system, domain_module_id set) so the F2/F3 band passes.
      Legacy domain-level skill re-prop-mgmt-system (id 98, domain_id=144, domain_module_id=null)
      with 8 skill_tools rows stays only as a transitional artifact and must be DELETEd once the
      three per-module replacements exist; its query_* tool coverage redistributes by module
      (screening/leasing tools -> 285, units/maintenance tools -> 286, payments/accounting tools -> 287).
