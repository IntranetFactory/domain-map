b2:
  - id: B2-IDP-MODULE-SPLIT
    summary: "Choose IDP module set: (a) 2 modules, (b) 3 modules (recommended), or (c) 1 module."
    question: "Which module split for IDP? Options: (a) IDP-CAPTURE-CLASSIFY + IDP-EXTRACT-VALIDATE; (b) IDP-CAPTURE-CLASSIFY + IDP-EXTRACT-VALIDATE + IDP-MODEL-MGMT (separates the data-science workflow); (c) single IDP-PIPELINE (violates Rule #14 once the 7 capabilities land)."
    options: ["(a) 2 modules", "(b) 3 modules (audit recommendation)", "(c) 1 module (rule-violating once capabilities land)"]
    why: "Gates B1B-S1-MODULES, which in turn gates 6 other Bucket-1b items. Highest-priority decision."

  - id: B2-IDP-CATALOG-UX-TEXT
    summary: "Approve exact wording for IDP `catalog_tagline` and `catalog_description` (A4 fix)."
    question: "Approve (or rewrite) the draft buyer-facing text for the domain row. Draft tagline: `Turn unstructured documents into clean structured data your apps can act on.` Draft long-form: 3-sentence prose describing capture, classify, extract, validate, HITL, retrain. Rule #20 forbids any write without verbatim user approval."
    options: ["approve drafts", "rewrite tagline only", "rewrite long-form only", "rewrite both", "defer"]
    why: "Rule #20 + Rule #15-adjacent license: agent cannot draft buyer-shaped fields and load without approval. Pure user surface."

  - id: B2-IDP-MLOPS-BOUNDARY
    summary: "Confirm IDP keeps `idp_extraction_models` + `training_datasets` mastered locally pending MLOPS domain landing."
    question: "Are `idp_extraction_models` (id 531) and `training_datasets` (id 537) correctly mastered in IDP today, with the understanding that they will `consume` from a future MLOPS master (model_registry, feature_store) once that domain ships?"
    options: ["confirm IDP-local mastery, revisit at MLOPS landing", "defer mastership decision to MLOPS landing", "split off into MLOPS now"]
    why: "Informational; no Bucket 1 item flexes today. Documenting the architectural intent now reduces ambiguity when MLOPS triages."

  - id: B2-IDP-PATTERN-FLAGS
    summary: "Decide pattern flags per master and config-shape exemption for `idp_extraction_templates`."
    question: "Which masters get `has_personal_content=true`, `has_submit_lock=true`, `has_single_approver=true`? Audit candidates: capture_batches / extracted_records / extracted_fields for personal-content; idp_validation_results for submit-lock; none obvious for single-approver. Separately: does `idp_extraction_templates` qualify for the Rule #12 config-shape lifecycle exemption?"
    options: ["per-master flag decisions + exemption yes", "flag decisions + exemption no (load template lifecycle)", "defer all flags + exemption"]
    why: "Rule #15 forbids auto-populating `notes` to explain flags; the audit must surface for user decision and record the outcome in the gap report / PR description, not in `data_objects.notes`."

  - id: B2-IDP-HIPAA-FERPA
    summary: "Add HIPAA (mandatory?) and / or FERPA scoping to `domain_regulations`?"
    question: "Current `domain_regulations` for IDP lists only GDPR (mandatory) and EU AI Act (mandatory). Sector-conditional regulations not loaded: HIPAA (PHI document processing) and FERPA (higher-ed transcripts / FAFSA). Default audit recommendation: add HIPAA mandatory; leave FERPA out unless explicit ed-sector scope."
    options: ["add HIPAA mandatory, leave FERPA out", "add HIPAA + FERPA both mandatory", "add HIPAA applicable_when only", "leave both out", "user-authored applicability"]
    why: "Mandatory vs applicable_when is a scope decision; the audit can implement either. Independent of Buckets 1 and 3."

  - id: B2-IDP-CROSS-DOMAIN-VERBS
    summary: "Approve verb rewrites for cross-domain rows 585 and 586."
    question: "Re-author row 585 as `extracted_records derives_from content_documents` (owner_side=source, is_required=false) and row 586 as `document_classification_results applies document_classifications` (owner_side=target, is_required=false)?"
    options: ["approve both rewrites", "approve 585 only", "approve 586 only", "rewrite differently (specify)", "decline (leave as-is)"]
    why: "Cross-domain relationship verbs are load-bearing for the architect agent's relationship graph; user must approve the exact wording. Independent of other buckets."

