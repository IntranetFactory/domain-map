    candidate: move_orders
    rationale: |
      Robin, Eptura, Planon, Tango model employee / team relocations as first-class records
      (move ticket, target seat, target floor, effective date). No IWMS master captures this;
      relocations would currently be modeled as workplace_service_requests of a special type.
    vendor_evidence: [Robin, Eptura, Planon, Tango]
    proposed_module: new IWMS-MOVE-MGMT module, or new master inside IWMS-DESK-RESERVATION

  - id: B3-PARKING
    candidate: parking_reservations
    rationale: |
      Eptura, Robin, Officely, Tactic, Condeco include parking-spot reservations as a sibling to
      desk and room reservations. The flagship surface uses a distinct entity (capacity model,
      hourly grain, vehicle / license-plate attribute).
    vendor_evidence: [Eptura, Robin, Officely, Tactic, Condeco]
    proposed_module: new IWMS-PARKING module, or new master inside IWMS-DESK-RESERVATION

  - id: B3-WAYFINDING
    candidate: wayfinding_signals
    rationale: |
      Spacewell, FM:Systems Wayfinding, MRI OnCore Wayfinding produce structured wayfinding
      records (digital signage routing, kiosk paths, indoor positioning). Becoming a buyer-evaluated
      feature in 2025.
    vendor_evidence: [Spacewell, "FM:Systems", MRI OnCore]
    proposed_module: new master in IWMS-LOCATION-MASTER or sibling module

  - id: B3-OCC-SENSORS
    candidate: occupancy_sensor_readings
    rationale: |
      Spacewell, VergeSense, Disruptive Technologies, Density, Butlr, Rifiniti, Honeywell Forge
      ingest occupancy sensor signals (PIR, thermal, lidar). The signal feeds
      space_utilization_reports but the raw sensor records may warrant their own master (audit
      trail, sensor calibration, vendor mapping).
    vendor_evidence: [Spacewell, VergeSense, Disruptive Technologies, Density, Butlr, Rifiniti, Honeywell Forge]
    proposed_module: new master in IWMS-SPACE-ANALYTICS, or candidate BMS domain (see B3-BMS)

