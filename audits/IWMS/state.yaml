      (US employee data); local building / fire codes per jurisdiction. No domain_regulations rows
      currently on IWMS.
    vendor_evidence: [statutory frameworks]
    proposed_module: domain_regulations on IWMS (23)

  - id: B3-BMS
    candidate: BMS (Building Management System) domain
    rationale: |
      Honeywell Forge Building Operations, Siemens Desigo CC, Schneider EcoStruxure Building
