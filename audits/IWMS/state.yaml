b2:
  - id: B2-CAP
    summary: M6 capability fix path for IWMS-ROOM-RESERVATION
    question: Which capability should be linked to IWMS-ROOM-RESERVATION (100) to cure M6?
    options:
      - (a) link to existing REAL-SPACE-OPTIM (374); audit default; matches DESK/ANALYTICS pattern
      - (b) author new REAL-MEETING-MGMT capability and link it; more granular; may force the same split on DESK
      - (c) mixed (specify per module)
    why: |
      Capability granularity decision; some flagships market desk + room as one workflow while others
      treat them as distinct.

  - id: B2-FLAGS
    summary: B4 pattern-flag positive re-evaluation per Rule #12
    question: |
      Set has_submit_lock=true on desk_bookings (590)? On room_reservations (591)?
      Set has_single_approver=true on workplace_service_requests (592)?
    options:
      - per-flag yes / no answer; capture decisions for B1A-B4 PATCH
    why: |
      Pattern flags are workflow-shape judgments the user owns. Vendor evidence supports
      submit-lock on check-in and single-approver on triage -> resolve. PATCHing overwrites the
      existing false value, so it is a sign-off item, not auto-applied.

  - id: B2-SPLIT
    summary: Keep DESK + ROOM split or merge to single IWMS-RESERVATIONS module
    question: Maintain the two-module split for desk and room reservations, or merge?
    options:
      - (a) keep split, current default; works for customers buying desk and room booking separately
      - (b) merge to single IWMS-RESERVATIONS, simpler agent surface, mirrors pure-plays selling both
    why: |
      Decision drives B1B-B9b intra-domain handoff shape. B3 candidates (parking_reservations,
      move_orders) may argue against merge.

  - id: B2-FLOOR
    summary: Floor-plan trigger events 940 / 941 audit-perimeter ownership
    question: |
      Trigger events 940 (floor_plan.created) and 941 (floor_plan.updated) are on
      data_object_id=346 floor_plans, mastered by REAL-EST. Both already carry event_category.
      Cataloging question: keep them tagged to IWMS B9 sweep or formally route to REAL-EST?
    options:
      - (a) leave under IWMS audit perimeter; events touch IWMS handoff 858
      - (b) defer to REAL-EST audit perimeter
    why: |
      No PATCH required either way; purely a tracking decision so future audits know which audit
      owns event lifecycle for floor_plans-emitted events.

b3:
  - id: B3-MOVE-ORDERS
    candidate: move_orders
    rationale: |
      Robin, Eptura, Planon, Tango model employee / team relocations as first-class records
      (move ticket, target seat, target floor, effective date). No IWMS master captures this;
      relocations would currently be modeled as workplace_service_requests of a special type.
    vendor_evidence: [Robin, Eptura, Planon, Tango]
    proposed_module: new IWMS-MOVE-MGMT module, or new master inside IWMS-DESK-RESERVATION

  - id: B3-PARKING
    candidate: parking_reservations
    rationale: |
      Eptura, Robin, Officely, Tactic, Condeco include parking-spot reservations as a sibling to
      desk and room reservations. The flagship surface uses a distinct entity (capacity model,
      hourly grain, vehicle / license-plate attribute).
    vendor_evidence: [Eptura, Robin, Officely, Tactic, Condeco]
    proposed_module: new IWMS-PARKING module, or new master inside IWMS-DESK-RESERVATION

  - id: B3-WAYFINDING
    candidate: wayfinding_signals
    rationale: |
      Spacewell, FM:Systems Wayfinding, MRI OnCore Wayfinding produce structured wayfinding
      records (digital signage routing, kiosk paths, indoor positioning). Becoming a buyer-evaluated
      feature in 2025.
    vendor_evidence: [Spacewell, "FM:Systems", MRI OnCore]
    proposed_module: new master in IWMS-LOCATION-MASTER or sibling module

  - id: B3-OCC-SENSORS
    candidate: occupancy_sensor_readings
    rationale: |
      Spacewell, VergeSense, Disruptive Technologies, Density, Butlr, Rifiniti, Honeywell Forge
      ingest occupancy sensor signals (PIR, thermal, lidar). The signal feeds
      space_utilization_reports but the raw sensor records may warrant their own master (audit
      trail, sensor calibration, vendor mapping).
    vendor_evidence: [Spacewell, VergeSense, Disruptive Technologies, Density, Butlr, Rifiniti, Honeywell Forge]
    proposed_module: new master in IWMS-SPACE-ANALYTICS, or candidate BMS domain (see B3-BMS)

  - id: B3-MODULAR
    candidate: IWMS-MOVE-MGMT or IWMS-PARKING module
    rationale: |
      If move_orders and / or parking_reservations are loaded, each may warrant its own module
      rather than overloading IWMS-DESK-RESERVATION; pushes IWMS from 5 modules toward 6 or 7.
    vendor_evidence: [Robin, Eptura, Planon, Officely, Tactic, Condeco]
    proposed_module: new modules under domain 23

  - id: B3-COMPLIANCE
    candidate: OSHA + GDPR + CCPA + local building / fire codes
    rationale: |
      OSHA workplace safety (US, >10-employee employers); GDPR / employee data protection (EU,
      covers booking data and occupancy sensor data tied to badge swipes); CCPA / state privacy
      (US employee data); local building / fire codes per jurisdiction. No domain_regulations rows
      currently on IWMS.
    vendor_evidence: [statutory frameworks]
    proposed_module: domain_regulations on IWMS (23)

  - id: B3-BMS
    candidate: BMS (Building Management System) domain
    rationale: |
      Honeywell Forge Building Operations, Siemens Desigo CC, Schneider EcoStruxure Building
      Operation, Johnson Controls OpenBlue, Spacewell IoT cluster a distinct point-solution market
      around HVAC control, BACnet / Modbus device integration, occupancy sensor ingestion, fault
      detection. Adjacent to IWMS, REAL-EST, ESG, EAM. If promoted, B3-OCC-SENSORS likely lives in
      BMS, not IWMS.
    vendor_evidence: [Honeywell Forge Building Operations, Siemens Desigo CC, Schneider EcoStruxure, Johnson Controls OpenBlue, Spacewell IoT]
    proposed_module: new domain row; queue via audits/_missing-domains.md
