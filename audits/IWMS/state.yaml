    candidate: IWMS-MOVE-MGMT or IWMS-PARKING module
    rationale: |
      If move_orders and / or parking_reservations are loaded, each may warrant its own module
      rather than overloading IWMS-DESK-RESERVATION; pushes IWMS from 5 modules toward 6 or 7.
    vendor_evidence: [Robin, Eptura, Planon, Officely, Tactic, Condeco]
    proposed_module: new modules under domain 23

  - id: B3-COMPLIANCE
    candidate: OSHA + GDPR + CCPA + local building / fire codes
    rationale: |
