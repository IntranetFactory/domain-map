b2:
  - id: B2-CAP
    summary: M6 capability fix path for IWMS-ROOM-RESERVATION
    question: Which capability should be linked to IWMS-ROOM-RESERVATION (100) to cure M6?
    options:
      - (a) link to existing REAL-SPACE-OPTIM (374); audit default; matches DESK/ANALYTICS pattern
      - (b) author new REAL-MEETING-MGMT capability and link it; more granular; may force the same split on DESK
      - (c) mixed (specify per module)
    why: |
      Capability granularity decision; some flagships (Robin, Tactic) market desk + room as one
      workflow while others (Condeco, Spacewell) treat them as distinct.

  - id: B2-FLAGS
    summary: B4 pattern-flag positive re-evaluation per Rule #12
    question: |
      Set has_submit_lock=true on desk_bookings (590)? On room_reservations (591)?
      Set has_single_approver=true on workplace_service_requests (592)?
    options:
      - per-flag yes / no answer; capture decisions for B1A-B4 PATCH
    why: |
      Pattern flags are workflow-shape judgments the user owns. Vendor evidence supports
      submit-lock on check-in (Robin, Eptura, Tactic) and single-approver on triage -> resolve.

  - id: B2-SPLIT
    summary: Keep DESK + ROOM split or merge to single IWMS-RESERVATIONS module
    question: Maintain the two-module split for desk and room reservations, or merge?
    options:
      - (a) keep split, current default; works for customers buying Robin Desk vs Robin Rooms separately
      - (b) merge to single IWMS-RESERVATIONS, simpler agent surface, mirrors pure-plays selling both
    why: |
      Decision drives B1A-F2 skill count (4 vs 5) and B1B-B9b intra-domain handoff shape.
      B3 candidates (parking_reservations, move_orders) may argue against merge.

  - id: B2-FLOOR
    summary: Floor-plan trigger events 940 / 941 audit-perimeter ownership
    question: |
      Trigger events 940 (floor_plan.created) and 941 (floor_plan.updated) are on
      data_object_id=346 floor_plans, mastered by REAL-EST. Both already carry event_category.
      Cataloging question: keep them tagged to IWMS B9 sweep or formally route to REAL-EST?
    options:
      - (a) leave under IWMS audit perimeter; events touch IWMS handoff 858
      - (b) defer to REAL-EST audit perimeter
    why: |
      No PATCH required either way; purely a tracking decision so future audits know which audit
      owns event lifecycle for floor_plans-emitted events.

b3:
