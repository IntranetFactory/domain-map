b1b:
  - id: B1B-S1
    summary: "DELETE 6 contributor DMDO rows on CRM-AI-COPILOT (M7 hard-fail); blocked on B2-S1 architectural decision."
    finding: "CRM-AI-COPILOT (module 50) declares role='contributor', necessity='required' on the 6 CRM masters that are mastered in sibling CRM modules: customers (97, master in 46), crm_contacts (98, master in 46), crm_leads (99, master in 47), crm_opportunities (100, master in 48), pipeline_stages (101, master in 48), sales_activities (102, master in 49). M7 within-domain incoherence: same data_object_id has role='master' in module A AND role IN ('consumer','contributor') in module B of this domain. The agent-default fix is DELETE; the alternative (PROMOTE to embedded_master) makes AI-COPILOT standalone-deployable. Market practice (Salesforce Einstein, HubSpot Breeze, Microsoft Copilot for Sales, Zoho Zia) ships AI as an overlay rather than a standalone offering, which argues for DELETE."
    blocked_by:
      - {type: user_decision, ref: B2-S1}
    affected_entities: [customers, crm_contacts, crm_leads, crm_opportunities, pipeline_stages, sales_activities]
    affected_modules: [50]
  - id: B1B-S3
    summary: "Author 5 new intra-domain cross-module handoffs (B9b under-modeling); blocked on user event-pick for row (b) and approval of the batch."
    finding: "A 5-module domain has only 4 intra-domain handoffs loaded, and all 4 fire on `crm_lead.converted` (1191, 1192, 1193) and `crm_opportunity.closed_won` (1194). Expected additions: (a) CRM-PIPELINE-MGT -> CRM-ACTIVITY on `crm_opportunity.created` (162); (b) CRM-LEAD-MGT -> CRM-ACTIVITY on `crm_lead.qualified` (70) OR `crm_lead.scored_above_threshold` (160); (c) CRM-PIPELINE-MGT -> CRM-ACCT-MGT on `crm_opportunity.stage_changed` (86); (d) CRM-PIPELINE-MGT -> CRM-ACTIVITY on `crm_opportunity.requires_quote` (85); (e) CRM-ACTIVITY -> CRM-PIPELINE-MGT on `meeting.no_show` (166). CRM-AI-COPILOT intentionally excluded (AI overlay subscribes to module events rather than firing its own)."
    blocked_by:
      - {type: user_decision, ref: B2-CRM-S3-EVENT-PICK}
    affected_handoffs:
      - {direction: intra, source_domain: CRM, target_domain: CRM, trigger_event: crm_opportunity.created, payload: crm_opportunities, null_field: row_not_yet_loaded}
      - {direction: intra, source_domain: CRM, target_domain: CRM, trigger_event: "crm_lead.qualified OR crm_lead.scored_above_threshold", payload: crm_leads, null_field: row_not_yet_loaded}
      - {direction: intra, source_domain: CRM, target_domain: CRM, trigger_event: crm_opportunity.stage_changed, payload: crm_opportunities, null_field: row_not_yet_loaded}
      - {direction: intra, source_domain: CRM, target_domain: CRM, trigger_event: crm_opportunity.requires_quote, payload: crm_opportunities, null_field: row_not_yet_loaded}
      - {direction: intra, source_domain: CRM, target_domain: CRM, trigger_event: meeting.no_show, payload: sales_activities, null_field: row_not_yet_loaded}
  - id: B1B-S9
    summary: "F7 channel-primitive justification for CRM-ACTIVITY skill 160 (send_email + create_calendar_event); blocked on B2-S3 wording or notify_person PATCH."
    finding: "skill_tools row 1465 (send_email tool 37 on CRM-ACTIVITY skill 160), row 1466 (create_calendar_event tool 41 on skill 160), row 1483 (send_email tool 37 on CRM-AI-COPILOT skill 161), and row 1482 (generate_text tool 49 on skill 161) all carry empty notes on `required` channel-primitive links. F7 requires per-row workflow justification or PATCH to notify_person. For CRM-ACTIVITY the email and the calendar event ARE the activity record's payload; for CRM-AI-COPILOT the channel is the agent's outbound surface. Two routes: (a) supply user-approved skill_tools.notes wording, (b) treat F7 as satisfied via the audit narrative and leave skill_tools clean."
