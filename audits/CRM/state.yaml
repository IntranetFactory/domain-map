    affected_entities: []
    extra_affected_skill_tools: [1465, 1466, 1483, 1482]

b2:
  - id: B2-S1
    summary: "AI-COPILOT M7 architectural choice: DELETE vs PROMOTE the 6 contributor DMDO rows."
    question: "Should CRM-AI-COPILOT be a pure overlay tier on the host CRM modules (DELETE the 6 contributor rows; AI reads via canonical master refs at runtime) or a standalone-deployable AI copilot (PROMOTE each contributor to embedded_master so the module ships shells of customers/contacts/leads/opportunities/stages/activities)?"
    options: ["delete_all_6_contributor_rows", "promote_all_6_to_embedded_master", "mixed_specify_per_row"]
    why: "Market practice (Salesforce Einstein, HubSpot Breeze, Microsoft Copilot for Sales, Zoho Zia) ships AI as an overlay tier on host CRM modules, never as a standalone product, which argues for DELETE. Standalone embedded_master would let AI-COPILOT install without the rest of CRM but offers no workflow story without opportunities to act on. Architectural and product-intent decision, not a technical one."
  - id: B2-S2
    summary: "Rule #15 notes-pollution on pipeline_stages (101): user-approved at load time, or auto-populated and to revert?"
    question: "data_objects.notes on row 101 carries 'Config-shaped; admin-edited stage definitions, no per-record workflow. Pattern flags considered false-by-default after audit; record_status is the only state worth tracking. B12 exemption per Rule #12.' Was this auto-populated by the loader, or did the user approve the exact wording at load time? Rule #15 says auto-populated notes must revert."
    options: ["confirm_user_approved_at_load_time_keep", "confirm_auto_populated_revert_to_empty_and_record_b12_exemption_in_audit_history"]
  - id: B2-S3
    summary: "F7 channel-primitive justification for CRM-ACTIVITY and CRM-AI-COPILOT send_email + create_calendar_event + generate_text rows."
    question: "send_email and create_calendar_event on CRM-ACTIVITY skill 160 (rows 1465, 1466), plus send_email and generate_text on CRM-AI-COPILOT skill 161 (rows 1483, 1482) all have empty skill_tools.notes. F7 wants either per-row workflow rationale OR a PATCH to notify_person. Decide which route, and if (a), supply the exact notes string per row."
    options: ["supply_user_approved_notes_text_per_row", "patch_tool_id_to_notify_person", "treat_f7_satisfied_via_this_audit_leave_notes_empty"]
  - id: B2-S4
    summary: "Pattern-flag re-evaluation on CRM masters per Rule #12."
    question: "Re-eval candidates from 2026-05-30: (a) crm_opportunities.has_personal_content should be true (deal-specific contact details, negotiation notes, sensitive correspondence)? (b) crm_opportunities.has_single_approver should be true for closed-won (one rep + one manager closes)? (c) sales_activities.has_personal_content should be true (call recordings, email content)? (d) crm_leads.has_submit_lock should be true on conversion?"
    options: ["per_flag_yes_or_no_user_decides"]
  - id: B2-S5
    summary: "E6 permission-bundle drift on CRM roles."
    question: "Current bundles look tier-coherent (SALES-MGR :admin on all 4 sales modules + :manage on AI-COPILOT, SALES-OPS :admin on CRM-ACCT-MGT + CRM-AI-COPILOT + :manage on PIPELINE/ACTIVITY/LEAD-MGT). 2 workflow-gate permissions (close_won, convert_lead) are explicit on SALES-AE / SALES-SDR. Is the implicit-grant pattern (gates expanded via permission_hierarchy from :admin) intentional, or should specific gates be enumerated on every role?"
    options: ["confirm_hierarchy_expands_gates_leave_bundles_as_is", "add_explicit_gate_grants", "leave_drift_as_expectation_that_hierarchy_covers_everything"]
  - id: B2-S6
    summary: "Starter intent on CRM masters (REAL-ESTATE-AGENT and HVAC-SVC-MGMT)."
    question: "REAL-ESTATE-AGENT (153) embeds crm_contacts and crm_leads; HVAC-SVC-MGMT (171) embeds customers and crm_contacts. Both invariants satisfied. Should the embedded path remain (Rule #19 standard, demotion activates when CRM-ACCT-MGT co-installs) or should the starters consume the full CRM-ACCT-MGT (refactor needed)?"
    options: ["accept_embedded_path_demotion_activates_when_full_module_co_installs", "refactor_starters_to_consume_full_crm_acct_mgt"]
  - id: B2-S7
    summary: "CUSTOMER-360 (310) cross-cutting promotion."
    question: "CUSTOMER-360 is loaded as a CRM capability but its semantic spans CRM + CSM + CDP + MDM + MA. Promote to cross-cutting (link 4-5 domains via capability_domains) or keep CRM-only (downstream domains author their own identity / resolution capability)?"
    options: ["promote_to_cross_cutting_link_4_5_domains", "keep_crm_only_let_downstream_domains_author_their_own"]
    why: "May be informed by B3 vendor research (sales_forecasts + sales_quotas + CRM-FORECAST modularization could reshape the CRM capability map)."
  - id: B2-CRM-S3-EVENT-PICK
    summary: "B1B-S3 event-pick for the lead-to-activity intra-domain handoff (row b)."
    question: "Should the CRM-LEAD-MGT -> CRM-ACTIVITY intra-domain handoff fire on crm_lead.qualified (event 70) or crm_lead.scored_above_threshold (event 160)?"
    options: ["event_70_crm_lead_qualified", "event_160_crm_lead_scored_above_threshold", "both_separate_rows"]

b3:
  - id: B3-CRM-SALES-TERRITORIES
    candidate: sales_territories
    rationale: "Salesforce Sales Cloud, Microsoft Dynamics 365, Oracle Sales Cloud, SAP Sales Cloud all model territories as first-class records. Boundary question: SALES-PERF may own territories at the planning layer; CRM owns operational membership."
    vendor_evidence: [Salesforce Sales Cloud, Microsoft Dynamics 365, Oracle Sales Cloud, SAP Sales Cloud]
    proposed_module: CRM-ACCT-MGT
  - id: B3-CRM-SALES-QUOTAS
    candidate: sales_quotas
    rationale: "Salesforce, Microsoft, Pipedrive, Close all model per-rep quotas distinct from forecasting. Likely owned by SALES-PERF; CRM consumer at most."
    vendor_evidence: [Salesforce, Microsoft Dynamics 365, Pipedrive, Close]
    proposed_module: SALES-PERF
  - id: B3-CRM-SALES-FORECASTS
    candidate: sales_forecasts
    rationale: "Distinct entity from pipeline_stages and crm_opportunities aggregates. Salesforce Forecasting and Microsoft Forecasting model forecast records. Forecasting capability (CRM-FORECAST 249) exists but no forecast record entity."
    vendor_evidence: [Salesforce Forecasting, Microsoft Forecasting]
    proposed_module: CRM-PIPELINE-MGT
  - id: B3-CRM-SALES-PLAYBOOKS
    candidate: sales_playbooks
    rationale: "Salesforce Sales Cloud Playbooks, HubSpot Playbooks, Outreach Playbooks model playbook records as structured guides for sales reps."
    vendor_evidence: [Salesforce Sales Cloud, HubSpot Sales Hub, Outreach]
    proposed_module: CRM-AI-COPILOT
  - id: B3-CRM-COMPETITORS
    candidate: competitors
    rationale: "Salesforce Sales Cloud, HubSpot, Pipedrive all support competitor records linked to opportunities."
    vendor_evidence: [Salesforce Sales Cloud, HubSpot Sales Hub, Pipedrive]
    proposed_module: CRM-PIPELINE-MGT
  - id: B3-CRM-COMPETITOR-INTEL
    candidate: competitor_intelligence
    rationale: "Distinct from competitors (analysis records vs entities). Salesforce CRM Analytics, HubSpot Sales Hub maintain competitor intelligence as structured records."
    vendor_evidence: [Salesforce CRM Analytics, HubSpot Sales Hub]
    proposed_module: CRM-PIPELINE-MGT
  - id: B3-CRM-LEAD-RULES
    candidate: lead_assignment_rules
    rationale: "Salesforce, Microsoft, Pipedrive, Zoho all model lead-assignment rules as first-class records (criteria -> owner)."
    vendor_evidence: [Salesforce, Microsoft Dynamics 365, Pipedrive, Zoho CRM]
    proposed_module: CRM-LEAD-MGT
  - id: B3-CRM-ACCOUNT-HIERARCHIES
    candidate: account_hierarchies
    rationale: "Salesforce account hierarchies, Microsoft parent-child accounts, SAP customer hierarchies all model parent-subsidiary relationships as first-class records."
    vendor_evidence: [Salesforce, Microsoft Dynamics 365, SAP Sales Cloud]
    proposed_module: CRM-ACCT-MGT
  - id: B3-CRM-PARTNER-REL
    candidate: partner_relationships
    rationale: "Distinct from PRM-mastered partner records; CRM ships contact-to-partner-rep links and opportunity-co-sell records. PRM may already master these; the boundary needs clarification."
    vendor_evidence: [Salesforce PRM, Microsoft Partner Center]
    proposed_module: PRM
  - id: B3-CRM-COMMISSION
    candidate: commission_records
    rationale: "SAP CallidusCloud, Xactly, Varicent, Salesforce Spiff all model commission records as a master. Likely a separate domain (COMM-MGMT or under SALES-PERF)."
    vendor_evidence: [SAP CallidusCloud, Xactly, Varicent, Salesforce Spiff]
    proposed_module: SALES-PERF
  - id: B3-CRM-FORECAST-MODULE
    candidate: CRM-FORECAST module split
    rationale: "Currently CRM-FORECAST capability (249) is folded into CRM-PIPELINE-MGT (48). Salesforce Forecasting + Microsoft Forecasting ship as distinct UX surfaces. If sales_forecasts + sales_quotas land, a sixth full module makes more sense than overloading CRM-PIPELINE-MGT."
    vendor_evidence: [Salesforce Forecasting, Microsoft Forecasting]
  - id: B3-CRM-MARKETING-LIST-MODULE
    candidate: CRM-MARKETING-LIST module
    rationale: "HubSpot, Zoho, Freshsales ship a marketing-list / segment-management surface that overlaps with CDP's audience_segments. Boundary between CRM-ACCT-MGT consumer on audience_segments and a dedicated CRM marketing-list module is fuzzy."
    vendor_evidence: [HubSpot Sales Hub, Zoho CRM, Freshsales]
  - id: B3-CRM-REGULATIONS
    candidate: domain_regulations additions
    rationale: "Currently 2 regulations (GDPR, CPRA). Flagship-vendor surface implies additional applicability: LGPD (Brazil), PIPEDA (Canada), TCPA (US telemarketing on outbound calling for CRM-ACTIVITY), CAN-SPAM (US bulk email for CRM-ACTIVITY + MA boundary), DPDP Act 2023 (India), state-level US laws (Virginia VCDPA, Colorado CPA, Connecticut CTDPA, Utah UCPA)."
    vendor_evidence: []
