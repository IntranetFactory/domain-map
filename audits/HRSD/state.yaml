b1a:
  - id: B1A-A4
    summary: "Draft catalog_tagline + catalog_description for HRSD domains row (id 22); both empty."
    finding: "domains.id=22 (HRSD) has catalog_tagline='' and catalog_description=''. Per Rule #20 these are buyer-shaped fields needed by the public catalog and site generator. A4 fails on missing buyer-voice copy."
    action: "Draft both fields in buyer voice (workflow + value, not analyst voice). Surface drafts to user for review BEFORE writing per Rule #20. Once approved, PATCH /domains?id=eq.22. Never overwrite a non-empty value without explicit per-row approval."
    affected_entities:
      - domains.id=22
    extra_field_grain: domain
  - id: B1A-M8
    summary: "Draft catalog_tagline + catalog_description for all 3 HRSD modules (75, 76, 77); all empty."
    finding: "domain_modules ids 75 (HRSD-CASE-MGMT), 76 (HRSD-EMPLOYEE-PORTAL), 77 (HRSD-KNOWLEDGE) each have catalog_tagline='' and catalog_description=''. M8 fails per-module on missing buyer-voice copy."
    action: "Draft 3 sets of per-module buyer-voice copy (one tagline + 1-3 paragraph description per module). Surface to user per Rule #20 BEFORE writing. PATCH /domain_modules?id=eq.<mid> per row."
    affected_modules: [75, 76, 77]
    extra_field_grain: module

b1b:
  - id: B1B-APQC-REPLACE
    summary: "REPLACE 2 discovery_override handoff_processes rows with agent_curated rows on handoffs 119 and 446."
    finding: "Handoffs 119 (HRSD-CASE-MGMT -> IGA, case.access_required) and 446 (HRSD-CASE-MGMT -> HCM, case.access_required) still carry stale discovery_override rows pointing at PCF process id 196 (external_id 10388 'Manage customer service problems, requests, and inquiries'). The 2026-05-30 audit prescribed agent_curated replacements (PCF external_id 10523 'Manage employee inquiry process' L3 for 119; PCF external_id 17056 'Manage employee information and analytics' L2 for 446). Overwriting a pre-existing tag is a judgment call about whether the prior auto-classification was wrong."
    blocked_by:
      - {type: user_decision, ref: B1B-APQC-REPLACE}
    action: "User approves the swap, then for each handoff DELETE the existing discovery_override row and INSERT the agent_curated row pointing at the prescribed PCF."
    affected_handoffs:
      - {handoff_id: 119, direction: outbound, source_domain: HRSD, target_domain: IGA, trigger_event: "case.access_required", payload: "hr_cases"}
      - {handoff_id: 446, direction: outbound, source_domain: HRSD, target_domain: HCM, trigger_event: "case.access_required", payload: "hr_cases"}
    extra_proposed_pcf:
      - {handoff_id: 119, current_pcf_external_id: "10388", proposed_pcf_external_id: "10523", proposed_level: 3}
      - {handoff_id: 446, current_pcf_external_id: "10388", proposed_pcf_external_id: "17056", proposed_level: 2}
  - id: B1B-APQC-KEEP-OR-UPGRADE
    summary: "Per-row KEEP-or-upgrade decision on 2 handoff_processes rows on handoffs 369 and 1109."
    finding: "Handoff 369 (HCM -> HRSD, employee.terminated) carries discovery_override pointing at PCF external_id 20599 'Manage employee onboarding, training, and development' L2; audit suggested upgrade to PCF external_id 10523 'Manage employee inquiry process' L3. Handoff 1109 (PA -> HRSD, engagement.declining) carries discovery_substring pointing at PCF external_id 16944 'Conduct employee engagement surveys' L3; audit suggested replace with PCF external_id 21439 'Manage employee assistance and retention' L3."
    blocked_by:
      - {type: user_decision, ref: B1B-APQC-KEEP-OR-UPGRADE}
    action: "User picks per row: leave existing row, or DELETE the discovery row and INSERT agent_curated at the prescribed PCF."
    affected_handoffs:
      - {handoff_id: 369, direction: inbound, source_domain: HCM, target_domain: HRSD, trigger_event: "employee.terminated", payload: "employees"}
      - {handoff_id: 1109, direction: inbound, source_domain: PA, target_domain: HRSD, trigger_event: "engagement.declining", payload: "engagement_surveys"}
    extra_proposed_pcf:
      - {handoff_id: 369, current_pcf_external_id: "20599", proposed_pcf_external_id: "10523", proposed_level: 3}
      - {handoff_id: 1109, current_pcf_external_id: "16944", proposed_pcf_external_id: "21439", proposed_level: 3}

b2:
  - id: B2-1
    summary: "Notes pollution review on 27 HRSD rows that match RESCINDED Rule #15 templates."
    question: "Were the templated notes on 15 handoff rows, 10 DMDO rows on module 75, and 2 data_objects.notes rows user-approved at load time, or auto-written under the rescinded license?"
    options:
      - "Confirm user-approved, leave in place (do-not-overwrite rule applies)"
      - "Confirm auto-written, PATCH all 27 to empty + append incident to references/skill-changelog.md"
      - "Per-row review: substantive ones (e.g. case_categories config-shape exemption) stay; templated B10b backfill notes get cleared"
    why: "Wording is templated (B10b resolved 2026-05-26 ... / Domain-level FYI ... / Consumed by HRSD-CASE-MGMT when an inbound handoff escalates ...) and shape-matches the rescinded Rule #15 license. The agent cannot distinguish approval from auto-write without user memory."
