b1a:
  - id: B1A-PHASE-P
    summary: "Multi-module (3 modules) with 0 personas post-Plan-3 (E1 fail): author the persona / RACI layer. DEFERRED (personas not authored this pass)."
    finding: "3 domain_modules and 0 domain_roles reaching this domain via role_modules. Plan 3 deleted the old _core personas, so E1 fires on this multi-module domain."
    action: "Author domain_roles (operational personas) function-anchored per references/roles.md section 7, wire role_modules reach across the 3 modules, add process_raci responsibility rows, and wire data_object_lifecycle_states.process_id. ATS is the worked reference (scripts/loaders/load_ats_personas_pilot.ts). DEFERRED per audit scope; candidate personas: HR case agent, HR service manager, HR knowledge manager."
    extra_phase_p_triage: "2026-06-02"
  - id: B1A-SELF-CONTAIN
    summary: "5 contributor/required-consumer rows break module self-containment (M9): embed or relax each. DESTRUCTIVE (rewrites role/necessity on existing DMDO rows) -> user-approval required."
    finding: "5 domain_module_data_objects rows on this domain's modules are role=consumer with necessity=required, pointing at an entity mastered by another domain and not embedded_master here. Each is an M9 self-containment violation."
    action: "Per row, convert to embedded_master (carry a local shell) or set necessity=optional (presence-conditional), per references/modules.md section 5 and SKILL.md M9. Rewriting an existing non-empty role/necessity is destructive (Rule #21) -> surface for user approval, do not apply."
    extra_m9_shapes:
      - {entity: employees, module: HRSD-CASE-MGMT, role: consumer, master_domain: HCM}
      - {entity: employees, module: HRSD-EMPLOYEE-PORTAL, role: consumer, master_domain: HCM}
      - {entity: knowledge_articles, module: HRSD-EMPLOYEE-PORTAL, role: consumer, master_domain: ITSM}
      - {entity: knowledge_articles, module: HRSD-KNOWLEDGE, role: consumer, master_domain: ITSM}
      - {entity: service_requests, module: HRSD-EMPLOYEE-PORTAL, role: consumer, master_domain: ITSM}
    extra_phase_p_triage: "2026-06-02"

b1b:
  - id: B1B-APQC-REPLACE
    summary: "REPLACE 2 discovery_override handoff_processes rows with agent_curated rows on handoffs 119 and 446."
    finding: "Handoffs 119 (HRSD-CASE-MGMT -> IGA, case.access_required, hp.id=78) and 446 (HRSD-CASE-MGMT -> HCM, case.access_required, hp.id=79) still carry stale discovery_override rows pointing at PCF process id 196 (external_id 10388 'Manage customer service problems, requests, and inquiries'). The 2026-05-30 audit prescribed agent_curated replacements (PCF external_id 10523 'Manage employee inquiry process' L3 for 119; PCF external_id 17056 'Manage employee information and analytics' L2 for 446). Overwriting a pre-existing tag is a judgment call about whether the prior auto-classification was wrong."
    blocked_by:
      - {type: user_decision, ref: B1B-APQC-REPLACE}
    action: "User approves the swap, then for each handoff DELETE the existing discovery_override row and INSERT the agent_curated row pointing at the prescribed PCF."
    affected_handoffs:
      - {handoff_id: 119, hp_id: 78, direction: outbound, source_domain: HRSD, target_domain: IGA, trigger_event: "case.access_required", payload: "hr_cases"}
      - {handoff_id: 446, hp_id: 79, direction: outbound, source_domain: HRSD, target_domain: HCM, trigger_event: "case.access_required", payload: "hr_cases"}
    extra_proposed_pcf:
      - {handoff_id: 119, current_pcf_external_id: "10388", proposed_pcf_external_id: "10523", proposed_level: 3}
      - {handoff_id: 446, current_pcf_external_id: "10388", proposed_pcf_external_id: "17056", proposed_level: 2}
  - id: B1B-APQC-KEEP-OR-UPGRADE
    summary: "Per-row KEEP-or-upgrade decision on 2 handoff_processes rows on handoffs 369 and 1109."
    finding: "Handoff 369 (HCM -> HRSD, employee.terminated, hp.id=36) carries discovery_override pointing at PCF external_id 20599 'Manage employee onboarding, training, and development' L2; audit suggested upgrade to PCF external_id 10523 'Manage employee inquiry process' L3. Handoff 1109 (PA -> HRSD, engagement.declining, hp.id=88) carries discovery_substring pointing at PCF external_id 16944 'Conduct employee engagement surveys' L3; audit suggested replace with PCF external_id 21439 'Manage employee assistance and retention' L3."
    blocked_by:
      - {type: user_decision, ref: B1B-APQC-KEEP-OR-UPGRADE}
    action: "User picks per row: leave existing row, or DELETE the discovery row and INSERT agent_curated at the prescribed PCF."
    affected_handoffs:
      - {handoff_id: 369, hp_id: 36, direction: inbound, source_domain: HCM, target_domain: HRSD, trigger_event: "employee.terminated", payload: "employees"}
      - {handoff_id: 1109, hp_id: 88, direction: inbound, source_domain: PA, target_domain: HRSD, trigger_event: "engagement.declining", payload: "engagement_surveys"}
    extra_proposed_pcf:
      - {handoff_id: 369, current_pcf_external_id: "20599", proposed_pcf_external_id: "10523", proposed_level: 3}
      - {handoff_id: 1109, current_pcf_external_id: "16944", proposed_pcf_external_id: "21439", proposed_level: 3}

b2:
  - id: B2-1
    summary: "Notes pollution review on 27 HRSD rows that match RESCINDED Rule #15 templates."
    question: "Were the templated notes on 15 handoff rows, 10 DMDO rows on module 75, and 2 data_objects.notes rows user-approved at load time, or auto-written under the rescinded license?"
    options:
      - "Confirm user-approved, leave in place (do-not-overwrite rule applies)"
      - "Confirm auto-written, PATCH all 27 to empty + append incident to references/skill-changelog.md"
      - "Per-row review: substantive ones (e.g. case_categories config-shape exemption) stay; templated B10b backfill notes get cleared"
    why: "Wording is templated (B10b resolved 2026-05-26 ... / Domain-level FYI ... / Consumed by HRSD-CASE-MGMT when an inbound handoff escalates ...) and shape-matches the rescinded Rule #15 license. The agent cannot distinguish approval from auto-write without user memory. Clearing notes is a destructive overwrite (Rule #21) and is never done unapproved."
    affected_handoffs:
      - {handoff_id: 9, null_field: notes}
      - {handoff_id: 250, null_field: notes}
      - {handoff_id: 402, null_field: notes}
      - {handoff_id: 416, null_field: notes}
