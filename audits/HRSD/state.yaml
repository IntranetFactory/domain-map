  - id: B2-2
    summary: "Pattern-flag positive re-evaluation on hr_cases (192) for has_submit_lock and has_single_approver."
    question: "Should has_submit_lock=true (does case closure freeze fields)? Should has_single_approver=true (does pending_approval route to a single approver)?"
    options:
      - "has_submit_lock: yes (PATCH true) or no (leave false)"
      - "has_single_approver: yes (PATCH true) or no (leave false)"
    why: "Rule #12 / B4 requires positive re-evaluation; default-false is not the same as false-after-review. Decision recorded in chat / PR, NEVER in notes per Rule #15. (Flipping false->true is additive but the answer is a workflow judgment the agent cannot pick.) hr_cases is now classified entity_type=operational_workflow with an 8-state machine (intake -> triaged -> assigned -> in_progress -> pending_approval -> resolved -> closed, plus reopened); pending_approval and closed are the relevant gates."
    affected_masters:
      - {data_object_id: 192, name: hr_cases, target_module_id: 75, workflow: "8-state machine intake -> closed with reopen"}
  - id: B2-3
    summary: "Trigger event 21 case.access_required keyed on hr_cases (192) reads as derived condition rather than lifecycle state."
    question: "Is event 21 a lifecycle state on hr_cases or a derived signal that should live on a separate hr_case_signals entity?"
    options:
      - "Leave as conditional flag on hr_cases (current shape)"
      - "Rename event to hr_case.access_required for naming-convention alignment with the rest of the master event set"
      - "Introduce derived hr_case_signals entity and re-key the event there"
    why: "Two handoffs (119 to IGA, 446 to HCM) ride this event. The verb access_required reads as a derived condition, not a lifecycle state. Decision shapes whether the event remains on the master or migrates to a derived-signal entity. Rename/re-key is destructive (re-attributes an existing trigger_event)."
    affected_events:
      - {id: 21, event_name: "case.access_required", current_category: state_change, proposed_category: state_change}
    affected_handoffs:
      - {handoff_id: 119, direction: outbound, source_domain: HRSD, target_domain: IGA, trigger_event: "case.access_required", payload: "hr_cases"}
      - {handoff_id: 446, direction: outbound, source_domain: HRSD, target_domain: HCM, trigger_event: "case.access_required", payload: "hr_cases"}
  - id: B2-4
    summary: "Role naming convention: HRSD- prefix on 3 roles (10069, 10070, 10071) on function 76. Function-scoped or accidental domain-prefix?"
    question: "Is HRSD the intended short code for the HR Service Delivery function (role-naming rule allows function-scoped) or an accidental domain prefix (anti-pattern per role-naming rule)?"
    options:
      - "Confirm HRSD is the intended function code, leave as-is"
      - "Rename to HR-AGENT, HR-MANAGER, HR-KB-MGR (or similar). Role IDs and bundle rows survive on rename"
    why: "The function HR Service Delivery does not have an enforced short code. Loaders may have used the domain code as a stand-in. Role-naming rule warns that domain prefixes are an anti-pattern, but the function name initials are also HRSD. Rename is a destructive overwrite of existing role_code values."
    affected_entities:
      - "roles.id=10069 (HRSD-AGENT)"
      - "roles.id=10070 (HRSD-MANAGER)"
      - "roles.id=10071 (HRSD-KNOWLEDGE-MANAGER)"
  - id: B2-5
    summary: "Per-row record_status approval for 24 handoff_processes rows across the 21 HRSD cross-domain handoffs."
    question: "Which of the 24 handoff_processes rows on HRSD cross-domain handoffs should be promoted to record_status='approved'?"
    options:
      - "Approve all (single bulk PATCH after user signs off)"
      - "Per-row review with explicit per-row approval (user calls approved or rejected per row)"
      - "Defer until the REPLACE / KEEP-or-upgrade decisions in B1B-APQC-* land, then approve in a consolidated batch"
    why: "Rule #1 forbids the agent from stamping record_status='approved' without explicit per-row user approval. The catalog-quality H1 headline is the count of approved rows; until any are approved, the headline reads 0 despite 18 agent_curated high-confidence-pending rows."
    extra_affected_table: handoff_processes
    extra_handoff_set: [9, 29, 119, 250, 369, 402, 416, 420, 429, 446, 447, 448, 467, 721, 1048, 1109, 1118, 1119, 1120, 1121, 1137]

b3:
  - id: B3-1
    candidate: employee_journeys (master) + HRSD-JOURNEY-MGMT (module)
    rationale: "Non-onboarding employee journeys (return-from-leave, role change, location change, exit) have no HRSD master today. Vendor surface shows journey-orchestration as a substantive packaged offering; HRSD-mastered version would be a journey class for general-purpose employee moments. Structural (new module + new master) -> if pursued, reclassify as a b2 split decision, not auto-executed."
    vendor_evidence:
      - {vendor: "Workday Journeys", evidence: "1st_class"}
      - {vendor: "Enboarder", evidence: "1st_class"}
      - {vendor: "Applaud", evidence: "1st_class"}
      - {vendor: "ServiceNow HRSD (Employee Journey Management)", evidence: "1st_class"}
    proposed_module: HRSD-JOURNEY-MGMT
  - id: B3-2
    candidate: hr_documents consumer footprint on HRSD-CASE-MGMT and HRSD-EMPLOYEE-PORTAL
    rationale: "HR document management (offer letters, contract amendments, exit letters, leave letters, signed acknowledgments) is a substantive cross-cutting surface. Every flagship HRSD platform has a documents tab on the employee record. HRSD-CASE-MGMT should consumer-link case attachments; HRSD-EMPLOYEE-PORTAL should consumer-link employee self-service file access."
    vendor_evidence:
      - {vendor: "Workday Documents", evidence: "1st_class"}
      - {vendor: "Applaud", evidence: "secondary"}
      - {vendor: "Enboarder", evidence: "secondary"}
    proposed_module: "HRSD-CASE-MGMT (consumer) + HRSD-EMPLOYEE-PORTAL (consumer)"
  - id: B3-3
    candidate: whistleblower / ER specialty case subtype or ETHICS-INTAKE candidate domain
    rationale: "EU Whistleblower Protection Directive is already linked as a regulation. NAVEX EthicsPoint, OneTrust EthicsHub, AllVoices, People Intouch are pure-play specialists. HRSD-CASE-MGMT today carries no specialty handling shape (no whistleblower_cases data_object, no anonymization flag, no special-routing capability). Question is whether to add a case_subtype discriminator or queue ETHICS-INTAKE as a missing domain. New domain / split -> if pursued, reclassify as a b2 decision."
    vendor_evidence:
      - {vendor: "NAVEX EthicsPoint", evidence: "1st_class"}
      - {vendor: "OneTrust EthicsHub", evidence: "1st_class"}
      - {vendor: "AllVoices", evidence: "1st_class"}
      - {vendor: "People Intouch", evidence: "1st_class"}
