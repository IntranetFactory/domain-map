b2:
  - id: B2-VEHICLE-INSPECTIONS-DVIR
    summary: "vehicle_inspections scope (a3 = 'would embedded master be more flexible?')."
    question: "Should vehicle_inspections (374) be unified DVIR+PMI with a kind discriminator (kept in FLEET), split (DVIR to TELEMATICS, PMI stays), or modeled as an embedded_master so FLEET ships a local inspection shell deferring to a TELEMATICS DVIR master when present?"
    options: ["keep_unified_with_discriminator", "split_dvir_to_telematics", "embedded_master_shell"]
    evidence: "Fleetio (pure-play fleet-ops/maintenance) packages DVIR (driver pre/post-trip) and PMI (mechanic periodic) as ONE inspection record flowing into work orders, backing unified-with-discriminator. Motive (strongest DVIR), Samsara, Geotab, Verizon Connect emit DVIR inside the driver-app/ELD workflow but never own mechanic PMI, so a full move to TELEMATICS has no vendor backing. embedded_master is the flexible middle: FLEET local-masters inspections standalone and defers to a TELEMATICS DVIR master in a holistic deployment - recommended if you want FLEET-MGMT and TELEMATICS independently deployable. Coordinated with the TELEMATICS audit (its B1-M1)."
    why: "User asked whether embedded_master is more flexible; it is the standalone-deployable answer, but the unified-discriminator shape matches the Fleetio specialist. User's call."

  - id: B2-SIGN-DOCUMENT
    summary: "sign_document tool on the legacy fleet skill (a5 = 'explain')."
    question: "The legacy fleet skill carries a sign_document (external e-signature) tool with no recorded workflow. It would serve EITHER driver onboarding paperwork (W-4, I-9, CDL attestation) OR vehicle purchase/lease/title documents. Which workflow keeps it: driver onboarding, vehicle lifecycle, both, or drop it as vestigial?"
    options: ["driver_onboarding", "vehicle_lifecycle", "both", "drop_vestigial"]
    why: "Explanation (a5): e-signature is real in fleet ops for both driver paperwork and vehicle title/lease docs, but the tool currently has no module home, so it is either justified to one and re-homed, or removed cleanly. Keep only if a real workflow uses it."

  - id: B2-HCM-DRIVER-LIFECYCLE
    summary: "HCM <-> FLEET driver-lifecycle handoffs (a6 = 'explain')."
    question: "Should the catalog model employee.hired -> driver activation and employee.terminated -> driver separation as cross-domain handoffs from HCM to FLEET-MGMT (both directions, termination-only, or none)?"
    options: ["both_directions", "termination_only", "none_manual"]
    why: "Explanation (a6): today driver records are created/closed by hand in the fleet product. Modeling the HCM handoffs would auto-activate a driver (and their hours-of-service eligibility) on hire and auto-deactivate on separation - the separation direction is regulator-relevant (HOS must stop on termination). If yes, HCM's B9 owes the outbound trigger_events; the FLEET-side consumer DMDO lands on FLEET-MGMT-DRIVER-OPS. It also sets the hire/separate gate verbs the fleet_drivers state machine needs (B1B-LIFECYCLE-STATES)."

  - id: B2-REGULATION-SCOPE
    summary: "Floor vs stretch regulation set, with optional/conditional applicability (a8)."
    question: "Floor set (FMCSA 391/395/396, IFTA, IRP, FMCSA Clearinghouse) plus the stretch set (GASB 87, SOX, EU Mobility Package, ADR, Eurovignette) - confirmed shipping as OPTIONAL/conditional applicability so a US-only or EU-only tenant imports only what applies?"
    options: ["floor_plus_stretch_all_conditional", "floor_required_stretch_conditional", "floor_only"]
    evidence: "a8 answer: yes, regulations can and should be conditional - domain_regulations.applicability already supports per-tenant scoping, and Rule #16 ships jurisdiction-bound entities optional. So EU operators never import FMCSA/IFTA/IRP and US operators never import EU Mobility Package / Eurovignette / ADR. Confirming this turns the recommended floor+stretch into an all-conditional set."
    why: "User asked whether the regs can be optional per region; they can. Re-asked only to confirm the exact set on that conditional basis before the upstream seed (B1B-REGULATIONS-UPSTREAM)."

  - id: B2-ALIASES
    summary: "data_object_aliases picks for the 5 masters (a10 blank -> curate a subset)."
    question: "Which vendor-synonym aliases to load? fleet_vehicles -> Asset / Unit / Truck / Power Unit / Tractor; fleet_drivers -> Operator / CDL Holder; fuel_transactions -> Fuel Card Posting / Fueling Event / Charge Session; fleet_assignments -> Vehicle Assignment / Dispatch / Driver Pairing; vehicle_inspections -> DVIR / Pre-Trip / Walkaround. Pick the ones to canonicalize per master."
    options: ["load_all_enumerated", "load_subset_user_picks", "defer"]
    why: "a10 was blank; recommendation b (curate) needs the actual picks. Bulk alias loads are best curated so only wanted synonyms land."

