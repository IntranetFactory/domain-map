b1a:
  - id: B1A-SYSTEM-SKILLS
    summary: "3 new modules each need a <module_code_lower>_agent system skill; legacy domain-scoped skill 60 must retire (Rule #17 -> F2/F3). BLOCKED: the DELETE-skill-60 tail is gated on B2-SIGN-DOCUMENT (user_decision)."
    finding: >-
      The 2026-06-02 modularization created 3 full modules
      (FLEET-MGMT-VEHICLE-LIFECYCLE id 204, FLEET-MGMT-DRIVER-OPS id 205,
      FLEET-MGMT-FUEL-COMPLIANCE id 206) with zero module-scoped system skills.
      Rule #17 (F2) requires exactly one <module_code_lower>_agent system skill
      per module; F3 requires >=1 skill_tools row each. Legacy domain-scoped
      skill fleet-mgmt-system (id 60, domain_id=147, domain_module_id=NULL)
      remains and carries 7 skill_tools (5 query_* covering all 5 masters, plus
      send_email and sign_document). The module-split prerequisite that
      previously blocked this (B1B-MODULES-PENDING) is now satisfied. The 2026-06-06
      b1a pass HELD this item: its action is an atomic sequence ending in
      "DELETE skill 60", and that DELETE is gated on resolving sign_document per
      B2-SIGN-DOCUMENT, a user_decision. Executing only the head (author 3 skills,
      redistribute query_* tools, substitute send_email -> notify_person) while
      leaving skill 60 undeleted would create a worse transient state (two parallel
      system-skill sets, F1 + F2 failing in new ways, orphaned sign_document link),
      so the whole item is held until the user decides sign_document's disposition.
    action: >-
      Author 3 system skills (fleet_mgmt_vehicle_lifecycle_agent on 204,
      fleet_mgmt_driver_ops_agent on 205, fleet_mgmt_fuel_compliance_agent on
      206). Redistribute the 5 query_* tools by mastered entity (vehicle ->
      204; drivers/assignments/inspections -> 205; fuel -> 206). Resolve
      send_email per B1B-CHANNEL-PRIMITIVE (substitute notify_person) and
      sign_document per B2-SIGN-DOCUMENT, then DELETE skill 60.
    blocked_by:
      - {type: user_decision, ref: B2-SIGN-DOCUMENT, reason: "the DELETE-skill-60 tail requires sign_document's disposition (keep on which module's skill vs drop as vestigial); cannot retire skill 60 or fully redistribute its tools until decided"}
    affected_modules: [204, 205, 206]

