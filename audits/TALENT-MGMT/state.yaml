b2:
  - id: B2-S1
    summary: "M7 architectural choice for TALENT-MGMT sibling-module dependency on performance_reviews (174) and talent_calibrations (177)."
    question: "Should the 3 sibling consumer DMDO rows be DELETEd (siblings read the canonical master on 51), PROMOTEd to embedded_master (each sibling ships its own shell for standalone deploy), or mixed per row?"
    options:
      - "(a) DELETE all 3 (52,174), (53,174), (52,177)"
      - "(b) PROMOTE all 3 to embedded_master"
      - "(c) Mixed (specify per row)"
    why: "Standalone SUCCESSION-CAREER without PERFORMANCE-MGMT has no calibrated review to derive a 9-box from; standalone CONTINUOUS-FEEDBACK without PERFORMANCE-MGMT has no review cycle to feed. The embedded path looks weak; DELETE is the cleaner architectural fit but locks the modules together at deploy time."

  - id: B2-S2
    summary: "Rule #15 notes-pollution status on 14 skill_tools rows under skills 137/138/139; revert or confirm user-approved."
    question: "Were the populated notes on skill_tools rows 1305-1318 user-approved at load time, or auto-populated by the loader?"
    options:
      - "(a) User-approved at load time; leave in place"
      - "(b) Auto-populated; PATCH all 14 to empty string and log Rule #15 incident in references/skill-changelog.md"
    why: "Per Rule #15 the default is empty notes. The notes column is forbidden unless the exact wording was surfaced and approved per row. Audit alone cannot tell which path produced these strings."

  - id: B2-S3
    summary: "F7 channel-primitive justification on sign_document (skill_tool 1310); coupled to B2-S2 outcome."
    question: "Is sign_document on TALENT-PERFORMANCE-MGMT system skill (137) the actual workflow for regulated industries, or should the row be cleaned or removed?"
    options:
      - "(a) Supply user-approved notes wording explaining the regulated-signing workflow"
      - "(b) Treat F7 as satisfied via audit transcript; clean notes to empty string"
      - "(c) DELETE the skill_tools row if sign_document is not actually needed in the workflow"
    why: "Rule #15 vs F7 boundary; resolution depends on B2-S2 outcome (if all skill_tools notes get reverted under B2-S2 option b, B2-S3 collapses to option b/c)."

  - id: B2-S4
    summary: "B4 pattern-flag re-evaluation; 5 candidate flips across 4 masters."
    question: "Per-flag yes/no on the following candidate pattern-flag flips on TALENT-MGMT masters."
    options:
      - "(a) nine_box_placements (178).has_submit_lock = true"
      - "(b) career_aspirations (179).has_submit_lock = true"
      - "(c) feedback_records (180).has_submit_lock = true"
      - "(d) succession_plans (176).has_single_approver = true"
      - "(e) talent_calibrations (177).has_single_approver remains false (multi-approver pattern; confirm)"
    why: "Pattern flags are workflow-shape judgments not derivable from structural state."

  - id: B2-S5
    summary: "Handoff 450 target module assignment; DMDO tie on employees across 51/52/53."
    question: "Which TALENT-MGMT module is the right target for inbound handoff 450 (PA → TALENT, attrition_risk.high, payload employees)?"
    options:
      - "(a) 52 TALENT-SUCCESSION-CAREER (attrition risk drives successor readiness)"
      - "(b) 51 TALENT-PERFORMANCE-MGMT"
      - "(c) 53 TALENT-CONTINUOUS-FEEDBACK"
      - "(d) Leave NULL pending PA-side re-modeling"
    why: "B10b master-rule produces a tie because employees (31) is embedded_master at equal strongest role in all 3 TALENT modules."

  - id: B2-S6
    summary: "E6 permission-bundle drift; HR-BUSINESS-PARTNER read-only on CONTINUOUS-FEEDBACK plus implicit-grant pattern for workflow gates."
    question: "Is the HR-BUSINESS-PARTNER role intentionally read-only on TALENT-CONTINUOUS-FEEDBACK (module 53), and is the implicit-grant pattern (no explicit workflow-gate permission enumeration in any TALENT bundle, relying on permission_hierarchy to expand :manage/:admin) the intended shape?"
    options:
      - "(a) Confirm hierarchy expands gates; leave bundles as-is and leave HRBP read-only on 53"
      - "(b) Add explicit gate grants where IC-tier gap is real (e.g. calibrate_performance_review on HRBP)"
      - "(c) Upgrade HRBP from :read to :manage on module 53"
    why: "Workflow-intent decision the analyst cannot make from structural state alone."

b3:
  - id: B3-COMPETENCIES
    candidate: competencies
    rationale: "Workday, SAP SuccessFactors, Cornerstone, Lattice, Leapsome model competency frameworks as first-class records distinct from skill_profiles (a competency is a definition; a skill_profile is an individual's holdings). Required for evaluative review templates. Not in current TALENT-MGMT or SKILLS-MGMT footprint."
    vendor_evidence:
      - {vendor: Workday Talent Optimization, evidence: 1st_class}
      - {vendor: SAP SuccessFactors Performance and Goals, evidence: 1st_class}
      - {vendor: Cornerstone Performance, evidence: 1st_class}
      - {vendor: Lattice, evidence: 1st_class}
      - {vendor: Leapsome, evidence: 1st_class}
    proposed_module: "TALENT-PERFORMANCE-MGMT (master) OR SKILLS-MGMT extension"

  - id: B3-PEER-REVIEW-INVITATIONS
    candidate: peer_review_invitations
    rationale: "Lattice, Leapsome, Workday, 15Five model multi-rater orchestration as distinct from the review record (invitations have their own lifecycle: sent → received → completed → expired). Current catalog folds peer review under feedback_records."
    vendor_evidence:
      - {vendor: Lattice, evidence: 1st_class}
      - {vendor: Leapsome, evidence: 1st_class}
      - {vendor: Workday Talent Optimization, evidence: 1st_class}
      - {vendor: 15Five, evidence: 1st_class}
    proposed_module: "TALENT-PERFORMANCE-MGMT (master)"

  - id: B3-DEVELOPMENT-PLANS
    candidate: development_plans
    rationale: "Workday, SAP, Cornerstone, Lattice ship IDPs as first-class records distinct from career_aspirations (an IDP is an action plan with steps, deadlines, accountability; an aspiration is a stated preference). career_aspirations aliases include 'Individual Development Plan' but the entity may warrant its own master."
    vendor_evidence:
      - {vendor: Workday Talent Optimization, evidence: 1st_class}
      - {vendor: SAP SuccessFactors Performance and Goals, evidence: 1st_class}
      - {vendor: Cornerstone Performance, evidence: 1st_class}
      - {vendor: Lattice, evidence: 1st_class}
    proposed_module: "TALENT-SUCCESSION-CAREER (master)"

  - id: B3-SUCCESSION-CANDIDATES
    candidate: succession_candidates
    rationale: "Workday, SAP, Cornerstone model succession_candidates as a junction with payload (one succession_plan has many candidates with readiness rating, time-to-ready, risk score). Currently succession_plans has no junction; candidate list lives implicitly via the users is_successor_in succession_plans relationship (945), which loses per-candidate payload."
    vendor_evidence:
      - {vendor: Workday Talent Optimization, evidence: 1st_class}
      - {vendor: SAP SuccessFactors Performance and Goals, evidence: 1st_class}
      - {vendor: Cornerstone Performance, evidence: 1st_class}
    proposed_module: "TALENT-SUCCESSION-CAREER (master or junction)"

  - id: B3-RECOGNITION-BADGES
    candidate: recognition_badges
    rationale: "Bonusly, Kudos, Workhuman, Achievers run peer recognition as a distinct flow with points / badges / a reward catalog. Lattice 'Praise' and 15Five 'High Fives' share the surface but are simpler. Current catalog folds these into feedback_records (alias includes 'Praise' and 'Kudos') but the redemption / points-balance / catalog dimension is missing."
    vendor_evidence:
      - {vendor: Bonusly, evidence: 1st_class}
      - {vendor: Kudos, evidence: 1st_class}
      - {vendor: Workhuman, evidence: 1st_class}
      - {vendor: Achievers, evidence: 1st_class}
    proposed_module: "new PEER-RECOGNITION domain (queued in _missing-domains.md)"

  - id: B3-MENTORSHIP-PAIRINGS
    candidate: mentorship_pairings
    rationale: "MentorcliQ, Chronus, Together, PushFar, Qooper specialize in mentorship orchestration; SAP, Cornerstone, Workday have mentorship modules. Current TALENT-MGMT has no mentorship entity."
    vendor_evidence:
