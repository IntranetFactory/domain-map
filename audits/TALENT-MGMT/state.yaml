    action: "On user decision (B2-S1): DELETE the 3 consumer DMDO rows via /domain_module_data_objects DELETE; OR PROMOTE each to role='embedded_master' with appropriate necessity. The DELETE route makes 52/53 read 174/177 through the canonical master on 51; the PROMOTE route ships standalone-deployable shells per module."
