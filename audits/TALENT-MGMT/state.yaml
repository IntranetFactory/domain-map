    candidate: performance_improvement_plans
    rationale: "Workday, SAP, Cornerstone, Lattice, Leapsome model PIPs as a formal HR process distinct from the review cycle (PIP has its own goals, check-ins, milestones, escalation gates). Currently no PIP entity."
