b2:
  - id: B2-MOD-SHAPE
    summary: "2-module versus 3-module split for AUDIT."
    question: "AUDIT-PLAN-ENGAGE + AUDIT-FINDINGS-REPORTING (default), or AUDIT-UNIVERSE-RISK + AUDIT-FIELDWORK + AUDIT-ISSUES-REPORTING (cleaner role separation, more cross-module handoffs)?"
    options: ["2-module (recommended, lighter)", "3-module (cleaner role separation, ~8 B9b handoffs)"]
    why: "Upstream of every B1B-* item and B1A-BUILD; shapes each MISSING entity host and capability realization. Phase 0 (2026-06-08) grounds 2-module as the vendor-majority cut: 4 of 5 flagships (AuditBoard OpsAudit, TeamMate+, Workiva, ServiceNow IRM) run the whole plan-to-report lifecycle on one engagement spine and split only at the planning-vs-issues seam; only Diligent HighBond separates fieldwork (Projects app) from issue management (Results app), which is the case for 3 modules. 3-module roughly doubles cross-module handoffs and no flagship except HighBond reinforces the universe/risk-vs-fieldwork seam."

  - id: B2-AUDIT-VS-GRC
    summary: "Scope of audit versus GRC for management_responses, audit_committee_meetings, risk_assessments (audit-scoped)."
    question: "Do these three entities belong in AUDIT or GRC?"
    options: ["AUDIT (vendor surface puts them in audit-focused products)", "GRC (enterprise-scale buyers often have GRC master them)", "Mixed per entity"]
    why: "Upstream of prior-audit B1-M2, B1-M6, B1-M7 placement and Bucket 3 items 7-8. Phase 0 (2026-06-08) grounds AUDIT (option a): all 4 pure-plays master these in their audit products (AuditBoard + Workiva committee aggregation, HighBond Storyboards committee/board reporting; AuditBoard RiskOversight / TeamMate+ Continuous Risk Assessment / Workiva Risk score audit-scoped risk; management responses captured against findings everywhere). Only the suite competitor ServiceNow IRM masters them at the suite/IRM level, which is the GRC posture. AUDIT masters the audit-scoped risk assessment (per-engagement score), not the enterprise risk register (consumed from GRC regardless)."

  - id: B2-NOROLE-PAYLOADS
    summary: "13 inbound handoffs carry payloads AUDIT does not currently model as DMDO rows."
    question: "Per row, load consumer DMDO on the receiving module (preferred, captures dependency) or accept as domain-level signal?"
    options: ["Load 13 consumer DMDOs (default)", "Accept all 13 as domain-level signals", "Mixed per row"]
    why: "Decides per-row resolution path for B1B-B10b-IN backfill."
    affected_entities: [building_certifications, card_authorizations, data_lineage_relationships, rpa_executions, rpa_activity_logs, cloud_databases, external_court_filings, emissions_records, esg_disclosures, key_data_elements, critical_tracking_events, haccp_plans, supplier_risk_assessments]

  - id: B2-B3-NAMING
    summary: "work_papers and control_tests bare-word naming-authority claim or rename."
    question: "Claim canonical bare-word (is_canonical_bare_word=true + rationale) or rename to audit_work_papers / audit_control_tests?"
    options: ["Claim canonical (AUDIT owns both terms)", "Rename to prefixed forms", "Mixed"]
    why: "Rule #9 wants the claim recorded. Phase 0 (2026-06-08) grounds Mixed (option c): work_papers is audit-specific across the whole flagship surface (AuditBoard OpsAudit, TeamMate+, Workiva, HighBond Projects all use the bare term, no adjacent domain competes), so AUDIT claims it canonical; control_tests overlaps GRC's control library, which the GRC/IRM suites own (ServiceNow IRM runs Control Test as one of four task types; AuditBoard/Workiva test against GRC-owned controls), so rename it prefixed to avoid the collision."

  - id: B2-PATTERN-FLAGS
    summary: "Pattern flags positive consideration on 8 masters (Rule #12)."
    question: "PATCH has_single_approver=true on audit_reports, has_submit_lock=true on work_papers + audit_findings, plus has_submit_lock on audit_engagements (split AuditBoard vs TeamMate+)?"
    options: ["Apply default proposal", "Apply subset (per row)", "Defer all"]
    why: "Rule #12 requires positive consideration; now all 8 masters are operational_workflow so pattern flags must be considered. PATCHing a flag on a master is non-destructive only where the flag is false today; surfaced because it's a vendor-split judgment."

  - id: B2-BAD-TAGS
    summary: "Discovery-substring tags on handoffs 256 and 825 look semantically wrong."
    question: "DELETE the 2 bad tags and surface to Discover Pass 3 re-tagging, or leave for human reviewer at approval time?"
    options: ["DELETE (default)", "Leave for human reviewer"]
    why: "Handoff 256 tagged 'Provide warranty-related recommendations'; handoff 825 tagged 'Document trade'. DELETE is destructive; never run unapproved."

  - id: B2-SELF-LOOP
    summary: "data_object_relationships id=356 self-loop on audit_findings with verb 'imports'."
    question: "DELETE (default) or PATCH verb to a documented concept like carries_forward_from?"
    options: ["DELETE", "PATCH verb"]
    why: "Verb non-obvious, row invisible to downstream tooling. Both options are destructive (DELETE or verb overwrite); never run unapproved."

  - id: B2-PAIRWISE
    summary: "Defer pairwise reconciliation for 5 heavy neighbors (GRC, ERP-FIN, EPM, ESG, LSD) or run inline?"
    question: "Run full 5-section diff for all 5 heavy neighbors now, defer to follow-up, or only GRC + ERP-FIN?"
    options: ["Run all 5 inline now", "Defer all (default; blocked by MOD1)", "Only GRC + ERP-FIN inline"]
    why: "Without modules, cross-module attribution can't run; the diff is mostly null-FK noise."

  - id: B2-DOMAIN-PEER
    summary: "Confirm AUDIT remains as peer domain or fold into GRC."
    question: "Peer domain (default; pure-plays keep it first-class) or fold into GRC?"
    options: ["Peer domain (recommended, Rule #2 satisfied)", "Fold into GRC"]
    why: "Some suite competitors treat audit as a GRC sub-module; pure-plays disagree. AUDIT is currently parent_domain_id=15 (under GRC); decide whether that stays a sub-domain or becomes a peer. Phase 0 (2026-06-08) grounds peer (option a): 4 independent pure-play vendors each sell a dedicated internal-audit product (AuditBoard, Wolters Kluwer TeamMate+, Workiva, Diligent HighBond), clearing the Rule #2 three-pure-play bar comfortably; only suite competitors fold it (ServiceNow IRM treats audit as one IRM workflow; Archer the same)."

