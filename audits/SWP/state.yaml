      Unblocks B1B-B9-EVENT388-CATEGORY.

  - id: B2-S2
    summary: Pattern-flag re-evaluation per Rule #12 on 4 SWP masters (has_personal_content)
    question: |
      Should has_personal_content flip to true on workforce_scenarios (27), org_designs (28), workforce_cost_projections
      (30), and skills_gap_analyses (26)? RIF / restructure scenarios identify reduction candidates by name;
      pre-publication org redesigns identify named position changes; per-role projections can be reverse-engineered to
      named comp; skill-by-skill gap analyses often list named-employee gaps. Currently all four are false.
    options:
      - flip all 4 to true
      - flip 27, 28, 30 only (skip 26)
      - keep all false (workflow shape does not warrant PII flag)
      - per-flag yes/no
    why: |
      Pattern flags govern PII access control. Rule #12 requires positive re-evaluation, not false-by-default. Flipping
      a non-empty flag value is a write the user owns.

