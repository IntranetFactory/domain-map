    summary: REPLACE-CORRECT / DELETE 3 mis-tagged discovery_substring handoff_processes rows (DESTRUCTIVE). Targets refined by B9d 2026-06-10.
    question: |
      Three SWP-boundary handoff_processes rows are still proposal_source='discovery_substring' with wrong-context PCF links.
      B9d (2026-06-10) refined the exact fix per row. Each overwrites/deletes an existing non-empty row (destructive), gated on approval:
        - row 101 (handoff 13, PA->SWP attrition.forecast_updated): currently process_id=671 "Analyze customer attrition and
          retention rates". REPLACE-CORRECT to process_id=980 "Perform strategic workforce planning" (payload is workforce
          planning, not customer attrition). B9d confirms: this wrong tag is exactly why the resolver mis-read it as a SWP
          ORPHAN ("who owns customer-attrition analysis at SWP"); the correction dissolves that false-positive.
        - row 130 (handoff 241, SPM->SWP initiative.kickoff): currently process_id=16 "Develop and measure strategic
          initiatives" (L2, over-coarse). B9d: the specific process 106 (1.3.5 "Execute strategic initiatives") is ALREADY
