b2:
  - id: B2-1
    summary: Module split shape for FOOD-TRACE (gates every M / B-cascade / E / F item)
    question: |
      Which `domain_modules` shape should the 6-capability FOOD-TRACE domain ship?
      Decision unlocks B1B-S2, B1B-S10, B1B-S11, B1B-M1 to B1B-M6, B1B-B10b, E1 to E5,
      F2 to F5.
    options:
      - 4 modules (recommended default), FOOD-TRACE-LOT-GENEALOGY, FOOD-TRACE-CTE-CAPTURE, FOOD-TRACE-RECALL, FOOD-TRACE-CORE covering supplier-docs / provenance / query
      - 6 modules, LOT-GENEALOGY, CTE-CAPTURE, RECALL, SUPPLIER-DOCS, PROVENANCE, QUERY
      - 3-module starter, LOT-GENEALOGY, CTE-CAPTURE, RECALL (defers supplier-docs / provenance / query)
      - 2 full plus 1 starter, LOT-GENEALOGY-AND-CTE plus RECALL-AND-COMPLIANCE plus FOOD-TRACE-LITE starter
    why: |
      Rule #14 requires at least 2 `module_kind='full'` modules for a domain with 3 or
      more capabilities (FOOD-TRACE has 6). Every Phase-B authoring decision
      (lifecycle-state realizing module, intra-domain handoff cross-product, embedded-master
      shells, role bundles) anchors on the module set. Bucket 1 STRUCTURAL cascade and
      Bucket 1 MISSING items all sit behind this.

  - id: B2-2
    summary: "`supplier_certifications` mastership arbitration (catalog-wide M7 hard fail)"
    question: |
      Catalog-wide single-master rule is violated. `data_object_id=498` has
      `role='master'` rows in both SUP-LIFE (id 28) and FOOD-TRACE (id 155). Which side
      keeps catalog mastership?
    options:
      - SUP-LIFE keeps master, FOOD-TRACE demotes to `embedded_master` once both sides modularize (recommended)
      - FOOD-TRACE keeps master, SUP-LIFE demotes to `embedded_master`
      - Split into two data_objects, `supplier_certifications` (SUP-LIFE master, procurement shape) and `food_supplier_certifications` (FOOD-TRACE master, food-safety shape)
    why: |
      Vendor evidence is split. SUP-LIFE-shape vendors (Coupa, SAP Ariba, Ivalua) master
      cert from procurement angle. FOOD-TRACE-shape vendors (Trustwell, TraceGains,
      FoodLogiQ) master cert because it governs lot-level traceability under FSMA 204.
      M7 enforcement blocks until one side surrenders.

  - id: B2-3
    summary: Regulations scope and depth for `domain_regulations` link
    question: |
      Which regulations to link via `domain_regulations`? Most underlying `regulations`
      rows likely also missing and need creating first.
    options:
      - Minimum set, FSMA 204, FSMA Preventive Controls, EU 1169/2011, Canada SFCR, USDA FSIS COOL, FDA Bioterrorism Act
      - Extended set, minimum plus GS1 EPCIS 2.0 (industry standard, not statute), Codex Alimentarius (international guideline), California Prop 65, state-level origin labeling
      - Custom user-supplied list

  - id: B2-4
    summary: Capability-function-divergence override for `FOOD-TRACE-RECALL-EXECUTION`
    question: |
      Add a `business_function_capabilities` override row pointing this capability at a
      function different from the domain's GRC-Compliance owner?
    options:
      - No override (domain RACI is sufficient)
      - Add override to GRC-Crisis
      - Add override to QA-Recall

  - id: B2-5
    summary: Handoff 349 cleanup (duplicate / mis-attribution vs handoff 351 on `harvest_records`)
    question: |
      Handoff 349 (FMIS to FOOD-TRACE on `harvest_records`, trigger_event 343
      `harvest_record.created`) appears duplicate or pre-modularization-era against
      handoff 351 (FMIS to FOOD-TRACE on `harvest_records`, trigger_event 344 also
      `harvest_record.created`). What is canonical?
    options:
      - DELETE handoff 349 (and trigger_event 343 if orphaned). Also revert the matching `handoff_processes` row from 2026-05-31.
      - PATCH 349 to a distinct sub-event (`harvest_record.lot_origin_emitted` for the FOOD-TRACE side)
      - Keep both, distinct payload interpretation
    why: |
      Cleanup blocks any further APQC tagging or B-band fix on the 349 / 351 pair from
      progressing without distortion. Already tagged in `handoff_processes`; cleanup must
      cascade through that row.

b3:
  - id: B3-gs1-identifiers
    candidate: gs1_identifiers
    rationale: |
      Whether FOOD-TRACE masters the GS1 GTIN / SSCC / GLN registry, or whether the
      master lives in PIM / MDM. IBM Food Trust and Wholechain treat GS1 identifiers as
      the substrate of every event; ReposiTrak and FoodLogiQ defer to external PIM.
      Decision shapes how thick `FOOD-TRACE-LOT-GENEALOGY` becomes (B2-1).
    vendor_evidence:
      - {vendor: IBM Food Trust, evidence: 1st_class}
      - {vendor: Wholechain, evidence: 1st_class}
      - {vendor: ReposiTrak Traceability Network, evidence: absent}
      - {vendor: FoodLogiQ Connect, evidence: absent}
    proposed_module: FOOD-TRACE-LOT-GENEALOGY

  - id: B3-ftl-classifications
    candidate: food_traceability_list_classifications
    rationale: |
      Whether FSMA 204 Food Traceability List classification per product is a FOOD-TRACE
      master or a PIM column. TraceGains and Trustwell carry it as first class because
      FTL status drives the workflow gate; lighter products treat it as a product
      boolean.
    vendor_evidence:
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: Trustwell, evidence: 1st_class}
    proposed_module: FOOD-TRACE-CORE

  - id: B3-provenance-certificates
    candidate: provenance_certificates
    rationale: |
      Whether FOOD-TRACE generates QR / NFC consumer-facing provenance certificates
      (Provenance, Wholechain, Bext360 as flagship feature) or whether that scope belongs
      in a separate consumer-storytelling market (the queued `PROVENANCE-PLATFORM`
      candidate domain).
    vendor_evidence:
      - {vendor: Provenance Platform, evidence: 1st_class}
      - {vendor: Wholechain, evidence: 1st_class}
      - {vendor: Bext360, evidence: 1st_class}
    proposed_module: FOOD-TRACE-PROVENANCE

  - id: B3-coa-records
    candidate: coa_records
    rationale: |
      Per-shipment certificates of analysis differ from supplier-level certifications
      (recurring per lot, not per supplier). TraceGains, FoodLogiQ master COAs in
      food-trace; FSQM-shape platforms (SafetyChain, Safefood 360) master COAs in QMS.
      Mastership decision shapes both FOOD-TRACE and FSQM module sets.
    vendor_evidence:
      - {vendor: TraceGains, evidence: 1st_class}
      - {vendor: FoodLogiQ Connect, evidence: 1st_class}
      - {vendor: SafetyChain, evidence: 1st_class}
      - {vendor: Safefood 360, evidence: 1st_class}
    proposed_module: FOOD-TRACE-CORE
