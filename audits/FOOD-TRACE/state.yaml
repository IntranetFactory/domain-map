      `has_submit_lock`, `has_single_approver` all false on every row. Rule #12 requires
      a positive consideration; defaults are not a reviewed answer.
    action: |
      Per-row user-approved PATCH. Likely-true flips: `recall_events.has_submit_lock=true`
