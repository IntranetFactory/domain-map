b2:
  - id: B2-2
    summary: "`supplier_certifications` forward-looking mastership reconciliation with SUP-LIFE"
    question: |
      M7 is satisfied today: data_object 498 has exactly one master DMDO row
      (FOOD-TRACE module 258 FOOD-TRACE-SUPPLIER-PROVENANCE) plus one contributor row in
      FSQM (module 264). SUP-LIFE has no DMDO row for 498 yet (unmodularized). When
      SUP-LIFE modularizes, which side keeps catalog mastership?
    options:
      - FOOD-TRACE keeps master (current state); SUP-LIFE consumes or embeds 498 when it modularizes (recommended, avoids a re-home)
      - SUP-LIFE takes master on modularization; FOOD-TRACE demotes 498 to embedded_master
      - Split into two data_objects, `supplier_certifications` (SUP-LIFE master, procurement shape) and a food-safety-shaped variant (FOOD-TRACE master)
    why: |
      Vendor evidence is split. Procurement-shape vendors (Coupa, SAP Ariba, Ivalua) master
      cert from the procurement angle; food-trace vendors (Trustwell, TraceGains, FoodLogiQ)
      master cert because it governs lot-level traceability under FSMA 204. This is no
      longer a hard fail (the legacy claim was based on legacy domain_data_objects, not the
      authoritative DMDO junction), but the SUP-LIFE audit must honor the decision to avoid
      a second master appearing.

  - id: B2-3
    summary: Regulations scope and depth for `domain_regulations` link
    question: |
      Which regulations to link via `domain_regulations`? Most underlying `regulations`
      rows likely also missing and need creating first.
    options:
      - Minimum set, FSMA 204, FSMA Preventive Controls, EU 1169/2011, Canada SFCR, USDA FSIS COOL, FDA Bioterrorism Act
      - Extended set, minimum plus GS1 EPCIS 2.0 (industry standard, not statute), Codex Alimentarius (international guideline), California Prop 65, state-level origin labeling
      - Custom user-supplied list

  - id: B2-4
    summary: Capability-function-divergence override for the recall-execution capability (module 257)
    question: |
      Add a `business_function_capabilities` override row pointing capability 458
      (FOOD-TRACE-RECALL-EXECUTION, realized in module 257) at a function different from
      the domain's GRC-Compliance owner?
    options:
      - No override (domain RACI is sufficient)
      - Add override to GRC-Crisis
      - Add override to QA-Recall

  - id: B2-5
    summary: Handoff 349 cleanup (duplicate / mis-attribution vs handoff 351 on `harvest_records`)
    question: |
      Handoff 349 (FMIS to FOOD-TRACE on `harvest_records`, trigger_event 343
      `harvest_record.created`) appears duplicate or pre-modularization-era against
      handoff 351 (FMIS to FOOD-TRACE on `harvest_records`, trigger_event 344 also
      `harvest_record.created`). What is canonical?
    options:
      - DELETE handoff 349 (and trigger_event 343 if orphaned). Also revert the matching `handoff_processes` row from 2026-05-31.
      - PATCH 349 to a distinct sub-event (`harvest_record.lot_origin_emitted` for the FOOD-TRACE side)
      - Keep both, distinct payload interpretation
    why: |
      Cleanup blocks any further APQC tagging or B-band fix on the 349 / 351 pair from
      progressing without distortion. Already tagged in `handoff_processes`; cleanup must
      cascade through that row.

b3:
  - id: B3-M1-TRACEABILITY-QUERIES
    candidate: traceability_queries
    rationale: |
      Trustwell, TraceGains, FoodLogiQ master a `trace_request` workflow as first class.
      FSMA 204 mandates a 24-hour response to FDA requests. Not present in the current
      catalog. Fits the TRACEABILITY-EVENTS module (query over CTE / KDE / lot data).
    vendor_evidence: [Trustwell, TraceGains, FoodLogiQ Connect]
    proposed_module: FOOD-TRACE-TRACEABILITY-EVENTS

  - id: B3-M2-CHAIN-OF-CUSTODY
    candidate: chain_of_custody_records
    rationale: |
      IBM Food Trust, Wholechain, Provenance model chain of custody as the
      cross-organization edge with attestation. GS1 EPCIS encodes CoC natively. Not in
      catalog.
    vendor_evidence: [IBM Food Trust, Wholechain, Provenance Platform]
    proposed_module: FOOD-TRACE-TRACEABILITY-EVENTS

  - id: B3-M3-PROVENANCE-ATTESTATIONS
    candidate: provenance_attestations
    rationale: |
      Provenance, Bext360, IBM Food Trust treat signed claims about origin, growing
      method, certifications as distinct from supplier certifications (vendor-issued vs
      producer-claimed).
    vendor_evidence: [Provenance Platform, Bext360, IBM Food Trust]
    proposed_module: FOOD-TRACE-SUPPLIER-PROVENANCE

  - id: B3-M4-RECALL-COMMUNICATIONS
    candidate: recall_communications
    rationale: |
      Trustwell, FoodLogiQ model a per-recipient communications log (FDA, state agencies,
      distributors, retailers, consumers) as a separate ledger from the recall event for
      audit defense.
    vendor_evidence: [Trustwell, FoodLogiQ Connect]
    proposed_module: FOOD-TRACE-RECALL-MGMT

  - id: B3-M5-REGULATORY-FILINGS
    candidate: regulatory_filings
    rationale: |
      Trustwell, ReposiTrak carry the filing as a distinct artifact from the recall event.
