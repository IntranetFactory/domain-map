b1b:
  - id: B1B-S3
    summary: 0 `domain_regulations` for a market whose primary demand driver is regulatory
    finding: |
      `/domain_regulations?domain_id=eq.155` returns 0 rows. The market is gated on FSMA
      204 enforcement (Jan 2026), FSMA Preventive Controls, EU 1169/2011, Canada SFCR,
      USDA FSIS COOL, FDA Bioterrorism Act recordkeeping. Most of these likely do not yet
      have `regulations` rows either.
    action: |
      Confirm scope per B2-3 (minimum vs extended set, GS1 EPCIS handling, Codex
      Alimentarius inclusion). Pre-flight against `/regulations?regulation_name=ilike.*FSMA*`
      and similar; load missing `regulations` rows first, then link `domain_regulations`
      with `applicability` set per junction qualifier.
    blocked_by:
      - {type: user_decision, ref: B2-3}

  - id: B1B-S4
