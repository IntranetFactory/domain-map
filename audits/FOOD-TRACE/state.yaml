b1a:
  - id: B1A-SYS-SKILLS
    summary: "Rule #17 / F2 / F3: each of the 3 new modules needs its own skill_type=system skill; legacy domain-level skill id=62 then deleted"
    finding: |
      As of the 2026-06-02 modularization, FOOD-TRACE has 3 domain_modules
      (FOOD-TRACE-TRACEABILITY-EVENTS id 256, FOOD-TRACE-RECALL-MGMT id 257,
      FOOD-TRACE-SUPPLIER-PROVENANCE id 258) but 0 module-level system skills.
      `/skills?domain_id=eq.155` returns only the legacy id 62 (food-trace-system,
      skill_type=system, domain_module_id null). Rule #17 / F2 / F3 require one
      skill_type=system skill per domain_modules row with domain_module_id set.
      Deleting id 62 before per-module skills exist would leave the domain with no
      agent surface (was B1B-S11, previously blocked on module existence, now unblocked).
    action: |
      Author one skill_type=system skill per module (domain_module_id = 256, 257, 258),
      link channel abstractions (notify_person / notify_team) instead of send_email per
      F7, then DELETE skills.id=62. Do not delete id 62 before the 3 per-module skills
      exist.
    affected_modules: [256, 257, 258]

  - id: B1A-CATALOG-UX
    summary: "A4 / M8 fail: catalog_tagline and catalog_description still empty on FOOD-TRACE; per-module catalog copy also unwritten"
    finding: |
      `/domains?id=eq.155&select=catalog_tagline,catalog_description` returns both fields
      as empty strings. Rule #20 requires buyer-voice drafts (workflow plus value) for the
      catalog list card and the catalog detail page. The 3 new domain_modules likewise have
      empty catalog_tagline / catalog_description. Drafts must be surfaced before any write
      per Rule #20; once a non-empty value exists the column may not be overwritten without
      explicit per-row user approval.
    action: |
      Draft domain-level catalog_tagline (single buyer-facing sentence) and
      catalog_description (1 to 3 buyer-facing paragraphs) plus per-module taglines, in
      workflow-plus-value voice; surface in chat for user review; then PATCH
      /domains?id=eq.155 and the 3 /domain_modules rows only after explicit approval.
      Anchor copy on FSMA-204 readiness, recall execution, lot genealogy, supplier-document
      ingest, provenance verification.
    affected_modules: [256, 257, 258]

  - id: B1A-S5
    summary: B6 fail, 0 intra-domain `data_object_relationships` rows on the 5 FOOD-TRACE masters
    finding: |
      Query `/data_object_relationships?and=(data_object_id.in.(494,495,496,497,498),related_data_object_id.in.(494,495,496,497,498))`
      returns 0 rows. The domain's core workflow (lot creation, CTE / KDE capture, recall
      targeting, certification-based provenance) implies multiple required edges between
      the masters. Out of scope for the modularization pass (modules plus entity assignment
      only); now actionable as a follow-up authoring pass.
    action: |
      Author and load: `traceability_lots originates critical_tracking_events` (one to
      many), `critical_tracking_events carries key_data_elements` (one to many),
      `recall_events targets traceability_lots` (many to many), `supplier_certifications
      authorizes traceability_lots` (many to many, provenance basis),
      `traceability_lots derived_from traceability_lots` (self-edge for split / merge /
      transform genealogy). One row per verb plus its inverse; `is_required` per the
      workflow; `owner_side` per § B6.
    affected_masters:
      - {data_object_id: 494, name: traceability_lots, target_module_id: 256, workflow: lot-genealogy}
      - {data_object_id: 495, name: critical_tracking_events, target_module_id: 256, workflow: cte-capture}
      - {data_object_id: 496, name: key_data_elements, target_module_id: 256, workflow: cte-capture}
      - {data_object_id: 497, name: recall_events, target_module_id: 257, workflow: recall}
      - {data_object_id: 498, name: supplier_certifications, target_module_id: 258, workflow: supplier-docs}

  - id: B1A-S8
