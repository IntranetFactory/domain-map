schema_version: 2
domain: FOOD-TRACE
status: feedback_needed
next_action_by: user
last_audit: "2026-05-31"

b1a:
  - id: B1A-S1
    summary: A4 fail, catalog_tagline and catalog_description still empty on FOOD-TRACE
    finding: |
      `/domains?id=eq.155&select=catalog_tagline,catalog_description` returns both fields
      as empty strings. Rule #20 requires buyer-voice drafts (workflow plus value) for the
      catalog list card and the catalog detail page. Drafts must be surfaced before any
      write per Rule #20; once a non-empty value exists the column may not be overwritten
      without explicit per-row user approval.
    action: |
      Draft `catalog_tagline` (single buyer-facing sentence) and `catalog_description`
      (1 to 3 buyer-facing paragraphs) in workflow plus value voice, surface in chat for
      user review, then PATCH `/domains?id=eq.155` only after explicit approval. Anchor
      copy on FSMA-204 readiness, recall execution, lot genealogy, supplier-document
      ingest.

  - id: B1A-S5
    summary: B6 fail, 0 intra-domain `data_object_relationships` rows on the 5 FOOD-TRACE masters
    finding: |
      Query `/data_object_relationships?and=(data_object_id.in.(494,495,496,497,498),related_data_object_id.in.(494,495,496,497,498))`
      returns 0 rows. The domain's core workflow (lot creation, CTE / KDE capture, recall
      targeting, certification-based provenance) implies multiple required edges between
      the masters.
    action: |
      Author and load: `traceability_lots originates critical_tracking_events` (one to
      many), `critical_tracking_events carries key_data_elements` (one to many),
      `recall_events targets traceability_lots` (many to many), `supplier_certifications
      authorizes traceability_lots` (many to many, provenance basis),
      `traceability_lots derived_from traceability_lots` (self-edge for split / merge /
      transform genealogy). One row per verb plus its inverse; `is_required` per the
      workflow; `owner_side` per § B6.
    affected_masters:
      - {data_object_id: 494, name: traceability_lots, target_module_id: null, workflow: lot-genealogy}
      - {data_object_id: 495, name: critical_tracking_events, target_module_id: null, workflow: cte-capture}
      - {data_object_id: 496, name: key_data_elements, target_module_id: null, workflow: cte-capture}
      - {data_object_id: 497, name: recall_events, target_module_id: null, workflow: recall}
      - {data_object_id: 498, name: supplier_certifications, target_module_id: null, workflow: supplier-docs}

  - id: B1A-S8
    summary: B9 partial, missing lifecycle and side-channel `trigger_events` on the 5 FOOD-TRACE masters
    finding: |
      `/trigger_events?data_object_id=in.(494,495,496,497,498)` returns 5 rows, one per
      master, each carrying only the most-prominent verb. Each master publishes a richer
      vocabulary of state transitions that FSMA 204, FDA Reportable Food Registry, and
      EPCIS 2.0 conformance require.
    action: |
      Author and load: `recall_event.classified`, `recall_event.notification_sent`,
      `recall_event.consolidated`, `recall_event.reconciled`, `recall_event.effectiveness_verified`,
      `recall_event.terminated`, `traceability_lot.split`, `traceability_lot.merged`,
      `traceability_lot.transformed`, `traceability_lot.consumed`,
      `critical_tracking_event.amended`, `key_data_element.validated`,
      `key_data_element.flagged_for_review`, `supplier_certification.uploaded`,
      `supplier_certification.renewed`, `supplier_certification.revoked`. Assign
      `event_category` per the enum (`lifecycle` for state verbs; `threshold` for
      expiry-shaped events).
    affected_events:
      - {id: null, event_name: recall_event.classified, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: recall_event.notification_sent, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: recall_event.consolidated, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: recall_event.reconciled, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: recall_event.effectiveness_verified, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: recall_event.terminated, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: traceability_lot.split, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: traceability_lot.merged, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: traceability_lot.transformed, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: traceability_lot.consumed, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: critical_tracking_event.amended, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: key_data_element.validated, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: key_data_element.flagged_for_review, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: supplier_certification.uploaded, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: supplier_certification.renewed, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: supplier_certification.revoked, current_category: null, proposed_category: lifecycle}

b1b:
  - id: B1B-S2
    summary: M1 fail (GATING), 0 `domain_modules` rows for the 6-capability FOOD-TRACE domain
    finding: |
      `/domain_modules?domain_id=eq.155` returns 0 rows. Rule #14 requires at least 2
      `module_kind='full'` modules for a domain with 3 or more capabilities. Every M /
      B9b / B10b / E / F cascade hinges on this fix. M-band is the structural gate.
    action: |
      Author the module set per the Bucket 2 #1 decision. Recommended default: 4 modules
      (`FOOD-TRACE-LOT-GENEALOGY`, `FOOD-TRACE-CTE-CAPTURE`, `FOOD-TRACE-RECALL`,
      `FOOD-TRACE-CORE` covering supplier-docs / provenance / query). Load
      `domain_modules` plus `domain_module_capabilities` plus `domain_module_data_objects`
      in one Phase-A extension load.
    blocked_by:
      - {type: user_decision, ref: B2-1}

  - id: B1B-S3
    summary: 0 `domain_regulations` for a market whose primary demand driver is regulatory
    finding: |
      `/domain_regulations?domain_id=eq.155` returns 0 rows. The market is gated on FSMA
      204 enforcement (Jan 2026), FSMA Preventive Controls, EU 1169/2011, Canada SFCR,
      USDA FSIS COOL, FDA Bioterrorism Act recordkeeping. Most of these likely do not yet
      have `regulations` rows either.
    action: |
      Confirm scope per Bucket 2 #3 (minimum vs extended set, GS1 EPCIS handling,
      Codex Alimentarius inclusion). Pre-flight against `/regulations?regulation_name=ilike.*FSMA*`
      and similar; load missing `regulations` rows first, then link `domain_regulations`
      with `applicability` set per junction qualifier.
    blocked_by:
      - {type: user_decision, ref: B2-3}

  - id: B1B-S4
    summary: B4 fail, pattern flags all default false on the 5 masters without positive review
    finding: |
      `/data_objects?id=in.(494,495,496,497,498)` shows `has_personal_content`,
      `has_submit_lock`, `has_single_approver` all false on every row. Rule #12 requires
      a positive consideration; defaults are not a reviewed answer.
    action: |
      Per-row user-approved PATCH. Likely-true flips: `recall_events.has_submit_lock=true`
      (recall locks on initiation), `recall_events.has_single_approver=true` (Class I
      sign-off), `traceability_lots.has_submit_lock=true` (lot identity immutable
      post-creation), `supplier_certifications.has_submit_lock=true` (cert validity
      locks). No `notes` annotation per Rule #15.
    blocked_by:
      - {type: user_decision, ref: B2-pattern-flag-review}
    affected_masters:
      - {data_object_id: 494, name: traceability_lots, target_module_id: null, workflow: lot-identity-lock}
      - {data_object_id: 495, name: critical_tracking_events, target_module_id: null, workflow: cte-event-amendment}
      - {data_object_id: 496, name: key_data_elements, target_module_id: null, workflow: kde-validation}
      - {data_object_id: 497, name: recall_events, target_module_id: null, workflow: recall-lock-and-signoff}
      - {data_object_id: 498, name: supplier_certifications, target_module_id: null, workflow: cert-validity-lock}

  - id: B1B-S7
    summary: B8 outbound, 7 of 8 outbound cross-domain handoffs lack a mirror `data_object_relationships` row
    finding: |
      Only 1 outbound cross-domain DOR row exists from FOOD-TRACE masters (id 569,
      `supplier_certifications updates suppliers`). The 8 outbound handoffs (ids 359, 360,
      361, 362, 971, 972, 973, 974) imply additional payload-to-target mirror edges per
      § B8. Identifying the correct payload owner per neighbor is judgment work.
    action: |
      Per outbound handoff, draft the corresponding `data_object_relationships` row
      (verb plus inverse_verb plus relationship_type plus relationship_kind plus
      is_required plus owner_side). Examples: `recall_events triggers
      compliance_obligations` (handoffs 359, target GRC), `recall_events
      triggers_inventory_hold` (handoff 360, target ERP-FIN, payload to confirm),
      `traceability_lots originates_from harvest_records` (target FMIS), `traceability_lots
      aggregates milkings` (target DAIRY-MGMT).
    blocked_by:
      - {type: depends_on, ref: B1A-S5, reason: intra-domain DOR cluster lands first to anchor verb vocabulary}
    affected_handoffs:
      - {handoff_id: 359, direction: outbound, source_domain: FOOD-TRACE, target_domain: GRC, trigger_event: recall_event.initiated, payload: recall_events, null_field: null}
      - {handoff_id: 360, direction: outbound, source_domain: FOOD-TRACE, target_domain: ERP-FIN, trigger_event: recall_event.initiated, payload: recall_events, null_field: null}
      - {handoff_id: 361, direction: outbound, source_domain: FOOD-TRACE, target_domain: FSQM, trigger_event: supplier_certification.expired, payload: supplier_certifications, null_field: null}
      - {handoff_id: 362, direction: outbound, source_domain: FOOD-TRACE, target_domain: SUP-LIFE, trigger_event: supplier_certification.expired, payload: supplier_certifications, null_field: null}
      - {handoff_id: 971, direction: outbound, source_domain: FOOD-TRACE, target_domain: FSQM, trigger_event: traceability_lot.created, payload: traceability_lots, null_field: null}
