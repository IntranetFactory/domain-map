  - id: B1A-S10
    summary: B12 fail, 0 lifecycle states on any of the 5 masters; realizing module now known
    finding: |
      `/data_object_lifecycle_states?data_object_id=in.(494,495,496,497,498)` returns 0
      rows. Per Rule #12 every `master + required` data_object with a real workflow needs
      states; none of these are config-shaped. The realizing-module FK was the blocker
      (was B1B-S10, gated on M1); modules now exist, so this is actionable.
    action: |
      Author per-master state machines: `traceability_lots` (created to active to
      split / merged / transformed to consumed to archived; recalled branch) under module
      256; `critical_tracking_events` (recorded to validated to amended to closed) under
      256; `key_data_elements` (captured to validated to flagged to resolved) under 256;
