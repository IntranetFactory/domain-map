      - {handoff_id: 974, direction: outbound, source_domain: FOOD-TRACE, target_domain: AUDIT, trigger_event: critical_tracking_event.recorded, payload: critical_tracking_events, null_field: null}

  - id: B1B-S9
    summary: B11 fail, 0 aliases on the 4 FOOD-TRACE-only masters
    finding: |
      `/data_object_aliases?data_object_id=in.(494,495,496,497)` returns 0 rows. Statutory
      and vendor synonyms are abundant (CTE / KDE are mandatory FSMA abbreviations).
      The 2026-05-30 audit drafted alias strings but did not specify `alias_type` or
      industry / solution binding tuples, so the load was deferred.
    action: |
      Per master, surface the alias string plus proposed `alias_type` (`synonym` /
      `industry_term` / `vendor_specific`) plus optional industry / solution binding for
      user approval. Bundle into a cluster-drafts load. Suggested starters per master:
      traceability_lots = (lot, batch, production lot, GS1 SSCC, EPCIS aggregation);
      critical_tracking_events = (CTE, EPCIS event, supply chain event); key_data_elements
      = (KDE, trace attribute, lot attribute); recall_events = (withdrawal, market
      withdrawal, FSMA Reportable Food filing).
    blocked_by:
      - {type: user_decision, ref: B2-alias-tuple-binding}
    affected_masters:
      - {data_object_id: 494, name: traceability_lots, target_module_id: null, workflow: alias-load}
      - {data_object_id: 495, name: critical_tracking_events, target_module_id: null, workflow: alias-load}
      - {data_object_id: 496, name: key_data_elements, target_module_id: null, workflow: alias-load}
      - {data_object_id: 497, name: recall_events, target_module_id: null, workflow: alias-load}

  - id: B1B-S10
    summary: B12 fail, 0 lifecycle states on any of the 5 masters
    finding: |
      `/data_object_lifecycle_states?data_object_id=in.(494,495,496,497,498)` returns 0
      rows. Per Rule #12 every `master + required` data_object with a real workflow needs
      states; none of these are config-shaped. Workflow-gate states need
      `domain_module_id` set per the realizing module, which requires M1 to be cured
      first.
    action: |
      Author per-master state machines: `traceability_lots` (created to active to
      split / merged / transformed to consumed to archived; recalled branch);
      `critical_tracking_events` (recorded to validated to amended to closed);
      `key_data_elements` (captured to validated to flagged to resolved); `recall_events`
      (initiated to classified to notification_sent to consolidating to reconciling to
      effectiveness_verified to terminated; class branches I, II, III); `supplier_certifications`
      (uploaded to verified to active to expiring to expired to renewed to revoked). Mark
      workflow-gate states `requires_permission=true` and set `domain_module_id` per
      realizing module.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S2}

  - id: B1B-S11
    summary: F1 fail, legacy `skills.id=62` (`food-trace-system`) remains, no module-level system skills
    finding: |
      `/skills?domain_id=eq.155&skill_type=eq.system&domain_module_id=is.null` returns
      skill id 62. Per F1 this becomes obsolete once module-level system skills are
      authored under Rule #14 / Rule #17, but DELETE before per-module skills exist
      would leave the domain with no agent surface.
    action: |
      Sequenced: (1) once modules exist (B1B-S2), author one `skill_type='system'` skill
      per `domain_modules` row with `domain_module_id` set; (2) link channel abstractions
      (`notify_person` / `notify_team`) instead of `send_email` per F7; (3) DELETE
      `skills.id=62`. Do not delete before per-module skills exist.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S2}

