      - Author a new event compensation_policy.equity_award_assigned under COMP-INCENTIVES.
      - Treat the multi-master DMDO as sufficient (no handoff).
    why: >-
      Event source choice depends on COMP-MGMT's modularization and which event the user
      considers canonical for the proposal trigger.

  - id: B2-S3
    summary: Rule #15 notes-pollution on 12 domain_data_objects rows.
    question: >-
      All 12 CAP-TABLE domain_data_objects rows (1084-1095) carry populated notes text.
      Were these user-approved at load time, or auto-populated by the loader?
