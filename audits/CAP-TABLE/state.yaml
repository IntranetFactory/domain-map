b2:
  - id: B2-B9D-RETAG-1044
    summary: "B9d RE-TAG (destructive): delete redundant coarse APQC tag on handoff 1044."
    question: >-
      The B9d resolver ran on this domain (both directions) on 2026-06-13. Handoff 1044
      (CAP-TABLE-EXIT-MODELING -> FUND-ADMIN on exit_scenario.executed, payload fund_distributions)
      carries TWO handoff_processes tags: row 712 = process 354 (10.4.1 "Develop exit strategy", L3,
      coarse) AND row 713 = process 491 (1.2.3.3 "Develop merger/demerger/acquisition/exit strategy",
      L4, specific). The specific L4 tag already covers the payload; the coarse L3 tag is redundant
      on this edge. Re-pointing reduces to deleting the coarse row 712. This is DESTRUCTIVE (a
      handoff_processes row delete) so it needs your sign-off; nothing was deleted.
    options:
      - Delete handoff_processes row 712 (the coarse process-354 tag on handoff 1044); keep row 713 (process 491).
      - Keep both tags (accept the coarse + specific overlap on handoff 1044).
    why: >-
      Handoff 1045 (-> PORT-MONIT) keeps its single process-354 tag (row 635); only handoff 1044
      carries the redundant pair. The B9d band treats a ROLL-UP/RE-TAG to a more specific same-entity
      tag as a source-side edit requiring approval; the delete is the destructive half.
  - id: B2-S1
    summary: Multi-master lifecycle realization for equity_grants (and the single-master integrity fix).
    question: >-
      equity_grants (158) carries TWO role='master' DMDO rows: module 21 CAP-TABLE-GRANTS
      (id 66) AND module 79 COMP-INCENTIVES (id 399). This violates single-master-per-data_object.
      The 7 lifecycle states (rows 112-118) currently realize only on module 79. Which
      architectural option for the lifecycle, the workflow-gate permissions, and which master
      row survives?
    options:
      - PATCH the 7 lifecycle states to domain_module_id=21 and demote COMP-INCENTIVES (id 399) to role=contributor so CAP-TABLE owns the workflow (the integrity fix is DESTRUCTIVE - demote a non-empty master row - so it needs your sign-off).
      - DUPLICATE the 7 lifecycle states so both modules realize the same states with module-prefixed permissions; still requires resolving which DMDO row is the canonical master.
      - Keep as-is (COMP owns lifecycle), accept CAP-TABLE-GRANTS is view+reconcile only, and decide separately how to resolve the dual-master row.
    why: >-
      Flagship vendors (Carta, Pulley, Shareworks) treat the cap-table side as source of
      truth for grant lifecycle; option (a) matches that. The dual-master row is a real
      integrity defect; the demotion is destructive and the M7 exception does not apply
      because the canonical master is exactly what this decision picks.

