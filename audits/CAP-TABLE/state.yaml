b2:
  - id: B2-S1
    summary: Multi-master lifecycle realization for equity_grants.
    question: >-
      Equity_grants is master+required on both CAP-TABLE-GRANTS (module 21) and
      COMP-INCENTIVES (module 79). Seven lifecycle states (rows 112-118) currently realize
      only on module 79. Which architectural option for the lifecycle and the
      workflow-gate permissions?
    options:
      - PATCH the 7 lifecycle states to domain_module_id=21 so CAP-TABLE owns the workflow (COMP becomes contributor on the compensation-policy slice only).
      - DUPLICATE the 7 lifecycle states so both modules realize the same states with module-prefixed permissions (comp-incentives:approve_equity_grant AND cap-table-grants:approve_equity_grant). Doubles the permission surface.
      - Keep as-is (COMP owns lifecycle), accept CAP-TABLE-GRANTS has no workflow-gate permissions for its master.
    why: >-
      Flagship vendors (Carta, Pulley, Shareworks) treat the cap-table side as source of
      truth for grant lifecycle; option (a) matches that. (b) is most flexible but doubles
      permission surface. (c) means CAP-TABLE-GRANTS is view+reconcile only for its master.

  - id: B2-S2
    summary: Inter-domain handoff event source for COMP-INCENTIVES -> CAP-TABLE-GRANTS grant proposal.
    question: >-
      Which event publishes the grant proposal from the compensation-policy slice into
      CAP-TABLE-GRANTS for the inter-domain handoff in B1B-S10 part (a)?
    options:
      - Reuse the existing offer.accepted event (if loaded under HCM offer-management).
      - Author a new event compensation_policy.equity_award_assigned under COMP-INCENTIVES.
      - Treat the multi-master DMDO as sufficient (no handoff).
    why: >-
      Event source choice depends on COMP-MGMT's modularization and which event the user
      considers canonical for the proposal trigger.

  - id: B2-S3
    summary: Rule #15 notes-pollution on 12 domain_data_objects rows.
    question: >-
      All 12 CAP-TABLE domain_data_objects rows (1084-1095) carry populated notes text.
      Were these user-approved at load time, or auto-populated by the loader?
    options:
      - Confirm user-approved at load time, leave in place.
      - Confirm auto-populated, PATCH all 12 rows to notes='' and log a Rule #15 incident in references/skill-changelog.md.
    why: >-
      Load-time approval status cannot be derived from current audit state alone; only the
      original load author knows.

  - id: B2-S4
    summary: Pattern-flag positive re-evaluation on 6 candidate flags.
    question: >-
      Which of the following pattern-flag candidates should flip to true?
    options:
      - cap_tables.has_personal_content=true (ledger embeds shareholder names + holdings, GDPR / CCPA in scope).
      - option_pools.has_submit_lock=true (board-approval gate, pool size locks until explicit refresh).
      - equity_grants.has_submit_lock=true (once granted, strike / share-count / vesting locked; amendments require new grant + cancellation).
      - valuations_409a.has_personal_content=false explicit (current null may be a default, contains FMV not personal data).
      - secondary_transactions.has_personal_content=true (transfers between named holders, GDPR scope).
      - asc718_expense_periods.has_submit_lock=true (closed-period accounting standard).
    why: >-
      Pattern flags are workflow-shape judgments owned by the user; the audit proposes, the
      user decides per flag.

  - id: B2-S5
    summary: Permission-bundle drift policy for Phase E (B1B-S7).
    question: >-
      When B1B-S7 lands the 6 roles + 36 role_modules bundles, should the role_permissions
      enumerate workflow-gate permissions explicitly or rely on permission_hierarchy to
      expand baseline tiers into workflow-gates?
    options:
      - Confirm hierarchy expands gates catalog-wide, leave bundles tier-only.
      - Add explicit gate grants for sensitive verbs (approve_equity_grant, finalize_valuation_409a, approve_secondary_transaction, transfer_shares, void).
      - Defer until Phase E runs, audit again post-load.
    why: >-
      The permission_hierarchy seeding state cannot be introspected confidently from this
      audit; the user owns the catalog-wide hierarchy expansion policy.

  - id: B2-S6
    summary: Config-shape exemptions on 3 lifecycle-state-free CAP-TABLE masters.
    question: >-
      Per Rule #12 + Rule #15 the config-shape exemption must be surfaced for user
      decision. Which of these 3 masters take the exemption (no lifecycle states) vs
      authoring lifecycle states in B1A-S6?
    options:
      - security_classes (author-once, occasional edits when a new series is created) - exempt or author?
      - vesting_schedules (template-shaped, applied to grants) - exempt or author?
      - asc718_expense_periods (period-shaped, opened and closed by a calendar trigger) - exempt or author?
    why: >-
      Config-shape vs workflow-shape is the user's call; the audit recommends but does not
      commit.

  - id: B2-S7
    summary: Domain description Rule #18 cleanliness review.
    question: >-
      Current domains.description ends with 'Primary buyer is the portfolio-company CFO,
      not the VC firm.' which somewhat reads as lifted marketing copy. min_org_size and
      cost_band carry buyer-signal structurally. Keep or drop?
    options:
      - Leave as-is.
      - PATCH description to drop the buyer sentence (replace with 'Shareholder ledger, option-pool management, 409A valuations, RSU/option grant workflows, exit waterfall modeling, and ASC 718 stock-based compensation accounting.').
    why: >-
      Editorial / Rule #18 boundary judgment.

b3:
  - id: B3-CAND-01
    candidate: safe_notes
    rationale: >-
      Carta, AngelList Stack, Pulley all model SAFEs (Simple Agreement for Future Equity)
      as first-class instruments distinct from equity_grants and security_classes. Y
      Combinator post-money SAFE is the dominant pre-priced-round US instrument; no SAFE
      entity exists today, conversion mechanics live nowhere.
    vendor_evidence: [Carta, AngelList Stack, Pulley]
    proposed_module: new master in CAP-TABLE-LEDGER or new module CAP-TABLE-CONVERTIBLES

  - id: B3-CAND-02
    candidate: convertible_notes
    rationale: >-
      Carta, Pulley, Ledgy model convertible notes as a distinct instrument (debt that
      converts on a qualified financing). Different conversion math from SAFEs, different
      cap / discount mechanics, different accrued-interest tracking.
    vendor_evidence: [Carta, Pulley, Ledgy]
    proposed_module: new master in CAP-TABLE-LEDGER or new module CAP-TABLE-CONVERTIBLES

  - id: B3-CAND-03
    candidate: warrants
    rationale: >-
      Carta, AngelList model warrants as a separate instrument (often issued to vendors,
      banks, lenders, and early commercial partners). Currently security_classes might be
      stretched to cover, but vesting / exercise economics differ.
    vendor_evidence: [Carta, AngelList Stack]
    proposed_module: new master in CAP-TABLE-LEDGER or new module CAP-TABLE-CONVERTIBLES

  - id: B3-CAND-04
    candidate: tax_form_records
    rationale: >-
      Carta, Shareworks both generate Form 3921 (ISO exercise) and Form 3922 (ESPP
      purchase) annually, plus Form 1099-B / 1099-NEC for NQSO cash exercises. Currently no
      tax-form record entity, the annual-filing surface is opaque.
    vendor_evidence: [Carta, Shareworks]
    proposed_module: new master in CAP-TABLE-VALUATIONS or new module CAP-TABLE-TAX-REPORTING

  - id: B3-CAND-05
    candidate: board_consents
    rationale: >-
      Carta, Pulley, Shoobx (Fidelity) all model board consents (written / meeting) as
      first-class records for grant issuance, repricing, and pool refreshes. The CAP-TABLE
      state machine has approved states but no record of which board action approved them.
    vendor_evidence: [Carta, Pulley, Shoobx]
    proposed_module: new master in CAP-TABLE-LEDGER or new module CAP-TABLE-BOARD-CONSENTS

  - id: B3-CAND-06
    candidate: share_certificates
    rationale: >-
      Carta, Pulley, Ledgy issue digital share certificates with QR codes and DLT-anchored
      proofs (Astrella, Shoobx particularly heavy here). Currently no certificate entity,
      shareholder_records is the closest but conflates legal-record-of-ownership with the
      certificate itself.
