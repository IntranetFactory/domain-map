b1a:
  - id: B1A-S3
    summary: Author 6 missing trigger_events for workflow-gate states + intra-domain handoffs.
    finding: >-
      Six lifecycle workflow-gate states and intra-domain handoffs require trigger_events that
      do not exist in the catalog: cap_table.exit_initiated (gates cap_tables state 468 'exit'),
      exit_scenario.committed (gates exit_scenarios state 470 'committed'),
      secondary_transaction.approved (gates secondary_transactions state 473 'approved'),
      equity_grant.exercised (needed for GRANTS->LEDGER intra-domain handoff in B1A-S2),
      secondary_transaction.settled (needed for SECONDARY->LEDGER and SECONDARY->GRANTS
      intra-domain handoffs in B1A-S2), option_pool.refreshed (needed for GRANTS<->LEDGER
      pool-refresh handoff in B1A-S2). Five existing CAP-TABLE master trigger_events
      (426 equity_grant.granted, 427 equity_grant.vested, 1189 valuation_409a.final,
      1190 exit_scenario.executed, 1191 secondary_transaction.executed, 1238
      equity_grant.approved, 1239 equity_grant.forfeited) all now carry valid event_category
      values per the prior B1-S1 PATCH.
    action: >-
      INSERT 6 trigger_events rows. event_category mapping: option_pool.refreshed='lifecycle';
      the other 5 = 'state_change'. data_object_id maps to the publishing master
      (cap_tables=770, exit_scenarios=777, secondary_transactions=780, equity_grants=158,
      option_pools=773). Omit record_status (Rule #1) and notes (Rule #15).
    affected_events:
      - {event_name: cap_table.exit_initiated, current_category: null, proposed_category: state_change}
      - {event_name: exit_scenario.committed, current_category: null, proposed_category: state_change}
      - {event_name: secondary_transaction.approved, current_category: null, proposed_category: state_change}
      - {event_name: equity_grant.exercised, current_category: null, proposed_category: state_change}
      - {event_name: secondary_transaction.settled, current_category: null, proposed_category: state_change}
      - {event_name: option_pool.refreshed, current_category: null, proposed_category: lifecycle}

  - id: B1A-S6
    summary: Author lifecycle states on 4 workflow-bearing CAP-TABLE masters with no current state machine.
    finding: >-
      Seven of 12 CAP-TABLE masters carry zero data_object_lifecycle_states rows:
      security_classes (771), shareholder_records (772), option_pools (773),
      vesting_schedules (774), asc718_expense_periods (776), exit_waterfall_calculations
      (778), employee_equity_accounts (779). Rule #12 requires workflow-bearing masters to
      carry lifecycle states or claim the config-shape exemption. Three (security_classes,
      vesting_schedules, asc718_expense_periods) are plausible config-shape exemptions and
      route to B2-S6 user decision. Four are workflow-bearing and need state machines
      authored: option_pools (proposed -> board_approved -> active -> exhausted / refreshed),
      shareholder_records (registered -> certificated -> transferred / lapsed),
      exit_waterfall_calculations (computed -> committed, tied to exit_scenario state),
      employee_equity_accounts (provisioned -> active -> terminated / offboarded).
    action: >-
      INSERT data_object_lifecycle_states rows on the 4 workflow-bearing masters with
      domain_module_id set to the realizing CAP-TABLE module per Rule #14 (option_pools ->
      module 21, shareholder_records -> module 20, exit_waterfall_calculations -> module 23,
      employee_equity_accounts -> module 24). requires_permission=true on the gates
      (board_approved, certificated, terminated, exit_committed). Omit notes (Rule #15);
      surface to user before committing per Rule #12. Defer the 3 config-shape candidates to
      B2-S6.
    affected_masters:
      - {data_object_id: 773, name: option_pools, target_module_id: 21, workflow: proposed->board_approved->active->exhausted|refreshed}
      - {data_object_id: 772, name: shareholder_records, target_module_id: 20, workflow: registered->certificated->transferred|lapsed}
      - {data_object_id: 778, name: exit_waterfall_calculations, target_module_id: 23, workflow: computed->committed}
      - {data_object_id: 779, name: employee_equity_accounts, target_module_id: 24, workflow: provisioned->active->terminated|offboarded}
    extra_dependent_on: B2-S6
    extra_dependent_on_reason: >-
      Three additional masters (security_classes, vesting_schedules, asc718_expense_periods)
      are config-shape candidates routed to B2-S6; the user's call on those 3 may add up to 3
      more masters to this loader's scope.
  - id: B1A-PHASE-P
    summary: "Multi-module (6 modules) with 0 personas post-Plan-3 (E1 fail): author the persona / RACI layer."
    finding: "Live triage 2026-06-02: 6 domain_modules and 0 domain_roles reaching this domain via role_modules. Plan 3 deleted the old _core personas, so E1 fires on this multi-module domain."
    action: "Author domain_roles (operational personas) function-anchored per references/roles.md section 7, wire role_modules reach across the 6 modules, add process_raci responsibility rows, and wire data_object_lifecycle_states.process_id. ATS is the worked reference (scripts/loaders/load_ats_personas_pilot.ts)."
    extra_phase_p_triage: "2026-06-02"
  - id: B1A-ENTITY-TYPE
    summary: "12 masters carry entity_type unclassified/null (B13): classify them."
    finding: "Live triage 2026-06-02: 12 data_objects mastered by this domain have entity_type null or 'unclassified' (enumerated in affected_entities). Unclassified entity_type degrades the per-entity write tier (plan-2-entity-type-tiers.md)."
    action: "Classify each master's data_objects.entity_type (operational_workflow / operational_record / catalog / junction / computed) per plan-2-entity-type-tiers.md."
    affected_entities: [asc718_expense_periods, cap_tables, employee_equity_accounts, equity_grants, exit_scenarios, exit_waterfall_calculations, option_pools, secondary_transactions, security_classes, shareholder_records, valuations_409a, vesting_schedules]
    extra_phase_p_triage: "2026-06-02"

b1b:
  - id: B1B-S2
    summary: Author 10 intra-domain cross-module handoff rows wiring the 6 CAP-TABLE modules.
    finding: >-
      Zero intra-domain handoff rows exist on a 6-module domain. Ten intra-domain handoffs
      are implied by the master relationship graph and lifecycle state machines: (1)
      equity_grant.approved (1238) GRANTS->EMPLOYEE-PORTAL expose grant; (2)
      equity_grant.granted (426) GRANTS->EMPLOYEE-PORTAL open acceptance; (3)
      equity_grant.vested (427) GRANTS->EMPLOYEE-PORTAL refresh balance; (4)
      valuation_409a.final (1189) VALUATIONS->GRANTS refresh strike floor; (5)
      valuation_409a.final (1189) VALUATIONS->LEDGER cap-table FMV refresh; (6)
      exit_scenario.executed (1190) EXIT-MODELING->LEDGER apply scenario as actual; (7)
      equity_grant.exercised GRANTS->LEDGER issuance of shares; (8)
      secondary_transaction.settled SECONDARY->LEDGER transfer shares between holders; (9)
      secondary_transaction.settled SECONDARY->GRANTS cancel exercised-but-unsettled lines;
      (10) option_pool.refreshed LEDGER->GRANTS pool-reserve adjustments. Handoffs 7, 8, 9,
      10 reference trigger_events authored by B1A-S3.
    blocked_by:
      - {type: depends_on, ref: B1A-S3, reason: 4 of 10 handoffs reference equity_grant.exercised / secondary_transaction.settled / option_pool.refreshed events that B1A-S3 inserts.}
    affected_handoffs:
      - {direction: intra-domain, source_domain: CAP-TABLE-GRANTS, target_domain: CAP-TABLE-EMPLOYEE-PORTAL, trigger_event: equity_grant.approved, payload: equity_grants}
      - {direction: intra-domain, source_domain: CAP-TABLE-GRANTS, target_domain: CAP-TABLE-EMPLOYEE-PORTAL, trigger_event: equity_grant.granted, payload: equity_grants}
      - {direction: intra-domain, source_domain: CAP-TABLE-GRANTS, target_domain: CAP-TABLE-EMPLOYEE-PORTAL, trigger_event: equity_grant.vested, payload: equity_grants}
      - {direction: intra-domain, source_domain: CAP-TABLE-VALUATIONS, target_domain: CAP-TABLE-GRANTS, trigger_event: valuation_409a.final, payload: equity_grants}
      - {direction: intra-domain, source_domain: CAP-TABLE-VALUATIONS, target_domain: CAP-TABLE-LEDGER, trigger_event: valuation_409a.final, payload: cap_tables}
      - {direction: intra-domain, source_domain: CAP-TABLE-EXIT-MODELING, target_domain: CAP-TABLE-LEDGER, trigger_event: exit_scenario.executed, payload: cap_tables}
      - {direction: intra-domain, source_domain: CAP-TABLE-GRANTS, target_domain: CAP-TABLE-LEDGER, trigger_event: equity_grant.exercised, payload: shareholder_records}
