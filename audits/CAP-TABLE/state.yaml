  - id: B2-S4
    summary: Pattern-flag positive re-evaluation on 6 candidate flags.
    question: >-
      Which of the following pattern-flag candidates should flip to true? (All 12 masters are
      now entity_type-classified as of 2026-06-07; the operational_workflow ones below carry
      the pattern-flag review surface.)
    options:
      - cap_tables.has_personal_content=true (ledger embeds shareholder names + holdings, GDPR / CCPA in scope).
      - option_pools.has_submit_lock=true (board-approval gate, pool size locks until explicit refresh).
      - equity_grants.has_submit_lock=true (once granted, strike / share-count / vesting locked; amendments require new grant + cancellation).
      - valuations_409a.has_personal_content=false explicit (current null may be a default, contains FMV not personal data).
      - secondary_transactions.has_personal_content=true (transfers between named holders, GDPR scope).
      - asc718_expense_periods.has_submit_lock=true (closed-period accounting standard).
    why: >-
      Pattern flags are workflow-shape judgments owned by the user; the audit proposes, the
      user decides per flag.

  - id: B2-S5
    summary: Permission-bundle drift policy for Phase E (B1B-S7).
    question: >-
      When B1B-S7 lands the 6 roles + role_modules bundles, should the role_permissions
      enumerate workflow-gate permissions explicitly or rely on permission_hierarchy to
