      - dbt Labs
      - Confluent
      - Informatica IDMC

  - id: B3-REG-GDPR
    candidate: GDPR (applicability=indirect)
    rationale: "Chapter V Articles 44-49 cross-border transfer rules. DI is the primary control surface for international source / sink configuration. Indirect because the data subject is identified elsewhere (CRM, HCM); DI carries the transfer."
    vendor_evidence:
      - Striim
      - Qlik Replicate
    proposed_module: cross-DI

  - id: B3-REG-HIPAA
    candidate: HIPAA (applicability=indirect)
    rationale: "Security Rule 164.312(e)(1) Transmission Security. CDC streams carrying ePHI must encrypt in transit and maintain audit-trail. Indirect because the PHI master is in HCM / EHR / claims systems; DI carries it."
    vendor_evidence:
      - Striim
      - Qlik Replicate
    proposed_module: cross-DI

  - id: B3-REG-SOX
    candidate: SOX (applicability=indirect)
    rationale: "Section 404 internal controls over financial reporting. CDC streams carrying GL / sub-ledger / sub-system financial state to the warehouse are in-scope for ITGCs (change management, access control, monitoring)."
    vendor_evidence:
      - Striim
      - Qlik Replicate
    proposed_module: cross-DI
