    summary: "Author one skill_type=system skill per DI module (e.g. di_ingest_cdc_agent and di_transform_deliver_agent) once modules exist."
    finding: "Zero module-level system skills (F2 hard fail). Once B1B-M1-MODULES lands, each new module needs exactly one skill_type=system row with domain_module_id set."
    blocked_by:
