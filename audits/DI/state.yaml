  - id: B1B-F3-F4-F7-SKILL-TOOLS
    summary: "Author >=1 skill_tools row per new module-level system skill with a mix of required and optional, including at least one mutate per master, one side_effect per module, one inbound primitive, and one fetch. Channels via notify_person / notify_team per F7."
    finding: "Today's surface on legacy skill 48 is 100% query operations; strict_score and operational_score are uncomputable per module (F5 rollup). Phase-S floor per Rule #17: at least one mutate per master (update_pipeline_run_status, pause_change_data_capture_stream, publish_transformation_job, version_schema_registry); at least one side_effect per module (trigger_pipeline_run, roll_back_transformation_job); at least one inbound primitive (receive_cdc_event_webhook); at least one fetch (fetch_source_schema_from_external_api). Channel primitives via notify_person and notify_team per F7."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-F2-MODULE-SKILLS}

  - id: B1B-E-BAND-ROLES
    summary: "Author >=3 roles touching both DI modules with function-scoped naming once modules exist. Includes role_modules, role_permissions, interaction_level, and Path A and Path B agreement."
    finding: "Zero roles rows for any DI-affiliated business function (Data Engineering id=65 owner), zero role_modules, zero role_permissions. Once 2 modules exist (M2 satisfied), E1 mandates >=3 distinct roles. Likely roles: DATA-ENGINEER (primary across both modules); DATA-PLATFORM-ADMIN (primary on DI-TRANSFORM-DELIVER, secondary on DI-INGEST-CDC); INTEGRATION-OPERATOR (primary on DI-INGEST-CDC, secondary on DI-TRANSFORM-DELIVER); cross-cutting DATA-PLATFORM-VIEWER for read-only consumption."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}

b2:
  - id: B2-S1
    summary: "Pick the DI module split topology before any M-band cascade lands."
    question: "Which DI module split do you want? (a) DI-INGEST-CDC + DI-TRANSFORM-DELIVER, 2 full modules (recommended for vendor neutrality); (b) per-runtime split DI-BATCH-ELT + DI-STREAMING + DI-CDC + DI-TRANSFORM, 4 full modules; (c) per-vendor-cluster split, 3 full modules; (d) hybrid 2 full modules + DI-LITE starter for SMB Fivetran-only deployments."
    options: [a, b, c, d]
    why: "Modularization design choice with downstream effects on capability assignment, role bundles, lifecycle-state realization, and Phase-B / Phase-S load shape. Cannot be auto-derived; user owns the architectural intent."

  - id: B2-S2
    summary: "Per-pattern-flag yes/no judgment on 3 candidates."
    question: "Set the following pattern flags to true or false: (i) transformation_jobs.has_submit_lock; (ii) transformation_jobs.has_single_approver; (iii) schema_registries.has_submit_lock?"
    options: [per-flag-yes, per-flag-no]
    why: "Workflow-shape judgments the user owns. False-by-default is not the same as false-after-review. Per Rule #15 the consideration cannot be recorded in notes; it lives in this audit conversation."

  - id: B2-S3
    summary: "Resolve handoff 727 attribution defect on event 96 pipeline_run.failed."
    question: "trigger_event 96 (pipeline_run.failed) references data_pipelines (227, mastered by DATA-AI-PLAT) but DI publishes the event. (a) keep existing attribution and document DI as contributor on event 96; (b) author a new DI-side event pipeline_run.failed with data_object_id=434 and re-point handoff 727."
    options: [a, b]
    why: "Attribution choice has implications for who owns the lifecycle state that fires the event (DATA-AI-PLAT data_pipelines state machine vs DI pipeline_runs state machine) and where the failure is surfaced (DI-side or DATA-AI-PLAT-side)."

  - id: B2-S4
    summary: "Decide DI regulatory scope and load corresponding domain_regulations rows."
    question: "DI has zero domain_regulations rows and the data-movement workflow has real regulatory exposure (cross-border data transfer under GDPR Chapter V; HIPAA ePHI ingress; SOX-relevant financial-data CDC streams; PCI-DSS cardholder-data masking-at-ingest). Pick: (a) DI in-scope for GDPR / HIPAA / SOX (3 domain_regulations rows); (b) only HIPAA / SOX in-scope; (c) none in-scope, DI is substrate-only (regulations attach downstream on DLP / DSPM / DCG)."
    options: [a, b, c]
    why: "Catalog policy decision with downstream impact on Bucket 3 regulation candidates and whether DI gets new dlp_* integration points + audit-trail entities."

  - id: B2-S5
    summary: "Resolve handoff 157 attribution defect on event 105 replication_load.completed."
    question: "trigger_event 105 (replication_load.completed) references lakehouse_tables (226, mastered by DATA-AI-PLAT) but DI publishes the event. (a) keep DATA-AI-PLAT attribution and document DI as contributor on event 105; (b) author a parallel DI-side event pipeline_run.completed_load with data_object_id=434; (c) replace event 105 entirely with a DI-side event pointing at pipeline_runs."
    options: [a, b, c]
    why: "Same attribution-defect shape as B2-S3 but on a different handoff. Flagship vendor behavior varies (Snowpipe fires on TABLE; Fivetran fires on CONNECTOR-RUN). Decision changes who owns the event's lifecycle state and which side's B9b coverage it counts toward."

  - id: B2-S6
    summary: "Approve a buyer-voice draft for domains.catalog_tagline and domains.catalog_description on DI per Rule #20."
    question: "Both fields are empty on DI. Should I draft a one-sentence tagline + 1 to 3 paragraph description in buyer voice (workflow + value, not market position) and surface for your approval BEFORE writing? Rule #20 forbids overwrite without explicit per-row approval, even on empty backfill."
    options: [draft-and-surface, skip]
    why: "Buyer-facing copy is marketing surface; agent must surface the draft before writing per Rule #20. Backfill on empty is allowed but still draft-then-approve."

b3:
  - id: B3-CONNECTOR-TASKS
    candidate: connector_tasks
    rationale: "Per-execution work unit below a connector. Today pipeline_runs aggregates these but flagships expose per-task granularity (Fivetran Sync Tasks, Airbyte Job Attempts, Confluent Connect Task Instances). Strong-signal candidate per agent eyeball pass."
    vendor_evidence:
      - Fivetran
      - Airbyte
      - Confluent
    proposed_module: DI-INGEST-CDC

  - id: B3-DATA-LINEAGE-EVENTS
    candidate: data_lineage_events
    rationale: "First-class lineage emit log distinct from data_pipelines itself. OpenLineage RunEvents, Marquez events, dbt Cloud lineage log, Atlan / DataHub lineage emitter. Strong-signal candidate per agent eyeball pass."
    vendor_evidence:
      - OpenLineage
      - Marquez
      - dbt Cloud
      - Atlan
      - DataHub
    proposed_module: DI-TRANSFORM-DELIVER

  - id: B3-DATA-CONTRACTS
    candidate: data_contracts
    rationale: "Distinct from schema_registries: a contract is a producer-consumer agreement (schema + SLA + ownership + tests + breaking-change policy); a registry holds schemas only. Gable.ai is the clearest pure-play."
    vendor_evidence:
      - Gable.ai
      - PayPal data-contract-cli
      - Buf
      - Confluent Cloud Stream Catalog
    proposed_module: DI-TRANSFORM-DELIVER

  - id: B3-STREAM-TOPICS
    candidate: stream_topics
    rationale: "For streaming runtimes, the topic is the lifecycle-bearing master (created, partitioned, retention-policied, retired). Strong-signal candidate per agent eyeball pass."
    vendor_evidence:
      - Confluent
      - AWS MSK
      - Redpanda
    proposed_module: DI-INGEST-CDC

  - id: B3-CONNECTION-CREDENTIALS
    candidate: connection_credentials
