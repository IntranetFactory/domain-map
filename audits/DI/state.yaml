b2:
  - id: B2-S1
    summary: "Pick the DI module split topology before any M-band cascade lands."
    question: "Which DI module split do you want? (a) DI-INGEST-CDC + DI-TRANSFORM-DELIVER, 2 full modules (recommended for vendor neutrality); (b) per-runtime split DI-BATCH-ELT + DI-STREAMING + DI-CDC + DI-TRANSFORM, 4 full modules; (c) per-vendor-cluster split, 3 full modules; (d) hybrid 2 full modules + DI-LITE starter for SMB single-connector deployments."
    options: [a, b, c, d]
    why: "Modularization design choice with downstream effects on capability assignment, role bundles, lifecycle-state realization, and Phase-B / Phase-S load shape. Cannot be auto-derived; user owns the architectural intent."

  - id: B2-S2
    summary: "Per-pattern-flag yes/no judgment on 3 candidates."
    question: "Set the following pattern flags to true or false: (i) transformation_jobs.has_submit_lock; (ii) transformation_jobs.has_single_approver; (iii) schema_registries.has_submit_lock?"
    options: [per-flag-yes, per-flag-no]
    why: "Workflow-shape judgments the user owns. False-by-default is not the same as false-after-review. Per Rule #15 the consideration cannot be recorded in notes; it lives in this audit conversation."

  - id: B2-S3
    summary: "Resolve handoff 727 attribution defect on event 96 pipeline_run.failed."
    question: "trigger_event 96 (pipeline_run.failed) references data_pipelines (227, mastered by DATA-AI-PLAT) but DI publishes the event. (a) keep existing attribution and document DI as contributor on event 96; (b) author a new DI-side event pipeline_run.failed with data_object_id=434 and re-point handoff 727."
    options: [a, b]
    why: "Attribution choice has implications for who owns the lifecycle state that fires the event (DATA-AI-PLAT data_pipelines state machine vs DI pipeline_runs state machine) and where the failure is surfaced (DI-side or DATA-AI-PLAT-side)."

  - id: B2-S4
    summary: "Decide DI regulatory scope and load corresponding domain_regulations rows."
    question: "DI has zero domain_regulations rows and the data-movement workflow has real regulatory exposure (cross-border data transfer under GDPR Chapter V; HIPAA ePHI ingress; SOX-relevant financial-data CDC streams; PCI-DSS cardholder-data masking-at-ingest). Pick: (a) DI in-scope for GDPR / HIPAA / SOX (3 domain_regulations rows); (b) only HIPAA / SOX in-scope; (c) none in-scope, DI is substrate-only (regulations attach downstream on DLP / DSPM / DCG)."
    options: [a, b, c]
    why: "Catalog policy decision with downstream impact on Bucket 3 regulation candidates and whether DI gets new dlp_* integration points + audit-trail entities."

  - id: B2-S5
    summary: "Resolve handoff 157 attribution defect on event 105 replication_load.completed."
    question: "trigger_event 105 (replication_load.completed) references lakehouse_tables (226, mastered by DATA-AI-PLAT) but DI publishes the event. (a) keep DATA-AI-PLAT attribution and document DI as contributor on event 105; (b) author a parallel DI-side event pipeline_run.completed_load with data_object_id=434; (c) replace event 105 entirely with a DI-side event pointing at pipeline_runs."
    options: [a, b, c]
    why: "Same attribution-defect shape as B2-S3 but on a different handoff. Flagship behavior varies (some runtimes fire on TABLE; others on CONNECTOR-RUN). Decision changes who owns the event's lifecycle state and which side's B9b coverage it counts toward."

