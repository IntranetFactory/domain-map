    finding: "Skill 48 (di-system, skill_type=system, domain_module_id=NULL) is a legacy domain-level system skill. Once B1B-F2-MODULE-SKILLS lands, F1 mandates retiring this legacy row in favor of per-module system skills (one per module per Rule #17). The legacy skill carries 7 query tools (query_pipeline_runs, query_source_connectors, query_sink_connectors, query_transformation_jobs, query_schema_registries, query_change_data_capture_streams, query_integration_flows); the tools rows stay in the catalog, the junctions move."
