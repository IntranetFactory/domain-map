    candidate: 2-module split (DI-INGEST-CDC + DI-TRANSFORM-DELIVER)
    rationale: "Recommended baseline per B2-S1 default. With 7 masters + 8 proposed capabilities, Rule #14 floor of 2 modules is satisfied with headroom. Alternative per-runtime split (4 modules) lands closer to vendor product lines but doubles authoring cost."
