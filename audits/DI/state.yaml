    finding: "Zero data_object_aliases rows for any DI master. Cross-vendor terminology is fragmented (Fivetran 'Connectors' and 'Connector Runs'; Airbyte 'Sources', 'Destinations', 'Sync Jobs'; dbt 'Models', 'Runs'; Confluent 'Connectors', 'Tasks'; Striim 'Replication Streams'; Qlik 'Source Endpoints', 'Target Endpoints'). Candidate equivalents: pipeline_runs to sync_jobs and connector_runs; source_connectors to sources and source_endpoints; sink_connectors to destinations and target_endpoints; transformation_jobs to dbt_models and ksql_queries; change_data_capture_streams to replication_streams and change_streams."
    blocked_by:
      - {type: user_decision, ref: cluster-drafts-review-pending}

  - id: B1B-B12-LIFECYCLE-STATES
    summary: "Load 7 lifecycle state machines, one per master, with the appropriate domain_module_id realizing column once modules exist. Gated on B1B-M1-MODULES (domain_module_id assignment needs module ids)."
    finding: "Zero data_object_lifecycle_states rows for any DI master. Per Rule #12 every workflow-bearing master needs a state machine; workflow-gate permissions materialize from those states. Expected machines: pipeline_runs (queued -> running -> succeeded | failed); source_connectors (configured -> active -> paused -> retired); sink_connectors (configured -> active -> paused -> retired); transformation_jobs (draft -> in_review -> approved -> published -> retired); schema_registries (registered -> versioned -> evolved -> deprecated); change_data_capture_streams (initializing -> active -> paused -> stopped); integration_flows (draft -> active -> error_burst -> paused -> retired)."
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-M1-MODULES}

  - id: B1B-B4-PATTERN-FLAGS
    summary: "PATCH 3 candidate pattern flags (transformation_jobs.has_submit_lock, transformation_jobs.has_single_approver, schema_registries.has_submit_lock) after B2-S2 per-flag yes/no decision."
    finding: "Pattern flags on all 7 masters are false by default; no positive audit pass recorded. Candidates per audit reasoning: transformation_jobs.has_submit_lock=true (published transformation jobs typically freeze at published so dependent consumers have a stable surface); transformation_jobs.has_single_approver=true (single-approver workflow is common in dbt / Matillion governance); schema_registries.has_submit_lock=true (schemas freeze at versioned state; evolution authors a NEW version rather than mutating the prior)."
    blocked_by:
      - {type: user_decision, ref: B2-S2}

