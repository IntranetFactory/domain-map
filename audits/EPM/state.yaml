b1a:
  - id: B1A-S7b
    summary: "PATCH trigger_event 587 variance_analysis.material_variance event_category from empty to the enum value chosen in B2-S7b."
    finding: "Live trigger_events row id=587 (event_name=variance_analysis.material_variance, data_object_id=41) carries event_category='' (empty string). The 2026-05-31 technical pass PATCHed 583, 584, 585, 586 to state_change but missed 587. Per Rule #13, allowed values are lifecycle, state_change, threshold, signal."
    action: "PATCH /trigger_events?id=eq.587 with body {event_category: <value from B2-S7b>}. Trivial single-row write; gated on B2-S7b user pick (threshold versus state_change)."
    blocked_by:
      - type: user_decision
        ref: B2-S7b
    affected_events:
      - {id: 587, event_name: variance_analysis.material_variance, current_category: "", proposed_category: state_change_or_threshold}

  - id: B1A-S10b
    summary: "Residual of B1A-S10: the third intra-domain handoff (239 EPM-PLAN-BUDGET -> 241 EPM-VARIANCE-REPORT on financial_budget.approved) could not be inserted because no financial_budget.approved trigger_event exists."
    finding: "B1A-S10 inserted 2 of 3 intra-domain lifecycle_progression handoffs on 2026-06-06 (handoff 1354: 239->240 on financial_plan.published / event 583; handoff 1355: 240->241 on financial_forecast.refreshed / event 58). The third row, 239->241 on financial_budget.approved, has no backing trigger_events row: the only financial_budget.* event in the catalog is id 13 financial_budget.cycle_started. Authoring a new financial_budget.approved trigger_event is master-data creation beyond the original action text (INSERT handoffs), so it was not guessed."
    action: "USER DECISION: author a financial_budget.approved trigger_event on data_object 38 (financial_budgets), then INSERT the intra-domain handoff 239->241 (integration_pattern=lifecycle_progression, friction_level=low, payload financial_budgets 38). The budget lifecycle (B1B-S3, draft -> submitted -> approved -> ...) already names an approved state, so the event is consistent with the planned state machine; it is gated on the B1B-S3 lifecycle authoring and a user OK to mint the event."
    blocked_by:
      - type: user_decision
        ref: B2-S3
        reason: "financial_budget.approved event + its from/to_state depend on the financial_budgets state-machine shape (B2-S3 pattern flags / B1B-S3 lifecycle states); authoring the event before the state machine is settled risks rework"
    affected_handoffs:
      - {handoff_id: null, direction: intra_domain, source_domain: EPM, target_domain: EPM, trigger_event: financial_budget.approved, payload: financial_budgets, null_field: source_239_target_241_missing_event}

b1b:
  - id: B1B-S3
    summary: "B12 hard fail, 0 lifecycle states on the 5 EPM masters. Realizer modules now exist; awaits B2-S3 pattern-flag picks."
    finding: "data_object_lifecycle_states for data_object_id in (37, 38, 39, 40, 41) returns 0 rows. Each master has a real workflow (no config-shape exemption applies). financial_plans (draft -> in_review -> approved -> published -> locked -> archived), financial_budgets (draft -> submitted -> approved -> locked -> variance_tracked -> closed), financial_forecasts (draft -> refreshed -> published -> superseded), financial_scenarios (draft -> modeled -> reviewed -> selected -> archived), variance_analyses (draft -> analyzed -> reviewed -> escalated -> closed). The realizing module_id is now resolvable (37, 38 -> 239; 39, 40 -> 240; 41 -> 241), but the state-machine shape still depends on the B2-S3 pattern-flag answers (submit_lock, single_approver)."
    blocked_by:
      - type: user_decision
        ref: B2-S3
        reason: "pattern-flag answers influence state-machine shape (submit_lock, single_approver) and which states carry requires_permission"
    affected_masters:
      - {data_object_id: 37, name: financial_plans, target_module_id: 239, workflow: "draft -> in_review -> approved -> published -> locked -> archived"}
      - {data_object_id: 38, name: financial_budgets, target_module_id: 239, workflow: "draft -> submitted -> approved -> locked -> variance_tracked -> closed"}
      - {data_object_id: 39, name: financial_forecasts, target_module_id: 240, workflow: "draft -> refreshed -> published -> superseded"}
      - {data_object_id: 40, name: financial_scenarios, target_module_id: 240, workflow: "draft -> modeled -> reviewed -> selected -> archived"}
      - {data_object_id: 41, name: variance_analyses, target_module_id: 241, workflow: "draft -> analyzed -> reviewed -> escalated -> closed"}

  - id: B1B-S4
    summary: "B11 hard fail, 0 aliases on the 5 EPM masters. Awaits exact (alias_name, alias_type) tuples."
    finding: "data_object_aliases for data_object_id in (37, 38, 39, 40, 41) returns 0 rows. Vendor terminology divergence per the 2026-05-30 audit narrative (Plan / Strategic Plan / Form / Pages on financial_plans; AOP / Budget on financial_budgets; Reforecast / Rolling Forecast / LE on financial_forecasts; What-If / Driver Scenario / Sensitivity on financial_scenarios; Variance / Plan-vs-Actuals / Flux Analysis on variance_analyses). Loader idiom requires exact (alias_name, alias_type) tuples per master."
    blocked_by:
      - type: user_decision
        ref: B2-aliases
        reason: "exact alias_name and alias_type tuples per master not pre-specified"
    affected_masters:
      - {data_object_id: 37, name: financial_plans, target_module_id: 239, workflow: alias_set_pending}
      - {data_object_id: 38, name: financial_budgets, target_module_id: 239, workflow: alias_set_pending}
      - {data_object_id: 39, name: financial_forecasts, target_module_id: 240, workflow: alias_set_pending}
      - {data_object_id: 40, name: financial_scenarios, target_module_id: 240, workflow: alias_set_pending}
      - {data_object_id: 41, name: variance_analyses, target_module_id: 241, workflow: alias_set_pending}

  - id: B1B-S5
    summary: "B7 hard fail, 0 users (id 748) edges on the 5 EPM masters. Awaits exact (relationship_verb, inverse_verb) tuples."
    finding: "data_object_relationships with (data_object_id in (37,38,39,40,41) or related_data_object_id in (37,38,39,40,41)) returns 4 cross-domain edges and 0 user edges. Specifically zero edges where data_object_id=748 (users) or related_data_object_id=748. Rule #10 makes built-in edges first-class. Expected verbs: plan_owner / approver / controller on financial_plans; budget_owner / submitter / approver on financial_budgets; forecast_owner / fp_analyst on financial_forecasts; scenario_modeler / reviewer on financial_scenarios; analyst / reviewer / accountable_manager on variance_analyses."
    blocked_by:
      - type: user_decision
        ref: B2-user-edges
        reason: "exact verb and inverse_verb tuples per edge not pre-specified"
    affected_masters:
      - {data_object_id: 37, name: financial_plans, target_module_id: 239, workflow: user_edges_pending}
      - {data_object_id: 38, name: financial_budgets, target_module_id: 239, workflow: user_edges_pending}
      - {data_object_id: 39, name: financial_forecasts, target_module_id: 240, workflow: user_edges_pending}
      - {data_object_id: 40, name: financial_scenarios, target_module_id: 240, workflow: user_edges_pending}
      - {data_object_id: 41, name: variance_analyses, target_module_id: 241, workflow: user_edges_pending}

  - id: B1B-S6
    summary: "B6 hard fail, 0 intra-domain edges between the 5 EPM masters. Awaits full edge tuples."
    finding: "data_object_relationships shows 4 edges touching EPM masters but all are cross-domain (id 330 strategic_initiatives <- financial_scenarios, id 345 audit_findings <-> financial_forecasts, id 346 audit_findings <-> variance_analyses, id 1027 workforce_cost_projections -> financial_plans). 0 edges among financial_plans, financial_budgets, financial_forecasts, financial_scenarios, variance_analyses. Expected composition: financial_plans composes financial_budgets / _forecasts / _scenarios (one_to_many, parent owner_side); variance_analyses compares financial_budgets / _forecasts (many_to_one). Note: financial_plans (37) and financial_budgets (38) now co-reside in module 239; financial_forecasts (39) and financial_scenarios (40) in module 240; cross-module edges to 240/241 become intra-domain cross-module references."
    blocked_by:
