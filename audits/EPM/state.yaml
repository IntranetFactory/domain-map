    finding: "handoff_processes pre-existing discovery_substring rows on (handoff_id, process_id) pairs the 2026-05-30 audit confirmed: 199->1324 Prepare periodic financial forecasts, 540->1392 Calculate and record depreciation expense, 563->1325 Perform variance analysis against forecasts and budgets, 564->1325 same. The 2026-05-31 technical pass authorized INSERTs only, not source-flip PATCHes."
