    blocked_by:
      - type: depends_on
        ref: B1B-S1
        reason: "lifecycle_states.domain_module_id needs a realizing module"
      - type: user_decision
        ref: B2-S3
        reason: "pattern-flag answers influence state-machine shape (submit_lock, single_approver)"
    affected_masters:
      - data_object_id: 37
        name: financial_plans
        target_module_id: null
        workflow: "draft -> in_review -> approved -> published -> locked -> archived"
      - data_object_id: 38
        name: financial_budgets
        target_module_id: null
        workflow: "draft -> submitted -> approved -> locked -> variance_tracked -> closed"
      - data_object_id: 39
