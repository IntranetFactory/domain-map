b2:
  - id: B2-S1
    summary: "Module-split shape for EPM (drives B1B-S1)."
    question: "Which module-split shape should EPM take?"
    options:
      - "(a) 5-module per-capability split, EPM-BUDGET + EPM-FORECAST + EPM-SCENARIO + EPM-WORKFORCE-PLAN + EPM-VARIANCE"
      - "(b) 1-module EPM-PLATFORM (violates M2 floor, rejected by Rule #14)"
      - "(c) 2-module split, EPM-PLAN (plans + budgets + forecasts + scenarios) + EPM-REPORT (variances)"
      - "(d) 3-module recommended split, EPM-PLAN-BUDGET (financial_plans + financial_budgets, realizes BUDGET-PLAN + DRIVER-MODEL + WORKFORCE-PLAN-EPM) + EPM-FORECAST-SCENARIO (financial_forecasts + financial_scenarios, realizes FORECAST + SCENARIO-MODEL) + EPM-VARIANCE-REPORT (variance_analyses, realizes MGMT-REPORT)"
      - "(e) custom alternative supplied by user"
    why: "The split affects every downstream load, role / skill / permission shape, and gates the entire cascade of B1B-S1 through B1B-S10 plus B1B-S8."

  - id: B2-S2
    summary: "WORKFORCE-PLAN-EPM role scoping for FPA-WORKFORCE-PARTNER once EPM modules exist."
    question: "Should FPA-WORKFORCE-PARTNER (currently grounded entirely on SWP modules) gain primary scope on the future EPM-PLAN-BUDGET module (the headcount-spend slice of the budget), stay entirely on SWP, or split into two roles?"
    options:
      - "(a) FPA-WORKFORCE-PARTNER becomes primary on EPM-PLAN-BUDGET and secondary on SWP-COST-PROJECTIONS"
      - "(b) Keep entirely on SWP, surface EPM consumption via permission grants only"
      - "(c) Split into two roles, one EPM-scoped and one SWP-scoped"
    why: "Depends on B1B-S1 (modules must exist) and B3-S2 (headcount_plans candidate). Hold until both land."

  - id: B2-S3
    summary: "B4 pattern-flag positive confirmation per Rule #12 for the 5 EPM masters."
    question: "Per-flag yes or no on each master? Rule #12 requires positive consideration, not default acceptance."
    options:
      - "financial_plans.has_submit_lock yes (approved plans freeze) or no"
      - "financial_plans.has_single_approver yes (CFO / controller single approver) or no"
      - "financial_budgets.has_submit_lock yes (locked budgets do not edit post-approval) or no"
      - "financial_forecasts.has_submit_lock explicit no (rolling forecasts are editable cycle-to-cycle by design)"
      - "variance_analyses.has_single_approver explicit no (variance commentary shared across cost-center owners, multi-approver)"
    why: "Workflow-shape decisions; the user owns the call. Defaults are not 'considered' per Rule #12."

  - id: B2-S4
    summary: "Rule #15 notes pollution on 2 surviving EPM-owned domain_data_objects rows."
    question: "Were notes on row id=54 (org_units contributor; 'Cost-center alignment slice. EPM contributes the financial mapping...') and row id=335 (journal_entries consumer; 'EPM consumes period-actuals from ERP-FIN for variance reporting against budgets / forecasts.') explicitly user-approved at load time, or auto-populated by the loader?"
    options:
      - "(a) Approved at load time, leave both in place"
      - "(b) Auto-populated, PATCH both to empty string and append a Rule #15 incident entry to references/skill-changelog.md"
    why: "The audit cannot determine load-time approval status from history alone. Row id=334 was already reverted in the 2026-05-31 technical pass."

  - id: B2-S7b
    summary: "Trigger_event 587 event_category enum pick (drives B1A-S7b)."
    question: "For trigger_event id=587 (variance_analysis.material_variance), set event_category to threshold or state_change?"
    options:
      - "threshold (the variance crossed the materiality threshold)"
      - "state_change (the variance row transitioned into the material state)"
    why: "Workflow-semantics decision; either reading is defensible."

b3:
  - id: B3-S1
    candidate: cost_allocations
    rationale: "Every flagship EPM platform ships an allocation engine; the records (allocation rule definitions and per-period executions) are first-class but absent from EPM's footprint. This is the crud_percentage=50 slice the EPM domain row signals (the calc kernel beyond simple JsonLogic). Highest-leverage Bucket 3 candidate; the absence is what makes the catalog read EPM as 'another forms tool' rather than a calc-kernel platform."
    vendor_evidence: [Oracle EPM Cloud, Anaplan, OneStream, SAP Analytics Cloud Planning, Workday Adaptive Planning, Pigment]
    proposed_module: "EPM-FORECAST-SCENARIO or EPM-VARIANCE-REPORT, pending B1B-S1"

  - id: B3-S2
    candidate: headcount_plans
    rationale: "Every flagship has a headcount / position-level plan distinct from the dollar plan. Today EPM conflates this into financial_plans via the WORKFORCE-PLAN-EPM capability with the line-item flow from SWP (workforce_cost_projections feeds financial_plans, edge id 1027). Either add the master to EPM or shift responsibility wholly to SWP."
    vendor_evidence: [Workday Adaptive Workforce, Anaplan Connected Workforce, Pigment People]
    proposed_module: "EPM-PLAN-BUDGET or SWP, pending B2-S2"

  - id: B3-S3
    candidate: EPM-CONSOL_or_EPM-DISCLOSURE_module
    rationale: "OneStream and Oracle EPM bundle close / consolidation / disclosure narrative onto the same platform. EPM in our catalog has zero close / consolidation / disclosure surface; the _missing-domains.md queue carries CCM, FIN-CONSOL, DISCLOSURE-MGMT as candidates. Triage those first; if promoted, EPM stays scoped (no 4th module); if folded, EPM gains a 4th module."
    vendor_evidence: [OneStream Platform, Oracle EPM Cloud]
    proposed_module: "pending _missing-domains.md triage"
