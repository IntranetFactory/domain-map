b1a:
  - id: B1A-SYSTEM-SKILLS
    summary: "Author one per-module system skill on each of the 3 new EPM modules and retire legacy epm-system skill id=4 (Rule #17 -> F2/F3, was B1B-S8)."
    finding: "The 2026-06-02 modularization pass created 3 full EPM modules (239 EPM-PLAN-BUDGET, 240 EPM-FORECAST-SCENARIO, 241 EPM-VARIANCE-REPORT). Rule #17 mandates exactly one system skill per domain_modules row anchored on domain_module_id. Today the only EPM system skill is the legacy domain-scoped row skills id=4 (skill_name=epm-system, skill_type=system, domain_id=66, domain_module_id=null) carrying 9 skill_tools (query_financial_plans, query_budgets, query_forecasts, query_variance_analyses, query_financial_scenarios, update_budget, update_forecast, query_journal_entries, generate_text). F2/F3 now fail because the modules exist but carry no module-anchored system skill. This pass was scoped to modules + entity assignment only, so the skills were not authored."
    action: "Author 3 system skills (one per module) anchored on domain_module_id in (239, 240, 241); redistribute the 9 skill_tools from skill id=4 to the matching per-module skill (plan/budget tools -> 239, forecast/scenario tools -> 240, variance + journal_entries query -> 241; generate_text replicated where needed); then DELETE skills id=4 and its 9 skill_tools rows once the per-module skills exist."
    affected_modules: [239, 240, 241]
    affected_entities: [skill_id_4]
    extra_skill_tools_count: 9

  - id: B1A-CATALOG-UX
    summary: "Populate catalog_tagline and catalog_description on the 3 new EPM modules (M8/A4)."
    finding: "Modules 239, 240, 241 were inserted by the 2026-06-02 modularization pass with catalog_tagline and catalog_description omitted (per the modularization insert shape, which omits both). M8/A4 catalog-UX completeness wants a buyer-facing tagline and description per module."
    action: "PATCH each of /domain_modules?id=eq.239|240|241 with a buyer-facing catalog_tagline and catalog_description (no em-dashes, American English). Trivial 3-row PATCH; no entity or junction changes."
    affected_modules: [239, 240, 241]

  - id: B1A-S9
    summary: "Backfill source_domain_module_id on 8 outbound EPM handoffs now that modules exist (B10b source side, was B1B-S9)."
    finding: "8 outbound handoffs from EPM (id 10, 27, 199, 561, 562, 563, 564, 601) carry source_domain_module_id=NULL. The 3 modules now exist, so the source-module routing is derivable: handoffs 10, 561, 601 (events on financial_budgets/financial_plans) -> 239 EPM-PLAN-BUDGET; handoffs 27, 199, 562 (events on financial_forecasts/financial_scenarios) -> 240 EPM-FORECAST-SCENARIO; handoffs 563, 564 (events on variance_analyses) -> 241 EPM-VARIANCE-REPORT."
    action: "PATCH source_domain_module_id on the 8 outbound handoffs per the routing above. Trivial derivable backfill; no user pick needed."
    affected_handoffs:
      - {handoff_id: 10, direction: outbound, source_domain: EPM, target_domain: SWP, trigger_event: financial_budget.cycle_started, payload: workforce_plans, null_field: source_domain_module_id}
      - {handoff_id: 27, direction: outbound, source_domain: EPM, target_domain: SWP, trigger_event: financial_forecast.refreshed, payload: workforce_plans, null_field: source_domain_module_id}
      - {handoff_id: 199, direction: outbound, source_domain: EPM, target_domain: AUDIT, trigger_event: financial_forecast.refreshed, payload: financial_forecasts, null_field: source_domain_module_id}
      - {handoff_id: 561, direction: outbound, source_domain: EPM, target_domain: ERP-FIN, trigger_event: financial_plan.approved, payload: financial_plans, null_field: source_domain_module_id}
      - {handoff_id: 562, direction: outbound, source_domain: EPM, target_domain: SPM, trigger_event: financial_scenario.modeled, payload: financial_scenarios, null_field: source_domain_module_id}
      - {handoff_id: 563, direction: outbound, source_domain: EPM, target_domain: ERP-FIN, trigger_event: variance_analysis.material_variance, payload: variance_analyses, null_field: source_domain_module_id}
      - {handoff_id: 564, direction: outbound, source_domain: EPM, target_domain: AUDIT, trigger_event: variance_analysis.material_variance, payload: variance_analyses, null_field: source_domain_module_id}
      - {handoff_id: 601, direction: outbound, source_domain: EPM, target_domain: HCM, trigger_event: financial_plan.approved, payload: financial_plans, null_field: source_domain_module_id}

  - id: B1A-S10
    summary: "Author 3 intra-domain lifecycle_progression handoffs between the new EPM modules (B9b, was B1B-S10)."
    finding: "With the 3-module shape now live, 3 intra-domain handoffs become required (integration_pattern=lifecycle_progression, friction_level=low): 239 EPM-PLAN-BUDGET -> 240 EPM-FORECAST-SCENARIO on financial_plan.published; 239 EPM-PLAN-BUDGET -> 241 EPM-VARIANCE-REPORT on financial_budget.approved; 240 EPM-FORECAST-SCENARIO -> 241 EPM-VARIANCE-REPORT on financial_forecast.refreshed."
    action: "INSERT 3 handoffs rows with source/target domain_module_id pointing at the new module ids, integration_pattern=lifecycle_progression, friction_level=low. Now technically unblocked (modules exist)."
    affected_handoffs:
      - {handoff_id: null, direction: intra_domain, source_domain: EPM, target_domain: EPM, trigger_event: financial_plan.published, payload: financial_plans, null_field: source_239_target_240}
      - {handoff_id: null, direction: intra_domain, source_domain: EPM, target_domain: EPM, trigger_event: financial_budget.approved, payload: financial_budgets, null_field: source_239_target_241}
      - {handoff_id: null, direction: intra_domain, source_domain: EPM, target_domain: EPM, trigger_event: financial_forecast.refreshed, payload: financial_forecasts, null_field: source_240_target_241}

  - id: B1A-S7b
    summary: "PATCH trigger_event 587 variance_analysis.material_variance event_category from empty to the enum value chosen in B2-S7b."
    finding: "Live trigger_events row id=587 (event_name=variance_analysis.material_variance, data_object_id=41) carries event_category='' (empty string). The 2026-05-31 technical pass PATCHed 583, 584, 585, 586 to state_change but missed 587. Per Rule #13, allowed values are lifecycle, state_change, threshold, signal."
    action: "PATCH /trigger_events?id=eq.587 with body {event_category: <value from B2-S7b>}. Trivial single-row write; gated on B2-S7b user pick (threshold versus state_change)."
    blocked_by:
      - type: user_decision
        ref: B2-S7b
    affected_events:
      - {id: 587, event_name: variance_analysis.material_variance, current_category: "", proposed_category: state_change_or_threshold}

