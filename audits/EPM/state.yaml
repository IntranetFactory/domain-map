b2:
  - id: B2-S1
    summary: "Module-split shape for EPM (adopted option d this pass; confirm or change)."
    question: "The 2026-06-02 modularization pass adopted option (d), the recommended 3-module split (EPM-PLAN-BUDGET 239 + EPM-FORECAST-SCENARIO 240 + EPM-VARIANCE-REPORT 241). Confirm this shape, or request an alternative?"
    options:
      - "(d) ADOPTED: 3-module split, EPM-PLAN-BUDGET (financial_plans + financial_budgets, BUDGET-PLAN + DRIVER-MODEL + WORKFORCE-PLAN-EPM) + EPM-FORECAST-SCENARIO (financial_forecasts + financial_scenarios, FORECAST + SCENARIO-MODEL) + EPM-VARIANCE-REPORT (variance_analyses, MGMT-REPORT)"
      - "(a) 5-module per-capability split, EPM-BUDGET + EPM-FORECAST + EPM-SCENARIO + EPM-WORKFORCE-PLAN + EPM-VARIANCE (rebuild required)"
      - "(c) 2-module split, EPM-PLAN (plans + budgets + forecasts + scenarios) + EPM-REPORT (variances) (rebuild required)"
      - "(e) custom alternative supplied by user (rebuild required)"
    why: "The split is now live, plus the 3 per-module system skills (302/303/304) and module-grain catalog UX now hang off it; this is a confirm-or-revert call. Changing it cascades to the per-module skills, handoff routing (B1A-S9 source FK now backfilled, B1A-S10 intra-domain rows now live), and lifecycle realizer module_ids (B1B-S3)."

  - id: B2-S2
    summary: "WORKFORCE-PLAN-EPM role scoping for FPA-WORKFORCE-PARTNER now that EPM-PLAN-BUDGET (239) exists."
    question: "Should FPA-WORKFORCE-PARTNER (currently grounded entirely on SWP modules) gain primary scope on EPM-PLAN-BUDGET (239, the headcount-spend slice of the budget, which realizes WORKFORCE-PLAN-EPM), stay entirely on SWP, or split into two roles?"
    options:
      - "(a) FPA-WORKFORCE-PARTNER becomes primary on EPM-PLAN-BUDGET (239) and secondary on SWP-COST-PROJECTIONS"
      - "(b) Keep entirely on SWP, surface EPM consumption via permission grants only"
      - "(c) Split into two roles, one EPM-scoped and one SWP-scoped"
    why: "EPM-PLAN-BUDGET now exists, so option (a) is actionable. Still depends on B3-S2 (headcount_plans candidate) for whether a dedicated headcount master changes the slice."

  - id: B2-S3
    summary: "B4 pattern-flag positive confirmation per Rule #12 for the 5 EPM masters."
    question: "Per-flag yes or no on each master? Rule #12 requires positive consideration, not default acceptance. Drives the B1B-S3 lifecycle-state shape AND the B1A-S10b financial_budget.approved event/handoff."
    options:
      - "financial_plans.has_submit_lock yes (approved plans freeze) or no"
      - "financial_plans.has_single_approver yes (CFO / controller single approver) or no"
      - "financial_budgets.has_submit_lock yes (locked budgets do not edit post-approval) or no"
      - "financial_forecasts.has_submit_lock explicit no (rolling forecasts are editable cycle-to-cycle by design)"
      - "variance_analyses.has_single_approver explicit no (variance commentary shared across cost-center owners, multi-approver)"
    why: "Workflow-shape decisions; the user owns the call. Defaults are not 'considered' per Rule #12."

  - id: B2-S4
    summary: "Rule #15 notes pollution on 2 surviving EPM-owned domain_data_objects rows."
    question: "Were notes on row id=54 (org_units contributor; 'Cost-center alignment slice. EPM contributes the financial mapping...') and row id=335 (journal_entries consumer; 'EPM consumes period-actuals from ERP-FIN for variance reporting against budgets / forecasts.') explicitly user-approved at load time, or auto-populated by the loader?"
    options:
      - "(a) Approved at load time, leave both in place"
      - "(b) Auto-populated, PATCH both to empty string and append a Rule #15 incident entry to references/skill-changelog.md"
    why: "The audit cannot determine load-time approval status from history alone. Row id=334 was already reverted in the 2026-05-31 technical pass. Note: the modularization pass wrote the new domain_module_data_objects rows with notes empty per Rule #15; these legacy domain_data_objects rows are the residual concern."

  - id: B2-S7b
    summary: "Trigger_event 587 event_category enum pick (drives B1A-S7b)."
    question: "For trigger_event id=587 (variance_analysis.material_variance), set event_category to threshold or state_change?"
    options:
      - "threshold (the variance crossed the materiality threshold)"
      - "state_change (the variance row transitioned into the material state)"
    why: "Workflow-semantics decision; either reading is defensible."

b3:
  - id: B3-S1
    candidate: cost_allocations
    rationale: "Every flagship EPM platform ships an allocation engine; the records (allocation rule definitions and per-period executions) are first-class but absent from EPM's footprint. This is the crud_percentage=50 slice the EPM domain row signals (the calc kernel beyond simple JsonLogic). Highest-leverage Bucket 3 candidate; the absence is what makes the catalog read EPM as 'another forms tool' rather than a calc-kernel platform. Proposed module now resolvable: 240 EPM-FORECAST-SCENARIO or 241 EPM-VARIANCE-REPORT."
    vendor_evidence: [Oracle EPM Cloud, Anaplan, OneStream, SAP Analytics Cloud Planning, Workday Adaptive Planning, Pigment]
    proposed_module: "EPM-FORECAST-SCENARIO (240) or EPM-VARIANCE-REPORT (241)"

  - id: B3-S2
    candidate: headcount_plans
    rationale: "Every flagship has a headcount / position-level plan distinct from the dollar plan. Today EPM conflates this into financial_plans via the WORKFORCE-PLAN-EPM capability (now realized by module 239) with the line-item flow from SWP (workforce_cost_projections feeds financial_plans, edge id 1027). Either add the master to EPM-PLAN-BUDGET (239) or shift responsibility wholly to SWP."
    vendor_evidence: [Workday Adaptive Workforce, Anaplan Connected Workforce, Pigment People]
    proposed_module: "EPM-PLAN-BUDGET (239) or SWP, pending B2-S2"

  - id: B3-S3
    candidate: EPM-CONSOL_or_EPM-DISCLOSURE_module
    rationale: "OneStream and Oracle EPM bundle close / consolidation / disclosure narrative onto the same platform. EPM in our catalog has zero close / consolidation / disclosure surface; the _missing-domains.md queue carries CCM, FIN-CONSOL, DISCLOSURE-MGMT as candidates. Triage those first; if promoted, EPM stays at 3 modules; if folded, EPM gains a 4th module."
    vendor_evidence: [OneStream Platform, Oracle EPM Cloud]
    proposed_module: "pending _missing-domains.md triage"
