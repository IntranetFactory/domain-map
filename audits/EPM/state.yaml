    blocked_by:
      - type: user_decision
        ref: B2-S3
        reason: "pattern-flag answers influence state-machine shape (submit_lock, single_approver) and which states carry requires_permission"
    affected_masters:
      - {data_object_id: 37, name: financial_plans, target_module_id: 239, workflow: "draft -> in_review -> approved -> published -> locked -> archived"}
      - {data_object_id: 38, name: financial_budgets, target_module_id: 239, workflow: "draft -> submitted -> approved -> locked -> variance_tracked -> closed"}
      - {data_object_id: 39, name: financial_forecasts, target_module_id: 240, workflow: "draft -> refreshed -> published -> superseded"}
      - {data_object_id: 40, name: financial_scenarios, target_module_id: 240, workflow: "draft -> modeled -> reviewed -> selected -> archived"}
      - {data_object_id: 41, name: variance_analyses, target_module_id: 241, workflow: "draft -> analyzed -> reviewed -> escalated -> closed"}

