    finding: "handoff 256 (AUDIT recommendation.accepted -> EPM) carries a discovery_substring row pointing at PCF 16817 warranty-related recommendations (wrong fit); audit proposes 20136 variance analysis or defer to Discover. handoff 534 (ERP-FIN gl_account.mapping_changed -> EPM), no row yet, choose PCF 1379 Process journal entries or 10728 Perform planning and management accounting. handoff 777 (VSDP value_stream_metric.threshold_breached -> EPM), no row yet, defer to VSDP custom process candidate. handoffs 792, 795 (SPM benefits_tracking_record.realized / at_risk -> EPM), no rows yet, possible SPM-specific process, defer to Discover."
