b1a:
  - id: B1A-S7b
    summary: "PATCH trigger_event 587 variance_analysis.material_variance event_category from empty to enum value chosen in B2-S7b."
    finding: "Live trigger_events row id=587 (event_name=variance_analysis.material_variance, data_object_id=41) carries event_category='' (empty string). The 2026-05-31 technical pass PATCHed events 583, 584, 585, 586 to state_change but missed 587. Per Rule #13, allowed values are lifecycle, state_change, threshold, signal."
    action: "PATCH /trigger_events?id=eq.587 with body {event_category: <value from B2-S7b>}. Trivial single-row write; gated on B2-S7b user pick (threshold versus state_change)."
    blocked_by:
      - type: user_decision
        ref: B2-S7b
    affected_events:
      - id: 587
        event_name: variance_analysis.material_variance
        current_category: ""
        proposed_category: state_change_or_threshold

b1b:
  - id: B1B-S1
    summary: "M1 module split for EPM (0 domain_modules rows). Dominant blocker. Author 3-module loader once user picks split shape."
    finding: "domain_id=66 (EPM) has 0 rows in domain_modules and 0 rows in domain_module_host_domains. Rule #14 requires every domains row to have >=1 module_kind='full' module; with 6 capabilities EPM is above the 3-capability floor and so requires >=2 full modules. Recommended shape: EPM-PLAN-BUDGET (masters financial_plans + financial_budgets, realizes BUDGET-PLAN + DRIVER-MODEL + WORKFORCE-PLAN-EPM), EPM-FORECAST-SCENARIO (masters financial_forecasts + financial_scenarios, realizes FORECAST + SCENARIO-MODEL), EPM-VARIANCE-REPORT (masters variance_analyses, realizes MGMT-REPORT). Cascades to B1B-S2 (M2/M4/M6), B1B-S3 (B12), B1B-S8 (F1), B1B-S9 (B10b source-side), B1B-S10 (B9b)."
    blocked_by:
      - type: user_decision
        ref: B2-S1
    affected_modules: []
    affected_entities: [financial_plans, financial_budgets, financial_forecasts, financial_scenarios, variance_analyses]
    extra_capabilities: [BUDGET-PLAN, FORECAST, DRIVER-MODEL, SCENARIO-MODEL, MGMT-REPORT, WORKFORCE-PLAN-EPM]
    vendor_evidence: [Workday Adaptive Planning, Anaplan, OneStream, Oracle EPM Cloud, SAP Analytics Cloud Planning, Pigment, Vena, Planful, Board, Prophix One]

  - id: B1B-S2
    summary: "M2/M4/M6 cascade (6 EPM capabilities unrealized) resolves as side effect of B1B-S1."
    finding: "capability_domains for domain_id=66 lists 6 capability_ids (66 BUDGET-PLAN, 67 FORECAST, 68 DRIVER-MODEL, 69 SCENARIO-MODEL, 70 MGMT-REPORT, 71 WORKFORCE-PLAN-EPM) but zero domain_module_capabilities rows exist for EPM modules (because there are no EPM modules). Cap-to-module mapping is loaded with B1B-S1."
    blocked_by:
      - type: depends_on
        ref: B1B-S1
        reason: cascade
    extra_capability_ids: [66, 67, 68, 69, 70, 71]

