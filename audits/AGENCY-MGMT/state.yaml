  - id: B1A-AS3-SKILL26-RENAME
    summary: "Skill 26 'agency-mgmt-system' has 9 tools but NULL domain_module_id; rename/split to module-scoped skills once modules land."
    finding: >-
      skills.id=26 (skill_name='agency-mgmt-system', skill_type='system') carries
      domain_module_id IS NULL. 9 skill_tools rows attached (8 query_<entity> covering all
      8 masters + 1 send_email side_effect). Per Rule #17 every domain_modules row carries
      exactly one system skill; with 0 modules the skill is detached scaffolding.
    action: >-
      Gated on B1B-AS1-MODULES + B2-S2. Once the module split is approved:
