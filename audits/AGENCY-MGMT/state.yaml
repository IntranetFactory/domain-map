      Handoff 348 (HCM->AGENCY-MGMT, employee.terminated -> agency_time_entries) has a
      handoff_processes row pointing at process 41 'Manage employee onboarding, training,
      and development' (L2) with proposal_source='discovery_override'. The handoff is about
      terminating an employee's time entries on separation, not onboarding. The override
      target is mismatched.
    action: >-
      Run /processes?process_name=ilike.*exit*&source_framework=eq.apqc_pcf_cross_industry
      (and 'separation', 'Manage employee information' cluster). Choose the highest-confidence
      L3 match; DELETE the discovery_override row; INSERT a new agent_curated row at
