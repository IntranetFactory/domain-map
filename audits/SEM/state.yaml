b3:
  - id: B3-KPIS
    candidate: kpis
    rationale: >-
      Spider Impact, ClearPoint, i-nexus, Cascade all model KPIs as a first-class
      master distinct from key_results: KPIs are persistent measures with thresholds
      and red / amber / green status, attached to objectives but living independently
      across planning cycles. okr_key_results conflates the two and KPIs disappear
      when their parent OKR closes.
    vendor_evidence:
      - {vendor: Spider Impact, evidence: 1st_class}
      - {vendor: ClearPoint Strategy, evidence: 1st_class}
      - {vendor: i-nexus, evidence: 1st_class}
      - {vendor: Cascade, evidence: 1st_class}
    proposed_module: SEM-KPI-MGMT (new) or extend SEM-STRATEGY-DEFINITION

  - id: B3-STRATEGIC-THEMES
    candidate: strategic_themes
    rationale: >-
      Quantive, ClearPoint, OnStrategy, AchieveIt model strategic themes / pillars
      as a layer between strategy_maps and individual objectives (Customer / Process
      / Learning / Financial perspectives in balanced-scorecard; Hoshin pillars in
      Hoshin Kanri). strategy_maps conflates visualization with the theme entity.
    vendor_evidence:
      - {vendor: Quantive Results, evidence: 1st_class}
      - {vendor: ClearPoint Strategy, evidence: 1st_class}
      - {vendor: OnStrategy, evidence: secondary}
      - {vendor: AchieveIt, evidence: secondary}
    proposed_module: SEM-STRATEGY-DEFINITION

  - id: B3-OKR-CHECKIN-SUMMARIES
    candidate: okr_check_in_summaries
    rationale: >-
      WorkBoard, Profit.co, Quantive produce period-level (weekly / monthly)
      check-in aggregates distinct from individual okr_check_ins records (which are
      per-OKR, per-update). The aggregate is the rollup that feeds the operating
      cadence.
    vendor_evidence:
