      SEM needs its own master or should consume SPM's benefits_tracking_records is
      a judgment call (BENEFITS-TRACKING master is expected to live in SPM).
    vendor_evidence:
      - {vendor: Cascade, evidence: 1st_class}
      - {vendor: WorkBoard, evidence: 1st_class}
      - {vendor: ClearPoint Strategy, evidence: 1st_class}
    proposed_module: SEM-EXECUTION-TRACKING (consumer of SPM master)

