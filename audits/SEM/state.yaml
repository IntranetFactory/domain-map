      - {vendor: Profit.co, evidence: 1st_class}
      - {vendor: Quantive Results, evidence: 1st_class}
    proposed_module: SEM-OPERATING-RHYTHM (consumer; canonical master could be WORK-MGMT-GOALS-OKR)

