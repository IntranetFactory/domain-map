b1a:
  - id: B1A-S11
    summary: lactation_records (id=500) lacks the `users` many_to_many edge that the other 7 DAIRY-MGMT masters carry
    finding: >-
      The 2026-05-31 continuation backfilled `data_object_relationships` rows
      1775-1781 linking 7 of 8 DAIRY-MGMT masters to `users` (id=748) as
      many_to_many `reference`. lactation_records was skipped. No clean
      single-actor verb exists for it (lactation cycle opens via cow state, not
      a discrete operator). Decision is whether to author a
      `lactation_recorded_by` edge or accept absence as system-opened.
    action: >-
      Surface proposed verb (e.g. `is recorded by` parallel to milkings, or `is
      opened by` if system-attribution preferred). If user approves, INSERT one
      `data_object_relationships` row (data_object_id=500, related_data_object_id=748,
      relationship_type=many_to_many, relationship_kind=reference). If user
      declines, document the deliberate omission in this state.yaml as resolved.
    skipped_reason: >-
      2026-06-05 b1a pass SKIPPED this item: the action is explicitly conditional
      on a user decision (which verb framing, or whether to author at all), and
      the finding states no clean single-actor verb exists. This is master-data
      judgment beyond the action text. Awaiting an explicit user verb decision;
      effectively a user-judgment item despite living in b1a.
    affected_masters:
      - {data_object_id: 500, name: lactation_records, target_module_id: 227, workflow: user_edge}

