b2:
  - id: B2-1
    summary: DAIRY-MGMT module shape, 4 vs 5 vs 6 modules
    question: >-
      Which module shape to author? (a) 4-module split: HERD (cow_lifecycle +
      reproduction + herd_health), PARLOR (parlor_integration), MILK-QUALITY,
      FEED. (b) 5-module split: keep REPRODUCTION separate (sensor-driven heat
      detection / pregnancy check workflows). (c) 6-module split: one module
      per capability (matches the 6 current capabilities 1:1).
    options: [4_module_split, 5_module_split, 6_module_split]
    why: >-
      Gates B1B-S1, B1B-S3, B1B-S6, B1B-S9, B1B-S10, B1B-B1 (every STRUCTURAL
      fix that references modules). The 4-module proposal merges 3
      capabilities into HERD; alternatives keep REPRODUCTION or all six
      separate.

  - id: B2-2
    summary: A4 catalog_tagline and catalog_description buyer-voice wording
    question: >-
      Provide exact tagline and description text. Rule #20 requires user
      authorship or explicit approval before write. Agent can propose drafts
      but cannot load without your wording.
    options: [user_authors, agent_drafts_user_approves, defer]

  - id: B2-3
    summary: milkings canonical-bare-word rationale
    question: >-
      `milkings.is_canonical_bare_word=true` is set. The
      `naming_authority_rationale` value was not pulled in this audit; if
      empty, what rationale should be written? (Or claim canonical authority
      for DAIRY-MGMT.)
    options: [user_authors_rationale, defer]

  - id: B2-4
    summary: cow_health_events pattern flags
    question: >-
      cow_health_events includes drug-withdrawal-period data potentially
      regulated under FDA AMDUCA / state veterinary practice acts. Should
      `has_personal_content=true` be set? Strictly cows are not persons but
      the data is veterinary-PII-adjacent.
    options: [keep_false, set_true]

  - id: B2-5
    summary: feed_rations Rule #12 lifecycle config-shape exemption
    question: >-
      feed_rations may be author-once-and-supersede records (formulated /
      active / superseded). Per Rule #15 the agent cannot auto-populate
      `notes` to document the exemption. Decision: (a) load lifecycle states
      anyway, or (b) record the config-shape exemption out-of-band (gap
      report). Gates B1B-S8 for that one master only.
    options: [load_states, exempt_config_shape]

  - id: B2-6
    summary: DAIRY-MGMT-MILK-QUALITY business-function override
    question: >-
      C2 plausible override: Quality / Compliance owns milk-quality capability
      instead of Business Operations. Decision: load override
      `business_function_capabilities` row, or accept Operations as canonical
      for the capability.
    options: [load_override, keep_operations]

  - id: B2-7
    summary: Load FDA Grade A PMO / FARM / DHIA / state dairy regulations
    question: >-
      Zero `domain_regulations` rows for DAIRY-MGMT. FDA Grade A Pasteurized
      Milk Ordinance, FARM Animal Care program, DHIA testing standards, and
      state Dept of Agriculture dairy inspection rules are all in-scope.
      Decision: (a) load new `regulations` rows + `domain_regulations` links,
      or (b) defer until a specific capability needs them. Informed by B3-3
      (bulk_tanks) and B3-5 (somatic_cell_counts) if those candidates land.
    options: [load_now, defer]

  - id: B2-8
    summary: Reviewer approval of 6 `agent_curated` `handoff_processes` rows
    question: >-
      handoff_processes ids 573-578 are all `record_status=new`,
      `proposal_source=agent_curated`. Per Rule #1, only the user can flip
      `record_status` to `approved`. Decision: approve all six, approve a
      subset, or decline. The 6 PCF mappings are: 354 -> Perform quality
      testing (PCF 10369), 355 -> Manage compliance (PCF 17467), 353 + 955
      -> Maintain production records and manage lot traceability (PCF
      10370), 957 + 959 -> Manage traceability data (PCF 11749).
    options: [approve_all, approve_subset, decline]
    why: >-
      Gates B1B-H2. Catalog-quality headline on H1 is the `approved` count,
      not the `agent_curated` count.

b3:
