b1a:
  - id: B1A-S7
    summary: Zero `data_object_aliases` rows across 8 DAIRY-MGMT masters
    finding: >-
      The 8 DAIRY-MGMT masters (dairy_cows, lactation_records, milkings,
      milk_quality_tests, breeding_events, cow_health_events, feed_rations,
      bulk_milk_shipments) have zero `data_object_aliases` rows. B11 fails.
      Cross-vendor synonyms are well-defined in the dairy market (DHIA, parlor
      session, lactation cycle, tanker load, insemination).
    action: >-
      Draft ~10-15 alias rows (executable now; not gated on module shape). Surface
      proposed tuples to user before insert. Examples: dairy_cows alias `cow`,
      dairy_cows alias `animal`, milkings alias `parlor session`,
      milkings alias `milk event`, lactation_records alias `lactation cycle`,
      lactation_records alias `DIM record`, milk_quality_tests alias `DHIA test`,
      bulk_milk_shipments alias `milk pickup`, bulk_milk_shipments alias `tanker load`,
      breeding_events alias `insemination`.
    affected_masters:
      - {data_object_id: 499, name: dairy_cows, target_module_id: null, workflow: alias_load}
      - {data_object_id: 500, name: lactation_records, target_module_id: null, workflow: alias_load}
      - {data_object_id: 501, name: milkings, target_module_id: null, workflow: alias_load}
      - {data_object_id: 502, name: milk_quality_tests, target_module_id: null, workflow: alias_load}
      - {data_object_id: 503, name: breeding_events, target_module_id: null, workflow: alias_load}
      - {data_object_id: 504, name: cow_health_events, target_module_id: null, workflow: alias_load}
      - {data_object_id: 505, name: feed_rations, target_module_id: null, workflow: alias_load}
      - {data_object_id: 506, name: bulk_milk_shipments, target_module_id: null, workflow: alias_load}

  - id: B1A-S11
    summary: lactation_records (id=500) lacks `users` many_to_many edge that the other 7 DAIRY-MGMT masters carry
    finding: >-
      The 2026-05-31 continuation backfilled `data_object_relationships` rows
      1775-1781 linking 7 of 8 DAIRY-MGMT masters to `users` (id=748) as
      many_to_many `reference`. lactation_records was skipped. No clean
      single-actor verb exists for it (lactation cycle opens via cow state, not
      a discrete operator). Decision is whether to author a
      `lactation_recorded_by` edge or accept absence as system-opened.
    action: >-
      Surface proposed verb (e.g. `is recorded by` parallel to milkings, or `is
      opened by` if system-attribution preferred). If user approves, INSERT one
      `data_object_relationships` row (data_object_id=500, related_data_object_id=748,
      relationship_type=many_to_many, relationship_kind=reference). If user
      declines, document the deliberate omission in this state.yaml as resolved.
    affected_masters:
      - {data_object_id: 500, name: lactation_records, target_module_id: null, workflow: user_edge}

