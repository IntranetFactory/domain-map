b2:
  - id: B2-S1
    summary: "Decide APIM module split shape (2 / 3 / 4 modules)."
    question: "Which module split should APIM use? (a) 4 modules: APIM-DESIGN-LIFECYCLE (api_versions, api_specifications), APIM-GATEWAY-RUNTIME (api_gateways, api_deployments, api_policies), APIM-CONSUMER-MGMT (api_consumers, api_usage_metrics), APIM-DEVELOPER-PORTAL (developer_portals, api_documentation, api_products if Phase 0 promotes them). (b) 3 modules: collapse design + portal into APIM-DESIGN-AND-PORTAL, keep gateway-runtime and consumer-mgmt distinct. (c) 2 modules: APIM-CONTROL-PLANE vs APIM-DATA-PLANE. With 6 to 8 capabilities expected (B1B-S2), M2 requires at least 2 full modules under any shape; (a) mirrors how Apigee, Kong Konnect, and Azure APIM market their product surfaces."
    options:
      - "(a) 4 modules"
      - "(b) 3 modules"
      - "(c) 2 modules"
    why: "Editorial / product-shape decision; informs B1B-S1 module set, B1B-S2 capability attachments, B1B-S10 lifecycle-state realizing modules, B1B-S12 per-module skills, B1B-S13 tools."
  - id: B2-S2
    summary: "Re-evaluate B4 pattern flags on 4 APIM masters (Rule #12)."
    question: "Approve or reject each proposed positive flip? (1) api_specifications.has_submit_lock=true (published specs freeze so contract tests pin to immutable revision); (2) api_specifications.has_single_approver=true (one API product owner approves the breaking-change checklist); (3) api_policies.has_single_approver=true (one platform-engineering reviewer per policy); (4) api_consumers.has_personal_content=true (developer contact details are personal data subject to GDPR). api_versions, api_deployments, api_usage_metrics, api_gateways stay false."
    options:
      - "Approve all 4"
      - "Approve subset (specify)"
      - "Reject all"
    why: "Pattern flags are workflow-shape judgments. Rule #15 forbids recording the consideration in notes; decisions are captured in this audit file."
  - id: B2-S3
    summary: "Pick regulation set for APIM (A2 / domain_regulations gap)."
    question: "Which regulations should attach to APIM? (a) GDPR + SOX + PCI-DSS (broad); (b) GDPR only (developer-personal-data anchor); (c) leave empty (regulation-light market)."
    options:
      - "(a) GDPR + SOX + PCI-DSS"
      - "(b) GDPR only"
      - "(c) leave empty"
    why: "domain_regulations for APIM is empty. APIM is not regulation-mandated like ATS is for FCRA, but consumer-facing APIs and developer-portal personal data fall under GDPR; policy / audit logs on gateways are SOX / PCI-DSS load-bearing for regulated industries. B2-S3 informs B2-S2 (GDPR confirmation makes api_consumers.has_personal_content=true more clearly correct)."

b3:
  - id: B3-S1
    summary: "Phase 0 vendor research: confirm missing APIM substrate entities (api_products, api_subscriptions, oauth_clients, developer_portals, api_audit_logs, api_rate_limits, api_quotas, backends, api_change_proposals)."
    candidate: "Missing APIM substrate entities"
    rationale: "The 7 currently-loaded masters (api_versions, api_specifications, api_deployments, api_policies, api_usage_metrics, api_gateways, api_consumers) are the headline-noun set. Flagship vendors uniformly model a workflow substrate beneath: api_products (developer-facing SKU bundling specs under one consumption contract; Apigee API Product, Kong Service-bundle, Azure APIM Product, IBM Product, MuleSoft API Group), api_subscriptions + api_plans (pairs consumer to product with rate plan; Apigee API Plan, Azure APIM Subscription, IBM Plan, MuleSoft Contract), api_keys (universal; distinct from broader oauth_clients), oauth_clients (Apigee Developer App, Kong OAuth2 Plugin app, Azure APIM AAD-app), developer_portals (configured portal instance per environment), api_documentation (rendered docs and SDKs; some vendors keep separate from spec), api_audit_logs (gateway access + admin events; regulation-load-bearing), api_rate_limits + api_quotas (separable config from broader api_policies), backends / upstream_services (origin services the gateway routes to; Kong Service, Apigee Target Server, Azure APIM Backend), api_categories / api_taxonomies (portal-side discoverability), api_change_proposals (governed change-management for breaking changes; Apigee Hub, Postman API Network)."
    vendor_evidence:
      - Apigee
      - Kong Konnect
      - MuleSoft Anypoint
      - Azure API Management
      - AWS API Gateway
      - IBM API Connect
      - Postman API Platform
    proposed_module: "Multiple; attach per B2-S1 module shape (api_products + api_subscriptions to APIM-CONSUMER-MGMT, oauth_clients + api_audit_logs candidate for API-SEC re-route, developer_portals + api_documentation + api_categories to APIM-DEVELOPER-PORTAL if (a) chosen)"
    extra_cross_check: "Coordinate with API-SEC, EVENT-BROKER, and SERVICE-MESH candidates queued in audits/_missing-domains.md. If API-SEC promotes, api_audit_logs + api_threat_signals route there; if EVENT-BROKER promotes, async-API artifacts route there."
