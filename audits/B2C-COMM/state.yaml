b2:
  - id: B2-S1
    summary: payment_transactions / commerce_orders / checkouts has_personal_content flag flip.
    question: Should has_personal_content flip to true on payment_transactions (PCI / PII content), commerce_orders, and checkouts (shipping_address PII)?
    options:
      - "(a) flip true on all three"
      - "(b) flip true on payment_transactions only"
      - "(c) leave false (PCI handled by gateway, PII deferred to a future customer_addresses entity)"
    why: B4 flag is structural; PCI-DSS and CCPA / GDPR treat cardholder + shipping-address content as PII.
  - id: B2-S3
    summary: parent_domain_id=69 (CRM) on B2C-COMM. Should it be NULL?
    question: Digital Commerce flagship vendors sell as standalone markets, not as CRM extensions. Keep the CRM parent link, clear to NULL, or set a different parent?
    options:
      - "(a) clear to NULL"
      - "(b) keep CRM parent as curated affinity / cluster signal"
      - "(c) different parent (no obvious candidate)"
    why: Point-solution-market test does not treat B2C-COMM as a CRM sub-domain.
  - id: B2-S4
    summary: COMM-B2B-COMM capability ownership override (Sales vs Marketing).
    question: Should business_function_capabilities carry a Sales-owner / Marketing-contributor override on COMM-B2B-COMM, distinct from the domain-level Marketing-owner / Sales-contributor RACI?
    options:
      - "(a) yes, override to Sales-owner / Marketing-contributor on COMM-B2B-COMM"
      - "(b) no, domain-level RACI is sufficient"
      - "(c) split B2B into its own module and let module-level ownership carry the override"
    why: COMM-B2B-COMM capability is B2B-shaped (account hierarchies, requisition lists, quote-to-order) and plausibly Sales-owned. It is currently realized inside B2C-COMM-ORDER-CAPTURE (module 214); a future split could carve a dedicated B2B module. Interacts with B3-S4 if B2B is elevated to its own domain.
  - id: B2-S8
    summary: H1 refinement requests on h80 / h505 / h66.
    question: Refine h80 (substring match too coarse for segment.activated), h505 (currently 738 "Determine fulfillment process"; LOYALTY destination suggests "Manage customer loyalty programs"), and h66 (substring "Manage Customer Service" coarse for customer.signed_up to CRM) via DELETE + INSERT?
    options:
      - "(a) refine all three (DELETE existing + INSERT tighter PCF)"
      - "(b) refine selectively (list which)"
      - "(c) skip, accept coarse rows and surface in Discover later"
    why: DELETE + INSERT pairs are judgment per audit procedure rule that refinements route to user decision.
b3:
  - id: B3-S1
    candidate: catalog substrate cluster (product_variants, product_categories, catalog_attributes)
    rationale: |
      Every flagship vendor schema (Shopify Plus Variant, BigCommerce Variant, commercetools ProductVariant, Adobe Commerce ConfigurableProduct + SimpleProduct, Saleor ProductVariant) carries product_variants as the SKU-level row distinct from products. Likewise product_categories / collections (the catalog tree) and catalog_attributes (the attribute schema). Single biggest gap in the catalog-merch slice. Highest blast radius on B2C-COMM-CATALOG-MERCH (module 213).
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - commercetools
      - Adobe Commerce
      - Saleor
    proposed_module: B2C-COMM-CATALOG-MERCH
  - id: B3-S2
    candidate: payments / pricing / tax cluster (payment_methods, price_books, pricing_tiers, tax_calculations, tax_rates, gift_cards, shipping_methods, shipping_zones, shipping_rates)
    rationale: |
      Flagship surface across Shopify (TaxLine, Discount, ShippingLine), BigCommerce (TaxClass, PriceList, GiftCertificate), commercetools (TaxCategory, ShippingMethod, ShippingZone). Some candidates may belong on adjacent domains (tax_engines on a TAX-COMPLIANCE domain, payment_methods on PAYMENTS); defer if Phase 0 shows clean ownership boundaries elsewhere. Would land in B2C-COMM-ORDER-CAPTURE (module 214) or split.
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - commercetools
      - Adobe Commerce
    proposed_module: B2C-COMM-ORDER-CAPTURE
  - id: B3-S3
    candidate: post-purchase / returns / reviews cluster (returns, rma_requests, refunds_requests, product_reviews, product_ratings, wishlists, saved_carts)
    rationale: |
      Flagship surface: Shopify (Return / RefundRequest / ProductReview pre-Yotpo era), BigCommerce (RmaRequest), Adobe Commerce (RmaRequest, ProductReview), commercetools (Return / ReturnInfo). Returns may belong on OMS in some architectures; reviews may belong on a separate VOC / customer-feedback domain. Returns / RMAs would land in B2C-COMM-FULFILL-SHIP (module 215); reviews / wishlists in B2C-COMM-CATALOG-MERCH (module 213).
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - Adobe Commerce
      - commercetools
    proposed_module: B2C-COMM-FULFILL-SHIP
  - id: B3-S4
    candidate: B2B commerce surface (b2b_accounts, company_accounts, buyer_groups, quotes, requisition_lists, contracts, purchase_approvals, customer_addresses)
    rationale: |
      Flagship surface: Salesforce Commerce Cloud B2B, SAP Commerce Cloud (Hybris B2B), commercetools B2B-Commerce, BigCommerce B2B Edition, Adobe Commerce B2B. COMM-B2B-COMM is currently realized inside B2C-COMM-ORDER-CAPTURE (module 214); if this cluster lands and the user keeps the capability in B2C-COMM, candidate ships into a dedicated B2B module (splitting 214) or into 214 directly. If user elevates B2B to its own domain (B2B-COMM), candidate moves to that new domain's Phase 0; B2-S4 dissolves.
    vendor_evidence:
      - Salesforce Commerce Cloud
      - SAP Commerce Cloud
      - commercetools
      - BigCommerce
      - Adobe Commerce
    proposed_module: B2C-COMM-ORDER-CAPTURE (or a new dedicated B2B module / new B2B-COMM domain)
  - id: B3-MISSING-MASTER-CANDIDATES
