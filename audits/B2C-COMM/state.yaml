b2:
  - id: B2-S1
    summary: payment_transactions / commerce_orders / checkouts has_personal_content flag flip.
    question: Should has_personal_content flip to true on payment_transactions (PCI / PII content), commerce_orders, and checkouts (shipping_address PII)?
    options:
      - "(a) flip true on all three"
      - "(b) flip true on payment_transactions only"
      - "(c) leave false (PCI handled by gateway, PII deferred to a future customer_addresses entity)"
    why: B4 flag is structural; PCI-DSS and CCPA / GDPR treat cardholder + shipping-address content as PII.

  - id: B2-S3
    summary: parent_domain_id=69 (CRM) on B2C-COMM. Should it be NULL?
    question: Digital Commerce flagship vendors sell as standalone markets, not as CRM extensions. Keep the CRM parent link, clear to NULL, or set a different parent?
    options:
      - "(a) clear to NULL"
      - "(b) keep CRM parent as curated affinity / cluster signal"
      - "(c) different parent (no obvious candidate)"
    why: Point-solution-market test does not treat B2C-COMM as a CRM sub-domain.

  - id: B2-S4
    summary: COMM-B2B-COMM capability ownership override (Sales vs Marketing).
    question: Should business_function_capabilities carry a Sales-owner / Marketing-contributor override on COMM-B2B-COMM, distinct from the domain-level Marketing-owner / Sales-contributor RACI?
    options:
      - "(a) yes, override to Sales-owner / Marketing-contributor on COMM-B2B-COMM"
      - "(b) no, domain-level RACI is sufficient"
      - "(c) split B2B into its own module under B1B-S2-MODULES and let module-level ownership carry the override"
    why: COMM-B2B-COMM capability is B2B-shaped (account hierarchies, requisition lists, quote-to-order) and plausibly Sales-owned. Interacts with B3-S4 if B2B is elevated to its own domain.

  - id: B2-S5
    summary: 3-vs-4 module split for B1B-S2-MODULES.
    question: Take the 3-module split (B2C-COMM-CATALOG-MERCH, B2C-COMM-ORDER-CAPTURE, B2C-COMM-FULFILL-SHIP) as the default, or hold for 4-module (add B2C-COMM-B2B starter) or 2-module (fold fulfill / ship into order-capture)?
    options:
      - "(a) 3-module split (recommended)"
      - "(b) 4-module split (add B2B starter)"
      - "(c) 2-module split (fold fulfill / ship into order-capture)"
    why: Flagship pattern varies; 3-module is the safer default.

  - id: B2-S6
    summary: fulfillments / commerce_shipments master partitioning.
    question: If 2-module split (B2-S5 option c), fulfillments / commerce_shipments master in B2C-COMM-ORDER-CAPTURE. If 3-module split, they master in B2C-COMM-FULFILL-SHIP and B2C-COMM-ORDER-CAPTURE ships embedded shells. Confirm partitioning before B1B-S2 loads.
    options:
      - "(a) fulfillments / shipments master in B2C-COMM-FULFILL-SHIP (with embedded shells in order-capture)"
      - "(b) fulfillments / shipments master in B2C-COMM-ORDER-CAPTURE (no fulfill-ship module)"
    why: Loader payload for B1B-S2-MODULES differs by partitioning choice.

  - id: B2-S7
    summary: A4 catalog_tagline + catalog_description buyer-voice copy approval.
    question: Provide the exact buyer-voice text for catalog_tagline (single sentence) and catalog_description (1-3 paragraphs) for domains.id=71. Rule #20 requires workflow + value voice, not analyst voice.
    options:
      - "(a) agent drafts both per Rule #20 voice rule, user approves verbatim before write"
      - "(b) user provides exact text upfront"
    why: Rule #20 forbids overwriting non-empty values and requires per-row user approval on drafts. Current value is empty so backfill is allowed once wording approved.

  - id: B2-S8
    summary: H1 refinement requests on h80 / h505 / h66.
    question: Refine h80 (substring match too coarse for segment.activated), h505 (currently 738 "Determine fulfillment process"; LOYALTY destination suggests "Manage customer loyalty programs"), and h66 (substring "Manage Customer Service" coarse for customer.signed_up to CRM) via DELETE + INSERT?
    options:
      - "(a) refine all three (DELETE existing + INSERT tighter PCF)"
      - "(b) refine selectively (list which)"
      - "(c) skip, accept coarse rows and surface in Discover later"
    why: DELETE + INSERT pairs are judgment per audit procedure rule that refinements route to user decision.

b3:
  - id: B3-S1
    candidate: catalog substrate cluster (product_variants, product_categories, catalog_attributes)
    rationale: |
      Every flagship vendor schema (Shopify Plus Variant, BigCommerce Variant, commercetools ProductVariant, Adobe Commerce ConfigurableProduct + SimpleProduct, Saleor ProductVariant) carries product_variants as the SKU-level row distinct from products. Likewise product_categories / collections (the catalog tree) and catalog_attributes (the attribute schema). Single biggest gap in the catalog-merch slice. Highest blast radius on the B1B-S2-MODULES shape.
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - commercetools
      - Adobe Commerce
      - Saleor
    proposed_module: B2C-COMM-CATALOG-MERCH

  - id: B3-S2
    candidate: payments / pricing / tax cluster (payment_methods, price_books, pricing_tiers, tax_calculations, tax_rates, gift_cards, shipping_methods, shipping_zones, shipping_rates)
    rationale: |
      Flagship surface across Shopify (TaxLine, Discount, ShippingLine), BigCommerce (TaxClass, PriceList, GiftCertificate), commercetools (TaxCategory, ShippingMethod, ShippingZone). Some candidates may belong on adjacent domains (tax_engines on a TAX-COMPLIANCE domain, payment_methods on PAYMENTS); defer if Phase 0 shows clean ownership boundaries elsewhere.
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - commercetools
      - Adobe Commerce
    proposed_module: B2C-COMM-ORDER-CAPTURE

  - id: B3-S3
    candidate: post-purchase / returns / reviews cluster (returns, rma_requests, refunds_requests, product_reviews, product_ratings, wishlists, saved_carts)
    rationale: |
      Flagship surface: Shopify (Return / RefundRequest / ProductReview pre-Yotpo era), BigCommerce (RmaRequest), Adobe Commerce (RmaRequest, ProductReview), commercetools (Return / ReturnInfo). Returns may belong on OMS in some architectures; reviews may belong on a separate VOC / customer-feedback domain.
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - Adobe Commerce
      - commercetools
    proposed_module: B2C-COMM-FULFILL-SHIP

  - id: B3-S4
    candidate: B2B commerce surface (b2b_accounts, company_accounts, buyer_groups, quotes, requisition_lists, contracts, purchase_approvals, customer_addresses)
    rationale: |
      Flagship surface: Salesforce Commerce Cloud B2B, SAP Commerce Cloud (Hybris B2B), commercetools B2B-Commerce, BigCommerce B2B Edition, Adobe Commerce B2B. If B2C-COMM keeps COMM-B2B-COMM capability, candidate ships into B2C-COMM-B2B starter (per B2-S5 option b). If user elevates B2B to its own domain (B2B-COMM), candidate moves to that new domain's Phase 0; B2-S4 dissolves.
    vendor_evidence:
      - Salesforce Commerce Cloud
      - SAP Commerce Cloud
      - commercetools
      - BigCommerce
      - Adobe Commerce
    proposed_module: B2C-COMM-B2B (if B2-S5 option b) or new B2B-COMM domain
