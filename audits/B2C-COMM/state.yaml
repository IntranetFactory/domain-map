# All agent-buildable corrective gap-fill is DONE (verified live 2026-06-13): intra-domain
# master-master relationships, users-edges (Rule #10), aliases, lifecycle states, and the
# outbound handoff source_domain_module_id backfill are all present in the catalog. B9d ran
# this pass in BOTH directions. Everything still open below is user-gated: b2 decisions,
# destructive sign-offs, deferred-research (b3), or blocked-on-neighbor.
b1b:
  - id: B1B-H1-DEFER-DISCOVER
    summary: 4 handoffs route to Discover Pass 3 custom-process authoring (no clean cross-industry PCF).
    finding: |
      h75 (storefront.interaction -> CDP), h327 (cart.abandoned -> MA), h328 (checkout.started -> MA), h812 (personalization_rule.activated, DXP -> B2C-COMM) all lack a clean cross-industry PCF match. They currently carry coarse parent tags (75/480/529 -> 100 "Develop customer experience strategy"; 327/328 -> 23 "Develop and manage marketing plans"; 812 -> 677). They belong on the Discover Pass 3 custom-process queue (digital-experience / marketing-trigger primitives) for a tighter tag.
    blocked_by:
      - {type: catalog_addition, scope: custom_processes, trigger: Discover Pass 3 custom-process queue}
    affected_handoffs:
      - {handoff_id: 75, direction: outbound, source_domain: B2C-COMM, target_domain: CDP, trigger_event: storefront.interaction, payload: customer_events}
      - {handoff_id: 327, direction: outbound, source_domain: B2C-COMM, target_domain: MA, trigger_event: cart.abandoned, payload: carts}
      - {handoff_id: 328, direction: outbound, source_domain: B2C-COMM, target_domain: MA, trigger_event: checkout.started, payload: checkouts}
      - {handoff_id: 812, direction: inbound, source_domain: DXP, target_domain: B2C-COMM, trigger_event: personalization_rule.activated, payload: personalization_rules}
  - id: B1B-S9-INBOUND-MODULE-FK
    summary: 11 inbound handoffs into B2C-COMM still carry target_domain_module_id=NULL; the payload is a foreign-mastered record B2C-COMM does not declare a DMDO row for, so the FK is not a mechanical backfill but a scope decision (see B2-B9D-CONSUME).
    finding: |
      11 inbound handoffs (93, 96, 480, 498, 529, 812, 982, 984, 986, 990, 993) carry target_domain_module_id=NULL on the B2C-COMM side. Unlike the outbound FKs (already backfilled) and the 5 inbound rows that resolved cleanly (80, 492, 1059, 1234, 1237 -> module 213/214 via existing DMDO), these 11 name payloads B2C-COMM does NOT model on any module: content_entries / content_releases (HCMS/CMS internals), customer_journeys / customer_attributes (CDP internals), redemption_transactions (LOYALTY), personalization_rules (DXP), inventory_locations / order_allocations / sourcing_decisions / store_pickup_orders (OMS internals). B10b sub-case 2: either add a consumer DMDO row on the receiving B2C-COMM module (which expands B2C-COMM's footprint to consume those internals) or accept the handoff as a domain-level signal with no module owner. This is a scope judgment, surfaced as B2-B9D-CONSUME.
    blocked_by:
      - {type: user_decision, ref: B2-B9D-CONSUME}
    affected_handoffs:
      - {handoff_id: 93, source_domain: HCMS, payload: content_entries}
      - {handoff_id: 96, source_domain: HCMS, payload: content_releases}
      - {handoff_id: 480, source_domain: CDP, payload: customer_journeys}
      - {handoff_id: 498, source_domain: LOYALTY, payload: redemption_transactions}
      - {handoff_id: 529, source_domain: CDP, payload: customer_attributes}
      - {handoff_id: 812, source_domain: DXP, payload: personalization_rules}
      - {handoff_id: 982, source_domain: OMS, payload: inventory_locations}
      - {handoff_id: 984, source_domain: OMS, payload: order_allocations}
      - {handoff_id: 986, source_domain: OMS, payload: order_allocations}
      - {handoff_id: 990, source_domain: OMS, payload: sourcing_decisions}
      - {handoff_id: 993, source_domain: OMS, payload: store_pickup_orders}
b2:
  - id: B2-S1
    summary: payment_transactions / commerce_orders / checkouts has_personal_content flag flip.
    question: Should has_personal_content flip to true on payment_transactions (PCI / PII content), commerce_orders, and checkouts (shipping_address PII)?
    options:
      - "(a) flip true on all three"
      - "(b) flip true on payment_transactions only"
      - "(c) leave false (PCI handled by gateway, PII deferred to a future customer_addresses entity)"
    why: B4 flag is structural; PCI-DSS and CCPA / GDPR treat cardholder + shipping-address content as PII.
  - id: B2-S3
    summary: parent_domain_id=69 (CRM) on B2C-COMM. Should it be NULL?
    question: Digital Commerce flagship vendors sell as standalone markets, not as CRM extensions. Keep the CRM parent link, clear to NULL, or set a different parent?
    options:
      - "(a) clear to NULL"
      - "(b) keep CRM parent as curated affinity / cluster signal"
      - "(c) different parent (no obvious candidate)"
    why: Point-solution-market test does not treat B2C-COMM as a CRM sub-domain.
  - id: B2-S4
    summary: COMM-B2B-COMM capability ownership override (Sales vs Marketing).
    question: Should business_function_capabilities carry a Sales-owner / Marketing-contributor override on COMM-B2B-COMM, distinct from the domain-level Marketing-owner / Sales-contributor RACI?
    options:
      - "(a) yes, override to Sales-owner / Marketing-contributor on COMM-B2B-COMM"
      - "(b) no, domain-level RACI is sufficient"
      - "(c) split B2B into its own module and let module-level ownership carry the override"
    why: COMM-B2B-COMM capability is B2B-shaped (account hierarchies, requisition lists, quote-to-order) and plausibly Sales-owned. It is currently realized inside B2C-COMM-ORDER-CAPTURE (module 214); a future split could carve a dedicated B2B module. Interacts with B3-S4 if B2B is elevated to its own domain.
  - id: B2-B9D-RETAG
    summary: "B9d found 7 coarse handoff_processes tags on B2C-COMM-authored handoffs with a more specific PCF code available on the same entity. Re-pointing replaces an existing non-empty tag (destructive overwrite, Rule #21), so it needs sign-off."
    question: "Re-point the 7 coarse tags to their tighter PCF codes (DELETE-then-INSERT the handoff_processes row)?"
    options:
      - "(a) re-point all 7"
      - "(b) re-point a named subset"
      - "(c) skip, accept the coarse rows"
    why: |
      B9d (run 2026-06-13, both directions) flagged these as ROLL-UP/RE-TAG: the work is realized at a finer grain than the tag. Each is a B2C-COMM-side SOURCE edit (B2C-COMM authored the tag). Proposed re-points:
      - h66 (B2C-COMM->CRM, customers): 6.0 "Manage Customer Service" -> 3.3.4 "Develop and manage promotional activities".
      - h504 (B2C-COMM->CDP, commerce_products): 1.2.8 "Develop customer experience strategy" -> 4.4.3.3 "Track product availability".
      - h1237 (PIM->B2C-COMM, commerce_products): 2.1.2 "Manage product and service life cycle" -> 4.4.3.3 "Track product availability".
      - h1234 (PIM->B2C-COMM, commerce_products): 2.1.4 "Manage product and service master data" -> 4.4.3.3 "Track product availability".
      - h324 (B2C-COMM->LOYALTY, commerce_orders): 3.2.7 "Design and manage customer loyalty program" -> 3.5.4.1 "Accept and validate sales orders".
      - h323 + h331 (B2C-COMM->CRM / SUB-MGMT, commerce_orders): 3.5.4 "Manage sales orders" -> 3.5.4.1 "Accept and validate sales orders".
      - h330 (B2C-COMM->CSM, commerce_orders): 6.2.2 "Manage customer service problems, requests, and inquiries" -> 3.5.4.1 "Accept and validate sales orders".
      Supersedes the prior B2-S8 / B1B-H1-CSM-COARSE refinement items (same handoffs, now driven by the B9d classification).
  - id: B2-B9D-RACI
    summary: "B9d found 6 B2C-COMM-owned ORPHAN processes (handed work with no Responsible/Accountable persona). B2C-COMM has 3 personas (MARKETING-MERCHANDISER, COMMERCE-OPERATOR, OPERATIONS-FULFILLMENT-SPECIALIST) but zero process_raci and zero process_id-wired lifecycle gates, so the RACI layer (E4/E6/B9e) is unauthored. Assigning R/A per process is a judgment call."
    question: "For each of the 6 B2C-COMM-owned processes a neighbor hands work to, which persona is Responsible and which is Accountable, and which lifecycle state realizes it (so the gate's process_id can be wired)?"
    options:
      - "(a) accept the recommended persona mapping below for all 6"
      - "(b) assign a named persona per process"
      - "(c) defer RACI authoring for this domain"
    why: |
      B9d ORPHAN findings on B2C-COMM-owned processes (each is real handed-in work with nobody responsible):
      - pid 23 "Develop and manage marketing plans" (carts/checkouts/coupons -> MA, h327/h328/h506). Recommended R/A: MARKETING-MERCHANDISER.
      - pid 735 "Accept and validate sales orders" (commerce_orders/order_lines -> OMS, h322/h502). Recommended R/A: COMMERCE-OPERATOR.
      - pid 738 "Determine fulfillment process" (fulfillments -> LOYALTY/FIN, h505/h503). Recommended R/A: OPERATIONS-FULFILLMENT-SPECIALIST.
      - pid 854 "Track product availability" (commerce_products <- INV-MGMT, h1059). Recommended R/A: MARKETING-MERCHANDISER (catalog/merch) or COMMERCE-OPERATOR.
      - pid 1359 "Post AR activity to the general ledger" (payment_transactions -> FIN, h325). Likely a FIN-owned process consumed here; recommended: C/I for B2C-COMM personas, R/A on FIN. Surface as cross-domain seam.
      - pid 1422 "Process and distribute payments" (payment_transactions/commerce_orders -> CRM/FIN, h329/h326). Recommended R/A: COMMERCE-OPERATOR (or FIN if treated as a FIN process).
      Authoring process_raci + wiring data_object_lifecycle_states.process_id is additive (record_status='new') once the persona mapping is decided; the decision is which persona, hence b2.
  - id: B2-B9D-CONSUME
    summary: "Scope decision for the 11 NULL inbound handoff module FKs (B1B-S9): should B2C-COMM declare consumer DMDO rows for the foreign-mastered payloads it reacts to, or treat each as a domain-level signal with no module owner?"
    question: "For the 11 inbound handoffs whose payload B2C-COMM does not model (content_entries, content_releases, customer_journeys, customer_attributes, redemption_transactions, personalization_rules, inventory_locations, order_allocations x2, sourcing_decisions, store_pickup_orders), add consumer DMDO rows so the target_domain_module_id resolves, or accept them as domain-level signals?"
    options:
      - "(a) add consumer DMDO rows for all (expands B2C-COMM footprint to consume those internals)"
      - "(b) add consumer rows only for the OMS allocation/sourcing/pickup set (the fulfillment-relevant reads) on module 215, and leave CDP/CMS/DXP internals as domain-level signals"
      - "(c) accept all 11 as domain-level signals; leave target_domain_module_id NULL"
    why: B10b sub-case 2 (handoff names a payload the target domain does not model) is explicitly a load-a-consumer-row-vs-accept-as-domain-signal judgment. Adding consumer DMDO rows is expansive footprint (Rule #21 expansive-additions gate), so it routes to the user rather than auto-loading.
  - id: B2-B9D-OWN-100
    summary: "Digital Commerce: name an owner for \"Develop customer experience strategy\" (no one is responsible for it today)"
    question: |
      Customer Data Platform hands work to Digital Commerce, but Digital Commerce has no one assigned to develop customer experience strategy, so that step currently has nobody responsible for it. Who should own it?
    options:
      - "The a named owner runs it and approves it."
      - "Someone else you name runs and approves it."
      - "Leave it unassigned for now."
    why: |
      Digital Commerce already assigns the a named owner to work of this kind, so (a) fills this gap the same way and gives the work a named owner. Surfaced as q-B2C-COMM.md q9.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-115
    summary: "Digital Commerce: name an owner for \"Manage product and service master data\" (no one is responsible for it today)"
    question: |
      Customer Data Platform hands work to Digital Commerce, but Digital Commerce has no one assigned to manage product and service master data, so that step currently has nobody responsible for it. Who should own it?
    options:
      - "The a named owner runs it and approves it."
      - "Someone else you name runs and approves it."
      - "Leave it unassigned for now."
    why: |
      Digital Commerce already assigns the a named owner to work of this kind, so (a) fills this gap the same way and gives the work a named owner. Surfaced as q-B2C-COMM.md q10.
    extra_b9d_added: "2026-06-13"
b3:
  - id: B3-S1
    candidate: catalog substrate cluster (product_variants, product_categories, catalog_attributes)
    rationale: |
      Every flagship vendor schema (Shopify Plus Variant, BigCommerce Variant, commercetools ProductVariant, Adobe Commerce ConfigurableProduct + SimpleProduct, Saleor ProductVariant) carries product_variants as the SKU-level row distinct from products. Likewise product_categories / collections (the catalog tree) and catalog_attributes (the attribute schema). Single biggest gap in the catalog-merch slice. Highest blast radius on B2C-COMM-CATALOG-MERCH (module 213).
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - commercetools
      - Adobe Commerce
      - Saleor
    proposed_module: B2C-COMM-CATALOG-MERCH
  - id: B3-S2
    candidate: payments / pricing / tax cluster (payment_methods, price_books, pricing_tiers, tax_calculations, tax_rates, gift_cards, shipping_methods, shipping_zones, shipping_rates)
    rationale: |
      Flagship surface across Shopify (TaxLine, Discount, ShippingLine), BigCommerce (TaxClass, PriceList, GiftCertificate), commercetools (TaxCategory, ShippingMethod, ShippingZone). Some candidates may belong on adjacent domains (tax_engines on a TAX-COMPLIANCE domain, payment_methods on PAYMENTS); defer if Phase 0 shows clean ownership boundaries elsewhere. Would land in B2C-COMM-ORDER-CAPTURE (module 214) or split.
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - commercetools
      - Adobe Commerce
    proposed_module: B2C-COMM-ORDER-CAPTURE
  - id: B3-S3
    candidate: post-purchase / returns / reviews cluster (returns, rma_requests, refunds_requests, product_reviews, product_ratings, wishlists, saved_carts)
    rationale: |
      Flagship surface: Shopify (Return / RefundRequest / ProductReview pre-Yotpo era), BigCommerce (RmaRequest), Adobe Commerce (RmaRequest, ProductReview), commercetools (Return / ReturnInfo). Returns may belong on OMS in some architectures; reviews may belong on a separate VOC / customer-feedback domain. Returns / RMAs would land in B2C-COMM-FULFILL-SHIP (module 215); reviews / wishlists in B2C-COMM-CATALOG-MERCH (module 213).
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - Adobe Commerce
      - commercetools
    proposed_module: B2C-COMM-FULFILL-SHIP
  - id: B3-S4
    candidate: B2B commerce surface (b2b_accounts, company_accounts, buyer_groups, quotes, requisition_lists, contracts, purchase_approvals, customer_addresses)
    rationale: |
      Flagship surface: Salesforce Commerce Cloud B2B, SAP Commerce Cloud (Hybris B2B), commercetools B2B-Commerce, BigCommerce B2B Edition, Adobe Commerce B2B. COMM-B2B-COMM is currently realized inside B2C-COMM-ORDER-CAPTURE (module 214); if this cluster lands and the user keeps the capability in B2C-COMM, candidate ships into a dedicated B2B module (splitting 214) or into 214 directly. If user elevates B2B to its own domain (B2B-COMM), candidate moves to that new domain's Phase 0; B2-S4 dissolves.
    vendor_evidence:
      - Salesforce Commerce Cloud
      - SAP Commerce Cloud
      - commercetools
      - BigCommerce
      - Adobe Commerce
    proposed_module: B2C-COMM-ORDER-CAPTURE (or a new dedicated B2B module / new B2B-COMM domain)
  - id: B3-MISSING-MASTER-CANDIDATES
    candidate: aggregate missing-master flag surfaced by the modularization pass
    rationale: |
      The 3-module split is structurally complete against the EXISTING 10 masters, but the flagship vendor surface implies the catalog is materially incomplete. The highest-confidence missing masters by module: B2C-COMM-CATALOG-MERCH (213) lacks product_variants (SKU-level row under commerce_products), product_categories, catalog_attributes (B3-S1, high confidence, every flagship). B2C-COMM-ORDER-CAPTURE (214) lacks payment_methods, price_books, tax_calculations, gift_cards, shipping_methods (B3-S2). B2C-COMM-FULFILL-SHIP (215) lacks returns / rma_requests as a distinct lifecycle from commerce_order.refunded (B3-S3). These do not block deployability of the current modules but cap their realism.
    vendor_evidence:
      - Shopify Plus
      - BigCommerce
      - commercetools
      - Adobe Commerce
      - Saleor
    proposed_module: B2C-COMM-CATALOG-MERCH (product_variants, highest blast radius first)
