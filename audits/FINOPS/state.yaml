  - id: B3-CLOUD-COST-BUDGETS
    candidate: cloud_cost_budgets as FINOPS master (prefixed to avoid Rule #9 collision with EPM financial_budgets)
    rationale: "5 of 5 sample vendors. Per-team / per-product / per-tag rolling cost budgets that drive the threshold-breach event. Naming risk: substring collision with EPM financial_budgets requires the cloud_ prefix."
    vendor_evidence: [Apptio Cloudability, CloudHealth, Vantage, CloudZero, Finout]
    proposed_module: FINOPS-COST-ANALYTICS

