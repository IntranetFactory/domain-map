      - "(c) Defer the build; keep FINOPS as an unbuilt stub for now."
    why: "Rule #21: a split / new-module shape is a b2 decision, never an agent auto-scaffold. UNBUILT domains are not scaffolded by an audit pass."
    depends_on_for_cascade: [B1A-M1, B1A-A2, B1A-B-DMDO, B1A-DOMAIN-SKILL, B1A-PHASE-P]

