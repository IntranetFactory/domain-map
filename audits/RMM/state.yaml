b1a:
  - id: B1A-H1
    summary: APQC tag 5 untagged cross-domain handoffs (140, 144, 145, 159, 644) plus REPLACE catch-all on 150
    finding: |
      H1 hard-fail persists. 7 of 12 cross-domain handoffs now carry handoff_processes rows
      (up from 3 at 2026-05-30 audit), 6 agent_curated + 1 discovery_substring, zero
      record_status='approved'. Volume floor for N=12 is 6 agent_curated; current 6 sits at
      the floor. Remaining 5 untagged: 140 (RMM->ITSM monitoring_alert.threshold_breached
      payload service_incidents), 144 (RMM->HAM hardware_endpoint.discovered payload
      hardware_assets), 145 (RMM->SAM software_endpoint.discovered payload
      software_installations), 159 (RMM->MSP-PSA monitoring_alert.threshold_breached
      payload msp_tickets), 644 (RMM->ITSM automation_script.failed payload
      service_incidents). Handoff 150 carries L1 catch-all 19207 "Acquire, Construct, and
      Manage Assets" and is a REPLACE candidate to a tighter L3 (Retire IT assets or
      equivalent).
    action: |
      For each untagged handoff, query
      /processes?process_name=ilike.*<term>*&source_framework=eq.apqc_pcf_cross_industry
      and INSERT (handoff_id, process_id, proposal_source='agent_curated', record_status='new').
      For handoff 150, DELETE the existing handoff_processes row pointing at 19207 then
      INSERT the tighter L3 match (record_status='new', proposal_source='agent_curated').
    affected_handoffs:
      - {handoff_id: 140, direction: outbound, source_domain: RMM, target_domain: ITSM, trigger_event: monitoring_alert.threshold_breached, payload: service_incidents, null_field: handoff_processes}
      - {handoff_id: 144, direction: outbound, source_domain: RMM, target_domain: HAM, trigger_event: hardware_endpoint.discovered, payload: hardware_assets, null_field: handoff_processes}
      - {handoff_id: 145, direction: outbound, source_domain: RMM, target_domain: SAM, trigger_event: software_endpoint.discovered, payload: software_installations, null_field: handoff_processes}
      - {handoff_id: 159, direction: outbound, source_domain: RMM, target_domain: MSP-PSA, trigger_event: monitoring_alert.threshold_breached, payload: msp_tickets, null_field: handoff_processes}
      - {handoff_id: 644, direction: outbound, source_domain: RMM, target_domain: ITSM, trigger_event: automation_script.failed, payload: service_incidents, null_field: handoff_processes}
      - {handoff_id: 150, direction: inbound, source_domain: HAM, target_domain: RMM, trigger_event: asset.retired, payload: rmm_agents, null_field: replace_l1_catchall}

