b2:
  - id: B2-S3
    summary: "monitoring_alerts (85) + monitoring_policies (86) now embedded_master in RMM, mastered by ITOM-INFRA-MON; confirm the slice boundary or split"
    question: |
      The 2026-06-02 modularization resolved the multi-master collision structurally: RMM
      holds monitoring_alerts (85) and monitoring_policies (86) as embedded_master in
      RMM-MONITORING (312); the canonical master is ITOM-INFRA-MON (267). RMM's slice is
      agent-emitted endpoint telemetry; ITOM covers broader APM / log / event sources. Is
      embedded_master the intended end state, or should RMM get endpoint-specific data_objects
      (endpoint_alerts, endpoint_monitoring_policies)?
    options:
      - "a-accept-embedded-master: keep 85/86 as RMM embedded_master, ITOM canonical (current state)"
      - "b-split-endpoint-specific: author endpoint_alerts + endpoint_monitoring_policies as RMM-owned masters (new entities, out of this pass's scope)"
    why: |
      Architectural intent. Blast radius spans ITOM, AIOPS, MSP-PSA, ITSM-EVENT-MGMT. Should be
      coordinated with ITOM b1. The structural collision is no longer a hard fail; this is now a
      modeling-fidelity question.

  - id: B2-S4
    summary: "automation_scripts (225) mastered by RMM-AUTOMATION; TEST-MGMT co-claims at legacy rollup"
    question: |
      automation_scripts (225) is now mastered at module grain by RMM-AUTOMATION (314). The
      legacy domain_data_objects rollup still shows a TEST-MGMT master claim (test-automation
      scripts: Selenium/Playwright/JUnit) vs RMM (endpoint-automation: PowerShell/Bash/Python).
      TEST-MGMT has no module-grain master row yet, so no live collision. Resolve naming before
      TEST-MGMT modularizes: (a) split test_automation_scripts for TEST-MGMT, keep
      automation_scripts for RMM; (b) keep automation_scripts for TEST-MGMT, rename RMM master
      to endpoint_automation_scripts; (c) keep shared.
    options: [a-split-test-prefix, b-split-endpoint-prefix, c-keep-shared]
    why: |
      Naming arbitration per Rule #9 plus architectural intent. Coordinate with TEST-MGMT b1.

  - id: B2-S5
    summary: B4 pattern-flag positive re-evaluation on the RMM-owned masters
    question: |
      rmm_agents, patch_jobs, automation_scripts all have has_personal_content=false,
      has_submit_lock=false, has_single_approver=false. Candidates per Rule #12: (a)
      rmm_agents.has_personal_content=true (agent telemetry includes hostname, logged-in
      username, network info); (b) patch_jobs.has_submit_lock=true (once in_flight/completed,
      schedule should not be re-editable); (c) automation_scripts.has_submit_lock=true once
      published. (monitoring_alerts/policies flags are ITOM's call as canonical master.)
    options: [per-flag-yes-no]
    why: "Pattern flags are workflow-shape judgments the user owns."

  - id: B2-S6
    summary: Rule #12 config-shape exemption for automation_scripts
    question: |
      automation_scripts arguably fits the config-shape exemption (author-once / occasionally-
      edit / record_status is the only state worth tracking). Exempt it (no lifecycle states),
      or author a full draft/active/retired lifecycle? Unblocks B1A-LIFECYCLE-STATES for 225.
    options: [a-exempt, b-full-lifecycle]
    why: "Workflow judgment."

  - id: B2-S7
    summary: RBAC role names and bundle shape
    question: |
      Once lifecycle states land, workflow-gate permissions need bundling onto roles. Proposed:
      RMM-OPERATOR (ack/resolve/suppress alerts), RMM-PATCH-MANAGER (approve/rollback patch
      jobs), RMM-AUTOMATION-AUTHOR (approve/deprecate scripts), RMM-ADMIN (install/uninstall
      agents, deprecate policies). Confirm names + bundle shape.
    options: [confirm-proposed, propose-alternative]
    why: "RBAC design is user's call. Permissions cannot be materialized until lifecycle states land."

  - id: B2-S8
    summary: Cross-cutting modules via domain_module_host_domains
    question: |
      Should any RMM module be hosted via domain_module_host_domains on other domains? (a)
      primary-host-only; (b) host RMM-MONITORING (312) on ITOM; (c) host RMM-AGENT-MGMT (311)
      on UEM.
    options: [a-primary-only, b-host-monitoring-on-itom, c-host-agent-mgmt-on-uem]
    why: "Editorial / product intent. Affects installation coupling."

  - id: B2-S9
    summary: System-skill tool scope per module (Rule #17)
    question: |
      Confirm tool scope for the 4 module system skills (B1A-SYSTEM-SKILLS): RMM-MONITORING
      10-15, RMM-PATCH-MGMT 8-12, RMM-AUTOMATION 6-10, RMM-AGENT-MGMT 8-12. Match / larger /
      smaller?
    options: [a-match, b-larger, c-smaller]
    why: "Skill / tool design is product-shape call. Affects Phase S authoring throughput."

b3:
  - id: B3-AGENT-GROUPS
    candidate: agent_groups
    rationale: |
      NinjaOne, Datto RMM, ConnectWise RMM model endpoint groups as a first-class master
      distinct from agents. Used for bulk policy assignment and reporting.
    vendor_evidence: [NinjaOne, Datto RMM, ConnectWise RMM]
    proposed_module: RMM-AGENT-MGMT

  - id: B3-MONITORING-THRESHOLDS
    candidate: monitoring_thresholds
    rationale: |
      Distinct from monitoring_policies in NinjaOne, ManageEngine (a policy bundles many
      thresholds; threshold is per-metric). Catalog currently folds thresholds into policies.
      Likely an ITOM-side master given ITOM owns monitoring_policies.
    vendor_evidence: [NinjaOne, ManageEngine Endpoint Central]
    proposed_module: RMM-MONITORING

  - id: B3-PATCH-APPROVAL-POLICIES
    candidate: patch_approval_policies
    rationale: |
      Kaseya, Datto, ManageEngine model patch-approval policies as first-class records (which
      CVE classes auto-approve, which need manual approval per customer tier).
    vendor_evidence: [Kaseya VSA, Datto RMM, ManageEngine Endpoint Central]
    proposed_module: RMM-PATCH-MGMT

  - id: B3-MAINTENANCE-WINDOWS
    candidate: maintenance_windows
    rationale: |
      NinjaOne, ConnectWise, N-able model maintenance windows distinct from monitoring_policies.
      Patch jobs and scripts honor maintenance windows.
    vendor_evidence: [NinjaOne, ConnectWise RMM, N-able N-central]
    proposed_module: RMM-PATCH-MGMT

  - id: B3-REMOTE-SESSIONS
    candidate: remote_sessions
    rationale: |
      NinjaOne, Datto, ConnectWise embed remote-control session records distinct from RMM
      agents. REMOTE-ACCESS domain may own this; possible overlap with rmm_agents.
    vendor_evidence: [NinjaOne, Datto RMM, ConnectWise RMM]
    proposed_module: RMM-AGENT-MGMT

  - id: B3-SCRIPT-RUNS
    candidate: script_runs
    rationale: |
      Distinct from automation_scripts in NinjaOne, Atera, Action1. Script = definition;
      script_run = execution event. Currently events 651 / 652 are the only record of execution.
    vendor_evidence: [NinjaOne, Atera, Action1]
    proposed_module: RMM-AUTOMATION

  - id: B3-COMPLIANCE-BASELINES
    candidate: compliance_baselines
    rationale: |
      Action1, ManageEngine, N-able model security baselines (CIS, NIST) distinct from
      monitoring_policies. Drift detection runs against the baseline.
    vendor_evidence: [Action1, ManageEngine Endpoint Central, N-able N-central]
    proposed_module: RMM-MONITORING

  - id: B3-AGENT-INSTALL-PACKAGES
    candidate: agent_install_packages
    rationale: |
      NinjaOne, Action1, Atera ship installer-package records (per-OS, per-architecture, signed
      binaries). Distinct from automation_scripts and rmm_agents.
    vendor_evidence: [NinjaOne, Action1, Atera]
    proposed_module: RMM-AGENT-MGMT

  - id: B3-CUSTOMER-TENANTS
    candidate: customer_tenants
    rationale: |
      All MSP-RMM vendors model the customer tenant (the MSP client organization) as a
      first-class master separate from organizations. Multi-tenant isolation depends on it.
      Likely MSP-PSA territory.
    vendor_evidence: [NinjaOne, Kaseya VSA, Datto RMM, ConnectWise RMM, N-able N-central]
    proposed_module: MSP-PSA

  - id: B3-MISSING-MASTER-RMM-AUTOMATION
    candidate: "script_runs (RMM-AUTOMATION execution-event master gap)"
    rationale: |
      RMM-AUTOMATION (314) currently masters only automation_scripts (the definition). The
      execution-event record (script_runs) is the obvious missing master for the module's
      operational surface: every run's target, parameters, exit code, output, and timestamp.
      Without it the module cannot answer "what ran where and what happened", and the system
      skill (B1A-SYSTEM-SKILLS) has no execution-history tool target. Highest-priority
      missing-master candidate.
    vendor_evidence: [NinjaOne, Atera, Action1, Syncro]
    proposed_module: RMM-AUTOMATION

  - id: B3-MOD-RMM-COMPLIANCE
    candidate: RMM-COMPLIANCE module
    rationale: |
      If compliance_baselines + patch_approval_policies + drift-detection records get loaded, a
      fifth module makes more sense than overloading RMM-MONITORING.
    vendor_evidence: [Action1, ManageEngine Endpoint Central, N-able N-central]
    proposed_module: new-module

  - id: B3-MOD-RMM-REPORTING
    candidate: RMM-REPORTING module (customer-facing dashboards / scheduled reports)
    rationale: |
      MSP-RMM vendors all ship customer-facing dashboard + scheduled report surfaces. If RMM
      models the customer-facing surface, a separate module fits cleanly.
    vendor_evidence: [NinjaOne, ConnectWise RMM]
    proposed_module: new-module

  - id: B3-REG-SOC2
    candidate: SOC 2 attestation regulation applicability
    rationale: |
      MSPs serve regulated customers and inherit SOC 2 obligations on access logging and change
      tracking; entity model unclear (regulations row only, or also a compliance_attestations
      entity).
