schema_version: 2
domain: RMM
status: feedback_needed
next_action_by: agent
last_audit: "2026-06-02"

b1a:
  - id: B1A-SYSTEM-SKILLS
    summary: "Author 1 system skill + tools + skill_tools per RMM module (Rule #17 -> F2/F3); 0 exist today"
    finding: |
      RMM modularized 2026-06-02 into 4 full modules (311 RMM-AGENT-MGMT, 312 RMM-MONITORING,
      313 RMM-PATCH-MGMT, 314 RMM-AUTOMATION) but zero skills.skill_type='system' rows exist
      for any of them. Rule #17 mandates exactly one system skill per domain_modules row, each
      with >=1 skill_tools row. Until authored, F2 (one system skill per module) and F3 (>=1
      tool per skill) fail and the Semantius coverage score is uncomputable (F5). Prior pass
      proposed tool counts (former B2-S9): RMM-MONITORING 10-15 (query/mutate alerts, ack/
      resolve/suppress, threshold eval, send_notification ext, anomaly_score ext);
      RMM-PATCH-MGMT 8-12 (list_available_patches ext, schedule/execute/rollback, query/mutate
      jobs); RMM-AUTOMATION 6-10 (query/mutate scripts, execute_script_on_endpoint ext,
      approve_script gate); RMM-AGENT-MGMT 8-12 (install/uninstall agent ext, list_endpoints,
      mutate config).
    action: |
      Run Phase S against the 4 modules: insert one skills row per module
      (skill_type='system', domain_module_id set, skill_name='<module_code_lower>_agent'),
      its tools, and skill_tools per the Rule #17 three-source derivation (master CRUD +
      lifecycle transitions + outbound-handoff mutates). Tool scope subject to former B2-S9.
    affected_modules: [311, 312, 313, 314]

  - id: B1A-CATALOG-UX
    summary: "Backfill catalog_tagline + catalog_description on domain 130 (A4) and all 4 modules (M8)"
    finding: |
      domains.id=130 and the 4 new domain_modules rows (311-314) were created without
      buyer-facing catalog UX fields. A4 (domain-grain) and M8 (per-module) require a non-empty
      single-sentence catalog_tagline and a 1-3 paragraph buyer-voice catalog_description on
      each. The modularization loader deliberately omitted these per insert shape; they are a
      content-quality backfill, not a structural gate.
    action: |
      Draft catalog_tagline + catalog_description for domain 130 and each of modules 311-314
      in buyer voice (workflow + value, NOT analyst voice / no handoff enumeration), surface
      the drafts to the user for review BEFORE writing, then PATCH per the draft-review-write
      loop (Rule #20).
    affected_modules: [311, 312, 313, 314]

  - id: B1A-HANDOFF-SRC-MODID
    summary: "PATCH source_domain_module_id on 11 outbound RMM handoffs now that modules exist"
    finding: |
      11 outbound cross-domain handoffs carried NULL source_domain_module_id while RMM had no
      modules. With modules 311-314 live the RMM-side source module is now resolvable for each.
      Mapping by payload/trigger: 141 (monitoring_alerts) -> 312; 140 (monitoring_alert ->
      service_incidents) -> 312; 159 (monitoring_alert -> msp_tickets) -> 312; 142/143 (patch_job
      -> service_changes) -> 313; 144 (hardware_endpoint.discovered) -> 311; 145
      (software_endpoint.discovered) -> 311; 146 (ci_endpoint.discovered) -> 311; 147
      (network_device.discovered) -> 311; 644 (automation_script.failed) -> 314; 645
      (automation_script.executed) -> 314.
    action: |
      For each handoff PATCH /handoffs?id=eq.<id> {source_domain_module_id: <module_id>} per
      the mapping above.
    affected_handoffs:
      - {handoff_id: 140, direction: outbound, source_domain: RMM, target_domain: ITSM, trigger_event: monitoring_alert.threshold_breached, payload: service_incidents, null_field: source_domain_module_id}
      - {handoff_id: 141, direction: outbound, source_domain: RMM, target_domain: AIOPS, trigger_event: monitoring_alert.threshold_breached, payload: monitoring_alerts, null_field: source_domain_module_id}
      - {handoff_id: 142, direction: outbound, source_domain: RMM, target_domain: ITSM, trigger_event: patch_job.scheduled, payload: service_changes, null_field: source_domain_module_id}
      - {handoff_id: 143, direction: outbound, source_domain: RMM, target_domain: ITSM, trigger_event: patch_job.completed, payload: service_changes, null_field: source_domain_module_id}
      - {handoff_id: 144, direction: outbound, source_domain: RMM, target_domain: HAM, trigger_event: hardware_endpoint.discovered, payload: hardware_assets, null_field: source_domain_module_id}
      - {handoff_id: 145, direction: outbound, source_domain: RMM, target_domain: SAM, trigger_event: software_endpoint.discovered, payload: software_installations, null_field: source_domain_module_id}
      - {handoff_id: 146, direction: outbound, source_domain: RMM, target_domain: CMDB, trigger_event: ci_endpoint.discovered, payload: configuration_items, null_field: source_domain_module_id}
      - {handoff_id: 147, direction: outbound, source_domain: RMM, target_domain: DISCOVERY, trigger_event: network_device.discovered, payload: discovered_devices, null_field: source_domain_module_id}
      - {handoff_id: 159, direction: outbound, source_domain: RMM, target_domain: MSP-PSA, trigger_event: monitoring_alert.threshold_breached, payload: msp_tickets, null_field: source_domain_module_id}
      - {handoff_id: 644, direction: outbound, source_domain: RMM, target_domain: ITSM, trigger_event: automation_script.failed, payload: service_incidents, null_field: source_domain_module_id}
      - {handoff_id: 645, direction: outbound, source_domain: RMM, target_domain: ITAM, trigger_event: automation_script.executed, payload: automation_scripts, null_field: source_domain_module_id}

  - id: B1A-HANDOFF-TGT-MODID
    summary: "PATCH target_domain_module_id on inbound handoff 150 to RMM-AGENT-MGMT (311)"
    finding: |
      Inbound handoff 150 (HAM asset.retired -> RMM, payload rmm_agents) carried NULL
      target_domain_module_id while RMM had no modules. rmm_agents is mastered by
      RMM-AGENT-MGMT (311), so the RMM-side target module is now resolvable.
    action: "PATCH /handoffs?id=eq.150 {target_domain_module_id: 311}."
    affected_handoffs:
      - {handoff_id: 150, direction: inbound, source_domain: HAM, target_domain: RMM, trigger_event: asset.retired, payload: rmm_agents, null_field: target_domain_module_id}

  - id: B1A-H1
    summary: APQC tag 5 untagged cross-domain handoffs (140, 144, 145, 159, 644) plus REPLACE catch-all on 150
    finding: |
      H1 hard-fail persists. 7 of 12 cross-domain handoffs carry handoff_processes rows,
      6 agent_curated + 1 discovery_substring, zero record_status='approved'. Volume floor for
      N=12 is 6 agent_curated; current 6 sits at the floor. Remaining 5 untagged: 140 (RMM->ITSM
      monitoring_alert.threshold_breached payload service_incidents), 144 (RMM->HAM
      hardware_endpoint.discovered payload hardware_assets), 145 (RMM->SAM
      software_endpoint.discovered payload software_installations), 159 (RMM->MSP-PSA
      monitoring_alert.threshold_breached payload msp_tickets), 644 (RMM->ITSM
      automation_script.failed payload service_incidents). Handoff 150 carries L1 catch-all
      19207 "Acquire, Construct, and Manage Assets" and is a REPLACE candidate to a tighter L3
      (Retire IT assets or equivalent).
    action: |
      For each untagged handoff, query
      /processes?process_name=ilike.*<term>*&source_framework=eq.apqc_pcf_cross_industry
      and INSERT (handoff_id, process_id, proposal_source='agent_curated', record_status='new').
      For handoff 150, DELETE the existing handoff_processes row pointing at 19207 then INSERT
      the tighter L3 match (record_status='new', proposal_source='agent_curated').
    affected_handoffs:
      - {handoff_id: 140, direction: outbound, source_domain: RMM, target_domain: ITSM, trigger_event: monitoring_alert.threshold_breached, payload: service_incidents, null_field: handoff_processes}
      - {handoff_id: 144, direction: outbound, source_domain: RMM, target_domain: HAM, trigger_event: hardware_endpoint.discovered, payload: hardware_assets, null_field: handoff_processes}
      - {handoff_id: 145, direction: outbound, source_domain: RMM, target_domain: SAM, trigger_event: software_endpoint.discovered, payload: software_installations, null_field: handoff_processes}
      - {handoff_id: 159, direction: outbound, source_domain: RMM, target_domain: MSP-PSA, trigger_event: monitoring_alert.threshold_breached, payload: msp_tickets, null_field: handoff_processes}
      - {handoff_id: 644, direction: outbound, source_domain: RMM, target_domain: ITSM, trigger_event: automation_script.failed, payload: service_incidents, null_field: handoff_processes}
      - {handoff_id: 150, direction: inbound, source_domain: HAM, target_domain: RMM, trigger_event: asset.retired, payload: rmm_agents, null_field: replace_l1_catchall}

  - id: B1A-LIFECYCLE-STATES
    summary: "Author data_object_lifecycle_states on the 3 RMM-owned masters; 2 config-shape candidates pending B2-S6"
    finding: |
      Zero data_object_lifecycle_states rows on the RMM masters. Rule #12 mandates rows on
      every master unless config-shape-exempted. With modules now live the workflow masters can
      be anchored: rmm_agents 223 (pending, installed, online, offline, uninstalled) in module
      311; patch_jobs 224 (scheduled, running, succeeded, failed, rolled_back) in module 313.
      automation_scripts 225 arguably fits the config-shape exemption (B2-S6). monitoring_alerts
      85 and monitoring_policies 86 are embedded_master here (canonical ITOM-INFRA-MON 267), so
      their lifecycle states are owned by ITOM, not authored in RMM.
    action: |
      Author lifecycle states for rmm_agents (module 311) and patch_jobs (module 313). For
      automation_scripts (module 314) author only if B2-S6 resolves against config-shape
      exemption. Do NOT author states for 85/86 here.
    affected_masters:
      - {data_object_id: 223, name: rmm_agents, target_module_id: 311, workflow: agent_lifecycle}
      - {data_object_id: 224, name: patch_jobs, target_module_id: 313, workflow: patch_job_lifecycle}
      - {data_object_id: 225, name: automation_scripts, target_module_id: 314, workflow: config_or_versioned_lifecycle}

  - id: B1A-INTRA-HANDOFFS
    summary: "Insert 5 intra-domain cross-module handoffs across the 4 RMM modules (post-lifecycle-events)"
    finding: |
      0 intra-domain handoff rows across the 4-module shape. Candidates from the master
      relationship graph + capability boundaries: RMM-MONITORING (312) -> RMM-PATCH-MGMT (313)
      on auto-patch policy; RMM-MONITORING (312) -> RMM-AUTOMATION (314) on remediation script
      trigger; RMM-AGENT-MGMT (311) -> RMM-MONITORING (312) on agent install -> policy
      enrollment; RMM-AGENT-MGMT (311) -> RMM-PATCH-MGMT (313) on agent install -> patch scope
      enrollment; RMM-PATCH-MGMT (313) -> RMM-AUTOMATION (314) on patch failure -> remediation.
    action: |
      Insert 5 intra-domain handoffs (source_domain_id = target_domain_id = 130) with
      source/target domain_module_id set per the pairs above, integration_pattern
      lifecycle_progression where no message moves. Best authored after lifecycle events land.
    affected_handoffs:
      - {count: 5, scope_note: "5 intra-domain candidates: 312->313 auto-patch, 312->314 remediation-trigger, 311->312 install->policy-enroll, 311->313 install->patch-scope, 313->314 patch-failure->remediation", enumeration_status: source_count_only}

