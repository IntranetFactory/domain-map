b2:
  - id: B2-S3
    summary: "monitoring_alerts (85) + monitoring_policies (86) now embedded_master in RMM, mastered by ITOM-INFRA-MON; confirm the slice boundary or split"
    question: |
      The 2026-06-02 modularization resolved the multi-master collision structurally: RMM
      holds monitoring_alerts (85) and monitoring_policies (86) as embedded_master in
      RMM-MONITORING (312); the canonical master is ITOM-INFRA-MON (267). RMM's slice is
      agent-emitted endpoint telemetry; ITOM covers broader APM / log / event sources. Is
      embedded_master the intended end state, or should RMM get endpoint-specific data_objects
      (endpoint_alerts, endpoint_monitoring_policies)?
    options:
      - "a-accept-embedded-master: keep 85/86 as RMM embedded_master, ITOM canonical (current state)"
      - "b-split-endpoint-specific: author endpoint_alerts + endpoint_monitoring_policies as RMM-owned masters (new entities, out of this pass's scope)"
    why: |
      Architectural intent. Blast radius spans ITOM, AIOPS, MSP-PSA, ITSM-EVENT-MGMT. Should be
      coordinated with ITOM b1. The structural collision is no longer a hard fail; this is now a
      modeling-fidelity question.

  - id: B2-S4
    summary: "automation_scripts (225) mastered by RMM-AUTOMATION; TEST-MGMT co-claims at legacy rollup"
    question: |
      automation_scripts (225) is now mastered at module grain by RMM-AUTOMATION (314). The
      legacy domain_data_objects rollup still shows a TEST-MGMT master claim (test-automation
      scripts: Selenium/Playwright/JUnit) vs RMM (endpoint-automation: PowerShell/Bash/Python).
      TEST-MGMT has no module-grain master row yet, so no live collision. Resolve naming before
      TEST-MGMT modularizes: (a) split test_automation_scripts for TEST-MGMT, keep
      automation_scripts for RMM; (b) keep automation_scripts for TEST-MGMT, rename RMM master
      to endpoint_automation_scripts; (c) keep shared.
    options: [a-split-test-prefix, b-split-endpoint-prefix, c-keep-shared]
    why: |
      Naming arbitration per Rule #9 plus architectural intent. Coordinate with TEST-MGMT b1.

  - id: B2-S5
    summary: B4 pattern-flag positive re-evaluation on the RMM-owned masters
    question: |
      rmm_agents, patch_jobs, automation_scripts all have has_personal_content=false,
      has_submit_lock=false, has_single_approver=false. Candidates per Rule #12: (a)
      rmm_agents.has_personal_content=true (agent telemetry includes hostname, logged-in
      username, network info); (b) patch_jobs.has_submit_lock=true (once in_flight/completed,
      schedule should not be re-editable); (c) automation_scripts.has_submit_lock=true once
      published. (monitoring_alerts/policies flags are ITOM's call as canonical master.)
    options: [per-flag-yes-no]
    why: "Pattern flags are workflow-shape judgments the user owns."

  - id: B2-S6
    summary: Rule #12 config-shape exemption for automation_scripts
    question: |
      automation_scripts arguably fits the config-shape exemption (author-once / occasionally-
      edit / record_status is the only state worth tracking). Exempt it (no lifecycle states),
      or author a full draft/active/retired lifecycle? Unblocks B1A-LIFECYCLE-STATES for 225.
    options: [a-exempt, b-full-lifecycle]
    why: "Workflow judgment."

  - id: B2-S7
    summary: RBAC role names and bundle shape
    question: |
      Once lifecycle states land, workflow-gate permissions need bundling onto roles. Proposed:
      RMM-OPERATOR (ack/resolve/suppress alerts), RMM-PATCH-MANAGER (approve/rollback patch
      jobs), RMM-AUTOMATION-AUTHOR (approve/deprecate scripts), RMM-ADMIN (install/uninstall
      agents, deprecate policies). Confirm names + bundle shape.
    options: [confirm-proposed, propose-alternative]
    why: "RBAC design is user's call. Permissions cannot be materialized until lifecycle states land."

  - id: B2-S8
    summary: Cross-cutting modules via domain_module_host_domains
    question: |
      Should any RMM module be hosted via domain_module_host_domains on other domains? (a)
      primary-host-only; (b) host RMM-MONITORING (312) on ITOM; (c) host RMM-AGENT-MGMT (311)
      on UEM.
    options: [a-primary-only, b-host-monitoring-on-itom, c-host-agent-mgmt-on-uem]
    why: "Editorial / product intent. Affects installation coupling."

  - id: B2-S9
    summary: System-skill tool scope per module (Rule #17)
    question: |
      Confirm tool scope for the 4 module system skills (B1A-SYSTEM-SKILLS): RMM-MONITORING
      10-15, RMM-PATCH-MGMT 8-12, RMM-AUTOMATION 6-10, RMM-AGENT-MGMT 8-12. Match / larger /
      smaller?
    options: [a-match, b-larger, c-smaller]
    why: "Skill / tool design is product-shape call. Affects Phase S authoring throughput."
  - id: B2-B9D-OWN-355
    summary: "Remote Monitoring and Management: name an owner for \"Decommission productive assets\" (no one is responsible for it today)"
    question: |
      Hardware Asset Management forwards rmm agent to Remote Monitoring and Management to decommission productive assets, but Remote Monitoring and Management does not yet have anyone assigned to decommission productive assets, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Remote Monitoring and Management owns, and assign a named owner once Remote Monitoring and Management sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Remote Monitoring and Management decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-RMM.md q12.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-1552
    summary: "Remote Monitoring and Management: name an owner for \"Update work and asset records\" (no one is responsible for it today)"
    question: |
      IT Asset Management forwards automation script to Remote Monitoring and Management to update work and asset records, but Remote Monitoring and Management does not yet have anyone assigned to update work and asset records, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Remote Monitoring and Management owns, and assign a named owner once Remote Monitoring and Management sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Remote Monitoring and Management decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-RMM.md q13.
    extra_b9d_added: "2026-06-13"

