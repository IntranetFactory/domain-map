b2:
  - id: B2-S1
    summary: M1 architectural module split, 4 vs alternatives
    question: |
      Which module split for RMM: (a) 2-module collapse RMM-AGENT-OPS +
      RMM-WORKFLOW-AUTOMATION, (b) 5-module split that separates RMM-DISCOVERY from
      RMM-AGENT-MGMT, (c) the proposed 4 RMM-MONITORING + RMM-PATCH-MGMT + RMM-AUTOMATION
      + RMM-AGENT-MGMT, (d) alternative shape (e.g. include RMM-COMPLIANCE or
      RMM-REPORTING)?
    options: [a-2-module-collapse, b-5-module-split, c-proposed-4, d-alternative]
    why: |
      Architectural intent and product positioning. Drives every downstream Bucket 1 item
      (S3-S9) plus role design (B2-S7) and skill scope (B2-S9). B3 candidates
      (script_runs, patch_approval_policies, compliance_baselines) may inform whether
      option (d) is preferable.

  - id: B2-S2
    summary: Rule #15 notes-pollution on every domain_data_objects row (12 of 12)
    question: |
      Every one of the 12 RMM domain_data_objects rows carries populated narrative notes
      like "Co-master with ITOM, which owns ...", "HAM remains master of the financial /
      lifecycle record; RMM feeds the live operational view", "Contributes agent-collected
      hardware specs ...". Were these user-typed at load time (retain), or auto-populated
      (revert to empty + log Rule #15 incident per references/skill-changelog.md)?
    options: [a-user-typed-retain, b-auto-populated-revert]
    why: |
      Rule #15 forbids auto-populated notes. Provenance is not knowable from live state
      alone. If revert, downstream action is PATCH all 12 to empty string + changelog
      entry. Independent of other Bucket 2 items.

  - id: B2-S3
    summary: Multi-master collision on monitoring_alerts (85) and monitoring_policies (86) between RMM and ITOM
    question: |
      Both RMM (domain 130) and ITOM (domain 2) have role='master' on monitoring_alerts
      and monitoring_policies. RMM's positioning is agent-emitted endpoint telemetry; ITOM
      covers broader APM / log / event sources. Options: (a) split into endpoint-specific
      data_objects (endpoint_alerts, endpoint_monitoring_policies) for RMM, keep
      monitoring_alerts / monitoring_policies as ITOM's broader masters; (b) RMM
      downgrades to contributor; (c) keep shared, formalize as multi-master with a slice
      discriminator (requires catalog enhancement, no master_scope column today); (d)
      defer to architecture pass.
    options: [a-split-endpoint-specific, b-rmm-contributor, c-formalize-multi-master, d-defer]
    why: |
      Architectural intent. Blast radius spans ITOM, AIOPS, MSP-PSA, ITSM-EVENT-MGMT.
      Should ideally be coordinated with ITOM b1.

  - id: B2-S4
    summary: Multi-master collision on automation_scripts (225) between RMM and TEST-MGMT
    question: |
      Both RMM (domain 130) and TEST-MGMT (domain 8) have role='master' on
      automation_scripts. TEST-MGMT masters test-automation scripts (Selenium / Playwright
      / JUnit); RMM masters endpoint-automation scripts (PowerShell / Bash / Python). The
      two existing aliases (automated test, test automation) bias toward TEST-MGMT.
      Options: (a) split: test_automation_scripts for TEST-MGMT, keep automation_scripts
      for RMM; (b) split the other way: keep automation_scripts for TEST-MGMT, rename RMM
      master to endpoint_automation_scripts; (c) keep shared; (d) defer.
    options: [a-split-test-prefix, b-split-endpoint-prefix, c-keep-shared, d-defer]
    why: |
      Naming arbitration per Rule #9 plus architectural intent. Blast radius on
      TEST-MGMT; coordinate with TEST-MGMT b1.

  - id: B2-S5
    summary: B4 pattern-flag positive re-evaluation on 5 masters
    question: |
      All 5 RMM masters currently have has_personal_content=false, has_submit_lock=false,
      has_single_approver=false. Candidates per Rule #12: (a)
      rmm_agents.has_personal_content=true (agent telemetry includes hostname, logged-in
      username, network info); (b) monitoring_alerts.has_personal_content=true (alert
      payload includes event-log entries with usernames, file paths, process names); (c)
      patch_jobs.has_submit_lock=true (once in_flight or completed, schedule should not be
      re-editable); (d) automation_scripts.has_submit_lock=true once published; (e)
      monitoring_policies.has_submit_lock=true once active (version-locked). Per-flag yes
      / no required.
    options: [per-flag-yes-no]
    why: |
      Pattern flags are workflow-shape judgments the user owns. Notes wording for the
      reasoning is forbidden per Rule #15 unless user-approved verbatim.

  - id: B2-S6
    summary: Rule #12 config-shape exemption for monitoring_policies and / or automation_scripts
    question: |
      monitoring_policies and automation_scripts arguably fit the config-shape exemption
      (author-once / occasionally-edit / record_status is the only state worth tracking).
      Options: (a) both exempted (no lifecycle states); (b) only monitoring_policies
      exempted; (c) only automation_scripts exempted; (d) neither (full lifecycle for all
      5 masters).
    options: [a-both, b-only-policies, c-only-scripts, d-neither]
    why: |
      Workflow judgment. Unblocks B1B-S4 for the non-exempted masters.

  - id: B2-S7
    summary: RBAC role names and bundle shape
    question: |
      Once B1-S1 + B1-S4 land, workflow-gate permissions need bundling onto roles. Proposed
      roles: RMM-OPERATOR (front-line monitoring; ack / resolve / suppress alerts),
      RMM-PATCH-MANAGER (approve / rollback patch jobs), RMM-AUTOMATION-AUTHOR (approve /
      deprecate scripts), RMM-ADMIN (install / uninstall agents, deprecate policies).
      Confirm names + bundle shape.
    options: [confirm-proposed, propose-alternative]
    why: |
      RBAC design is user's call. Permissions cannot be materialized until module +
      lifecycle states land.

  - id: B2-S8
    summary: Cross-cutting modules via domain_module_host_domains
    question: |
      Should any RMM module be hosted via domain_module_host_domains on other domains?
      Options: (a) primary-host-only; (b) host RMM-MONITORING on ITOM; (c) host
      RMM-AGENT-MGMT on UEM.
    options: [a-primary-only, b-host-monitoring-on-itom, c-host-agent-mgmt-on-uem]
    why: |
      Editorial / product intent. Affects installation coupling.

  - id: B2-S9
    summary: System-skill scope per module per Rule #17
    question: |
      Once B1-S1 lands, each module needs exactly one skill_type='system' skill with >=1
      skill_tools rows. Proposed tool counts: RMM-MONITORING 10-15 (query / mutate alerts,
      ack / resolve / suppress, threshold evaluation primitives, send_notification
      external, anomaly_score external); RMM-PATCH-MGMT 8-12 (list_available_patches
      external CVE feed, schedule_patch_job, execute_patch external, rollback_patch
      external, query / mutate jobs); RMM-AUTOMATION 6-10 (query scripts, mutate scripts,
      execute_script_on_endpoint external, approve_script gate); RMM-AGENT-MGMT 8-12
      (install_agent external, uninstall_agent external, list_endpoints query, mutate
      config). Confirm scope.
    options: [a-match, b-larger, c-smaller, d-defer]
    why: |
      Skill / tool design is product-shape call. Affects Phase A authoring throughput.

b3:
  - id: B3-AGENT-GROUPS
    candidate: agent_groups
    rationale: |
      NinjaOne, Datto RMM, ConnectWise RMM all model endpoint groups (device_groups,
      client_groups) as a first-class master distinct from agents. Used for bulk policy
      assignment and reporting.
    vendor_evidence: [NinjaOne, Datto RMM, ConnectWise RMM]
    proposed_module: RMM-AGENT-MGMT

  - id: B3-MONITORING-THRESHOLDS
    candidate: monitoring_thresholds
    rationale: |
      Distinct from monitoring_policies in NinjaOne, ManageEngine (a policy bundles many
      thresholds; threshold is per-metric). Catalog currently folds thresholds into
      policies.
    vendor_evidence: [NinjaOne, ManageEngine Endpoint Central]
    proposed_module: RMM-MONITORING

  - id: B3-PATCH-APPROVAL-POLICIES
    candidate: patch_approval_policies
    rationale: |
      Kaseya, Datto, ManageEngine model patch-approval policies as first-class records
      (which CVE classes auto-approve, which need manual approval per customer tier).
    vendor_evidence: [Kaseya VSA, Datto RMM, ManageEngine Endpoint Central]
    proposed_module: RMM-PATCH-MGMT

  - id: B3-MAINTENANCE-WINDOWS
    candidate: maintenance_windows
    rationale: |
      NinjaOne, ConnectWise, N-able model maintenance windows distinct from
      monitoring_policies. Patch jobs and scripts honor maintenance windows.
    vendor_evidence: [NinjaOne, ConnectWise RMM, N-able N-central]
    proposed_module: RMM-PATCH-MGMT

  - id: B3-REMOTE-SESSIONS
    candidate: remote_sessions
    rationale: |
      NinjaOne, Datto, ConnectWise embed remote-control session records distinct from RMM
      agents (TeamViewer, Splashtop, native). REMOTE-ACCESS domain may own this; possible
      overlap with rmm_agents.
    vendor_evidence: [NinjaOne, Datto RMM, ConnectWise RMM]
    proposed_module: RMM-AGENT-MGMT

  - id: B3-SCRIPT-RUNS
    candidate: script_runs
    rationale: |
      Distinct from automation_scripts in NinjaOne, Atera, Action1. Script = definition;
      script_run = execution event. Currently events 651 / 652 are the only record of
      execution.
    vendor_evidence: [NinjaOne, Atera, Action1]
    proposed_module: RMM-AUTOMATION

  - id: B3-COMPLIANCE-BASELINES
    candidate: compliance_baselines
    rationale: |
      Action1, ManageEngine, N-able model security baselines (CIS, NIST) distinct from
      monitoring_policies. Drift detection runs against the baseline.
    vendor_evidence: [Action1, ManageEngine Endpoint Central, N-able N-central]
    proposed_module: RMM-MONITORING

  - id: B3-CUSTOMER-TENANTS
    candidate: customer_tenants
    rationale: |
      All MSP-RMM vendors model the customer tenant (the MSP client organization) as a
      first-class master separate from organizations. Multi-tenant data isolation depends
      on this. Likely MSP-PSA territory.
    vendor_evidence: [NinjaOne, Kaseya VSA, Datto RMM, ConnectWise RMM, N-able N-central]
    proposed_module: MSP-PSA

  - id: B3-AGENT-INSTALL-PACKAGES
    candidate: agent_install_packages
    rationale: |
      NinjaOne, Action1, Atera ship installer-package records (per-OS, per-architecture,
      signed binaries). Distinct from automation_scripts and rmm_agents.
    vendor_evidence: [NinjaOne, Action1, Atera]
    proposed_module: RMM-AGENT-MGMT

  - id: B3-MOD-RMM-COMPLIANCE
    candidate: RMM-COMPLIANCE module
    rationale: |
      If compliance_baselines + patch_approval_policies + drift-detection records get
      loaded, a fifth module makes more sense than overloading RMM-MONITORING.
    vendor_evidence: [Action1, ManageEngine Endpoint Central, N-able N-central]
    proposed_module: new-module

  - id: B3-MOD-RMM-REPORTING
    candidate: RMM-REPORTING module (customer-facing dashboards / scheduled reports)
    rationale: |
      MSP-RMM vendors all ship customer-facing dashboard + scheduled report surfaces
      (NinjaOne client portal, ConnectWise client portal). If RMM models the
      customer-facing surface, a separate module fits cleanly.
    vendor_evidence: [NinjaOne, ConnectWise RMM]
    proposed_module: new-module

  - id: B3-REG-SOC2
    candidate: SOC 2 attestation regulation applicability
    rationale: |
      MSPs serve regulated customers and inherit SOC 2 obligations on access logging and
      change tracking; entity model unclear (regulations row only, or also a
      compliance_attestations entity).
    vendor_evidence: [absent (regulatory-body authority, not vendor-product evidence)]

  - id: B3-REG-HIPAA-PASSTHROUGH
    candidate: HIPAA pass-through applicability
    rationale: |
      MSPs serving healthcare customers inherit HIPAA Business Associate Agreement
      obligations.
    vendor_evidence: [absent (regulatory-body authority)]

  - id: B3-REG-CMMC
    candidate: CMMC applicability
    rationale: |
      MSPs serving US DoD contractors are subject to CMMC Level 2 or Level 3 mandates.
    vendor_evidence: [absent (regulatory-body authority)]

  - id: B3-REG-NIS2
    candidate: NIS2 applicability
