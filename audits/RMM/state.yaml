      Likely MSP-PSA territory.
    vendor_evidence: [NinjaOne, Kaseya VSA, Datto RMM, ConnectWise RMM, N-able N-central]
    proposed_module: MSP-PSA

  - id: B3-MISSING-MASTER-RMM-AUTOMATION
    candidate: "script_runs (RMM-AUTOMATION execution-event master gap)"
    rationale: |
      RMM-AUTOMATION (314) currently masters only automation_scripts (the definition). The
      execution-event record (script_runs) is the obvious missing master for the module's
      operational surface: every run's target, parameters, exit code, output, and timestamp.
      Without it the module cannot answer "what ran where and what happened", and the system
      skill (B1A-SYSTEM-SKILLS) has no execution-history tool target. Highest-priority
      missing-master candidate.
    vendor_evidence: [NinjaOne, Atera, Action1, Syncro]
    proposed_module: RMM-AUTOMATION

