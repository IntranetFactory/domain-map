b2:
  - id: B2-M1
    summary: "Modularization shape (4 to 7 modules), conditional on the four other Bucket 2 carve-out calls."
    question: "Choose the PRM module set shape. Options span 4 modules (classic-PRM only, all carve-outs promoted) up through 7 modules (PRM keeps TCMA + ecosystem-led + partner-training)."
    options:
      - "(a) 4 modules: PRM-PARTNER-PORTAL, PRM-DEAL-REGISTRATION, PRM-MDF-COOP, PRM-PARTNER-ANALYTICS. Cleanest; matches the four-workflow-pillar shape that flagship PRM vendors converge on. Requires B2-T1=LMS-mastered, B2-S1=TCMA promoted, B2-S2=ECOSYSTEM-LED-GROWTH promoted."
      - "(b) 5 modules: 4 above plus PRM-PARTNER-TRAINING (requires B2-T1=PRM-owned or hybrid)."
      - "(c) 6 modules: 4 above plus PRM-PARTNER-MARKETING (requires B2-S1=TCMA stays in PRM)."
      - "(d) 7 modules: 4 above plus PRM-PARTNER-TRAINING + PRM-PARTNER-MARKETING + PRM-PARTNER-CO-SELL (requires B2-T1=PRM-owned, B2-S1=TCMA stays, B2-S2=ecosystem-led stays)."
    why: "Load-bearing. Gates B1B-M1, which in turn gates everything below it. Mutually informed by B2-T1, B2-T2, B2-S1, B2-S2 and Bucket 3 candidates 1, 2, 3."

  - id: B2-R1
    summary: "Regulation coverage scope for PRM (GDPR, CCPA, FCPA, SOX as a baseline 4; UK Bribery Act; ITAR / EAR / HIPAA as industry-scoped extras)."
    question: "Which regulations should attach to PRM via domain_regulations?"
    options:
      - "(a) Baseline 4: GDPR, CCPA / CPRA, FCPA, SOX."
      - "(b) Baseline 4 plus UK Bribery Act."
      - "(c) Extended: baseline plus ITAR / EAR plus HIPAA, flagged as industry-scoped."
      - "(d) None, defer to industry-specific overlays."
    why: "Catalog regulatory breadth and geographic scope; partner data + channel financials sit across multiple regimes."

  - id: B2-T1
    summary: "Partner training and certification ownership: PRM-mastered vs LMS-mastered with PRM-consumed."
    question: "Where do partner_training_enrollments and partner_certifications get mastered?"
    options:
      - "(a) LMS-mastered with PRM-consumed (architecturally cleanest; LMS already owns enrollments and courses; partner training is LMS with an external-user audience)."
      - "(b) PRM-mastered with own PRM-PARTNER-TRAINING module (matches Impartner / Zift / ZINFI vendor reality but duplicates LMS surface)."
      - "(c) Hybrid: PRM masters partner_certifications, LMS masters partner_training_enrollments / course completions."
    why: "Architectural intent; shrinks or grows the PRM module count. LMS needs an external-learner mode for option (a) to work cleanly."

  - id: B2-T2
    summary: "Commission and incentive ownership for partner-channel: PRM vs SALES-PERF vs split."
    question: "Where do commission_tiers and partner-channel commission accrual / payout records get mastered?"
    options:
      - "(a) PRM-owned (Impartner / ZINFI feature set; treats commissions as a partner-program control)."
      - "(b) SALES-PERF-owned with PRM-consumed (cleaner; commission ICP / accrual / payout sits in one place across direct and partner sales)."
      - "(c) Split: program-level rules and rebate accrual in PRM, individual payout settlement in SALES-PERF."
    why: "Cross-cuts B2-M1 module count (PRM-PARTNER-COMMISSION emerges in option a). Also affects which side owes which handoffs (see report-only follow-ups on SALES-PERF B9)."

  - id: B2-S1
    summary: "Promote TCMA as its own domain and relocate the through-channel marketing capabilities."
    question: "Should TCMA (Through-Channel Marketing Automation) become its own domain, absorbing PARTNER-CAMPAIGN-TEMPLATES / PARTNER-LEAD-DISTRIBUTION / CO-BRANDED-ASSETS?"
    options:
      - "(a) Promote TCMA as new domain, relocate the entity surface (Sproutloud, Mindmatrix, Structured Web as solutions on the new domain)."
      - "(b) Keep TCMA inside PRM as PRM-PARTNER-MARKETING (matches buyer reality at orgs that haven't separated channel-marketing from channel-ops)."
      - "(c) Defer until TCMA mention count grows."
    why: "TCMA is a distinct Gartner market since 2017 with a different buyer (Channel Marketing Manager, not Channel Chief). Currently queued in audits/_missing-domains.md at mention count 1."

  - id: B2-S2
    summary: "Promote ECOSYSTEM-LED-GROWTH as its own domain and relocate the co-sell / account-mapping capabilities."
    question: "Should ECOSYSTEM-LED-GROWTH (Crossbeam, Reveal, PartnerTap, Partnered) become its own domain, absorbing PARTNER-ACCOUNT-MAPPING / PARTNER-CO-SELL-ORCHESTRATION?"
    options:
      - "(a) Promote and relocate (matches buyer-distinct test; Crossbeam and Reveal do not compete with Impartner)."
      - "(b) Keep in PRM as PRM-PARTNER-CO-SELL (the Salesforce Partner Cloud / Oracle PRM model that bundles co-sell with classic PRM)."
      - "(c) Defer until mention count grows."
    why: "Rewires ownership of handoff 211 (co_sell.opportunity_created) if (a). Currently queued in audits/_missing-domains.md at mention count 1."

b3:
  - id: B3-1
    candidate: "TCMA as its own domain"
    rationale: "Through-Channel Marketing Automation. Distinct Gartner market since 2017 with buyer = Channel Marketing Manager. Absorbs PRM's through-channel marketing capabilities and the proposed PRM-PARTNER-MARKETING module. Queued in audits/_missing-domains.md at mention count 1."
    vendor_evidence: [Sproutloud, Mindmatrix, Structured Web, Impartner TCMA, Zift TCMA]
    proposed_module: TCMA (new domain)

  - id: B3-2
    candidate: "ECOSYSTEM-LED-GROWTH as its own domain"
    rationale: "Partner Ecosystem Platform / Co-Sell category emerging 2020 to 2024. Distinct buyer = VP Partnerships / Head of Ecosystem, different from Channel Chief. Absorbs PRM's co-sell / account-mapping capabilities and the proposed PRM-PARTNER-CO-SELL module. Queued in audits/_missing-domains.md at mention count 1."
    vendor_evidence: [Crossbeam, Reveal, PartnerTap, Partnered]
    proposed_module: ECOSYSTEM-LED-GROWTH (new domain)

  - id: B3-3
    candidate: "AFFILIATE-MGMT as its own domain"
    rationale: "Distinct DTC-marketing buyer (Performance Marketing Manager / Affiliate Manager). The affiliate entity surface (affiliate_accounts, affiliate_tracking_links, affiliate_conversions, affiliate_payouts) does not belong in PRM under any scenario. PartnerStack is the awkward middle case (SaaS-affiliate crossover). Queued in audits/_missing-domains.md at mention count 1."
    vendor_evidence: [Impact.com, PartnerStack, Everflow, Refersion, CJ Affiliate, Awin, Rakuten Advertising]
    proposed_module: AFFILIATE-MGMT (new domain)

  - id: B3-4
    candidate: "Partner-marketplace operations (Tackle.io / AppDirect / Mirakl B2B) as a candidate sub-domain or capability"
    rationale: "Co-sell-through-marketplace (AWS / Azure / GCP marketplaces) is a fast-growing workflow distinct from both classic PRM and ecosystem-led co-sell. Less urgent than candidates 1 to 3. Mention count 0 today."
    vendor_evidence: [Tackle.io, AppDirect, Mirakl B2B]
    proposed_module: "candidate fifth PRM module, ECOSYSTEM-LED-GROWTH module, or new domain"
