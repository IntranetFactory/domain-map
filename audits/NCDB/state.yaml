b1a:
  - id: B1A-S12-RES
    summary: PATCH trigger_event 727 `nocode_form.submitted` event_category from "" to `signal` or `state_change`.
    finding: The 2026-05-31 continuation cleared 6 of 7 NCDB trigger_events' event_category enum values per Rule #13. Event 727 was deferred because the 2026-05-30 audit hedged between `signal` (downstream observers see a submission notification) and `state_change` (the form submission materializes a new row in the linked record definition, the record-side master advances state). Both readings are defensible; the catalog needs a single firm value.
    action: Run `semantius call crud postgrestRequest '{"method":"PATCH","path":"/trigger_events?id=eq.727","body":{"event_category":"state_change"}}'` (or `signal`, per the directional pick). Recommended pick is `state_change` because it mirrors how `record_definition.changed` (also `state_change`) reads on the same data substrate.
    affected_events:
      - {id: 727, event_name: "nocode_form.submitted", current_category: "", proposed_category: "state_change"}
  - id: B1A-S3-RES
    summary: INSERT the 5th audit-proposed intra-domain `data_object_relationships` row (`nocode_views source_of nocode_forms`) or explicit defer.
    finding: The 2026-05-31 continuation loaded 4 of 5 audit-proposed intra-domain edges. The 5th edge (`nocode_views` source_of `nocode_forms`, M:N, optional) was deferred because the audit qualified it with "optional, some platforms let forms inherit a view's filter context." Catalog-neutrality argues for inserting at `is_required=false` so the substrate reflects the cross-vendor pattern without committing to a specific flagship's binding strength.
    action: |
      INSERT one `data_object_relationships` row: `data_object_id=713`, `related_data_object_id=712`, `relationship_verb=source of forms`, `inverse_verb=sourced from view`, `relationship_type=many_to_many`, `relationship_kind=association`, `is_required=false`, `owner_side=source`. Or explicit defer with documented rationale.
    extra_alt_action: Accept the omission as the catalog's substrate neutrality and close the residual without INSERT.
  - id: B1A-H1-RES
    summary: Resolve PCF candidate ambiguity for handoff 700 and INSERT one `handoff_processes` row.
    finding: The 2026-05-30 audit calls out that handoff 700 (NCDB -> WORK-MGMT, `nocode_automation.triggered`, payload `nocode_automations`) has a candidate-PCF ambiguity between `Manage business processes` (PCF 20827 family) and `Operate business processes`. The 2026-05-31 continuation deferred this single tag awaiting the lookup pick. The mental model from the structural pass is fresh enough that one PCF query plus a confidence-call resolves it.
    action: Run `/processes?process_name=ilike.*operate%20business%20process*&source_framework=eq.apqc_pcf_cross_industry&select=id,process_name,external_id,hierarchy_level` plus `/processes?process_name=ilike.*manage%20business%20process*&source_framework=eq.apqc_pcf_cross_industry&select=id,process_name,external_id,hierarchy_level`. Pick best L3, INSERT one `handoff_processes` row `(handoff_id=700, process_id=<pick>, proposal_source='agent_curated')`. Record `record_status` takes DB default `new`.
    affected_handoffs:
      - {handoff_id: 700, direction: outbound, source_domain: NCDB, target_domain: WORK-MGMT, trigger_event: "nocode_automation.triggered", payload: nocode_automations, null_field: handoff_processes}

