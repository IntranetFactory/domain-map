b2:
  - id: B2-S2
    summary: "Per-master pattern flag decisions for B4 re-evaluation."
    question: >
      Audit-proposed flips are `nocode_forms.has_personal_content=true` (forms are a standard
      PII intake surface across every flagship) and `nocode_record_definitions.has_submit_lock=true`
      (live-data schema change needs a controlled migration path). Other proposed flags stay false.
    options:
      - "yes-to-all"
      - "yes to nocode_forms.has_personal_content only"
      - "yes to nocode_record_definitions.has_submit_lock only"
      - "no flips, accept false defaults catalog-wide"
      - "user proposes alternative flips"
    why: "Pattern flags are workflow-shape judgments the user owns. False-by-default is not false-after-review (Rule #12)."
  - id: B2-S3
    summary: "Regulation coverage scope on NCDB."
    question: >
      Zero `domain_regulations` rows. NCDB is a known target of GDPR (personal data captured via
      forms, processed via automations, sometimes shared externally), HIPAA (health intake), CCPA,
      and SOC 2 (the platform's own certification posture).
    options:
      - "a: GDPR + CCPA mandatory"
      - "b: GDPR + CCPA + HIPAA mandatory"
      - "c: none, leave compliance as cross-cutting via embedded master patterns"
      - "d: user proposes set"
    why: "Regulation linkage is a market-scoping decision the user owns; the no-code-database market straddles many regulated industries without being itself a regulated category."
  - id: B2-S4
    summary: "Cross-cutting capability scope for OPERATIONAL-DATA-APPS and SEMANTIC-MODELING."
    question: >
      Both capabilities are cross-cutting. OPERATIONAL-DATA-APPS is also surfaced in the LCAP
      audit (B2-S4) which proposes expanding to NCDB + LCAP + APP-PAAS. SEMANTIC-MODELING overlaps
      with DI / DCG / MDM. This pass placed OPERATIONAL-DATA-APPS in NCDB-VIEWS-FORMS (283) and
      SEMANTIC-MODELING in NCDB-SCHEMA-BUILDER (282); confirm or adjust the `capability_domains` scope.
    options:
      - "a: keep both unchanged on NCDB"
      - "b: drop SEMANTIC-MODELING, keep OPERATIONAL-DATA-APPS"
      - "c: keep both and expand each to its full domain set"
    why: "Cross-cutting capability scope is a market-test decision the user owns. Co-dependent with LCAP audit."
    extra_linked_audit: LCAP-2026-05-30 B2-S4
  - id: B2-S5
    summary: "FORM-BUILDER boundary on `nocode_forms` mastery."
    question: >
      NCDB now masters `nocode_forms` (id 712) in NCDB-VIEWS-FORMS (283), but the form-builder
      market is a distinct point-solution market with its own buyers, pricing, and feature shape.
      Candidate domain FORM-BUILDER is queued in `audits/_missing-domains.md`. Decide whether NCDB
      keeps mastery and FORM-BUILDER embeds when promoted, or FORM-BUILDER masters and NCDB demotes.
    options:
      - "a: NCDB keeps mastery; FORM-BUILDER embeds when promoted"
      - "b: FORM-BUILDER masters; NCDB demotes to embedded_master"
      - "c: defer until FORM-BUILDER triage"
    why: "Naming arbitration plus market-boundary judgment the user owns."
  - id: B2-S6
    summary: "Inbound-handoff gap scoping."
    question: >
      NCDB ships zero inbound handoffs despite being a natural target of iPaaS pushes (creating
      records), CRM / sales ops pushing into operational tables, DCG cataloging the schemas, DLP
      scanning the bases, BI reading them as a source.
    options:
      - "a: author inbound handoffs from IPAAS / DCG / DLP / BI as a Phase B extension to NCDB"
      - "b: treat as report-only; each source domain owes the outbound on its own next audit"
      - "c: mixed - confirm IPAAS / DCG, defer the others"
    why: "Inbound-handoff scoping is a market-modeling decision the user owns."

b3:
  - id: B3-NCDB-SYNC-CONNECTIONS
    candidate: nocode_sync_connections
    rationale: >
      Distinct from `nocode_automations` because connections are reusable across automations
      (auth credentials, endpoint config, schedule). Several flagships model sync source /
      destination configs, external DB connections, and outgoing webhooks as a first-class entity.
    vendor_evidence: [Airtable, NocoDB, SmartSuite, Grist]
    proposed_module: NCDB-AUTOMATION-SYNC
  - id: B3-NCDB-SHARE-LINKS
    candidate: nocode_share_links
    rationale: >
      The public-link record on a view or form is the DLP-relevant artifact for handoff 702.
      Distinct from the view / form itself because the share link carries auth scope, expiry, and
      audit trail. Universal pattern across flagships.
    vendor_evidence: [Airtable, Notion, Coda, NocoDB]
    proposed_module: NCDB-VIEWS-FORMS
  - id: B3-NCDB-RECORD-COMMENTS
    candidate: nocode_record_comments
    rationale: "Universal collaboration substrate; threads on a specific record. Distinct from `notes` because comments thread."
    vendor_evidence: [Airtable, Notion, Coda, SmartSuite]
    proposed_module: NCDB-SCHEMA-BUILDER
  - id: B3-NCDB-TEMPLATES
    candidate: nocode_templates
    rationale: "Marketplace / template substrate; the packaging surface for shareable base shapes."
    vendor_evidence: [Airtable, Coda, Notion, SmartSuite]
    proposed_module: NCDB-SCHEMA-BUILDER
  - id: B3-NCDB-AI-FIELD-OUTPUTS
    candidate: nocode_ai_field_outputs
    rationale: "Distinct from `nocode_formulas` (deterministic) because outputs are LLM-generated. Compliance-relevant."
    vendor_evidence: [Airtable, Notion, Coda, SmartSuite]
    proposed_module: NCDB-SCHEMA-BUILDER
  - id: B3-NCDB-REVISION-HISTORY
    candidate: nocode_revision_history
    rationale: "Record-level revision history; compliance-relevant (immutable trail of edits)."
    vendor_evidence: [Airtable, Notion]
    proposed_module: NCDB-SCHEMA-BUILDER
  - id: B3-NCDB-WORKSPACE-MEMBERS
    candidate: nocode_workspace_members
    rationale: >
      Per-base membership / role / share scope distinct from platform-level `users` because
      workspace scope is the granted-access record.
    vendor_evidence: [Airtable, Notion, SmartSuite]
    proposed_module: NCDB-SCHEMA-BUILDER
