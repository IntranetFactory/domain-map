b1b:
  - id: B1B-M7-SIBLING-CONSUMERS
    summary: "8 sibling-consumer DMDO rows on IGA modules failing M7 within-domain; await user PROMOTE-vs-DELETE call from B1-S1-CARRY before fix."
    finding: "M7 within-domain hard fail unresolved: 4 IGA masters carry role='master' in one IGA module AND role IN (consumer, contributor) in 1-4 sibling IGA modules. iga_access_requests (704) master in 144, consumer in 148. iga_entitlement_definitions (706) master in 147, consumer in 144, 145, 146, 148. iga_sod_violations (707) master in 146, consumer in 144. iga_provisioning_events (708) master in 148, consumer in 144, 145, 146. 8 sibling-consumer rows total. Per M7 the two valid resolutions are (a) PROMOTE every consumer row to embedded_master accepting runtime demotion when modules co-deploy, or (b) DELETE all 8 rows accepting always-co-installed semantics. Recommendation (a)."
    blocked_by:
      - {type: user_decision, ref: B2-M7-DECIDE}
    affected_modules: [144, 145, 146, 147, 148]
    affected_masters:
      - {data_object_id: 704, name: iga_access_requests, target_module_id: 144, workflow: access_request_to_provisioning}
      - {data_object_id: 706, name: iga_entitlement_definitions, target_module_id: 147, workflow: entitlement_catalog_to_all_modules}
      - {data_object_id: 707, name: iga_sod_violations, target_module_id: 146, workflow: sod_detection_to_access_request}
      - {data_object_id: 708, name: iga_provisioning_events, target_module_id: 148, workflow: provisioning_to_other_modules}
  - id: B1B-B9b
    summary: "Author 7 intra-domain handoff rows (source_domain_id=target_domain_id=35) covering cross-module lifecycle progressions; blocked on M7 resolution."
    finding: "Zero handoffs rows with source_domain_id=target_domain_id=35 despite 5 modules with 7 obvious cross-module event chains: (144->148 on iga_access_request.approved, 145->148 on iga_access_certification.completed, 146->148 on iga_sod_violation.mitigated, 144->146 on iga_access_request.submitted, 147->144 on iga_entitlement_definition.published, 147->146 on iga_entitlement_definition.published, 148->145 on iga_provisioning_event.completed). The master-resolution path for each row depends on whether the sibling-module relationship is embedded_master (per M7 option a) or removed (per option b)."
    blocked_by:
      - {type: depends_on, ref: B1B-M7-SIBLING-CONSUMERS, reason: "intra-domain handoff source/target master shape depends on whether siblings become embedded_master or get deleted"}
    affected_modules: [144, 145, 146, 147, 148]
