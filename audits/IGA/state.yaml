b2:
  - id: B2-M7-DECIDE
    summary: "M7 within-domain hard fail: PROMOTE 8 sibling-consumer rows to embedded_master, or DELETE them?"
    question: "Are IGA modules intended as autonomous deployable units (PROMOTE consumer -> embedded_master, accept runtime demotion when co-deployed) or always co-installed (DELETE the 8 sibling-consumer rows)?"
    options:
      - "PROMOTE: PATCH 8 rows role='consumer' -> role='embedded_master' (audit recommendation; preserves standalone-deploy story for each module)"
      - "DELETE: DELETE the 8 rows; the 4 master rows remain authoritative for the whole domain"
    why: "M7 rejects within-domain master+consumer coexistence. Either resolution is valid; the choice depends on whether IGA-AUTO-PROVISIONING (148) is meant to deploy standalone against an external identity store without IGA-ACCESS-REQUEST (144), etc. Both are destructive (rewrite or delete existing rows); never run unapproved."
  - id: B2-S1-CARRY
    summary: "iga_entitlement_definitions (706) notes carries the config-shape exemption wording. Approved at load time or auto-write?"
    question: "Was the wording 'Config-shape master: lightweight draft -> published -> deprecated -> retired lifecycle, no per-record approval workflow. Permission gates apply only on publish and retire.' user-approved when loaded, or auto-populated by the Phase-B loader?"
    options:
      - "Confirm user-approved at load time, leave as is."
      - "Confirm auto-write, PATCH the column to empty string and record the config-shape exemption only in this audit's history."
    why: "Rule #15 RESCINDED the auto-write license for the config-shape exemption note; same shape as the APM B2-S2 finding. The 2026-06-07 pass classified 706 entity_type='catalog' (the structural home for the config-shape exemption per Rule #12), so the typed classification now stands regardless of the notes decision; this carry only governs whether the prose notes line is overwritten."
  - id: B2-S2-CARRY
    summary: "14 IGA-touching handoffs.notes rows match the rescinded write-policy boilerplate. Approved at load time or auto-write?"
    question: "Are any of the 14 rows (19, 185, 375, 378, 382, 389, 391, 392, 462, 467, 830, 831, 836, 1165) carrying user-approved wording, or all auto-written by the prior policy?"
    options:
      - "Confirm specific rows user-approved, leave those untouched."
      - "Confirm all auto-write, agent PATCHes all 14 to empty string (executes B1A-NOTES-HOFF)."
    why: "Rule #15 forbids the auto-population pattern. The drift-history information loses nothing: git log carries the same record on this audit file."
  - id: B2-S3-CARRY
    summary: "20 IGA DMDO rows (789-808) carry notes restating role+necessity+target module. Approved at load time or auto-write?"
    question: "Were any of the 20 rows' notes user-approved at load time, or all auto-written by the cluster-drafts work?"
    options:
      - "Confirm specific rows user-approved, leave those untouched."
      - "Confirm all auto-write, agent PATCHes all 20 to empty string (executes B1A-NOTES-DMDO)."
    why: "The notes restate what role+necessity+target_module already structurally communicate; Rule #15 explicitly forbids the pattern."
  - id: B2-S4-CARRY
    summary: "Pattern-flag re-evaluation on iga_access_certifications and iga_user_entitlements."
    question: "Per-flag yes/no decisions: (a) iga_access_certifications.has_submit_lock: true (campaign freezes on scheduled -> in_progress) or leave false? (b) iga_user_entitlements.has_submit_lock: true once granted, or leave false? (c) iga_user_entitlements.has_single_approver: true (SoD-aware grants are typically single-approver) or leave false?"
    options:
      - "Per-flag yes/no answers from the user."
      - "Leave all defaults; band passes vacuously."
    why: "Pattern flags are workflow-shape judgments the user owns; false-by-default does not establish considered-and-rejected. Note: 704, 705, 707, 964 were classified entity_type='operational_workflow' on 2026-06-07, so pattern-flag consideration is now in-scope for all four per Rule #12."
  - id: B2-S5-CARRY
    summary: "E6 permission-bundle drift: does the catalog permission_hierarchy auto-include workflow gates under <module>:admin?"
    question: "Is permission_hierarchy seeded such that IAM-IDENTITY-ADMIN's 5 :admin grants auto-include every module workflow gate? Or do the IC-tier roles enumerate gates because the hierarchy does NOT carry them?"
    options:
      - "Confirm :admin auto-includes -> drop the explicit gate grants on IC-tier roles as redundant."
      - "Confirm :admin does NOT auto-include -> enumerate the 14 workflow gates on IAM-IDENTITY-ADMIN explicitly."
      - "Leave as is (IC-tier explicit, admin-tier implicit)."
    why: "The audit does not introspect permission_hierarchy rules; the consistency check needs platform-level confirmation. (Note: the 4 IAM roles referenced were retired by Plan 3; this carry stands as a hierarchy-semantics question for whatever personas B1A-PHASE-P authors.)"
  - id: B2-PCF-SUBSTITUTE
    summary: "Substitute or load PCF entries for 5 deferred APQC tag candidates whose external_ids are absent from catalog."
    question: "For handoffs 461 / 463 / 462 (PCF external_id 10568 'Manage IT assets'), 465 (10708 'Establish internal controls, policies, and procedures'), and 185 (10470 / 10473 employee separation), should the agent (a) pick a present-in-catalog substitute PCF per handoff, (b) load the missing PCF rows catalog-wide, or (c) leave the tags pending until a catalog-wide PCF backfill?"
    options:
      - "Pick substitute PCFs from the present catalog (agent surfaces 1-2 candidates per handoff)."
      - "Load the missing PCFs into /processes (a catalog-wide change, outside IGA scope)."
      - "Defer until the catalog-wide PCF backfill."
    why: "Without resolution these 5 high-confidence APQC tags stay deferred and the H1 process-health number stays below target."
  - id: B2-B9D-OWN-365
    summary: "Identity Governance and Administration: name an owner for \"Establish the enterprise risk framework and policies\" (no one is responsible for it today)"
    question: |
      Governance, Risk and Compliance forwards iga sod violation to Identity Governance and Administration to establish the enterprise risk framework and policies, but Identity Governance and Administration does not yet have anyone assigned to establish the enterprise risk framework and policies, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Identity Governance and Administration owns, and assign a named owner once Identity Governance and Administration sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Identity Governance and Administration decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-IGA.md q13.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-1335
    summary: "Identity Governance and Administration: name an owner for \"Manage asset resource deployment and utilization\" (no one is responsible for it today)"
    question: |
      IT Asset Management forwards iga provisioning event to Identity Governance and Administration to manage asset resource deployment and utilization, but Identity Governance and Administration does not yet have anyone assigned to manage asset resource deployment and utilization, so this step has no owner. How should it be handled?
    options:
      - "Record it now as work Identity Governance and Administration owns, and assign a named owner once Identity Governance and Administration sets up who does this work."
      - "Leave it off the list for now."
    why: |
      Recording it now means that the moment Identity Governance and Administration decides who does this work, this step already has a named owner instead of being rediscovered later as a gap. Surfaced as q-IGA.md q14.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-RETAG-466
    summary: "DESTRUCTIVE (re-point an existing handoff_processes tag): IGA authored handoff 466's process tag at the coarse code 8.3.8; a more-specific code 8.7.5.9 exists on the same carried entity. Re-point or leave?"
    question: |
      Handoff 466 (Identity Governance and Administration sends an approved access request to IT Service Management as a service incident) is currently tagged with the broad process \"Manage IT user identity and authorization\". A narrower process that fits the same work, \"Triage IT service delivery incidents\", already exists. Should the tag be re-pointed to the narrower process?
    options:
      - "Re-point handoff 466's tag from process 273 (8.3.8) to process 1299 (8.7.5.9). Mechanical, but it overwrites an existing tag, so it needs your sign-off."
      - "Leave the tag at the broader process 8.3.8."
    why: |
      The narrower tag describes the actual incident-triage work the handoff realizes, improving process-health accuracy. It overwrites a non-empty value (Rule #21 destructive), so the agent will not apply it without confirmation. Surfaced as q-IGA.md q15. The sibling re-point on handoff 631 belongs to IT Service Management's audit (it is the source of 631).
    extra_b9d_added: "2026-06-13"

b3:
  - id: B3-RULESETS
    candidate: iga_sod_rulesets
    rationale: "Every flagship IGA suite splits the toxic-combination definition (ruleset) from the violation. Catalog currently treats violations as the master and rulesets as implicit configuration. Per SailPoint Policy, Saviynt Risk Object, and Pathlock SoD Ruleset schemas, the ruleset is a first-class master with its own lifecycle and ownership. Verification path: SailPoint Compliance Manager API, Saviynt Risk Object docs, Pathlock SoD ruleset configuration guide."
    vendor_evidence:
      - {vendor: SailPoint, evidence: 1st_class}
      - {vendor: Saviynt, evidence: 1st_class}
      - {vendor: Pathlock, evidence: 1st_class}
    proposed_module: IGA-SOD-MGMT
  - id: B3-CERT-LINES
    candidate: iga_entitlement_certifications
    rationale: "Per-line decision layer absent from catalog: every flagship splits Campaign (iga_access_certifications, already present) from Campaign Item / Certification Decision (per-entitlement attestation). Without it the relationship iga_access_certifications <-> iga_user_entitlements cannot carry per-row decision state. Verification path: SailPoint Certification Item schema, Saviynt Certification Detail object, Omada Identity Suite Survey Item."
    vendor_evidence:
      - {vendor: SailPoint, evidence: 1st_class}
      - {vendor: Saviynt, evidence: 1st_class}
      - {vendor: Omada, evidence: 1st_class}
    proposed_module: IGA-ACCESS-CERTIFICATION
  - id: B3-ROLE-MINING
    candidate: iga_role_mining_jobs
    rationale: "Flagship vendors (SailPoint Role Insights, Saviynt Identity Analytics, Omada Role Modeling) all model role-discovery / role-modeling computation runs as a first-class master with state machine (queued -> running -> review -> applied). Catalog has no entity capturing role-mining computation results. Could be deferred if treated as config-tier; could spawn a new IGA-IDENTITY-ANALYTICS module if treated as substantial. Verification path: SailPoint Role Insights API, Saviynt Role Engineering documentation, Omada Role Mining Studio."
    vendor_evidence:
      - {vendor: SailPoint, evidence: 1st_class}
      - {vendor: Saviynt, evidence: 1st_class}
      - {vendor: Omada, evidence: 1st_class}
    proposed_module: "IGA-ENTITLEMENT-CATALOG or new IGA-IDENTITY-ANALYTICS"
  - id: B3-CONNECTORS
    candidate: iga_provisioning_connectors
    rationale: "Connector catalog itself currently implicit; each connector is a config-shape master describing target system, protocol (SCIM / REST / proprietary), credential reference, and last-sync state. Without it iga_provisioning_events has no master to point at on the connector axis. Verification path: SailPoint Connector Framework, Saviynt Application Onboarding schema, Microsoft Entra ID Governance connector catalog."
    vendor_evidence:
      - {vendor: SailPoint, evidence: 1st_class}
      - {vendor: Saviynt, evidence: 1st_class}
      - {vendor: Microsoft Entra ID Governance, evidence: 1st_class}
    proposed_module: IGA-AUTO-PROVISIONING
  - id: B3-BREAK-GLASS
    candidate: iga_break_glass_accounts
    rationale: "Emergency-access accounts with elevated-monitoring rules sit adjacent to PAM but flagship IGA suites carry their own break-glass governance. SailPoint, Saviynt explicitly model the entity with check-out / check-in lifecycle. Could equally belong to a future PAM domain. Verification path: SailPoint Privileged Account Management module, Saviynt Privileged Access Management schema."
    vendor_evidence:
      - {vendor: SailPoint, evidence: 1st_class}
      - {vendor: Saviynt, evidence: 1st_class}
    proposed_module: "new IGA-PRIVILEGED-OVERSIGHT, or routes to PAM domain"
