b2:
  - id: B2-MODULE-SPLIT
    summary: Pick the DEM module split shape.
    question: How should DEM be split into modules?
    options:
      - "(a) 2-module: DEM-ENDPOINT-EXPERIENCE (endpoint_experience_scores, endpoint_anomaly_findings, digital_friction_events) + DEM-WEB-EXPERIENCE (synthetic_monitoring_results, real_user_sessions)"
      - "(b) 3-module: add DEM-SAAS-REACHABILITY once sla_compliance_records / application_response_traces land"
      - "(c) single-module: DEM as one module while capability_count is 0 (Rule #14 floor not yet binding)"
    why: >-
      Decision shapes B1B-M1, B1B-B10b, B1B-B12, B1B-F1, B1B-F2. Each option
      produces a different module set and a different downstream loader plan.

  - id: B2-DEX-BOUNDARY
    summary: Decide the DEX-PLATFORM boundary versus DEM.
    question: How to handle the DEX (Nexthink, 1E, ControlUp Edge DX, Lakeside SysTrack, HappySignals) overlap?
    options:
      - "(i) absorb DEX into DEM and reject the DEX-PLATFORM candidate"
      - "(ii) promote DEX-PLATFORM and migrate endpoint_experience_scores + endpoint_anomaly_findings + digital_friction_events to it"
      - "(iii) keep both with overlap, express via solution_domains for dual-coverage vendors"
    why: >-
      Interacts with Bucket 3 #1 ownership of device_health_summaries and
      possibly of digital_friction_events / endpoint_anomaly_findings ownership
      migration from DEM. Affects the right module set for B2-MODULE-SPLIT.

  - id: B2-PATTERN-FLAGS
    summary: Confirm per-master pattern flag flips (B1B-B4).
    question: Confirm has_personal_content=true on real_user_sessions, digital_friction_events, endpoint_experience_scores?
    options:
      - "confirm all three flips, has_submit_lock and has_single_approver remain false across DEM"
      - "confirm a subset (specify which)"
      - "reject (justify in chat, no notes write per Rule #15)"
    why: >-
      Pattern flags drive the deployer and the architect's downstream
      derivations. Auto-flipping is forbidden; user must confirm per row.

  - id: B2-LIFECYCLE
    summary: Confirm config-shape exemption for 4 DEM masters.
    question: Confirm 4-of-5 masters are config-shape exempt from data_object_lifecycle_states?
    options:
      - "confirm exemption for endpoint_experience_scores, synthetic_monitoring_results, real_user_sessions, digital_friction_events; author states only for endpoint_anomaly_findings"
      - "reject exemption for one or more (author states for those too, specify which)"
    why: >-
      Reduces B1B-B12 authoring surface from 5 masters to 1. No notes column
      writes per Rule #15; exemption is tracked in the audit record only.

  - id: B2-A4-DRAFT
    summary: Provide Rule #20 catalog_tagline and catalog_description for DEM.
    question: User-approved wording for domains.id=83 catalog_tagline and catalog_description?
    options:
      - "supply both verbatim strings"
      - "agent drafts both for explicit user approval before write"
      - "leave empty for now"
    why: >-
      Rule #20 forbids agent-authored catalog text without explicit user
      approval. Blocks B1B-A4.

