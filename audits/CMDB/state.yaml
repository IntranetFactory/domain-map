    summary: "Replace 3 stale discovery_substring APQC tags on handoffs 51, 236, 237."
    finding: "APQC TAGGING - `handoff_processes` rows id 7 (handoff 236, process 1180 `Review and monitor application security controls`), id 9 (handoff 237, process 1180), id 52 (handoff 51, process 9 `Manage Financial Resources`) carry discovery_substring proposals with incorrect process matches. APM-to-CMDB application onboard is asset-record-maintenance, not security-review; ITSM-unauthorized-change-detection is incident-triage, not financial-resource management."
