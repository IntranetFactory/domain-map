b1a:
  - id: B1A-M1
    summary: "Add missing master `ci_reconciliation_rules` to CMDB-CORE."
    finding: "MISSING - `ci_reconciliation_rules` not in catalog. Universal across ServiceNow IRE, BMC Helix reconciliation_rules, Device42 dedupe_rules. Reconciliation logic is the load-bearing differentiator across all flagships and is unmodeled in the current footprint."
    action: "Phase B insert: new `data_objects` row (singular `CI Reconciliation Rule`, plural `CI Reconciliation Rules`, kind=domain_owned), DMDO row role=master+necessity=required under CMDB-CORE (108), lifecycle states (proposed: `draft`, `active`, `superseded`, `retired`), intra-domain relationships to configuration_items (76) and ci_relationships (77)."
    affected_modules: [108]
    vendor_evidence: ["ServiceNow CMDB Identification and Reconciliation Engine", "BMC Helix Discovery", "Device42"]
  - id: B1A-M2
    summary: "Add missing master `ci_attestations` to CMDB-CORE."
    finding: "MISSING - `ci_attestations` not in catalog. ServiceNow CMDB Data Foundations attestation tasks, BMC Helix data-steward review cycles, Device42 verification queue. CI owner periodic attestation is a primary data-quality control."
    action: "Phase B insert: new `data_objects` row (`CI Attestation`/`CI Attestations`), DMDO master under CMDB-CORE, lifecycle states (proposed: `requested`, `responded`, `accepted`, `expired`), users edge for attester."
    affected_modules: [108]
    vendor_evidence: ["ServiceNow CMDB Data Foundations", "BMC Helix Discovery", "Device42"]
  - id: B1A-M4
    summary: "Add missing master `ci_audit_log` to CMDB-CORE."
    finding: "MISSING - `ci_audit_log` not in catalog. Universal: every flagship exposes a CI history audit table separate from generic record-history. SOX-ITGC evidence depends on it."
    action: "Phase B insert: new `data_objects` row (`CI Audit Log Entry`/`CI Audit Log`, kind=domain_owned), DMDO master under CMDB-CORE, append-only lifecycle (no workflow), users edge for actor."
    affected_modules: [108]
    vendor_evidence: ["ServiceNow CMDB CI history", "BMC Helix Discovery", "Device42"]
  - id: B1A-M7
    summary: "Add ISO-19770-1 to regulations master + link to CMDB."
    finding: "MISSING - `regulations` master row for ISO-19770-1 absent; cannot link to CMDB until the row exists. ISO/IEC 19770-1 IT asset management process framework touches CMDB as the CI substrate ITAM/SAM build on."
    action: "INSERT `regulations` row (regulation_name `ISO/IEC 19770-1`, framework body ISO), then INSERT `domain_regulations` row linking CMDB (domain_id=4) -> the new regulation with applicability=mandatory."
