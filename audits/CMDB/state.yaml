b2:
  - id: B2-1
    summary: "B12 config-shape exemption decision for `ci_classes`."
    question: "Treat ci_classes (78) as config-shape (Rule #12 exemption, no lifecycle states required) OR author a minimal `defined/active/deprecated` lifecycle?"
    options:
      - "(a) Accept exemption as a tracked decision here only (per Rule #15, do NOT populate data_objects.notes)."
      - "(b) Approve a specific notes wording the user supplies."
      - "(c) Author the minimal lifecycle."
    why: "ci_classes is class taxonomy authored once and edited rarely. Rule #15 forbids auto-populating notes; decision must be surfaced to user. Gates B1B-S2-lifecycles."
  - id: B2-2
    summary: "Pattern flags across all 5 CMDB masters."
    question: "Flip `configuration_items.has_submit_lock=true` to reflect the registered->in_use lock pattern, or leave all flags false?"
    options:
      - "(a) Flip configuration_items.has_submit_lock=true."
      - "(b) Leave as-is, surface a tracked note in the audit only."
      - "(c) Author the flag plus user-approved notes wording."
    why: "configuration_items.registered (state 272, requires_permission=true) implies once registered with reconciliation rules applied, the canonical record is locked against unscoped edits. False-by-default is not the same as false-after-review (Rule #12 / B4)."
  - id: B2-3
    summary: "Service map ownership boundary with DISCOVERY."
    question: "When DISCOVERY modularizes, should `service_maps` (79) move to a DISCOVERY-SERVICE-MAP module with CMDB-SERVICE-MAPPING becoming a consumer, or stay mastered in CMDB?"
    options:
      - "(a) Keep CMDB as master (current)."
      - "(b) Move master to DISCOVERY."
      - "(c) Split (CMDB masters business-service projection, DISCOVERY masters raw topology)."
    why: "ServiceNow ships Service Mapping as a Discovery add-on. Architectural ownership question; dependent on Bucket 3 D4 DISCOVERY modularization."
    blocked_by:
      - {type: depends_on, ref: B3-D4, reason: "DISCOVERY modularization shape determines available targets"}
  - id: B2-4
    summary: "Relationship row 220 vs 232 duplication on `enterprise_applications -> configuration_items`."
    question: "Keep both rows (different verbs: mapped_to vs onboards_into), collapse to row 220, or drop row 232 only?"
    options:
      - "(a) Keep both (encode distinct edges)."
      - "(b) Collapse to 220 (mapping is persistent; onboarding is a one-time transition captured by trigger event 208 already)."
      - "(c) Drop 232 only."
    why: "Same FK pair triggers ambiguity in label rendering. Independent."
  - id: B2-5
    summary: "CMDB roles naming - keep `IT-INFRA-CMDB-` infix or simplify to `IT-INFRA-`?"
    question: "Rename roles 10052/10053/10054 from `IT-INFRA-CMDB-ADMIN/...` to drop the CMDB infix, keep as-is, or demote to per-module tier permissions?"
    options:
      - "(a) Keep current names (CMDB-specific personas, easier to find in UI)."
      - "(b) Rename to drop the CMDB infix (cleaner function-scoping)."
      - "(c) Demote to per-module tier permissions and delete the cross-module roles."
    why: "Hard-invariant requires `<FUNCTION-CODE>-<ROLE-NAME>` format; current codes have an additional `CMDB-` infix."
  - id: B2-6
    summary: "B9 fan-out target for `ci.unauthorized_change_detected`."
    question: "Beyond ITSM (current sole subscriber), should the event also fan out to GRC (SOX-ITGC evidence) and SECOPS (potential indicator of compromise)?"
    options:
      - "(a) Add both GRC + SECOPS."
      - "(b) GRC only."
      - "(c) SECOPS only."
      - "(d) Keep ITSM-only."
    why: "Decision shape depends on whether SECOPS is wired to receive infrastructure-anomaly signals or only authentication-anomaly. Gates B1B-S4-fanout."
  - id: B2-7
    summary: "Pairwise reconciliation scope for CMDB neighbors."
    question: "Run the inline 4-leg pairwise diff for ITSM only (concrete gap), all 3 weighted neighbors (ITSM, DISCOVERY, APM) with blocked-on-neighbor annotations, or defer to follow-up Validate runs?"
    options:
      - "(a) ITSM only inline."
      - "(b) All 3 with blocked-on-neighbor annotations."
      - "(c) Defer all to follow-up runs once neighbors land."
    why: "DISCOVERY and APM gap traffic all originates from null-FK source modules (neighbor-side modularization gap)."
  - id: B2-8
    summary: "Catalog UX backfill - tagline and description for CMDB domain row and all 3 modules (A4 + M8 fail)."
    question: "Approve a draft for `domains.catalog_tagline` + `catalog_description` (Rule #20 A4) AND `domain_modules.catalog_tagline` + `catalog_description` for CMDB-CORE / CMDB-SERVICE-MAPPING / CMDB-BASELINES-DRIFT (Rule #20 M8)?"
    options:
      - "(a) Author all 8 drafts now, surface per-row for approval, then INSERT only the approved strings."
      - "(b) Defer to a marketing pass."
    why: "Rule #20 requires user approval BEFORE writing. Drafts must be in buyer voice (workflow + value), not analyst voice."

