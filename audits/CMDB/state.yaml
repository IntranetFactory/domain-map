b2:
  - id: B2-1
    summary: "B12 config-shape exemption decision for `ci_classes` (now structural via entity_type=catalog)."
    question: "ci_classes (78) is now classified entity_type=catalog, which is Rule #12 lifecycle-exempt. Accept the exemption as-is, OR author a minimal `defined/active/deprecated` lifecycle for surface uniformity?"
    options:
      - "(a) Accept the structural exemption (entity_type=catalog already records it; no notes write per Rule #15). [DEFAULT, gates B1B-S2-lifecycles for the other 3 masters]"
      - "(b) Author the minimal `defined/active/deprecated` lifecycle anyway."
    why: "ci_classes is class taxonomy authored once and edited rarely. entity_type=catalog now carries the exemption structurally; this confirms whether the user wants a lifecycle anyway. Gates the remaining B1B-S2 lifecycle authoring for ci_relationships/service_maps/ci_baselines."
  - id: B2-2
    summary: "Pattern flags across CMDB masters."
    question: "Flip `configuration_items.has_submit_lock=true` to reflect the registered->in_use lock pattern, or leave all flags false?"
    options:
      - "(a) Flip configuration_items.has_submit_lock=true."
      - "(b) Leave as-is (tracked decision only)."
      - "(c) Author the flag plus user-approved notes wording."
    why: "configuration_items.registered (state 272, requires_permission=true) implies once registered with reconciliation rules applied, the canonical record is locked against unscoped edits. Flags valid only on operational_workflow/operational_record masters (configuration_items is now operational_workflow). False-by-default is not the same as false-after-review (Rule #12 / B4). Flipping a flag = overwriting an existing value = destructive; needs sign-off."
  - id: B2-3
    summary: "Service map ownership boundary with DISCOVERY."
    question: "When DISCOVERY modularizes, should `service_maps` (79) move to a DISCOVERY-SERVICE-MAP module with CMDB-SERVICE-MAPPING becoming a consumer, or stay mastered in CMDB?"
    options:
      - "(a) Keep CMDB as master (current)."
      - "(b) Move master to DISCOVERY."
      - "(c) Split (CMDB masters business-service projection, DISCOVERY masters raw topology)."
    why: "Service Mapping ships as a Discovery add-on in the flagship suite. Architectural ownership question; dependent on B3-D4 DISCOVERY modularization. A master move is a b2 (never auto-applied)."
    blocked_by:
      - {type: depends_on, ref: B3-D4, reason: "DISCOVERY modularization shape determines available targets"}
  - id: B2-4
    summary: "Relationship row 220 vs 232 duplication on `enterprise_applications -> configuration_items`."
    question: "Keep both rows (different verbs: mapped_to vs onboards_into), collapse to row 220, or drop row 232 only?"
    options:
      - "(a) Keep both (encode distinct edges)."
      - "(b) Collapse to 220 (mapping is persistent; onboarding is a one-time transition captured by trigger event 208 already)."
      - "(c) Drop 232 only."
    why: "Same FK pair triggers ambiguity in label rendering. Collapse/drop = destructive (DELETE/overwrite); needs sign-off. Independent."
  - id: B2-5
    summary: "CMDB roles naming - keep `IT-INFRA-CMDB-` infix or simplify to `IT-INFRA-`?"
    question: "Rename roles 10052/10053/10054 from `IT-INFRA-CMDB-ADMIN/...` to drop the CMDB infix, keep as-is, or demote to per-module tier permissions?"
    options:
      - "(a) Keep current names (CMDB-specific personas, easier to find in UI)."
      - "(b) Rename to drop the CMDB infix (cleaner function-scoping)."
      - "(c) Demote to per-module tier permissions and delete the cross-module roles."
    why: "Hard-invariant requires `<FUNCTION-CODE>-<ROLE-NAME>` format; current codes have an additional `CMDB-` infix. Rename/demote = overwrite/delete on existing rows = destructive. NOTE: these may be legacy `roles`-grain rows; under Plan 3 personas live in `domain_roles`. Confirm grain before acting."
  - id: B2-6
    summary: "B9 fan-out target for `ci.unauthorized_change_detected`."
    question: "Beyond ITSM (current sole subscriber), should the event also fan out to GRC (SOX-ITGC evidence) and SECOPS (potential indicator of compromise)?"
    options:
      - "(a) Add both GRC + SECOPS."
      - "(b) GRC only."
      - "(c) SECOPS only."
      - "(d) Keep ITSM-only."
    why: "Decision shape depends on whether SECOPS is wired to receive infrastructure-anomaly signals or only authentication-anomaly. Gates B1B-S4-fanout."
  - id: B2-7
    summary: "Pairwise reconciliation scope for CMDB neighbors."
    question: "Run the inline 4-leg pairwise diff for ITSM only (concrete gap), all 3 weighted neighbors (ITSM, DISCOVERY, APM) with blocked-on-neighbor annotations, or defer to follow-up Validate runs?"
