b2:
  - id: B2-1
    summary: Module split shape for FLEET-MAINT (3 vs 2 modules) - gates everything downstream.
    question: |
      Adopt the default 3-module split (FLEET-MAINT-WORK-ORDER, FLEET-MAINT-PM, FLEET-MAINT-PARTS) or the alternative 2-module split (FLEET-MAINT-OPS merging work-order + PM, FLEET-MAINT-PARTS standalone)?
    options:
      - 3-module split (recommended; matches AssetWorks and Trimble product-line split)
      - 2-module split (still satisfies Rule #14 >=2-module floor)
      - Other split, name the modules and their masters
    why: Every subsequent B / E / F / H1 fix needs concrete module FKs. Until this resolves, B1B-S7, S9, S11 permission_verb_override, S12, S14, S15, B1B-M1..M8, B1B-B1..B6 source-side FKs all remain blocked.
  - id: B2-2
    summary: Pattern-flag scope on maintenance_defects (has_personal_content) and vehicle_work_orders (has_submit_lock).
    question: Set has_submit_lock=true on vehicle_work_orders (post-completion freeze) and has_personal_content=true on maintenance_defects (DVIR photos + driver signature)?
    options:
      - Both true (recommended for GDPR / CCPA-exposed buyers)
      - has_submit_lock=true only
      - Neither (defer)
    why: Rule #15 forbids notes commentary; the pattern flags themselves are structural and need explicit per-row confirmation.
  - id: B2-3
    summary: vehicle_inspections mastery shape (DVIR vs PMI) - coordinated with FLEET-MGMT audit Bucket 2 #4.
    question: Should FLEET-MGMT keep unified vehicle_inspections master with an inspection_kind discriminator, or should FLEET-MAINT master a separate mechanic_periodic_inspections for PMI?
    options:
      - (a) FLEET-MGMT unified with discriminator (recommended; matches Whip Around and Fleetio)
