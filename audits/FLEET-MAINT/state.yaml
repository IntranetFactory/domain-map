b1a:
  - id: B1A-SYSTEM-SKILLS
    summary: "3 new modules each need a <module_code_lower>_agent system skill; legacy domain-scoped skill 59 must retire (Rule #17 -> F2/F3)."
    finding: >-
      The 2026-06-02 modularization created 3 full modules
      (FLEET-MAINT-WORK-ORDER id 249, FLEET-MAINT-PM id 250, FLEET-MAINT-PARTS id
      251) with zero module-scoped system skills. Rule #17 (F2) requires exactly
      one <module_code_lower>_agent system skill per module; F3 requires >=1
      skill_tools row each. Legacy domain-scoped skill fleet-maint-system (id 59,
      domain_id=149, domain_module_id=NULL) remains with 6 skill_tools (rows 544,
      545, 546, 547, 969, 970): 4 query_* covering the 4 masters (470
      vehicle_work_orders, 471 preventive_maintenance_schedules, 807
      vehicle_parts_inventory, 808 maintenance_defects), plus send_email (id 37,
      channel primitive, see B1B-S14) and sign_document (id 42, external
      side_effect, see B2-6 for the workflow rationale). The module-split
      prerequisite (formerly B1B-S1) is satisfied as of 2026-06-02.
    action: >-
      Author 3 system skills (fleet_maint_work_order_agent on 249,
      fleet_maint_pm_agent on 250, fleet_maint_parts_agent on 251). Redistribute
      the 4 query_* tools by mastered entity (vehicle_work_orders +
      maintenance_defects -> 249; preventive_maintenance_schedules -> 250;
      vehicle_parts_inventory -> 251). Resolve send_email per B1B-S14 (substitute
      notify_person) and sign_document per B2-6, then DELETE skill 59 and its 6
      skill_tools last.
    affected_modules: [249, 250, 251]
    extra_legacy_skill_id: 59
    extra_legacy_skill_tool_ids: [544, 545, 546, 547, 969, 970]

  - id: B1A-CATALOG-UX-COPY
    summary: "domains row 149 + the 3 new modules carry empty catalog_tagline / catalog_description (M8 / A4 backfill)."
    finding: >-
      domains.catalog_tagline and catalog_description on FLEET-MAINT (id 149) are
      both empty (A4 fail, open since 2026-05-30). As of 2026-06-02 the 3 new
      modules (249, 250, 251) were also created with empty catalog copy
