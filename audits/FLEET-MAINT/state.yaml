b2:
  - id: B2-2
    summary: Pattern-flag scope on maintenance_defects (has_personal_content) and vehicle_work_orders (has_submit_lock).
    question: Set has_submit_lock=true on vehicle_work_orders (post-completion freeze) and has_personal_content=true on maintenance_defects (DVIR photos + driver signature)?
    options:
      - Both true (recommended for GDPR / CCPA-exposed buyers)
      - has_submit_lock=true only
      - Neither (defer)
    why: Rule #15 forbids notes commentary; the pattern flags themselves are structural and need explicit per-row confirmation.
  - id: B2-3
    summary: vehicle_inspections mastery shape (DVIR vs PMI) - coordinated with FLEET-MGMT audit Bucket 2 #4.
    question: Should FLEET-MGMT keep unified vehicle_inspections master with an inspection_kind discriminator, or should FLEET-MAINT master a separate mechanic_periodic_inspections for PMI?
    options:
      - (a) FLEET-MGMT unified with discriminator (recommended; matches Whip Around and Fleetio)
      - (b) FLEET-MAINT separate mechanic_periodic_inspections (would add a new FLEET-MAINT-WORK-ORDER 249 master)
    why: PMI completion is a work-order outcome (mechanic signs off); DVIR is driver activity. vehicle_inspections (374) is consumed (consumer/required) in FLEET-MAINT-WORK-ORDER 249; FLEET-MGMT masters it in module 205. Cross-coordinated decision.
  - id: B2-4
    summary: preventive_maintenance.due attribution defect on handoff 312.
    question: How should the PM.due event be attributed - TELEMATICS-owned upstream signal or FLEET-MAINT-owned lifecycle event?
    options:
      - (a) Introduce TELEMATICS-owned engine_hours.threshold_reached, redirect handoff 312 source/target (recommended; cleanest)
      - (b) Self-handoff source=target=FLEET-MAINT (FLEET-MAINT-PM 250 publishes, FLEET-MAINT-WORK-ORDER 249 consumes)
      - (c) Accept current shape (informal acknowledgement that TELEMATICS upstream)
    why: Trigger event 304 is published on FLEET-MAINT's master (PM schedules, now in FLEET-MAINT-PM 250). Handoff 312's source=TELEMATICS mis-attributes the event source.
  - id: B2-5
    summary: maintenance_defect.resolved outbound handoff shape (1-3 new handoff rows).
    question: Which targets consume the maintenance_defect.resolved event (trigger event 992)?
    options:
      - (a) Intra-domain only (FLEET-MAINT-WORK-ORDER 249 consumes)
      - (b) Outbound to AP-AUTO for repair invoice
      - (c) Outbound to ERP-FIN for fixed-asset depreciation
      - (d) Outbound to FLEET-MGMT for vehicle return-to-service status
      - (a) + (b) + (d) (recommended)
    why: Event fires but no handoff row consumes it; need user to scope outbound shape.
  - id: B2-6
    summary: sign_document workflow rationale on legacy skill 59 (folds into B1A-SYSTEM-SKILLS).
    question: Why is sign_document linked from skill 59 (tool id 42)?
    options:
      - (a) Customer signature on shop completion - keep, redistribute to fleet_maint_work_order_agent (module 249)
      - (b) OEM warranty claim attestation - keep, redistribute to fleet_maint_parts_agent (module 251)
      - (c) Both real workflows - keep on both modules' skills (recommended if both confirm)
      - (d) Vestigial - DELETE skill_tools row 547
    why: F4 invariant ticks but the workflow rationale is unverified; needs user judgment on the real use case. Resolves B1B-S15.
  - id: B2-7
    summary: domain_regulations scope (floor vs stretch set).
    question: Which regulations should domain_regulations carry for FLEET-MAINT?
    options:
      - Floor only (FMCSA Part 396, FMCSA Part 393, NHTSA 49 CFR 573, EPA emissions inspection, OSHA 29 CFR 1910 as required)
      - Floor + stretch (add FTC Magnuson-Moss Warranty Act, RCRA hazardous-waste handling for used oil + tires + batteries, state lemon laws as conditional)
      - Subset, name which
    why: All underlying regulations rows are missing from the catalog (upstream gap); this question also gates the upstream catalog_addition for B1B-S16.
  - id: B2-8
    summary: vehicle_recall_campaigns module placement.
    question: Should vehicle_recall_campaigns (B3-M3) embed in FLEET-MAINT-PARTS (251), split into its own sub-module, or wait for VEHICLE-RECALL-MGMT promotion via Phase 0?
    options:
      - (a) Embed in FLEET-MAINT-PARTS 251 (recommended for catalog parsimony; warranty + recall coverage already live here)
      - (b) Split into its own FLEET-MAINT-RECALL sub-module
      - (c) Promote VEHICLE-RECALL-MGMT to its own domain after Phase 0 (depends on B3-2)
    why: Recall Masters and CDK Global treat it as a discrete buyer journey; broader flagships embed. FM-WARRANTY (420) landed in FLEET-MAINT-PARTS 251, so recall fits there.
  - id: B2-9
    summary: shops master shape vs locations embedded_master vs IWMS authority.
    question: How should the shops master be modeled?
    options:
      - (a) FLEET-MAINT-WORK-ORDER 249 masters shops with FK to locations (recommended; maintenance-specific operational metadata)
      - (b) Leave shop attributes on locations; skip shops entirely (overloads locations)
      - (c) IWMS masters shops; FLEET-MAINT embedded_master (consistent with IWMS locations mastery)
    why: shops is more specific than locations (bay capacity, mechanic roster, certification scope); the maintenance-specific metadata is operationally distinct.
  - id: B2-10
    summary: maintenance_defects triggers_revision preventive_maintenance_schedules encoding.
    question: How should the relationship be encoded given the relationship_type enum (one_to_one | one_to_many | many_to_many; no many_to_one)?
    options:
      - (a) Swap source/target (source=preventive_maintenance_schedules, related=maintenance_defects, one_to_many, owner=target, verb=revised_via, inverse=triggers_revision)
      - (b) Keep verb direction with one_to_many (logically inverted from audit text)
      - (c) Abandon the edge
    why: 2026-05-30 audit specified many_to_one, which is not a valid relationship_type value. Decision unblocks B1B-S4-R5.
  - id: B2-CATALOG-COPY
    summary: catalog_tagline and catalog_description on the domains row (149) and now the 3 modules - buyer-voice text needed.
    question: >-
