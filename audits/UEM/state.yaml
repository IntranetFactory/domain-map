b2:
  - id: B2-1
    summary: UEM module split shape decision (gates the entire B1B cascade)
    question: Which split shape does UEM adopt - the prior 4-module proposal (UEM-DEVICE-LIFECYCLE, UEM-POLICY-CONFIG, UEM-APP-DELIVERY, UEM-COMPLIANCE-POSTURE), a 3-module collapse, a 5-module variant separating zero-touch onboarding, or another shape?
    options:
      - "4-module proposed"
      - "3-module collapse of POLICY-CONFIG + COMPLIANCE-POSTURE"
      - "5-module variant separating UEM-ZERO-TOUCH-ONBOARDING from UEM-DEVICE-LIFECYCLE"
      - "Other split user proposes"
    why: M1 fails and every other M / B / E / F dependency cascades from this single decision. Module count, capability mapping, lifecycle state attribution, system-skill scope, role bundles, and handoff source_domain_module_id backfill all derive from the chosen shape.

  - id: B2-2
    summary: Catalog UX wording (Rule #20) for domain and per-module rows
    question: What exact catalog_tagline and catalog_description strings should be PATCHed on /domains?id=eq.86 and on each new domain_modules row?
    options:
      - "User supplies exact strings per row"
      - "User edits an agent-proposed draft and supplies the final"
      - "Defer to a separate marketing pass"
    why: Rule #20 forbids agent-authored buyer-voice prose without explicit per-row approval. The prior audit drafts are starting points only.

  - id: B2-3
    summary: Relationship verbs for B7 user-edges and B6 intra-domain edges
    question: What exact relationship_verb strings should be loaded on the 6 existing user-edge rows (1847-1852) and the 7 proposed intra-domain edges?
    options:
      - "Confirm prior continuation labels (has assigned / has last seen / has issued to / has created by / has owned by / has uploaded by for users edges)"
      - "Revise specific verbs"
      - "Defer until B12 lifecycle states author"
    why: Rule #15 forbids agent-populated notes; the verb column itself is structural but the exact wording reads as label so user confirms.

  - id: B2-4
    summary: Pattern-flag confirmation on candidate UEM masters
    question: Confirm or revise these flag candidates - enrolled_devices.has_personal_content=true, enrollment_tokens.has_submit_lock=true, device_compliance_policies.has_submit_lock=true.
    options:
      - "All three confirmed"
      - "Some flipped (specify)"
      - "Defer until module split decides BYOD scope handling"
    why: Pattern flags are catalog-wide truths about the master; choosing default vs per-deployment-override has downstream privacy and lifecycle implications.

  - id: B2-5
    summary: coverage_level rebalancing for the 5 RMM / PSA solutions after pure-play UEM vendors land
    question: After pure-play UEM solutions (Intune, Jamf Pro, Workspace ONE / Omnissa, Kandji, Hexnode UEM, MaaS360) land at coverage_level=primary, do the existing 5 rows stay partial (status quo) or move OFF UEM into the RMM domain (id 130)?
    options:
      - "Keep partial on UEM (status quo)"
      - "Move primary attribution to RMM, drop UEM rows"
      - "Hybrid - keep partial on UEM and also add primary on RMM"
    why: Existing rows are RMM / PSA platforms with UEM-as-feature. The semantic call is whether they primarily serve the UEM market (vendor pitch) or the RMM market (buyer view).

  - id: B2-6
    summary: Regulation scope - which UEM-applicable regulations to load
    question: Load 0, 1, or all of GDPR (BYOD personal data), HIPAA (healthcare device PHI), CCPA / CPRA (US PI on devices), FedRAMP (US public-sector UEM)?
    options:
      - "All four"
      - "GDPR only (universal)"
      - "Specific subset (user names which)"
      - "Defer to Phase 0 vendor research per Bucket 3 vetted route"
    why: UEM is sector-neutral but the regulation choice anchors compliance-shaped capability authoring (no audit blocker today, but affects downstream M-band capability rollups).

b3:
  - id: B3-1
    candidate: device_telemetry_streams
    rationale: Continuous device telemetry stream rows (battery, posture, network conditions). DEX-adjacent. Distinct from inventory snapshots (B3-4) and compliance results (already mastered as 563). Whether to master in UEM or split into a DEX domain is open.
    vendor_evidence:
      - Workspace ONE Intelligence
      - Kandji Pulse
      - Jamf Protect
    proposed_module: UEM-COMPLIANCE-POSTURE

  - id: B3-2
    candidate: device_remote_sessions
    rationale: Remote-assist / remote-control session records (technician initiated). Channel ambiguity with RMM (RMM domain id 130 likely has overlapping concept). Should UEM master, RMM master, or split?
    vendor_evidence:
      - Intune Remote Help
      - Jamf Remote
      - Workspace ONE Assist
    proposed_module: UEM-DEVICE-LIFECYCLE

  - id: B3-3
    candidate: enrolled_device_blockages
    rationale: Conditional-access block records when a UEM policy gates a device. Could be derived from device_compliance_results (id 563) rather than mastered standalone.
    vendor_evidence:
      - Intune compliance / conditional access
      - Workspace ONE conditional access
    proposed_module: UEM-COMPLIANCE-POSTURE

  - id: B3-4
    candidate: device_inventory_snapshots
    rationale: Periodic hardware / software inventory snapshot rows. Hexnode + Workspace ONE master this; Intune + Jamf treat as derived from enrolled_devices state. Whether to master depends on retention requirements and reporting needs.
    vendor_evidence:
      - Hexnode UEM
      - Workspace ONE inventory
      - Intune device inventory
      - Jamf inventory
    proposed_module: UEM-DEVICE-LIFECYCLE
