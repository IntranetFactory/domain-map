schema_version: 2
domain: VMS
status: feedback_needed
next_action_by: user
last_audit: "2026-06-06"

b1a:
  - id: B1A-B9D-VERIFY
    summary: "B9d (handoff payload realization) has never run on this domain; run it on the next audit pass."
    finding: "B9d (handoff payload realization) was added 2026-06-09 and last ran in bulk only on HRSD; this domain was last audited before it existed, so its handoff payload tags are B9d-unverified in BOTH directions (inbound and outbound)."
    action: "Run B9d per the SKILL.md B9d band: classify every handoff payload on every boundary in BOTH directions (do not treat the inbound half as report-only), re-point ROLL-UPs on the source, surface MIS-TAGs on the source, and for each ORPHAN write a durable b1b item plus a q into the OWNER domain's audit files on whichever side owns it (state.yaml hygiene carve-out (b)). Do not touch record_status without an explicit user request (Rule #1)."

b1b:
  - id: B1B-A5
    summary: PATCH domains.business_logic with user-approved wording.
    finding: |
      domains.business_logic="" with crud_percentage=92 (<95). Rule #8 requires non-empty
      business_logic whenever crud_percentage<95. Draft surfaced as Bucket 2 #B2-5.
    blocked_by:
      - {type: user_decision, ref: B2-5}

  - id: B1B-B1
    summary: Resolve handoff 117 payload-vs-event mismatch.
    finding: |
      Outbound handoff 117 (VMS to S2P) has payload data_object_id=191 (contingent_invoices)
      but trigger event 146 (pm_work_order.invoiced) has data_object_id=187 (pm_work_orders).
      Mismatch: either the event's data_object_id is wrong (should be 191) or the handoff
      payload is wrong (should be 187). Cascades from Bucket 2 #B2-1 because entity 187's true
      identity determines the resolution.
    blocked_by:
      - {type: user_decision, ref: B2-1}

  - id: B1B-A4-DOMAIN-CATALOG-UX
    summary: PATCH domains.catalog_tagline + catalog_description with user-approved wording (B2-2).
    finding: |
      domains.catalog_tagline and catalog_description on VMS (64) are both empty (A4 fail).
      Module-level catalog UX (M8) for VMS-WORKER-SOURCING (315) and VMS-TIME-INVOICING (316)
      was authored and written on 2026-06-06 (both modules now carry buyer-voice tagline +
      description). The domain-grain copy still needs explicit exact-wording approval per
      Rule #20; drafts are in B2-2.
    blocked_by:
      - {type: user_decision, ref: B2-2}

b2:
  - id: B2-1
    summary: Entity 187 (pm_work_orders) identity, Preventive Maintenance vs staffing requisition / SOW.
    question: |
      Entity 187 is named pm_work_orders with singular_label "Preventive Maintenance
      Work Order" and aliases preventive maintenance order, PM WO, but its description
      and every attached workflow treat it as a staffing requisition / SOW. It is currently
      mastered in VMS-WORKER-SOURCING (315) consistent with its description. Which is correct?
    options:
      - "a) Rename + relabel + re-alias the entity to staffing_work_orders / sow_work_orders; keep mastered in VMS-WORKER-SOURCING (315). Most consistent with the existing relationships and handoffs."
      - "b) Treat as Preventive Maintenance, DELETE the VMS-WORKER-SOURCING master row + the relationships connecting it to contingent-labor masters, route entity to EAM, INSERT a fresh staffing_requisitions master in VMS-WORKER-SOURCING (315)."
      - "c) Split, keep pm_work_orders as Preventive Maintenance in EAM, INSERT a new staffing_requisitions master in VMS-WORKER-SOURCING (315). Same end-state as b but explicit about retention."
    why: |
      Description + workflow + handoff 117 + trigger event 146 + relationship rows point to
      staffing requisition / SOW. Name + labels + aliases point to Preventive Maintenance.
      Only the user can pick. The modularization placed 187 as master in 315 per its
      description; this does not pre-judge the rename. Gates B1B-B1 and the 187 lifecycle-state
      portion of the (now-resolved) B12 work, plus all Bucket 3.
    evidence: |
      Every flagship VMS vendor (Workday VNDLY, SAP Fieldglass, Beeline, Magnit, Utmost) masters
      a staffing-requisition / SOW entity as the start of the sourcing cycle and none masters
      preventive maintenance (an Enterprise Asset Management concern), so entity 187 is a staffing
      requisition that was mis-named; option (a) rename-in-place matches that vendor packaging.

  - id: B2-2
    summary: Approve catalog_tagline + catalog_description wording for the VMS domain row.
    question: |
      Per Rule #20, catalog UX text on the DOMAIN row needs explicit user approval of the exact
      string before PATCH. The MODULE-level catalog UX (315/316) was authored and written on
      2026-06-06 (empty-guard path, no pre-write gate). Only the domain-grain copy remains.
      Drafts:
      - tagline: "Source contingent workers through approved staffing suppliers, manage rate cards, and reconcile timesheets and invoices end-to-end."
      - description (3 sentences): "Manage the full contingent-workforce cycle, requisitions, supplier distribution, candidate submissions, worker assignments, timesheets, and invoices, in one system. Approve rate cards by role and region; classify each worker against IR35, California AB5, and EU Platform Work rules; and feed approved timesheets to payroll and project accounting automatically. Procurement and HR run it jointly: procurement governs the supplier panel, HR governs the worker classification."
    options:
      - "Approve domain drafts as-written."
      - "Rewrite, supply exact wording."
      - "Defer."
    why: Rule #20 hard rule; agent cannot PATCH domain-level catalog UX on its own. Feeds B1B-A4-DOMAIN-CATALOG-UX.

  - id: B2-3
    summary: Decide pattern flags (has_personal_content / has_submit_lock / has_single_approver) on the 6 masters.
    question: |
      All 6 masters currently carry every pattern flag = false. Re-evaluation:
      (i) contingent_workers.has_personal_content=true (PII: SSN, tax classification, IR35 status)?
      (ii) staffing_suppliers.has_single_approver=true (procurement approves activation)?
      (iii) rate_cards.has_single_approver=true (procurement or finance signs off)?
      (iv) entity 187 has_single_approver=true (hiring manager approves), gated on B2-1?
      (v) contingent_invoices.has_single_approver=true (AP approves payment)?
    options:
      - "Confirm each yes/no per item. No notes column writes per Rule #15."
    why: |
      Pattern flags affect downstream architect rendering and permission scoping; agent
      cannot infer without user confirmation. Independent of the module build.

  - id: B2-4
    summary: Confirm the module codes / split actually built.
    question: |
      The 2026-06-02 build used the default 2-way split: VMS-WORKER-SOURCING (315) +
      VMS-TIME-INVOICING (316), now live. Prior alternatives were 2-way alt
      (VMS-SOURCING-PIPELINE + VMS-TIME-INVOICE) and a 3-way split (VMS-REQUISITIONS +
      VMS-SUPPLIERS-RATES + VMS-TIME-INVOICING).
    options:
      - "Confirm default 2-way (no change)."
      - "Re-split to 3-way (requires a follow-up migration of caps + masters)."
      - "Rename codes (load-bearing in URLs / permission prefixes / handoff backfills)."
    why: |
      Module codes are load-bearing. The default is already built and now has handoffs, roles,
      and system skills attached to 315 / 316; changing it now is a migration, not a fresh build.
    evidence: |
      The flagship VMS vendors (Workday VNDLY, SAP Fieldglass, Beeline, Magnit, Utmost) package
      this market in two halves, sourcing / pre-engagement (requisitions, supplier distribution,
      candidate submissions, rate cards, worker records) and time-and-spend (timesheets, approvals,
      invoices, AP reconciliation), which is exactly the 315 Worker Sourcing / 316 Time-and-Invoicing
      seam; the 3-way alternative would fracture the suppliers-and-rates concern those vendors keep
      inside sourcing.

  - id: B2-5
    summary: Approve business_logic wording on the VMS domain row.
    question: |
      Rule #8 requires non-empty business_logic when crud_percentage<95 (VMS=92).
      Draft: "Rate-card refresh recomputes accrued cost across all active timesheets
      when a rate row supersedes; worker-classification engine applies IR35 / California
      AB5 / EU PWD precedence rules per engagement, producing a typed classification
      record that downstream payroll and AP-AUTO rely on for withholding rules."
    options:
      - "Approve draft as-written."
      - "Rewrite, supply exact wording."
      - "Defer."
    why: Business_logic is a domain-level field; safer to elicit user wording than to PATCH a 1-2 sentence summary that anchors downstream analysis.
  - id: B2-B9D-OWN-315
    summary: "Vendor Management System: name an owner for \"Process accounts payable (AP)\" (no one is responsible for it today)"
    question: |
      Core Financial Management hands work to Vendor Management System, but Vendor Management System has no one assigned to process accounts payable (AP), so that step currently has nobody responsible for it. Who should own it?
    options:
      - "The a named owner runs it and approves it."
      - "Someone else you name runs and approves it."
      - "Leave it unassigned for now."
    why: |
      Vendor Management System already assigns the a named owner to work of this kind, so (a) fills this gap the same way and gives the work a named owner. Surfaced as q-VMS.md q11.
    extra_b9d_added: "2026-06-13"
  - id: B2-B9D-OWN-167
    summary: "Vendor Management System: name an owner for \"Manage suppliers\" (no one is responsible for it today)"
    question: |
      Supplier Lifecycle Management hands work to Vendor Management System, but Vendor Management System has no one assigned to manage suppliers, so that step currently has nobody responsible for it. Who should own it?
    options:
      - "The a named owner runs it and approves it."
      - "Someone else you name runs and approves it."
      - "Leave it unassigned for now."
    why: |
      Vendor Management System already assigns the a named owner to work of this kind, so (a) fills this gap the same way and gives the work a named owner. Surfaced as q-VMS.md q12.
    extra_b9d_added: "2026-06-13"

b3:
  - id: B3-CANDIDATE-SUBMISSIONS
    candidate: candidate_submissions
    rationale: |
      Suppliers slate candidates against a requisition; carries scoring,
      hide-from-hiring-manager flags, withdrawal reasons. Universal in flagship VMS
      vendors. Gates worker_assignments downstream. Would master in VMS-WORKER-SOURCING (315).
    vendor_evidence:
      - {vendor: Workday VNDLY, evidence: 1st_class}
      - {vendor: SAP Fieldglass, evidence: 1st_class}
      - {vendor: Beeline, evidence: 1st_class}
      - {vendor: Magnit, evidence: 1st_class}
      - {vendor: Utmost, evidence: 1st_class}
    proposed_module: VMS-WORKER-SOURCING

  - id: B3-WORKER-ASSIGNMENTS
    candidate: worker_assignments
    rationale: |
      1:1 with a winning candidate; carries start / end / billable rate / project / WBS
      / location. Separate from contingent_workers because a worker can re-engage on
      multiple assignments. Universal in flagship VMS vendors. Would master in
      VMS-WORKER-SOURCING (315); contingent_timesheets bind to it.
    vendor_evidence:
      - {vendor: Workday VNDLY, evidence: 1st_class}
      - {vendor: SAP Fieldglass, evidence: 1st_class}
      - {vendor: Beeline, evidence: 1st_class}
      - {vendor: Magnit, evidence: 1st_class}
      - {vendor: Utmost, evidence: 1st_class}
    proposed_module: VMS-WORKER-SOURCING

  - id: B3-WORKER-CLASSIFICATIONS
    candidate: worker_classifications
    rationale: |
      Typed IR35 / California AB5 / EU Platform Work Directive determination per worker
      per engagement. Mandatory under WORKER-CLASS (58) and the 3 loaded regulations.
      Specialist depth varies (SAP Fieldglass + Magnit ship explicit classification
      engines; Workday VNDLY uses integration partners). Would master in
      VMS-WORKER-SOURCING (315).
    vendor_evidence:
      - {vendor: SAP Fieldglass, evidence: 1st_class}
      - {vendor: Magnit, evidence: 1st_class}
      - {vendor: Beeline, evidence: 1st_class}
      - {vendor: Utmost, evidence: secondary}
      - {vendor: Workday VNDLY, evidence: secondary}
    proposed_module: VMS-WORKER-SOURCING
