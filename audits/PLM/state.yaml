b2:
  - id: B2-LIFECYCLE-STATES-6-MASTERS
    summary: "3 PLM masters carry zero lifecycle states AND remain entity_type='unclassified' (B12 + residual B13). Their classification IS this decision."
    question: |
      The 2026-06-07 pass classified entity_type on 9 of 12 masters. The other 3
      (cad_models 800, cad_drawings 801, manufacturing_routings 803) were LEFT
      unclassified on purpose: each is the canary the prior audits flagged as
      possibly workflow-bearing, so its classification is exactly the judgment this
      b2 turns on. The `cad_drawings` case is the strongest: it has a
      `cad_drawing.released` event (id 1215), is the publish-side of intra-domain
      handoff 1401 (CAD-PDM -> MFG-PROCESS) and cross-domain handoff 1094, yet has
      no state machine. Decide per-master (each decision sets BOTH entity_type and
      whether a state machine is authored):
    options:
      - "cad_models (800): operational_workflow (author check_in / check_out / released state machine) | catalog (vault config, no workflow) | defer"
      - "cad_drawings (801): operational_workflow (released event already exists -> author draft / in_review / released / obsolete) | catalog | defer"
      - "manufacturing_routings (803): operational_workflow (released event 1213 exists -> author draft / released / superseded) | catalog | defer"
    why: |
      Classifying these 3 as operational_workflow makes B12 require a state machine
      (a workflow-design judgment the user owns); classifying them as catalog clears
      B12/B13 but asserts they are config-shape. Rule #15 forbids re-adding the prior
      notes-based config-shape annotation, so the exemption (or the workflow choice)
      must be surfaced, not embedded.
    affected_entities: [cad_models, cad_drawings, manufacturing_routings]
    affected_masters:
      - {data_object_id: 800, name: cad_models, target_module_id: 67, workflow: "vault check-in / check-out / release"}
      - {data_object_id: 801, name: cad_drawings, target_module_id: 67, workflow: "released event 1215 already published; publish-side of handoffs 1401 + 1094"}
      - {data_object_id: 803, name: manufacturing_routings, target_module_id: 68, workflow: "released event 1213 already published"}
    note_already_classified: |
      Classified this pass (no longer open): engineering_parts, engineering_revisions,
      engineering_change_orders, manufacturing_boms, product_compliance_declarations,
      engineering_requirements -> operational_workflow; engineering_bom_items -> junction;
      plm_product_variants, regulated_substances -> catalog.

  - id: B2-E6-RBAC-CONVENTION
    summary: "Only 1 of 17 workflow-gate permissions granted to any role; permission_hierarchy is empty for PLM, so auto-rollup is not the convention."
    question: |
      `/permission_hierarchy?or=(including_permission_id.in.(15 baseline ids),included_permission_id.in.(17 workflow-gate ids))` returns 0 rows.
      That removes the hierarchy auto-rollup option. The two remaining choices:
    options:
      - "(b) add 16 explicit workflow-gate grants across the 4 PLM roles per the audit's role-to-gate mapping (Design Engineer -> submit_part_review, release_part, obsolete_part, release_revision, submit_change_assessment, submit_requirement_review, approve_requirement, verify_requirement, obsolete_requirement; Engineering Change Manager -> submit_to_cab, approve_change_order, release_change_order, close_change_order; Regulatory Affairs Specialist -> log_supplier_declaration, approve_compliance_declaration, expire_compliance_declaration)"
      - "(c) treat the lone plm-mfg-process:release_mbom grant as a deliberate exception convention; leave the other 16 workflow gates unassigned"
    why: |
      The bundles silently grant baseline-manage / baseline-admin tiers but the
      workflow-gate permissions are not reachable via hierarchy expansion. Either
      the bundles need explicit gate grants (destructive-adjacent: adds role-power),
      or the convention is that workflow gates are out-of-bundle by design.
    affected_modules: [66, 67, 68, 69, 70]
    extra_unassigned_workflow_gates:
      - submit_part_review
      - release_part
      - obsolete_part
      - release_revision
      - submit_change_assessment
      - submit_to_cab
      - approve_change_order
      - release_change_order
      - close_change_order
      - log_supplier_declaration
      - approve_compliance_declaration
      - expire_compliance_declaration
      - submit_requirement_review
      - approve_requirement
      - verify_requirement
      - obsolete_requirement
    extra_only_granted_gate: plm-mfg-process:release_mbom

  - id: B2-H1-APPROVE-TAGS
    summary: "16 agent_curated handoff_processes rows at record_status='new'; reviewer approval is the open lift (Rule #1: user-only)."
    question: |
      `/handoff_processes?handoff_id=in.(1087-1094, 1241-1243)&proposal_source=eq.agent_curated&record_status=eq.new`
      returns 16 rows. Per Rule #1 only the user can flip to `approved`. Headline
