    summary: "Deferred (q4=a): keep the TRIANGULATED US TAM ~$600M (2025) placeholder for now; replace with a sourced Gartner / Spend Matters figure BEFORE the domain is released. Decided-to-defer, stays open."
    finding: |
      domains.usa_market_size_usd_m=600, market_size_source_year=2025 on domain 192 is triangulated from
      the asymmetry that standalone services-procurement software is a small slice (one pure-play + one
      near-pure-play) of the larger VMS/S2P services-procurement total, whose TAM is counted under those
      domains. The user chose (q4=a) to keep the flagged placeholder and source it before release.
    action: |
      Before release: research a sourced US TAM figure (Gartner / Spend Matters / IDC) and replace
      usa_market_size_usd_m / market_size_source_year. This OVERWRITES a non-empty value, so it needs
      explicit user approval at that time (Rule #1 / Rule #21). Not a q-file item now (the user has decided
      to defer); it surfaces again only when the release pass runs.
    blocked_by:
