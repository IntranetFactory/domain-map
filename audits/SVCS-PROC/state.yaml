    summary: "Cross-domain handoffs to/from S2P + CWM + CLM + SRM owed, plus the CWM and S2P embed rows pending those domains' builds."
    finding: |
      SVCS-PROC consumes suppliers (SRM 206), legal_contracts (CLM 66), rate_cards (CWM 189) and is embedded
