b1b:
  - id: B1B-CATALOG-COPY-CONFIRM
    summary: "Catalog-copy confirmation (Rule #20): buyer-voice copy written at record_status='new' for the domain + 2 modules awaits user confirm/correct. Keeps the domain feedback_needed until confirmed."
    finding: |
      The buyer-voice catalog_tagline + catalog_description were authored and written (record_status='new')
      for the SVCS-PROC domain (192) and both modules (SVCS-PROC-ENGAGEMENT, SVCS-PROC-SETTLEMENT). Per
      Rule #20 the written copy must be surfaced in the q-file for the user to confirm or correct; an
      unconfirmed write keeps the domain feedback_needed. Surfaced verbatim in q-SVCS-PROC.md.
    blocked_by:
      - {type: user_decision, ref: B1B-CATALOG-COPY-CONFIRM}

  - id: B1B-TAM-SOURCE
    summary: "US TAM ~$600M (2025) is a TRIANGULATED placeholder, not a sourced figure (q6=a accepted with the figure flagged). Replace with a Gartner / Spend Matters number before the domain is released."
    finding: |
      domains.usa_market_size_usd_m=600, market_size_source_year=2025 on domain 192 is triangulated from
      the asymmetry that standalone services-procurement software is a small slice (one pure-play + one
      near-pure-play) of the larger VMS/S2P services-procurement total, whose TAM is counted under those
      domains. The user accepted it as a placeholder (q6=a) to source before release.
    action: |
      Replace usa_market_size_usd_m / market_size_source_year with a sourced figure before the domain is
      released (overwrites a non-empty value -> needs explicit user approval, Rule #1 / Rule #21).
    blocked_by:
      - {type: user_decision, ref: B1B-TAM-SOURCE}

  - id: B1B-LIFECYCLE-STATES
    summary: "Lifecycle states owed for the 5 operational_workflow masters (Rule #12). Author on the lifecycle-realization pass."
    finding: |
      statements_of_work, services_engagements, services_proposals, sow_change_orders, sow_milestones,
      service_deliverables, milestone_invoices are entity_type='operational_workflow' and require lifecycle
      states (Rule #12); service_acceptances is operational_record (no lifecycle required). The masters were
      created without lifecycle states this pass.
    action: |
      Author data_object_lifecycle_states for each operational_workflow SVCS-PROC master (and the workflow-gate
      transitions that materialize the module permissions) on the lifecycle-realization pass. Additive,
      record_status='new'.

  - id: B1B-PERSONAS-RACI
    summary: "Personas + RACI owed for SVCS-PROC (domain_roles, business_function_domains, process_raci). Author on the personas pass."
    finding: |
      No CWM-style personas (domain_roles) or process_raci owners exist for SVCS-PROC yet. A services-
      procurement domain typically has a services procurement manager / engagement owner and a delivery /
      acceptance approver split.
    action: |
      Author domain_roles + business_function_domains + process_raci R/A owners on the personas pass. Additive.

  - id: B1B-HANDOFFS
    summary: "Cross-domain handoffs to/from S2P + CWM + CLM + SRM owed, plus the CWM and S2P embed rows pending those domains' builds."
    finding: |
      SVCS-PROC consumes suppliers (SRM 206), legal_contracts (CLM 66), rate_cards (CWM 189) and is embedded
      by CWM (as needed) and consumed by S2P. The inbound/outbound handoffs (e.g. SRM supplier onboarded ->
      SVCS-PROC engagement; CLM contract executed -> SOW authored; SVCS-PROC milestone accepted / invoice
      approved -> S2P spend settlement) are not authored yet. The CWM embedded_master rows and the S2P
      consumer/handoff rows are deferred to those domains' own builds (no CWM SOW-adjacent module exists yet;
      S2P is unbuilt for SOW).
    action: |
      Author handoffs (cross-domain + intra-domain lifecycle_progression) on the handoff pass; add the CWM
      embedded_master SOW rows when a CWM SOW-adjacent module is deployed, and the S2P consumer/handoff rows
      when S2P's services-procurement surface is built. Additive.
    blocked_by:
      - {type: build_pass, ref: CWM-SOW-EMBED}
      - {type: build_pass, ref: S2P-SOW-CONSUME}
