b1b:
  - id: B1B-S-PHASE-P
    summary: "Phase P (personas, role_modules, process_raci, lifecycle.process_id) for the now-multi-module domain; residual of B1A-SYSTEM-SKILLS after Phase S landed."
    finding: "Phase S landed 2026-06-05 (one system skill per full module: 223->skill 271, 224->skill 45, 225->skill 272, 226->skill 273, each with >=1 query skill_tools). The Phase-P half cannot be authored: process_raci gated assignments (E4) and data_object_lifecycle_states.process_id wiring (E6) both depend on lifecycle states, and lifecycle authoring is blocked by user_decision B2-LIFECYCLE-SHAPE (see B1B-S2-LIFECYCLE). Separately, all 9 own masters are still entity_type='unclassified' (B13 fail), which gates whether lifecycle is even required, and which permission verbs the gates derive. Personas (domain_roles) also need >=2 module reach (E2) which is now structurally possible (4 modules) but the RACI/gate layer they tie to is absent."
    blocked_by:
      - {type: user_decision, ref: B2-LIFECYCLE-SHAPE, reason: "lifecycle states must be authored (or config-shape-exempted) before process_raci gates and lifecycle.process_id can be wired; entity_type classification on the 9 masters is the upstream precondition"}
    affected_modules: [223, 224, 225, 226]

  - id: B1B-S2-LIFECYCLE
    summary: "C1: author lifecycle states for the 9 own masters; module ids now available to anchor domain_module_id."
    finding: "0 data_object_lifecycle_states on any of the 9 own masters. This was gated on B2-S1 (module split) for the per-state domain_module_id anchor, which landed 2026-06-02 (masters now map: lakehouse_tables 226->223, data_pipelines 227->223, ml_models 228->225, feature_sets 229->225, semantic_metrics 230->224, ai_agents 231->226, data_products 232->224, ontologies 254->224, knowledge_graph_entities 255->224). All 9 masters are still entity_type='unclassified' (B13); classification is the upstream gate (Rule #12 decides whether lifecycle is required). Per-master workflow-shape vs config-shape decision (former B2-S2) is still a user judgment call and remains parked under B2-LIFECYCLE-SHAPE; authoring is out of scope for the modularization-only pass."
    blocked_by:
      - {type: user_decision, ref: B2-LIFECYCLE-SHAPE, reason: "per-master workflow-shape vs config-shape decision must land before lifecycle states are authored"}
    affected_masters:
      - {data_object_id: 226, name: "lakehouse_tables", target_module_id: 223, workflow: "config-shape candidate"}
      - {data_object_id: 227, name: "data_pipelines", target_module_id: 223, workflow: "active / paused vs running / failed / succeeded"}
      - {data_object_id: 228, name: "ml_models", target_module_id: 225, workflow: "registered -> staging -> production -> archived"}
      - {data_object_id: 229, name: "feature_sets", target_module_id: 225, workflow: "registered -> online -> stale -> archived"}
      - {data_object_id: 230, name: "semantic_metrics", target_module_id: 224, workflow: "proposed -> certified -> deprecated"}
      - {data_object_id: 231, name: "ai_agents", target_module_id: 226, workflow: "draft -> published -> deployed -> retired"}
      - {data_object_id: 232, name: "data_products", target_module_id: 224, workflow: "proposed -> in_development -> published -> deprecated"}
      - {data_object_id: 254, name: "ontologies", target_module_id: 224, workflow: "draft -> released -> deprecated"}
      - {data_object_id: 255, name: "knowledge_graph_entities", target_module_id: 224, workflow: "config-shape candidate"}

b2:
  - id: B2-LIFECYCLE-SHAPE
    summary: "C1: per-master lifecycle authoring decision (workflow-shape vs documented config-shape exemption) for the 9 own masters."
    question: "Per-master decision on the lifecycle state machine. Workflow-shape masters: ml_models (registered -> staging -> production -> archived); data_pipelines (active / paused vs running / failed / succeeded); ai_agents (draft -> published -> deployed -> retired); data_products (proposed -> in_development -> published -> deprecated); semantic_metrics (proposed -> certified -> deprecated); ontologies (draft -> released -> deprecated); feature_sets (registered -> online -> stale -> archived). Plausibly config-shape: lakehouse_tables, knowledge_graph_entities. Note: entity_type on all 9 masters is still 'unclassified' (B13); classifying entity_type is the deterministic upstream step that decides which masters require lifecycle at all."
    options:
      - "(a) author the proposed default state machine"
      - "(b) document config-shape exemption (lakehouse_tables, knowledge_graph_entities plausibly)"
      - "(c) skip authoring this round, re-surface at next audit"
    why: "Rule #12 requires per-master positive consideration. Rule #15 forbids auto-populating data_objects.notes for the exemption justification; exemption decisions land in history.md instead. The module-split blocker on this item (former B2-S2 dependency on B2-S1) is now cleared: target_module_id per master is resolved (see B1B-S2-LIFECYCLE). This decision also unblocks Phase P (B1B-S-PHASE-P): personas, process_raci, and lifecycle.process_id wiring."
    affected_masters:
      - {data_object_id: 226, name: "lakehouse_tables", target_module_id: 223, workflow: "config-shape candidate"}
      - {data_object_id: 227, name: "data_pipelines", target_module_id: 223, workflow: "active / paused vs running / failed / succeeded"}
      - {data_object_id: 228, name: "ml_models", target_module_id: 225, workflow: "registered -> staging -> production -> archived"}
      - {data_object_id: 229, name: "feature_sets", target_module_id: 225, workflow: "registered -> online -> stale -> archived"}
      - {data_object_id: 230, name: "semantic_metrics", target_module_id: 224, workflow: "proposed -> certified -> deprecated"}
      - {data_object_id: 231, name: "ai_agents", target_module_id: 226, workflow: "draft -> published -> deployed -> retired"}
      - {data_object_id: 232, name: "data_products", target_module_id: 224, workflow: "proposed -> in_development -> published -> deprecated"}
      - {data_object_id: 254, name: "ontologies", target_module_id: 224, workflow: "draft -> released -> deprecated"}
      - {data_object_id: 255, name: "knowledge_graph_entities", target_module_id: 224, workflow: "config-shape candidate"}

