    rationale: "Mosaic AI Agent Framework, Bedrock Agents, Vertex Agent Builder, watsonx.ai, Foundry AIP all expose tools the agent calls as a separate master. Distinct from Semantius's own tools master."
    vendor_evidence: ["Mosaic AI Agent Framework", "Bedrock Agents", "Vertex Agent Builder", "watsonx.ai", "Foundry AIP"]
    proposed_module: "DATA-AI-PLAT-AI-AGENTS (226)"

  - id: B3-ENT-RAG-RETRIEVERS
    candidate: "rag_retrievers"
    rationale: "Bedrock Knowledge Bases, Vertex RAG Engine, Databricks Vector Search, watsonx.ai RAG, LangChain-style retrievers all model retrieval policy as a versioned master separate from the underlying index."
    vendor_evidence: ["Bedrock Knowledge Bases", "Vertex RAG Engine", "Databricks Vector Search", "watsonx.ai RAG"]
    proposed_module: "DATA-AI-PLAT-AI-AGENTS (226)"

  - id: B3-ENT-DATA-CONTRACTS
    candidate: "data_contracts"
    rationale: "Databricks Unity Catalog Data Contracts, Foundry Ontology Contracts, Snowflake Horizon, watsonx.data, Atlan, DataHub all model producer / consumer SLA on a data_product as a separate master."
    vendor_evidence: ["Databricks Unity Catalog Data Contracts", "Foundry Ontology Contracts", "Snowflake Horizon", "watsonx.data", "Atlan", "DataHub"]
    proposed_module: "DATA-AI-PLAT-SEMANTIC-CATALOG (224)"

  - id: B3-ENT-LINEAGE-EVENTS
    candidate: "lineage_events"
    rationale: "Unity Catalog lineage, OpenLineage, Foundry data lineage, Vertex AI lineage all surface lineage as queryable records. Could materialize as a master if the catalog wants queryable lineage; otherwise stays as data_object_relationships."
    vendor_evidence: ["Unity Catalog lineage", "OpenLineage", "Foundry data lineage", "Vertex AI lineage"]
    proposed_module: "DATA-AI-PLAT-LAKEHOUSE (223)"

  - id: B3-MOD-AGENTS-SPLIT
    candidate: "DATA-AI-PLAT-AI-AGENTS (226) split"
    rationale: "If ai_agents + prompt_templates + agent_tools + rag_retrievers + vector_indexes all land, that single module exceeds the master count of three other modules combined and looks like a separate market. Candidate split: DATA-AI-PLAT-AGENT-RUNTIME (ai_agents, agent_tools) + DATA-AI-PLAT-RAG (vector_indexes, prompt_templates, rag_retrievers). Possibly the agent runtime is itself a domain candidate. Today 226 holds only ai_agents, so the split is premature until the B3-ENT-* AI entities land."
    vendor_evidence: ["Databricks Mosaic AI", "Bedrock Agents", "Vertex Agent Builder", "watsonx.ai", "Foundry AIP"]
    proposed_module: "DATA-AI-PLAT-AGENT-RUNTIME + DATA-AI-PLAT-RAG"

  - id: B3-MOD-MLOPS-DOMAIN
    candidate: "MLOPS domain promotion (vs DATA-AI-PLAT-ML module 225)"
    rationale: "Queued in _missing-domains.md. If model_experiments + model_endpoints get their own modules with own lifecycle/RBAC, the shape matches the MLOPS market (Weights & Biases, MLflow, Comet, Domino Data Lab, Neptune.ai, ClearML). Market-boundary call: fold into DATA-AI-PLAT-ML (225) or promote to a separate domain."
    vendor_evidence: ["Weights & Biases", "MLflow", "Comet ML", "Domino Data Lab", "Neptune.ai", "ClearML", "Iguazio", "DataRobot MLOps"]
    proposed_module: "domain promotion vs DATA-AI-PLAT-ML (225)"

  - id: B3-REG-CANDIDATES
    candidate: "domain_regulations rows for DATA-AI-PLAT"
    rationale: "Zero domain_regulations rows today. Candidates: EU AI Act (in force 2025-08-01, phased through 2027, mandatory for EU-market AI providers), NIST AI Risk Management Framework (US guidance, de-facto industry baseline), ISO/IEC 42001 (international AI management system standard), SR 11-7 (US Federal Reserve model risk management, mandatory for US banks), GDPR Article 22 (right-to-explanation for automated decisions), HIPAA applicability for PHI slices in the lakehouse. Independent of the module split (regulations live at the domain layer)."
    vendor_evidence: ["IBM watsonx.governance", "Credo AI", "Holistic AI"]
    proposed_module: null
