b3:
  - id: B3-INBOUND-DMDO
    candidate: "consumer domain_module_data_objects rows for 5 inbound handoff payloads, then target_domain_module_id backfill"
    rationale: "Residual of B1A-S3-INBOUND-FK. 5 inbound cross-domain handoffs carry payloads that DATA-AI-PLAT does not declare any role on (no domain_module_data_objects and no legacy domain_data_objects row), so the B10b target-module derivation yields no candidate and the target_domain_module_id stays NULL: 693 metric_materializations (709) <- METRICS-LAYER; 697 kgp_ontologies (742) <- KGP; 715 dq_dimensions (312) <- DQ; 725 pipeline_runs (434) <- DI; 731 schema_registries (438) <- DI. Whether DATA-AI-PLAT should consume each payload (and on which module) is a Phase-B modeling decision: if yes, author a consumer DMDO row (likely 693->224, 697->224, 715->224 or 223, 725->223, 731->223) then re-run the B10b backfill to set target_domain_module_id; if no, accept the handoff as a domain-level signal with no module owner. 219 and 221 already resolved (their payloads metric_definitions / ontologies are declared on module 224); 157/158 resolved (lakehouse_tables on 223)."
    proposed_module: "DATA-AI-PLAT-SEMANTIC-CATALOG (224) or DATA-AI-PLAT-LAKEHOUSE (223) per payload"

  - id: B3-H1R-DEFERRED
    candidate: "custom-process APQC tags for 4 deferred cross-domain handoffs"
    rationale: "Residual of B1A-H1R. 4 handoffs deferred at fix time with no clean APQC PCF cross-industry anchor: 683 ml_model.deployed, 684 feature_set.staleness_breached, 685 feature_set.published (modern-AI / MLOps events the PCF cross-industry framework predates; route to Discover Pass 3 custom processes); 715 dq_dimension.threshold_breached (DQ owns the L3 anchor it ladders to; defer to the DQ domain's own audit authoring). The other 6 untagged handoffs from the prior B1A-H1R list (155, 156, 221, 693, 697 + the 219 replace) were tagged 2026-06-05."
    proposed_module: null

  - id: B3-MISSING-MASTER-NOTEBOOKS
    candidate: "notebooks (missing master backing NOTEBOOK-ANALYTICS capability 202)"
    rationale: "NOTEBOOK-ANALYTICS (202) was placed in DATA-AI-PLAT-LAKEHOUSE 223 to satisfy M4, but the capability has NO backing master. The module is non-empty on lakehouse_tables / data_pipelines, but the capability itself is entity-orphaned. Add notebooks (Databricks Notebooks, Hex, Foundry Code Workbook, Snowflake Notebooks, Vertex Workbench all model the notebook as a first-class master with versioning, schedule, parameter binding) or retire the dangling capability. Missing-master candidate surfaced by the 2026-06-02 modularization."
    vendor_evidence: ["Databricks Notebooks", "Hex", "Foundry Code Workbook", "Snowflake Notebooks", "Vertex Workbench"]
    proposed_module: "DATA-AI-PLAT-LAKEHOUSE (223) or new DATA-AI-PLAT-NOTEBOOKS"

  - id: B3-ENT-MODEL-EXPERIMENTS
    candidate: "model_experiments"
    rationale: "MLflow, Databricks, Weights & Biases, SageMaker, Vertex AI all model experiments as first-class masters distinct from ml_models. The current ml_models master conflates the registered model with its training experiments. Phase 0 vendor research needed."
    vendor_evidence: ["MLflow", "Databricks", "Weights & Biases", "SageMaker", "Vertex AI"]
    proposed_module: "DATA-AI-PLAT-ML (225)"

  - id: B3-ENT-MODEL-ENDPOINTS
    candidate: "model_endpoints"
    rationale: "SageMaker, Vertex AI, Databricks Model Serving, Foundry all model the deployed inference endpoint as a separate master (online / batch / streaming inference targets); currently folded into ml_models."
    vendor_evidence: ["SageMaker", "Vertex AI", "Databricks Model Serving", "Foundry"]
    proposed_module: "DATA-AI-PLAT-ML (225)"

