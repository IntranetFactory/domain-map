      - "(b) load a user-specified subset"
      - "(c) defer to Phase B follow-up"
    why: "Aliases are commerce-shaped (Rule #18 allowed list). Rule #15 forbids auto-populating data_object_aliases.notes; alias loads need per-row user approval of any notes column population. Independent of the module split since aliases live on data_objects."
    affected_masters:
