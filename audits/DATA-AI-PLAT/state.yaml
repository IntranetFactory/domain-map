    rationale: "Databricks Vector Search, Snowflake Cortex Search, Fabric AI Search, Foundry AIP, SageMaker JumpStart all expose vector indexes as a separate master for similarity search and RAG."
    vendor_evidence: ["Databricks Vector Search", "Snowflake Cortex Search", "Fabric AI Search", "Foundry AIP", "SageMaker JumpStart"]
    proposed_module: "DATA-AI-PLAT-AI-AGENTS (226)"

