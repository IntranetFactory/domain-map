      - {data_object_id: 231, name: "ai_agents", target_module_id: null, workflow: "draft -> published -> deployed -> retired"}
      - {data_object_id: 232, name: "data_products", target_module_id: null, workflow: "proposed -> in_development -> published -> deprecated"}
      - {data_object_id: 254, name: "ontologies", target_module_id: null, workflow: "draft -> released -> deprecated"}
      - {data_object_id: 255, name: "knowledge_graph_entities", target_module_id: null, workflow: "config-shape candidate"}
    extra_dependency: "Gated on B2-S1 module split for target_module_id resolution per master."

  - id: B2-S3
    summary: "D1 soft-fail: alias coverage on the 9 own masters across 10 flagship vendors with widely varying naming."
    question: "Load the 9 proposed data_object_aliases rows? Vendor naming evidence: lakehouse_tables (Objects in Foundry; Tables in Databricks / Snowflake / Fabric OneLake); ml_models (Models / Registered Models / Endpoints); feature_sets (Features / Feature Views in Tecton, Hopsworks, SageMaker); ai_agents (Agents / Assistants / Bots / Copilots); data_products (Data Products / Marketplace Listings); semantic_metrics (Metrics / Measures / Semantic Layer Objects); ontologies (Ontology in Foundry; Semantic Model in Fabric; Knowledge Graph Schema elsewhere); knowledge_graph_entities (Entities / Nodes / Vertices); data_pipelines (Pipelines / Workflows / DAGs / Jobs)."
