      - {data_object_id: 226, name: "lakehouse_tables", target_module_id: null, workflow: "config-shape candidate"}
      - {data_object_id: 227, name: "data_pipelines", target_module_id: null, workflow: "active / paused vs running / failed / succeeded"}
      - {data_object_id: 228, name: "ml_models", target_module_id: null, workflow: "registered -> staging -> production -> archived"}
