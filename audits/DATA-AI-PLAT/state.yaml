b2:
  - id: B2-S1
    summary: "M1 hard-fail: pick the module split for DATA-AI-PLAT (8 capabilities require at least 2 full modules per Rule #14)."
    question: "Which module split should DATA-AI-PLAT land? The smallest coherent split covering 8 capabilities and 9 own masters is 4 modules: DATA-AI-PLAT-LAKEHOUSE (lakehouse_tables, data_pipelines; caps LAKEHOUSE-STORAGE + DATA-PIPELINE-ORCH), DATA-AI-PLAT-SEMANTIC (semantic_metrics, ontologies, knowledge_graph_entities, data_products; caps SEMANTIC-MODELING + UNIFIED-GOV-CATALOG + OPERATIONAL-DATA-APPS), DATA-AI-PLAT-ML (ml_models, feature_sets; cap ML-LIFECYCLE), DATA-AI-PLAT-AI-AGENTS (ai_agents; caps LLM-ORCH + NOTEBOOK-ANALYTICS). Alternatives per flagship vendor lens."
    options:
      - "(a) 4-module split as proposed"
      - "(b) coarser 2-module split: DATA-AI-PLAT-DATA + DATA-AI-PLAT-AI"
      - "(c) finer 6-module split mirroring Fabric: Engineering / Warehouse / Science / RT-Intel / Semantic / Agents"
      - "(d) defer to a separate Phase A authoring session"
    why: "Architectural intent: every flagship vendor splits the surface differently (Databricks vs Snowflake vs Fabric vs Foundry); the audit cannot pick the split without explicit user direction. Choice gates B2-S2 (lifecycle authoring per master), B2-S4 (system skill module assignment), B1B-S2 / B1B-S3 (source/target FK populate on 20 handoffs), F5 (per-module Semantius score), and all B3 entity inserts."

  - id: B2-S2
    summary: "C1 hard-fail: lifecycle state authoring decision per each of the 9 own masters."
    question: "Per-master decision on the lifecycle state machine. Workflow-shape masters: ml_models (registered -> staging -> production -> archived); data_pipelines (active / paused vs running / failed / succeeded); ai_agents (draft -> published -> deployed -> retired); data_products (proposed -> in_development -> published -> deprecated); semantic_metrics (proposed -> certified -> deprecated); ontologies (draft -> released -> deprecated); feature_sets (registered -> online -> stale -> archived). Plausibly config-shape: lakehouse_tables, knowledge_graph_entities."
    options:
      - "(a) author the proposed default state machine"
      - "(b) document config-shape exemption (lakehouse_tables, knowledge_graph_entities plausibly)"
      - "(c) skip authoring this round, re-surface at next audit"
    why: "Rule #12 requires per-master positive consideration. Rule #15 forbids auto-populating data_objects.notes for the exemption justification; exemption decisions land in history.md instead."
