b2:
  - id: B2-V1
    summary: "Leadership-tier inclusion was rescinded 2026-06-02; the live decision is the BUILD SCOPE under the now-master-bearing classification."
    question: "Confirm scope of the VULN-MGMT build: full master-bearing 4-module + ~8-master shape, or a leaner caps+modules-only shape with remediation living in dependent domains?"
    options:
      - "full build: 4-module split with ~8-10 masters is the real shape (matches every flagship vendor)"
      - "lean build: capabilities + modules with no masters; remediation lives in dependent domains"
      - "defer to a separate scope-decision conversation"
    why: "Every flagship vendor masters substantial workflow entities (scans, findings, remediation tickets, exceptions). The overlay test points to a full build; scope is the user's editorial/catalog call and gates B1B-V1 and all of b3."

  - id: B2-V2
    summary: "Confirm VULN-MGMT module split shape (4-module proposal vs alternatives)."
    question: "Which module shape: (a) 4-module split as drafted, (b) alt-a collapse RISK-PRIORITIZATION into FINDINGS-MANAGEMENT, (c) alt-b split DISCOVERY from SCANNING, (d) alt-c add 5th VULN-COMPLIANCE-REPORTING module, (e) defer pending formal Phase 0 vendor research?"
    options:
      - "4-module split as drafted (VULN-DISCOVERY-SCANNING, VULN-FINDINGS-MANAGEMENT, VULN-RISK-PRIORITIZATION, VULN-REMEDIATION-TRACKING)"
      - "alt-a 3-module collapse"
      - "alt-b 5-module split DISCOVERY from SCANNING"
      - "alt-c 5-module add VULN-COMPLIANCE-REPORTING"
      - "defer pending formal Phase 0 vendor research"
    why: "Vendor evidence supports a Find/Prioritize/Fix triad shape; architectural/deployability decision the user owns. Gates B1B-V1."

  - id: B2-V3
    summary: "Cross-cutting promotion of VULN-RISK-SCORING and VULN-THREAT-CONTEXT capabilities."
    question: "Should all 7 capabilities ship domain-prefixed (VULN-...) or should VULN-RISK-SCORING and VULN-THREAT-CONTEXT be promoted cross-cutting (RISK-BASED-SCORING, THREAT-EXPLOITABILITY-CONTEXT) for reuse on CSPM / DSPM / APP-SEC / EASM?"
    options:
      - "all 7 prefixed (VULN-...)"
      - "promote VULN-RISK-SCORING and VULN-THREAT-CONTEXT to cross-cutting (3+ domains)"
      - "defer cross-cutting promotion to a separate pass once neighbor domains land"
    why: "Cross-cutting capability convention applies when >=3 domains realize the same capability. CSPM / DSPM / APP-SEC / EASM share the risk-scoring + exploitability-context engine pattern. Feeds B1B-V1 load shape."

  - id: B2-V4
    summary: "Full Phase 0 description rewrite (optional; mechanical em-dash + spelling PATCHes already applied 2026-05-31; catalog UX authored 2026-06-07)."
    question: "Now that the catalog_tagline / catalog_description are authored and the description is clean American English, do you want a full Phase 0 description rewrite anchored on vendor surface, or leave the current text?"
    options:
      - "full Phase 0 description rewrite anchored on vendor surface (Rule #18: no vendor names in description)"
      - "leave it; current text plus the new catalog UX copy is sufficient"
    why: "domains.description currently reads 'Identification, prioritization, and remediation of security vulnerabilities across endpoints, cloud, and applications.' Clean but thin. Non-blocking editorial call."

  - id: B2-V6
    summary: "domain_aliases slate EXTENSION (4 generic synonyms loaded 2026-06-07; extension is the remaining judgment)."
    question: "4 unambiguous synonyms were loaded (risk-based vulnerability management/RBVM, threat and vulnerability management/TVM, vulnerability response, vuln management). Extend the slate with the debatable ones: VRM (vulnerability response management), TEM (threat exposure management), 'weakness management', bare acronyms RBVM/TVM as their own search strings?"
    options:
      - "no extension; the 4 loaded synonyms are enough"
      - "add VRM, TEM, weakness management, and/or bare RBVM/TVM (specify which)"
      - "defer extension"
    why: "Bare-acronym and adjacent-category synonyms (VRM/TEM) risk false-positive catalog matches (TVM collides with Microsoft's framing, VRM with vendor-risk-management). Which to add is the user's call. The unambiguous slate is already live."

