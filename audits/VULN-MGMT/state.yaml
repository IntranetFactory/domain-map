b2:
  - id: B2-VM-MODULE-SPLIT
    summary: Confirm the VULN-MGMT module split (the 3-module split is already built as the recommended option).
    question: "Keep the built 3-module split (Scanning and Detection: vulnerability_scans, vulnerabilities, vulnerability_definitions; Prioritization and Risk: vulnerability_assessments + ranking; Remediation and Governance: vulnerability_remediations, vulnerability_exceptions, verification, compliance), collapse detection and prioritization into one find-and-rank module, or split Compliance Evidence into its own fourth module?"
    options: [a-3-module-built, b-2-module-collapse-find-and-rank, c-4-module-split-compliance]
    why: "Grounded in how flagship VM vendors package the lifecycle. Every major suite separates the scanning/detection engine from the prioritization lens from the remediation loop: Tenable splits Nessus/Tenable Vulnerability Management (scanning) from Tenable One exposure scoring (prioritization) from its remediation workflow; Qualys VMDR literally names the stages V-M-D-R (Vulnerability, then Detection, then prioritization via TruRisk, then Response/Remediation); Rapid7 InsightVM ships scan engines/templates separately from Remediation Projects; Microsoft Defender Vulnerability Management separates Weaknesses/scanning from Security Recommendations (prioritization) from Remediation activities; CrowdStrike Falcon Spotlight feeds Falcon Fusion for remediation; Wiz separates finding scans from its prioritization graph from remediation steps. (b) collapsing find+rank has no flagship precedent as a single product surface; (c) compliance is reporting over remediation data (cadence, MTTR, exception approvals), not a standalone master, so no vendor ships it as a separate module. Changing the split restructures the three built modules."

  - id: B2-VM-REMEDIATION-OWNERSHIP
    summary: Confirm that vulnerability_remediations is mastered in VULN-MGMT (built) and add the outbound handoff to ITSM, vs handing remediation entirely to ITSM.
    question: "Keep vulnerability_remediations mastered in VULN-MGMT as the security-side workflow (built, with a cross-domain edge to ITSM service_changes already loaded), and add an outbound handoff vulnerability_remediation.assigned -> ITSM so fixes executed through the service desk are tracked there; or do not master remediation here at all and only create/consume ITSM tickets?"
    options: [a-master-here-plus-handoff-to-itsm, b-itsm-only-consume-status-back, c-master-here-no-itsm-integration]
    why: "Flagship VM vendors master their own remediation/response entity even when they integrate with ServiceNow. Tenable Vulnerability Management has its own remediation recommendations and a ServiceNow ticketing connector; Qualys VMDR ships Patch Management and its own remediation tickets while also pushing to ServiceNow; Rapid7 InsightVM owns Remediation Projects and tickets and syncs to ITSM; Microsoft Defender VM owns Remediation activities and hands the request to Intune/ServiceNow for execution; CrowdStrike Falcon Spotlight routes through Falcon Fusion. ServiceNow Vulnerability Response is the inverse case: it lives natively inside ITSM, so there the security view and the ticket are the same record. Real trade-off: mastering here gives the security team an SLA/MTTR view independent of whoever executes the patch (the prioritized queue and the close-the-loop verification stay security-owned), at the cost of a second record to reconcile with the ITSM change/incident; ITSM-only keeps one record but loses the security-side posture lens and verification re-scan linkage. The built shape (a) matches Tenable/Qualys/Rapid7/Microsoft/CrowdStrike; adding the outbound handoff is the only piece not yet loaded because the ITSM-side module FK and trigger event want your sign-off."

  - id: B2-VM-CVE-INTEL-SOURCE
    summary: Confirm vulnerability_definitions is mastered here (built as a catalog) while volatile exploit intel is consumed from THREAT-INTEL, and decide whether to add the inbound exploit-intel handoff now.
    question: "Keep the static vulnerability_definitions catalog (CVE metadata, base CVSS severity, advisory/check references) mastered in VULN-MGMT (built), and consume fast-moving exploit-prediction and known-exploited signals from THREAT-INTEL via the fetch_exploit_intel tool; add the inbound THREAT-INTEL exploit-intel handoff now or defer it until THREAT-INTEL masters an exploit entity?"
    options: [a-master-defs-here-consume-exploit-intel-defer-handoff, b-master-defs-here-add-inbound-handoff-now, c-master-all-cve-and-exploit-intel-here, d-consume-entire-catalog-from-threat-intel]
    why: "Every flagship VM vendor maintains its own definitions/knowledge base used to match findings: Tenable ships plugins/CVE definitions, Qualys VMDR has the QID Knowledgebase mapped to CVE, Rapid7 has vulnerability checks/CVE references, Microsoft Defender VM has its CVE knowledge base, CrowdStrike Falcon Spotlight and Wiz carry their own CVE catalogs. So the matching catalog belongs here (rules out d). But live exploitability signals (EPSS, CISA KEV, exploit-in-the-wild) are a distinct fast-moving market: Tenable VPR and Qualys TruRisk both ingest EPSS/KEV as an external enrichment layer rather than authoring it, which is exactly the THREAT-INTEL boundary (rules out c). Trade-off on the handoff timing: THREAT-INTEL (domain 14) currently masters no exploit entity, so an inbound handoff today would point at a non-existent payload; recommend (a) consume via tool now and add the formal handoff when THREAT-INTEL is built. Mastering exploit intel here (c) would duplicate a neighbor market; this is the only genuinely structural call."

  - id: B2-VM-EXCEPTION-FREEZE
    summary: Approve the immutability + single-approver pattern flags already set on vulnerability_exceptions (has_submit_lock=true, has_single_approver=true).
    question: "Confirm vulnerability_exceptions ships with has_submit_lock=true (a risk acceptance locks on submit; changes require a new exception) and has_single_approver=true (one accountable risk owner signs off), rather than a multi-approver committee or an editable-after-approval shape?"
    options: [a-keep-submit-lock-and-single-approver, b-multi-approver-committee, c-no-submit-lock-editable]
    why: "Risk acceptances are individually accountable, audit-bearing decisions, and the flagship suites gate them as single-owner sign-off with a locked record: Qualys VMDR exceptions require an approver and expire on a fixed date; Rapid7 InsightVM exceptions carry a reviewer and an expiry; ServiceNow Vulnerability Response deferrals route to a single risk approver with an expiry-driven re-review; Tenable and Microsoft Defender VM both gate exceptions/recommendation-exceptions on an approver with a time box. None of the flagships model exception approval as an editable-after-the-fact field, and committee sign-off is the exception, not the norm, for routine risk acceptance. These flags are already true on the entity; this item is the Rule #1 approval gate, not a change."

b3:
  - id: B3-VM-EXPLOIT-INTEL-HANDOFF
    candidate: "Inbound THREAT-INTEL -> VULN-MGMT exploit-intel handoff (EPSS / CISA KEV / exploit-in-the-wild feeding prioritization)"
    rationale: "The risk-based prioritization layer (compute_vulnerability_priority, fetch_exploit_intel) depends on live exploitability signals that THREAT-INTEL owns. The tool path is built; the formal handoff is parked until THREAT-INTEL (domain 14) masters an exploit/KEV entity to point the payload FK at. Additive, non-blocking; gated on the THREAT-INTEL build (tracked under B2-VM-CVE-INTEL-SOURCE)."
    vendor_evidence: ["Tenable One (VPR ingests EPSS/KEV)", "Qualys VMDR (TruRisk ingests EPSS/KEV)", "Rapid7 InsightVM (Active Risk)", "Microsoft Defender Vulnerability Management (threat analytics)", "CISA KEV (regulatory feed)"]

  - id: B3-VM-REMEDIATION-ITSM-HANDOFF
    candidate: "Outbound vulnerability_remediation.assigned -> ITSM (service_changes / service_incidents) handoff"
    rationale: "When a fix is executed through the service desk, the assigned remediation should open or link an ITSM change/incident. The cross-domain data_object_relationship vulnerability_remediations -> service_changes is loaded; the formal handoff row (with trigger event and module FKs) wants the B2-VM-REMEDIATION-OWNERSHIP decision first. Additive, non-blocking."
    vendor_evidence: ["Tenable Vulnerability Management (ServiceNow connector)", "Qualys VMDR (ServiceNow ITSM integration)", "Rapid7 InsightVM (ITSM ticketing sync)", "Microsoft Defender Vulnerability Management (Intune / ServiceNow remediation)", "ServiceNow Vulnerability Response (native ITSM)"]

  - id: B3-VM-CMDB-ASSET-HANDOFF
    candidate: "Inbound CMDB/ITAM asset-population handoff (configuration_item.discovered / hardware_asset.onboarded feeding scan scope)"
    rationale: "Scanning runs against an asset population that CMDB (configuration_items, loaded as a cross-domain edge) and ITAM/HAM (hardware_assets) master. A formal inbound handoff would let new-asset events trigger scan-scope updates. The affects edge to configuration_items is loaded; the handoff is additive and non-blocking."
    vendor_evidence: ["Tenable One (asset inventory sync)", "Qualys VMDR (host asset / CMDB sync)", "Rapid7 InsightVM (asset groups)", "Wiz Cloud Security Platform (cloud resource graph)"]

  - id: B3-VM-MARKET-SURFACE
    candidate: "scan_policies / scan_templates, exposure_cards (risk score snapshots), patches, asset_tags / scan_targets, compliance_checks"
    rationale: "Common across the flagship VM vendor surface but absent from the current footprint. scan_policies/templates (Tenable scan policies, Qualys option profiles, Rapid7 scan templates) govern how a scan runs; exposure_cards/risk snapshots (Tenable exposure cards, Qualys TruRisk, Rapid7 Real Risk) are the prioritization output; patches (Qualys Patch Management); compliance_checks (Tenable/Qualys policy compliance). Additive; vet via a Phase 0 pass before loading."
    vendor_evidence: ["Tenable One", "Qualys VMDR", "Rapid7 InsightVM", "Microsoft Defender Vulnerability Management", "Wiz Cloud Security Platform"]

  - id: B3-VM-EXPOSURE-MGMT-PROMOTION
    candidate: "Promote the prioritization layer toward a cross-cutting exposure-management (CTEM) surface shared with CSPM / DSPM / ASM"
    rationale: "Tenable One, Wiz, and Qualys all unify finding-prioritization across vulnerabilities + cloud posture + attack surface under a continuous-threat-exposure-management (CTEM) framing. The risk-scoring + exploitability-context engine is the cross-domain layer. This is a structural reshaping (a split), so it is flagged as an idea only; if pursued it becomes a b2 module/domain decision, never auto-executed."
    vendor_evidence: ["Tenable One (Exposure Management)", "Wiz Cloud Security Platform", "Qualys VMDR (TruRisk / Enterprise TruRisk)"]
