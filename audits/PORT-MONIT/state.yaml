schema_version: 2
domain: PORT-MONIT
status: feedback_needed
next_action_by: agent
last_audit: "2026-05-31"

b1a:
  - id: B1A-S2-SKILLS
    summary: Author 4 system skills + tools + skill_tools across PORT-MONIT modules so Semantius score becomes computable.
    finding: |
      Zero system skills exist on any of the 4 modules. /skills?domain_module_id=in.(16,17,18,19) returns [].
      /skills?domain_id=eq.161 returns []. Every module is therefore uncomputable for the Semantius score.
      F2 fails (no system skill per module), F3 fails (no skill_tools), F4 cannot validate operation_kind
      pairings, F5 rollup is uncomputable. Rule #17 requires exactly one skill_type='system' skill per
      domain_modules row with >=1 skill_tools row.
    action: |
      Phase-S load. Author 4 skills rows (port_monit_portco_data_agent on module 16,
      port_monit_valuations_agent on module 17, port_monit_fund_perf_agent on module 18,
      port_monit_lp_reporting_agent on module 19), each skill_type='system'. Author ~5-12 tools
      and skill_tools rows per module: query / mutate per master plus compute primitives
      (compute_irr_moic_tvpi_dpi on FUND-PERF, compute_fair_value_mark on VALUATIONS,
      parse_kpi_packet and parse_esg_packet on PORTCO-DATA, render_lp_report on LP-REPORTING)
      plus notify_person for share-with-LP intent. Validate operation_kind invariants
      (query/mutate require data_object_id; fetch/side_effect/compute require NULL).
    affected_modules: [16, 17, 18, 19]
    extra_band: F2,F3,F4,F5

  - id: B1A-S3-ROLES
    summary: Author >=3 roles bundling PORT-MONIT modules so E1-E5 pass.
    finding: |
      /role_modules?domain_module_id=in.(16,17,18,19) returns []. The domain has 4 modules
      (>=2 floor) but no roles touch any module, so E1 (role floor), E2 (role-module coverage),
      E3 (role-permissions), E4 (permission tier coverage), E5 (role bundling sanity) all fail
      together. Permissions table on the 4 modules is also empty
      (/permissions?domain_module_id=in.(16,17,18,19) returns []), reflecting that the workflow-gate
      permission cascade Rule #12 implies has not run.
    action: |
      Author >=3 roles function-scoped to Investment Management:
      INVESTMENT-PORTFOLIO-ANALYST (primary on 16 + 17, secondary on 18),
      INVESTMENT-FUND-CONTROLLER (primary on 18 + 19, secondary on 17),
      INVESTMENT-INVESTOR-RELATIONS (primary on 19, secondary on 18 + 16).
      Each carries 4-8 role_permissions rows once the baseline + workflow-gate permission set
      lands. Note: workflow-gate permissions depend on B1A-S7 lifecycle states landing first,
      so authoring sequence is S7 -> permissions -> S3.
    affected_modules: [16, 17, 18, 19]
    extra_band: E1,E2,E3,E4,E5

  - id: B1A-S6-ALIASES
    summary: Draft >=1 alias on each of the 6 non-aliased masters (queued; alias_name strings need user-supplied tuples per Rule #15).
    finding: |
      /data_object_aliases?data_object_id=in.(763,764,765,766,767,768,769) returns 2 rows,
      both on portfolio_companies (portcos, investments). Six of seven masters have zero
      aliases. The prior audit listed candidate alias bundles
      (portco_kpi_periods -> portco_metrics OR kpi_packets, portco_esg_records -> esg_packets
      OR sustainability_reports, portco_valuations -> fair_value_marks OR quarterly_marks,
      fund_position_returns -> position_returns OR position_irr_records,
      fund_performance_periods -> fund_quarterly_metrics, lp_quarterly_reports -> lp_quarterly_packets
      OR gp_reports). Bulk inserting these without exact tuple confirmation violates the
      author-then-confirm discipline for alias text.
    action: |
      Surface the candidate tuples per master to user. Once user picks exact alias_name strings
      (one per row), insert 6 data_object_aliases rows (or 7-12 if user picks multiple per master).
    affected_entities:
      [portco_kpi_periods, portco_esg_records, portco_valuations, fund_position_returns, fund_performance_periods, lp_quarterly_reports]
    extra_band: B11

  - id: B1A-S7-LIFECYCLE
    summary: Author lifecycle states + requires_permission flags on 6 of 7 masters; pre-condition for B1B-S8 trigger events and B1B-S9 intra-domain handoffs.
    finding: |
      /data_object_lifecycle_states?data_object_id=in.(763,764,765,766,767,768,769) returns 3 rows,
      all on portfolio_companies (active / exited / written_off, all requires_permission=false,
      domain_module_id=16 per 2026-05-31 Continuation). Six masters have no state machine:
      portco_kpi_periods, portco_esg_records, portco_valuations, fund_position_returns,
      fund_performance_periods, lp_quarterly_reports. portco_valuations has
      has_submit_lock=true AND has_single_approver=true so an explicit workflow with
      requires_permission=true is implied. lp_quarterly_reports has has_submit_lock=true
      so a published-gate transition is implied. Rule #12 forbids deferral.
    action: |
      Author lifecycle states (initial + workflow gates + terminal) on:
      portco_kpi_periods (draft / submitted / accepted),
      portco_esg_records (draft / submitted / accepted),
      portco_valuations (proposed / review / approved / locked),
      fund_position_returns (computed / locked),
      fund_performance_periods (computing / computed / locked),
      lp_quarterly_reports (draft / review / published / archived).
      Apply requires_permission=true to submitted / accepted / approved / locked / published states.
      Set domain_module_id per master's home module (764 -> 16, 765 -> 16, 766 -> 17,
      767 -> 18, 768 -> 18, 769 -> 19).
    affected_masters:
      - {data_object_id: 764, name: portco_kpi_periods, target_module_id: 16, workflow: "draft/submitted/accepted"}
      - {data_object_id: 765, name: portco_esg_records, target_module_id: 16, workflow: "draft/submitted/accepted"}
      - {data_object_id: 766, name: portco_valuations, target_module_id: 17, workflow: "proposed/review/approved/locked"}
      - {data_object_id: 767, name: fund_position_returns, target_module_id: 18, workflow: "computed/locked"}
      - {data_object_id: 768, name: fund_performance_periods, target_module_id: 18, workflow: "computing/computed/locked"}
      - {data_object_id: 769, name: lp_quarterly_reports, target_module_id: 19, workflow: "draft/review/published/archived"}
    extra_band: B12

  - id: B1A-M1-VALUATION-METHODOLOGIES
    summary: Add valuation_methodologies as a domain-owned master in PORT-MONIT-VALUATIONS (17). ASC 820 typing lookup.
    finding: |
      Universal entity in PE/VC valuation tooling (Chronograph, Allvue, eFront, Vestberry).
      ASC 820 fair-value methodology choice (DCF / public-comp / transaction-comp / option-pricing
      / cost) needs to be tagged per portco_valuation; absence forces inlining methodology as
      a text column on portco_valuations and prevents the methodology-tagged audit trail the
      module's description claims.
    action: |
      Phase-B insert: data_objects row (kind=domain_owned), domain_module_data_objects row
      on module 17 (role=master, necessity=required), data_object_relationships row
      portco_valuations -> valuation_methodologies (reference, many_to_one).
    proposed_module: PORT-MONIT-VALUATIONS
    vendor_evidence: [Chronograph, Allvue, eFront, Vestberry]

  - id: B1A-M2-KPI-DEFINITIONS
    summary: Add kpi_definitions as a domain-owned master in PORT-MONIT-PORTCO-DATA (16). Per-fund or per-thesis KPI template library.
    finding: |
      Universal entity (Standard Metrics, Vestberry, Visible.vc, Chronograph). KPI templates
      (revenue, gross margin, burn, runway, ARR, ACV, NDR) define the schema of what
      portco_kpi_periods carries. Without it, KPI dimensions are implicit in the kpi_period payload
      and cross-portco KPI comparison becomes impossible.
    action: |
      Phase-B insert: data_objects row, DMDO on module 16 (master + required), relationship
      portco_kpi_periods -> kpi_definitions.
    proposed_module: PORT-MONIT-PORTCO-DATA
    vendor_evidence: [Standard Metrics, Vestberry, Visible.vc, Chronograph]

  - id: B1A-M6-PORTCO-DOCUMENTS
    summary: Add portco_documents as a domain-owned master in PORT-MONIT-PORTCO-DATA (16). Document drops from portfolio companies.
    finding: |
      Financial statements, board decks, audited financials carried as a separate stream from
      KPI / ESG records in every flagship vendor. Without it, document handling collapses into
      portco_kpi_periods or sits in a generic CMS, neither of which preserves the
      portco-document provenance the audit trail needs.
    action: |
      Phase-B insert: data_objects row, DMDO on module 16 (master + required), relationship
      portfolio_companies -> portco_documents (composition).
    proposed_module: PORT-MONIT-PORTCO-DATA
    vendor_evidence: [Chronograph, Allvue, Vestberry, Standard Metrics, Visible.vc]

  - id: B1A-M7-PME-BENCHMARKS
    summary: Add pme_benchmarks as a domain-owned master in PORT-MONIT-FUND-PERF (18). Public Market Equivalent benchmark series.
    finding: |
      Kaplan-Schoar / direct alpha PME benchmarking is referenced by the module description
      and ILPA reporting standards but no data object stores the benchmark series. Vendor-bundled
      by Chronograph and eFront.
    action: |
      Phase-B insert: data_objects row, DMDO on module 18 (master + required), relationship
      fund_performance_periods -> pme_benchmarks (reference, many_to_one).
    proposed_module: PORT-MONIT-FUND-PERF
    vendor_evidence: [Chronograph, eFront]

  - id: B1A-M8-VAL-COMMITTEE-DECISIONS
    summary: Add valuation_committee_decisions as a domain-owned master in PORT-MONIT-VALUATIONS (17). Explains portco_valuations.has_single_approver=true.
    finding: |
      portco_valuations carries has_single_approver=true but no committee-decision record
      captures the methodology override rationale per quarter. Vendor-supported by eFront,
      Chronograph, Allvue. Without it the single-approver pattern flag has no entity to attach
      its approval evidence to.
    action: |
      Phase-B insert: data_objects row, DMDO on module 17 (master + required), relationship
      portco_valuations -> valuation_committee_decisions (composition, one_to_one or one_to_many
      per quarter).
    proposed_module: PORT-MONIT-VALUATIONS
    vendor_evidence: [eFront, Chronograph, Allvue]

b1b:
  - id: B1B-S4-REGULATIONS
    summary: Add up to 5 regulations + domain_regulations rows once user picks scope (B2-1).
    finding: |
      /domain_regulations?domain_id=eq.161 returns []. The domain row carries explicit anchors
      to ASC 820 in business_logic and SFDR for EU, yet none of ASC 820, SFDR, ILPA Quarterly
      Reporting Standards, AIFMD Annex IV, Form PF, or Investment Advisers Act exist as
      regulations rows. Loading is contingent on user scope decision (B2-1) and applicability
      wording (B2-6) per Rule #15.
    blocked_by:
      - {type: user_decision, ref: B2-1}
      - {type: user_decision, ref: B2-6}
    affected_entities: [ASC 820, SFDR, ILPA QRS, AIFMD Annex IV, Form PF]

  - id: B1B-M3-SFDR-DISCLOSURES
    summary: Add sfdr_disclosures master in PORT-MONIT-LP-REPORTING (19). Blocked on B1B-S4 scope.
    finding: |
      Article 8/9 fund classifications and Principal Adverse Impact indicators per fund.
      Vendor-mandatory for EU under eFront and Allvue. Cannot ship without the SFDR
      regulations row landing first.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S4}
      - {type: user_decision, ref: B2-1}
    proposed_module: PORT-MONIT-LP-REPORTING
    vendor_evidence: [eFront, Allvue]

  - id: B1B-M4-AIFMD-ANNEX-IV
    summary: Add aifmd_annex_iv_reports master in PORT-MONIT-LP-REPORTING (19). Blocked on B1B-S4 scope.
    finding: |
      EU AIFMD Annex IV quarterly / annual reporting structure. Vendor-mandatory for EU AIFMs.
      Cannot ship without the AIFMD regulations row landing first.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S4}
      - {type: user_decision, ref: B2-1}
    proposed_module: PORT-MONIT-LP-REPORTING
    vendor_evidence: [eFront, Allvue]

  - id: B1B-M5-FORM-PF
    summary: Add form_pf_reports master in PORT-MONIT-LP-REPORTING (19). Blocked on B1B-S4 scope.
    finding: |
      US Form PF (Advisers Act) for registered PE advisers >=$150M AUM. Required regardless
      of vendor coverage. Cannot ship without the Form PF regulations row landing first.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S4}
      - {type: user_decision, ref: B2-1}
    proposed_module: PORT-MONIT-LP-REPORTING
    vendor_evidence: [Allvue, Standard Metrics, eFront]

  - id: B1B-S8-TRIGGER-EVENTS
    summary: Author ~10 trigger_events rows after B1A-S7 lifecycle states land.
    finding: |
      /trigger_events?domain_module_id=in.(16,17,18,19) returns 0 rows. The catalog has 1
      trigger event total for PORT-MONIT masters (portco_valuation.final, id 1188, module FK
      NULL). Lifecycle states authored in B1A-S7 imply ~10 new events:
      portco_kpi_period.submitted, portco_kpi_period.accepted, portco_esg_record.submitted,
      portco_valuation.proposed, portco_valuation.approved, fund_performance_period.computed,
      fund_performance_period.locked, lp_quarterly_report.published, portfolio_company.exited,
      portfolio_company.written_off. Trigger event for portco_valuation.final should also have
      domain_module_id PATCHed from NULL to 17.
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-S7}
    affected_events:
      - {id: null, event_name: portco_kpi_period.submitted, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: portco_kpi_period.accepted, current_category: null, proposed_category: state_change}
      - {id: null, event_name: portco_esg_record.submitted, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: portco_valuation.proposed, current_category: null, proposed_category: lifecycle}
      - {id: null, event_name: portco_valuation.approved, current_category: null, proposed_category: state_change}
      - {id: null, event_name: fund_performance_period.computed, current_category: null, proposed_category: state_change}
      - {id: null, event_name: fund_performance_period.locked, current_category: null, proposed_category: state_change}
      - {id: null, event_name: lp_quarterly_report.published, current_category: null, proposed_category: state_change}
      - {id: null, event_name: portfolio_company.exited, current_category: null, proposed_category: state_change}
      - {id: null, event_name: portfolio_company.written_off, current_category: null, proposed_category: state_change}
      - {id: 1188, event_name: portco_valuation.final, current_category: state_change, proposed_category: state_change}
    extra_band: B9
    extra_followup: PATCH domain_module_id=17 on event 1188

  - id: B1B-S9-INTRA-HANDOFFS
    summary: Author 4 intra-domain handoffs between PORT-MONIT modules once B1B-S8 events exist.
    finding: |
      /handoffs?and=(source_domain_id.eq.161,target_domain_id.eq.161) returns 0 rows. The 4-module
      domain has zero intra-domain handoffs. Master-resolution implies 4 expected pairs derived
      from the B1B-S8 events.
    blocked_by:
      - {type: prerequisite_entity, ref: B1B-S8}
    affected_handoffs:
      - {handoff_id: null, direction: intra, source_domain: PORT-MONIT, target_domain: PORT-MONIT, trigger_event: portco_valuation.final, payload: fund_position_returns, null_field: source_domain_module_id_17_target_18}
      - {handoff_id: null, direction: intra, source_domain: PORT-MONIT, target_domain: PORT-MONIT, trigger_event: portco_kpi_period.accepted, payload: fund_performance_periods, null_field: source_16_target_18}
      - {handoff_id: null, direction: intra, source_domain: PORT-MONIT, target_domain: PORT-MONIT, trigger_event: portco_esg_record.accepted, payload: lp_quarterly_reports, null_field: source_16_target_19}
      - {handoff_id: null, direction: intra, source_domain: PORT-MONIT, target_domain: PORT-MONIT, trigger_event: fund_performance_period.locked, payload: lp_quarterly_reports, null_field: source_18_target_19}
    extra_band: B9b

b2:
  - id: B2-1-REGULATIONS-SCOPE
    summary: Which of 5 candidate regulations should the audit add as regulations + domain_regulations rows?
    question: |
      Pick scope for B1B-S4 / B1B-M3 / B1B-M4 / B1B-M5: load (a) all 5 with applicability flags;
      (b) US-only first (ASC 820 + Form PF + ILPA); (c) EU-only first (SFDR + AIFMD); (d) defer
      SFDR / AIFMD until an EU-only PORT-MONIT split is modeled; (e) skip entirely.
    options: [all_5, us_only, eu_only, defer_eu, skip]
    why: |
      The domain row's business_logic field anchors ASC 820 explicitly and SFDR for EU. Loading
      any subset is the user's policy call; the audit cannot pick scope without that intent.

  - id: B2-2-VERB-CORRECTNESS
    summary: PATCH the verb columns on the 7 users-edges (885, 886, 1831-1835) or keep as-is.
    question: |
      Continuation rels 1831-1835 inserted with relationship_kind=reference / owner_side=target;
      the verb-style column (if it exists in your catalog model) reads as analyst-flavor
      (submits, computes, owns, authors). Existing rels 885 (observes) and 886 (computes)
      were flagged in the 2026-05-30 audit as analyst-side verbs that may not match catalog
      convention. Pick: (a) keep all 7 verbs as-is; (b) PATCH to monitors / produces / manages
      for symmetry with peer domains; (c) one-off PATCH per row with explicit wording.
    options: [keep, patch_uniform, patch_per_row]

  - id: B2-3-FUNDS-EMBEDDING
    summary: funds embed shape across modules 18 and 19, plus FUND-ADMIN-FUND-LEDGER mastery.
    question: |
      funds (755) mastered by FUND-ADMIN-FUND-LEDGER (12). PORT-MONIT-FUND-PERF (18) and
      PORT-MONIT-LP-REPORTING (19) embed it as embedded_master + required. Per Rule #16
      infrastructure-master logic, downgrade non-master rows to optional or to consumer
      when the workflow does not strictly halt without the master deployed?
      Options: (a) keep embedded_master + required; (b) downgrade both to consumer + required;
      (c) downgrade only 18 to consumer (LP-REPORTING ships as lite standalone);
      (d) flip necessity on both 18 and 19 to optional but keep embedded_master.
    options: [keep, both_consumer, partial_18_consumer, optional_necessity]

  - id: B2-4-LP-REPORTING-MODULARIZATION
    summary: Stays in PORT-MONIT, splits to a new LP-side domain, or migrates to FUND-ADMIN.
    question: |
      Vendor practice diverges: Chronograph / Cobalt LP make LP-reporting an LP-side product;
      Allvue / eFront bundle it GP-side. Pick: (a) keep lp_quarterly_reports in
      PORT-MONIT-LP-REPORTING; (b) split LP-REPORTING into a new LP-ANALYTICS-PLATFORM domain
      and queue via _missing-domains.md; (c) move lp_quarterly_reports mastery to
      FUND-ADMIN-LP-COMMITMENTS.
    options: [keep, split_new_domain, move_to_fund_admin]
    why: |
      Has a Bucket 3 dependency: if option (b), b3 #6 (lp_capital_call_notices cross-reference)
      reshapes against the new domain.

  - id: B2-5-ESG-PROMOTION
    summary: Promote PORTMONIT-ESG-DIVERSITY-TRACKING capability to a cross-cutting capability shared with ESG (21).
    question: |
      Capability 504 is currently single-domain. Promote to a domain-neutral
      ESG-METRIC-COLLECTION capability and add capability_domains row to ESG (21)?
      Options: (a) keep domain-prefixed; (b) rename + add cross-cutting link.
    options: [keep, promote]

  - id: B2-6-APPLICABILITY-WORDING
    summary: Per Rule #15, supply exact applicability wording for each regulation row loaded under B2-1.
    question: |
      For each regulations row loaded in scope of B2-1 answer, supply the exact applicability
      text per regulation. Audit cannot author this string.
    options: [user_supplies_string]
    why: Rule #15.

  - id: B2-7-HANDOFF-1039-PCF
    summary: Handoff 1039 (vc_deal.closed -> portfolio_companies) currently tagged with process 409 (Manage portfolio). 2026-05-30 audit proposed 491 (Develop merger/demerger/acquisition/exit strategy).
    question: |
      Replace 409 with 491, keep 409, or add 491 as a second tag (multi-tag shape).
    options: [replace_with_491, keep_409, add_491_as_second]
    why: |
      Carries over from the 2026-05-31 Continuation as the unsettled APQC arbitration on this
      handoff.

  - id: B2-8-HANDOFFS-1042-1043-MULTI-TAG
    summary: Handoffs 1042 and 1043 each carry 2 handoff_processes rows post-Continuation. Is the multi-tag the curation intent or noise?
    question: |
      Handoff 1042 tagged with process 1401 (Produce quarterly/annual filings, L4) and 1422
      (Process and distribute payments, L4). Handoff 1043 tagged with process 1390
      (Process and record fixed-asset adjustments, L4) and 56 (Perform general accounting and
      reporting, L2). Pick per handoff: (a) keep both tags as the desired multi-process
      coverage; (b) demote one tag per handoff and explain why; (c) leave for Discover's
      reviewer pass.
    options: [keep_both, demote_one, defer_to_discover]
    why: |
      Multi-tagging a handoff is allowed but the catalog convention is to lead with the
      single most-specific PCF; surplus tags should carry clear value or get demoted.

b3:
  - id: B3-1-CO-INVESTMENT-POSITIONS
    candidate: co_investment_positions
    rationale: |
      Co-invest position tracking distinct from main fund position. Allvue and eFront model this
      separately so fee/carry economics on co-invest sleeves stay distinct.
    vendor_evidence: [Allvue, eFront]
    proposed_module: PORT-MONIT-FUND-PERF or FUND-ADMIN
    extra_verification_path: Allvue and eFront schema docs; alternative is FUND-ADMIN authorship.

  - id: B3-2-PEER-BENCHMARKS
    candidate: peer_benchmarks / portco_peer_groups
    rationale: |
      Vendor-provided benchmark cohorts (revenue bands, sector, stage) used for portco
      relative-performance reporting.
    vendor_evidence: [Vestberry, Standard Metrics, Chronograph]
    proposed_module: PORT-MONIT-FUND-PERF
    extra_verification_path: Confirm whether vendors bundle the benchmark dataset as a service or as a catalog data object.

  - id: B3-3-GP-ATTRIBUTION-ANALYSES
    candidate: gp_attribution_analyses
    rationale: |
      Attribution decomposition (market alpha vs. operational alpha vs. leverage). May be
      tier-2 leaf rather than first-class master.
    vendor_evidence: [eFront, Chronograph]
    proposed_module: PORT-MONIT-FUND-PERF

  - id: B3-4-VAL-COMMITTEE-MEETINGS
    candidate: valuation_committee_meetings
    rationale: |
      Full meeting record vs. the per-quarter valuation_committee_decisions in B1A-M8. May be
      two entities or one with role flag.
    vendor_evidence: [eFront, Allvue]
    proposed_module: PORT-MONIT-VALUATIONS

  - id: B3-5-PORTCO-MANAGEMENT-METRICS
    candidate: portco_management_metrics
    rationale: |
      Executive performance metrics tracked alongside financial KPIs (NPS, employee count,
      ESG scoring of management practices). Separate from portco_kpi_periods if vendors
      model it as its own stream.
    vendor_evidence: [Visible.vc, Standard Metrics]
    proposed_module: PORT-MONIT-PORTCO-DATA

  - id: B3-6-LP-CAPITAL-CALL-CROSSREF
    candidate: lp_capital_call_notices (cross-reference)
    rationale: |
      LP-side composited report references the capital-call notice. Mastered in
      FUND-ADMIN-CAPITAL-CALLS. May warrant a consumer DMDO on PORT-MONIT-LP-REPORTING or
      a runtime cross-reference only.
    vendor_evidence: [Cobalt LP]
    proposed_module: PORT-MONIT-LP-REPORTING
    blocked_by:
      - {type: user_decision, ref: B2-4}

  - id: B3-7-CURRENCY-FX-RATES
    candidate: currency_fx_rates
    rationale: |
      Multi-currency normalization for global PE funds. Catalog-wide master-promotion
      conversation; affects FUND-ADMIN, INV-CRM, ESG, CAP-TABLE, PORT-MONIT.
    vendor_evidence: [Allvue, eFront, Chronograph, Vestberry, Standard Metrics, Visible.vc]
    proposed_module: shared_master_out_of_PORT-MONIT
