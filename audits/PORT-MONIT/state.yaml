      requires_permission workflow is implied. lp_quarterly_reports (769) has has_submit_lock=true
      so a published gate is implied.
    action: |
      Author lifecycle states (initial + workflow gates + terminal) on the 4 workflow masters:
      portco_kpi_periods (draft / submitted / accepted),
      portco_esg_records (draft / submitted / accepted),
      portco_valuations (proposed / review / approved / locked),
      lp_quarterly_reports (draft / review / published / archived).
