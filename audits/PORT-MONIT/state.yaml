  - id: B2-7-HANDOFF-1039-PCF
    summary: Handoff 1039 (vc_deal.closed -> portfolio_companies) tagged with process 409 (Manage portfolio). 2026-05-30 audit proposed 491 (Develop merger/demerger/acquisition/exit strategy). DESTRUCTIVE if replace (overwrite of non-empty tag).
    question: |
      Replace 409 with 491, keep 409, or add 491 as a second tag (multi-tag shape).
    options: [replace_with_491, keep_409, add_491_as_second]
    why: |
      Carries over from the 2026-05-31 Continuation as the unsettled APQC arbitration on this
      handoff. Verified live 2026-06-07: handoff 1039 still carries only handoff_processes row 572
      (process 409).

  - id: B2-8-HANDOFFS-1042-1043-MULTI-TAG
    summary: Handoffs 1042 and 1043 each carry 2 handoff_processes rows. Is the multi-tag the curation intent or noise? DESTRUCTIVE if demote (delete a tag).
    question: |
      Handoff 1042 tagged with process 1401 (Produce quarterly/annual filings, L4) and 1422
      (Process and distribute payments, L4). Handoff 1043 tagged with process 1390
      (Process and record fixed-asset adjustments, L4) and 56 (Perform general accounting and
      reporting, L2). Pick per handoff: (a) keep both tags; (b) demote one tag per handoff and
      explain why; (c) leave for Discover's reviewer pass.
    options: [keep_both, demote_one, defer_to_discover]
    why: |
      Verified live 2026-06-07: 1042 carries rows 634 (1401) + 762 (1422); 1043 carries rows
      633 (1390) + 763 (56). Multi-tagging is allowed but convention leads with the single
      most-specific PCF; surplus tags should carry clear value or get demoted.

