      Universal entity. KPI templates (revenue, gross margin, burn, runway, ARR, ACV, NDR) define
      the schema of what portco_kpi_periods carries. Without it, KPI dimensions are implicit in the
      kpi_period payload and cross-portco KPI comparison becomes impossible.
    action: |
      Phase-B insert: data_objects row, DMDO on module 16 (master + required), relationship
      portco_kpi_periods -> kpi_definitions.
    proposed_module: PORT-MONIT-PORTCO-DATA

