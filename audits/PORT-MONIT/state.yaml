b2:
  - id: B2-1-REGULATIONS-SCOPE
    summary: Which of 5 candidate regulations should the audit add as regulations + domain_regulations rows?
    question: |
      Pick scope for B1B-S4 / B1B-M3 / B1B-M4 / B1B-M5: load (a) all 5 with applicability flags;
      (b) US-only first (ASC 820 + Form PF + ILPA); (c) EU-only first (SFDR + AIFMD); (d) defer
      SFDR / AIFMD until an EU-only PORT-MONIT split is modeled; (e) skip entirely.
    options: [all_5, us_only, eu_only, defer_eu, skip]
    why: |
      The domain row's business_logic field anchors ASC 820 explicitly and SFDR for EU. Loading
      any subset is the user's policy call; the audit cannot pick scope without that intent.

  - id: B2-2-VERB-CORRECTNESS
    summary: PATCH the verb columns on the 7 users-edges (885, 886, 1831-1835) or keep as-is. DESTRUCTIVE (overwrite of non-empty values).
    question: |
      Continuation rels 1831-1835 inserted with relationship_kind=reference / owner_side=target;
      existing rels 885 (observes) and 886 (computes) were flagged as analyst-side verbs that may
      not match catalog convention. Pick: (a) keep all 7 verbs as-is; (b) PATCH to monitors /
      produces / manages for symmetry with peer domains; (c) one-off PATCH per row.
    options: [keep, patch_uniform, patch_per_row]

  - id: B2-3-FUNDS-EMBEDDING
    summary: funds embed shape across modules 18 and 19, plus FUND-ADMIN-FUND-LEDGER mastery. DESTRUCTIVE if downgrading non-empty role/necessity (M9).
    question: |
      funds (755) mastered by FUND-ADMIN-FUND-LEDGER (12). PORT-MONIT-FUND-PERF (18) and
      PORT-MONIT-LP-REPORTING (19) embed it as embedded_master + required. Per Rule #16
      infrastructure-master logic, downgrade non-master rows to optional or to consumer when the
      workflow does not strictly halt without the master deployed?
      Options: (a) keep embedded_master + required; (b) downgrade both to consumer + required;
      (c) downgrade only 18 to consumer (LP-REPORTING ships as lite standalone);
      (d) flip necessity on both 18 and 19 to optional but keep embedded_master.
    options: [keep, both_consumer, partial_18_consumer, optional_necessity]

  - id: B2-4-LP-REPORTING-MODULARIZATION
    summary: Stays in PORT-MONIT, splits to a new LP-side domain, or migrates to FUND-ADMIN. DESTRUCTIVE if split/migrate (restructure / re-master).
    question: |
      Vendor practice diverges: some make LP-reporting an LP-side product; others bundle it
      GP-side. Pick: (a) keep lp_quarterly_reports in PORT-MONIT-LP-REPORTING; (b) split
      LP-REPORTING into a new LP-ANALYTICS-PLATFORM domain and queue via _missing-domains.md;
      (c) move lp_quarterly_reports mastery to FUND-ADMIN-LP-COMMITMENTS.
    options: [keep, split_new_domain, move_to_fund_admin]
    why: |
      Has a Bucket 3 dependency: if option (b), b3 #6 (lp_capital_call_notices cross-reference)
      reshapes against the new domain.

  - id: B2-5-ESG-PROMOTION
    summary: Promote PORTMONIT-ESG-DIVERSITY-TRACKING capability to a cross-cutting capability shared with ESG (21). DESTRUCTIVE if rename (overwrite of capability code/name).
    question: |
      Capability 504 is currently single-domain. Promote to a domain-neutral
      ESG-METRIC-COLLECTION capability and add capability_domains row to ESG (21)?
      Options: (a) keep domain-prefixed; (b) rename + add cross-cutting link.
