    proposed_module: PORT-MONIT-FUND-PERF

  - id: B1A-M8-VAL-COMMITTEE-DECISIONS
    summary: Add valuation_committee_decisions as a domain-owned master in PORT-MONIT-VALUATIONS (17). Explains portco_valuations.has_single_approver=true.
    finding: |
