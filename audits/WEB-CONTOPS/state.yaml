      - Optimizely Content Marketing Platform
      - Welcome Software
      - Skyword
    proposed_module: WEB-CONTOPS-EDITORIAL-PLANNING

  - id: B3-3
    candidate: "scanner_runs / scan_jobs"
    rationale: |
      Orchestration substrate for the four scanner-output masters. Every flagship vendor models the
      scan job (the crawl run that produces findings) as a first-class master separate from the
      findings it emits. content_audits (684, module 317) partly covers the run boundary but
      conflates the audit report with the underlying scan execution. May land as a relabel +
      field-set extension of content_audits rather than a new master. Would master in module 317 or
      be split across 319 / 320 by scan type.
    vendor_evidence:
      - Siteimprove
      - Acquia Optimize
      - AudioEye
      - Conductor
      - Lumar
    proposed_module: WEB-CONTOPS-AUDIT-INVENTORY

  - id: B3-4
    candidate: "scan_rules (a11y_rules / seo_rules / brand_rules, or single master with rule_kind discriminator)"
    rationale: |
      Rule-catalog substrate the scanners use. WCAG 2.1 has roughly 78 success criteria; Acrolinx
      ships hundreds of brand rules; Conductor / Lumar carry SEO best-practice rules. Each finding
      row points at the violating rule; without rule catalogs, findings can't be deduplicated or
      scored by severity. May land as one scan_rules master with a rule_kind discriminator or three
      separate masters per scan type; ownership (WEB-CONTOPS-mastered vs consumer of a separate
      WCAG-catalog domain) is open.
    vendor_evidence:
      - Siteimprove
      - Acrolinx
      - Acquia Optimize
      - axe-core
    proposed_module: WEB-CONTOPS-QUALITY-ACCESS

  - id: B3-5
    candidate: "content_redirects / redirect_rules"
    rationale: |
      URL-redirect master. Siteimprove + Acquia Optimize + Lumar all surface redirect management as
      part of link-and-inventory governance (the answer to 'when an inventory record retires, where
      does its URL redirect?'). Without redirects, web_content_inventory_records retirement workflow
      has no terminal-state target. Ownership uncertain: WEB-CONTOPS vs DXP / HCMS as a sibling of
      web_pages / content_entries. Would master in module 320 (link governance) if WEB-CONTOPS-owned.
    vendor_evidence:
      - Siteimprove
      - Acquia Optimize
      - Lumar
    proposed_module: WEB-CONTOPS-SEO-LINKS

