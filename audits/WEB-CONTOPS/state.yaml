b2:
  - id: B2-2
    summary: "Per-flag yes / no answers for 7 pattern-flag candidates across the 7 masters."
    question: |
      Which pattern-flag candidates should flip to true? Each affects derived permissions and the
      workflow-gate surface. (1) content_audits.has_submit_lock - a completed audit is an immutable
      signed report. (2) accessibility_scan_findings.has_personal_content - findings may quote
      scanned page content with visitor PII. (3) accessibility_scan_findings.has_single_approver -
      accessibility lead signs wont_fix and verified transitions. (4) technical_seo_findings.has_single_approver -
      SEO lead signs wont_fix. (5) brand_voice_violations.has_personal_content - violations may
      quote PII-adjacent copy. (6) content_lifecycle_plans.has_single_approver - content owner is
      the retire / archive sign-off. (7) web_content_inventory_records.has_personal_content - URL
      paths may embed user IDs or PII tokens.
    options:
      - "yes / no per flag (7 answers)"
    why: |
      Pattern-flag judgments are workflow-shape decisions the user owns; false-by-default doesn't
      constitute review. Per Rule #15 no data_objects.notes annotation will explain the choice;
      this audit's history.md is the only record. Gates the B4 PATCH pass.

  - id: B2-4
    summary: "Pick the WEB-CONTOPS regulation linkage shape (ADA + Section 508 + optional EAA / GDPR cookie-consent)."
    question: |
      Zero domain_regulations rows for WEB-CONTOPS. ADA (id 61) and Section 508 (id 62) exist in
      the regulations catalog. EAA (European Accessibility Act) is absent and would need a new
      regulations row before linking. GDPR cookie-consent content scanning is a secondary edge
      (OneTrust / Cookiebot territory) - out-of-scope for WEB-CONTOPS proper or in-scope? Now that
      modules exist, the linkage can be module-scoped (accessibility regulations against module 319).
    options:
      - "(a) link ADA + Section 508 only with applicability='required', defer EAA"
      - "(b) queue EAA via a new regulations insert and link all three"
      - "(c) include the GDPR cookie-consent edge as applicability='conditional'"
    why: |
      Regulation-mapping calls fall on the user; the audit can identify the gap but not
      unilaterally write domain_regulations rows with applicability qualifiers.

