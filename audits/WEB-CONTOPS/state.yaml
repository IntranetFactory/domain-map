    candidate: "editorial_tasks / editorial_briefs"
    rationale: |
      Production-workflow substrate, the highest-confidence missing master. GatherContent and
      Optimizely CMP both master 'content brief' (the editorial assignment definition) and 'task'
      (the per-stage step) as first-class. WEB-CONTOPS-EDITORIAL-PLANNING (module 318) today masters
      only content_lifecycle_plans (the calendar / governance layer) and has no production
      orchestration substrate, so the module is planning-only. These would master in module 318.
    vendor_evidence:
