b2:
  - id: B2-1
    summary: "Pick the WEB-CONTOPS module split shape (2 / 3 / 4 modules or defer)."
    question: |
      Which module split shape should WEB-CONTOPS take? The 2026-05-30 audit recommended
      a 3-module split (WCO-AUDIT-COMPLIANCE + WCO-SEO-LINKS + WCO-EDITORIAL-PLANNING) matching
      the three-pole vendor surface (compliance-and-audit, technical SEO, editorial). Alternatives:
      a 2-module split aligned to scanner-output-vs-editorial-process, a 4-module split that
      separates accessibility specialist (AudioEye-shaped buyer), or deferral until Phase 0 (B3-6)
      ratifies the vendor surface.
    options:
      - "(a) 3-module split: WCO-AUDIT-COMPLIANCE + WCO-SEO-LINKS + WCO-EDITORIAL-PLANNING"
      - "(b) 2-module split: WCO-FINDINGS + WCO-EDITORIAL"
      - "(c) 4-module split: separate WCO-ACCESS from WCO-AUDIT-QUALITY"
      - "(d) defer until Phase 0 (B3-6) lands"
    why: |
      Module split is a design call the user owns and gates B1B-S1 (and through it B1B-S2,
      B1B-S5, B1B-S6, B1B-S8, B1B-S10). Committing before Phase 0 ratifies the surface risks
      a re-do; eyeball-mode commit is fine if the user is confident in the 3-pole shape.

  - id: B2-2
    summary: "Per-flag yes / no answers for 7 pattern-flag candidates across the 7 masters."
    question: |
      Which of the following pattern-flag candidates should flip to true? Each affects derived
      permissions and the workflow-gate surface. (1) content_audits.has_submit_lock - a completed
      audit is an immutable signed report. (2) accessibility_scan_findings.has_personal_content -
      findings may quote scanned page content with visitor PII. (3) accessibility_scan_findings.has_single_approver -
      accessibility lead signs wont_fix and verified transitions. (4) technical_seo_findings.has_single_approver -
      SEO lead signs wont_fix. (5) brand_voice_violations.has_personal_content - violations may
      quote PII-adjacent copy. (6) content_lifecycle_plans.has_single_approver - content owner is
      the retire / archive sign-off. (7) web_content_inventory_records.has_personal_content -
      URL paths may embed user IDs or PII tokens.
    options:
      - "yes / no per flag (7 answers)"
    why: |
      Pattern-flag judgments are workflow-shape decisions the user owns; the false-by-default
      doesn't constitute review. Per Rule #15 no data_objects.notes annotation will explain the
      choice; the audit's history.md is the only record. Gates B1B-S3.

  - id: B2-3
    summary: "Approve / supply wording for WEB-CONTOPS catalog_tagline and catalog_description (A4)."
    question: |
      The domain's catalog_tagline and catalog_description are both empty (A4 fail). Rule #20
      requires both to be drafted in buyer voice (workflow + value) and surfaced for user approval
      BEFORE any PATCH. M8 (module-level equivalent) has no targets today since zero modules exist;
      M8 will need its own pass after B1B-S1 lands.
    options:
      - "(a) approve agent-drafted wording (will surface in chat before writing)"
      - "(b) user supplies exact wording"
      - "(c) defer until B1B-S1 lands so module-level UX is authored in parallel"
    why: |
      Marketing-voice copy needs explicit approval per Rule #20; once a non-empty value exists,
      overwrites are forbidden without per-row user approval.

  - id: B2-4
    summary: "Pick the WEB-CONTOPS regulation linkage shape (ADA + Section 508 + optional EAA / GDPR cookie-consent)."
    question: |
      Zero domain_regulations rows for WEB-CONTOPS. ADA (id 61) and Section 508 (id 62) exist in
      the regulations catalog. EAA (European Accessibility Act) is absent from regulations and
      would need a new row before linking. GDPR cookie-consent / cookie-banner content scanning
      is a secondary edge (OneTrust / Cookiebot territory) - out-of-scope for WEB-CONTOPS proper
      or in-scope?
    options:
      - "(a) link ADA + Section 508 only with applicability='required', defer EAA"
      - "(b) queue EAA via a new regulations insert and link all three"
      - "(c) include the GDPR cookie-consent edge as applicability='conditional'"
      - "(d) defer entirely until B1B-S1 lands so the linkage is module-scoped"
    why: |
      Regulation-mapping calls fall on the user; the audit can identify the gap but not
      unilaterally write domain_regulations rows with applicability qualifiers.

b3:
  - id: B3-1
    candidate: "editorial_tasks / editorial_briefs"
    rationale: |
      Production-workflow substrate. GatherContent and Optimizely CMP both master 'content brief'
      (the editorial assignment definition) and 'task' (the per-stage step) as first-class.
      WEB-CONTOPS today carries content_lifecycle_plans (the calendar) but no production substrate.
      Without these, WCO-EDITORIAL-PLANNING is a planning-only module with no orchestration shape.
    vendor_evidence:
      - GatherContent
      - Optimizely Content Marketing Platform
