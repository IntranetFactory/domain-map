      consumer-system data path rather than RPA-as-a-market regimes. Editorial call whether to
      record the applicability on the RPA domains row as a Phase-C signal for buyers.
    vendor_evidence: []
    proposed_module: "n/a (records on RPA `domains` row via `domain_regulations`)"

  - id: B3-S4
    candidate: "MODULARIZATION starter `RPA-LITE` (`module_kind='starter'`)"
    rationale: |
      Once B1A-S1 lands the 2-or-3-module split, evaluate whether to also create a starter kit
      `RPA-LITE` covering the minimal attended-bot path for SMB-RPA scenarios where the orchestrator
      overhead isn't justified. Would embedded-master rpa_bots from RPA-BOT-AUTHORING and offer a
