b2:
  - id: B2-S1
    summary: "Module shape for B1A-S1: 2 modules (credentials folded) or 3 modules (credentials split)"
    question: |
      Phase-A module shape for B1A-S1. Proposed split:
        (a) RPA-BOT-AUTHORING (rpa_bots, rpa_activities, rpa_deployment_packages)
        (b) RPA-ORCHESTRATION (rpa_executions, rpa_schedules, rpa_activity_logs)
        (c) RPA-BOT-IDENTITY (rpa_bot_credentials alone), OR fold credentials into RPA-ORCHESTRATION
      Which option (a) 3 modules / (b) 2 modules / (c) defer to Phase 0 vendor research?
    options:
      - "(a) Split credentials into a dedicated RPA-BOT-IDENTITY module: 3 modules total"
      - "(b) Fold credentials into RPA-ORCHESTRATION as a fourth master: 2 modules total"
      - "(c) Defer to a Phase 0 vendor-research pass before deciding (Bucket 3 dependency on B3-S1/S2)"
    why: |
      Vendor practice diverges on whether credential/asset storage is a dedicated surface or part
      of the orchestrator. Both shapes are valid. Folding keeps the module count at 2 (still
      satisfies the M2 >=2 floor); splitting is closer to security-conscious deployments. Choice may
      be informed by whether SECRETS-MGMT (B3-S2) gets promoted as a sibling domain.

  - id: B2-S2
    summary: "Resolve `rpa_activity_logs` alias collision with AUDIT's `audit_findings`"
    question: |
      B11 proposes "audit trail" as an alias for rpa_activity_logs. AUDIT canonically masters audit
      findings / trails. The clean non-colliding aliases ("execution log", "bot trace") were loaded
      2026-06-07; only the "audit trail" term is held pending this decision. Which resolution?
    options:
      - "(a) Drop `audit trail`; keep only `execution log` / `bot trace` (already loaded)"
      - "(b) Add `audit trail` with an alias_type qualifier distinguishing industry synonym from vendor-canonical"
      - "(c) Document only; no additional alias loaded"
    why: |
      Editorial / vocabulary decision. Could resolve by accepting that AUDIT consumes the RPA log
      (which handoff 738 already implies).

  - id: B2-S3
    summary: "Per-flag yes/no on 3 B4 pattern-flag re-evaluations (rpa_bot_credentials.has_personal_content, rpa_deployment_packages.has_submit_lock, rpa_bots.has_single_approver)"
    question: |
      B4 pattern-flag positive re-evaluation per Rule #12, on the masters now classified
      entity_type='operational_workflow'. Per-flag yes/no for:
        - rpa_bot_credentials.has_personal_content (credential content is secret + PII-adjacent in
          user-impersonation scenarios)
        - rpa_deployment_packages.has_submit_lock (released packages should freeze for promotion-chain integrity)
        - rpa_bots.has_single_approver (per-bot deploy approval; vendors model a single technical owner)
    options:
      - "Per-flag: y / n / surface-to-user-for-prose-decision"
    why: |
      Pattern flags are workflow-shape judgments the user owns; per Rule #15 the rationale cannot
      live in `notes`. Once decided, the true flags are PATCHed onto the masters (additive once
      the y/n is named).

  - id: B2-S4
    summary: "Phase 0 vendor research vs eyeball-mode for Bucket 3 candidates"
    question: |
      Bucket 3 items (B3-S1 / B3-S2 / B3-S3 / B3-S4) are speculative agent-knowledge proposals;
      the market subagent was not spawned. How should they be vetted?
    options:
      - "(a) Vetted route: spawn a Phase 0 subagent with UiPath / Automation Anywhere / Blue Prism / Power Automate surface matrix"
      - "(b) Eyeball route: user names which of the 4 to treat as confirmed (B3-S1 entities, B3-S2 sibling domains, B3-S3 regulations, B3-S4 starter)"
      - "(c) Defer Bucket 3 entirely until after Phase A lands"
    why: |
      Bucket 3 items are agent-knowledge guesses without a Phase 0 vendor surface anchor.

