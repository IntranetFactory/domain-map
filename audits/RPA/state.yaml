  - id: B3-S3
    candidate: "Missing `domain_regulations` rows for RPA: SOX, HIPAA, PCI-DSS, GxP / 21 CFR Part 11, GDPR"
    rationale: |
      Zero domain_regulations rows for RPA. Bot-driven access to regulated systems implicates SOX
      (segregation of duties on bot identity for financial-data-touching bots), HIPAA (PHI-touching
      bots), PCI-DSS (card-data-touching bots), GxP / FDA 21 CFR Part 11 (pharma / clinical-data-
