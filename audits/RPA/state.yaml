b3:
  - id: B3-S1
    candidate: "Six MISSING entity candidates within RPA scope"
    rationale: |
      Six candidate masters absent from the 7-master footprint, surfaced from flagship vendor
      product knowledge:
        - rpa_queues (work queues / transaction queues — UiPath Queues, Automation Anywhere Work
          Queues, Blue Prism Work Queues)
        - rpa_queue_items (individual transactions in a queue)
        - rpa_assets (UiPath term for shared bot configuration including credentials but broader;
          overlaps with RPA-BOT-IDENTITY if B2-S1 picks option (a))
        - rpa_actions (Automation Anywhere terminology for the leaf-level step, lower-granularity
          than rpa_activities)
        - rpa_machine_pools / rpa_runners (the unattended-bot host registry — UiPath Machines,
          Automation Anywhere Bot Runners, Blue Prism Resources)
        - rpa_orchestration_tenants / rpa_folders (multi-tenant / multi-folder organization in
          the orchestrator — UiPath Tenants + Folders)
    vendor_evidence:
      - UiPath Business Automation Platform
      - Automation Anywhere 360
      - SS&C Blue Prism
    proposed_module: "RPA-ORCHESTRATION (queues, queue_items, machine_pools, tenants), RPA-BOT-IDENTITY or RPA-ORCHESTRATION (assets per B2-S1), RPA-BOT-AUTHORING (actions)"

  - id: B3-S2
    candidate: "Four adjacent automation markets queued in `_missing-domains.md`: IPA, TASK-MIN, PROCESS-ORCH, SECRETS-MGMT"
    rationale: |
      Four sibling automation markets absent from the catalog, queued in `audits/_missing-domains.md`
      during the 2026-05-30 audit. Each would carry handoffs into/out of RPA:
        - IPA (Intelligent Process Automation; AI-augmented RPA) — UiPath AI Center, Automation
          Anywhere AARI, Power Automate AI Builder, Blue Prism Decipher.
          Edge: RPA → IPA (AI-skill invocation).
        - TASK-MIN (Task Mining) — UiPath Task Mining, Power Automate Process Advisor, Soroco Scout,
          Kryon, ABBYY Timeline.
          Edge: TASK-MIN → RPA (automation-candidate handoff).
        - PROCESS-ORCH (Process Orchestration / BPMN engine) — Camunda, Bizagi, Pega, IBM BAW,
          Workato, Tray.ai, Appian, Power Automate Cloud Flows.
          Edge: bidirectional with RPA.
        - SECRETS-MGMT (Secrets Management) — HashiCorp Vault, CyberArk Conjur, AWS Secrets Manager,
