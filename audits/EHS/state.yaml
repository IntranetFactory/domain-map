b2:
  - id: B2-S1
    summary: "Confirm the 4-module split for EHS."
    question: "Is the 4-module decomposition (Safety and Incident, Industrial Hygiene and Occupational Health, Environmental Compliance, Audit and Inspection) the right shape, or should it collapse or expand?"
    options:
      - "(a) Keep the 4 modules as built"
      - "(b) Collapse Audit and Inspection into Safety and Incident (3 modules)"
      - "(c) Split a fifth Chemical and SDS module out of Industrial Hygiene"
    evidence: >-
      The flagship EHS vendors package their suites along these four surfaces. Cority sells distinct
      Safety, Industrial Hygiene, Occupational Health, Environmental, and Audit modules; Enablon and
      Sphera package Safety/Incident, Industrial Hygiene/Occupational Health, Environmental Compliance,
      and Audit/Inspection as separate product areas; VelocityEHS and Benchmark Gensuite both sell
      Safety, Industrial Hygiene/Chemical, Environmental, and Audit/Inspection surfaces. Chemical and
      SDS sits inside Industrial Hygiene at Cority/Enablon but is VelocityEHS's lead surface, which is
      the only real argument for option (c). Audit/Inspection is a separate marketed surface across all
      five flagships (it shares CAPA with Safety but has its own product), which argues against (b).
    why: "Editorial / product-shape decision. (a) is what was built and matches the flagship packaging."
  - id: B2-S2
    summary: "Confirm owner business function = Facilities and Real Estate (vs Operations/Manufacturing)."
    question: "Should EHS be owned by Facilities and Real Estate, or by Operations / Manufacturing Operations?"
    options:
      - "(a) Facilities and Real Estate owns; HR + Manufacturing Operations + GRC contribute; ESG consumes"
      - "(b) Manufacturing Operations owns; Facilities + HR + GRC contribute; ESG consumes"
    evidence: >-
      The catalog's function spine lists EH&S under Facilities and Real Estate, which is where the EHS
      manager typically reports in commercial and multi-site organizations (the as-built choice). In
      heavy-industry and process manufacturers, the EHS function reports into Operations or Plant
      Management instead, which is the case for option (b). Both are real-world patterns; the spine
      default is Facilities and Real Estate, so that is what was built, with Manufacturing Operations
      kept as a contributor to cover the process-industry case.
    why: "Owner-function RACI decision; informs the persona business_function_id anchoring."
  - id: B2-S3
    summary: "Confirm the EHS -> ESG upstream disclosure edge."
    question: "Should EHS publish its incident and emissions data upstream to ESG disclosure as built (two cross-domain handoffs), or is that boundary owned elsewhere (e.g. REAL-EST emissions sources)?"
    options:
      - "(a) Keep both EHS -> ESG handoffs (safety_incident.reported, emissions_record.recorded)"
      - "(b) Keep only the safety_incident -> ESG edge; route emissions through REAL-EST"
      - "(c) Drop both; ESG sources this data directly from establishments"
    evidence: >-
      Sphera and Enablon sell both EHS and ESG and explicitly feed operational EHS incident and
      environmental data into corporate sustainability disclosure, so the upstream edge is real
      (option a). The nuance is emissions: REAL-EST already owns utility / Scope 1+2 emission SOURCE
      data in this catalog (emissions_records is ESG-owned, id 321), so the emissions edge could be
      argued to belong to REAL-EST rather than EHS (option b). EHS was built as a consumer of
      emissions_records and publishes the establishment-level recorded event upstream, which keeps the
      operational capture in EHS and the disclosure aggregation in ESG.
    why: "Cross-domain ownership of the emissions feed; the safety-incident feed is unambiguous, the emissions feed overlaps REAL-EST."

b3:
  - id: B3-S1
    summary: "Permit-to-work as a first-class entity distinct from regulatory environmental permits."
    candidate: "permit_to_work"
    rationale: >-
      VelocityEHS, Cority, Enablon, and Benchmark Gensuite all model permit-to-work (hot work,
      confined space, lockout-tagout) as a first-class operational entity distinct from regulatory
      environmental permits. It ties directly to contractor_safety_records and site access. Built today
      as part of contractor safety qualification narrative but not as its own master.
    vendor_evidence:
      - VelocityEHS
      - Cority
      - Enablon
      - Benchmark Gensuite
    proposed_module: "EHS-AUDIT-INSPECTION or a new EHS-PERMIT-TO-WORK; attach contractor + access ties."
  - id: B3-S2
    summary: "Management of change (MOC) and serious-injury-and-fatality (SIF) precursor records for process industries."
    candidate: "management_of_change / sif_precursors"
    rationale: >-
      Sphera and Enablon lead on management-of-change (MOC) for process-safety buyers; SIF-precursor /
      leading-indicator records are a growing Verdantix-tracked surface across Cority and Benchmark.
      Both are process-industry-conditional, so they fit the Rule #16 master+optional shape rather than
      universal masters.
    vendor_evidence:
      - Sphera
      - Enablon
      - Cority
      - Benchmark Gensuite
    proposed_module: "EHS-SAFETY-INCIDENT (SIF precursors) and EHS-ENV-COMPLIANCE or a new module (MOC)."
  - id: B3-S3
    summary: "Shared-master review for sites / contractors / chemicals across REAL-EST, S2P, and EHS."
    candidate: "sites / contractors / chemicals master-promotion"
    rationale: >-
      EHS masters chemical_inventory and contractor_safety_records locally, but sites/establishments
      overlap REAL-EST (locations, id 795) and contractors overlap S2P/SUP-LIFE supplier masters
      (suppliers, id 206). A master-promotion check at deploy time would decide whether EHS consumes
      shared locations/suppliers masters rather than carrying local shells.
    vendor_evidence:
      - Cority
      - Enablon
      - VelocityEHS
    proposed_module: "Cross-domain; resolved at deployer master-promotion time, not a structural change here."

