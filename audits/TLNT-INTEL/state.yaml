b2:
  - id: B2-T1
    summary: Rule #12 lifecycle vs computed typing per inference-output master; which (if any) get a real user-facing lifecycle.
    question: |
      As of 2026-06-07, 861 mobility_recommendations, 862 fit_scores, 863 career_path_suggestions are typed entity_type='computed' and 865 match_inference_runs is 'operational_record', so all four PASS B12 with no lifecycle states. The remaining editorial call: should 861 mobility_recommendations instead carry a real proposed -> dismissed | pursued | expired user flow (which re-types it to operational_workflow and requires authored states)? Also feeds the pattern-flag positive re-eval: should match_inference_runs.has_submit_lock=true (immutable model output), mobility_recommendations.has_submit_lock=true once dismissed/pursued, career_path_suggestions.has_submit_lock=true once published?
    options:
      - keep_all_four_as_typed_no_lifecycle_analyst_recommendation_was_lifecycle_on_mobility_only
      - author_lifecycle_on_mobility_recommendations_only_retype_to_operational_workflow
      - author_lifecycle_on_more_than_one_specify
      - other_per_master_mix_specify
    why: |
      Editorial judgment on whether the master has user-facing state transitions or is a pure inference output with no user state. The typed-column exemption already resolves the structural B12 fail; this is whether to add a real workflow on top.

  - id: B2-T2
    summary: Role authoring scope, add TALENT-DEVELOPMENT-MARKETPLACE-OPS or absorb into Talent Manager.
    question: |
      The audit proposes extending 5 existing roles to TLNT-INTEL modules (TALENT-DEVELOPMENT-TALENT-MANAGER, HR-BUSINESS-PARTNER, HR-HRIS-ADMIN, RECRUITING-RECRUITER, RECRUITING-MANAGER) plus authoring a missing cross-functional HIRING-MANAGER role. Should we also add a new TALENT-DEVELOPMENT-MARKETPLACE-OPS role for the day-to-day marketplace administrator (curates opportunities, audits applications, decommissions stale postings), distinct from Talent Manager?
    options:
      - extend_existing_roles_only_talent_manager_absorbs_marketplace_ops
      - add_new_talent_development_marketplace_ops_role
      - defer_marketplace_ops_role_until_customer_asks
    why: |
      Role-shape decision the user owns; depends on whether the deployment shape includes a dedicated marketplace operations function. Eightfold and Gloat both ship such an admin persona in their RBAC, but the catalog default has historically absorbed admin-ops into the broader function-manager role. Shapes both B1B-S9 and B1A-PHASE-P.

  - id: B2-T3
    summary: Inference-output handoff integration_pattern, event_stream vs api_call vs mix.
    question: |
      For the outbound handoffs in B1B-S2 carrying inference-output payloads (fit_score.computed, mobility_recommendation.produced, career_path.projected), the typical flagship-vendor pattern is hybrid: inference signal on event_stream, consumer reads the full payload via API. The catalog encodes only the firing event. What integration_pattern do the inference-output handoffs carry?
    options:
      - all_inference_output_handoffs_event_stream
      - mix_event_stream_for_broadcast_signals_api_call_for_synchronous_reads_accepted_application_worker_move
      - other_specify
    why: |
      Catalog-modeling judgment; both readings are defensible. Other domains in the neighborhood use event_stream for fire-and-forget signals and api_call for orchestrated reads. Blocks B1B-S2.

b3:
  - id: B3-T1
    candidate: talent_pools
    rationale: |
      A curated grouping of employees scored against a role family or future bench. Distinct from succession_plans (which is per-position). Every loaded flagship vendor in this market ships a Talent Pool master separately. Currently absent from the TLNT-INTEL footprint. Proposed module: TLNT-INTEL-MOBILITY.
    vendor_evidence:
      - {vendor: Eightfold AI, evidence: 1st_class}
      - {vendor: Workday, evidence: 1st_class}
      - {vendor: Reejig, evidence: 1st_class}
      - {vendor: Gloat, evidence: secondary}
    proposed_module: TLNT-INTEL-MOBILITY

  - id: B3-T2
    candidate: model_fairness_audits
    rationale: |
      EEOC bias-audit logging. NYC Local Law 144 and similar AI-employment regulations require periodic bias audits of the matching model output. Currently absent. Whether this is a TLNT-INTEL concern (new TLNT-INTEL-AI-GOVERNANCE module, candidate fourth module) or routes to a dedicated AI-GOV domain (already in the missing-domains queue) is the open question; depends on Phase 0 boundary vetting.
    vendor_evidence:
      - {vendor: Eightfold AI, evidence: 1st_class}
      - {vendor: Workday, evidence: 1st_class}
      - {vendor: Reejig, evidence: secondary}
    proposed_module: TLNT-INTEL-AI-GOVERNANCE-new-or-TLNT-INTEL-INSIGHTS-or-new-AI-GOV-domain
    extra_modularization_dependency: deciding_the_ai_gov_boundary_is_the_modularization_question

  - id: B3-T3
    candidate: skill_inferences
    rationale: |
      Audit trail of inferred skills per employee, distinct from skill_profiles (mastered by SKILLS-MGMT, holds declared skills). Eightfold's Inferred Skills and Reejig's Skills Inference Engine both master this separately. May belong in SKILLS-MGMT under an inferred_skills master; cross-domain ownership question.
    vendor_evidence:
      - {vendor: Eightfold AI, evidence: 1st_class}
      - {vendor: Reejig, evidence: 1st_class}
      - {vendor: 365Talents, evidence: secondary}
    proposed_module: TLNT-INTEL-INSIGHTS
    extra_ownership_dependency: cross_domain_ownership_decision_with_skills_mgmt

