      high_intent_signal.detected, 528 deal_risk.escalated) carry target_domain_module_id=NULL on the
      REV-INTEL side. All 7 nulls exist because REV-INTEL has zero domain_modules rows; the deterministic
      derivation cannot point to any REV-INTEL module until B1B-M1 lands.
    action: >
      After B1B-M1 ships REV-INTEL modules: PATCH source_domain_module_id on 207 to REV-INTEL-DEAL-SCORING;
      on 208 to REV-INTEL-PIPELINE-INSPECTION. PATCH target_domain_module_id on 201 and 473 to
      REV-INTEL-DEAL-SCORING or REV-INTEL-PIPELINE-INSPECTION per the B2-M1 modularization decision; on
      476 to REV-INTEL-CONVERSATION; on 477 to REV-INTEL-DEAL-SCORING; on 528 conditional on B2-D1
      resolution.
    blocked_by:
      - {type: depends_on, ref: B1B-M1, reason: "B10b derivation needs REV-INTEL modules to exist"}
