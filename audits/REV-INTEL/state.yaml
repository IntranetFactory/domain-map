b1b:
  - id: B1B-S1
    summary: "Backfill 7 handoff module FKs on REV-INTEL side once REV-INTEL has modules."
    finding: >
      B10b fails: 2 outbound handoffs (207 deal_risk.escalated -> CRM, 208 pipeline_health.degraded -> SALES-PERF)
      carry source_domain_module_id=NULL, and 5 inbound handoffs (201 crm_opportunity.closed_lost, 473
