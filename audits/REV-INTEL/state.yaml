    summary: "Author REV-INTEL module set (M1 / M2 / M4 / M6 gate; blocks B / E / F and all B1-V*)."
    finding: >
      M-band fails: zero domain_modules rows for REV-INTEL despite 7 capabilities and 8 vendor solutions.
      Rule #14 has no leadership-tier exemption for the M-band floor; the leadership-tier exemption
      applies only to B1 master-existence. With no modules, B / E / F bands collapse, B10b cannot
      attribute its 7 NULL FKs (B1A-S1), and all top 7 missing masters (B1B-V1..V7) have no module to
      land in.
    blocked_by:
      - {type: user_decision, ref: B2-M1, reason: "Module shape (6-module per 2026-05-30 hypothesis vs 4-module collapsed vs other) is a user decision"}
    affected_modules: []
    extra_proposed_module_set:
      - {code: REV-INTEL-CONVERSATION, capabilities: [CONVERSATION-INTEL, MARKET-SIGNAL-EXTRACTION]}
      - {code: REV-INTEL-DEAL-SCORING, capabilities: [DEAL-SCORING]}
      - {code: REV-INTEL-FORECAST, capabilities: [REVENUE-FORECASTING]}
      - {code: REV-INTEL-PIPELINE-INSPECTION, capabilities: [PIPELINE-INSPECTION]}
      - {code: REV-INTEL-COACHING, capabilities: [COACHING-CALL-REVIEW]}
      - {code: REV-INTEL-ACTIVITY-CAPTURE, capabilities: [ACTIVITY-CAPTURE]}
    extra_alternative_4_module_shape:
      - {code: REV-INTEL-CONVERSATION, capabilities: [CONVERSATION-INTEL, MARKET-SIGNAL-EXTRACTION]}
      - {code: REV-INTEL-DEAL-INTEL, capabilities: [DEAL-SCORING, PIPELINE-INSPECTION, COACHING-CALL-REVIEW]}
      - {code: REV-INTEL-FORECAST, capabilities: [REVENUE-FORECASTING]}
      - {code: REV-INTEL-ACTIVITY-CAPTURE, capabilities: [ACTIVITY-CAPTURE]}

