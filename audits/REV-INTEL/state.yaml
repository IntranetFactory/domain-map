  - id: B1B-A1
    summary: "Draft catalog_tagline + catalog_description for REV-INTEL; user approval required before PATCH."
    finding: >
      A4 fails: catalog_tagline and catalog_description on /domains row 103 are empty strings. Rule #20
      forbids any write to these columns without explicit per-row user approval of exact wording. Drafts
      authored in 2026-05-30 audit (buyer-voice tagline + 3-paragraph description); no approval recorded
      since.
    blocked_by:
      - {type: user_decision, ref: B2-A1-wording, reason: "Rule #20 prohibits write without user-approved wording"}
    extra_draft_tagline: "See every deal the way your best rep would. AI-driven pipeline analysis, deal scoring, and revenue forecasts from your team's calls, emails, and CRM activity."
    extra_draft_description_para_1: "Revenue Intelligence reads the signals your sales team generates every day, calls, emails, meetings, opportunity updates, and turns them into deal-level risk scores and an accurate roll-up forecast. Instead of reps hand-rolling pipeline reports, the system tells managers which deals are slipping, which are progressing on schedule, and where coaching attention pays off."
    extra_draft_description_para_2: "Conversation intelligence transcribes and tags every recorded call, surfacing competitor mentions, pricing objections, and next-step commitments. Auto-activity-capture removes the data-entry tax on reps and keeps the CRM clean. Coaching workflows close the loop, replaying calls against your playbook so enablement can spot patterns across the team."
    extra_draft_description_para_3: "Built for sales managers, RevOps, and enablement, sitting alongside your CRM rather than replacing it. Forecast accuracy is the headline metric; deal-coverage ratios and rep ramp velocity follow."

