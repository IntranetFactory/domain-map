b2:
  - id: B2-M1
    summary: "Modularization shape: 6-module vs 4-module collapsed vs other."
    question: >
      Which module shape should REV-INTEL ship? The 2026-05-30 hypothesis proposes 6 modules
      (REV-INTEL-CONVERSATION, REV-INTEL-DEAL-SCORING, REV-INTEL-FORECAST, REV-INTEL-PIPELINE-INSPECTION,
      REV-INTEL-COACHING, REV-INTEL-ACTIVITY-CAPTURE). Alternatives: (a) collapse DEAL-SCORING and
      PIPELINE-INSPECTION into REV-INTEL-DEAL-INTEL (Gong / Chorus shape), (b) 4-module shape
      (CONVERSATION + signals; DEAL-INTEL including scoring, pipeline, coaching; FORECAST; ACTIVITY-
      CAPTURE).
    options:
      - "6-module shape per 2026-05-30 Pass 2"
      - "4-module collapsed shape (CONVERSATION / DEAL-INTEL / FORECAST / ACTIVITY-CAPTURE)"
      - "Other (specify codes, capabilities)"
    why: >
      Gates B1B-M1 / B1B-V1..V7 / B1B-T1 / E-band / F-band / all Pass-4 pairwise reconciliation.
      Single most load-bearing decision in this audit. Bucket 3 candidates 2, 3, 5, 6 partly inform
      this; user can request vetted route on Bucket 3 to defer.

  - id: B2-O1
    summary: "Conversation-intel ownership: SALES-ENG (current) vs REV-INTEL vs split."
    question: >
      conversation_intelligence_records (id 124) and call_recordings (id 122) are mastered by SALES-ENG
      today. REV-INTEL capability CONVERSATION-INTEL is named after the first. Where do they belong?
    options:
      - "Leave both with SALES-ENG; REV-INTEL embedded_master or consumer in REV-INTEL-CONVERSATION (substrate vs analytics split per Clari / BoostUp / Aviso)"
      - "Move both to REV-INTEL; SALES-ENG embedded_master them (Gong / Chorus interpretation)"
      - "Split: keep call_recordings in SALES-ENG, move conversation_intelligence_records to REV-INTEL"
    why: >
      Cross-domain master ownership question with credible vendor evidence on both sides. Bucket 3
      candidate 1 (Gong / Chorus packaging is canonical or vendor-specific) directly informs this; if
      user picks vetted route on Bucket 3, hold B2-O1 until research lands.

  - id: B2-T1
    summary: "Approach for analytics-side trigger events when REV-INTEL ships masters."
    question: "How should analytics-side events (deal_risk_score.changed, forecast.recalculated, coaching_alert.fired) be authored once REV-INTEL has masters?"
    options:
      - "Wait for B1B-V* to land, then add new events anchored to new masters and migrate existing outbound handoffs to point at them (cleanest)"
      - "Keep deal_risk.escalated and pipeline_health.degraded as CRM-owned events permanently (consistent with current model but ducks the question)"
      - "Add new events now anchored to a placeholder deal_risk_score_signals master without loading the full surface (interim)"
    why: "Determines whether outbound handoffs 207 / 208 re-anchor onto REV-INTEL-owned events on B1B-V*/B1B-T1 landing, or stay CRM-anchored."

  - id: B2-D1
    summary: "Handoff 528 duplicate-direction defect on trigger_event_id=167."
    question: >
      Handoffs 207 (REV-INTEL -> CRM) and 528 (CRM -> REV-INTEL) share trigger_event_id=167
      (deal_risk.escalated) but point in opposite directions. Semantics: REV-INTEL detects risk, CRM
      receives. Handoff 207 is correct. What about 528?
    options:
      - "DELETE handoff 528 (cleanest, REV-INTEL publishes deal_risk.escalated)"
      - "Reclassify 528 to a different trigger event (e.g. CRM publishes crm_opportunity.flagged_for_review and REV-INTEL consumes for retraining)"
      - "Keep both because CRM-side flagging and REV-INTEL-side escalation are different events conflated under one trigger_event"
    why: "Determines whether handoff 528 ever gets an APQC tag in H1 (currently deferred)."
    affected_handoffs:
      - {handoff_id: 207, direction: outbound, source_domain: REV-INTEL, target_domain: CRM, trigger_event: deal_risk.escalated, payload: crm_opportunities, null_field: source_domain_module_id}
      - {handoff_id: 528, direction: inbound, source_domain: CRM, target_domain: REV-INTEL, trigger_event: deal_risk.escalated, payload: crm_opportunities, null_field: target_domain_module_id}

  - id: B2-C1
    summary: "RevOps function-spine treatment vs current Sales Operations owner."
    question: >
      Today REV-INTEL is owned by Sales Operations. Many flagship deployments are owned by a distinct
      Revenue Operations / RevOps function consolidating Sales Ops, Marketing Ops, and Customer
      Success Ops. How should the function-spine treat RevOps?
    options:
      - "Add Revenue Operations as a peer business_function; re-anchor REV-INTEL to it"
      - "Add RevOps as a sub-function under Sales Operations (hierarchy extension)"
      - "Add RevOps as a contributor on the existing Sales Operations owner row (additive, lowest risk)"
      - "Leave as-is and capture buyer evolution via min_org_size or cost_band shifts"
    why: "Function-spine change with cross-domain blast radius (SALES-ENG, SALES-PERF, GTM-PLAN, ACCT-PLAN potentially affected)."

b3:
  - id: B3-1
    candidate: "Conversation intelligence as SALES-ENG substrate vs REV-INTEL master."
    rationale: >
      Gong markets conversation intelligence as the centerpiece; Clari treats it as enrichment over
      call recordings; Chorus (ZoomInfo) folded it into the engagement substrate after acquisition;
      BoostUp positions conversation as one of several signal feeds. Interpretation affects B2-O1.
    vendor_evidence: [Gong, Clari, "Chorus by ZoomInfo", BoostUp]
    extra_recommended_path: "Phase 0 against Gong product docs + Clari Wingman acquisition rationale + ZoomInfo Chorus integration whitepaper."

  - id: B3-2
    candidate: "Coaching as REV-INTEL module vs LMS / sales-enablement module."
    rationale: >
      Gong "Coach", Chorus "Coaching", Clari "Copilot Coach" all sit inside the RI product. Sales
      enablement vendors (Mindtickle, Highspot, Allego, Showpad) ship parallel coaching surfaces.
      Question: is coaching_sessions REV-INTEL-mastered with sales-enablement consumer, or vice versa?
    vendor_evidence: [Gong, Chorus, Clari, Mindtickle, Allego, Highspot, Showpad]
    proposed_module: REV-INTEL-COACHING
    extra_recommended_path: "Phase 0 on Mindtickle + Allego coaching docs + Gong Coach docs."

  - id: B3-3
    candidate: "Forecast roll-up as REV-INTEL module vs EPM Sales-Planning module."
    rationale: >
      Clari and Aviso emphasize forecast as the headline value. Finance-grade EPM platforms (Anaplan,
      Pigment, Board) ship forecast modules with stronger close-cycle anchoring. Buyer separation
      (RevOps vs FP&A) may justify a separate REVENUE-PLANNING-PLATFORM domain.
    vendor_evidence: [Clari, Aviso, "Anaplan Sales Planning", "Pigment RevOps", Board]
    proposed_module: REV-INTEL-FORECAST
    extra_recommended_path: "Phase 0 on Anaplan Sales Planning + Pigment RevOps + Aviso forecasting whitepapers; queue REVENUE-PLANNING-PLATFORM as a candidate if confirmed."

  - id: B3-4
    candidate: "Activity capture as a separate domain."
    rationale: >
      People.ai positions itself as the data foundation rather than a revenue-intelligence product.
      Salesforce Einstein Activity Capture and Microsoft Sales Copilot also ship activity capture
      independently of revenue-intelligence features.
    vendor_evidence: [People.ai, "Salesforce Einstein Activity Capture", "Microsoft Sales Copilot"]
    extra_recommended_path: "Phase 0 on People.ai + Einstein Activity Capture + Microsoft Sales Copilot docs; queues a new domain candidate if confirmed."

  - id: B3-5
    candidate: "Market and competitive signal extraction as a PMM module."
    rationale: >
      MARKET-SIGNAL-EXTRACTION overlaps with Product Marketing Management. Klue and Crayon ship
      competitive intelligence as their headline product; Gong "Smart Trackers" and Chorus "Themes"
      extract competitor mentions from sales calls. Klue ingests Gong transcripts.
    vendor_evidence: [Klue, Crayon, "Gong Smart Trackers", "Chorus Themes"]
    extra_recommended_path: "Phase 0 on Klue + Crayon + Gong Smart Trackers + Chorus Themes docs; may fold MARKET-SIGNAL-EXTRACTION into PMM if confirmed."

  - id: B3-6
    candidate: "RevOps tooling overlap with CRM AI Copilot."
    rationale: >
      CRM-suite incumbents (Salesforce Einstein, HubSpot AI, Microsoft Sales Copilot) ship
      RI-shaped features inside CRM. CRM-AI-COPILOT module already exists. Boundary between AI
      features inside CRM and REV-INTEL as a separate domain is a real market question.
    vendor_evidence: ["Salesforce Einstein Conversation Insights", "HubSpot AI", "Microsoft Sales Copilot"]
    extra_recommended_path: "Phase 0 on Einstein positioning + HubSpot AI + Microsoft Sales Copilot; may refine REV-INTEL module boundary vs CRM-AI-COPILOT."
