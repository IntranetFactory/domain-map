b2:
  - id: B2-PATTERN-FLAGS
    summary: pattern flag positive re-evaluation on 3 masters (carry from 2026-05-29 B2-S2)
    question: Per Rule #12 / B4 positive re-evaluation, should service_incidents.has_personal_content=true (incident descriptions routinely carry user PII)? knowledge_articles.has_personal_content=true (some KB articles reference customer cases)? service_changes.has_submit_lock=true (freeze change payload at CAB submission)?
    options:
      - Approve all three flips
      - Approve a subset
      - Decline all (flags stay false)
    why: Pattern flags are workflow-shape judgments the user owns; defaults to false do not establish review. Recording the consideration in notes is forbidden by Rule #15, so the answer lives only in the audit decisions. All three masters are now classified entity_type=operational_workflow (2026-06-07), so flag consideration is in scope.
    affected_masters:
      - {data_object_id: 47, name: service_incidents, target_module_id: 38, workflow: incident}
      - {data_object_id: 50, name: service_changes, target_module_id: 41, workflow: change}
      - {data_object_id: 51, name: knowledge_articles, target_module_id: 43, workflow: knowledge}

  - id: B2-SLA-LIFECYCLE
    summary: service_slas (id 53) has zero lifecycle states (carry from 2026-05-29 B2-S1)
    question: service_slas is now classified entity_type=catalog (2026-06-07), under which lifecycle states are permitted but not required (Rule #12), so B12 no longer fails on it. Leave it stateless (config-shape), or author a state machine (e.g. draft, published, active, expired, archived)?
    options:
      - Accept config-shape (catalog) classification; no state machine; B12 passes
      - Author a state machine; surface proposed states for approval
    why: B12 is satisfied by the catalog classification, but a published SLA does have an effective period (active vs expired) worth modeling as state if the workflow demands it. Either choice is defensible; the user owns the call.
    affected_masters:
      - {data_object_id: 53, name: service_slas, target_module_id: 45, workflow: sla-config}

  - id: B2-SKILL-NAMING
    summary: "RETIRED 2026-06-06 (per-domain-skill restoration). Originally: ITSM system skills used kebab itsm-<module>-system vs SKILL snake <module_code_lower>_agent."
    question: "SUPERSEDED. The per-module system-skill grain is retired (see header). The 8 kebab itsm-<module>-system skills are no longer the model; each domain now carries exactly ONE domain-grain system skill. Re-frame: confirm the ITSM domain-grain skill exists and the legacy per-module skills are dispositioned per audits/_modularization-backlog.md. No naming-convention decision is owed under the new model."
    options:
