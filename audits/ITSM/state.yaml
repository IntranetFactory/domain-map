b3:
  - id: B3-SERVICE-OUTAGES
    candidate: service_outages
    rationale: Customer-facing outage / status record distinct from the internal incident. Confirmed by name in ServiceNow (Outage records childed to major incidents), Atlassian Statuspage (Incidents + Components + Subscribers), Freshservice/Freshstatus. No collision with outage_events (id 665, UTIL-OPS grid outage).
    proposed_module: ITSM-INCIDENT-MGMT
    phase0_verdict: CONFIRM (Core)

  - id: B3-CHANGE-COLLISIONS
    candidate: change_collisions
    rationale: Overlapping change-window / blackout-conflict detection. Confirmed by name in ServiceNow (Change Management Collision Detector) and BMC Helix (change conflict review). Junction/transition under change-mgmt.
    proposed_module: ITSM-CHANGE-MGMT
    phase0_verdict: CONFIRM (Common)

  - id: B3-CAB-MEETINGS
    candidate: cab_meetings
    rationale: Change Advisory Board agenda + minutes as a first-class record. Confirmed by name in ServiceNow (CAB Workbench), BMC, Freshservice.
    proposed_module: ITSM-CHANGE-MGMT
    phase0_verdict: CONFIRM (Core)

  - id: B3-SERVICE-OFFERINGS-SPLIT
    candidate: service_offerings
    rationale: Back-end service definition split from its user-facing catalog item (an entity-level split, NOT a module split -> additive master, stays b3). Confirmed by name in ServiceNow CSDM (offering vs catalog_item are two separate objects, m:m), BMC, Freshservice. Load as a master related to service_catalog_items.
    proposed_module: ITSM-SERVICE-REQUEST
    phase0_verdict: CONFIRM (Core)

  - id: B3-WALKUP-VISITS
    candidate: walkup_visits
    rationale: Walk-up / onsite check-in record (queue position, estimated service time) backing the ITSM-WALKUP capability-orphan. Modeled as a first-class entity only by ServiceNow (Walk-Up Experience); Specialist. RESHAPE - load single walkup_visits master, drop walkup_kiosks (kiosk is a location/config attribute, not a master).
    proposed_module: ITSM-AGENT-WORKSPACE
    phase0_verdict: CONFIRM / RESHAPE (Specialist; no walkup_kiosks)

  - id: B3-VIRTUAL-AGENT-CONVERSATIONS
    candidate: virtual_agent_conversations
    rationale: Conversational / virtual-agent transcripts backing the ITSM-VIRTUAL-AGENT capability-orphan. Confirmed by name in ServiceNow (Interaction/Transcript), Freshservice (Freddy), ManageEngine, Jira SM. Prefer this name over chatbot_sessions.
    proposed_module: ITSM-AGENT-WORKSPACE
    phase0_verdict: CONFIRM (Core)

  - id: B3-SERVICE-RELEASES
    candidate: service_releases
    rationale: Release & deployment record distinct from a single change; backs the ITSM-RELEASE capability. Confirmed by name in Freshservice, ManageEngine, BMC, ServiceNow, Ivanti. Folds into ITSM-CHANGE-MGMT as a second master (no new ITSM-RELEASE module - over-fragmentation, not required by Rule #14). Newly surfaced by the 2026-06-08 Phase 0 research.
    proposed_module: ITSM-CHANGE-MGMT
    phase0_verdict: CONFIRM (Core)
