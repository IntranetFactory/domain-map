b2:
  # a-CLM.md processed 2026-06-16. RESOLVED + removed (see history.md "Answer processing 2026-06-16"):
  #   B2-B3-LOAD-REVIEW (q1=a keep), B2-B3-COUNTERPARTIES (q2=a keep master),
  #   B2-B3-PLAYBOOKS (q3=a: master kept + stale alias deleted), B2-B3-REGULATIONS (q6=recommended/yes),
  #   B2-MOD-CLM-NEGOTIATION-SPLIT (q5=b do-not-split). One item stays OPEN below: a4 was a QUESTION,
  #   not a decision, and re-frames the compliance module as an OPTIONAL/add-on shape rather than OOTB.
  - id: B2-MOD-CLM-COMPLIANCE
    summary: "Stand up a CLM-COMPLIANCE module as an OPTIONAL add-on (not OOTB-for-everyone), re-homing data_protection_addenda 1055 + contract_risk_assessments 1052 + compliance obligations? Or leave those in CLM-REPOSITORY/CLM-NEGOTIATION as today."
    user_decision: "a4 (2026-06-16) was a question, not a decision: 'do most installations use compliance? if not, isn't OOTB compliance just ballast, wouldn't an optional CLM-COMPLIANCE be better?'. Item stays OPEN, re-asked in q-CLM.md as the three-way optional-module choice."
    options:
      - "a: add CLM-COMPLIANCE as an OPTIONAL/add-on module (tenants that need it opt in; re-home DPAs + risk assessments + compliance obligations there)"
      - "b: do not create the module; DPAs/risk stay in CLM-REPOSITORY / CLM-NEGOTIATION (today's shape)"
      - "c: create it as a standard full module that ships for every CLM tenant"
    recommended: "a (optional add-on). The user's read is correct: most CLM deployments do NOT run a dedicated compliance surface, so making it OOTB-for-all (option c) would be ballast for the majority. A separate compliance/DPA surface is a real enterprise pattern but a heavy-regulated-contract one, so the right shape is an opt-in module, not omission and not a forced default."
    vendor_evidence: [Icertis Contract Intelligence, Sirion CLM, OneTrust]
    answer_to_a4: >
      Answer folded into q-file: dedicated compliance/DPA/risk surfaces are NOT the norm. Most CLM deployments
      (Ironclad, DocuSign CLM, Agiloft, LinkSquares, the CLM modules inside Salesforce Revenue Cloud / ServiceNow)
      keep DPAs and risk records inside the repository/negotiation surface and do NOT ship a separate compliance
      module. A dedicated compliance product surface is the heavy-regulated pattern (Icertis Contract Intelligence
      risk/compliance, Sirion compliance score, OneTrust DPA management). So OOTB compliance for every tenant would
      indeed be ballast for the majority; an OPTIONAL add-on module (the user's suggested shape) is the better fit
      than either omitting it or forcing it on everyone. Requires a Phase 0 report before any module is stood up.

