b3:
  - id: B3-CONTRACT-AMENDMENTS
    candidate: contract_amendments
    rationale: >
      Icertis, Ironclad, Sirion model amendments as first-class records distinct from contract_clauses (modify existing terms,
      retain audit-trail). The existing legal_contract.amended event has no master amendment record; the amendment lives implicitly
      inside legal_contracts.
    vendor_evidence:
      - Icertis Contract Intelligence
      - Ironclad
      - Sirion CLM
    proposed_module: CLM-REPOSITORY
  - id: B3-CONTRACT-RENEWAL-RECORDS
    candidate: contract_renewal_records
    rationale: >
      Ironclad, LinkSquares, Workday Evisort model the renewal record as distinct from the original contract (one parent, many
      renewal records). Currently legal_contract.renewed transitions the original record's state but produces no new master.
    vendor_evidence:
      - Ironclad
      - LinkSquares Finalize
      - Workday Evisort
    proposed_module: CLM-RENEWAL
  - id: B3-CLAUSE-LIBRARIES
