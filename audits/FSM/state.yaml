b2:
  - id: B2-M7
    summary: "M7 architectural choice: DELETE 4 sibling consumer DMDOs (834, 835, 836, 837) or PROMOTE to embedded_master?"
    question: "installed_equipment and customer_sites (both master in FSM-INSTALLED-BASE) carry consumer rows in sibling FSM modules (FSM-DISPATCH-OPS and FSM-SERVICE-CONTRACTS). M7 rejects master + consumer within the same domain. DELETE (sibling modules read masters by canonical reference) or PROMOTE to embedded_master (each sibling ships a standalone-deployable shell)? Standalone DISPATCH-OPS without INSTALLED-BASE has no equipment to service against; standalone SERVICE-CONTRACTS without INSTALLED-BASE has no equipment to cover. Agent default DELETE. Both paths are destructive on existing rows, so neither is executed unapproved."
    options:
      - "(a) DELETE all 4 sibling consumer rows (834, 835, 836, 837)."
      - "(b) PROMOTE all 4 to embedded_master."
      - "(c) Mixed per row."
    why: "Architectural intent and deployability strategy decision; user's call."

  - id: B2-FLAGS
    summary: "B4 / Rule #12 pattern-flag re-evaluation on 6 candidates across 5 FSM masters."
    question: "Current pattern flags: only service_contracts has has_single_approver=true; all other flags false on all 7 masters (now all classified operational_workflow, so flags are in scope). Candidates: (a) service_work_orders.has_submit_lock (completed is requires_permission=true; lock-on-completion is standard FSM). (b) field_visits.has_personal_content (signature, customer name, on-site photo). (c) dispatch_records.has_submit_lock (returned is terminal). (d) installed_equipment.has_personal_content (serial / warranty info). (e) service_contracts.has_submit_lock (once active). (f) service_pm_schedules.has_submit_lock (post-completed)."
    options:
      - "Per-flag yes/no on each of the 6 candidates."
    why: "Pattern flags are workflow-shape judgments the user owns. Setting a flag overwrites the current value, so deferred to user."

  - id: B2-CROSS-DOMAIN-ROLE
    summary: "Cross-domain role bridging FSM + CSM + CRM for customer-care-around-service-failures?"
    question: "FSM has no cross-domain role bridging to CSM / CRM the way RE-BROKERAGE has SALES-TRANSACTION-COORDINATOR. Should an FSM-CUSTOMER-SUCCESS or FSM-OPERATIONS-MANAGER cross-domain role bundle FSM-DISPATCH-OPS + CSM CSM-CASE-MGMT for the failure-escalation workflow (handoffs 229, 230, 883 land in CSM)?"
    options:
      - "(a) No cross-domain role (CSM owns its own roles)."
      - "(b) Add FSM-CUSTOMER-SUCCESS bundling FSM-DISPATCH-OPS + CSM CSM-CASE-MGMT."
      - "(c) Defer to CSM audit."
    why: "RBAC architecture and persona-design question. Pairs with B1A-PHASE-P (operational personas)."

  - id: B2-MOBILE-TECH-SPLIT
    summary: "Modularization: split FSM-DISPATCH-OPS into a dispatcher-side and a mobile-tech-side module?"
    question: "Capability FSM-MOBILE-TECH (617) realizes within FSM-DISPATCH-OPS today. Flagship products ship a distinct mobile module with offline sync, route-of-day, and signature capture. Split FSM-DISPATCH-OPS into FSM-DISPATCH-OPS (dispatcher) and FSM-MOBILE-TECH (tech-side)? Pairs with B3-V2 / B3-V6 entity placement."
    options:
      - "(a) Keep single DISPATCH-OPS."
      - "(b) Split into DISPATCH-OPS + MOBILE-TECH."
      - "(c) Defer until Bucket 3 vetting."
    why: "Modularization design call; pairs with B3-V2 entity placement."

