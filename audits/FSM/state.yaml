b2:
  - id: B2-M7
    summary: "M7 architectural choice: DELETE 4 sibling consumer DMDOs (834, 835, 836, 837) or PROMOTE to embedded_master?"
    question: "installed_equipment (master in FSM-INSTALLED-BASE) and customer_sites (master in FSM-INSTALLED-BASE) currently carry consumer rows in sibling FSM modules (FSM-DISPATCH-OPS and FSM-SERVICE-CONTRACTS). M7 rejects master + consumer within the same domain. Should the 4 sibling consumer rows be DELETED (sibling modules read masters by canonical reference) or PROMOTED to embedded_master (sibling modules each ship a standalone-deployable shell)? Standalone DISPATCH-OPS without INSTALLED-BASE has no equipment to service against; standalone SERVICE-CONTRACTS without INSTALLED-BASE has no equipment to cover. Agent default DELETE."
    options:
      - "(a) DELETE all 4 sibling consumer rows (834, 835, 836, 837)."
      - "(b) PROMOTE all 4 to embedded_master."
      - "(c) Mixed per row."
    why: "Architectural intent and deployability strategy decision; user's call. Agent cannot pick standalone-deployability vs canonical-reference without product intent."

  - id: B2-FLAGS
    summary: "B4 / Rule #12 pattern-flag re-evaluation on 6 candidates across 5 FSM masters."
    question: "Current pattern flags: only service_contracts has has_single_approver=true; all other flags false on all 7 masters. Candidates to re-evaluate: (a) service_work_orders.has_submit_lock (completed is requires_permission=true and lock-on-completion is standard FSM pattern). (b) field_visits.has_personal_content (signature capture, customer name, on-site photo). (c) dispatch_records.has_submit_lock (returned is terminal). (d) installed_equipment.has_personal_content (serial / warranty info). (e) service_contracts.has_submit_lock (once active). (f) service_pm_schedules.has_submit_lock (post-completed)."
    options:
      - "Per-flag yes/no on each of the 6 candidates."
    why: "Pattern flags are workflow-shape judgments the user owns."

  - id: B2-STARTER-SCOPE
    summary: "Starter system skill 236 scope: self-sufficient or delegate-to-full-module?"
    question: "HVAC-SVC-MGMT system skill 236 carries operational create_* mutates on FSM masters (customers, crm_contacts, customer_sites, installed_equipment, service_work_orders, field_visits, dispatch_records, service_contracts, sales_quotes). Rule #19 invariant 6 floor is query_<entity> per embedded master plus light mutates. Question: keep the starter self-sufficient with operational CRUD, or trim the create_* mutates so the starter delegates to the underlying full-module agents when co-deployed?"
    options:
      - "(a) Self-sufficient (current shape)."
      - "(b) Delegate to full-module agents (trim mutates from starter skill_tools)."
    why: "Product intent question about starter standalone behavior."

  - id: B2-CROSS-DOMAIN-ROLE
    summary: "Cross-domain role bridging FSM + CSM + CRM for customer-care-around-service-failures?"
    question: "FSM does not have a cross-domain role bridging to CSM / CRM the way RE-BROKERAGE has SALES-TRANSACTION-COORDINATOR. Should an FSM-CUSTOMER-SUCCESS or FSM-OPERATIONS-MANAGER cross-domain role bundle FSM-DISPATCH-OPS + CSM CSM-CASE-MGMT for the failure-escalation workflow (handoffs 229, 230, 883 land in CSM)?"
    options:
      - "(a) No cross-domain role (CSM owns its own roles)."
      - "(b) Add FSM-CUSTOMER-SUCCESS bundling FSM-DISPATCH-OPS + CSM CSM-CASE-MGMT."
      - "(c) Defer to CSM audit."
    why: "RBAC architecture and persona-design question."

  - id: B2-MOBILE-TECH-SPLIT
    summary: "Modularization: split FSM-DISPATCH-OPS into a dispatcher-side and a mobile-tech-side module?"
    question: "Capability FSM-MOBILE-TECH (617) realizes within FSM-DISPATCH-OPS today. Flagship vendors (Salesforce Field Service Mobile, ServiceNow Mobile Agent, ServiceMax Go, Praxedo Mobile) ship a distinct mobile module with offline sync, route-of-day, and signature capture. Split FSM-DISPATCH-OPS into FSM-DISPATCH-OPS (dispatcher) and FSM-MOBILE-TECH (tech-side)? Pairs with Bucket 3 candidates B3-V2 / B3-V6."
    options:
      - "(a) Keep single DISPATCH-OPS."
      - "(b) Split into DISPATCH-OPS + MOBILE-TECH."
      - "(c) Defer until Bucket 3 vetting."
    why: "Modularization design call; pairs with B3-V2 entity placement."

  - id: B2-STARTER-HOST-SCOPE
    summary: "HVAC-SVC-MGMT starter cross-domain host metadata: add CRM / CPQ / ERP-FIN, or keep FSM-only?"
    question: "HVAC-SVC-MGMT (171) embeds shells from CRM (customers, crm_contacts), CPQ (sales_quotes), and ERP-FIN (customer_invoices) but lists FSM only via domain_module_host_domains. Add additional host rows for CRM / CPQ / ERP-FIN so the catalog reflects cross-domain reach?"
