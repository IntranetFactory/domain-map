b2:
  - id: B2-T1
    summary: Module split topology gating B1B-T1 and the whole downstream cascade.
    question: Which module split for THREAT-INTEL?
    options:
      - "(a) CURATION + OPERATIONALIZATION (recommended; mirrors Recorded Future + ThreatConnect + Mandiant product nav)"
      - "(b) Four lifecycle-stage modules (collection, processing, analysis, dissemination; analyst-textbook canonical)"
      - "(c) Single THREAT-INTEL-PLATFORM + a THREAT-INTEL-LITE starter (Rule #19)"
    why: |
      Modularization design choice with downstream effects on capability-to-module attribution,
      master attribution, role bundles, Phase-S shape. Gates B1B-T1 + B1B-T6 + B1B-T12 and the
      domain-grain system-skill shape.

  - id: B2-T2
    summary: Catalog UX wording (Rule #20). EXECUTED 2026-06-07 via the prompt's EXECUTE override; left here only as a review checkpoint.
    question: Approve the catalog_tagline + catalog_description written to domains.id=14 on 2026-06-07 (record_status='new')?
    options:
      - "(a) Approve as written"
      - "(b) Edit (provide replacement text; agent will re-PATCH)"
    why: |
      The empty A4 fields were filled with buyer-voice copy under the EXECUTE rule (which
      overrides the stale Rule #20 surface-before-write gate). Content is still record_status='new'
      and reviewable; any edit is a non-empty overwrite (DESTRUCTIVE) and would need your text.

  - id: B2-T3
    summary: Lifecycle-state exemptions for config-shape candidate masters.
    question: |
      Workflow-bearing vs config-shape for threat_actors, threat_campaigns, malware_families,
      attack_techniques?
    options:
      - "(a) Exempt all four as config-shape"
      - "(b) Workflow on threat_actors only (draft -> peer_reviewed -> published -> archived); config-shape the rest"
      - "(c) Workflow on threat_actors + intelligence_reports (already in B1B-T7); config-shape the rest"
    why: |
      Workflow-bearing vs config-shape is a substantive call. Anomali workflow-shapes actors;
      Recorded Future registry-shapes them. Per Rule #15 the exemption decision lives in this
      audit, not in data_objects.notes. Gates B1B-T7 shape for those four masters.

  - id: B2-T4
    summary: Cross-cutting capability promotion for TI-ENRICHMENT / TI-COLLABORATION-SHARING.
    question: Promote TI-ENRICHMENT and / or TI-COLLABORATION-SHARING to domain-neutral capabilities?
    options:
      - "(a) Author both as domain-prefixed (lowest authoring cost)"
      - "(b) Promote TI-ENRICHMENT to domain-neutral THREAT-ENRICHMENT linking THREAT-INTEL + SOAR + DLP + VULN-MGMT; keep TI-COLLABORATION-SHARING domain-prefixed"
      - "(c) Promote both"
    why: |
      Recorded Future, VirusTotal Premium, Anomali Lens, Mandiant Advantage all sell enrichment
      APIs hit from SOAR / DLP / VULN-MGMT contexts. ISAC sharing is a workflow surface, less
      clearly a vendor market. Decision shapes the Phase-A loader and how many capability_domains
      rows ship. Gates B1B-T2.

  - id: B2-T5
    summary: MITRE-ATTACK reference master architecture for attack_techniques.
    question: Where does the attack_techniques master live in the catalog?
    options:
      - "(a) THREAT-INTEL masters attack_techniques; cross-domain consumers via consumer + embedded_master"
      - "(b) Promote a SECURITY-FRAMEWORKS (or MITRE-FRAMEWORKS) master domain (queues a missing-domain candidate); THREAT-INTEL consumes"
      - "(c) attack_techniques becomes kind='platform_builtin' (heaviest precedent; extends seed-list semantics)"
    why: |
      Cross-domain master architecture with deploy-time effects on master demotion behavior,
      embedded_master shells, and the deployer contract. Gates B1B-T6 for attack_techniques
      specifically.

