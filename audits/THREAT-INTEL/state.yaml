    rationale: |
      PCI-DSS Req 11.4 (intrusion detection / IPS) and Req 12.10 (incident response) consume
      threat-intel feeds. PCI is not the primary buyer of TI but TI is the substrate satisfying
      these reqs. PCI-DSS row almost certainly already exists in regulations.
    vendor_evidence: [PCI-DSS Council]
    proposed_module: null

