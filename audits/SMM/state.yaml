# b2: user judgment required
b2:
  - id: B2-MODULE-SHAPE
    summary: M1 hard fail; author 4 or 5 domain_modules rows for SMM. Editorial decision on module count and EMPLOYEE-ADVOCACY placement.
    question: >-
      Zero domain_modules rows for SMM (id 106). Rule #14 mandates >=2 modules
      (7 capabilities). Proposed module shape from prior audit, SMM-PUBLISHING
      (masters social_posts, social_accounts; capabilities SOCIAL-PUB, CONTENT-CAL,
      SOCIAL-ANALYTICS), SMM-ENGAGEMENT (master social_messages; embedded_master
      social_accounts; capabilities SOCIAL-ENGAGE, SOCIAL-ANALYTICS), SMM-LISTENING
      (masters social_mentions, social_listening_topics; capabilities SOCIAL-LISTEN,
      SOCIAL-ANALYTICS), SMM-INFLUENCER (master influencers; capability INFLUENCER-MGMT).
      EMPLOYEE-ADVOCACY capability is orphan candidate; see B2-S4-EMP-ADVOCACY for the
      a/b/c choice. Once shape is set, all M-band + cascade items unblock.
    options:
      - (4-module-shape) Approve SMM-PUBLISHING + SMM-ENGAGEMENT + SMM-LISTENING + SMM-INFLUENCER; fold EMPLOYEE-ADVOCACY into SMM-PUBLISHING (B2-S4 path a).
      - (5-module-shape) Approve the 4 above + SMM-ADVOCACY (B2-S4 path b).
      - (split-domain) Approve the 4 above; split EMPLOYEE-ADVOCACY off as candidate domain EMP-ADVOCACY (B2-S4 path c, kicks Bucket 3 vetting on B3-S1).
    why: >-
      The point-solution-market test (Rule #2) returns YES for advocacy
      (GaggleAMP, Bambu, EveryoneSocial are independent flagship vendors), so
      path b or c is defensible; path a is the cheapest cure and keeps the
      capability in SMM. Editorial decision belongs to the user.
    extra_gating_for:
      - B1B-F1-LEGACY-SKILL
      - B1B-B12-LIFECYCLE-STATES
      - B1B-B10B-SOURCE-MODULE-BACKFILL
      - B1B-B9-ATTR-DEFECT
      - B1B-B8-CROSS-DOMAIN-RELS
    extra_origin_id: B1-S1 (re-classified)
    extra_first_seen: "2026-05-30"

  - id: B2-NOTES-DDO
    summary: Rule #15 notes-pollution on 8 domain_data_objects rows for SMM. User-approved at load time, or auto-populated?
    question: >-
      Eight domain_data_objects rows for SMM (5 cross-domain, audience_segments,
      crm_leads, customers, crm_contacts, marketing_campaigns; 3 SMM-mastered,
      social_messages, social_mentions, social_listening_topics... checked,
      actually social_messages + social_mentions only) carry populated notes
      describing the role / consumer semantics. Per Rule #15 these need to have
      been explicitly user-approved at load time or they get reverted.
    options:
      - (approved) Confirm user-approved at load time; leave in place.
      - (revert) Confirm auto-populated; PATCH all 8 rows to empty string and append a Rule-#15 incident to references/skill-changelog.md.
    why: >-
      Cannot tell from audit alone; the loader script for SMM
      ([scripts/loaders/load_smm_data_objects.ts]) would carry the original text.
    extra_origin_id: B2-S1
    extra_first_seen: "2026-05-30"

  - id: B2-NOTES-SKILLTOOLS
    summary: Rule #15 notes-pollution on 4 skill_tools rows on legacy skill 18. User-approved or auto-populated? Carry forward to new per-module skills?
    question: >-
      Four skill_tools rows on the legacy smm-system skill (id 18) carry populated
      notes, Posts published externally to social network destinations, Mention
      sentiment is core SMM analytics, AI-generated post imagery, AI-generated
      post copy. Per Rule #15 these need to have been explicitly user-approved
      at load time. Once B1B-F1-LEGACY-SKILL retires skill 18 and per-module
      system skills land, the question is whether the new rows ship with empty
      notes or carry the same prose.
    options:
      - (approved-keep) The prose was user-approved; carry forward verbatim to new per-module skill_tools rows.
      - (revert-and-strip) The prose was auto-written; do not carry forward. New rows ship with empty notes.
    why: >-
      Same as B2-NOTES-DDO; depends on load-time provenance.
    extra_origin_id: B2-S2
    extra_first_seen: "2026-05-30"

  - id: B2-PATTERN-FLAGS
    summary: B4 positive re-evaluation of pattern flags on all 5 workflow-bearing SMM masters per Rule #12.
    question: >-
      Per-flag yes/no for, social_posts.has_submit_lock (scheduled posts freeze
      once schedule fires?), social_posts.has_single_approver (regulated industries
      require single sign-off?), social_messages.has_personal_content (DMs carry
      PII?), social_mentions.has_personal_content (handles + profile info?),
      influencers.has_personal_content (W-9 / payment data?).
    options:
      - (per-flag-yes-no) Provide yes / no per candidate flag.
      - (skip-all-false) Confirm all-false is correct (the audit records the positive review even when no flag flips).
    why: >-
      Pattern flags are workflow-shape judgments the user owns; the default-false
      doesn't establish review per Rule #12. The audit records the decision,
      not a notes annotation per Rule #15.
    extra_origin_id: B2-S3
    extra_first_seen: "2026-05-30"

  - id: B2-S4-EMP-ADVOCACY
    summary: Module shape for EMPLOYEE-ADVOCACY capability (orphan under proposed 4-module set).
    question: >-
      The 4-module proposal in B2-MODULE-SHAPE covers 6 of 7 SMM capabilities;
      EMPLOYEE-ADVOCACY is the orphan. Three paths, (a) fold into SMM-PUBLISHING
      as a feature, (b) author SMM-ADVOCACY module with employee_share_records
      master, (c) split off as candidate domain EMP-ADVOCACY (queued in
      _missing-domains.md, mention_count 2 with vendor evidence Hootsuite Amplify,
      Sprinklr Advocacy, Smarp, Bambu, EveryoneSocial, GaggleAMP, Oktopost).
    options:
      - (a) fold EMPLOYEE-ADVOCACY into SMM-PUBLISHING (cheapest, minimizes load)
      - (b) author SMM-ADVOCACY module (5-module set, preserves capability in SMM, keeps EMP-ADVOCACY queue entry alive for later Phase 0)
      - (c) split as EMP-ADVOCACY candidate domain (kicks Bucket 3 B3-S1 vetting)
    why: >-
      Linked to B3-S1 (employee_share_records master + advocacy module shape).
