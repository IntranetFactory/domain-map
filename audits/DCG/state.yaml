b2:
  - id: B2-S1
    summary: Choose the DCG module split (6-module agent recommendation vs alternatives).
    question: How should DCG be split into deployable modules? Agent's recommendation is 6 modules (DCG-CATALOG, DCG-LINEAGE, DCG-GLOSSARY, DCG-STEWARDSHIP, DCG-ACCESS-GOV, DCG-DATA-PRODUCTS) anchored on Alation / Atlan / Collibra / Microsoft Purview product taxonomy. The choice drives Phase B / E / F / S work and gates B1B-S1, B1B-S4, B1B-S6, B1B-S9.
    options: [agent_6_module_recommendation, tight_3_module_split, four_module_split, seven_module_split_with_DCG-CLASSIFICATION, other_user_specified]
    why: Architectural decision depending on whether DCG ships as a unified governance stack alongside DSPM / DLP (favors fewer modules) or as a discrete catalog product (favors more).

  - id: B2-S2
    summary: Confirm DCG capability enumeration.
    question: Author all 10 candidate capabilities (technical-metadata-harvesting, business-glossary-management, data-lineage, automated-data-classification, data-stewardship-workflow, data-quality-scorecards, certification-workflow, data-product-publishing, access-request-and-policy-authoring, regulatory-mapping), or a tighter list?
    options: [all_10, tighter_6_or_7_list_user_specified, other_user_specified]
    why: Market-definition call; influences how DCG compares against neighbor domains in fact-sheet and blueprint surfaces.

  - id: B2-S3
    summary: Approve wording for Rule #18 cleanup on handoffs 158, 223, 265.
    question: What replacement text should the agent use for handoff descriptions 158 ("the platform's native RBAC layer"), 223 ("Data Catalog and Governance platforms maintain..."), 265 ("KGP (Knowledge Graph Platform)")? Agent cannot auto-rewrite per Rule #15 cousin.
    options: [approve_agent_drafts_per_row, supply_own_text, confirm_leave_as_is]
    why: Wording is load-bearing prose subject to per-row user approval.

  - id: B2-S4
    summary: Decide Rule #12 config-shape exemption per master.
    question: Per master, exempt from lifecycle-state authoring or require lifecycle states? Candidates for exemption are data_domains (304, reference data), glossary_terms (302, debatable), data_usage_metrics (308, signal-only).
    options: [per_master_exempt_or_author]
    why: Exemption is the user's call per Rule #12; agent must not auto-decide and must not populate data_objects.notes per Rule #15.

  - id: B2-S5
    summary: Re-evaluate pattern flags on 4 DCG masters.
    question: Flip has_personal_content / has_submit_lock / has_single_approver on data_access_policies (307), data_stewardship_assignments (305), data_certifications (306), data_classifications (303)? Audit re-evaluation suggests several flips that the current default-false state misses.
    options: [per_flag_yes_or_no]
    why: Workflow-shape judgments per Rule #12; Rule #15 forbids auto-populating notes that document the choice.

  - id: B2-S6
    summary: Decide which DCG regulations to author as domain_regulations rows.
    question: Author rows for which of 9 candidate regulations (GDPR Article 30, CCPA / CPRA, HIPAA, SOX ICFR, BCBS 239, GLBA, EU AI Act, SR 11-7, US state-level privacy laws)?
    options: [all_9, subset_user_specified, none_for_now, defer_to_phase_0]
    why: Market-scoping decision determining which sub-markets of DCG to formally model. Independent of all other items.

b3:
  - id: B3-ENTITIES
    candidate: 10 missing-entity candidates (data_contracts, data_quality_rules DCG-scoped, data_access_requests, data_marketplace_listings, lineage_pipelines, query_lineage_records (currently AUDIT-owned), data_impact_analyses, metadata_collection_jobs, data_sensitivity_labels, data_collaboration_threads).
    rationale: Each candidate surfaces in 2 or more flagship-vendor product surfaces but has no master row in the DCG footprint. Routing depends on whether the user accepts the 6-module split (B2-S1) and on whether DATA-CONTRACTS / DATA-MARKETPLACE are promoted as separate domains.
    vendor_evidence: [Alation, Atlan, Collibra, data.world, Informatica EDC + AXON, Microsoft Purview, Open Metadata, Acryl DataHub, Apache Atlas, Apache Polaris, Databricks Unity Catalog, Immuta]
    proposed_module: gated_on_B2-S1

  - id: B3-MODULARIZATION
    candidate: 2 modularization questions, DCG-LINEAGE possibly subsumed into DCG-CATALOG as a tab (Atlan / data.world / Castor pattern); DCG-DATA-PRODUCTS scope contested by an emerging DATA-CONTRACTS market candidate.
    rationale: Both inform B2-S1 module-split choice. Phase 0 verification should check whether flagship lineage / data-contract surfaces warrant standalone modules or fold into adjacent ones.
    vendor_evidence: [Atlan, data.world, Castor, Open Metadata, Collibra, Gable.ai, Datacontract.com, Confluent Schema Registry, PayPal Data Contract CLI, Buf Schema Registry]

  - id: B3-REGULATIONS
    candidate: 8 regulation rows missing (GDPR Article 30 records-of-processing, CCPA / CPRA consumer inventory + deletion, HIPAA PHI inventory, SOX ICFR financial-data lineage, BCBS 239 risk data aggregation, GLBA financial privacy, EU AI Act training-data provenance, SR 11-7 model risk management).
    rationale: Each is a statutory anchor visible on flagship DCG vendor compliance surfaces. Authoring populates `regulations` and `domain_regulations`; gated on B2-S6 scoping decision.
    vendor_evidence: [Collibra Compliance, Informatica AXON, Microsoft Purview Compliance Manager, OneTrust Data Discovery, BigID, Securiti]
    proposed_module: gated_on_B2-S1

  - id: B3-CANDIDATE-DOMAINS
    candidate: 2 new domain-tier candidates to queue in `_missing-domains.md`, DATA-OBSERVABILITY and DATA-CONTRACTS.
    rationale: "Each has a recognized point-solution vendor market (Monte Carlo / Acceldata / Bigeye / Anomalo / Soda / Sifflet / Metaplane / Datafold for observability; Gable.ai / Datacontract.com / PayPal Data Contract CLI / Confluent SR / Buf SR for contracts). Independent of DCG b1 audit but related, promotion changes B2-S1 module-split shape."
    vendor_evidence: [Monte Carlo, Acceldata, Bigeye, Anomalo, Soda, Sifflet, Metaplane, Datafold, Gable.ai, Datacontract.com, PayPal Data Contract CLI, Confluent Schema Registry, Buf Schema Registry]

  - id: B3-DISCOVER-PASS-3
    candidate: 4 cross-domain handoffs (683 ml_model.deployed, 685 feature_set.published, 698 / 699 kgp_knowledge_graph_entity.merged / .created) that lack a clean APQC cross-industry PCF match and are routed to Discover Pass 3 custom-process authoring (source_framework='custom').
    rationale: PCF cross-industry framework does not carry first-class activities for ML model registration or knowledge-graph operations. Each handoff stays untagged (or discovery_substring) until Discover Pass 3 publishes custom processes.
    vendor_evidence: [absent]
