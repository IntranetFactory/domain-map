b2:
  - id: B2-MODSPLIT
    summary: "Module split shape: 2-module vs 3-module. LOAD-BEARING for the entire b1b band and B1A-BUILD."
    question: "Should EAM ship as 2 full modules (EAM-ASSETS + EAM-MAINTENANCE-OPS) or 3 full modules (add EAM-PM-PLANNING as a separate planning surface)?"
    options: ["2-module split", "3-module split", "other (user proposes shape)"]
    why: "Decision gates the Rule 14 floor (>=2 for 6 capabilities), the DMDO layout for masters, the domain-grain system skill toolset, and the source_domain_module_id / target_domain_module_id PATCHes on every EAM handoff (B1B-B1 / B1B-B2)."

  - id: B2-M7-ESCALATES
    summary: "eam_work_orders escalates_to service_incidents (relationship id 636): keep or downgrade?"
    question: "Is the rel 636 edge to ITSM service_incidents (id 47) intended as a first-class escalation path in plant-OT, or a soft pointer that should not survive M7 audit?"
    options: ["keep as-is (escalation is real)", "downgrade to consumer DMDO", "delete (drift from earlier modeling)"]
    why: "M7 catches catalog-wide single-master inconsistencies. Handoff 866 currently has data_object_id=47 (service_incidents), and rel 636 mirrors that edge. The architectural intent vs drift question is user-decision. DESTRUCTIVE (downgrade/delete) options need sign-off; do not apply unprompted."

  - id: B2-WORK-ORDERS-BARE
    summary: "Bare-word claim on work_orders."
    question: "Does EAM, FLEET-MAINT, REAL-EST, or FSM own the unprefixed work_orders name catalog-wide per Rule #9, or do all stay prefixed?"
    options: ["EAM owns", "FLEET-MAINT owns", "REAL-EST owns", "FSM owns", "all stay prefixed forever"]
    why: "Rule 9 naming arbitration. Affects future loads (a generic work_orders for HRSD ticketing could collide). Catalog-wide; safe to defer."

  - id: B2-FIXED-ASSETS
    summary: "fixed_assets embedding direction."
    question: "Should EAM-ASSETS embedded_master fixed_assets (so a smaller deployment can capitalize without ERP-FIN), or stay decoupled (ERP-FIN hard dependency)?"
    options: ["embedded_master in EAM-ASSETS", "consumer of ERP-FIN fixed_assets", "two separate entities with relationship"]
    why: "The same physical asset has an operational view (EAM) and a financial view (ERP-FIN). Modeling decision is one entity with two roles vs two entities with a relationship. Catalog-wide; safe to defer."

  - id: B2-DOMAIN-CANDIDATES
    summary: "Three queued candidate domains: promote vs fold."
    question: "Promote APM-RELIABILITY / IIOT-PLATFORM / PTW-LOTO to sibling domains, or fold into EAM as capabilities?"
    options: ["APM-RELIABILITY promote", "APM-RELIABILITY fold", "IIOT-PLATFORM promote", "IIOT-PLATFORM fold", "PTW-LOTO promote", "PTW-LOTO fold"]
    why: "Each meets the Rule 2 point-solution test independently (>=3 flagship vendors). Promotion changes safety_permits_to_work ownership and the meter-readings substrate location. Non-blocking idea, never gates 'finished'."

  - id: B2-REG-SCOPE
    summary: "Industry scope for EAM regulations."
    question: "Is EAM authored against pharma/biotech (FDA Part 11), chemical-plant (OSHA PSM), and/or general manufacturing (ISO 55000 + OSHA LOTO)?"
    options: ["pharma/biotech in scope", "chemical-plant in scope", "general manufacturing only", "all of the above"]
    why: "B1B-S4 needs the scope to decide which regulations land."

  - id: B2-USERS-EDGES
    summary: "Confirm actor verbs for users edges on EAM masters (Rule #10)."
    question: "Which actor verbs to author from users to each EAM master (industrial_assets owner / commissioner / decommissioner; eam_work_orders assignee / created_by / completed_by; equipment_pm_schedules maintainer)?"
    options: ["use proposed verb set", "user specifies verbs"]
    why: "B7 fail. Rule 10 requires explicit user edges; verb naming is non-mechanical."

