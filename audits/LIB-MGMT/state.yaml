b2:
  - id: B2-S1
    summary: A4 / M8 catalog_tagline + catalog_description wording for domain 168 and modules 155-160
    question: |
      Per Rule #20 user reviews wording BEFORE PATCH. Domain (A4) and 6 modules (M8) each
      need their own buyer-voice tagline + 1-3 paragraph description. Generate drafts and
      surface per row, or defer to a marketing pass?
    options:
      - generate_drafts_and_surface_per_row
      - defer_to_marketing_pass
      - user_supplies_wording_directly
    why: |
      Rule #20 forbids auto-overwrite of these four columns; even on backfill the wording
      requires explicit per-row approval. The agent can draft but never load without sign-off.
  - id: B2-S2
    summary: B12 lifecycle decision for 6 zero-state masters
    question: |
      Per master: config-shape exemption (no lifecycle states), or author lifecycle states?
      Exemption decision is recorded here in the audit per Rule #15, NOT in data_objects.notes.
      Masters: library_holdings (826), library_circulation_policies (830),
      library_patron_categories (832), library_vendor_accounts (834),
      library_saved_searches (837), library_sharing_partners (839).
      For 826 specifically B1B-S6 proposes a 3-state lifecycle; richer Alma-shaped 5-state
      is an option for Alma-style deployments.
    options:
      - exempt_all_six_as_config_shape
      - exempt_5_and_author_826_3_state
      - exempt_5_and_author_826_5_state
      - per_master_decision
    why: |
      library_circulation_policies / library_patron_categories / library_vendor_accounts /
      library_saved_searches / library_sharing_partners are plausibly config-shape (author once,
      edit occasionally). library_holdings is the ambiguous one: Alma treats it as workflow,
      Koha treats it as config. User owns the per-deployment-shape decision.
  - id: B2-S3
    summary: C1 functional ownership shape for LIB-MGMT
    question: |
      Should LIB-MGMT keep "Research and Development" as sole owner with "Learning and
      Development" as contributor, or elevate Operations (technical services) or
      Customer Service (public services)?
    options:
      - keep_rd_owner_add_ops_and_cs_contributors
      - flip_to_operations_owner_demote_rd
      - split_into_dedicated_library_services_function
    why: |
      Public-library deployments map cleanly to Operations + Customer Service. Academic
      deployments map to R&D. Today only R&D + L&D are loaded; the current C1 row biases
      toward an academic-first view.
  - id: B2-S4
    summary: E1 / E2 role-naming convention for 5 LIB-MGMT roles
    question: |
      All 5 roles prefixed RESEARCH-DEV- (because business_function_id=35). If B2-S3
      changes the function, role codes should rename. Choose strategy.
    options:
      - leave_as_research_dev_prefix
      - rename_consistent_with_b2_s3_outcome
      - drop_function_prefix
    why: |
      Function-scoped naming under § "Role layer" hard invariants makes the prefix
      mechanically follow business_function_id. B2-S3 outcome drives B2-S4.
  - id: B2-S5
    summary: Discovery scope, OPAC-only vs full discovery layer
    question: |
      Keep LIB-DISCOVERY as a thin OPAC module (local catalog search only), or split into
      LIB-OPAC + LIB-DISCOVERY (the latter covering EBSCO Discovery Service, Primo VE,
      Summon-shaped federated indexes, link resolver, relevance)?
    options:
      - keep_one_module_document_scope_tightly
      - split_into_lib_opac_plus_lib_discovery
      - defer_pending_bucket_3_entity_work
    why: |
      Buyer-segment call: academic libraries usually need both; small public libraries
      only need OPAC. Bucket 3 candidates around digital lending could clarify.
  - id: B2-S6
    summary: domain_regulations for LIB-MGMT
    question: |
      Should LIB-MGMT carry any domain_regulations rows? Zero today. Candidates: FERPA
      (academic-library patron records tied to enrolled-student status), state-level
      patron-privacy statutes (NY CPLR 4509 and similar), GDPR / UK DPA (EU deployments).
    options:
      - add_ferpa_state_statutes_gdpr
      - leave_empty_attach_via_consuming_function
      - add_universally_applicable_subset_only
    why: |
      Some regulations attach via the consuming function (FERPA via HE-SIS) rather than
      domain-direct. Coverage decision.

b3:
  - id: B3-S1
    candidate: library_branches
    rationale: |
      Multi-branch / multi-location library systems. Every public library system above
      ~3 branches, every academic library with subject libraries, and every consortial
      deployment masters a branches / locations object (Alma "library", Sierra "branch",
      FOLIO "library" within institution). The current footprint scopes holdings, items,
      circulation rules, and staff users to a single implicit location, which collapses
      on any real-world multi-branch deployment.
    vendor_evidence:
      - {vendor: "Ex Libris Alma", evidence: 1st_class}
      - {vendor: "FOLIO (EBSCO)", evidence: 1st_class}
      - {vendor: "OCLC WorldShare Management Services", evidence: 1st_class}
      - {vendor: "SirsiDynix BLUEcloud LSP", evidence: 1st_class}
    proposed_module: LIB-CATALOG
  - id: B3-S2
    candidate: library_digital_loans
    rationale: |
      DRM-limited concurrent-use e-book + audiobook lending. Structurally distinct from
      physical loans (no physical item, DRM-enforced expiry, simultaneous-use license caps,
      no fines). Alma Digital and FOLIO ERM model this as a separate flow. May belong as
      a sibling master to library_loans in LIB-MGMT OR may belong in a new DIGITAL-LENDING
      domain (queued as candidate domain).
    vendor_evidence:
      - {vendor: "OverDrive Libby", evidence: 1st_class}
      - {vendor: "Hoopla", evidence: 1st_class}
      - {vendor: "Axis 360", evidence: 1st_class}
      - {vendor: "cloudLibrary", evidence: 1st_class}
    proposed_module: LIB-CIRCULATION
  - id: B3-S3
    candidate: library_program_events
    rationale: |
      Library programming (story time, author talks, ESL classes, workshops, summer reading).
      Distinct lifecycle (scheduled -> registration_open -> registration_full -> held ->
      attended) and ties to patron registration. May fit in a new LIB-PROGRAMS module of
      LIB-MGMT OR be consolidated under a candidate SPACE-BOOKING domain.
    vendor_evidence:
      - {vendor: "Springshare LibCal", evidence: 1st_class}
      - {vendor: "Communico Events", evidence: 1st_class}
      - {vendor: "Demco Niche Academy", evidence: secondary}
    proposed_module: null
  - id: B3-S4
    candidate: library_course_reserves
    rationale: |
      Academic course reading lists. Two distinct objects: the reading list (per course per
      term, instructor-authored) and reserve items (physical short-loans plus licensed-reading
      links). Distinct vendor market with leader-tier specialists. May belong in a new
      LIB-COURSE-RESERVES module of LIB-MGMT OR a new ACADEMIC-COURSE-RESERVES domain.
    vendor_evidence:
      - {vendor: "Ex Libris Leganto", evidence: 1st_class}
      - {vendor: "Atlas Systems Ares", evidence: 1st_class}
      - {vendor: "Talis Aspire", evidence: 1st_class}
      - {vendor: "Rialto", evidence: 1st_class}
    proposed_module: null
  - id: B3-S5
    candidate: library_patron_identities
    rationale: |
      Patron-SSO master surface (SAML/CAS/OAuth integration with campus IDP or municipal
      SSO). Every academic-library deployment integrates with the campus IDP via Shibboleth /
      SAML / CAS; many public libraries integrate with municipal SSO. The current
      library_patrons.linked_to_user single edge does not carry IDP profile, attribute-release
      contract, or identity-binding lifecycle. Likely consumer/embedded_master in LIB-PATRON,
      canonical master in IGA (which currently lacks the patron-IDP shape).
    vendor_evidence:
      - {vendor: "OCLC EZproxy", evidence: 1st_class}
      - {vendor: "Shibboleth IDP", evidence: 1st_class}
      - {vendor: "OpenAthens", evidence: 1st_class}
    proposed_module: LIB-PATRON
