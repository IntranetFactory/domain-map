b2:
  - id: B2-S2
    summary: B12 lifecycle + entity_type decision for library_holdings (826) and exemption confirmation for the config-shape masters
    question: |
      For library_holdings (826): config-shape (entity_type=catalog, no lifecycle) or workflow
      (entity_type=operational_workflow + author lifecycle per B1B-S6, 3-state or richer Alma 5-state)?
      The agent classified the other config masters on 2026-06-07 (library_circulation_policies 830,
      library_patron_categories 832, library_vendor_accounts 834, library_sharing_partners 839 =
      catalog; library_saved_searches 837 = operational_record), which structurally records the
      exemption per Rule #12 (no notes write). Confirm those are right and decide 826.
    options:
      - holdings_is_catalog_no_lifecycle
      - holdings_is_workflow_author_826_3_state
      - holdings_is_workflow_author_826_5_state
    why: |
      library_holdings is the ambiguous one: Alma treats it as workflow, Koha treats it as config.
      Its entity_type was deliberately left unclassified pending this call (B1A-ENTITY-TYPE-826).
  - id: B2-S3
    summary: C1 functional ownership shape for LIB-MGMT
    question: |
      The agent added Business Operations (technical services) and Customer Service (public
      services) as CONTRIBUTORS on 2026-06-07 (clearly-correct, additive). The OWNER is still
      Research and Development (academic-first bias). Keep R&D as owner, or flip ownership to
      Business Operations / Customer Service (public-library-first), or split into a dedicated
      library-services function? Flipping the owner is a destructive overwrite of the existing
      owner row, so it is surfaced not executed.
    options:
      - keep_rd_owner_with_ops_and_cs_contributors
      - flip_owner_to_business_operations_demote_rd
      - flip_owner_to_customer_service_demote_rd
      - split_into_dedicated_library_services_function
    why: |
      Public-library deployments map cleanly to Business Operations + Customer Service.
      Academic deployments map to R&D. Current owner biases toward an academic-first view.
  - id: B2-S4
    summary: E1 / E2 role-naming convention for LIB-MGMT roles (depends on B2-S3 + B1A-PHASE-P)
    question: |
      Roles are prefixed RESEARCH-DEV- (because business_function_id=35). If B2-S3 changes the
      owning function, role codes should rename. (Note: post-Plan-3 the persona layer is currently
      empty per B1A-PHASE-P; this convention applies when personas are authored.)
    options:
      - leave_as_research_dev_prefix
      - rename_consistent_with_b2_s3_outcome
      - drop_function_prefix
    why: |
      Function-scoped naming makes the prefix mechanically follow business_function_id.
      B2-S3 outcome drives B2-S4.
  - id: B2-S5
    summary: Discovery scope, OPAC-only vs full discovery layer
    question: |
      Keep LIB-DISCOVERY as a thin OPAC module (local catalog search only), or split into
      LIB-OPAC + LIB-DISCOVERY (the latter covering EBSCO Discovery Service, Primo VE,
      Summon-shaped federated indexes, link resolver, relevance)?
    options:
      - keep_one_module_document_scope_tightly
      - split_into_lib_opac_plus_lib_discovery
      - defer_pending_bucket_3_entity_work
    why: |
      Buyer-segment call: academic libraries usually need both; small public libraries
      only need OPAC. Bucket 3 candidates around digital lending could clarify.
  - id: B2-S6
    summary: domain_regulations for LIB-MGMT
    question: |
      Should LIB-MGMT carry any domain_regulations rows? Zero today. Candidates: FERPA
      (academic-library patron records tied to enrolled-student status), state-level
      patron-privacy statutes (NY CPLR 4509 and similar), GDPR / UK DPA (EU deployments).
    options:
      - add_ferpa_state_statutes_gdpr
      - leave_empty_attach_via_consuming_function
      - add_universally_applicable_subset_only
    why: |
      Some regulations attach via the consuming function (FERPA via HE-SIS) rather than
      domain-direct. Coverage decision.

b3:
  - id: B3-S1
    candidate: library_branches
    rationale: |
      Multi-branch / multi-location library systems. Every public library system above
      ~3 branches, every academic library with subject libraries, and every consortial
      deployment masters a branches / locations object. The current footprint scopes holdings,
      items, circulation rules, and staff users to a single implicit location.
    proposed_module: LIB-CATALOG
  - id: B3-S2
    candidate: library_digital_loans
    rationale: |
      DRM-limited concurrent-use e-book + audiobook lending. Structurally distinct from
      physical loans. May belong as a sibling master to library_loans in LIB-MGMT OR may belong
      in a new DIGITAL-LENDING domain (queued as candidate domain).
    proposed_module: LIB-CIRCULATION
  - id: B3-S3
    candidate: library_program_events
    rationale: |
      Library programming (story time, author talks, ESL classes, workshops, summer reading).
      May fit a new LIB-PROGRAMS module of LIB-MGMT OR be consolidated under a candidate
      SPACE-BOOKING domain.
    proposed_module: null
  - id: B3-S4
    candidate: library_course_reserves
    rationale: |
      Academic course reading lists. May belong in a new LIB-COURSE-RESERVES module of LIB-MGMT
      OR a new ACADEMIC-COURSE-RESERVES domain.
    proposed_module: null
  - id: B3-S5
    candidate: library_patron_identities
    rationale: |
      Patron-SSO master surface (SAML/CAS/OAuth integration with campus IDP or municipal SSO).
      Likely consumer/embedded_master in LIB-PATRON, canonical master in IGA (which currently
      lacks the patron-IDP shape).
    proposed_module: LIB-PATRON
