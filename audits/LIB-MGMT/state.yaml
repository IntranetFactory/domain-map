b1b:
  - id: B1B-S1
    summary: A4 catalog_tagline / catalog_description backfill on domain 168 (LIB-MGMT)
    finding: |
      domains.id=168 carries empty catalog_tagline and catalog_description. Rule #20 surface,
      backfill is permitted but never auto-written; user owns wording per row.
    blocked_by:
      - {type: user_decision, ref: B2-S1}
    affected_modules: []
    affected_entities: [domains]
  - id: B1B-S2
    summary: M8 catalog_tagline / catalog_description backfill on all 6 LIB-MGMT domain_modules
    finding: |
      All 6 domain_modules rows (LIB-CATALOG 155, LIB-CIRCULATION 156, LIB-PATRON 157,
      LIB-ACQUISITIONS 158, LIB-DISCOVERY 159, LIB-ILL 160) carry empty catalog_tagline
      and catalog_description. Rule #20 surface, per-module per-row approval required.
    blocked_by:
      - {type: user_decision, ref: B2-S1}
    affected_modules: [155, 156, 157, 158, 159, 160]
    affected_entities: [domain_modules]
  - id: B1B-S4
    summary: Author 6 outbound cross-domain data_object_relationships from LIB-MGMT masters
    finding: |
      B8 fail. Catalog records 22 intra-domain master-to-master relationships + 8 users
      user-edges per Rule #10 + 1 reverse library_patrons linked_to_user users, total 31.
      Zero outbound cross-domain. Missing edges to existing counterparty masters:
      (1) library_acquisition_orders (833) -> ap_invoices (AP-AUTO) on invoiced;
      (2) library_acquisition_orders (833) -> ERP-FIN encumbrance object on ordered/received;
      (3) library_serial_subscriptions (835) -> AP-AUTO recurring invoice on renewal;
      (4) library_eresource_licenses (836) -> CLM contracts master on activation/renewal/termination;
      (5) library_patrons (831) -> IGA iam_users for SSO-backed registration;
      (6) library_patrons (831) -> HCM hcm_employees (54) when staff are also patrons.
      Each row needs relationship_verb, inverse_verb, relationship_type, relationship_kind,
      is_required, owner_side. Edges 2 and 5 require lookup of the counterparty
      canonical master id; edge 6 lookup confirms HCM employees id=54.
    blocked_by:
      - {type: depends_on, ref: B1A-S3, reason: trigger_events for .invoiced .submitted .activated .renewed .terminated .activated_patron are prerequisites for the corresponding handoff loads after relationships land}
      - {type: catalog_addition, scope: domains, trigger: confirm AP-AUTO ap_invoices id, ERP-FIN encumbrance master id, CLM contracts master id, IGA iam_users id}
    affected_masters:
      - {data_object_id: 833, name: library_acquisition_orders, target_module_id: 158, workflow: AP-AUTO invoiced}
      - {data_object_id: 833, name: library_acquisition_orders, target_module_id: 158, workflow: ERP-FIN encumbrance}
      - {data_object_id: 835, name: library_serial_subscriptions, target_module_id: 158, workflow: AP-AUTO recurring}
      - {data_object_id: 836, name: library_eresource_licenses, target_module_id: 158, workflow: CLM contracts}
      - {data_object_id: 831, name: library_patrons, target_module_id: 157, workflow: IGA identity}
      - {data_object_id: 831, name: library_patrons, target_module_id: 157, workflow: HCM staff-as-patron}
    affected_entities: [data_object_relationships]
  - id: B1B-S5
    summary: Author ~6 outbound cross-domain handoffs from LIB-MGMT
    finding: |
      B9 fail. Zero outbound cross-domain handoffs today (all 9 handoffs are intra-domain on
      source_domain_id = target_domain_id = 168). Each row needs trigger_event_id (from B1A-S3),
      source_domain_id=168, target_domain_id=<neighbor>, source_domain_module_id, target_domain_module_id,
      data_object_id (payload), integration_pattern, friction_level. Pairs:
      (a) library_acquisition_order.invoiced LIB-ACQUISITIONS -> AP-AUTO;
      (b) library_acquisition_order.submitted LIB-ACQUISITIONS -> ERP-FIN encumbrance;
      (c) library_serial_subscription.renewed LIB-ACQUISITIONS -> AP-AUTO;
      (d) library_eresource_license.activated / .renewed / .terminated LIB-ACQUISITIONS -> CLM (3 handoffs);
      (e) library_patron.activated LIB-PATRON -> IGA.
      The HCM staff-as-patron edge is REPORT-ONLY (HCM owes hcm_employee.hired outbound).
    blocked_by:
      - {type: depends_on, ref: B1A-S3, reason: trigger_events for the source events must exist first}
      - {type: depends_on, ref: B1B-S4, reason: corresponding cross-domain data_object_relationships should land in the same Phase-B extension before handoffs}
    affected_handoffs:
      - {handoff_id: null, direction: outbound, source_domain: LIB-MGMT, target_domain: AP-AUTO, trigger_event: library_acquisition_order.invoiced, payload: library_acquisition_orders, null_field: null}
      - {handoff_id: null, direction: outbound, source_domain: LIB-MGMT, target_domain: ERP-FIN, trigger_event: library_acquisition_order.submitted, payload: library_acquisition_orders, null_field: null}
      - {handoff_id: null, direction: outbound, source_domain: LIB-MGMT, target_domain: AP-AUTO, trigger_event: library_serial_subscription.renewed, payload: library_serial_subscriptions, null_field: null}
      - {handoff_id: null, direction: outbound, source_domain: LIB-MGMT, target_domain: CLM, trigger_event: library_eresource_license.activated, payload: library_eresource_licenses, null_field: null}
      - {handoff_id: null, direction: outbound, source_domain: LIB-MGMT, target_domain: CLM, trigger_event: library_eresource_license.renewed, payload: library_eresource_licenses, null_field: null}
      - {handoff_id: null, direction: outbound, source_domain: LIB-MGMT, target_domain: CLM, trigger_event: library_eresource_license.terminated, payload: library_eresource_licenses, null_field: null}
      - {handoff_id: null, direction: outbound, source_domain: LIB-MGMT, target_domain: IGA, trigger_event: library_patron.activated, payload: library_patrons, null_field: null}
