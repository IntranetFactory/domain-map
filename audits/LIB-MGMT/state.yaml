    summary: "Multi-module (6 modules) with 0 personas post-Plan-3 (E1 fail): author the persona / RACI layer."
    finding: "Live triage 2026-06-02: 6 domain_modules and 0 domain_roles reaching this domain via role_modules. Plan 3 deleted the old _core personas, so E1 fires on this multi-module domain. DEFERRED per audit policy: personas/RACI are not authored unattended (B1A-PHASE-P)."
    action: "Author domain_roles (operational personas) function-anchored per references/roles.md section 7, wire role_modules reach across the 6 modules, add process_raci responsibility rows, and wire data_object_lifecycle_states.process_id. ATS is the worked reference (scripts/loaders/load_ats_personas_pilot.ts)."
    deferred: persona_layer
    candidate_personas: [cataloger, circulation_clerk, acquisitions_librarian, reference_librarian, library_director]
    extra_phase_p_triage: "2026-06-02"
  - id: B1A-ENTITY-TYPE-826
    summary: "1 master (library_holdings 826) remains entity_type=unclassified, coupled to B2-S2."
    finding: |
      2026-06-07: 16 of 17 LIB-MGMT masters classified (823/824/825/827/828/829/831/833/835/836/838
      = operational_workflow; 830/832/834/839 = catalog; 837 = operational_record). Only
