b1b:
  - id: B1B-S4
    summary: Author 6 outbound cross-domain data_object_relationships from LIB-MGMT masters
    finding: |
      B8 fail. Catalog records 22 intra-domain master-to-master relationships + 8 users
      user-edges per Rule #10 + 1 reverse library_patrons linked_to_user users, total 31.
      Zero outbound cross-domain. 2026-06-07 counterparty re-check: the canonical counterparty
      ids assumed by the prior snapshot are STALE / wrong. There is no single ap_invoices,
      no iam_users, no bare contracts, and HCM employees is id 31 (NOT 54; id 54 is
      asset_contracts). The CLM contract surface is split (legal_contracts 66, asset_contracts 54,
      service_contracts 741, msp_contracts 234, employment_contracts 35). AP invoice surface is
      split (supplier_invoices 75, customer_invoices 107, msp_invoices 236, client_invoices 739).
      Identity surface is identity_graphs 112 / employee_golden_records 317, not iam_users.
      Selecting the right canonical counterparty per edge is cross-domain judgment, not a
      deterministic THIS-domain backfill, so this stays user/neighbor-gated.
      Edges still wanted (verb/inverse/type/kind/is_required/owner_side each):
      (1) library_acquisition_orders (833) -> AP invoice master on invoiced;
      (2) library_acquisition_orders (833) -> ERP-FIN encumbrance master on ordered/received (no encumbrance master exists in catalog today);
      (3) library_serial_subscriptions (835) -> AP invoice master on renewal;
      (4) library_eresource_licenses (836) -> CLM contract master on activation/renewal/termination;
      (5) library_patrons (831) -> IGA identity master for SSO-backed registration;
      (6) library_patrons (831) -> HCM employees (31) when staff are also patrons.
    blocked_by:
      - {type: user_decision, reason: "select the canonical AP-invoice / ERP-encumbrance / CLM-contract / IGA-identity counterparty master per edge; prior snapshot ids were wrong"}
      - {type: depends_on, ref: B1A-S3, reason: "RESOLVED 2026-06-07 - the source trigger_events (.submitted .invoiced .activated .renewed .terminated etc.) now exist"}
    affected_entities: [data_object_relationships]
  - id: B1B-S5
    summary: Author ~6 outbound cross-domain handoffs from LIB-MGMT
    finding: |
      B9 fail. Zero outbound cross-domain handoffs today (all 9 handoffs are intra-domain on
      source_domain_id = target_domain_id = 168). Source trigger_events now exist (B1A-S3 landed
      2026-06-07). Each row needs trigger_event_id, source_domain_id=168, target_domain_id=<neighbor>,
      source_domain_module_id, target_domain_module_id, data_object_id (payload), integration_pattern,
      friction_level. Pairs:
      (a) library_acquisition_order.invoiced LIB-ACQUISITIONS -> AP-AUTO;
      (b) library_acquisition_order.submitted LIB-ACQUISITIONS -> ERP-FIN encumbrance;
      (c) library_serial_subscription.renewed LIB-ACQUISITIONS -> AP-AUTO;
      (d) library_eresource_license.activated / .renewed / .terminated LIB-ACQUISITIONS -> CLM (3 handoffs);
      (e) library_patron.activated LIB-PATRON -> IGA.
      The HCM staff-as-patron edge is REPORT-ONLY (HCM owes hcm employee.hired outbound).
    blocked_by:
      - {type: depends_on, ref: B1B-S4, reason: "corresponding cross-domain data_object_relationships should land first, and the counterparty target_domain selection is the same gated decision"}
    affected_modules: [157, 158]
  - id: B1B-S6
    summary: Author library_holdings 3-state lifecycle on data_object 826
    finding: |
      B12 partial-fail. data_object 826 (library_holdings) carries zero data_object_lifecycle_states.
      Audit proposes: new (state_order 10, is_initial=true) -> linked (state_order 20,
      requires_permission=true, permission_verb_override='link_library_holdings',
      domain_module_id=155) -> withdrawn (state_order 30, is_terminal=true,
      requires_permission=true, permission_verb_override='withdraw_library_holdings',
      domain_module_id=155). Alma-shaped richer 5-state machine is a B2-S2 option. Loading any
      lifecycle requires entity_type=operational_workflow on 826 (B1A-ENTITY-TYPE-826), so the
      two are decided together.
    blocked_by:
      - {type: user_decision, ref: B2-S2}
    affected_masters:
      - {data_object_id: 826, name: library_holdings, target_module_id: 155, workflow: cataloging_holdings}
  - id: B1B-S7
    summary: Author ~6 handoff_processes APQC tags for new cross-domain handoffs
    finding: |
      H1 vacuous today (zero cross-domain handoffs). Once B1B-S5 lands the 6-7 outbound
      cross-domain handoffs, each needs a handoff_processes row with proposal_source='agent_curated',
      record_status omitted (defaults new). Provisional PCF candidates (confirm process_id at load
      time via /processes?process_name=ilike.*<term>*&source_framework=eq.apqc_pcf_cross_industry):
      (i) library_acquisition_order.invoiced -> AP-AUTO ~ "Process accounts payable (AP)" (10750);
      (ii) library_acquisition_order.submitted -> ERP-FIN ~ "Manage and process budget" (10737);
      (iii) library_serial_subscription.renewed -> AP-AUTO ~ same as (i);
      (iv) library_eresource_license.activated/.renewed/.terminated -> CLM ~ "Manage contracts" (10421);
      (v) library_patron.activated -> IGA ~ "Manage IT user identity and authorization" (20756).
    blocked_by:
