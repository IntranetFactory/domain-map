  - id: B1A-F1-LEGACY-SKILL
    summary: DELETE legacy skill id 66 (`hc-patient-system`) after module-level system skills land per Rule #17 + F1.
    finding: F1 fails. Skill 66 carries `domain_id=45`, `domain_module_id=null`. Once any module-level system skill exists for HC-PATIENT, F1 requires the legacy row to retire. The 8 existing skill_tools rows (500-505 query primitives, 37 send_email, 38 send_sms) re-link to the new module-level skills rather than duplicating.
    action: Part of the same load as B1A-S1-MODULES. Re-link skill_tools rows to the new module-level system skills BEFORE deleting skill 66.
    blocked_by:
