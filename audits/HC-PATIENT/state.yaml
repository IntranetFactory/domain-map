b1a:
  - id: B1A-A4-CATALOG-UX
    summary: Draft buyer-voice catalog_tagline + catalog_description for HC-PATIENT domain row, surface to user for approval before write.
    finding: A4 fails. `domains.catalog_tagline` and `domains.catalog_description` are both empty on the HC-PATIENT row (id 45). Per Rule #20 these are buyer-facing fields, drafting is allowed but writing requires explicit user-approved wording.
    action: Draft both fields per Rule #20 voice rule (workflow + value, NOT analyst voice). Surface in chat for user approval BEFORE PATCH. Do not auto-write.
    extra_rule_reference: Rule #20

  - id: B1A-B4-PATTERN-FLAGS
    summary: PATCH `has_personal_content=true` on all 6 masters; `has_submit_lock=true` on clinical_notes + clinical_orders; `has_single_approver=true` on clinical_notes.
    finding: B4 fails. All 6 masters (617 patient_appointments, 618 clinical_encounters, 619 care_plans, 620 patient_referrals, 621 clinical_orders, 622 clinical_notes) carry `has_personal_content=false` / `has_submit_lock=false` / `has_single_approver=false`. Every master holds PHI (HIPAA domain). Signed clinical notes are immutable; placed clinical orders cannot be retroactively edited (submit-lock). Clinical notes have a single signing provider.
    action: PATCH 6 rows with `has_personal_content=true`. PATCH `has_submit_lock=true` on 621 (clinical_orders) and 622 (clinical_notes). PATCH `has_single_approver=true` on 622 (clinical_notes). No notes annotation per Rule #15; record the audit in the gap report.
    affected_masters:
      - {data_object_id: 617, name: patient_appointments, target_module_id: null, workflow: has_personal_content}
      - {data_object_id: 618, name: clinical_encounters, target_module_id: null, workflow: has_personal_content}
      - {data_object_id: 619, name: care_plans, target_module_id: null, workflow: has_personal_content}
      - {data_object_id: 620, name: patient_referrals, target_module_id: null, workflow: has_personal_content}
      - {data_object_id: 621, name: clinical_orders, target_module_id: null, workflow: has_personal_content+has_submit_lock}
      - {data_object_id: 622, name: clinical_notes, target_module_id: null, workflow: has_personal_content+has_submit_lock+has_single_approver}

  - id: B1A-B7-USER-EDGES
    summary: Author 6 `data_object_relationships` rows from each master to `users` (id 748) per Rule #10. Surface verb / inverse_verb tuples to user before insert.
    finding: B7 fails. Zero edges between any HC-PATIENT master and the platform built-in `users` (id 748). Each master has a user-typed actor (scheduler, encountering provider, ordering clinician, signing provider, care coordinator, referring provider).
    action: Draft 6 edges with concrete verb + inverse_verb + cardinality + owner_side per master. Surface for user review BEFORE insert (the audit lists actor roles but not concrete verb tuples). Load via `data_object_relationships` insert.
    affected_masters:
      - {data_object_id: 617, name: patient_appointments, target_module_id: null, workflow: scheduler_or_scheduling_user}
      - {data_object_id: 618, name: clinical_encounters, target_module_id: null, workflow: encountering_provider}
      - {data_object_id: 619, name: care_plans, target_module_id: null, workflow: care_coordinator}
      - {data_object_id: 620, name: patient_referrals, target_module_id: null, workflow: referring_provider}
      - {data_object_id: 621, name: clinical_orders, target_module_id: null, workflow: ordering_clinician}
      - {data_object_id: 622, name: clinical_notes, target_module_id: null, workflow: signing_provider}
    extra_rule_reference: Rule #10

  - id: B1A-B8-CROSS-DOMAIN-RELS
    summary: Author 3 outbound cross-domain payload-target `data_object_relationships` rows for handoffs 900, 903 (and 901 if B2-3 keeps it). Handoffs 899 / 902 already covered by rows 466, 467.
    finding: B8 partial fail. Outbound handoffs to ERP-FIN (900 clinical_encounter.completed -> encounters as payload; 903 clinical_note.signed -> clinical_notes as payload) have no corresponding payload-target relationship row, and ERP-FIN does not master `invoices` per the prior audit. Handoff 901 (clinical_order.placed -> ITSM service_incidents) is semantically suspect (see B2-3); routed to Bucket 2.
    action: Draft rows for handoffs 900, 903 once the ERP-FIN target master is named (see Bucket 3 vetting on HC-RCM). Defer 901 until B2-3 resolves. Existing rows 466 (`patient_appointments opens customer_cases`) and 467 (`patient_referrals opens customer_cases`) cover 899 and 902.
    affected_handoffs:
      - {handoff_id: 900, direction: outbound, source_domain: HC-PATIENT, target_domain: ERP-FIN, trigger_event: clinical_encounter.completed, payload: clinical_encounters, null_field: relationship}
      - {handoff_id: 903, direction: outbound, source_domain: HC-PATIENT, target_domain: ERP-FIN, trigger_event: clinical_note.signed, payload: clinical_notes, null_field: relationship}
    blocked_by:
      - {type: depends_on, ref: B2-3, reason: handoff 901 semantic correctness blocks one of three rows}

  - id: B1A-B9-ORPHAN-EVENT
    summary: Trigger event 1022 (`patient_appointment.scheduled`) has zero `handoffs` rows; the publish leg is orphaned.
    finding: B9 partial fail. Event 1022 is the canonical signal for downstream patient-communication, calendar holds, payer eligibility checks, and care-team notifications. Audit candidates (HC-PATIENT-SCHED -> CSM for prep, HC-PATIENT-SCHED -> TELEHEALTH for virtual-visit setup) are blocked on Phase 0 candidates.
    action: Either author at least 1 outbound handoff for event 1022 (target TBD pending Phase 0 vetting of TELEHEALTH + EHR), or DELETE the event row. A stub with no target is not acceptable.
    affected_events:
      - {id: 1022, event_name: patient_appointment.scheduled, current_category: lifecycle, proposed_category: lifecycle}
    blocked_by:
      - {type: catalog_addition, scope: domains, trigger: TELEHEALTH or EHR Phase 0 vetting}

  - id: B1A-B11-ALIASES
    summary: Author 2-3 `data_object_aliases` per master (12-18 total) for cross-vendor / cross-industry healthcare synonyms.
    finding: B11 fails. Zero `data_object_aliases` for any of the 6 masters. Healthcare has rich vendor-specific terminology (Epic "visit", Cerner "episode", HL7 v2 OBR "order", SOAP / progress / encounter note variants).
    action: Draft 12-18 aliases per the audit prior recommendation (patient_appointment -> visit / appointment slot; clinical_encounter -> visit / episode / event; care_plan -> treatment plan / plan of care; patient_referral -> consult / order; clinical_orders -> CPOE order / order; clinical_notes -> chart note / progress note / SOAP note / encounter note). Chunked insert against `/data_object_aliases`.
    affected_masters:
      - {data_object_id: 617, name: patient_appointments, target_module_id: null, workflow: aliases}
      - {data_object_id: 618, name: clinical_encounters, target_module_id: null, workflow: aliases}
      - {data_object_id: 619, name: care_plans, target_module_id: null, workflow: aliases}
      - {data_object_id: 620, name: patient_referrals, target_module_id: null, workflow: aliases}
      - {data_object_id: 621, name: clinical_orders, target_module_id: null, workflow: aliases}
      - {data_object_id: 622, name: clinical_notes, target_module_id: null, workflow: aliases}

  - id: B1A-B12-LIFECYCLE-STATES
    summary: Author `data_object_lifecycle_states` for all 6 masters per Rule #12. Audit pre-specifies state shapes.
    finding: B12 fails. Zero lifecycle state rows. Every master has a real workflow with distinct states; none are config-shape exempt.
    action: Load lifecycle states per the 2026-05-30 audit's pre-specified shapes. patient_appointments (scheduled, checked_in, in_progress, completed, no_show, cancelled); clinical_encounters (open, in_progress, completed, signed, locked); care_plans (draft, active, on_hold, completed, withdrawn); patient_referrals (created, sent, accepted, declined, completed, expired); clinical_orders (placed, in_progress, resulted, completed, cancelled, discontinued); clinical_notes (draft, signed, addended, amended). Set `requires_permission=true` on workflow gates (signed, locked, cancelled, discontinued, addended, amended). `domain_module_id` NULL until B1-S1 ships modules; PATCH after.
    affected_masters:
      - {data_object_id: 617, name: patient_appointments, target_module_id: null, workflow: scheduled->checked_in->in_progress->completed/no_show/cancelled}
      - {data_object_id: 618, name: clinical_encounters, target_module_id: null, workflow: open->in_progress->completed->signed->locked}
      - {data_object_id: 619, name: care_plans, target_module_id: null, workflow: draft->active->on_hold/completed/withdrawn}
      - {data_object_id: 620, name: patient_referrals, target_module_id: null, workflow: created->sent->accepted/declined->completed/expired}
      - {data_object_id: 621, name: clinical_orders, target_module_id: null, workflow: placed->in_progress->resulted->completed/cancelled/discontinued}
      - {data_object_id: 622, name: clinical_notes, target_module_id: null, workflow: draft->signed->addended/amended}
    extra_rule_reference: Rule #12

  - id: B1A-F7-CHANNEL-ABSTRACTION
    summary: Replace legacy skill 66's `send_sms` link (tool id 38, coverage_tier external) with `notify_person` per Channel vs capability authoring rule.
    finding: F7 fails. Skill 66 (`hc-patient-system`) links `send_sms` as `required` without workflow-specific justification. SMS is not the workflow contract for any specific patient-operations event; this is generic notification. Default per the abstraction rule is `notify_person`.
    action: Either PATCH skill_tools row tool_id from 38 to `notify_person`, or DELETE the row (and let the skill rely on `send_email` + future `notify_person` link). This is independent of B1-S14 / B1-S16 (which retire skill 66 in favor of module-level skills) but if those land first, F7 cures via the new skill's authoring.

  - id: B1A-S1-MODULES
    summary: Author HC-PATIENT modules + Phase-A package (capabilities, capability_domains, domain_module_capabilities, domain_module_data_objects, system skills, skill_tools).
    finding: M1 hard-fails (0 modules). M2 vacuously fails. M4 / M6 vacuous. The 2026-05-30 audit's default proposal is 2 full modules (HC-PATIENT-SCHED covering patient_appointments + patient_referrals; HC-PATIENT-CLINICAL covering clinical_encounters + care_plans + clinical_orders + clinical_notes). A 4-module alternative (SCHED + ORDERS + CLINICAL-DOC + CARE-COORD) is queued in B3-M1. Cannot author until B2-1 resolves the split decision.
    action: "Once B2-1 resolves, load a single Phase-A package: domain_modules (kind=full), capabilities (5-8 per audit proposal), capability_domains, domain_module_capabilities, domain_module_data_objects (master role per audit assignment, necessity=required), per-module system skills (skill_type=system, naming `<module_code_lower>_agent`), tools + skill_tools. After landing, retire legacy skill 66 (B1A-F1-LEGACY-SKILL) and re-link the 8 existing skill_tools rows to the new module-level skills."
    blocked_by:
      - {type: user_decision, ref: B2-1}

  - id: B1A-B10b-SOURCE-MODULES
    summary: PATCH `source_domain_module_id` on outbound handoffs 899, 900, 901, 902, 903 once HC-PATIENT modularizes.
    finding: "B10b fails. All 5 outbound handoffs carry `source_domain_module_id=null`. Expected wiring per the 2026-05-30 audit: 899/1023 -> SCHED (patient_appointments); 900/1024 -> CLINICAL (clinical_encounters); 901/1025 -> CLINICAL (clinical_orders); 902/1026 -> SCHED (patient_referrals); 903/1027 -> CLINICAL (clinical_notes). Derivation rule from `backfill_ats_handoff_modules_2026_05_23.ts`."
    action: After B1A-S1-MODULES lands, run the standard backfill PATCH for the 5 outbound handoffs per the wiring above.
    affected_handoffs:
      - {handoff_id: 899, direction: outbound, source_domain: HC-PATIENT, target_domain: CSM, trigger_event: patient_appointment.no_show, payload: patient_appointments, null_field: source_domain_module_id}
      - {handoff_id: 900, direction: outbound, source_domain: HC-PATIENT, target_domain: ERP-FIN, trigger_event: clinical_encounter.completed, payload: clinical_encounters, null_field: source_domain_module_id}
      - {handoff_id: 901, direction: outbound, source_domain: HC-PATIENT, target_domain: ITSM, trigger_event: clinical_order.placed, payload: service_incidents, null_field: source_domain_module_id}
      - {handoff_id: 902, direction: outbound, source_domain: HC-PATIENT, target_domain: CSM, trigger_event: patient_referral.created, payload: patient_referrals, null_field: source_domain_module_id}
      - {handoff_id: 903, direction: outbound, source_domain: HC-PATIENT, target_domain: ERP-FIN, trigger_event: clinical_note.signed, payload: clinical_notes, null_field: source_domain_module_id}
    blocked_by:
      - {type: prerequisite_entity, ref: B1A-S1-MODULES}

  - id: B1A-B10b-TARGET-MODULES
    summary: PATCH `target_domain_module_id` on inbound handoffs 896, 897 from CLIN-DEV once HC-PATIENT modularizes; also requires consumer DMDO rows for device_recalls (612) and sterilization_cycles (616).
    finding: B10b fails for inbound. Handoffs 896 (device_recall.issued) and 897 (sterilization_cycle.failed) have target_domain_module_id=null. The 2026-05-30 audit pre-specifies both target the HC-PATIENT-CLINICAL module. The source NULL on these rows is CLIN-DEV's responsibility.
    action: After B1A-S1-MODULES lands AND consumer DMDO rows for 612 + 616 are loaded on HC-PATIENT-CLINICAL, PATCH target_domain_module_id on handoffs 896 and 897.
    affected_handoffs:
      - {handoff_id: 896, direction: inbound, source_domain: CLIN-DEV, target_domain: HC-PATIENT, trigger_event: device_recall.issued, payload: device_recalls, null_field: target_domain_module_id}
      - {handoff_id: 897, direction: inbound, source_domain: CLIN-DEV, target_domain: HC-PATIENT, trigger_event: sterilization_cycle.failed, payload: sterilization_cycles, null_field: target_domain_module_id}
    blocked_by:
