b2:
  - id: B2-1-MODULE-SPLIT
    summary: Choose between 2-module (SCHED + CLINICAL) or 4-module (SCHED + ORDERS + CLINICAL-DOC + CARE-COORD) split for HC-PATIENT.
    question: Which module split shape do you want for HC-PATIENT?
    options:
      - "2-module: HC-PATIENT-SCHED (patient_appointments, patient_referrals) + HC-PATIENT-CLINICAL (clinical_encounters, care_plans, clinical_orders, clinical_notes)"
      - "4-module: SCHED + ORDERS + CLINICAL-DOC + CARE-COORD for finer-grained deployability for SMB ambulatory"
      - "Other (specify)"
    why: Blocks B1A-BUILD and every downstream B1 item that touches modules (B1A-B10b-SOURCE-MODULES, B1A-B10b-TARGET-MODULES, lifecycle-state module attribution).

  - id: B2-2-OWNER-FUNCTION
    summary: HC-PATIENT currently lists Business Operations as owner (business_function 34); clinical operations would be more accurate but the 20-function spine has no Clinical Operations row.
    question: Which business function should own HC-PATIENT?
    options:
      - "Keep Business Operations as a generic placeholder (current: owner=Business Operations fn 34, contributor=Finance fn 4)"
      - "Add a new top-level Clinical Operations business_function (sets precedent for industry-specific functions on the 20-function spine)"
      - "Re-attribute to Customer Service (unusual framing, providers as service)"
    why: Healthcare delivery is owned by clinical operations (providers, nurses, care coordinators). The current attribution to Business Operations is dubious for a clinical-workflow domain. Re-attribution would overwrite an existing non-empty row (destructive). Independent of Bucket 3.

  - id: B2-3-HANDOFF-901
    summary: Handoff 901 (`clinical_order.placed` -> ITSM `service_incidents`) is semantically suspect; clinical orders route to lab / imaging / pharmacy fulfillment, not IT incidents.
    question: How to handle handoff 901?
    options:
      - "(a) Keep as a degraded interim model until EHR / HC-PHARM-MGMT / HC-LAB ship as real domains"
      - "(b) DELETE and rely on B1A-B10b-SOURCE-MODULES backfill to reconstruct"
      - "(c) Re-author to target a TBD healthcare fulfillment domain"
    why: "Has Bucket 3 dependency: rewrite path depends on EHR / HC-PHARM-MGMT landing as real domains. DELETE / re-author are destructive. If eyeball-mode, resolve immediately by DELETE + queue for re-author."

  - id: B2-4-COST-BAND
    summary: Current `cost_band=$$$$` ($500k-$2M yearly TCO for 500-user org); patient-operations as scoped (no full EHR, no RCM, no payer side) is plausibly $$$.
    question: Adjust HC-PATIENT cost_band?
    options:
      - "Keep $$$$"
      - "Drop to $$$"
      - "Split when modules ship (lite SMB ambulatory module at $$ vs full-suite at $$$$)"
    why: Sanity check. Changing cost_band overwrites an existing non-empty value (destructive). Independent of Bucket 3.

  - id: B2-5-PATIENTS-MASTER
    summary: HC-PATIENT does not currently master a `patients` data_object; the 6 existing masters reference patients implicitly.
    question: Should HC-PATIENT master `patients`?
    options:
      - "(a) HC-PATIENT masters patients now (preempts EHR domain)"
      - "(b) Wait until EHR is loaded and HC-PATIENT becomes a consumer + embedded_master of patients"
      - "(c) Load patients now as a placeholder + flag for re-attribution when EHR ships"
    why: Has Bucket 3 dependency. Blocks Bucket 3 entity candidates B3-E1 through B3-E8, B3-E10, B3-E12 through B3-E14 (each FK-references patients).

  - id: B2-6-CUSTOMER-CASES-PAYLOAD
    summary: Handoffs 899 (no_show) and 902 (referral.created) target CSM with payload `customer_cases` (CSM-mastered). Healthcare patient-ops typically flows into EHR task queue or dedicated patient-engagement system, not CRM.
    question: How to handle CSM as patient-engagement layer?
    options:
      - "(a) Keep current CSM routing (acceptable when CSM/CRM is the patient-engagement layer, e.g. Salesforce Health Cloud deployments)"
      - "(b) Re-target to a new HC-PATIENT-INTAKE module's own patient_inquiries master"
      - "(c) Defer to EHR + TELEHEALTH domains landing"
    why: Independent of Bucket 3 if Salesforce Health Cloud is treated as the canonical patient-engagement layer.

  - id: B2-7-DMDO-MIGRATION
    summary: All current HC-PATIENT data_object rows live in legacy `domain_data_objects`; zero rows in `domain_module_data_objects`.
    question: Single-load or two-load migration when modules ship?
    options:
      - "Author DMDO rows for all 6 masters at B1A-BUILD load time (default)"
      - "Stage in two loads (modules first, DMDO second)"
    why: Per SKILL.md the rollup is derived from DMDO once modules ship. Independent of Bucket 3.

