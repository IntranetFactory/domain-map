  - id: B1A-H1-APQC-TAGGING
    summary: Author 5 `handoff_processes` rows (agent_curated, record_status=new) for handoffs 899, 900, 902, 903, 896 with confident PCF matches; defer 901 (suspect) and 897 (no clean PCF) to Discover Pass 3.
    finding: H1 fails. 7 cross-domain handoffs (5 outbound, 2 inbound) carry zero `handoff_processes` rows. The 2026-05-30 audit identified 5 candidate L2/L3 PCF matches plus 2 DEFER rows. APQC tagging is parallelizable, does not depend on B1A-S1-MODULES.
    action: For each candidate, run `/processes?process_name=ilike.*<term>*&source_framework=eq.apqc_pcf_cross_industry` to confirm the PCF id, INSERT `(handoff_id, process_id, proposal_source=agent_curated, record_status=new, role=implements)`. Defer 901 until B2-3 resolves; defer 897 to Discover Pass 3 for custom-process authoring.
    affected_handoffs:
      - {handoff_id: 899, direction: outbound, source_domain: HC-PATIENT, target_domain: CSM, trigger_event: patient_appointment.no_show, payload: patient_appointments, null_field: handoff_processes}
      - {handoff_id: 900, direction: outbound, source_domain: HC-PATIENT, target_domain: ERP-FIN, trigger_event: clinical_encounter.completed, payload: clinical_encounters, null_field: handoff_processes}
      - {handoff_id: 902, direction: outbound, source_domain: HC-PATIENT, target_domain: CSM, trigger_event: patient_referral.created, payload: patient_referrals, null_field: handoff_processes}
      - {handoff_id: 903, direction: outbound, source_domain: HC-PATIENT, target_domain: ERP-FIN, trigger_event: clinical_note.signed, payload: clinical_notes, null_field: handoff_processes}
      - {handoff_id: 896, direction: inbound, source_domain: CLIN-DEV, target_domain: HC-PATIENT, trigger_event: device_recall.issued, payload: device_recalls, null_field: handoff_processes}
