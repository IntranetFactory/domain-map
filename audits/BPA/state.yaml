    summary: "Resolve business_capability_maps (248) canonical owner; relocate DMDO master row from APM to BPA-CAPABILITY-MAP (221) or accept APM as canonical."
    finding: "business_capability_maps (248) has its single catalog-wide DMDO role='master' row on APM-PORTFOLIO-REGISTRY (module 103, APM domain, DMDO id 528). On 2026-06-02 BPA modularized and assigned 248 as embedded_master/required on BPA-CAPABILITY-MAP (221), preserving M7 single-master. To make BPA canonical: DELETE DMDO 528, INSERT a master row for 248 on module 221, demote APM-103 to embedded_master or consumer, then relocate lifecycle states 673/674/675 (B1B-M4) and re-derive the BPA-prefixed publish permission. To keep APM canonical: leave 528 and the BPA embedded_master row as-is (current state), and DELETE BPA's legacy domain_data_objects master claim on 248."
    blocked_by:
      - type: user_decision
        ref: B2-CAPMAP-OWNER
    affected_masters:
      - data_object_id: 248
        name: business_capability_maps
        target_module_id: 103
        workflow: "capability mapping"

  - id: B1B-M4
    summary: "PATCH lifecycle states 673/674/675 domain_module_id to BPA-CAPABILITY-MAP (221) after B1B-M3 resolves BPA as owner."
