    summary: "Author 6 domain_aliases rows for BPA discoverability."
    finding: "BPA has zero domain_aliases rows. Catalog search and per-domain skill triggers miss obvious synonyms. Proposed aliases: 'business process management', 'BPM', 'process modeling', 'process architecture', 'BPMN authoring', 'process design'. Verify domain_aliases column shape before drafting the loader (data_object_aliases uses alias_name; domain_aliases may differ)."
