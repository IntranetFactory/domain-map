    finding: "F1 fails. Legacy skill bpa-system (id 34, domain_module_id=null, skill_type='system') with 4 skill_tools (332/65/333/334, all query-tier, platform coverage) still present. Per Rule 17 the target shape is one system skill per domain_modules row, anchored by domain_module_id. Cannot DELETE until per-module system skills land in Phase S, which requires B1B-M1."
    blocked_by:
