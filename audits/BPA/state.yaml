b2:
  - id: B2-MODULE-SHAPE
    summary: "Pick the BPA module split shape (2 vs 3 vs 4 modules)."
    question: "How should the BPA domain be modularized?"
    options:
      - "3 modules: BPA-PROCESS-REPO (masters business_process_models, BPMN authoring plus governance plus publish), BPA-CAPABILITY-MAP (masters business_capability_maps plus realizes REFERENCE-FRAME-LIBRARY), BPA-VALUE-STREAM (masters value_streams plus process_simulation_runs). Default proposal."
      - "4 modules: split BPA-SIMULATION out of BPA-VALUE-STREAM (masters process_simulation_runs alone) reflecting Trisotech and ARIS Aware as distinct simulation surface."
      - "2 modules: collapse to BPA-PROCESS-ARCH (process_models plus value_streams plus simulation) and BPA-CAPABILITY-MAP. Leaner footprint."
    why: "Module shape cascades into every M-band fix (B1B-M1, M2, M3, M4, M5), every B10b backfill, every E-band role authoring, every F-band system skill authoring. Cannot resolve M-band without this decision. Depends on Bucket 3 reference framework libraries entity decision and Bucket 3 DMN module decision outcomes."

  - id: B2-CAPMAP-OWNER
    summary: "Pick the canonical owner of business_capability_maps (248)."
    question: "Which module canonically masters business_capability_maps?"
    options:
      - "BPA owns canonically: relocate DMDO master row to new BPA-CAPABILITY-MAP module, APM-PORTFOLIO-REGISTRY demotes to embedded_master; relocate lifecycle states 673/674/675 and re-derive BPA-prefixed publish permission."
      - "APM owns canonically: leave DMDO master on APM-PORTFOLIO-REGISTRY (module 103), DELETE BPA's domain_data_objects master claim; BPA's new BPA-CAPABILITY-MAP module holds embedded_master."
      - "EA (queued candidate) owns canonically: defer entirely until EA domain promotes; revisit then."
    why: "Gates B1B-M3, B1B-M4, B1B-M5 sequencing. The DMDO master row, the 3 lifecycle states, the workflow-gate permission, and the 2 realized capabilities (343, 344) all follow the canonical owner."

  - id: B2-EA-SOLUTION-SPLIT
    summary: "Decide solution coverage split with the queued EA candidate."
    question: "How should the 4 BPA-and-EA solutions be coverage-split if EA promotes?"
    options:
      - "Keep all 4 (MEGA HOPEX, BiZZdesign Horizzon, Software AG ARIS, SAP Signavio) on BPA as primary; re-link to EA when it lands."
      - "Downgrade those 4 to coverage_level=secondary on BPA, create primary rows on EA at promotion time."
      - "Per-solution split (e.g. Signavio as BPA primary, ARIS as EA primary)."
    why: "Gated entirely on EA candidate's promotion decision (Bucket 3 EA promotion). If EA stays queued, this item is moot."

  - id: B2-PATTERN-FLAGS
    summary: "Confirm pattern-flag re-evaluations per Rule 12 on the 4 BPA masters."
    question: "Apply these proposed pattern-flag flips?"
    options:
      - "247 business_process_models: has_submit_lock=true (published models lock); others stay false."
      - "248 business_capability_maps: has_single_approver=true (capability-map publication routes to one architect lead); others stay false."
      - "250 process_simulation_runs: has_submit_lock=true (queued runs lock at start); others stay false."
      - "All 12 cells stay false (decline the audit's positive evaluation)."
    why: "Rule 12 requires positive re-evaluation; defaults are all false but defaults-after-review is not the same as defaults-without-review. PATCHes must wait for confirmation."

  - id: B2-PROC-MIN-RECONCILE
    summary: "Author a candidate PROC-MIN to BPA handoff on discovered_process_model.reconciled?"
    question: "Author this candidate handoff identified in 2026-05-30 Pass 4?"
    options:
      - "Author now (after B1B-M1 lands; payload data_object discovered_process_models or business_process_models depending on intent)."
      - "Defer to a PROC-MIN audit."
      - "Skip as overspecification."
    why: "Discovered during pairwise BPA and PROC-MIN reconciliation. Not blocking; speculative additional cross-domain edge."

  - id: B2-CATALOG-UX
    summary: "Draft and approve catalog_tagline plus catalog_description copy for the BPA domain row."
    question: "Approve agent-drafted buyer-shaped copy for domains.catalog_tagline and domains.catalog_description on row 136?"
    options:
      - "Approve agent draft (agent surfaces the exact strings before writing)."
      - "Provide your own copy."
      - "Skip, leave both fields empty."
    why: "Rule 20 prohibits any write of these fields without explicit per-row user approval. A4 cannot pass otherwise."

  - id: B2-DOMAIN-ALIASES
    summary: "Approve drafting 6 domain_aliases rows for BPA."
    question: "Author the 6 proposed BPA domain_aliases (business process management, BPM, process modeling, process architecture, BPMN authoring, process design)?"
    options:
      - "Approve all 6."
      - "Approve a subset (name which)."
      - "Decline."
    why: "2026-05-31 continuation excluded this from the technical Bucket 1 pass; needs user re-prioritization (the prior 2026-05-30 Bucket 1 listed it as in-scope but the continuation deferred). Verify the domain_aliases table column shape before drafting the loader (data_object_aliases uses alias_name; domain_aliases may differ)."

