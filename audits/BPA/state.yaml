  - id: B1B-S1
    summary: "Draft and surface catalog_tagline plus catalog_description on the BPA domain row (Rule 20 user surfacing)."
    finding: "A4 fails. domains.catalog_tagline='' and domains.catalog_description='' on row id 136. Per Rule 20 the agent drafts buyer-shaped copy (workflow plus value, not analyst voice) and surfaces both fields to the user before any write. Once a non-empty value exists it is never overwritten without explicit user approval."
