b1a:
  - id: B1A-SKILLS
    summary: "Author 3 per-module system skills (Rule #17 -> F2/F3) and retire legacy bpa-system (id 34); backfill catalog UX (M8/A4) on the 3 new modules + domain row."
    finding: "BPA modularized on 2026-06-02 into 3 full modules: BPA-PROCESS-REPO (220), BPA-CAPABILITY-MAP (221), BPA-VALUE-STREAM (222). Per Rule #17 each module now owes exactly one skill_type='system' skill anchored by domain_module_id; today there are zero per-module skills and one legacy skill bpa-system (id 34, domain_module_id=null, skill_type='system') with 4 query-tier skill_tools (332/65/333/334, platform coverage). F2 fails (no per-module system skill on 220/221/222); F1 fails (legacy skill still present). Separately, M8/A4 catalog UX is blank: domains.catalog_tagline='' and catalog_description='' on row 136, and catalog_tagline='' / catalog_description='' on all 3 new module rows (220/221/222)."
    action: "Phase S: author one system skill per module (220, 221, 222) anchored by domain_module_id, attach the appropriate query + mutate + workflow-gate skill_tools, then DELETE legacy skill 34 and its 4 skill_tools rows. Phase A / Rule 20: draft buyer-shaped catalog_tagline + catalog_description for row 136 and for the 3 module rows, surface to user before writing (see B2-CATALOG-UX)."
    extra_new_module_ids: [220, 221, 222]
    extra_legacy_skill_id: 34
    extra_legacy_skill_tools_ids: [332, 65, 333, 334]

b1b:
