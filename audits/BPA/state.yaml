  - id: B1B-S4
    summary: "PATCH target_domain_module_id on 3 inbound plus 3 outbound BPA handoffs after BPA modularizes and other domains' B10b backfills."
    finding: "B10b fails on 6 rows where the BPA-side target FK is null. Inbound rows (BPA is target) 183, 740, 741 all have target_domain_module_id=null on the BPA side; resolved once BPA's consumer or contributor DMDO rows on 247, 580, 582 land. Outbound rows (BPA is source) 180 to PROC-MIN, 783 to PROC-MIN, 785 to SPM still carry target_domain_module_id=null; resolution lives on PROC-MIN B10b and SPM B10b respectively."
