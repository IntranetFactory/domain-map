    summary: "Author the BPA module set (>=2 full modules per Rule #14). M1 hard fail, every downstream M / B / E / F band blocked."
    finding: "BPA has zero domain_modules rows. Capability count is 7 (>=3) so target shape is >=2 full modules. Default proposal from 2026-05-30 audit is 3 modules: BPA-PROCESS-REPO mastering business_process_models 247; BPA-CAPABILITY-MAP mastering business_capability_maps 248 and realizing REFERENCE-FRAME-LIBRARY 344; BPA-VALUE-STREAM mastering value_streams 249 and process_simulation_runs 250. Alternatives are 4 modules (split BPA-SIMULATION) or 2 modules (collapse)."
    blocked_by:
      - type: user_decision
        ref: B2-MODULE-SHAPE
    affected_modules: []
    affected_masters:
      - data_object_id: 247
        name: business_process_models
        target_module_id: null
        workflow: "BPMN authoring plus governance plus publish"
      - data_object_id: 248
        name: business_capability_maps
        target_module_id: null
        workflow: "capability mapping plus reference frameworks"
      - data_object_id: 249
        name: value_streams
        target_module_id: null
        workflow: "value stream modelling"
      - data_object_id: 250
        name: process_simulation_runs
        target_module_id: null
        workflow: "Monte Carlo and discrete-event simulation"

  - id: B1B-M2
    summary: "Author DMDO master rows on new BPA modules for 247, 249, 250."
    finding: "business_process_models (247), value_streams (249), process_simulation_runs (250) have zero role='master' rows anywhere in domain_module_data_objects. M7 fails on master orphan count. Once B1B-M1 lands, INSERT three DMDO master rows mapping 247 to BPA-PROCESS-REPO, 249 to BPA-VALUE-STREAM, 250 to BPA-VALUE-STREAM (or BPA-SIMULATION per the module shape decision)."
    blocked_by:
      - type: prerequisite_entity
        ref: B1B-M1
      - type: user_decision
        ref: B2-MODULE-SHAPE
    affected_masters:
      - data_object_id: 247
        name: business_process_models
        target_module_id: null
        workflow: "BPMN authoring"
      - data_object_id: 249
        name: value_streams
        target_module_id: null
        workflow: "value stream modelling"
      - data_object_id: 250
        name: process_simulation_runs
        target_module_id: null
        workflow: "simulation execution"

  - id: B1B-M3
    summary: "Resolve business_capability_maps (248) canonical owner; relocate DMDO master row or accept APM as canonical."
    finding: "business_capability_maps (248) has its single DMDO role='master' row on APM-PORTFOLIO-REGISTRY (module 103, APM domain), while BPA's legacy domain_data_objects rollup also claims it as master. Either DELETE the APM master row and INSERT under BPA-CAPABILITY-MAP (with APM demoting to embedded_master or consumer), or accept APM as canonical owner and DELETE BPA's domain_data_objects master claim (leaving BPA with three masters)."
    blocked_by:
      - type: user_decision
        ref: B2-CAPMAP-OWNER
    affected_masters:
      - data_object_id: 248
        name: business_capability_maps
        target_module_id: 103
        workflow: "capability mapping"

  - id: B1B-M4
    summary: "PATCH lifecycle states 673/674/675 domain_module_id to the new BPA capability-map module after B1B-M3 resolves."
    finding: "3 lifecycle states on business_capability_maps (673 draft, 674 published, 675 superseded) carry domain_module_id=103 (APM). Workflow-gate permission apm-portfolio-registry:publish_business_capability_map is materialized under APM as a result. If Bucket 2 capmap-owner resolves BPA as owner, PATCH state.domain_module_id to the new BPA-CAPABILITY-MAP id and re-derive the BPA-prefixed permission."
    blocked_by:
      - type: depends_on
        ref: B1B-M3
        reason: "Lifecycle states follow the master's realizing module."
    affected_masters:
      - data_object_id: 248
        name: business_capability_maps
        target_module_id: 103
        workflow: "publish gate"

  - id: B1B-M5
    summary: "Author domain_module_capabilities rows linking all 7 BPA capabilities to the new BPA modules."
    finding: "Capabilities BUSINESS-CAPABILITY-MAP (343) and REFERENCE-FRAME-LIBRARY (344) are currently realized through APM module 103. Capabilities BPA-BPMN-MODEL (338), BPA-PROCESS-REPO (339), BPA-SIMULATION (340), BPA-VALUE-STREAM (341), BPA-PUBLISH (342) have zero realizing modules. Once BPA modularizes, link all 7 capabilities to the appropriate new BPA modules; remove the APM realizations for 343 and 344 after the BPA rows land."
    blocked_by:
      - type: prerequisite_entity
        ref: B1B-M1
      - type: user_decision
        ref: B2-CAPMAP-OWNER
    affected_entities:
