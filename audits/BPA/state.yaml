    summary: "Author 2-4 intra-domain handoffs rows on BPA now that it has 3 modules (B9b coverage)."
    finding: "B9b requires intra-domain handoff coverage now that BPA has >=2 modules (220, 221, 222). Expected pairs from prior analysis: BPA-CAPABILITY-MAP (221) -> BPA-PROCESS-REPO (220) on capability_map.updated; BPA-VALUE-STREAM (222) -> BPA-PROCESS-REPO (220) on value_stream.bottleneck_identified; BPA-VALUE-STREAM (222) -> BPA-CAPABILITY-MAP (221) on simulation feedback. Use integration_pattern='lifecycle_progression' default and friction_level='low' default. Out of the modules-only scope; a handoff-authoring pass owes these inserts."
