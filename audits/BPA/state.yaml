schema_version: 2
domain: BPA
status: feedback_needed
next_action_by: user
last_audit: "2026-06-13"
b1b:
  - id: B1B-M3
    summary: "Resolve business_capability_maps (248) canonical owner; relocate DMDO master row from APM to BPA-CAPABILITY-MAP (221) or accept APM as canonical."
    finding: "business_capability_maps (248) has its single catalog-wide DMDO role='master' row on APM-PORTFOLIO-REGISTRY (module 103, APM domain, DMDO id 528). BPA modularized 2026-06-02 and assigned 248 as embedded_master/required on BPA-CAPABILITY-MAP (221), preserving M7 single-master. To make BPA canonical: DELETE DMDO 528, INSERT a master row for 248 on module 221, demote APM-103 to embedded_master or consumer, then relocate lifecycle states 673/674/675 (B1B-M4) and re-derive the BPA-prefixed publish permission. To keep APM canonical: leave 528 and the BPA embedded_master row as-is (current state), and DELETE BPA's legacy domain_data_objects master claim on 248."
    blocked_by:
      - type: user_decision
        ref: B2-CAPMAP-OWNER
    affected_masters:
      - data_object_id: 248
        name: business_capability_maps
        target_module_id: 103
        workflow: "capability mapping"
  - id: B1B-M4
    summary: "PATCH lifecycle states 673/674/675 domain_module_id to BPA-CAPABILITY-MAP (221) after B1B-M3 resolves BPA as owner."
    finding: "3 lifecycle states on business_capability_maps (673 draft, 674 published, 675 superseded) carry domain_module_id=103 (APM). Workflow-gate permission apm-portfolio-registry:publish_business_capability_map is materialized under APM. If B2-CAPMAP-OWNER resolves BPA as owner, PATCH state.domain_module_id to 221 and re-derive the BPA-prefixed permission. If APM stays canonical, no change."
    blocked_by:
      - type: depends_on
        ref: B1B-M3
        reason: "Lifecycle states follow the master's realizing module."
    affected_masters:
      - data_object_id: 248
        name: business_capability_maps
        target_module_id: 103
        workflow: "publish gate"
  - id: B1B-M5b
    summary: "Remove the legacy APM-103 realizations of capabilities 343 and 344 if B2-CAPMAP-OWNER resolves BPA as canonical."
    finding: "On 2026-06-02 capabilities 343 (BUSINESS-CAPABILITY-MAP) and 344 (REFERENCE-FRAME-LIBRARY) were linked to BPA-CAPABILITY-MAP (221). They also retain their pre-existing realizations on APM-PORTFOLIO-REGISTRY (module 103) via domain_module_capabilities rows 190 and 191. Double-realization of 343/344 is intentional for now; DELETE DMC rows 190/191 only if B2-CAPMAP-OWNER resolves BPA as the canonical owner of capability mapping."
    blocked_by:
      - type: user_decision
        ref: B2-CAPMAP-OWNER
    affected_entities:
      - BUSINESS-CAPABILITY-MAP
      - REFERENCE-FRAME-LIBRARY
b2:
  - id: B2-CAPMAP-OWNER
    summary: "Pick the canonical owner of business_capability_maps (248): APM (current) or relocate to BPA-CAPABILITY-MAP (221)."
    question: "Which module canonically masters business_capability_maps?"
    options:
      - "APM owns canonically (current state): DMDO master stays on APM-PORTFOLIO-REGISTRY (103); BPA-CAPABILITY-MAP (221) holds embedded_master (already loaded 2026-06-02); DELETE BPA's legacy domain_data_objects master claim on 248. No further DMDO/lifecycle moves."
      - "BPA owns canonically: DELETE APM DMDO master 528, INSERT master on 221, demote APM-103 to embedded_master/consumer, PATCH lifecycle states 673/674/675 to 221 (B1B-M4), DELETE APM DMC rows 190/191 (B1B-M5b), re-derive BPA-prefixed publish permission."
      - "EA (queued candidate) owns canonically: defer until EA promotes; revisit then."
    why: "Gates B1B-M3, B1B-M4, B1B-M5b. The DMDO master row, the 3 lifecycle states, the workflow-gate permission, and the double-realized capabilities 343/344 all follow the canonical owner. Current modularization (2026-06-02) defaulted to APM-canonical by assigning 248 as embedded_master in BPA, preserving M7."
  - id: B2-PATTERN-FLAGS
    summary: "Confirm pattern-flag re-evaluations per Rule 12 on the 4 BPA masters."
    question: "Apply these proposed pattern-flag flips?"
    options:
      - "247 business_process_models: has_submit_lock=true (published models lock); others stay false."
      - "248 business_capability_maps: has_single_approver=true (capability-map publication routes to one architect lead); others stay false."
      - "250 process_simulation_runs: has_submit_lock=true (queued runs lock at start); others stay false."
      - "All 12 cells stay false (decline the audit's positive evaluation)."
    why: "Rule 12 requires positive re-evaluation; flipping a pattern flag from its default is a destructive overwrite (Rule #21) and must wait for confirmation. Lifecycle states are now authored on all 4 masters (2026-06-13), so the flags can be evaluated against real workflows."
  - id: B2-B9D-RETAG
    summary: "Re-point (or delete) the BPA handoff APQC tags now that BPA realizes the carried processes (supersedes the prior name-an-owner items B2-B9D-OWN-414 / B2-B9D-OWN-1708)."
    question: "Now that BPA realizes Publish processes (13.1.3.5, pid 1644) and Analyze processes (13.1.3.2, pid 1641) with named owners, how should the existing BPA handoff process tags be corrected? Each option overwrites or deletes existing handoff_processes rows, so it needs your sign-off."
    options:
      - "ROLL-UP re-point: handoff_processes 551/553/557/559 (handoffs 180/182/783/785, currently tagged 13.1 'Manage business processes' pid 78) -> 13.1.3.5 'Publish processes' (pid 1644), the realized finer-grain code. Makes them RESOLVED."
      - "MIS-TAG on outbound 184/784/786 (handoff_processes 554/558/560, currently tagged 13.4.3.2 'Reengineer business processes and systems' pid 1708): either re-point to 13.1.3.2 'Analyze processes' (pid 1641), OR keep 1708 as genuine unrealized reengineering work and give it a Responsible/Accountable (Process Architect 77 / Process Owner 79 now exist). 'Reengineer' and 'Analyze' are different activities, so this is a judgment call, not a mechanical re-point."
      - "Leave all tags as-is."
    why: "After authoring the publish/analyze gates + RACI in the 2026-06-13 pass, the B9d re-run reclassified the former ORPHANs (414, 1708) as MIS-TAGs and pid 78 as ROLL-UP: the carried entities ARE now realized. The remaining decision is a destructive handoff_processes edit (Rule #21: surfaced for sign-off). Note: handoff 183's tag (handoff_processes 102, pid 414, proposal_source discovery_substring) is PROC-MIN-authored, so its re-point/delete is PROC-MIN's source edit, not BPA's."
  - id: B2-EA-SOLUTION-SPLIT
    summary: "Decide solution coverage split with the queued EA candidate."
    question: "How should the 4 BPA-and-EA solutions be coverage-split if EA promotes?"
    options:
      - "Keep all 4 (MEGA HOPEX, BiZZdesign Horizzon, Software AG ARIS, SAP Signavio) on BPA as primary; re-link to EA when it lands."
      - "Downgrade those 4 to coverage_level=secondary on BPA, create primary rows on EA at promotion time."
      - "Per-solution split (e.g. Signavio as BPA primary, ARIS as EA primary)."
    why: "Gated entirely on the EA candidate's promotion decision (B3-EA-PROMOTION). If EA stays queued, this item is moot."
  - id: B2-PROC-MIN-RECONCILE
    summary: "Author a candidate PROC-MIN to BPA handoff on discovered_process_model.reconciled?"
    question: "Author this candidate handoff identified in 2026-05-30 Pass 4?"
    options:
      - "Author now (payload discovered_process_models or business_process_models depending on intent)."
      - "Defer to a PROC-MIN audit."
      - "Skip as overspecification."
    why: "Discovered during pairwise BPA and PROC-MIN reconciliation. Not blocking; speculative additional cross-domain edge."
