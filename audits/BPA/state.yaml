    finding: "B10b: inbound rows where BPA is target (183, 740, 741) all have target_domain_module_id=null on the BPA side. Post-2026-06-02 these resolve once BPA's consumer/contributor DMDO rows on the payload masters exist; today BPA holds master on 247 (BPA-PROCESS-REPO) so 183 (payload business_process_models) targets 220, but 740 (discovered_process_models 580) and 741 (process_variants 582) need a BPA consumer/contributor DMDO declaration that is out of this modules-only scope. Outbound rows 180 (PROC-MIN), 783 (PROC-MIN), 785 (SPM) still carry target_domain_module_id=null, resolved on PROC-MIN B10b and SPM B10b."
