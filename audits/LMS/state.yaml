b1b:
  - id: B1B-A4-M8-WRITES
    summary: "Write 9 catalog UX rows (1 domain + 8 modules) AFTER user approves per-row drafts produced by B1A-DRAFT-CATALOG-COPY."
    finding: >-
      Rule #20 forbids writing `catalog_tagline` / `catalog_description` to non-empty values
      without explicit per-row user approval, even on first-time backfill. The PATCH is purely
      mechanical once approval lands.
    blocked_by:
      - {type: depends_on, ref: B1A-DRAFT-CATALOG-COPY, reason: "agent must draft + surface 9 rows before user can approve"}
      - {type: user_decision, ref: B2-CATALOG-COPY}
    affected_modules: [57, 32, 33, 34, 178, 179, 180, 181, 182]

  - id: B1B-M4-SKILLS-MGMT
    summary: "Resolve LMS × SKILLS-MGMT capability orphan (capability id 20): drop the LMS link, or add LMS-PATHS as realizing module after skill_targets ships."
    finding: >-
      `capability_domains` carries an LMS × SKILLS-MGMT (capability id 20) link but no LMS module
      realizes it; the realizing module sits in the SKILLS-MGMT domain (`SKILLS-MGMT-TAXONOMY`).
      M4 fails for capability id 20. Two options: (a) DELETE the `capability_domains` row for LMS
      (cleaner: SKILLS-MGMT-TAXONOMY is the canonical owner; LMS uses `course_tags` as the skill
      tag surface, which is downstream consumption); or (b) add `LMS-PATHS` (module 34) as the
      realizing module via `domain_module_capabilities` AFTER the MISSING entity `skill_targets`
      ships.
    blocked_by:
      - {type: user_decision, ref: B2-SKILLS-MGMT-ATTRIBUTION}

