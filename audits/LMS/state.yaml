b1a:
  - id: B1A-B7-USER-EDGES
    summary: "Zero user edges loaded between LMS masters and platform users; Rule #10 violated for the whole domain."
    finding: >-
      `data_object_relationships` returns zero rows in either direction between LMS-owned masters
      (64 entities) and the platform `users` data_object (id 41). Per Rule #10 every master with a
      user-typed actor (instructor, learner, assigner, approver, author, reviewer, signer, subject)
      must carry a `data_object_relationships` edge to `users`. This is the deepest BOUNDARY gap in
      LMS today.
    action: >-
      Author the missing `data_object_relationships` rows per Rule #10. Loader follows the
      cluster-drafts pattern: each row carries (data_object_id, relationship_verb, inverse_verb,
      related_data_object_id=41, relationship_type, relationship_kind, is_required, owner_side).
      record_status default 'new'. Pre-flight verifies `users` is `kind='platform_builtin'`. Draft
      surface to user before insert per Rule #1.
    affected_masters:
      - {data_object_id: 925, name: instructors, target_module_id: 178, workflow: "instructor user identity"}
      - {data_object_id: 169, name: course_enrollments, target_module_id: 32, workflow: "learner identity"}
