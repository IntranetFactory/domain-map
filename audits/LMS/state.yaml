b2:
  - id: B2-SKILLS-MGMT-ATTRIBUTION
    summary: "M4: how to resolve LMS × SKILLS-MGMT capability orphan."
    question: "Drop the `capability_domains` row for LMS × capability id 20, or add LMS-PATHS as realizing module after MISSING entity `skill_targets` ships?"
    options:
      - "(a) DELETE the `capability_domains` row (clean: SKILLS-MGMT-TAXONOMY owns it; LMS uses course_tags as downstream consumer)"
      - "(b) Add `domain_module_capabilities` row linking LMS-PATHS (id 34) to capability id 20 AFTER `skill_targets` ships from MISSING #9"
    why: "Carried from 2026-05-29; recommendation was (a), no user decision recorded yet. Independent of all other Bucket 2 items."

  - id: B2-MISSING-ROUTING
    summary: "Approve loader groupings + per-loader scope for 19 MISSING vendor-surface entities."
    question: "Which of the 7 proposed loader groups should ship and in what order?"
    options:
      - "All 7 groups (course-delivery, ILT, paths, credentials, compliance, GDPR, automation)"
      - "Subset: pick by group"
      - "Defer indefinitely"
    why: "Loader-idiom pattern requires per-loader scope to avoid Phase-B over-shipping. Recommendation: ship compliance + GDPR first (regulatory exposure), then course-delivery (deepest vendor surface), then ILT / paths / credentials / automation."

  - id: B2-CATALOG-COPY
    summary: "A4 + M8: approve buyer-voice draft tagline + description for 9 rows."
    question: "Should I draft buyer-voice copy for 1 domain row + 8 module rows now, surface for per-row review, and write only on approval?"
    options:
      - "Yes, draft all 9 in one pass and surface to chat for review"
      - "Yes for some (name which modules)"
      - "Draft a single example first; I'll evaluate the voice"
      - "Skip; this round is structural only"
    why: "Rule #20 mandates the draft-surface-review-write loop. Backfill is permitted on empty rows; the agent cannot overwrite without explicit per-row approval (currently all rows are empty, so backfill is OK once drafts are approved)."

  - id: B2-B12-CLASSIFICATION
    summary: "B12: classify 17 stateless LMS masters as config-shape vs workflow-bearing."
    question: "Approve the agent's split, or call them row by row?"
    options:
      - "(a) Approve recommended split: ship lifecycle states for assessment_questions, quiz_responses, course_modules, lessons, xapi_statements; treat the other 12 as config-shape (no annotation since Rule #15 forbids notes exemption)"
      - "(b) Row by row review"
      - "(c) Ship states for everything that plausibly has a workflow (broader scope, includes course_ratings + recertification_schedules)"
    why: "Rule #15 rescinded the prior `data_objects.notes` config-shape exemption. Without notes, the audit can only either load the states or accept silent config-shape; the choice is yours."

  - id: B2-STARTER-ROLES
    summary: "E1 soft: name the role set for TRAINING-RECORDS-STARTER (module 182)."
    question: "Which roles should the starter inherit?"
    options:
      - "L-AND-D-LEARNING-ADMIN (primary), GRC-COMPLIANCE-TRAINING-MANAGER (secondary), MANAGER-AS-LEARNER-MANAGER (secondary)"
      - "Subset of the above"
      - "Add a starter-specific persona (name it)"
    why: "Per Rule #19 starters are first-class deployable units and benefit from a role surface. The 2026-05-29 audit suggested the first option; no user decision recorded yet."

  - id: B2-1121-ROUTING
    summary: "B10b: pick the LMS-side target module for handoff 1121 (HRSD → LMS, case_category.updated)."
