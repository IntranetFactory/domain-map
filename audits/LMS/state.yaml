b2:
  - id: B2-REFACTOR-C
    summary: "Collapse the per-regulation evidence shells into typed rows of training_evidence_records (940). User asked: would one table be sufficient and not bloated? optional entities instead?"
    question: "Collapse hipaa/osha/sox/ferpa/bsa_aml into training_evidence_records keyed by regulation_type, keep fda_part11 separate, or just mark the sector-bound shells optional?"
    user_question: "would one table be sufficient and not bloated? wouldn't it make sense to have optional entities?"
    agent_answer: >-
      Grounded in the live descriptions: 944 HIPAA / 945 OSHA / 946 SOX / 947 FERPA / 949 BSA-AML are
      near-identical 'training documentation row' shapes differing only by statute -> collapsing them
      into 940 (training_evidence_records) keyed by regulation_type REMOVES redundancy, it is not bloat.
      948 fda_part11_audit_trails is genuinely different (tamper-evident, retention-locked audit trail)
      -> the one worth keeping separate. So 'one table sufficient' = yes for the 5 completion shells.
      'Optional entities' = option c: keep all 6 but mark the sector-bound ones optional; keeps native
      per-statute install gating at the cost of 5 redundant masters.
    options:
      - "(a) Collapse all 6 into training_evidence_records keyed by regulation_type; recover per-statute install gating via a tenant 'active regulations' setting"
      - "(b) Collapse the 5 completion shells (HIPAA/OSHA/SOX/FERPA/BSA-AML) but keep fda_part11_audit_trails (948) as its own audit-log master (recommended)"
      - "(c) Keep all 6 separate; just mark the sector-bound shells (948 + 949) necessity=optional (your 'optional entities' idea; no deletes, lowest blast radius)"
    why: "Option b directly answers both questions: one table is sufficient + not bloated for the 5 identical shells, and the only structurally-different entity (FDA Part 11 audit trail) stays. Option c is the no-delete fallback. DELETE/collapse needs sign-off (destructive). Supersedes B1B-B14-NECESSITY."

  - id: B2-REFACTOR-A
    summary: "Where is learner-data privacy (DSAR/consent) mastered? User asked: how do other vendors handle it? would an embedded master make sense?"
    question: "Keep privacy mastered in LMS, dissolve it, or demote LMS (+ ATS) privacy records to embedded_master once a canonical PRIV-MGMT master exists?"
    user_question: "how do other vendors handle it? maybe an embedded master makes sense?"
    agent_answer: >-
      Vendor norm: flagship LMS products rarely master privacy. Privacy/DSAR is handled at the
      HR/identity-suite or tenant level, or deferred to a central privacy tool; the LMS exposes
      delete-my-data / export-my-records hooks and is a CONSUMER of privacy machinery, not its master.
      embedded_master is exactly right: LMS keeps a local DSAR/consent shell so a STANDALONE LMS can
      still honor training-data erasure, but defers to PRIV-MGMT's canonical master when present (the
      holistic deployment demotes embedded_master -> consumer at query time). This is the middle path
      between 'dissolve' (strands standalone erasure) and 'permanently master in LMS' (fragments DSAR).
      Constraint: PRIV-MGMT (domain 20) masters NOTHING today, so the embedded_master target must be
      built first. Cross-domain (LMS + ATS masters 901/870 + PRIV-MGMT).
    options:
      - "(a) Defer to a focused cross-domain privacy initiative; keep LMS privacy as interim scope-creep (recommended; PRIV-MGMT must exist first)"
      - "(b) Build PRIV-MGMT canonical DSAR/consent now, then demote LMS + ATS privacy records to embedded_master (the embedded-master target shape)"
      - "(c) Decline: keep learner-data privacy permanently mastered in LMS"
    why: "embedded_master is the right end state but needs PRIV-MGMT built first; that is a separate cross-domain build, hence defer. Interacts with q9."

  - id: B2-SKILLS-MGMT-ATTRIBUTION
    summary: "M4: resolve the LMS x SKILLS-MGMT capability orphan (id 20). User asked to explain both options."
    question: "Drop the capability_domains row for LMS, or realize capability 20 in LMS-PATHS after skill_targets ships?"
    user_question: "explain both"
    agent_answer: >-
      (a) DELETE the LMS<->capability-20 link: the capability appears on LMS only because LMS-COURSE-
      DELIVERY uses course_tags for skill tagging, which is downstream CONSUMPTION; the real owner is
      the SKILLS-MGMT domain (its SKILLS-MGMT-TAXONOMY module realizes it). Cleanest, no new entities,
      removes an orphan. Destructive (a link delete) so it needs sign-off.
      (b) KEEP the link and make LMS-PATHS realize it: only viable AFTER the MISSING entity skill_targets
      ships (path step <-> skill + proficiency threshold). Then add a domain_module_capabilities row so
      PATHS genuinely realizes 'skill alignment'. More work; defers on q8.
    options:
      - "(a) DELETE the LMS x capability-20 row (recommended; SKILLS-MGMT owns it)"
      - "(b) Add domain_module_capabilities linking LMS-PATHS (34) to capability 20 after skill_targets loads"
    why: "Independent of the refactors. (a) is the clean interpretation; (b) couples to the missing-entity load (q8)."

  - id: B2-1121-ROUTING
    summary: "B10b: pick the LMS-side target module for handoff 1121 (HRSD -> LMS, case_category.updated). User asked to explain the options."
    question: "Which LMS module receives case-category propagation, or is the handoff mis-modeled?"
    user_question: "explain the options"
    agent_answer: >-
      Handoff 1121: an HR-service case category changes in HRSD, and something in LMS should react.
      No LMS module currently declares any role on case_categories, so the landing spot is genuinely a
      design choice:
      (a) LMS-COMPLIANCE-TRAINING (33): the case category drives compliance-TAG inheritance (e.g. a
      'harassment complaint' category auto-tags mandatory harassment training). Pick this if the link is
      about which COMPLIANCE training a case type triggers.
      (b) LMS-PATHS (34): the case category drives LEARNING-PATH assignment (a case type maps to a
      development path). Pick this if it is about remedial/developmental learning, not compliance proof.
      (c) Mis-modeled: retire the handoff if HRSD case taxonomy should not reach LMS at all (removes an
      existing handoff -> needs sign-off).
    options:
      - "(a) LMS-COMPLIANCE-TRAINING (33): compliance-tag inheritance"
      - "(b) LMS-PATHS (34): learning-path assignment by case category"
      - "(c) Mis-modeled: retire the handoff"
    why: "No preset: endpoint genuinely ambiguous and no LMS module claims case_categories. (c) is destructive (removes a handoff)."

  - id: B2-MISSING-ROUTING
    summary: "Approve which MISSING vendor-surface entities to load. User asked what the 19 are and whether 'by area' = 'by module'."
    question: "Ship all module groups, a subset, or defer?"
    user_question: "what are these 19? what is 'grouped by area' - wouldn't that be 'grouped by module'?"
    agent_answer: >-
      You are right: 'by area' == 'by module' here. Each loader group maps 1:1 to a target module. The 19
      (from the 2026-05-29 market surface), grouped by their target module:
        LMS-COURSE-DELIVERY: question_banks, cmi5_assignable_units, lrs_statement_endpoints,
          observation_checklists, observation_checklist_results
        LMS-ILT-DELIVERY: training_room_bookings, session_rosters, session_cancellations
        LMS-PATHS: skill_targets, learning_recommendations
        LMS-CREDENTIALS: credential_verifications, certification_renewals
        LMS-COMPLIANCE-TRAINING: gxp_training_signoffs, phishing_simulations, phishing_simulation_results
        TRAINING-RECORDS-STARTER: dpo_training_acknowledgements, pci_dss_awareness_records
        LMS-CT-GDPR: data_retention_policies (reconcile vs existing records_retention_policies 433)
        LMS-AUTOMATION: reminder_schedules
      Compliance group interacts with q1 (Refactor C); GDPR group interacts with q2 (Refactor A); skill_targets
      unblocks q4 option (b). The b3 candidates (q10) are a separate, additive set on top of these 19.
    options:
      - "Ship by module group (course-delivery / ILT / paths / credentials / compliance / starter / GDPR / automation)"
      - "Subset (name which module groups)"
      - "Defer"
    why: "Anchored to flagship-vendor surfaces / specific regulations. Sequence the compliance group after q1 and the GDPR group after q2."

  - id: B2-DOMAIN-REGULATIONS
    summary: "domain_regulations lists only FERPA; add GDPR (and HIPAA/OSHA/SOX)? User asked why this is separate from q2."
    question: "Add the regulations the compliance + privacy modules bring into scope?"
    user_question: "why is it separate from q2?"
    agent_answer: >-
      Separate because q2 is a STRUCTURAL ownership decision (who masters the privacy RECORDS: LMS vs a
      shared PRIV-MGMT domain - expensive, deferred, cross-domain) while q9 is cheap, additive scope
      METADATA (which statutes the LMS market touches, tagged on the domain_regulations junction for
      discoverability + filtering). The tags are true regardless of where the records live: LMS delivers
      GDPR/HIPAA/OSHA/SOX-mandated training and carries those evidence masters today, so the domain should
      be tagged now even if privacy ownership later moves to PRIV-MGMT. q9 can be answered yes today without
      waiting on q2. Live: only FERPA (mandatory) is tagged.
    options:
      - "Add GDPR + HIPAA + OSHA + SOX (recommended)"
      - "Add GDPR only"
      - "Leave as FERPA only"
    why: "The compliance + privacy modules already bring these statutes into scope. Purely additive metadata, independent of the q2 structural move."
  - id: B2-B9D-MISTAG-PRIVACY
    summary: "B9d MIS-TAG (destructive sign-off): 2 privacy handoffs are tagged 11.2.2 'Manage regulatory compliance', which doesn't fit; they should NOT be re-pointed to a training process. Interacts with q2 (privacy ownership)."
    question: "What to do with the 2 privacy-record process tags (gdpr_consent_records, data_deletion_requests under 11.2.2)?"
    user_question: ""
    agent_answer: >-
      #1313 (gdpr_consent_record.withdrawn, LMS->HCM) and #1314 (data_deletion_request.fulfilled,
      LMS->HCM) carry privacy/DSAR records, not training completions, so 'Train employees on regulatory
      requirements' (2.1.3.5.1) is the wrong target for them. Where these should land depends on q2: if
      privacy moves to a canonical PRIV-MGMT owner, the correct APQC home is a privacy/DSAR process there;
      if privacy stays in LMS interim, the tag is best deleted until that process is realized.
    options:
      - "(a) Hold pending q2 (privacy ownership); leave the 2 tags as-is for now (recommended)"
      - "(b) Delete the 2 mis-tagged rows now"
      - "(c) Re-point them anyway to 2.1.3.5.1 with the training set"
    why: "These are privacy records, not training; their correct process home is gated on the q2 ownership decision. Destructive either way -> sign-off (Rule #21)."
    blocked_by:
      - {type: user_decision, ref: B2-REFACTOR-A}
    affected_handoff_processes:
      - {process_tag: "11.2.2 (pid 369)", handoffs: [1313, 1314], payloads: "gdpr_consent_records / data_deletion_requests"}

