b2:
  - id: B2-SKILLS-MGMT-ATTRIBUTION
    summary: "M4: resolve the LMS x SKILLS-MGMT capability orphan (capability id 20). User asked for the GENERAL pattern, not a one-off ruling."
    question: "For 'one domain's entity links to an optional entity owned by another domain', do we delete the orphan LMS capability link (SKILLS-MGMT owns the capability), or model it as the optional embedded-master pattern and realize it in LMS-PATHS?"
    user_question: "how do we handle that situation in general? isn't that usually the optional embedded-master pattern? anything different here?"
    agent_answer: >-
      The user's instinct is right about the GENERAL data-entity pattern but this specific orphan is on a
      different junction. Two distinct catalog mechanisms are in play and the answer differs by which one:
      (1) For a DATA ENTITY one domain needs but another owns, the catalog pattern is NOT a shared module
      via domain_module_host_domains (that junction is deprecated, references/deprecations.md 2026-06-16);
      it is a per-domain row on domain_module_data_objects with a role that expresses the relationship:
      master in the owning module, embedded_master where a standalone deployment needs a local shell that
      defers to the canonical master, consumer where the domain only reads it. That IS the "optional
      embedded master" the user means, and LMS already uses it (e.g. employees as embedded_master in
      LMS-CT-GDPR, records_retention_policies 433 now consumer in LMS-CT-GDPR). Nothing special.
      (2) This orphan is NOT a data entity though: it is a row on capability_domains (capabilities <-> domains),
      which has no master/embedded_master/consumer qualifier, only a "semantic home" flag. A capability is
      realized by a module (domain_module_capabilities) or it is an orphan. 'Skills Management' (cap 20) is
      semantically owned and realized by the SKILLS-MGMT domain; it appears on LMS only because LMS-COURSE-
      DELIVERY consumes course_tags for skill tagging (downstream consumption, not realization). So the
      capability-junction has no embedded-master middle option: either (a) delete the LMS capability_domains
      link (SKILLS-MGMT is the owner; cleanest, removes the orphan, destructive so needs sign-off), or
      (b) make LMS-PATHS genuinely realize it now that skill_targets (id 1277, path-step <-> skill +
      proficiency) has shipped, by adding a domain_module_capabilities row (additive). The 'optional
      embedded master' shape does not apply to a capability link the way it does to a shared data entity;
      that difference is the answer to "anything different here?".
    options:
      - "(a) DELETE the LMS x capability-20 capability_domains row (recommended; SKILLS-MGMT owns and realizes it; the LMS appearance is downstream course_tag consumption, not realization). Destructive -> sign-off."
      - "(b) KEEP the link and add a domain_module_capabilities row so LMS-PATHS (34) realizes capability 20, now that skill_targets (1277) has shipped. Additive, but asserts LMS co-realizes Skills Management."
    why: "User asked the general rule. The general data-entity rule is the per-domain role on domain_module_data_objects (embedded_master/consumer), and LMS already follows it. But this orphan is a capability_domains link, which has no embedded-master option, so it reduces to delete-the-orphan vs realize-it-here. Destructive (a) needs sign-off."
    evidence: >-
      Capability ownership pattern across the catalog: a capability is mastered/realized by the domain whose
      flagship products deliver it. Skills Management as a market is owned by skills-intelligence / talent-
      marketplace vendors (Cornerstone Skills Graph, Workday Skills Cloud, SAP SuccessFactors Talent
      Intelligence Hub, Eightfold, Gloat) - these MASTER the skills taxonomy and proficiency model. Flagship
      LMS products (Docebo, 360Learning, Absorb, Cornerstone Learning) CONSUME a skills taxonomy to tag
      courses and align learning paths; they do not master the skills graph. So the catalog's realizing
      owner is SKILLS-MGMT and LMS is a consumer, which is why the LMS capability link reads as an orphan.
      The general "shared entity" reuse pattern (per-domain embedded_master/consumer on domain_module_data_
      objects, deprecating domain_module_host_domains) is documented in references/deprecations.md (Knowledge
      Mgmt: ITSM masters knowledge_articles, HRSD embedded_master, CSM contributor on the SAME entity).

  - id: B2-1121-ROUTING
    summary: "B10b: pick the LMS-side target module for inbound handoff 1121 (HRSD -> LMS, case_category.updated), or retire it. User asked how other vendors handle it."
    question: "Which LMS module receives HR-case-category propagation: LMS-COMPLIANCE-TRAINING (compliance-tag inheritance) or LMS-PATHS (learning-path assignment), or is the handoff mis-modeled and retired?"
    user_question: "how are other vendors handling that?"
    agent_answer: >-
      How flagship vendors handle it: in ServiceNow HRSD the HR case lifecycle (Case Lifecycle Configurator)
      attaches downstream workflows to a case category, and the ServiceNow <-> Workday Learning integration
      pushes learning tasks/to-dos onto the case so HR and learning teams drive compliance training off the
      case. The dominant pattern is compliance-driven: a sensitive case category (harassment complaint,
      safety incident) auto-assigns the MANDATORY remediation/compliance training for that category and
      tracks completion as case evidence. The developmental-path variant (a case type maps to a growth path)
      exists but is the minority shape and is usually handled in the talent/learning-path layer, not the
      case channel. So the vendor-grounded default is LMS-COMPLIANCE-TRAINING (compliance-tag inheritance).
    options:
      - "(a) LMS-COMPLIANCE-TRAINING (33): case category drives compliance-tag inheritance (e.g. harassment-complaint category auto-tags mandatory harassment training). Additive PATCH of target_domain_module_id."
      - "(b) LMS-PATHS (34): case category drives learning-path assignment (remedial/developmental). Additive PATCH."
      - "(c) Mis-modeled: retire the handoff if HRSD case taxonomy should not reach LMS. Destructive -> sign-off."
    why: "Now vendor-grounded (was 'no preset'). The flagship pattern (ServiceNow HRSD + Workday Learning) is compliance-driven case-to-training assignment, so (a) is the recommended default; (b) covers the developmental-path minority case; (c) is the destructive retire option."
    evidence: >-
      ServiceNow HRSD Case Lifecycle Configurator attaches workflows (including learning) to a case category;
      the ServiceNow HRSD <-> Workday Learning integration (ServiceNow Store) pulls Workday Learning tasks
      onto the case so compliance training is assigned and tracked from the HR case. Workday auto-(re)assigns
      compliance training on a schedule and via case-driven rules. SAP SuccessFactors similarly drives
      mandatory training assignment from HR events. The cross-vendor norm is case-category -> MANDATORY
      compliance training (the harassment-complaint -> harassment-training shape), favoring LMS-COMPLIANCE-
      TRAINING; developmental-path assignment off a case is the minority pattern and lives in the path layer.

