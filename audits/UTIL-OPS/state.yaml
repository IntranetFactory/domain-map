b2:
  - id: B2-1
    summary: "Which UTIL-OPS masters carry personal data (B4 pattern flag flips)?"
    question: "PATCH has_personal_content=true on which subset of {660, 661, 662, 663, 664, 665, 666, 667}?"
    options:
      - "(a) audit-proposed 4 of 8: 660 utility_customer_accounts + 662 meter_reads + 663 service_connections + 667 utility_bills"
      - "(b) conservative reading: all 8 (utility_meters identified by serial-by-premises is personal-by-association under EU smart-meter case law; utility_assets carries crew names; outage_events carries affected-customer lists; utility_service_orders carries customer identifiers)"
      - "(c) different subset specified by user"
    why: "Audit cannot decide unilaterally between literalist (4) and conservative (8); both readings are defensible per Rule #12 / Rule #18."

  - id: B2-2
    summary: "Outage handoff 942 payload mismatch with relationship row 470."
    question: "Handoff 942 carries payload outage_events; relationship row 470 maps outage_events opens customer_cases. Which shape do we keep?"
    options:
      - "(a) keep handoff 942 payload as outage_events (CSM consumes outage record), CSM authors its own intra-domain customer_case creation"
      - "(b) repoint handoff 942 payload to customer_cases (id 103)"
      - "(c) author a second handoff so both shapes coexist"

  - id: B2-3
    summary: "Does UTIL-OPS publish raw meter reads to ERP-FIN (handoff 944), or only billed amounts (handoff 939)?"
    question: "Handoff 944 implies raw AMI data goes to finance, which contradicts flagship architectures where raw reads flow into the MDM layer + billing engine and ERP-FIN receives only the posted bill."
    options:
      - "(a) DELETE handoff 944"
      - "(b) repoint target to a future UTIL-AMI-MDMS domain when promoted from queue"
      - "(c) keep with notes (requires user-approved wording per Rule #15)"
    why: "Depends on Bucket 3 #2 (UTIL-AMI-MDMS promotion). If demote-and-promote lands, option (b); otherwise option (a) is cleaner."

  - id: B2-4
    summary: "Asset-failure fan-out: ITSM service_incident OR FSM service_order?"
    question: "Trigger utility_asset.failed fires handoff 941 (FSM, payload utility_assets) AND handoff 943 (ITSM, payload service_incidents). Is this real OT/IT fan-out, or cross-wiring?"
    options:
      - "(a) keep both, declare it real fan-out"
      - "(b) remove handoff 943, route asset failure only to FSM (OT path)"
      - "(c) split the trigger into utility_asset.failed_ot and it_asset.failed (recommended)"

  - id: B2-5
    summary: "Is UTIL-OPS the right umbrella, or should the queued candidates absorb the masters? (drives all of Bucket 3)"
    question: "Bucket 3 candidates split the 8 masters cleanly across CIS-UTIL, UTIL-AMI-MDMS, UTIL-OMS, UTIL-WAM. UTIL-OPS as an umbrella may not pass the point-solution-market test (Rule #2). Which path?"
    options:
      - "(a) keep UTIL-OPS as umbrella, modularize into 4 modules per B1B-S1 proposal"
      - "(b) demote UTIL-OPS to leadership-tier landing domain (no masters, derived-signals module only), promote CIS-UTIL + UTIL-AMI-MDMS + UTIL-OMS + UTIL-WAM as separate domains, migrate every master"
      - "(c) hybrid: keep UTIL-OPS but pull only CIS-UTIL out as a separate domain"
    why: "This is the structural decision. Every b1b item that references modules depends on this answer."

  - id: B2-6
    summary: "Channel primitive policy for UTIL-OPS notifications (F7 fix)."
    question: "PATCH send_email to notify_person on new module-scoped skills, keep send_email with workflow justification, or layer both?"
    options:
      - "(a) PATCH to notify_person on new module-scoped skills once they exist (folds into B1B-S13 / S15)"
      - "(b) keep send_email and author workflow justification per F7 (requires user-approved skill_tools.notes wording per Rule #15)"
      - "(c) author both notify_person for generic + send_sms/make_phone_call on a future outage-mgmt skill specifically for emergency mass notification"

  - id: B2-3-COPY
    summary: "Author A4 catalog_tagline + catalog_description wording for UTIL-OPS (Rule #20)."
    question: "Both fields are empty on domain 49. Rule #20 forbids writing agent-authored copy without per-row user approval of the exact text. What wording (or 'I will draft, please review')?"
    options:
