b2:
  - id: B2-S1
    summary: "M7 multi-master reconciliation path for customers (97), employees (31), suppliers (206)"
    question: >-
      The legacy domain_data_objects rollup claims MDM as master+required on
      customers, employees, suppliers. The catalog has CRM-ACCT-MGT mastering
      customers and HCM-CORE-WORKER mastering employees in
      domain_module_data_objects. suppliers has no DMDO master row anywhere.
      Path (a) MDM canonical, demote CRM and HCM to embedded_master; (b) MDM
      consumes customers / employees / suppliers as consumer+required and
      masters only the golden_record / source_record / match_rules /
      merge_rules entities (RECOMMENDED, matches actual MDM market shape);
      (c) Mixed (specify per entity).
    options: ["a-mdm-canonical", "b-mdm-consumer", "c-mixed"]
    why: >-
      Architectural intent and catalog-wide canonical mastering strategy. Path
      (b) matches Informatica/Reltio/Profisee/Stibo/Semarchy market shape
      (sit alongside, not replace, the source-of-record systems).

  - id: B2-S2
    summary: "MDM module split (1 vs 2 vs more)"
    question: >-
      B1B-S1 needs at least one module_kind='full' row. Two plausible splits:
      (1) single MDM-GOLDEN-RECORD-MGMT mastering all 6 MDM-owned entities;
      (2) MDM-GOLDEN-RECORDS (315/316/317/320) + MDM-MATCH-MERGE-ENGINE
      (318/319 plus stewardship workflow). Rule #14 allows (1) because MDM has
      2 capabilities (below the 3-capability split threshold). Recommend (1)
      initially, split later if stewardship workflow differentiates from
      match/merge engine.
    options: ["a-single-mdm-golden-record-mgmt", "b-two-modules-records-and-engine", "c-larger-split"]
    why: "Modularization shape gates every downstream Bucket-1 item except B1A-H1 and the user-wording items."

  - id: B2-S3
    summary: "domains.business_logic em-dash replacement wording (Rule #9 + Rule #15 boundary)"
    question: >-
      Current business_logic text contains U+2014 em-dash. Proposed wording:
      'Matching and survivorship algorithms (deterministic + probabilistic),
      hierarchy management, and stewardship workflows, the irreducible kernel
      beneath any MDM hub.' (comma replaces em-dash). Per Rule #15 wording
      boundary, user owns exact text.
    options: ["a-approve-proposed", "b-supply-alternative"]
    why: "Project Rule #9 forbids em-dash; Rule #15 forbids agent-authored wording for sensitive prose columns."

  - id: B2-S4
    summary: "CUSTOMER-360 vs IDENTITY-RESOLUTION capability scope between MDM and CDP"
    question: >-
      Both capabilities (255 IDENTITY-RESOLUTION and 310 CUSTOMER-360) live
      under MDM. CDP (domain 72) also touches both functionally (CDP profiles +
      identity graphs). Is the dual-ownership intentional (MDM masters,
      CDP operationalizes) or should one capability move? Bucket-3 RDM
      candidate is independent.
    options: ["a-both-stay-mdm", "b-identity-resolution-to-cdp", "c-customer-360-to-cdp", "d-dual-host"]
    why: "Capability scope decision; informs Bucket-3 modularization candidate and CDP-MDM boundary pass."

  - id: B2-S5
    summary: "Lifecycle state machine names per MDM master"
    question: >-
      Once B1B-S1 lands modules, per Rule #12 each master+required workflow
      data_object needs lifecycle states. Proposed shapes carried as
      affected_masters on B1B-B12. Confirm names or supply alternatives.
    options: ["per-master yes/no with optional alternate names"]
    why: "Lifecycle states are the source of workflow-gate permissions; permission_verb_override needs user input on non-obvious verbs."

  - id: B2-S6
    summary: "Stewardship role catalog shape"
    question: >-
      The three baseline roles (admin/manage/read) per module are mechanical,
      but workflow-specific MDM roles need user input. (a) Single data_steward
      role + match_curator + merge_approver + mdm_admin (recommend);
      (b) Per-master stewards (3 roles); (c) Different shape.
    options: ["a-unified-steward", "b-per-master-stewards", "c-other"]
    why: "Role design owns the cross-module permission bundle pattern that downstream RBAC enforcement reads."

  - id: B2-S7
    summary: "Compliance regulation linkage (GDPR / CCPA / KYC-AML / DCAM)"
    question: >-
      Zero domain_regulations rows for MDM. GDPR (right-to-erasure cascading
      from golden record), CCPA (consumer data subject rights), KYC-AML
      (financial-services customer mastering), DCAM (DAMA-DMBOK data
      management standards body) are strong candidates. Approve set, subset,
      or defer to dedicated compliance audit pass.
    options: ["a-load-all-four", "b-subset", "c-defer"]
    why: "Compliance basis informs whether right-to-erasure events (B1B-S8 candidate set) are required vs optional."

  - id: B2-S8
    summary: "B3 bare-word naming arbitration for match_rules / merge_rules / source_records"
    question: >-
      Three MDM-owned masters use bare-word snake_case names (match_rules,
      merge_rules, source_records). Per Rule #9 bare-words require either
      is_canonical_bare_word=true + naming_authority_rationale, OR rename to
      domain-prefixed mdm_* form. MDM is the natural canonical authority for
      match / merge / survivorship terminology, but source_records collides
      semantically with system-of-record terminology used elsewhere.
    options: ["a-claim-canonical-all-three", "b-rename-all-three-with-mdm-prefix", "c-mixed-keep-match-merge-rename-source"]
    why: "Naming arbitration is a per-row decision; Rule #9 forbids silent collision-prone inserts."

  - id: B2-A4
    summary: "A4 Rule #20 buyer-voice copy for domains.catalog_tagline and catalog_description"
    question: >-
      MDM domain row has empty catalog_tagline and catalog_description. Per
      Rule #20 the agent drafts buyer-voice copy (workflow + value) and
      surfaces to user for review BEFORE writing. Should the agent produce a
      draft now (next pass), or defer until module set lands?
    options: ["a-draft-now", "b-defer-until-modules-land", "c-supply-direct-wording"]
    why: "Rule #20 overwrite-without-approval forbidden once non-empty; backfill drafts require user approval before write."

  - id: B2-B11
    summary: "B11 vendor-specific aliases on MDM-owned masters (low priority)"
    question: >-
      MDM-owned masters (315/316/317/318/319/320) carry zero aliases. Vendor
      synonyms ('Best Record' from Informatica, 'Master Object' from Stibo)
      would add cross-vendor mapping. Or skip as self-explanatory.
    options: ["a-load-1-or-2-aliases-per-master", "b-skip-self-explanatory"]
    why: "B11 exemption is acceptable for self-explanatory masters; vendor synonyms are an editorial decision."

