    question: >-
      The baseline read/manage/admin pattern is mechanical, but workflow-specific MDM personas
      need user input. (a) Single data_steward persona + match_curator + merge_approver +
      mdm_admin (recommend); (b) Per-master stewards (3 personas); (c) Different shape.
      Drives the persona pass (B1B-PERSONAS) and the user-edge shape (B1B-S7).
    options: ["a-unified-steward", "b-per-master-stewards", "c-other"]
    why: "Persona design owns the cross-module bundle pattern that downstream RACI + user-edge authoring reads."

  - id: B2-S7
    summary: "Compliance regulation linkage (GDPR / CCPA / KYC-AML / DCAM)"
    question: >-
      Zero domain_regulations rows for MDM. GDPR (right-to-erasure cascading from golden
      record), CCPA (consumer data subject rights), KYC-AML (financial-services customer
      mastering), DCAM (DAMA-DMBOK data management standards body) are strong candidates.
      Approve set, subset, or defer to dedicated compliance audit pass.
    options: ["a-load-all-four", "b-subset", "c-defer"]
    why: "Compliance basis informs whether right-to-erasure events (B1B-S8 candidate set) are required vs optional."

  - id: B2-S8
    summary: "B3 bare-word naming arbitration for match_rules / merge_rules / source_records"
    question: >-
      Three MDM-owned masters use bare-word snake_case names (match_rules, merge_rules,
      source_records). Per Rule #9 bare-words require either is_canonical_bare_word=true +
      naming_authority_rationale, OR rename to domain-prefixed mdm_* form (a rename is a
      DESTRUCTIVE restructure). MDM is the natural canonical authority for match / merge /
      survivorship terminology, but source_records collides semantically with
      system-of-record terminology used elsewhere.
    options: ["a-claim-canonical-all-three", "b-rename-all-three-with-mdm-prefix", "c-mixed-keep-match-merge-rename-source"]
    why: "Naming arbitration is a per-row decision; Rule #9 forbids silent collision-prone inserts."

  - id: B2-B11
    summary: "B11 vendor-specific aliases on MDM-owned masters (editorial, low priority)"
    question: >-
      MDM-owned masters (315/316/317/318/319/320) carry zero aliases. Vendor synonyms
      ('Best Record', 'Master Object', 'Golden Record') would add cross-vendor mapping but are
      vendor-specific editorial choices, and these masters are largely self-explanatory.
      Load a small generic synonym set per master, or skip as self-explanatory.
    options: ["a-load-1-or-2-aliases-per-master", "b-skip-self-explanatory"]
    why: "B11 exemption is acceptable for self-explanatory masters; synonyms are an editorial decision."

