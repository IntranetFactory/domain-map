b2:
  - id: B2-B9D-RETAG-272
    summary: "B9d RE-TAG (destructive): outbound handoff 272 (MDM->CDP, customer_golden_record.updated) is tagged with a coarse master-data process; re-point to the specific customer one"
    question: >-
      Handoff 272 carries customers to CDP and is tagged to PCF 2.1.4 'Manage product and
      service master data' (process_id 115). A more specific code for that exact payload,
      3.5.2.5 'Manage customer master data', already exists in the catalog. B9d recommends
      re-pointing the tag from 115 to 3.5.2.5. This edits a row MDM authored (handoff_processes
      on 272) and is a DESTRUCTIVE re-point, so it needs sign-off.
    options: ["a-repoint-to-3.5.2.5", "b-keep-115", "c-other"]
    why: >-
      Re-pointing aligns the handoff's APQC tag with the actual customer-master payload so the
      cross-domain reconciliation resolves cleanly. The new tag row lands record_status='new'.
  - id: B2-B9D-MISTAG-274
    summary: "B9d MIS-TAG (destructive): outbound handoff 274 (MDM->HCM, employee_golden_record.created) carries an extra mis-categorized master-data tag alongside the correct employee one"
    question: >-
      Handoff 274 carries employees to HCM and holds TWO tags: 7.7.3 'Manage and maintain
      employee data' (process_id 243, correct, RESOLVED) and 4.1.5.1 'Maintain master data'
      (process_id 771). B9d flags 771 as a mis-tag: the employee payload is already realized
      under the 7.x employee-data subtree, so the generic master-data tag is redundant/wrong.
      Recommended: re-point 771 to 7.6.2 'Manage separation' OR delete the 274->771 row,
      keeping only 243. Both are DESTRUCTIVE edits to MDM-authored rows; needs sign-off.
    options: ["a-delete-274-771", "b-repoint-to-7.6.2", "c-keep-both"]
    why: >-
      Removing the redundant generic master-data tag leaves 274 cleanly RESOLVED under the
      employee-data process. Deletion is destructive (Rule #1/#21) and is never done unapproved.
  - id: B2-S1
    summary: "M7 multi-master reconciliation path for customers (97), employees (31), suppliers (206)"
    question: >-
      The legacy domain_data_objects rollup claims MDM as master+required on customers,
      employees, suppliers. The catalog has CRM-ACCT-MGT mastering customers and
      HCM-CORE-WORKER mastering employees in domain_module_data_objects. suppliers has no
      DMDO master row anywhere. Path (a) MDM canonical, demote CRM and HCM to embedded_master;
      (b) MDM consumes customers / employees / suppliers as consumer+required and masters only
      the golden_record / source_record / match_rules / merge_rules entities (RECOMMENDED,
      matches actual MDM market shape); (c) Mixed (specify per entity). Realizing the choice
      is a DESTRUCTIVE DELETE/demote of the legacy rollup master rows; awaits this decision.
    options: ["a-mdm-canonical", "b-mdm-consumer", "c-mixed"]
    why: >-
      Architectural intent and catalog-wide canonical mastering strategy. Path (b) matches
      Informatica/Reltio/Profisee/Stibo/Semarchy market shape (sit alongside, not replace, the
      source-of-record systems).

  - id: B2-S2
    summary: "MDM module split (1 vs 2 vs more): the unbuilt-domain build decision"
    question: >-
      B1B-S1 needs at least one module_kind='full' row. Two plausible splits: (1) single
      MDM-GOLDEN-RECORD-MGMT mastering all 6 MDM-owned entities; (2) MDM-GOLDEN-RECORDS
      (315/316/317/320) + MDM-MATCH-MERGE-ENGINE (318/319 plus stewardship workflow). Rule #14
      allows (1) because MDM has 2 capabilities (below the 3-capability split threshold).
      Recommend (1) initially, split later if stewardship workflow differentiates from
      match/merge engine. The agent will NOT scaffold the build until this is decided.
    options: ["a-single-mdm-golden-record-mgmt", "b-two-modules-records-and-engine", "c-larger-split"]
    why: "Modularization shape gates every downstream Bucket-1 item (B1B-S1 cascade)."
    evidence: >-
      The flagship MDM hubs (Informatica Intelligent MDM, Reltio Connected Data
      Platform, Profisee, Stibo STEP, Semarchy xDM) package golden-record mastering and
      the match/merge/survivorship engine as facets of one unified hub product, not as
      separately-licensed modules, supporting the single-module floor (option a); the
      deeper substrate that would justify a larger split stays a Bucket-3 candidate.

  - id: B2-S3
    summary: "domains.business_logic em-dash replacement wording (Rule #9 + Rule #15 boundary)"
    question: >-
      Current business_logic text contains U+2014 em-dash. Proposed wording: 'Matching and
      survivorship algorithms (deterministic + probabilistic), hierarchy management, and
      stewardship workflows, the irreducible kernel beneath any MDM hub.' (comma replaces
      em-dash). This is a DESTRUCTIVE overwrite of a non-empty value; per Rule #15 the user
      owns the exact text.
    options: ["a-approve-proposed", "b-supply-alternative"]
    why: "Project Rule #9 forbids em-dash; Rule #15 forbids agent-authored wording for sensitive prose columns."

  - id: B2-S4
    summary: "CUSTOMER-360 vs IDENTITY-RESOLUTION capability scope between MDM and CDP"
    question: >-
      Both capabilities (255 IDENTITY-RESOLUTION and 310 CUSTOMER-360) live under MDM. CDP
      (domain 72) also touches both functionally (CDP profiles + identity graphs). Is the
      dual-ownership intentional (MDM masters, CDP operationalizes) or should one capability
      move? Bucket-3 RDM candidate is independent.
    options: ["a-both-stay-mdm", "b-identity-resolution-to-cdp", "c-customer-360-to-cdp", "d-dual-host"]
    why: "Capability scope decision; informs Bucket-3 modularization candidate and CDP-MDM boundary pass."
    evidence: >-
      The CDP vendors (Segment, Tealium, mParticle, Simon Data, Treasure Data) package
      identity resolution and Customer 360 as a real-time activation layer that consumes
      the golden record, while the MDM hubs (Informatica, Reltio, Stibo) master it under
      stewardship; both capabilities are therefore mastered at MDM with CDP operationalizing
      (option a), not a capability move.

