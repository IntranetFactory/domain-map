    summary: "Lifecycle state machine names per MDM master"
    question: >-
      Once B1B-S1 lands modules, per Rule #12 each operational_workflow master needs lifecycle
      states. Proposed shapes carried as affected_masters on B1B-B12. Confirm names or supply
