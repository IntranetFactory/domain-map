b2:
  - id: B2-SOP-SCOPE
    summary: "Confirm bounded scope: SOP-MGMT masters its own procedure + acknowledge surface across 2 core full modules; KMS/GRC/ECM records are consumer+optional (not embedded_master, not re-mastered). Standalone viability does NOT depend on them."
    question: |
      Confirm option (a): SOP-MGMT masters procedures, process_documents, procedure_steps,
      document_revisions, document_assignments, acknowledgment_records across two core full modules, and
      links knowledge_articles (KMS), policies (GRC), document_versions (ECM) as consumer + optional
      cross-links that light up only when those domains are co-installed.
    options:
      - "Bounded + consumer/optional (recommended): the distinctive operator-facing set is mastered here; KMS/GRC/ECM records are consumer + optional enrichment links; standalone SOP-MGMT is fully viable without them."
      - "Embedded_master the adjacent records: carry local shells of knowledge_articles / policies / document_versions, demote to canonical master when KMS/GRC/ECM present."
      - "Broad re-master: keep independent copies of knowledge articles, policies, and a document repository."
    evidence: |
      User asked twice (a2 2026-06-27 "isn't our solution embedded_master?"; a1 2026-06-27 "when I just use
      SOP would I not need knowledge articles or GRC policies to make SOP viable?"). Answer: NO, standalone
      SOP-MGMT is fully viable without KMS knowledge_articles or GRC policies. The full loop (author ->
      publish -> assign -> acknowledge -> periodic review) runs entirely on records SOP-MGMT masters
      itself. Flagships SweetProcess, Process Street, Trainual, Whale, Dozuki ship and sell without a
      generic knowledge-article repository or a GRC policy register. The adjacent records are enrichment
      only when co-installed: a procedure may cross-link to a related KB article (KMS) or to the policy it
      implements (GRC), and may defer heavyweight storage to ECM document_versions. None are required to
      operate, so the role is consumer + OPTIONAL (satisfies M9 self-containment by degrading gracefully),
      NOT embedded_master (no local copy carried) and NOT consumer + required (that would break standalone
      deploy). The only outside record needed standalone is the platform built-in `users` (consumer).
      Naming: document_revisions (not ECM's document_versions id 430); procedure_steps /
      step_media_attachments (work_instructions id 596 is taken by a manufacturing/MES entity).
      >=3 capabilities => >=2 full modules (Rule #14).
    why: |
      Market-shape (master-vs-consume + role mechanism + module count). User has turned it into a
      clarifying/viability question twice rather than picking; answered, kept open for an explicit confirm.
      This is the last open gate; the Phase A+B load runs once it is confirmed.

