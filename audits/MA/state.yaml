b2:
  - id: B2-M1
    summary: "Module split for the MA Phase M load (5 / 4 / 3 modules)."
    question: "How should MA be split into modules? Per Rule #14, the 8-capability count requires >=2 module_kind=full rows. Recommended: 4 modules (option b)."
    options:
      - "(a) 5 modules: MA-CAMPAIGN-AUTHORING (masters marketing_campaigns + marketing_emails), MA-JOURNEY-ORCH (masters nurture_journeys), MA-LEAD-SCORING (masters lead_scores), MA-LANDING-PAGES (masters marketing_forms), MA-ATTRIBUTION (no master, derived-signals)."
      - "(b) 4 modules: same as (a) but fold MA-ATTRIBUTION into MA-CAMPAIGN-AUTHORING. Recommended."
      - "(c) 3 modules: fold both MA-ATTRIBUTION and MA-LANDING-PAGES into MA-CAMPAIGN-AUTHORING."
      - "(d) Other split (specify)."
    why: "Architectural choice. Carried over from 2026-05-30 B2-S1."

