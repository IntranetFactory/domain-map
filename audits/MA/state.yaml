    question: "Approve the per-module + domain catalog_tagline / catalog_description draft, rewrite, or stage it (modules first, then domain)?"
    options:
      - "Approve drafts. Per-module taglines + 1-3 paragraph descriptions for MA-CAMPAIGN-AUTHORING (197), MA-JOURNEY-ORCH (198), MA-LEAD-SCORING (199), MA-LANDING-FORMS (200); domain tagline `Orchestrate marketing emails, nurture journeys, and lead-scoring across email, SMS, push, and the web.` + 3-paragraph domain description."
