    rationale: "Medical-device / IoMT security (device discovery, risk-based vulnerability prioritization tied to FDA recalls and ICS-CERT advisories, network segmentation policy generation). Gartner runs a dedicated 'Medical Device Security Solutions' market for it. Distinct buyer (hospital security / CISO team) from clinical engineering / HTM. Integrates WITH the CMMS (Nuvolo bundles an OT-security module and integrates Asimily-class inventory), but the pure-plays are a separate market and do not master the CMMS work-order / PM / calibration surface."
