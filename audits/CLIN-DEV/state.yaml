      - "User supplies exact replacement wording"
    why: "Original wording predates the em-dash ban; PATCH is a content edit on a domains core field, surface for explicit per-row approval."

  - id: B2-S2
    summary: "CLIN-DEV module split decision (Phase M precursor)."
    question: "How should the CLIN-DEV market be modularized into domain_modules rows? This decision gates B1B-S1 and 5 other b1b items."
    options:
      - "Two-module: CLIN-DEV-INVENTORY (medical_devices, device_maintenance_logs, device_calibration_records, sterilization_cycles, clinical_engineering_work_orders) + CLIN-DEV-SAFETY-VIGILANCE (device_recalls, device_incident_reports)"
      - "Single CLIN-DEV-CORE module covering all 7 masters"
      - "Three-module: CLIN-DEV-INVENTORY + CLIN-DEV-SAFETY-VIGILANCE + CLIN-DEV-STERILE-PROCESSING (pulls sterilization_cycles into a dedicated module)"
    why: "Right split depends on buyer persona: hospital Clinical Engineering only, or also Sterile Processing Department as a separate budget owner."

  - id: B2-S3
    summary: "Business-function owner for CLIN-DEV."
    question: "The current business_function_domains row points to Research and Development as owner. Clinical Device Management in hospitals is typically owned by Information Technology (CE under IT), Operations (CE under Facilities), or Compliance (recall and adverse-event surface). R&D reads like a category miss carried over from medical-device manufacturer mental model."
    options:
      - "Repoint owner to Information Technology"
      - "Repoint owner to Operations"
      - "Add Compliance as additional owner or contributor for recall/adverse-event surface"
      - "Leave R&D, re-scope catalog row to medical-device manufacturers"
    why: "Buyer persona ambiguous between hospital CE operations and medical-device-manufacturer R&D."

  - id: B2-S4
    summary: "Pattern-flag positive re-evaluation per Rule #12."
    question: "All 7 masters carry has_personal_content=false, has_submit_lock=false, has_single_approver=false. Likely positives need yes/no per flag."
    options:
      - "device_incident_reports.has_personal_content=true (patient identifier in adverse-event report)"
      - "device_incident_reports.has_submit_lock=true (immutable after regulator filing)"
      - "device_calibration_records.has_submit_lock=true (21 CFR Part 11 audit-trail integrity)"
      - "device_recalls.has_single_approver=true (recall coordinator approves issuance)"
    why: "Pattern flags are workflow-shape judgments. Rule #15 forbids parking reasoning in notes."

  - id: B2-S5
    summary: "Manufacturer-vs-hospital scope: should manufacturer-only regulations move to queued MED-DEVICE-QMS candidate?"
    question: "Current footprint mixes hospital clinical engineering (PM scheduling, recall response, incident reporting) and medical-device-manufacturer post-market surveillance (FDA eMDR, 510(k), 21 CFR 820). Masters fit hospital-side; regulations lean manufacturer-side."
    options:
      - "Leave CLIN-DEV as hospital-side, remove manufacturer-only regulations (510(k), QSR 820) from domain_regulations"
      - "Keep all 7 regulations, clarify scope in catalog_description"
      - "Wait for MED-DEVICE-QMS Phase 0 promotion, then re-scope"
    why: "Regulatory list ambiguous; underlying masters look hospital-side only."

  - id: B2-S6
    summary: "ITSM payload mismatch on handoffs 893 and 898."
    question: "Handoffs 893 (work_order.opened to ITSM) and 898 (calibration.due to ITSM) carry payload service_incidents (data_object id 47, target_domain_module_id=38 ITSM-INCIDENT-MGMT). Cross-domain relationships 661 (clinical_engineering_work_orders surfaces_in service_requests, id 48) and 662 (device_calibration_records schedules_in service_requests) point at service_requests instead. Either the handoff payload or the relationship target is wrong."
    options:
      - "Re-target the 2 handoff rows to service_requests + target_domain_module_id=39"
      - "Re-target the 2 relationship rows to service_incidents"
      - "Split: register-event handoff to service_requests, calibration-overdue handoff to service_incidents (the time-critical bit)"
    why: "Workflow-shape decision: clinical-engineering work arriving in ITSM as service request the desk picks up, or as on-call incident."

