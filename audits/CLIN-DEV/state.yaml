b2:
  - id: B2-S1
    summary: "Em-dash pollution on domains.business_logic for domain_id=50 (DESTRUCTIVE overwrite, surfaced)."
    question: "domains.business_logic carries a U+2014 em-dash between 'devices' and 'mostly': 'Preventive-maintenance schedules and recall propagation for medical devices [U+2014] mostly declarative rules over inventory.' CLAUDE.md forbids em-dashes everywhere. Overwriting a non-empty core field is destructive and needs sign-off."
    options:
      - "PATCH business_logic, replace the em-dash with a comma: '...for medical devices, mostly declarative rules over inventory.'"
      - "Leave as-is, fold into a catalog-wide em-dash sweep"
      - "User supplies exact replacement wording"
    why: "Original wording predates the em-dash ban; the fix is a destructive overwrite of a non-empty domains core field."

  - id: B2-S2
    summary: "CLIN-DEV module split decision (Phase M precursor). Gates B1A-BUILD and all b1b."
    question: "How should the CLIN-DEV market be modularized into domain_modules rows?"
    options:
      - "Two-module: CLIN-DEV-INVENTORY (medical_devices, device_maintenance_logs, device_calibration_records, sterilization_cycles, clinical_engineering_work_orders) + CLIN-DEV-SAFETY-VIGILANCE (device_recalls, device_incident_reports)"
      - "Single CLIN-DEV-CORE module covering all 7 masters"
      - "Three-module: CLIN-DEV-INVENTORY + CLIN-DEV-SAFETY-VIGILANCE + CLIN-DEV-STERILE-PROCESSING (pulls sterilization_cycles into a dedicated module)"
    why: "Right split depends on buyer persona: hospital Clinical Engineering only, or also Sterile Processing Department as a separate budget owner."

  - id: B2-S3
    summary: "Business-function owner for CLIN-DEV (DESTRUCTIVE repoint of existing owner row 257, surfaced)."
    question: "business_function_domains id 257 sets Research and Development (function 35) as owner of domain 50. Hospital Clinical Device Management is typically owned by IT (CE under IT), Operations/Facilities, or Compliance (recall and adverse-event surface). R&D reads like a manufacturer-mental-model carryover. Re-pointing the existing non-empty owner row is destructive."
    options:
      - "Repoint owner to IT Operations (function 27) or a hospital-CE function"
      - "Repoint owner to Business Operations (34) / Facilities and Real Estate (33)"
      - "Add Governance, Risk and Compliance (31) as additional owner or contributor for recall/adverse-event surface"
      - "Leave R&D, re-scope catalog row to medical-device manufacturers"
    why: "Buyer persona ambiguous between hospital CE operations and medical-device-manufacturer R&D; re-pointing the existing row is a destructive overwrite."

  - id: B2-S4
    summary: "Pattern-flag positive re-evaluation per Rule #12 (overwrite of existing false flags, surfaced)."
    question: "All 7 masters carry has_personal_content=false, has_submit_lock=false, has_single_approver=false. Likely positives need yes/no per flag; toggling an existing flag is an overwrite and a workflow-shape judgment."
    options:
      - "device_incident_reports.has_personal_content=true (patient identifier in adverse-event report)"
      - "device_incident_reports.has_submit_lock=true (immutable after regulator filing)"
      - "device_calibration_records.has_submit_lock=true (21 CFR Part 11 audit-trail integrity)"
      - "device_recalls.has_single_approver=true (recall coordinator approves issuance)"
    why: "Pattern flags are workflow-shape judgments on now-operational_workflow masters; Rule #15 forbids parking reasoning in notes."

  - id: B2-S5
    summary: "Manufacturer-vs-hospital scope: should manufacturer-only regulations move to a queued MED-DEVICE-QMS candidate?"
    question: "Current footprint mixes hospital clinical engineering (PM scheduling, recall response, incident reporting) and medical-device-manufacturer post-market surveillance (FDA eMDR, 510(k), 21 CFR 820). Masters fit hospital-side; regulations lean manufacturer-side."
    options:
      - "Leave CLIN-DEV as hospital-side, remove manufacturer-only regulations (510(k), QSR 820) from domain_regulations (destructive delete)"
      - "Keep all 7 regulations, clarify scope in catalog_description"
      - "Wait for MED-DEVICE-QMS Phase 0 promotion, then re-scope"
    why: "Regulatory list ambiguous; underlying masters look hospital-side only. Removing regulations is destructive."

  - id: B2-S6
    summary: "ITSM payload mismatch on handoffs 893 and 898 (re-target existing rows, destructive)."
    question: "Handoffs 893 (work_order.opened to ITSM) and 898 (calibration.due to ITSM) carry payload service_incidents (data_object 47, target_domain_module_id=38 ITSM-INCIDENT-MGMT). Cross-domain relationships 661 (clinical_engineering_work_orders surfaces_in service_requests, id 48) and 662 (device_calibration_records schedules_in service_requests) point at service_requests instead. Either the handoff payload or the relationship target is wrong; both fixes overwrite existing rows."
    options:
      - "Re-target the 2 handoff rows to service_requests + target_domain_module_id=39"
      - "Re-target the 2 relationship rows to service_incidents"
      - "Split: register-event handoff to service_requests, calibration-overdue handoff to service_incidents (the time-critical bit)"
    why: "Workflow-shape decision and a destructive re-target of existing rows."

  - id: B2-S11b
    summary: "APQC tag for handoff 894 (CLIN-DEV to GRC, device_recall.issued). No single clean PCF; user pick."
    question: "2026-05-30 audit proposed PCF 37 (Manage product recalls and regulatory audits, L2) or PCF 204 (Initiate recall, L3) for handoff 894. Two candidates means no single clean match, so it is a user pick rather than an agent-curated insert."
    options:
      - "Tag with PCF 37 (L2)"
      - "Tag with PCF 204 (L3)"
      - "Tag both"
      - "Defer to Discover"
    why: "Audit offered two PCF candidates without picking one; agent does not pick between two viable APQC tags."

