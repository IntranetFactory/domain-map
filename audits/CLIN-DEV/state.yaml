    summary: "Business-function owner for CLIN-DEV (DESTRUCTIVE repoint of existing owner row 257, surfaced)."
    question: "business_function_domains id 257 sets Research and Development (function 35) as owner of domain 50. Hospital Clinical Device Management is typically owned by IT (CE under IT), Operations/Facilities, or Compliance (recall and adverse-event surface). R&D reads like a manufacturer-mental-model carryover. Re-pointing the existing non-empty owner row is destructive."
