b2:
  - id: B2-S1
    summary: "Em-dash pollution on domains.business_logic for domain_id=50."
    question: "Should the audit revert the U+2014 character in domains.business_logic (between 'devices' and 'mostly') to a comma, colon, or sentence break? The CLAUDE.md project rule forbids em-dashes everywhere."
    options:
