  - id: B2-S2
    summary: "CLIN-DEV module split decision (Phase M precursor). Gates B1A-BUILD and all b1b. RECOMMENDATION REVERSED 2026-06-08 by Phase 0."
    question: "How should the CLIN-DEV market be modularized into domain_modules rows?"
    options:
      - "Two-module (RECOMMENDED, follows vendor packaging): CLIN-DEV-CMMS (medical_devices, device_models, device_locations, clinical_engineering_work_orders, device_maintenance_logs, preventive_maintenance_schedules, device_calibration_records, device_recalls, device_incident_reports, service_contracts, compliance evidence) + CLIN-DEV-STERILE-PROC (sterilization_cycles, instrument_trays, biological_indicator_results, or_case_carts)"
      - "Single CLIN-DEV-CORE module covering all 7 masters"
      - "Two-module (prior shape, now overruled by evidence): CLIN-DEV-INVENTORY (devices, maintenance, calibration, sterilization, work orders) + CLIN-DEV-SAFETY-VIGILANCE (device_recalls, device_incident_reports)"
    why: "REVERSED 2026-06-08 by Phase 0 (.tmp_deploy/CLIN-DEV-phase0-2026-06-08.md). The prior recommended split (Inventory + Safety-Vigilance) rested on build-convenience (the minimal shape that unblocks the build), a Rule #22 violation. Named-vendor evidence overturns it: every flagship CMMS (Nuvolo, AIMS Hazard Alerts, EQ2 HEMS Alerts & Recall, ServiceNow CDM) bundles recall / hazard-alert response INTO the core product, so Safety-Vigilance is not a separately-marketed surface. The genuine product boundary is sterile processing (Censis CensiTrac, STERIS SPM: distinct product, distinct buyer = SPD manager, distinct workflow). Recommended split now follows vendor product packaging: CMMS core + Sterile Processing. IOMT-SEC (medical-device security, Asimily/Cynerio, Gartner-recognized distinct market) and MED-DEVICE-QMS (manufacturer QMS) promote to sibling domains, not modules."

