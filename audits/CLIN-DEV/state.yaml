    rationale: "Medical-device manufacturer QMS (design controls per 21 CFR 820.30, CAPA, complaint handling, eMDR submissions, 510(k) records). This is the manufacturer-side market that the 510(k) and QSR 820 regulations in B2-S5 actually belong to; no hospital-HTM flagship touches it. Distinct buyer (manufacturer quality team) from hospital clinical engineering. Relates to B2-S5 (manufacturer-vs-hospital scope): if promoted, the manufacturer-only regulations relocate here."
