b3:
  - id: B3-DEVICE-MODELS
    candidate: device_models
    rationale: "Flagship clinical-engineering products distinguish the model (manufacturer + model number, the recallable unit) from the unit/asset record (a specific instance). Today medical_devices collapses the two. A model master enables recall isolation at the model layer and parts compatibility at the unit layer."
    vendor_evidence:
      - {vendor: AIMS by Phoenix Data Systems, evidence: 1st_class}
      - {vendor: Nuvolo Connected Workplace for Healthcare, evidence: 1st_class}
      - {vendor: EQ2 HEMS, evidence: 1st_class}
    proposed_module: CLIN-DEV-INVENTORY

  - id: B3-DEVICE-LOCATIONS
    candidate: device_locations
    rationale: "Hospital clinical-engineering tracks the room / OR / department a device sits in for PM dispatch, recall isolation, and incident-scene reconstruction. May be embedded_master on a platform locations master if one exists in the catalog."
    vendor_evidence:
      - {vendor: AIMS by Phoenix Data Systems, evidence: 1st_class}
      - {vendor: Nuvolo Connected Workplace for Healthcare, evidence: 1st_class}
    proposed_module: CLIN-DEV-INVENTORY
    extra_dependency: "Interacts with B2-S2 (module split); if locations is platform-wide and SAFETY-VIGILANCE recalls need to isolate by location, dependency informs which module embeds the shell."

  - id: B3-DEVICE-SERVICE-CONTRACTS
    candidate: device_service_contracts
    rationale: "Vendor service contracts (warranty, response-SLA, T&M boundary) dominate Clinical Engineering budget conversations. Distinct from a generic contracts master because of device + warranty + response-SLA shape."
    vendor_evidence:
      - {vendor: AIMS by Phoenix Data Systems, evidence: 1st_class}
      - {vendor: Nuvolo Connected Workplace for Healthcare, evidence: 1st_class}
    proposed_module: CLIN-DEV-INVENTORY

  - id: B3-RECALL-EFFECTIVENESS
    candidate: recall_effectiveness_reviews
    rationale: "Beyond device_recalls.closed, flagships track recall-effectiveness metrics (units accounted for, time-to-isolation, retraining-confirmed counts). Aligns with PCF 20115 (Monitor and audit recall effectiveness, id 208) and PCF 20121 (Evaluate recall performance, id 214)."
    vendor_evidence:
      - {vendor: Nuvolo Connected Workplace for Healthcare, evidence: 1st_class}
      - {vendor: AIMS by Phoenix Data Systems, evidence: secondary}
    proposed_module: CLIN-DEV-SAFETY-VIGILANCE
