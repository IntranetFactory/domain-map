# Per-domain facts file, emitted from the live `domain_map` catalog at HQ.
# Catalog publisher copies this into the published skill as `<domain>-facts.yaml`.
#
# Read-only at the tenant side. The skill's `state.yaml` records what was
# actually discovered in the tenant deployment, including renames and omissions.

facts_major: 1                  # Bump only on schema or discovery-procedure changes.
emitted: 2026-05-30             # Bump every emit. Drives incremental rediscovery.
catalog_snapshot: tests-2026-05-30
                                # Human breadcrumb for bug reports.

domain:
  code: ATS
  name: Applicant Tracking System
  description: >-
    Software market for recruiting, sourcing, evaluating, and hiring candidates.
    Anchors the candidate-to-employee transition handoff to HCM and Onboarding.
  parent_domain_code: null
  business_logic: >-
    Beyond CRUD: requisition approval routing, scorecard rubric scoring,
    offer-letter generation with version control, EEOC-compliant funnel analytics.
  min_org_size: "20 s <500"
  cost_band: "$$"
  certification_required: false
  usa_market_size_usd_m: 2400
  market_size_source_year: 2024
  # Catalog UX fields (`catalog_tagline`, `catalog_description`) are NOT
  # emitted into the facts file. They live on `domains` in the catalog DB
  # and feed the site generator via `catalog/skills/<DOMAIN>.json`, not the
  # tenant-side skill.

# Universal trigger phrases (industry synonyms, common vendor naming).
# Emitted from the `domain_aliases` table. Feeds runtime triggering
# (spliced into SKILL.md description) and is the same source the catalog
# site uses for its search index.
aliases:
  - recruiting
  - hiring
  - talent acquisition
  - applicant tracking
  - candidate management
  - hiring pipeline
  - ATS

# Function ownership (Phase C).
business_functions:
  owner:
    - Recruiting
  contributors:
    - Human Resources
  consumers:
    - Finance              # cost-center attribution on offer approval

# Markets-this-domain-competes-in capabilities.
capabilities:
  - code: ATS-REQUISITION-MGMT
    name: Requisition Management
    cross_cutting: false
  - code: ATS-CANDIDATE-SOURCING
    name: Candidate Sourcing
    cross_cutting: false
  - code: ATS-INTERVIEW-SCORING
    name: Interview Scoring
    cross_cutting: false
  - code: ATS-OFFER-MGMT
    name: Offer Management
    cross_cutting: false
  # ... (publisher emits all rows from capability_domains)

# Deployable modules (Rule #14: every domain has at least one).
modules:
  - code: ATS-CANDIDATE-CRM
    name: Candidate Relationship Management
    kind: full
    description: >-
      Sourcing pipeline, talent pool, candidate engagement, recruiter outreach.
    realizes_capabilities:
      - ATS-CANDIDATE-SOURCING
    masters:
      - candidates
      - candidate_referrals
      - recruitment_sources
    embedded_masters: []
    consumers:
      - users               # platform built-in
  - code: ATS-REQUISITION-PIPELINE
    name: Requisition and Application Pipeline
    kind: full
    description: >-
      Job requisition approval, posting distribution, application intake,
      stage progression through hiring funnel.
    realizes_capabilities:
      - ATS-REQUISITION-MGMT
    masters:
      - job_requisitions
      - job_postings
      - job_applications
      - application_notes
    embedded_masters:
      - hcm_positions       # canonical master: HCM
      - cost_centers        # canonical master: FIN-OPS
    consumers:
      - users
  - code: ATS-INTERVIEW-MGMT
    name: Interview Management
    kind: full
    realizes_capabilities:
      - ATS-INTERVIEW-SCORING
    masters:
      - interviews
      - interview_scorecards
    consumers:
      - users
  - code: ATS-OFFERS
    name: Offer Management
    kind: full
    realizes_capabilities:
      - ATS-OFFER-MGMT
    masters:
      - job_offers
      - background_checks
    consumers:
      - users

# All masters and embedded-masters this domain touches, with the structural
# detail the skill needs at runtime (lifecycle, pattern flags, aliases).
data_objects:
  - name: candidates
    singular_label: Candidate
    plural_label: Candidates
    description: Person being considered for one or more job requisitions.
    is_canonical_bare_word: false
    pattern_flags:
      has_personal_content: true
      has_submit_lock: false
      has_single_approver: false
    aliases:
      - { name: Applicant, source: industry-synonym }
      - { name: Talent, source: vendor-greenhouse }
    lifecycle_states:
      - { name: new, order: 10, is_initial: true }
      - { name: active, order: 20 }
      - { name: hired, order: 30, requires_permission: true, permission_verb_override: hire }
      - { name: rejected, order: 40, is_terminal: true }
      - { name: withdrawn, order: 50, is_terminal: true }

  - name: job_applications
    singular_label: Job Application
    plural_label: Job Applications
    description: A candidate's application to a specific job requisition.
    is_canonical_bare_word: false
    pattern_flags:
      has_personal_content: true
      has_submit_lock: true       # locks after submission until recruiter screen
      has_single_approver: false
    aliases: []
    lifecycle_states:
      - { name: submitted, order: 10, is_initial: true }
      - { name: screened, order: 20, requires_permission: true }
      - { name: interviewing, order: 30 }
      - { name: offer_extended, order: 40, requires_permission: true }
      - { name: hired, order: 50, is_terminal: true }
      - { name: rejected, order: 60, is_terminal: true }

  - name: job_offers
    singular_label: Job Offer
    plural_label: Job Offers
    description: Formal compensation offer extended to a candidate.
    is_canonical_bare_word: false
    pattern_flags:
      has_personal_content: true
      has_submit_lock: true
      has_single_approver: true     # offers gated on single hiring-manager approval
    aliases: []
    lifecycle_states:
      - { name: drafted, order: 10, is_initial: true }
      - { name: approved, order: 20, requires_permission: true, permission_verb_override: approve_offer }
      - { name: extended, order: 30 }
      - { name: accepted, order: 40, is_terminal: true }
      - { name: declined, order: 50, is_terminal: true }
      - { name: rescinded, order: 60, is_terminal: true, requires_permission: true }

  # ... (publisher emits one block per mastered data_object)

# Intra-domain and to-built-in relationships only. Cross-domain edges live
# in `handoffs.outbound` because they pair structurally with handoff rows.
relationships:
  - { from: job_requisitions, verb: receives, to: job_applications, cardinality: one_to_many, required: true }
  - { from: candidates, verb: submits, to: job_applications, cardinality: one_to_many, required: true }
  - { from: job_applications, verb: scheduled_for, to: interviews, cardinality: one_to_many, required: false }
  - { from: interviews, verb: produces, to: interview_scorecards, cardinality: one_to_many, required: false }
  - { from: job_applications, verb: results_in, to: job_offers, cardinality: one_to_one, required: false }
  # users-edge entries (Rule #10)
  - { from: users, verb: recruits_for, to: job_requisitions, cardinality: one_to_many, required: true }
  - { from: users, verb: interviews_in, to: interviews, cardinality: many_to_many, required: true }
  - { from: users, verb: approves, to: job_offers, cardinality: one_to_many, required: true }

# Cross-domain handoffs this domain PUBLISHES. Inbound handoffs are owned by
# the source domain's facts file; the skill discovers inbound from the live
# `/handoffs` table during reconciliation.
handoffs:
  outbound:
    - trigger_event: offer.accepted
      payload: onboarding_journeys
      target_domain: ONBOARDING
      target_module: ONBOARDING-JOURNEYS      # nullable if target not modularized
      integration_pattern: api_call
      friction_level: medium
      source_module: ATS-OFFERS
      apqc_processes:
        - { external_id: "6.2.4", name: "Onboard new employees" }
    - trigger_event: candidate.hired
      payload: employees
      target_domain: HCM
      target_module: HCM-EMPLOYEE-MASTER
      integration_pattern: event_stream
      friction_level: high                    # identity-reconciliation pattern
      source_module: ATS-OFFERS
      apqc_processes:
        - { external_id: "6.2.1", name: "Recruit, source, and select employees" }
        - { external_id: "6.1.1", name: "Create and maintain employee master data" }
    - trigger_event: background_check.required
      payload: background_checks
      target_domain: BGC
      target_module: null                     # BGC not yet modularized
      integration_pattern: api_call
      friction_level: medium
      source_module: ATS-OFFERS
      apqc_processes: []                      # no APQC tag yet; gap-tracked

# Deduplicated rollup of every APQC process this domain's handoffs touch.
# Useful for "which workflows in {{DOMAIN}} are part of process X?" queries.
# Empty when no handoffs in this domain have apqc_processes populated.
apqc_processes_touched:
  - { external_id: "6.1.1", name: "Create and maintain employee master data" }
  - { external_id: "6.2.1", name: "Recruit, source, and select employees" }
  - { external_id: "6.2.4", name: "Onboard new employees" }

# System skills (one per module, Rule #17).
system_skills:
  - module_code: ATS-CANDIDATE-CRM
    skill_name: ats_candidate_crm_agent
    tools:
      - { name: query_candidates, kind: query, required: true }
      - { name: create_candidate, kind: mutate, required: true }
      - { name: query_recruitment_sources, kind: query, required: true }
      - { name: notify_person, kind: side_effect, required: false }  # candidate engagement
  - module_code: ATS-REQUISITION-PIPELINE
    skill_name: ats_requisition_pipeline_agent
    tools:
      - { name: query_job_requisitions, kind: query, required: true }
      - { name: create_job_requisition, kind: mutate, required: true }
      - { name: query_job_applications, kind: query, required: true }
      - { name: update_job_application, kind: mutate, required: true }
      - { name: query_hcm_positions, kind: query, required: true }   # embedded-master read
  - module_code: ATS-INTERVIEW-MGMT
    skill_name: ats_interview_mgmt_agent
    tools:
      - { name: query_interviews, kind: query, required: true }
      - { name: create_interview, kind: mutate, required: true }
      - { name: create_calendar_event, kind: side_effect, required: true }  # external
      - { name: notify_person, kind: side_effect, required: true }
  - module_code: ATS-OFFERS
    skill_name: ats_offers_agent
    tools:
      - { name: query_job_offers, kind: query, required: true }
      - { name: create_job_offer, kind: mutate, required: true }
      - { name: approve_offer, kind: mutate, required: true }
      - { name: sign_document, kind: side_effect, required: true }         # external
      - { name: send_email, kind: side_effect, required: true }            # external

# Expected role personas (Phase E). The skill validates each is present and
# correctly bundled at the tenant.
roles:
  - code: RECRUITING-RECRUITER
    business_function: Recruiting
    modules:
      - { code: ATS-CANDIDATE-CRM, interaction: primary }
      - { code: ATS-REQUISITION-PIPELINE, interaction: primary }
      - { code: ATS-INTERVIEW-MGMT, interaction: primary }
      - { code: ATS-OFFERS, interaction: secondary }
  - code: HIRING-MANAGER
    business_function: null              # cross-functional
    modules:
      - { code: ATS-REQUISITION-PIPELINE, interaction: primary }
      - { code: ATS-INTERVIEW-MGMT, interaction: secondary }
      - { code: ATS-OFFERS, interaction: primary }

# Catalog enums the skill must recognize but never invent values for.
# Copied from the catalog at emit time so the skill doesn't have to query
# `/fields?reference_table=...` at runtime.
enums:
  trigger_event_category: [lifecycle, state_change, threshold, signal]
  integration_pattern:    [event_stream, api_call, batch_sync, manual_handoff, file_drop, lifecycle_progression]
  friction_level:         [low, medium, high]
  role_dmdo:              [master, embedded_master, contributor, consumer, derived]
  necessity:              [required, optional]
  record_status:          [new, pending, approved, rejected]
